<!-- start custom head snippets -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC:wght@700&family=Noto+Sans:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&family=Noto+Sans+Thai:wght@400;700&family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">

<!-- favicon: contrast-safe curly-brace mark for light and dark browser chrome -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon-light.svg' | relative_url }}?v=2" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon-dark.svg' | relative_url }}?v=2" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon-dark.svg' | relative_url }}?v=2">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon-256.png' | relative_url }}">

<!-- keep browser back/forward navigation anchored to the reader's last position -->
<script>if ('scrollRestoration' in history) { history.scrollRestoration = 'auto'; }</script>

<!-- theme toggle: apply saved preference before first paint to prevent FOUC -->
<script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||t==='light'){var s=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';if(t!==s)document.documentElement.setAttribute('data-theme',t);else localStorage.removeItem('theme');}})();
</script>

{% if page.classes == 'home' %}
<link rel="prefetch" href="{{ '/thoughts/' | relative_url }}">
<link rel="prefetch" href="{{ '/music/' | relative_url }}">
{% endif %}

<!-- end custom head snippets -->
