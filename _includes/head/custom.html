<!-- start custom head snippets -->

<!-- Google Fonts: JetBrains Mono (headers), Major Mono Display (404 display),
     LXGW WenKai Mono TC (CJK, 700 only — browser maps normal→700 automatically),
     Faculty Glyphic (thought titles), IBM Plex Mono (code blocks) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Major+Mono+Display&family=LXGW+WenKai+Mono+TC:wght@700&family=Faculty+Glyphic&family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<!-- favicon -->
<link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
<link rel="shortcut icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
<link rel="icon" type="image/png" sizes="256x256" href="{{ '/assets/images/favicon-256.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon-256.png' | relative_url }}">

<!-- disable browser scroll restoration so Edge/Chrome don't scroll down on refresh -->
<script>if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }</script>

<!-- theme toggle: apply saved preference before first paint to prevent FOUC -->
<script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||t==='light'){var s=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';if(t!==s)document.documentElement.setAttribute('data-theme',t);else localStorage.removeItem('theme');}})();
</script>

<!-- end custom head snippets -->
