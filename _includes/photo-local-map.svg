<svg class="photo-map__svg" viewBox="{{ include.view_box | default: '0 0 100 100' }}" role="img" aria-labelledby="{{ include.title_id | default: 'photo-local-map-title' }}" preserveAspectRatio="xMidYMid meet">
  <title id="{{ include.title_id | default: 'photo-local-map-title' }}">{{ include.title | default: 'Local photo map' }}</title>
  {% case include.shape %}
  {% when 'west-coast' %}
    <path class="photo-map__land" d="M26,0 L100,0 L100,100 L48,100 C44,88 40,78 38,67 C35,57 29,51 28,39 C27,27 23,15 26,0 Z"/>
    <path class="photo-map__coast" d="M26,0 C23,16 24,30 28,43 C31,54 36,61 38,72 C41,84 44,93 48,100 M39,73 C45,82 50,91 52,100"/>
  {% when 'scotland' %}
    <path class="photo-map__land" d="M46,4 C56,6 62,13 65,25 L58,39 L74,50 L67,67 L76,88 L59,96 L46,82 L35,88 L27,72 L34,58 L27,43 L31,31 L34,18 Z"/>
    <path class="photo-map__coast" d="M46,4 C56,6 62,13 65,25 L58,39 L74,50 L67,67 L76,88 L59,96 L46,82 L35,88 L27,72 L34,58 L27,43 L31,31 L34,18 Z M22,61 L12,70 L14,82 L25,73"/>
  {% when 'northern-china' %}
    <path class="photo-map__land" d="M0,0 L100,0 L100,55 C88,54 78,58 71,67 C62,79 48,79 36,70 C25,63 13,67 0,78 Z"/>
    <path class="photo-map__land" d="M83,57 C92,64 96,77 91,91 C83,81 78,67 83,57 Z"/>
    <path class="photo-map__coast" d="M100,55 C88,54 78,58 71,67 C62,79 48,79 36,70 C25,63 13,67 0,78 M83,57 C92,64 96,77 91,91"/>
  {% when 'northeast-us' %}
    <path class="photo-map__land" d="M0,0 L100,0 L100,32 C88,37 82,45 78,55 C74,67 64,78 52,84 L35,96 L0,100 Z"/>
    <path class="photo-map__coast" d="M100,32 C88,37 82,45 78,55 C74,67 64,78 52,84 L35,96"/>
  {% when 'southern-china' %}
    <path class="photo-map__land" d="M0,0 L100,0 L100,24 C91,25 84,30 80,37 C76,44 72,50 68,57 C64,64 63,72 61,78 C58,88 43,93 29,89 C18,88 9,82 0,86 Z"/>
    <path class="photo-map__land" d="M82,58 C86,67 85,78 81,86 C76,77 76,65 82,58 Z"/>
    <path class="photo-map__coast" d="M100,24 C91,25 84,30 80,37 C76,44 72,50 68,57 C64,64 63,72 61,78 C58,88 43,93 29,89 C18,88 9,82 0,86 M82,58 C86,67 85,78 81,86"/>
  {% when 'italy' %}
    <path class="photo-map__land" d="M28,12 C43,5 57,6 67,15 L63,30 L70,43 L76,58 L88,69 L80,80 L65,72 L61,91 L54,98 L48,78 L40,67 L34,53 L22,46 L28,35 L36,36 L42,29 Z"/>
    <path class="photo-map__coast" d="M28,12 C43,5 57,6 67,15 L63,30 L70,43 L76,58 L88,69 L80,80 L65,72 L61,91 L54,98 L48,78 L40,67 L34,53 L22,46 L28,35 L36,36 L42,29 Z"/>
  {% when 'georgia' %}
    <path class="photo-map__land" d="M17,56 C25,45 36,39 47,37 C56,30 67,31 80,39 L91,52 L84,66 L66,70 L53,64 L39,68 L25,62 Z"/>
    <path class="photo-map__coast" d="M17,56 C25,45 36,39 47,37 C56,30 67,31 80,39 L91,52 L84,66 L66,70 L53,64 L39,68 L25,62 Z"/>
  {% else %}
    <path class="photo-map__land" d="M0,0 H100 V100 H0 Z"/>
    <path class="photo-map__coast" d="M0,0 H100 V100 H0 Z"/>
  {% endcase %}
</svg>
