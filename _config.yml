# Build and theme settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

# Site settings
locale: "en-GB"
title: "hao things"
email: dinghao.luo@outlook.com
description: >-
  Personal website of Dinghao Luo: neuroscientist, translator, and musician.
  PhD student at Max Planck Florida Institute for Neuroscience.
baseurl: ""
url: "https://dinghaoluo.github.io"
repository: "dinghaoluo/dinghaoluo.github.io"
words_per_minute: 200
og_image: "/assets/images/social-card.png?v=1"

comments:
  provider: false

atom_feed:
  hide: false

search: false

# Social Sharing
