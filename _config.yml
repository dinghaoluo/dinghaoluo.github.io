  links:
    - label: "email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:dinghao.luo@outlook.com"
    - label: "github"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dinghaoluo"
