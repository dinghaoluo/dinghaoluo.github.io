- title: "Entangled Life"
  type: "book"
  creator: "Merlin Sheldrake"
  creator_role: "by"
  year: 2020
  image: ""
  preview: "I translated this — so I've spent more time with it than almost anything I've read."
  text: |
    I translated this into Chinese, so I've spent more time with it than with almost anything else I've read — every sentence twice. What surprised me was how much the translation revealed: Sheldrake's sentences are doing a lot of quiet structural work that I had to unpack to render. The book's argument is simple and seductive (fungi are weirder and more important than you think) but the writing is what earns it. Sheldrake takes mushrooms seriously as things that push back against the categories we use to understand life, and the book is more philosophically interesting than it lets on.

- title: "Mason & Dixon"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1997
  image: ""
  preview: "Takes about a hundred pages before the prose stops feeling like a wall."
  text: |
    It takes about a hundred pages before the prose stops feeling like a wall and starts feeling like a room you're living in. The joke density is absurd — Pynchon is genuinely funny, which I don't think he gets enough credit for. The two title characters are a kind of odd couple drawn across a continent that doesn't quite exist yet, and the book is at its best when it sits in that gap between the map and the territory. I keep putting it down for weeks and then picking it back up like I never left.
