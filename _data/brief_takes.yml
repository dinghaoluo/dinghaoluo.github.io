- title: "Gravity's Rainbow"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1973
  image: "/assets/images/brief_takes/gravitys_rainbow.jpg"
  posted: "2026-03-01"
  text: |
    Years later, I will still remember the V2 fragments scattered across London, the Kryptosam message hidden inside them, and the four tragedies behind that message. I will still remember Katje's ancestor Frans van der Groov and the dodos of Mauritius, the Hereros in Südwest Afrika, and the genocide of Europe's Jews. I will still remember the air in Germany's postwar 'Zone', with its creosote and fuel, and that thin, diffused hope drifting through it all. What *Gravity's Rainbow* never allows is the comfort of treating these as separate histories. Pynchon keeps binding them into one continuum, one long modern history in which extermination recurs, and in which progress seems to refine technique far more reliably than it does conscience.<br><br>
    That is why the V2 matters so much. The German rocket operators fire a calculation; the rocket hits a coordinate. No face, no voice, no legible human life lost. Just... numbers. In that sense the rocket brings colonial horror home: the same anonymity that had long made massacre possible elsewhere (the Namas, the Hereros...) now falls westward on London.<br><br>
    Against all this stand Franz Pökler and Ilse: while the rocket has its Brennschluss, its differentials and trajectories, Pökler measures time in years, watching his daughter grow up, not knowing that at some point he will no longer be able to see her at all. One also watches helplessly as Slothrop, initially an actual human with intentions, ambitions and hopes, gradually dissolving into a spectre, losing (or gaining?) all of his freedom, becoming eventually only a legend in the wind blowing through 'the Zone'. With language that is at once unruly and exact, Pynchon writes, in some sense, the most anti-mainstream Second World War novel: no clean heroism, no stable moral centre, only the oscillation between 'the System' and 'the Zone', between the terror that everything connects and the terror that nothing does. And so, with Slothrop, as the self comes apart in 'the Zone', I look up at the vast rainbow after the rain and feel every emotion at once — grief, awe, pity, terror — with tears gathering at the rim of the eye.

- title: "Bleeding Edge"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2013
  image: "/assets/images/brief_takes/bleeding_edge.jpg"
  posted: "2026-03-11"
  text: |
    My favourite of all the 'Pynchon-lites'. Set in 2001 (that strange year when after the attack, people had not yet settled on what to call it — '11 September'? '9/11'? ...), *Bleeding Edge* turns the world into a web of unexpected connections. The invisible lines between Silicon Alley start-ups, the FBI, Gulf money, and the coming security state run through characters who at first seem to have nothing to do with one another. Ah, the **grand web of paranoia** that Pynchon fans are so familiar with... What gives the book its peculiar tension is that Pynchon holds the 9/11 attacks back until surprisingly late, so that much of the novel unfolds under a suspended future terror everyone already knew was coming.<br><br>
    It is also the most humane of the 'Pynchon-lites'. Maxine may initially resemble Oedipa Maas (quick, intuitive, alert to hidden patterns) but she is far more distinct and fully realised. Pynchon stays unusually close to her consciousness, and that closeness gives the novel an emotional weight rare in his other works (bar maybe *Mason & Dixon*). I think of Maxine and Horst's half-broken, half-enduring relationship, her life with Otis and Ziggy, and March's antithetically broken family... Critics often note the book's domestic core, and they are right to do so: beneath all the paranoia, this is one of Pynchon's warmest novels.<br><br>
    That warmth is what makes the novel linger. Yes, it does capture the moment when the internet age curdles into the age of terror and 'security'; and yes, DeepArcher remains one of Pynchon's most haunting creations. But what stays with me is that *Bleeding Edge*, for all its conspiracies and terrors, never loses sight of ordinary emotions (clearly exemplified in both the opening and ending chapters of the book). Well, this is only my personal opinion: of all the later Pynchons, this is the one PTA should adapt.

- title: "Is a River Alive?"
  type: "book"
  creator: "Robert Macfarlane"
  creator_role: "by"
  year: 2025
  image: "/assets/images/brief_takes/is_a_river_alive.jpg"
  posted: "2026-03-20"
  text: |
    Does Robert Macfarlane really care about rivers? To say 'no' would be unfair: *Is a River Alive?* follows Giuliana, Yuvan, and others through three river worlds in Ecuador, India, and eastern Canada, and it is openly shaped by the wider 'Rights of Nature' conversation in which Macfarlane has been partaking for years. But to say 'yes' without qualification is just as difficult. For a book with such an ambitious question as the title, the rivers themselves often feel strangely out of focus, displaced by companions, by advocacy, by atmosphere. Well... what *about* the rivers?<br><br>
    Much of the book reads like a long prelude to an argument that never quite arrives. That probably explains the repeated return to the 2017 Whanganui River settlement: it remains one of the clearest and most famous examples available. But even then, the case is more 'invoked' than 'tested'. Macfarlane never really supplies the philosophical or legal rigour needed to make the idea that 'a river *is* alive' feel fully earned. The book seems to want conviction from the reader before it has done enough to engender it.<br><br>
    That is what makes the book so frustrating. The prose is indeed lyrical, and the urgency is real enough, but the Macfarlane's proposal stays oddly hollow. The content feels thin, the people flatter than they should be, and one keeps coming back to the same question: what exactly is Macfarlane trying to persuade the reader of? By the end, this one unkind thought is hard to shake: 'A river may be alive, but certainly can't say the same for some characters in this book.'

- title: "Capitalist Realism"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2009
  image: "/assets/images/brief_takes/capitalist_realism.jpg"
  posted: "2026-03-18"
  text: |
    I finished Mark Fisher's first 'pamphlet' while travelling. Reading the afterword, I kept thinking of Fisher in that small cabin, sorting through scattered notes on the eve of Occupy Wall Street and the Egyptian revolution, and felt an uncontrollable rush of admiration as well as sadness. There is something especially moving about encountering *Capitalist Realism* from the specific historical threshold of 2009/2010: before the cracks had fully opened, before anti-capitalism briefly recovered the sense that it might once again speak in the future tense.<br><br>
    There are plenty of debates over the philosophical 'substance' of *Capitalist Realism* (2009), and not all of them are unfair. But even those debates would not dare dismiss the fact that, in such a narrow space, Fisher managed to name an entire atmosphere: the privatisation of stress, the depoliticisation of mental illness, the dull violence of capitalist bureaucracy, and the way ecological destruction is endlessly 'acknowledged' and then absorbed, as if resolved. More importantly, he points towards a framework for what anti-capitalist critique must do next: we need to re-politicise mental health, environmental collapse, and bureaucracy. This central point remains convincingly relevant even now.<br><br>
    What struck me most, though, was not just the theory, but the quality of the writing itself: so compressed, so lucid, and yet never generic. I especially loved the final paragraph — 'From a situation in which nothing can happen, suddenly anything is possible again.' By the end I was close to tears.

- title: "Entangled Life"
  type: "book"
  creator: "Merlin Sheldrake"
  creator_role: "by"
  year: 2020
  image: "/assets/images/brief_takes/entangled_life_chinese.jpg"
  posted: "2024-10-01"
  text: |
    I translated this masterpiece into Chinese, which was published as 《菌络万象》 in October 2024.<br><br>
    The translation's release feels long overdue. From childhood memories of Frodo sneakily picking mushrooms in *The Lord of the Rings*, to hiking during my uni years in search of fungi, I have had my share of encounters with the fungal world, but never a way to explore it in depth. So when Editor Fei from HouLang Press reached out more than three years ago to ask whether I would be interested in translating this famed work by Sheldrake, I agreed without hesitation.<br><br>
    I did not expect that decision to unfold into three years of work. Over that time, my understanding of fungi was turned completely inside out. Abstract terms became tangible structures; within the entanglement and interweaving of mycelium, I found myself tracing systems of communication, rules of life, forms of exchange, and a kind of unity across all things.<br><br>
    Looking back on this journey, I am especially grateful to my wife for constant encouragement and support; to Editor Fei, whose brilliant editorial care has bordered on the meticulous; to Zhou for rigorous and knowledgeable proofreading; and to Congcong for a cover design full of quiet vitality. This translation only exists because of all of them.