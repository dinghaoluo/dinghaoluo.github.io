- title: "Quarantième: Live à Paris"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/quarantieme.jpg"
  posted: "2026-01-08"
  text: |
    The biggest surprise on ***Quarantième: Live à Paris*** is not what Mike Portnoy adds but what he does not subtract. Watching him navigate Mike Mangini's drum parts, particularly on 'Barstool Warrior', with an almost nonchalant ease dispels a certain mythology: Mangini's writing is technically fearsome on paper, but Portnoy makes it breathe. <u>There is an ineffable quality to Portnoy's playing, a kind of rhythmic sentience, that no amount of Mangini's metronomic precision can replicate.</u> Call it a priori bias if one likes; the ear does not lie. LaBrie's voice, meanwhile, has audibly deteriorated in the five years since the reunion tour. Having attended both the New York and London dates of that earlier run, when he could still sustain four-plus hours without fraying, the decline is unmistakable here. Yet even diminished, he outclasses most old-school prog metal vocalists still active, which says as much about the genre's vocal landscape as it does about LaBrie.

    The rest of the band operates at what might charitably be called par, with one glaring exception: John Myung's bass tone is inexplicably plastic, a compressed, scooped midrange that robs his lines of the warmth they carry on studio recordings. Whether this is a live mixing choice or a gear issue, it sits uncomfortably in an otherwise rich sonic field. <u>But I have said this before and will say it again: Dream Theater's baseline, the floor beneath which they simply cannot fall, is still another band's masterpiece.</u> The sheer density of ideas per minute, the structural ambition of the setlist, the interplay between Petrucci and Rudess at their most conversational: all of it remains formidable even when no single element is operating at peak. One leaves this record not dazzled, exactly, but reassured. The machine still works, and the machine is magnificent.

- title: "Somni"
  type: "music"
  creator: "Snarky Puppy"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "jazz fusion"
  image: "/assets/images/music/somni.jpg"
  posted: "2025-11-28"
  text: |
    Every few months an album arrives that does something unreasonable to one's sense of scale: each successive track outdoes the last until the whole record feels like an embarrassment of riches. ***Somni***, the collaboration between Snarky Puppy and the Metropole Orkest, is precisely that kind of record. The Metropole Orkest's previous partnership with Louis Cole on *nothing* was already an exceptional pop/jazz release, but *Somni* operates on a different axis entirely: less playful, more tectonic. The drum solo in 'Recurrent' is a passage that raises goosebumps not through flashiness but through timing, each hit placed with a surgeon's patience until the whole thing detonates. 'Waves Upon Waves' builds melodic tension through a slow, incremental accumulation, the sort of crescendo that only a full string ensemble can properly release, and when the strings finally open up, the relief is almost physical.

    <u>Then there is 'It Stays with You', drifting through a mixolydian haze that reads less as a song and more like a slowly developing dream.</u> The harmonic palette is warm, consonant, but never saccharine; the modal colour keeps pulling the melody sideways just enough to prevent it from settling. By the time the final track wound down and the sound of applause bled through the recording, I found myself crying. Not the performative kind, not the tears one describes to signal sensitivity. Just the involuntary response of a body that has been held in sustained emotional tension for fifty minutes and finally, gently, let go.

- title: "Fulguromatic"
  type: "music"
  creator: "Fulguromatic"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "Canterbury scene"
  image: "/assets/images/music/fulguromatic.jpg"
  posted: "2025-11-27"
  text: |
    Beyond Tom Penaguin, the Canterbury scene has found another modern heir. ***Fulguromatic*** is saturated with the spirit of Magma and Soft Machine: that peculiar alchemy of the whimsical and the startling, where a passage can be simultaneously absurd and technically ferocious. 'Lil' Appeau' is the most inventive track here, its flute work conjuring the ghost of 1970s prog when the instrument was practically a genre staple, from *Thick as a Brick* to *Camel*. The tone is playful but the execution is razor-sharp, and the juxtaposition gives the whole record its distinctive energy.

    <u>It is rare, in 2025, to encounter a prog/jazz fusion album that fuses absurdity, intensity, passion, and virtuosity without letting any one element cannibalise the others.</u> Fulguromatic manage the balance with a lightness that belies how difficult it actually is. The Canterbury tradition has always been about refusing the false choice between rigour and irreverence; this record understands that completely, and carries it forward with enough personality to feel like continuation rather than pastiche.

- title: "Loss of Life"
  type: "music"
  creator: "MGMT"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "synth pop"
  image: "/assets/images/music/loss_of_life.jpg"
  posted: "2025-08-28"
  text: |
    MGMT have always been an uneven band, and ***Loss of Life*** does not break the pattern: the highs are high, the lows are forgettable, and the gap between them is wide enough to walk through. But the highs on this record are some of the finest pop songs one could hope for. 'Nothing Changes' carries a soft, almost weightless melody that recalls the vulnerability of early MGMT, the *Youth*-era naivety before irony became the dominant mode, and the production lets it breathe rather than burying it in layers of psychedelic ornamentation.

    'Phradie's Song' is, on paper, a conventional slow ballad, a track that risks blandness by design. <u>Yet there is a quiet loveliness to it that resists cynicism, a sincerity that feels earned rather than performed.</u> The record does not reinvent MGMT, nor does it need to. It simply reminds one that underneath all the art-school posturing, there have always been people in this band who know how to write a melody that stays.

- title: "Havdalah to the Blank Without"
  type: "music"
  creator: "Ben Levin"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "art rock"
  image: "/assets/images/music/havdalah_to_the_blank_without.jpg"
  posted: "2025-08-12"
  text: |
    Ben Levin is the sort of musician who needs only a single good concept to generate an entire ecosystem of quirky, self-sustaining variations. ***Havdalah to the Blank Without*** follows the structural logic of *How I Love My Cat* and *Jelly Mound*: five tracks deconstructed from a single motif, each a different refraction of the same core material. What distinguishes this album from its predecessors is the directness of the deconstruction. Where earlier records filtered the motif through genre shifts and timbral disguises, here the variations are blunter, more combinatorial: the melodic motif and its instrumentation are rearranged, recombined, permuted with an almost mathematical transparency.

    <u>what emerges is a sustained tension between freshness and familiarity, each track surprising precisely because one already knows the material it is made from.</u> It is the musical equivalent of seeing a familiar face from an unfamiliar angle. Levin has always been a composer who treats playfulness as a structural principle rather than a surface ornament, and this record is the purest distillation of that instinct. This is Ben Levin at his best.

- title: "SAYA"
  type: "music"
  creator: "Saya Gray"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "art pop"
  image: "/assets/images/music/saya.jpg"
  posted: "2025-07-25"
  text: |
    ***SAYA*** is Saya Gray at her most balanced: tender without ever tipping into fragility, approachable without a hint of the formulaic. 'PUDDLE ( OF ME )' carries a softness threaded with real force, the production lean enough that the vocal sits exposed and unprotected, which is exactly where it needs to be.

    'LIE DOWN..' is warm and intimate, a track that could easily curdle into preciousness but never does. <u>There is a generosity to this record, a willingness to be gentle without mistaking gentleness for weakness.</u> It asks very little of the listener and gives back more than it should.

- title: "Counting Sheep"
  type: "music"
  creator: "Max Pope"
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "indie pop"
  image: "/assets/images/music/counting_sheep.jpg"
  posted: "2025-07-11"
  text: |
    Max Pope has changed. One can hear it most starkly in the title track, 'Counting Sheep', a song that existed a decade ago and now reappears in an almost unrecognisable form: softer, smoother, its textures rounded off like river stones. The abrasion is gone. The confrontational edge that made the earlier work interesting has been sanded down into something that sounds, for lack of a better term, like modern pop. Every track on ***Counting Sheep*** suffers from this same flattening, a uniformity of surface that leaves one struggling to hear anything distinctive beneath it.

    The usual defence is that Max Pope was never an especially iconoclastic songwriter. Fair enough. But 'Gone to Count Sheep', 'Less Than Nothing', 'Home of Stone', those earlier recordings had a roughness, a forward momentum, a sense of propulsion that felt almost physical. <u>That raw, stubborn 'pressing-on' quality is what one misses most, and its absence here is not evolution but erosion.</u>

- title: "Gamle Mester"
  type: "music"
  creator: "Lars Fredrik Frøislie"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/gamle_mester.jpg"
  posted: "2025-07-11"
  text: |
    Lars Frøislie has brought the full arsenal of Wobbler's retro-prog vocabulary to ***Gamle Mester***, and it turns out the vocabulary sounds even better when freed from band dynamics and filtered through a single compositional intelligence. The grooves are unexpectedly catchy, the kind that lodge themselves in the body rather than the head, and between them Frøislie has inserted an almost reckless number of brilliant passages. 'De Tre Gratier' opens with harpsichord and a deceptively simple pseudo-medieval melody, then pivots without warning into a long vocal bridge that splits the difference between Gentle Giant and Wobbler's own catalogue: half intricate counterpoint, half surging prog anthem.

    <u>Across twelve minutes, the only moment of repose arrives around the nine-minute mark, a brief Jethro Tull-esque softening that serves less as a rest and more as a held breath before the final push.</u> The track is relentless in the best sense: dense, inventive, and structurally coherent despite its length. That Frøislie could improve this much on *Fire Fortellinger*, an already strong record, speaks to a composer still actively refining his language rather than coasting on established fluency. The ambition here is not youthful exuberance; it is the quiet confidence of someone who knows exactly what he is doing.

- title: "Waving At The Sky"
  type: "music"
  creator: "Avkrvst"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/waving_at_the_sky.jpg"
  posted: "2025-06-28"
  text: |
    Every prog listener has entertained the thought experiment at some point: what happens when members of Porcupine Tree, Haken, and Opeth converge into a single project? The answer, it turns out, is not a Frankenstein's monster of competing aesthetics but something surprisingly coherent. ***Waving At The Sky*** synthesises Porcupine Tree's melancholy and softness, Haken's dynamicism and structural pragmatism, and Opeth's heaviness and tonal darkness into a sound that honours all three lineages without being enslaved to any of them. 'Ghosts of Yesteryear' is where the synthesis is most transparent: the clean-to-heavy transitions have Opeth's patience, the melodic hooks carry Haken's ear for the memorable, and the emotional register, that particular shade of wistful resignation, is pure Steven Wilson.

    <u>If May's finest was Ambrotype's <em>The Colours of Darkness Vol. II</em>, then June belongs to AVKRVST without contest.</u> What makes this record more than a supergroup novelty is that it sounds like a band, not a committee. The parts fit because the musicians share a common emotional grammar, and the album's architecture reflects a unified vision rather than a negotiated compromise. It is the rare prog side-project that justifies its own existence from the first listen.

- title: "The Colours of Darkness Vol. II"
  type: "music"
  creator: "Ambrotype"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "dark ambient"
  image: "/assets/images/music/colours_of_darkness_vol_ii.jpg"
  posted: "2025-06-28"
  text: |
    Over the past decade, Ambrotype's journey has been inseparable from displacement. Fleeing Syria during the war, eventually settling in the Netherlands, the band's sound has matured in exile, growing more independent and more assured with each release. ***The Colours of Darkness Vol. II*** is the culmination of that trajectory. 'Smile Corrosion' and 'The Witness' represent the fullest expression of Ambrotype's current identity: vocal melodies of uncommon beauty, courtesy of Adel Saflou, whose voice occupies a singular register in the crowded field of prog-metal vocalists, and an instrumental ensemble that moves between tenderness and ferocity with startling fluidity. Jawdat Al-Atasi's guitar and Pascal Schouten's drums trade off between restraint and explosion as though the dynamic shifts were choreographed at the cellular level, while David Klompmakers' bass introduces a slow jazz undertow that grounds even the most volatile passages.

    <u>The album is full of eccentric detours and grounded virtuosity showcases, and neither mode feels like it exists at the other's expense.</u> There is a restlessness here, a refusal to settle into any single emotional or technical mode for too long, that keeps the record alive across repeated listens. The closing lyric, 'Let it circulate you; Let it start a fire', lands less as an instruction than as a description of what the music has already done.

- title: "Maestro"
  type: "music"
  creator: "Magic Pie"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/maestro.jpg"
  posted: "2025-06-26"
  text: |
    What more can one ask for? ***Maestro*** answers that question by simply refusing to stop giving. A single track, 'Opus Imperfectus', contains a fusion-jazz piano solo between 10:45 and 12:00 that would be the centrepiece of a lesser album, followed immediately by a guitar solo from 12:00 to 13:44 that somehow braids David Gilmour's melodic patience with John Petrucci's technical ferocity. Add riffs that carry a certain Deep Purple heaviness and lyrics, along with vocals, that clear a surprisingly high bar for a prog band, and the picture is complete.

    <u>Magic Pie, like all Norwegian prog outfits worth their salt, operate with a reliability that borders on the supernatural.</u> They do not innovate; they do not need to. What they do is execute a particular vision of progressive rock with such conviction and craftsmanship that the absence of novelty becomes irrelevant. The musicianship here is not showing off; it is showing up, fully, for every bar.

- title: "Liveforms: An Evening with Haken"
  type: "music"
  creator: "Haken"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/liveforms.jpg"
  posted: "2025-06-24"
  text: |
    I still remember every detail of the night I attended this tour in New York. The hastily arranged rows of plastic chairs, the strangers in the aisles nodding at each other's shirt choices with the quiet solidarity of the converted, the disappointment of missing the jellyfish Haken shirt from 'Sempiternal Beings'. And then: six people delivering a flawless performance. ***Liveforms: An Evening with Haken*** captures that energy faithfully. The recording has the warmth and presence of a band playing not to an arena but to a room of people who know the catalogue, who catch every callback and every rhythmic pivot.

    <u>There are still voices insisting Haken are Dream Theater's successors, as though the relationship were one of inheritance rather than surpassing.</u> On the evidence of their live work, Haken have already outstripped their predecessors in both practical virtuosity and compositional inventiveness. The playing here is not merely accurate; it is alive, responsive, shot through with a spontaneity that studio recordings can only approximate. One leaves this record not with admiration but with the particular joy of having witnessed something done as well as it can possibly be done.

- title: "Kontraster"
  type: "music"
  creator: "Jordsjø & Breidablik"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/kontraster.jpg"
  posted: "2025-06-21"
  text: |
    Beside Breidablik's contribution, the second track, Jordsjø's opening piece feels almost like preamble. ***Kontraster*** is nominally a split, but the weight distribution is uneven: Breidablik's deconstruction of the 'contrast' concept is vivid and structurally inventive, built on a sustained tension between electronic instrumentation and traditional melodic language. The sequencer provides a stable harmonic and rhythmic foundation, but the passages layered above it are restless, dynamic, full of an energy that refuses to sit still.

    There is a pleasant irony, possibly intentional, in the fact that the stark difference between Jordsjø's and Breidablik's respective tracks is itself a form of 'kontrast'. <u>The split format becomes its own argument, the structure enacting the theme.</u> Whether or not this was designed, it gives the release a conceptual coherence that elevates it above the usual split-album format, even if Jordsjø's half does not quite earn its place on its own merits.

- title: "OUT THERE"
  type: "music"
  creator: "Hiromi's Sonicwonder"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "jazz fusion"
  image: "/assets/images/music/out_there.jpg"
  posted: "2025-04-29"
  text: |
    A big surprise. Since abandoning the Sonicbloom trio format in favour of Sonicwonderland's four-piece configuration, Hiromi's last two albums have grown progressively more prog, more fusion, more sonically adventurous. ***OUT THERE*** is the fullest realisation of that trajectory. The opening track, 'XYZ', is such a muscle show, a technical display so commanding that one has to ask: is there a tighter four-piece unit working in the Japanese fusion jazz scene today? I cannot think of one.

    <u>The 'OUT THERE' suite, spanning four movements, folds in the stylistic fingerprints of virtually every collaborator Hiromi has worked with over the years, producing something kaleidoscopic, almost overwhelming in its density of ideas.</u> The only word that captures the experience is 'dazzling', each section dissolving into the next before one has fully processed what came before. This truly sparks joy in me throughout. It is Hiromi operating at a level where virtuosity ceases to be a quality of the performance and becomes simply the medium through which the music exists.

- title: "Cinder"
  type: "music"
  creator: "Pixyblink"
  creator_role: "by"
  year: 2008
  eval: "liked"
  genre: "art pop"
  image: "/assets/images/music/cinder.jpg"
  posted: "2025-04-28"
  text: |
    I had been waiting for a new Pixyblink album ever since *The Courage to Be*, which made a striking impression seven years ago with its strategy of deploying the piano's lower register in place of bass guitar and guitar solos. At the time, the approach felt revelatory: it gave the arrangements an unusual harmonic density and a timbral warmth that most prog acts in that weight class could not match. ***Cinder*** returns to the same well, but seven years have drained it of its novelty. In 'Mosaic Mind' the technique sounds almost clumsy, the piano's bass voicings muddying the low end where a proper bass would have provided clarity and drive.

    The overall standard remains high; this is still a band with strong instincts for melody and dynamics. And hearing Ross Jennings' voice appear on a small band's record is a pleasant surprise, a reminder that the Haken vocalist's range and control translate beautifully into less maximal contexts. <u>But the central gimmick has calcified, and no amount of craft can fully compensate for the absence of the shock it once delivered.</u>

- title: "Ozai"
  type: "music"
  creator: "Nospūn"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/ozai.jpg"
  posted: "2025-04-11"
  text: |
    The 'little Haken' label has stuck, and ***Ozai*** does nothing to shake it off, nor should it. Nospūn's energy is remarkably consistent with their previous record: the same progressive metal architecture, the same Haken-adjacent harmonic sensibility, the same appetite for density. What has shifted is the centre of gravity, tilting harder toward hard-rock territory this time around, enough to evoke *Insanium* by Whom Gods Destroy, one of my favourite recent records. The grooves in 'The Effervescent Power' and 'Life, the Universe, and Everything' are relentless, layered with enough rhythmic and melodic incident to reward repeated listening, while the slow sections offer a counterweight that prevents the album from tipping into pure adrenaline.

    <u>There is a particular pleasure in encountering a young band that knows exactly what it wants to sound like and then executes that vision with this degree of confidence.</u> Nospūn are not innovators; they are inheritors, and they wear the inheritance well. A record that suggests the next generation of progressive metal is in safe, capable hands.

- title: "Clarity of Cal"
  type: "music"
  creator: "Vulfpeck"
  creator_role: "by"
  year: 2025
  eval: "meh..."
  genre: "funk"
  image: "/assets/images/music/clarity_of_cal.jpg"
  posted: "2025-03-06"
  text: |
    I am not sure if 'inoffensive music' constitutes an actual genre, but every time I listen to Vulfpeck the phrase is the only one that surfaces: too clean, too neat, too vanilla, too cringe. The Reddit designation 'vanilla funk' is, frankly, a better piece of criticism than anything I could construct. ***Clarity of Cal*** does nothing to challenge this impression. The production is immaculate in the worst sense, polished to a frictionless sheen that eliminates every rough edge where personality might otherwise lodge. The sole exception is 'New Beastly', a fully instrumental track that, freed from lyrics, manages to locate something rhythmically alive and interesting.

    Speaking of lyrics: one need only sample 'In Real Life' to confirm the diagnosis. 'Getting up baby getting out / LOVE that's what it's all about'; 'There's only one way to party / And that's with everybody'. <u>The words do not require critique; they are their own indictment.</u>

- title: "Live for the Ending"
  type: "music"
  creator: "District 97"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "progressive rock"
  image: "/assets/images/music/live_for_the_ending_hires_48khz24bit.jpg"
  posted: "2025-03-04"
  text: |
    *Stay for the Ending* was one of my favourite prog rock albums of 2023, so when a live release was announced I was thrilled. Having never heard District 97 perform live, I went in expecting the studio precision translated into a room. ***Live for the Ending*** corrected that expectation with brutal efficiency. Presumably the recordings selected for a live album represent the best of the tour; if that is true, the implications are grim. The vocalist's technique is third-rate at best, breathy and thin, as though singing through a head cold, with high notes that make one wince rather than soar. The band fares little better: guitar solos that sounded elegant and articulate on the studio versions arrive here disfigured, clumsy, stripped of their original shape.

    <u>Some bands are better left on vinyl, where the studio can do the work their bodies cannot.</u> It is a harsh verdict, but the gap between the recorded and the live versions is too wide to attribute to a bad night or a poor mix. This is a fundamental mismatch between ambition and ability, and no amount of post-production can bridge it.

- title: "空中飞人"
  type: "music"
  creator: "窦靖童"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "C-indie"
  image: "/assets/images/music/kong_zhong_fei_ren.jpg"
  posted: "2025-03-04"
  text: |
    After several albums that squandered their potential on aimless experimentation, Dou Jingtong has finally found her footing. ***空中飞人*** is the sound of a musician accepting her own parameters, and the effect is far better than the work that preceded it. The flute in '可憐的東西' and the vocal metronome that emerges in its final minute are inventive touches; 'Little Love Song' carries a gentle, hummed intimacy that suits her voice better than anything on the earlier records; '雲朵' delivers a rap passage that is, if not revelatory, at least a pleasant surprise.

    <u>Dou Jingtong seems to have realised that experimental music is not her calling, and this self-knowledge is liberating rather than diminishing.</u> Not everyone has the talent for boundary-pushing work, and there is a quiet dignity in a musician who confronts and accepts her own ordinariness. this yields an album that does not overreach, does not pretend, and is stronger for it.

- title: "Tom Penaguin"
  type: "music"
  creator: "Tom Penaguin"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "Canterbury scene"
  image: "/assets/images/music/tom_penaguin.jpg"
  posted: "2025-02-18"
  text: |
    I understand the objection: that ***Tom Penaguin*** is too beholden to the last century's Canterbury Scene, too transparently in thrall to Egg, National Health, and the rest of that gloriously knotty lineage. But the Canterbury revival has been unfolding for decades now, and it has produced bands that push outward: Zopp, Amoeba Split, acts that metabolise the tradition into something wider. What was missing was a devoted congregation, a project willing to inhabit the original sound with the precision and fervour of a liturgist rather than an innovator. Tom Penaguin fills that gap.

    The compositions here lack nothing of the complexity and elegance one associates with the early Canterbury masters. 'The Stove Packed Up and Left' unfolds like a gift wrapped in successive layers: each stratum reveals new harmonic detail, new timbral interplay, yet never at the expense of warmth. The organ tones recall Egg's *The Civil Surface* at its most intricate, but the playing carries a devotional heat that keeps the music from sliding into mere pastiche. <u>In a century that has largely moved on from Canterbury's particular brand of chamber-prog eccentricity, Tom Penaguin arrives as a rare and welcome anachronism: a faithful inheritor whose faithfulness is itself the art.</u>

- title: "Remembrance"
  type: "music"
  creator: "Béla Fleck & Chick Corea"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "jazz"
  image: "/assets/images/music/remembrance.jpg"
  posted: "2025-02-18"
  text: |
    I still remember exactly where I was, what I was doing, what song was playing when I heard Chick Corea had died. The thought that there would never be new Corea felt, at the time, simply inadmissible. ***Remembrance*** exists because of Béla Fleck, and one owes him thanks for shepherding it into the world. Part of the album was recorded during their pre-COVID touring; the rest was laid down remotely during lockdown isolation. Yet even across that fractured production context, Corea's playing retains its full luminosity: every phrase darting, every voicing fastidiously precise, the touch of a pianist who treated improvisation as a species of composition in real time.

    'The Otter Creek Incident' deserves particular attention. Corea's piano opens the piece like a stage being set, wide and expectant, and then Fleck's banjo enters with the quiet authority of a bard stepping into a clearing, beginning to sing some half-forgotten epic. <u>The two timbres intertwine with a naturalness that belies how unlikely the pairing should be: steel strings and hammered felt, bluegrass and post-bop, each pulling the other into unfamiliar registers.</u> The midsection drifts into territory that one cannot hear without thinking of *Return to Forever*, a brief surge of fusional energy that reminds one just how vast Corea's range always was.

    Fleck said in an interview, 'We pushed this duo to a new place before we ran out of time.' <u>The sentence is almost unbearable in hindsight.</u> What remains is a record of two musicians at the peak of mutual understanding, reaching for something neither could have made alone, and running out of time before the reaching was done.

- title: "Parasomnia"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/parasomnia.jpg"
  posted: "2025-02-13"
  text: |
    I went in hoping for a full return to the Mike Portnoy era, and ***Parasomnia*** does not quite deliver that. Even after the initial delight of hearing Portnoy behind the kit again, tracks like 'Midnight Messiah' and 'Night Terror' carry a distinctly Mangini-era flavour: the predictable verse-chorus architecture, the basslines that feel more functional than inspired. Dream Theater has not fully shed the compositional habits of its last decade, and those habits show. But what Portnoy has managed to do is build a new paradigm on top of those inherited structures, infusing them with a rhythmic intelligence and a sense of narrative momentum that had gone missing.

    'Bend the Clock' and 'A Broken Man' are the clearest examples: half *The Astonishing*, half *Black Clouds & Silver Linings*, they occupy a strange and productive middle ground between the band's theatrical excess and its earlier, more muscular prog-metal. Petrucci's solos remain as devastating as ever, each one a masterclass in phrasing and dynamic control; Rudess's keyboard work is characteristically exquisite, layering synth textures with an almost painterly attention to colour. <u>And in the closing epic, when the tribute to Mangini surfaces, one hears something unexpectedly moving: not a farewell, but a passing of the torch.</u> A new era is arriving, and it carries the best of both worlds.

- title: "Against the fall of the night"
  type: "music"
  creator: "Sungazer"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "jazz fusion"
  image: "/assets/images/music/against_the_fall_of_the_night.jpg"
  posted: "2025-01-21"
  text: |
    ***Against the Fall of the Night*** shows a slightly more dexterous Sungazer than the debut, with certain bridge passages carrying faint echoes of Aberdeen's melodic sensibility: a gentler undertow beneath the rhythmic complexity. The description that has stuck with me is one I encountered in a short review: 'taking some of the most technically ridiculous ideas and make them sound musical and from the heart.' That is precisely the challenge, and it is one thing to meet it; it is another to make the meeting look effortless.

    <u>Sungazer makes it look effortless.</u> The technical ambition never overwhelms the emotional core; the odd metres and intricate arrangements serve the songs rather than demanding applause for their own sake. Doing this is not hard to conceive. Doing it well is extraordinarily hard to execute. Sungazer has done it well.

- title: "Life in the Wires"
  type: "music"
  creator: "Frost*"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/life_in_the_wires.jpg"
  posted: "2024-11-21"
  text: |
    The ***Life in the Wires*** suite is perhaps the finest long-form prog composition Frost* have produced, and it is pt. 2 that makes the case unanswerable. Around the 11'10" mark, a bridge opens into a keyboard solo framed by a wash of static, and for a few bars the piece seems to hover outside of time, summoning ghosts of a dozen classic prog epics without imitating any of them. What a solo. The bass drum beneath it drives forward with a patient, relentless pulse, alternating between 10/4 and 11/4 with the composure of a metronome that has decided to make the asymmetry beautiful. <u>And then the shift into a steady 4/4, and every thread of accumulated tension releases in a single, cathartic instant.</u>

    The arrangement across the album is breathtaking in its control: textures layered with the precision of a mix engineer who also happens to be a composer, every reverb tail and stereo placement serving the arc of the song. Jem Godfrey's production instincts have always been sharp, but here they operate at a level that makes his earlier work sound like sketches. <u>This is the best Frost* album so far and it is not even close.</u>

- title: "Songs For Beating Hearts"
  type: "music"
  creator: "Beardfish"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "progressive rock"
  image: "/assets/images/music/songs_for_beating_hearts.jpg"
  posted: "2024-11-16"
  text: |
    A deeply disappointing prog rock album. ***Songs For Beating Hearts*** is tasteless in the most literal sense: one chews and chews and nothing comes. Discarding it brings no pang of loss.

    Nearly twenty years after Beardfish wrote 'Sleeping in Traffic', a song that earned its place among the finest prog compositions of its era, the band has produced lyrics like 'I hurt someone important--I think I hurt my inner child.' One has to ask whether the creative environment has simply infantilised. The answer, listening to this album, appears to be yes.

- title: "Reason In Motion"
  type: "music"
  creator: "Utopianisti"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/reason_in_motion.jpg"
  posted: "2024-11-05"
  text: |
    ***Reason In Motion*** is a funk record to love properly, and it earns that love track by track. The jazzier end of the spectrum is represented by 'Yegaa Nu Betaa', where the arrangement's complexity and the guitar solo's quality both sit comfortably in the upper tier of contemporary jazz-funk; the harmonic language is rich without being showy, the phrasing precise without being clinical. On the bossa nova side, 'Cleptocrats' is a showcase for the horn section, whose voicings and blend are frankly gorgeous. 'No Culture, No Soul' takes the tempo down into slow-jazz territory and lets the groove breathe, while 'Kakistocrats' is pure, undiluted Utopianisti funk: dense, rhythmically relentless, and unmistakably theirs.

    <u>Utopianisti belongs alongside Funky Knuckles in any serious top-five funk ranking.</u> What makes them exceptional is the same thing that makes the best funk exceptional: every player serves the pocket, yet every player has space to burn. The compositions never sacrifice groove for virtuosity or virtuosity for groove. They simply refuse the trade-off.

- title: "Aerial Ballet"
  type: "music"
  creator: "Nilsson"
  creator_role: "by"
  year: 1968
  eval: "loved"
  genre: "pop"
  image: "/assets/images/music/aerial_ballet.jpg"
  posted: "2024-10-31"
  text: |
    Three Dog Night's 1969 cover of 'One' may be the more famous version, but Harry Nilsson's original on ***Aerial Ballet*** possesses something the cover never captured: a clean, spectral mellotron that conjures a stillness bordering on desolation. When the flute enters in the second verse, carrying a faintly Jethro Tull-ish inflection, the effect is quietly devastating, as though a solitary figure has wandered into an empty room and begun to play.

    The album is by no means a one-track affair. 'Don't Leave Me' and 'Everybody's Talkin'' are pop songwriting of the highest order, melodically immediate and emotionally unguarded; 'Together' is a compact prog miniature, over almost before one has registered its intricacy. The abundance of strong material is almost dizzying. <u>But it is 'One' that stays: its texture is so singular, so apart from everything around it, that hearing it once is enough to ensure one never forgets it.</u>

- title: "Melodies of Atonement"
  type: "music"
  creator: "Leprous"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/melodies_of_atonement.jpg"
  posted: "2024-10-04"
  text: |
    Outside of 'Faceless' and 'Like a Sunken Ship', ***Melodies of Atonement*** has remarkably little to offer. Einar Solberg's vocal performance remains as striking as ever; that instrument has lost none of its capacity to arrest and astonish. But vocal brilliance cannot redeem arrangements this threadbare.

    The compositions are too simple, too repetitive, the sonic palette too narrow. <u>Laziness has calcified into habit, and habit has crowded out the capacity to write anything that surprises.</u> When a band with this much talent produces work this perfunctory, the disappointment carries a particular sting: not anger, just the quiet recognition that the bar has been lowered and no one in the room seems to have noticed.

- title: "Twenty Pills Without Water"
  type: "music"
  creator: "Bent Knee"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "art rock"
  image: "/assets/images/music/twenty_pills_without_water.jpg"
  posted: "2024-09-04"
  text: |
    I wanted to say that Bent Knee is declining. I went in half-expecting to confirm the suspicion. But ***Twenty Pills Without Water*** contains every element I have loved across their previous records: the uncanny splice of pop and prog, where sweetness curdles into dissonance and back again before one can locate the seam; choruses whose trajectories remain unpredictable on first listen, swerving where one expects resolution; moments of sudden, unannounced tenderness that hit harder for arriving without warning; and Courtney Swain's voice, which can shift from a whisper to a full-throated howl with a conviction that makes the transition feel inevitable rather than theatrical.

    <u>I still love this band.</u> That is the honest verdict, and all the critical machinery in the world cannot improve on it. Bent Knee refuses to decline in the ways one expects, and the refusal itself is part of the art.

- title: "Wheels Within Wheels"
  type: "music"
  creator: "MEER"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/wheels_within_wheels.jpg"
  posted: "2024-08-30"
  text: |
    ***Wheels Within Wheels*** takes the excellent pop-prog fusion of its predecessor and threads in subtle djent inflections, but the centre of gravity remains the vocal work: every melodic line carries a tension that is rare and immediate, a tautness that makes the listener lean forward. 'To What End' is the clearest example, its melody strung between vulnerability and aggression with a precision that recalls the best moments of art-pop at its most structurally ambitious.

    <u>The arrangements oscillate between tenderness and ferocity with a fluency that marks the album as something special.</u> One moment the textures are soft, almost hymnal; the next, the guitars and drums surge with an intensity that feels earned rather than imposed. This is the terrain that prog-pop was always meant to inhabit, and it has rarely been inhabited with this much conviction.

- title: "nothing"
  type: "music"
  creator: "Louis Cole & Metropole Orkest"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "jazz pop"
  image: "/assets/images/music/nothing.jpg"
  posted: "2024-08-16"
  text: |
    Stepping out of the frenetic, maximalist worlds of KNOWER, CLOWN CORE, and the Genevieve collaborations, Louis Cole has moved toward something more expansive: a sound that leans into strings and classical orchestration while retaining the unmistakable fingerprint of his earlier work. ***nothing*** is, in a real sense, Louis Cole's magnum opus. 'These Dreams Are Killing Me' and 'Things Will Fall Apart' are emotionally-charged in a way that the more antic material never attempted: raw, exposed, the production stripped back just enough to let the vulnerability breathe.

    On the other end, the title track and the 'Who Cares' suite represent a classical endeavour of startling ambition, orchestral writing that is meticulous without being sterile, complex without being inaccessible. <u>The album flows as a single unbroken statement, each track feeding into the next with an inevitability that makes the whole feel far greater than its parts.</u> Cole himself has called it 'my favourite thing i've ever created.' Having listened to it front to back without stopping, one understands why. Everything he has done before was preparation for this.

- title: "Binary Dream"
  type: "music"
  creator: "Turbulence"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/binary_dream.jpg"
  posted: "2024-06-25"
  text: |
    The last few years have produced a wave of new prog-metal bands bearing the unmistakable imprint of Haken and Dream Theater: Nospun among them, and Turbulence certainly among them. But where many inheritors of that lineage remain content to echo, ***Binary Dream*** represents a marked leap forward from *Frontal*. The grooves are smoother, more organic, easier on the ear without sacrificing rhythmic complexity; the solos are, frankly, astonishing, each one sculpted with a sense of dramatic arc that suggests players who understand that technique serves narrative, not the other way around.

    <u>Turbulence has crossed the threshold from promising to essential, and the distance covered in a single record is remarkable.</u>

- title: "Stay for the Ending"
  type: "music"
  creator: "District 97"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/stay_for_the_ending.jpg"
  posted: "2023-12-14"
  text: |
    ***Stay for the Ending*** is the record that proves District 97's upward trajectory was no fluke. 'Crossover' and 'Mirror' are among the strongest singles the band has produced: the former is a study in controlled intensity, the latter a slow-building meditation that earns its climax through patience rather than volume.

    What surprises most is the margin of improvement over the band's previous work. Every solo feels newly minted, every drum pattern carries an alertness and inventiveness that keeps the listener engaged bar by bar. <u>The beauty here is not incidental; it is structural, built into the bones of every arrangement.</u> I did not expect District 97 to improve by this much. They did.

- title: "Dead Club City"
  type: "music"
  creator: "Nothing But Thieves"
  creator_role: "by"
  year: 2023
  eval: "hated"
  genre: "alternative rock"
  image: "/assets/images/music/dead_club_city.jpg"
  posted: "2023-07-02"
  text: |
    This is a profoundly disappointing album. The warning signs were there from the singles off the previous record: something was wrong with Conor Mason's voice. Whether surgery or strain or something else entirely, the effortless, feather-light high register that defined 'Amsterdam' and 'If I Get High', that voice that could float and remain rock-steady at the same time, has vanished. Gone too are the inventive drum patterns and basslines that once gave the band's arrangements their distinctive architecture. What remains is a capitulation to mainstream pop: safe, smooth, and spiritually empty.

    Five years ago, Nothing But Thieves was an exciting band. ***Dead Club City*** is the document of that excitement's extinction. <u>Every trace of the old spark has been extinguished, and nothing has been offered in its place.</u>

- title: "春游"
  type: "music"
  creator: "窦靖童"
  creator_role: "by"
  year: 2023
  eval: "disliked"
  genre: "C-indie"
  image: "/assets/images/music/chun_you.jpg"
  posted: "2023-06-29"
  text: |
    This is Dou Jingtong's fourth album. Unlike three years ago, one can no longer invoke 'potential' as a euphemism for insufficient craft. The production on ***春游*** is polished, competently engineered, occasionally even handsome. But production polish cannot rescue compositions that offer almost no diversity whatsoever.

    The melodies are predictable to the point of inertia; the lyrics read as juvenile, recalling the worst tendencies of certain Taiwanese indie acts that mistake simplicity for sincerity. <u>At some point, an artist must stop being promising and start being good. That point has passed.</u>

- title: "Hall of the Mountain Grill"
  type: "music"
  creator: "Hawkwind"
  creator_role: "by"
  year: 1974
  eval: "meh..."
  genre: "space rock"
  image: "/assets/images/music/hall_of_the_mountain_grill.jpg"
  posted: "2023-06-29"
  text: |
    A contrarian note: any half-competent prog rock band of the 1970s could have made ***Hall of the Mountain Grill***. Grand it certainly is, but grandeur was the minimum viable product of that era; everyone was grand. The question is what one does with the scale, and Hawkwind's answer, here at least, is to pile on bizarre timbres and psychedelic textures until subtlety has been completely evacuated from the mix.

    <u>Spectacle without nuance is just noise with better staging.</u> The album has its partisans, and the space-rock ambition is real enough. But ambition is not execution, and this is not the masterpiece its reputation suggests.

- title: "The Future Bites"
  type: "music"
  creator: "Steven Wilson"
  creator_role: "by"
  year: 2021
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/future_bites.jpg"
  posted: "2023-06-10"
  text: |
    An amended verdict, arrived at after two years of distance. On reflection, much of ***The Future Bites*** has aged better than expected: several of its tracks now sound like they were quietly setting the direction for where the broader prog scene would move. 'PERSONAL SHOPPER' may be one of the strongest individual compositions of Wilson's solo career, its layered production and rhythmic insistence revealing new facets with each listen. 'SELF', too, rewards patience.

    And yet the disappointment persists. What I wanted was something in the lineage of *The Raven That Refused to Sing*, Wilson at his most compositionally dense and emotionally exposed. What I got was a pivot toward mainstream pop and tech-adjacent production that, however prescient it turned out to be, still feels like a narrowing of scope. <u>Wilson began his solo career to widen the boundaries of progressive music, and one hopes he has not forgotten why.</u>

- title: "瓦合"
  type: "music"
  creator: "草東沒有派對"
  creator_role: "by"
  year: 2023
  eval: "liked"
  genre: "C-indie"
  image: "/assets/images/music/wa_he.jpg"
  posted: "2023-05-22"
  text: |
    There is a moment in '人洞山' where the riff curls inward with an unmistakable Karnivool weight, all angular tension and tightly compressed mid-range, and it clicks: this is the best thing 草東沒有派對 have ever written. ***瓦合*** opens at a level the band had not previously reached. The first half is remarkably assured, deploying what appears to be their first foray into a 4/3/4/4 time signature grouping, and the tonal palette is appealing throughout, thick without being muddy, bright without the brittleness that plagued their earlier mixes. <u>For a band whose reputation was built on a kind of anxious post-punk minimalism, the rhythmic sophistication here signals a real compositional leap.</u>

    The second half, however, is a different album. The quality drops precipitously, track by track, bottoming out on the closer, which may be the weakest thing in the band's catalogue. It is a familiar problem in C-rock: frontloading the best material, then padding to fill a runtime nobody asked for. Had the band cut a third of the tracklist, this would easily have been one of the band's finest records. As it stands, one is left with half a masterpiece and half an argument for the EP format. <u>one leaves the record wishing they had trusted the strong material enough to let the weak material go.</u>

- title: "The Static and the Noise"
  type: "music"
  creator: "Iris Divine"
  creator_role: "by"
  year: 2017
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/static_and_the_noise.jpg"
  posted: "2023-05-20"
  text: |
    ***The Static and the Noise*** sits at a peculiar equilibrium. The vocal melodies and choruses are, to put it plainly, unappealing, occasionally tipping into a kind of generic rock bombast that undercuts the sophistication happening beneath them. Yet the instrumental work is another matter entirely. The Dream Theater-ish solos scattered throughout 'Like Glass' alone are evidence of a band whose technical facility far outpaces their pop instincts. <u>It is the kind of record where the singer is the weakest link in a chain forged by exceptional players.</u>

    One keeps wishing for a pure instrumental version, stripped of the vocal compromises. Iris Divine clearly have the chops to sustain extended passages of progressive metal at a high level; the riffing is inventive, the harmonic language is rich, the arrangements breathe. But every time one settles into a passage of real instrumental daring, the vocals return to pull everything back toward the middle of the road. The talent is undeniable. The songwriting, in the fullest sense, is not quite there yet.

- title: "MTV Unplugged (Live)"
  type: "music"
  creator: "Twenty One Pilots"
  creator_role: "by"
  year: 2023
  eval: "hated"
  genre: "alternative rock"
  image: "/assets/images/music/mtv_unplugged_live.jpg"
  posted: "2023-05-12"
  text: |
    I cannot fathom how anyone who followed this project from *Vessel* onward could listen to ***MTV Unplugged (Live)*** and conclude that serious musical thought went into it. The whole premise of an unplugged session is recontextualisation: stripping a song to its skeleton to reveal what the writing can sustain without studio armour. Here, the recontextualisation reveals nothing except carelessness. One wants to ask Tyler whether, while singing 'Car Radio' over the drum pattern from 'Heavydirtysoul', he paused to consider what the lyrics of 'Car Radio' were actually about, what that silence the song describes might demand from a performance.

    <u>This is embarrassingly bad.</u> The acoustic framing exposes every melodic shortcut the studio versions could hide, and the overall impression is of an act coasting on the goodwill of an audience that will clap for anything bearing the brand. Cynicism dressed as intimacy.

- title: "In Contact"
  type: "music"
  creator: "Caligula’s Horse"
  creator_role: "by"
  year: 2017
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/in_contact.jpg"
  posted: "2023-05-09"
  text: |
    I had been sitting on ***In Contact*** for a while, saving it the way one saves a bottle one expects to be good. The disappointment, then, is considerable. The vocal melodies are miles away from first-tier prog metal writing, lacking the intervallic surprise or the ear for contour that separates a great melodic prog vocalist from a competent one. <u>The gap between Caligula's Horse's reputation and their actual melodic output is baffling.</u>

    The hype around this record has always puzzled me. The instrumentation is polished enough, the production is clean, but cleanliness is not a substitute for ideas. Caligula's Horse fall into the same category as Voyager for me: bands one cannot listen through without the attention sliding off, because there is nothing in the melodic architecture to hold it. Prog metal that mistakes proficiency for personality.

- title: "Rise of Kassandra"
  type: "music"
  creator: "Tritop"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/rise_of_kassandra.jpg"
  posted: "2023-04-28"
  text: |
    The opening epic on ***Rise of Kassandra*** underwhelms slightly, a slow build that does not quite earn its length. But the three tracks that follow are five-star material without qualification. Tritop sit on the knife-edge between prog rock and prog metal, and this album inhabits that boundary with rare delicacy. The Hammond tones carry a distinctly Canterbury colour, warm and slightly overdriven in a way that recalls the golden era without pastiche, while the solo writing leans closer to the Scandinavian tradition, channelling something of Kaipa and The Flower Kings in its lyrical phrasing and major-key expansiveness.

    <u>The melodies are extraordinary.</u> There is a generosity to the writing here, a willingness to let a theme develop fully and then hand it to another instrument, that speaks to real compositional confidence. The closing epic, in particular, repays close attention; it is an extended piece where every section justifies its presence, where the architecture is felt as momentum rather than obligation.

    For a record that has received relatively little attention, this is a quietly remarkable achievement. One suspects it will age well, an album that surfaces in 'hidden gems' threads a decade from now. <u>It deserves better than that: it deserves to be heard now.</u>

- title: "The Revelations"
  type: "music"
  creator: "The Revelations"
  creator_role: "by"
  year: 2007
  eval: "loved"
  genre: "R&B"
  image: "/assets/images/music/revelations.jpg"
  posted: "2023-04-27"
  text: |
    I ended up chatting with the Ambrotype member behind ***The Revelations*** on Instagram. A solo composition, recorded with a full band. He mentioned he has been working on Volume II, though progress has slowed due to mental health difficulties. <u>The last time a record left me feeling this particular way was Keor.</u>

    There is something in this strain of prog that accumulates sadness the deeper one listens. Not sadness as content, not lyrics about loss or melancholy chord progressions deployed for effect, but a structural sadness, as though the complexity itself were a form of reaching for something that keeps receding. The compositions here have that quality: intricate, searching, never quite arriving, and all the more moving for it. I do not know how to describe it more precisely than that. Some prog, the longer one sits with it, just becomes heavier, not in the metal sense but in the gravitational sense. It pulls at something.

    <u>I hope Volume II comes, whenever the conditions allow.</u>

- title: "Meteora 20th Anniversary Edition"
  type: "music"
  creator: "Linkin Park"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/meteora_20th_anniversary_edition.jpg"
  posted: "2023-04-25"
  text: |
    ***Meteora 20th Anniversary Edition*** includes the Road to Revolution live set from Texas that I had on loop as a child, and hearing 'Somewhere I Belong' and 'From the Inside' performed in that context still hits with force. <u>There is something irreducible about the impact of these songs; they do not diminish with familiarity, they mineralise.</u>

    This remains one of the defining nu-metal records of its era. The production on *Meteora* was always tighter and more deliberate than *Hybrid Theory*, the electronic layering more integrated, the dynamic contrasts sharper. What the anniversary reissue makes clear, through the live material and the demos, is how little of the album's power depended on studio polish. The songs hold up stripped, loud, rearranged. That is the test, and they pass it. Chester's voice, as always, is the thing one cannot look away from: a delivery so committed to its own emotional stakes that it short-circuits irony entirely.

- title: "PoiL Ueda"
  type: "music"
  creator: "PoiL Ueda"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "avant-prog"
  image: "/assets/images/music/poil_ueda.jpg"
  posted: "2023-04-21"
  text: |
    PoiL had already reached a new apex of technical virtuosity and sheer strangeness on their previous record, and ***PoiL Ueda*** climbs higher still. The collaboration with Ueda layers her Satsuma biwa into the band's signature ornate arrangements, and the juxtaposition is inspired: the biwa's timbral rawness, all attack and metallic decay, set against PoiL's maximalist harmonic density. Two extended suites, neither short on ideas, pulse with the band's characteristic blend of exuberance and precision. <u>There is a playfulness here that never tips into self-indulgence, which is the rarest quality in avant-prog.</u>

    What makes this record exceptional is the integration. The biwa is not a guest instrument draped over existing compositions; it reshapes the harmonic and rhythmic fabric of the music. PoiL have always excelled at arrangements that feel simultaneously overstuffed and architecturally rigorous, where every ornamental detail turns out to be load-bearing. The addition of Ueda's instrument does not disrupt that balance; it deepens it, introducing microtonal inflections and timbral contrasts that push the band's palette into territory no Western avant-prog outfit has previously occupied.

    The enthusiasm is infectious. one comes away the album exhilarated, slightly dizzy, and immediately curious about what these musicians could possibly do next.

- title: "Et Liber Eris"
  type: "music"
  creator: "Adimiron"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/et_liber_eris.jpg"
  posted: "2023-04-19"
  text: |
    ***Et Liber Eris*** exceeded every expectation. Having encountered Serval, whose EP, despite its brevity, demonstrated melodic writing of the highest order in prog metal, I found this album to be what would happen if one stretched Serval's melodic sensibility across a full-length record. <u>The result is a sustained display of melodic invention that never flags across the album's runtime.</u>

    Apart from 'The ColdWalker' and 'As Long As It Takes', which dip slightly below the standard set by the rest, there is no filler here. The riff construction is tight, the harmonic language is rich without being overwrought, and the vocal lines are woven into the instrumental arrangements with a care that suggests real compositional thought rather than the usual verse-chorus-solo template. Adimiron are not a well-known name, and this album arrived without fanfare, but it belongs in the conversation about the best prog metal records of its year. Sometimes the most rewarding discoveries are the ones that arrive with no hype to metabolise.

- title: "The Bridge"
  type: "music"
  creator: "Sound Struggle"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "post-rock"
  image: "/assets/images/music/bridge.jpg"
  posted: "2023-04-07"
  text: |
    ***The Bridge*** delivers the same calibre of surprise as *Rise* before it. Every solo on this record rewards close listening, each one composed rather than improvised, each one serving the song's architecture rather than the guitarist's ego. The back half of 'Foresight' deserves particular mention: a passage of sustained melodic intensity that builds with the inevitability of a well-constructed argument.

    <u>The title track, the album's sole epic, surpasses what one would reasonably expect from a band at this stage.</u> It is an extended piece that earns its runtime through structural surprise rather than repetition, pivoting through sections that feel distinct yet connected by a harmonic thread. Sound Struggle operate in a space where ambition and execution are in rare alignment, and *The Bridge* is the proof.

- title: "Rise"
  type: "music"
  creator: "Animal Society"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/rise.jpg"
  posted: "2023-04-05"
  text: |
    Berklee's lineage runs deep in progressive music, but ***Rise*** announces a talent that stands apart even in that context. Coming after Dream Theater's Berklee pedigree, this is another case of that institution producing musicians whose understanding of both classical form and avant-garde impulse is astonishing, a compositional intelligence that moves fluently between idioms without the seams showing. <u>This is a record that makes one reconsider what is possible within the form.</u>

    'Close Your Eyes', 'Suspended', and '649' hover around four-star territory, which is to say they are merely very good rather than extraordinary. Everything else is five-star material. Every solo on the album is worth studying, not just for technical facility but for the choices made, the notes not played, the way each solo relates to the harmonic structure beneath it. One emerges from the record feeling that this is a musician who has metabolised the entire progressive tradition and is now beginning to speak in a voice that is wholly personal.

- title: "Timeweaver"
  type: "music"
  creator: "Sunless Dawn"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/timeweaver.jpg"
  posted: "2023-04-02"
  text: |
    ***Timeweaver*** is relentless in the best sense: a record that never lets the ear settle, that keeps offering new melodic and rhythmic information at a pace that borders on overwhelming. <u>'Biomorph III' and 'Grand Inquisitor' rank among the finest prog death metal tracks in the genre, full stop.</u>

    The melodies are exquisite. That is not a word one reaches for lightly in the context of death metal, but Sunless Dawn earn it. Beneath the aggression and the technical density, there is a melodic sensibility that recalls the best of late-period Death, where complexity and beauty are not opposing forces but the same force expressed at different frequencies. The album demands repeated listens, not because it is difficult, but because there is too much to absorb in a single pass.

- title: "希忘Hope"
  type: "music"
  creator: "Hua Chen Yu"
  creator_role: "by"
  year: 2022
  eval: "meh..."
  genre: "C-pop"
  image: "/assets/images/music/xi_wang_hope.jpg"
  posted: "2023-03-19"
  text: |
    Listening to ***希忘Hope*** is like looking at a collage. One hears Muse's 'Knights of Cydonia' surfacing in '虛幻與現實', catches echoes of Jay Chou and Wang Feng in '黑白藝術家'. It is the same pattern as the previous album, which paid transparent homage to Twenty One Pilots and RADWIMPS without quite metabolising their influence into something personal.

    Hua Chen Yu is not without talent. Each album contains at least one track that feels authentically his, a melody or an arrangement choice that could not have come from anyone else. <u>The problem is frequency: these moments of original voice appear too rarely to anchor the records around them.</u> The rest is pastiche, competent pastiche, but pastiche nonetheless. One keeps waiting for the album where the borrowings recede and the genuine impulse takes over. It has not arrived yet.

- title: "Fauna"
  type: "music"
  creator: "Haken"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/fauna.jpg"
  posted: "2023-03-11"
  text: |
    The inexplicably low ratings ***Fauna*** has received in certain corners of the Chinese music internet are baffling, a stark mismatch with the reception on Reddit and ProgArchives, where the album is rightly recognised as a major entry in Haken's catalogue. Even 'Lovebite', perhaps the most straightforward track here, features lyrics that sit comfortably in the upper tier of Haken's output. <u>'Elephant Never Forgets' and 'Eyes of Ebony' are the most eclectic, most diverse compositions the band have produced to date, and the lyrical work on 'Eyes of Ebony' in particular is remarkable.</u>

    As for the claim that ProgArchives 'downgraded' Haken from prog metal to heavy metal: genre tags on PA are set by whoever creates the entry, not by some editorial board issuing taxonomic decrees. If this album does not qualify as prog metal, then Dream Theater have no claim to the label either, and the entire category dissolves. The point is moot. What matters is the music, and the music here is on the same level as *The Mountain*. That is not a comparison one makes lightly.

    One suspects the consensus will correct itself in time. Albums this rich tend to outlast their initial reception.

- title: "ID.Entity"
  type: "music"
  creator: "Riverside"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/identity.jpg"
  posted: "2023-02-06"
  text: |
    The lead single 'Friend or Foe?' had me bracing for the worst: another album in the vein of Riverside's most recent work, where the songwriting felt adrift, unmoored from the mid-period intensity that made the band essential listening. But ***ID.Entity*** turns a corner. The six tracks that follow, plus two B-sides, recover something of that middle-era Riverside feel, groovier and more muscular than anything they have done in years.

    <u>The relief is palpable: this is a band remembering what made them compelling in the first place.</u> The production leans into the low end, the riffs have a physical weight that the more atmospheric recent records lacked, and the arrangements trust the groove to carry the listener rather than layering on post-rock textures as a substitute for momentum. *ID.Entity* is not a reinvention; it is a recalibration, and it is exactly what was needed.

- title: "As Tall As Lions"
  type: "music"
  creator: "As Tall as Lions"
  creator_role: "by"
  year: 2006
  eval: "liked"
  genre: "indie rock"
  image: "/assets/images/music/as_tall_as_lions.jpg"
  posted: "2023-01-21"
  text: |
    ***As Tall As Lions*** is a beautiful record, the kind where the integration of lyrics and music is so precise that the two feel inseparable, each informing the other's emotional register. 'Milk and Honey' and 'Be Here Now' are standout tracks, but 'Maybe I'm Just Tired' is the one I keep returning to, a song whose melodic architecture rewards repetition rather than diminishing under it. <u>It is the sort of track one puts on at the end of a long day and lets loop without resistance.</u>

    What distinguishes this album is restraint. The prog elements are present but never foregrounded at the expense of the songwriting. The arrangements serve the mood, the dynamics are carefully managed, and the production has a warmth that lets the vocal performances breathe. It is the kind of record one puts on late at night and lets play through without reaching for the skip button, each track earning its place in the sequence. There is a quietness to its ambition that makes it more lasting than louder, showier records.

- title: "Labyrinth"
  type: "music"
  creator: "Special Providence"
  creator_role: "by"
  year: 2008
  eval: "liked"
  genre: "jazz fusion"
  image: "/assets/images/music/labyrinth.jpg"
  posted: "2023-01-09"
  text: |
    John Petrucci flagged this band on Prog Report, and the pedigree is audible: ***Labyrinth*** is the work of a young group with serious technical chops and an ear for both jazz and progressive rock. The difficulty, particularly in the early material, is integration. The jazz passages and the prog passages too often feel like separate compositions bolted together rather than facets of a unified language, lending each track a slightly diffuse, structurally loose quality.

    The strongest moments are the ones that commit. 'Labyrinth' and 'Free Entry into Your Heart' succeed precisely because they pick a lane, allowing one idiom to dominate rather than constantly shuttling between two. <u>The fusion will presumably tighten with time; the raw talent is already beyond question.</u>

- title: "Will Of The People"
  type: "music"
  creator: "Muse"
  creator_role: "by"
  year: 2022
  eval: "disliked"
  genre: "alternative rock"
  image: "/assets/images/music/will_of_the_people.jpg"
  posted: "2022-08-26"
  text: |
    There was a time when Muse's lyrics amounted to more than 'We are getting fucked', when the chord progressions were not a I-IV-V-III loop on permanent repeat, when the synth patches were not off-the-shelf preset electronica. There was a time when Muse could venture into electronic territory and produce something as sophisticated as 'Madness', when even their most anthemic, fist-pumping material carried the density and paranoia of *Drones*. ***Will Of The People*** is not that Muse. It is not close.

    <u>The most damning indictment is comparative: of all the ageing-rock-star albums released in the same era, Wang Feng's is the best.</u> That this sentence can be written sincerely is the measure of how far Muse have fallen. Bewildering.

- title: "也许我可以无视死亡"
  type: "music"
  creator: "汪峰"
  creator_role: "by"
  year: 2022
  eval: "meh..."
  genre: "C-rock"
  image: "/assets/images/music/ye_xu_wu_shi_si_wang.jpg"
  posted: "2022-08-25"
  text: |
    It is difficult to understand how Wang Feng can place something as uninspired as '西班牙箱琴' on the same album as the lovely melody of '飛鳥', even if the latter is still trading on the capital of earlier work. It is equally unclear why, more than a decade on, '逃跑' is still cannibalising the melodic ideas of '眩暈'. The quality differential across ***也许我可以无视死亡*** is extraordinary: '我不相信' is as good as anything in his catalogue, and '如果你還相信' is as cringy as the worst. The breakdown in '如刀' djents hard enough to induce a brief out-of-body experience.

    The honest listening guide is this: '飛鳥', '我不相信', and '逃跑' are essential; '如刀' occupies a second tier; everything else is filler. <u>Even so, this is several tiers above what Jay Chou has been producing, because at least Wang Feng is still trying.</u> Respect for that, if nothing else.

- title: "The First Day"
  type: "music"
  creator: "David Sylvian & Robert Fripp"
  creator_role: "by"
  year: 1993
  eval: "liked"
  genre: "art rock"
  image: "/assets/images/music/first_day.jpg"
  posted: "2022-07-28"
  text: |
    A marked improvement over the two preceding Sylvian–Fripp collaborations, ***The First Day*** benefits enormously from Sylvian's vocal performance, which here finds a warmth and textural specificity that the earlier records only gestured at. 'First Day' and 'Hypnotic' are the real centrepieces: both tracks carve out melodic and rhythmic identities that feel entirely their own, the former riding a hypnotic (aptly) groove that lets Fripp's guitar work breathe rather than dominate, the latter building tension through repetition until the structure itself becomes the hook. <u>There is a quality to these two tracks that suggests what the collaboration was always reaching for: Sylvian's crooning interiority meeting Fripp's controlled chaos on equal terms.</u>

    The rest of the album, unfortunately, coasts on technical proficiency alone. The musicianship never falters, Fripp's fretwork remains immaculate, Sylvian's phrasing still elegant, but the compositions themselves flatten into a kind of ambient prog wallpaper: pleasant, competent, forgettable. It is the perennial frustration of records made by players of this calibre: the craft is never in question, only the songwriting. When the songs arrive, as on those two standout tracks, the effect is something close to revelatory. When they do not, one is left admiring the brushwork on an empty canvas.

- title: "A Blueprint of the World"
  type: "music"
  creator: "Enchant"
  creator_role: "by"
  year: 1997
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/blueprint_of_the_world.jpg"
  posted: "2022-07-09"
  text: |
    ***A Blueprint of the World*** is a record at war with itself. Measured against the prog metal landscape of 1997, the inconsistency is striking: on one hand, tracks like 'Oasis' and 'Nighttime Sky' operate at a genuine five-star level, melodically rich and structurally assured, a songs that justify an entire album's existence. On the other, 'Mae Dae' and 'Enchanted' leave one questioning whether the band can write a melody at all, as though some entirely different, less inspired group wandered into the studio for those sessions.

    <u>As an early effort, it succeeds more than it fails, which is a kinder verdict than hindsight might suggest.</u> Knowing what comes after, knowing the trajectory bends downward from here, the peaks on this debut carry a bittersweet charge. The promise is audible. The follow-through, across the catalogue, never quite materialises. One listens to 'Oasis' and hears a band that could have been essential; one listens to 'Mae Dae' and understands why they were not.

- title: "CLOSURE/CONTINUATION"
  type: "music"
  creator: "Porcupine Tree"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/closurecontinuation.jpg"
  posted: "2022-06-28"
  text: |
    Thirteen years is a long time to wait for a band whose absence left a vacuum no side project could fill. ***CLOSURE/CONTINUATION*** is, by any reasonable measure, the best version of a reunion album Porcupine Tree could have delivered: everything that I was hoping for. The first half is where the real weight sits. The bassline on 'Rats Return' carries an unmistakable déjà vu, thick with an Opeth-adjacent tonality that signals this is not the airbrushed art-pop Wilson drifted toward in his solo years; this is the band remembering what made them visceral. 'Herd Culling' pushes further, Wilson's vocal phrasing recalling a touch of Bowie's 'Lazarus', that same quality of singing from inside a collapsing structure.

    <u>Only Steven Wilson's Porcupine Tree could have made this record, and that is both its greatest strength and its limitation.</u> The second half's arrangements feel somewhat hastier, as though the creative energy that saturated the opening tracks had begun to thin. One senses the difference between songs that were lived with and songs that were assembled. But this is a minor reservation against what the album achieves overall: a return that honours the legacy without merely replaying it. The production is meticulous, the performances locked in, and the songwriting, at its best, recalls the band's capacity to make progressive rock feel like an emotional necessity rather than a technical exercise. After thirteen years of silence, Porcupine Tree came back and sounded like themselves. That alone is rarer than it should be.

- title: "Lost Not Forgotten Archives: Falling into Infinity Demos, 1996-1997"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/lost_not_forgotten_archives.jpg"
  posted: "2022-06-19"
  text: |
    After weeks of wading through mediocre metal, putting on a set of nineties Dream Theater demos felt like recovering a faculty one had forgotten one possessed: the memory that bands this good exist. ***Lost Not Forgotten Archives: Falling into Infinity Demos, 1996-1997*** is, improbably, a revelation. <u>The earliest known demo of 'Metropolis Pt 2' is here, and it is fascinating: the organ-driven keyboard intro lends the piece a freshness entirely absent from the polished final version, while Petrucci's guitar solo retains the quality of live improvisation, raw and slightly juvenile, with a tone reminiscent of the Iron Maiden bootlegs circulating in that same era.</u> There is something deeply instructive about hearing a composition this iconic in its larval state, before the arrangements calcified into the version everyone knows.

    But it is 'Anna Lee' and 'Take Away My Pain' that do the real damage. These are the songs that brought tears, again, as they always do. There is no rational accounting for why certain melodies bypass every critical filter and land directly in the body; these two simply do, every time, in every version. The demos strip away some of the studio polish and expose the emotional architecture underneath, which turns out to be structurally sound all the way down. For a band whose later output has often felt like virtuosity in search of a reason, these recordings are a reminder of the period when the technique served the feeling, not the other way around.

- title: "We Used to Cut the Grass #1"
  type: "music"
  creator: "We Used to Cut the Grass"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "indie rock"
  image: "/assets/images/music/we_used_to_cut_the_grass_1.jpg"
  posted: "2022-02-20"
  text: |
    An exceptional jazz fusion release, and it arrived with the quiet confidence of a side project that knows exactly what it is. ***We Used to Cut the Grass #1*** is effectively the Thank You Scientist diaspora album: every member bar the vocalist seems to have scattered into solo ventures, and this is where several of them reconvened. Cody's bass work is predictably excellent, fluid and authoritative in equal measure, a playing that makes the instrument feel like a lead voice rather than a rhythmic foundation. But the real surprise is Sam Greenfield's tenor saxophone, which here achieves a ferocity and dynamic range that his work on *Here's Some Stuff* only hinted at. That record was, to be fair, essentially a meme album; this is what happens when the same players commit to the material without irony.

    <u>The guitar work leaves a deep impression too, even if the player's name escapes me, which is perhaps the highest compliment one can pay an ensemble record: every instrument commands attention, but none at the expense of the whole.</u> The arrangements are tight without being sterile, virtuosic without being self-congratulatory. In a jazz fusion landscape cluttered with records that mistake complexity for substance, this one understands that the two are not synonymous. It swings, it burns, and it never once asks to be admired.

- title: "The Blue Dawn"
  type: "music"
  creator: "Blue Dawn"
  creator_role: "by"
  year: 2011
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/blue_dawn.jpg"
  posted: "2022-02-08"
  text: |
    The solo on 'The Invasion' is a moment that justifies an entire record: precise, emotionally charged, and far too short. <u>one emerges the track wishing the band had trusted that impulse further, had let the solo breathe and expand rather than cutting it off just as it began to soar.</u> It is a frustrating signature of ***The Blue Dawn*** as a whole: glimpses of brilliance hemmed in by an uneven surrounding architecture.

    The remaining tracks oscillate between competent and forgettable, the quality control that separates a good neo-prog metal record from an essential one never quite locking in. But the floor is high enough, and the peaks sharp enough, that the album earns its keep. In a subgenre where consistency is rare and ambition often outstrips execution, this is a record worth hearing, if only to catch those moments when Blue Dawn sound like the band they could become.

- title: "Paint the Sky"
  type: "music"
  creator: "Bentobox"
  creator_role: "by"
  year: 2007
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/paint_the_sky.jpg"
  posted: "2022-02-08"
  text: |
    Brilliant in a way that resists easy description. ***Paint the Sky*** delivers the neo-prog metal trifecta on every single track: strong solos, inventive rhythms, compelling melodies. That alone would be notable. What elevates the record is how decisively it distinguishes itself from its peers. <u>This is not Mad Fellaz's softness, nor Hemina's tendency toward repetition; it is something entirely its own, a voice within the subgenre that sounds like no one else.</u>

    That kind of individuality in neo-prog metal has become vanishingly rare. The genre's conventions are well-established enough that most bands navigate by the same landmarks, and competence becomes indistinguishable from anonymity. Bentobox sidestep this entirely. The solos are not just technically accomplished but melodically surprising; the rhythmic choices serve the songs rather than showcasing the players; the melodies lodge themselves in memory and stay there. Every track earns its place. No filler, no concessions, no moments where the energy dips or the writing coasts. One finishes the album wanting to start it again immediately, which is the simplest and most reliable measure of a record that works.

- title: "Welcome To The Planet"
  type: "music"
  creator: "Big Big Train"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/welcome_to_the_planet.jpg"
  posted: "2022-02-03"
  text: |
    Rest in peace, David. Big Big Train's influence on the prog landscape is difficult to overstate; one need only listen to the retro-prog output of recent years to hear their fingerprints everywhere. Even a band like Dweller, ostensibly rooted in the Nordic seventies sound, cannot fully escape the gravitational pull of BBT's early catalogue. ***Welcome to the Planet*** largely upholds that standard, delivering the layered, pastoral prog rock the band has refined into a signature. Most of the tracks operate at the expected level of craft: richly orchestrated, melodically warm, compositionally assured.

    The glaring exception is 'Capitoline Venus', a ballad so lacking in conviction that it undermines the goodwill the surrounding material generates. <u>The lyrics are cheesy in the specific way that betrays exactly who wrote them: a handful of older men reaching for romantic fantasy and landing somewhere between greeting card and Renaissance faire.</u> It is the one moment on the record where the band's usual sincerity curdles into something closer to self-parody. Everything else holds. But that one misfire lingers, a reminder that even the most reliable bands occasionally lose the thread.

- title: "Drift"
  type: "music"
  creator: "ERRA"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "progressive metalcore"
  image: "/assets/images/music/drift.jpg"
  posted: "2022-01-20"
  text: |
    A pleasant surprise. I had tried *Andromeda* once before and bounced off it, never making it through the full run. ***Drift*** represents a significant step forward from that earlier effort, particularly in the melodic department, where the improvements are most audible. The songwriting has sharpened; the hooks have become more defined without losing the atmospheric quality that gives the band its identity.

    <u>'Sleeper' stands out as a near-perfect example of how to marry metalcore aggression with prog sensibility: the transitions feel earned rather than imposed, the heaviness serving the composition rather than interrupting it.</u> It is a track that demonstrates what the fusion of these two modes can achieve when the writing is disciplined enough to let neither side overwhelm the other. The rest of the album does not quite reach this level, but the overall trajectory is clear and promising. One hears a band finding its voice.

- title: "Won't Stand Down"
  type: "music"
  creator: "Muse"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "alternative rock"
  image: "/assets/images/music/wont_stand_down.jpg"
  posted: "2022-01-18"
  text: |
    ***Won't Stand Down*** threads the needle between the electronic textures Muse have been pursuing since *Simulation Theory* and the heavier, more guitar-driven melodic language of the *Absolution* era. It is a track that could slot into *Absolution* without sounding out of place, which is both a compliment and a quiet indictment. The riffs have weight, the chorus lands, the production is characteristically enormous.

    But the signs of age are showing. <u>There is too much of previous albums folded into every bar, too many recycled gestures, and even Bellamy's vocal, once the most distinctive instrument in mainstream rock, has begun to feel like a known quantity rather than a surprise.</u> Competent, polished, professional: Muse's version of middle-of-the-road still clears a bar that most bands cannot reach, and four stars for a Muse single operating at this level is neither generous nor unfair. It is simply the reality of a band whose floor remains remarkably high, even as the ceiling has stopped rising.

- title: "Meridian"
  type: "music"
  creator: "The Dust of Basement"
  creator_role: "by"
  year: 2005
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/meridian.jpg"
  posted: "2022-01-17"
  text: |
    Out of Belgium, and a welcome discovery, ***Meridian*** announces itself with an identity that is immediately recognisable. The closest reference points are The Dillinger Escape Plan and The Ocean Collective, that same controlled violence, that same willingness to let chaos serve structure rather than destroy it. There is a thread of BTBAM's jazz-inflected metal woven through the arrangements too, moments where the harmonic language pivots unexpectedly and the rhythm section follows with the precision of players who have internalised complexity rather than performing it.

    <u>The mix is a revelation: far better than one has any right to expect from a band at this stage, with separation and depth that let every instrument occupy its own space without sacrificing the overall density.</u> The low end sits heavy without muddying the midrange; the guitars cut without shrieking; the drums punch through the wall of sound with startling clarity. In a genre where production is often an afterthought, or worse, a deliberate aesthetic of lo-fi grime, this level of sonic care signals a band that understands the mix is not separate from the music but part of it. The Dust of Basement arrived fully formed, which is the rarest and most encouraging thing a new band can do.

- title: "Tales from Topographic Oceans"
  type: "music"
  creator: "Yes"
  creator_role: "by"
  year: 1973
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/tales_from_topographic_oceans.jpg"
  posted: "2021-12-16"
  text: |
    In my mind, this is where Yes truly begins. ***Tales from Topographic Oceans*** stands alongside the following *Relayer* as the band's melodic apex, while inheriting the extraordinary musicianship of *Close to the Edge*. But the comparison only goes so far, because this album operates on a different scale entirely: four movements, each exceeding twenty minutes, each demanding a kind of sustained attention that the earlier records, for all their brilliance, never quite required.

    <u>The experience of listening to this record resembles the experience of listening to Opeth's <em>Blackwater Park</em>: it is an album one must return to years later before the full scope of its ambition and the depth of its craft become perceptible.</u> On first encounter, the sheer duration can feel suffocating, the structures opaque, the transitions between passages mysterious to the point of inscrutability. But the patience pays compound interest. The melodies and atmospheres on this album are decisively, unmistakably different from anything Yes had done before, as though the band had crossed a border and found themselves in territory where none of the old maps applied. One does not simply listen to *Tales from Topographic Oceans*; one acclimatises to it, slowly, over years. And then, quite suddenly, it becomes indispensable.

- title: "Close To The Edge"
  type: "music"
  creator: "Yes"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/close_to_the_edge.jpg"
  posted: "2021-12-14"
  text: |
    Not my personal favourite in the catalogue, but the performances on ***Close to the Edge*** are beyond reproach. Every member of Yes is operating at peak capacity here, the kind of collective excellence that makes the question of individual contribution almost irrelevant: the whole exceeds any accounting of its parts. On melody alone, the title track's central motif has endured from the seventies to the present day, one of those rare themes that enters the collective unconscious of a genre and never leaves.

    <u>Add Steve Howe's guitar work and Rick Wakeman's staggering keyboard solos, and this yields a record that simply does not get much better than this.</u> The interplay between the two is the album's secret engine: Howe's angularity against Wakeman's grandeur, each pushing the other into territory neither would reach alone. The production captures the band in a room, breathing together, reacting in real time, and that liveness gives the music an urgency that studio perfection often kills. One can admire this album without loving it most, can acknowledge its supremacy without needing it to be one's desert-island choice. That is its own kind of achievement: a record so self-evidently great that even personal preference cannot argue against it.

- title: "Plague Accommodations"
  type: "music"
  creator: "Thank You Scientist"
  creator_role: "by"
  year: 2021
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/plague_accommodations.jpg"
  posted: "2021-12-05"
  text: |
    A small surprise in 2021, ***Plague Accommodations*** sits comfortably in the sonic territory Thank You Scientist staked out on their previous record. The extended alto sax solo in the latter half of 'Soul Diver' could have been lifted directly from *Terraformer*, same phrasing, same tonal palette, same sense of a player who knows exactly how far to push before pulling back. It is good. It is also, unmistakably, more of the same.

    <u>The overall impression is of B-sides from the last album: material that did not quite make the cut, dusted off and sequenced into something presentable.</u> The performances remain sharp, the arrangements characteristically dense, the musicianship never in question. But the spark of discovery that animated *Terraformer* is largely absent here. Pleasant is the right word, and for a band this talented, pleasant is a mild disappointment. One enjoys the listen and moves on, which is not what Thank You Scientist, at their best, allow one to do.

- title: "坏螺丝"
  type: "music"
  creator: "collt"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "C-indie"
  image: "/assets/images/music/huai_luo_si.jpg"
  posted: "2021-11-15"
  text: |
    The first two tracks on ***坏螺丝*** are where the real interest lies. The piano on the opener, '太空牛仔', conjures immediate memories of the Indonesian band I Know You Well Miss Clara and their album *Chapter One* from roughly eight years prior; the comparison is not exact, as collt lack the same ethereal, almost spiritual quality, but the piano-vocal interplay carries a faint, unmistakable trace of that influence. The second track pushes the recognition further: the opening minutes are essentially the playbook of Moon Safari's 'Constant Bloom', and it works beautifully, a lush and stirring passage. The male-female vocal pairing is handled with real craft, each voice occupying its own register and emotional frequency without crowding the other.

    <u>The only deduction is the lyricism, which dips into a register one might charitably call juvenile.</u> In a record that demonstrates this level of musical sophistication, the lyrical simplicity seems less a stylistic choice and more like a gap in the writing. It is a familiar frustration in the Chinese indie scene: instrumentally inventive, vocally appealing, let down by words that do not rise to meet the music. Still, when the arrangements are this compelling, the lyrics become something one learns to hear through rather than listen to.

- title: "法利勝神經"
  type: "music"
  creator: "Jajatao"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "noise rock"
  image: "/assets/images/music/fa_li_sheng_shen_jing.jpg"
  posted: "2021-11-08"
  text: |
    Setting aside the Trump speech sample in the title track '法利勝神經', one is left wondering what state of mind produced the rest of the lyrics on ***法利勝神經***. They lean toward a kind of performative anguish, the particular strain of Chinese indie lyricism where the suffering feels declared rather than inhabited. The saving grace is the covers: the Cui Jian and Luo Dayou reinterpretations bring their own stylistic weight while managing to honour the originals' emotional register, a balance that is harder to strike than it looks.

    <u>The overall sensation is one I recognise from listening to 假假条 a few years back: prog-adjacent, heavy with sludge, a touch of stoner, all competently executed, none of it leaving a lasting impression.</u> The musicianship is solid. The tone is appropriately dense. The arrangements do their job. And yet something essential is missing, some quality of surprise or inevitability that separates a good heavy record from a memorable one. Very prog, very sludge, but ultimately a record one respects without needing to return to.

- title: "Salutogenesis"
  type: "music"
  creator: "Soulsplitter"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/salutogenesis.jpg"
  posted: "2021-10-29"
  text: |
    An unexpected and welcome prog metal discovery. ***Salutogenesis*** occupies a space that very few records manage to hold: simultaneously gentle and ferocious, the softness never compromising the heaviness, the heaviness never obliterating the tenderness. <u>The guitar and keyboard solos are the album's centrepiece, calibrated with remarkable instinct: surprising and inventive enough to command attention, restrained enough not to alienate.</u> That balance, enough to be surprising and interesting but not too much so that people are uncomfortable, is extraordinarily difficult to achieve, and Soulsplitter make it sound effortless.

    The production serves the music's duality perfectly: the clean passages breathe, the heavy sections crush, and the transitions between the two feel organic rather than engineered. There is a maturity to the dynamic range here that suggests a band with a clear internal compass, one that knows when to push and when to pull back. In a prog metal landscape crowded with bands that mistake volume for intensity and complexity for depth, *Salutogenesis* reminds one what the genre sounds like when every element is in service of something larger than itself. I loved this record.

- title: "Blue Mirror"
  type: "music"
  creator: "Nice Knees"
  creator_role: "by"
  year: 2018
  eval: "liked"
  genre: "indie rock"
  image: "/assets/images/music/blue_mirror.jpg"
  posted: "2021-10-24"
  text: |
    What makes ***Blue Mirror*** work is that every arrangement earns its existence. These are not lazy covers draped in a 'jazz' aesthetic (whether this even qualifies as jazz is its own question), but reimaginings with substance: each track is taken apart and rebuilt with enough structural change that the familiar becomes productively strange. 'Life on Mars?' is the highlight, a reading that finds new emotional pathways through a song one might have thought was fully explored. 'Welcome to the Black Parade' follows close behind, though it takes fewer liberties with the original; the arrangement stays closer to the source, which is both its charm and its limitation.

    <u>The only real misfire is 'Genie in a Bottle', where the disconnect between source material and treatment feels less like creative tension and more like miscalculation.</u> Even here, though, the solo is good enough to justify three stars on its own. That is the album's secret strength: even when the concept falters, the musicianship carries. Nice Knees understand that a covers record lives or dies not on the fame of the originals but on the quality of the conversation between old material and new hands. More often than not, the conversation here is worth having.

- title: "Squad Goals"
  type: "music"
  creator: "Hovey Benjamin"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  genre: "comedy rap"
  image: "/assets/images/music/squad_goals.jpg"
  posted: "2021-10-20"
  text: |
    ***Squad Goals*** confirms what *Swipe Right for Vintage* already suggested: the catastrophic 'My Heart Will Go On' on that earlier album was less a failure of arrangement than a failure of casting. Mykal Kilgore simply is not suited to the material. Here, Aubrey Logan takes over the vocal duties, and while the arrangement remains essentially the same, what emerges is at least listenable, enough to scrape two stars on its own merits.

    <u>The 'Stressed Out' rearrangement, however, is baffling: a cover that bears no discernible relationship to the lyrics it is ostensibly serving.</u> When the interpretation has nothing to say about the original, one is left wondering what the point was. The album as a whole occupies that uneasy middle ground between novelty and craft, never committing fully to either. It is the sound of a project that knows how to arrange but not always why.

- title: "The Burden of Restlessness"
  type: "music"
  creator: "King Buffalo"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "stoner rock"
  image: "/assets/images/music/burden_of_restlessness.jpg"
  posted: "2021-10-20"
  text: |
    Today's surprise. ***The Burden of Restlessness*** announces itself through the drums: ghost notes threaded so precisely into the grooves that they function less as ornamentation than as a second pulse beneath the main rhythm. <u>The bass tone carries a faint Toska-like grit, that low-mid saturation where distortion stops being effect and starts being texture, and it brought back the exact feeling of hearing a Mad Fellaz record for the first time.</u> King Buffalo have always understood that stoner-adjacent heaviness need not mean wall-of-sound density; here the space between instruments is as deliberate as the notes themselves, each part given room to breathe and decay naturally.

    The closer deserves special attention. At just over seven and a half minutes it barely qualifies as long-form by prog standards, yet it achieves a epic arc, a slow-building crescendo that bands twice as indulgent routinely fail to pull off in fifteen. <u>The restraint is the point: the song earns its climax precisely because it refuses to rush toward it.</u> There is a lesson in economy here that most post-metal acts could stand to learn. The whole record feels like a band that has finally calibrated the ratio of riff weight to dynamic range, and the result is one of the most satisfying listens of 2021.

- title: "Historical Misappropriation"
  type: "music"
  creator: "Postmodern Jukebox"
  creator_role: "by"
  year: 2014
  eval: "meh..."
  genre: "jazz pop"
  image: "/assets/images/music/historical_misappropriation.jpg"
  posted: "2021-10-17"
  text: |
    The 'Maps' rearrangement on ***Historical Misappropriation*** is the exception that proves the rule. Midway through, something in the chord progression briefly conjures Tokyo Jihen, that elegant trick of chromatic voice-leading dressed in retro arrangement, and for a moment the whole Postmodern Jukebox project clicks into focus as something more than novelty. But the moment passes, and what remains is an album's worth of jazz covers that feel reverse-engineered to fit the form rather than reimagined from within it. <u>The arrangements are not so much interpretations as costumes: the songs wear jazz without ever thinking in jazz.</u>

    I can see there's not much thought put into most of this. The harmonic substitutions are safe, the rhythmic reframing predictable, the horn charts decorative rather than structural. Three stars is generous, but the 'Maps' cover alone suggests that with more care, with arrangements that interrogated the original material instead of merely dressing it up, the project could have been something worth returning to. It is not.

- title: "V: The New Mythology Suite"
  type: "music"
  creator: "Symphony X"
  creator_role: "by"
  year: 2000
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/v.jpg"
  posted: "2021-10-11"
  text: |
    ***V: The New Mythology Suite*** is Symphony X's absolute pinnacle of creativity, the record where every thread of their ambition, neoclassical, progressive, proto-djent, converges into something that should not cohere but does. <u>The odd time signatures carry the grandeur of Gustav Holst's 'Mars' from <em>The Planets</em>, that sense of rhythmic mass bearing down on the listener, while simultaneously prefiguring the djent + polyrhythm + polymeter language that Periphery would codify a decade later.</u> To hear both impulses in the same composition, to feel Holst and Meshuggah inhabiting the same bar, is a feat of arrangement that the progressive metal canon has not sufficiently reckoned with.

    Every keyboard and guitar solo across the album operates at the same altitude as Dream Theater's peak work, and on several tracks, notably 'Rediscovery, Pt. II', it surpasses it. Michael Romeo and Michael Pinnella play off each other with the intuitive call-and-response of musicians who have fully internalised each other's phrasing, and the solos never feel like obligatory showcases bolted onto the composition. They grow from the harmonic material of the songs themselves. Russell Allen's vocal performance, too, reaches its zenith here: the operatic power is there, but tempered by a narrative sensitivity that makes the mythological concept feel inhabited rather than performed.

    <u>This is the rare concept album where the concept serves the music rather than constraining it, where the suite structure gives every idea room to develop without ever losing forward momentum.</u> Twenty-plus years on, it still sounds like the future that progressive metal chose not to pursue.

- title: "The Divine Wings of Tragedy"
  type: "music"
  creator: "Symphony X"
  creator_role: "by"
  year: 1996
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/divine_wings_of_tragedy.jpg"
  posted: "2021-10-11"
  text: |
    Michael Romeo's guitar work on ***The Divine Wings of Tragedy*** is the album's load-bearing element. <u>There is not a single superfluous note in any solo; every phrase earns its place, and the way each solo dovetails with the bridge sections creates a sense of structural inevitability, the classical principle of tension and resolution applied with a shredder's vocabulary.</u> The traditional arc of introduction, development, turn, and resolution is honoured with a precision that most neoclassical metal guitarists merely gesture toward. Romeo does not just play fast; he composes in real time, and the distinction matters.

    The title track itself is one of those rare pieces that altered the trajectory of a subgenre. Its influence on power metal is difficult to overstate: the integration of orchestral arrangement with progressive structures, the way the track sustains tension across its full runtime without resorting to the obvious dynamics of quiet-loud-quiet. <u>One can trace a direct line from this twenty-minute suite to half the ambitious epics that European power metal bands attempted in the decade that followed, most of them falling short.</u> The original remains untouched.

- title: "The Damnation Game"
  type: "music"
  creator: "Symphony X"
  creator_role: "by"
  year: 1995
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/damnation_game.jpg"
  posted: "2021-10-11"
  text: |
    The first half of ***The Damnation Game*** can nearly stand alongside the Dream Theater records of the same vintage, and the reason is largely vocal. Russell Allen replaced Rod Tyler, and the difference is not merely one of range but of sensibility: Allen does not try to be James LaBrie, and that act of refusal liberates the entire band. <u>Where Tyler's vocals on the debut competed with the instruments for attention, Allen's voice sits within the arrangement, which paradoxically makes the instrumental sections more prominent, not less.</u> The guitars and keyboards breathe differently when they are not shouldering the burden of compensating for a vocalist who cannot quite reach.

    The classical quotations run deeper here than on the self-titled debut. Somewhere in 'Dressed to Kill' or 'The Edge of Forever', there is an unmistakable adaptation of the third prelude from *The Well-Tempered Clavier*, woven so naturally into the composition that one might miss it on a casual listen. The integration is seamless; the borrowed material becomes part of Symphony X's own harmonic language rather than a showy reference. The only real disappointment is the closing *A Winter's Dream* suite, where the compositional quality dips below the standard set by the preceding tracks. Two weaker movements at the tail end do not undo what came before, but they leave the album feeling slightly unfinished, as though the ideas ran out before the ambition did.

- title: "Symphony X"
  type: "music"
  creator: "Symphony X"
  creator_role: "by"
  year: 1994
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/symphony_x.jpg"
  posted: "2021-10-10"
  text: |
    A surprisingly accomplished debut. The technical facility and the arranging instincts on ***Symphony X*** are already there; what is missing is everything around them. The production is thin, the low end undercooked, the mix lacking the separation that this density of instrumental counterpoint demands. It sounds like a band that knows exactly what it wants to say but has not yet been given the budget or the studio time to say it properly.

    The larger problem is Rod Tyler, who spends most of the album reaching for James LaBrie's upper register and falling conspicuously short. The high notes are forced rather than placed, and one can hear the strain in every passage that demands sustained power above the staff. 'Premonition' and 'Shades of Grey' stand out precisely because they work around these limitations rather than exposing them, allowing the instrumental writing to carry the weight. <u>The blueprint for everything Symphony X would become is audible here; it just needed better production and a different voice to fully materialise.</u>

- title: "Crime Of The Century"
  type: "music"
  creator: "Supertramp"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/crime_of_the_century.jpg"
  posted: "2021-10-04"
  text: |
    On relisten, ***Crime Of The Century*** has become my favourite Supertramp album, and the reason is subtlety. The jazz is there but never announced; the prog is there but never ostentatious. <u>Davies and Hodgson's sequencing is impeccable: the tracklist builds an emotional architecture that neither songwriter could have achieved alone, each composition commenting on the one before it.</u> Thompson's basslines provide a steady gravitational centre, unhurried and precise, a playing that one only notices when one imagines the songs without it.

    Even Hodgson's melodies, which on other Supertramp records can tip into a cloying sweetness that borders on the saccharine, are held in check here. The arrangements give them just enough harmonic complexity to stay interesting, just enough rhythmic counterweight to prevent them from floating away into easy-listening territory. And then there is the mix, which deserves a paragraph of its own but can be summarised in a word: perfect. <u>Ken Scott's production gives every instrument its own frequency pocket without sacrificing warmth; the stereo imaging is wide but never gimmicky, and the reverb tails on the piano sit exactly where they should.</u> This is one of those rare records where the engineering is itself a creative act, inseparable from the music it serves.

- title: "Beyond The Shrouded Horizon"
  type: "music"
  creator: "Steve Hackett"
  creator_role: "by"
  year: 2011
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/beyond_the_shrouded_horizon.jpg"
  posted: "2021-10-02"
  text: |
    The run of Steve Hackett solo albums from *Out of the Tunnel's Mouth* onward has been quietly remarkable, and ***Beyond The Shrouded Horizon*** is a strong entry in that late-career sequence. The string arrangements are more prominent than in earlier work, lending the compositions a warmth and scale that the guitar alone could not provide, and the energy curve across the album is far more dynamic than the flat, mid-tempo plateau that occasionally plagued his earlier records.

    There are plenty of good tracks here, but the standout is 'Two Faces of Cairo'. <u>It distils everything Hackett does best: the world music fusion that never condescends to its sources, layered with just enough progressive complexity to remind one that this is the same guitarist who wrote 'Firth of Fifth'.</u> The track breathes with an ease that suggests deep familiarity with the idiom rather than touristic borrowing. One wishes the whole album sustained that level, but even the lesser tracks carry a craftsman's assurance.

- title: "Genesis Revisited II"
  type: "music"
  creator: "Steve Hackett"
  creator_role: "by"
  year: 2012
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/genesis_revisited_ii.jpg"
  posted: "2021-10-01"
  text: |
    I will not itemise every track on ***Genesis Revisited II***; suffice to say that while it falls short of the first *Genesis Revisited*, the material is still operating at a Genesis-calibre level, and Hackett's guitar tone remains one of the most recognisable and emotionally articulate in progressive rock. The re-recordings treat the originals with a respect that avoids museum-piece reverence: they are alive, re-inhabited rather than replicated.

    But 'Supper's Ready'. Why is it sung like that? The 'Waiting for battle...' passage is completely ruined by inexplicable sustained notes that flatten the drama of one of prog's most carefully constructed climaxes. <u>It is the one moment on the album where reverence for the source material would have been the right instinct, and instead someone chose to improvise.</u> The rest of the record survives the comparison with the originals; this track does not.

- title: "Please Don't Touch!"
  type: "music"
  creator: "Steve Hackett"
  creator_role: "by"
  year: 1978
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/please_dont_touch.jpg"
  posted: "2021-09-27"
  text: |
    Steve Hackett's solo catalogue is a textbook case of how to balance pop accessibility with progressive ambition, and ***Please Don't Touch!*** might be the definitive demonstration. 'Narnia' is light, melodically pop-leaning, a track that could almost pass for radio fare, except that the chord progression keeps slipping into unexpected territory, modal detours that betray the composer's restless harmonic ear. 'Hoping Love Will Last' pivots into full-on jazz, and it works not because Hackett is a jazz guitarist but because he approaches the idiom with the curiosity of an outsider who has done his listening. <u>The second half of the album carries the purest Genesis DNA of any Hackett solo work: proper prog, structurally ambitious, tonally rich, with that distinctive sustain-heavy guitar voice threading through every passage.</u>

    The beauty of the record is its refusal to choose. Pop, jazz, prog: these are not separate modes that Hackett toggles between but overlapping zones of a single sensibility. <u>The transitions feel organic because the underlying musicianship is consistent; the same hands, the same ears, the same instinct for melody that rewards repeated listening.</u> Too beautiful to reduce to a genre label, and too carefully constructed to dismiss as eclecticism.

- title: "Diamond Mine"
  type: "music"
  creator: "King Creosote & Jon Hopkins"
  creator_role: "by"
  year: 2012
  eval: "meh..."
  genre: "folk"
  image: "/assets/images/music/diamond_mine_special_edition.jpg"
  posted: "2021-09-23"
  text: |
    Not especially interesting as an album-length statement. 'Your Young Voice' retains a freshness in isolation, a simplicity that feels earned rather than lazy, but the remaining tracks cycle through essentially the same chord progression and atmosphere with minimal variation. ***Diamond Mine*** is a record that depends almost entirely on the listener's affinity for a particular mood; if one connects with its drifting, lo-fi folk-ambient texture, the repetition becomes meditative, and if one does not, it becomes monotonous.

    <u>This is a record that lives or dies on the match between listener and material, and no amount of Jon Hopkins's careful production can compensate for the narrowness of the compositional palette.</u> The Mercury Prize nomination suggested a consensus I cannot quite share. There is craft here, certainly, but craft in the service of a single idea repeated until it either hypnotises or bores, with no middle ground.

- title: "Clockwork Angels"
  type: "music"
  creator: "Rush"
  creator_role: "by"
  year: 2012
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/clockwork_angels.jpg"
  posted: "2021-09-22"
  text: |
    The Geddy Lee who could sing 'Circumstances' is long gone, and what ***Clockwork Angels*** offers in his place is a Geddy Lee writing alt-rock, paired with an Alex Lifeson recycling bridge passages from *Hemispheres*. Only Neil Peart's drumming still carries the old spark, the fills still inventive, the timekeeping still restless in a way that keeps the listener's ear engaged even when the surrounding material has settled into a comfortable groove.

    The lyrics present a peculiar problem. <u>One cannot call them bad, exactly: the concept is solid, the narrative arc of the steampunk storyline has genuine shape, and individual lines land with conviction.</u> But one cannot point to anything particularly good, either. It is all human condition material, broad existential themes delivered with workmanlike competence, and one struggles to identify what distinguishes it from the thematic territory Rush were mining in the late seventies. The ambition is still there; the discovery is not.

- title: "Grace Under Pressure"
  type: "music"
  creator: "Rush"
  creator_role: "by"
  year: 1984
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/grace_under_pressure.jpg"
  posted: "2021-09-22"
  text: |
    A marginal improvement over *Signals*. ***Grace Under Pressure*** dials back the synth-forward production slightly, returning to the guitar-driven songwriting and complex arrangements that had always been Rush's core strength. 'The Wheels' is excellent, one of those mid-career tracks that reminds one how much this band could still achieve when the writing was focused.

    The trouble is that the albums from this era all share the same fundamental problem: a sense of directionlessness. <u>One never quite knows what Rush are trying to become during these years, whether they are chasing mainstream accessibility or retreating into progressive complexity, and the records suffer from that indecision.</u> It would take until *Snakes and Arrows*, over two decades later, for the band to find a new direction. In the meantime, *Grace Under Pressure* is the best version of a band treading water.

- title: "A Farewell to Kings"
  type: "music"
  creator: "Rush"
  creator_role: "by"
  year: 1977
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/farewell_to_kings.jpg"
  posted: "2021-09-21"
  text: |
    ***A Farewell to Kings*** is the record where Rush truly bridged the gap between the hard/heavy rock of the sixties and the technical/prog rock of the seventies, and they did it with the most economical lineup imaginable: one bass, one guitar, one drum kit. <u>The hard rock DNA is not buried but embedded, surfacing as structural Easter eggs that reward attentive listening.</u> The ride pattern at the opening of 'Xanadu' echoes the riff from 'A Passage to Bangkok'; the bassline in 'Cinderella Man' recalls something from the first album. These are not quotations but genetic traces, evidence that the band's progressive ambitions grew organically from their hard rock roots rather than being grafted on.

    'Cygnus X-1' stands as the definitive opening statement of the prog era of Rush: sprawling, narratively ambitious, rhythmically ferocious, with Peart's drumming reaching a new plateau of complexity that the earlier records only hinted at. The track earns its length, building through movements that feel composed rather than jammed, each section flowing into the next with the structural logic of a classical suite. <u>The whole album carries the exhilaration of a band that has just discovered how big its music can be, and has not yet learned to be cautious about it.</u>

- title: "2112"
  type: "music"
  creator: "Rush"
  creator_role: "by"
  year: 1976
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/2112.jpg"
  posted: "2021-09-20"
  text: |
    The critical consensus on ***2112*** is unusually unified: the suite is the centrepiece, everything else is secondary, and 'Tears' is the sole point of genuine disagreement. The 2112 suite itself is Rush's first proper epic, and compared to the scattered, unfocused attempts on *Caress of Steel*, the improvement is dramatic. The suite has shape, momentum, narrative logic; it knows where it is going and how to get there.

    'A Passage to Bangkok' sounds slightly incongruous in context, a hard rock throwback sitting alongside the album's progressive ambitions, though one can already see Geddy Lee's instinct for fantasy and prog-inflected lyricism that would reach full expression on *A Farewell to Kings*, particularly in 'Xanadu'. <u>The real surprise on relisten is 'Something for Nothing', which turns out to be the track that lodges most stubbornly in memory: a compact, driving piece that delivers more per minute than the suite manages in its longer passages.</u> Sometimes the most potent statement is the shortest one.

- title: "Fly by Night"
  type: "music"
  creator: "Rush"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/fly_by_night.jpg"
  posted: "2021-09-20"
  text: |
    The ratings on both Progarchives and Douban are puzzlingly low, with Douban even scoring ***Fly by Night*** below the self-titled debut, which is difficult to comprehend. Neil Peart's arrival transforms the band's rhythmic identity: the dynamics immediately become more sophisticated, and his double hi-hat technique in particular adds a textural richness that John Rutsey's playing, competent as it was, simply could not provide. Geddy Lee's bass playing is noticeably more complex, too, and the coordination between his vocal lines and his bass parts, which on the debut often felt like two separate activities happening to share a body, is markedly improved.

    <u>The limitation, and it is a real one, is that the album remains at its core a heavy/hard rock record, still carrying a trace of Led Zeppelin in its DNA, still recycling grooves across tracks.</u> The progressive ambitions that would define Rush from *2112* onward are present only as seeds here: flashes of odd-time phrasing, brief harmonic excursions that resolve too quickly back to the tonic. But one listens to *Fly by Night* knowing what comes next, and the anticipation is part of the pleasure. The band is not there yet, but every element of what it will become is already in the room.

- title: "Prologue"
  type: "music"
  creator: "Renaissance"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/prologue.jpg"
  posted: "2021-09-16"
  text: |
    From ***Prologue*** onward, Renaissance maintained a level of quality that never wavered. The album opens with Chopin and threads Shostakovich, or perhaps Rachmaninoff, through its middle passages, yet the adaptations never feel like pastiche. <u>The classical material is absorbed into the band's own harmonic language so completely that the seams disappear; one hears the influence without hearing the quotation.</u>

    There is a pragmatic advantage to building on classical sources that this album exemplifies: the chord progressions come pre-solved. Borrow a few bars from a composer who spent years refining a harmonic sequence and one has a foundation that no amount of jamming in a rehearsal room could replicate. Renaissance understood this instinctively, and this yields music that carries the structural weight of the classical tradition without its formality. <u>The arrangements breathe; the vocals soar without strain; the whole record sounds like a band that has found its method and will not need to search again.</u>

- title: "Element of Surprise"
  type: "music"
  creator: "Raptured Roots"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/element_of_surprise.jpg"
  posted: "2021-09-13"
  text: |
    The cymbal work on ***Element of Surprise*** is gorgeous, particularly on 'Cliffhanger', where the crashes and rides are played with a dynamic sensitivity that most metal drummers never bother to develop. <u>The cymbal becomes an instrument of colour rather than mere punctuation, washed and swelled with a precision that suggests someone who has spent time listening to jazz as much as metal.</u>

    The guitar tone has shed the blunt-force saturation of power metal in favour of something more nuanced, a tighter gain structure with more midrange articulation that places the album squarely in high-calibre prog metal territory. The shift is not just timbral but compositional: with a less compressed guitar sound, the arrangements open up, harmonic details become audible that a wall of distortion would have buried, and the album rewards close listening in a way that pure power metal rarely does. Raptured Roots sound like a band that has outgrown its genre without abandoning it.

- title: "Rift"
  type: "music"
  creator: "Forming the Void"
  creator_role: "by"
  year: 2018
  eval: "liked"
  genre: "stoner metal"
  image: "/assets/images/music/rift.jpg"
  posted: "2021-09-12"
  text: |
    Their best record. ***Rift*** has a spiritual quality, a flexibility of mood and tempo that the earlier albums lacked. 'Lengthwise' carries a neo-psychedelic drift that is both playful and serious, managing the rare trick of sounding loose without sounding careless. <u>There is genuine wit in the arrangements, a willingness to let a groove mutate mid-phrase, to follow an idea into unexpected harmonic territory and trust that the listener will follow.</u>

    The problem, and it is a persistent one in neo-prog, is repetition. I know repetition legitimises, but this is too much. The riffs cycle past the point of hypnotic insistence and into diminishing returns, the compositional equivalent of a joke told one time too many. When the band is at its best, the repetition builds genuine momentum; when it is not, one hears the scaffolding. A tighter edit would have made this a great album rather than merely a very good one.

- title: "Periphery II: This Time It's Personal"
  type: "music"
  creator: "Periphery"
  creator_role: "by"
  year: 2012
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/periphery_ii.jpg"
  posted: "2021-09-10"
  text: |
    The problem with early Periphery was never the backlog of riffs or the long gestation of the material; it was the melodies, or the lack of them. ***Periphery II: This Time It's Personal*** confirms what the debut suggested: in the albums before *Periphery III*, the band simply could not write vocal lines that matched the sophistication of the instrumental work. The vocal melodies are cheesy, the kind of sing-along hooks that feel grafted onto compositions designed for instrumental complexity, and the transitions between sections are often brutal in the wrong sense, not heavy but clumsy, each track feeling like a collage of snippets rather than a coherent piece.

    <u>What saves the record, and earns it a fourth star, is the sheer technical authority and Spencer Sotelo's voice, which even at this stage carried a timbral richness that elevated mediocre melodic writing into something listenable.</u> The rhythmic innovations are real; in many passages, Periphery was still ahead of the djent curve they had helped define. By 2020, half the djent bands in the scene were borrowing from this playbook, which speaks to the album's influence even as it underscores its compositional unevenness. The toolkit was already industry-leading. The songwriting would catch up later.

- title: "Periphery"
  type: "music"
  creator: "Periphery"
  creator_role: "by"
  year: 2010
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/periphery.jpg"
  posted: "2021-09-09"
  text: |
    The debut from ***Periphery*** suffers from the ailment common to albums assembled over half a decade: the early material has aged out of alignment with the later compositions, and the seams show. The first half, with the exception of 'The Walk', feels like a band still auditioning ideas, cycling through djent-by-numbers riffs and chord progressions so familiar one could predict the next change before it lands. The harmonic language across these tracks leans on the same tired I-V-vi-IV bones that plagued metalcore throughout the late 2000s, dressed up with enough polyrhythmic filigree to distract but not to disguise.

    What rescues the record is its back half, and especially the closing fifteen-minute epic, which dissolves any sense of duration through sheer rhythmic invention. The polyrhythmic layering in those final tracks is properly disorienting in the best possible way: one loses the downbeat, recovers it, and loses it again, which is precisely the point. <u>Spencer Sotelo's voice is the album's secret weapon, possessing a tonal clarity and emotional range that rivals Daniel Tompkins of Tesseract, and surpasses him in a live setting by a considerable margin.</u> If the songwriting on the first half had matched the ambition of the last two tracks, this would be a landmark debut rather than a promising but uneven one.

- title: "Pale Communion"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2014
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/pale_communion.jpg"
  posted: "2021-09-05"
  text: |
    ***Pale Communion*** hovers in the uncertain space between a very good and a great Opeth record, and Steven Wilson's fingerprints are all over the indecision. Wilson handled the mixing here, and what emerges is an album that sounds exquisite in its spatial detail but bleeds Porcupine Tree from every pore. Tracks like 'Voice of Treason' expose the problem most clearly: the repetitive structures that Wilson's own band metabolises into hypnotic tension become inert when grafted onto Opeth's language, as though the song is waiting for a developmental turn that never arrives.

    <u>The issue is not that Opeth have absorbed prog influences, since they have been doing that brilliantly for over a decade, but that this particular album sometimes sounds more like a Wilson production that Mikael Åkerfeldt happens to be singing on than a genuine Opeth record.</u> When the band's own compositional identity does break through, the results are striking enough to justify the record's existence. But one leaves it with the nagging sense that the Wilson-Åkerfeldt partnership, so electrifying on earlier collaborations, has begun to tilt too far in one direction.

- title: "Heritage"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/heritage.jpg"
  posted: "2021-09-05"
  text: |
    ***Heritage*** is Opeth at their most prog-committed, the album where Mikael Åkerfeldt finally stopped hedging and made the record he had been circling for years. The Porcupine Tree flashbacks arrive in waves, and they are not unwelcome: Steven Wilson is back on production, and his presence is audible in the mix's crystalline separation, in the way every ghost note on the drums and every Mellotron swell occupies its own pocket of space. 'Nepenthe' might be the finest single track in Opeth's catalogue, a composition that manages to be simultaneously playful and devastating. The Mellotron washes, the ghost notes scattered like punctuation across the drum pattern, Mikael's clean vocal at its most controlled and tender, and those impish bridge passages that pivot without warning: it is a track that rewards obsessive re-listening, revealing new structural details each time.

    <u>The Wilson-Åkerfeldt partnership reaches its apex here, a collaboration so symbiotic that attempting to separate each musician's contribution becomes pointless.</u> What makes *Heritage* work where lesser prog exercises fail is its refusal to treat complexity as an end in itself. The intricate passages serve the emotional arc of each song rather than existing to demonstrate technical competence. 'Häxprocess' could pass for a Porcupine Tree deep cut, and that is meant as the highest compliment: it channels the same marriage of melancholy and rhythmic precision that defined Wilson's best work, filtered through Opeth's heavier harmonic instincts. This is the sound of two musicians who understand each other completely, and one loves every second of it.

- title: "Watershed"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2008
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/watershed.jpg"
  posted: "2021-09-05"
  text: |
    Peter's departure barely registered, but Martin Lopez leaving is audible. His replacement, the other Martin (now we have so many Martins I don't even remember their last names anymore), brings a harder-edged approach to the kit that occasionally recalls the early death metal era, a welcome roughness that ***Watershed*** channels into its denser passages. Both Martins share a fondness for ghost notes, that spectral subdivision of the beat that gives Opeth's rhythmic feel its distinctive looseness, but the new Martin hits with more force, lending the heavier sections a percussive weight that the band had not carried since *Blackwater Park*.

    'The Lotus Eater' is the most overtly prog composition here, its time-signature shifts and structural tangents pushing toward math-rock territory without losing the melodic thread. But the tracks that feel most essentially Opeth are the atmospheric longer pieces: 'Hessian Peel' and 'Hex Omega', where mood and texture do the work that riff density does elsewhere. <u>The cumulative effect is startling; by the album's end one is left with the impression of Meshuggah gone slightly melodic, the same tectonic low-end heaviness and polyrhythmic disorientation refracted through Opeth's gift for beauty.</u> It is a combination that should not work, and yet it does, with a conviction that silences the theoretical objection.

- title: "Ghost Reveries"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2005
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/ghost_reveries.jpg"
  posted: "2021-09-05"
  text: |
    ***Ghost Reveries*** is where Opeth became, in the fullest sense, a progressive metal band. The seeds were always there, in the extended structures and dynamic contrasts of the earlier records, but this is the album where the commitment becomes total. 'Reverie / Harlequin Forest' is the centrepiece and the proof: a track that moves through so many textural and harmonic territories that it functions less as a song than as a suite, yet never loses its emotional throughline. Plini once observed that in the prog world everyone has an attention span of two bars, but Opeth's riff writing here is so fluid, so motivated in its transitions, that one can follow a single melodic idea across twenty bars without fatigue. <u>That fluency, the capacity to sustain complexity without sacrificing momentum, is the rarest skill in progressive music, and on this record Opeth possess it absolutely.</u>

    The production leans heavily on Mellotron, continuing the trajectory established on *Damnation* and *Deliverance*, and Martin Lopez's drumming is a masterclass in textural restraint: ghost notes everywhere, the kit played as a melodic instrument rather than a rhythmic engine. The clean guitar passages carry a distinct Porcupine Tree warmth, a timbral affinity that would only deepen on subsequent records. What distinguishes *Ghost Reveries* from its predecessors is the confidence with which it integrates these softer elements into the heavier framework. There is no sense of compromise or genre-hedging; the acoustic passages and the blast beats exist in the same musical universe, governed by the same compositional logic. one comes away it feeling that Opeth have not so much changed direction as finally arrived at the place they were always heading.

- title: "Damnation"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2003
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/damnation.jpg"
  posted: "2021-09-03"
  text: |
    ***Damnation*** exists as the quiet half of a diptych, recorded simultaneously with *Deliverance* and conceived from the start as its luminous negative image. Steven Wilson was brought in to produce and to play Mellotron, and his presence is not merely audible but constitutive: the album's sonic palette, its spacious mix, its patient builds and restrained dynamics, all bear Wilson's architectural sensibility. The final track, 'Weakness', makes the debt most explicit, sounding close enough to early Porcupine Tree that one could mistake it for a lost *Signify*-era B-side, and this is not a criticism but a statement of how deeply the two musicians' instincts had converged.

    <u>'Windowpane', 'In My Time of Need', and 'Hope Leaves' might be the three finest songs Opeth have ever written, and they achieve their power through what they withhold rather than what they deploy.</u> There are no growls, no blast beats, no sudden eruptions of heaviness. What remains is Mikael's clean voice at its most exposed and Wilson's production at its most transparent, every reverb tail and harmonic overtone given room to breathe. The effect is not softness but a different kind of intensity: the intensity of stillness held under pressure. One does not listen to *Damnation* for catharsis. One listens to it for the ache that comes before catharsis, the suspended moment when grief has not yet resolved into anything bearable.

- title: "Deliverance"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2002
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/deliverance.jpg"
  posted: "2021-09-03"
  text: |
    The title track of ***Deliverance*** remains one of Opeth's most definitive compositions, a piece whose bridge sections deploy half-step modulations with a structural logic that feels almost classical in its inevitability, developing a motif first sketched on the preceding album into something fully realised. Whether one calls it a motif in the strict musicological sense is debatable, but the harmonic thread is unmistakable: a chromatic descent that recurs across the album's heavier passages like a tonal signature. 'For Absent Friends', by contrast, is a piano-led instrumental so delicate in its construction that it would sit comfortably on *Damnation*, which makes sense given that both records emerged from the same sessions, the same studio, the same creative moment.

    <u>What strikes hardest on revisiting <em>Deliverance</em> is the sheer dynamic range: every track operates across a wider spectrum of volume, intensity, and textural density than most bands manage across an entire career.</u> The quietest passages are quiet in the truest sense, not merely less loud, and the heaviest sections hit with the force of accumulation rather than sudden assault. This is dynamics in the compositional sense, not the mastering sense: the contrast is written into the music's DNA, not applied after the fact through compression curves. One leaves the record not merely impressed but shaken, which is the only honest response to music that takes its own ambition this seriously.

- title: "Blackwater Park"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 2001
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/blackwater_park.jpg"
  posted: "2021-09-03"
  text: |
    Mikael's growl on ***Blackwater Park*** sounds so familiar, so settled into its own timbre, that one has to remind oneself this is a record from 2001. No Opeth listener would omit 'Bleak' or 'The Drapery Falls' from a top-twenty list, and the closing title track shares a structural kinship with 'White Cluster' from the previous album while arriving at an entirely different emotional destination, a difference one can partly attribute to Martin Mendez's warmer bass tone on this record, filling the low end with a richness that *Still Life* only hinted at.

    The album functions as a riff compendium in the best sense, each track offering a density of ideas that lesser bands would spread across three records. 'The Drapery Falls' exemplifies the method: it opens with Mikael's clean voice pushed through a subtle amplifier grain layered over clean guitar arpeggios, then transitions into the full-band riff with zero discontinuity, as though both textures were always the same song heard from different distances. <u>The half-step-down modulation in the second chorus is pure Opeth, a chromatic sleight of hand that would become one of the band's most recognisable compositional signatures, recurring across every subsequent album like a watermark.</u> This is the record where everything clicks into place: the production, the interplay between Mendez and Lopez, Mikael's dual-register vocals, the sense that heaviness and beauty are not alternating states but simultaneous ones. It is, simply, a masterpiece.

- title: "Still Life"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 1999
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/still_life.jpg"
  posted: "2021-09-03"
  text: |
    ***Still Life*** marks Martin Mendez's arrival, and with it a fundamental shift in how Opeth's low end operates. His bass work is seamless, most audibly on 'White Cluster', where the instrument functions not as rhythmic support but as a melodic countervoice threading through the arrangement. Paired with Martin Lopez's drumming, this rhythm section would anchor the band's greatest work over the following decade, establishing a pocket that was simultaneously loose and precise, full of ghost notes and dynamic shading.

    <u>The mix represents a significant leap over <em>My Arms, Your Hearse</em>, and one of its most consequential effects is to reveal Mikael's clean voice in its full warmth for the first time, the timbre that would become synonymous with Opeth's identity.</u> The album's thematic preoccupation with death connects it to *Orchid*, the narrative seemingly continuous, tracing events leading up to and beyond dying, culminating in 'White Cluster' with lines like 'they wear white for me / seemingly jaded and lost / I forge myself into your dreams / and here I am your life'. There is a novelistic ambition to Opeth's concept work on this record, a willingness to let the story's emotional logic dictate the musical structure rather than the reverse. The storytelling does not always transcend its genre conventions, but when it does, as in those closing minutes, the effect is devastating.

- title: "My Arms, Your Hearse"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 1998
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/my_arms_your_hearse.jpg"
  posted: "2021-09-03"
  text: |
    Opeth's third album marks the point where the band's progressive instincts begin to assert themselves over the death metal framework, and the single most important variable is the arrival of Martin Lopez behind the kit. Where Anders Nordin's drumming was metronomic and flat, Lopez brings genuine dynamic range to the instrument: ***My Arms, Your Hearse*** breathes in a way its predecessors never could. 'April Ethereal', scored to the protagonist's final encounter with his lover, and 'The Amen Corner', soundtracking the aftermath of his death and her grief, both showcase a drummer thinking compositionally rather than merely keeping time, shading the emotional arc of each song through touch and accent rather than pattern alone.

    Mikael's growl has deepened and darkened, acquiring a timbral identity that separates it from the generic death metal screech of the first two records. One discovers on repeat listens that the bass here is Mikael himself, Martin Mendez not yet having joined; the playing is competent but lacks the melodic personality Mendez would bring to *Still Life*. <u>The prog elements, while present, remain subordinate to the death metal architecture: the structures are not yet as inventive as what would follow, and the lyrics still occasionally lapse into an overwrought phrasing that the genre struggles to outgrow.</u> But the trajectory is unmistakable. This is the album where Opeth stopped being a death metal band that happened to play long songs and started becoming something their own.

- title: "Morningrise"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 1996
  eval: "meh..."
  genre: "progressive metal"
  image: "/assets/images/music/morningrise.jpg"
  posted: "2021-09-02"
  text: |
    The problems that plagued *Orchid* persist on ***Morningrise*** with little remediation. Anders Nordin's drumming remains the record's most conspicuous liability: mechanical, dynamically inert, indistinguishable from a drum machine in its refusal to breathe with the music. One is tempted to suggest Opeth should have simply committed to programmed drums à la Meshuggah and saved everyone the pretence. Mikael's vocal is still pitched too high and too thin, lacking the distinctive low-register warmth that would emerge on *My Arms, Your Hearse* and define his sound thereafter, leaving his growl interchangeable with a dozen other death metal vocalists of the period.

    <u>The most praised track, 'Black Rose Immortal', is riddled with unmotivated transitions, passages that shift not because the musical logic demands it but because the band can, a kind of prog-for-prog's-sake that teeters on the edge of the same overreach that mars Dream Theater's <em>Metropolis Pt. 1</em>, without approaching that track's technical execution.</u> The critical elevation of this album feels driven more by retrospective loyalty than by honest assessment of what is actually on the record. The mix is poor, the drumming is poor, and no amount of revisionist enthusiasm changes what one's ears report.

- title: "Orchid"
  type: "music"
  creator: "Opeth"
  creator_role: "by"
  year: 1995
  eval: "meh..."
  genre: "progressive metal"
  image: "/assets/images/music/orchid.jpg"
  posted: "2021-09-02"
  text: |
    ***Orchid*** is a death metal debut that shares almost nothing with the band Opeth would become, though the seeds are faintly visible if one knows where to look. Johan de Farfalla's bass is the standout element, playing with a melodic sensibility unusual for the genre, most audible on 'The Twilight Is My Robe', where the bass line moves with an independence from the guitar riffing that hints at the progressive ambitions to come. The melodic writing across the album is strong by death metal standards, a cut above the genre's typical reliance on tremolo-picked chromaticism.

    But the weaknesses are substantial. Mikael's growl at this stage is too shrill, lacking the timbral depth and personal character it would acquire over the next two records. The guitar work and especially the drumming, Anders Nordin being the chief offender here, are simply not at a level that can support progressive structures; complexity is attempted but not achieved. <u>'Silhouette' is the album's worst misstep: thematically disconnected from the rest of the record, emotionally vacant, its piano part sounding like an unprocessed MIDI sketch thrown in to pad the runtime.</u> Remove it and the album improves. Even so, *Orchid* remains a curio rather than a starting point, interesting only in the light of what followed.

- title: "Aphelion"
  type: "music"
  creator: "Leprous"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/aphelion.jpg"
  posted: "2021-09-01"
  text: |
    ***Aphelion*** is the best album to emerge in recent years from any corner of the progressive spectrum, the record where Leprous fully inhabit the emotional territory they staked out on *Pitfalls* and build a permanent structure there. Einar Solberg's voice remains the most expressive instrument in modern prog metal, capable of shifting from whispered intimacy to shattering force within a single phrase, but what elevates this album beyond vocal showcase is the way the arrangements rise to meet him. The dynamics here are not decorative contrast but structural principle: every crescendo is earned, every quiet passage loaded with the tension of what it is withholding.

    'Running Low' defines the album's identity from its opening bars, establishing a template that the subsequent tracks develop and refract: the structural logic, the orchestral layering, the string arrangements that feel integral rather than ornamental. <u>Raphael Weinroth-Browne's cello work on 'Running Low' is extraordinary, a motif of such melodic precision and emotional weight that it would be remarkable in a dedicated chamber piece, let alone a prog metal track.</u> The climactic moment arrives in the bridge before the final verse, where every instrument converges on the cello motif in unison, building a wall of sound dense enough to rival anything on Devin Townsend's *Empath*. That a band this far into their career can still produce a moment of such overwhelming force speaks to a creative vitality that most of their contemporaries lost albums ago. One does not merely listen to *Aphelion*; one is levelled by it.

- title: "Doorway To Summer"
  type: "music"
  creator: "Moon Safari"
  creator_role: "by"
  year: 2005
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/doorway_to_summer.jpg"
  posted: "2021-08-31"
  text: |
    ***Doorway To Summer*** sits comfortably in the lineage of Swedish symphonic prog established by The Flower Kings and Kaipa, and one could argue that every Swedish prog band outside of Änglagård converges on roughly this aesthetic: lush, multi-layered, harmonically warm, unapologetically beautiful. That Moon Safari arrived at this sound fully formed on their debut is the first surprise. That the choral vocal arrangements, the signature technique that would reach its apotheosis on *Blomljud*, are already this polished and this assured on a first record is the second.

    'Dance Across the Ocean' and 'We Spin the World' are the twin peaks of the album, and both are essentially beyond criticism in their craft. <u>The latter carries a chord progression with an uncanny resemblance to a Jay Chou track, a coincidence that delights precisely because it reveals how universal certain harmonic movements are, how the same emotional geometry surfaces independently across entirely unrelated musical traditions.</u> The word that keeps returning is 'comfortable', and one means it not as faint praise but as a description of something rare: music so assured in its idiom, so generous in its melodic invention, that listening to it seems less aesthetic engagement and more like arriving somewhere one has always known.

- title: "Brave"
  type: "music"
  creator: "Marillion"
  creator_role: "by"
  year: 1994
  eval: "loved"
  genre: "neo-prog"
  image: "/assets/images/music/brave.jpg"
  posted: "2021-08-30"
  text: |
    ***Brave*** is the finest thing Marillion ever made, surpassing even *Clutching at Straws*. The word that fits is 'pure': a concept album that earns its narrative ambition through the luminosity of its sound rather than through structural cleverness or lyrical density. The story it tells is harrowing, but the music wraps it in a clarity so complete that by the time 'Made Again' arrives at the album's close, its gentle release reads less as a resolution than a physical unburdening. <u>One does not so much hear 'Made Again' as feel it lift something off one's chest, and the tears it provokes are not sentimental but structural, the emotional payoff of an hour's accumulated tension finally allowed to dissolve.</u>

    'The Great Escape / The Last of You / Falling from the Moon' marks the moment where Marillion's harmonic language finally becomes their own, the chord voicings no longer derivative of their obvious influences but moving with an internal logic that belongs to no one else. 'Paper Lies' reinforces this sense of arrival, shedding the copycat tendencies that shadowed the band's earlier work. What makes *Brave* extraordinary is that it achieves grandeur without bombast, complexity without opacity. It is, in the plainest sense, beautiful, and beauty at this level of sustained intensity is the hardest thing in music to achieve.

- title: "Script for a Jester's Tear"
  type: "music"
  creator: "Marillion"
  creator_role: "by"
  year: 1983
  eval: "meh..."
  genre: "neo-prog"
  image: "/assets/images/music/script_for_a_jesters_tear.jpg"
  posted: "2021-08-29"
  text: |
    ***Script for a Jester's Tear*** is, by any honest metric, a pale imitation of early Genesis, and the gap in quality is not subtle. The album's reputation rests less on its musical content than on the demographic that grew up with it: the five-star reviews on Prog Archives tend to be shorter than the three-star ones, which tells one everything about the ratio of nostalgia to critical thought in its reception. The record's 'classic' status is a function of how many middle-aged men imprinted on it in their teens, not of anything the music itself achieves.

    <u>'Grendel' stretches a I-VII-VI-V descending pattern across half its runtime as though repetition alone constitutes development.</u> 'Charting the Single' subjects the listener to five minutes of the most basic 4/4 drum pattern imaginable, devoid of fills, accents, or any indication that the drummer is aware the song is supposed to be progressing. And pervading the entire record is a cheap, tinny synthesiser tone that would have been embarrassing in the mid-seventies, let alone the early eighties. Three stars is a courtesy. The album is, in truth, dreadful, and those awarding it full marks might profitably ask themselves whether they are rating the music or the memory. The distinction matters.

- title: "PORTALS"
  type: "music"
  creator: "TesseracT"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/portals.jpg"
  posted: "2021-08-28"
  text: |
    'Juno' becomes, in this live setting, a superior version of itself, which is the highest compliment one can pay to a live rendition. ***PORTALS*** benefits from a paradox that has dogged Tesseract throughout their career: the studio recordings rely so heavily on vocal processing and pitch correction that the dynamics feel flattened, the life compressed out of the performances in pursuit of tonal perfection. This live document dials back the post-production, and the effect is a rawness that restores the music's breathing room. The vocal imperfections, the moments where a note sits slightly off-centre, are not flaws but evidence of a human being inside the sound.

    <u>The decision to stitch the entire <em>Concealing Fate</em> suite into a single continuous performance is inspired, transforming what was already a cohesive suite into something monolithic.</u> Heard without the artificial breaks of track boundaries, the compositional arc becomes clearer, the thematic recurrences more audible, the whole greater than the sum of its already formidable parts. One leaves the record wishing Tesseract would trust themselves to sound this alive in the studio.

- title: "Sound Awake"
  type: "music"
  creator: "Karnivool"
  creator_role: "by"
  year: 2010
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/sound_awake.jpg"
  posted: "2021-08-26"
  text: |
    ***Sound Awake*** marks a significant departure from Karnivool's debut, though the TOOL influence remains deeply embedded in the band's DNA: the odd-metre riffing, the atmospheric builds, the fondness for letting a groove breathe before detonating it. 'Simple Boy', 'Goliath', and 'New Day' each occupy distinct stylistic territory, with 'Goliath' sitting closest to outright TOOL worship, yet even here the arrangement work is too accomplished to dismiss as mere imitation. The guitar layering, the way the bass locks into the kick drum pattern before diverging into its own melodic line, the calculated use of silence: these are the marks of a band that has absorbed its influences deeply enough to do something personal with them.

    <u>The mix is the album's most remarkable achievement, a production so detailed and so spatially precise that it makes most progressive metal records sound like demos by comparison.</u> After spending time with bands like Kotebel, where the mix often struggles to give each instrument its own space, returning to *Sound Awake* is a revelation. The five-string bass tone alone justifies the price of admission: warm, present, occupying the low-mid spectrum with an authority that never muddies the guitars above it. That balance, between weight and clarity, between density and transparency, is overwhelmingly difficult to achieve, and on this record Karnivool and their engineering team nail it absolutely.

- title: "Sound of the Apocalypse"
  type: "music"
  creator: "Black Bonzo"
  creator_role: "by"
  year: 2009
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/sound_of_the_apocalypse.jpg"
  posted: "2021-08-23"
  text: |
    'Yesterday's Friend' contains the finest vocal melody Black Bonzo have committed to tape across either of their albums, a line that sits in the memory long after the track ends. 'Giant Games' is the most texturally distinctive piece, carving out a sonic identity that belongs to no one else in the retro-prog sphere. And the title track, ***Sound of the Apocalypse***, is the band's most expansive and cinematically scaled composition, a long-form piece that earns its runtime through genuine developmental ambition rather than simple repetition.

    <u>What unifies the album is its dynamics: virtually every track operates across a dramatic range of intensity that recalls Leprous at their most controlled, where each crescendo is architecturally motivated and each moment of quiet loaded with structural purpose.</u> Every note is justified and every melody motivated. That sentence could serve as the band's artistic manifesto, and it is a standard remarkably few progressive rock acts, vintage or contemporary, can claim to meet. Black Bonzo make music that sounds effortless in its craft, which is the surest sign that the craft is anything but.

- title: "Black Bonzo"
  type: "music"
  creator: "Black Bonzo"
  creator_role: "by"
  year: 2003
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/black_bonzo.jpg"
  posted: "2021-08-23"
  text: |
    A 2004 album that sounds indistinguishable from the early-seventies British progressive rock movement, and one means that as unqualified praise. ***Black Bonzo*** channels the era with a fidelity that goes beyond mere stylistic homage: the Hammond organ tones, the melodic shapes that echo the Canterbury scene (Soft Machine vibe, unmistakably), the vocal harmonies stacked in a manner so reminiscent of Uriah Heep that one half-expects David Byron's ghost to appear in the liner notes.

    The guitar work ranges from heavy passages that carry a King Crimson density to lighter solos with the melodic warmth of Argent, a breadth of tonal palette that keeps the album from settling into pastiche. <u>Black Bonzo belong in the same conversation as Wobbler, Dweller, and Änglagård: retro-prog bands whose commitment to the vintage idiom is so total, and whose execution is so assured, that the question of whether the music is 'derivative' becomes irrelevant.</u> One does not ask whether a cathedral built in the Gothic style is derivative of Gothic architecture. One asks whether it stands, and this one stands.

- title: "Colors II"
  type: "music"
  creator: "Between the Buried and Me"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/colors_ii.jpg"
  posted: "2021-08-21"
  text: |
    I expected a retread of the first *Colors*, tech-death as the skeleton with prog ornamentation draped over it, the formula that made Between the Buried and Me reliable if rarely revelatory. The opening tracks do little to dispel that assumption. But from the third song onward ***Colors II*** pivots hard, and the prog elements stop being ornamental and start being structural. The compositions unfold with genuine architectural ambition: movements that develop, recapitulate, and transform rather than simply alternating between blast beats and clean interludes. <u>It is the rare sequel that understands what the original was reaching for and then actually gets there.</u>

    Some have called the jazz passages clumsy, which strikes me as a peculiar standard to hold against a metal band that has always treated jazz as seasoning rather than cuisine. If these interludes are 'corny', then the *The Great Misdirect*-era digressions were positively embarrassing by comparison, and nobody seemed to mind those at the time. What ***Colors II*** lacks is the ethereal, almost accidental grace of *Coma Ecliptic*, that record's uncanny ability to make the baroque feel effortless. But what it offers instead is sheer compositional density, prog metal that earns the 'prog' prefix not through time-signature arithmetic but through the patient, iterative development of ideas across an album-length arc. <u>This is exceptionally high-calibre progressive metal, the kind that makes one forget the genre's reputation for sterile virtuosity.</u>

- title: "The Oubliette"
  type: "music"
  creator: "Dora Brilliant"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/oubliette.jpg"
  posted: "2021-08-15"
  text: |
    ***The Oubliette*** is the finest concept album I have encountered on the subject of Alzheimer's disease, and it achieves its devastating effect through a structural conceit so precise it borders on clinical: each track corresponds to a stage of cognitive decline, and each track's instrumentation and lyrical register embody that stage's phenomenology. The early songs carry the warmth and coherence of intact memory; the later ones dissolve into fragmentation, repetition, disorientation. The interspersed dialogue samples, drawn from real conversations, function less as narrative scaffolding than as temporal anchors, moments of heartbreaking lucidity surfacing in an ocean of noise. <u>Henry's scream at the close of 'Stage 6: The Oubliette' is not performance; it is the sound of someone recognising their own erasure.</u>

    What elevates the album beyond mere concept is the one-to-one correspondence between musical language and disease progression. This is not a record that tells one about Alzheimer's; it is a record that makes one feel the topology of forgetting. The harmonic language simplifies as the disease advances; rhythmic structures lose coherence; the production itself seems to degrade, as though the mixing desk were losing its memory too. one emerges the album understanding something about neurodegenerative illness that no textbook conveys: the terror is not in the forgetting itself, but in the moments of clarity that remain just long enough to register what has been lost. I will return to this record many times, and each listen will hurt differently.

- title: "Death's Design"
  type: "music"
  creator: "Diabolical Masquerade"
  creator_role: "by"
  year: 2001
  eval: "liked"
  genre: "black metal"
  image: "/assets/images/music/deaths_design.jpg"
  posted: "2021-08-11"
  text: |
    Sixty-one tracks on a single album is a stunt until it is not, and ***Death's Design*** sits precisely on that boundary. The conceit recalls Carnation's similarly fragmented approach, each piece a vignette rather than a song, the album functioning as a single continuous composition sliced into micro-movements. The orchestral arrangements are the revelation here. The string writing is sophisticated, deployed not as the genre-standard 'epic' wash but as a compositional tool with real harmonic intent. <u>The recurring use of tritone intervals in the strings, dropped into transitions without warning, produces a visceral unease that the growled vocals alone could never achieve.</u>

    The death vocals remain, for me, a barrier to full engagement, a wall of texture I can appreciate architecturally without ever quite parsing semantically. But the album's ambition compensates. The way Diabolical Masquerade treat the orchestra not as garnish but as a structural equal to the guitars, letting tritone-laden string passages carry entire transitions, suggests a composer thinking in terms of through-composed classical form rather than verse-chorus metal convention. It does not reach the heights that would demand a fifth star, but it is a record one returns to, finding new details in the orchestration each time.

- title: "Hoodoo Man"
  type: "music"
  creator: "Birth Control"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/hoodoo_man.jpg"
  posted: "2021-08-10"
  text: |
    Neuser's keyboard work on ***Hoodoo Man*** immediately evokes Vincent Crane's playing in Atomic Rooster, and whether this is an artifact of the Hammond organ's inherent timbral character or a deeper stylistic affinity is almost beside the point. The resemblance extends beyond tone into phrasing: those fluid, melodically inventive solos that European organ players seem to gravitate toward, treating the instrument not as a rhythm section contributor but as a lead voice with the same expressive range as a guitar. There is a lineage here, a continental tradition of Hammond-driven rock that prioritises lyrical soloing over textural padding, and Neuser sits comfortably within it.

    <u>Noske's drumming is the album's secret engine, swinging with a looseness and confidence that gives the whole record its kinetic energy.</u> The bass and vocals are functional rather than distinguished, content to serve the ensemble rather than assert individual identity, but this turns out to be precisely the right approach. They lock into Neuser's keyboards and Noske's drums with a tightness that a more ambitious rhythm section might have disrupted. The result is a blues-rock record that knows exactly what it wants to be and executes with enviable precision. Sometimes that is enough. Sometimes that is everything.

- title: "Temple of Shadows"
  type: "music"
  creator: "Angra"
  creator_role: "by"
  year: 2004
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/temple_of_shadows.jpg"
  posted: "2021-08-09"
  text: |
    One can resist thrash metal on principle and still be disarmed by ***Temple of Shadows***, because what Angra achieve here is not really thrash at all but something closer to melodic architecture that happens to be built with distorted guitars and double bass drums. 'Morning Star' and 'Late Redemption' contain chord progressions and vocal melodies of such unadorned beauty that the word 'beautiful' is, for once, the precise critical term rather than a lazy placeholder. <u>The harmonic movement in 'Morning Star' carries a faint djent inflection, palm-muted polyrhythmic accents that gesture toward progressive metal without ever fully committing to it.</u>

    The album sits in an interesting taxonomic space: too melodically sophisticated for straightforward thrash, too structurally conventional for genuine prog. But this liminal position turns out to be its strength. Angra are not trying to be Dream Theater or Meshuggah; they are trying to write songs where the melody is paramount and the heaviness serves as emotional intensifier rather than end in itself. In this, they succeed completely. The melodies here do not merely accompany the riffs; they justify them.

- title: "The Power to Believe"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 2003
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/power_to_believe.jpg"
  posted: "2021-08-08"
  text: |
    ***The Power to Believe*** is, in essence, a modern-rock translation of Gentle Giant's compositional ethos: intricate, interlocking parts that demand ensemble precision, wrapped in a production aesthetic that owes more to industrial and electronica than to the Canterbury scene. 'Happy with What You Have to Be Happy With' is practically a rewrite of 'Knots', the same verbal-musical puzzle-box logic, the same delight in making complexity sound like play. <u>That Robert Fripp could arrive at the same destination from such a radically different starting point, decades later, speaks to something irreducible in his musical thinking.</u>

    One can hear Trey Gunn's Warr Guitar and Pat Mastelotto's electronically augmented drumming straining against each other throughout, and Mastelotto's visible lack of confidence in his own playing manifests in heavy digital editing, a quantisation and post-production correction that smooths out the human imperfections a live take would have preserved. It is a minor blemish on an otherwise extraordinary record. This is, bar none, the finest King Crimson album of the post-1980s era, a record that proves the band's relevance was never contingent on any single lineup or decade but on Fripp's capacity to metabolise whatever musical language surrounds him and reconstitute it as something unmistakably Crimson.

- title: "THRAK"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1995
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/thrak.jpg"
  posted: "2021-08-08"
  text: |
    The Mk4 incarnation of King Crimson bears almost no audible resemblance to the band that made *In the Court of the Crimson King* or *Red*. ***THRAK*** is, by any objective metric, probably a four-star album: the lyrics meander, the funk passages lack the rhythmic specificity and groove-intelligence that dedicated funk acts of the 1990s brought to the form. And yet, arriving at this record after enduring the three preceding pop-inflected albums, the so-called 'red, blue, and yellow' trilogy that tested the patience of anyone who had loved the 1970s material, the sheer relief of hearing Fripp plugged back into something heavy and angular was enough to transform competence into revelation.

    <u>The ghost of <em>Larks' Tongues in Aspic</em> flickers through 'VROOOM VROOOM', audible in the jagged intervallic leaps and the sense of controlled violence that defined Crimson's best work.</u> If one skips the three pop records entirely, as one probably should, King Crimson's evolution from the progressive complexity of the 1970s to the industrial density of the 1990s feels surprisingly organic, a natural mutation rather than a rupture. ***THRAK*** is not the band's finest hour, but it is the hour that proved the band still had hours worth having.

- title: "Discipline"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1981
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/discipline.jpg"
  posted: "2021-08-08"
  text: |
    The discourse around ***Discipline*** tends to invoke a vaguely defined 'KC aesthetic' that somehow encompasses everything from mellotron-drenched psychedelia to gamelan-inflected minimalism, a phrase so elastic it ceases to mean anything. What the album does offer, concretely, is a set of genuine technical innovations: the Chapman Stick, handled by Tony Levin with a melodic intelligence that made it sound like a new instrument rather than a novelty, and a guitar interplay between Fripp and Belew that treats rhythm as a textural rather than merely timekeeping concern. <u>The art-rock sensibility remains potent; the timbral experimentation is as adventurous as anything in the Crimson catalogue.</u>

    But the absence of a dedicated keyboard voice leaves a harmonic void that no amount of interlocking guitar lines can fully fill. The melodic dimension suffers as a consequence. Where earlier Crimson records could build cathedrals of sound through layered keys and Mellotron, ***Discipline*** operates in a narrower registral band, brilliant in its rhythmic and timbral invention but constrained in its capacity for the kind of soaring, harmonically rich passages that defined the band's 1970s peak.

- title: "Sonder"
  type: "music"
  creator: "TesseracT"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/sonder.jpg"
  posted: "2021-08-08"
  text: |
    Not a single moment of disappointment across ***Sonder***'s runtime, which is a claim one cannot make lightly about any progressive metal record. Even 'Smile', the track most likely to be accused of lacking dynamic range, compensates with syncopation patterns that make *Errai*-era material sound rhythmically pedestrian by comparison. The rhythmic writing throughout is meticulous: polyrhythmic layers that never feel academic, that serve the emotional arc of each song rather than existing as demonstrations of technical facility.

    <u>The melodic writing on this album reaches an apex that TesseracT have not matched since.</u> Having sampled the singles from the subsequent *P O R T A L S*, I can confirm that ***Sonder*** surpasses it melodically, which makes this record feel less like a waypoint and more like a summit. 'Juno', 'Beneath My Skin', even 'Luminary', these are compositions that imprint themselves on the listener's memory after a single exposure, melodies so precisely calibrated that they feel inevitable rather than invented. The mark of a truly great prog metal record is that its complexity becomes invisible on repeated listens, and ***Sonder*** achieves this with an ease that borders on the uncanny.

- title: "One"
  type: "music"
  creator: "TesseracT"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/one.jpg"
  posted: "2021-08-07"
  text: |
    Apart from the low end on 'Sunrise' being mixed a touch too hot, crowding the sub-bass frequencies in a way that muddies an otherwise crystalline stereo image, ***One*** is the apex of prog metal and djent production. <u>The mix is a masterclass in clarity without sterility, every instrument occupying its own spectral and spatial territory with surgical precision.</u> The drum tones alone, dry and immediate yet never thin, would justify study by anyone working in the genre.

    'Concealing Fate' by itself would earn this record five stars; the remaining tracks simply confirm that the standard is not an anomaly but a baseline. The guitar tones sit in that narrow sweet spot between the organic warmth of a cranked valve amp and the controlled aggression of modern high-gain processing, and the vocal production gives Daniel Tompkins's voice exactly the space it needs to move between registers without ever sounding artificially boosted. One listens and simply knows.

- title: "Concealing Fate"
  type: "music"
  creator: "TesseracT"
  creator_role: "by"
  year: 2010
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/concealing_fate.jpg"
  posted: "2021-08-07"
  text: |
    Anyone immersed in the prog metal scene understands the genre's perennial vocal problem: bands capable of extraordinary instrumental complexity paired with singers who range from adequate to actively unpleasant. Dream Theater had LaBrie in his early prime. Rush had Geddy Lee, whose nasal tenor became an acquired taste that rewarded acquisition. In the contemporary landscape, Uneven Structure and Opeth field vocalists of genuine distinction; Haken's Ross Jennings and Leprous's Einar Solberg each bring something remarkable. <u>But none of them, Jennings perhaps excepted, possess a clean upper register as luminous as Daniel Tompkins's, and none achieve the seamless integration of harsh and melodic vocals that defines his art.</u>

    ***Concealing Fate*** is the proof of concept. 'Concealing Fate Part 2' alone demolishes any scepticism about whether extreme metal and genuine vocal beauty can coexist in the same phrase, let alone the same song. Tompkins moves between guttural aggression and soaring melody not as a contrast or a trick but as a continuous spectrum, the way a cellist moves between col legno and cantabile without the audience ever feeling a seam. The EP established TesseracT not merely as technically proficient but as emotionally articulate, and in prog metal, emotional articulation is the rarest virtuosity of all.

- title: "Red"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/red.jpg"
  posted: "2021-08-07"
  text: |
    By 1974, Robert Fripp had perfected a kind of aesthetic alchemy: the ability to take improvisation and make it sound composed, to take funk and make it sound progressive, to take jazz and make it sound like the end of the world. ***Red*** is the culmination of this process, the record where every thread of King Crimson's restless experimentation converges into something approaching perfection.

    <u>'Starless' is one of the greatest compositions of the 1970s, and the fact that it is routinely overlooked in discussions of the decade's prog epics is baffling.</u> I recall listening to a prog report roundtable on favourite progressive epics and feeling genuine disbelief that nobody mentioned it. The piece builds from a melody of devastating simplicity through a middle section of mounting rhythmic and harmonic tension to a climax that feels less like a musical resolution than a physical event, something that happens to the listener's body as much as to their ears. ***Red*** is the sound of a band that knows it is about to disintegrate and channels that knowledge into music of ferocious, uncompromising beauty.

- title: "Starless and Bible Black"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1974
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/starless_and_bible_black.jpg"
  posted: "2021-08-07"
  text: |
    'Trio' occupies an odd position on ***Starless and Bible Black***: a piece of such studied Eastern-inflected minimalism that, coming from a group of British art-rock musicians, it teeters on the edge of what one might uncharitably call cultural appropriation. Yet within the Western experimental tradition, it has been received as a pinnacle of restraint and textural sensitivity, which tells one more about that tradition's blind spots than about the piece itself.

    <u>'Fracture' is the only track on the album that stands alongside King Crimson's first three records.</u> It is, in essence, a study in dynamics made flesh: the piece moves through extreme contrasts of volume, density, and intensity with such deliberate pacing that it becomes almost a pedagogical demonstration of what the word 'dynamics' means in a musical context. The remaining tracks are competent but unremarkable by the band's own extraordinary standards, the work of a group in transition between the baroque ambition of their early period and the streamlined ferocity of ***Red***.

- title: "Larks' Tongues in Aspic"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1973
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/larks_tongues_in_aspic.jpg"
  posted: "2021-08-07"
  text: |
    ***Larks' Tongues in Aspic*** marks the first album from a stabilised King Crimson lineup, and the growing pains are audible. The concept feels scattered, as though the band had accumulated more ideas than they had structures to contain them, and tracks like 'Talking Drum' exemplify a particular kind of early-1970s indulgence: <u>experimentation for its own sake, process mistaken for product.</u> The improvisatory passages lack the compositional rigour that would make them feel earned rather than merely exploratory.

    The two title tracks, 'Exiles', and 'Easy Money' are excellent, each one showcasing the new lineup's capacity for controlled intensity and harmonic adventurousness. But the gap between these peaks and the album's valleys is wider than on any other King Crimson record of the period. The lesser tracks are not bad in absolute terms; they are simply negligible when measured against the standard this band had already set, and would soon surpass on *Starless and Bible Black* and, decisively, on *Red*.

- title: "In The Wake Of Poseidon"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/in_the_wake_of_poseidon.jpg"
  posted: "2021-08-05"
  text: |
    ***In the Wake of Poseidon*** is an album of magnificent theft and generous prophecy. 'Pictures of a City' lifts its structure wholesale from '21st Century Schizoid Man'; 'The Devil's Triangle' borrows its rhythmic skeleton from Holst's 'Mars, the Bringer of War'. These are not subtle debts. And yet the album gives back more than it takes. <u>In 'Peace - an End', one can hear, decades early, the melodic DNA that Wanqing would later absorb into the fabric of Chinese indie rock; in 'Cat Food', the atmospheric textures that Pink Floyd would spend the next several years refining into their own idiom.</u>

    This is the paradox of King Crimson at their best: even when they are openly recycling, they are simultaneously inventing futures that other artists will spend years catching up to. ***In the Wake of Poseidon*** is a bridge album in the most literal sense, connecting the explosive debut to the increasingly experimental records that would follow, and in the process scattering seeds that would germinate in entirely unexpected soil. It is transitional work, yes, but transitional in the way a nerve impulse is transitional: carrying something essential from one place to another.

- title: "In The Court Of The Crimson King"
  type: "music"
  creator: "King Crimson"
  creator_role: "by"
  year: 1969
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/in_the_court_of_the_crimson_king.jpg"
  posted: "2021-08-05"
  text: |
    Everything begins in the summer of 1969. What followed, the decade-plus of progressive rock that constitutes Western popular music's most ambitious chapter, traces its origins to a single moment: King Crimson opening for the Rolling Stones in Hyde Park, July 1969, unleashing a solo so audacious that it redefined what a rock band could be. <u><b><i>In the Court of the Crimson King</i></b> is not merely a landmark; it is a detonation, the shockwave from which is still propagating half a century later.</u>

    How avant-garde was it? Avant-garde enough that djent, a subgenre that would not coalesce for another forty years, can be heard in embryonic form in those opening salvos. The polyrhythmic, palm-muted aggression that Meshuggah and Periphery would codify as a genre in the 2000s is already present here, not as a stylistic choice but as a natural consequence of musicians thinking beyond the constraints of their era. One listens now and hears not just a great album but an entire genealogy compressed into forty-four minutes. The future was all there, waiting to be unpacked.

- title: "Synapse"
  type: "music"
  creator: "Spring Offensive"
  creator_role: "by"
  year: 2014
  eval: "hated"
  genre: "indie rock"
  image: "/assets/images/music/synapse.jpg"
  posted: "2021-08-02"
  text: |
    I was prepared to grant ***Synapse*** two stars on the basis of mere inoffensiveness, but the track titles forced a downgrade. Dopamine, serotonin, synapses: the neuroscientific vocabulary is scattered across the album like confetti, bearing no discernible relationship to the music it purports to describe. Compare this with Blotted Science's *The Machinations of Dementia*, an album that actually engages with neuroscience at the level of compositional structure, mapping neural processes onto musical form with genuine rigour.

    Spring Offensive do the opposite. The melodies, such as they are, follow no coherent logic, no sense of directed motion or harmonic purpose. To call them melodies at all feels generous. There is no direction, no developmental arc, just a succession of notes that happen to occur in sequence. <u>When a band names its work after the architecture of cognition and then produces music that exhibits none of cognition's organising principles, the irony writes itself.</u>

- title: "Universal Language"
  type: "music"
  creator: "Angel Vivaldi"
  creator_role: "by"
  year: 2011
  eval: "hated"
  genre: "progressive metal"
  image: "/assets/images/music/universal_language.jpg"
  posted: "2021-08-02"
  text: |
    I harbour a reasonable suspicion that the entire ecosystem of instrumental prog guitarists, Scale the Summit, Sergey Golovin, Angel Vivaldi, and their orbit, listens exclusively to one another. It would explain the insularity, the way their melodic writing has converged on a narrow band of acceptable shapes that sound impressive in isolation and interchangeable in aggregate. ***Universal Language*** is a product of this closed loop.

    <u>A cohort of technically dazzling musicians with melodic instincts that are, frankly, abysmal.</u> The shredding is immaculate; the phrasing is vacant. Every solo is a demonstration of facility and an absence of taste. This is neo-prog's great paradox: a movement defined by instrumental virtuosity that has somehow produced a generation of players who can execute anything and say nothing.

- title: "Entities"
  type: "music"
  creator: "Pomegranate Tiger"
  creator_role: "by"
  year: 2013
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/entities.jpg"
  posted: "2021-07-30"
  text: |
    The debut from this Canadian prog metal outfit, led by the multi-instrumentalist Martin Andre, who has built a modest but deserved following through his YouTube demonstrations. The first half of ***Entities*** wobbles on its melodic legs: 'Stars', in particular, suffers from sweep-picking passages that feel self-justifying, arpeggiated runs deployed for their own kinetic thrill rather than integrated into the harmonic context of the song. It is sweeping for the sake of sweeping, a problem that plagues prog metal debuts with depressing regularity.

    But from the 'Ocean' suite onward, the album transforms. The compositions deepen, the technical fireworks begin serving the emotional narrative rather than interrupting it, and the arrangements acquire a patience and spaciousness that the earlier tracks lacked. <u>The closing track, 'Regenesis', with its orchestral strings layered over acoustic guitar, is the perfect valediction: a moment of earned stillness after an album of relentless motion.</u> It is an ending that retroactively improves everything that came before it, casting the album's uneven first half as necessary prologue rather than mere stumbling.

- title: "Spiritual Instinct"
  type: "music"
  creator: "Alcest"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "post-metal"
  image: "/assets/images/music/spiritual_instinct.jpg"
  posted: "2021-07-28"
  text: |
    *Kodama* remains the high-water mark for Alcest, the point at which Neige's blackgaze vision achieved its most complete realisation. ***Spiritual Instinct*** reaches toward that standard without quite grasping it. 'Les jardins de minuit' approaches the melodic heights of *Kodama*'s 'Je suis d'ailleurs', its central motif carrying the same aching luminosity, but something in the surrounding atmosphere falls short, a difference not of craft but of whatever ineffable quality separates a great song from a transcendent one.

    The phenomenon is familiar: This Will Destroy You never recaptured the devastating beauty of their self-titled album; Explosions in the Sky spent years chasing the catharsis of *The Earth Is Not a Cold Dead Place*. <u>Some records are not peaks in a career trajectory but singularities, unrepeatable alignments of inspiration and circumstance.</u> *Kodama* may be Alcest's singularity. ***Spiritual Instinct*** is the sound of a band orbiting that moment, close enough to feel its gravitational pull but never quite achieving escape velocity in the opposite direction, never quite breaking free into something entirely new.

- title: "Lost Not Forgotten Archives: A Dramatic Tour of Events - Select Board Mixes"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/lost_not_forgotten_archives_2.jpg"
  posted: "2021-07-27"
  text: |
    ***Lost Not Forgotten Archives: A Dramatic Tour of Events - Select Board Mixes*** is a marked improvement over the previous Archives instalment, and the reason is simple: someone finally exercised curatorial restraint in the setlist. The tracks here are ones LaBrie can actually sing well, which makes an enormous difference to the live experience. Dream Theater's archival releases have always been uneven, caught between completionism and quality control, but this one tilts toward the latter.

    <u>The London performance of 'Peruvian Skies' is the highlight, with Rudess layering what sounds unmistakably like a Mellotron patch over the arrangement, lending a warmth and analogue texture that the studio version never quite achieved.</u> There is a passage in the middle that veers into something funky, almost fusion-adjacent, a rhythmic detour that reminds one how much range this band has when it stops trying to be impressive and simply plays. The inclusion of 'Count of Tuscany' feels like a statement of intent; if this is the trajectory, *Octavarium* material should surface in the next volume. One can hope.

- title: "The Colourless Sunrise"
  type: "music"
  creator: "Prospekt"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/colourless_sunrise.jpg"
  posted: "2021-07-26"
  text: |
    ***The Colourless Sunrise*** is formulaic neo-prog metal, competent in its broad strokes but conspicuously rough at the seams. The structural debt to Dream Theater and Opeth is obvious, and the keyboard work sits squarely in Jordan Rudess's string-pad idiom, to the point where one could mistake certain passages for B-sides from *Scenes from a Memory*. The technical facility is there, which is precisely what makes the carelessness frustrating: in the bridge of 'Visions', a repeating piano motif clashes against the bass note with a sharp dissonance that is clearly unintentional. <u>It is an error that betrays a band writing by template rather than by ear.</u>

    The good news is that the fix is straightforward. Prospekt have the chops; what they lack is the editorial instinct to catch these moments before they reach the master. Neo-prog metal lives or dies on its details, on whether the harmonic language in a quiet passage can bear the weight of scrutiny the way the shredding sections never have to. One hears a band that could be good if it learned to listen to its own arrangements with colder ears.

- title: "Meet the Residents"
  type: "music"
  creator: "The Residents"
  creator_role: "by"
  year: 2018
  eval: "meh..."
  genre: "avant-garde"
  image: "/assets/images/music/meet_the_residents.jpg"
  posted: "2021-07-26"
  text: |
    One can acknowledge that ***Meet the Residents*** matters historically without pretending it matters musically. The Residents went on to become a disruptive force, but this debut is a record whose reputation is built almost entirely on what came after it. Taken on its own terms, it is formless, scattered, and frankly unremarkable. Anyone who has spent even a few hours in a DAW could produce something comparable; granted, there were no DAWs in 1974, but a tape recorder and a handful of instruments were sufficient, and the results here suggest that sufficiency was the ceiling.

    <u>The album shares the same aimless energy as the band's earlier unreleased materials, which is not the compliment it might sound like.</u> The real work begins with the records that followed, where The Residents discovered that provocation requires structure to land. This one is provocation without architecture: noise that has not yet learned what it wants to be.

- title: "Primus & The Chocolate Factory with the Fungi Ensemble"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 2014
  eval: "meh..."
  genre: "alternative rock"
  image: "/assets/images/music/primus_and_the_chocolate_factory_with_the_fungi_ensemble.jpg"
  posted: "2021-07-26"
  text: |
    ***Primus & The Chocolate Factory with the Fungi Ensemble*** abandons accessibility entirely in favour of experiment, but the experiment never coheres. <u>Without Herb Alexander behind the kit, something fundamental is missing from the engine room, and Claypool and LaLonde prove unable to write convincingly in the experimental register on their own.</u> The compositional energy ends up displaced almost entirely onto the lyrics, which is not where Primus has ever been strongest in structural terms.

    The 'Oompa' suite is witty, 'Oompa TV' in particular landing its satirical jabs with the band's characteristic absurdist flair. But lyrical cleverness cannot compensate for the thinness of the musical ideas underneath. Set against the rest of the catalogue, this is the bottom of the pile, a record that mistakes the absence of hooks for the presence of daring.

- title: "Antipop"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 1999
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/antipop.jpg"
  posted: "2021-07-26"
  text: |
    So much good slapping. ***Antipop*** consolidates the groove-based compositional approach that emerged on the *Brown Album*, and it does so with a confidence that borders on swagger. The bass tone is enormous, the pocket is deep, and Claypool sounds like he is having more fun than he has had in years. <u>What the album sacrifices in experimentation it repays in sheer rhythmic force; every track locks into its groove with the precision of a lathe.</u>

    Whether this still qualifies as prog is debatable. The restless structural ambition of the earlier records has settled into something more muscular and direct, something closer to, if such a genre exists, pop-funk metal. The term feels absurd, but so does Primus, and the fit is better than anything else on offer. One does not come to this record for surprise; one comes for the satisfaction of watching three musicians ride a groove until it begs for mercy.

- title: "Brown Album"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 1997
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/brown_album.jpg"
  posted: "2021-07-26"
  text: |
    ***Brown Album*** was my first Primus record, and it remains a strange entry point into the catalogue. Herb Alexander had just departed, replaced by Bryan 'Brain' Mantia, whose drumming is noticeably less nimble; his cymbal work in particular lacks Herb's lightness of touch, that ability to make complex patterns sound effortless. But Claypool's bass is monolithic enough to carry the weight.

    <u>The whole album feels as though Claypool and LaLonde sat down with fifteen grooves and then figured out how to expand each one into a full composition after the fact.</u> There is something refreshingly honest about that method: the groove is the seed, and the song is the organism that grows around it. The results are uneven, inevitably, but the best moments have a locked-in intensity that only groove-first writing can produce.

- title: "Tales From the Punchbowl"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 1995
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/tales_from_the_punchbowl.jpg"
  posted: "2021-07-25"
  text: |
    If on earlier records Herb Alexander's drumming served primarily as a metronome for Claypool and LaLonde, ***Tales From the Punchbowl*** is where he finally plays like a prog drummer. On 'Over the Electric Grapevine' and 'Southbound Pachyderm', the snare is practically the only element still anchoring the pulse; the kick, toms, and cymbals have been liberated entirely, syncopation cascading through the kit with an abandon that would sit comfortably on a Porcupine Tree record. Claypool's bass writing recalls the band's first two albums in its harmonic restlessness, but the revelation here is LaLonde's guitar work. <u>The chord progressions are more melodic, more immediately graspable, without ever sacrificing the underlying weirdness that makes Primus what it is.</u>

    'Southbound Pachyderm' is the centrepiece: strip away the characteristically silly lyrics and what remains is indistinguishable from prog in the fullest sense. The guitar tone and harmonic movement build an atmosphere that ranks among the finest the band has produced. <u>There is a maturity here that never announces itself, a willingness to let mood do the work that riffs used to do alone.</u> The album is proof that Primus could write beautifully when it chose to, and that the choice was always deliberate.

- title: "Pork Soda"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 1993
  eval: "liked"
  genre: "alternative rock"
  image: "/assets/images/music/pork_soda.jpg"
  posted: "2021-07-25"
  text: |
    Claypool's bass on 'Wounded Knee' is so close to Geddy Lee's tone that one half-expects a *Hemispheres*-era synth line to materialise over the top. ***Pork Soda*** sits a clear step below the two records that preceded it, and the weakness is localised almost entirely in LaLonde's guitar. <u>The eccentricity that defined his playing on <em>Frizzle Fry</em> and <em>Sailing the Seas of Cheese</em>, that oblique, angular quality that made Primus's harmonic language alien, is largely absent here.</u>

    The album is not bad; it is simply ordinary by the band's own extraordinary standards. When one has heard what LaLonde is capable of writing, hearing him coast is its own kind of disappointment.

- title: "Sailing The Seas Of Cheese"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 1991
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/sailing_the_seas_of_cheese.jpg"
  posted: "2021-07-25"
  text: |
    'Jerry Was a Racecar Driver', 'Tommy the Cat', and 'Those Damned Blue-Collar Tweekers' contain some of the most exquisite bass lines in the history of rock music. On ***Sailing the Seas of Cheese***, Les Claypool takes a six-string bass and coaxes from it tones that Rush, for all their technical mastery, never managed to find. <u>The slap is percussive but never abrasive; the fingerstyle passages flow with a liquidity that makes the instrument sound as though it were designed for melody first and rhythm second.</u>

    This is the record that crystallised Primus's cult prog/alt identity, the moment the band stopped being a curiosity and became a genre of one. The label 'funk metal' has been applied often enough, but it is a misnomer born of laziness: having a prominent bass does not make something funk, and Primus's rhythmic DNA owes far more to prog's odd metres and art rock's structural irreverence than to anything Parliament ever did. <u>What Claypool built here is a sound that remains, three decades on, entirely without imitators.</u>

- title: "Frizzle Fry"
  type: "music"
  creator: "Primus"
  creator_role: "by"
  year: 1990
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/frizzle_fry.jpg"
  posted: "2021-07-25"
  text: |
    The Rush 'YYZ' quotation that opens the record, the extended syncopation workout of 'Mr. Knowitall', the darkly comic lyricism of 'Harold of the Rocks': ***Frizzle Fry*** arrives fully formed in a way that debut albums almost never do. The stylistic vocabulary that would define Primus for the next decade is already here, locked and loaded, the angularity of the guitar work meshing with Claypool's bass in patterns that feel less composed than discovered, as though these grooves had always existed and simply needed someone perverse enough to play them.

    <u>In the nearly thirty-two years since its release, not a single band has successfully replicated what Primus does.</u> There have been imitators, inevitably, but imitation requires understanding the source, and Primus's sound resists understanding by design. Les Claypool, Larry LaLonde, and Herb Alexander wrote their names into rock history with this record, not through virtuosity alone, though the virtuosity is remarkable, but through the sheer unreproducibility of the thing they made.

- title: "Tales Of Mystery & Imagination"
  type: "music"
  creator: "The Alan Parsons Project"
  creator_role: "by"
  year: 1976
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/tales_of_mystery_and_imagination.jpg"
  posted: "2021-07-24"
  text: |
    Having worked through the full discography, ***Tales of Mystery & Imagination*** stands as the finest Alan Parsons Project album. Edgar Allan Poe's stories provide the ideal substrate for a prog concept record: the gothic atmosphere, the psychological claustrophobia, the sense of dread building toward revelation. Parsons and Woolfson metabolise the source material into something that is neither illustration nor adaptation but a parallel structure, music that captures the **feeling** of Poe without literalising his plots.

    'The Cask of Amontillado' is the signature moment: brass and strings swelling beneath a vocal so restrained it barely rises above a whisper, the contrast between orchestral grandeur and intimate delivery mirroring the story's own tension between civility and murder. <u>'The System of Doctor Tarr and Professor Fether' is particularly beautiful, its arrangement threading between playfulness and menace with a precision that few prog acts of the era could match.</u> Several passages across the album carry a faint Ligeti-like quality, clusters of sustained harmony that dissolve at the edges into something close to textural abstraction. For a band often dismissed as soft prog, this is work of genuine compositional ambition.

- title: "Toto IV"
  type: "music"
  creator: "Toto"
  creator_role: "by"
  year: 1982
  eval: "loved"
  genre: "pop rock"
  image: "/assets/images/music/toto_iv.jpg"
  posted: "2021-07-24"
  text: |
    One of the best pop rock albums ever made. ***Toto IV*** is a masterclass in the art of making complexity invisible. 'Rosanna', 'I Won't Hold You Back', 'Lovers in the Night', 'We Made It', 'Waiting for Your Love', 'Africa': the tracklist reads like a greatest-hits compilation, except it is a single studio album, and every one of these songs was written to sit alongside the others.

    <u>What sets Toto apart is their ability to fold prog and jazz chord progressions into pop rock so seamlessly that the listener never registers the harmonic sophistication at work.</u> The changes in 'Africa' are anything but simple, yet the song feels effortless, inevitable, as though no other melody could have existed over those chords. That is the hallmark of a band whose musicianship operates at a level where craft becomes transparent. They make hits the way session musicians make coffee: without apparent effort, and better than anyone else in the room.

- title: "Fly With the Wind"
  type: "music"
  creator: "McCoy Tyner"
  creator_role: "by"
  year: 1991
  eval: "loved"
  genre: "jazz"
  image: "/assets/images/music/fly_with_the_wind.jpg"
  posted: "2021-07-20"
  text: |
    'Beyond the Sun' is the finest slow movement and string arrangement Tyner had produced to that point. ***Fly With the Wind*** finds him in an expansive mood, the piano no longer hammering its way through post-bop conventions but floating, stretching, allowing space for the ensemble to breathe. The orchestral settings never overpower the trio; they amplify the emotional register without cluttering the harmonic space, a balance that most jazz-orchestral crossovers fail to achieve.

    <u>'Rolem' is something else entirely: midway through the track, Ron Carter takes a double bass solo of such authority that the rest of the ensemble seems to recede into the walls.</u> Carter's discography is so vast it borders on the mythological; a quick search confirms over two thousand recording credits. But even within that formidable body of work, this solo stands out. 'Rolem' may be the finest non-solo Tyner composition I have encountered so far, a piece where the leader's genius lies precisely in knowing when to cede the floor.

- title: "Sahara"
  type: "music"
  creator: "McCoy Tyner"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "jazz"
  image: "/assets/images/music/sahara.jpg"
  posted: "2021-07-19"
  text: |
    A breakthrough is a breakthrough, and one knows it the moment it arrives. On ***Sahara***, that moment comes in 'Ebony Queen', the instant Sonny Fortune's saxophone enters the mix. Something shifts irreversibly: the dynamics, the scale, the sheer ambition of what Tyner is attempting. <u>It sounds as though he took everything he discovered in the solitary intensity of <em>Echoes of a Friend</em> and transplanted it wholesale into a full ensemble context, losing nothing in the translation.</u>

    The instrumentation is extraordinary: saxophone, trumpet, shakuhachi, all woven into a rhythmic fabric that keeps finding new ways to surprise. The title track in particular plays with metre and accent in ways that feel unpredictable, the rhythm section refusing to settle into any pattern long enough for the listener to anticipate the next bar. <u>This is Tyner at the peak of his powers, composing with the confidence of someone who has realised that no palette is too large for him to control.</u> Masterful.

- title: "Nights of Ballads and Blues"
  type: "music"
  creator: "McCoy Tyner"
  creator_role: "by"
  year: 1963
  eval: "loved"
  genre: "jazz"
  image: "/assets/images/music/nights_of_ballads_and_blues.jpg"
  posted: "2021-07-18"
  text: |
    The personnel here reads like a map of the constellation forming around John Coltrane: Lex Humphries on drums, Steve Davis on double bass, both of whom would go on to perform with Coltrane. ***Nights of Ballads and Blues*** is a far gentler record than Tyner's debut *Inception*, the melodic sensibility foregrounded in a way that the earlier album's post-bop intensity did not always permit.

    The playing is, in a word, elegant. There is no other term that captures what Tyner does here. Yet even within this softer palette, flashes of the debut's fire surface: in 'Groove Waltz', one hears the same fluid sixteenth-note runs that made 'Blues for Gwen' so arresting on *Inception*, <u>those cascading phrases where each note seems to arrive at precisely the moment one's ear begins to expect it, as though fluency itself were a form of argument.</u> The transition from *Inception* to this album maps a young musician discovering that tenderness can be as technically demanding as fury.

- title: "Inception"
  type: "music"
  creator: "McCoy Tyner"
  creator_role: "by"
  year: 1962
  eval: "loved"
  genre: "jazz"
  image: "/assets/images/music/inception.jpg"
  posted: "2021-07-18"
  text: |
    The master's debut. ***Inception*** opens with credentials that read like a who's-who of the era's finest: Elvin Jones on drums, the same Elvin Jones who would anchor the John Coltrane Quartet, and Art Davis on double bass, a man who combined a career as a psychology professor with performances alongside Coltrane. The personnel alone signals that Tyner was operating in rarefied air from the very start.

    <u>On 'Blues for Gwen', Tyner plays runs of equal-duration notes that flow like a stream over smooth stones, each one placed with such effortless inevitability that the technical difficulty becomes invisible.</u> I cannot quite articulate what produces that sensation of fluidity; it is not merely speed, and not merely evenness, but something closer to the musical equivalent of laminar flow, a current that carries no turbulence. The style here is noticeably different from what Tyner would develop later, less percussive, more lyrical, more indebted to the ballad tradition. I am curious to hear how the voice evolves.

- title: "ObZen"
  type: "music"
  creator: "Meshuggah"
  creator_role: "by"
  year: 2008
  eval: "loved"
  genre: "extreme metal"
  image: "/assets/images/music/obzen.jpg"
  posted: "2021-07-16"
  text: |
    ***ObZen*** is the album that carried djent out of the metal underground and into the broader musical consciousness, touching rock, metal, and even jazz communities in the process. What distinguishes it from Meshuggah's earlier work is an unexpected quality: groove. The riffs are no less complex, but they are more **immediately physical**, more willing to let a pattern lock in and ride. 'Pravus' is so rhythmically infectious that one can internalise Tomas Haake's drum pattern after a single listen, which for Meshuggah is practically pop songwriting.

    The album's range is remarkable. 'Dancers to a Discordant System' closes with an outro that could sit on an Opeth record: a high guitar drone suspended over a bass groove pitched so low it barely registers as notes, more a seismic vibration than a riff. <u>'Bleed' is among their finest work; the guitar droning is breathtaking in both tone and mix, the layers of distortion balanced with a clarity that lesser engineers would have let collapse into mud.</u> This was also Haake's return to acoustic drums after years of triggered kits, and while the tonal difference on record is marginal, watching him perform 'Bleed' live, every polyrhythmic subdivision executed by human limbs, remains one of the most awe-inspiring sights in modern drumming.

- title: "Nothing"
  type: "music"
  creator: "Meshuggah"
  creator_role: "by"
  year: 2002
  eval: "loved"
  genre: "extreme metal"
  image: "/assets/images/music/nothing_2.jpg"
  posted: "2021-07-16"
  text: |
    This is not a criticism of Fredrik Thordendal, but the 2006 remaster of ***Nothing*** makes a compelling case for Dick Lovgren's bass. Where Thordendal's original low end was functional, Lovgren's tone is thicker, more textured, and in several tracks it sits significantly further forward in the mix, occupying space that the 2002 version left vacant. <u>The melodic content is unchanged, but the revised low-frequency presence transforms the album's centre of gravity, lending weight to passages that previously floated.</u>

    Tomas Haake's triggered drum kit sounds indistinguishable from his earlier performances in terms of precision, which is both a compliment and a commentary on how machine-like his playing has always been. The remaster does not reinvent the album; it completes it, filling in the sub-bass architecture that the original mix only sketched.

- title: "Catch ThirtyThree"
  type: "music"
  creator: "Meshuggah"
  creator_role: "by"
  year: 2005
  eval: "liked"
  genre: "extreme metal"
  image: "/assets/images/music/catch_thirtythree.jpg"
  posted: "2021-07-16"
  text: |
    ***Catch ThirtyThree*** may be the weakest entry in Meshuggah's catalogue, and the reason is rhythmic rather than structural. The riffs have decelerated, and in a band whose identity is built on the sensation of relentless forward motion, slower riffs feel not like restraint but like entropy. Passages such as 'Entrapment' give the impression that Haake is counting beats rather than feeling them, the groove mechanical in the pejorative sense.

    <u>Set against <em>ObZen</em> or <em>Nothing</em>, both of which generate a breathless, almost overwhelming density of rhythmic information, this album feels strangely inert.</u> The tuning drops even lower than before, pushing the guitars into a register where pitch becomes ambiguous and riffs lose definition. The next reissue of *Nothing* in 2006 would course-correct, but here Meshuggah sounds like a band testing the limits of minimalism and finding that some limits exist for a reason.

- title: "Chaosphere"
  type: "music"
  creator: "Meshuggah"
  creator_role: "by"
  year: 1998
  eval: "loved"
  genre: "extreme metal"
  image: "/assets/images/music/chaosphere.jpg"
  posted: "2021-07-16"
  text: |
    Nearly fifty minutes of prog metal that refuses to let one breathe. ***Chaosphere*** is Meshuggah at their most physically punishing, the mix an improvement on *Destroy Erase Improve*, which was itself likely the album that first brought the band to wider attention. Everything sits with surgical clarity: the guitars occupy their own frequency band, the bass rumbles beneath without muddying the low mids, and Haake's drums cut through the wall of distortion with an almost clinical precision.

    <u>The syncopation in 'Sane' and 'The Exquisite Machinery of Torture' belongs to a category of rhythmic complexity that no other band has convincingly replicated.</u> It is not merely that the patterns are difficult; it is that they are **alien**, built on subdivisions that the human ear cannot easily parse into familiar groupings. One listens and simply cannot imagine how these compositions were written, let alone performed. Staggering.

- title: "Contradictions Collapse"
  type: "music"
  creator: "Meshuggah"
  creator_role: "by"
  year: 1991
  eval: "loved"
  genre: "extreme metal"
  image: "/assets/images/music/contradictions_collapse.jpg"
  posted: "2021-07-15"
  text: |
    The number of prog acts whose debut albums arrive this fully formed can be counted on one hand, and Meshuggah belong unequivocally among them. ***Contradictions Collapse*** still carries traces of Metallica's influence that would be scrubbed clean from everything that followed, a residual thrash-metal muscularity in the riffing and in Jens Kidman's vocal delivery, which here sits much closer to conventional thrash than the weaponised bark he would later develop. But the signature is already unmistakable. <u>The back half of 'Cadeverous Mastication' unleashes a volley of syncopation so dizzying it reads less as a riff than a perceptual stress test, and the guitar staccato in 'Humiliative' announces a rhythmic vocabulary that no other band on the planet was even attempting.</u> Both techniques would only sharpen and complexify across subsequent records, but their presence here, in a debut, is startling.

    Tomas Haake's drumming is, even at this early stage, beyond reproach. The man plays with the mechanical precision of a sequencer and the musicality of someone who has internalised jazz phrasing so deeply it has become instinct. <u>Every jazz and funk outfit on the planet ought to be studying Meshuggah's approach to syncopation.</u> That is not hyperbole. The polyrhythmic lattice underpinning this record, the way the subdivisions stack and cancel and re-emerge, constitutes a masterclass in rhythmic architecture that most dedicated rhythm sections never achieve across an entire career. What makes *Contradictions Collapse* so rewarding to revisit is not simply that it predicted what Meshuggah would become, but that it already contained, in embryonic form, the argument that extreme metal's future lay not in speed or heaviness but in **time itself**.

- title: "Out of the Blue"
  type: "music"
  creator: "Electric Light Orchestra"
  creator_role: "by"
  year: 1977
  eval: "liked"
  genre: "pop rock"
  image: "/assets/images/music/out_of_the_blue.jpg"
  posted: "2021-07-14"
  text: |
    ***Out of the Blue*** is the ELO album that almost gets there and then, repeatedly, declines to. Consider 'Summer and Lightning': the intro builds with the kind of harmonic tension that suggests the band is finally about to let the prog instincts loose, that the chord progression is about to do something ELO. Then it doesn't. The prog energy defers to the next track, the inescapable 'Mr. Blue Sky', while 'Summer and Lightning' settles into the role of an inert transitional piece, squandering one of the record's best introductions. This pattern recurs across the double album with dispiriting regularity.

    <u>The frustration is proportional to the talent on display: Jeff Lynne clearly had the harmonic imagination to sustain a more adventurous record, and instead chose to dilute it across four sides of vinyl.</u> The orchestral arrangements remain gorgeous, the production is immaculate for 1977, and the singles are undeniable. But as a complete album experience, *Out of the Blue* suffers from a lack of editorial nerve, a willingness to pad where it ought to cut, to coast where it ought to climb. One leaves it admiring individual moments rather than the whole.

- title: "A New World Record"
  type: "music"
  creator: "Electric Light Orchestra"
  creator_role: "by"
  year: 1976
  eval: "loved"
  genre: "pop rock"
  image: "/assets/images/music/new_world_record.jpg"
  posted: "2021-07-14"
  text: |
    Returning to ***A New World Record*** after years away, it has quietly become my favourite ELO album. The I-v-iii progression in 'Above the Clouds' and its subsequent chromatic descension function almost as a harmonic thesis statement for the entire record, a defining character that recurs in various permutations across the tracklist. The timbre alone is gorgeous, but it is the structural intelligence beneath the beauty that arrests: <u>each verse opens with a vocal phrase so perfectly weighted it feels inevitable, a melodic writing that conceals its sophistication behind apparent simplicity.</u> The bassline navigates a i-iv-V movement, threading from minor to major with a fluency that dovetails with the vocal line and yet introduces the faintest shimmer of dissonance, a harmonic tension that never resolves so much as it transforms.

    What elevates this above ELO's other records is the consistency of melodic invention. Lynne's gift for melody is well documented, but here it operates at its most sustained and most varied, never repeating a trick, never relying on a single chord trick to carry an entire song. <u>The orchestral arrangements serve the songs rather than decorating them, every string part earning its presence through contrapuntal logic rather than textural padding.</u> This is ELO at the apex of its powers: populist enough to fill arenas, harmonically sophisticated enough to reward close listening for decades.

- title: "Face the Music"
  type: "music"
  creator: "Electric Light Orchestra"
  creator_role: "by"
  year: 1975
  eval: "liked"
  genre: "pop rock"
  image: "/assets/images/music/face_the_music.jpg"
  posted: "2021-07-14"
  text: |
    ***Face the Music*** represents a slight step down from the two records that bracket it, and the reason is largely harmonic conservatism. The chord progressions feel more formulaic here, leaning on familiar shapes where ELO's best work finds unexpected turns. Even 'Strange Magic', perhaps the album's most recognisable track, rides a single progression for minutes on end without the melodic invention needed to justify the repetition. After the previous album's tentative experiments with prog structures, Jeff Lynne appears to have retreated to safer territory.

    <u>what emerges is an album that functions beautifully as a collection of well-crafted pop songs but rarely transcends that description.</u> The orchestral integration remains polished, and Lynne's ear for vocal melody ensures that nothing here is actively weak. But the sense of playing it safe pervades the record, a reluctance to push that becomes its own quiet limitation. The next album would prove that the ambition had not disappeared, merely paused.

- title: "ELO 2"
  type: "music"
  creator: "Electric Light Orchestra"
  creator_role: "by"
  year: 2003
  eval: "loved"
  genre: "pop rock"
  image: "/assets/images/music/elo_2.jpg"
  posted: "2021-07-14"
  text: |
    Roy Wood's departure after an extraordinary debut could easily have been fatal, and the speed with which he left is still startling. What remained was Jeff Lynne's pop sensibility, and ***ELO 2*** is the record where he first demonstrated that this sensibility, wedded to orchestral arrangement, could produce something wholly singular. <u>Lynne had an almost alchemical gift for fusing 1970s pop songcraft with orchestral textures in a way that made neither feel subordinate to the other.</u> The heavy strings in 'Old England Town' carry real emotional weight, not the decorative lushness of a studio sweetener but something closer to chamber music repurposed for rock. 'Roll Over Beethoven' takes its irreverent premise and commits to it fully, the arrangement gleefully cannibalising classical motifs with an energy that borders on punk in its disregard for reverence.

    Then there is 'Kuiama'. Eleven minutes of orchestral arrangement at a level of sophistication that most prog bands with twice the lineup could not have attempted, anchored by a chord progressions that would become ELO's harmonic fingerprint: those unexpected movements, part pop, part late-Romantic, immediately identifiable even without the orchestration. <u>The combination of Lynne's progressions and the string arrangements creates a sound so distinctive that one can identify an ELO track within seconds, a rarer achievement than it might appear.</u> This record laid the foundation for everything the band would become.

- title: "No Answer"
  type: "music"
  creator: "Electric Light Orchestra"
  creator_role: "by"
  year: 1971
  eval: "liked"
  genre: "pop rock"
  image: "/assets/images/music/no_answer.jpg"
  posted: "2021-07-13"
  text: |
    ELO would never make anything this experimental again, and ***No Answer*** carries the charge of that singular recklessness. The album's compositional logic is fascinatingly bifurcated: half the record trades in the psychedelic and country-folk idioms still warm from the late 1960s, while the other half pushes confidently into the prog territory of the early 1970s. The stylistic range is enormous, and yet the record coheres, largely because Roy Wood approached both modes with an almost obsessive attention to detail. <u>The strings mesh with Lynne and Bevan's contributions like interlocking gears, a precision of arrangement that belies the record's experimental sprawl.</u> Wood's meticulousness stands in sharp contrast to many of his prog contemporaries, who too often mistook ambition for accomplishment.

    The lyrics, curiously overlooked in most accounts of this album, deserve mention. While *No Answer* does not function as a concept album in the strict sense, each track constructs its own small narrative world with real craft, a quality that the band's later, more pop-oriented records would largely abandon in favour of broader emotional gestures. This is a debut that contains its own future and knows it. The subsequent ELO catalogue would drift steadily towards the mainstream, but one can still hear the residual influence of this record's daring in the harmonic surprises and structural ambitions that even the poppiest later albums could never entirely suppress.

- title: "Subjects"
  type: "music"
  creator: "Leisure Theory"
  creator_role: "by"
  year: 2019
  eval: "hated"
  genre: "progressive rock"
  image: "/assets/images/music/subjects.jpg"
  posted: "2021-07-13"
  text: |
    What is remarkable about ***Subjects*** is not that it is bad but that it is bad in precisely the same way Leisure Theory have always been bad, with apparently no recognition of the pattern. After years of underperformance, the band still appears convinced that the problem lies in their choice of featured collaborators rather than in the songwriting itself. It does not. The problem has always been the melodies and the harmonisation, which remain crude and uninspired in a genre overflowing with examples of how to do both well.

    <u>To play prog metal in proximity to so many exemplary acts and learn nothing from any of them requires a special kind of obliviousness.</u> The riffs are generic, the vocal lines forgettable, the arrangements functionally indistinguishable from a dozen other bands operating at the genre's lowest tier. My most detested prog metal act, without qualification.

- title: "Innervisions"
  type: "music"
  creator: "Stevie Wonder"
  creator_role: "by"
  year: 1973
  eval: "liked"
  genre: "soul"
  image: "/assets/images/music/innervisions.jpg"
  posted: "2021-07-12"
  text: |
    ***Innervisions*** is not quite the mature masterpiece its reputation suggests, though one can hear why it broke through to a broader audience. Musically, several tracks still rely on the same chord progressions and extended motif repetition that characterised the earlier records, a tendency toward harmonic stasis that Stevie Wonder would not fully overcome until later in the decade. But the lyrical ambition has sharpened considerably: 'Visions' and 'He's Misstra Know-It-All' represent a marked leap in thematic sophistication compared to nearly everything that preceded them, with the notable exception of *Talking Book*.

    <u>The album's popular appeal is inseparable from its limitations: the repetition that frustrates on close listening is precisely what makes these songs stick on first encounter.</u> Wonder's ear for groove remained unerring, and the production, self-handled with increasing confidence, has a warmth and spaciousness that the earlier records lacked. The record sits at an interesting inflection point, still tethered to older habits but visibly straining towards something more ambitious. The strain itself is part of its character.

- title: "Talking Book"
  type: "music"
  creator: "Stevie Wonder"
  creator_role: "by"
  year: 1972
  eval: "meh..."
  genre: "soul"
  image: "/assets/images/music/talking_book.jpg"
  posted: "2021-07-11"
  text: |
    ***Talking Book*** contains two of the most recognisable songs in popular music, and neither 'Superstition' nor 'You Are the Sunshine of My Life' needs defending here. The clavinet line on 'Superstition' alone changed what was possible in rhythm-section arranging: a pattern so viscerally satisfying that its influence stretches from Parliament to Prince to every funk-inflected production since. 'Blame It on the Sun' is the deeper cut that rewards attention, a ballad of unusual harmonic sophistication whose chord movement stays restless and unresolved in ways that Wonder's balladry would not always attempt.

    But the album around these peaks is less consistent than its reputation suggests. 'Maybe Your Baby' loops a single progression for six minutes without the textural evolution that would later justify such lengths on *Innervisions* and *Songs in the Key of Life*. 'I Believe (When I Fall in Love It Will Be Forever)', despite its fervent vocal, circles without arriving. <u>Wonder in 1972 was building the sonic palette but had not yet acquired the album-as-statement discipline that would make the next three records extraordinary.</u> The singles are brilliant. The album is nearly there.

- title: "Where I'm Coming From"
  type: "music"
  creator: "Stevie Wonder"
  creator_role: "by"
  year: 1971
  eval: "meh..."
  genre: "soul"
  image: "/assets/images/music/where_im_coming_from.jpg"
  posted: "2021-07-11"
  text: |
    By 1971, even Stevie Wonder could not resist the siren call of the Mellotron and the gravitational pull of prog, and ***Where I'm Coming From*** is the resulting misfire: an album that belongs fully to neither his established style nor to the prog idiom it flirts with. The Mellotron textures sit uneasily against Wonder's vocal and rhythmic instincts, producing something that feels neither authentically him nor authentically progressive, a stylistic uncanny valley.

    'Something Out of the Blue' is good, a track where the experimental impulses and the songwriting gifts briefly align. <u>But one strong track does not redeem an album that otherwise sounds like a gifted artist trying on a costume that does not fit.</u>

- title: "Down to Earth"
  type: "music"
  creator: "Stevie Wonder"
  creator_role: "by"
  year: 1966
  eval: "liked"
  genre: "soul"
  image: "/assets/images/music/down_to_earth.jpg"
  posted: "2021-07-11"
  text: |
    ***Down to Earth*** is the first Stevie Wonder record I found listenable from front to back. 'Thank You Love' and 'Sixteen Tons' carry faint premonitions of the artist he would become, a rhythmic confidence and a melodic directness that the surrounding material only intermittently matches. The rest of the album still defaults to the familiar pattern of a single motif repeated across an entire track, the jazz-soul synthesis promised by the billing more aspiration than achievement.

    <u>Still, as a document of potential, it has its own quiet persuasiveness.</u> One listens knowing what is coming and hears, in scattered moments, the first stirrings of a vocabulary that would later produce extraordinary work. The gap between those moments and the filler surrounding them is the album's defining tension.

- title: "The Jazz Soul of Little Stevie"
  type: "music"
  creator: "Stevie Wonder"
  creator_role: "by"
  year: 1962
  eval: "disliked"
  genre: "soul"
  image: "/assets/images/music/jazz_soul_of_little_stevie.jpg"
  posted: "2021-07-10"
  text: |
    Youth is a mitigating factor but not an exculpating one, and ***The Jazz Soul of Little Stevie*** is, frankly, boring. Tracks like 'The Square' and 'Some Other Time' are ten-second ideas stretched to fill their runtime, technically unremarkable and melodically inert. There is no harmonic surprise, no rhythmic invention, nothing beyond the basic demonstration that a young Stevie Wonder could play multiple instruments.

    <u>As a calling card, it says 'I exist and I am versatile', and nothing more.</u> The album's sole function is biographical: it marks a starting point. As music, it offers almost nothing to return to.

- title: "Heavy Weather"
  type: "music"
  creator: "Weather Report"
  creator_role: "by"
  year: 1977
  eval: "liked"
  genre: "jazz fusion"
  image: "/assets/images/music/heavy_weather.jpg"
  posted: "2021-07-09"
  text: |
    One can immediately hear why ***Heavy Weather*** became Weather Report's most commercially successful record: tracks like 'Harlequin' and 'Palladium' are quintessential café fusion, polished and pleasant and entirely unthreatening. The production is warm, the performances are impeccable, and the grooves sit in exactly the register that makes background listening effortless. Jaco Pastorius's bass work, even in this accessible context, remains extraordinary, a reminder that virtuosity and listenability need not be mutually exclusive.

    <u>But the structures are almost oppressively conventional: three-part jazz fusion forms that could have been stamped from a template.</u> For a band whose earlier catalogue thrived on structural unpredictability, the tidiness here feels like a concession. *Heavy Weather* is fusion's version of a rock band's stadium album: slicker, louder, more immediately gratifying, and somehow less.

- title: "A Place to Dream"
  type: "music"
  creator: "Syncatto"
  creator_role: "by"
  year: 2016
  eval: "hated"
  genre: "progressive metal"
  image: "/assets/images/music/place_to_dream.jpg"
  posted: "2021-07-06"
  text: |
    'Beyond Imagination' is where the nightmare begins, and I say this without exaggeration: I have not heard a melody that physically revolting in years. One can practically picture the guitarist recording it with an expression of blissed-out self-satisfaction, entirely oblivious to the fact that every note lands like nails on a chalkboard. It is the Sergey Golovin school of unlistenability, a guitar tone and phrasing that induces actual goosebumps of revulsion.

    <u><b><i>A Place to Dream</i></b> is not merely bad; it is bad in a way that suggests its creators believe it to be transcendently beautiful, which makes it worse.</u> The gap between intention and execution has rarely yawned so wide.

- title: "Mr. Fantasy"
  type: "music"
  creator: "Traffic"
  creator_role: "by"
  year: 1967
  eval: "liked"
  genre: "rock"
  image: "/assets/images/music/mr_fantasy.jpg"
  posted: "2021-07-06"
  text: |
    ***Mr. Fantasy*** arrives in the same year as *Sgt. Pepper's* and carries a comparable sense of historical weight, even if its influence has been less universally acknowledged. The observation often made about 1967's psychedelic acts is apt: they operated under tighter commercial constraints than the prog bands that would follow in the early 1970s, often writing with one eye on the single rather than the album as a unified statement. Within those constraints, Traffic produced something remarkable. 'Coloured Rain', 'Dealer', and 'Heaven Is In Your Mind', along with the standalone single 'Paper Sun', are foundational tracks, a songs that established an entire sonic vocabulary for what psychedelic rock could become when it grew up.

    <u>Steve Winwood's voice, barely out of adolescence, already carried the authority of someone who understood that psychedelia's most potent effects came not from excess but from controlled strangeness.</u> The arrangements are tight and purposeful, never sprawling for the sake of it, and the interplay between organ, guitar, and flute anticipates the more structured experimentalism of the decade to come. A record that deserves its place among the foundational documents of its era.

- title: "The Way of the Animal Powers"
  type: "music"
  creator: "Zu"
  creator_role: "by"
  year: 2010
  eval: "meh..."
  genre: "noise rock"
  image: "/assets/images/music/way_of_the_animal_powers.jpg"
  posted: "2021-07-04"
  text: |
    ***The Way of the Animal Powers*** is, in the most literal sense, not impressive. The avant-garde toolkit is deployed with superficial competence: the dissonance is there, the textural abrasion, the refusal of conventional structure. All the signifiers of avant-garde legitimacy are present and accounted for. The problem is that avant-garde music, stripped of either emotional urgency or intellectual architecture, is simply unpleasant, and this record is frequently both.

    <u>I searched, with the last reserves of goodwill, for some underlying narrative or conceptual framework that might retroactively organise the chaos into meaning. There was none.</u> The noise remains noise, which is perhaps the most damning thing one can say about an album that so clearly aspires to be more.

- title: "The Sale"
  type: "music"
  creator: "Crack the Sky"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/sale.jpg"
  posted: "2021-07-01"
  text: |
    Joe Macre's return to ***The Sale*** brings with it a welcome resurgence of the bassline writing and rock-inflected prog sensibility that defined Crack the Sky's 1970s peak. The band's signature style, that peculiar alloy of hard rock grit and progressive harmonic ambition that has always set them apart, is fully operational here, and Macre's bass sits in the mix with the authority of someone who never forgot the idiom. Glenn Workman's synthesiser work is a genuine surprise: having joined only in 1998, his playing here shows a command of the instrument and the band's aesthetic that belies his relatively recent tenure.

    <u>As comeback albums go, <em>The Sale</em> succeeds by doing the simplest and rarest thing: sounding like the band remembers who they are.</u> There is no awkward attempt at modernisation, no concession to trends, just a group of seasoned musicians returning to a style they built and finding it still fits.

- title: "The Only Constant"
  type: "music"
  creator: "Ebonivory"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/only_constant.jpg"
  posted: "2021-06-30"
  text: |
    ***The Only Constant*** is a debut EP that knows exactly what it wants to establish and does so with remarkable economy. 'Open Forum', 'Precipice', and 'Oblongata' lay down the rhythmic and textural foundations of Ebonivory's identity: the polyrhythmic density, the timbral palette, the willingness to let complexity serve groove rather than the reverse. These tracks function as a statement of intent, announcing a band whose technical facility is matched by an instinct for momentum that many prog-adjacent acts never develop.

    <u>Then 'Hot & Bothered' and 'Revisited' pivot into jazz-fusion balladry with a confidence that reframes everything preceding them.</u> The message is clear: this is not a band with one mode. The range on display here, from rhythmic aggression to lyrical tenderness, compressed into a debut's modest runtime, suggests a group whose ceiling is exceptionally high. one leaves *The Only Constant* wanting more, which is precisely the point.

- title: "A Grounding In Numbers"
  type: "music"
  creator: "Van der Graaf Generator"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/grounding_in_numbers.jpg"
  posted: "2021-06-29"
  text: |
    Anyone with an ear for the Canterbury scene will recognise ***A Grounding In Numbers*** as Van der Graaf Generator's finest hour. Following David Jackson's departure, the band's exploration of keyboard textures and vocal possibilities deepened considerably, and this album represents the fullest realisation of that trajectory. The Canterbury and space-rock motifs that suffuse the record are handled with extraordinary assurance; 'Mr. Sands' alone might stand as one of VdGG's greatest single compositions, a piece that synthesises decades of stylistic evolution into something that feels both retrospective and startlingly new.

    Every instrument is played with the fluency and inventiveness that only comes from musicians who have spent a lifetime refining their craft. <u>The interplay between Hammill's voice and the keyboard textures achieves a symbiosis that the earlier, more horn-driven records, for all their brilliance, never quite reached.</u> Inevitably, listeners still tethered to VdGG's dark, saxophone-heavy golden period may find the shift in palette difficult to accept. The absence of brass and the lighter tonal register represent a real aesthetic departure, and one must meet the album on its own terms. <u>Those who do will find a record of staggering ambition and execution, the kind that leaves one, at its conclusion, with nothing to say and no desire to say it.</u>

- title: "Trisector"
  type: "music"
  creator: "Van der Graaf Generator"
  creator_role: "by"
  year: 2008
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/trisector.jpg"
  posted: "2021-06-29"
  text: |
    With Jackson gone, the remaining trio christened their reduced configuration with the charmingly uninspired title ***Trisector*** and proceeded to write music that, at its best, channels the melodic warmth and structural ambition of Crack the Sky. One would be forgiven for expecting diminishment; instead, tracks like 'The Final Reel' and 'Over the Hill' are five-star compositions in their own right, performances of such effortless authority that they make the case for the three-piece format more persuasively than the album title does.

    <u>The record's weaknesses are real but localised: certain passages rely too heavily on repetition, and the lyrics occasionally lack the density of the band's best writing.</u> But these are the lapses of musicians whose baseline standard remains so high that even their lesser moments carry the weight of real craft. The accumulated skill of decades does not simply vanish, and *Trisector* proves it.

- title: "H to He. Who Am the Only One"
  type: "music"
  creator: "Van der Graaf Generator"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/h_to_he_who_am_the_only_one.jpg"
  posted: "2021-06-28"
  text: |
    Side 1 is, to put it plainly, lackluster. The first three tracks bear almost no resemblance to the extraordinary ambition of the debut, and even the remastered 'Emperor in His War-Room' still falls short of the fire one expects from this band. It is the kind of opening salvo that might lead a casual listener to write off the whole record, which would be a catastrophic mistake. Because Side 2 is where ***H to He. Who Am the Only One*** becomes something else entirely.

    'Lost' and 'Squid/Octopus' operate in the same vein as *The Least We Can Do Is Wave to Each Other*'s 'After the Flood': heavy, metallic prog rock driven by drum patterns that would have been considered ambitious even by 1970 standards, when the discipline of prog drumming was still being invented. The arrangements are dense, rhythmically assured, and remarkably aggressive for the era. <u>But it is 'Pioneers Over C' that stops one cold, so close in spirit to Gentle Giant that one has to wonder whether Peter Hammill knew the Shulman brothers personally.</u> The resemblance is uncanny, almost suspicious, yet the track transcends its apparent influence. All three pieces on Side 2 are purely divine, a compositions where every part locks into place with an inevitability that seems less craft than revelation.

    And then there is David Jackson's saxophone. <u>One listens to these passages and wonders, quite sincerely, how a single instrument can carry that much invention, that much sheer, unaccountable talent.</u> Jackson's playing across this record is not mere accompaniment; it is a second voice, sometimes the primary one, threading through the arrangements with the authority of a player who seems incapable of a dull phrase. Side 1 may stumble, but Side 2 alone justifies the record's place in the canon.

- title: "The Least We Can Do Is Wave to Each Other"
  type: "music"
  creator: "Van der Graaf Generator"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/least_we_can_do_is_wave_to_each_other.jpg"
  posted: "2021-06-28"
  text: |
    The opening is already iconic: those November winds sweeping in, and then David Jackson's saxophone detonating like a controlled demolition. <u>What defies comprehension is not the intensity of the opening but the fact that this level of instrumental and arranging prowess sustains itself across the entire album, without a single lapse.</u> ***The Least We Can Do Is Wave to Each Other*** was released in 1970, and yet its breakdowns, those sudden structural collapses and reconfigurations within a single track, anticipate a vocabulary that would not be formalised for decades. The concept scarcely existed; Van der Graaf Generator simply did it, operating on instinct or genius or both.

    One spends much of the record marvelling at the seamless fusion of technical virtuosity and melodic clarity, wondering where such a synthesis could possibly have originated. The answer arrives partway through 'After the Flood', when a King Crimson phrase surfaces in the middle section, and suddenly one can feel the prog metal lineage rushing up through the bloodstream. It is a moment of recognition that reframes the entire album: not merely as an early prog milestone, but as one of the buried headwaters from which an entire tradition of heavy, harmonically sophisticated rock would eventually flow. <u>This is the record where Peter Hammill and his collaborators proved that compositional ambition and visceral impact are not opposing forces but the same force, properly channelled.</u>

- title: "Every Good Boy Deserves Favour"
  type: "music"
  creator: "The Moody Blues"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/every_good_boy_deserves_favour.jpg"
  posted: "2021-06-28"
  text: |
    Writing the album title's initials, EGBDF, into the harmonic architecture is the sort of concept that is either insufferably clever or charming, and ***Every Good Boy Deserves Favour*** lands firmly on the side of charm. The precedent one thinks of is Shostakovich and his DSCH motif, and whether or not the Moodies were consciously nodding to that tradition, the impulse is the same: music about its own materials, folded back on itself with a wink. 'Procession' opens with an almost theatrical ambition, layering from African percussion through to baroque harmonic language in a single arc, and while it verges on bluster, the conceptual audacity carries it through.

    'The Story in Your Eyes' is textbook early-seventies rock, driven and direct, but the album's real strength lies in the cluster of narrative songs that surround it. 'Our Guessing Game', 'After You Came', 'One More Time to Live', and above all 'You Can Never Go Home', which is the quiet masterpiece of the record, all trade on what the Moody Blues do better than almost anyone: acoustic guitar, a single unadorned vocal track, and chord progressions that reach back to the pastoral warmth of *Days of Future Passed*. There is a thread of melodic DNA connecting these songs to the band's earliest work, a sense that the group never lost touch with its founding impulse even as the arrangements grew more sophisticated. 'My Song' echoes the textures of the previous album without feeling redundant. <u>The whole record radiates a quality that is almost impossible to manufacture: genuine, unforced loveliness.</u>

- title: "A Question of Balance"
  type: "music"
  creator: "The Moody Blues"
  creator_role: "by"
  year: 1970
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/question_of_balance.jpg"
  posted: "2021-06-28"
  text: |
    The most immediately striking difference from its predecessors is the near-total absence of the orchestral overdubbing that had defined the Moody Blues' sound, with 'Melancholy Man' standing as the sole exception. ***A Question of Balance*** strips the band back to something closer to a live ensemble, and the effect is both clarifying and slightly diminishing. The opening track 'Question' remains startlingly forward-looking; even now, its rhythmic urgency and harmonic movement feel avant-garde, the work of a band operating ahead of its own era. The closing 'The Balance', by contrast, pairs spoken-word poetry with a conventional rock arrangement in a way that is quintessentially early-seventies, for better and worse.

    There is, admittedly, a slight loss of the ethereal quality that made *Days of Future Passed* and *To Our Children's Children's Children* so beguiling. The grand gestures are fewer, the textures leaner. <u>But then one arrives at 'Dawning Is the Day', and the argument dissolves, because there are moments of melodic grace so effortless that no amount of contextual quibbling can diminish them.</u>

- title: "Solar Storm"
  type: "music"
  creator: "Rendezvous Point"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/solar_storm.jpg"
  posted: "2021-06-27"
  text: |
    I first encountered ***Solar Storm*** during my undergraduate years, and the impact was immediate and disorienting. The vocalist's range and control are extraordinary, maintaining a standard in live performance that places him in the company of Haken's Ross Jennings and Leprous' Einar Solberg, which is not a comparison one makes lightly. But the voice is only the most conspicuous element of an album where every component, the solo work, the drum patterns, the mix, operates at what was the upper boundary of the genre in the mid-2010s.

    <u>It is a record where one struggles to find adequate praise, because the superlatives feel earned rather than inflated.</u> The two-part 'The Conclusion' is the definitive argument: if one listens to both halves and remains unmoved, then progressive metal as a form simply does not speak to one, and no further persuasion is possible. Rendezvous Point assembled something here that transcends the usual debut-album caveats. This is not a promising start; it is a fully realised statement.

- title: "Last Watch of the Nightingale"
  type: "music"
  creator: "Odd Logic"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/last_watch_of_the_nightingale.jpg"
  posted: "2021-06-26"
  text: |
    Odd Logic's revolving membership makes each album something of a fresh proposition, and ***Last Watch of the Nightingale*** shares the sonic palette and mix approach of the record that followed it while arguably surpassing it in arrangement and melodic invention. The stylistic continuity suggests a stable creative vision even as the personnel shifts, which is no small feat for a project this fluid.

    <u>'Of the Nightingale' alone would justify the record's existence.</u> It is one of those rare tracks where composition, performance, and production align so precisely that the song seems to have arrived fully formed, as though discovered rather than written. The rest of the album maintains a standard that makes the standout track feel less like an anomaly and more like the natural peak of a consistently elevated landscape. Highly recommended, and too little known.

- title: "Lost Not Forgotten Archives: Images and Words - Live in Japan"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 2021
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/lost_not_forgotten_archives_3.jpg"
  posted: "2021-06-26"
  text: |
    The fact that this live recording, captured four years prior, managed to arrive with a later release date than the European tour footage is a minor logistical absurdity that sets the tone for the whole experience. James LaBrie's voice is, to be blunt, difficult to endure. 'Pull Me Under' and 'Take the Time' are rendered almost unlistenable by vocal performances that have deteriorated well past the point of charity. One does not say this with pleasure; it is simply what the recording documents.

    There are compensations. John Petrucci's additional guitar solo in 'Another Day' fits the track with a precision that borders on revelatory, and the 'Metropolis Pt. 1' performance is instructive in a different way: <u>Mike Mangini's drum solo makes audible, in real time, the gap between technical excellence and the idiosyncratic genius of Mike Portnoy, and it is a wider gap than politeness usually permits one to acknowledge.</u> The remaining tracks are competent, professional, unremarkable. Strip away LaBrie's vocal decline and ***Lost Not Forgotten Archives: Images and Words - Live in Japan*** would be an easy five stars. But one cannot strip it away. It is the thing one hears.

- title: "The Cyberiam"
  type: "music"
  creator: "The Cyberiam"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/cyberiam.jpg"
  posted: "2021-06-26"
  text: |
    '2020 Visionary' is a genuine disappointment, a track that makes one wonder whether anyone in the room pushed back during the writing process. The remaining material on ***The Cyberiam*** is strong, sometimes very strong, and the contrast only sharpens the frustration. One expects the weakest track on a debut to be a minor lapse, not an active irritant.

    The visual branding leans heavily into robo-cyberpunk aesthetics, which creates a mild expectation mismatch: the music itself is straightforward prog metal, well-executed and melodically assured, with no particular interest in electronic textures or futurist sonics. This is not a criticism so much as an observation; the record is better for committing to what it actually is rather than chasing its own artwork. <u>'Nostalgia' is the clear highlight, the track where craft and feeling converge most convincingly.</u>

- title: "Playing House"
  type: "music"
  creator: "Common Holly"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "indie folk"
  image: "/assets/images/music/playing_house.jpg"
  posted: "2021-06-24"
  text: |
    ***Playing House*** is, as far as I can tell, the best demonstration of how to embed progressive harmonic language inside a pop framework without either element cannibalising the other. The chord progressions carry genuine complexity, modal shifts and unexpected resolutions that would sit comfortably in an art-rock context, yet the songs never lose their pop centre of gravity. The vocal melodies float above harmonies that are constantly moving beneath them, and the effect is less disorientation than deepened pleasure.

    'She Goes' and 'Beehive' are the two tracks where this synthesis reaches its most persuasive form, where one can hear exactly how the borrowed chords and extended voicings serve the emotional arc rather than merely decorating it. <u>It is rare to encounter a record that solves a compositional problem this elegantly: how to be harmonically adventurous and immediately, bodily affecting at the same time.</u> A rare and persuasive argument for what prog pop can be.

- title: "Butterfly 3000"
  type: "music"
  creator: "King Gizzard & the Lizard Wizard"
  creator_role: "by"
  year: 2021
  eval: "liked"
  genre: "psychedelic rock"
  image: "/assets/images/music/butterfly_3000.jpg"
  posted: "2021-06-21"
  text: |
    *L.W.* remains the stronger record. ***Butterfly 3000*** is rhythmically inventive, often impressively so: the syncopation and polyrhythmic layering in 'Catching Smoke' and '2.02 Killer Year' display the band's characteristic facility with complex time, the sense that King Gizzard can make almost any metrical conceit feel intuitive rather than academic.

    But the timbral choices undercut the rhythmic sophistication. The synth tones and overall sonic palette are, put simply, unappealing, thin and plasticky in a way that flattens the dynamic range the compositions are clearly reaching for. <u>It is a frustrating listen precisely because the craft is so evidently there, buried under a surface that refuses to reward it.</u>

- title: "Revolutions"
  type: "music"
  creator: "Magenta"
  creator_role: "by"
  year: 2001
  eval: "loved"
  genre: "neo-prog"
  image: "/assets/images/music/revolutions.jpg"
  posted: "2021-06-15"
  text: |
    Having put off listening to Magenta for far too long, I finally started from the beginning and discovered that even the first album contains unique harmonic choices and guitar tones. ***Revolutions*** opens a sonic world that feels distinctly its own from the very first track: the chord voicings sit at odd, productive angles to the expected progressions, and the guitar timbres carry a specificity that suggests deep attention to the signal chain rather than mere preset-browsing. One does not often encounter a debut where the harmonic identity is this fully formed.

    The solo work could benefit from further refinement, admittedly, a judgment perhaps coloured by having spent the day immersed in Deep Purple, which sets a punishing standard for any guitarist. <u>But these are minor reservations about what is, taken whole, an exceptional beginning: a record that announces not just talent but a distinct sonic identity, which is the rarer and more valuable thing.</u> I am eager to hear what comes next.

- title: "A Storm In Heaven"
  type: "music"
  creator: "Verve"
  creator_role: "by"
  year: 1993
  eval: "loved"
  genre: "shoegaze"
  image: "/assets/images/music/storm_in_heaven.jpg"
  posted: "2021-06-07"
  text: |
    The 2016 remastered edition arriving as a three-disc set is an embarrassment of riches, and every disc earns its place. John Leckie's production, spacious and confident, meets the early Verve at their most unrestrained, when the psychedelic impulse had not yet been domesticated by the pressures of commercial Britpop. ***A Storm in Heaven*** is the sound of a band that does not yet know its own boundaries, and the effect is a record of extraordinary freedom.

    'Star Sail', 'Beautiful Mind', 'The Sun, the Sea': these are not merely good songs but perfect fusions of psychedelia and Britpop melody, a tracks where genre labels feel less like categories than coordinates on a map whose territory has not yet been fully surveyed. <u>This is the best Verve album, the one recorded before self-consciousness set in, and it carries the irreplaceable charge of a band discovering what it can do in real time.</u>

- title: "Direction of Last Things"
  type: "music"
  creator: "Intronaut"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/direction_of_last_things.jpg"
  posted: "2021-05-26"
  text: |
    ***Direction of Last Things*** already points unmistakably toward the territory Intronaut would fully claim on their 2020 release. The architecture is recognisable: dense, rhythmically intricate, harmonically restless. The drummer continues to be the gravitational centre, holding the ensemble together through passages that would collapse under a less authoritative hand, but what distinguishes this record from its predecessors is the increased presence of the bass and guitar, which assert themselves with a confidence that reshapes the band's internal balance of power.

    <u>The rhythmic vocabulary here carries more than a passing resemblance to Between the Buried and Me, that same willingness to treat metre as a compositional variable rather than a fixed grid.</u> this yields music that feels perpetually in motion, shifting underfoot even as the melodic lines maintain their trajectory. It is a record that rewards close listening and punishes inattention, which is precisely the contract Intronaut's best work has always offered.

- title: "Witness"
  type: "music"
  creator: "VOLA"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/witness.jpg"
  posted: "2021-05-24"
  text: |
    Melodic invention is the one area where ***Witness*** falls slightly short, and it is telling that this constitutes the sole substantive criticism one can level at the record. Everything else, the djent passages in 'Stone Leader Falling Down' that manage to feel purposeful rather than performative, the overall framework of prog metal inflected with pop sensibility, operates at a level that leaves little room for complaint.

    What elevates VOLA above the considerable competition in this space is the accumulation of distinctive elements: chord progressions that refuse the obvious resolution, a vocalist whose phrasing sits slightly outside genre convention, and drumming that serves the song's architecture rather than showcasing its own complexity. <u>These are not individually revolutionary choices, but taken together they produce a record that sounds like no one else, which in a genre as crowded as progressive metal is the most valuable quality a band can possess.</u>

- title: "Scaled And Icy"
  type: "music"
  creator: "Twenty Øne Piløts"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "alternative rock"
  image: "/assets/images/music/scaled_and_icy.jpg"
  posted: "2021-05-21"
  text: |
    ***Scaled and Icy*** offers a genre buffet, Britpop homage on 'Formidable', pop punk on 'Saturday', and yet conspicuously absent from the spread is the very quality that made Twenty One Pilots distinctive: that restless, slightly unhinged energy, the productive weirdness that gave earlier records their identity. 'No Chances' alone gestures toward it, and the gesture only underscores how thoroughly the rest of the album has abandoned it.

    Even the ostensibly upbeat tracks are undermined by rhythmic choices that sap their momentum. 'Shy Away' is the clearest case: the drum programming drags where it should propel, turning what could be infectious into something merely sluggish. The overall impression is of a band performing competence across multiple styles while failing to locate the thing that made any of them worth attempting in the first place.

- title: "Captain Fantastic and the Brown Dirt Cowboy"
  type: "music"
  creator: "Elton John"
  creator_role: "by"
  year: 1975
  eval: "liked"
  genre: "pop rock"
  image: "/assets/images/music/captain_fantastic_and_the_brown_dirt_cowboy.jpg"
  posted: "2021-05-21"
  text: |
    One can hear Elton John's personal style crystallising on ***Captain Fantastic and the Brown Dirt Cowboy*** with an almost geological clarity. 'Someone Saved My Life Tonight', '(Gotta Get A) Meal Ticket', and 'Better Off Dead' each contain arranging and orchestration choices that would recur, in various permutations, across the records that followed: specific instrumental voicings, characteristic syncopation patterns, signature approaches to dynamics and texture.

    <u>It is less a departure than a consolidation, the record where the idiom becomes fully self-aware.</u> Whether this increasing recognisability constitutes artistic maturity or the onset of mannerism is a question the subsequent catalogue would answer in both directions, sometimes on the same album. But here, at the moment of coalescence, the effect is purely compelling.

- title: "Empty Sky"
  type: "music"
  creator: "Elton John"
  creator_role: "by"
  year: 1969
  eval: "liked"
  genre: "pop rock"
  image: "/assets/images/music/empty_sky.jpg"
  posted: "2021-05-20"
  text: |
    The centrepiece of ***Empty Sky*** is the title track itself: eight and a half minutes of a twenty-two-year-old Elton John and a twenty-year-old Bernie Taupin trying, by Taupin's own admission, to write their own 'Sympathy for the Devil'. They do not succeed, but the attempt is revelatory. The harpsichord figures, the dramatic builds, the sheer length: this is a debut that has absorbed the post-*Sgt. Pepper's* conviction that pop music can be architecture, not merely song. Recorded on an eight-track at DJM Studios, the production is raw in a way that later records would polish out of existence, and some of that rawness is the album's chief virtue.

    Three shorter tracks anchor the rest. 'Skyline Pigeon' is the most accomplished: a hymnal melody carried by harpsichord, pointing toward the baroque pop sensibility that *Madman Across the Water* would fully realise. 'Lady Samantha' has a brightness and rhythmic drive that the deeper cuts lack. And the resemblance between 'Western Ford Gateway' and a substantial portion of Oasis's later output is difficult to ignore; one does not need to be a Gallagher partisan, and I am decidedly not, to hear the melodic DNA that would eventually be metabolised into *Definitely Maybe* and beyond.

    <u>What strikes one about <b><i>Empty Sky</i></b> is less the quality of the songs, which is uneven, than the ambition behind them.</u> This is a debut that wants to be taken seriously as a statement, not merely a calling card, and that seriousness, even where it overreaches, is what separates it from the soft-rock debuts surrounding it in 1969.

- title: "The Apologist"
  type: "music"
  creator: "East of the Wall"
  creator_role: "by"
  year: 2011
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/apologist.jpg"
  posted: "2021-05-18"
  text: |
    One's tolerance for post-hardcore tends to expand with age, a counter-intuitive trajectory that perhaps reflects a growing appreciation for raw formal commitment over polish. ***The Apologist*** rewards this openness: the opening tracks are particularly strong, built on a foundation of genuine melodic and rhythmic craft rather than the genre's occasional tendency toward blunt-force delivery.

    'Linear Failure' is the standout, driven by drum work that has clearly received serious compositional attention, patterns that support and complicate the arrangement rather than merely keeping time. There is a faint djent inflection in the guitar tones, just enough to suggest the band is listening to what is happening around them without abandoning their own idiom. <u>It is the kind of record that makes the case for post-hardcore as a space where disciplined musicianship and visceral impact can coexist without compromise.</u>

- title: "Day And Age"
  type: "music"
  creator: "Frost*"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/day_and_age.jpg"
  posted: "2021-05-17"
  text: |
    Frost* had been inching toward pop legibility for a while, but ***Day And Age*** is the album where the transformation completes. The arrangements are noticeably simpler than on the previous record; the baroque layering, the odd-time detours, the sheer density of ideas per minute have all been pared back. What replaces them is something rarer in prog circles: coherence. <u>The album flows as a single, sustained argument rather than a sequence of showcases, and much of that continuity comes from Jem Godfrey's expert recycling of motifs, threading melodic cells through tracks so that callbacks land with structural inevitability rather than prog-band self-indulgence.</u>

    The mix, too, has matured. Where earlier Frost* records sometimes felt like every instrument was fighting for the same spectral real estate, here the stereo field breathes. Elements sit where they belong; the low end is tighter, the vocal sits forward without swallowing the keys. The chord progressions lean on familiar territory, major-key resolutions and well-worn cadences that would feel lazy in a lesser band's hands, but Godfrey uses that familiarity as connective tissue. <u>One finishes the album not remembering individual fireworks but feeling the shape of the whole, which is precisely the point.</u> Frost* may have lost complexity, but they gained something most prog bands never find: the discipline to leave space.

- title: "Frontal"
  type: "music"
  creator: "Punch Arogunz"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "hip-hop"
  image: "/assets/images/music/frontal.jpg"
  posted: "2021-05-07"
  text: |
    Two remarkably beautiful prog records in one day is a luck that restores faith in the algorithm. ***Frontal*** sits at a different coordinate from the Konom record I encountered the same afternoon: where Konom leans heavily into solo virtuosity, Punch Arogunz build their case on riffs. The riffing here is superb, dense and rhythmically inventive without tipping into djent-adjacent monotony. The closest comparison is Animals As Leaders if one were to add vocals and a stronger melodic sensibility, which is to say the technical foundation is formidable but the songs never forget they are songs.

    <u>The heavier register gives the album a physicality that a lot of contemporary prog sacrifices in pursuit of cleanliness.</u> There is weight in the low end, a pleasing crunch to the distortion that suggests the band actually wants the listener to feel the air move. The vocal lines, rather than sitting on top of the instrumentation as an afterthought, are woven into the riff architecture, rising and falling with the guitar lines in a way that feels organic rather than grafted on. A record that earns its heaviness.

- title: "Konom"
  type: "music"
  creator: "Konom"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/konom.jpg"
  posted: "2021-05-06"
  text: |
    The vocalist is, to put it plainly, not good. The timbre is thin, the phrasing is stiff, and on a weaker album it would be a dealbreaker. But ***Konom*** is not a weaker album. <u>It became my top prog record of the first half of 2021, and it earned that position through sheer compositional force.</u> The riffs are extraordinary, not merely technical but melodically purposeful, each one doing narrative work within its track. The decision to use piano as an emotional buffer during transitions is quietly brilliant: rather than the usual prog move of bridging sections with a solo or a rhythmic modulation, the piano strips the texture back to harmonic essentials, lets the ear reset, and makes the next heavy passage land harder.

    Every transition on this record is beautiful. That word gets overused in prog discourse, but here it is precise: the seams between sections feel composed rather than assembled, as if the shifts were part of the original melodic idea rather than stitched in afterwards. If one had to place Konom on the prog family tree, the closest ancestors would be Dream Theater's rhythmic architecture married to Haken's soloing sensibility, the former providing the structural skeleton and the latter the improvisatory freedom within it. The vocal problem remains real, but the writing is so commanding that one metabolises it as texture and moves on. <u>An album that wins in spite of its own frontman.</u>

- title: "Omega"
  type: "music"
  creator: "Omega"
  creator_role: "by"
  year: 1973
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/omega.jpg"
  posted: "2021-05-05"
  text: |
    The symphonic elements on ***Omega*** are the genuine surprise here. The orchestral integration is not the usual prog-metal bolted-on-strings approach; it feels considered, at times even structurally necessary, lending passages a grandeur that the riffs alone could not sustain. 'Kingdom of Heaven, Pt. 3' is the standout, a track where the symphonic and the heavy actually argue with each other productively rather than merely coexisting.

    The lyrics, however, are another matter. Even by metal's generous standards for lyrical quality, these sit somewhere in the lower tier. There is a moment where the phrase 'cosmic energy!' is delivered with the full conviction of a band who believes it constitutes profundity, and the effect is seismic, though not in the way intended. <u>One can forgive a great deal of lyrical clumsiness when the orchestration is this good, but the gap between the ambition of the arrangements and the banality of the words remains a persistent, nagging dissonance.</u>

- title: "如也"
  type: "music"
  creator: "陈粒"
  creator_role: "by"
  year: 2015
  eval: "disliked"
  genre: "C-indie"
  image: "/assets/images/music/ru_ye.jpg"
  posted: "2021-05-05"
  text: |
    ***如也*** is worth three stars at best, and that is being charitable. The sole bright spot is '祝星', which manages to sound like the work of a competent artist: the arrangement has shape, the mix has depth, and the vocal sits where it should. It is the one track that does what a singer's album is supposed to do. Everything else ranges from half-hearted to actively baffling.

    The melody writing on '不灭', '贪得', and '脱缰' is transparently careless, as if the melodic lines were first drafts that never got revised. '正趣果上果' features instruments that are inexplicably out of tune. '20 Times You' has lyrics that read like filler for a demo. <u>The remaining tracks share a common quality: the frantic energy of a production team trying to rescue material that was never worth saving.</u>

- title: "Capacitor"
  type: "music"
  creator: "Cosmograf"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/capacitor.jpg"
  posted: "2021-05-04"
  text: |
    ***Capacitor*** is a welcome surprise for a sophomore record. The Porcupine Tree comparison writes itself, that particular blend of atmospheric melancholy and restrained heaviness, but there are also traces of Pineapple Thief in the harmonic palette, the way the songs build tension through accumulation rather than dramatic rupture. Where Cosmograf separates from the latter, though, is in the details: the solos are more eloquent, shaped with a melodic intentionality that Pineapple Thief's guitar work sometimes lacks, and the vocal timbre is warmer, more suited to the introspective register the songs inhabit.

    <u>Robin Armstrong sounds like someone who studied Steven Wilson's production playbook and then had the good sense to deviate from it where his own instincts were sharper.</u> The result is an album that wears its influences openly but never feels derivative, a distinction that matters enormously in a subgenre where Wilson's shadow falls long. A second album that makes one eager for the third.

- title: "Mosaique"
  type: "music"
  creator: "CAST"
  creator_role: "by"
  year: 1997
  eval: "meh..."
  genre: "progressive rock"
  image: "/assets/images/music/mosaique.jpg"
  posted: "2021-05-02"
  text: |
    Early CAST records are sometimes baffling in their inconsistency, and ***Mosaique*** is the clearest example. The first half, everything up to and including 'Jupiter', is excellent: well-written, well-mixed, with creative drumming and solos that feel earned rather than obligatory. One listens thinking this might be an overlooked gem. Then the keyboards arrive in the second half, and the quality collapses so completely it feels like a different band, or more precisely like a band whose keyboardist has just discovered Logic Pro and has not yet learned what not to do.

    The two 'Nino de Cristal' tracks deserve special mention, and not in a flattering sense. <u>The vocal melodies are among the worst I have encountered in prog, and paired with a lead voice that was never beautiful to begin with, the effect is hypertension-inducing.</u> An album cleaved neatly in two: half of it is very good, and the other half actively undermines it.

- title: "Typhoons"
  type: "music"
  creator: "Royal Blood"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/typhoons.jpg"
  posted: "2021-04-30"
  text: |
    Kerr and Thatcher knew exactly what they were risking. Pivoting a hard rock duo toward dance-hall grooves and electronic textures is a move that alienates a fanbase before the first single finishes loading, and the pre-release anxiety was palpable. But ***Typhoons*** silenced the doubters almost immediately. The album sounds more 'electronic' on the surface, yes, with keyboards and piano now occupying space that was previously all bass distortion and drums, but the underlying craft has not softened. If anything, it has sharpened.

    <u>The drum programming on 'Limbo' is more inventive than anything on the first two records, and the bass riffs on 'Either You Want It' are among the most satisfying Kerr has ever written.</u> What makes the electronic pivot work is that it remains, at its core, a performance record. The bass drum and snare patterns are more regimented perhaps eighty per cent of the time, but there is nothing about the production that smells of cheap electronic shortcuts. No quantised-to-death loops, no preset synths filling gaps where ideas should be. The electronic feel is a texture, not a crutch, and the distinction matters more than the discourse around the album's 'new direction' tends to acknowledge. Royal Blood did not abandon their identity; they discovered it had more room in it than anyone assumed.

- title: "My Beautiful Dark Twisted Fantasy"
  type: "music"
  creator: "Kanye West"
  creator_role: "by"
  year: 2010
  eval: "hated"
  genre: "hip-hop"
  image: "/assets/images/music/my_beautiful_dark_twisted_fantasy.jpg"
  posted: "2021-04-30"
  text: |
    The most infuriating thing about ***My Beautiful Dark Twisted Fantasy*** is its habit of alluding to genuine classics, 'Iron Man', '21st Century Schizoid Man', and then mangling the borrowed material into something actively unpleasant. Allusion is supposed to create resonance; here it creates only unflattering comparison. The source material is better in every dimension, and the interpolations serve neither homage nor transformation, just the vague gesturing of someone who knows the canon exists but has nothing interesting to say about it.

    <u>Congratulations to 'So Appalled' for entering my all-time top ten of the most idiotic, most unlistenable tracks I have ever sat through.</u> A record celebrated as a masterpiece that sounds, to these ears, like a very expensive waste of everyone's time.

- title: "Always Never the Same"
  type: "music"
  creator: "Kansas featuring The London Symphony Orchestra"
  creator_role: "by"
  year: 2017
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/always_never_the_same.jpg"
  posted: "2021-04-30"
  text: |
    The concept is familiar: take the old hits, re-arrange them with a full orchestra, and let the London Symphony Orchestra do the heavy lifting. Yes did something similar years ago with their *Orchestral Collection*, and the template has not changed much. ***Always Never the Same*** works where it should: 'Song for America' benefits enormously from the orchestral treatment, the arrangement gaining a spatial grandeur that the original could only hint at. Several other tracks similarly find new life in the expanded instrumentation.

    The problem, of course, is that this kind of album is almost impossible to make badly. Drape a symphony orchestra over competent classic rock and the result will be at minimum pleasant, which makes it difficult to assess whether the record represents genuine artistic ambition or merely a safe bet. <u>The truly baffling decision is opening with a cover of the Beatles' 'Eleanor Rigby', executed so poorly that one wonders what possessed anyone involved to approve it.</u> It sets a strange tone for an album that otherwise does exactly what it promises, nothing more and nothing less.

- title: "Point Of Know Return"
  type: "music"
  creator: "Kansas"
  creator_role: "by"
  year: 1977
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/point_of_know_return.jpg"
  posted: "2021-04-29"
  text: |
    This should have been the first Kansas album I heard, and in a sense it was: I found it during my final year of high school, and it reshaped my understanding of what American prog could be. Compared to most of their Continental European counterparts, Kansas in 1977 were operating at a different level entirely, both in sheer sonic ambition and in their ability to fuse hard rock energy with progressive structure. <u><b><i>Point Of Know Return</i></b> is, against the common consensus, the most representative Kansas album, the one where every element of their identity converges without any single dimension dominating.</u>

    The hard rock riffs are unapologetically muscular. The drumming carries a rhythmic complexity that recalls Yes at their most inventive. Every track has layered depth, instruments entering and receding with architectural purpose, yet the transitions never feel forced or abrupt. That is the trick Kansas pulled off here and never managed again: the complexity is invisible. One moves through the album feeling carried rather than challenged, which is a mark of compositional maturity that raw technical skill cannot substitute. Everything Kansas released after this is, in one way or another, a record made by a band that had already peaked.

- title: "Kansas"
  type: "music"
  creator: "Kansas"
  creator_role: "by"
  year: 1974
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/kansas.jpg"
  posted: "2021-04-29"
  text: |
    That a band from Kansas, the flattest and most culturally unassuming stretch of the American Midwest, produced music this ambitious on their debut is already remarkable. ***Kansas*** delivers on both fronts that the band's name would come to represent: the prog passages are progressive, and the hard rock passages hit with conviction. Some of the prog sections are more accomplished than anything on later, better-known records; 'Journey from Mariabronn' contains passages of such structural daring that it makes one wonder whether the band's subsequent output represented growth or compromise.

    The timbral palette sits somewhere between Yes and Caravan, an unusual but productive intersection: the brightness and harmonic adventurousness of the former, the slightly warmer, more pastoral quality of the latter. <u>The main weakness is the lead vocal, which lacks the character to match the instrumental ambition around it.</u> A debut that contains the blueprint for everything Kansas would become, strengths and limitations alike.

- title: "A Momentary Lapse of Reason"
  type: "music"
  creator: "Pink Floyd"
  creator_role: "by"
  year: 1987
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/momentary_lapse_of_reason.jpg"
  posted: "2021-04-27"
  text: |
    With Waters gone, ***A Momentary Lapse of Reason*** became Pink Floyd's most pop-leaning record, and the critical reflex has always been to treat that as a concession. It was not. The album makes no compromises in arrangement or atmosphere; if anything, the atmospherics are richer here than on much of *The Wall*, built on a foundation of synthesiser pads so lush and layered that the album required five keyboardists to realise them. Five. The sheer density of the pad work creates a spatial depth that few records of the era can match, a warm, enveloping stereo field that feels less like listening and more like submersion.

    <u>And then there is Gilmour's guitar, which by this point had reached a level of expressive refinement that renders the question of whether Pink Floyd 'needed' Waters almost irrelevant.</u> The solos here are not technical showcases but emotional arguments, each note placed with the deliberation of someone who understands that what one does not play matters as much as what one does. Gilmour had been operating at this level since *The Wall* without a single lapse in quality, and the consistency itself is a kind of quiet miracle. At its weakest, this is a 4.5-star album. At its best, it is proof that the band's soul did not leave with its lyricist.

- title: "The Final Cut"
  type: "music"
  creator: "Pink Floyd"
  creator_role: "by"
  year: 1983
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/final_cut.jpg"
  posted: "2021-04-27"
  text: |
    ***The Final Cut*** may be the earliest example of three-dimensional audio in prog history. The spatial positioning of instruments and sound effects, the way elements move through the stereo field and seem to occupy physical depth, anticipates techniques that would not become standard for decades. As a piece of production, it remains startling.

    The album was originally conceived as a third part of *The Wall*, and one can hear the continuity: the claustrophobia, the anger, the sense of structures, psychological, political, architectural, closing in. But where *The Wall* externalised its themes into narrative and spectacle, *The Final Cut* turns inward. The lyrics are more introspective, more poetic, and in their moments of emotional directness they cut deeper than anything on the more celebrated predecessor. At least half the tracks would rank among the best on *The Wall* if placed there.

    <u>This is one of the most severely underestimated albums in the Floyd catalogue, perhaps in all of prog.</u> The critical consensus has never quite known what to do with it: too bitter for casual listeners, too personal for the crowd that wants Floyd to be cosmic rather than confessional. But the bitterness is the point, and the intimacy is what gives it force. Waters never wrote with more precision or more pain.

- title: "TEAROOM"
  type: "music"
  creator: "Keor"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/tearoom.jpg"
  posted: "2021-04-07"
  text: |
    I do not think 2021 will produce a better track than 'Learning God'. Two years on from the debut, KEOR's English has improved markedly, and more importantly, the vocal approach has matured: that slightly husky timbre, once a limitation, is now deployed as texture, a deliberate roughness that gives the cleaner passages something to push against.

    The production on ***TEAROOM*** is astonishing. The distorted pipa on 'Learning God' builds into a wall of sound that rivals Devin Townsend's *Empath* in sheer density, layers upon layers of harmonic overtones compressed into a physical mass of sound that one feels in the chest before parsing with the ears. <u>The closing riff of 'Marta / I Am Keor' carries the same hypnotic, spiralling quality as the 'Petrichor' riff from the previous album, that rare kind of motif that lodges in the brain and refuses to leave.</u> The chord progressions remain as beautiful as ever, but the arrangement structures have taken a leap: there is a formal inventiveness here that the debut only hinted at, a willingness to let sections breathe and mutate in unexpected directions.

    <u>KEOR is a generational talent, one of those artists who appears perhaps once in a hundred years and makes everyone else sound like they are working from a smaller palette.</u> The fusion of Chinese instrumentation with progressive metal is not a gimmick here; it is a genuine expansion of what the genre can contain.

- title: "My River Flows"
  type: "music"
  creator: "Maple Syrup, T.Check & Paul Midihill"
  creator_role: "by"
  year: 2023
  eval: "liked"
  genre: "electronic"
  image: "/assets/images/music/my_river_flows.jpg"
  posted: "2021-04-06"
  text: |
    ***My River Flows*** is a frustrating record precisely because more than half of it is excellent. The keyboard solos are fluid and well-constructed, the harmonic choices consistently tasteful, and the interplay between the three collaborators produces a sound that feels unified rather than assembled from parts. When the album works, it works beautifully: a melodic prog where every chord change feels both surprising and inevitable.

    The problem is tracks like 'Late Night Salvation', where the vocal melody is so weak it actively drags the arrangement down. <u>It is the sound of a band whose instrumental instincts are far ahead of their ability to write for the human voice.</u> The stylistic identity is solidifying, which is encouraging, but the inconsistency between the instrumental and vocal writing remains a gap that needs closing.

- title: "Fragile"
  type: "music"
  creator: "Yes"
  creator_role: "by"
  year: 1971
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/fragile.jpg"
  posted: "2021-03-22"
  text: |
    Tony Kaye refused to play synthesiser, so Anderson gently pushed him out and brought in Rick Wakeman, and Roger Dean took over the cover art, though this particular sleeve is far from Dean's best work. ***Fragile*** is an album with a conspicuous number of flaws. The sequencing places the hit single 'Roundabout' right before Wakeman's awkward and ill-fitting Brahms arrangement, a juxtaposition that does neither piece any favours. Anderson's clumsy multi-part vocal experiment 'We Have Heaven' and Howe's throwaway '5% for Nothing' occupy similar territory: ideas that might have worked as sketches but have no business on a studio album. 'Long Distance Runaround' and 'The Fish' salvage the middle stretch through clever structural mirroring, and 'Heart of the Sunrise' serves as a competent if unspectacular closer.

    <u>This is a deeply frustrating album because the talent is obviously enormous and the collaboration is obviously not working yet.</u> Five extraordinary musicians, each pulling in a slightly different direction, producing a record that is intermittently brilliant and frequently embarrassing. The individual showcase tracks, meant to demonstrate each member's virtuosity, instead expose the absence of a shared compositional vision. *Close to the Edge* would prove that the chemistry could work; *Fragile* is the document of a band still learning how to be in the same room.

- title: "Beautiful alone"
  type: "music"
  creator: "Strangelove"
  creator_role: "by"
  year: 1996
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/beautiful_alone.jpg"
  posted: "2021-03-12"
  text: |
    It had been a long time since I listened to pop with any real attention, and ***Beautiful alone*** reminded me why I should more often. There is a quality to Strangelove's sound, something in the DNA of their songwriting from the *From Your Balcony* era onward, that I still cannot quite isolate. Is it the piano tone, that particular warmth in the upper register? The mix, which places the vocal just far enough forward to feel intimate without overwhelming the instrumentation? The male vocal itself, with its specific grain and restraint? Or the chord progressions, which move through familiar pop territory but take just enough unexpected turns to keep the ear alert? It is probably all of these at once, and the fact that they fuse into something irreducible is itself the achievement.

    <u>The inclusion of 'The Fire Within' on this full-length was enough to make the whole record worthwhile.</u> A small, uncomplicated happiness: finding a song one already loved given the home it deserved.

- title: "Murder of the Universe"
  type: "music"
  creator: "King Gizzard & the Lizard Wizard"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "psychedelic rock"
  image: "/assets/images/music/murder_of_the_universe.jpg"
  posted: "2021-03-03"
  text: |
    ***Murder of the Universe*** is King Gizzard going full-on prog, and the commitment is total. The familiar psychedelic textures are still present, that garage-fuzz warmth and the relentless rhythmic momentum, but now they are framed within progressive structures in the fullest sense: multi-part suites, narrative arcs, thematic development across chapters. The band's sonic identity grows more distinctive with each record, and here it crystallises into something that sounds like no one else.

    The three-chapter structure gives the album a literary architecture. The first chapter, the conflict between the altered beast and the human who undergoes unwilling transformation, is the strongest: visceral, propulsive, carrying real narrative tension. The second chapter summons Tolkien's Balrog into the mix, an audacious move that does not quite match the intensity of the opening act. <u>The third chapter, a machine that was created by humans and in turn created humanity, folds the album's violence back on itself into something philosophical, a closed loop of creation and destruction that gives the whole project its conceptual spine.</u> King Gizzard are building a mythology, and it is starting to feel like it might actually hold together.

- title: "Nonagon Infinity"
  type: "music"
  creator: "King Gizzard & the Lizard Wizard"
  creator_role: "by"
  year: 2016
  eval: "loved"
  genre: "psychedelic rock"
  image: "/assets/images/music/nonagon_infinity.jpg"
  posted: "2021-03-03"
  text: |
    KGLW had already pushed psychedelia to an industry-leading standard by 2016, yet ***Nonagon Infinity*** treats that achievement as a starting line rather than a destination. <u>From the opening seconds of 'Robot Stop', the album plunges into relentless odd-time territory, toggling between 5/4 and 7/4 with the casual ferocity of a band that finds 4/4 physically boring.</u> What separates this from mere rhythmic showboating is the melodic discipline: every vocal line, every lyrical phrase, carries genuine tunefulness, a quality most psychedelia records sacrifice at the altar of texture. The melodies here are not ornamentation; they are architecture, and they hold weight.

    The deeper pleasures reveal themselves on closer inspection. Reading the lyric booklet, one discovers that 'Mr. Beat' and 'Missed a Beat' are deliberate wordplay, and suddenly the rhythmic conceit of 'Mr. Beat', its constant alternation between 4/4 and 3/4, clicks into place as structural wit rather than rhythmic restlessness. Is this prog? By the narrow taxonomic definition, probably not. But the prog spirit saturates every track: the infinity loop concept itself, the seamless album-as-single-piece construction, the sheer ambition of making an album that literally has no beginning and no end. <u>Even the concept borrows from the grand tradition of prog's conceptual albums, then strips away the pomposity and leaves only the propulsive energy.</u> the effect is something rare: a record that thinks like prog but hits like garage rock, and never once asks permission to be both.

- title: "Quarters!"
  type: "music"
  creator: "King Gizzard & the Lizard Wizard"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "psychedelic rock"
  image: "/assets/images/music/quarters.jpg"
  posted: "2021-03-02"
  text: |
    Four tracks at exactly 10:10 each: the symmetry is charming, the execution uneven. ***Quarters!*** opens ambitiously with 'The River', which carries an unmistakable *Take Five* energy courtesy of its 5/8 time signature, but it never quite captures the effortless swing of Brubeck's original. The jazz fusion elements are there in the harmonic vocabulary and the loose, improvised feel, yet they sit on the surface rather than penetrating the song's bones, leaving something slightly awkward in the phrasing. 'Infinite Rise' leans on a Shepard's tone, a trick so well-worn that even pop producers have exhausted its novelty, and the track's high repetition count offers no lyrical substance to compensate.

    The remaining two tracks fare better, settling into a groove that plays to KGLW's strengths rather than exposing their limitations. The album reads as a transitional experiment, a band testing how far their psychedelic toolkit extends into jazz territory, learning in real time what translates and what does not. <u>One respects the ambition even where the results fall short; the willingness to structure an entire album around a numerical conceit and then fill it with genuine rhythmic risk-taking is not nothing.</u>

- title: "I'm In Your Mind Fuzz"
  type: "music"
  creator: "King Gizzard & the Lizard Wizard"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "psychedelic rock"
  image: "/assets/images/music/im_in_your_mind_fuzz.jpg"
  posted: "2021-03-02"
  text: |
    ***I'm In Your Mind Fuzz*** is the album where KGLW stopped being an interesting band and became an important one. Everything that had floated around the edges of their earlier records, the Temples-adjacent psychedelia, the Beatles vocal harmonics, the jazz fusion leanings, the raw garage energy, fuses here into something coherent and entirely their own. The opening four-part suite is the centrepiece, a single arc of escalating intensity that moves from hypnotic repetition to full psychedelic catharsis without ever feeling laboured. It is followed by two short, sharp tracks drenched in Krautrock's motorik pulse, as though the band briefly channelled Neu! before remembering they had other things to say.

    <u>'Am I in Heaven?' sits at the album's heart as perhaps the most accomplished synthesis of all KGLW's influences on a single track: garage grit, Eastern modality, and a melodic generosity that borders on the ecstatic.</u> The final three tracks pull back into slow, drifting psychedelic ballads, letting the album exhale after its frenetic first half. The structural intelligence here is remarkable for a band barely two years into their discography: the sequencing alone tells a story of tension, release, and gentle dissolution. This is where their identity crystallised, and everything that followed, from *Nonagon Infinity*'s infinity loop to *Polygondwanaland*'s polyrhythmic ambitions, traces its lineage back to this record.

- title: "12 Bar Bruise"
  type: "music"
  creator: "King Gizzard & the Lizard Wizard"
  creator_role: "by"
  year: 2012
  eval: "meh..."
  genre: "psychedelic rock"
  image: "/assets/images/music/12_bar_bruise.jpg"
  posted: "2021-03-02"
  text: |
    KGLW's debut full-length commits to garage rock, and the first half delivers with conviction. The psychedelia runs thick, particularly on 'Nein', a track so well-constructed it would have sounded beautiful even in the 1980s, proof that the raw materials were always there. The energy is high, the fuzz is generous, and one can hear the outlines of a band that will eventually become one of the most prolific in contemporary rock.

    <u>But garage rock albums have a structural problem baked into the genre: they tend to exhaust their palette by the halfway mark.</u> ***12 Bar Bruise*** is no exception. From the title track onward, the momentum bleeds out, the riffs grow predictable, and the songs blur into one another. That the album barely clears two minutes per track on its back half seems less punk economy and more like an admission that the ideas have run dry. A promising debut, but one that already contains the lesson KGLW would learn on later records: garage alone is not enough.

- title: "An American Prayer"
  type: "music"
  creator: "Jim Morrison"
  creator_role: "by"
  year: 1978
  eval: "loved"
  genre: "rock"
  image: "/assets/images/music/american_prayer.jpg"
  posted: "2021-03-01"
  text: |
    'Cling to cunts & cocks of despair.' Jim Morrison died in 1971, and seven years later Manzarek, Krieger, and Densmore reunited in the studio with producer John Haeny to build ***An American Prayer*** around Morrison's spoken-word recordings from 1969-70. <u>this yields a posthumous collaboration that should not work but does, the surviving Doors playing with a restraint and sensitivity they rarely showed when Morrison was alive, wrapping his voice in arrangements that breathe rather than compete.</u> The last time I encountered spoken word married to music this effectively was Kate Tempest's *Let Them Eat Chaos*, and that comparison only underscores how rare this particular alchemy is.

    Morrison's voice is the whole argument. One does not need to be a scholar of poetry to feel the weight of these recordings; the grain of his baritone, the deliberate pacing, the way certain words seem to cost him something to say. The subject matter is inevitably shaped by its era, the ruled-by-TV anxiety, the counterculture's fading confidence, but it transcends period specificity through sheer vocal presence. 'Made by those people closest to Jim, personally and artistically': that liner note is not marketing copy, it is an accurate description of what one hears. <u>There is a tenderness in the way the three surviving Doors play behind Morrison's ghost that borders on the devotional, as though they understood that the only worthy tribute was to get out of the way and let the voice do what it always did.</u>

- title: "Help!"
  type: "music"
  creator: "The Beatles"
  creator_role: "by"
  year: 1965
  eval: "loved"
  genre: "rock"
  image: "/assets/images/music/help.jpg"
  posted: "2021-02-28"
  text: |
    ***Help!*** is the first Beatles album that moves one, as opposed to merely impressing or entertaining. The title track's lyrics carry a confessional urgency that the earlier work, for all its charm, never attempted: Lennon asking for help and meaning it, the pop scaffold holding real emotional weight for the first time. 'Ticket to Ride' pushes the harmonic palette further still, its vocal harmonies landing with a gravity that anticipates *Rubber Soul*'s more systematic experimentation with close-voiced arrangements.

    <u>And then there is 'Yesterday', whose chord progression alone would justify the album's existence, a descending sequence so inevitable in hindsight that one forgets how strange it must have sounded in 1965.</u> The rumour, of course, is that all of this, the confessional turn, the harmonic sophistication, the sudden willingness to be vulnerable, arrived after the band's well-documented encounters with certain substances. Whether or not the pharmacology is causal, the artistic leap is undeniable. Something opened up on this record that would never close again.

- title: "Finite States"
  type: "music"
  creator: "Frequency Eater"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  genre: "post-rock"
  image: "/assets/images/music/finite_states.jpg"
  posted: "2021-02-25"
  text: |
    ***Finite States*** is a textbook case of technique without teleology. The problem crystallises in 'Conversational Gravity', where the guitar riff sequence is technically accomplished and musically purposeless: one cannot parse, from any angle, what the sequence is supposed to mean in the context of the song, what tension it builds, what it resolves, what emotional or structural function it serves. It simply exists, a demonstration of finger speed in search of a reason to exist.

    <u>The album as a whole has the feel of a high-skill, low-vision patchwork, individual parts stitched together with impressive dexterity but no governing intelligence.</u> There is a Contortionist quality to the sound, the same zone of technical progressive metal, but none of the Contortionist's spiritual dimension, that capacity to make complexity feel like it is reaching toward something larger than itself. The difference, one suspects, is precisely this: purpose. One hopes the next record finds some.

- title: "Machine Head"
  type: "music"
  creator: "Deep Purple"
  creator_role: "by"
  year: 1972
  eval: "meh..."
  genre: "hard rock"
  image: "/assets/images/music/machine_head.jpg"
  posted: "2021-02-25"
  text: |
    Compared to what came before, ***Machine Head*** is a disappointment, marking Deep Purple's full pivot into hard rock and away from the progressive ambitions that made their earlier work interesting. The album even produced 'Smoke on the Water', perhaps the canonical example of a riff so famous it has become annoying, a song whose ubiquity in every guitar shop on earth has long since overwhelmed whatever charm it once possessed.

    <u>'Pictures of Home' offers a glimpse of the old fire in its second half, a passage that may represent the last genuine flicker of prog-rock spirit in the Deep Purple catalogue.</u> After this, the trajectory was set: louder, simpler, less curious. That it led where it led, to diminishing returns and eventual disintegration, feels in retrospect like an inevitability written into this very album's DNA.

- title: "逆光で見えない"
  type: "music"
  creator: "日食なつこ"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "J-rock"
  image: "/assets/images/music/gyakkou_de_mienai.jpg"
  posted: "2021-02-19"
  text: |
    I arrived at ***逆光で見えない*** through 'Fly-by', and by the time the album finished I was moved. 日食なつこ understands something that most singer-songwriters miss entirely: the piano is a semi-percussive instrument, and she composes with that knowledge embedded in every bar. <u>Her piano parts are written in rhythmic dialogue with the drums, locking into grooves so tight that most guitarists would struggle to match them, let alone a pianist working with hammered strings and sustain pedals.</u>

    What makes this doubly impressive is the consistency. Nearly every track on this album could stand alone as a highlight, and this is not the breathless enthusiasm of a first listen: this holds even at the point where one is beginning to tire of her particular sonic palette. That a single artist working within relatively narrow instrumental constraints can produce this density of quality speaks to a melodic and rhythmic intelligence that operates at a level most full bands never reach. <u>The piano here is not accompaniment; it is the entire engine, percussive and lyrical in the same gesture, and she drives it with a conviction that leaves no room for doubt.</u>

- title: "Mandarin"
  type: "music"
  creator: "Mindfield"
  creator_role: "by"
  year: 1993
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/mandarin.jpg"
  posted: "2021-02-19"
  text: |
    ***Mandarin*** is a rare artefact from the early Chinese rock scene: an album that, for all its unevenness, gestures toward something experimental within a domestic landscape that had barely begun to define itself. The four-star rating is honest rather than generous, partly because the album includes 'Asa', an inexplicable Japanese-language track that sits in the tracklist like a misplaced postcard. But the highlights are real, with several tracks offering mixes and arrangements that hold up on close inspection, built with more care and ambition than the Chinese rock scene of 1993 typically demanded.

    <u>The whole album radiates an unmistakable Radiohead energy, most transparently on the closing 'Cradle Song', which sounds so close to early Radiohead that one need only swap the vocalist to complete the illusion.</u> 'Jerry Says' channels a different influence, recalling an energy-curve arrangement one associates with Hua Chenyu's later production work: a dynamic arc that builds and resolves with real compositional awareness. The album is marketed as pop rock, but within the context of the mainland rock scene of its era, this was experimental territory, pushing at boundaries that most contemporaries did not even acknowledge existed. It deserves recognition for that, if not quite for every track it contains.

- title: "Dear"
  type: "music"
  creator: "Sweet John"
  creator_role: "by"
  year: 2014
  eval: "liked"
  genre: "indie pop"
  image: "/assets/images/music/dear.jpg"
  posted: "2021-02-18"
  text: |
    I first heard ***Dear*** three or four years after its release, and certain tracks lodged themselves immediately: '降雨機率', 'Dear', '留給你的我從未', and 'Angelina'. Of these, '降雨機率' sits without question in my top ten Taiwanese songs of recent years. The jazz piano solo at its centre is not technically complex, but it does not need to be; it simply sounds right, the kind of passage where restraint becomes its own form of eloquence, every note earning its place in the arrangement.

    <u>Years later, in 2018, I saw Sweet John live in Guangzhou, and of course they played '降雨機率'.</u> But the real surprise was the encore: '丸の內サディスティック', introduced as the 'team anthem' of their favourite band. And suddenly it all made sense: the melodic sensibility, the harmonic playfulness, the particular way Sweet John balance pop accessibility with compositional wit. The lineage was right there, hiding in plain sight, and hearing it live, surrounded by a crowd that understood, felt like a small confirmation that taste, when it is genuine, always leaves traces one can follow backwards to their source.

- title: "The Eternal Dance (Live 1993)"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 1993
  eval: "meh..."
  genre: "progressive metal"
  image: "/assets/images/music/eternal_dance_live_1993.jpg"
  posted: "2021-02-10"
  text: |
    A surprise appearance on streaming services, greeted initially with excitement, then suspicion. A closer look reveals the source: a 1993 Milwaukee broadcast, and the audio quality tells the story before the performances do. ***The Eternal Dance (Live 1993)*** may be the worst-sounding Dream Theater live recording I have encountered.

    <u>James LaBrie begins cracking on 'Metropolis Part 1' from the opening bars, Moore's keyboard tones are historically ugly, and Petrucci's guitar sounds as though it was never properly tuned.</u> Only Portnoy's drumming and Myung's bass remain worth hearing, their rhythm section professionalism the sole anchor in an otherwise dismal set. The whole thing has the unmistakable feel of a cash-in release, archival material pushed to market not because it deserves to be heard but because the catalogue demands feeding. Truly poor.

- title: "Fish Rising"
  type: "music"
  creator: "Steve Hillage"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/fish_rising.jpg"
  posted: "2021-02-08"
  text: |
    The opening track of ***Fish Rising*** is overwhelming. The scale of it, that vast, slow-building architecture of space, jazz, psychedelia, and prog converging into something that feels cosmic rather than merely cosmic-themed, stopped me cold on first listen. The sixth track operates in the same territory, the same fusion of idioms, and the effect is no less overwhelming for the repetition.

    <u>What sets Hillage apart from his former band Gong is the absence of contrivance.</u> Gong's mythology, charming as it could be, sometimes imposed a layer of deliberate eccentricity that stood between the listener and the music itself. Hillage strips that away, and what remains is purer: a free jazz sensibility, not in the technical harmonic language of free jazz, but in its spiritual openness, its willingness to let a passage breathe and drift without forcing it toward resolution. what emerges is an album that sounds like liberation feels, and one does not say that lightly.

- title: "Dino Rocket Oxygen"
  type: "music"
  creator: "Yuka & Chronoship"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/dino_rocket_oxygen.jpg"
  posted: "2021-01-31"
  text: |
    Among Japanese prog acts, Yuka & Chronoship occupy a distinctive niche: they are the closest the scene gets to a genuine neo-prog sensibility. Most of ***Dino Rocket Oxygen*** delivers on that promise handsomely. 'Ruler of the Earth' and 'Dance with Dinosaurs' showcase guitar work of real invention, while the 'O' / 'O2' / 'O3' suite features synth passages with a textural personality that distinguishes them from the generic pad-and-lead approach of lesser prog keyboards.

    The frustration, then, is the filler. 'Skygazer' and 'Blue Astronaut Helicopter' are simply not at the same level, tracks that would be unremarkable on any album and are actively jarring on one that otherwise aims this high. <u>And the cover art, ostensibly a Yes homage, manages to evoke none of Roger Dean's grandeur, landing instead as a clumsy tribute that does neither band any favours.</u> The core material deserves better framing than this.

- title: "Gathering The Waters"
  type: "music"
  creator: "I Am the Manic Whale"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/gathering_the_waters.jpg"
  posted: "2021-01-29"
  text: |
    ***Gathering The Waters*** is prog rock with a pop-leaning tonal palette, which sounds like a compromise but plays like a strength. The vocals sit brighter and more accessible than the genre typically permits, and the overall production choices lean toward clarity over density, giving the long-form compositions room to unfold without the murky weight that plagues so much modern prog. The extended tracks are where the album truly excels: 'Stand Up' and 'One (Hopeful Song)' both demonstrate a command of large-scale structure that many prog bands spend entire careers failing to develop.

    <u>The drum tones, in particular, are a quiet triumph: warm, punchy, and mixed with real care, they anchor the arrangements with a physicality that the brighter tonal choices elsewhere might otherwise lack.</u> The guitar work, too, operates at a consistently high level, fluid and inventive without resorting to the shred-for-its-own-sake tendencies that haunt the genre. Whether the pop-adjacent sound will sustain repeated listens is an open question; the tonal palette may eventually narrow the album's emotional range. But as a single listen, as a statement of what this band can do, it is thoroughly convincing.

- title: "I'm So Confused"
  type: "music"
  creator: "Colonel Abrams"
  creator_role: "by"
  year: 1994
  eval: "loved"
  genre: "dance"
  image: "/assets/images/music/im_so_confused.jpg"
  posted: "2021-01-29"
  text: |
    Impressive. ***I'm So Confused*** represents a significant leap from *I Don't Do Drugs*, shedding much of the straightforward dance-floor functionality in favour of a richer, more colourful sonic palette. The grooves here are not just serviceable but inventive, built with a rhythmic intelligence that rewards close listening and refuses to settle into the predictable four-on-the-floor patterns one might expect.

    <u>The first and fourth tracks carry an uncanny resemblance to Cleft (rest in peace), that same angular, riff-driven energy married to rhythmic complexity.</u> The fourth track is the standout, a piece of such concentrated vitality that it justifies the album on its own terms. What strikes one most is the range: this is an artist moving decisively beyond genre constraints, discovering that groove can be a vehicle for genuine musical ambition rather than merely a dancefloor utility.

- title: "Try It....You Might Like It"
  type: "music"
  creator: "GA‐20"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "blues"
  image: "/assets/images/music/try_ityou_might_like_it.jpg"
  posted: "2021-01-27"
  text: |
    It has been a long time since an album caught me this completely off guard. ***Try It....You Might Like It*** opens with two tracks that could pass for beautifully crafted folk, lulling one into comfortable expectations. Then 'Hygge' begins, nine minutes long, and from the first bar's odd time signature the comfortable expectations shatter. <u>By the time 'Story Tellers' arrives with a synth solo that marries technical facility to pure melodic inspiration, a solo one would trade a year of one's life to have written (two years, honestly), the album has declared its intentions beyond any doubt.</u>

    'Winter Maker', 'Beauty Falls', and 'Feels Alright' sustain that level of inspiration without apparent effort, each track radiating a quality one can only call spiritual generosity: the sense that Pete Jones has more ideas than he knows what to do with and is sharing them freely. The talent here is not merely compositional but curatorial; every track is placed with care, every transition earns its moment. <u>There is a particular kind of brilliance that does not announce itself but simply seeps outward, and this album is saturated with it.</u>

- title: "Story of I"
  type: "music"
  creator: "Patrick Moraz"
  creator_role: "by"
  year: 1976
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/story_of_i.jpg"
  posted: "2021-01-27"
  text: |
    The Yes influence on ***Story of I*** runs deep, not merely in the sonic palette but in the conceptual ambition: a narrative of romance and awakening set within a tower, an architectural metaphor that prog's golden age treated as natural storytelling vocabulary. Patrick Moraz absorbed Yes's atmospheric sensibility so thoroughly during his tenure with the band that traces of it permeate every passage here, yet the album never feels like imitation. It has its own interior logic, its own emotional temperature.

    <u>Musically, the album delivers moments of real beauty: 'Rise and Fall' offers solos and melodic lines that balance virtuosity with genuine feeling, while the harmonies and synth textures throughout are placed with a precision that suggests deep compositional thought rather than improvised sprawl.</u> It is, in the end, a gorgeous record, one that earns its ambition through craft rather than mere scale.

- title: "The Death Defying Unicorn"
  type: "music"
  creator: "Motorpsycho and Ståle Storløkken"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/death_defying_unicorn.jpg"
  posted: "2021-01-25"
  text: |
    A masterpiece. ***The Death Defying Unicorn*** overflows with exceptional compositions, more than one can reasonably catalogue on a single listen. The atmosphere alone would justify the album's existence, but it is the structural ambition, the sheer scope of the thing, that elevates it into rarefied territory. CD1 operates within recognisable Motorpsycho idiom: heavy, riff-driven, psychedelic in the muscular Scandinavian tradition. It is excellent on its own terms. But CD2 is where the album transcends.

    <u>On CD2, Motorpsycho and Ståle Storløkken are doing something that surpasses the vast majority of contemporary prog rock, both in arrangement and melody.</u> The compositions breathe with an orchestral intelligence, moving through passages of density and delicacy with a confidence that feels earned rather than performed. Every element, every instrumental voice, occupies its correct place in the mix and in the narrative arc. No amount of praise feels adequate. This is prog rock that remembers what the genre was supposed to be about: not complexity for its own sake, but complexity in the service of feeling something enormous.

- title: "The Perfect Map"
  type: "music"
  creator: "Elephants of Scotland"
  creator_role: "by"
  year: 2017
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/perfect_map.jpg"
  posted: "2021-01-15"
  text: |
    ***The Perfect Map*** is a strange beast. The piano tone is about as ugly as one can imagine, brittle and clanging, the sort of timbre that would make a conservatoire tutor wince. And yet, threaded through that ungainly texture, there are genuine flashes of melodic intelligence, little phrases that catch the light before vanishing back into the murk. It is the tension between the two that makes the record compelling: the arrangements refuse prettiness, but the compositional instinct keeps reaching for it anyway, and the friction between those impulses generates a peculiar energy that holds across repeated listens.

    <u>One later discovers that <em>Random Mirth</em>, with its near-identical cover art, is essentially a remastered instrumental version of this album, which reframes the whole project as something more deliberate than it first appears.</u> The decision to strip the vocals and remaster suggests the band heard something in these compositions worth isolating, worth refining. They were right. For all its rough edges, this is a record with a quiet conviction about what prog can sound like when it stops trying to impress and starts trying to mean something.

- title: "Sabbath Bloody Sabbath"
  type: "music"
  creator: "Black Sabbath"
  creator_role: "by"
  year: 1973
  eval: "meh..."
  genre: "heavy metal"
  image: "/assets/images/music/sabbath_bloody_sabbath.jpg"
  posted: "2021-01-11"
  text: |
    'Sabbra Cadabra' is the clear highlight of ***Sabbath Bloody Sabbath***, and it works precisely because it leans so far into psychedelia that one can forgive the rhythmic monotony underneath. The riff cycles and Iommi's repetition become almost hypnotic in that context, swallowed up by the swirling atmosphere. Psych as anaesthetic for structural laziness: it is a trick that only works when the vibe is thick enough, and on that track, it is.

    The problem is that the rest of the album lacks that narcotic haze, and without it, the repetition is just repetition. 'Killing Yourself to Live' features a solo so awkwardly composed it sounds like someone stumbling through a scale exercise in front of an audience. The remaining tracks follow the established formula: one riff, ridden into the ground. <u>Sabbath at their best made repetition feel ritualistic; here it mostly feels like they ran out of ideas halfway through the writing sessions.</u>

- title: "Songs From A Solitary Home"
  type: "music"
  creator: "Major Parkinson"
  creator_role: "by"
  year: 2010
  eval: "loved"
  genre: "art rock"
  image: "/assets/images/music/songs_from_a_solitary_home.jpg"
  posted: "2021-01-09"
  text: |
    ***Songs From A Solitary Home*** is technically rougher than Major Parkinson's later records, the production thinner, the performances less polished. But what it has, and what so few prog bands can claim, is genuine restlessness. <u>In a genre that fetishises complexity while remaining stylistically conservative, Major Parkinson are one of the rare acts that embody the original prog ethos: the refusal to repeat oneself, the insistence that each song earn its own form.</u> The stylistic range here is not eclecticism for its own sake; it is the sound of a band that finds repetition more frightening than failure.

    What elevates this above a merely interesting debut, though, is the writing. The lyrics carry a weight that the instrumentation alone could not bear: 'Suicide is painless in the town where I was born / Life became a suffocated way to block the world out from my own' is not clever wordplay; it is plainspoken despair, and it cuts precisely because the delivery does not dress it up. And then that devastating pivot: 'Just cry a little harder everything is gonna be okay.' Without the lyrical dimension, this would be a solid three-and-a-half-star record with promising arrangements. With it, it reaches somewhere altogether darker and more honest. The words are the spine.

- title: "Senpai III"
  type: "music"
  creator: "Sithu Aye"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/senpai_iii.jpg"
  posted: "2021-01-08"
  text: |
    I will confess that when Maung Maung announced 'Senpai 3' on Instagram, my first reaction was mild disappointment. The *Senpai* series had always felt like a tier below his more ambitious work, pleasant enough but lacking the compositional density that makes his best records exciting. ***Senpai III*** dismantles that assumption entirely. <u>From the opening bars it is clear that Sithu Aye has levelled up in ways that render the comparison to earlier entries in the series irrelevant: the tapping work alone is extraordinary, fluid and precise, but it is the arranging that truly stuns.</u> Every track feels like it has been thought through as architecture, not just as a vehicle for fretboard gymnastics.

    There are two weaker moments: 'A Future with No Colour' and 'Graduation' both dip below the standard set by the rest of the tracklist. But the remainder is so consistently strong that these feel like brief pauses for breath rather than genuine flaws. What strikes me most is how joyful the record sounds. Instrumental prog can so easily become austere, a display case for technique. This has the warmth of someone who still loves what the guitar can do, and that love is infectious.

- title: "Absolute Zero"
  type: "music"
  creator: "Moses Boyd"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  genre: "jazz"
  image: "/assets/images/music/absolute_zero.jpg"
  posted: "2021-01-07"
  text: |
    The central problem with ***Absolute Zero*** is legibility: the melodic writing sounds lost. 'Gravity' is the most instructive example. The melody line wanders without apparent destination, as though the composer started each phrase without knowing where it would end and simply hoped that momentum would provide direction. It does not. The result is music that feels sketched rather than composed, provisional where it needs to be decisive.

    'Inertia' compounds the issue with a synth solo towards its back half that commits the same error in a harsher timbre, the tone itself unpleasant enough to strip away whatever goodwill the rhythmic bed might have generated. <u>One is left wondering whether the arrangements represent a deliberate embrace of disorientation or simply a failure to edit.</u> The line between avant-garde freedom and compositional aimlessness is thinner than it looks, and this record lands on the wrong side of it more often than not.

- title: "1977"
  type: "music"
  creator: "Ash"
  creator_role: "by"
  year: 1996
  eval: "loved"
  genre: "alternative rock"
  image: "/assets/images/music/1977.jpg"
  posted: "2021-01-06"
  text: |
    The atmosphere and tone colour on ***1977*** are beautifully handled, with a warmth and cohesion to the mix that makes even the repeated sections feel purposeful, textured rather than padded. But I do not want to spend time cataloguing the album's merits and faults. I want to talk about Ash himself.

    <u>This person began writing this album in 2003, then left to study physics, then came back, God knows how many years later, to finish what he started.</u> Seventeen years. In that span, recording technology transformed entirely: DAWs evolved through multiple generations, mixing conventions shifted, plugin ecosystems exploded. He relearned guitar. He relearned mixing. He taught himself the new tools from scratch and came back to make this record real. He released it to three followers on Spotify and thirty-five on Twitter. The tweet announcing the album received zero likes, zero comments. Silence. And still he pressed publish. <u>There is something in that act, the sheer bloody-minded persistence of finishing a thing for its own sake when the world has given every possible signal that it does not care, that moves me more than any chord progression on the record.</u> This is what devotion sounds like when it has been stripped of all reward.

- title: "The Liberation"
  type: "music"
  creator: "Disillusion"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "progressive metal"
  image: "/assets/images/music/liberation.jpg"
  posted: "2020-12-28"
  text: |
    'Wintertide' is a excellent track, the one moment on ***The Liberation*** where atmosphere and technical execution converge into something that justifies the record's existence. The production opens up, the arrangement breathes, and for a few minutes one can hear the band this could have been.

    The rest, unfortunately, is formulaic. The arrangements lean on stock prog-metal conventions without interrogating them, and the vocalist's tone actively undermines what the instrumentalists build, deflating tension where it should be escalating. And then there is 'Time to Let Go', a track so embarrassingly conceived that one instinctively curls one's toes. <u>When a record's low points provoke physical discomfort, the high points need to be transcendent to compensate; one strong track is not enough.</u>

- title: "The Yes Album"
  type: "music"
  creator: "Yes"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/yes_album.jpg"
  posted: "2020-12-27"
  text: |
    ***The Yes Album***, 1971. I remember a stretch at university when 'Yours Is No Disgrace' hung in the air of the dormitory for days, reverberating long after the speakers had been switched off. That lingering quality is the album's signature: these compositions embed themselves. 'Starship Trooper', 'I've Seen All Good People', 'Perpetual Change', each one a masterclass in ensemble interplay and dynamic arc, a tracks that have earned their canonical status not through nostalgia but through sheer structural intelligence.

    There are moments, and I say this with full awareness of the anachronism, where the riffing almost sounds like it wants to djent. The rhythmic angularity, the low-end crunch, the way the guitars lock into almost mechanistic patterns before dissolving back into melodic flight. (Apologies.) <u>This is where Yes's prog era properly begins, the launchpad for the most extraordinary run of records the genre would produce, and it already sounds like a band that knows exactly how high it is about to climb.</u>

- title: "Valentyne Suite"
  type: "music"
  creator: "Colosseum"
  creator_role: "by"
  year: 1969
  eval: "loved"
  genre: "jazz rock"
  image: "/assets/images/music/valentyne_suite.jpg"
  posted: "2020-12-27"
  text: |
    It had been a long time since psychedelia hit me this hard. ***Valentyne Suite*** builds its atmosphere with extraordinary patience, layering textures until the sound becomes almost spatial, a room one can walk through. 'Elegy' and 'Butty's Blues' are both stunning, but the title suite is the centrepiece: expansive, restless, and possessed of a structural confidence that makes its twenty-odd minutes feel inevitable rather than indulgent.

    A track or two leans too heavily on repetition, 'The Kettle' being the most obvious case, but even these never collapse into tedium. The playing is too alive, too responsive for that. <u>Colosseum in 1969 were doing something that most psych bands of the era lacked the musicianship to attempt: building long-form architecture out of improvisation, making the jam feel composed and the composition feel spontaneous.</u> this yields one of the most beautiful records of its decade.

- title: "Time and a Word"
  type: "music"
  creator: "Yes"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/time_and_a_word.jpg"
  posted: "2020-12-25"
  text: |
    ***Time and a Word***, 1970. The muscular psychedelia continues, the Beatles influence still audible in the lyrical register, that particular blend of wistfulness and ambition. 'Sweet Dreams' and 'The Prophet' are extraordinary, the latter likely Anderson's first attempt at narrative songwriting, lyrics that tell a story rather than sketch a mood. There is something exciting about hearing him discover that capacity in real time.

    The 2003 remaster is the version to hear: Chris Squire's bass, notoriously buried in Tony Colton's original mix to the point of near-invisibility, is finally brought forward, and the record gains an entire rhythmic dimension it had always possessed but never been allowed to show. <u>The album's backstory is almost too perfectly ironic: Peter Banks quit because he objected to the orchestral arrangements, Steve Howe replaced him, and the American cover featured a photograph of the new lineup, Howe's face on an album to which he contributed not a single note.</u> Prog's talent for absurdist personnel drama was already fully operational.

- title: "Yes"
  type: "music"
  creator: "Yes"
  creator_role: "by"
  year: 1969
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/yes.jpg"
  posted: "2020-12-25"
  text: |
    ***Yes***, 1969. The origin story is well known: Jon Anderson and Peter Banks attended a King Crimson concert, were duly stunned, and resolved to raise their own instrumental game. The result was this debut, an album saturated in what one can only call muscular psychedelia, the lysergic shimmer of the late sixties underpinned by a technical ambition that most psych bands of the era simply did not possess.

    What surprises on revisiting is the dynamic range. Beyond the dazzling pyrotechnics of 'Beyond and Before', there is the tender, almost fragile 'Yesterday and Today', a track that proves the band could do softness without losing its identity. <u>The lyrics are transparently Beatles-influenced, love songs dressed in the idiom of 1969, but the instrumental sophistication beneath them already hints at something far stranger and more ambitious gathering force.</u> Love and virtuosity, naivety and precision: these tensions would define Yes for years, and they are already here, fully alive.

- title: "Minstrel in the Gallery"
  type: "music"
  creator: "Jethro Tull"
  creator_role: "by"
  year: 1975
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/minstrel_in_the_gallery.jpg"
  posted: "2020-12-24"
  text: |
    ***Minstrel in the Gallery***, 1975, Jeff Hammond's farewell. Ian Anderson's lyric-writing recovers its sharpness here, the literary ambition that had dimmed on the preceding records returning with renewed focus. There is a care to the words that makes one lean in, a sense that each line has been weighed rather than dashed off.

    The arrangements, however, remain stubbornly conventional. The instrumentation does its job without surprise, competent but uninspired, and one emerges the album suspecting that Jethro Tull were never really a prog band at all. <u>They were always a blues band that refused to be categorised, and the prog years were less a transformation than a costume change.</u> The musicianship stayed rooted in the same soil. Whether that is a compliment or a criticism depends on what one came looking for.

- title: "Thick as a Brick"
  type: "music"
  creator: "Jethro Tull"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/thick_as_a_brick.jpg"
  posted: "2020-12-22"
  text: |
    The story goes that by 1972, Jethro Tull looked around and found themselves surrounded by Genesis, Yes, and the rest of the prog vanguard. Their blues credentials, however formidable, were no longer enough to hold the room. And so, leaning on a foundation of genuine musical craft, they leapt into the prog maelstrom. ***Thick as a Brick*** is what emerged, and it is, without qualification, their finest hour.

    The flute-as-lead-guitar needs no further commentary at this point; nor does the bright, cutting clavier tone; nor does Anderson's voice, which here achieves a sweetness that his later, more theatrical performances would sacrifice. <u>What makes this record extraordinary is the irony at its core: Anderson, openly contemptuous of the concept album as a form, produced the single most convincing argument for its existence.</u> The accidental masterpiece. The thing made in spite of itself. It arrived like a detonation, and nothing about it has lost its force.

- title: "冀西南林路行"
  type: "music"
  creator: "万能青年旅店"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "C-rock"
  image: "/assets/images/music/ji_xi_nan_lin_lu_xing.jpg"
  posted: "2020-12-22"
  text: |
    Has ***冀西南林路行*** grown more prog than its predecessor? Yes. Has the arranging become more technically accomplished? Certainly. Is it better than the debut? No. The 9.8 rating on Douban is generous to the point of delusion; an honest assessment lands closer to eight. Without the idealism and the almost devotional fervour that powered the first record, this album's weaknesses stand exposed.

    The strengths first. 'He Bei Mo Qi Lin' is the big prog statement: its main motif, two bars of 5/8 followed by two bars of 8/8, calibrates the disorientation beautifully, complex enough to unsettle the ear, never so fractured that it alienates the audience the debut built. <u>The viola ensemble passage in the middle is a genuine stroke of brilliance, two phrases that illuminate everything around them.</u> 'Cai Shi' is similarly strong, its jazz-fusion blend of piano, saxophone, and guitar thrilling, though the stone sound effects are inexplicably poor in quality. The problem is accumulation. The piano coda of 'Cai Shi' begins to feel like bricklaying, material stacked rather than shaped, and the layered effects in 'Shan Que' suffer from the same compulsion. The vocal melodies lack the luminous instinct of the debut, a point that few would contest. And the final track is simply weak. Wanqing were never a lyrics-first band, but this is a new low.

- title: "Aqualung"
  type: "music"
  creator: "Jethro Tull"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/aqualung_remastered.jpg"
  posted: "2020-12-21"
  text: |
    ***Aqualung***, 1971: the first album featuring John Evan and Jeff Hammond, and the last before Jethro Tull plunged headlong into their prog era, a thought that still makes me restless with anticipation even now. The critical discourse has long debated whether this qualifies as a concept album. From a lyrical standpoint, the answer is plainly no: the songs do not cohere into a sustained narrative, and Anderson himself has said as much. The concept-album reading says more about the listener's desire for unity than about the record itself.

    The A side is solid, consistent with the quality of the three preceding albums but not a marked leap beyond them. It is the B side that elevates the whole. 'My God' and 'Hymn 43' are ferocious, Anderson's flute work so intense it feels physically demanding to listen to, each phrase played as though he is trying to empty his lungs entirely. <u>Seven million copies sold, and the number does not feel disproportionate; this is one of those rare records whose commercial success is indistinguishable from its artistic merit.</u>

- title: "Stand Up"
  type: "music"
  creator: "Jethro Tull"
  creator_role: "by"
  year: 1969
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/stand_up.jpg"
  posted: "2020-12-21"
  text: |
    Nobody can resist Ian Anderson's flute. ***Stand Up***, 1969, makes the case in the opening bars and never relents. The tone on 'Reasons for Waiting' alone, that crystalline, almost impossibly pure sound cutting through the mix, is enough to justify the record's existence. It is a timbre that lodges in the memory and refuses to leave.

    'We Used to Know' is my favourite, and Anderson's self-deprecating claim in interviews that 'Hotel California' is the superior song is the sort of modesty that fools nobody. The resemblance is, shall we say, conspicuous. 'Fat Man' brings an unexpected mandolin into the arrangement, a textural choice so distinctive that one recalls Porcupine Tree borrowing the same instrument on 'Train' years later. <u>This is Jethro Tull at their most irresistible: blues-rooted, technically dazzling, and anchored by a frontman whose instrument sounds like nothing else in rock.</u> I love this record.

- title: "This Was"
  type: "music"
  creator: "Jethro Tull"
  creator_role: "by"
  year: 1968
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/this_was.jpg"
  posted: "2020-12-21"
  text: |
    What a force. ***This Was***, 1968, and Anderson's flute is already fully realised, already the most distinctive voice in British rock. The blues playing is immaculate, muscular and precise, with none of the sloppiness that 'authenticity' is sometimes used to excuse. These are musicians whose craft was formed in classic rock and blues, and it shows in every bar.

    <u>As Anderson himself later acknowledged, the subsequent pivot to prog was something of a lark; the real foundation was always this, always the blues.</u> Knowing that reframes the entire Tull discography: the prog years were an adventure undertaken by blues musicians who never lost their centre of gravity. I am not filing this one under prog. But the power is undeniable.

- title: "Shamal"
  type: "music"
  creator: "Gong"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/shamal.jpg"
  posted: "2020-12-20"
  text: |
    ***Shamal*** is, to date, my favourite Gong record, and the reason is simple: clarity. Every track has a distinct identity, a character that makes it immediately recognisable and impossible to confuse with its neighbours. One does not mistake the funky, jazzy, faintly proggy swagger of 'Chandra' for the flute-driven, liquid flow of 'Bambooji'; they inhabit entirely different emotional spaces while belonging unmistakably to the same album.

    <u>The record plays as a single, unbroken gesture, each track flowing into the next with an inevitability that makes the sequencing feel composed rather than compiled.</u> That sense of continuous motion is Gong's great gift here: the album breathes as a whole, and by the time it ends, one realises that the experience was less like listening to a collection of songs than like being carried by a current. Beautiful, start to finish.

- title: "Stone Café"
  type: "music"
  creator: "Leah Dou"
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "singer-songwriter"
  image: "/assets/images/music/stone_cafe.jpg"
  posted: "2020-12-19"
  text: |
    Leah Dou's voice is distinctive, carrying a raw, slightly abrasive quality that recalls early Fiona Apple, a comparison that is hard to avoid and not entirely flattering to the material surrounding it. The problem with ***Stone Café*** is the same problem that would persist four years later and eventually curdle into something worse: the arrangements are thin. The production lacks density, the instrumental choices feel tentative, and the voice, remarkable as it is, has nothing substantial to push against.

    <u>Listening back now, one can hear her cycling through styles, searching for a direction that would feel natural, and never quite finding it.</u> There is something poignant about that restlessness, the sense of a talented musician unable to locate the aesthetic home that would let her settle in and dig deep. Without that grounding, the energy scatters, each experiment abandoned before it bears fruit. The new album confirmed what this debut only hinted at: potential, unmoored and drifting.

- title: "Infinity Stare"
  type: "music"
  creator: "Alpha Male Tea Party"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "math rock"
  image: "/assets/images/music/infinity_stare.jpg"
  posted: "2020-12-19"
  text: |
    It had been a while since I had listened to any prog metal, and then Alpha Male Tea Party dropped ***Infinity Stare*** and the internal fireworks went off. There is an old and only half-serious taxonomy that divides prog metal into two camps: bands that strive to elevate metal into art, escaping the gravitational pull of thrash and its ancestors, and bands that exist purely for the pit, for the head-swinging, body-moving, think-later physicality of the thing. AMTP sit at the apex of the second category. Their music does not ask to be analysed; it asks to be felt in the neck and the chest.

    <u>The craft is real, the riffs are devastating, and the energy is inexhaustible.</u> And then, on the closing title track, they do the unthinkable: vocals. After years of instrumental purity, actual singing. AMTP have betrayed the instrumental revolution, and I am not sure I have forgiven them. But the record is too good for grudges.

- title: "Interview"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1976
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/interview.jpg"
  posted: "2020-12-15"
  text: |
    ***Interview*** is the last album of Gentle Giant's imperial phase, and it sits right on the knife-edge between four and five stars. The concept is brazen: a full album structured around the band being interrogated by the press, essentially a big fuck-you to the news media, which goes some way toward explaining why Gentle Giant never enjoyed the critical adulation lavished on their prog contemporaries. The title track continues their restless experimentalism whilst smuggling in unmistakable pop and hard rock contours; Minnear's keyboard work across this piece is extraordinary, layered with an almost orchestral density that never collapses into clutter. 'Give It Back' pushes the experimentation further still, stacking rhythmic and harmonic complexity into what is arguably the most intricate composition on the record.

    <u>The sequencing is immaculate: 'Design' picks up the thread of contrapuntal vocal writing that 'Knots' and 'On Reflection' had established, but with a tighter, more economical arrangement that reflects a band fully in command of their own vocabulary.</u> The standout, though, is 'Empty City', a track so perfectly balanced between prog ambition and emotional immediacy that it could have slotted seamlessly into *Free Hand*. There is a particular ache in knowing that this is where the story peaks. <u>From 1977 onward, Gentle Giant would make the worst decision of their career, chasing a commercial accessibility they were never built for, and the loss of what this album represents, that alchemical fusion of medieval counterpoint, jazz, and rock complexity, remains one of prog's quietest tragedies.</u>

- title: "Free Hand"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/free_hand.jpg"
  posted: "2020-12-14"
  text: |
    ***Free Hand*** is my favourite Gentle Giant album, and it might be the most persuasive argument the band ever made for prog as a fundamentally integrative art. This is where prog, pop, jazz, medieval counterpoint, and Romantic-era harmonic sensibility crystallise into something perfectly balanced: no single element overwhelms the others, yet none is diluted. Who else in the 1970s could have written 'On Reflection', with its layered vocal counterpoint, those lyrics that read like compressed philosophy, and the way the glockenspiel, piano, recorder, and synthesiser gradually emerge and colonise the melodic foreground? <u>Who else could have written 'Free Hand' itself, a track that fuses free jazz, deep drum grooves, and progressive structure into something that feels not assembled but grown?</u>

    Even the most overtly prog piece, 'His Last Voyage', refuses to be austere about it: four minutes in, an expansive, lovely piano-and-guitar solo section opens up, as though the band cannot help but make difficulty pleasurable. 'Talybont' circles back to their beloved medieval idiom, but with the full instrumental arsenal and the stacked vocal harmonies that are by now a signature rather than a novelty. <u>This is their most accessible record, and that accessibility is not a concession; it is a demonstration of mastery.</u> Anyone writing in any genre could learn from the economy and generosity of these arrangements. It is the rare prog album that makes complexity sound inevitable rather than effortful, and it has not aged a day.

- title: "The power and the glory"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/power_and_the_glory.jpg"
  posted: "2020-12-14"
  text: |
    ***The Power and the Glory*** is Gentle Giant at their most uncompromisingly progressive, if not the single most avant-garde record in their catalogue then certainly in the top two. Everything that *Octopus* and *In a Glass House* had been building toward finds its fullest expression here. 'Proclamation' opens with cascading layered vocals over a funky bass-and-drum groove that should not work but does, triumphantly. 'Aspirations' introduces a faint pop sensibility, recalling something of the warmth of 'No God's a Man', but the vocal delivery is gentler, the synth timbres more carefully calibrated, and the result may be the single most beautiful track on the record.

    'Playing the Game' and 'Cogs in Cogs' are where the album's rhythmic ambition becomes most explicit: the time-signature shifts come so frequently and so fluently that one stops counting and starts simply surrendering to the momentum. And then there is 'So Sincere', Gentle Giant's avant-garde at its most confrontational. <u>As the band chants 'SO SIN-CERE', every instrument peels off in a different direction simultaneously, producing something ugly, disorienting, and worth one's full attention.</u> It is the kind of deliberate dissonance that separates musicians who understand the rules from musicians who have transcended them. The album does not ask to be liked. It asks to be reckoned with.

- title: "In a Glass House"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1973
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/in_a_glass_house.jpg"
  posted: "2020-12-14"
  text: |
    ***In a Glass House*** follows directly from *Octopus*, but under altered circumstances: Phil Shulman had quarrelled with his brothers and departed, taking his saxophone with him. What could have been a diminishment became an intensification. <u>The remaining members, as though driven to fill the gap through sheer compositional ambition, pushed the arrangements harder and more seriously than before, and what emerges is this extraordinary, brittle, gleaming record.</u>

    'Experience' and the title track showcase an almost bewildering parade of instrumental voices, violin, harpsichord, electric guitar, choir, shifting fluidly between hard rock, prog, and jazz idioms within single tracks. The syncopation in 'Experience' deserves particular attention: it is precision-engineered, exploiting tiny rhythmic offsets between instruments to produce disproportionately large shifts in the listener's experience. <u>That micro-displacement technique, where a fraction of a beat's misalignment between parts generates a kind of perceptual vertigo, is Gentle Giant at their most formally inventive.</u> Small wonder that although this album was never officially released in the United States, import sales broke records. Some music does not need a distribution network; it needs only to exist.

- title: "Octopus"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/octopus.jpg"
  posted: "2020-12-14"
  text: |
    ***Octopus*** is Gentle Giant's most inspired album, and if one needed a single track to explain what prog rock is and why it matters, 'Knots' alone would suffice. The concept is elegant: each track is a self-portrait of a different band member, eight perspectives refracting through eight compositions, the octopus of the title rendered as a creature of multiple minds. Even 'A Cry for Everyone', the most straightforwardly hard-rock piece on the record, is laced with floating synth textures and melodic lines that refuse to stay within the genre's gravitational pull.

    'Think of Me with Kindness' is a track that everyone should hear at least once: the balance between pop immediacy and prog intricacy is pitched so precisely that neither element knows it is supposed to be at war with the other. <u>This is an album one can return to endlessly, and each listen yields something new, not only musically but conceptually.</u> On this pass, a proper listen to 'The Advent of Panurge' finally revealed its source: the episode in Rabelais where Pantagruel meets Panurge, that great picaresque encounter between giants. The literary ambition is not decorative; it is structural, a band of multi-instrumentalists telling stories about multiplicity itself. Gentle Giant never made a more complete statement than this.

- title: "Three Friends"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/three_friends.jpg"
  posted: "2020-12-13"
  text: |
    ***Three Friends*** is an exquisitely crafted concept album whose narrative, while it could have been expanded further, never constrains the six members' instrumental and arrangemental ambition. The core conceit is immediately compelling: three friends, three distinct musical styles to embody their diverging lives. This alone would be noteworthy, but the album layers additional sophistication on top. 'Schooldays' introduces a stacked vocal technique, voices overlapping in cascading counterpoint, a writing that would be deployed on a massive scale in *Octopus*'s 'Knots'. The lyrical prosody is carefully engineered, rhyme schemes calibrated with an almost academic precision, and 'Mister Class and Quality' features extended guitar-keyboard dialogues that crackle with competitive energy.

    <u>These techniques, contrapuntal vocal layering, instrumental call-and-response, metrically complex ensemble writing, were novel in early-1970s popular music, with the obvious exception of classical composition, where such devices had centuries of precedent.</u> That Gentle Giant could naturalise these techniques within a rock idiom without losing either the rock energy or the compositional rigour remains one of the great achievements of the genre. The album served as the proving ground for everything that would make *Octopus* their masterpiece, and it deserves recognition not merely as a stepping stone but as a destination in its own right.

- title: "Acquiring the Taste"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/acquiring_the_taste.jpg"
  posted: "2020-12-12"
  text: |
    ***Acquiring the Taste*** is best introduced in the band's own words: 'It is our goal to expand the frontiers of contemporary popular music at the risk of being very unpopular. We have recorded each composition with the one thought – that it should be unique, adventurous and fascinating. It has taken every shred of our combined musical and technical knowledge to achieve this.' That manifesto, printed on the sleeve, is one of the great mission statements in rock music, and the album delivers on it with an almost reckless sincerity. 'Wreck' and 'Plain Truth' are particular favourites: both tracks embody a band that has decided to chase difficulty not as an end in itself but as the precondition for a kind of beauty unavailable to those who play it safe.

    <u>What strikes one most about the album, half a century on, is how little it sounds like a band proving a point and how much it sounds like a band discovering what it is.</u> The eclecticism that would become Gentle Giant's defining trait, the medieval textures, the jazz voicings, the hard-rock weight, the contrapuntal vocal arrangements, is already present here, not as a checklist of influences but as an emerging language. The risk of being very unpopular, it turns out, was the price of becoming irreplaceable.

- title: "Gentle Giant"
  type: "music"
  creator: "Gentle Giant"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/gentle_giant.jpg"
  posted: "2020-12-11"
  text: |
    Besides King Crimson, what other band of the 1970s could have produced music like this? ***Gentle Giant***, the self-titled debut, marks the arrival of one of prog's most formidable ensembles: the three Shulman brothers, Gary Green, and Kerry Minnear. Raised by a father who insisted on multi-instrumental fluency, the Shulmans brought a breadth of tonal palette that most bands spend entire careers assembling, and it is all here from the very first record. <u>Every element that would come to define their subsequent work, the contrapuntal vocals, the genre-fluid arrangements, the medieval harmonic sensibility threaded through rock instrumentation, is already audible, nascent but unmistakable.</u>

    The debut is not the peak; the peak was still several albums away. But it is the foundation, and it is astonishing how fully formed the architectural blueprint already was. One listens and hears not a band searching for an identity but a band that already knows exactly what it wants to be and is merely gathering the technical means to get there. The prog era had begun, and its most underrated architects had just announced themselves.

- title: "A Trick Of The Tail"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1976
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/trick_of_the_tail.jpg"
  posted: "2020-12-10"
  text: |
    ***A Trick of the Tail*** is the first Genesis album with Collins both behind the kit and at the microphone, and it represents a decisive step toward pop, the implications of which would only become fully apparent later. 'Squonk' and 'Ripples' carry unmistakable pop fragrances, yet both retain enough structural invention to function as genuine negotiations between accessibility and progressive ambition rather than capitulations. The lyrics feel saturated with allusions to Gabriel's departure; Banks in particular seems unable to stop mourning. 'Ripples never come back', Rutherford and Banks sing in 'Ripples', and the line lands with a weight the melody alone cannot account for.

    <u>One hears the effort everywhere: 'Dance on a Volcano' opens the album with rapid tempo changes and novel synth timbres that are frankly virtuosic, as though the remaining members needed to prove, to the audience and perhaps to themselves, that they could still astonish without their frontman.</u> It works. The album matched *Selling England by the Pound*'s UK No. 3 chart position, and Banks is the album's greatest single asset, his keyboard writing carrying the emotional and harmonic architecture almost single-handedly. What makes the record bittersweet is not what it is but what it foreshadows: the pop instincts audible here would soon overwhelm everything else, and the balance achieved on *A Trick of the Tail* would prove unrepeatable.

- title: "The Lamb Lies Down on Broadway"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/lamb_lies_down_on_broadway.jpg"
  posted: "2020-12-10"
  text: |
    ***The Lamb Lies Down on Broadway*** is an album one needs to sit with properly, and I still owe it a thorough analytical pass through Rael's odyssey. It is Peter Gabriel's last Genesis record, the threshold after which Collins's pop era begins and the Prog Archives ratings fall off a cliff. The story itself is irresistible, a hallucinatory picaresque through a surreal New York underworld, and the shadow of Pink Floyd's *The Wall* hangs over it heavily, though the chronology is instructive: Genesis got there first, five years before Waters.

    'Broadway Melody of 1974' and 'Lilywhite Lilith' are favourites, and the discovery that both share an almost identical rhythmic groove despite their surface differences reveals something essential about the album's compositional method. <u>Musically, each track develops a single motif outward, a consequence of the album having been written mostly out of jam sessions, and this origin gives the record a restless, improvisatory energy that the more meticulously pre-composed Genesis albums sometimes lack.</u> The closing track 'It' is magnificent: Collins's drumming is ferocious, the synths drift into space-rock territory, and the lyrics achieve something close to genuine transcendence. It is the perfect farewell from a vocalist who understood that the grandest exit is the one that sounds like a beginning.

- title: "Selling England By The Pound"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1973
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/selling_england_by_the_pound.jpg"
  posted: "2020-12-09"
  text: |
    ***Selling England by the Pound*** is a concept album in the loosest, most productive sense: a thematic frame capacious enough to accommodate stylistic diversity, technical brilliance, and genuine eccentricity without ever feeling programmatic. 'Dancing with the Moonlit Knight' was originally intended to form a single extended piece with 'The Cinema Show' and the closing track, but the plan was scrapped over concerns that the result would echo *Foxtrot*'s 'Supper's Ready' in length and ambition. The decision to separate them was the right one; as standalone compositions, all three are superb, their internal architecture tighter for not having to serve a larger structural obligation.

    The most overtly progressive piece is 'Firth of Fifth', written entirely by Banks and brought to the band as a finished composition. It had originally been intended for *Foxtrot* but was rejected, which in retrospect seems extraordinary: the piece is one of the most perfectly constructed in the entire Genesis catalogue, and its piano introduction alone has become one of prog's most recognisable passages. <u>The album reached UK No. 3 and received near-universal critical praise, with the notable and amusing exception of <em>Rolling Stone</em>, which awarded it two stars, a judgment that has aged about as well as one might expect.</u> Some albums are their era's best-kept secrets; this one was a best-kept embarrassment for a magazine that never quite knew what to do with prog.

- title: "Foxtrot"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/foxtrot.jpg"
  posted: "2020-12-09"
  text: |
    ***Foxtrot*** is, to my mind, unquestionably Genesis's finest album. From the opening moments of 'Watcher of the Skies', the title drawn from Keats's sonnet, Banks's Mellotron chords arrive with an almost geological grandeur, and the album never relinquishes that sense of scale. 'Supper's Ready' is the centrepiece and the justification: a twenty-three-minute suite whose arrangement and vocal performance remain completely mind-blowing half a century on, a piece so fully realised that it transcends the usual prog-epic pitfalls of indulgence and structural drift.

    For those who remain unconvinced, I would suggest listening to the extended solo sections in 'Can-Utility and the Coastliners', widely considered the album's least distinguished track, five times through. Even the supposed weak link contains playing of this calibre. And then there is Hackett's solo acoustic piece 'Horizons', <u>where the beauty of every single note is enough to render one speechless.</u> This is not an album that argues for its own greatness. It simply is great, with the quiet certainty of something that has already outlasted every objection raised against it.

- title: "Nursery Cryme"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1971
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/nursery_cryme.jpg"
  posted: "2020-12-09"
  text: |
    ***Nursery Cryme*** marks the arrival of Steve Hackett, replacing Anthony Phillips, and Phil Collins's integration into the lineup, Collins even taking lead vocals on 'For Absent Friends'. The album established Genesis's position in prog history, but it is not yet *Foxtrot*, and it may not even surpass the preceding *Trespass*, a shortfall likely attributable to the inevitable friction of new members finding their footing together. The story behind 'The Musical Box' is, frankly, deranged: a girl decapitates a boy during a game of croquet (hence the album cover), his spirit possesses a music box, and he develops sexual desire for his killer. I do not understand this narrative. But musically, the track is impeccable, and alongside the closing 'The Fountain of Salmacis' it represents the album's twin peak, both pieces marking the moment Genesis's compositional voice reached maturity.

    'The Return of the Giant Hogweed' deserves mention too: the conceit of giant hogweed conquering the human world is a gleefully absurd premise that only early-1970s prog would attempt with a straight face, and Genesis commit to it fully. <u>The album's unevenness is the unevenness of a band in transition, not of a band running out of ideas, and the peaks here are high enough to justify the rougher stretches between them.</u>

- title: "Trespass"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/trespass.jpg"
  posted: "2020-12-09"
  text: |
    Despite what some have claimed, ***Trespass*** is categorically not in the same series as Genesis's debut. The transformation from *From Genesis to Revelation* to this album is one of the most dramatic leaps in all of prog history. Phillips's twelve-string guitar gives 'White Mountain' and 'Visions of Angels' an unprecedented fullness, a harmonic richness that the debut's thin arrangements could never have supported. Gabriel's voice, tentative and buried on the first record, steps definitively to the foreground here; the vocal performance in 'Visions of Angels' alone is enough to silence anyone who doubted his capacity as a frontman. Banks's keyboard solo in the same track is extraordinary: the timbre of that first solo passage must have been disorienting to listeners in 1970, a sound from an instrument that seemed to be inventing itself in real time.

    Even 'Dusk', which some fans regard as a lesser track, possesses an emotional directness that can move one to tears without apparent effort. <u>'The Knife' needs no defence: an early concert staple and the first time Genesis committed fully to a single track with everything they had, its energy still feels coiled and dangerous decades later.</u> Lyrically, half the album searches for the meaning of life while the other half tells allegorical fables, a vast improvement over the first record's adolescent romanticism. This is where Genesis became Genesis.

- title: "From Genesis To Revelation"
  type: "music"
  creator: "Genesis"
  creator_role: "by"
  year: 1969
  eval: "meh..."
  genre: "progressive rock"
  image: "/assets/images/music/from_genesis_to_revelation.jpg"
  posted: "2020-12-08"
  text: |
    ***From Genesis to Revelation*** is thoroughly unremarkable, a late-sixties artefact steeped in the lingering afterglow of British psychedelia and carrying a pervasive Beatles influence that never quite coalesces into anything distinctively its own. The reliance on fade-outs is very much of its era, though the one in 'In the Beginning' is so abrupt it reads less as a stylistic choice than an admission that nobody knew how to end the song. The lyrics are still firmly in 'baby you're my only one' territory, a far cry from the literary ambition that would define the band's best work.

    <u>Listening to this debut in the context of what followed, one realises how contingent greatness can be.</u> Without the personnel changes that brought Phil Collins and Steve Hackett into the fold, Genesis would likely have remained a minor footnote in the psychedelic pop of the late sixties. The album is not bad, exactly. It is simply the sound of a band that does not yet know what it is.

- title: "Islands"
  type: "music"
  creator: "The Flower Kings"
  creator_role: "by"
  year: 2020
  eval: "meh..."
  genre: "progressive rock"
  image: "/assets/images/music/islands.jpg"
  posted: "2020-12-08"
  text: |
    ***Islands*** is ninety-two minutes of a band that once made melodic abundance look effortless now struggling to generate a single memorable vocal line across an entire double album. The Flower Kings without strong melodies are simply not The Flower Kings; melody has always been the engine pulling their sprawling arrangements forward, and without it the machinery sits inert. 'From the Ground' rides a single vocal motif for its entire duration. 'Broken', which critical consensus has inexplicably elevated to a highlight, sits on what sounds like one pitch for the whole track: a compositional abdication dressed as restraint.

    'Solaris' comes closest to the band's earlier standard, its instrumental passages recapturing something of the *Stardust We Are* expansiveness, but one strong passage across ninety-two minutes is not a rescue. The bloat is not the issue; *Unfold the Future* was bloated and it worked, because the melodies pulled the listener through. <u>Here the compositions are architecture without furniture: rooms one walks through but never wants to sit in.</u>

- title: "Unfold the Future"
  type: "music"
  creator: "The Flower Kings"
  creator_role: "by"
  year: 2002
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/unfold_the_future.jpg"
  posted: "2020-12-07"
  text: |
    ***Unfold the Future*** is another characteristically sprawling Flower Kings double album, clocking in at well over two hours, because apparently restraint has never been part of the vocabulary. The structure is elegantly bifurcated: CD1 leans prog, CD2 leans jazz, and the most fully realised expression of each tendency comes through the two centrepiece epics. 'The Truth Will Set You Free' is the prog showcase, 'The Devil's Danceschool' the jazz counterpart; both are multi-movement pieces exceeding ten minutes, and both benefit enormously from drumming that has improved markedly since the previous record.

    <u>The standout is 'Devil's Playground', a track whose tension accumulates with such patient, deliberate craft that by the time the closing guitar solo arrives, it feels less like a musical passage than an emotional detonation.</u> That solo is transparently designed to break the listener, and it succeeds. The Flower Kings have always understood that prog's greatest asset is not complexity but duration, the ability to build toward a catharsis that shorter forms simply cannot accommodate, and this album is the proof.

- title: "Space Revolver"
  type: "music"
  creator: "The Flower Kings"
  creator_role: "by"
  year: 2000
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/space_revolver.jpg"
  posted: "2020-12-07"
  text: |
    ***Space Revolver*** opens with a stretch of tracks so saturated in jazz influence that it feels like a return to the band's earliest instincts, complete with extended bass solos of genuine beauty. The jazz voicings give the arrangements an airiness that the denser, more prog-centric Flower Kings records sometimes lack, and the contrast is welcome. The melodies, as always, are beyond reproach.

    <u>The 'I Am the Sun' suite alone would justify a five-star rating.</u> It is an extended composition that demonstrates everything the Flower Kings do at their best: melodic invention sustained across a long-form structure, harmonic shifts that feel inevitable rather than calculated, and a sense of emotional scale that matches the sonic ambition. When this band is operating at full capacity, the length becomes the point.

- title: "Stardust We Are"
  type: "music"
  creator: "The Flower Kings"
  creator_role: "by"
  year: 1997
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/stardust_we_are.jpg"
  posted: "2020-12-07"
  text: |
    ***Stardust We Are*** is another Flower Kings double-disc statement where the melodic writing remains as formidable as ever, though the jazz inflections of the previous album have receded somewhat, a loss that the sheer generosity of a two-CD format goes some way toward compensating for, if compensation is even the right word for giving the listener more of everything.

    The title track is the centrepiece, and it is remarkable. <u>The rhythmic writing in 'Stardust We Are' is extraordinarily varied, a single metric framework subjected to so many permutations that it feels like an entirely different piece with each new section.</u> That capacity to make a single rhythmic idea yield such diversity is a rare compositional gift, and it is deployed here with a confidence that makes difficulty sound like second nature.

- title: "Spidermilk"
  type: "music"
  creator: "The Mercury Tree"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "avant-prog"
  image: "/assets/images/music/spidermilk.jpg"
  posted: "2020-12-04"
  text: |
    ***Spidermilk*** was my entry point into microtonal rock when I first encountered The Mercury Tree, and the immediate, almost visceral satisfaction of hearing familiar rock instrumentation refracted through microtonal tuning systems has not diminished since. The band built custom versions of standard rock instruments to access these pitch spaces, a commitment to the concept that goes well beyond simply detuning a few strings.

    <u>What makes the album remarkable is that tracks like 'I Am a Husk' and 'Vestments' would be beautiful compositions even in standard twelve-tone equal temperament; the microtonal framework adds an additional layer of strangeness and specificity, but it is not a crutch.</u> The melodies and harmonic progressions are strong enough to stand on their own terms. Microtonality here functions not as novelty but as an expansion of the available emotional palette, and the effect is prog metal that sounds unlike anything else.

- title: "Back in the World of Adventures"
  type: "music"
  creator: "The Flower Kings"
  creator_role: "by"
  year: 1995
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/back_in_the_world_of_adventures.jpg"
  posted: "2020-12-04"
  text: |
    I had heard the name for years and kept putting it off; one always assumes there will be time to get to the canonical neo-prog records. ***Back in the World of Adventures*** arrived, finally, and within minutes it was clear why The Flower Kings occupy the position they do. <u>In a subgenre where melodic ambition often outruns melodic craft, Roine Stolt and company write with the harmonic assurance of composers who have internalised the entire tradition and come out the other side.</u> 'World of Adventures', 'My Cosmic Lover', 'Big Puzzle': these are tracks built on chord progressions and contrapuntal arrangements that betray a serious conservatory-level foundation, the kind of structural confidence one rarely encounters outside of Moon Safari at their very best. The voicings alone, the way inner parts move with purpose rather than simply padding the stereo field, mark this as the work of musicians who understand voice-leading as second nature.

    What surprised me most was the dynamic restraint. The Flower Kings sit in a register that is neither bombastic nor timid, a warm middle ground where the music breathes without ever thinning out. The arrangements are lush but never cluttered; every keyboard texture, every guitar layer earns its place. <u>And then there is 'Oblivion Road', which pivots into jazz territory with an ease that would embarrass most dedicated fusion outfits.</u> The album's genius is in this range: it can move from symphonic prog grandeur to delicate jazz phrasing without the joins showing, because the musicianship is so deeply embedded that genre becomes a question of mood rather than technique. one leaves the record feeling not just impressed but replenished, as though the music has restored something one did not know was depleted.

- title: "The Afterman: Ascension"
  type: "music"
  creator: "Coheed and Cambria"
  creator_role: "by"
  year: 2012
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/afterman.jpg"
  posted: "2020-12-02"
  text: |
    ***The Afterman: Ascension*** marks the point where Coheed and Cambria began taking their prog aspirations seriously, and the shift is audible from the first track. The narrative pivots to Sirius Amory's own story, the protagonist of the Amory Wars universe, and with that pivot comes a tighter compositional focus. The 'Key Entity Extraction' suite is the centrepiece: Pt. 1 is an unqualified five-star track, and the remaining instalments each hold their ground at four. The drum programming and pad work represent a substantial leap from their previous records; textures are layered with more intention, the synth beds actually serve the songs rather than hovering as afterthought. Claudio Sanchez's voice remains, as ever, an acquired taste one never fully acquires.

    <u>The title track, 'Afterman', is the album's quiet triumph, and I am not sure I can articulate precisely why.</u> Part of it is the constant ghost notes on the snare and toms, a rhythmic undercurrent that gives the track a living pulse beneath the melody. Part of it is the way the bass drum locks into the bass guitar with a lightness that belies the complexity of the interlocking pattern: clean, elegant, almost balletic. It is an arrangement that rewards close listening on good monitors, where one can hear each element breathing in its own space. The album does not fully transcend the band's limitations, but it announces, credibly, that they have stopped treating prog as costume and started treating it as craft.

- title: "No World For Tomorrow"
  type: "music"
  creator: "Coheed and Cambria"
  creator_role: "by"
  year: 2007
  eval: "meh..."
  genre: "progressive rock"
  image: "/assets/images/music/no_world_for_tomorrow.jpg"
  posted: "2020-12-02"
  text: |
    Each Coheed and Cambria record has been incrementally better than the last, and ***No World For Tomorrow*** continues that upward trajectory without quite arriving anywhere remarkable. Most of the tracks sit firmly at three stars: competent, occasionally inspired, but lacking the compositional density that separates good prog from great. The band sounds like a group still searching for its language, fluent enough to gesture at complexity but not yet able to sustain it across a full song.

    The exceptions prove the rule. 'Gravemakers & Gunslingers' features extended guitar solo passages that feel composed rather than noodled, with a sense of phrasing and dynamic contour that suggests real growth. The closing 'On the Brink' pushes into prog metal territory with a conviction the rest of the record lacks. <u>One gets the sense of a band finding its footing, each record another step toward the ledge from which they will eventually, properly leap.</u>

- title: "The Dark Third"
  type: "music"
  creator: "Pure Reason Revolution"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/dark_third.jpg"
  posted: "2020-11-30"
  text: |
    ***The Dark Third*** is a more beautiful record than Pure Reason Revolution's debut, and the leap in sophistication is immediately apparent. The balance between electronic and metal elements, which on the first album could feel like an uneasy truce, is here resolved into something integrated. The arrangements are more varied, more willing to shift texture and tempo in service of atmosphere rather than spectacle. The production has a sheen to it without feeling sterile; there is warmth in the low end and air in the highs.

    <u>'Bullitts Dominae' and 'The Twyncyn/Trembling Willows' are the standout moments, tracks where every element clicks into place with a precision that borders on the architectural.</u> The interplay between synth pads, distorted guitars, and those layered vocal harmonies creates something that sits outside easy genre classification: too heavy for dream pop, too pretty for metal, too strange for either. The band's later return, years on, sounds less like a fresh start than a direct continuation of what this album began. *The Dark Third* is the template; everything after is elaboration.

- title: "A Clear and Present Rager"
  type: "music"
  creator: "Nuclear Power Trio"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/clear_and_present_rager.jpg"
  posted: "2020-11-30"
  text: |
    Prog metal with a comedic veneer, though ***A Clear and Present Rager*** is far more technically accomplished than the cover art and track titles would suggest. The bass writing in particular is exceptional: inventive, melodically rich, and mixed with enough presence to carry entire sections on its own. The musicianship across the board is flawless, a tight, controlled playing that comes from years of session discipline rather than youthful enthusiasm.

    The problem is that technical perfection, absent a distinctive compositional voice, leaves one admiring the craft without being moved by it. <u>The album surprises by being far better than its packaging promises, then disappoints by not being better still.</u> one comes away it thinking: these are players who could make something extraordinary, if they decided they wanted to say something rather than simply demonstrate that they can.

- title: "Buon Vecchio Charlie"
  type: "music"
  creator: "Buon vecchio Charlie"
  creator_role: "by"
  year: 1990
  eval: "loved"
  genre: "Italian prog"
  image: "/assets/images/music/buon_vecchio_charlie.jpg"
  posted: "2020-11-29"
  text: |
    I had not expected to find Italian prog this accomplished from the early 1990s, a period when the scene had supposedly exhausted itself. ***Buon Vecchio Charlie*** proves otherwise with a record that channels the golden-age spirit of RPI while sounding nothing like a museum piece. 'Venite Giu Al Fiume' opens in a way that initially feels almost theatrical, verging on excess, but then the extended solo passages arrive and all scepticism dissolves: the playing is dazzling, technically formidable and musically coherent, an instrumental work that makes one lose track of time. I reached for my phone to rate it and realised I was only halfway through the track.

    <u>'Evvivo la contea di Lane' is the revelation, a piece where the saxophone transcends its usual prog-rock role entirely.</u> There is a passage where the player imports flute articulation onto the sax, a breathy, fluttering technique that should not work but absolutely does, producing textures one has simply never heard in this context. By the final movement the piece has become something beautiful, not in the polite sense but in the way that stops one mid-breath. This is a record that deserves rescue from obscurity; it belongs in the conversation alongside the best of Banco and PFM.

- title: "Monoliths"
  type: "music"
  creator: "Thomas Nöla & The Black Hole"
  creator_role: "by"
  year: 2012
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/monoliths.jpg"
  posted: "2020-11-27"
  text: |
    Discovered through the Art As Catharsis 2020 Sampler, ***Monoliths*** is solid psychedelic rock that does not pretend to reinvent the form. It sits comfortably within its genre parameters: warm analogue tones, unhurried structures, production that favours atmosphere over clarity. There is nothing here that will surprise a seasoned listener, but neither is there anything that feels perfunctory.

    'Who Cares What You Think?' and 'The Clock Strikes Forever' are the highlights, tracks where Thomas Nöla & The Black Hole find a groove and ride it with enough conviction to justify the runtime. <u>The album works best as a mood piece, a record one puts on to inhabit rather than interrogate.</u> It asks nothing of the listener except presence, and in return delivers a thoroughly pleasant forty-odd minutes of well-crafted psych.

- title: "Distant Memories - Live In London"
  type: "music"
  creator: "Dream Theater"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/distant_memories_live_in_london.jpg"
  posted: "2020-11-27"
  text: |
    Having heard a great many Dream Theater live recordings, I can say without hesitation that ***Distant Memories - Live In London*** is the most electrifying of them all. James LaBrie's vocal command here is far better than certain detractors would have one believe: the control is there, the pitch is reliable, and the head-voice transitions, never his strongest suit given that his natural range in younger years made falsetto unnecessary, are executed with a fluency that feels effortless. Rudess and Petrucci deliver their usual standard of excellence on keys and guitar respectively; if one can call that 'unremarkable', it is only because the baseline is already stratospheric.

    <u>The performance of 'In the Presence of Enemies' is where Petrucci's mastery becomes almost intimidating: one can hear every micro-decision in his technique, the pick dynamics, the legato phrasing, the way he navigates the rapid position shifts with an economy of motion that borders on the inhuman.</u> John Myung's bass remains, as always, beyond reproach; the epithet of 'bass god' is not hyperbole but plain description. The real surprise, though, is Mike Mangini. His drumming on this set carries a spark of the improvisatory instinct one associates with Mike Portnoy, a quality many assumed had left the band permanently. Mangini plays with a looseness and a musicality that exceed every expectation. This is an unqualified five-star live recording, the kind that reminds one why this band, for all the prog-metal cliches they have inspired, remains in a category of its own.

- title: "Impulse Voices"
  type: "music"
  creator: "Plini"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/impulse_voices.jpg"
  posted: "2020-11-27"
  text: |
    ***Impulse Voices*** is Plini at his most considered, every track shaped with the melodic precision and tonal sensitivity that have made him one of the most compelling voices in modern instrumental prog. 'Pan' is the track that sounds most quintessentially Plini: it opens with post-rock phrasing, spacious and ringing, before the blasting drums enter and the tension ratchets up to something thrilling. The dynamic arc of the piece, from whisper to roar, is handled with a maturity that belies the relatively compact runtime.

    'Papellilo' is the obvious favourite, and deservedly so; the music video captures something of its visual beauty, but on a purely rhythmic level the track is impeccable, every accent placed with surgical intent. <u>The title track, 'Impulse Voices', deploys a voicing approach that keeps nagging at the ear: there is a persistent palm-muted quality to the chords that gives them a woody, percussive attack, almost as though the guitar is breathing through clenched teeth.</u> And the opening cut, 'I'll Tell You Someday', establishes the album's sonic identity immediately with drum work that is simply gorgeous, full of subtle ghost notes and rimshot textures. One leaves the record feeling that Plini has refined his language to the point where every note is load-bearing, and not a single one is wasted.

- title: "Secrets of Disguise"
  type: "music"
  creator: "The Samurai of Prog"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/secrets_of_disguise.jpg"
  posted: "2020-11-25"
  text: |
    ***Secrets of Disguise*** rewards selective listening. The first side's opening four tracks, together with 'Singring and the Glass Guitar' and 'The Case of Charles Dexter Ward' on the second side, constitute a strong prog rock record. The Samurai of Prog are at their best when the interplay between instruments feels conversational rather than compositional: musicians responding to one another in real time, trading phrases, building collective momentum.

    'Sweet Iphigenia' and 'Descendo en el Maelstrom' are the highlights, both displaying a rare cohesion where every instrument serves the ensemble rather than competing for attention. The flute passages that close out certain sections feel like the one element that truly earns the band's name, a blade drawn at precisely the right moment. <u>The solo piano piece 'Before the Dance' is an easy five-star interlude, proof that restraint can carry as much weight as complexity.</u> The album's weaker moments drag it down from greatness, but its peaks belong in the upper tier of 2010s prog.

- title: "Benzaiten"
  type: "music"
  creator: "Osamu Kitajima"
  creator_role: "by"
  year: 1976
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/benzaiten.jpg"
  posted: "2020-11-25"
  text: |
    ***Benzaiten*** is one of those rare records where the word 'fusion' actually means something. Not the smooth-jazz dilution the term usually connotes, but a genuine synthesis of Japanese traditional instrumentation and Western progressive rock, executed by Osamu Kitajima with the confidence of someone who belongs fully to both traditions. Every note on this album earns its place; the arrangements are meticulous without ever feeling rigid, alive to the tension between structure and improvisation that defines the best progressive music.

    <u>'Whoma' is the centrepiece, a track where the shakuhachi enters over a bed of crystalline guitar work and one suddenly understands what this album is trying to do.</u> The guitar tone is extraordinary: clean, bright, mixed with a clarity and spatial precision that puts most contemporary productions to shame. This is 1976, and the separation between instruments is better than half the records on my desk. There are traces of Krautrock in the motorik undertow, a rhythmic insistence that anchors the more exploratory passages, and the whole thing coheres into something that feels both ancient and impossibly modern. <u>Kitajima's talent is not merely versatile but visionary: he heard a music that did not yet exist and built it from first principles.</u> I owe a debt of gratitude for the recommendation; this is an album I will return to for years.

- title: "A Night at the Opera"
  type: "music"
  creator: "Queen"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "rock"
  image: "/assets/images/music/night_at_the_opera.jpg"
  posted: "2020-11-24"
  text: |
    I am not sure why it took me this long to sit down and listen through Queen's discography properly. One knows 'Bohemian Rhapsody', of course; one has heard it hundreds, perhaps thousands of times, and familiarity has calcified it into cultural furniture. But ***A Night at the Opera*** as a complete album is a different experience entirely. The surrounding tracks are not filler orbiting a supernova; they are brilliant in their own right, each one showcasing a different facet of the band's almost absurd range.

    <u>'Prophet's Song' is 'Bohemian Rhapsody's shadow twin: equally ambitious, equally sprawling, but pulling in an entirely different emotional direction, darker and more hallucinatory.</u> The layered vocal canon in its midsection is one of the most striking passages in 1970s rock, a moment where studio technique and compositional ambition fuse into something uncanny. And then 'Love of My Life' strips everything back to Freddie Mercury's voice and a piano, and the simplicity of the lyric, which in lesser hands would scan as trite, becomes something magical. There is no other word for it. His voice has the quality of making one believe every syllable, not through technical perfection but through a directness that bypasses the intellect entirely. The album closes and one sits in silence, marvelling that four musicians from suburban London made something this vast.

- title: "Beyond The Exosphere"
  type: "music"
  creator: "King"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "stoner rock"
  image: "/assets/images/music/beyond_the_exosphere.jpg"
  posted: "2020-11-23"
  text: |
    I initially assumed ***Beyond The Exosphere*** was a debut, which would have made it exceptionally impressive. Learning that the members are seasoned veterans recalibrates expectations somewhat, though the album remains a technically accomplished piece of prog metal. The guitar tone is gorgeous, warm and articulated, and the overall level of instrumental proficiency is beyond question.

    The eighteen-minute title track is where the cracks show. Many of its transitions land too abruptly, as though several shorter compositions have been stitched together without sufficient connective tissue; one can almost hear the seams. The drum solo in its midsection feels slightly self-conscious, a showcase moment that interrupts the flow rather than enhancing it. <u>The drumming elsewhere, while occasionally veering into show-off territory, is undeniably skilled: the technique is there, the instinct for when to deploy it still catching up.</u> A strong record, then, but one that reveals the difference between technical maturity and compositional maturity. The former is complete; the latter is still in progress.

- title: "Procol Harum"
  type: "music"
  creator: "Procol Harum"
  creator_role: "by"
  year: 1967
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/procol_harum.jpg"
  posted: "2020-11-23"
  text: |
    1967. One has to sit with that date for a moment. ***Procol Harum***'s self-titled debut arrived in a year when progressive rock as a genre barely existed, when the idea of fusing Bach with blues and R&B was radical rather than retrospectively inevitable. The band is best remembered for their 1971 *Live: In Concert with the Edmonton Symphony Orchestra*, that extraordinary performance with the full orchestra arranged in a circle, an event that calls to mind Dream Theater's 2005 live show at Radio City Music Hall with its own orchestral accompaniment. But the self-titled record is where the DNA was established: the organ-led arrangements, the literary ambiguity of Keith Reid's lyrics, the sense that rock music could aspire to the condition of something older and stranger.

    <u>'Repent Walpurgis' is the track that seizes one by the throat: a baroque instrumental that channels the 18th century through a Marshall stack, executed with a ferocity and structural logic that prog bands a decade later would still be trying to match.</u> The playing is raw, looser than what would come later, but the compositional ambition is already fully formed. One hears this record and understands that progressive rock was not invented; it was discovered, and Procol Harum were among the first to find it.

- title: "Doomsday Afternoon"
  type: "music"
  creator: "Phideaux"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/doomsday_afternoon.jpg"
  posted: "2020-11-23"
  text: |
    Judged as a concept album, which is what ***Doomsday Afternoon*** asks to be, it falls short of the genre's best. The conceptual architecture is thin compared to what Marillion achieved with *Brave* or *Marbles*; the narrative thread, while present, never generates a thematic resonance that makes one reconsider earlier tracks in light of later ones. The musical invention, similarly, is competent without being revelatory: solid prog rock that does not push the form forward or offer much that one has not heard elsewhere.

    And yet, the album has its moments. 'Micro Softdeathstar' opens the record with genuine energy and a melodic hook that justifies several relistens. <u>A handful of tracks manage to transcend the album's general air of respectable adequacy, reminding one that Phideaux, at their best, can write a song that lands.</u> The problem is consistency: the peaks are real, but they sit in a landscape of plateau.

- title: "Carboniferous"
  type: "music"
  creator: "Zu"
  creator_role: "by"
  year: 2009
  eval: "loved"
  genre: "noise rock"
  image: "/assets/images/music/carboniferous.jpg"
  posted: "2020-11-20"
  text: |
    I am baffled that I had not tagged this before. ***Carboniferous*** occupies a genre intersection that should not work: prog, psychedelia, avant-garde, art metal, all compressed into a record that is punishingly heavy yet retains every ounce of the experimental intelligence those prefixes promise. The heaviness here is not the blunt-force variety; it is architectural, each riff and rhythmic figure placed with the deliberation of someone building a structure that must bear weight.

    <u>From the opening moments of 'Carbon', the goosebumps arrive and do not leave.</u> Zu's approach to experimentation is what separates this from the legions of bands who slap 'avant-garde' onto their genre tags as a substitute for having ideas: here, the dissonance serves the composition, the noise serves the dynamics, the chaos serves the structure. Nothing is gratuitous. The album sounds like the geological era it is named for: ancient, pressurised, transformative. It is the kind of record that makes one reconsider what heaviness can mean when it is wielded by musicians who understand that brutality and beauty are not opposites but accomplices.

- title: "Eleventh Hour"
  type: "music"
  creator: "PINS"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "post-punk"
  image: "/assets/images/music/eleventh_hour.jpg"
  posted: "2020-11-19"
  text: |
    ***Eleventh Hour*** is where PINS shed the last traces of their Haken lineage and arrive at something their own. The Haken DNA is still audible in the lyrical sophistication, which remains a strength, but the musical identity has undergone a metamorphosis: the djent elements are more integrated, the melodic sensibility more personal, the overall sound less derivative and more assured.

    'Prison Wall' is the album's centrepiece, and the spoken-word passage at its heart would alone justify a four-star rating. <u>The arrangement around it is masterful, weaving djent rhythmic complexity with genuine melodic beauty in a way that neither compromises the other.</u> Joss's vocal performance is ferocious throughout the record, screaming with an abandon and a conviction that elevates every track he touches. The lyrics, too, deserve mention: sharp, literate, occasionally devastating, carrying the Haken tradition of treating words as compositional elements rather than afterthoughts. <u>This is the sound of a band that has stopped borrowing and started owning.</u>

- title: "Secondary Genesis"
  type: "music"
  creator: "Novena"
  creator_role: "by"
  year: 2016
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/secondary_genesis.jpg"
  posted: "2020-11-19"
  text: |
    ***Secondary Genesis*** is the debut EP from Novena, the side project of Haken vocalist Ross Jennings (Joss), and it wears its parentage openly. The second track borrows its chord progression so directly from Haken's 'Visions' that one cannot help but laugh; the resemblance is not subtle, and one suspects it is not entirely unintentional either. The quality of the material is high throughout: the playing is tight, the production polished, the compositions well-structured and melodically generous.

    <u>The question the EP cannot quite answer is whether Novena exists as a distinct entity or as Haken refracted through a slightly different prism.</u> The musicianship is there, the songs are there, but the voice, in the broader sense, is still Haken's voice. This is not a damning criticism for a debut; identity takes time, and the raw material is clearly excellent. One listens and thinks: give this band two more records and they will find something that belongs only to them.

- title: "Fear of a Blank Planet"
  type: "music"
  creator: "Porcupine Tree"
  creator_role: "by"
  year: 2007
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/fear_of_a_blank_planet.jpg"
  posted: "2020-11-17"
  text: |
    Half a year since the last revisit, and ***Fear of a Blank Planet*** still lands with the same concussive force. 'Anesthetize' remains the centrepiece, the track that justifies everything. <u>Gavin Harrison's drumming across the prog canon may well be the most dynamically intelligent the genre has ever produced</u>, and the passage beginning around 5:05, where the kit seems to breathe and convulse independently of the rest of the arrangement, is a playing that raises the hairs on one's arms without fail. There is a physicality to his touch, a way of making the snare feel both fragile and enormous, that no amount of technical proficiency alone can explain. It is feel metabolised into architecture.

    The broader album wraps Wilson's usual lyrical preoccupations, the anaesthetised teenager, the screen-lit numbness, in arrangements dense enough to reward a repeated listening that most prog records merely demand. But 'Anesthetize' stands apart. <u>It is one of those rare tracks that could stand in for an entire discography: a single song that contains more ideas, more emotional range, more sheer compositional ambition than many bands manage across a career.</u> The build from its muted opening through the crushing mid-section to the desolate coda is not just well-paced; it is narratively inevitable, each section earning the next. One returns to it and finds it unchanged, which is another way of saying it was right the first time.

- title: "Blomljud"
  type: "music"
  creator: "Moon Safari"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/blomljud.jpg"
  posted: "2020-11-17"
  text: |
    ***Blomljud*** is, simply, one of the most beautiful prog records I have heard in years. The vocal harmonies on 'Constant Bloom' nearly brought me to tears within the first few minutes; the stacking is so lush, so precisely voiced, that it reads less as a rock band and more like a chamber choir that happens to own amplifiers. The prog elements are admittedly dialled back here compared to Moon Safari's earlier work, the complexity more implicit than demonstrative, but the sheer melodic invention compensates tenfold. <u>One does not miss the odd-time fireworks when the melodies themselves are this radiant.</u>

    'Other Half of the Sky' is the album's monumental statement: over thirty minutes of music that sustains its emotional pitch without a single wasted passage. The goosebumps were constant, the kind that crawl from the forearms to the scalp and stay there. Early Moon Safari operated at a level of inspiration that is difficult to account for, a band channelling something larger than the sum of its members. The question is not whether this album is prog enough; the question is why so few bands in any genre can write melodies that make one sit with tears pooling at the edges of one's eyes, unable to press pause. This is that rare record that reminds one why the word 'beautiful' still means something in music.

- title: "Eclipse Chaser"
  type: "music"
  creator: "Mindspeak"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/eclipse_chaser.jpg"
  posted: "2020-11-17"
  text: |
    ***Eclipse Chaser*** is prog metal done with genuine compositional intelligence. The shorter 'When Giants Cry', the sprawling ten-plus minutes of 'Tetrachrome', and Parts II, III, and V of 'The Human Element' suite all hit with real force. What stands out most, though, is the vocal mix. <u>The treatment is counter-intuitive: rather than burying the female vocals in reverb or layering them into thickness, the mix foregrounds their thinness, and this fragility turns out to be exactly what the instrumentation needs.</u> The voice sits exposed against the dense prog-rock arrangements, and the contrast gives both elements more presence than conventional mixing wisdom would predict.

    'Tetrachrome' earns its runtime. The final third unfolds into extended passages where synth, guitar, and saxophone trade phrases in tight, almost contrapuntal dialogue, each instrument answering and extending the others with a density of interplay that rewards close listening. Mindspeak understand something that eludes many prog-metal acts: that complexity is not the same as clutter, and that a long track needs internal architecture, not merely accumulated riffs. The whole album carries this discipline, every section earning its place.

- title: "Anointed Merit: Prelude"
  type: "music"
  creator: "RichaadEB // Amie Waters"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/anointed_merit.jpg"
  posted: "2020-11-16"
  text: |
    ***Anointed Merit: Prelude*** sits in the tribute-meets-prog-rock space that RichaadEB and Amie Waters have carved out for themselves, and while it does not quite reach the heights L-Train has set in similar territory, there are individual moments of undeniable quality. 'Your Formermost Enemy' is a five-star track by any measure, an arrangement that transcends its source material entirely and stands as an original composition in all but name.

    The second half loses some momentum, the ideas thinning out in ways that suggest the strongest material was front-loaded. <u>It is the difference between a record that one remembers by its peaks and one that sustains a single, unbroken altitude.</u> Still, those peaks are high enough to make the whole thing worthwhile, and there is a craft to the guitar work and vocal interplay that keeps even the weaker tracks listenable.

- title: "Tundra"
  type: "music"
  creator: "Korekyojinn"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "post-rock"
  image: "/assets/images/music/tundra.jpg"
  posted: "2020-11-12"
  text: |
    Having already given five stars to Koenji Hyakkei, rating ***Tundra*** becomes an exercise in recalibrating one's own scale. The energy is comparable: that same volcanic, relentless propulsion that makes the Japanese zeuhl-adjacent scene so thrilling. But where Koenji Hyakkei channels its force through idiosyncratic vocals and sheer collective mania, Korekyojin constructs its explosions almost entirely from the interweave of guitar and drums. <u>The guitar solos here are outstanding, not merely fast or technically impressive but melodically inventive in ways that give the raw power somewhere to go.</u>

    There is something clarifying about a band that strips its palette this far back. No vocal pyrotechnics to lean on, no layered keyboards to fill the gaps. Just guitar, drums, and an understanding of how rhythmic and melodic intensity can spiral upward together until the music feels like it might physically come apart. The result is an album that earns its explosive moments through the tightness of its construction, every burst of energy a controlled detonation rather than mere noise.

- title: "Space Shanty"
  type: "music"
  creator: "Khan"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "Canterbury scene"
  image: "/assets/images/music/space_shanty.jpg"
  posted: "2020-11-11"
  text: |
    ***Space Shanty*** is another one of those early-seventies records that makes perfection sound effortless. Steve Hillage's guitar against Dave Stewart's Hammond organ is a combination so natural it feels inevitable in hindsight, each player's instincts complementing the other's without a trace of ego or redundancy. The bass work deserves its own mention, sitting in the pocket with a solidity that grounds even the most wayward improvisatory passages.

    <u>The jazz and psychedelic influences are woven so deeply into the fabric that one stops hearing them as influences at all; they are simply the language the band speaks.</u> There is a touch of space rock in places, the odd cosmic drift, but the dominant flavour is Canterbury through and through: whimsical without being frivolous, complex without being academic, warm without being soft. Khan existed only briefly, but this album alone is enough to secure their place in that scene's remarkable first wave. One finishes it and immediately wants to start again.

- title: "The Inner Mounting Flame"
  type: "music"
  creator: "Mahavishnu Orchestra"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "jazz fusion"
  image: "/assets/images/music/inner_mounting_flame.jpg"
  posted: "2020-11-11"
  text: |
    ***The Inner Mounting Flame*** sits comfortably in the top three jazz-rock records I have ever heard. The beauty of this album is architectural: each track inhabits a distinct stylistic space, yet the sequencing binds them into a coherent arc. <u>The decision to place 'You Know, You Know' later in the tracklist is masterful, creating a tension-release-tension structure that gives the album a narrative shape most jazz-rock records never attempt.</u> The drumming is a category unto itself, every fill purposeful, every accent placed with the precision of a composer rather than the instinct of a session player.

    What is staggering, though, is the mix. This does not sound like 1971. The separation, the clarity, the way each instrument occupies its own frequency space without competing: it is production work that would be impressive today, let alone half a century ago. The Mahavishnu Orchestra's ensemble playing is often called flawless, and for once the superlative is not laziness. There is a collective telepathy at work here, five musicians listening so intently to one another that the music seems to think ahead of itself. The record was ahead of its time in every measurable dimension, and in a few that resist measurement entirely.

- title: "Are You Experienced"
  type: "music"
  creator: "The Jimi Hendrix Experience"
  creator_role: "by"
  year: 1967
  eval: "meh..."
  genre: "psychedelic rock"
  image: "/assets/images/music/are_you_experienced.jpg"
  posted: "2020-11-11"
  text: |
    ***Are You Experienced*** is a deeply disappointing record when measured against Hendrix's own later output, let alone against *Sgt. Pepper's Lonely Hearts Club Band*, released the same year. The repetitiveness across the album is striking: track after track recycles the same basic structural ideas, the same rhythmic feel, the same approach to arrangement. There is no conceptual ambition here, no formal innovation. Strip away the mythology and one is left with a shell.

    The drumming initially impresses, but by the album's midpoint the illusion dissolves; the same rhythmic patterns recur, the fills interchangeable. <u>Even the guitar work, supposedly the album's raison d'etre, is less technically remarkable than its reputation suggests; the tonal palette was forward-thinking for 1967, but the playing itself rarely transcends competence.</u> The legend has outgrown the music. A frustrating listen.

- title: "Hollowed"
  type: "music"
  creator: "Ital Tek"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "electronic"
  image: "/assets/images/music/hollowed.jpg"
  posted: "2020-11-06"
  text: |
    ***Hollowed*** is a strange, captivating record, the kind that resists easy classification and is better for it. 'Monochrome' alone earns five stars: the drum programming is intricate without being fussy, and the atmospheric layering builds with a patience that most avant-garde metal projects cannot sustain. There is a textural richness to the production that rewards headphone listening, each pass revealing new details buried in the mix.

    The overall impression recalls The Mercury Tree's microtonal explorations, that same sense of harmonic language being deliberately estranged from its conventional moorings. <u>It is the sound of familiar materials, guitar, percussion, synthesis, reassembled according to an alien grammar that one gradually learns to parse.</u> Not everything lands with equal force, but the moments that do are unlike anything else I heard that day, or most days.

- title: "H.A.Q.Q."
  type: "music"
  creator: "Liturgy"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "black metal"
  image: "/assets/images/music/haqq.jpg"
  posted: "2020-11-06"
  text: |
    The opening of ***H.A.Q.Q.*** nearly drove me away. Liturgy have always tested the patience of their listeners, and the first track here is a gauntlet thrown with deliberate hostility. But the album rewards endurance: each subsequent track unfolds with more clarity, more structural wit, until 'God of Love' arrives and justifies the entire project. That track is formidable, heavy and intellectually provocative in equal measure.

    <u>It is rare to encounter an album this brutal that is also this interesting, where the weight serves conceptual ambition rather than mere aggression.</u> Hunter Hunt-Hendrix's theoretical apparatus, the 'transcendental black metal' framework, is easy to dismiss in the abstract, but the music itself earns a seriousness that the manifesto alone could not. The construction is too clever, too layered, too aware of its own internal logic to be written off as posturing. One arrives at the end surprised by how far the record has travelled from its abrasive beginning.

- title: "Stratus Luna"
  type: "music"
  creator: "Stratus Luna"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/stratus_luna.jpg"
  posted: "2020-11-05"
  text: |
    Without checking the liner notes, one can hear the Italian lineage running through ***Stratus Luna***. There is something in the melodic sensibility, a certain warmth and theatricality in the phrasing, that places it squarely in the tradition of Italian prog even before the influences become explicit. The guitar and synth work are excellent throughout, each instrument given space to develop ideas rather than simply trade licks.

    'O Centro' is easily the best track on the album, a piece where every element converges with an almost gravitational inevitability. <u>The interplay between guitar and synthesiser here reaches a level of conversational fluency that most prog duos spend entire careers chasing.</u> If one were forced to round the score, 4.5 would be the honest number, but the peaks are high enough, and the overall craftsmanship consistent enough, that the rounding goes up. A quietly assured debut from a band that sounds like it already knows exactly what it wants to be.

- title: "As the Waters Cover the Sea"
  type: "music"
  creator: "Umpfel"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/as_the_waters_cover_the_sea.jpg"
  posted: "2020-11-05"
  text: |
    ***As the Waters Cover the Sea*** plays like a metal-inflected Polyphia, but with more melodic and rhythmic tricks and more inspirational guitar solos. Umpfel navigate between jazz, djent, and groove metal with a fluency that suggests none of these idioms is borrowed; they are all native languages. The second half of 'Shofar' alone is enough to signal the scale of this band's potential, a passage that shifts between registers with the ease of musicians who have fully internalised their influences rather than merely studied them.

    <u>The completion level is remarkably high for what is still a relatively young project: no filler tracks, no weak links in the sequencing, no moments where ambition outpaces execution.</u> Every track earns its place in the running order. The guitar solos are not merely technical showcases but melodic statements, the kind that one hums afterward without remembering when they lodged in the memory. There is a rare generosity to this record, a sense that the band has more ideas than it strictly needs and has chosen to include only the best of them.

- title: "Night Dreams & Wishes"
  type: "music"
  creator: "Modern-Rock Ensemble"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/night_dreams_and_wishes.jpg"
  posted: "2020-11-03"
  text: |
    ***Night Dreams & Wishes*** is absolute lunacy in the best possible sense: wall-to-wall synth and flute, careening through ideas with the energy of musicians who have more inspiration than they know what to do with and have decided to use all of it. 'Childhood & School Days' opens with enough jazz-rock phrasing to set expectations in one direction, and then 'Insomnia' arrives and upends everything with a multi-minute bass solo that has no business being as thrilling as it is.

    <u>The 'Dark Kingdom' suite, ironically, turns out to be the album's least remarkable section, which says more about the quality of everything surrounding it than about any deficiency in the suite itself.</u> The completion level is extraordinary: not a single track feels like filler, not a single passage outstays its welcome. This is a record that reminds one why prog rock, at its most uninhibited, remains the most generous genre in music. It gives, and gives, and gives, and still has something left.

- title: "Light of Day, Day of Darkness"
  type: "music"
  creator: "Green Carnation"
  creator_role: "by"
  year: 2002
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/light_of_day_day_of_darkness.jpg"
  posted: "2020-11-03"
  text: |
    A single track spanning a full hour. One can only say: overwhelmed. ***Light of Day, Day of Darkness*** opens with soft, tentative synth pads and the faintest suggestion of percussion, then gradually, almost imperceptibly, transitions into a female choir layered on an amazingly arranged orchestra. The pacing is extraordinary; what could easily become shapeless at this duration instead unfolds with the structural logic of a symphony, each movement earning its transitions.

    The Pink Floyd-esque atmospheric build-ups arrive naturally, not as homage but as a shared understanding of how tension accumulates over long timescales. Yet the heavier passages, closer in spirit to Dream Theater, hit with a force that Floyd never pursued. <u>The saxophone entry around the thirty-two-minute mark is one of the most striking instrumental moments on any prog record I know: unexpected, perfectly placed, and emotionally devastating in context.</u> By the thirty-eight-minute mark the atmosphere drifts back toward Floyd territory, and by fifty minutes all the album's accumulated momentum begins to converge on the finale, every thread gathering into a single, inexorable pull.

    Tchort once said that 'Light of Day is musically dedicated to my son.' <u>Listening to how the entire hour builds toward that closing passage, all force and tenderness compressed into the final minutes, one understands the dedication not as a biographical footnote but as the emotional key to the whole work.</u> His son must be very proud.

- title: "Gilgamesh"
  type: "music"
  creator: "Gilgamesh"
  creator_role: "by"
  year: 1975
  eval: "liked"
  genre: "Canterbury scene"
  image: "/assets/images/music/gilgamesh.jpg"
  posted: "2020-11-03"
  text: |
    The three Medley pieces on ***Gilgamesh*** are all superb, but it is the closing movement of the first, 'World of Zin', that stays with me. Phil Lee's guitar locks onto a single motif and refuses to let go, repeating it with incremental variations that accumulate almost subliminally until the passage suddenly opens out into full-throated release. <u>It is a masterclass in motivic development: the beauty lies not in the motif itself but in the patience of its unfolding, the trust that repetition, handled with enough subtlety, becomes its own form of escalation.</u>

    'Notwithstanding' foregrounds the jazz influence most explicitly, and listening to it one understands why the band eventually returned to straight jazz after only two albums. The pull was always there. Early Canterbury-scene prog rock is saturated with jazz in a way that later British prog mostly abandoned, and Gilgamesh may be the purest example of a band that occupied the border between the two idioms, not as fusion but as genuine bilingualism. A warm, intelligent record from a scene that never quite got the recognition it deserved.

- title: "New Initiatives"
  type: "music"
  creator: "Nova Incepta"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/new_initiatives.jpg"
  posted: "2020-11-03"
  text: |
    ***New Initiatives*** occupies the lighter end of prog metal, and 'Anonymous Oracle' is its standout: a beautiful piece that recalls the textural delicacy of White Walls, where the female vocal sits perfectly within the sonic architecture rather than floating above it. The violin adds a warmth and harmonic complexity that lifts the arrangement beyond what guitar and keys alone could achieve, an understated but crucial contribution.

    The later tracks drift toward more conventional territory, moments where the writing settles for the expected resolution rather than the surprising one. <u>But the overall impression remains positive: this is a record with a clear aesthetic identity and enough strong material to justify its existence, even if it does not yet fully inhabit the space it has staked out.</u> There is potential here for something more distinctive, and the best moments suggest the musicians know exactly where to find it.

- title: "Hatfield and the North"
  type: "music"
  creator: "Hatfield and the North"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "Canterbury scene"
  image: "/assets/images/music/hatfield_and_the_north.jpg"
  posted: "2020-11-03"
  text: |
    ***Hatfield and the North*** is Canterbury prog as platonic ideal. Caravan's bassist, Gong's drummer, and two other musicians of comparable stature, though less familiar to me by name, come together as a supergroup that actually sounds like a band rather than a collision of egos. From 'Calyx' onward the jazz influence thickens into something close to full-blown fusion, but the instrumental passages never lose the warmth and whimsy that distinguish Canterbury from its more austere prog cousins.

    <u>Each player inhabits their instrument so completely that the performances feel less like individual contributions than extensions of a single musical intelligence.</u> The flute in 'Fitter Stoke Has a Bath' is gorgeous, an almost unbearably comfortable sound, like warm light through old glass. The album sits in that rare space where complexity serves pleasure rather than demanding admiration; one does not listen to it and think about how difficult it must have been to play. One simply listens, and it is enough.

    Among the Canterbury bands, Hatfield and the North remain one of the most distinctive, which is saying something in a scene defined by idiosyncrasy. This is early prog at its most welcoming: rigorous and relaxed in the same breath, demanding nothing of the listener except the willingness to be carried.

- title: "You (Radio Gnome Invisible, Pt. 3)"
  type: "music"
  creator: "Gong"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/you_radio_gnome_invisible_pt_3.jpg"
  posted: "2020-11-03"
  text: |
    20240521 update: how wrong I was not to appreciate this before. ***You (Radio Gnome Invisible, Pt. 3)*** is the peak of Gong's Canterbury scene prog rock for good reason, the highest-rated Gong album on Prog Archives and deservedly so. <u>What I once dismissed as excessive repetition and strange synth pads now reveals itself as a masterclass in sustained psychedelic architecture, where the loops function less as laziness and more as mantric scaffolding for Daevid Allen's cosmic theatre.</u> The synth textures that felt alien on first listen, those squelchy, deliberately weird pad washes, are precisely what give the album its singular atmosphere: a kind of interstellar vaudeville that no other Canterbury act quite managed.

    Coming back to this after years of listening growth is humbling. The repetition that once wore me down now feels deliberate and hypnotic, each cycle adding subtle harmonic or timbral variation that rewards close attention. The production captures that mid-seventies analogue warmth without ever sounding muddy, and the interplay between Steve Hillage's guitar work and Tim Blake's synthesisers creates a textural depth that holds up against anything in the Canterbury canon. One simply has to meet it on its own terms, and when one does, the rewards are immense.

- title: "The Bardic Depths"
  type: "music"
  creator: "The Bardic Depths"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/bardic_depths.jpg"
  posted: "2020-11-02"
  text: |
    ***The Bardic Depths*** plays like a minimalist cousin of The Tangent: same prog rock DNA, stripped back to skeletal motifs and left to breathe across seven- and eight-minute stretches. Each track is essentially one idea repeated and gently permutated, which in lesser hands would be a recipe for tedium. Here it mostly works, though the self-titled album does test one's patience in the middle section where the compositional economy tips into genuine monotony.

    The bookends save it. <u>'The Trenches' opens with a gravity that the minimalist framework actually amplifies, the restraint giving each chord change and melodic shift real weight.</u> 'Legacies' closes the album with a similar sense of earned resolution, as though the repetition throughout has been accumulating toward this final statement. It is not an album that demands repeated listening in the way the best prog does, but those two tracks alone justify the time spent.

- title: "Colours Caffé"
  type: "music"
  creator: "Yesterdays"
  creator_role: "by"
  year: 2010
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/colours_caffe.jpg"
  posted: "2020-11-02"
  text: |
    ***Colours Caffé*** is an endearing little prog rock record, the kind that sounds like it was composed inside a carousel. There is a playful, almost childlike quality to the synth tones here that immediately calls to mind Cheeto's Magazine: that same circus-tent brightness, those same whimsical keyboard textures that refuse to take themselves too seriously. Hungarian prog has always had its own distinctive colour palette, and Yesterdays sit comfortably in that tradition while keeping things light enough to charm rather than overwhelm.

    <u>The flute work is the album's secret weapon.</u> 'Flautoccata' in particular is gorgeous, the instrument cutting through the synth layers with a clarity and expressiveness that grounds the playfulness in something musical. It is not an album that reinvents anything, but its warmth and melodic generosity make it easy to return to, a minor gem in a genre that too often mistakes complexity for substance.

- title: "Moments"
  type: "music"
  creator: "IO Earth"
  creator_role: "by"
  year: 2012
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/moments.jpg"
  posted: "2020-10-30"
  text: |
    ***Moments*** is a strange prog metal album, pulled in several directions at once and never quite deciding what it wants to be. The female vocals are stunning; one hears it immediately in 'Live Your Life Pt 1', a performance of such purity and control that it elevates everything around it. 'Drifting' is superb, 'Brothers' nearly as good, and when the album locks into its core identity it delivers something distinctive and emotionally rich.

    The problems are structural. <u>The drum programming falls into repetitive patterns that sap momentum from otherwise strong compositions, a frustrating undercutting of material that deserves better rhythmic imagination.</u> Then there is 'Come Find Love', an electronic detour wedged into the middle of the tracklist that, while admittedly quite listenable on its own terms, sits awkwardly against the surrounding prog metal. It is symptomatic of the album's larger identity crisis: beautiful individual moments orbiting a centre that never quite coheres.

- title: "Oblivious To The Obvious"
  type: "music"
  creator: "Hourglass"
  creator_role: "by"
  year: 2009
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/oblivious_to_the_obvious.jpg"
  posted: "2020-10-30"
  text: |
    Two and a half hours. ***Oblivious To The Obvious*** demands commitment on a scale that even prog metal rarely asks for, and for the first nine tracks it largely earns it. The songwriting is consistently strong across an absurd runtime, each track offering enough harmonic complexity and structural ambition to justify its length. 'Delirium' is the standout, a track that functions almost as a prog metal primer: <u>every hallmark of the genre, the shifting time signatures, the technical interplay, the dynamic contrasts between aggression and beauty, compressed into a single definitive statement.</u>

    The five-part title suite that closes the album, then, is a disappointment. After nine tracks of sustained quality, one expects the epic closer to be the culmination; instead it is curiously inert, its extended runtime exposing a lack of thematic development that the shorter pieces managed to disguise. It is the prog trap: length as ambition rather than necessity. The first nine tracks, though, are strong enough that the deflating finale cannot undo them entirely.

- title: "Three Fates Project"
  type: "music"
  creator: "Keith Emerson Band"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/three_fates_project.jpg"
  posted: "2020-10-30"
  text: |
    ***Three Fates Project*** is the sound of a sixty-eight-year-old genius proving that compositional brilliance does not require the fingers to keep pace. Keith Emerson's orchestral arrangements here are formidable in their ambition and execution, every voice in the ensemble marshalled with a precision and imagination that puts most dedicated orchestral prog to shame. <u>That Emerson undertook these arrangements himself, translating his keyboard-centric prog rock vocabulary into full symphonic language, is an act of creative reinvention that borders on the heroic.</u>

    The centrepiece is 'Tarkus - concertante', and it is overwhelming. What was already one of prog's most structurally audacious compositions gains an entirely new dimension in orchestral dress: the harmonic complexity that was always latent in the original is made explicit, the melodic lines interweave with a sophistication that the power-trio format could only gesture toward, and Emerson's own keyboard solo, played with all the fire his ageing hands could still summon, threads through the orchestral texture with thrilling unpredictability. The chord voicings alone reveal compositional depths that decades of rock-band performance had partially obscured.

    <u>Even those who find ELP bombastic or indulgent would struggle to resist 'Tarkus - concertante': it is simply too beautiful, too intricate, too alive with genuine musical intelligence to dismiss.</u> That it arrived four years before Emerson's death lends the whole project an elegiac weight it may not have intended. This is extremely fun, yes, but it is also something rarer: a late work that does not merely revisit past glories but surpasses them.

- title: "Spiral Steps"
  type: "music"
  creator: "Jun Fukamachi"
  creator_role: "by"
  year: 1976
  eval: "liked"
  genre: "jazz fusion"
  image: "/assets/images/music/spiral_steps.jpg"
  posted: "2020-10-30"
  text: |
    ***Spiral Steps*** is keyboard-led Japanese jazz fusion of a very particular vintage: mid-seventies, analogue-warm, technically dazzling where it needs to be and content to groove where it does not. The album is uneven; several tracks settle into competent but unremarkable fusion territory, the kind of playing that demonstrates skill without quite summoning personality. But when Fukamachi locks in, the results are extraordinary.

    'In the Holiday Groove' and the title track are where the album lives. <u>'Spiral Steps' in particular showcases keyboard work of startling fluidity and invention, Fukamachi's fingers finding melodic lines that feel simultaneously composed and spontaneous, each phrase tumbling into the next with a logic that only becomes apparent in retrospect.</u> It is a playing that makes one forget about technique entirely and simply follow the musical thought. Two great tracks do not make a great album, but they make a worthwhile one.

- title: "Out Of The Tunnel's Mouth"
  type: "music"
  creator: "Steve Hackett"
  creator_role: "by"
  year: 2009
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/out_of_the_tunnels_mouth.jpg"
  posted: "2020-10-29"
  text: |
    ***Out Of The Tunnel's Mouth*** is Steve Hackett at his most comprehensively excellent: classical guitar, electric guitar, progressive composition, and a backing band capable of matching him at every turn. The album opens with 'Fire on the Moon', whose single-note bassline immediately commands attention, a deceptively simple foundation over which the harmonic arrangement builds an almost physical sense of impact. <u>There is a quality of immediate, frontal force to the chord voicings here that one rarely encounters in Hackett's solo work, as though the arrangements are designed to hit before they are understood.</u> That same visceral quality resurfaces in the second half of 'Nomads', confirming it as a deliberate aesthetic rather than a happy accident.

    'Emerald and Ash' is the album's centrepiece and its masterpiece. The longest track, it is also the most perfectly calibrated: the beautiful passages are beautiful, the progressive sections feature impeccably mixed drums interlocking with harmonic movement and bassline in a way that rewards close listening, and Steve's closing solo is a moment of pure inspiration, a playing that sounds both inevitable and surprising. The lyrics, unusually for prog, actually complement rather than distract from the musical architecture.

    Rob Townsend's saxophone in the second half of 'Last Train to Istanbul' is another highlight, an instrument that too often sits decoratively in prog contexts here given room to breathe and soar. John Hackett's flute work throughout is gorgeous. <u>The only potential criticism is that some transitions feel abrupt, but closer listening reveals them to be carefully synchronised with lyrical shifts, the apparent roughness functioning as deliberate emphasis.</u> An album that earns its complexity at every turn.

- title: "Üdü Ẁüdü"
  type: "music"
  creator: "Magma"
  creator_role: "by"
  year: 1976
  eval: "loved"
  genre: "zeuhl"
  image: "/assets/images/music/udu_wudu.jpg"
  posted: "2020-10-28"
  text: |
    ***Üdü Ẁüdü*** finds Magma at their most stylistically expansive, the Zeuhl framework absorbing heavy jazz inflections without losing any of its ritualistic intensity. 'Zombies' and 'De Futura' are the twin peaks, both operating at a level of rhythmic and harmonic sophistication that remains startling nearly five decades later. The basslines across the entire album deserve particular attention: thick, melodically inventive, driving the compositions forward with an authority that makes the bass feel less like a rhythm section instrument and more like a lead voice.

    <u>There are moments, especially in the more atmospheric passages, where one hears something approaching space rock, an unexpected textural dimension that adds genuine strangeness to an already alien sonic world.</u> Magma's genius was always their ability to make the unfamiliar feel inevitable, and this album is perhaps their most successful demonstration of that principle. The jazz DNA gives it a looseness and swing that *Mekanïk Destruktïẁ Kommandöh* deliberately withheld, and what emerges is an album that feels both cerebral and physical, music for the mind and the body in equal measure.

- title: "Hot Rats"
  type: "music"
  creator: "Frank Zappa"
  creator_role: "by"
  year: 1969
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/hot_rats.jpg"
  posted: "2020-10-28"
  text: |
    ***Hot Rats*** is Zappa at his most instrumentally unhinged, a jazz fusion and prog rock hybrid that is essentially one long showcase for soloing of an almost absurd calibre. The playing throughout is ferocious; there is no other word for it. Every musician on this record sounds like they are trying to outdo the others, and the effect is not chaos but a kind of competitive excellence, each solo pushing the overall energy higher.

    <u>The moment around the six-minute mark of 'Son of Mr. Green Genes' where a couple of phrases from the Beatles' <em>Come Together</em> sneak in is pure Zappa: irreverent, knowing, slipped in so casually that one almost misses it.</u> It captures something essential about his approach, the refusal to treat any genre boundary or cultural hierarchy as sacred. The album was radical in 1969 and it remains exhilarating now, a reminder that virtuosity, when directed by genuine musical intelligence rather than ego, never dates.

- title: "One Size Fits All"
  type: "music"
  creator: "Frank Zappa"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/one_size_fits_all.jpg"
  posted: "2020-10-28"
  text: |
    ***One Size Fits All*** is a kaleidoscope. Jazz fusion and prog rock smashed together and refracted into a thousand fragments, each one catching the light of a different influence: King Crimson here, Steve Vai's future vocabulary there, and scattered throughout, dozens of other references so fleeting and so seamlessly integrated that identifying them becomes a game in itself. The sheer density of musical ideas per minute is breathtaking, and yet it never feels cluttered; Zappa's compositional control ensures that every element serves the whole.

    <u>'Can't Afford No Shoes' and 'Evelyn, a Modified Dog' are the undeniable highlights, tracks where the fusion of absurdist humour and genuine compositional brilliance achieves a kind of manic perfection.</u> There is a joy to this record that is sometimes overlooked in discussions of Zappa's technical achievements: it is infectiously fun, the sound of musicians operating at the peak of their abilities and loving every second of it. The album earns its title. One size fits all, because there is something here for everyone willing to listen closely enough.

- title: "The Fusion Syndicate"
  type: "music"
  creator: "The Fusion Syndicate"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "jazz fusion"
  image: "/assets/images/music/fusion_syndicate.jpg"
  posted: "2020-10-27"
  text: |
    ***The Fusion Syndicate*** is supergroup jazz fusion done right: no ego battles, no safe jamming, just a collection of extraordinary musicians pushing each other toward something greater than the sum of their parts. The album is strong throughout, but 'At the Edge of the Middle' exists on another plane entirely. <u>It is a track that makes one want to reach beyond the five-star ceiling, a piece of jazz guitar playing so effortlessly beautiful and harmonically rich that language briefly fails in its presence.</u>

    Steve Morse is the gravitational centre here, and his playing is simply godlike. There is a fluidity to his phrasing, a way of making technically impossible runs sound like the most natural thing in the world, that sets him apart from even the most accomplished fusion guitarists. Every time the jazz guitar enters, thought dissolves into pure listening. The album does not reinvent the fusion wheel, but when the playing reaches this level, reinvention is beside the point.

- title: "Hamburger Concerto"
  type: "music"
  creator: "Focus"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/hamburger_concerto.jpg"
  posted: "2020-10-27"
  text: |
    ***Hamburger Concerto*** opens with medieval European music rendered in a surprisingly modern arrangement, an anachronistic collision that immediately signals the album's range and ambition. From there, Focus move through psychedelic and progressive modes with an ease that belies the technical demands of the material. Every track is worthy of its place: from the relative delicacy of 'La Cathédrale de Strasbourg' to the full-throttle prog rock of 'Birth', the album maintains a consistently high standard that makes selecting highlights almost redundant.

    <u>The guitar solos throughout are extraordinary, possessed of a melodic inventiveness and emotional directness that elevate them above mere technical display.</u> Jan Akkerman's playing here has that rare quality of sounding both composed and improvised, each phrase following the last with a logic that feels discovered rather than planned. The arrangements are immaculate, every instrument given space without sacrificing density. Having gone back to listen to 'Hocus Pocus' from their 1971 output after this, the through-line is clear: Focus were always a band whose instrumental brilliance was matched by genuine compositional intelligence. This album is the fullest expression of that marriage.

- title: "The Silent Corner and the Empty Stage"
  type: "music"
  creator: "Peter Hammill"
  creator_role: "by"
  year: 1974
  eval: "meh..."
  genre: "progressive rock"
  image: "/assets/images/music/silent_corner_and_the_empty_stage.jpg"
  posted: "2020-10-26"
  text: |
    ***The Silent Corner and the Empty Stage*** carries a reputation that the music struggles to support. Peter Hammill's voice is undeniably distinctive, a singular instrument that has earned its place in the prog canon, but distinctiveness alone does not make a compelling album. Strip away 'Forsaken Gardens' and 'Red Shift' and there is precious little progressive content here; the rest is closer to art pop, competent but unremarkable.

    'Red Shift' is the most interesting track precisely because it wears its Pink Floyd influence so openly, the atmospherics and dynamic arc echoing *The Dark Side of the Moon*-era Floyd in ways that feel more like homage than coincidence. It works, but it also underscores the problem: when Hammill reaches for prog, the results are engaging; when he retreats to his default singer-songwriter mode, the album flatlines. A middling record from an artist capable of more.

- title: "Time of Change"
  type: "music"
  creator: "The Trip"
  creator_role: "by"
  year: 1999
  eval: "loved"
  genre: "Italian prog"
  image: "/assets/images/music/time_of_change.jpg"
  posted: "2020-10-26"
  text: |
    ***Time of Change*** is a guitar-free zone, and it is all the better for it. This is keyboard-led Italian prog rock in its purest form, the absence of guitar stripping the compositions down to their harmonic and melodic essentials. Without a guitarist to default to for solos and riffs, the keyboards are forced to carry everything: melody, rhythm, texture, drama. this yields a distinctive sound that sits apart from the standard Italian prog template.

    'Rhapsodia' is a highlight, richly arranged and dynamically compelling, but the album's crowning achievement is the closing track 'Ad libitum', a solo keyboard piece of such beauty and structural elegance that it justifies the entire record on its own. <u>There is something deeply satisfying about prog that trusts a single instrument to hold the listener's attention, and 'Ad libitum' delivers on that trust completely.</u> A quietly brilliant album that deserves far more attention than it has received.

- title: "一触即発"
  type: "music"
  creator: "四人囃子"
  creator_role: "by"
  year: 1974
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/isshoku_sokuhatsu.jpg"
  posted: "2020-10-26"
  text: |
    There is no resisting ***一触即発***. It is simply, overwhelmingly, almost unreasonably beautiful. The title track invites an immediate and unavoidable question: is the opening not a direct nod to 'Breathe' from Pink Floyd's *The Dark Side of the Moon*, released just the year before in 1973? The resemblance is too striking to be coincidental, the atmospheric guitar textures and languid pacing echoing Floyd's masterpiece with a specificity that feels like conscious tribute rather than unconscious absorption.

    <u>Every track except 'おまつり' deserves a perfect score, and that is not hyperbole but a plain accounting of the quality on display.</u> Yonin Bayashi were operating at a level of compositional and performative excellence that places this album among the finest Japanese rock records of the 1970s, a period already rich with extraordinary music. The fusion of Western progressive rock vocabulary with a sensibility that is unmistakably Japanese produces something that neither tradition could have generated alone. one leaves the album struggling to articulate the feeling it leaves behind, which is perhaps the highest compliment one can pay to music: it exceeds the reach of language.

- title: "Dwellers of the Deep"
  type: "music"
  creator: "Wobbler"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/dwellers_of_the_deep.jpg"
  posted: "2020-10-26"
  text: |
    ***Dwellers of the Deep*** is Wobbler's most beautiful album to date, and given the quality of their catalogue, that is no small claim. The dominant mode is a kind of delicate intricacy that recalls both Kaipa and Genesis: multiple instrumental voices woven together into textures that are simultaneously complex and luminous. 'By the Banks' exemplifies this approach, its layered arrangement creating the sensation of multiple conversations happening at once, each one coherent, all of them contributing to a larger harmonic whole.

    <u>What prevents the album from tipping into mere prettiness is Wobbler's willingness to introduce weight and darkness, particularly in the closing track 'Merry Macabre', where King Crimson's shadow falls across the proceedings with thrilling effect.</u> The contrast between the gentler passages and these heavier irruptions gives the album a dramatic range that pure beauty alone could not achieve. It is dazzling in the literal sense: one's ears cannot quite keep up with everything that is happening, and each listen reveals new details, new interactions, new moments of quiet brilliance. A triumph of contemporary prog.

- title: "Ink Compatible"
  type: "music"
  creator: "Spastic Ink"
  creator_role: "by"
  year: 2004
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/ink_compatible.jpg"
  posted: "2020-10-26"
  text: |
    ***Ink Compatible*** is the second Spastic Ink album and it is every bit as unhinged, every bit as technically absurd, and every bit as musically brilliant as its predecessor. Ron Jarzombek's compositional genius is on full display: these are not mere exercises in complexity but genuine compositions, pieces that use their extreme technical demands in service of musical ideas that are, against all odds, beautiful. 'Words for Nerds', 'The Cereal Mouse', 'A Chaotic...', and frankly nearly everything else on the record (the sole exception being 'In Memory of………') is written with an intelligence and imagination that makes one feel years of music theory study have been for nothing.

    <u>The album's great trick is making the impossible sound playful, even joyful, as though the extraordinary technical facility on display is not the point but merely the means to an end that is, at its core, about the pleasure of musical invention.</u> Ron's writing consistently finds the line between compositional rigour and sheer fun, and walks it with a confidence that borders on arrogance, except the music is good enough to justify every ounce of it. Prog metal at its most intellectually thrilling.

- title: "Ink Complete"
  type: "music"
  creator: "Spastic Ink"
  creator_role: "by"
  year: 1997
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/ink_complete.jpg"
  posted: "2020-10-25"
  text: |
    ***Ink Complete*** is the sound of three people, Pete Perez, Bobby Jarzombek, and Ron Jarzombek, showing off. That description might sound dismissive, but there is nothing dismissive about what they achieve here. The prog metal is heavy without reaching the extremes of Watchtower (Ron tuned it down a bit, as it were), and the result is music that is both technically astonishing and surprisingly listenable: a virtuosity that invites one in rather than walling one out.

    'A Wild Hare' is the highlight, a track whose mood one might tentatively describe as joyful, an unusual adjective for music this technically demanding. 'Harm and Half-Time Baking Shuffle' is Bobby Jarzombek's drum showcase; 'To Counter and Groove in e Minor' gives Pete Perez the bass spotlight. In each case, the soloist pushes toward the outer limits of their instrument's possibilities while the others provide a framework that is itself fiercely complex. <u>This is the Watchtower family at the peak of their music theory powers, and the fact that music this cerebral can also be this enjoyable is a small miracle of artistic temperament.</u>

- title: "In Stasis (Live EP)"
  type: "music"
  creator: "Ihlo"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/in_stasis_live_ep.jpg"
  posted: "2020-10-25"
  text: |
    ***In Stasis (Live EP)*** is that rare live recording that surpasses the studio versions. The material from *Union*, already strong in its recorded form, gains a physicality and immediacy here that the studio could not quite capture. The drumming is noticeably richer, almost certainly owing to McMenemy's liberal use of ghost notes that fill out the rhythmic texture with a subtlety that the studio mixes had smoothed away. Robison's vocals are extraordinary, commanding and emotionally present in a way that live performance seems to unlock in certain singers.

    <u>The moment in 'Hollow' where his voice suddenly leaps into an unexpected high register is electric, a burst of raw vocal tension that sends the hair up on one's arms.</u> An interesting production detail: the bass tone has a quality that strongly suggests a Neural DSP amp modeller, carrying a harmonic saturation and mid-range character reminiscent of Toska's bass sound. Whether or not that identification is correct, the tone sits beautifully in the live mix, providing warmth and definition in equal measure. A live EP that makes the case for this band's future as forcefully as any studio release could.

- title: "Control and Resistance"
  type: "music"
  creator: "Watchtower"
  creator_role: "by"
  year: 1989
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/control_and_resistance.jpg"
  posted: "2020-10-25"
  text: |
    ***Control and Resistance*** is brutally heavy prog metal, the kind that makes Dream Theater's output feel almost approachable by comparison. If one already struggles with DT's density, this will only compound the problem. But for those who have metabolised that particular strain of technical maximalism, this record is virtually unimprovable. Ron Jarzombek's guitar work on 'Mayday' is a masterclass in precision aggression, every phrase sculpted with the surgical clarity of someone who thinks in intervals rather than shapes. The drumming on 'Eldritch' is equally staggering: polyrhythmic, relentless, and yet never showboating for its own sake.

    <u>It is no accident that Dream Theater have cited Watchtower as a formative influence; one hears the blueprint here for an entire lineage of technical prog metal.</u> What separates this record from its imitators is the marriage of virtuosity and musical intelligence. The riffs do not merely demonstrate facility; they develop, modulate, and resolve with the structural logic of composed music. The production, raw by modern standards, only amplifies the sense of a band playing at the absolute limit of human coordination. <u>Technique and musicality at this level are not merely impressive; they are rare enough to constitute a kind of argument about what the genre can be.</u>

- title: "Space Is Only Noise"
  type: "music"
  creator: "Nicolas Jaar"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "electronic"
  image: "/assets/images/music/space_is_only_noise.jpg"
  posted: "2020-10-25"
  text: |
    ***Space Is Only Noise*** is a gorgeous record, one in which a Chilean-American kid working out of New York somehow conjures the spacious restraint of French minimalism through an electronic palette. The common misreading, and one still finds it in comment sections and forums, is that layering more tracks equals greater sophistication. Jaar's achievement is precisely the opposite: it is the handling of rhythm, regularity, and the gaps between sounds that gives this album its uncanny stillness. The minimalist comparison is not superficial; it is structural.

    <u>The clearest demonstration is 'Keep Me There', where the timbres are distinctive enough on their own, but the real brilliance begins around the three-minute mark: the saxophone bout followed by irregular single-note sampling set against a metronomic kick drum, producing an effect of studied randomness, a kind of non-arbitrary arbitrariness.</u> Every silence is weighted, every re-entry calibrated. And the mix itself deserves its own paragraph of praise: the spatial positioning of elements, the depth of the low end, the way reverb tails are allowed to decay naturally rather than being curtailed for the sake of clarity. Jaar treats the mix as a compositional tool rather than a post-production afterthought. <u>one comes away the album with the sense that electronic music's future lies not in accumulation but in the poetics of subtraction.</u>

- title: "Dead Reckoning"
  type: "music"
  creator: "Threshold"
  creator_role: "by"
  year: 2007
  eval: "meh..."
  genre: "progressive metal"
  image: "/assets/images/music/dead_reckoning.jpg"
  posted: "2020-10-25"
  text: |
    ***Dead Reckoning*** markets itself as prog metal, but the 'prog' is largely cosmetic. The synth solos are serviceable, occasionally even enjoyable, yet beyond those moments the record settles into a flatness that no amount of genre labelling can disguise. The drumming is the worst offender: 'Elusive' features the kind of plodding four-on-the-floor pattern that belongs in a mid-tier hard rock album, not a record with progressive ambitions. It is difficult to overstate how much lifeless percussion can drain the energy from an otherwise passable arrangement.

    What puzzles me most is Threshold's reputation. The band carries a degree of critical goodwill in the prog metal world that this record simply does not justify. <u>One listens and wonders whether 'progressive' has become a label of aspiration rather than description, a genre tag applied to any band with a keyboard and songs over five minutes.</u>

- title: "Order Of Magnitude - Empath Live Volume 1"
  type: "music"
  creator: "Devin Townsend"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/order_of_magnitude_empath_live_volume_1.jpg"
  posted: "2020-10-23"
  text: |
    One hardly needs to rehearse the case for Devin Townsend as a live performer; the man turns concert halls into something between a prog metal show and a communal ecstatic event. But ***Order Of Magnitude - Empath Live Volume 1*** is exceptional even by his standards. The most striking moment is the acoustic reworking of 'Spirits Will Collide': stripped of its studio bombast, the harmonies interlocking with a lone acoustic guitar, it becomes something entirely different from the original, more vulnerable, more luminous. <u>It is one of those rare live reinterpretations that does not merely reproduce the studio version but reveals a dimension the studio version could not reach.</u>

    'Kingdom' and 'Deadpan' are performed identically to the earlier Albert Hall live recordings, which is to say they are identically magnificent, identically capable of producing that specific full-body resonance that Townsend's best material induces. The sequence of 'Coast', 'Gato', and 'Heavens End' played back to back is relentless in the best sense: I found myself stamping my feet at my desk during the final track, physically unable to stay still while ostensibly writing. <u>If the world had a few more prog metal songwriters with Devin Townsend's generosity of spirit, 2020 might not have been quite the catastrophe it was.</u> That is not hyperbole. The man radiates a sincerity that is inseparable from his music, and this record captures it at full wattage.

- title: "13th Star"
  type: "music"
  creator: "Fish"
  creator_role: "by"
  year: 2007
  eval: "loved"
  genre: "neo-prog"
  image: "/assets/images/music/13th_star.jpg"
  posted: "2020-10-23"
  text: |
    ***13th Star*** hovers at the edges of progressive rock without ever quite committing to the genre, and that restraint turns out to be a virtue. I would classify this squarely as classic rock with pop-rock leanings, and Fish wears the idiom well. What cannot be dismissed, regardless of genre taxonomy, is the quality of the arrangements and the lyrical craft, both of which are luminous here. From 'Square Go' through to 'Dark Star', every track earns its place; there is not a single filler cut in the sequence.

    <u>One arrives at a liberating conclusion: Fish does not need prog rock anymore, and perhaps never did.</u> The baroque complexity of his Marillion years was one vehicle for his gifts, but the directness of classic rock and pop-rock turns out to be another, equally valid one. When the songwriting is this strong, when the melodic instincts are this assured, genre becomes beside the point. The record is, put simply, a joy to listen to, and that is a harder thing to achieve than any odd-time signature.

- title: "Moral Panic"
  type: "music"
  creator: "Nothing But Thieves"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "alternative rock"
  image: "/assets/images/music/moral_panic.jpg"
  posted: "2020-10-23"
  text: |
    ***Moral Panic*** arrives at a strange inflection point for Nothing But Thieves: a band whose early material crackled with unpolished urgency settling into something more calculated, more arena-ready, and less interesting for it. The critical consensus, that this is a sideways step rather than a forward one, is essentially correct. 'Is Everybody Going Crazy?' opens with a post-punk angularity that promises reinvention, only for the album to retreat into safer territory almost immediately. 'Can You Afford to Be An Individual?' is the other standout, its title functioning as both lyric and self-interrogation, a question a band asks when it suspects it is losing the thread.

    The weaker material is not bad so much as unmemorable. 'There Was Sun' in particular disappears the moment it ends, a pleasant wash of reverb and sentiment that signifies nothing. The production is competent throughout, occasionally too competent; one misses the rougher edges that gave *Nothing But Thieves* and *Broken Machine* their nervous energy.

    And then there is Conor Mason's voice, which remains one of the most remarkable instruments in contemporary rock. Even on tracks where the songwriting stalls, that falsetto, fragile and enormous at once, carries a desperate beauty that the compositions around it do not always earn. <u>One listens to <b><i>Moral Panic</i></b> wishing the songs were as brave as the voice singing them.</u>

- title: "Raingods With Zippos"
  type: "music"
  creator: "Fish"
  creator_role: "by"
  year: 1999
  eval: "liked"
  genre: "neo-prog"
  image: "/assets/images/music/raingods_with_zippos.jpg"
  posted: "2020-10-21"
  text: |
    ***Raingods With Zippos*** continues Fish's migration toward classic rock, and the best moments here are superb. 'Tilted Cross', 'Faithhealer', and 'Digging Deep' are compositions where both the lyrical writing and the musicality deserve full marks: the melodies are rich, the arrangements purposeful, and Fish's voice, always more expressive than technically polished, finds exactly the right register for this material.

    The difficulty is everything else. Several tracks run long without earning their duration, stretching out into passages that feel aimless rather than expansive. <u>There is a difference between a song that takes its time and a song that wastes it, and a few cuts here fall on the wrong side of that line.</u> The peaks are high enough to justify the listen, but one cannot help wishing the editing had been more ruthless.

- title: "Songs From the Mirror"
  type: "music"
  creator: "Fish"
  creator_role: "by"
  year: 1993
  eval: "liked"
  genre: "neo-prog"
  image: "/assets/images/music/songs_from_the_mirror.jpg"
  posted: "2020-10-21"
  text: |
    As a covers album, ***Songs From the Mirror*** does the one thing it absolutely must: it makes someone else's songs sound like Fish's own. The reinterpretations of Moody Blues, The Kinks, Genesis, and David Bowie material are handled with genuine personality; the arrangements are reshaped, the vocal delivery recalibrated, and the results feel like inhabitation rather than imitation.

    The exception, predictably, is Pink Floyd. 'Fearless' is beautifully performed, but who could possibly improve on the original? <u>One listens, enjoys it, and then immediately wants to return to <em>Meddle</em>.</u> That is not a failure of Fish's execution so much as a testament to the untouchability of certain source material. Some covers are acts of reinterpretation; others are reminders of why the originals are canonical.

- title: "Internal Exile"
  type: "music"
  creator: "Fish"
  creator_role: "by"
  year: 1991
  eval: "meh..."
  genre: "neo-prog"
  image: "/assets/images/music/internal_exile.jpg"
  posted: "2020-10-21"
  text: |
    Fish's second solo album marks a deliberate pivot away from the Marillion-era prog rock aesthetic toward a heavier classic rock sound. 'Credo' and 'Tongues' hit hard, and their riffs carry genuine weight. But what is gained in directness is lost in mystery: the prog rock aura, that quality of reaching toward something structurally and emotionally beyond the conventional, is almost entirely absent. Only 'Shadowplay' retains a trace of that *Bohemian Rhapsody*-inflected prog-opera grandeur, and it is the sole track that suggests what the album might have been.

    <u><b><i>Internal Exile</i></b> is the sound of an artist deliberately severing himself from his own strengths, and the critical consensus on Prog Archives, where it trails its predecessor noticeably, seems to reflect exactly this diagnosis.</u> One respects the impulse to evolve, but evolution without destination is just movement.

- title: "Vigil in a Wilderness of Mirrors"
  type: "music"
  creator: "Fish"
  creator_role: "by"
  year: 1990
  eval: "liked"
  genre: "neo-prog"
  image: "/assets/images/music/vigil_in_the_wilderness_of_mirrors.jpg"
  posted: "2020-10-21"
  text: |
    ***Vigil in a Wilderness of Mirrors***, Fish's first solo album after leaving Marillion, carries a palpable anxiety of influence: the effort to write something categorically different from Marillion is audible in nearly every arrangement decision. The trouble is that the effort itself becomes the most prominent feature, lending the record a slightly effortful quality that occasionally tips into the naive. Tracks like 'Cliche' betray the irony: even when straining to sound unlike Marillion, the Marillion DNA seeps through in the harmonic choices and the vocal phrasing.

    The lyrical craft and musicality are difficult to fault, and there are moments of genuine beauty scattered throughout. <u>But the album's overriding impression is one of studied neutrality, a songwriter so determined not to repeat himself that he forgets to commit to anything new.</u> One senses that the boldness will come later, once the need to prove independence has been metabolised.

- title: "A Feast of Consequences"
  type: "music"
  creator: "Fish"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "neo-prog"
  image: "/assets/images/music/feast_of_consequences.jpg"
  posted: "2020-10-21"
  text: |
    ***A Feast of Consequences*** is an immaculately assembled record, its production values and arrangement detail among the highest in Fish's solo catalogue. The centrepiece is the five-track anti-war suite from 'High Wood' through 'The Leaving': the use of a stable drum groove overlaid with bugle calls to evoke the mechanised terror of the battlefield inevitably recalls Gustav Holst's 'Mars', but the execution here is specific and earned rather than derivative. The lyrics across this sequence are vivid, imagistic, and unflinching; one emerges the suite with the sense of having witnessed something rather than merely been told about it.

    Elsewhere, the record is less consistent. 'The Other Side of Me' disappoints with its flatness, the vocal melody almost nonexistent, likely a consequence of Fish's well-documented throat surgery and its lasting effects on his range. The opening 'Perfume River' is gorgeous, particularly in its lyrical imagery, and the overall atmosphere is beautifully sustained. <u>But this is ultimately an album defined by its peaks rather than its consistency: those peaks are extraordinary, and the valleys merely competent.</u>

- title: "Parallel World"
  type: "music"
  creator: "Far East Family Band"
  creator_role: "by"
  year: 2005
  eval: "meh..."
  genre: "space rock"
  image: "/assets/images/music/parallel_world.jpg"
  posted: "2020-10-21"
  text: |
    ***Parallel World*** bills itself as space rock, which at least explains the aesthetic, if not the tedium. Long passages of synth dominate the record, but they are synth passages without conceptual depth or creative ambition: texture for texture's sake, drifting without purpose or destination. The genre label becomes less an invitation than an alibi.

    'Kokoro' offers a brief flash of genuine surprise, a moment where the compositional thinking catches up to the sonic palette. But the title track's twenty-minute sprawl extinguishes whatever goodwill has accumulated, dragging the listener back into a featureless expanse. <u>Twenty minutes is a commitment; it demands ideas, and this track has none.</u>

- title: "The Thing With Feathers"
  type: "music"
  creator: "Exploring Birdsong"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/thing_with_feathers.jpg"
  posted: "2020-10-20"
  text: |
    ***The Thing With Feathers*** opens with something increasingly rare in contemporary prog rock: a beautiful female vocal performance. The arrangements are elegant, the mix is pristine, and the drummer in particular delivers work of real distinction, driving the compositions with a muscularity that balances the delicacy of the vocal lines. For the first few tracks, one is entirely won over.

    The difficulty emerges cumulatively. By the album's close, a suspicion hardens into certainty: every song is cut from the same template. The structural beats, the dynamic arcs, the textural palette, all begin to feel interchangeable. <u>It is the paradox of a band that does one thing beautifully but has not yet learned to do a second.</u> The talent is obvious; the range is not.

- title: "Dust"
  type: "music"
  creator: "The Enid"
  creator_role: "by"
  year: 2016
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/dust.jpg"
  posted: "2020-10-20"
  text: |
    ***Dust*** is what happens when someone transplants a medieval choir onto a modern rock stage and makes it work. Godfrey's arrangements are the engine here: the choral voicings, the harmonic density, the way the ensemble parts weave through the guitar-driven framework with an almost liturgical grandeur. 'Trophy' and 'Monsters' are overwhelmingly good, a tracks that justify an entire album's existence on their own merits.

    <u>Prog elements are virtually absent, and yet the record never feels constrained by their absence.</u> There are moments that echo Queen's maximalism, the layered harmonies, the operatic vocal arrangements, but where Queen leaned into camp, Godfrey plays it straight, and the sincerity is its own kind of power. This is music that knows exactly what it wants to be and executes with a conviction that makes genre categories feel irrelevant.

- title: "The Bridge"
  type: "music"
  creator: "The Enid"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/bridge_2.jpg"
  posted: "2020-10-19"
  text: |
    Joe Payne's voice on ***The Bridge*** is exquisite: a classical tenor deployed in a rock context with none of the affectation that usually accompanies such crossovers. The beauty of the vocal tone is matched by Godfrey's arrangements, which are lush, layered, and emotionally precise. There is not a single moment of prog complexity here, no odd metres, no extended instrumental passages, no structural gamesmanship, and it does not matter in the slightest.

    <u>Five stars without hesitation, because what this record achieves through pure melodic and vocal beauty renders technical ambition beside the point.</u> Some albums earn their place through complexity; this one earns it through a commitment to loveliness so total that resistance feels churlish.

- title: "Journey's End"
  type: "music"
  creator: "The Enid"
  creator_role: "by"
  year: 2010
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/journeys_end.jpg"
  posted: "2020-10-19"
  text: |
    ***Journey's End*** is remarkable. 'Terra Firma' announces within its opening bars that this is no ordinary prog rock record, and the album spends the next hour proving the point. 'Malacandra' from the ten-minute mark onwards and 'Shiva' in its entirety are a passages that raise goosebumps involuntarily: the orchestral elements do not accompany the rock instrumentation so much as fuse with it, producing something that seems less genre hybridisation than a revelation of what these elements were always meant to sound like together.

    Comparisons to the Moody Blues, who built their reputation on precisely this orchestral-prog synthesis, are inevitable but ultimately flattering to The Enid. <u>In every dimension, the symphonic writing, the choral arrangements, the structural ambition, <em>Journey's End</em> surpasses its predecessors.</u> The closing track, 'The Art of Melody', functions almost as a standalone demonstration of the band's orchestral craft, and it is magnificent. I have run out of superlatives, and the album has earned every one of them. Beautiful, beautiful, beautiful.

- title: "Empty Yard Experiment"
  type: "music"
  creator: "Empty Yard Experiment"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/empty_yard_experiment.jpg"
  posted: "2020-10-18"
  text: |
    ***Empty Yard Experiment*** opens with 'The Poet', a piece of thoroughly credible prog metal driven by drumming that carries a heavy Mike Portnoy imprint, which is to say: technically ferocious, dynamically aware, and never content to merely timekeep. That this is a compliment should go without saying. Every subsequent track delivers, but it is the closing pair, 'Panaromia I' and 'Panaromia II', that elevate the record into something special. The atmospheric work is immaculate: the synth pads are deployed with a restraint and ear for texture that most electronic producers would envy, creating space rather than filling it.

    <u>When the drums finally enter in full force, they are mixed with a solidity and groove that makes the kit feel like a physical presence in the room.</u> I am not entirely sure 'groovy' is the orthodox term for describing a drum mix, but it is the right one: there is a weight and a swing to the low end that one feels before one analyses. The record is a debut, and it sounds like a statement. I want the next one immediately.

- title: "Trilogy"
  type: "music"
  creator: "Emerson, Lake & Palmer"
  creator_role: "by"
  year: 1972
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/trilogy.jpg"
  posted: "2020-10-16"
  text: |
    Keith Emerson's keyboard work on ***Trilogy*** is so luminous it threatens to eclipse everything around it. 'Fugue' is essentially a solo showcase, Emerson alone onstage in all but name, and it is only when Greg Lake's bass enters in the latter half that something resembling ensemble balance is restored. The sheer facility is undeniable: Emerson plays with a fluency and a tonal imagination that make the instrument feel inexhaustible.

    <u>Every keyboard player should hear this record, if only to recalibrate their sense of what is possible.</u> 'Trilogy' and 'Hoedown' are the highlights, the former for its compositional elegance, the latter for its sheer exuberance. The album does not quite cohere as a unified statement, but its peaks are so high that coherence feels like a secondary concern.

- title: "Emerson, Lake & Palmer"
  type: "music"
  creator: "Emerson, Lake & Palmer"
  creator_role: "by"
  year: 1970
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/emerson_lake_and_palmer.jpg"
  posted: "2020-10-16"
  text: |
    ***Emerson, Lake & Palmer*** is, admittedly, a somewhat uneven debut, but for a 1970 release it was already strikingly ambitious. 'The Barbarian', adapted from Bartók, divides opinion: some find the transposition too literal, others too free. Speaking as a keyboard player, I think the weight of the keys sits exactly right; Keith Emerson's touch is forceful without being bludgeoning, and the Hammond tones cut through Greg Lake's bass and guitar in a way that feels carefully calibrated rather than accidental. <u>ELP was always, at its core, Keith Emerson's carnival, and this first record already contains the blueprint for the extravagant keyboard work that would define the band's peak years.</u>

    The real revelation is 'The Three Fates', where Emerson moves from pipe organ to piano to full-band crescendo with a structural logic that most prog acts would not manage until their third or fourth album. The classical quotations are worn openly, almost defiantly, as though daring the listener to call them pretentious. They earn the dare. One hears, in this debut, a band that already knows exactly what it wants to be, even if it has not yet fully become it.

- title: "First Utterance"
  type: "music"
  creator: "Comus"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "acid folk"
  image: "/assets/images/music/first_utterance.jpg"
  posted: "2020-10-14"
  text: |
    I do not quite know how to describe ***First Utterance***, and that is part of its power. Comus arrived in 1971 playing something that belonged to no existing genre: not quite acid folk, not quite progressive rock, not quite chamber music, yet drawing on all three with an intensity that borders on the feral. 'Song to Comus' opens with acoustic instrumentation so delicate it could pass for pastoral, before the vocals twist into something unsettling, a sound that folk revivalists and avant-garde metal bands would spend decades trying to recapture. <u>The album occupies a space between psych and prog that almost no one else has managed to inhabit with this much conviction.</u>

    'The Bite' and 'The Prisoner' are the centrepieces, and they are extraordinary. The arrangements breathe: strings, woodwinds, and percussion enter and retreat with a naturalism that studio folk rarely achieves, while the vocal performances carry a rawness that no amount of production polish could replicate. The record has been rediscovered repeatedly, by the psych underground in the nineties, by the weird-folk crowd in the two-thousands, and each time it sounds as though it has just been made. There is no adequate genre tag for what Comus did here, and perhaps that is the highest compliment one can pay a debut: it invented its own category, then vanished before anyone could follow.

- title: "Papillon"
  type: "music"
  creator: "Latte e Miele"
  creator_role: "by"
  year: 1973
  eval: "loved"
  genre: "Italian prog"
  image: "/assets/images/music/papillon.jpg"
  posted: "2020-10-12"
  text: |
    The first half of ***Papillon*** drags, bordering on the forgettable, but the second half is so beautiful, so assured in both concept and musicianship, that it redeems the whole enterprise and then some. 'La Transformazione' demonstrates an instrumental call-and-response that already sounds fully mature: keyboards, guitar, and bass weave around one another with a contrapuntal sophistication that clearly sets the stage for what would come next. 'Divertimento' brings in a jazz inflection that feels warm and intimate, and the quality of the playing is remarkably high; this is not jazz-fusion tokenism but a band internalising a vocabulary and deploying it with taste.

    <u>'Patetica', adapted from the first movement of Beethoven's <em>Pathétique</em>, is the album's centrepiece and one of the finest classical-to-prog translations in the Italian scene.</u> The structure is a master class in genre-bending: Beethoven's original contours are transmuted into prog rock, then a short jazz passage surfaces, then the fanfare that is Latte e Miele's most recognisable signature, then a typical prog passage, then an organ solo that ties the whole thing together. Each transition feels earned rather than merely clever. It is worth mentioning, too, that the mix on this record stands apart from its Italian contemporaries; the spatial separation of the instruments and the clarity of the low end give the whole album a presence that most RPI records of the era simply did not have. A benchmark.

- title: "Passio Secundum Mattheum"
  type: "music"
  creator: "Latte e Miele"
  creator_role: "by"
  year: 1972
  eval: "liked"
  genre: "Italian prog"
  image: "/assets/images/music/passio_secundum_mattheum.jpg"
  posted: "2020-10-12"
  text: |
    Before sitting down with ***Passio Secundum Mattheum*** I had only ever known it by reputation. The classical influence is immediately, almost aggressively apparent: the album title itself ('Passion According to St Matthew'), the track names ('Ultima Cena', 'Giuda'), the entire conceptual apparatus leans so heavily on liturgical and art-music precedent that one wonders whether the band was writing prog or staging an oratorio in fancy dress.

    The trouble is that the classical imitation feels too crude. <u>There is a difference between quoting a tradition and metabolising it, and Latte e Miele had not yet learned to make that distinction.</u> The harmonic language borrows without transforming; the arrangements gesture at grandeur without building the structural foundation to support it. One can hear the ambition, and it is genuine, but ambition without a distinctive flavour is just competence. Later records would prove the band could synthesise classical form into something unmistakably their own. Here, they had not yet arrived.

- title: "Aquile E Scoiattoli"
  type: "music"
  creator: "Latte e Miele"
  creator_role: "by"
  year: 1973
  eval: "liked"
  genre: "Italian prog"
  image: "/assets/images/music/aquile_e_scoiattoli.jpg"
  posted: "2020-10-12"
  text: |
    ***Aquile E Scoiattoli***, 'Eagles and Squirrels', is hardly a record of conceptual profundity, and it does not pretend to be. What it does offer, with considerable generosity, is melodic richness and rhythmic inventiveness. 'Menestrello' and especially 'Pavana' borrow from classical arranging methods with a sophistication that the band's debut lacked: the counterpoint is cleanly balanced, the instrumental call-and-response is elegant, and the sense of structural symmetry across sections suggests a compositional discipline that goes well beyond standard-issue prog ambition.

    <u>'Pavana' is a rare long-form piece that earns its duration.</u> The interplay between instruments across its extended runtime never flags; each passage builds on the last with a logic that feels architectural rather than improvisatory. One does not encounter many tracks of this length in the Italian progressive canon that sustain this level of internal coherence. If the album's thematic ambitions are modest, its musical craft is anything but.

- title: "Travail"
  type: "music"
  creator: "La Terre Tremble !!"
  creator_role: "by"
  year: 2009
  eval: "liked"
  genre: "post-rock"
  image: "/assets/images/music/travail.jpg"
  posted: "2020-10-12"
  text: |
    The four stars for ***Travail*** rest almost entirely on one track: 'Trichotillomania', the album's sole instrumental and its unambiguous highlight. <u>It had been a long time since I had heard instrumental progressive metal this accomplished, this tightly wound and precisely executed.</u> The composition moves through sections with a structural logic that rewards close attention, and the absence of vocals allows the instrumental interplay to breathe in a way the rest of the album does not permit. 'Weaving Memories' also deserves mention: the arrangement is more restrained, but the melodic writing is strong.

    The problem is the vocalist. One can admire the ambition and the instrumental proficiency on display throughout the record while simply not being able to acclimatise to the vocal timbre. It is not a question of technique; the voice simply does not sit well in the mix or in the ear. When the vocals drop out, the band reveals what it is truly capable of, and 'Trichotillomania' alone justifies the listen.

- title: "Atrament"
  type: "music"
  creator: "A Sense of Gravity"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/atrament.jpg"
  posted: "2020-10-11"
  text: |
    ***Atrament*** is undeniably prog and undeniably metal: the rhythmic complexity is genuine, not decorative, and the heaviness has real weight behind it rather than the polished-but-toothless sheen of so much modern djent. That said, one would be grateful if someone could explain what 'I, Recreant' is actually about, because the writing on that track is baffling in a way that does not feel intentional.

    The standout is 'The Projectionist'. The opening minutes suggest a fairly straightforward thrash-inflected prog metal exercise, but then the solo in the middle section arrives and it is disarmingly beautiful: <u>a solo that sounds as though someone sat down and composed it note by note, with real melodic direction, rather than noodling over a chord chart.</u> 'Manic Void' deserves a mention too, if only for a particular guitar slide that sticks in the memory long after the track ends. A Sense of Gravity clearly know their way around contemporary prog metal's toolkit; what sets them apart, in their best moments, is knowing when to put the toolkit down and just write.

- title: "Tragic Separation"
  type: "music"
  creator: "DGM"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/tragic_separation.jpg"
  posted: "2020-10-10"
  text: |
    Had I encountered ***Tragic Separation*** in secondary school, five stars without hesitation. But the arrangements lean too far into pop territory to sit comfortably alongside DGM's heavier, more textured earlier work. The prog and metal elements are still present, still muscular, but there is a sheen over everything, a radio-readiness that sands down the edges one wants to feel.

    What rescues the record, repeatedly and emphatically, is the guitar work. Every track contains a solo that is not merely competent but lovely. 'Turn Back Time' is the most complete composition on the album, cohesive from start to finish. The guitar solo beginning around 3:14 in 'Land of Sorrow' is exquisite, and 'Silence' opens with a riff so well-crafted it deserves its own EP. <u>The playing is never in question; it is the production philosophy that falters, smoothing out the very abrasion that made DGM interesting in the first place.</u> The pop instinct is not inherently wrong, but here it overwhelms rather than complements.

- title: "Odysseys"
  type: "music"
  creator: "Luke Victor"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/odysseys.jpg"
  posted: "2020-10-08"
  text: |
    ***Odysseys*** is a very strong album, carrying a flavour reminiscent of Sithu Aye even before one accounts for the Sithu Aye feature on 'Sunbreaker'. The tone choices, the way melodies sit over rhythmic figures, the general warmth of the production: it all occupies the same sonic neighbourhood, though Luke Victor brings enough of his own sensibility to avoid sounding derivative.

    'Archipelago' is the highlight, playing with rhythmic displacement in a way that feels creative rather than merely technical, and the attention to groove across the track is evident and welcome. 'Radiate', by contrast, has a melodic naivety that is slightly jarring in context, the one track on the album that does not quite convince. The final two tracks are passable without being memorable. But the core of the album, 'Archipelago', 'Vesuvius', and 'Sunbreaker', is excellent, and well worth one's time. <u>The mix alone is a lesson in clarity and spatial awareness; one thinks of certain other instrumental prog guitarists who could learn a great deal about both mixing and theory from work like this.</u>

- title: "Manifest"
  type: "music"
  creator: "tv room"
  creator_role: "by"
  year: 2022
  eval: "meh..."
  genre: "indie rock"
  image: "/assets/images/music/manifest.jpg"
  posted: "2020-10-06"
  text: |
    Coming back to ***Manifest*** after years away, the overriding impression is of stasis. The sound is identical to what came before: no growth, no new ideas, just a steady accumulation of regression. The chorus of 'Fearless' echoes 'Amaranthine' from over a decade ago, but the chord changes from verse to chorus are directionless, pivoting for the sake of pivoting with no sense of *musical directionality*, no harmonic momentum carrying the song forward.

    'Make It Better' through to 'Adrenaline' is a run of tracks with third-rate lyrics and arrangements that feel photocopied from the *Nexus* era. <u>There is a difference between a signature sound and creative paralysis, and this record sits firmly on the wrong side of that line.</u> I stopped at 'Adrenaline' because nothing after it was listenable. Stagnation, when paired with declining craft, is not consistency; it is entropy.

- title: "The Idler Wheel Is Wiser Than The Driver Of The Screw And Whipping Cords Will Serve You More Than Ropes Will Ever Do"
  type: "music"
  creator: "Fiona Apple"
  creator_role: "by"
  year: 2012
  eval: "meh..."
  genre: "singer-songwriter"
  image: "/assets/images/music/idler_wheel_is_wiser_than_the_driver_of_the_screw_and_whipping_cords_will_serve_you_more_than_ropes_will_ever_do.jpg"
  posted: "2020-10-06"
  text: |
    ***The Idler Wheel Is Wiser Than the Driver of the Screw and Whipping Cords Will Serve You More Than Ropes Will Ever Do*** is, for the most part, deeply boring: the same bag of tricks recycled from earlier records, except in a more stereotypical way. Reheated leftovers, and they do not taste better the second time around. The repetition has no discernible purpose, the lyrics frequently descend into meaninglessness ('I root for you, I love you, you, you, you, you' in 'Valentine' is simply impossible to take seriously), and the instrumentation is so rudimentary it borders on the amateur.

    The opener is passable, and after that the quality plateaus somewhere between two and three stars and never recovers. <u>There is a particular kind of failure that occurs when an artist mistakes rawness for depth, when stripping back becomes an excuse for not having anything to add.</u> Apple has proven she can write; this is not that proof.

- title: "Captives Of The Wine Dark Sea"
  type: "music"
  creator: "Discipline"
  creator_role: "by"
  year: 2017
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/captives_of_the_wine_dark_sea.jpg"
  posted: "2020-10-05"
  text: |
    A clear step backward. ***Captives of the Wine Dark Sea*** contains two tracks worth the price of admission: the thirteen-minute closer 'Burn the Fire Upon the Rocks', which carries something of 'Rogue''s spirit and structural ambition, and the small-scale interlude 'Love Songs', which works precisely because it does not overreach. Everything else is a mess.

    'Life Imitates Art' pairs guitar and piano against vocal melody over a pedal point, which is an entry-level, almost embarrassingly cheap compositional trick for a band of this pedigree. 'S', the instrumental, has a textural simplicity that reads as underwritten rather than minimal. <u>'Here There Is No Soul' abandons prog entirely, collapsing into a classical rock so elementary it makes the album's lighter interludes sound complex by comparison.</u> The closing track, though, is excellent: dense, patient, structurally rewarding. It is frustrating to hear what Discipline can still do when they commit, and to measure it against the carelessness of the rest.

- title: "Unfolded Like Staircase"
  type: "music"
  creator: "Discipline"
  creator_role: "by"
  year: 1997
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/unfolded_like_staircase.jpg"
  posted: "2020-10-04"
  text: |
    Five stars without hesitation. ***Unfolded Like Staircase*** is that rare progressive metal album where every single track warrants the highest mark. It had been a long time since I had encountered a record from the genre's earlier era with this level of consistency; no filler, no missteps, just relentless quality from the first note to the last.

    <u>'Canto IV' and 'Clutches' stand alongside, and arguably surpass, 'Rogue' from the later <em>To Shatter</em> sessions.</u> The rhythmic vocabulary is not vast, but every trick in the band's arsenal is deployed with precision and maturity. There is no overreaching, no technical exhibitionism for its own sake; the complexity serves the songs, and the songs are uniformly excellent. This is prog metal at its most disciplined, which, given the band's name, feels almost too apt.

- title: "Songs From The Big Chair"
  type: "music"
  creator: "Tears for Fears"
  creator_role: "by"
  year: 1985
  eval: "liked"
  genre: "synth pop"
  image: "/assets/images/music/songs_from_the_big_chair.jpg"
  posted: "2020-10-04"
  text: |
    'Shout' and 'Everybody Wants to Rule the World' entered the collective unconscious so completely that it is easy to forget they sit on the same record. ***Songs From The Big Chair*** is built on that tension: pop craftsmanship so refined it sounds effortless on one side, and synth experimentation that never quite resolves into anything as memorable on the other. The front half is among the strongest A-sides of the 1980s. The back half wanders.

    But the real achievement is the 'Broken/Head Over Heels/Broken (Live)' triptych, which functions as a single eight-minute suite and reveals ambitions far beyond the synth-pop formula. The segue from 'Broken' into 'Head Over Heels' is seamless, the fragmentary reprise lending the sequence an almost prog-like circularity. That *Donnie Darko* would later annex 'Head Over Heels' for its most iconic scene is fitting: the song always had an undertow of dislocation beneath its gleaming surface. 'I Believe', by contrast, is the obvious weak point, a ballad that trades on sincerity without earning it, and the extended synth passages closing the album test patience.

    <u>One hears in <b><i>Songs From The Big Chair</i></b> a band reaching for two things simultaneously: chart dominance and artistic credibility.</u> They achieved both, though not in the same songs. *The Seeds of Love*, recorded at roughly fifteen times the budget, would push the art-pop ambition further and nearly destroy the band in the process; by comparison, this album's restraint looks less like timidity and more like survival instinct.

- title: "The Seeds Of Love"
  type: "music"
  creator: "Tears for Fears"
  creator_role: "by"
  year: 1989
  eval: "loved"
  genre: "synth pop"
  image: "/assets/images/music/seeds_of_love.jpg"
  posted: "2020-10-03"
  text: |
    Revisiting ***The Seeds of Love*** in 2023 only confirmed what I had already suspected: this is the finest pop album of the 1980s, full stop. The production is immaculate, the melodic density astonishing, and the dynamic range wider and more carefully managed than anything else in the decade's pop canon. It became, over time, my favourite pop album, a position it has not relinquished.

    <u>This record is the late-eighties' definitive last word: everything the decade had learned about studio craft, about layering, about the marriage of synthetic and organic textures, distilled into a single, impossibly lush statement.</u> 'Woman in Chains', 'Bad Man's Song', and 'Advice for the Young at Heart' are the centrepieces, and each one is so richly orchestrated, so emotionally precise, that returning to them feels less like nostalgia and more like recognition. Cannot overstate how much I love these songs.

- title: "Transitus"
  type: "music"
  creator: "Ayreon"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/transitus.jpg"
  posted: "2020-09-28"
  text: |
    ***Transitus*** is unmistakably Ayreon, for better and worse. The entire album is saturated with the sonic fingerprint of *The Gentle Storm*: the orchestration, the vocal melodies, the way the arrangements build and crest all feel as though *The Gentle Storm* has been rewritten from scratch with only cosmetic alterations. It is pleasant. It is accomplished. It is entirely unsurprising.

    The highlight is 'Hopelessly Slipping Away' on the second disc, which does manage to carve out something approaching emotional specificity amid the general competence. <u>But the broader problem remains: when a project's signature sound becomes indistinguishable from self-quotation, familiarity ceases to be a comfort and starts to feel like a cage.</u> Arjen Lucassen clearly knows what works; one wishes, occasionally, that he would risk finding out what else might.

- title: "Tidal"
  type: "music"
  creator: "Fiona Apple"
  creator_role: "by"
  year: 1996
  eval: "meh..."
  genre: "singer-songwriter"
  image: "/assets/images/music/tidal.jpg"
  posted: "2020-09-24"
  text: |
    ***Tidal*** is, for the most part, a bore. It establishes Apple's signature habit of using the piano as a de facto bass instrument, low-register voicings doing the harmonic heavy lifting where a conventional pop arrangement would deploy a bass guitar. But the melodic invention is thin, the repetition excessive, and the majority of these tracks could be excised or relegated to B-side status without any loss.

    Perhaps two or three songs have genuine interest. <u>It is difficult, listening to this debut, to foresee that the same artist would produce the extraordinary red-covered album only three years later.</u> The raw materials are present, the voice, the pianistic instinct, the emotional directness, but they have not yet cohered into anything that commands sustained attention.

- title: "When the Pawn Hits the Conflicts He Thinks like a King What He Knows Throws the Blows When He Goes to the Fight And He'll Win the Whole Thing 'Fore He Enters the Ring There's No Body to Batter When Your Mind Is Your Might So When You Go Solo, You Hold You"
  type: "music"
  creator: "Fiona Apple"
  creator_role: "by"
  year: 1999
  eval: "loved"
  genre: "singer-songwriter"
  image: "/assets/images/music/when_the_pawn_hits_the_conflicts_he_thinks_like_a_king_what_he_knows_throws_the_blows_when_he_goes_to_the_fight_and_hell_win_the_whole_thing_fore_he_enters_the_ring_theres_no_body_to_batter_when_your_mind_is_your_might_so_when_you_go_solo_you_hold_you.jpg"
  posted: "2020-09-22"
  text: |
    The sheer talent on display across ***When the Pawn*** is formidable. It is rare for repetition-driven arrangements to hold one's attention this completely, but Apple and her collaborators make every loop, every returning figure feel purposeful and alive. The melodies are inventive by pop standards, surprising in their interval choices and phrasing in ways that reward close listening.

    <u>The drumming is the album's secret weapon.</u> On tracks like 'Limp' and 'The Way Things Are', the percussion is so fluid, so impeccably placed, that it produces a near-physical response: a drumming that raises goosebumps, that makes one aware of rhythm as a bodily experience rather than a structural scaffold. And Apple's voice, which on *Tidal* had felt constrained and not quite itself, is here fully realised: textured, commanding, emotionally transparent without ever tipping into melodrama. This is the album where everything came together, where the promise crystallised into proof.

- title: "Extraordinary Machine"
  type: "music"
  creator: "Fiona Apple"
  creator_role: "by"
  year: 2005
  eval: "loved"
  genre: "singer-songwriter"
  image: "/assets/images/music/extraordinary_machine.jpg"
  posted: "2020-09-22"
  text: |
    ***Extraordinary Machine*** opens with its title track's slightly comedic tenderness, a kind of wry warmth that immediately signals Fiona Apple is not interested in repeating herself. What is remarkable about this record is how it absorbs other artists' vocabularies without ever sounding derivative: 'Please Please Please' carries an unmistakable Muse-adjacent bombast in its dynamics, 'Not About Love' channels something of Amy Winehouse's smoky theatrical phrasing, and yet every track remains irreducibly Apple. <u>She does everyone's impression in her own way, which is to say she does no one's impression at all.</u> The orchestral arrangements, often dismissed as overproduced in the original Jon Brion sessions, feel exactly right here: lush without being indulgent, intricate without losing the emotional thread.

    What strikes one most is the sheer range of the instrumentation and vocal delivery. Apple's voice shifts register not just technically but emotionally, moving from brittle fragility to full-throated assertion within a single phrase. The arrangements sit precisely where one wants them: strings that swell without smothering, percussion that breathes. <u>Having since gone back through her 1999 record <em>When the Pawn...</em>, the trajectory becomes even more astonishing; the further back one goes, the more startling the precociousness.</u> There is a particular thrill in discovering an artist's catalogue in reverse, watching the roots of what one already loves reveal themselves as even wilder, even more assured than what grew from them.

- title: "The curse of Coleodeia"
  type: "music"
  creator: "Silent Island"
  creator_role: "by"
  year: 2020
  eval: "disliked"
  genre: "progressive metal"
  image: "/assets/images/music/curse_of_coleodeia.jpg"
  posted: "2020-09-19"
  text: |
    The drums on ***The Curse of Coleodeia*** sound like they were programmed on a laptop, quite possibly using GarageBand's smart drummer preset with minimal, if any, human intervention in the pattern writing. One can hear the quantised rigidity in every fill, the total absence of dynamic variation that separates a programmed kit from a performed one. The chord progressions are so transparently predictable, so relentlessly cheesy, that they induce a physical cringe response.

    To call this post-rock is an insult to the genre's lineage. Post-rock, at its foundation, demands patience, texture, and a willingness to let harmonic tension accumulate before release. What one gets here is none of that: just stock progressions dressed in delay pedal wash, signifying nothing. <u>The whole thing plays like a genre cosplay assembled from presets.</u>

- title: "The Passage"
  type: "music"
  creator: "DGM"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/passage.jpg"
  posted: "2020-09-14"
  text: |
    Both parts of 'The Secret' on ***The Passage*** deliver: the guitar solos are fluid and purposeful, and the synth solo sections match them in invention. The title track 'The Passage' itself stands out for its arrangement choices, which feel adventurous by DGM's standards, introducing textural shifts and structural turns that the band's earlier catalogue rarely attempted. There is a confidence here in letting sections breathe before the inevitable technical fireworks arrive.

    <u>The Dream Theater influence sits heavily over this record, particularly in the vocal melody writing, which echoes James LaBrie's phrasing so closely that one occasionally has to remind oneself which band one is listening to.</u> This is not necessarily a criticism: DGM have always operated in that orbit, and here they do so with enough compositional substance to justify the comparison rather than be crushed by it. The production is clean, the performances are tight, and the solos alone are worth the price of admission.

- title: "Navels Falling into a Living Origami"
  type: "music"
  creator: "Daal"
  creator_role: "by"
  year: 2018
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/navels_falling_into_a_living_origami.jpg"
  posted: "2020-09-14"
  text: |
    ***Navels Falling into a Living Origami*** continues the atmospheric direction Daal established on their previous record, but with noticeably less psychedelia and less of the progressive ambition that made that earlier work compelling. The textures are still well-crafted, the soundscapes still immersive, but one senses a band retreating into comfort rather than pushing outward. The compositions feel tighter, which is not always a virtue when tightness comes at the cost of the exploratory sprawl that gave the music its character.

    It is a decent listen, but a disappointing one. <u>Daal appear to be joining that melancholy category of bands who produce one exceptional album and then orbit it indefinitely, never quite recapturing whatever recklessness made the original work.</u> The craft remains; the spark has dimmed.

- title: "Goodbye Yellow Brick Road"
  type: "music"
  creator: "Elton John"
  creator_role: "by"
  year: 1973
  eval: "loved"
  genre: "pop rock"
  image: "/assets/images/music/goodbye_yellow_brick_road.jpg"
  posted: "2020-09-10"
  text: |
    ***Goodbye Yellow Brick Road*** is a pure manifestation of Elton John's musical talent, and the scope of that talent only becomes apparent when one hears how naturally he moves between idioms. There is an amusing irony in the fact that one's first encounter with 'Funeral for a Friend' came through Dream Theater's cover, and the assumption at the time was that DT had inevitably 'progged it up', added complexity, pushed the arrangement into territory the original never intended. <u>Hearing the original demolishes that assumption entirely: John's version is already there, fully formed, structurally ambitious and dynamically devastating, and it got there without needing to prove anything.</u>

    What separates this record from mere versatility is conviction. John does not dabble in genres; he inhabits them. The ballads are not concessions to the pop market, and the longer pieces are not bids for art-rock credibility. Every track sounds like it was the only kind of music he could possibly have made at that moment. The production, courtesy of Gus Dudgeon, is warm and spacious, giving the piano room to breathe while the orchestral arrangements never overwhelm the songs' essential intimacy. It is a record that rewards close listening and casual listening in equal measure, and it is uncomplicatedly beautiful.

- title: "Cunning Stunts"
  type: "music"
  creator: "Caravan"
  creator_role: "by"
  year: 1975
  eval: "loved"
  genre: "Canterbury scene"
  image: "/assets/images/music/cunning_stunts.jpg"
  posted: "2020-09-08"
  text: |
    ***Cunning Stunts*** continues the Canterbury fusion of funk, pop, and prog that defined Caravan's preceding work, and it does so with an ease that borders on nonchalance. 'Welcome the Day' leans hardest into the funk and pop end of the spectrum, its groove locked in with an infectious confidence, while the extended 'The Dabsong Conshirtoe' represents the prog pole: winding, multi-sectioned, technically demanding, and yet never losing the melodic accessibility that is Caravan's signature.

    <u>The whole album is extraordinarily pleasant to listen to, which sounds like faint praise but is actually one of the hardest things for a prog band to achieve.</u> So much of the genre's output from this period mistakes density for depth, complexity for quality. Caravan, here, remind one that sophistication and listenability are not opposed. The arrangements are rich without being cluttered, the playing is virtuosic without being showy, and the record moves with a lightness that belies how much is going on underneath.

- title: "Panther"
  type: "music"
  creator: "White Flight"
  creator_role: "by"
  year: 2010
  eval: "liked"
  genre: "indie rock"
  image: "/assets/images/music/panther.jpg"
  posted: "2020-09-07"
  text: |
    ***Panther*** is an interesting proposition: electronic music as skin stretched over the skeletal architecture of early Pain of Salvation, particularly on 'SPECIES', where the brooding, existential weight of Daniel Gildenlöw's early work is unmistakable beneath the synths and drum programming. The closing track 'ICON' is brilliant, a highlight that justifies the album's conceptual ambitions and delivers emotionally in a way the middle section does not always manage.

    Not everything works. The rap passage in the title track 'PANTHER' sits awkwardly within the album's sonic palette, a stylistic detour that feels grafted on rather than organic. But the record earns its keep through sheer textural beauty and the willingness to pursue an unusual aesthetic vision. <u>It is the kind of album one returns to not because every track succeeds, but because the ones that do succeed in ways almost nothing else sounds like.</u>

- title: "Banco Del Mutuo Soccorso"
  type: "music"
  creator: "Banco del Mutuo Soccorso"
  creator_role: "by"
  year: 1972
  eval: "loved"
  genre: "Italian prog"
  image: "/assets/images/music/banco_del_mutuo_soccorso.jpg"
  posted: "2020-09-02"
  text: |
    Italian prog has always carried a distinct flavour, and ***Banco Del Mutuo Soccorso***'s self-titled debut is one of its purest expressions. From Banco to the contemporary Barock Project, the organ music influence runs deep through the tradition, lending everything a faintly liturgical air, as though the compositions are as much sacred architecture as they are rock music. The background choir in 'Il Giardino del Mago' exemplifies this perfectly: voices layered with a contrapuntal sensibility that would not be out of place in a Bach chorale, yet integrated seamlessly into the prog framework. <u>This album sits in the Prog Archives top 100, and for once that ranking understates rather than overstates the case.</u>

    What deserves particular attention is the mix. For a 1972 release, the production quality is remarkably advanced: the stereo field is wide and deliberate, the frequency separation between organ, guitar, bass, and drums is clean, and the dynamic range is preserved in a way that most contemporaneous prog records, even celebrated ones, simply did not achieve. <u>Banco's engineers were doing things with their mix desk that many of their British and American counterparts would not figure out for another half-decade.</u> the effect is a record that sounds not just historically important but alive, as immediate now as it must have been in 1972.

- title: "The Call Within"
  type: "music"
  creator: "Tigran Hamasyan"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "jazz"
  image: "/assets/images/music/call_within.jpg"
  posted: "2020-09-01"
  text: |
    Tigran Hamasyan's fusion of jazz and rock has never once disappointed, and ***The Call Within*** extends that streak with characteristic assurance. The piano work continues to evoke Hiromi Uehara's kinetic intensity, all rapid-fire runs and percussive attack, but Hamasyan's Middle Eastern harmonic language gives everything a different gravitational pull: modal inflections, ornamented melodic lines, rhythmic asymmetries that sit naturally within the jazz-rock framework rather than feeling like exotic seasoning. this yields music that is technically staggering and emotionally immediate in equal measure.

    <u>'The Dream Voyager' is the track that summarises Hamasyan's entire aesthetic: the restless harmonic motion, the sudden dynamic shifts, the way a passage of delicate beauty can erupt into ferocious intensity without ever losing the compositional thread.</u> There is a particular nostalgia attached to hearing fusion again after a long absence from the genre; one listen to Hamasyan and the muscle memory returns, the hours spent with *Headhunters* and *Bitches Brew* and *Romantic Warrior* during exam season flooding back. Some music is a time machine. This is that.

- title: "Joy of a Toy"
  type: "music"
  creator: "Kevin Ayers"
  creator_role: "by"
  year: 1969
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/joy_of_a_toy.jpg"
  posted: "2020-09-01"
  text: |
    Kevin Ayers occupies a peculiar position as one of the Canterbury Scene's most celebrated figures from prog rock's earliest stirrings, and ***Joy of a Toy*** demonstrates why: it is an album where content outweighs significance, significance outweighs form, and form outweighs pure listenability, yet the listenability is already remarkably high. That hierarchy might sound like a backhanded compliment, but it is precisely what makes the record interesting. The ideas overflow the structures built to contain them.

    'Song for Insane Times' reveals the proto-prog tendencies in its drum patterns and chord progressions, hinting at the complexity the genre would soon formalise, while 'Oleh Oleh Bandu Bandong' is essentially an extended jazz jam session committed to tape, loose and exploratory in a way that the Canterbury Scene would later refine into something more structured. <u>What one hears throughout is the sound of a genre not yet aware it is a genre, which gives the music a freedom that later, more self-conscious prog would struggle to recapture.</u>

- title: "DEPOIS DO FIM"
  type: "music"
  creator: "Dorsal Atlântica"
  creator_role: "by"
  year: 2005
  eval: "loved"
  genre: "thrash metal"
  image: "/assets/images/music/depois_do_fim.jpg"
  posted: "2020-09-01"
  text: |
    ***DEPOIS DO FIM*** serves as a first encounter with Brazilian prog, and what an introduction it is. The instrumental tracks are stunning, 'Controvérsia' chief among them: the flute work is exceptional, carrying melodic lines with a fluidity and expressiveness that elevates the entire arrangement. The technical proficiency across the board is no joke; the guitar and synth shredding operates at a level of speed and precision that demands genuine virtuosity rather than mere dexterity.

    <u>What makes the record more than a technical showcase is the compositional intelligence behind the fireworks.</u> The fast passages earn their velocity because they emerge from, and return to, sections of genuine melodic beauty. The arrangements breathe between the pyrotechnics, giving the ear space to recover before the next assault. For a first taste of what the Brazilian prog scene has to offer, this sets an impossibly high bar.

- title: "Atomic Rooster"
  type: "music"
  creator: "Atomic Rooster"
  creator_role: "by"
  year: 1980
  eval: "meh..."
  genre: "progressive rock"
  image: "/assets/images/music/atomic_rooster.jpg"
  posted: "2020-08-31"
  text: |
    ***Atomic Rooster***'s 1980 reunion album is a deeply disappointing affair. Some of the synth solos remain listenable, carrying faint echoes of the band's former inventiveness, but the drum programming is atrocious. The patterns are so rudimentary, so devoid of dynamic variation, that they sound like a hobbled Green Day, and by the fourth track, 'Where's the Show', the band has effectively crossed into punk territory without any of punk's compensating energy or ideological conviction.

    <u>One can tell within the first few bars of the opening track that Paul Hammond is not behind the kit.</u> A quick check confirms it: Preston Heyman on drums, delivering work so far below the standard Hammond set that one wonders whether the man was actively sabotaging the sessions. The reunion-album curse strikes again: the name survives, but everything that made the name worth remembering has been gutted.

- title: "In Hearing of Atomic Rooster"
  type: "music"
  creator: "Atomic Rooster"
  creator_role: "by"
  year: 1971
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/in_hearing_of_atomic_rooster.jpg"
  posted: "2020-08-30"
  text: |
    ***In Hearing of Atomic Rooster*** opens with 'Breakthrough', a track that immediately announces itself as something special: blues and prog rock fused with an organic confidence that feels neither forced nor formulaic. But the real revelation here is Paul Hammond's drumming. The leap in sophistication from the previous year's work is extraordinary; his command of dynamics, his sensitivity to light and shade, has deepened enormously, likely a consequence of relentless touring. 'Black Snakes' is the definitive showcase: the second half of that track features some of the most thrilling drum work in early prog, every fill purposeful, every accent precisely weighted. <u>Hammond's playing across this record is not merely competent accompaniment; it is a lead instrument in its own right.</u>

    The synth and guitar solos maintain the high standard set by the debut, and Pete French, who appears to have joined on vocals for this album, brings a distinctive voice to the proceedings: a tone with real character, particularly in the upper register, where it opens up into something beautiful. Every track here earns its place. Even the bonus live recordings appended to the reissue feel essential rather than supplementary, capturing the band at a peak of collective energy and interplay. <u>This is Atomic Rooster at their absolute best: a band in which every member is improving in real time, audibly, from record to record.</u>

- title: "Atomic Roooster"
  type: "music"
  creator: "Atomic Rooster"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/atomic_roooster.jpg"
  posted: "2020-08-30"
  text: |
    One came to ***Atomic Roooster*** after hearing *Death Walks Behind You*, released later in 1970, and expecting a step down in quality from a debut recorded between December 1969 and February 1970. The opposite proved true. The fact that arrangements this sophisticated, this structurally ambitious, existed in 1969 is startling. The first surprise is the sheer beauty of 'Winter' and 'Banstead': tender without being fragile, possessing a quiet power that recalls early-seventies Pink Floyd, except this predates most of what one would cite as the comparison point.

    <u>The second, larger surprise is 'Broken Wings' and 'Before Tomorrow', which embody the prog rock ethos that King Crimson had only just inaugurated.</u> The synth, drum, and guitar solos are gorgeous; the dynamics are expertly controlled, moving between aggression and delicacy with total assurance; the vocal is crystalline in the upper register, powerful without strain; and the segmentation of each piece is clean enough to follow but fluid enough to feel organic. The mix, remarkably for the period, gives every instrument its own space. One finishes the record astonished that this band, at this moment in time, had already arrived at a level of craft and vision that many of their contemporaries would spend the entire decade chasing.

- title: "Death Walks Behind You"
  type: "music"
  creator: "Atomic Rooster"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/death_walks_behind_you.jpg"
  posted: "2020-08-30"
  text: |
    'Nobody Else' opens ***Death Walks Behind You*** with a softness that is both unexpected and disarming, a gentle melodic warmth that immediately establishes this as more than a heavy prog outing. Then the title track arrives, its opening passage already iconic: a riff that announces itself with the authority of something that knows it will be remembered. What follows is a long stretch of groove repetition that operates on the same principle as *In the Court of the Crimson King*'s most hypnotic passages, each cycle introducing subtle new elements, a textural addition here, a rhythmic displacement there, rewarding close attention without demanding it.

    <u>The standout, and the album's greatest surprise, is 'Gershatzer', whose extended drum solo in the middle section is a masterclass in building tension from a kit alone.</u> It is a solo that justifies the form: not indulgent noodling but a structured, dynamic performance that serves the composition. The whole record repays careful listening, every repetition revealing details that a casual pass would miss.

- title: "Terminal Velocity"
  type: "music"
  creator: "John Petrucci"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/terminal_velocity.jpg"
  posted: "2020-08-30"
  text: |
    Most of ***Terminal Velocity*** earns its five stars comfortably, with the title track 'Terminal Velocity' standing as a particular highlight: a piece that makes one want to stop whatever else one is doing and simply listen. 'The Way Things Fall' carries a melodic sensibility that one can only describe as reminiscent of 1980s Chinese ballads, a comparison that sounds absurd until one hears it and recognises the exact emotional register being invoked. Then 'Happy Song' arrives and throws everything into delightful chaos; it is so deliberately, almost provocatively ugly that it can only be read as John Petrucci trolling punk bands, a hypothesis that becomes funnier the more one sits with it.

    <u>The record also carries historical significance as what appears to be the first collaboration between Petrucci and Mike Portnoy following the latter's departure from Dream Theater.</u> There is something moving about that reunion, even in a project this playful. The performances are characteristically exceptional, the compositions swing between beauty and absurdist provocation, and the whole thing radiates the energy of two musicians who are simply enjoying each other's company again.

- title: "Ring of Hands"
  type: "music"
  creator: "Argent"
  creator_role: "by"
  year: 1970
  eval: "loved"
  genre: "rock"
  image: "/assets/images/music/ring_of_hands.jpg"
  posted: "2020-08-29"
  text: |
    ***Ring of Hands*** is an absurdly good record. Pop, fusion, jazz, and prog converge with an ease that makes the whole thing sound effortless, though one listen to the solo sections reveals just how much skill is being deployed beneath that surface lightness. Nearly every track features an extended solo passage, often running half the song's length, and the keyboard solos in particular are consistently beautiful: melodically inventive, harmonically adventurous, and played with a touch that balances precision and feel.

    <u>The drumming deserves special mention for the care taken in the arrangements, every pattern serving the song rather than the drummer's ego.</u> For a 1971 release (despite what Douban's metadata claims; the platform's dating of early-seventies records is notoriously unreliable), the production is clear and well-balanced, giving each instrument room without sacrificing the ensemble's cohesion. It is a record that makes one wonder why the band is not mentioned more often in the same breath as their better-known contemporaries. Pure joy from start to finish.

- title: "Anderson Bruford Wakeman & Howe"
  type: "music"
  creator: "Anderson Bruford Wakeman Howe"
  creator_role: "by"
  year: 1989
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/anderson_bruford_wakeman_and_howe.jpg"
  posted: "2020-08-28"
  text: |
    'Brother of Mine' and 'Quartet' are the clear highlights of ***Anderson Bruford Wakeman & Howe***, and they are excellent: the compositional ambition of classic Yes filtered through late-eighties production values, with Jon Anderson's voice, as ever, providing the unmistakable throughline. That voice remains one of the most distinctive instruments in progressive rock, and its presence alone is enough to anchor the material in the Yes tradition regardless of the legal disputes over the name.

    The modernised timbres are noticeable, particularly in the drum sound, which carries the gated, reverb-heavy character of the era. Whether one reads this as refreshing or compromising depends largely on one's tolerance for eighties production aesthetics. <u>Steve Howe's guitar work, meanwhile, transcends any era: his playing across this record is a quiet reminder that he remains one of the most technically accomplished and tastefully restrained guitarists prog has ever produced.</u>

- title: "The Turn of a Friendly Card"
  type: "music"
  creator: "The Alan Parsons Project"
  creator_role: "by"
  year: 1980
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/turn_of_a_friendly_card.jpg"
  posted: "2020-08-27"
  text: |
    The prog purists have long written off The Alan Parsons Project as apostates, a band that traded structural ambition for melodic palatability. They are wrong, or at least wrong about this record. ***The Turn of a Friendly Card*** is the rare album that makes the case for pop as a legitimate dialect of progressive music, not a retreat from it but a distillation. 'Time' is among the most effortlessly beautiful songs in the Project's catalogue, a melody so clean it almost disguises the harmonic sophistication underneath. The two movements of the title suite are gorgeous in a way that rewards close listening: the string ensemble and brass ensemble trading phrases in call-and-response, each answering the other with a precision that feels orchestral rather than decorative. <u>This is what happens when arrangers think in terms of counterpoint rather than padding.</u>

    And then there is 'The Ace of Swords', possibly the most progressive piece in the entire Alan Parsons Project discography, a track that earns the word 'progressive' through structural ambition rather than mere length. The whole album functions as a kind of primer, a masterclass in how pop sensibility and progressive architecture can coexist without either apologising for the other. <u>One could hand this record to any pop musician curious about prog and say: start here.</u> The fact that it remains this listenable forty years on is not a concession; it is the point.

- title: "Darkness In A Different Light"
  type: "music"
  creator: "Fates Warning"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/darkness_in_a_different_light.jpg"
  posted: "2020-08-27"
  text: |
    There are genuine surprises here, which is not something one says lightly about a band twenty-plus years into their career. ***Darkness In A Different Light*** has a handful of tracks that land harder than expected: 'Firefly' and 'And Yet It Moves' in particular carry a lean, distilled energy that suggests the band learned something from their own bloat. The drum programming is notably more inventive than on earlier records, with rhythmic ideas that feel, at times, as though Dream Theater's influence has been fed back to the source, a quiet irony given the genealogy. <u>There is something satisfying about watching a band that helped invent a genre absorb lessons from its own progeny.</u>

    The caveat, as ever with Fates Warning, is the sheer metallic density. The production sits heavy in the low-mids, and after several tracks the weight becomes less an aesthetic choice than a ceiling. One wishes for more dynamic contrast, more room to breathe between the riffs. The songwriting has sharpened, but the sonic palette remains slightly too monochrome for the ideas it carries.

- title: "The Essentials: Ambrosia"
  type: "music"
  creator: "Ambrosia"
  creator_role: "by"
  year: 2005
  eval: "liked"
  genre: "progressive rock"
  image: "/assets/images/music/essentials.jpg"
  posted: "2020-08-27"
  text: |
    The more one listens to late-seventies American pop, the more one hears prog's fingerprints everywhere, and ***The Essentials: Ambrosia*** is a case study in that inheritance. Odd time signatures woven so seamlessly into verse-chorus structures that casual listeners would never notice; chromatic runs in the bass that owe more to Chris Squire than to Motown; harmonic choices that betray a working knowledge of jazz voicings. <u>This is music made by people who had clearly spent time with <em>Close to the Edge</em> before sitting down to write a radio single.</u>

    'Biggest Part of Me' and 'Life Beyond L.A.' are standouts, songs that achieve the rare trick of being catchy and interesting at the same time. one comes away the compilation with a quiet conviction that the line between 'pop' and 'prog' in that era was far more porous than either camp would like to admit.

- title: "White Pony"
  type: "music"
  creator: "Deftones"
  creator_role: "by"
  year: 2000
  eval: "liked"
  genre: "alternative metal"
  image: "/assets/images/music/white_pony.jpg"
  posted: "2020-08-26"
  text: |
    The back third of ***White Pony*** is a different album from its front two-thirds, and a significantly better one. From 'Passenger' through to 'Pink Maggit', something locks into place: the riffs find their grooves, the drums stop merely keeping time and start driving, the melodies emerge from the murk with real intention. 'Change (In the House of Flies)' earns its reputation: Chino Moreno's vocal sits perfectly in that liminal space between crooning and collapse, and the atmosphere is patient, unhurried, built from negative space as much as from distortion. <u>It brought back the precise feeling of hearing 'Xerces' for the first time three years prior, that recognition that Deftones at their best create a kind of synaesthetic haze no other band in the nu-metal orbit has managed.</u>

    The problem is everything that comes before. The first two-thirds of the record are competent without being compelling, heavy without being heavy about anything. If one could extract those final three tracks and rate them alone, five stars without hesitation. But an album is not a highlights reel, and the front-loading of filler costs *White Pony* the coherence its best moments deserve.

- title: "醒山"
  type: "music"
  creator: "醒山AwakeMountains"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "metalcore"
  image: "/assets/images/music/xing_shan.jpg"
  posted: "2020-08-26"
  text: |
    Judged purely on sonic terms, ***醒山*** is passable metalcore: tight enough in execution, heavy enough in the low end, and mixed with a competence that is, frankly, the most pleasant surprise the record offers. The production sits well, the guitars have body, and the drums punch through without clipping. On first listen, before one registers the Mandarin buried under the screams, it could pass for a mid-tier Western hardcore release, which is both a compliment and a diagnosis.

    The trouble starts when one reads the lyrics. From the third track '修罗场' onwards, there are echoes of 左右乐队 from a decade ago, but without the rawness that made that earlier band's bluntness feel earned. <u>The words are simply bad, bad enough to nearly drag the rating down another star.</u> It is a familiar problem in the Chinese hardcore scene: the instrumental chops arrive years before the lyrical intelligence catches up. The mix cannot save what the pen has not earned.

- title: "Different Shapes"
  type: "music"
  creator: "DGM"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/different_shapes.jpg"
  posted: "2020-08-25"
  text: |
    ***Different Shapes*** delivers a strong core run from 'Some Day, One Day' through to 'Peace of Mind', anchored by guitar solos that consistently elevate the material. DGM's solos are not ornamental; they function as structural pivots, the moments where a merely competent power-prog track suddenly justifies its runtime. The listenability is high, the musicianship undeniable, and the production clean enough to let every instrument occupy its own frequency band.

    The fatigue sets in around the final two or three tracks, where the formula starts to show its seams. 'Close to You' is the most egregious offender: double bass drumming wall-to-wall, and were it not for a inspired guitar solo breaking the monotony at the midpoint, the track would collapse under its own weight. <u>There is something almost paradoxical about a band this technically proficient being saved, repeatedly, by the very solos that are supposed to be the icing rather than the cake.</u> The album flirts with power metal more than it commits to prog, but within those constraints, it works.

- title: "Language"
  type: "music"
  creator: "The Contortionist"
  creator_role: "by"
  year: 2014
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/language.jpg"
  posted: "2020-08-24"
  text: |
    The four-star rating here is partly aspirational, a recognition of trajectory rather than arrival. ***Language*** is, by any honest measure, a three-star record in isolation, but placed against *Intrinsic*, the leap in ambition and execution is striking enough to merit the extra star. 'Language Pt. 1' is the clearest evidence: a track that finally delivers on the modern progressive promise the band had been circling for years, with textures and dynamic shifts that feel considered rather than arbitrary.

    'Ebb and Flow' opens with similar conviction before settling into safer territory in its second half. <u>The record's best moments suggest a band that has figured out what it wants to sound like; its weaker stretches suggest it has not yet figured out how to sustain that vision across a full runtime.</u> One hopes the next album pushes further. The foundation is here.

- title: "Auto Reconnaissance"
  type: "music"
  creator: "The Tangent"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/auto_reconnaissance.jpg"
  posted: "2020-08-22"
  text: |
    ***Auto Reconnaissance*** is classic Tangent: uneven, verbose, occasionally self-indulgent, and utterly loveable. 'Jinxed in Jersey' is possibly the funniest track in the band's catalogue, a kind of progressive spoken-word comedy piece. The narrator's account of wandering Staten Island, culminating in a line about standing behind the Statue of Liberty before the band drops into a vaguely djent-inflected groove, is hilarious, a moment that reminds one why The Tangent remains the most human band in modern prog. The bassline on that track alone is worth the price of admission: inventive, melodic, and constantly in motion.

    The middle sags, as Tangent middles often do. Tracks three and four drift without quite arriving anywhere. But 'England' redeems the second half entirely: twenty-odd minutes of jazz chords and understated funk that feels like a meditation, unhurried and contemplative. <u>Whether by coincidence or design, it carries faint echoes of <em>Selling England by the Pound</em>, that same sense of a band surveying a national identity with affection and bewilderment in equal measure.</u> The closer surprises with an early Pink Floyd quality, spacious and psychedelic, yet unmistakably Tangent in its phrasing and harmonic language.

    By any objective metric, the album is middling Tangent. But middling Tangent is a higher bar than most prog bands clear on their best day. <u>The Tangent's baseline is other bands' ceiling, and that alone earns the five stars.</u>

- title: "新世界NEW WORLD"
  type: "music"
  creator: "Hua Chen Yu"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "C-pop"
  image: "/assets/images/music/xin_shi_jie_new_world.jpg"
  posted: "2020-08-21"
  text: |
    Revisiting ***新世界NEW WORLD*** after some time, the initial dazzle has not faded, but the frustrations have crystallised. Hua Chen Yu's ambition is unmistakable: this is a C-pop record straining at the genre's seams, reaching for something bigger, stranger, more progressive. '七重人格' is a excellent track, with vocal distortion in the upper register that channels Matthew Bellamy at his most theatrical, and a structural restlessness that suggests real compositional thought. '瘋人院' lands with the manic energy of twenty one pilots, playful and slightly unhinged. Several other tracks carry the shadows of Western prog and pop-rock, absorbed and refracted through a distinctly mainland sensibility.

    <u>The problem is not ambition but nerve.</u> Nearly every promising idea is cut short just as it begins to develop, truncated where it should expand, resolved where it should complicate. '鬥牛' opens with a breathtaking energy but grows cluttered in its second half, its transitions accumulating fatigue rather than momentum. To make progressive music within the constraints of the mainland industry requires a boldness that goes beyond arrangement into duration, into structural risk, into the willingness to lose part of the audience in order to take the rest somewhere new. Hua Chen Yu is closer to that threshold than any other artist in his tier, but he has not yet crossed it. The experiments are real; they are simply not yet radical enough.

- title: "Power And Outcome"
  type: "music"
  creator: "Cast"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/power_and_outcome.jpg"
  posted: "2020-08-20"
  text: |
    ***Power And Outcome*** sits squarely in the symphonic prog tradition of The Flower Kings: orchestral ambition, sweeping arrangements, and a grandeur so unrelenting it borders on exhausting. The technical execution is beyond reproach, the arranging dense and layered with a confidence that speaks to genuine compositional mastery. This is a band that knows exactly what it is doing with every string section, every dynamic swell, every carefully placed crescendo. The sheer scale of the thing is impressive, the kind of record where one simply has to hear it to understand what 'grand' means in this context.

    And yet, for most of the runtime, something resists. The ear admires without quite being caught; the craft is evident but the hook elusive. One feels the impulse, track after track, to withhold that fifth star, an almost physical resistance to awarding the highest mark to music that impresses more than it moves. <u>It is the old prog paradox: technical brilliance and emotional immediacy are not the same thing, and the gap between them can be the widest in the very records that try hardest to close it.</u>

    Then 'Conquest' arrives, and the resistance collapses. It is simply beautiful, a track where the orchestration finally serves the melody rather than the other way around, where the grandeur becomes an emotional argument rather than a sonic one. Five stars for 'Conquest', and the rest of the album gets to ride its wake.

- title: "For The Love Of Art And The Making"
  type: "music"
  creator: "Beyond Twilight"
  creator_role: "by"
  year: 2006
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/for_the_love_of_art_and_the_making.jpg"
  posted: "2020-08-19"
  text: |
    Splitting a forty-two-minute composition into forty-three numbered 'sections' is a structural gimmick that promises conceptual rigour and delivers navigational annoyance. ***For The Love Of Art And The Making*** is a record whose formal ambitions actively undermine the listening experience: the constant track breaks fracture any sense of flow, turning what might have been an immersive long-form piece into a sequence of fragmented gestures. 'Section 20' holds up well enough on its own terms, and there are scattered moments of four-star quality elsewhere, but the majority sits at three stars, competent without being compelling.

    <u>The transitions between sections are where the concept fails most visibly, with several feeling arbitrary, as though the music was sliced at intervals rather than at natural structural joints.</u> The technical playing is solid throughout; one cannot fault the execution. But execution in service of a bad idea is still a bad idea, and the sensation of watching a strong hand played badly lingers long after the final section fades. A waste of genuine talent.

- title: "Automata I"
  type: "music"
  creator: "Between the Buried and Me"
  creator_role: "by"
  year: 2018
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/automata_i.jpg"
  posted: "2020-08-19"
  text: |
    The first half of ***Automata I*** drifts, competent but unremarkable, a prog-metal that fills time without quite claiming it. Then 'Blot' arrives and offers a small jolt of surprise: not a reinvention, but a reminder that the band can still find pockets of genuine interest within their formula. There is a strong Haken influence running through the record, and some of the guitar lines have a quality that makes one imagine them transposed for saxophone in a jazz ensemble, melodic ideas straining against the genre container they have been placed in.

    <u>Coming directly off <em>The Great Misdirect</em> and <em>The Parallax II: Future Sequence</em>, the album inevitably feels slight.</u> The comparison is not entirely fair, but it is unavoidable: once a band has set its own ceiling that high, 'solid' starts to sound like faint praise. Solid is what this is. Nothing more, and, to be fair, nothing less.

- title: "The Great Misdirect"
  type: "music"
  creator: "Between the Buried and Me"
  creator_role: "by"
  year: 2009
  eval: "loved"
  genre: "progressive metal"
  image: "/assets/images/music/great_misdirect.jpg"
  posted: "2020-08-19"
  text: |
    ***The Great Misdirect*** is where Between the Buried and Me finally became the band they had been threatening to be. The leap from the preceding records is not incremental; it is categorical. From the opening piano figure, which announces a patience and restraint entirely absent from earlier work, through to the seventeen-minute closer, the album sustains a level of compositional ambition that never once feels like posturing. The melodies are richer, the arrangements more spatially aware, the vocals more varied and more interesting.

    <u>The lyrics, previously a weak point, suddenly have texture and personality, as though the band's ear for language finally caught up with its ear for harmony.</u> The progressive-core elements, placed in their 2009 context, were ahead of the curve; what sounds familiar now was then a real departure. One cannot overstate how much this record recalibrated expectations for what this band could do. It is the album that earns retroactive patience with everything that came before, and sets the standard against which everything after must be measured.

- title: "Colors"
  type: "music"
  creator: "Between the Buried and Me"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "progressive metal"
  image: "/assets/images/music/colors.jpg"
  posted: "2020-08-19"
  text: |
    ***Colors*** is the line of demarcation. Everything Before the Buried and Me did before it was apprenticeship; everything after it is commentary. The concept-album framing, sixty-four minutes conceived as a single unbroken arc, gives the material a structural coherence the earlier records never attempted, and the genre-hopping, death metal into bluegrass into carnival waltz into space rock, is fearless in a way that prog metal in 2007 simply was not. 'Sun of Nothing' is the emotional centrepiece: that calm melodic midsection, arriving after ten minutes of controlled violence, remains one of the most beautiful passages the band has committed to tape.

    'Ants of the Sky' deserves particular mention for the audacity of its construction, the chord progression underpinning the hoedown section mirrors the power-metal passages bookending the track, a structural joke that only reveals itself on repeated listening. And 'White Walls' earns its fourteen minutes: when Rogers chants 'We will be remembered for this' over the closing bars, landing back on the same G-sharp that opened the record, the compositional circle closes with an inevitability that borders on the architectural. <u>The kitchen-sink eclecticism alienates listeners on both sides, metalheads who want sustained brutality and prog fans who want sustained elegance, and that refusal to serve either camp is precisely what makes it important.</u>

    The weaknesses are real. Some of the genre transitions prioritise spectacle over songwriting discipline, and the lyrical register, when it surfaces from beneath the screams, rarely matches the ambition of the instrumentation. The compositional tightness that *The Great Misdirect* and *Parallax II* would later achieve is not yet fully in evidence here; one can hear the band reaching beyond its current grasp, which is both the album's limitation and its animating energy. But four stars, not five, is the honest reckoning. ***Colors*** is a record that changed what was permissible in prog metal, and one does not need to consider it a masterpiece to acknowledge that the genre would be unrecognisable without it.

- title: "The Silent Circus"
  type: "music"
  creator: "Between the Buried and Me"
  creator_role: "by"
  year: 2006
  eval: "meh..."
  genre: "progressive metal"
  image: "/assets/images/music/silent_circus.jpg"
  posted: "2020-08-18"
  text: |
    'The Need for Repetition' is the one track here that suggests the band might eventually become interesting, and it is, tellingly, the last track plus a bonus. The rest of ***The Silent Circus*** is an endurance test for anyone whose tolerance for harsh vocals has limits, and mine does. BTBAM's screaming on this record is particularly grating: abrasive without the tonal richness that makes harsh vocals compelling in the hands of, say, Devin Townsend or Mikael Åkerfeldt.

    <u>There is a difference between harsh vocals that communicate and harsh vocals that merely assault, and this album lands firmly in the latter category.</u> The instrumental work underneath is not without promise, but it is buried, appropriately enough, beneath a vocal approach that makes sustained listening an act of will rather than pleasure.

- title: "Andy James"
  type: "music"
  creator: "Andy James"
  creator_role: "by"
  year: 2011
  eval: "liked"
  genre: "instrumental metal"
  image: "/assets/images/music/andy_james.jpg"
  posted: "2020-08-14"
  text: |
    The arrangements on ***Andy James*** are marginally better than those on the previous record, which is to say they have moved from 'dire' to 'passable'. One can hear, starting around the 4:25 mark of 'The Storm', four bars of guitar work that encapsulate everything right and everything wrong with this project: technically extraordinary riffing, the kind that makes one's fingers ache in sympathetic response, deployed within a song structure so rudimentary it could have been generated by algorithm.

    <u>Andy James has John Petrucci's technique housed inside Justin Bieber's songwriting, and this album does nothing to challenge that verdict.</u> The shred is immaculate, the compositions beneath it almost wilfully simplistic. Every track follows the same template, every solo erupts from the same formulaic setup. One does not doubt the skill; one doubts whether anyone involved thought the songs themselves mattered.

- title: "In The Wake Of Chaos"
  type: "music"
  creator: "Andy James"
  creator_role: "by"
  year: 2007
  eval: "meh..."
  genre: "instrumental metal"
  image: "/assets/images/music/in_the_wake_of_chaos.jpg"
  posted: "2020-08-14"
  text: |
    Andy James's guitar playing is beyond reproach. His arrangements are not. ***In The Wake Of Chaos*** is an album where world-class technique is deployed in service of songwriting so elementary it borders on parody. 'Against the Gods' and 'Chaos Theory' manage a passable energy, but the rest is stultifying: 'Shine On Through' deserves special condemnation as a track that is, structurally and harmonically, a Justin Bieber song with the vocal line replaced by electric guitar. The final track, 'Gates of Heaven', consists almost entirely of sweep picking for its full duration, which is either an artistic statement or a technical exercise mistakenly released as music.

    <u>one emerges the album not questioning the guitarist's ability but questioning whether anyone in the room ever asked: is this a song, or is it a demonstration?</u> The worst guitar album I had heard in some time. Perhaps that reflects a failure of open-mindedness on my part, but I suspect it reflects a failure of composition on his.

- title: "Children of the Sounds"
  type: "music"
  creator: "Kaipa"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/children_of_the_sounds.jpg"
  posted: "2020-07-19"
  text: |
    Kaipa remain one of the most quietly towering acts in the entire prog canon, and it baffles me that I had not marked them earlier. Roine Stolt's departure decades ago might have killed a lesser band, but Hans Lundin kept steering the ship with a compositional instinct that few in Swedish prog can match. ***Children of the Sounds*** is, on close inspection, something of a combinatorial exercise: rearranging signature Kaipa elements, the luminous keyboard washes, the folk-inflected melodic contours, that characteristic pulsing bass note Lundin loves to deploy as rhythmic anchor, into configurations that feel familiar without quite repeating themselves. Outside of 'On the Edge', which breaks new ground with its darker harmonic language and more aggressive dynamic arc, the tracklist could be read as a greatest-hits recombination of ideas drawn from *Notes from the Past* and *In the Wake of Evolution*.

    <u>And yet, taken on its own terms, this is still a near-flawless prog record.</u> The arrangements are immaculate: every instrument occupies exactly the space it needs, the mix breathes, and the transitions between passages have that seamless, almost liquid quality that separates great symphonic prog from the merely ambitious. The vocal harmonies sit high and clear above layers of analogue warmth, and the rhythm section locks in with an understated precision that only comes from players who have internalised each other's timing over years. One can fault it for not pushing further into unfamiliar territory, but the counterargument writes itself: when the territory one already occupies is this beautiful, the act of deepening rather than expanding is its own form of ambition. <u>It is a record that rewards immersion more than novelty, and immersion, in Kaipa's hands, remains an extraordinary thing.</u>

- title: "The Slow Rust Of Forgotten Machinery"
  type: "music"
  creator: "The Tangent"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "progressive rock"
  image: "/assets/images/music/slow_rust_of_forgotten_machinery.jpg"
  posted: "2020-07-19"
  text: |
    ***The Slow Rust of Forgotten Machinery*** is eighty minutes long, and I did not lose focus for a single one of them. That alone is a feat worth naming. Andy Tillison has always understood that the challenge of the modern prog epic is not length but sustain: anyone can fill time, but making every minute feel structurally necessary, making the listener forget the clock entirely, requires a kind of compositional discipline that most bands in the genre abandoned decades ago. 'The Sad Story' and 'A Few Steps Down' are the twin peaks here, each built around cascading synth solos and drum passages that feel less like showcases and more like arguments, each phrase answering the last, escalating with a logic that is almost rhetorical. <u>The synth work in particular has a vocal quality to it, as though the instrument were trying to articulate something that words had already failed to say.</u>

    There is a worldbuilding dimension too: the album sketches an alternate reality that looks suspiciously like a lightly fictionalised version of Trump-era America, its dystopian edges softened just enough by allegory to avoid didacticism. Tillison has always been politically sharp, but here the politics are woven into the sonic fabric rather than bolted on. what emerges is a record where narrative and instrumentation reinforce each other, where the drama of the story and the drama of the arrangement are the same drama. The production is warm but detailed, with enough space in the mix for every solo to land with full force and every quiet passage to feel fragile.

    <u>This is the album that formally displaced Keor's <em>Petrichor</em> as my second most beloved record, and that displacement was not a decision so much as a recognition.</u> By the final bars one does not so much finish listening as surface from somewhere deep. Few prog records this decade have earned their runtime so completely.

- title: "X-Mas Death Jazz"
  type: "music"
  creator: "Panzerballett"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "jazz metal"
  image: "/assets/images/music/xmas_death_jazz.jpg"
  posted: "2020-07-12"
  text: |
    I came to ***X-Mas Death Jazz*** from *Jan Zehrfelds Panzerballett*, expecting more of the same red-album formula: metal scaffolding with jazz ornamentation, muscular but ultimately legible. The opening tracks obliterated that expectation within seconds. The first three songs are pure metal aggression, dense and unrelenting, a riffing that suggests Zehrfeld wanted to see how far he could push the heaviness before the jazz DNA reasserted itself. It is a disorienting start for anyone expecting fusion from bar one, and that disorientation is clearly intentional.

    <u>Then 'Es kommt bald' arrives, and the entire record pivots.</u> A jazz bass solo blooms in the middle of the track with almost casual elegance, followed by a guitar solo that slides the whole register sideways, and suddenly one is listening to a completely different band, or rather the same band revealing a hidden chamber. From that point the album becomes something novel: not jazz-metal in the hyphenated, genre-tag sense, but a third thing, a fusion that refuses to settle on either side of the divide. The closest reference point might be Thank You Scientist, but with far deeper jazz chops, the improvisation here is not decorative but load-bearing, shaping the harmonic direction of entire sections rather than merely colouring them. <u>Zehrfeld's arranging instinct is exceptional: he knows exactly when to let the metal breathe and when to let the jazz bite.</u> The tonal range across the tracklist is vast, yet nothing feels incoherent. It is the rare record that sounds like a dare the musicians made to themselves, and then won.
