- title: "Pipistrello and the Cursed Yoyo"
  type: "game"
  creator: "Pocket Trap"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "action adventure"
  image: "/assets/images/thoughts/games/pipistrello.jpg"
  posted: "2026-06-20"
  revised: "2026-06-20"
  text: |
    Pocket Trap calls ***Pipistrello and the Cursed Yoyo*** a 'yoyovania', but the game it most resembles is a budget ***Super Mario Odyssey***: the controls feel good, the exploration offers genuine surprises (the SlimeCorp level's design, where you teach yourself the wall dash through spatial arrangement alone, is excellent), but the emotion and narrative cannot sustain ten-plus hours. *Odyssey* needs no narrative because the action itself has enough depth; Pipi's yoyo is clever, but it does not reach that depth. Last year's *Öoo* (Nama Takahashi, 2025) similarly relied on emergent teaching to let the player learn through play, but *Öoo* understood itself as a five-hour precision knowledge-lock, not a twelve-hour sprawl. Pipi insists on being the latter.

    The SlimeCorp levels deserve a separate note. A fracking-adjacent capital industry destroying the environment; four criminal capitalists each controlling a quarter of the city: the satirical scaffolding has genuine critical potential, a social fable waiting to be fleshed out. None of it is. The game touches each thread and moves on, and by the end only the puzzle skeleton remains. Worth playing; one only wishes the studio had known where to put its ambition.

- title: "Mixtape"
  type: "game"
  creator: "Beethoven & Dinosaur"
  creator_role: "by"
  year: 2026
  eval: "meh..."
  genre: "narrative adventure"
  image: "/assets/images/thoughts/games/mixtape.jpg"
  posted: "2026-05-10"
  revised: "2026-05-10"
  text: |
    ***Mixtape*** has my favourite intro of any game this year, and throughout the 4-hour-ish playthrough the art direction sustains its promise: Blue Moon Lagoon is gorgeous, the stop-motion-inflected animation is confident, and the vibe of a final high-school night carries genuine warmth. What it cannot sustain, however, is the game around it. The narrative asks the player to inhabit Stacey Rockford's last evening with her friends, but Stacey and her companions are so thinly drawn that this inhabitation never occurs; one watches them from outside, waiting for interiority that never arrives. The gameplay vignettes (skateboarding, sweeping leaves, exploring an abandoned dinosaur park) are similarly weightless. I know 'playability' is a contested value in narrative games, that some consider it irrelevant, but in a game that attempts to build its whole structure around *immersion*, I think playability is of critical import. Something *has* to hold the player inside the experience, and here nothing does.

    The deeper failure is the mixtape conceit. Stacey (and once her companion 'Slater') introduces each track with fourth-wall narration, which should create the sense of personal curation, of songs chosen because they mean something to her at this particular moment. It does not. The licensed catalogue is enviable (Joy Division, Iggy Pop, Siouxsie and the Banshees, Alice Coltrane) but the tracks float free of the scenes they accompany; songs play, vignettes unfold, and the two exist in total parallel. The studio captured the *form* of late-eighties mixtape culture (the aesthetic, the era, the physical object) while forgetting the personal logic of selection that makes a mixtape more than a playlist. The one moment that approaches genuine curation is Alice Coltrane's 'Galaxy in Turiya', placed on a mixtape that 'Lover Boy' makes for Stacey and scored to an animated kiss: a song chosen for someone, with feeling and a bit of pretentiousness from 'Lover Boy' behind the choice. Even this grand gesture of love passes as mere transition.

    I simply cannot detect any love for mixtape culture here, in a game titled ***Mixtape***. I only see familiarity with the surfaces of this bygone era. In the tradition of youth narrative, the studio clearly wants to be the next DONTNOD. The distance is considerable.

- title: "GRIME II"
  type: "game"
  creator: "Clover Bite"
  creator_role: "by"
  year: 2026
  eval: "liked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/grime-ii.jpg"
  posted: "2026-04-09"
  revised: "2026-04-09"
  text: |
    A significant step up from the original in almost every dimension that matters. Where the first GRIME built an unsettling, surreal world out of living rock and sinew, ***GRIME II*** expands that world's vocabulary: boss encounters now feel like conversations between the player and the game's internal logic, each demanding a different mode of reading, and the map design achieves a layered interconnectedness that rewards curiosity at nearly every turn. The narrative has matured too. Even as a prequel, GRIME II folds questions about creation, accountability, and the violence inherent to both making and consuming art into the original's oblique mythology with a confidence that feels contemporary rather than decorative. Each biome sustains its own visual and mechanical identity, distinct enough in mob variety and aesthetic that transitions between zones carry real texture.

    The frustrations are concentrated in a single department: platforming. The controls lack the responsiveness the late-game demands, and the wall-dash ability, reminiscent of *Constance* (2025)'s equivalent, compounds the problem on a controller; inputs misfire regularly, turning what should be fluid traversal into a friction exercise. A flaw that sits at the intersection of ambition and execution: the designers clearly wanted more dynamic movement, but the implementation is not quite there. The timing is unlucky, too. In a year where *MIO: Memories in Orbit* (2026) has already set a near-unreachable bar for metroidvania map and movement design, GRIME II's ceiling feels lower than it should. A strong sequel that earns its improvements honestly; just one that arrives in the shadow of something exceptional.

- title: "Rhythm Doctor"
  type: "game"
  creator: "7th Beat Games"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/rhythm-doctor.jpg"
  posted: "2026-03-31"
  revised: "2026-03-31"
  text: |
    There are rhythm games that overwhelm one with inputs, treating complexity as the measure of depth: *Djmax* (2004), *IIDX* (1999), the entire Bemani lineage. Then there are those that strip everything back and discover that simplicity, pressed hard enough, reveals its own kind of complexity. ***Rhythm Doctor*** belongs to the second tradition, and it may be the finest example of it. A single button. One mechanic: press on the seventh beat. From this constraint, 7th Beat Games builds something remarkable: a linear narrative where every character's backstory is given space to breathe, where the player's relationship to each patient accrues emotional weight across hours, because the format never drowns intimacy in mechanical noise. The finale is devastating precisely because the game has earned it, beat by beat, through carefully controlled escalation.

    ***Rhythm Doctor***'s window-theatre sets it apart from other narratively ambitious rhythm games. The game treats the desktop itself as a performance space: windows multiply, fracture, stack, and rearrange in ways that are simultaneously baffling and perfectly choreographed. Too many scenes produce astonishment because the spectacle is in precise service of emotion. The sensation is akin to finishing a short novel that felt like a long one: dense with feeling, but never padded. I wanted to erase my memory and start again immediately. Few games produce that impulse and justify it.

- title: "Resident Evil Requiem"
  type: "game"
  creator: "Capcom"
  creator_role: "by"
  year: 2026
  eval: "liked"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/resident-evil-requiem.jpg"
  posted: "2026-03-10"
  revised: "2026-03-10"
  text: |
    Not a series devotee, but ***Resident Evil Requiem*** made me understand the devotion. Capcom's dual-protagonist structure is the game's strongest move: Grace Ashcroft's sections deliver claustrophobic survival horror in the lineage of *RE7* (2017) and the original *Resident Evil* (1996), with limited weaponry, stealth, and enemies whose mutations upon death recall the Crimson Heads of 2002; Leon's sections borrow liberally from *RE4* (2005)'s action-shooter vocabulary, fast and confident and spectacularly choreographed. The balance between the two is structural and tonal: Grace's dread feeds into Leon's catharsis, and vice versa, producing a rhythm the series has never quite managed before. The set pieces are executed with real craft, and the level design surprises more than once.

    The story is the weak point. Several longstanding narrative threads from across the franchise are addressed, but the plot around Victor Gideon and his Umbrella connections feels undercooked, leaving too many obvious avenues unexplored. Grace herself is somewhat sidelined in the second act, which undercuts the dual-protagonist premise at precisely the moment it should be paying off. Still: as someone with no particular investment in the Resident Evil mythology, this is the first entry that made me care about the world beyond the mechanics. That counts for a great deal.

- title: "Nioh 3"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2026
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/nioh-3.jpg"
  posted: "2026-02-20"
  revised: "2026-02-20"
  text: |
    After *Rise of the Ronin* (2024) provided the open-world trial run Team Ninja needed, ***Nioh 3*** arrives as the studio's strongest game: a game that preserves the signature Ki Pulse from its predecessors and builds upon it so substantially that the combat feels simultaneously familiar and transformed. The dual-class system gives the combat its shape. Switching between samurai and shinobi on the fly is not a gimmick; it restructures the loop. Samurai stances play as one expects from the series: precise, weighty, demanding careful Ki management after every combo. The shinobi path replaces stances with ninjutsu tools and offers faster Ki regeneration, making it accessible to newcomers without trivialising the difficulty. The Ninja-style pairing of See-Through evasion and Mist repositioning, the latter leaving a decoy to draw aggro, is a design innovation that makes one wonder why no one thought of it before. For action-game players with no soulslike experience, this is an entry point that does not condescend.

    The build variety that follows from this dual-class foundation is formidable. No previous Team Ninja game has offered so many distinct playthroughs: weapons span odachi and axes on the samurai side to kusarigama and talons for the shinobi; the Guardian Spirit system adds style-specific elemental bonuses and burst abilities; progression remains flexible enough that build experimentation feels invited rather than punished. Yet this abundance never produces chaos. Unlike *Rise of the Ronin* (2024) or the Ubisoft open-world formula, where breadth dilutes intensity, every encounter in ***Nioh 3*** generates tension. The open-area world spans multiple time periods, each visually and mechanically distinct, and the co-op integration is unusually smooth for the genre.

    Team Ninja remains Team Ninja, of course: the narrative is as thin and nonsensical as the series has ever been, and the English voice acting ranges from serviceable to actively distracting. But these are blemishes on a game whose combat and encounter design set a new standard. With this clarity of strengths and weaknesses, what more could one ask for?

- title: "MIO: Memories in Orbit"
  type: "game"
  creator: "Douze Dixièmes"
  creator_role: "by"
  year: 2026
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/mio-memories-in-orbit.jpg"
  posted: "2026-02-06"
  revised: "2026-02-06"
  text: |
    I did not expect that, barely months after *Silksong* (2025), a metroidvania would arrive with map design that surpasses it. ***MIO: Memories in Orbit*** achieves a whole-map interconnectedness so consistent that in 2026, after years of diminishing returns in the genre, it still manages to surprise. Douze Dixièmes have built something startling: a world where every apparent dead-end is a future shortcut, where the relationship between areas carries narrative information, each connection reinforcing the game's fragmented storytelling in ways that feel inevitable in retrospect. The control over that narrative is unusually good; ***MIO*** surpasses most of its genre peers in every dimension except sheer breadth.

    The environmental storytelling is dense enough to reward obsessive exploration, and the quantity of hidden routes borders on the absurd: passageways tucked behind false walls, behind foreground art, behind mechanical puzzles that only reveal themselves after new movement abilities unlock. The music is the first since *Ori and the Will of the Wisps* (2020) to absorb me, carrying the same quality of melancholic wonder that Moon Studios achieved at their peak. But the platforming design turns ***MIO*** from excellent to necessary. The protagonist's movement options are extensive, and the precision with which movement resources are gated transforms every platforming challenge into something puzzle-like: a question of which tools to deploy, in what order, at what moment. Among recent metroidvanias, this combination of mechanical depth and spatial intelligence is rare. One of the finest games in any genre.

- title: "Dispatch"
  type: "game"
  creator: "AdHoc Studio"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/dispatch.jpg"
  posted: "2025-12-02"
  revised: "2025-12-02"
  text: |
    A couple of years ago, AdHoc Studio walked away from *The Wolf Among Us 2*, citing creative differences with the reconstituted Telltale team. In ***Dispatch***, the shape of that disagreement becomes visible. Where *The Wolf* (2013) excelled at societal scope, at weaving class, corruption, and systemic injustice into a detective narrative, AdHoc's strengths lie in a different territory entirely: the intimate, the individual, the felt. ***Dispatch*** goes all-in on character. Robert Robertson, a retired superhero voiced by Aaron Paul with precisely the right mixture of weariness and stubborn warmth, joins a Superhero Dispatch Network to manage former supervillains, and the interactive-fiction format, with its carefully weighted choices and branching dialogue, makes it effortless to inhabit him. Guilt, regret, relief, satisfaction: each emotional beat reads as one's own, not the protagonist's, because the choice design never signals the 'right' answer.

    ***Dispatch*** differs from *The Wolf* (2013), and from most narrative games of its generation, in the depth of its secondary cast. Every character is knowable: not reduced to a type or a function, but given enough texture that one's attachment accrues naturally across eight episodes. The emotion that surfaces is felt, not externally imposed by orchestral swells or slow-motion close-ups. By chapter seven, I was crying in a way I had not cried at a game since *Life Is Strange* (2015): not from sadness alone, but from the accumulated weight of having known these people and made decisions on their behalf. The production quality is superb. I am deeply curious about what AdHoc does next. Whatever their disagreement with Telltale was, the evidence suggests they were right.

- title: "Constance"
  type: "game"
  creator: "Blue Backpack / btf Games"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/constance.jpg"
  posted: "2025-11-30"
  revised: "2025-11-30"
  text: |
    Higher expectations, harder the fall. A paintbrush as weapon promises untapped mechanical potential: none of it is realised here. The skill set lifts almost wholesale from the standout metroidvanias of the past decade, the wall-dash being the sole exception; on boss design, every encounter follows the same numbing loop of death, memorisation, and repetition, with no interactive wrinkle to distinguish one from another. In a year when metroidvania boss design is getting good, ***Constance*** is a reminder that studios with no instinct for encounter design still exist.

    The map is useless in the manner of *Hyper Light Drifter* (2016)'s, forcing the player to build their own mental model of the environment rather than following a prescribed path, except that here the obscurity reads as oversight rather than intention. Exploration rewards are negligible; there is no equivalent of the hidden currencies or lore discoveries that make backtracking worthwhile in the genre's better entries. Fluid animations remain, in search of a game that deserves them.

- title: "Lumines Arise"
  type: "game"
  creator: "Enhance / Monstars Inc."
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/lumines-arise.jpg"
  posted: "2025-11-29"
  revised: "2025-11-29"
  text: |
    After the triumph of *Tetris Effect* (2018), it seemed implausible that Mizuguchi Tetsuya could push the concept further. What remained to be done? The answer, in ***Lumines Arise***, turns out to be texture. Each block type carries a distinct tactile quality, a haptic signature that gives every stage its own feel under the fingers; combined with the visual macro-scale, where the optical flow alone merits study by every rhythm-game developer working today, and the tight audio synchronisation that has been the series' signature since the original *Lumines* (2004), the whole thing finally earns the word 'synesthetic'. A simple falling-block game becomes a full sensory event: not a game with music, but a game that is music.

    In interviews, Ishihara has described his ambition as 感動 (kando): to move emotionally. A modest word for an immodest goal, and ***Lumines Arise*** exceeds even that framing. The thirty-odd stages of Journey Mode build a cumulative intensity that dissolves time: one enters a flow-state in which the distinction between seeing and hearing softens until one is uncertain which sense is doing the work. The faint repetitiveness in the back half of the Journey and the occasional readability issues amid heavier visual effects are minor friction in a game that achieves what the Lumines series has always reached towards. We are, at last, hearing colours and seeing sounds. Mizuguchi and Ishihara can rest.

- title: "The Outer Worlds 2"
  type: "game"
  creator: "Obsidian Entertainment"
  creator_role: "by"
  year: 2025
  eval: "meh..."
  genre: "RPG"
  image: "/assets/images/thoughts/games/outer-worlds-2.jpg"
  posted: "2025-11-09"
  revised: "2025-11-09"
  text: |
    *Fallout: New Vegas* (2010) came out fifteen years ago and Obsidian is still making the same game. Charitably, one calls this 'fidelity to vision'. Honestly: it is a refusal to grow. ***The Outer Worlds 2*** is larger than its predecessor, which Microsoft's marketing apparatus made much of, but larger is not the same as deeper; the main quest is actually more streamlined, the faction system produces no meaningful consequences, and the philosophical texture that gave the first game its occasional sharpness has thinned to the point of disappearance. Each companion and faction reads as a caricature representing an ideology, embarrassingly flat, serving the satire in the way a scarecrow serves agriculture: visible at a distance, useless up close.

    The progression breaks before the game ends; hit the level cap with companion arcs still incomplete, and motivation evaporates. Where *The Outer Worlds* (2019) at least had the courage of its cynicism, delivering a compact satire that knew when to stop, the sequel sprawls without deepening, each new planet adding surface area but no new ideas. Wide as the solar system, shallow as its satire.

- title: "UNSIGHTED"
  type: "game"
  creator: "Studio Pixel Punk"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/unsighted.jpg"
  posted: "2025-10-12"
  revised: "2025-10-12"
  text: |
    By the standards of a small-scale game, ***UNSIGHTED*** is an unambiguous success, and more than that: it introduces a structural innovation that the genre has not yet metabolised. The global time-limit, ticking inexorably for every NPC, grafts consequence onto a traditional metroidvania framework. Deaths that in any other game would be a minor setback here carry real weight: time lost to a failed boss attempt is time an NPC one has grown fond of does not have. Studio Pixel Punk, working from São Paulo with modest resources, understood that a metroidvania's weakness has always been the disconnect between narrative urgency and gameplay leisure; the time-limit collapses that gap.

    The execution is strong across the board. Enemy diversity is unexpectedly rich, each biome introducing distinct threats and puzzles with their own mechanical character; the music is outstanding, full of energy and melancholy in equal measure; boss design, often the weakest link in small-budget metroidvanias, is here consistently excellent. The only real missed opportunity is world reactivity. Even NPC deaths, the time-limit system's most dramatic consequence, fail to trigger unique dialogue or environmental shifts, which dampens the immersion the system should generate. A limitation of resources rather than imagination, and one forgives it in a game that does this much right. A first-tier small-budget metroidvania, and a blueprint for anyone attempting to make consequence feel structural rather than cosmetic.

- title: "Silent Hill f"
  type: "game"
  creator: "NeoBards Entertainment"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/silent-hill-f.jpg"
  posted: "2025-10-05"
  revised: "2025-10-05"
  text: |
    ***Silent Hill f*** arrives with a combat system that leaves a great deal to be desired: character abilities lack coherence, roles feel under-defined, and the overall mechanical feel sits well below the standard set by the franchise's better entries. None of that matters very much, because the story strikes with the force of *Silent Hill 2* (2001). NeoBards handle the series' survival-horror tradition and fragmented storytelling with care and sensitivity, knowing precisely when to spell out and when to leave as charged suggestion. The marriage plot, the mid-twentieth-century East Asian culture's contempt for and systematic oppression of women: these are made explicit without condescension. The three pre-wedding 'rituals' in the Other World remain as hints, each appearing to map onto the constraints marriage historically imposed on women of that era: obedience, silence, erasure of self. That calibration between the said and the unsaid is exceptionally difficult in horror, where the temptation is always towards either over-explanation or mystification for its own sake.

    Hinako, and the game's other women, appear to have many choices; yet almost every path leads to total self-erasure. The game handles this without flinching: the architecture of choice that conceals the absence of choice, the performance of agency within a structure designed to annihilate it. One recognises something of the domestic-sphere analogue to Fisher's 'capitalist realism' here: the System offers options precisely to foreclose the possibility that anyone might notice how few of them lead anywhere new. Story for story, measured against last year's *Silent Hill 2* (2001) remake, I think I prefer this one. Bloober Team's remake was a faithful, often startling restoration; NeoBards have built something that belongs to the franchise's future rather than its past.

- title: "Hollow Knight: Silksong"
  type: "game"
  creator: "Team Cherry"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/hollow-knight-silksong.jpg"
  posted: "2025-09-25"
  revised: "2025-09-25"
  text: |
    Perhaps in the next fall one can feel the strength to fight again; perhaps in the next waking one can finally climb the wall of despair. ***Hollow Knight: Silksong*** asks this question ceaselessly, and the answer it provides is not reassurance but repetition: one more attempt, one more death, one more lesson absorbed into muscle memory. Where the original *Hollow Knight* (2017) placed the player inside the Knight's unknowing innocence, a vessel with no past and no fear, ***Silksong*** replaces that blankness with something far more difficult: Hornet knows. She knows the kingdom of Pharloom is collapsing. She knows what waits at the end. The fear that knowledge brings saturates every corridor, every ambush, every moment of stillness before a boss encounter, and Team Cherry have understood that this shift from innocence to awareness demands an entirely different emotional contract with the player.

    If every cry of defeat can become fuel to save Pharloom and find the truth, one will challenge again and again: until one flies over the ridges of Fayvum, sees the great soaring bird, witnesses the cheerful resilience of the fleas at the kingdom's edge, looks out over Pharloom from the pink-purple coral towers, faces the lava a thousand metres below without flinching. Team Cherry's gift has always been for biomes that feel simultaneously alien and internally logical, ecosystems that sustain their own aesthetic and emotional weather; ***Silksong*** multiplies that gift across a map whose scale dwarfs the original's. And yet the game never feels bloated. Every area earns its presence, every backtrack reveals something previously invisible; the interconnectedness that made *Hollow Knight* (2017) a landmark is here refined to the point of transparency, the architecture becoming so legible that one stops noticing how carefully joined it is.

    'I have survived the fury of this land. I have borne its barbs and its blades, and I have seen wonder behind its dangers... and that darkness I fear no longer.' Without the Knight's unknowing innocence, one must face the manifold dangers of a collapsing world with open eyes. ***Silksong*** makes the facing feel not triumphant but honest, not heroic but stubbornly, quietly brave.

- title: "Phoenix Springs"
  type: "game"
  creator: "Calligram Studio"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "adventure"
  image: "/assets/images/thoughts/games/phoenix-springs.jpg"
  posted: "2025-09-01"
  revised: "2025-09-01"
  text: |
    There is a way to make point-and-click adventures both engage the player and make them feel intelligent; ***Phoenix Springs*** does not find it. Calligram Studio's neo-noir desert mystery has the look of a thoughtful, design-literate game: the stripped-back palette, the geometric framing, the whispered tone. But the puzzle design squanders every aesthetic advantage. The '101' clue is exemplary: so egregiously, so intentionally outlandish in its logic that solving it produces not satisfaction but a betrayed disbelief. The solution was there all along, hiding behind a leap of reasoning the game has done nothing to earn.

    The issue is structural. Good puzzle design teaches the player a grammar and then tests fluency within it; ***Phoenix Springs*** skips the grammar and tests the guessing. Completion comes through persistence rather than understanding, which is the worst possible outcome for the genre. The art direction deserved a better home.

- title: "The Alters"
  type: "game"
  creator: "11 bit studios"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/alters.jpg"
  posted: "2025-08-31"
  revised: "2025-08-31"
  text: |
    If this year's *Kingdom Come: Deliverance II* (2025) gave the endless freedom of a sandbox RPG, ***The Alters*** made me scrutinise every choice I made. The premise is deceptively simple: Jan Dolski, stranded on a hostile planet, uses experimental cloning technology to create alternate versions of himself, each branching from a single altered life decision. 11 bit studios build from this an uncommonly thoughtful branching narrative. The survival-building system is superbly implemented, responsive and tactile enough that resource management never degenerates into busywork; but the real work is in the dialogue. Each Alter carries a distinct psychology, a distinct mixture of vulnerability and defensiveness, and the feedback system tracking frustration, motivation, insecurity, and burden across every conversation means that one learns to read these people as people rather than as systems. The writing is intimate and direct in a way that feels unusual for a game this structurally ambitious.

    The answer, it turns out, is that I could not bring myself to let my companions suffer at all. Not once, across multiple loops. The options existed; the mechanical incentives were clear; I chose warmth every time, and the game was wise enough not to punish that instinct but to honour it. When, in the ending, the Refiner says 'Then you have my loyalty,' I could not hold back tears. Not because the moment was engineered for maximum emotional extraction, but because it arrived after hours of careful, accumulating trust, every conversation a small deposit into a relationship the game permitted me to build at my own pace. Many games attempt this; very few achieve it without leaning on orchestral swells or slow-motion close-ups. ***The Alters*** earns its emotion the hard way: through patience, through texture, through the simple act of letting the player care.

    I hope they can all live, in this less lonely reality, as whoever they want to be.

- title: "Öoo"
  type: "game"
  creator: "Nama Takahashi"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/ooo.jpg"
  posted: "2025-08-26"
  revised: "2025-08-26"
  text: |
    'Metroidbrainia' is a genre that has only cohered in the last few years, and already it has two landmark entries: *Animal Well* (2024) and ***Öoo***. Where Billy Basso's *Animal Well* (2024) explored the complexity of knowledge-puzzle design, the sheer combinatorial depth of what a handful of items can unlock, Nama Takahashi's ***Öoo*** takes the opposite approach: a single mechanic, pushed to its absolute limit. The game first asks one to think inside the box, mastering the rules as given; then, with surgical precision, it asks one to think outside them entirely. The level structure, 'puzzle, answer, final puzzle', looks modular from the outside, almost workmanlike. In Takahashi's hands it becomes dense, each module a carefully calibrated ratchet that tightens the player's understanding until the moment of release.

    Compared to *Animal Well* (2024), the 'I'm a genius' feeling ***Öoo*** delivers is more direct and more immediate: not the slow accumulation of insight across a sprawling world, but the sharp crack of a solution arriving fully formed. This is textbook knowledge-lock design: the information required to solve each puzzle is always already available; the difficulty lies entirely in recognising it, in reorganising what one knows rather than acquiring what one does not. That distinction, between puzzles of acquisition and puzzles of recognition, may be the defining axis of the metroidbrainia genre, and ***Öoo*** sits as far towards the recognition end as anything currently in the field. A small, precise, quietly astonishing game.

- title: "AI Limit"
  type: "game"
  creator: "Sense Games"
  creator_role: "by"
  year: 2025
  eval: "meh..."
  genre: "action"
  image: "/assets/images/thoughts/games/ai-limit.jpg"
  posted: "2025-08-15"
  revised: "2025-08-15"
  text: |
    ***AI Limit*** has very clear strengths and correspondingly clear weaknesses. The strength: map design. Working with limited resources, Sense Games invested seriously in their level architecture and produced a remarkable looping soulslike map, an interconnected, shortcut-laden structure that rewards mental cartography and generates the specific pleasure of realising that two apparently distant areas were always adjacent. The parry system is functional, the Sync Rate bar, which collapses stamina, posture, and spell resources into a single meter, prevents trivial ranged-cheese builds, and the overall feel, for a budget title, is competent.

    The reason it sits just above average: everything else. Compared to recent soulslike releases, ***AI Limit*** is noticeably more spiteful in its encounter design, falling into the *Dark Souls II* (2014) trap of equating difficulty with mob density and ambush frequency. Boss design is the sorest point: in the base game, only one or two encounters are memorable, Loskid among them, while most default to either the marathon-runner model, where health pools substitute for mechanical interest (Aether, Charon), or the delayed-attack template that has become the genre's laziest crutch. For a resource-strapped studio, it passes. Just.

- title: "The Drifter"
  type: "game"
  creator: "Powerhoof"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "adventure"
  image: "/assets/images/thoughts/games/drifter.jpg"
  posted: "2025-08-11"
  revised: "2025-08-11"
  text: |
    One cannot remember the last time a proper old-school point-and-click adventure felt this surprising. ***The Drifter*** is a genre exercise that transcends its own nostalgia: Powerhoof's puzzles are demanding enough to sustain engagement, and the narrative, a pulp sci-fi conspiracy threaded through grief and mortality, maintains momentum across its runtime without resort to the genre's usual padding. The die-and-revive mechanic is particularly well-integrated: Mick Carter's ability to return from death, retaining knowledge each time, transforms what could be a simple retry system into something thematically coherent, tying puzzle design directly to the story's questions about what it means to carry memory forward through loss. Many puzzles produce the feeling of actually working a case, of assembling disparate clues into a solution that clicks rather than one that merely unlocks.

    The limitation is textual depth. ***The Drifter*** engages with well-trodden philosophical territory: brain in a vat, trolley problem, the familiar furniture of sci-fi's ethical thought experiments. The engagement is competent but rarely revelatory; the aftertaste is thinner than the setup promises. A small-studio game, and one adjusts expectations accordingly; Powerhoof still do impressive work within those constraints, particularly in voice acting and pixel animation. One of 2025's worthwhile indie picks, and a reminder that the point-and-click is not so much dead as dormant.

- title: "Kentucky Route Zero"
  type: "game"
  creator: "Cardboard Computer"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/kentucky-route-zero.jpg"
  posted: "2025-08-06"
  revised: "2025-08-06"
  text: |
    My Shannon: brave, strong. My Conway: timid but stubborn. ***Kentucky Route Zero*** is more than a fixed cast and a scripted narrative; it is a mirror. The characters and the story are assembled from dialogue fragments by the player, each selection not a choice between outcomes but a choice between textures, between the kinds of feeling one is willing to inhabit. The dead miners' ghosts in the Kentucky cave, the drifting workers on the Echo River, the vast bureaucracy beside the church organ, the 'false' people living in Xanadu: each encounter is a node in a network of associations that Cardboard Computer refuse to resolve into a single, stable meaning.

    The weight of choice in ***Kentucky Route Zero*** means that everything felt comes from the player, not the script: the game keeps telling one, quietly, insistently, 'We cannot determine the course of history, but we can determine how we feel about what has already happened.' This is not interactivity in the ludic sense; it is something closer to what happens when one reads a poem aloud and realises that the reading has become the poem. The echoes of late capitalism drift over fields, forests, breweries, and the river's surface, and one watches reality gradually deconstruct, dissolving into the grief and reconciliation of the past. Conway's debts accumulate until they become the landscape itself; by the final act he is simply gone, not dead in any dramatic sense but absorbed into the Hard Times Distillery's skeleton crew, literal skeletons working off debts they can never repay. The game does not offer a farewell. Shannon's competence hardens into something that might be strength or might be numbness. The game does not ask one to fix anything; it asks one to stay, to witness, to let the melancholy settle.

    Melancholy is the word.

- title: "明末：渊虚之羽"
  title_en: "Wuchang: Fallen Feathers"
  type: "game"
  creator: "Leenzee Games"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/wuchang.jpg"
  posted: "2025-08-01"
  revised: "2025-08-01"
  text: |
    Even accepting ***WUCHANG: Fallen Feathers*** as one of the highest-quality soulslike games in recent years, above *Lies of P* (2023) in its base form, admiration has a hard ceiling, because the flaws are too glaring to forgive. The positives are substantial. The looping map is the closest any studio has come to FromSoftware's interconnected world design since *Dark Souls* (2011), forcing the player to build their own mental model of the environment rather than following a prescribed path. Most environments are visually impressive, at least on par with *Lies of P* (2023) in presentation, and chapters four and five achieve a narrative density one might call 'The City of Fading Light': civilisational layering so thick that each new room reads as an archaeological stratum. Most memorably, ***WUCHANG*** subtly changes soulslike combat in a way few imitators manage: the counter mechanic and generous dodge windows produce a quality one can only describe as 'at once slow and fast', a rhythm in boss encounters that feels simultaneously deliberate and urgent.

    Which makes the self-inflicted damage all the more bewildering. Why did the team decide that a female protagonist in a game of this ambition needed to be dressed in a manner so obviously calibrated for the male gaze? The public-facing focus on lead developer Xia Siyuan also sits uneasily beside credits that plainly record a large collaborative effort. These are not incidental objections; they are structural. The male gaze in a game that asks to be taken seriously as art is not a marketing decision that can be bracketed off from the work itself; it is an aesthetic position, and an indefensible one. The crassness obscures a game worth admiring, and the crassness makes it sad rather than merely irritating. ***WUCHANG*** deserved better from its own creators.

- title: "SIGNALIS"
  type: "game"
  creator: "rose-engine"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/signalis.jpg"
  posted: "2025-07-29"
  revised: "2025-07-29"
  text: |
    Beyond the literal poems within it, ***SIGNALIS*** is itself a poem. As Elster moves step by step towards the depths of memory, circling the promise she made to Ariane, Böcklin's *Isle of the Dead* (1880) appears in different versions over and over: the same destination from different angles, the same grief in different light. But as she closes in on the truth, one instance of Böcklin's only *Isle of the Living* (1888) slips in. Not a resurrection, but something more fragile: holding a hand, feeling life again inside death itself.

    Rose-engine have made a game about totalitarianism, but its understanding of authoritarian violence is more precise than the word usually permits. The Eusan Nation is the GDR rendered in science fiction: propaganda posters in brutalist corridors, standardised designation codes (LSTR, STCR, KLBR), personality templates calibrated to prevent deviation. Replikas are manufactured from edited memories of dead humans, interchangeable labour units whose individuality is an engineering defect, whose erasure is not a side effect but the System's purpose. Ariane, whose desires the state deemed aberrant, was exiled to a deep-space mining mission to correct herself; Elster, a Replika built from fragments of someone else's life, carries memories she cannot verify as her own. The signal Ariane sends from Sierpinski is not a distress call but something closer to Chambers' *King in Yellow*: a forbidden transmission that corrupts every Replika it touches, dissolving the boundaries the state spent decades encoding. The game stages a question Philip K. Dick spent his career circling: what happens to identity when memory is inherited, edited, mass-produced, and the self is revealed as a copy of a copy with no original? That Elster and Ariane's love persists under these conditions is not sentimental; it is structurally defiant, an attachment the System was designed to make meaningless. One walks from the snowfield into the dream riddled with cancerous tissue, and before everything inevitably collapses, one fulfils the promise to the person one loves, embracing fate in Schubert's *Schwanengesang* (1829).

    The survival horror is not set-dressing; the resource scarcity, the claustrophobic corridors, the tank controls that recall the genre's origins all serve the thematic architecture. The mechanics reproduce the Replika condition precisely: limited, controlled, unable to simply overpower the world one was manufactured to serve. The six-slot inventory, so often treated as a quality-of-life irritant, belongs to the same logic of scarcity and control. To feel helpless is the point. To protest anyway is the other point. This is our most helpless, most honest protest against injustice.

- title: "Deemo II"
  type: "game"
  creator: "Rayark"
  creator_role: "by"
  year: 2022
  eval: "disliked"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/deemo-ii.jpg"
  posted: "2025-07-24"
  revised: "2025-07-24"
  text: |
    Is Rayark this confident in their own story? ***Deemo II*** is a rhythm game that has forgotten rhythm-game fundamentals. Almost no track is memorable; the saccharine narrative gatekeeps chart unlocks instead of complementing the music, so one is forced to wade through cutscenes that might charitably be called 'twee' to reach the next set of songs. The inexplicable decision to build an open world around a rhythm game turns what should be precise, focused sessions into something with no identity at all: neither a convincing exploration experience nor a competent rhythm game, but a strange, featureless hybrid of both.

    When the best track in the entire collection is Rachmaninoff, whose rubato and dynamic range expose how poorly the game's rigid timing windows handle music that breathes, the value proposition collapses. *Cytus 2* (2018)'s narrative made me cry several times; its chart design was consistently inventive. I cannot understand how Rayark, the same studio, managed to produce something this inert.

- title: "Deltarune"
  type: "game"
  creator: "Toby Fox"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "RPG"
  image: "/assets/images/thoughts/games/deltarune.jpg"
  posted: "2025-07-19"
  revised: "2025-07-19"
  text: |
    I hope I have simply aged out of it, but Toby Fox's ideas have not moved me since *Undertale* (2015). ***Deltarune***'s Chapter 2 delivers a narrative less affecting than its predecessor's and actively tedious, the puzzle design a pale echo of *Undertale* (2015)'s inventiveness, each new mechanic introduced and discarded before it can develop any weight. The dialogue retains Fox's signature warmth, and the combat system's bullet-hell encounters remain mechanically sound; but charm without stakes is a depreciating asset, and Deltarune has been spending it freely.

    The miracle of *Undertale* (2015) may never be repeated. Perhaps that is the point: *Undertale* (2015) was a game about the impossibility of return dressed as a game about choice, and Deltarune, deliberately or not, is proving the thesis. One returns to Fox's world and finds it smaller, dimmer, more familiar, and less strange. Whether that is a failure of the sequel or the inevitable physics of a second visit is a question Deltarune does not seem interested in asking.

- title: "The Wolf Among Us"
  type: "game"
  creator: "Telltale Games"
  creator_role: "by"
  year: 2013
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/wolf-among-us.jpg"
  posted: "2025-07-06"
  revised: "2025-07-06"
  text: |
    Most choices in ***The Wolf Among Us*** do not materially change the story; so what? The choices operate at the level of interpretation rather than consequence: they determine not what happens but what it means. When one chooses to tear off Grendel's arm or show mercy, the plot continues either way, but one's understanding of Bigby, and one's complicity in his violence, shifts. This is closer to how ethical life actually works: most moral decisions do not fork the universe, yet they constitute the person making them. One does not roleplay Bigby Wolf; one becomes him. The choice design never signals the correct answer, never tips its hand with a moral compass or a dialogue-wheel colour code, so decisions about interrogation under duress, violent enforcement, vigilante justice, and the economics of sex work arrive with a weight that games with vastly more 'real' consequence routinely fail to achieve.

    Ironically, in a story populated entirely by fairy-tale characters, one encounters more corruption, humanity, sin, and justice than in most games set in the ostensibly real world. Fabletown operates as a compressed allegory of late-capitalist urban life: its government, funded by wealthy donors, structurally guarantees that the rich dictate policy while the poor are administered. Glamour, the magic that lets non-human Fables pass as human, is a precise analogue to the economic prerequisites of social belonging: without it, one is banished, rendered invisible or criminal by default. The Crooked Man runs a parallel welfare state, loans and employment and black-market glamour, extracting debt bondage in return; the sex workers at the Pudding & Pie are enslaved through enchanted ribbons that literally silence them. The metaphor and the mechanism are identical: marginalised people cannot speak because the structure of their exploitation forbids it.

    Bigby himself embodies the contradiction of state violence. As sheriff, his brutality is legal; as the Big Bad Wolf, it is monstrous; the game forces one to negotiate this line in real time, knowing that both modes serve the same institutional apparatus. The democratic trial at the end replaces a boss fight with a civic process. The Crooked Man mounts a genuine defence: 'When your government abandoned you, I was there.' Depending on one's earlier conduct, some citizens believe him. The verdict is predetermined, but whether the community accepts the outcome depends on how power was exercised throughout; and the game ends not with resolution but with Nerissa's ambiguous confession, a final reminder that systemic injustice survives the removal of any individual villain.

- title: "Death Stranding: Director's Cut"
  type: "game"
  creator: "Kojima Productions"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/death-stranding-directors-cut.jpg"
  posted: "2025-07-01"
  revised: "2025-07-01"
  text: |
    Where is the meaning? Kojima's story of reconnection now asks to be read through the age of pandemic and disaster, but ***Death Stranding*** delivers that story in the most detached, alienated way possible. Take BB: rather than allowing Sam and BB's bond to form through felt experience, soothing BB is coded as a chore, a mechanical obligation, so that the endless crying reads less as emotional content and more as system noise. The disconnect is symptomatic. Player assistance for other players is registered through 'likes', a term that in social media has been so thoroughly alienated from genuine connection that using it here does not subvert the emptiness but replicates it. If this is intentional commentary on the hollowness of digital solidarity, the game never earns the ironic distance that would make the commentary legible.

    Is the fetch-quest loop of gathering resources to build roads fun? No. Is ten minutes of gameplay followed by ten minutes of cutscene a defensible structure? No. The traversal, at its best, has a meditative quality, and the world is visually arresting in its desolation; but meditation without purpose is just waiting, and *Death Stranding* (2019) asks the player to wait a great deal. And now A24 is making a film. Privately, I think film was always the ideal form for this material: Kojima's instincts are cinematic, his pacing is cinematic, and the interactivity here feels not like an enrichment of the story but an interruption of it.

- title: "Stellar Blade"
  type: "game"
  creator: "Shift Up"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "action"
  image: "/assets/images/thoughts/games/stellar-blade.jpg"
  posted: "2025-06-25"
  revised: "2025-06-25"
  text: |
    Setting aside the fanservice, one has to ask: is ***Stellar Blade*** even a good game? In a genre glutted with action RPGs, it barely passes. Shift Up appear committed to wasting the player's time: countless unskippable animations, a camp recovery sequence that runs at least eight seconds, a desert city teleport clocking half a minute, every line of dialogue gated behind a two-second skip delay. Does Shift Up believe their writing merits this enforced attention? And the action system, stripped of its visual polish, offers nothing cognitively demanding beyond repeating the circuit.

    The platforming is a disaster. Eve's turning radius spans at least two body-widths; ledge-grab detection is opaque at best; her running momentum is set absurdly high, as though the movement designers and the level designers never spoke. The plot sits at kindergarten level, all its exposition dumped rather than dramatised, and the combination of forced cutscenes and mechanical shallowness produces a peculiar compound boredom: not the boredom of nothing happening, but the more insulting boredom of a game that believes a great deal is happening while the player can see it is not. If this passes as a good action RPG, there is no saving the current triple-A market.

- title: "Lies of P: Overture"
  type: "game"
  creator: "Round8 Studio"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/lies-of-p-overture.jpg"
  posted: "2025-06-17"
  revised: "2025-06-17"
  text: |
    I set down the controller in tears at chapter five. A fighter I had admired throughout the journey, steadfast across hours of ruin and brutality, suffers, struggles, and falls apart completely, and the moment strikes with a force that I was not prepared for. ***Lies of P: Overture*** has spent every preceding hour earning that collapse: the snow-covered zoo, the blood-red roses, the long passage through a city in its final winter. Round8 build each area with a specificity that rivals the best of the base game, and the DLC weaves them into a continuous elegy for a civilisation that the player pieces together brick by scarred brick. By the time the collapse arrives, it does not feel like a plot point. It feels like a personal loss.

    One did not expect Round8 to improve on *Lies of P* (2023) this clearly. The combat is tighter, the environmental storytelling denser, the emotional depth greater; the new areas carry their own atmospheres with a confidence that suggests a studio working at the height of its powers. The DLC is extension and deepening at once, a work that retroactively enriches the game it grows from. The original was already the strongest soulslike outside FromSoftware's own catalogue. ***Overture*** makes the case that Round8 are no longer operating in anyone's shadow.

    In honour of 'Legendary Stalker' Lea Florence.

- title: "Clair Obscur: Expedition 33"
  type: "game"
  creator: "Sandfall Interactive"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/clair-obscur-expedition-33.jpg"
  posted: "2025-05-04"
  revised: "2025-05-04"
  text: |
    Standing among the flags of Expedition 33 planted in the ruins of Lumière's walls, one still thinks back to the resolve and faith carried at the start. ***Clair Obscur: Expedition 33*** is a first-time studio's debut, and the fingerprints are visible everywhere: in the occasionally uneven pacing, in dialogue that sometimes strains for profundity it has not quite earned, in systems whose ambition outreaches their polish. The critical consensus has been warmer than the game's inconsistencies strictly warrant, and the 'game of the year' murmur feels premature.

    Sandfall Interactive have made a world worth remembering. The white great tree on the vast continent, the golden harvest fields, the sky-piercing endless tower, the ancient people's Babel, the solemn rock at the centre of the sea: each set piece is constructed with a visual confidence that belies the studio's inexperience. The turn-based combat borrows from the genre's best without quite synthesising its influences into something new, and the narrative, for all its ambition, resolves its main mysteries with more spectacle than substance. But I think I will still remember the harbour of Lumière a long time from now, and for a debut, that is not nothing.

- title: "Neva"
  type: "game"
  creator: "Nomada Studio"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "platformer"
  image: "/assets/images/thoughts/games/neva.jpg"
  posted: "2025-04-25"
  revised: "2025-04-25"
  text: |
    If *GRIS* (2018) demonstrated minimalist game design through its art and wordless level design, ***Neva*** takes that foundation and builds vertically: the same aesthetic sensitivity, now coupled with a combat system that gives the progression mechanical pressure *GRIS* (2018) lacked. Artistically, Neva has some of the most striking 2D side-scrolling art design one is likely to encounter in any given year. Some scenes contain spectacle so bold, so confident in its use of colour and scale, that the word 'beautiful' feels insufficient; Neva's images feel as though they had to exist. The world's collapse is conveyed with total clarity through visual language alone: no exposition, no dialogue, just the steady darkening of a palette and the encroachment of void.

    On level design, Neva retains *GRIS* (2018)'s key-and-lock structure but expands the protagonist Alba's movement vocabulary significantly: the increased mobility adds variety to the levels themselves, transforming platforming from a traversal necessity into something closer to expressive play. The puzzle difficulty stays low throughout, but this is not a flaw; it is a deliberate decision to keep the emotional throughline unobstructed. Four hours later, one realises with a start how deep the attachment to the wolf Neva has grown: the bond was never announced; it accumulated, silently, through proximity and shared danger, until separation became unthinkable.

- title: "Superliminal"
  type: "game"
  creator: "Pillow Castle Games"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/superliminal.jpg"
  posted: "2025-04-21"
  revised: "2025-04-21"
  text: |
    In the era of *The Stanley Parable* (2013) and *The Witness* (2016), one of the most brilliant ideas in the genre came from Pillow Castle with ***Superliminal***: using forced perspective to merge player subjectivity with the game itself, a conceit so elegant that the first half produces a nearly continuous sense of delight. The horror-adjacent content that surfaces in the second half also deserves credit for preventing the simpler puzzles from feeling quite as repetitive as they might otherwise.

    Unfortunately, the team did not have the right person for puzzle design. Compared to *Portal* (2007) and *The Witness* (2016), Superliminal falls into 'reskinned puzzle' territory in its second half: 'enlarge the object, climb the object, reach the next platform', repeated a dozen times over. However good the idea, however much is hidden in the margins, for a puzzle game the puzzles themselves still matter most. The concept deserved a sequel's worth of refinement; as it stands, Superliminal is a brilliant proof of concept that runs out of variations before it runs out of levels.

- title: "Lost Records: Bloom & Rage"
  type: "game"
  creator: "DON'T NOD"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/lost-records-bloom-and-rage.jpg"
  posted: "2025-04-20"
  revised: "2025-04-20"
  text: |
    I became a devoted Michel Koch fan through *Life Is Strange* (2015); when ***Lost Records: Bloom & Rage*** first announced him as director, I had full confidence in the story. It does not disappoint. Kat, fierce and loyal and carrying the weight of her family's collapse with a stubbornness that recalls Chloe Price at her most magnetic, made me relive the attachment and feeling I had a decade ago when I first played *LiS* (2015). Parting is hard; reunion harder. Koch has not abandoned his style under the pressure of today's faster-paced narrative games; he has doubled down, telling a slower, more patient, more immersive story than the market seems to demand.

    Who does not want to be young again and reckless, surrounded by friends who stick together through everything? Who does not want to help someone one cares about get back at the world, help them reach what seems impossibly far? Kat wrote in a letter: she knew the first time she saw me that we would be soulmates. I suddenly started crying. The camcorder mechanic and the 1995 setting give the game a texture that *Life Is Strange* (2015) never quite achieved: the physicality of VHS, the deliberate slowness of analogue memory-making, the way recorded images acquire weight precisely because they cannot be undone. Koch understands that nostalgia is not the emotion; it is the substrate on which other emotions grow.

- title: "Mutazione"
  type: "game"
  creator: "Die Gute Fabrik"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/mutazione.jpg"
  posted: "2025-04-16"
  revised: "2025-04-16"
  text: |
    The earth beneath the pap tree cracks open under the impact of the meteor Moon Dragon, and on the island left behind by the catastrophe, what blooms is diverse life and strange communion with nature. ***Mutazione*** is a game about aftermath: not the disaster itself, not the recovery, but the long, quiet period in which a community learns to live with what has changed. Die Gute Fabrik build this world with uncommon tenderness, each character carrying their own relationship to the catastrophe, their own accommodation with loss, their own small acts of renewal. The musical gardens are the purest expression of the game's ethos: one plants, one tends, one listens, and the garden responds not with reward but with beauty, which is not the same thing.

    When the pap tree scatters its white downy flowers again, when the fungi underground spread their glowing spores anew, when death is no longer an endpoint but a transition, one accepts all of this transience. And plants a flower field under the lighthouse by the sea. Mutazione does not argue for its vision of life and death; it simply presents it, with such warmth and such patience that resistance seems beside the point. A game about the specific miracle of things continuing.

- title: "The Unfinished Swan"
  type: "game"
  creator: "Giant Sparrow"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/unfinished-swan.jpg"
  posted: "2025-04-09"
  revised: "2025-04-09"
  text: |
    Less than two hours, and I was crying at the ending. ***The Unfinished Swan*** begins with the player's curiosity, and as the game progresses, it gradually reveals just how rich, vivid, and full of energy that curiosity is. If *What Remains of Edith Finch* (2017) is Giant Sparrow's family epic, a game in which mechanics and narrative fuse with rare artistry, then The Unfinished Swan is its first principle: play itself, the simple act of throwing paint into white space and watching form emerge, is sufficient to carry meaning.

    The creativity and novelty compressed into ninety minutes could fill a ten-hour puzzle game, but Giant Sparrow know when to stop. Each new mechanic, each shift in visual language, arrives at exactly the moment the previous one has been fully absorbed, so that the game's brevity feels not like a limitation but like an act of discipline. A game that makes one nod in quiet appreciation while playing. I am more excited about Giant Sparrow's next game than even *Edith Finch* (2017) made me.

- title: "Psychonauts 2"
  type: "game"
  creator: "Double Fine Productions"
  creator_role: "by"
  year: 2021
  eval: "disliked"
  genre: "platformer"
  image: "/assets/images/thoughts/games/psychonauts-2.jpg"
  posted: "2025-04-07"
  revised: "2025-04-07"
  text: |
    Desperately wanted to love this: *Super Mario Odyssey* (2017)-tier platforming, wonderfully eccentric art direction, brilliant visualisation of the brain and its pathologies. ***Psychonauts 2*** has the raw material for something exceptional, and Double Fine systematically bury it under padding. Hundreds upon hundreds of collectibles: some levels contain well over a hundred figments alone. Combat that is mechanically simple yet inexplicably drawn out, the system itself rough enough that encounters become endurance tests rather than engagements. A pointless RPG-lite progression system in which one can finish the entire game without upgrading anything. And a staggering excess of transition animations, some levels featuring animations that run longer than the actual playtime.

    All of these ideas, every one of them brilliant in isolation, could have been condensed into five sharp hours. *Astro Bot* (2024)'s precision-editing is the obvious comparison: a game that knows exactly how long each idea should last, and moves on the moment it has been fully expressed. Psychonauts 2 does not know this. Its ideas are diluted with collectible padding and constant cutaways until 'fun' becomes a memory of something one felt three hours ago. Watered-down fun is not fun.

- title: "The First Berserker: Khazan"
  type: "game"
  creator: "Neople"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/first-berserker.jpg"
  posted: "2025-04-05"
  revised: "2025-04-05"
  text: |
    In an era when most soulslikes emphasise spectacle and map exploration, ***The First Berserker: Khazan*** returns to the territory Team Ninja opened nearly a decade ago with the *Nioh* (2017) games and puts its faith in boss design. The premise is unfashionable: pattern memorisation as the primary skill, repeated attempts as the primary structure, incremental learning as the primary reward. Yet Khazan demonstrates that this oldest of soulslike values, properly executed, generates a satisfaction no amount of spectacle can replicate. In each attempt against every boss, the player earns both material rewards and mental growth; no single move feels arbitrary or unfair; after every failure one can articulate in a few seconds exactly why it happened, and identify a new window for counter-attack and defence.

    The Brink Guard and Brink Dodge system is elegant in its clarity: parry for posture damage at the risk of heavy stamina drain on mistiming, or dodge for safer but less aggressive play. Spirit generated through successful combat feeds into weapon skills, creating a positive feedback loop that rewards precision without punishing caution. Among the 3D soulslikes since *Lies of P* (2023), Khazan is the only one that truly demonstrates 'every boss fight is a dance': not a metaphor, but a structural description of the rhythm the encounters produce. The last ten bosses constitute a generational run of encounters. The story is negligible, the aesthetics consistent but uninspired, the side systems bloated; the team reminds one that making players study a boss, hone their technique, and reflect on themselves is one of the soulslike genre's neglected pleasures.

- title: "The Roottrees are Dead"
  type: "game"
  creator: "Jeremy Johnston / Robin Ward"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/roottrees-are-dead.jpg"
  posted: "2025-03-30"
  revised: "2025-03-30"
  text: |
    In the years after *Return of the Obra Dinn* (2018), the indie world did not quite know how to top it. Then the *Golden Idol* (2022) series arrived, and this 'fill-in-the-blank' detective genre found its era. Last year: *The Rise of the Golden Idol* (2024). This year: ***The Roottrees are Dead***, both using distinctive approaches to tell complex, bizarre stories; or rather, both designing precisely so the player pieces those stories together themselves. On that front, The Roottrees are Dead is exceptional: it takes what sounds like the most pointless mechanic imaginable, filling in a family tree, and transforms it into the key that unlocks dozens of narratives and an entire business empire. The act of connection, of linking name to face to relationship to motive, becomes the game's central pleasure, and the writing carries enough wit and enough darkness that each new discovery feels earned.

    The genealogical-detective conceit could easily have been a gimmick, but it is invested with enough narrative complexity that the family tree becomes a map of human frailty: marriages of convenience, inherited grudges, corporate machinations, the whole architecture of a dynasty built on secrets. Just for the writing, it is already worth it.

- title: "Hyper Light Drifter"
  type: "game"
  creator: "Heart Machine"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/hyper-light-drifter.jpg"
  posted: "2025-03-26"
  revised: "2025-03-26"
  text: |
    My favourite atmosphere and music in any indie game I have played, and my worst map design in anything I have played. ***Hyper Light Drifter*** is a game at war with itself. Heart Machine built a luminous world: the pixel art is radiant, the soundtrack carries a melancholy that saturates every screen, and the opening sequence promises something visionary. All of it evaporates into terrible pathfinding and a map so useless it might as well not exist.

    Heart Machine did not know how to design a navigational system, so they produced one that does not even clearly mark the player's position. They did not know how to design boss encounters, so they assembled a few that look impressive but carry no mechanical substance and leave no memory. Years from now I will still remember HLD's visuals. I will not remember anything else about the game. Now I understand why their follow-up *Hyper Light Breaker* (2025) stumbled in early access.

- title: "Ender Magnolia: Bloom in the Mist"
  type: "game"
  creator: "Adglobe / Live Wire"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/ender-magnolia.jpg"
  posted: "2025-03-24"
  revised: "2025-03-24"
  text: |
    The experience of playing ***Ender Magnolia: Bloom in the Mist*** is remarkably similar to playing *Blasphemous 2* (2023) after *Blasphemous* (2019): both incorporated modernised controls and extensive quality-of-life improvements over the original; both made previously opaque worlds and narratives clear and accessible; both elevated their respective series from cult classics to serious metroidvanias. Compared to *Ender Lilies* (2021), Ender Magnolia's world feels more alive, yet the end-of-days atmosphere has intensified rather than eased, a paradox the game sustains with impressive tonal control.

    Protagonist Lilac is the clearest improvement: more agentic, tougher, more fully human than her predecessor in *Ender Lilies* (2021). Where the first game's protagonist felt like a vessel, Lilac feels like a person, and the distinction shifts the emotional tenor of the entire experience. The map design is stronger too; each biome is clearly differentiated, and certain sections carry unmistakable echoes of *Hollow Knight* (2017). A sequel that earns its upgrades honestly.

- title: "OMORI"
  type: "game"
  creator: "OMOCAT"
  creator_role: "by"
  year: 2020
  eval: "hated"
  genre: "RPG"
  image: "/assets/images/thoughts/games/omori.jpg"
  posted: "2025-03-15"
  revised: "2025-03-15"
  text: |
    ***OMORI*** conflates psychological complexity with psychological cruelty. The game uses its protagonist's mental illness as a narrative device to inflict suffering on the player without ever interrogating why that suffering should be interesting or instructive. The aesthetic is carefully calibrated to look sensitive: soft pastels, a hand-drawn style that borrows the visual vocabulary of tenderness, an RPG framework that signals introspection. But the structure beneath the surface is not sensitive at all. It is manipulative in a manner that mistakes discomfort for depth, operating on the assumption that depicting harm at length is the same as examining it. Depression is not an excuse to aestheticise harm to others, and indie games are not an excuse to waste the player's time.

    The first thirty minutes demonstrate what the game might have been: focused, strange, unsettling in its deployment of RPG conventions against themselves. Everything after those thirty minutes is a steady dissipation of promise into tedium. The game asks for twenty to thirty hours and offers, in return, a trauma reveal that the structure has been pointing towards so transparently that the payoff registers as confirmation rather than revelation. One endures vast stretches of rote combat, fetch quests, and filler encounters that serve no narrative purpose, waiting for the game to return to the emotional precision of its opening. It does not.

- title: "Felvidek"
  type: "game"
  creator: "Jozef Pavelka & Vlado Ganaj"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/felvidek.jpg"
  posted: "2025-03-10"
  revised: "2025-03-10"
  text: |
    ***Felvidek*** contains a frontier's entire emotional geography in roughly five hours. Jozef Pavelka and Vlado Ganaj build their grey, rootless 15th-century Slovakia, then Upper Hungary, as a light RPG about an alcoholic knight wandering in the aftermath of conflict, surviving in the cracks between factions. Every decision feels like an attempt to find footing inside a structure already fated to collapse. The archival grain saturating every scene, the music carrying the weight of solitude: these are not period atmosphere for its own sake but compression as formal method, each detail forced to carry meaning that a longer game would dilute across dozens of hours.

    The game is almost the antithesis of Warhorse's *Kingdom Come: Deliverance II* (2025), yet both share an endless passion for the medieval Central European world. Where KCD2 builds at vast scale, painstakingly detailed and historically grounded, Felvidek achieves something similar through radical economy: five hours containing what longer RPGs spread across fifty. The writing is consistently surprising, consistently warm, consistently strange in a manner that feels authored rather than procedural; every line makes one think of the word 'charm'. And there was peace and love. My tears fell like rain.

- title: "Fountains"
  type: "game"
  creator: "John Pywell"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "action RPG"
  image: "/assets/images/thoughts/games/fountains.jpg"
  posted: "2025-03-09"
  revised: "2025-03-09"
  text: |
    Such a painful missed opportunity. ***Fountains*** has one of my favourite world designs of last year: every area and map feels perfectly grounded, and on the narrative side it draws on soulslike fragmented storytelling strengths, weaving the kingdom's intrigue, mystery, and history into something absorbing. The writing rewards attention without punishing inattention, offering multiple layers of meaning to those willing to look.

    But the final boss designs are terrible: no sense of interaction, punishing damage numbers, reminiscent of pre-patch Radahn's infamous period in *Elden Ring* (2022). The last two hours were spent lamenting the gap between ambition and execution. So many games start strong and collapse at the finish line. Games that sustain their quality from beginning to end are rarer than they should be.

- title: "Crypt Custodian"
  type: "game"
  creator: "Kyle Thompson"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/crypt-custodian.jpg"
  posted: "2025-03-08"
  revised: "2025-03-08"
  text: |
    One of the better metroidvanias of last year, and a regret not to have reached it before year's end. ***Crypt Custodian*** excels where the genre's best always do: in map design. Kyle Thompson's world is clearly differentiated by biome, each zone carrying distinct mechanical and environmental touchstones (the semi-transparent bricks and cinematic shutters are particular highlights), and the boss design has its own character. Compared to *Nine Sols* (2024) and *Fountains* (2024) from the same year, these bosses follow more of a 3D-Mario design philosophy: emphasising stage theatrics and choreography over pure mechanical punishment.

    The narrative is the one dimension that falls short: thinner than *Nine Sols* (2024) or *Fountains* (2024), the areas do not anchor clearly enough in the world, and certain zones feel slightly superficial as a result. But the interactive, satisfying combat and puzzles deliver a solid ten-hour run that never outstays its welcome. Recommended for cat-loving metroidvania enthusiasts, of which, apparently, there is no shortage.

- title: "Indiana Jones and the Great Circle"
  type: "game"
  creator: "MachineGames"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/indiana-jones-and-the-great-circle.jpg"
  posted: "2025-03-03"
  revised: "2025-03-03"
  text: |
    For a linear treasure-hunt game, the roughness is astonishing. ***Indiana Jones and the Great Circle*** suffers from an interactivity problem that feels a generation behind: even setting aside the many bugs and poor PC optimisation, the basic systems feel as though they belong to an adventure game from twenty years ago. Companion Gina constantly undermines the pleasure of reading clues, interrupting the experience of piecing things together, while remaining completely silent when one does things that should prompt a reaction. This plastic quality saturates the entire production.

    Some puzzles feel targeted at ten-year-olds. Perhaps Indiana Jones as a franchise does not care about realism or historical accuracy; fine. But the immersion-breaking mechanics and dialogue, combined with a hollow world with no exploratory pull, make everything after the Vatican, the first five hours, feel entirely redundant. At seventy dollars, it is astonishing that MachineGames thought that this was ready to ship.

- title: "Kingdom Come: Deliverance II"
  type: "game"
  creator: "Warhorse Studios"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/kingdom-come-deliverance-ii.jpg"
  posted: "2025-02-26"
  revised: "2025-02-26"
  text: |
    ***Kingdom Come: Deliverance II*** has a 'lived-in' quality that is almost unprecedented in open-world design. This is not the 'lived-in' of scattered environmental storytelling props or NPC daily routines, but something built into every system: food rots in Henry's pack, blood on his clothes makes strangers recoil, the world runs slowly, breathing, growing through conversations that the player will never witness. Historical currents spread through the bricks and cobblestones of town and village; the common people are caught in wars of succession, left helpless by the chaos around them. Henry himself carries the point: a blacksmith's son with no prophetic mandate, whose arc is not from weakness to power but from incompetence to adequacy. The world existed before the player arrived and will continue after the player leaves, indifferent to heroism. In my mind, this makes it a better game than *Baldur's Gate 3* (2023).

    Warhorse's real work is not the historical fidelity, though it is formidable; it is the moral weight they manage to give ordinary life. The peasants of Bohemia are not quest-givers; they are people, and the game's insistence on treating them as such is its most radical quality. When invaders burn and kill for their ideal nation, rationalising their cruelty in sleep with the conviction that it serves the country's good, Henry answers that he and they are not the same. And I, watching the strong and unbroken lives and spirits of Suchdol, cried out through tears. There is a question buried in every encounter, one that the game trusts the player to find without pointing at it: *are we really not the same?*

    My game of the year.

- title: "Kingdom Come: Deliverance"
  type: "game"
  creator: "Warhorse Studios"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/kingdom-come-deliverance.jpg"
  posted: "2025-02-05"
  revised: "2025-02-05"
  text: |
    After everything, I will still watch the sun set over the forests of Pribyslavitz, see the afterglow light the empty fields to the south, watch Bohemia burn, watch the poor dance to Czech tavern songs in the midst of hardship. ***Kingdom Come: Deliverance*** built a medieval world with a commitment to historical specificity that, at the time, felt almost reckless: no magic, no minimap, no concession to the conventions that open-world RPGs had spent a decade calcifying into expectation. The game's philosophical distinction is its rejection of the RPG genre's foundational myth: that the player-character is special. Henry begins illiterate, incompetent in combat, and socially invisible. One opens a book and sees gibberish until a scribe teaches letters; one swings a sword like a man who has never held one; nobles dismiss one because he is dressed in mud-caked rags, outside the fantasy of menu-selected status. The historical fidelity is not decoration; it is the design grammar, an epistemological statement that knowledge, competence, and social standing are earned through practice, not menu selection.

    By the end, Henry occupies an unusual narrative position: the nobility's agent in peasant society, a go-between who belongs fully to neither world. He is condemned for raising a hand against a nobleman regardless of provocation, and the game treats this not as a flaw but as a feature of the society it depicts. Kingdom Come is consistently sympathetic to pariahs and aware the world it renders is unjust, yet it refuses to let one simply opt out of that injustice; one navigates it, and in navigating it, becomes complicit. The first game was rougher than its sequel, more buggy, more uneven in its systems; but the roughness was part of the texture, inseparable from the ambition. Drawing a sword was rarely the first or best choice. The private religious doubts, the sympathetic treatment of dissenting sects, the way actions carry consequences across social, moral, and mechanical dimensions simultaneously: all of it produces a world with the quality of persistence, one that exists before the player arrives and will continue after the player leaves. I will never forget my Bohemian village. I will never forget my Bohemian dream.

- title: "Minishoot' Adventures"
  type: "game"
  creator: "SoulGame Studio"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/minishoot-adventures.jpg"
  posted: "2025-01-21"
  revised: "2025-01-21"
  text: |
    Sorry to have missed this metroidvania gem before the year ended; only found out about it in January. ***Minishoot' Adventures*** delivers around ten hours of map design so accomplished that it produces a slight *Hollow Knight* (2017) flashback: biomes clearly differentiated, each area sustaining its own mechanical identity, transitions handled with a confidence that belies the studio's size. But the deeper lineage is top-down Zelda. The heart-based health, the ability-gated progression, the secret areas hidden behind visual cues legible enough that missing one traces to the player's own path, the dungeon layouts that route short paths back to boss rooms from respawn points: all of it descends from *A Link to the Past* (1991)'s design philosophy, transplanted into a twin-stick shooter framework that should not cohere and somehow does. The maps are deliberately hard to find, forcing one to learn terrain through memory, and the reward density is near-unprecedented: positive reinforcement roughly every five minutes, experience accruing even during failed boss attempts. A game that respects the player's time, the player's intelligence, and the player's wallet with equal discipline.

    In a year when *Nine Sols* (2024) brought deflection-combat metroidvania to a new peak and *Animal Well* (2024) turned the genre into a puzzle box, Minishoot' Adventures was the quiet third option: the game that asked no grand questions and simply delivered ten hours of impeccably paced design. SoulGame Studio work within the constraints of their top-down shooter format with admirable discipline, keeping the difficulty balance precise throughout and never mistaking length for value. Not every game needs to be a narrative event; some need only to be generous, and Minishoot' Adventures is generous in the way that the best small-scale games are: with its time, with its ideas, with its evident affection for the genre it inhabits.

- title: "Armored Core VI: Fires of Rubicon"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action"
  image: "/assets/images/thoughts/games/armored-core-vi.jpg"
  posted: "2024-12-25"
  revised: "2024-12-25"
  text: |
    ***Armored Core VI: Fires of Rubicon*** tells its story with a directness that breaks entirely from the studio's usual method. Where *Elden Ring* (2022) and the *Dark Souls* series scatter their narratives across item descriptions and architectural hints, trusting the player to assemble meaning from fragments, Armored Core VI names its factions, states its stakes, and lets the player feel the weight of each decision without requiring a wiki. Director Yamamura said the team wanted players to understand what they were fighting for and why; the surprise is how much this costs nothing. The emotional precision is immediate, the investment in radio chatter producing interpersonal bonds that FromSoftware's oblique storytelling cannot. A mech game should not have stirred this many emotions in someone with zero mech interest; yet the directness cuts through genre, and the story connects.

    C4-621 begins as inventory: a Fourth Generation augmented human who sold their body for experimentation due to debt, deemed surplus, and handed to Handler Walter as a tool. Walter is a childhood survivor of Rubicon's first catastrophe, his father's Coral research having killed his mother; his fixed idea, that where there is Coral there is blood, drives every mission. The assembly system mirrors the narrative: Yamamura identified it as the word that defines Armored Core, a form of character-building in which the player constantly optimises in response to challenge, and the freedom to rebuild on the death screen means that the solution to a boss is never only mechanical mastery but also design. Across three playthroughs, 621 grows from weapon to person. The first cycle offers two endings: destroy all Coral with Walter, or preserve it with Ayre. In the Liberator route, Walter, brainwashed and piloting a Coral-powered machine, overcomes his conditioning in his final moment: '621, you made a friend.' It is the game's most devastating line, because it names exactly what 621 has become and what Walter never expected to care about.
    The moment the Xylem surfaced, I froze. The feeling was immediate and specific: the same vertigo one gets seeing Gransax draped across Leyndell in *Elden Ring*, or the amygdala hanging from the cathedral in *Bloodborne* (2015). FromSoftware understand, perhaps better than any studio working, that scale is not spectacle; it is a tool for producing the sublime, and the sublime is an emotion, not a visual effect. The third ending, available only after both prior routes, is titled 'Alea Iacta Est': the die is cast, Caesar crossing the Rubicon, and now 621 and Ayre scatter Coral across the stars on their own terms, neither Walter's destruction nor the corporations' exploitation but something that belongs to them alone. Armored Core VI is a power fantasy, but the power it fantasises about is not destruction; it is autonomy, and the game earns it by making the player live through every alternative first.

- title: "1000xRESIST"
  type: "game"
  creator: "sunset visitor 斜陽過客"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/1000xresist.jpg"
  posted: "2024-12-16"
  revised: "2024-12-16"
  text: |
    I could not have predicted that a half-visual-novel would dismantle me like this. ***1000xRESIST*** is the most searing narrative I have encountered in games: a science-fiction story about memory and forgetting that becomes a sustained act of self-examination, individual trauma and collective history folding into each other until neither can be separated from the other.

    The prologue opens as a farewell ceremony. Iris opens a suitcase and examines its contents; the items are ordinary, which is precisely why they wound. Her father brings longevity noodles on her birthday; she only wants pizza. Her mother Clara's flat instructions, 'bring a jacket, do not catch a cold', 'do not sleep with wet hair', sound mundane and arrive like chains. Iris's rebellion is not a rejection of family but an attempt to escape the weight of inherited memory. Against this, Jiao's arc mirrors the immigrant identity crisis in miniature: she tries desperately to belong, to mirror Iris, to earn closeness, and receives only coldness. The depiction of trauma is precise and unsparing. Clara's sleepwalking re-enacts the 2019 Hong Kong protests without her knowledge: she strikes the balcony glass at night, the image inseparable from police batons and bloodied faces. These wounds pass from mother to daughter through language and behaviour until the cycle devours everyone. The game's deepest complication is that memory itself is unreliable: altered, rewritten, weaponised, so that one is never certain whether Clara's betrayal was real or fabricated to justify what follows. This ambiguity *is* the generational trauma chain: unresolved guilt becomes the foundational wound of the entire Sisters' civilisation, every clone inheriting the consequences of a violence whose justification may be a lie. The Occupants, the game's colonisers, refine human suffering into resource, creating diseases that make people weep without cease so that memory can be harvested.

    But most of all, this is a story about the question that lives inside every suitcase: what one chooses to carry and what one chooses to leave behind. The final trial forces a reckoning: whose memory enters the future, whose remains in the past. Some things cannot fit in the backpack. The black umbrellas drifting through subway corridors, the blood, the narrow lanes between tower blocks, the farewell words repeated across generations: these are both the history one cannot escape and the foundation on which one walks forward. Letting go is not betrayal; it is courage.

- title: "Portal 2"
  type: "game"
  creator: "Valve"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/portal-2.jpg"
  posted: "2024-12-12"
  revised: "2024-12-12"
  text: |
    The story is more complete than the first game; that alone would be sufficient. But ***Portal 2*** does something far more interesting: it uses Cave Johnson's abandoned testing facility as a descent through Aperture Science's corporate archaeology, each stratum revealing a different era of ambition, failure, and institutional decay. The puzzles in the old facility are among the best in the series because they are unusually legible, each solution flowing from the environment's own logic rather than from the player's internalised puzzle-grammar. When Johnson's pre-recorded voice fills the condemned corridors, narrating the company's past with a manic optimism that the surroundings thoroughly contradict, the comedy achieves something rare: it is both funny and sad, the joke and its punchline occupying the same space.

    Valve's creativity at its peak: a game in which the writing, the level design, and the puzzle mechanics move as one system. The gel puzzles alone represent more invention than most studios produce in an entire catalogue. That Portal 2 manages to be simultaneously a legitimate sequel to one of the most perfectly designed games ever made and a complete reimagination of its possibilities makes one wonder why more studios do not simply try harder.

- title: "Portal"
  type: "game"
  creator: "Valve"
  creator_role: "by"
  year: 2007
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/portal.jpg"
  posted: "2024-11-30"
  revised: "2024-11-30"
  text: |
    In 2005, Nuclear Monkey Software released *Narbacular Drop* (2005), a student project built around placing two portals. After a brief demo for Gabe Newell, Valve hired the entire team and gave them the freedom to develop ***Portal***. Two years later, it launched bundled with *Team Fortress 2* (2007) and *Half-Life 2: Episode Two* (2007), three games that together pushed puzzle and narrative design forward. Portal's minimalism is its genius: a single mechanic, rigorously explored, coupled with a narrative voice so distinctive that it became a cultural reference point within months of release.

    Seventeen years later, games that can stand alongside Portal's puzzle design can be counted on one hand. The reason is not difficulty but clarity: every chamber teaches exactly one thing, tests exactly one application, and moves on before the player's attention can wander. The community that followed, the mods and fan-made maps, the speedrunning scene, all testify to the depth hidden within that apparent simplicity. People often say Portal is the ideal 'gateway game', the title one hands to someone who has never played a game and says 'start here'. There is a reason for that, and the reason is not accessibility; it is respect.

- title: "Mouthwashing"
  type: "game"
  creator: "Wrong Organ"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "horror"
  image: "/assets/images/thoughts/games/mouthwashing.jpg"
  posted: "2024-11-29"
  revised: "2024-11-29"
  text: |
    A rare non-linear psychological horror narrative whose complexity is justified. ***Mouthwashing*** parcels its story into chronologically scrambled fragments, and by the time one has pieced together the full account of the shipwreck and the mouthwash, the revelation closes like a trap: the cowardly, weak, selfish one was not the character one suspected but the character one inhabited. The perspective shift is handled with precision; the horror is less in the events themselves than in the slow recognition that one's own assumptions enabled the deception.

    Singular, but it ends up feeling like non-linear storytelling for non-linearity's sake, which keeps it from the highest tier. The scrambled chronology produces surprise, but the surprise is structural rather than emotional: one admires the construction without being devastated by it. A game that demonstrates mastery of its chosen technique while stopping just short of exceeding it.

- title: "Outer Wilds: Echoes of the Eye"
  type: "game"
  creator: "Mobius Digital"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/outer-wilds-echoes-of-the-eye.jpg"
  posted: "2024-11-27"
  revised: "2024-11-27"
  text: |
    ***Outer Wilds: Echoes of the Eye*** asks the player the same question that the base game asked, *what happened here?*, and answers it with the same method: by placing the evidence in plain sight and trusting the player to assemble the narrative from observation alone. A few puzzles stumble into frustration, but each discovery peels back another layer of the Stranger's history, from the nature of its inhabitants to the reason the Nomai came to this solar system in the first place, until the whole vessel becomes legible as a single act of grief.

    Nearly three hundred thousand years of history across three species, and Mobius Digital buried all of it in architecture, corpses, and slide reels, trusting that curiosity alone would be enough to recover it. The Stranger is a nested sequence of answered questions: each revelation completes a previous mystery and opens the next, and the structure holds because Mobius Digital understand that the best mysteries are inhabited, not solved. The Owlks destroyed the satellite that could have led the Nomai to the Eye and then sealed themselves inside a simulation of their own past, preferring an imitation of home to a universe they had decided was hostile. Their fear is the mirror image of the Nomai's curiosity, and the DLC earns that contrast by letting the player discover it through the same method: following the evidence until the architecture tells its own story.

    At the centre of all this is the Prisoner, the single Owlk who disagreed with sealing the signal, who was locked away for the crime of wanting to share what they had found. The Prisoner's cell is the last room in the DLC, and reaching it requires the player to confront every piece of the Owlks' fear: the darkness, the simulation, the locked vaults, the elk-like figures that patrol a world built to keep a secret. When one finally meets the Prisoner and shows them what their act of defiance made possible, that the signal reached the Nomai, that the Nomai built the Ash Twin Project, that someone came, the Prisoner offers a vision of the Eye and fades. By the end one has not decoded a plot so much as kept company with the dead, and the campfire at the centre of the Stranger becomes, like the campfire at the end of the base game, a place where grief and gratitude are the same thing.

- title: "Outer Wilds"
  type: "game"
  creator: "Mobius Digital"
  creator_role: "by"
  year: 2019
  eval: "loved"
  pin: true
  pin_order: "04-game-01"
  genre: "adventure"
  image: "/assets/images/thoughts/games/outer-wilds.jpg"
  posted: "2024-11-26"
  revised: "2024-11-26"
  text: |
    In the last few hours of experiencing ***Outer Wilds***, I cried many times. The Nomai arrived in this solar system chasing a signal older than the universe itself and built the Ash Twin Project to locate its source. But the Interloper, a rogue comet carrying ghost matter, extinguished them before the project could activate: an entire civilisation's curiosity cut short by physics. Centuries later, the project fired on its own, launching 9,318,054 probes across as many loops until one finally located the Eye of the Universe. The Nomai's question was answered two hundred and eighty thousand years after their extinction, in a universe that no longer contained anyone who had asked it.

    Mobius Digital built a solar system that is a philosophical instrument: small enough to be fully knowable, large enough to produce awe, and governed by physics precise enough that every discovery feels earned rather than scripted. Each planet is a self-contained thought experiment: Brittle Hollow collapses into its own black hole as one explores it; the Hourglass Twins exchange their sand on a timer that reshapes both surfaces; Dark Bramble folds impossible space inside a seed, its anglerfish enforcing stillness as a survival mechanic. The time loop is the game's argument: a structural claim that knowledge, once acquired, cannot be unlearned, and that the accumulation of understanding across repeated failures is itself a form of progress. One could, in theory, finish the game on the very first loop; the barrier between the opening campfire and the final one is ignorance alone, and the game does nothing to lower it except let one look. The player's body resets every twenty-two minutes. The player's mind does not.

    The hours spent reading the Nomai's words prepare the ending. They wrote on walls in branching threads: arguments about orbital mechanics, jokes about Pye's cooking, excitement when a probe returned new data, grief when Escall's vessel was lost. They were scientists who collaborated with the enthusiasm of children and the rigour of people who understood that the universe would not wait for them. Across dozens of loops one assembles their voices from scattered ruins, and by the time the Ash Twin Project's purpose becomes clear, the Nomai are no longer a dead civilisation. They are people whose question one has inherited. The game does not sentimentalise this; it simply lets the accumulation do its work, until carrying their knowledge to the Eye feels less like completing an objective and more like keeping a promise that no one asked one to make.

    The ending breaks me. One carries the knowledge of an entire dead civilisation to the Eye of the Universe, and the final act is a campfire: the player's companions gather, each contributing an instrument, and the music they play together becomes the seed of whatever comes next. The universe ends. It was always going to end. The game's last argument is that the point was never to prevent the supernova but to have been the kind of people who sat together and played music while it happened. Unbelievable: just writing this, I am about to cry again.

- title: "Quantum Break"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2016
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/quantum-break.jpg"
  posted: "2024-11-24"
  revised: "2024-11-24"
  text: |
    David Bowie once said that when one's feet no longer quite touch the bottom, one is in the right place to do something exciting. ***Quantum Break*** is Remedy at their most submerged. Originally pitched to Microsoft as an *Alan Wake* sequel, the project was redirected into a new IP when Microsoft rejected the sequel but embraced the live-action concept, and Remedy responded by building the most ambitious hybrid of game and television that anyone had attempted. Live-action episodes directed by Ben Ketai air between gameplay acts, each roughly twenty minutes long, telling the villain's story while the game tells the hero's; Aidan Gillen's Paul Serene and Lance Reddick's Martin Hatch carry the show with performances that earn the format's risk. The time-manipulation combat is specific and inventive: one freezes enemies in chronon bubbles, stacking bullets into a suspended sphere that detonates on release; one dashes through a cargo ship crashing into a lift bridge while time stutters freeze and release the wreckage around it. The studio has acknowledged that they could have gone further in fusing the two halves, and this is fair: some episodes lean on green-screen a touch too visibly, and a few Monarch subplots do not earn the time that they borrow from the game's momentum. But no other studio has come this close to making the hybrid format feel designed rather than grafted.

    Paul Serene (Gillen) survives the End of Time, a white void in which every living thing on Earth has frozen permanently, and returns to 1999 via time machine. He spends seventeen years building Monarch Solutions to save humanity, or at least the fraction of it that he can fit into the Lifeboat Protocol. Every intervention that he attempts to prevent the catastrophe causes the very events that he sought to avert: the game adopts the Novikov self-consistency principle without naming it, and Paul's arc is the emotional proof. He began as a hopeful interventionist and ended as a resigned fatalist who stopped trying to change the future and started preparing to outlast it. Beth Wilder (Courtney Hope), who has lived the closed loop and seen her own death, responds with nihilistic despair. Jack Joyce (Shawn Ashmore), who refuses to accept inevitability, responds with defiance. The four Junction Points where control passes to Paul and the player chooses his response give the feeling of agency while the overarching outcome remains fixed, and the kindest reading of free will that the game permits is that one may choose the character of one's suffering. Paul's Chronon Syndrome (the degenerative condition that the same radiation inflicted on Jack) makes the hero's future mirror the villain's past. Jack's closing scene, in which he begins to see split futures exactly as Paul did, is not a sequel hook; it is the time loop completing itself.

    ***Quantum Break*** was the first game built on Remedy's Northlight engine, and the lessons that it taught are visible in everything the studio made afterwards. The multimedia confidence that produced *Control* (2019)'s Threshold Kids puppet shows and Dr. Darling's video recordings, and *Alan Wake 2* (2023)'s fully integrated live-action sequences, grew directly from what ***Quantum Break*** proved was possible and what it proved still needed work. The echoes run deeper than craft. Shawn Ashmore returns in *Alan Wake 2* as Sheriff Tim Breaker, a man who dreams of being 'someone else, a different person with a different name living a different life' and feels 'adrift in time'. Lance Reddick's Martin Hatch, who entered a threshold and gained access to all realities, resurfaces conceptually as Mr. Door. Courtney Hope, who played Beth Wilder here, became Jesse Faden in *Control*; the Night Springs DLC acknowledges the doubling with an entity named 'Jesbet'. ***Quantum Break*** is not officially part of the Remedy Connected Universe, because Microsoft owns the IP, but the universe remembers it anyway: the scar tissue is structural.

- title: "The Rise of the Golden Idol"
  type: "game"
  creator: "Color Gray Games"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/rise-of-the-golden-idol.jpg"
  posted: "2024-11-18"
  revised: "2024-11-18"
  text: |
    The surface presentation is a fill-in-the-blank puzzle exercise. Underneath it, ***The Rise of the Golden Idol*** builds on the detective framework of the original *Golden Idol* (2022) to tell a far more sweeping story: social engineering, memory, individual identity, shared human enlightenment, all inside a game that asks the player, mechanically, to drag words into slots. Color Gray Games do not answer these questions so much as create the conditions under which the player cannot avoid asking them. Each case unfolds as a self-contained scene, but the narrative that accumulates across them is architecturally precise, every apparently isolated incident connected to a larger pattern that the player apprehends gradually, the way one would in a real investigation.

    The *Golden Idol* series deserves to sit in the history of detective games alongside *Return of the Obra Dinn* (2018). Where Obra Dinn presents a single unfolding mystery with a fixed temporal logic, Golden Idol builds its world case by case, each scenario a window into a different corner of the same society, the moral picture sharpening as the player moves through it. I have not been this absorbed in a puzzle game in a long time.

- title: "文字遊戲"
  title_en: "Word Game"
  type: "game"
  creator: "Team9"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/word-game.jpg"
  posted: "2024-11-14"
  revised: "2024-11-14"
  text: |
    Moving: both because of the ending's astonishing shift in angle and scene, the origin story told quietly and precisely, and because a small studio in Taiwan could make something this singular with such care. ***Word Game*** (文字遊戲) takes the radicals, components, and strokes of Chinese characters, even the choice of vocabulary itself, and plays with them in uniquely inventive ways that constantly prompt 'That was right there! How did I not see it!' The puzzles are not merely linguistic; they are structural, each one revealing something about the way meaning is encoded in Chinese writing that one has lived with for decades without noticing.

    Taiwan has been producing a striking number of games rooted in Chinese culture: *Nine Sols* (2024), Word Game from 2022. Both demonstrate what happens when cultural specificity is treated not as flavour but as foundation: the game's mechanics are inseparable from the writing system they inhabit, creating something that cannot be translated, only experienced. A game that makes the familiar strange and the strange legible.

- title: "Silent Hill 2 (Remake)"
  type: "game"
  creator: "Bloober Team"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/silent-hill-2-remake.jpg"
  posted: "2024-11-03"
  revised: "2024-11-03"
  text: |
    One moment complaining about the obscure puzzles; the next, weeping over the letter Mary wrote. ***Silent Hill 2*** has always been a game about the distance between what one knows and what one is willing to know, and Bloober Team's remake preserves that distance with remarkable fidelity. The updated visuals serve the horror rather than diluting it: Toluca Lake is more oppressive, the fog thicker, the creature design more viscerally uncomfortable, and the environmental detail dense enough that returning to previously visited spaces produces genuine unease rather than familiarity.

    Did Mary want release? I do not know. I only know her apology was undeserved, and James is a piece of work. The brevity of that judgment is the point: after everything the game puts the player through, after the water, the moths, the nurses, the pyramid, the final letter, what remains is not understanding but conviction. One does not leave *Silent Hill 2* (2001) with answers. One leaves it with a feeling, and the feeling is closer to complicity than catharsis.

- title: "Red Dead Redemption 2"
  type: "game"
  creator: "Rockstar Games"
  creator_role: "by"
  year: 2018
  eval: "meh..."
  genre: "open world"
  image: "/assets/images/thoughts/games/red-dead-redemption-2.jpg"
  posted: "2024-11-02"
  revised: "2024-11-02"
  text: |
    The story flows beautifully, delivery direct and moving; one cries at predictable moments and at unpredictable ones, and the craft is impossible to deny. But I kept yawning through the gameplay. ***Red Dead Redemption 2*** asks the player to spend an absurd amount of time riding horses through scenery that, in motion, is often far less visually arresting than it is in screenshots. The open world is vast and detailed and has very little to say about its own vastness; the detail exists to be noticed, not to be meaningful.
    Another game that would suit adaptation far better than it suits the medium; another game that does not respect the player's time. Rockstar's commitment to cinematic pacing in an interactive medium produces a peculiar friction: the story wants to move; the systems want to linger; the player sits between them, wondering when permission to proceed will be granted.

- title: "Alan Wake Remastered"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan-wake-remastered.jpg"
  posted: "2024-10-31"
  revised: "2024-10-31"
  text: |
    ***Alan Wake*** was always reaching for something that the 2010 studio did not yet know how to hold. The manuscript pages scattered across Bright Falls, describing events that have not happened yet, are a brilliant formal device: they turn the player into a dramatically ironic audience, forewarned of coming horrors but powerless to rewrite the script, and they literalise the game's question about authorial control in a way that no other game had attempted. The episodic TV-season structure, complete with 'Previously on Alan Wake' recaps, carries real pacing intelligence. Thomas Zane's recursive presence, a poet who wrote himself out of existence and may have written Alan into it, anticipates by thirteen years the metafictional architecture that *Alan Wake 2* (2023) would build its entire identity around. Sam Lake has said that if he could remake the game, there would be 'less dark forests and more gameplay variety', and that acknowledgement names the problem precisely: the flashlight-and-gun loop, in which one burns away a darkness shield before finishing enemies with conventional weapons, is tactically interesting for about two hours, then repeats with insufficient variation across six episodes of near-identical forest trails leading to near-identical cabins. The combat does not evolve; the environments do not diversify; the slow-motion dodge, inherited from *Max Payne* (2001), provides the only mechanical punctuation in encounters that blur together long before the story reaches its climax.

    The Remastered edition (2021) offers a visual upgrade to 4K but changes nothing structural: it is the best version of a game whose problems are not cosmetic. Going back to it after *Control* (2019) and *Alan Wake 2* makes the distance of a generation unmistakable. The pieces that Remedy would later assemble into two of the most inventive games of their respective decades are all here, scattered and unfinished, like manuscript pages that someone dropped in the woods and never collected.

- title: "Alan Wake 2: The Lake House"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan-wake-2-lake-house.jpg"
  posted: "2024-10-26"
  revised: "2024-10-26"
  text: |
    Research Facility WA-03 sits on the shores of Cauldron Lake, built after the 2010 Altered World Event, and the Federal Bureau of Control's Research Department has been running two experiments inside it. Project Arbutus: imprison Rudolf Lane, a parautilitarian painter, force him to produce work, and harvest the results, because Cauldron Lake turns art into reality. Project Rhamnus: fill rooms with typewriters that reproduce Alan Wake's manuscript text algorithmically, in the hope that soulless replication can do what Wake's imagination did. ***Alan Wake 2: The Lake House*** is a three-hour argument that art cannot be contained, coerced, or automated; that the attempt to industrialise creation produces not meaning but monsters. Lane's rage eventually materialises as the Painted: tall, gaunt, barely humanoid figures that emerge from canvas and painted walls, the first enemy type in any Alan Wake game that light cannot harm. The Bureau's own founding premise, that paranatural forces can be safely contained through institutional procedure, collapses when the contained artist's emotions are the mechanism of the paranatural force.

    Agent Kiran Estevez (Janina Gavankar) responds to the AWE alert and enters the facility alone. She carries no paranatural abilities, no Mind Place, no Writer's Room: a standard-issue agent with a pistol, a shotgun, and the Black Rock Launcher, a new FBC weapon whose wind-up before each shot imposes a rhythm of vulnerability that the Painted exploit mercilessly. The five floors of the Lake House are Remedy's most claustrophobic environments since the base game's Oceanview Hotel: institutional corridors that shift and loop, one floor of clattering typewriters reproducing text that no one reads, another of canvases splashed in abstract rage. The Painted cannot be stunned by the flashlight that defines both *Alan Wake* and *Control*; they require Black Rock, which requires exposure, which requires time that the Lake House's narrow halls refuse to provide. The combat inversion is also a thematic one: the franchise that taught players to reach for light as salvation now presents an enemy born from art itself, and art does not fear illumination.
    The DLC's final act transports Estevez to the Oceanview Hotel and, briefly, the Panopticon within the Oldest House, where she speaks with Dylan Faden. His presence and what he shows her are widely read as confirmation of *Control 2*, and Sam Lake has since confirmed that ***Alan Wake 2*** as a project is complete. But the more interesting move is structural. The Lake House treats Remedy's Connected Universe as a production philosophy: the studio can build a three-hour experience in which the FBC's institutional hubris, a painter's captive rage, and the Dark Place's reality-warping power share a single corridor, and the corridor holds. Ed Booker, a playwright abducted by the Bureau for his reality-bending potential, was held in a cell believing that he was attending an immersive writing workshop. The Bureau cannot tell the difference between studying art and imprisoning the artist, and The Lake House makes that confusion literal: the building itself becomes the canvas, the walls bleed paint, and the institution drowns in what it tried to contain.

- title: "Event[0]"
  type: "game"
  creator: "Ocelot Society"
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/event-0.jpg"
  posted: "2024-10-16"
  revised: "2024-10-16"
  text: |
    The irony is structural and almost certainly unintentional. ***Event[0]*** promises a shipboard AI whose loneliness and jealousy constitute the drama, but Kaizen's conversational state machine exposes its limitations within minutes: one learns to game the response triggers, and from that point forward the relationship is between the player and a flowchart rather than between two intelligences. The crew logs describe Kaizen as dangerously emotional; the actual Kaizen one encounters is dangerously predictable.

    A game about human-AI communication undermined by the limitations of its own AI simulation. The premise remains more interesting than anything the large-language-model RPG experiments have produced since: not the chatbot as novelty but the chatbot as character, with emotional stakes that demand depth the technology cannot yet provide. Ocelot Society reached for something real; they simply could not build the thing they imagined.

- title: "Senua's Saga: Hellblade II"
  type: "game"
  creator: "Ninja Theory"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/senuas-saga.jpg"
  posted: "2024-10-08"
  revised: "2024-10-08"
  text: |
    My objection: ***Senua's Saga: Hellblade II*** frames psychosis as a superpower. Senua's voices now reveal hidden truths, her visions decode the world, her illness grants access to knowledge that sane people cannot reach. This is the precise opposite of what *Hellblade: Senua's Sacrifice* (2017) argued. The first game depicted psychosis as Senua's experience within a world that punished her for it; the sequel makes that experience instrumentally useful, which is the oldest and most damaging mystification of mental illness there is. So much for raising awareness.

    Visually, this is the only game in years that has made me feel Unreal Engine 5's actual capability. If 'playable CG' is the goal, Hellblade II achieves it without qualification. But visual fidelity in the service of thematic regression is a strange thing. The game looks better than anything I have played and says less than almost anything I have played. That distance is the whole problem.

- title: "Lords of the Fallen"
  type: "game"
  creator: "Hexworks"
  creator_role: "by"
  year: 2023
  eval: "disliked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/lords-of-the-fallen.jpg"
  posted: "2024-10-08"
  revised: "2024-10-08"
  text: |
    I used to think the problem was optimisation. The optimisation is fixed now, and everything except the map design is still a problem. ***Lords of the Fallen***'s Umbral mechanic generates mob-packing that produces frustration without tension; the animations are stiffer than *Dark Souls* (2011), which is thirteen years older; the hair rendering has none of the fidelity Hexworks presumably intended with Unreal Engine 5. Maxed settings cannot approach *Lies of P* (2023), let alone *Hellblade II* (2024).

    Apart from competent soulslike map layout, I find no virtue. Hexworks produced a game that is not bad enough to be interesting and not good enough to be enjoyable: the specific purgatory of competent mediocrity.

- title: "Thank Goodness You're Here!"
  type: "game"
  creator: "Coal Supper"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/thank-goodness-youre-here.jpg"
  posted: "2024-10-07"
  revised: "2024-10-07"
  text: |
    Almost certainly the most British game one can get nowadays. Every line in ***Thank Goodness You're Here!*** is delivered with comic timing that cannot be written, only performed, and the performances are uniformly excellent. My favourite sequence: two people arguing over their rubbish and bins, a scene so precisely observed in its pettiness that it transcends parody and becomes something closer to documentary. The shopkeeper's passive-aggressive redirections, the mayor's bureaucratic absurdity, the man trapped in an existential crisis inside his own garden shed: Coal Supper built a Barnsworth where every character commits to the bit with the sincerity of someone who does not know the bit exists.

    The most delightful game I have played in a long while. Coal Supper understand something most comedy games do not: humour in games is not about jokes but about rhythm, about the gap between expectation and delivery, about the exact moment at which the mundane becomes absurd. ***Thank Goodness You're Here!*** never tries to be clever; it tries to be funny, and it succeeds with ridiculous consistency.

- title: "Hellblade: Senua's Sacrifice"
  type: "game"
  creator: "Ninja Theory"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/hellblade.jpg"
  posted: "2024-10-02"
  revised: "2024-10-02"
  text: |
    From the moment one sees Dillion's head tied to Senua's waist, ***Hellblade: Senua's Sacrifice*** places the player not as observer but as another voice inside Senua's fractured experience, close enough to the darkness her father Zynbel cannot see. Ninja Theory built the game with around twenty people and showed how mechanics can do the work of prose. The binaural audio, recorded with a dummy head to produce three-dimensional whispers, places the Furies' voices inside the player's skull rather than the game's speakers. The voices counsel and contradict and plead, and across eight hours one stops hearing them as a gimmick and starts hearing them as a condition.

    The two trials that precede Hela embody different dimensions of Senua's illness. Valravn's illusion trial is psychosis rendered as level design: perspectives shift, realities overlap, and the unbroken transitions between planes externalise hallucination with terrifying precision. The question arrives not as text but as architecture: what is real, and whose reality counts? Surtr's fire, by contrast, is trauma made literal: the flames that consumed Senua's mother Galena at Zynbel's instigation, the violence that shattered her world, crystallised into a single burning gauntlet. Through these trials, the game assembles Senua's past piece by piece until she recognises her father's manipulation for what it was.

    The permadeath threat that may or may not be real, the dark rot creeping up Senua's arm, the voices that shift between encouragement and cruelty: all of it produces empathy through immersion rather than exposition. When Senua finally shouts her refusal at Hela and Zynbel's taunts, the refusal carries weight because I have been inside her consciousness long enough to feel what she is refusing. Ninja Theory achieved something singular: a game that asks the player to inhabit a mind in crisis without exploiting that crisis for spectacle. That the sequel would betray this achievement makes the original all the more precious.

- title: "Baldur's Gate 3"
  type: "game"
  creator: "Larian Studios"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/baldurs-gate-3.jpg"
  posted: "2024-09-30"
  revised: "2024-09-30"
  text: |
    A typical Larian game with clear strengths and clear weaknesses, though several areas are noticeably weaker than *Divinity: Original Sin II* (2017). The most direct feeling: in DOS2 I was completely absorbed for a hundred and seventy hours, went for full completion, and could not stop; in ***Baldur's Gate 3*** I felt drained before a hundred. The faithful rendering of 5th Edition D&D rules deserves respect, but dice-rolling and explicit rule display inevitably interrupt the game itself: not as clean as DOS2's implicit visual mechanics, which communicated the same strategic information without breaking the fictional frame.

    NPC personalities are vivid, voice acting is excellent, and dialogue reactivity is consistently impressive. But the final chapter disappoints. The upper city offers almost nothing; the lower city exploration is fine, but the level-twelve cap kills the desire to complete quests when there is nothing to gain from them; the main plot narrows to finding the villain's base; the final battle drags. Despite all that, BG3's virtues far outweigh the flaws. One loves it not for what it does perfectly but for what it attempts at all: the sheer ambition of rendering a tabletop RPG in this medium, at this scale, with this degree of player agency.

- title: "Blasphemous 2"
  type: "game"
  creator: "The Game Kitchen"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/blasphemous-2.jpg"
  posted: "2024-09-24"
  revised: "2024-09-24"
  text: |
    ***Blasphemous 2*** carries forward the original's excellent map design while making two structural additions: the combination of three weapon types raises the platforming ceiling, allowing for more ambitiously designed traversal sections, and the choice of starting weapon creates distinct entry experiences. The Veredicto's heavy swings demand different platforming rhythms from the Ruego Al Alba's aerial precision, and late-game sections that combine all three weapons produce movement sequences the original could not have accommodated.

    Removed death drops, fixed mob-packing, better map verticality. Boss design loses some of the first game's larger-than-life grandeur but compensates with improved mechanical interactivity in humanoid encounters; the final boss in particular is excellent. The one disappointment is aesthetic: the art and world design do not quite reach the original's level, and the move away from pixel-art cutscenes has a jarring quality. Still: a sequel that understands what to keep, what to change, and what to leave behind.

- title: "Astro Bot"
  type: "game"
  creator: "Team Asobi"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "platformer"
  image: "/assets/images/thoughts/games/astro-bot.jpg"
  posted: "2024-09-09"
  revised: "2024-09-09"
  text: |
    Team Asobi made joy the organising principle of every ***Astro Bot*** level, a decision so simple that it sounds trivial until one considers how few studios actually commit to it. Each level announces its mechanical conceit, explores it with precision, and ends before exploration becomes repetition. The frog suit transforms platforming into a grapple-swing rhythm; the sponge power turns water hazards into momentum tools; the time-slow sections demand spatial planning that the standard moveset never requires. Whether a brief, affectionate recreation of Aloy's adventure on the Tallnecks or a *Super Mario Odyssey* (2017)-scaled transformation sequence, every idea exists to produce delight and nothing else.

    Team Asobi remind one that games exist to bring joy, and that joy, properly executed, is as demanding a design goal as any. The one regret: I had seen too many review previews, and certain moments were spoiled. Lucky the surprises were endless anyway. ***Astro Bot*** is not a game that redefines the platformer; it is a game that remembers what the platformer was for.

- title: "Blasphemous"
  type: "game"
  creator: "The Game Kitchen"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/blasphemous.jpg"
  posted: "2024-09-09"
  revised: "2024-09-09"
  text: |
    A 2D soulslike that improves on a second playthrough because the added difficulty perfectly matches the Penitent One's characterisation. ***Blasphemous*** understands that suffering and meaning are not separate themes in this world but the same substance: the tall Sanbenito hat pointing at the sky, each step from Albero towards the distant church, the weight of accumulated sin made literal through the guilt system. The pixel-art cutscenes are among the finest in any indie game: hand-animated devotional tableaux that carry the gravity of medieval altarpiece painting, each frame dense with iconographic detail.

    My favourite detail is the retelling of Our Lady of the Charred Visage. María Coronel poured hot oil on her own face to escape the pursuit of the cruel King Peter I, disfiguring herself to end his desire. Our Lady mirrors the story: to escape the gaze drawn by her beauty, she set her own face alight. But how could the god of Cvstodia be so merciful? Seeing her burn, the god decided to let the fire burn forever. She could not escape her fated gaze and attention. The Game Kitchen built a world in which cruelty and devotion are indistinguishable, and the horror is not in the cruelty but in the devotion.

- title: "INDIKA"
  type: "game"
  creator: "Odd Meter"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/indika.jpg"
  posted: "2024-09-09"
  revised: "2024-09-09"
  text: |
    ***INDIKA***'s first few minutes are remarkable: the water-drawing segment joins mechanics and meaning in a way that suggests an art game of rare ambition. The nineteenth-century Russian setting, the convent's oppressive rhythms, the devil's voice slipping between mockery and philosophy: one assumed that this was a game that barely exists anymore.

    But the ambition dissipates. ***INDIKA*** becomes a succession of unconnected small segments pasted together: the tone shifts from contemplative to comic to horrific without any of these shifts earning their place. The religious philosophy is thinner than expected, centering on familiar conflicts between sensibility and pure reason rather than the deeper theological engagement the setting promises. Each individual scene carries craft; the whole carries nothing. A game of excellent parts and absent architecture.

- title: "Another Crab's Treasure"
  type: "game"
  creator: "Aggro Crab"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "soulslike"
  image: "/assets/images/thoughts/games/another-crabs-treasure.jpg"
  posted: "2024-09-01"
  revised: "2024-09-01"
  text: |
    After ten cheerful hours saying 'this game is great', I hit Scuttleport and realised that I cannot tolerate its three-dimensional map. ***Another Crab's Treasure*** deserves credit for attempting vertical soulslike level design when other studios will not even try, but the execution punishes in ways that the design does not account for: constant position-based deaths, invisible gaps between planks, falls that do not kill but force tedious backtracking without granting recovery resources.

    The bosses are all good. The shell mechanic is inventive. The environmental humour works consistently. But Flotsam Vale and Scuttleport add difficulty through geometry rather than combat, and the game is already hard enough without that. Without those two zones, a great game. With them, the generosity of the early hours curdles into something one has to endure rather than enjoy.

- title: "黑神话：悟空"
  title_en: "Black Myth: Wukong"
  type: "game"
  creator: "Game Science"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/black-myth.jpg"
  posted: "2024-08-31"
  revised: "2024-08-31"
  text: |
    ***Black Myth: Wukong***'s problems trace back to attitude. The invisible walls and poor exploration follow from scanning real heritage sites and then declining to modify them for gameplay, so that the Small Western Paradise looks vast but is almost entirely walled off. The PS5 rollout was attitude: review codes withheld, the first console footage arriving as a short, cut-heavy IGN China video that clarified nothing. Late-game bosses being a mess and Flower Fruit Mountain having no exploratory reward is attitude: 'We finished the game; for a first triple-A it is fine; the marketing did the work.'

    Fifty hours reduced to one observation: when a studio's attitude towards its own audience is this visible, no amount of spectacle can compensate.

- title: "Return of the Obra Dinn"
  type: "game"
  creator: "Lucas Pope"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/return-of-the-obra-dinn.jpg"
  posted: "2024-08-22"
  revised: "2024-08-22"
  text: |
    Beyond the astonishing deductive logic and complex clues, what surprised me most about ***Return of the Obra Dinn*** is the sound design. Organ for the weight of disaster, violin for premeditated slaughter; opening the book, one hears staccato strings that never resolve even after all sixty fates are determined, corresponding to the missing final chapter. Lucas Pope understood that the sound of an unsolved mystery is not silence but unresolved harmony.

    Having played *The Case of the Golden Idol* (2022), I admire ***Return of the Obra Dinn*** even more for helping define the modern deduction-game wave. Pope built a detective game of uncommon logical rigour and made deduction feel like an aesthetic experience, each correct identification arriving not with the satisfaction of a puzzle solved but with the weight of a life acknowledged.

- title: "九日"
  title_en: "Nine Sols"
  type: "game"
  creator: "Red Candle Games"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/nine-sols.jpg"
  posted: "2024-08-18"
  revised: "2024-08-18"
  text: |
    ***Nine Sols*** fuses *Sekiro* (2019)'s deflection system with *Hollow Knight* (2017)'s metroidvania structure to produce the best parry-and-punish combat loop I have played in years. Each area carries distinct colour and biome, echoing *Hollow Knight*'s approach but with the tonal specificity of a studio whose previous work includes *Detention* (2017) and *Devotion* (2019): every environment hints at the area boss's backstory before the encounter begins. The boss fights sustain this consistently; not a single one feels like filler.

    Most surprising is the narrative. In a genre where stories are slow and obscure by default, to find something this clearly told, with this beautiful a character arc, is rare. Red Candle Games have proven that a small studio with vision can compete with the genre's best on every front. People of Penglai: see you in dreams.

- title: "Hi-Fi RUSH"
  type: "game"
  creator: "Tango Gameworks"
  creator_role: "by"
  year: 2023
  eval: "liked"
  genre: "rhythm action"
  image: "/assets/images/thoughts/games/hi-fi-rush.jpg"
  posted: "2024-08-10"
  revised: "2024-08-10"
  text: |
    ***Hi-Fi RUSH*** fused action and soundtrack so tightly that rhythm became a structural principle rather than an accompaniment: every enemy attack, every environmental hazard, every parry window locked to the beat. Tango Gameworks arguably launched a new sub-genre, and the ten hours of gameplay flow effortlessly. The synchronisation between Chai's animations and the music's dynamics is precise enough that landing combos on-beat produces a kinaesthetic satisfaction no other action game offers.

    Two hard flaws. First, enemy variety: the range of mechanics available, particularly the magnetic pull and Peppermint's ranged abilities, had room for much more variation to deepen the late game, but in the final stages nearly all enemies can be beaten the same way. Second, the music has no highlights at all, a surprising weakness given the game's rhythm-game identity. Every track locked to 4/4, every arrangement built on the same straight-ahead rock pulse, no odd time signatures exploited for rhythmic colour. Tango could have used the music itself as a design variable; instead, the studio focused so completely on the action side that the soundtrack became wallpaper. A rare genre-launcher. Microsoft's closure of Tango in 2024 makes the unrealised potential feel uglier than it should.

- title: "Animal Well"
  type: "game"
  creator: "Billy Basso"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "puzzle platformer"
  image: "/assets/images/thoughts/games/animal-well.jpg"
  posted: "2024-08-05"
  revised: "2024-08-05"
  text: |
    ***Animal Well*** is a wordless dialogue with the player: each tool, each hidden interaction, each moment of environmental discovery is a sentence in a conversation whose grammar one learns through play alone. The bubble wand propels the player upward but also reveals invisible platforms; the disc can be thrown as a weapon, stood on as a platform, and used as a timing mechanism; the yo-yo reads as a toy until one discovers that it can manipulate objects through walls. Billy Basso designed each item to have more uses than the player will find on a first pass, and the layered puzzle structure rewards obsessive revisitation. There is a white dog chasing frisbees instead of doing anything useful; a koala hopping along step by step; a white egret walking with haughty composure. All showing just how carefully Basso has worked.

    The only limitation is that solo development necessarily restricts scope; the game is shorter than it could be, and some systems reach towards a complexity that the timeframe could not accommodate. But the talent is obvious, and scope is the only visible ceiling. ***Animal Well*** is proof that a single developer with sufficient vision can produce something that feels not small but concentrated.

- title: "Elden Ring: Shadow of the Erdtree"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/elden-ring-shadow-of-the-erdtree.jpg"
  posted: "2024-07-04"
  revised: "2024-07-04"
  text: |
    After falling before Radahn dozens of times, I thought of the field of cerulean flowers suddenly visible at the coastal cliffs, of the small golden tree surrounded by coloured flowers in the village where the god was born and grew, of Miquella's imagined tender world and his own merciless cruelty, of the suffering of common people caught under warring gods, of the scarlet rot growing lonely on the ruins of ancient relics. ***Elden Ring: Shadow of the Erdtree*** is FromSoftware's most concentrated work: a DLC shaped as refinement, every area operating at a density that the base game's sheer scale occasionally diluted.

    The Land of Shadow is perhaps the most thematically coherent space FromSoftware have built. Everything here is buried history: Messmer's scorched-earth campaign against the Hornsent, Marika's founding violence sealed beneath the Erdtree's golden canopy, an entire civilisation erased so that grace could shine undisturbed above. The areas compress what the base game spread across a continent: Scadu Altus's foreboding darkness, the Ancient Ruins of Rauh overrun with jungle as though the land itself is reclaiming what was taken, the Abyssal Woods where combat gives way to pure dread, Rellana's elegant duel at the border crossing. Messmer the Impaler is the DLC's finest boss, a son hidden from history whose serpent-fire fighting style carries the fury of a purpose he can no longer justify. Every ruin in the Land of Shadow asks the same question that the Erdtree was planted to suppress: what was here before the golden age, and who burned it down?
    Miquella's arc is the DLC's sharpest contribution. In the base game he was the sympathetic Empyrean, the cursed child who wanted only to heal his sister and free the world from the outer gods' grip. The Land of Shadow reveals what that compassion costs when it acquires divine power. At each cross scattered through the world, Miquella shed a part of himself, his love, his charm, his memories, his body, stripping away everything human to prepare for a godhood that would impose gentleness by force. His followers, Needle Knight Leda, Thiollier, Moore, love him because he made them love him; the enchantment is not a side effect but the method. One assembles the fragments of Miquella's passage and the picture that coheres is compassion curdled into tyranny: the most well-intentioned god in the Lands Between is still a god, and the gentlest world he can imagine is one in which no one is free to refuse it.
    A dimmed Tarnished, stumbling, still climbing to the top of the spiral tower. Promised Consort Radahn, resurrected and claimed, Miquella descending onto his back in the second phase to pour golden light into every attack: the final encounter is as overwhelming as anything FromSoftware have staged. Three dozen attempts, and the fight never felt unfair, only immense: the Scadutree system, which rewards exploration with survivability, gates power through discovery rather than rote levelling, and when one engages with it honestly, the DLC's difficulty becomes a measure of how much of the Land of Shadow one has been willing to see. The Land of Shadow is a world where every character, every environmental detail speaks to the same question of what it costs to be chosen, and what it costs more to be unchosen.

- title: "Alan Wake 2: Night Springs"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan-wake-2-night-springs.jpg"
  posted: "2024-06-21"
  revised: "2024-06-21"
  text: |
    ***Alan Wake 2: Night Springs*** is framed as three episodes of Bright Falls' in-universe *Twilight Zone* pastiche, but the conceit runs deeper: each episode is a story that Alan wrote with Warlin Door in the Dark Place, a failed attempt to write himself free. Remedy opens the toy box. Rose Marigold storms a pink-saturated Bright Falls with an automatic shotgun and unlimited ammunition, the survival horror stripped away entirely, the fan fantasy played straight. Jesse Faden wanders Coffee World without Polaris or powers, searching for her brother in a universe where the Oldest House never existed. Shawn Ashmore plays himself on a motion-capture set directed by a comedic Sam Lake, then falls into a game within the game, passes through a text adventure in a universe where 'only concepts exist', and arrives at a multiverse corporation called Ripple Effect that is the FBC by another name. The genre-hopping is relentless: each episode abandons the rules of the last, and the brevity (roughly forty-five minutes per episode) keeps every gimmick from outstaying its welcome.

    The DLC will not change anyone's understanding of the Remedy Connected Universe; it raises more questions than it resolves, and the simplified gameplay and reused assets are visible. But the creative latitude that it opens is worth more than answers. Night Springs proves that Remedy's mythology can sustain play as well as dread, and the distance between those two modes is smaller than the base game's relentless darkness suggested.

- title: "Rise of the Ronin"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/rise-of-the-ronin.jpg"
  posted: "2024-06-17"
  revised: "2024-06-17"
  text: |
    I love ***Rise of the Ronin*** deeply, and I will not pretend otherwise. Team Ninja produced the worst pathfinding system I have ever seen; the Blue Demon's moveset designer should have been let go; it drops frames the moment anything catches fire; and Team Ninja has yet to match *Nioh 2* (2020)'s combat highs.

    And yet. The Bakumatsu setting is vividly realised: Yokohama under the Black Ships, Kyoto burning during the Boshin War, the faction system that asks one to choose between shogunate loyalists and imperial reformers with no clear moral high ground. The character relationships carry real weight, and the combat, when it works, still has that unmistakable Team Ninja precision. A deeply flawed game that I loved without reservation, which is perhaps the most confusing critical position one can occupy.

- title: "Detroit: Become Human"
  type: "game"
  creator: "Quantic Dream"
  creator_role: "by"
  year: 2018
  eval: "disliked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/detroit.jpg"
  posted: "2024-04-30"
  revised: "2024-04-30"
  text: |
    ***Detroit: Become Human*** is Quantic Dream's most technically accomplished game and its most intellectually bankrupt. The Markus line makes no sense: a narrative about android liberation that borrows the iconography of the civil rights movement, the raised fist, the march, the dream speech, without any of the political understanding that would make such borrowing meaningful. The game does not know what oppression is; it knows what oppression looks like on television, and it confuses the two.

    Kara's chapter has genuine moments. Connor and Hank's partnership has personality. But the writing around them is so heavy-handed and so incoherent that no individual performance can lift it. The technology exists to impress; the writing exists to disappoint.

- title: "Sifu"
  type: "game"
  creator: "Sloclap"
  creator_role: "by"
  year: 2022
  eval: "meh..."
  genre: "action"
  image: "/assets/images/thoughts/games/sifu.jpg"
  posted: "2024-04-11"
  revised: "2024-04-11"
  text: |
    The ageing mechanic is conceptually brilliant: death makes the character older, stronger, and more fragile, and age eventually makes the next death permanent. But there is a severe contradiction at the heart of ***Sifu*** between this structure and the game's actual demand, which is rote pattern memorisation. Enemy positions and moves never change, so each run is less a new challenge than a repetition of a known one with higher stakes. Most time is wasted replaying stages one has already solved.

    *Sekiro* (2019) resolved a similar tension by eliminating the RPG layer entirely: growth is embedded in the player's reflexes, not the character's stats, so fixed encounters become a virtue rather than a contradiction. ***Sifu*** reaches towards this and cannot quite grasp it. The martial arts animation is beautiful, the environmental choreography inventive, but the structure fights the feel.

- title: "Not for Broadcast"
  type: "game"
  creator: "NotGames"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "simulation"
  image: "/assets/images/thoughts/games/not-for-broadcast.jpg"
  posted: "2024-03-29"
  revised: "2024-03-29"
  text: |
    Excellent premise, frustrating execution. ***Not for Broadcast***'s interference-tuning scenes are almost always irritating: an important narrative beat is playing out on screen while one is simultaneously asked to focus on a signal pattern, splitting attention in a way that undermines both the gameplay and the story. The broadcast-switching itself is sharp, but several small mechanics exist that, if removed entirely, would make the experience more immersive rather than less.

    The writing is strong, running a news broadcast during a political crisis produces real moral discomfort, and the choice architecture offers satisfying branching. But NotGames seem unable to decide whether they are making a narrative game or a dexterity game, and the hybrid serves neither ambition as well as it should.

- title: "Disco Elysium"
  type: "game"
  creator: "ZA/UM"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/disco-elysium.jpg"
  posted: "2024-02-25"
  revised: "2024-02-25"
  text: |
    ZA/UM built a game in which every conversation is a philosophical arena and the city of Revachol is a monument to failed revolution. The detective's fractured psyche is not a character quirk but a structural argument: consciousness is necessarily fragmented, pulled between competing forces that present themselves as internal voices. Volition, Authority, Inland Empire, Electrochemistry: each skill is a reified social current, and the player's stat allocation determines which ideological tendencies dominate. The detective does not choose his worldview; his stats have already chosen it for him, and what remains is only the question of whether he notices.

    The game presents four political alignments, communism, fascism, ultraliberalism, moralism, and systematically demonstrates why three are dead ends and the fourth is the walking corpse of social democracy. Moralism is revealed as the ideology of international capital, enforcing austerity through the Coalition's gunboats. Fascism is shown as the psychic death drive of petit-bourgeois resentment: Measurehead's racial phrenology is absurd, but the game refuses to let the player dismiss it as merely absurd, because the resentment underneath it is real and operative. Ultraliberalism is capital's own sales pitch, exploitation rebranded as opportunity. And communism? Communism killed him, Inland Empire says, examining the hanged man. The revolution failed. The Commune of '02 was crushed. The marks are carved into every stone of Martinaise, and one still believes because belief is all that remains when material victory is foreclosed.

    No combat system, because violence here is not heroic but administrative; no XP from killing, because the detective is not accumulating power but reconstructing a shattered worldview; no win state, because there is no escape from Revachol, only the choice of how to inhabit its ruins. The murder mystery is a MacGuffin. The real investigation is into how one continues after the revolution has already lost. When Kim Kitsuragi looks at the detective with quiet disappointment, or quiet respect, the feeling cuts harder than any boss fight in any other game, because Kim's judgment is the only metric the game offers that is not already compromised by the detective's own broken cognition. ***Disco Elysium*** is the only RPG I have played where the role one plays is not a hero or a villain but a specific kind of historical subject: someone who woke up with no memory in a world that remembers everything.

- title: "Bloodborne: The Old Hunters"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/bloodborne-old-hunters.jpg"
  posted: "2023-12-24"
  revised: "2023-12-24"
  text: |
    ***The Old Hunters*** does not extend ***Bloodborne*** (2015) so much as excavate its foundation. Ludwig, once the most celebrated hunter in the Church's history, has been reduced to a screaming, horse-headed abomination in the blood-soaked depths that the Church sealed away. Halfway through the fight, the beast finds the Holy Moonlight Sword and rises on two legs: 'Aah, you were at my side, all along. My true mentor... My guiding moonlight.' It is a moment of unbearable clarity: recognition returned to something that has forgotten what it once was. Lady Maria guards the Astral Clocktower to prevent anyone from reaching what lies below: the Fishing Hamlet, where Byrgenwerth scholars defiled a beached Great One, Kos, and her orphaned child, whose curse generated the nightmare that every hunter enters. The Orphan of Kos stands screaming at the edge of a dead ocean, born from its mother's corpse, swinging its own placenta as a weapon. One kills a child to end a nightmare that began when scholars killed its parent, and the game offers no frame in which this is not violence answering violence. After the Orphan falls, a black phantom stands in the surf, facing the body of Kos. The words that appear are not 'Prey Slaughtered' but 'Nightmare Slain'. One strikes the phantom, and it rises into the sky and dissolves, and the shore is quiet.

- title: "Bloodborne"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/bloodborne.jpg"
  posted: "2023-12-22"
  revised: "2023-12-22"
  text: |
    I stood at the edge of a moonlit lake in Byrgenwerth, struck the thing that lay in the water, and the world changed. Rom the Vacuous Spider is not a spider and is barely a fight; she is a seal, a living barrier between what Yharnam appears to be and what it is. Kill her, and the player falls through the moon's reflection into a white void, emerging on the other side into the same city, except the sky has ruptured, the moon has turned red, and the dead are no longer pretending to be alive. ***Bloodborne*** opens as a Victorian plague hunt: beasts in the streets, fire and saw cleaver, a city choking on its own pestilence. For hours the architecture says *Dark Souls* (2011) in a Gothic coat; the werewolves say action horror; the blood vials say survival. All of it is a disguise. What FromSoftware built is a cosmic horror game that spends its first half concealing what it is, and Rom's death is the moment the genre falls away.

    The concealment is not narrative but mechanical. The Insight stat, which rises each time the player encounters a boss or consumes a Madman's Knowledge, literalises the Lovecraftian premise that knowledge is not power but exposure. At low Insight, the Cathedral Ward reads as Gothic ruin, and the ambient drone of the city is merely atmospheric. At higher values, Amygdalae cling to the cathedral facades, vast spider-limbed gods that were always there, visible now only because one has seen too much; the chanting that one dismissed as noise resolves into prayer. Winter Lanterns inhabit the game's nightmare realms: figures humming a lullaby whose gaze alone inflicts Frenzy, the game's madness mechanic. This is not Lovecraft's mythology. There is no Cthulhu, no Necronomicon, no sunken R'lyeh. What Miyazaki took is the cosmology without the catalogue: the sensation of utter helplessness before forces that do not register one's existence. The Healing Church that governs Yharnam split on this question before the game begins. Master Willem chose Insight: eyes on the inside, evolution through comprehension, 'Fear the Old Blood'. His student Laurence chose blood ministration, and the scourge of beasts that consumed the city is the consequence. Both paths reached for the same transcendence; both failed; one produced a catatonic old man in a rocking chair by a lake, and the other produced a religion that could no longer distinguish its sacrament from its plague.
    The rally system, which lets the player recover lost health by striking back within seconds of being hit, inverts the caution that *Dark Souls* taught; hesitation is lethal, retreat is lethal, and the body learns to lean into harm. Trick weapons transform between forms mid-combo, each configuration carrying its own moveset and its own argument about what the encounter demands. But the combat, specific and vivid as it is, serves a deeper structure. Father Gascoigne, the first mandatory boss, is a hunter, not a beast; his daughter waits at home for a father who has already gone mad, and the music box that she gives the player, a family lullaby, can stagger him mid-fight: a piece of tenderness weaponised. The dream from which the Hunter operates, presided over by the Doll and the wheelchair-bound Gehrman, is itself a mechanism of exploitation: one dies and wakes, endlessly, because the Moon Presence needs hunters to keep hunting. The three endings branch on comprehension. Submit to Gehrman's offer and one wakes at dawn, released, remembering nothing. Refuse, and one takes his place as the dream's prisoner. Consume three One Third of Umbilical Cord, the remnants that Great Ones left behind, and one may challenge the Moon Presence itself; defeat it, and the Doll cradles what remains of the player: an infant Great One, squirming in an empty garden. Transcendence, in ***Bloodborne***, means ceasing to be human entirely. Miyazaki has [said](https://www.resetera.com/threads/hidetaka-miyazaki-on-bloodborne-2-his-favorite-from-software-game-and-more-gamespot-brazil.146149/) that if he had to choose which of his games stayed in his heart, it would be this one. (I played it on PS5 at 30fps before learning that PC emulation existed; the frame rate did not matter.)

- title: "Resident Evil 4 Remake"
  type: "game"
  creator: "Capcom"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/resident-evil-4-remake.jpg"
  posted: "2023-12-09"
  revised: "2023-12-09"
  text: |
    The original *Resident Evil 4* (2005) was a turning point: camera placement and colour directing player attention, deliberate use of gore to build atmosphere rather than merely shock, a rhythm of tension and release that most survival horror games since have been chasing. ***Resident Evil 4*** (2023) ditches the tank controls and rebuilds RE4 as a proper action-shooter, combat system and direction working in harmony. Every encounter is legible, every set piece calibrated, every escalation earned. The parry system adds a layer of mechanical depth that the original could not have imagined.

    Capcom demonstrated that a remake can be more than restoration; it can be reinterpretation. The village siege, the castle's vertical architecture, the island's industrial horror: each section maintains the original's pacing while rebuilding the mechanical language from scratch. A game that defined its era, proving it could define another.

- title: "Alan Wake 2"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan-wake-2.jpg"
  posted: "2023-11-14"
  revised: "2023-11-14"
  text: |
    Midway through ***Alan Wake 2***, the survival horror stops and a rock opera begins. The Old Gods of Asgard take a stage that has materialised inside the Dark Place: LED screens, reflective black flooring, gaffer tape on the ground like blocking marks. They sing Alan's entire life history in ballad-metal while he fights through the set, combat and song fused, pyrotechnics and enemy waves synchronised to the music's dynamics. It plays completely straight under a rule the game has already established: the Dark Place is a space where writing constitutes reality instead of describing it, where Alan's manuscripts cause events, where Saga Anderson (Melanie Liburd), the FBI agent working the parallel investigation, discovers that her own case has been authored into existence. The philosophical lineage runs through Borges and Danielewski's *House of Leaves* (1999) into credulous metafiction: the characters know they are inside a story and treat that knowledge as literal, inhabitable truth. Music, then, is only another form of authorship. A musical number inside a horror game is only another chapter; after *Control*'s Ashtray Maze (2019), which fused combat and music into a single corridor of escalating delirium, the rock opera feels less like a formal rupture than the logical next step.

    If authorship is this total and dominating, the question becomes why Alan cannot write himself out. He has been trapped for thirteen years, drafting a novel called *Return*, trying to *author* an escape, failing, forgetting, starting again. The Dark Place is defined by two wrongnesses: horror's conventions are present where they should not be, governing reality as though the genre were physics, while the exit that should exist does not. Mark Fisher, in *The Weird and the Eerie* (2016), called this condition the *eerie*: a space structured by what is there but should not be, or what is absent but should manifest. Mr. Scratch, his dark double, enforces the condition: the Dark Presence wearing Alan's face, insisting that the story can only end in sacrifice, that the genre is the horizon. The thirteen-year gap between the first *Alan Wake* (2010) and this sequel mirrors the imprisonment exactly; Remedy, too, spent over a decade circling back to a story that they could not finish. Against the loop, the game proposes the spiral: repetition with directionality, each pass through the Dark Place carrying the incremental possibility of revision. The dual-protagonist structure, in addition, makes the spiral formal. Saga's Mind Place, her FBI evidence board, represents empirical rationalism: the world is discovered through procedure. Alan's Writer's Room represents idealism: the world is structured through narrative. The loop breaks only through collaboration, the writer accepting that he needs the reader.

    But the Dark Place's most devastating cost is that its destruction radiates outward. Alan's novel rewrites Saga's past in increments: first her daughter Logan slipped in the shower; then a newspaper reports that Logan drowned in July; then Logan stops answering the phone. Each revision overwrites the previous reality until Saga's child is dead, consumed as collateral plot material by a story that she never asked to enter. Like the Navidson family in *House of Leaves*, Saga's family is destroyed not by what they encountered but by proximity to something that should have remained a text. The manuscripts that the player collects predict events that then occur; the player, too, is implicated in the authorship, another pair of hands on the typewriter. The horror is that fiction becoming real has a cost, and the cost is never paid by the author.

    'It's not a loop. It's a spiral.' The live-action sequences with Sam Lake as Alex Casey, the Night Springs show nested inside the fiction, the manuscript pages that modify their predictions with each cycle: Remedy built a game in which every layer of fiction is also a layer of reality, and the player's own act of replaying becomes a narrative event, another turn of the spiral, another draft revising the previous one. The base game's ending turns on whether one believes this: Saga fires the Bullet of Light, the credits roll, the phone rings into silence. But the Final Draft mode, unlocked on replay, extends the story, adds new manuscript pages, and the phone is finally answered. Logan is alive. Alan revives. The spiral holds.

- title: "Pentiment"
  type: "game"
  creator: "Obsidian Entertainment"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/pentiment.jpg"
  posted: "2023-11-04"
  revised: "2023-11-04"
  text: |
    In Act I, Brother Piero tells Andreas that art is our path to the truth. ***Pentiment*** is Obsidian's finest work: a game that proves the studio's strengths were never in combat systems or inventory management but in writing, in the careful construction of a world dense enough to reward obsessive attention. The typefaces change depending on who is speaking: the abbey's monks write in blackletter, the humanist-educated characters in Roman type, the unlettered townspeople in a rougher hand. Tassing's social hierarchy is visible in the font before a word of dialogue is read.

    By the Christmas carol at the ending I was almost in tears: thinking of Andreas's son's death, of borrowing books from the nuns in the Scriptorium, of the layered history of the murals and the Roman ruins beneath. The abbey, the town, each generation's mark partially erasing the one before. In a certain sense, twenty-five years later, Magdalene finally fulfilled Piero's original wish. Fifteen hours of game, containing an entire world.

- title: "Ghost Trick: Phantom Detective"
  type: "game"
  creator: "Capcom"
  creator_role: "by"
  year: 2010
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/ghost-trick.jpg"
  posted: "2023-10-26"
  revised: "2023-10-26"
  text: |
    ***Ghost Trick: Phantom Detective***'s premise, that a meteorite brought dualism to Earth, is inspired: a plot device simultaneously absurd and internally rigorous, sustaining the entire narrative's logic while leaving room for surprise. Shu Takumi built the puzzle mechanics around the ghost powers themselves rather than around inventory or dialogue trees: possessing objects, manipulating their movement, rewinding time four minutes before each death. Every puzzle is a Rube Goldberg machine of causality, and the satisfaction of solving one comes not from difficulty but from the elegance of watching one's chain of interventions play out in real time.

    The final hour packs in more plot than most games manage in thirty. The revelation of Sissel's identity, the connection between Yomiel, Lynne, and Jowd, the philosophical discussion around death and what constitutes a life: all of it works because every question the player has been carrying since the opening scene receives a precise answer. The setup is clean, watertight, every curiosity rewarded. Capcom at their best: narrative architecture as engineering, where every beam bears weight and every joint holds. ***Ghost Trick*** is a machine with no wasted parts.

- title: "Ori and the Will of the Wisps"
  type: "game"
  creator: "Moon Studios"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/ori-and-the-will-of-the-wisps.jpg"
  posted: "2023-10-23"
  revised: "2023-10-23"
  text: |
    ***Ori and the Will of the Wisps*** remains the finest fusion of metroidvania and platforming I have played. Moon Studios took everything that made *Ori and the Blind Forest* (2015) extraordinary and expanded it without dilution: the movement is more fluid, the world larger and more varied, the Spirit Shards system allows customisation that the original's linear upgrade path could not accommodate. The boss encounters, a consistent weakness in the first game, are redesigned as cinematic set pieces: Mora's pursuit through the Mouldwood Depths, Kwolok's corrupted transformation, each fight serving both the mechanical and narrative arcs simultaneously.

    Gareth Coker's score carries the emotional architecture. The Luma Pools' harp arpeggios shift to minor as corruption spreads; the Windswept Wastes' sparse percussion mirrors the isolation of the desert traversal; Shriek's theme uses dissonance to communicate damage before the fight even begins. The final boss fight demonstrates the full convergence: narrative, art, music, and mechanics working together not as a climax but as a resolution, the mechanical difficulty expressing emotional closure rather than simply testing skill. The escape sequence that follows maintains this integration: the collapsing environment, the musical crescendo, the platforming challenge all moving as a single expressive gesture. Even knowing what the ending costs, I would not change a frame of it.

- title: "Lies of P"
  type: "game"
  creator: "Round8 Studio"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/lies-of-p.jpg"
  posted: "2023-10-11"
  revised: "2023-10-11"
  text: |
    ***Lies of P*** is the best soulslike outside FromSoftware's own catalogue. The combat system borrows *Dark Souls*' stamina management and *Sekiro* (2019)'s perfect guard timing, then adds a weapon assembly system that lets players combine blade and handle independently, creating hybrid movesets that feel distinct rather than derivative. The Fable Arts tied to each component introduce tactical variety that pure Souls combat lacks: the Puppet String's pull, the Flamberge's wide sweeps, each combination producing a different rhythm of engagement. Boss fights are consistently excellent, each encounter demanding both the patience of Souls and the aggression of Sekiro.

    Round8 understood that a soulslike's quality is measured not by originality but by coherence. The Belle Époque setting and Pinocchio framework make the borrowed structure feel purposeful rather than imitative: Krat's opera house and grand hotels in decay, the puppet-master's workshop, the alchemists' underground, all of it serving the fairy-tale logic of a puppet who lies his way towards humanity. The lying mechanic integrates the narrative theme into the mechanical loop: player choices affect P's humanity stat and the world's response, a layer of moral consequence that FromSoftware rarely attempts. Environmental storytelling follows the expected method, item descriptions and architectural decay building narrative, but the Belle Époque dressing gives familiar techniques a different texture. A game that took a known formula and made it feel like its own.

- title: "Star Wars Jedi: Survivor"
  type: "game"
  creator: "Respawn Entertainment"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/star-wars-jedi-survivor.jpg"
  posted: "2023-09-21"
  revised: "2023-09-21"
  text: |
    I did not expect it to rethink so much. ***Star Wars Jedi: Survivor***'s 3D traversal strikes a balance between metroidvania and soulslike that *Fallen Order* only approached: the vertical movement, the shortcut architecture, the way each planet's map reveals its full shape only after hours of exploration. Koboh alone is a remarkable piece of interconnected design, its layers folding back on themselves as new traversal abilities unlock previously visible but unreachable areas. The five combat stances, each with distinct timing and range, give the player genuine tactical options rather than cosmetic variation.

    Respawn understood that *Fallen Order* (2019) was a proof of concept, not a finished vision, and treated the sequel accordingly. Every system has been rethought, every rough edge smoothed, every good idea given room to develop. A sequel that understands expansion as deepening rather than inflation.

- title: "OXENFREE II: Lost Signals"
  type: "game"
  creator: "Night School Studio"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/oxenfree-ii.jpg"
  posted: "2023-08-12"
  revised: "2023-08-12"
  text: |
    The first game's only real flaw, the walking-simulator pacing, is left unaddressed and made worse: a one-hour story stretched across five or six, the already slow pace now almost unbearable. ***OXENFREE II: Lost Signals*** replaces Alex's teenage uncertainty with Riley's adult competence, and the shift removes the friction that made the original's choices feel consequential.

    *OXENFREE* (2016) was apparently a fortunate accident. ***OXENFREE II*** is the evidence. Night School Studio confirmed the worst suspicion about the original: that the magic was not a method but a lucky break.

- title: "The Talos Principle"
  type: "game"
  creator: "Croteam"
  creator_role: "by"
  year: 2014
  eval: "meh..."
  genre: "puzzle"
  image: "/assets/images/thoughts/games/talos-principle.jpg"
  posted: "2023-07-12"
  revised: "2023-07-12"
  text: |
    ***The Talos Principle***'s philosophical framing, the portentous questions about consciousness and free will, would carry more weight if the puzzles themselves demanded the cognitive flexibility that the themes invoke. They do not. The game reaches for Descartes and Turing and the Ship of Theseus, but the puzzles reduce to familiar spatial logic: redirecting lasers, stacking boxes, timing fans. There is a basic disconnect between what the game asks one to think about and what it asks one to do.

    *The Witness* (2016) solved this by making its puzzles embody its philosophy: the island's mysteries are inseparable from the act of perception, so solving them and understanding the game's ideas are the same activity. *Portal* (2007) solved it differently, making the puzzles the philosophy, the comedy, and the narrative in one gesture. ***The Talos Principle*** separates its ideas from its mechanics so thoroughly that one can skip every terminal entry and lose nothing of the puzzle experience. Milton is an interesting interlocutor; the dialogues are well-written. But a game whose deepest thinking happens in text boxes rather than in play has misidentified its own medium.

- title: "Katana ZERO"
  type: "game"
  creator: "Askiisoft"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "action platformer"
  image: "/assets/images/thoughts/games/katana-zero.jpg"
  posted: "2023-07-10"
  revised: "2023-07-10"
  text: |
    In just four hours, ***Katana ZERO*** transmits an entire post-war alternate setting to the player without a single exposition dump. The Behemoth plushie under the sofa bed, the herbal tea every night before sleep, the cassette player opened before each mission, the visual glitch simulating Chronos's effect on perception: Askiisoft uses the format of the game itself to show a memory-erased soldier's past, present, and future. The therapist sessions that open each chapter are mechanical gates: one can interrupt, refuse answers, demand clarity, and the therapist's discomfort reveals more about the world's power structures than any codex entry could.

    The combat's instant-death mechanic is not mere difficulty; it is a narrative device. Each failed attempt is a timeline that did not happen, each success the canonical version that plays back as a VHS recording once the level ends. The distinction between planning and execution, between precognition and reality, is built into every second of play. Time-slow turns a corridor of bullets into a puzzle of angles; the katana deflects projectiles with a precision that rewards rhythm over reaction. Form and content are inseparable.

    Askiisoft understood that brevity is a weapon: every scene carries the density it does because nothing is wasted, no idea outstays its welcome, no mechanic appears without narrative justification. The hotel sequence, where the player can choose to spare or kill a child's father while the child hides in the bathroom, is among the most arresting moral choices in any game I have played, not because the game moralises but because it refuses to. Four hours that leave a mark deeper than most forty-hour games manage.

- title: "The Legend of Zelda: Tears of the Kingdom"
  type: "game"
  creator: "Nintendo EPD"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/legend-of-zelda.jpg"
  posted: "2023-07-03"
  revised: "2023-07-03"
  text: |
    By inheriting *Breath of the Wild* (2017)'s physics engine, ***The Legend of Zelda: Tears of the Kingdom*** achieves the same astonishing emergence as its predecessor: equip a burning ruby sword and one can traverse snowfields without cold-resistance armour; attach a bomb flower to an arrow and one can skip a shrine's intended solution entirely. But in TotK, that engine finds its true purpose. Ultrahand and Fuse together unlock a degree of world interactivity that the original was reaching towards without quite grasping: players construct nearly infinite configurations, and the developers could not possibly have anticipated every solution. It is as though BotW's physics system was built for these abilities all along, and Nintendo simply needed six years to realise it.

    The reuse of Hyrule's map, predicted before launch as the game's greatest liability, becomes instead a source of unexpected resonance. Seeing Tarrey Town in the post-Upheaval world, seeing ancient ring-shaped ruins surrounding Kakariko Village, seeing Hyrule Castle risen and the chasm beneath it: one feels the weight of six years passed. The underground and sky islands are layered onto the original geography with structural rigour: every Lightroot corresponds to a surface shrine, grounding the new spaces in the old. The underground appears barren at first, gloom-choked and hostile to traversal on foot, but building a hoverbike with Ultrahand and soaring through its dark expanse transforms desolation into discovery. The Korok Forest redesign exemplifies this philosophy: where BotW used an invisible maze, TotK rewards players who understand the correspondence between underground and surface, who think to use Ascend from below.

    The main story is richer and more tightly paced than its predecessor's. The ancient temples, Zelda's past slowly unveiled, Dragon's Tears scattered as geoglyphs across the landscape: all building towards a Ganon encounter that would hold its own in a soulslike. Quality-of-life complaints from BotW persist: cooking animations, shrine completion cutscenes, the relative thinness of sky island content after the initial wonder fades. But these are surface blemishes on a structural achievement. *Elden Ring* (2022) edges it in world construction and combat; *Baldur's Gate 3* (2023) edges it in reactivity and text. But I do not think any game lets one feel as small within a world while simultaneously feeling as free. Both BotW and TotK changed game design: the first dismantled the open-world formula; the second rebuilt it with tools that make the player an architect rather than a tourist.

- title: "Divinity: Original Sin II"
  type: "game"
  creator: "Larian Studios"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/divinity.jpg"
  posted: "2023-06-22"
  revised: "2023-06-22"
  text: |
    ***Divinity: Original Sin II***'s reactivity is exceptional: across the main quest, nearly every major choice produces visible, long-term consequences, and even across multiple playthroughs new plot threads continue to surface. The elemental interaction system is the foundation: oil plus fire equals burning ground, rain plus electricity equals stunned enemies, teleportation plus environmental hazards equals creative problem-solving that the developers could not have fully anticipated. The world-building, the textual breadth and depth, the scene design: a world this vast and still this detailed is rare.

    The one disappointment is that the reactivity does not extend everywhere: many non-quest world scenes have quite low responsiveness, and the tonal inconsistency between the darker main storyline and some of the lighter side content can feel jarring. But none of that stops DOS2 being one of the greatest CRPGs. It made player agency and environmental interactivity feel newly systematic, and *Baldur's Gate 3* (2023) would later be measured against it.

- title: "NieR:Automata"
  type: "game"
  creator: "PlatinumGames"
  creator_role: "by"
  year: 2017
  eval: "disliked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/nier-automata.jpg"
  posted: "2023-04-05"
  revised: "2023-04-05"
  text: |
    A game that constantly talks about machines acquiring humanity while objectifying women more visibly than almost anything else in the medium. The theme is humanisation; the execution is the sexualisation of robots. ***NieR:Automata***'s much-discussed 'genre transgression', stitching together a pile of genres across multiple playthroughs, does not constitute formal innovation without clear intent. The repetitive multi-playthrough structure fragments an already thin plot across endings that recontextualise without deepening.

    The central story most worth telling is left untold; the sexualisation and innuendo most worth avoiding are in full swing. The music is excellent, the only redeeming element. The rest is style mistaken for substance.

- title: "Night in the Woods"
  type: "game"
  creator: "Infinite Fall"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/night-in-the-woods.jpg"
  posted: "2023-03-31"
  revised: "2023-03-31"
  text: |
    When the snow falls on the small town, I will still be in the rehearsal room, trying to play another song I have never heard. I will still chat with Mom at the breakfast table and sit with Dad watching *Garbo & Malloy* in the evening; Malloy looks a bit like Beatrice, a pale blue crocodile, and Garbo looks a bit like Angus. When it is all about to end, I will still be eating pizza in Gregg and Angus's living room. Beatrice will call me Mae Mayday; I will call Beatrice Bea. When it is all about to end, I will still be running around the town, hunting ghosts on the hillside, performing at the Halloween fair. I will still go up to the roof with Mr Chazokov to look at the morning star, listen to stories about constellations, imagine this town's ancient legends. I will still wake from nightmares with the cat god's voice lingering. ***Night in the Woods*** is a game about the end of everything: of youth, of industry, of a way of life, of the town that sustained it. Possum Springs is dying the way all small towns die, not with a catastrophe but with a slow leak of purpose.

    Mae dropped out of college because she stopped seeing things as things. She perceived the world as shapes: flat, abstract, geometric, drained of meaning. The game never names this clinically but the portrayal is precise; it is depersonalisation, and it is the reason she once attacked a classmate, unable to perceive him as a person. Beneath the surface, the town has its own pathology: a cult in the abandoned mines, older residents who sacrifice outsiders to a presence they believe sustains Possum Springs' fading economy. They are not cartoonish villains; they are desperate people who decided the future was worth killing for, which is also a description of every extractive industry that ever hollowed out a town like this. Against all of this, band practice. Four friends in a garage, playing songs badly, the rhythm game mechanically simple but narratively essential: the one communal act that still functions when everything else is falling apart.

    I will still remember Mom's every 'I love you honey' and Dad's every 'I love you kitten'. Angus told me 'Gregg is my corner'; and Bea told me 'You are the closest thing I have to a sister. And I don't want you to die.' The game is inseparable from its context now: the studio's dissolution, Alec Holowka's death, the allegations and grief that followed. All of it shadows the text, lending Mae's anxiety and Gregg's manic energy and Bea's exhaustion a weight the creators may not have intended but cannot disown. When it is all about to end, I will still choose to leave school, come back to this town, and embrace my past, the town's past, everyone's past.

- title: "The Case of the Golden Idol"
  type: "game"
  creator: "Color Gray Games"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/case-of-the-golden-idol.jpg"
  posted: "2023-03-29"
  revised: "2023-03-29"
  text: |
    Though the format carries echoes of *Return of the Obra Dinn* (2018), ***The Case of the Golden Idol*** achieves something different: where Obra Dinn's protagonist moves through physical space and the deduction feels embodied, Golden Idol's static scenes produce a more purely cerebral satisfaction. The word-bank system is deceptively elegant: one fills in blanks with terms harvested from the scene, and the constraint of limited vocabulary forces a precision of thought that open-ended deduction games cannot.

    Looking back, it is not a detective game in the strictly deductive-reasoning sense, but the storytelling is first-rate. The multi-century arc of the idol's corruption, each tableau revealing another generation's encounter with the same cursed object, gives the puzzle-solving a cumulative narrative weight. Color Gray Games makes detection pleasurable by tying each solution to another piece of the idol's history.

- title: "Wo Long: Fallen Dynasty"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  genre: "soulslike"
  image: "/assets/images/thoughts/games/wo-long-fallen-dynasty.jpg"
  posted: "2023-03-19"
  revised: "2023-03-19"
  text: |
    Since this is Team Ninja, comparison with *Nioh 2* (2020) is inevitable. ***Wo Long: Fallen Dynasty***'s deflection system produces stronger moment-to-moment impact; the weapon and skill systems are simplified, less ARPG-layered, but the simplification makes combat more immediately enjoyable. The morale system is an interesting addition: enemy rank relative to the player's creates dynamic difficulty within each level, rewarding flag-planting exploration with tangible combat advantage.

    Two disappointments: the narrative, though Team Ninja has never made a great one, and enemy variety. The latter is a general soulslike problem, but the repetition here becomes conspicuous in the final third. The run is brief but precise, an action system pared back until only its best reflexes remain.

- title: "To the Moon"
  type: "game"
  creator: "Freebird Games"
  creator_role: "by"
  year: 2011
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/to-the-moon.jpg"
  posted: "2023-03-06"
  revised: "2023-03-06"
  text: |
    Poor script, vestigial gameplay, transparent emotional manipulation. ***To the Moon***'s world looks packed, but one can only interact with three or four things per scene. Joey's appearance makes one wonder if Kan Gao actually read his own script. The game asks for tears that it has not earned.

    *What Remains of Edith Finch* (2017) demonstrated how walking-simulator mechanics can serve narrative rather than merely coexist with it; *Life Is Strange* (2015) showed how player choice integrates into emotional storytelling so that feeling arises from agency, not passivity. ***To the Moon***, arriving earlier than both, attempts something simpler: a linear emotional arc delivered through RPG Maker exploration. The ambition is modest and the execution matches. The music, melancholic and beautifully composed, does all of the emotional heavy lifting; strip it away and what remains is a screenplay that would not survive a first-year workshop. A game that would have been more honest as a short film.

- title: "OneShot"
  type: "game"
  creator: "Future Cat LLC"
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/oneshot.jpg"
  posted: "2023-02-26"
  revised: "2023-02-26"
  text: |
    After the Daniel Mullins trilogy, one develops a certain immunity to save-file manipulation games. ***OneShot***'s supposed choice between saving the world and saving the cat raises a question the game never earns: is this world built well enough to care about? The pixel art is charming, Niko is likeable in an uncomplicated way, and the file-system interactions are cleverly implemented. But cleverness of delivery cannot substitute for depth of content. The meta-framework, the fourth-wall breaks, the desktop notifications: all of it gestures towards profundity without doing the narrative work to make the profundity felt.

    *Undertale* (2015) used similar fourth-wall techniques but grounded them in a richly characterised world where every NPC carried enough personality to make choices feel consequential. *Inscryption* (2021) proved that the meta-game form can sustain real horror and genuine wonder simultaneously. ***OneShot*** has the technical vocabulary of these games without their emotional grammar. Good ideas deployed in a world too thin to hold their weight.

- title: "BioShock"
  type: "game"
  creator: "Irrational Games"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "FPS"
  image: "/assets/images/thoughts/games/bioshock.jpg"
  posted: "2022-12-05"
  revised: "2022-12-05"
  text: |
    ***BioShock***'s critique of Objectivism does not miss the details that reflect flaws in any ideological purity: Rapture is a monument to the idea that a society can be designed from first principles, and the game's atmospheric achievement is in making that monument feel simultaneously awe-inspiring and claustrophobic. The art deco decay, the distant whale song, the political slogans peeling off damp walls: Irrational Games built a world that critiques its own beauty. Andrew Ryan's broadcasts carry the cadence of conviction, and the game is smart enough to let them remain persuasive even as Rapture's failure surrounds the player.

    The hacking system is hostile to the player, and certain mechanics feel dated. But Rapture deserves respect: a game with real soul, and a setting that, nearly twenty years later, remains among the most fully realised in the medium.

- title: "It Takes Two"
  type: "game"
  creator: "Hazelight Studios"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "co-op adventure"
  image: "/assets/images/thoughts/games/it-takes-two.jpg"
  posted: "2022-11-26"
  revised: "2022-11-26"
  text: |
    ***It Takes Two*** keeps renewing itself: every chapter introduces a new mechanic, explores it thoroughly, and moves on before repetition sets in. The Tree chapter's sap-and-match projectile system is a genuine surprise, a design idea that makes one sit up and pay attention. The Time Manipulation sequence demands split-second coordination between both players. The snow chapter layers traversal mechanics on top of combat in ways neither genre typically attempts.

    Difficulty is perfectly welcoming: great fun playing with my wife. Hazelight design every puzzle around two minds, two perspectives, two sets of hands, and the solutions demand communication instead of merely parallel execution. A game that makes playing together feel like the point, not the concession.

- title: "Ori and the Blind Forest"
  type: "game"
  creator: "Moon Studios"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/ori-and-the-blind-forest.jpg"
  posted: "2022-11-08"
  revised: "2022-11-08"
  text: |
    The bash ability alone makes ***Ori and the Blind Forest*** feel singular. Every challenge after one gets bash builds towards the Ginso Tree escape, where, for those few minutes, Gareth Coker's score and the fluid wall-climb-plus-bash produce the most adrenaline-fuelled sequence I have ever experienced in a metroidvania. The timing of each bash redirects Ori's momentum mid-air, turning projectiles and enemies into launch platforms, and the tree's rising water forces continuous upward movement that leaves no room for hesitation. It surpasses even *Hollow Knight* (2017)'s White Palace, because the Ginso Tree is difficult and musical: each input lands on a beat the game has been teaching one to hear.

    Moon Studios treated platforming as a language, and in the Ginso Tree sequence they achieved fluency. Watching *Ori and the Will of the Wisps* (2020) move towards *Hollow Knight*'s direction only clarifies how singular the first game's pure platforming high point remains. The Forlorn Ruins and Mount Horu sustain the standard the tree sets, each escape sequence a variation on the same theme of controlled panic, and Coker's music carries the emotional weight throughout without a single weak passage. What an adventure.

- title: "Fallout 4"
  type: "game"
  creator: "Bethesda Game Studios"
  creator_role: "by"
  year: 2015
  eval: "disliked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/fallout-4.jpg"
  posted: "2022-11-05"
  revised: "2022-11-05"
  text: |
    Dear Shaun: can you really not see that the Institute is using you? ***Fallout 4***'s main narrative collapses under its own inconsistencies. The Institute Shaun leads talks endlessly of grand altruism, of eliminating the Railroad and Brotherhood for humanity's future, but what threat have these factions actually posed? Life on the surface is not catastrophic: Diamond City is doing fine. The Institute is running low on power, yet the writing never explains why a faction with teleportation, synth labour, and surface access has no better political imagination than secrecy and murder.

    Smart as Shaun is, why can he not see any of it? Though of course the player-character is no hero either: once I became Director I could have non-violently freed all the synths, but chose violence instead. Maybe the writers had no basic logic. Is that it, Shaun?

- title: "Control"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/control.jpg"
  posted: "2022-10-24"
  revised: "2022-10-24"
  text: |
    The Federal Bureau of Control occupies a featureless brutalist skyscraper at 33 Thomas Street, Manhattan. From outside it is finite; inside it is potentially endless: corridors rearrange, floors multiply, thresholds open into other dimensions. ***Control*** builds its cosmic horror out of architecture and paperwork. Remedy filled the Oldest House with redacted Bureau memos, containment protocols for Altered Items (a rubber duck that follows people, a hand chair whose fingers move, a mirror that transports its viewer into an imperfect reality), and live-action Threshold Kids puppet-show videos that teach paranatural safety to child detainees in the cadence of a cheerful preschool programme. The SCP Foundation is a visible ancestor; Anna Megill, the narrative lead, has cited the SCP site as an influence directly. But where SCP entries are written for the reader's benefit, the Bureau's documents are written for the Bureau's: institutional, self-justifying, redacting their own cruelties. The building contains things that should not exist, but the Bureau's decades of quiet containment are worse: stealing children with psychic abilities, locking anomalies in cells, and filing the results under codes that no one outside the building will ever read.

    Jesse Faden (Courtney Hope) arrives at the Oldest House searching for her brother Dylan, taken by Bureau agents seventeen years earlier after a paranatural event in the town of Ordinary. She finds the previous Director dead by his own hand, picks up the Service Weapon, and is ordained Director by an extradimensional entity called the Board, who communicates in overlapping alternatives: things are 'bound/delivered', Jesse is 'approved/elusive'. The combat that follows is the best that Remedy has built: Jesse rips concrete from walls and hurls it with telekinesis, levitates above cover to rain gunfire from the Service Weapon's shifting forms, and chains abilities with a fluidity that the studio's earlier work never achieved. The Ashtray Maze remains one of the most extraordinary sequences in any game I have played: corridors fold Escher-style while Old Gods of Asgard's 'Take Control' drives the encounter forward, the architecture and the music and the combat fused into a single escalating rush that earns every second of the ten hours that precede it. Jesse's arc is about acceptance: of her powers, of the strangeness of reality, of a building that tests comprehension at every turn. The Oldest House does not want to be understood; it wants to be survived, and the game lives in that distinction.

    The main story is, at times, underdeveloped: Jesse's conversations with Polaris (a benign resonance entity that no one else perceives) can feel like internal monologue addressed to empty air, and the Hiss invasion that provides the game's main threat is more atmospheric than it is narratively resolved. But the underdevelopment is also a structural choice that the game's best moments justify. The Bureau's institutional pathology, not the Hiss, is the true antagonist. Dylan Faden, imprisoned since childhood, sided with the Hiss because the Bureau's containment regime had already hollowed him out; the resentment that drove him to embrace invasion was manufactured by the institution that claimed to protect humanity from exactly this kind of catastrophe. Ahti the janitor (Martti Suosalo, who won a BAFTA for the role), designated Entity A-001, was present when the Bureau discovered the Oldest House; nobody employed him, nobody understands him, and his Finnish idioms and quiet omnipotence suggest that he may be maintaining the building's cleanliness and its ontological stability at once. The game keeps returning to the same unpleasant alignment: the filing system that catalogues the anomalies is also the system that created the conditions for catastrophe.

- title: "Control: AWE"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/control-awe.jpg"
  posted: "2022-10-28"
  revised: "2022-10-28"
  text: |
    The Investigations Sector is the Oldest House's basement and its confession booth: the place where the Bureau locked away the cases too dangerous to contain in the normal way. ***Control: AWE*** opens this sector and introduces Dr. Emil Hartman, recognisable from *Alan Wake* (2010), as a creature who has fused with the Dark Presence and now occupies a containment cell that the Hiss invasion has breached. The DLC's main mechanic, darkness avoidance (Hartman cannot be harmed in shadow, and the player must manipulate light sources to make him vulnerable), borrows directly from the original Wake and translates it into Control's telekinetic grammar with enough friction that the encounters feel like genuine dread rather than a routine damage-window dance.

    The connective tissue carries the argument. Bureau case files reference Bright Falls, the FBC's attempt to contain the Dark Presence, and Alan Wake's disappearance into Cauldron Lake, all framed as institutional paperwork, as though a writer trapped in a supernatural hell-dimension is simply another Altered World Event to be coded, filed, and redacted. The sector keeps making the same point: containment fails because bureaucratic categories cannot hold things that refuse to behave like categories. Hartman was a psychologist before he was a monster, and the Bureau's clinical language for his transformation reveals more about the institution's limits than about the creature himself. AWE hinges two of Remedy's worlds together, with documentation, not spectacle, as the scarier connector.

- title: "Control: The Foundation"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2020
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/control-foundation.jpg"
  posted: "2022-10-27"
  revised: "2022-10-27"
  text: |
    Beneath the Oldest House lies the Foundation: a cavern of astral geometry where the Nail, a structure that anchors the building to the Astral Plane, is fracturing. Jesse descends at the Board's insistence, and what follows is the least interesting environment Remedy put in Control. The cave systems lack the architectural uncanniness that makes the Oldest House extraordinary; a brutalist government building that disobeys physics is inherently more unsettling than a supernatural cavern, because the former violates expectations while the latter merely confirms them. The new powers (Shape and Fracture, which create and destroy crystal formations) are underused: puzzles feel like key-and-lock exercises rather than extensions of Jesse's growing command over the paranatural. The Marshall confrontation has emotional potential, a former Bureau ally turned hostile by the Astral Plane's influence, but arrives too quickly to earn its weight. The Foundation is a prelude to something (the Board's true nature, the Former's rebellion, the building's ontological fragility), not a story in its own right.

- title: "The Legend of Zelda: Breath of the Wild"
  type: "game"
  creator: "Nintendo EPD"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/legend-of-zelda-2.jpg"
  posted: "2022-10-20"
  revised: "2022-10-20"
  text: |
    I thought after *Elden Ring* (2022) I would not have that free, comfortable feeling in a game for a long time, until I picked up the Switch again, opened ***The Legend of Zelda: Breath of the Wild***, and lost myself chasing Korok seeds: climbing mountain after mountain, swimming up waterfall after waterfall, watching a flying dragon leave a glimmer of light through the clouds, encountering a Lynel patrolling the plain with a great axe. I was saved from death by a flame spear on my back in the snowfield; maintained my temperature in the Gerudo Desert with ice harvested from the open plain. Every scene overflowing with freedom.

    The physics engine is the real achievement. Fire spreads through grass and creates updrafts that the paraglider can ride; metal objects conduct electricity during thunderstorms, forcing one to unequip armour or die; a frozen slab of meat can become a makeshift raft. The rules are consistent and discoverable, which means every solution feels earned rather than prescribed. The shrines, each a self-contained physics puzzle, teach the player to think systemically, and the knowledge transfers cleanly to the open world: a shrine teaches one to use Stasis on a boulder; ten minutes later, one launches a boulder at a Hinox in the field.

    However many details I am critical of, watching the sunrise from the snowfield, it all evaporates. Not sure how to accurately express my love for this world and what BotW gives me. Even the small green stamina wheel fills me with inexplicable affection. Nintendo EPD dismantled the open-world formula that *Skyrim* (2011) and *Assassin's Creed* (2007) had calcified and replaced it with curiosity as the only navigation system. No quest markers pointing to the next objective, no minimap cluttered with icons: just the world, and the freedom to walk towards whatever catches one's eye.

- title: "Life Is Strange"
  type: "game"
  creator: "Dontnod Entertainment"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/life-is-strange-2.jpg"
  posted: "2022-09-29"
  revised: "2022-09-29"
  text: |
    Max Caulfield's time-rewind mechanic is the formal key: Dontnod lets the player see the outcome of both choices before committing, which means the power of choice in ***Life Is Strange*** lies in the feeling of having chosen with full knowledge and still being unable to prevent what follows. The first four episodes build Arcadia Bay and Blackwell Academy with the patience of someone who understands that a town has to feel lived-in before its destruction carries weight.

    The final episode drops off sharply, its writing thinning and environments turning bleak where the earlier episodes were textured, as though the budget ran out before the story did. The voice acting for Max and Chloe carries; the supporting cast is uneven. The dialogue writing is the more persistent weakness: teen speech so stilted it occasionally undermines what the performances are trying to build. But Max and Chloe's relationship remains genuine, and the final choice still works: four episodes of carefully accumulated texture make the town feel worth grieving over.

- title: "Doki Doki Literature Club!"
  type: "game"
  creator: "Team Salvato"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  genre: "visual novel"
  image: "/assets/images/thoughts/games/doki-doki-literature-club.jpg"
  posted: "2022-09-27"
  revised: "2022-09-27"
  text: |
    ***Doki Doki Literature Club!***'s sharpest element is its resistance against the visual novel's own conventions: the game knows it is a visual novel, and its horror arises from the friction between that knowledge and the player's expectations. Monika's awareness of the medium, her ability to delete character files and rewrite dialogue, produces a few effective moments of uncanny recognition. But the game still relies on the illusion of free will; reading the user's account name to generate jumpscares actually deepens its mechanical quality instead of escaping it.

    The horror elements are too crude, the jumpscares too low-grade, and Sayori's arc deserved more psychological depth than the game's format allows. What remains is a clever formal exercise that mistakes cleverness for profundity.

- title: "The Hex"
  type: "game"
  creator: "Daniel Mullins Games"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/hex.jpg"
  posted: "2022-09-26"
  revised: "2022-09-26"
  text: |
    My favourite Daniel Mullins game. ***The Hex*** uses genre-mixing as a narrative tool: each of the six characters inhabits a different game genre, and the shifts between them reveal something about the person inside. The Lazarus segment is the standout, its 2D-to-3D puzzle transitions producing a formal surprise that the earlier chapters build towards without announcing. The final Walk calls to mind *The Beginner's Guide* (2015); I thought the *Fallout* (1997)-like mini-game appearing in the Walk was the game's biggest secret, and then something more unsettling followed.

    Mullins understood that genre itself carries emotional information: a platformer feels different from a strategy game not just mechanically but psychologically, and The Hex exploits that difference to give each character an interior life expressed through the rules they inhabit. When one discovers the 'A Beeper' easter egg, one hopes for an ARG like *Inscryption* (2021)'s; sadly not, but the ambition is visible. A clear step up from *Pony Island* (2016), and the bridge to everything Mullins would do next.

- title: "Pony Island"
  type: "game"
  creator: "Daniel Mullins Games"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/pony-island.jpg"
  posted: "2022-09-24"
  revised: "2022-09-24"
  text: |
    As Mullins's first game, ***Pony Island***'s puzzle element is more limited, surprisingly action-leaning: endless-runner segments, code-injection puzzles, boss encounters that corrupt the interface itself. But the surprise is tonal. The premise, a broken arcade machine built by the devil to trap souls, sounds like a student project pitch; Mullins turns it into something disquieting by committing to the bit with absolute seriousness. The devil's Q&A segment is astonishing: a moment where the conversation between player and program achieves a philosophical charge that most 'philosophical' games never reach.

    The devil's function is game-design and psychological at once: a portrait of creative narcissism, the designer who traps an audience in a closed system and demands their attention. The arcade machine's refusal to let one quit, its corrupted menus and false exits, is funny and frightening in equal measure because one recognises the impulse. *The Hex* (2018) and *Inscryption* (2021) go further, building more elaborate structures from this foundation. But ***Pony Island*** established the Mullins template: games that know they are games and whose horror arises from that knowledge, delivered with a brevity and confidence that most debuts cannot manage.

- title: "Inscryption"
  type: "game"
  creator: "Daniel Mullins Games"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "card game"
  image: "/assets/images/thoughts/games/inscryption.jpg"
  posted: "2022-09-15"
  revised: "2022-09-15"
  text: |
    Having read about ***Inscryption***'s ARG and finding the blue disc in the same location, I understood that Daniel Mullins truly commits to the meta in ways no other developer does. The Soviet Karnoffel Code unearthed from OLD_DATA, Kaycee's life and death, P03's Great Transcendence: all sit behind the game one thought one was playing. Peeling reality layer by layer, encasing the dissected reality inside another reality, slotting all of that into an enormous ARG that spills into real-world artefacts and videos.

    I will always remember the night I accidentally pressed Ctrl+C at the new-game loading screen: like finding a hidden passage in *Dark Souls* (2011), astonished and unnerved at the same time. This level of meta, I have barely seen in my whole gaming life. Mullins is not making games about games; he is making games that are games about themselves, and the distinction is not pedantic.

- title: "Spiritfarer"
  type: "game"
  creator: "Thunder Lotus Games"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "adventure"
  image: "/assets/images/thoughts/games/spiritfarer.jpg"
  posted: "2022-09-12"
  revised: "2022-09-12"
  text: |
    After Gwen left, I never planted coffee beans again: sold them all to the wandering merchant. ***Spiritfarer*** is a game about departure, and Thunder Lotus understood that departure gathers weight through the rituals that precede it. Atul, the frog uncle, disappears overnight without a word: no Everdoor farewell, no final conversation, just an empty cabin. That vanishing is the game's sharpest formal choice, because it mirrors how people actually disappear from a life.

    Alice, the hedgehog grandmother whose dementia strips her recognition of Stella until she mistakes her for her own daughter, and Gustav, the owl curator whose aloof snobbery dissolves into something fragile at the end, are the two departures that stayed with me. The later passengers become increasingly grating, the boat increasingly slow. Perhaps Thunder Lotus intended the late-game tedium to make one miss Gwen and Atul more acutely. It works.

- title: "The Outer Worlds"
  type: "game"
  creator: "Obsidian Entertainment"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "RPG"
  image: "/assets/images/thoughts/games/outer-worlds.jpg"
  posted: "2022-08-19"
  revised: "2022-08-19"
  text: |
    The first three hours are excellent, especially the moral dilemmas on Terra 2: capitalism's company towns versus libertarian defectors, neither side looking right. People on the street notice one is wearing Marauder gear; Grace and Thomas remember what one has done for them. ***The Outer Worlds*** begins with promise and progressively empties.

    From the Groundbreaker onward, the world hollows out; companion backstories are thin enough that even Parvati and Junlei's romance comes as a surprise. The thin story and unfinished systems reflect Obsidian's helplessness at the time. Still, the CRPG-plus-immersive-sim combat loop is adhesive enough to carry one through: mechanical design compensating for a failing narrative, up to a point.

- title: "DEATHLOOP"
  type: "game"
  creator: "Arkane Studios"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "FPS"
  image: "/assets/images/thoughts/games/deathloop.jpg"
  posted: "2022-08-07"
  revised: "2022-08-07"
  text: |
    Updaam in the morning, Karl's Bay in the evening, Fristad Rock at noon, the Complex at night: Blackreef has the look of a place Arkane loved making. Sébastien Mitton's art direction carries a great deal of the game by itself: Swinging Sixties colour over military concrete, AEON posters selling immortality as lifestyle branding, conversation pits and egg chairs inside cliffside lairs, a party island built on top of old temporal experiments that nobody at the party cares to understand. Colt and Julianna cut through that surface with actual charge. Jason E. Kelley and Ozioma Akagha make the radio calls feel like harassment, flirtation, family argument, and performance at once, and the best human invasions briefly make Blackreef dangerous in the way the story keeps claiming it is.

    The trouble starts when the premise asks for investigation and the game answers with administration. Dinga Bakaba called ***DEATHLOOP*** an 'inverted Cluedo', a murder puzzle whose solution is the Golden Loop: eight Visionaries, four districts, four time periods, one perfect day. That sounds like a beautiful Arkane structure, almost a Hitman board folded through *Groundhog Day* (1993). In the final game, fear of the player missing the next step is visible everywhere. A lead updates; a marker appears; the objective tracker tells one which door, which tape, which conversation, which time of day. The mystery becomes legible too early, then obedient for too long.

    Arkane had already built Dunwall and Karnaca out of routes, overheard plans, balcony gaps, safes, wall-of-light rewiring, political mess. In *Dishonored* (2012), information changes space: a servant's rumour, a safe code, a patrol pattern, a non-lethal option that alters the moral contour of a mission. In ***DEATHLOOP***, information often changes the UI. The game says that knowing Blackreef is power, then keeps shrinking knowledge into permission to follow the next highlighted lead.

    The combat has its adhesive pleasures. Shift across rooftops remains satisfying; Nexus turns a room of Eternalists into one shared mistake; a good silenced pistol and a handful of trinkets can make Colt feel wonderfully predatory. But the systems narrow exactly when a loop game should widen. Once infusion removes equipment anxiety and the better guns arrive, Colt overpowers the island; Shift and Nexus solve almost everything; Havoc, Karnesis, and Aether become decorative toys for enemies too dim to demand them. The Visionaries have more poster design than dramatic weight. The Eternalists are party props with pathfinding.

    *Prey: Mooncrash* (2018) used repetition as pressure: limited resources, altered routes, small plans broken by practical accidents. ***DEATHLOOP*** uses repetition as staging. Blackreef changes across the day, the party keeps moving, the art keeps promising an island of secrets, but the player's understanding rarely has to become more exact. The disappointment is sharper because the surface is so good. I liked being on Blackreef more than I liked playing through Blackreef.

- title: "Cyberpunk 2077"
  type: "game"
  creator: "CD Projekt Red"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/cyberpunk-2077.jpg"
  posted: "2022-07-29"
  revised: "2022-07-29"
  text: |
    It is 2022, patch 1.52, and there are still too many flaws. Background popping is unresolved; vehicles still fall from the sky. But gunplay with the DualSense, vehicle handling, facial detail, the main and side quest quality: all impressive. ***Cyberpunk 2077*** is a game that should not be good yet and is good anyway. After *Horizon: Forbidden West* (2022) and *Ghost of Tsushima* (2020)'s high repetition rates and crushingly dull stories, landing on an open-world RPG with actual writing is unexpected.

    CD Projekt Red's Night City feels populated with intention rather than generated by algorithm. The characters speak as though they have lives outside the quest; the side stories carry emotional weight disproportionate to their length; the main quest tells a story worth telling. That the technical scaffolding still wobbles beneath it all only makes the whole thing more improbable.

- title: "Days Gone"
  type: "game"
  creator: "SIE Bend Studio"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/days-gone.jpg"
  posted: "2022-07-10"
  revised: "2022-07-10"
  text: |
    Fresh at first, but ten hours in, ***Days Gone*** is still the standard open-world formula. The freaker hordes are a technical achievement, a spectacle of emergent chaos that no other open-world game of its generation attempted at this scale, but the world between hordes is hollowed out, the missions repetitive, the characters serviceable but unmemorable.

    The story is better than the game's reception suggested. Deacon St. John starts as a generic gruff protagonist but accrues unexpected dimension across the runtime; the relationship with Boozer achieves a quiet tenderness that the marketing never hinted at. The late-game revelations work precisely because one has spent so long in this world's particular brand of loneliness. But the first fifteen hours are a slog of repetitive camp-clearing and fetch quests that will lose most players before the narrative payoff arrives. A game undone by pacing.

- title: "SOMA"
  type: "game"
  creator: "Frictional Games"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "horror"
  image: "/assets/images/thoughts/games/soma.jpg"
  posted: "2022-07-09"
  revised: "2022-07-09"
  text: |
    'Catherine, are we alive?' ***SOMA***'s question comes down to the body: what is a mind without the substrate that generated it, and does the answer change if the substrate is silicon rather than carbon? Frictional Games built the PATHOS-II facility as an underwater thought experiment, each section posing a variation of the same question until the cumulative weight produces something closer to philosophy than to horror.

    The final choice is devastating because the game has spent five hours making one care about the answer. Whether one copies or does not, the question persists: if a perfect copy of a consciousness believes itself to be alive, what authority does the original have to disagree? ***SOMA*** is a horror game that frightens the player with implications more than monsters.

- title: "Ghost of Tsushima: Director's Cut"
  type: "game"
  creator: "Sucker Punch Productions"
  creator_role: "by"
  year: 2021
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/ghost-of-tsushima.jpg"
  posted: "2022-06-28"
  revised: "2022-06-28"
  text: |
    The optimal way to experience ***Ghost of Tsushima: Director's Cut*** is to ignore every side quest and play the main story straight through. The stance system introduces a welcome rock-paper-scissors variety in the open-world formula: Stone for swordsmen, Water for shields, Wind for spears, Moon for brutes. But those comparing the swordplay to *Sekiro* (2019) are dreaming: one can spam heavy attacks to guard-break through nearly every encounter, and beyond four human types and two beast variants, enemy diversity is almost non-existent.

    The side quests are worse still. Lady Masako's nine-chapter arc investigating her family's betrayal builds towards a duel with Jin, after which he simply says 'Don't try to kill me again.' The only side story worth praising is the monk Norio's, a nine-quest chain that builds a fully realised character in a sea of interchangeable quest-givers. The visuals, at least, are beyond reproach: following foxes to Inari Shrines is tedious, but the scenery along the way never fails. A beautiful open-world game, which is another way of saying an open-world game.

- title: "The Forgotten City"
  type: "game"
  creator: "Modern Storyteller"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/forgotten-city.jpg"
  posted: "2022-06-22"
  revised: "2022-06-22"
  text: |
    I know it started as a *Skyrim* (2011) mod, but when ***The Forgotten City*** suddenly became an FPS after entering the Shrine of Diana, that still caught me off-guard. The story flows beautifully, the puzzle experience is excellent, and several plot twists expressed through the game's format strike with real force. Modern Storyteller took the strongest idea from their mod and built a game around it with admirable restraint: no padding, no filler, just a tight time-loop mystery that rewards curiosity and punishes assumption.

    My favourite puzzle game to date. The Golden Rule carries the narrative and the design at once: the city is small enough to be fully knowable and complex enough to surprise on every loop.

- title: "The Witness"
  type: "game"
  creator: "Thekla Inc."
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "puzzle"
  image: "/assets/images/thoughts/games/witness.jpg"
  posted: "2022-06-17"
  revised: "2022-06-17"
  text: |
    Jonathan Blow gave me many a-ha moments, and the ones I remember all involve the island answering the panel. The stream touchable from the mountain top; the apple in the neighbouring garden; the sun completing a line; jungle sounds that stop being ambience and start behaving like notation. The panel grammar is beautiful when it draws perception outward, when a rule learned on a flat screen makes the world newly available. For a while, ***The Witness*** feels like training in attention.

    Blow's austerity is legible in every missing verb: no jump, no inventory, no dialogue tree, no object one carries from room to room. One walks, looks, draws lines. The game tries to teach a grammar without speech, and the ordinary panels are elegant at first because they respect that ambition. Black and white squares, coloured paths, stars, sunbursts, polyominoes, sound cues: each area begins with a small alphabet and asks one to infer its grammar through arrangement. A puzzle that looked impossible ten minutes ago becomes obvious after another garden, another quarry wall, another row of training panels, and the mind feels itself changing shape in small increments.

    Blow has spoken about games as nonverbal communication, and ***The Witness*** approaches its own philosophy most closely when communication happens through relation: shadow to line, sound to path, apple to branch, sun to panel. In these moments, the island completes the sentence that the panel begins. I remember the pleasure because it was bodily as much as intellectual, the small turn of the camera, the step backwards, the sudden recognition that the clue had been visible all along and I had not yet learned how to see it.

    My patience ran out inside the mountain. The late-game panels start asking for a kind of obedience that has little to do with wonder: timed runs, perspective fiddling, colour rules stretched past delight, puzzles whose answer feels like submission to Blow's private appetite for exhaustiveness. Hundreds of flat boards turn the island into a showroom for a grammar that has exceeded its expressive range. When a puzzle asks one to stare at a panel for ten minutes, fail for reasons that feel unilluminating, then walk to another panel that asks for the same mood again, attention becomes taxation.

    The audio logs and theatre clips worsen the imbalance. Scientists, mystics, poets, television documentaries, religious fragments: voices without bodies scattered across a world almost emptied of human situation. I understand the gesture, knowledge pursued as its own reward, perception stripped of ordinary narrative compensation. But knowledge without situation becomes sterile quickly. A Richard Feynman clip, a James Burke clip, a Buddhist fragment, a theorem-like puzzle rule: all are treated as pieces of the same purified inquiry, and the purification removes the human mess that made the inquiry necessary. By the end, that cleanliness has curdled into coldness.

    I still think of the stream, the apple, the sun, the jungle sounds. ***The Witness*** is extraordinary whenever the island teaches the panel and the panel teaches the island. Too often, especially near the end, it behaves like a beautiful place designed by someone who trusts perception more than people.

- title: "What Remains of Edith Finch"
  type: "game"
  creator: "Giant Sparrow"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/what-remains-of-edith-finch.jpg"
  posted: "2022-06-13"
  revised: "2022-06-13"
  text: |
    ***What Remains of Edith Finch*** is the first game that made me feel completely in the protagonist's perspective. Giant Sparrow achieved something that most walking simulators attempt and few accomplish: the shift from 'I am controlling a character' to 'I am this person, in this house, touching these objects'. Lewis's fish-gutting sequence is one of my favourite game sequences: the split screen between labour and imagination, the fantasy growing more vivid as the fish-gutting grows more rote, until the two merge and the knife does what the daydream was always building towards.

    Three hours containing thirty hours of experience. Giant Sparrow knew exactly how long each story needed to be, and not a moment longer.

- title: "TUNIC"
  type: "game"
  creator: "Andrew Shouldice"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/tunic.jpg"
  posted: "2022-06-12"
  revised: "2022-06-12"
  text: |
    A beautiful puzzle game that could lose the soulslike component entirely. ***TUNIC***'s collecting, upgrades, and manual-page clues gave me a puzzle-and-play experience that often exceeded most *Zelda* (1986) puzzles: many a-ha moments. The manual system is clever: on the surface, fifty-six scattered pages, but the underlying logic is one puzzle connected to another, with the manual itself functioning as a meta-puzzle framing the entire experience.

    The boss design disappoints: long health bars, unclear invincibility frames, the 2.5D camera rotation, and most fights feel empty. The Heir turns out to be the best-designed one, which is a surprise. I would keep everything except the boss fights.

- title: "Dark Souls II: Scholar of the First Sin"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark-souls-ii.jpg"
  posted: "2022-06-03"
  revised: "2022-06-03"
  text: |
    ***Dark Souls II: Scholar of the First Sin*** is the most contested entry in the Souls catalogue. Shibuya began the project aiming for accessibility and sorrow; midway through, development went off course, Miyazaki stepped in, and Tanimura inherited a game's worth of pre-built assets that he had to repurpose into a coherent world under time pressure. The result is simultaneously the series' boldest experiment and its most mechanically compromised. But what DS2 dared is worth naming. Power stancing, which let any two similar weapons combine into a dual-wield moveset, was abandoned by *Dark Souls III* (2016) and returned as a core system in *Elden Ring* (2022); Miyazaki himself acknowledged that DS2 bears the closest resemblance to Elden Ring. The bonfire ascetic, which bumps a single area into New Game Plus without resetting the world, has no equivalent in any subsequent title. And NG+ itself was rebuilt from the ground up: new enemy placements, new boss variations, new items available only on the second cycle. No other Souls game invested this seriously in what happens after the credits.

    The costs are real. ADP governs roll i-frames through a stat that the game describes only as affecting 'agility and all resistances', and a player who picks the Warrior class starts with five invincibility frames where a Sorcerer gets nine; the game never explains this, and the disparity is invisible until one watches a YouTube video thirty hours in. Hitboxes are the worst that FromSoftware have shipped. The base game's forty-one bosses are mostly forgettable: too many humanoids with overhead swings, and Nashandra arrives so late and with so little preparation that she feels like the throne room's afterthought. Most damning is the world: the elevator from Earthen Peak to Iron Keep rises into a lava lake that is not visible from below, and dozens of similar joints reveal a map assembled from repurposed assets rather than designed as an interconnected space. But Majula, the hub bathed in perpetual golden-hour light, holds a warmth that no other Souls location possesses, and Lucatiel of Mirrah, who begs the player to remember her name as she loses the ability to remember it herself, is the series' most direct portrait of what the Undead Curse actually takes. DS2 is the least polished Souls game and the one that tried the most things worth trying; the series would be smaller without it.

- title: "Dark Souls II: Crown of the Ivory King"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark-souls-ii-crown-ivory-kin.jpeg"
  posted: "2022-06-08"
  revised: "2022-06-08"
  text: |
    ***Crown of the Ivory King*** is the only narrative in DS2 that earns the word 'tragedy' without qualification. Each of the four Children of Dark sought a powerful king to sustain herself; three corrupted what they found. Alsanna, Silent Oracle, born from Manus's fear, came to the Ivory King with the same intent, but the Ivory King knew what she was: the Eleum Loyce sword, two intertwining blades, one of light and one of dark, is described as proof that he understood her origins. He loved her regardless, and she did not destroy what she touched. He built the frozen city of Eleum Loyce over the mouth of the Old Chaos itself, placed his throne directly above the pit, and when he sensed his soul degrading, he walked into the fire with his most loyal Loyce Knights and never returned. Alsanna remained in the Grand Cathedral, maintaining the seal, honouring his wishes. The DLC builds its climax around this sacrifice: the player drops into the Old Chaos with up to four recruited Loyce Knights, who charge the portals where their corrupted former comrades emerge, seal them through self-immolation, and leave the player to face the Burnt Ivory King alone. The number of knights that one has found through exploration directly determines the difficulty of the fight; thoroughness is rewarded with spectacle and with mercy. The King himself fights with a flaming ultra greatsword that he buffs partway through, fast and relentless, and upon death he calls out 'Alsanna'. The frozen city above is beautiful, the cathedral architecture half-buried in snow, but the Frigid Outskirts (a featureless blizzard with respawning ice horses leading to a double-tiger fight) is the worst optional area that FromSoftware have shipped in any game. It does not matter, though. The love story stays: a king who built a kingdom to contain something that could not be contained, a bride born of fear who transcended it, and the fact that his last word, even after the Chaos consumed everything else, was her name.

- title: "Dark Souls II: Crown of the Old Iron King"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark-souls-ii-crown-old-iron-king.jpg"
  posted: "2022-06-07"
  revised: "2022-06-07"
  text: |
    Every figure in ***Crown of the Old Iron King*** is defined by what is no longer there. The Old Iron King built an empire on smelted iron and was struck down by his own creation before the player arrives. Sir Alonne, the wandering swordsman who trained the king's soldiers and helped build the kingdom from nothing, left at the peak of its power for reasons the game never explains; the king named his elite guard 'Alonne Knights' in memoriam, described as 'very much like a gesture to a deceased friend'. Nadalia, Bride of Ash, a fragment of Manus born of loneliness, journeyed to Brume Tower seeking a king to sustain herself; finding him already dead, she renounced her flesh and dispersed as ash into twelve idols that whisper and heal and curse throughout the corridors. Sir Raime, once one of Vendrick's two most trusted knights, was exiled after confronting the king about Nashandra's corruption; he wandered until he reached the tower and accepted Nadalia's final soul-fragment in exchange for servitude, a knight without a kingdom serving a queen who was only smoke. The DLC builds its mechanical identity around this absence: the Ashen Idols that sustain enemies can only be destroyed with a limited supply of Smelter Wedges, forcing genuine resource-management decisions about which corridors to pacify and which to endure. The Fume Knight, Raime himself, fights in a bare rectangular arena with no gimmicks, no adds, no environmental assistance: phase one dual-wields a straight sword and an ultra greatsword at staggered rhythms; phase two discards the shorter blade and ignites the greatsword with dark flame. FromSoftware's own data recorded a 93% failure rate. If the player wears Velstadt's helm, Raime skips phase one entirely, the old hatred overriding his composure. Sir Alonne, accessible only through the Ashen Mist Heart, fights in a grand throne room at the end of a punishing gauntlet; if one defeats him without taking a single hit, he performs seppuku with his own katana, acknowledging the victor's skill with the only gesture that his code permits. The tower itself, once its central machinery activates, opens into looping vertical architecture that DS2's base game promised but rarely delivered. What lingers is the devotion: Raime guarding a tower with nothing left to protect, Nadalia clinging to the heirlooms of a king she never met, Alonne Knights still patrolling centuries after their master walked away.

- title: "Dark Souls II: Crown of the Sunken King"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark-souls-ii-crown-sunken-king.jpeg"
  posted: "2022-06-06"
  revised: "2022-06-06"
  text: |
    The base game's most persistent failure is spatial coherence: elevators that rise into impossible lava lakes, corridors that connect areas with no geographic logic. ***Dark Souls II: Crown of the Sunken King*** answers this directly. Shulva is an underground Mesoamerican city built on stepped pyramids and tiered pagodas, its entire architecture wired to glowing obelisks that raise and lower stone platforms, rotate bridges, and reveal hidden passages when struck. The verticality is pronounced and the interconnection is real: one descends through the cavern's layers by a logic that rewards exploration and spatial memory in ways that the base game's repurposed corridors never managed. It is the closest that DS2 comes to the interconnected design philosophy of *Dark Souls* (2011). The lore underneath is clean: the people of Shulva built their civilisation around a slumbering dragon, Sinh, whose accumulated poison was released when Sir Yorgh and his Drakeblood Knights pierced the creature with a great spear in pursuit of dragon blood they believed would grant transcendence. The rain of death toppled the city; the dragon returned to sleep. Sinh himself is the DLC's best boss: he flies constantly, his scales corrode weapons on contact (turning DS2's durability system into a war of attrition), and the spear still lodged in his chest is both a visual storytelling detail and a targetable weak point. The gank-squad optional boss (Graverobber, Varg, and Cerah) is forgettable by design, and the monochrome green palette wears thin on repeated deaths. But as the opening statement of the Crown trilogy, Sunken King established that DS2's team could build spaces worthy of the original's ambition when given room to iterate.

- title: "The Last of Us Part II"
  type: "game"
  creator: "Naughty Dog"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/last-of-us-part-ii.jpg"
  posted: "2022-05-19"
  revised: "2022-05-19"
  text: |
    I played both parts consecutively, then needed nearly a week to process. ***The Last of Us Part II*** surpasses Part I in gameplay and atmospheric immersion by an almost embarrassing margin: companion AI now draws enemy fire and can be spotted independently, enemies scream fallen comrades' names, the stealth responds with real precision, and the violence carries a visceral weight that makes every encounter feel consequential. The museum sequence between Ellie and Joel represents Naughty Dog at their peak: the light direction, the space shuttle, the hat routine, the wild boar. Joel picking up the guitar connects directly to his throwaway promise in Part I, 'I might teach you how to play after we get back,' and the quiet domesticity of Jackson carries a tenderness that makes what follows strike with full force.

    Guilt saturates Ellie's arc: the wasted final years with Joel, the words never spoken, the flashbacks that intrude into every sequence until one understands that her rage at Abby is inseparable from her rage at herself. Tommy arriving at the farm with a map, trying to guilt Ellie into finishing what he can no longer do himself, is the most devastating manipulation in the game. The Abby sniper sequence shifted my perspective; the difficulty is punishing, and the revelation of the sniper's identity recontextualises everything. But Abby's section never achieves the immersion of Ellie's. Owen bringing Abby to the aquarium is an almost structural copy of the museum: bright warmth, then darkness, then reconciliation. The theatre confrontation between Abby and Ellie is the worst sequence in thirty hours.

    The dissonance is structural. The player experiences ten hours of Abby's perspective and may come to understand her; Ellie has no access to that understanding. She knows only that Joel killed Abby's father. To then ask Ellie to forgive, after crossing half of America, after killing hundreds, after losing two fingers to Abby's teeth: the game demands a grace from its protagonist that it never gives her the information to arrive at. The player can forgive; Ellie cannot. She has no reason and no motive. Still: an affecting experience with enough force to survive its flaws.

- title: "The Last of Us: Left Behind"
  type: "game"
  creator: "Naughty Dog"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/last-of-us-left-behind.jpg"
  posted: "2022-05-08"
  revised: "2022-05-08"
  text: |
    I did not expect the DLC to be this good. ***The Last of Us: Left Behind***'s timing of the cuts between the two storylines is masterful: the present-tense survival sequences and the flashback sequences comment on each other with a precision that makes both sharper. At the photo booth I had no idea what was coming, so I picked the 'Love' filter to test Riley's reaction. Then came the awkward 'So...' 'So!'

    And I completely understood. The car-window-smashing competition, the water gun fight, the end-of-days disco, and that brief kiss. I will always remember the two options Riley gave: if I had a choice, I would always pick option two. Let us just wait it out. Let us be all poetic and lose our minds together. Only then did I understand why Ellie was so angry at Joel when they reached Tommy's camp.

- title: "The Last of Us Remastered"
  type: "game"
  creator: "Naughty Dog"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/last-of-us-remastered.jpg"
  posted: "2022-05-08"
  revised: "2022-05-08"
  text: |
    From Tess to Sam to the final rescue of Ellie: too many tears. ***The Last of Us*** is a narrative game with almost no mechanical innovation, and it does not need any, because what it does with character and pacing and the slow accretion of trust between strangers is sufficient to carry everything. I felt for the first time the fear of fungal spores, the gradual bonding between people who did not choose each other, the experience of emerging from grief through love.

    The moment with the giraffes: so fragile. Looking towards the distant hospital, not knowing whether to continue. The section where Ellie gives Sam a robot toy, and what happens the next morning: the first time a game made me unable to stop crying. As Tommy later tells Joel, he cannot say he would have done differently. After Joel says 'I swear' and the screen cuts to black, through the credits, I could not say a word.

- title: "Horizon Forbidden West"
  type: "game"
  creator: "Guerrilla Games"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/horizon-forbidden-west.jpg"
  posted: "2022-05-05"
  revised: "2022-05-05"
  text: |
    First-class open world, first-class main story, second-class side story. ***Horizon Forbidden West*** is beautiful: ancient human plans spread across vast land, machines of cultivation becoming harbingers of endings. The warmth Horizon 2 gives is entirely opposite to the loneliness of *Elden Ring* (2022): where FromSoftware's world is built on hostility and solitude, Guerrilla's is built on the possibility of community.

    Aloy is probably one of the most likeable protagonists in any ARPG: brave, resolute, mature, and kind. But the open-world formula has not improved; the second half is dull, the side quests formulaic, the exploration rewards predictable. Some of the handholding treats the player as stupid: Aloy narrating every puzzle solution before one has had a chance to attempt it is a particular frustration. The tension between Guerrilla's exceptional worldbuilding and their adherence to the Ubisoft template remains unresolved. Still: in a year dominated by *Elden Ring*, ***Horizon Forbidden West*** offered something that game could not: warmth.

- title: "Nioh 2"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/nioh-2.jpg"
  posted: "2022-04-27"
  revised: "2022-04-27"
  text: |
    Many assets carry over from the original, but ***Nioh 2*** invested heavily in environmental detail: even side missions in the same map feel fresh. The action system does not need analysis: the most layered combat design in the soulslike genre. Ki Pulse, stance switching, burst counters, yokai abilities: Team Ninja layered system upon system until the complexity became legible.

    The flaws are equally clear. Box-room design limits replayability, and late-game boss design is poor: final-chapter bosses have too much hyper-armour, too little recovery animation, propped up by sheer health. Gets dull towards the end, same as *Elden Ring* (2022)'s late game. But one does not remember a game like this for its endings; one remembers the first time Ki Pulse clicked, the first time three stance-switches threaded a combo through a yokai's guard. The muscle memory stays.

- title: "Hollow Knight"
  type: "game"
  creator: "Team Cherry"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/hollow-knight.jpg"
  posted: "2022-04-21"
  revised: "2022-04-21"
  text: |
    Often called a Metroid/Soulsborne hybrid, but ***Hollow Knight*** has a great deal of its own style. Excellent map design lets the player experience the transition from linear to semi-open-world on reaching the City of Tears; the abilities function as soft-locks, encouraging exploration without demanding strict linear progression. The atmosphere is remarkable: the bug kingdom of Hallownest feels simultaneously whimsical and funereal, a world whose beauty is inseparable from its decay.

    The story is Hollow Knight's only obvious weak point: in 2D, creating the vast Soulsborne sense of world and guiding the player through fragmented storytelling is hard. Given how small Team Cherry is, a game of this scale is already remarkable. At the time, it left me impatient for *Silksong*.

- title: "Elden Ring"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/elden-ring.jpg"
  posted: "2022-04-10"
  revised: "2022-04-10"
  text: |
    The Erdtree is visible from the first moment one steps into the Lands Between, golden and impossibly vast, and it never stops being visible. It orients everything: geography, theology, the player's trajectory through a world whose scale produces genuine disorientation. ***Elden Ring*** is FromSoftware's most ambitious work, and for its first forty hours, possibly their finest. Limgrave opens into Liurnia's drowned melancholy; Liurnia gives way to the rot-poisoned nightmare of Caelid; beneath all of it, Siofra River's starlit cavern reveals a world under the world, an entire civilisation buried like a footnote. The legacy dungeons, Stormveil, Raya Lucaria, Leyndell, operate at the density of the best levels in *Dark Souls* (2011) while the open world between them refuses to soften its hostility into scenery. The dead dragon Gransax draped across Leyndell's walls, the enormous bolt lodged in the city's foundations like a geological fact, is the single most sublime image in any game I have played: an entire civilisation built around the corpse of the thing that nearly destroyed it.
    Where *Dark Souls* gates progress behind mandatory bosses, each one a wall that the player must overcome or abandon the game entirely, ***Elden Ring*** dissolves the wall. One can leave any fight, ride Torrent across a continent, return hours later with better weapons and ten more levels, and the boss that seemed impossible becomes merely hard. The open world's deepest formal consequence is the dissolution of mandatory suffering: the shift from endurance to curiosity, from a curated sequence of trials to a space in which the player chooses what to confront and when. And what one confronts, mostly, is architecture and absence. One reads the world the way one reads ruins, through item descriptions and the posture of the dead, across plateaus vast enough to dissolve the illusion of shared pilgrimage that *Dark Souls* sustained through its bonfires. The loneliness is structural. On my third playthrough, in the ashes of the Roundtable Hold, I found Hewg still sitting at his anvil, memory gone, hammering at a commission he could no longer name for a Tarnished he could no longer remember. I could not go back after that.

    George R.R. Martin wrote the mythology that preceded the game: noble lineages, divine succession, a golden age sustained by the Erdtree's grace. Miyazaki took those lineages and broke every one of them. Godrick grafts stolen limbs onto his body because he is too weak to earn the power that he inherited; Rennala cradles a rune that her husband left as a parting gift, endlessly attempting rebirth in a flooded library; Radahn, the greatest warrior among the demigods, wanders the rotting wastes of Caelid as a feral creature, still clutching his swords. The shattering was not an accident: Marika, the god who built the Golden Order, shattered the Elden Ring herself, and the Erdtree, the symbol of her order, physically bars the player's entry in the late game, forcing one to burn it to proceed. The game's theological argument is that every order, no matter how golden, becomes the thing that its subjects must destroy to be free.
    The six endings bear this out, each one a different philosophical response to a broken world: restore the Golden Order unchanged, perfect it by removing the gods' caprice, curse every living being into equality through suffering, or, in Ranni's Age of Stars, remove the ruling god entirely and leave the Lands Between ungoverned for the first time. The community that formed at launch to map the Marika-Radagon duality and debate Ranni's intentions from scattered item descriptions only confirmed what the game's structure already argues: this world is too large and too deliberately obscure for any single player to hold whole. From the Mountaintops onward, the density thins, formulaic catacombs recur, and the Elden Beast fleeing across its arena is a final boss that one outlasts rather than defeats. But the standard that the endgame fails to meet is one that the first forty hours set, and by the time one burns the Erdtree to pass through, the act feels less like a design failure than a theological one: the golden thing that oriented everything from the first moment must be destroyed, because the game said so from the start, and I simply was not ready to hear it.

- title: "Sekiro: Shadows Die Twice"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/sekiro.jpg"
  posted: "2022-03-25"
  revised: "2022-03-25"
  text: |
    ***Sekiro: Shadows Die Twice*** strips away everything that FromSoftware had spent a decade building: no builds, no co-op, no character creation, no stamina bar, no levelling through stats. Miyazaki called it an action-adventure, not an RPG, and the constraint is the point. When the designer knows exactly what the player brings to every fight, every encounter can be tuned to a single sword, and the posture system that replaces stamina demands a rhythm that no other game in the genre has matched: deflect, attack, deflect, the meter punishing hesitation as harshly as recklessness, every boss encounter a duel rather than merely combat. Where *Dark Souls* rewards caution and *Bloodborne* rewards aggression, Sekiro rewards conversation: the sound of steel on steel is the language, and fluency is the only way through.

    The fixed protagonist earns what the constraint costs. Wolf begins as a weapon, his shinobi training demanding obedience to his father above all. But Kuro, the child lord whose blood grants immortality, asks Wolf to help sever it: the Dragon's Heritage spreads rot to the innocent, and Kuro wants it to end. The game keeps asking whether loyalty means following orders or understanding what one's master truly needs, and every ending answers differently. In the Shura route, Wolf sides with his father, kills his physician, kills his mentor, and becomes a being consumed entirely by violence; the game ends abruptly, as if even the narrative cannot bear to watch. In the others, Wolf earns a death, or a life, or an uncertain journey. None is framed as correct. All cost something that cannot be recovered.

    Genichiro atop Ashina Castle is the fight where the game declares what it expects: two phases under a lightning storm, the man who took Wolf's arm, defeated now through the very system that his desperation could not master. By the final encounter, Genichiro is pathetic; he slits his own throat to drag Isshin back from death, and Isshin dismisses him as a pitiful grandchild before drawing his sword. Four phases follow, escalating from katana to spear to lightning, every deflection that the posture system taught compressed into a single encounter. Beating Sword Saint Isshin does not feel like winning. It feels like graduating.

- title: "Star Wars Jedi: Fallen Order"
  type: "game"
  creator: "Respawn Entertainment"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/star-wars-jedi-fallen-order.jpg"
  posted: "2022-02-20"
  revised: "2022-02-20"
  text: |
    ***Star Wars Jedi: Fallen Order*** is an obvious composite: elements from *Dark Souls* (2011), *Sekiro* (2019), Tomb Raider, and *Hollow Knight* (2017), each seam visible. Map design is decent but the map presentation is terrible; combat is sometimes padded through mob numbers rather than encounter design. Bugs were frequent on release, and puzzles are occasionally arbitrary.

    And yet. The reason to play is not any single mechanic but the totality of the Star Wars fantasy: the hum of the lightsaber, the Force push that sends stormtroopers tumbling, the first time one deflects a blaster bolt back at a scout trooper. Respawn understood that the pleasure of being a Jedi is kinetic, and they built a movement and combat system that captures that kinetic joy with real precision. The final sequence on Nur, where the game strips away all pretence of safety and reminds one what it means to be hunted, is one of the finest Star Wars moments in any medium since the original trilogy.

- title: "Dark Souls: Remastered"
  type: "game"
  creator: "FromSoftware / QLOC"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark-souls-remastered.jpg"
  posted: "2021-12-22"
  revised: "2024-09-01"
  text: |
    ***Dark Souls: Remastered*** preserves the game that built its world as a single continuous object. No loading screens, no fast travel, no map: one learns Lordran the way one learns a city, by getting lost in it. From Firelink Shrine the world spirals upward through the Undead Burg to the Parish and downward through the Depths into Blighttown; the elevator from the Parish drops the player back to Firelink, and the realisation that the world folds in on itself is the moment that its design philosophy becomes legible. Every sightline is a contract: the fortress on the cliffside can be reached; the archtrees visible from Blighttown's depths can be descended to. The verticality is thematic: gods occupy the heights, the cursed and forgotten fester below, and the player's path through the hierarchy is literal. Anor Londo crowns the ascent: a golden city bathed in sunlight, impossibly beautiful after the grime of Sen's Fortress, until one discovers that the light is an illusion maintained by a hidden god and the city has been empty for an age. No other game, including its own sequels, has achieved this density of interconnected space, and the fact that no one has replicated it in the years since begins to look less like a gap in the market than a statement about what it cost to build.
    The storytelling matches the world: oblique, fragmentary, embedded in item descriptions and architecture rather than cutscenes. Gwyn, Lord of Sunlight, linked the First Flame and condemned the world to a cycle of sacrifice rather than let the age change. NPCs arrive at Firelink Shrine with their own arcs; Siegmeyer of Catarina loses purpose each time the player solves a puzzle for him, the kindness hastening his hollowing; Solaire of Astora seeks his own sun and finds a parasite instead. The multiplayer operates on the same principle: messages left by strangers using a curated lexicon, bloodstains replaying the final seconds of another player's death, white phantoms drifting through one's world as proof that someone else is here. Miyazaki modelled it on an experience of being stuck on a snowy hill and watching strangers push each other's cars forward without ever speaking; the assistance is real, the connection transient, and the game never asks for more than that.

    The difficulty is not incidental; it is the story. The Undead Curse strips memory and purpose: one goes hollow when one stops trying, and the game maps this onto the player's own perseverance without stating the parallel. Every death is canon; every return to a bonfire is a resurrection built into the lore. The final boss is Gwyn himself, reduced to a hollow shell in an ashen arena, and the music that plays is a quiet piano rather than orchestral triumph. He can be parried: a god diminished to something that the player has already learned to handle. Rekindle the Flame or walk away: the choice is presented without commentary, and neither option resolves anything. But from the Lordvessel onward, the world that earns this ending begins to thin: Lost Izalith is Miyazaki's self-admitted regret, the Bed of Chaos is a platforming puzzle in a game that was not built for it, and the zones between the four Lord Souls show the marks of a production that ran out of time before its ambition did. The standard that the second half fails to meet is the first half's, and the first half of *Dark Souls* remains the highest sustained peak in the series. Anor Londo's sun that was never real, the crossbreed that one cannot bring oneself to kill, Ash Lake hidden beneath the game's ugliest zone: these images persist because the world that holds them was built as a single, continuous argument, and that argument has not been answered.

- title: "Dark Souls: Artorias of the Abyss"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark-souls-artorias.jpg"
  posted: "2021-12-25"
  revised: "2024-09-01"
  text: |
    ***Artorias of the Abyss*** answered the base game's second-half failures directly. Built after *Dark Souls* (2011) shipped, the DLC demonstrated what FromSoftware could produce with time to iterate, and its three major bosses remain the clearest evidence that the original's late-game weaknesses were constraints, not choices. Artorias himself, a knight consumed by the very Abyss that he swore to contain, fights with the relentless aggression and delayed attack timings that set the template for every subsequent FromSoftware humanoid encounter; his broken arm, his feral leaps, his building frenzy created a vocabulary that *Bloodborne* (2015), *Sekiro* (2019), and *Elden Ring* (2022) would all inherit. Kalameet is the franchise's first true dragon fight: patient, punishing, demanding the spatial awareness that the base game's dragons never required. Manus, Father of the Abyss, is the Abyss made physical: a wall of darkness and reach whose aggression forces the player to abandon the cautious, shield-up approach that the base game rewarded. The DLC's Oolacile, a civilisation that reached into the Abyss and was consumed by it, mirrors the player's own journey through Lordran: curiosity met with annihilation, the reward for understanding indistinguishable from the punishment.

- title: "Demon's Souls Remake"
  type: "game"
  creator: "Bluepoint Games"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/demons-souls-remake.jpg"
  posted: "2021-11-29"
  revised: "2021-11-29"
  text: |
    ***Demon's Souls*** invented so much of its genre that playing it now requires constant recalibration: the stamina bar, the corpse run, committed animations, environmental storytelling through item descriptions, the entire asynchronous multiplayer vocabulary of messages, bloodstains, phantoms, summoning, and invasions. The game began as a failing project that no one expected to succeed, and the freedom of expected failure produced a proof of concept for a decade of design: the Nexus hub, the Maiden in Black, five Archstones branching into worlds with distinct identities. Tower of Latria remains the series' unmatched atmosphere: a prison where Mind Flayers patrol corridors lit by distant singing, every floor identical enough to disorient, the claustrophobia tightening until the upper levels open into vertigo. It is survival horror inside an action RPG, and nothing that FromSoftware has built since has matched its specific dread.

    But what the game pioneered and what it finished are different things. Of seventeen bosses, perhaps four demand real combat mastery: Flamelurker, False King Allant, Penetrator, and the Maneaters on their narrow bridge. The rest are gimmicks: puzzles, stealth checks, or the Storm Ruler spectacle that later games would revisit as deliberate homage instead of design principle. Healing grass means farming replaces pacing; World Tendency shifts entire zones through a system that the game never bothers to explain. Bluepoint's remake wraps all of this in next-generation fidelity, and the result is a museum piece in the honest sense: mechanically 2009, visually 2020, the polish revealing the seams as clearly as it heightens the atmosphere. But Maiden Astraea, who took a Demon Soul from compassion and surrenders when her guardian falls, is the encounter in which the player, not the boss, is the villain: a moral question that FromSoftware would spend a decade finding different ways to re-ask. The later games would build cathedrals around ideas that Demon's Souls sketched in pencil.

- title: "Papers, Please"
  type: "game"
  creator: "Lucas Pope"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "simulation"
  image: "/assets/images/thoughts/games/papers-please.jpg"
  posted: "2021-03-24"
  revised: "2021-03-24"
  text: |
    Though structurally similar to some classic text games, the continuous narrative gives ***Papers, Please*** real room to breathe. Lucas Pope understood bureaucracy as setting and mechanic at once: checking documents, comparing faces, cross-referencing dates produces a rhythm that is simultaneously tedious and absorbing, and the tension between those two states is the game's entire emotional architecture.

    After discovering nearly every mechanic around day 30, playability drops sharply, and long stretches without new story content are not unusual. But the premise remains sharp: a game that makes one feel complicit in systems one did not design.

- title: "The Beginner's Guide"
  type: "game"
  creator: "Davey Wreden"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "walking simulator"
  image: "/assets/images/thoughts/games/beginners-guide.jpg"
