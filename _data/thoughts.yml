- title: "GRIME II"
  type: "game"
  creator: "Clover Bite"
  creator_role: "by"
  year: 2026
  eval: "liked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/grime_ii.jpg"
  posted: "2026-04-09"
  text: |
    A significant step up from the original in almost every dimension that matters, ***GRIME II*** demonstrates what happens when a small studio properly iterates on an idiosyncratic debut. Where the first GRIME built an unsettling, surreal world out of living rock and sinew, the sequel expands that world's vocabulary: boss encounters now feel like genuine conversations between the player and the game's internal logic, each demanding a different mode of reading, and the map design achieves a layered interconnectedness that rewards curiosity at nearly every turn. The narrative, too, has matured. Even as a prequel, GRIME II takes the original's oblique mythology and folds into it questions about creation, accountability, and the violence inherent to both making and consuming art that feel contemporary rather than thematically decorative. The biome design reinforces this ambition; each area sustains its own visual and mechanical identity, distinct enough in mob variety and aesthetic that transitions between zones carry real texture.

    The frustrations are concentrated in a single department: platforming. The controls lack the responsiveness the late-game demands, and the wall-dash ability, reminiscent of *Constance* (2025)'s equivalent, compounds the problem on a controller; inputs misfire regularly, turning what should be fluid traversal into a friction exercise. <u>It is the kind of flaw that sits at the intersection of ambition and execution: the designers clearly wanted more dynamic movement, but the implementation is not quite there.</u> The timing is unlucky, too. In a year where *MIO: Memories in Orbit* (2026) has already set a near-unreachable bar for metroidvania map and movement design, GRIME II's ceiling feels lower than it should. <u>A strong sequel, then, that earns its improvements honestly; just one that arrives in the shadow of something exceptional.</u>

- title: "Rhythm Doctor"
  type: "game"
  creator: "7th Beat Games"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/rhythm_doctor.jpg"
  posted: "2026-03-31"
  text: |
    There are rhythm games that overwhelm one with inputs, treating complexity as the measure of depth: *Djmax* (2004), *IIDX* (1999), the entire Bemani lineage. Then there are those that strip everything back and discover that simplicity, pressed hard enough, reveals its own kind of complexity. ***Rhythm Doctor*** belongs to the second tradition, and it may be the finest example of it. A single button. One mechanic: press on the seventh beat. <u>From this constraint, 7th Beat Games constructs something remarkable: a linear narrative where every character's backstory is given space to breathe, where the player's relationship to each patient accrues genuine emotional weight, because the format never drowns intimacy in mechanical noise.</u> The finale is devastating precisely because the game has earned it, beat by beat, across hours of carefully controlled escalation.

    What sets Rhythm Doctor apart from other narratively ambitious rhythm games is the window-theatre. The game treats the desktop itself as a performance space: windows multiply, fracture, stack, and rearrange in ways that are simultaneously baffling and perfectly choreographed. Too many scenes produce astonishment, not because of spectacle alone, but because the spectacle is in precise service of emotion. <u>The sensation is akin to finishing a short novel that felt like a long one: dense with feeling, but never padded.</u> I wanted to erase my memory and start again immediately. Few games produce that impulse; fewer still justify it.

- title: "Resident Evil: Requiem"
  type: "game"
  creator: "Capcom"
  creator_role: "by"
  year: 2026
  eval: "liked"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/resident_evil_requiem.jpg"
  posted: "2026-03-10"
  text: |
    Not a series devotee, but ***Resident Evil: Requiem*** made me understand the devotion. Capcom's dual-protagonist structure is the game's most impressive achievement: Grace Ashcroft's sections deliver claustrophobic survival horror in the lineage of *RE7* (2017) and the original *Resident Evil* (1996), with limited weaponry, stealth, and enemies whose mutations upon death recall the Crimson Heads of 2002; Leon's sections, meanwhile, borrow liberally from *RE4* (2005)'s action-shooter vocabulary, fast and confident and spectacularly choreographed. <u>The balance between the two is not merely structural but tonal: Grace's dread feeds into Leon's catharsis, and vice versa, so that playing them in alternation produces a rhythm the series has never quite managed before.</u> Every set piece and fixed sequence is executed at an industry-leading standard, and the level design surprises more than once.

    The story is the weak point. Several longstanding narrative threads from across the franchise are addressed, but the central plot around Victor Gideon and his Umbrella connections feels undercooked, leaving too many obvious avenues unexplored. Grace herself is somewhat sidelined in the second act, which undercuts the dual-protagonist premise at precisely the moment it should be paying off. <u>Still: as someone with no particular investment in the Resident Evil mythology, this is the first entry that made me care about the world beyond the mechanics.</u> That counts for a great deal.

- title: "Nioh 3"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2026
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/nioh_3.jpg"
  posted: "2026-02-20"
  text: |
    After *Rise of the Ronin* (2024) provided the open-world trial run Team Ninja needed, ***Nioh 3*** arrives as the studio's masterpiece: a game that preserves the signature Ki Pulse from its predecessors and builds upon it so substantially that the combat feels simultaneously familiar and transformed. The dual-class system is the centrepiece. Switching between samurai and shinobi on the fly is not a gimmick; it is a fundamental restructuring of the combat loop. Samurai stances play as one expects from the series: precise, weighty, demanding careful Ki management after every combo. The shinobi path, by contrast, replaces stances with ninjutsu tools and offers faster Ki regeneration, making it accessible to newcomers without trivialising the difficulty. <u>The shadow step, a well-timed dodge that leaves a decoy ghost drawing aggro, is the kind of design innovation that makes one wonder why no one thought of it before.</u> For action-game players with no soulslike experience, this is an entry point that does not condescend.

    The build variety that follows from this dual-class foundation is formidable. No previous Team Ninja game has offered so many distinct playthroughs: weapons span odachi and axes on the samurai side to kusarigama and talons for the shinobi; the Guardian Spirit system adds elemental abilities and a temporary transformation; the seven-stat progression is freely respecced at any shrine. <u>Yet the game's greatest achievement is that this abundance never produces chaos.</u> Unlike *Rise of the Ronin* (2024) or the Ubisoft open-world formula, where breadth dilutes intensity, every encounter in Nioh 3 generates tension. The open-area world spans multiple time periods, each visually and mechanically distinct, and the co-op integration is the most frictionless the genre has seen.

    Team Ninja remains Team Ninja, of course: the narrative is as thin and nonsensical as the series has ever been, and the English voice acting ranges from serviceable to actively distracting. But these are blemishes on a game whose combat and encounter design set a new standard. With this clarity of strengths and weaknesses, what more could one ask for?

- title: "MIO: Memories in Orbit"
  type: "game"
  creator: "Douze Dixièmes"
  creator_role: "by"
  year: 2026
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/mio_memories_in_orbit.jpg"
  posted: "2026-02-06"
  text: |
    I did not expect that, barely months after *Silksong* (2025), a metroidvania would arrive with map design that surpasses it. ***MIO: Memories in Orbit*** achieves a whole-map interconnectedness so consistent that in 2026, after years of diminishing returns in the genre, it still manages to surprise. <u>Douze Dixièmes have built something startling: a world where every apparent dead-end is a future shortcut, where the relationship between areas is not merely navigational but narrational, each connection reinforcing the game's fragmented storytelling in ways that feel inevitable in retrospect.</u> The control over that narrative is exceptional; MIO surpasses most of its genre peers in every dimension except sheer breadth.

    The environmental storytelling is dense enough to reward obsessive exploration, and the quantity of hidden routes borders on the absurd: passageways tucked behind false walls, behind foreground art, behind mechanical puzzles that only reveal themselves after new movement abilities unlock. The music is the first since *Ori and the Will of the Wisps* (2020) to absorb me, carrying the same quality of melancholic wonder that Moon Studios achieved at their peak. But the platforming design is what elevates MIO from excellent to essential. The protagonist's movement options are extensive, and the precision with which movement resources are gated transforms every platforming challenge into something puzzle-like: not merely a test of reflexes, but a question of which tools to deploy, in what order, at what moment. <u>In recent metroidvanias, this combination of mechanical depth and spatial intelligence is vanishingly rare.</u> One of the finest games in any genre.

- title: "Dispatch"
  type: "game"
  creator: "AdHoc Studio"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/dispatch.jpg"
  posted: "2025-12-02"
  text: |
    A couple of years ago, AdHoc Studio walked away from *The Wolf Among Us 2*, citing creative differences with the reconstituted Telltale team. In Dispatch, the shape of that disagreement becomes visible. Where *The Wolf* (2013) excelled at societal scope, at weaving class, corruption, and systemic injustice into a detective narrative, AdHoc's strengths lie in a different register entirely: the intimate, the individual, the felt. ***Dispatch*** goes all-in on character. Robert Robertson, a retired superhero voiced by Aaron Paul with precisely the right mixture of weariness and stubborn warmth, joins a Superhero Dispatch Network to manage former supervillains, and the interactive-fiction format, with its carefully weighted choices and branching dialogue, makes it effortless to inhabit him. <u>Guilt, regret, relief, satisfaction: each emotional register lands as one's own, not the protagonist's, because the choice design never signals the 'right' answer.</u>

    What distinguishes Dispatch from *The Wolf* (2013), and from most narrative games of its generation, is the depth of its secondary cast. Every character is knowable: not reduced to a type or a function, but given enough texture that one's attachment accrues naturally across eight episodes. This means the emotion that surfaces is felt, not externally imposed by orchestral swells or slow-motion close-ups. <u>By chapter seven, I was crying in a way I had not cried at a game since *Life Is Strange* (2015): not from sadness alone, but from the accumulated weight of having known these people and made decisions on their behalf.</u> The production quality is superb. I am deeply curious about what AdHoc does next. Whatever their disagreement with Telltale was, the evidence suggests they were right.

- title: "Constance"
  type: "game"
  creator: "Blue Backpack / btf Games"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/constance.jpg"
  posted: "2025-11-30"
  text: |
    Higher expectations, harder the fall. A paintbrush as weapon promises untapped mechanical potential: none of it is realised here. The skill set lifts almost wholesale from the standout metroidvanias of the past decade, the wall-dash being the sole exception; on boss design, every encounter follows the same numbing loop of death, memorisation, and repetition, with no interactive wrinkle to distinguish one from another. <u>In a year when metroidvania boss design is getting good, ***Constance*** is a reminder that studios with no instinct for encounter design still exist.</u>

    The map is useless in the manner of *Hyper Light Drifter* (2016)'s, forcing the player to build their own mental model of the environment rather than following a prescribed path, except that here the obscurity reads as oversight rather than intention. Exploration rewards are negligible; there is no equivalent of the hidden currencies or lore discoveries that make backtracking worthwhile in the genre's better entries. <u>What remains are fluid animations in search of a game that deserves them.</u>

- title: "Lumines Arise"
  type: "game"
  creator: "Enhance / Monstars Inc."
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/lumines_arise.jpg"
  posted: "2025-11-29"
  text: |
    After the triumph of *Tetris Effect* (2018), it seemed implausible that Mizuguchi Tetsuya could push the concept further. What remained to be done? The answer, in ***Lumines Arise***, turns out to be texture. Each block type carries a distinct tactile quality, a haptic signature that gives every stage its own feel under the fingers; combined with the visual macro-scale, where the optical flow alone merits study by every rhythm-game developer working today, and the tight audio synchronisation that has been the series' signature since the original *Lumines* (2004), the result is something that finally earns the word 'synesthetic'. <u>A simple falling-block game becomes a full sensory event: not a game with music, but a game that is music.</u>

    In interviews, Ishihara has described his ambition as 感動 (kando): to move emotionally. It is a modest word for an immodest goal, and Lumines Arise exceeds even that framing. The thirty-odd stages of Journey Mode build a cumulative intensity that dissolves time: one enters a flow-state in which the distinction between seeing and hearing softens until one is uncertain which sense is doing the work. The faint repetitiveness in the back half of the Journey and the occasional readability issues amid heavier visual effects are minor friction in a game that achieves what the Lumines series has always reached toward. <u>We are, at last, hearing colours and seeing sounds.</u> Mizuguchi and Ishihara can rest.

- title: "The Outer Worlds 2"
  type: "game"
  creator: "Obsidian Entertainment"
  creator_role: "by"
  year: 2025
  eval: "meh..."
  genre: "RPG"
  image: "/assets/images/thoughts/games/outer_worlds_2.jpg"
  posted: "2025-11-09"
  text: |
    *Fallout: New Vegas* (2010) came out fifteen years ago and Obsidian is still making the same game. Charitably, one calls this 'fidelity to vision'. Honestly: it is a refusal to grow. ***The Outer Worlds 2*** is larger than its predecessor, which Microsoft's marketing apparatus made much of, but larger is not the same as deeper; the main quest is actually more streamlined, the faction system produces no meaningful consequences, and the philosophical texture that gave the first game its occasional sharpness has thinned to the point of disappearance. <u>Each companion and faction reads as a caricature representing an ideology, embarrassingly flat, serving the satire in the way a scarecrow serves agriculture: visible at a distance, useless up close.</u>

    The progression breaks before the game ends; hit the level cap with companion arcs still incomplete, and motivation evaporates. Where *The Outer Worlds* (2019) at least had the courage of its cynicism, delivering a compact satire that knew when to stop, the sequel sprawls without deepening, each new planet adding surface area but no new ideas. <u>Wide as the solar system, shallow as its satire.</u>

- title: "UNSIGHTED"
  type: "game"
  creator: "Studio Pixel Punk"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/unsighted.jpg"
  posted: "2025-10-12"
  text: |
    By the standards of a small-scale game, ***UNSIGHTED*** is an unambiguous success, and more than that: it introduces a structural innovation that the genre has not yet metabolised. The global time-limit, ticking inexorably for every NPC, grafts genuine consequence onto a traditional metroidvania framework. <u>Deaths that in any other game would be a minor setback here carry real weight: time lost to a failed boss attempt is time an NPC one has grown fond of does not have.</u> Studio Pixel Punk, working from São Paulo with modest resources, understood that a metroidvania's weakness has always been the disconnect between narrative urgency and gameplay leisure; the time-limit collapses that gap.

    The execution is strong across the board. Enemy diversity is unexpectedly rich, each biome introducing distinct threats and puzzles with their own mechanical character; the music is outstanding, full of energy and melancholy in equal measure; boss design, often the weakest link in small-budget metroidvanias, is here consistently excellent. The only real missed opportunity is world reactivity. Even NPC deaths, the time-limit system's most dramatic consequence, fail to trigger unique dialogue or environmental shifts, which dampens the immersion the system should generate. It is a limitation of resources rather than imagination, and it is the kind of limitation one forgives in a game that does this much right. <u>A first-tier small-budget metroidvania, and a blueprint for anyone attempting to make consequence feel structural rather than cosmetic.</u>

- title: "Silent Hill f"
  type: "game"
  creator: "NeoBards Entertainment"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/silent_hill_f.jpg"
  posted: "2025-10-05"
  text: |
    ***Silent Hill f*** arrives with a combat system that leaves a great deal to be desired: character abilities lack coherence, roles feel under-defined, and the overall mechanical feel sits well below the standard set by the franchise's better entries. None of that matters very much, because the story lands with the force of *Silent Hill 2* (2001). NeoBards handle the series' survival-horror pressure and fragmented storytelling with care and sensitivity, knowing precisely when to spell out and when to leave as charged suggestion. The marriage plot, the mid-twentieth-century East Asian culture's contempt for and systematic oppression of women: these are made explicit without condescension. The three pre-wedding 'rituals' in the Other World, by contrast, remain as hints, each appearing to map onto the constraints marriage historically imposed on women of that era: obedience, silence, erasure of self. That calibration between the said and the unsaid is exceptionally difficult in horror, where the temptation is always toward either over-explanation or mystification for its own sake.

    <u>Hinako, and the game's other women, appear to have many choices; yet almost every path leads to total self-erasure.</u> This is the thematic core, and it is handled without flinching: the architecture of choice that conceals the absence of choice, the performance of agency within a structure designed to annihilate it. One recognises something of the domestic-sphere analogue to Fisher's 'capitalist realism' here: the system offers options precisely to foreclose the possibility that anyone might notice how few of them lead anywhere new. Story for story, measured against last year's *Silent Hill 2* (2001) remake, I think I prefer this one. Bloober Team's remake was a faithful, often stunning restoration; NeoBards have built something that belongs to the franchise's future rather than its past.

- title: "Hollow Knight: Silksong"
  type: "game"
  creator: "Team Cherry"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/hollow_knight_silksong.jpg"
  posted: "2025-09-25"
  text: |
    Perhaps in the next fall one can feel the strength to fight again; perhaps in the next waking one can finally climb the wall of despair. ***Hollow Knight: Silksong*** asks this question ceaselessly, and the answer it provides is not reassurance but repetition: one more attempt, one more death, one more lesson absorbed into muscle memory. Where the original *Hollow Knight* (2017) placed the player inside the Knight's unknowing innocence, a vessel with no past and no fear, Silksong replaces that blankness with something far more difficult: Hornet knows. She knows the kingdom of Pharloom is collapsing. She knows what waits at the end. The fear that knowledge brings saturates every corridor, every ambush, every moment of stillness before a boss encounter, and Team Cherry have understood that this shift from innocence to awareness demands an entirely different emotional contract with the player.

    <u>If every cry of defeat can become fuel to save Pharloom and find the truth, one will challenge again and again: until one flies over the ridges of Fayvum, sees the great soaring bird, witnesses the cheerful resilience of the fleas at the kingdom's edge, looks out over Pharloom from the pink-purple coral towers, faces the lava a thousand metres below without flinching.</u> Team Cherry's gift has always been for biomes that feel simultaneously alien and internally logical, ecosystems that sustain their own aesthetic and emotional weather; Silksong multiplies that gift across a map whose scale dwarfs the original's. And yet the game never feels bloated. Every area earns its presence, every backtrack reveals something previously invisible; the interconnectedness that made *Hollow Knight* (2017) a landmark is here refined to the point of transparency, the architecture becoming so legible that one stops noticing how intricate it is.

    'I have survived the fury of this land. I have borne its barbs and its blades, and I have seen wonder behind its dangers... and that darkness I fear no longer.' Without the Knight's unknowing innocence, one must face the manifold dangers of a collapsing world with open eyes. <u>That Silksong makes the facing feel not triumphant but honest, not heroic but stubbornly, quietly brave, is its deepest achievement.</u>

- title: "Phoenix Springs"
  type: "game"
  creator: "Calligram Studio"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "adventure"
  image: "/assets/images/thoughts/games/phoenix_springs.jpg"
  posted: "2025-09-01"
  text: |
    There is a way to make point-and-click adventures both engage the player and make them feel intelligent; ***Phoenix Springs*** does not find it. Calligram Studio's neo-noir desert mystery has the look of a thoughtful, design-literate game: the stripped-back palette, the geometric framing, the whispered tone. But the puzzle design squanders every aesthetic advantage. The '101' clue is exemplary: so egregiously, so intentionally outlandish in its logic that solving it produces not satisfaction but a kind of betrayed disbelief. <u>The solution was there all along, hiding behind a leap of reasoning the game has done nothing to earn.</u>

    The issue is structural. Good puzzle design teaches the player a grammar and then tests fluency within it; Phoenix Springs skips the grammar and tests the guessing. One finishes it through persistence rather than understanding, which is the worst possible outcome for the genre. The art direction deserved a better home.

- title: "The Alters"
  type: "game"
  creator: "11 bit studios"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/alters.jpg"
  posted: "2025-08-31"
  text: |
    If this year's *Kingdom Come: Deliverance II* (2025) gave the endless freedom of a sandbox RPG, ***The Alters*** made me scrutinise every choice I made. The premise is deceptively simple: Jan Dolski, stranded on a hostile planet, uses experimental cloning technology to create alternate versions of himself, each shaped by a single altered life decision. What 11 bit studios build from this is an uncommonly thoughtful branching narrative. The survival-building system is superbly implemented, responsive and tactile enough that the resource management never degenerates into busywork; but the real achievement is in the dialogue. Each Alter carries a distinct psychology, a distinct register of vulnerability and defensiveness, and the feedback system tracking frustration, motivation, insecurity, and burden across every conversation means that one learns to read these people as people rather than as systems. <u>The writing is intimate and direct in a way that feels unusual for a game this structurally ambitious.</u> Despite the branching, despite the loops, The Alters feels less like an RPG where one 'becomes whoever one wants' and more like a space survival simulator asking a harder question: what would I actually do?

    The answer, it turns out, is that I could not bring myself to let my companions suffer at all. Not once, across multiple loops. The options existed; the mechanical incentives were clear; I chose warmth every time, and the game was wise enough not to punish that instinct but to honour it. <u>When, in the ending, the Refiner says 'Then you have my loyalty,' I could not hold back tears.</u> Not because the moment was engineered for maximum emotional extraction, but because it arrived after hours of careful, accumulating trust, every conversation a small deposit into a relationship the game permitted me to build at my own pace. Many games attempt this; very few achieve it without leaning on orchestral swells or slow-motion close-ups. The Alters earns its emotion the hard way: through patience, through texture, through the simple act of letting the player care.

    I hope they can all live, in this less lonely reality, as whoever they want to be.

- title: "Öoo"
  type: "game"
  creator: "Nama Takahashi"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/ooo.jpg"
  posted: "2025-08-26"
  text: |
    'Metroidbrainia' is a genre that has only cohered in the last few years, and already it has two landmark entries: *Animal Well* (2024) and ***Öoo***. Where Billy Basso's *Animal Well* (2024) explored the complexity of knowledge-puzzle design, the sheer combinatorial depth of what a handful of items can unlock, Nama Takahashi's Öoo takes the opposite approach: a single mechanic, pushed to its absolute limit. The game first asks one to think inside the box, mastering the rules as given; then, with a precision that borders on the surgical, it asks one to think outside them entirely. The level structure, 'puzzle, answer, final puzzle', looks modular from the outside, almost workmanlike. In Takahashi's hands it becomes intricate, each module a carefully calibrated ratchet that tightens the player's understanding until the moment of release.

    <u>Compared to *Animal Well* (2024), the 'I'm a genius' feeling Öoo delivers is more direct and more immediate: not the slow accumulation of insight across a sprawling world, but the sharp crack of a solution arriving fully formed.</u> This is textbook knowledge-lock design: the information required to solve each puzzle is always already available; the difficulty lies entirely in recognising it, in reorganising what one knows rather than acquiring what one does not. That distinction, between puzzles of acquisition and puzzles of recognition, may be the defining axis of the metroidbrainia genre, and Öoo sits as far toward the recognition end as anything currently in the field. A small, precise, quietly astonishing game.

- title: "AI Limit"
  type: "game"
  creator: "Sense Games"
  creator_role: "by"
  year: 2025
  eval: "meh..."
  genre: "action"
  image: "/assets/images/thoughts/games/ai_limit.jpg"
  posted: "2025-08-15"
  text: |
    ***AI Limit*** is a game with very clear strengths and correspondingly clear weaknesses. The strength: map design. Working with limited resources, Sense Games invested seriously in their level architecture and produced a remarkable looping soulslike map, the kind of interconnected, shortcut-laden structure that rewards mental cartography and generates the specific pleasure of realising that two apparently distant areas were always adjacent. The parry system is functional, the Sync Rate bar, which collapses stamina, posture, and spell resources into a single meter, prevents trivial ranged-cheese builds, and the overall feel, for a budget title, is competent.

    <u>The reason it sits just above average: everything else.</u> Compared to recent soulslike releases, AI Limit is noticeably more spiteful in its encounter design, falling into the *Dark Souls II* (2014) trap of equating difficulty with mob density and ambush frequency. Boss design is the sorest point: in the base game, only one or two encounters are memorable (Loskid, notably), while most default to either the marathon-runner model, where health pools substitute for mechanical interest (Aether, Charon), or the delayed-attack template that has become the genre's laziest crutch. For a resource-strapped studio, it passes. Just.

- title: "The Drifter"
  type: "game"
  creator: "Powerhoof"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "adventure"
  image: "/assets/images/thoughts/games/drifter.jpg"
  posted: "2025-08-11"
  text: |
    One cannot remember the last time a proper old-school point-and-click adventure felt this surprising. ***The Drifter*** is a genre exercise that transcends its own nostalgia: Powerhoof's puzzles are demanding enough to sustain genuine engagement, and the narrative, a pulp sci-fi conspiracy threaded through grief and mortality, maintains momentum across its runtime without resort to the genre's usual padding. <u>The die-and-revive mechanic is particularly well-integrated: Mick Carter's ability to return from death, retaining knowledge each time, transforms what could be a simple retry system into something thematically coherent, tying the puzzle design directly to the story's questions about what it means to carry memory forward through loss.</u> Many puzzles produce the feeling of actually working a case, of assembling disparate clues into a solution that clicks rather than one that merely unlocks.

    The limitation is textual depth. The Drifter engages with well-trodden philosophical territory: brain in a vat, trolley problem, the familiar furniture of sci-fi's ethical thought experiments. The engagement is competent but rarely revelatory; the 'aftertaste', to borrow a wine-tasting term, is thinner than the setup promises. This is a small-studio game, and one adjusts expectations accordingly; what Powerhoof achieve within those constraints, particularly in voice acting and pixel animation, is often impressive. One of 2025's worthwhile indie picks, and a reminder that the point-and-click is not so much dead as dormant.

- title: "Kentucky Route Zero"
  type: "game"
  creator: "Cardboard Computer"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/kentucky_route_zero.jpg"
  posted: "2025-08-06"
  text: |
    My Shannon: brave, strong. My Conway: timid but stubborn. ***Kentucky Route Zero*** is more than a fixed cast and a scripted narrative; it is a mirror. The characters and the story are assembled from dialogue fragments by the player, each selection not a choice between outcomes but a choice between textures, between the kinds of feeling one is willing to inhabit. The dead miners' ghosts in the Kentucky cave, the drifting workers on the Echo River, the vast bureaucracy beside the church organ, the 'false' people living in Xanadu: each encounter is a node in a network of associations that Cardboard Computer refuse to resolve into a single, stable meaning.

    <u>The weight of choice in Kentucky Route Zero means that everything felt comes from the player, not the script: the game keeps telling one, quietly, insistently, 'We cannot determine the course of history, but we can determine how we feel about what has already happened.'</u> This is not interactivity in the ludic sense; it is something closer to what happens when one reads a poem aloud and realises that the reading has become the poem. The echoes of late capitalism drift over fields, forests, breweries, and the river's surface, and one watches reality gradually deconstruct, dissolving into the grief and reconciliation of the past. Conway's debts accumulate until they become the landscape itself; by the final act he is simply gone, not dead in any dramatic sense but absorbed into the Hard Times Distillery's skeleton crew, literal skeletons working off debts they can never repay. The game does not offer a farewell. Shannon's competence hardens into something that might be strength or might be numbness. The game does not ask one to fix anything; it asks one to stay, to witness, to let the melancholy settle.

    Melancholy is the word.

- title: "明末：渊虚之羽"
  title_en: "Wuchang: Fallen Feathers"
  type: "game"
  creator: "Leenzee Games"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/wuchang.jpg"
  posted: "2025-08-01"
  text: |
    Even accepting ***WUCHANG: Fallen Feathers*** as one of the highest-quality soulslike games in recent years, overall above *Lies of P* (2023) in its base form, a four-star rating is the ceiling, because the flaws are too glaring to forgive. The positives are substantial. The looping map is the closest any studio has come to FromSoftware's interconnected world design since *Dark Souls* (2011), forcing the player to build their own mental model of the environment rather than following a prescribed path. Most environments are visually stunning, at least on par with *Lies of P* (2023) in presentation, and chapters four and five achieve a narrative density one might call 'The City of Fading Light': civilisational layering so thick that each new room reads as an archaeological stratum. Most memorably, WUCHANG innovates subtly on soulslike combat in a way few imitators manage: the counter mechanic and generous dodge windows produce a quality one can only describe as 'at once slow and fast', a rhythm in boss encounters that feels simultaneously deliberate and urgent.

    <u>Which makes the self-inflicted damage all the more bewildering.</u> <u>Why did the team decide that a female protagonist in a game of this ambition needed to be dressed in a manner calibrated for the male gaze, using sexualisation to drive sales?</u> And how did lead developer Xia Siyuan claim credit so disproportionately for what was clearly a large collaborative effort? These are not incidental objections; they are structural. The male gaze in a game that asks to be taken seriously as art is not a marketing decision that can be bracketed off from the work itself; it is an aesthetic position, and an indefensible one. The crassness obscures a game worth admiring, and that is what makes it sad rather than merely irritating. WUCHANG deserved better from its own creators.

- title: "SIGNALIS"
  type: "game"
  creator: "rose-engine"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/signalis.jpg"
  posted: "2025-07-29"
  text: |
    Beyond the literal poems within it, ***SIGNALIS*** is itself a poem. As Elster moves step by step toward the depths of memory, excavating the news of her lover's death, Böcklin's *Isle of the Dead* (1880) appears in different versions over and over: the same destination from different angles, the same grief in different light. But as she closes in on the truth, one instance of Böcklin's only *Isle of the Living* (1888) slips in. Not a resurrection, but something more fragile: holding a hand, feeling life again inside death itself.

    Rose-engine have made a game about totalitarianism, but its understanding of authoritarian violence is more precise than the word usually permits. The Eusan Nation is the GDR rendered in science fiction: propaganda posters in brutalist corridors, standardised designation codes (LSTR, STCR, KLBR), personality templates calibrated to prevent deviation. Replikas are manufactured from edited memories of dead humans, interchangeable labour units whose individuality is an engineering defect, whose erasure is not a side effect but the system's purpose. Ariane, whose desires the state deemed aberrant, was exiled to a deep-space mining mission to correct herself; Elster, a Replika built from fragments of someone else's life, carries memories she cannot verify as her own. The signal Ariane sends from Sierpinski is not a distress call but something closer to Chambers' *King in Yellow*: a forbidden transmission that corrupts every Replika it touches, dissolving the boundaries the state spent decades encoding. <u>The game stages a question Philip K. Dick spent his career circling: what happens to identity when memory is inherited, edited, mass-produced, and the self is revealed as a copy of a copy with no original?</u> That Elster and Ariane's love persists under these conditions is not sentimental; it is structurally defiant, an attachment the system was designed to make meaningless. One walks from the snowfield into the dream riddled with cancerous tissue, and before everything inevitably collapses, one fulfils the promise to the person one loves, embracing fate in Schubert's *Schwanengesang* (1829).

    The survival horror is not set-dressing; the resource scarcity, the claustrophobic corridors, the tank controls that recall the genre's origins all serve the thematic architecture. The mechanics reproduce the Replika condition precisely: limited, controlled, unable to simply overpower the world one was manufactured to serve. Elster's six-slot inventory was hard-coded into her personality as a resource-preservation measure: Replikas are more expendable than supplies. <u>To feel helpless is the point. To protest anyway is the other point.</u> This is our most helpless, most honest protest against injustice.

- title: "Deemo II"
  type: "game"
  creator: "Rayark"
  creator_role: "by"
  year: 2022
  eval: "disliked"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/deemo_ii.jpg"
  posted: "2025-07-24"
  text: |
    Is Rayark truly this confident in their own story? ***Deemo II*** is a rhythm game that has forgotten what makes rhythm games work. Almost no track is memorable; the saccharine narrative, rather than complementing the music, actively gatekeeps chart unlocks, so one is forced to wade through cutscenes that might charitably be called 'twee' to reach the next set of songs. <u>The inexplicable decision to build an open world around a rhythm game turns what should be precise, focused sessions into something with no identity at all: a game that is neither a convincing exploration experience nor a competent rhythm game, but a strange, featureless hybrid of both.</u>

    <u>When the best track in the entire collection is Rachmaninoff, whose rubato and dynamic range expose how poorly the game's rigid timing windows handle music that breathes, the value proposition collapses.</u> *Cytus 2* (2018)'s narrative made me cry several times; its chart design was consistently inventive. I cannot understand how Rayark, the same studio, managed to produce something this inert.

- title: "Deltarune"
  type: "game"
  creator: "Toby Fox"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "RPG"
  image: "/assets/images/thoughts/games/deltarune.jpg"
  posted: "2025-07-19"
  text: |
    I hope I have simply aged out of it, but Toby Fox's ideas have not moved me since *Undertale* (2015). ***Deltarune***'s Chapter 2 delivers a narrative that is not only less affecting than its predecessor's but actively tedious, the puzzle design a pale echo of *Undertale* (2015)'s inventiveness, each new mechanic introduced and discarded before it can develop any weight. The dialogue retains Fox's signature warmth, and the combat system's bullet-hell encounters remain mechanically sound; but charm without stakes is a depreciating asset, and Deltarune has been spending it freely.

    <u>The miracle of *Undertale* (2015) may never be repeated.</u> Perhaps that is the point: *Undertale* (2015) was a game about the impossibility of return dressed as a game about choice, and Deltarune, deliberately or not, is proving the thesis. One returns to Fox's world and finds it smaller, dimmer, more familiar, and less strange. Whether that is a failure of the sequel or the inevitable physics of a second visit is a question Deltarune does not seem interested in asking.

- title: "SANABI"
  type: "game"
  creator: "Wonder Potion"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  genre: "platformer"
  image: "/assets/images/thoughts/games/sanabi.jpg"
  posted: "2025-07-07"
  text: |
    As a *Katana ZERO* (2019) imitator, ***SANABI*** comes across as too juvenile. The movement and combat mechanics are distinctive: the grappling hook produces a kinetic fluency that sets the game apart from its most obvious reference point, and the speed at which one traverses environments generates real momentum. But the dialogue undercuts everything. The writing is so saccharine, so overwrought in its emotional register, that one loses any motivation to push the story forward.

    In a game about parenthood, loss, and sacrifice, the tonal immaturity is not a minor blemish but a structural failure. <u>The earnestness never earns the weight it claims.</u> The body moves beautifully; the mouth will not stop talking.

- title: "The Wolf Among Us"
  type: "game"
  creator: "Telltale Games"
  creator_role: "by"
  year: 2013
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/wolf_among_us.jpg"
  posted: "2025-07-06"
  text: |
    Most choices in ***The Wolf Among Us*** do not materially change the story; so what? The choices operate at the level of interpretation rather than consequence: they determine not what happens but what it means. When one chooses to tear off Grendel's arm or show mercy, the plot continues either way, but one's understanding of Bigby, and one's complicity in his violence, shifts. This is closer to how ethical life actually works: most moral decisions do not fork the universe, yet they constitute the person making them. One does not roleplay Bigby Wolf; one becomes him, and the distinction matters. The choice design never signals the correct answer, never tips its hand with a moral compass or a dialogue-wheel colour code, and the result is that decisions about interrogation under duress, violent enforcement, vigilante justice, and the economics of sex work arrive with a weight that games with vastly more 'real' consequence routinely fail to achieve.

    <u>Ironically, in a story populated entirely by fairy-tale characters, one encounters more corruption, humanity, sin, and justice than in most games set in the ostensibly real world.</u> Fabletown operates as a compressed allegory of late-capitalist urban life: its government, funded by wealthy donors, structurally guarantees that the rich dictate policy while the poor are administered. Glamour, the magic that lets non-human Fables pass as human, functions as a precise analogue to the economic prerequisites of social belonging: without it, one is banished, rendered invisible or criminal by default. The Crooked Man runs a parallel welfare state, loans and employment and black-market glamour, extracting debt bondage in return; the sex workers at the Pudding & Pie are enslaved through enchanted ribbons that literally silence them. <u>The metaphor and the mechanism are identical: marginalised people cannot speak because the structure of their exploitation forbids it.</u>

    Bigby himself embodies the central contradiction of state violence. As sheriff, his brutality is legal; as the Big Bad Wolf, it is monstrous; the game forces one to negotiate this line in real time, knowing that both modes serve the same institutional apparatus. The democratic trial at the end replaces a boss fight with a civic process. The Crooked Man mounts a genuine defence: 'When your government abandoned you, I was there.' Depending on one's earlier conduct, some citizens believe him. <u>The verdict is predetermined, but whether the community accepts the outcome depends on how power was exercised throughout; and the game ends not with resolution but with Nerissa's ambiguous confession, a final reminder that systemic injustice survives the removal of any individual villain.</u>

- title: "Death Stranding: Director's Cut"
  type: "game"
  creator: "Kojima Productions"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/death_stranding_directors_cut.jpg"
  posted: "2025-07-01"
  text: |
    Where is the meaning? Kojima seems to want to tell a story about reconnection in the age of pandemic and disaster, but ***Death Stranding*** delivers that story in the most detached, alienated way possible. Take BB: rather than allowing Sam and BB's bond to form through felt experience, soothing BB is coded as a chore, a mechanical obligation, so that the endless crying reads less as emotional content and more as system noise. <u>The disconnect is symptomatic. Player assistance for other players is registered through 'likes', a term that in social media has been so thoroughly alienated from genuine connection that using it here does not subvert the emptiness but replicates it.</u> If this is intentional commentary on the hollowness of digital solidarity, the game never earns the ironic distance that would make the commentary legible.

    Is the fetch-quest loop of gathering resources to build roads fun? No. Is ten minutes of gameplay followed by ten minutes of cutscene a defensible structure? No. The traversal, at its best, has a meditative quality, and the world is visually arresting in its desolation; but meditation without purpose is just waiting, and *Death Stranding* (2019) asks the player to wait a great deal. And now A24 is making a film. <u>Privately, I think film was always the ideal form for this material: Kojima's instincts are cinematic, his pacing is cinematic, and the interactivity here feels not like an enrichment of the story but an interruption of it.</u>

- title: "Stellar Blade"
  type: "game"
  creator: "Shift Up"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "action"
  image: "/assets/images/thoughts/games/stellar_blade.jpg"
  posted: "2025-06-25"
  text: |
    Setting aside the fanservice, one has to ask: is ***Stellar Blade*** even a good game? In a genre glutted with action RPGs, it barely passes. Shift Up appear committed to wasting the player's time: countless unskippable animations, a camp recovery sequence that runs at least eight seconds, a desert city teleport clocking half a minute, every line of dialogue gated behind a two-second skip delay. Does Shift Up believe their writing merits this enforced attention? And the action system, stripped of its visual polish, offers nothing cognitively demanding beyond repeating the circuit.

    <u>The platforming is a disaster.</u> Eve's turning radius spans at least two body-widths; ledge-grab detection is opaque at best; her running momentum is set absurdly high, as though the movement designers and the level designers never spoke. The plot sits at kindergarten level, all its exposition dumped rather than dramatised, and the combination of forced cutscenes and mechanical shallowness produces a peculiar compound boredom: not the boredom of nothing happening, but the more insulting boredom of a game that believes a great deal is happening while the player can see it is not. <u>If this passes as a good action RPG, there is no saving the current triple-A market.</u>

- title: "Lies of P: Overture"
  type: "game"
  creator: "Round8 Studio"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/lies_of_p_overture.jpg"
  posted: "2025-06-17"
  text: |
    One did not expect Round8 to improve on the base game this clearly; the surprise is genuine. ***Lies of P: Overture*** takes everything that made the original a landmark among soulslikes outside FromSoftware's own catalogue and refines it: the combat is tighter, the environmental storytelling denser, the emotional register deeper. The new areas are stunning. The snow-covered zoo, the blue-flickering Ergo mine, the blood-red roses in the mansion of despair: each carries its own atmosphere with a specificity that rivals the best of the base game, and the way the DLC weaves them into a continuous journey through a ruined city's final winter gives the whole thing a cumulative, elegiac weight.

    <u>I was shocked to find myself setting down the controller in tears at chapter five, watching, at the foot of a blood-soaked statue, a fighter I had admired throughout the journey suffer, struggle, and completely fall apart.</u> It is the kind of moment that only works because the game has earned it through hours of patient world-building: every scarred brick, every frost-bitten ruin, every glimpse of what this city once was. One pieces together the history of a once-glorious civilisation, brick by brick, and the weight of that accumulated knowledge makes the moment of collapse feel not like a plot point but like a personal loss. Round8 have demonstrated something rare: a DLC that does not merely extend but deepens, retroactively enriching the game it grows from.

    In honour of 'Legendary Stalker' Lea Florence.

- title: "Clair Obscur: Expedition 33"
  type: "game"
  creator: "Sandfall Interactive"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/clair_obscur_expedition_33.jpg"
  posted: "2025-05-04"
  text: |
    Standing among the flags of Expedition 33 planted in the ruins of Lumière's walls, one still thinks back to the resolve and faith carried at the start. ***Clair Obscur: Expedition 33*** is a first-time studio's debut, and the fingerprints are visible everywhere: in the occasionally uneven pacing, in dialogue that sometimes strains for profundity it has not quite earned, in systems whose ambition outreaches their polish. The critical consensus has been warmer than the game's inconsistencies strictly warrant, and the 'game of the year' murmur feels premature.

    What Sandfall Interactive have achieved, though, is a world worth remembering. The white great tree on the vast continent, the golden harvest fields, the sky-piercing endless tower, the ancient people's Babel, the solemn rock at the centre of the sea: each set piece is constructed with a visual confidence that belies the studio's inexperience. The turn-based combat borrows from the genre's best without quite synthesising its influences into something new, and the narrative, for all its ambition, resolves its central mysteries with more spectacle than substance. <u>But I think I will still remember the harbour of Lumière a long time from now, and for a debut, that is not nothing.</u>

- title: "Neva"
  type: "game"
  creator: "Nomada Studio"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "platformer"
  image: "/assets/images/thoughts/games/neva.jpg"
  posted: "2025-04-25"
  text: |
    If *GRIS* (2018) showcased minimalist game design through its astonishing art and wordless level design, ***Neva*** takes that foundation and builds vertically: the same aesthetic sensitivity, now coupled with a combat system that gives the progression a mechanical spine *GRIS* (2018) lacked. Artistically, Neva represents some of the most striking 2D side-scrolling art design one is likely to encounter in any given year. Some scenes contain spectacle so bold, so confident in its use of colour and scale, that the word 'beautiful' feels insufficient; what Neva achieves is closer to 'necessary', images that feel as though they had to exist. The world's collapse is conveyed with total clarity through visual language alone: no exposition, no dialogue, just the steady darkening of a palette and the encroachment of void.

    On level design, Neva retains *GRIS* (2018)'s key-and-lock structure but expands the protagonist Alba's movement vocabulary significantly: the increased mobility adds variety to the levels themselves, transforming platforming from a traversal necessity into something closer to expressive play. The puzzle difficulty stays low throughout, but this is not a flaw; it is a deliberate decision to keep the emotional throughline unobstructed. <u>Four hours later, one realises with a start how deep the attachment to the wolf Neva has grown: the bond was never announced; it accumulated, silently, through proximity and shared danger, until separation became unthinkable.</u>

- title: "Gato Roboto"
  type: "game"
  creator: "doinksoft"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/gato_roboto.jpg"
  posted: "2025-04-22"
  text: |
    I really wanted to like ***Gato Roboto***: compact, full of humour, indie spirit in abundance. But the platforming, one of the two core systems, is handled carelessly. The studio clearly tuned the jumping to feel deliberately 'buttery', matching the game's comedic tone, but the choice makes jumping extremely imprecise. Many jumps that would be trivial in any other metroidvania become death traps here; the gap between intention and execution widens with every missed landing.

    Boss design is the other weak point: the correct dodge for each boss attack is rarely legible on first encounter, retry costs are non-trivial, and reskinned bosses recur with depressing regularity. At three hours, the game is too short to fix these problems through iteration, and too long to ignore them. <u>A cat in a mech suit deserved better mechanics than this.</u>

- title: "Superliminal"
  type: "game"
  creator: "Pillow Castle Games"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/superliminal.jpg"
  posted: "2025-04-21"
  text: |
    <u>In the era of *The Stanley Parable* (2013) and *The Witness* (2016), one of the most brilliant ideas in the genre came from Pillow Castle with ***Superliminal***: using forced perspective to merge player subjectivity with the game itself, a conceit so elegant that the first half produces a nearly continuous sense of delight.</u> The horror-adjacent content that surfaces in the second half also deserves credit for preventing the simpler puzzles from feeling quite as repetitive as they might otherwise.

    Unfortunately, the team did not have the right person for puzzle design. Compared to *Portal* (2007) and *The Witness* (2016), Superliminal falls into 'reskinned puzzle' territory in its second half: 'enlarge the object, climb the object, reach the next platform', repeated a dozen times over. <u>However good the idea, however much is hidden in the margins, for a puzzle game the puzzles themselves still matter most.</u> The concept deserved a sequel's worth of refinement; as it stands, Superliminal is a brilliant proof of concept that runs out of variations before it runs out of levels.

- title: "Lost Records: Bloom & Rage"
  type: "game"
  creator: "DON'T NOD"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/lost_records_bloom_and_rage.jpg"
  posted: "2025-04-20"
  text: |
    I became a devoted Michel Koch fan through *Life Is Strange* (2015); when ***Lost Records: Bloom & Rage*** first announced him as director, I had full confidence in the story. It does not disappoint. Kat, fierce and loyal and carrying the weight of her family's collapse with a stubbornness that recalls Chloe Price at her most magnetic, made me relive the attachment and feeling I had a decade ago when I first played *LiS* (2015). Parting is hard; reunion harder. Koch has not abandoned his style under the pressure of today's faster-paced narrative games; he has doubled down, telling a slower, more patient, more immersive story than the market seems to demand.

    Who does not want to be young again and reckless, surrounded by friends who stick together through everything? Who does not want to help someone one cares about get back at the world, help them reach what seems impossibly far? <u>Kat wrote in a letter: she knew the first time she saw me that we would be soulmates. I suddenly started crying.</u> The camcorder mechanic and the 1995 setting give the game a texture that *Life Is Strange* (2015) never quite achieved: the physicality of VHS, the deliberate slowness of analogue memory-making, the way recorded images acquire weight precisely because they cannot be undone. Koch understands that nostalgia is not the emotion; it is the substrate on which other emotions grow.

- title: "NORCO"
  type: "game"
  creator: "Geography of Robots"
  creator_role: "by"
  year: 2022
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/norco.jpg"
  posted: "2025-04-16"
  text: |
    Brilliant world-building dragged down by thin interactivity. ***NORCO***'s vision of Louisiana's oil country carries something like a mourning gaze: religion and industrial ruin interwoven across wetlands and smokestacks, the real and the mythic bleeding into each other until the distinction dissolves. 'You can't remake God here.' Geography of Robots have built a world saturated with the specific gravity of a place, the kind of detail that accumulates into atmosphere rather than information, and the writing, at its best, achieves a density that rivals literary fiction.

    <u>But the interactivity stays thin throughout. The point-and-click navigation, the inventory puzzles, the environmental clicking: mechanical busywork that cannot support text at this density. One is perpetually reading a novel through a game engine that adds friction without adding meaning.</u> The format should amplify the writing; instead, it slows it down. A game that would have been better as a graphic novel, or a short story collection, or anything that did not require the player to click through its most powerful passages at the speed of a loading screen.

- title: "Mutazione"
  type: "game"
  creator: "Die Gute Fabrik"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/mutazione.jpg"
  posted: "2025-04-16"
  text: |
    The earth beneath the pap tree cracks open under the impact of the meteor Moon Dragon, and on the island left behind by the catastrophe, what blooms is diverse life and strange communion with nature. ***Mutazione*** is a game about aftermath: not the disaster itself, not the recovery, but the long, quiet period in which a community learns to live with what has changed. Die Gute Fabrik build this world with uncommon tenderness, each character carrying their own relationship to the catastrophe, their own accommodation with loss, their own small acts of renewal. The musical gardens are the purest expression of the game's ethos: one plants, one tends, one listens, and the garden responds not with reward but with beauty, which is not the same thing.

    <u>When the pap tree scatters its white downy flowers again, when the fungi underground spread their glowing spores anew, when death is no longer an endpoint but a transition, one accepts all of this transience.</u> And plants a flower field under the lighthouse by the sea. Mutazione does not argue for its vision of life and death; it simply presents it, with such warmth and such patience that resistance seems beside the point. A game about the specific miracle of things continuing.

- title: "The Unfinished Swan"
  type: "game"
  creator: "Giant Sparrow"
  creator_role: "by"
  year: 2012
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/unfinished_swan.jpg"
  posted: "2025-04-09"
  text: |
    Less than two hours, and I was crying at the ending. ***The Unfinished Swan*** is the purest expression of what a game can be: everything begins with the player's curiosity, and as the game progresses, it gradually reveals just how rich, vivid, and full of energy that curiosity is. If *What Remains of Edith Finch* (2017) is Giant Sparrow's family epic, a game in which mechanics and narrative fuse with breathtaking artistry, then The Unfinished Swan is its thesis statement: the idea that play itself, the simple act of throwing paint into white space and watching form emerge, is sufficient to carry meaning.

    <u>The creativity and novelty compressed into ninety minutes could fill a ten-hour puzzle game, but Giant Sparrow know when to stop.</u> Each new mechanic, each shift in visual language, arrives at exactly the moment the previous one has been fully absorbed, so that the game's brevity feels not like a limitation but like an act of discipline. A game that makes one nod in quiet appreciation while playing. This makes me more excited about what Giant Sparrow might do next than even *Edith Finch* (2017) did.

- title: "Psychonauts 2"
  type: "game"
  creator: "Double Fine Productions"
  creator_role: "by"
  year: 2021
  eval: "disliked"
  genre: "platformer"
  image: "/assets/images/thoughts/games/psychonauts_2.jpg"
  posted: "2025-04-07"
  text: |
    Desperately wanted to love this: *Super Mario Odyssey* (2017)-tier platforming, wonderfully eccentric art direction, brilliant visualisation of the brain and its pathologies. ***Psychonauts 2*** has the raw material for something exceptional, and Double Fine systematically bury it under padding. Hundreds upon hundreds of collectibles: one level alone contained a hundred stamps. Combat that is mechanically simple yet inexplicably drawn out, the system itself rough enough that encounters become endurance tests rather than engagements. A completely pointless RPG-lite progression system in which one can finish the entire game without upgrading anything. And a staggering excess of transition animations, some levels featuring animations that run longer than the actual playtime.

    <u>All of these ideas, every one of them brilliant in isolation, could have been condensed into five sharp hours.</u> *Astro Bot* (2024)'s precision-editing is the obvious comparison: a game that knows exactly how long each idea should last, and moves on the moment it has been fully expressed. Psychonauts 2 does not know this. Its ideas are diluted with collectible padding and constant cutaways until 'fun' becomes a memory of something one felt three hours ago. <u>Watered-down fun is not fun.</u>

- title: "The First Berserker: Khazan"
  type: "game"
  creator: "Neople"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/first_berserker.jpg"
  posted: "2025-04-05"
  text: |
    In an era when most soulslikes emphasise spectacle and map exploration, ***The First Berserker: Khazan*** returns to the territory Team Ninja opened nearly a decade ago with the *Nioh* (2017) games and delivers a masterclass in boss design. The premise is unfashionable: pattern memorisation as the primary skill, repeated attempts as the primary structure, incremental learning as the primary reward. Yet Khazan demonstrates that this oldest of soulslike values, properly executed, generates an immense sense of achievement that no amount of spectacle can replicate. In each attempt against every boss, the player earns both material rewards and mental growth; no single move feels arbitrary or unfair; after every failure one can articulate in a few seconds exactly why it happened, and identify a new window for counter-attack and defence.

    The Brink Guard and Brink Dodge system is elegant in its clarity: parry for posture damage at the risk of heavy stamina drain on mistiming, or dodge for safer but less aggressive play. Spirit generated through successful combat feeds into weapon skills, creating a positive feedback loop that rewards precision without punishing caution. <u>Among the 3D soulslikes since *Lies of P* (2023), Khazan is the only one that truly demonstrates 'every boss fight is a dance': not a metaphor, but a structural description of the rhythm the encounters produce.</u> The last ten bosses constitute a generational run of encounters. The story is negligible, the aesthetics consistent but uninspired, the side systems bloated; the team reminds one that making players study a boss, hone their technique, and reflect on themselves is one of the soulslike genre's most essential, most overlooked elements.

- title: "The Roottrees are Dead"
  type: "game"
  creator: "Jeremy Johnston / Robin Ward"
  creator_role: "by"
  year: 2025
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/roottrees_are_dead.jpg"
  posted: "2025-03-30"
  text: |
    In the years after *Return of the Obra Dinn* (2018), the indie world did not quite know how to top it. Then the *Golden Idol* (2022) series arrived, and this 'fill-in-the-blank' detective genre found its era. Last year: *The Rise of the Golden Idol* (2024). This year: ***The Roottrees are Dead***, both using distinctive approaches to tell complex, bizarre stories; or rather, both designing precisely so the player pieces those stories together themselves. <u>On that front, The Roottrees are Dead is exceptional: it takes what sounds like the most pointless mechanic imaginable, filling in a family tree, and transforms it into the key that unlocks dozens of narratives and an entire business empire.</u> The act of connection, of linking name to face to relationship to motive, becomes the game's central pleasure, and the writing carries enough wit and enough darkness that each new discovery feels earned.

    <u>The genealogical-detective conceit could easily have been a gimmick, but it is invested with enough narrative complexity that the family tree functions as a map of human frailty: marriages of convenience, inherited grudges, corporate machinations, the whole architecture of a dynasty built on secrets.</u> Just for the writing, it is already worth it.

- title: "Hyper Light Drifter"
  type: "game"
  creator: "Heart Machine"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/hyper_light_drifter.jpg"
  posted: "2025-03-26"
  text: |
    My favourite atmosphere and music in any indie game I have played, and my worst map design in anything I have played. ***Hyper Light Drifter*** is a game at war with itself. Heart Machine built a luminous world: the pixel art is radiant, the soundtrack carries a melancholy that saturates every screen, and the opening sequence lands with the impact of something visionary. <u>All of it evaporates into terrible pathfinding and a map so useless it might as well not exist.</u>

    Heart Machine did not know how to design a navigational system, so they produced one that does not even clearly mark the player's position. They did not know how to design boss encounters, so they assembled a few that look impressive but carry no mechanical substance and leave no memory. <u>Years from now I will still remember HLD's stunning visuals. I will not remember anything else about the game.</u> Now I understand why their follow-up *Hyper Light Breaker* (2025) flopped.

- title: "Ender Magnolia: Bloom in the Mist"
  type: "game"
  creator: "Live Wire / Binary Haze Interactive"
  creator_role: "by"
  year: 2025
  eval: "liked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/ender_magnolia.jpg"
  posted: "2025-03-24"
  text: |
    The experience of playing ***Ender Magnolia: Bloom in the Mist*** is remarkably similar to playing *Blasphemous 2* (2023) after *Blasphemous* (2019): both incorporated modernised controls and extensive quality-of-life improvements over the original; both made previously opaque worlds and narratives clear and accessible; both elevated their respective series from cult classics to must-play metroidvanias. Compared to *Ender Lilies* (2021), Ender Magnolia's world feels more alive, yet the end-of-days atmosphere has intensified rather than eased, a paradox the game sustains with impressive tonal control.

    <u>Protagonist Lilac is the key improvement: more agentic, tougher, more fully human than her predecessor in *Ender Lilies* (2021).</u> Where the first game's protagonist felt like a vessel, Lilac feels like a person, and the distinction shifts the emotional register of the entire experience. The map design is another significant step up; each biome is clearly differentiated, and certain sections carry unmistakable echoes of *Hollow Knight* (2017). A sequel that earns its upgrades honestly.

- title: "OMORI"
  type: "game"
  creator: "OMOCAT"
  creator_role: "by"
  year: 2020
  eval: "disliked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/omori.jpg"
  posted: "2025-03-15"
  text: |
    <u>Depression is not an excuse to aestheticise harm to others, and indie games are not an excuse to waste the player's time.</u> ***OMORI*** conflates psychological complexity with psychological cruelty, using its protagonist's mental illness as a narrative device to inflict suffering on the player without ever interrogating why that suffering should be interesting or instructive. <u>The aesthetic is carefully calibrated to look sensitive; the structure is not.</u>

    The first thirty minutes demonstrate what the game might have been: focused, strange, unsettling in its deployment of RPG conventions against themselves. Everything after those thirty minutes is a steady dissipation of promise into tedium.

- title: "Marvel's Guardians of the Galaxy"
  type: "game"
  creator: "Eidos-Montréal"
  creator_role: "by"
  year: 2021
  eval: "disliked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/marvels_guardians_of_the_galaxy.jpg"
  posted: "2025-03-14"
  text: |
    'Naff', 'garish', and 'patronising' covers the whole experience. ***Marvel's Guardians of the Galaxy*** fills the screen with numbers and coloured effects in the manner of a slot machine with plot aspirations, and the plot itself is so corny it makes one's toes curl. Eidos-Montréal clearly invested in the character banter, and to their credit, the team chemistry occasionally produces something approaching warmth. <u>But warmth in the service of a Marvel narrative is like heating a plastic room: the temperature rises, the material stays synthetic.</u>

    Come to think of it, I have probably just aged out of any patience for Marvel kitsch. The problem may be mine. But the execution confirms the suspicion rather than challenging it.

- title: "Everhood"
  type: "game"
  creator: "Foreign Gnomes"
  creator_role: "by"
  year: 2021
  eval: "disliked"
  genre: "rhythm RPG"
  image: "/assets/images/thoughts/games/everhood.jpg"
  posted: "2025-03-12"
  text: |
    The music is fine, but the mystification is too heavy-handed. <u>***Everhood***'s so-called 'absolute truth' is assembled from big words and hollow phrases, the kind of pseudo-philosophical grandstanding that mistakes obscurity for depth.</u> The narrative is unoriginal: collect, fight through, collect, fight through, big bad waiting in the castle. The format follows *Undertale* (2015)'s template without understanding what made Fox's version work, which was never the mechanics of subversion but the emotional specificity of the characters being subverted.

    Thought that at four-odd hours it could not go too badly wrong. Now thinking those four hours would have been better spent watching *The White Lotus* (2021).

- title: "Felvidek"
  type: "game"
  creator: "Jozef Pavelka"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/felvidek.jpg"
  posted: "2025-03-10"
  text: |
    When many games construct a 'phantom of the past' from fictional history, ***Felvidek*** takes the opposite route. Jozef Pavelka weaves a grey, rootless landscape out of medieval Hungary's fractured borders and shifting powers in a light RPG of under five hours. One plays a drinking knight wandering the Hungarian frontier in the aftermath of a great war, surviving in the cracks between factions. Every decision feels like an attempt to find footing inside a structure already fated to collapse. The game is saturated with archival grain; the music carries the weight of solitude.

    <u>Felvidek is almost the antithesis of Warhorse's *Kingdom Come: Deliverance II* (2025), yet both share an endless passion for the medieval Central European world: every line of dialogue makes one think of the word 'charm'.</u> Where KCD2 builds its medieval world at vast scale, painstakingly detailed and historically grounded, Felvidek achieves something similar through compression: five hours containing a frontier's entire emotional geography. The writing is consistently surprising, consistently warm, consistently strange in a manner that feels authored rather than procedural. And there was peace and love. My tears fell like rain.

- title: "Fountains"
  type: "game"
  creator: "John Pywell"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "action RPG"
  image: "/assets/images/thoughts/games/fountains.jpg"
  posted: "2025-03-09"
  text: |
    Such a painful missed opportunity. ***Fountains*** has one of my favourite world designs of last year: every area and map feels perfectly grounded, and on the narrative side it draws on soulslike fragmented storytelling strengths, weaving the kingdom's intrigue, mystery, and history into something absorbing. <u>The writing rewards attention without punishing inattention, offering multiple layers of meaning to those willing to look.</u>

    But the final boss designs are terrible: no sense of interaction, punishing damage numbers, reminiscent of pre-patch Radahn's infamous period in *Elden Ring* (2022). The last two hours were spent lamenting the gap between ambition and execution. So many games start strong and collapse at the finish line. Games that sustain their quality from beginning to end are rarer than they should be.

- title: "Crypt Custodian"
  type: "game"
  creator: "Kyle Thompson"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/crypt_custodian.jpg"
  posted: "2025-03-08"
  text: |
    One of the better metroidvanias of last year, and a regret not to have reached it before year's end. ***Crypt Custodian*** excels where the genre's best always do: in map design. Kyle Thompson's world is clearly differentiated by biome, each zone carrying distinct mechanical and environmental touchstones (the semi-transparent bricks and cinematic shutters are particular highlights), and the boss design has its own character. <u>Compared to *Nine Sols* (2024) and *Fountains* (2024) from the same year, these bosses follow more of a 3D-Mario design philosophy: emphasising stage theatrics and choreography over pure mechanical punishment.</u>

    The narrative is the one dimension that falls short: thinner than *Nine Sols* (2024) or *Fountains* (2024), the areas do not anchor clearly enough in the world, and certain zones feel slightly superficial as a result. But the interactive, satisfying combat and puzzles deliver a solid ten-hour run that never outstays its welcome. Recommended for cat-loving metroidvania enthusiasts, of which, apparently, there is no shortage.

- title: "Indiana Jones and the Great Circle"
  type: "game"
  creator: "MachineGames"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/indiana_jones_and_the_great_circle.jpg"
  posted: "2025-03-03"
  text: |
    For a linear treasure-hunt game, the roughness is astonishing. ***Indiana Jones and the Great Circle*** suffers from an interactivity problem that feels a generation behind: even setting aside the many bugs and poor PC optimisation, the basic systems feel as though they belong to an adventure game from twenty years ago. Companion Gina constantly undermines the pleasure of reading clues, interrupting the experience of piecing things together, while remaining completely silent when one does things that should prompt a reaction. <u>This plastic quality saturates the entire production.</u>

    Some puzzles feel targeted at ten-year-olds. Perhaps Indiana Jones as a franchise does not care about realism or historical accuracy; fine. But the immersion-breaking mechanics and dialogue, combined with a hollow world with no exploratory pull, make everything after the Vatican, the first five hours, feel entirely redundant. <u>At seventy dollars, it is astonishing that MachineGames thought this was ready to ship.</u>

- title: "Kingdom Come: Deliverance II"
  type: "game"
  creator: "Warhorse Studios"
  creator_role: "by"
  year: 2025
  eval: "loved"
  pin: true
  genre: "RPG"
  image: "/assets/images/thoughts/games/kingdom_come_deliverance_ii.jpg"
  posted: "2025-02-26"
  text: |
    In my mind, ***Kingdom Come: Deliverance II*** is a better game than *Baldur's Gate 3* (2023). Warhorse's Bohemia has a 'lived-in' quality that is almost unprecedented: the world runs slowly, breathing, growing through conversations the player will never witness, historical currents spreading through the bricks and cobblestones of town and village, the common people caught in wars of succession left helpless by the chaos around them. This is not the 'lived-in' of scattered environmental storytelling props or NPC daily routines, but something built into every system: food rots in Henry's pack, blood on his clothes makes strangers recoil, literacy must be earned before he can read a signpost. Henry himself embodies the thesis: a blacksmith's son with no prophetic mandate, whose arc is not from weakness to power but from incompetence to adequacy. The world existed before the player arrived and will continue after the player leaves, indifferent to heroism.

    Markvart von Aulitz asks: 'Do you think you are different from Sigismund's army?' The player answers: 'I was just doing what I had to do.' Was it, though? Invaders burn and kill for their ideal nation, rationalise their cruelty in sleep with 'this is for the country's good', can be so brutal to lives they have never encountered. <u>So Henry answers: 'We are not the same.' And I, watching the strong and unbroken lives and spirits of Suchdol, cried out through tears.</u> Warhorse's greatest achievement is not the historical fidelity, though it is formidable; it is the moral weight they manage to give ordinary life. The peasants of Bohemia are not quest-givers; they are people, and the game's insistence on treating them as such is its most radical quality.

    My game of the year.

- title: "Kingdom Come: Deliverance"
  type: "game"
  creator: "Warhorse Studios"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/kingdom_come_deliverance.jpg"
  posted: "2025-02-05"
  text: |
    After everything, I will still watch the sun set over the forests of Pribyslavitz, see the afterglow light the empty fields to the south, watch Bohemia burn, watch the poor dance to Czech tavern songs in the midst of hardship. ***Kingdom Come: Deliverance*** built a medieval world with a commitment to historical specificity that, at the time, felt almost reckless: no magic, no minimap, no concession to the conventions that open-world RPGs had spent a decade calcifying into expectation. What makes the game philosophically distinctive is its rejection of the RPG genre's foundational myth: that the player-character is special. Henry begins illiterate, incompetent in combat, and socially invisible. One opens a book and sees gibberish until a scribe teaches letters; one swings a sword like a man who has never held one; nobles dismiss one not because of a dialogue tree but because one is dressed in mud-caked rags. <u>The historical fidelity is not decoration; it is the design grammar, an epistemological statement that knowledge, competence, and social standing are earned through lived practice, not menu selection.</u>

    By the end, Henry occupies an unusual narrative position: the nobility's agent in peasant society, a go-between who belongs fully to neither world. He is condemned for raising a hand against a nobleman regardless of provocation, and the game treats this not as a flaw but as a feature of the society it depicts. Kingdom Come is consistently sympathetic to pariahs and aware the world it renders is unjust, yet it refuses to let one simply opt out of that injustice; one navigates it, and in navigating it, becomes complicit. The result was rougher than its sequel, more buggy, more uneven in its systems; but the roughness was part of the texture, inseparable from the ambition. Drawing a sword was rarely the first or best choice. The private religious doubts, the sympathetic treatment of dissenting sects, the way actions carry consequences across social, moral, and mechanical registers simultaneously: all of it produces a world with the quality of persistence, one that exists before the player arrives and will continue after the player leaves. <u>I will never forget my Bohemian village. I will never forget my Bohemian dream.</u>

- title: "Minishoot' Adventures"
  type: "game"
  creator: "SoulGame Studio"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/minishoot_adventures.jpg"
  posted: "2025-01-21"
  text: |
    Sorry to have missed this metroidvania gem before the year ended; only found out about it in January. ***Minishoot' Adventures*** delivers around ten hours of map design so accomplished that it produces a slight *Hollow Knight* (2017) flashback: biomes clearly differentiated, each area sustaining its own mechanical identity, transitions handled with a confidence that belies the studio's size. But the deeper lineage is top-down Zelda. The heart-based health, the ability-gated progression, the secret areas hidden behind visual cues legible enough that missing one traces to the player's own path, the dungeon layouts that route short paths back to boss rooms from respawn points: all of it descends from *A Link to the Past* (1991)'s design philosophy, transplanted into a twin-stick shooter framework that should not cohere and somehow does. The maps are deliberately hard to find, forcing one to learn terrain through memory, and the reward density is near-unprecedented: positive reinforcement roughly every five minutes, experience accruing even during failed boss attempts. <u>A game that respects the player's time, the player's intelligence, and the player's wallet with equal discipline.</u>

    In a year when *Nine Sols* (2024) brought deflection-combat metroidvania to a new peak and *Animal Well* (2024) turned the genre into a puzzle box, Minishoot' Adventures was the quiet third option: the game that asked no grand questions and simply delivered ten hours of impeccably paced design. SoulGame Studio work within the constraints of their top-down shooter format with admirable discipline, keeping the difficulty balance precise throughout and never mistaking length for value. <u>Not every game needs to be a narrative event; some need only to be generous, and Minishoot' Adventures is generous in the way that the best small-scale games are: with its time, with its ideas, with its evident affection for the genre it inhabits.</u>

- title: "Armored Core VI: Fires of Rubicon"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action"
  image: "/assets/images/thoughts/games/armored_core_vi.jpg"
  posted: "2024-12-25"
  text: |
    A mech game stirring this many emotions in someone with zero mech interest is unexpected. ***Armored Core VI: Fires of Rubicon*** should not have worked for me; the aesthetic is industrial, the lore is dense with faction politics and resource wars, and the moment-to-moment gameplay is mech combat, a genre I have historically bounced off without exception. Yet FromSoftware's storytelling instincts cut through all of it. The story is told with a clarity and directness that breaks entirely from the studio's usual large-framework, vague-and-fragmented method, and the result is a narrative that lands with surprising emotional precision.

    <u>The moment the Xylem surfaced, I froze.</u> The feeling was immediate and specific: the same vertigo one gets seeing the giant dragon over the royal capital in *Elden Ring* (2022) for the first time, or the amygdala in *Bloodborne* (2015). <u>FromSoftware understand, perhaps better than any studio working, that scale is not spectacle; it is a tool for producing the sublime, and the sublime is an emotion, not a visual effect.</u> Armored Core VI is a power fantasy at its core, but the power it fantasises about is not destruction; it is comprehension, the moment when the full shape of a world becomes visible.

- title: "1000xRESIST"
  type: "game"
  creator: "sunset visitor 斜陽過客"
  creator_role: "by"
  year: 2024
  eval: "loved"
  pin: true
  genre: "adventure"
  image: "/assets/images/thoughts/games/1000xresist.jpg"
  posted: "2024-12-16"
  text: |
    I could not have predicted that a half-visual-novel would dismantle me like this. ***1000xRESIST*** is the most searing narrative I have encountered in games: not merely a science-fiction story about memory and forgetting, but a sustained act of self-examination in which individual trauma and collective history fold into each other until neither can be separated from the other.

    The second chapter is a farewell ceremony. Iris opens her suitcase and examines each item: the easel, the notebook, the stuffed whale. Her father brings longevity noodles on her birthday; she only wants pizza. Her mother Clara's flat instructions, 'bring a jacket, do not catch a cold' and 'do not sleep with wet hair', sound mundane and arrive like chains. Iris's rebellion is not a rejection of family but an attempt to escape the weight of inherited memory. Against this, Jiao's arc mirrors the immigrant identity crisis in miniature: she tries desperately to belong, to mirror Iris, to earn closeness, and receives only coldness. <u>The depiction of trauma is precise and unsparing.</u> Clara's sleepwalking re-enacts the 2019 Hong Kong protests without her knowledge: she strikes the balcony glass at night, the image inseparable from police batons and bloodied faces. These wounds pass from mother to daughter through language and behaviour until the cycle devours everyone. The game's deepest complication is that Iris is an unreliable narrator who can alter her own memories; one is never certain whether Clara's betrayal was real or fabricated to justify what follows. This ambiguity is the generational trauma chain itself: Iris's unresolved guilt becomes the foundational wound of the entire Sisters' civilisation, every clone inheriting the consequences of a violence whose justification may be a lie. The Occupants, the game's colonisers, refine human suffering into resource, creating diseases that make people weep without cease so that memory can be harvested. Secretary's line cuts deepest: 'Iris must die, otherwise nothing will change.'

    <u>But most of all, this is a story about the question that lives inside every suitcase: what one chooses to carry and what one chooses to leave behind.</u> The final trial forces a reckoning: whose memory enters the future, whose remains in the past. Some things cannot fit in the backpack. The black umbrellas drifting through subway corridors, the blood, the narrow lanes between tower blocks, the farewell words repeated across generations: these are both the history one cannot escape and the foundation on which one walks forward. Letting go is not betrayal; it is courage.

- title: "Portal 2"
  type: "game"
  creator: "Valve"
  creator_role: "by"
  year: 2011
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/portal_2.jpg"
  posted: "2024-12-12"
  text: |
    The story is more complete than the first game; that alone would be sufficient. But ***Portal 2*** does something far more interesting: it uses Cave Johnson's abandoned testing facility as a descent through Aperture Science's corporate archaeology, each stratum revealing a different era of ambition, failure, and institutional decay. The puzzles in the old facility are among the best in the series, not because they are the hardest but because they are the most legible, each solution flowing from the environment's own logic rather than from the player's internalised puzzle-grammar. When Johnson's pre-recorded voice fills the condemned corridors, narrating the company's past with a manic optimism that the surroundings thoroughly contradict, the comedy achieves something rare: it is both funny and sad, the joke and its punchline occupying the same space.

    <u>Valve's creativity at its peak: a game in which the writing, the level design, and the puzzle mechanics are not merely aligned but indistinguishable.</u> The gel puzzles alone represent more invention than most studios produce in an entire catalogue. That Portal 2 manages to be simultaneously a legitimate sequel to one of the most perfectly designed games ever made and a complete reimagination of its possibilities is the kind of achievement that makes one wonder why more studios do not simply try harder.

- title: "Portal"
  type: "game"
  creator: "Valve"
  creator_role: "by"
  year: 2007
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/portal.jpg"
  posted: "2024-11-30"
  text: |
    In 2005, Nuclear Monkey Software released *Narbacular Drop* (2005), a student project built around placing two portals. After a brief demo for Gabe Newell, Valve hired the entire team and gave them the freedom to develop ***Portal***. Two years later, it launched bundled with *Team Fortress 2* (2007) and *Half-Life 2: Episode Two* (2007), three games that together pushed the industry forward and transformed the landscape for puzzle and narrative design. Portal's minimalism is its genius: a single mechanic, rigorously explored, coupled with a narrative voice so distinctive that it became a cultural reference point within months of release.

    <u>Seventeen years later, games that can stand alongside Portal's puzzle design can be counted on one hand.</u> The reason is not difficulty but clarity: every chamber teaches exactly one thing, tests exactly one application, and moves on before the player's attention can wander. The community that followed, the mods and fan-made maps, the speedrunning scene, all testify to the depth hidden within that apparent simplicity. People often say Portal is the ideal 'gateway game', the title one hands to someone who has never played a game and says 'start here'. There is a reason for that, and the reason is not accessibility; it is respect.

- title: "Mouthwashing"
  type: "game"
  creator: "Wrong Organ"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "horror"
  image: "/assets/images/thoughts/games/mouthwashing.jpg"
  posted: "2024-11-29"
  text: |
    A rare non-linear psychological horror narrative with a structural conceit that justifies its own complexity. ***Mouthwashing*** parcels its story into chronologically scrambled fragments, and by the time one has pieced together the full account of the shipwreck and the mouthwash, <u>the revelation arrives with the force of a trap: the cowardly, weak, selfish one was not the character one suspected but the character one inhabited.</u> The perspective shift is handled with precision; the horror is less in the events themselves than in the slow recognition that one's own assumptions enabled the deception.

    Singular, but it ends up feeling like non-linear storytelling for non-linearity's sake, which keeps it from the highest tier. The scrambled chronology produces surprise, but the surprise is structural rather than emotional: one admires the construction without being devastated by it. <u>A game that demonstrates mastery of its chosen technique while stopping just short of transcending it.</u>

- title: "Outer Wilds: Echoes of the Eye"
  type: "game"
  creator: "Mobius Digital"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/outer_wilds_echoes_of_the_eye.jpg"
  posted: "2024-11-27"
  text: |
    Despite several puzzle stumbles, Mobius Digital again proved the depth of their environmental and visual storytelling. ***Outer Wilds: Echoes of the Eye*** asks the player the same question the base game asked, 'What happened here?', and answers it with the same method: by placing the evidence in plain sight and trusting the player to assemble the narrative from observation alone. From 'What happened to the inhabitants of this vessel?' to 'Why are they gathered around a campfire?' to 'So this is why the Nomai came to our star system!': this small DLC delivers the same awe and novelty one felt at the start of the base game, Eureka moment after Eureka moment.

    <u>Nearly three hundred thousand years of epic history, buried in corpses and indecipherable symbols: not the romance of the universe, not evidence of its hostility, but an anthem, singing of the small yet great lives of the people of three species.</u> The Stranger's setting is a masterclass in environmental storytelling at scale, each new discovery simultaneously answering an old question and posing a new one, the whole structure functioning like a nested set of dolls that, when fully opened, reveal not an answer but a feeling. Mobius Digital understand that the best mysteries are not solved but inhabited.

- title: "Outer Wilds"
  type: "game"
  creator: "Mobius Digital"
  creator_role: "by"
  year: 2019
  eval: "loved"
  pin: true
  genre: "adventure"
  image: "/assets/images/thoughts/games/outer_wilds.jpg"
  posted: "2024-11-26"
  text: |
    In the last few hours of ***Outer Wilds***, I cried many times. The Nomai arrived in this solar system chasing a signal older than the universe itself and built the Ash Twin Project to locate its source. But the Interloper, a rogue comet carrying ghost matter, extinguished them before the project could activate: an entire civilisation's curiosity cut short by physics. Centuries later, the project fired on its own, launching 9,318,054 probes across as many loops until one finally located the Eye of the Universe, the Nomai's question answered long after their extinction. The Universe is the ultimate equaliser; in the absurd existence of the loop, in hundreds of thousands of years of repetition, only the curiosity for truth and the act of exploration endure.

    <u>Mobius Digital built a solar system that functions as a philosophical instrument: small enough to be fully knowable, large enough to produce awe, and governed by physics precise enough that every discovery feels earned rather than scripted.</u> Each planet is a self-contained thought experiment: Brittle Hollow collapses into its own black hole as one explores it; the Hourglass Twins exchange their sand on a timer that reshapes both surfaces; Dark Bramble folds impossible space inside a seed, its anglerfish enforcing stillness as a survival mechanic. The time loop is not a gimmick; it is the game's argument, a structural claim that knowledge, once acquired, cannot be unlearned, and that the accumulation of understanding across repeated failures is itself a form of progress. No quest markers, no objective log, no mechanical progression: the only upgrade is comprehension. The player's mind grows larger with each cycle, learning to read the world's signs until the whole system becomes legible.

    The ending is what breaks me. One carries the knowledge of an entire dead civilisation to the Eye of the Universe, and the final act is not a confrontation but a campfire: the player's companions gather, each contributing an instrument, and the music they play together becomes the seed of whatever comes next. Not a victory over entropy but an acceptance of it, an insistence that what was learned and felt and shared matters even if the universe that produced it is ending. <u>Writing this, I am about to cry again.</u>

- title: "Quantum Break"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2016
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/quantum_break.jpg"
  posted: "2024-11-24"
  text: |
    That Remedy produced something this ambitious with Microsoft getting in the way is remarkable. ***Quantum Break***'s TV-game hybrid format is more successful and more coherent than any prior attempt at the concept: the live-action episodes interleave with the gameplay in a way that feels designed rather than bolted on, each medium doing work the other cannot. The time-manipulation mechanics are more than set-dressing; they produce combat encounters with a rhythm distinct from anything in the studio's previous work, and the junctions where the player's choices redirect the live-action narrative are handled with a confidence that belies how risky the format was.

    It is not hard to see, in retrospect, why *Alan Wake 2* (2023) and *Control* (2019) turned out so well. Quantum Break is where Remedy learned to trust their own narrative instincts at scale, to build worlds dense enough to sustain scrutiny, to treat the player as a reader rather than a passenger. <u>Remedy holds to the principle of 'no fast food games, only quality art', and in 2016, Quantum Break gave the industry's writers another lesson in format-native storytelling.</u>

- title: "The Rise of the Golden Idol"
  type: "game"
  creator: "Color Gray Games"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/rise_of_the_golden_idol.jpg"
  posted: "2024-11-18"
  text: |
    Extraordinary storytelling from an unassuming game. Building on the excellent detective atmosphere of the original, ***The Rise of the Golden Idol*** tells a far more sweeping story: the depth of its engagement with social and philosophical questions is remarkable for a game that, on its surface, presents as a fill-in-the-blank puzzle exercise. What is memory? What is the relationship between memory and individual identity? How does one balance the ethics of social engineering with the prospect of shared human enlightenment? What does it mean to 'sacrifice for humanity'? Color Gray Games do not answer these questions so much as create the conditions under which the player cannot avoid asking them.

    I am convinced the *Golden Idol* (2022) series will enter the history of detective games alongside *Return of the Obra Dinn* (2018). <u>The adaptive music deserves particular mention: the audio and musical shifts responding to the scene as one investigates are perfectly calibrated, and the soundtrack itself is among the best in indie gaming.</u> The way the score modulates as one approaches a solution, tightening its harmonics in sympathetic tension with the player's own cognitive state, is a level of attention to the investigative experience that most detective games never even attempt. One has not been this absorbed in a long time.

- title: "文字遊戲"
  title_en: "Word Game"
  type: "game"
  creator: "Team9"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/word_game.jpg"
  posted: "2024-11-14"
  text: |
    Moving: both because of the ending's astonishing shift in angle and scene, the origin story told quietly and precisely, and because a small studio in Taiwan could make something this singular with such care. ***Word Game*** (文字遊戲) takes the radicals, components, and strokes of Chinese characters, even the choice of vocabulary itself, and plays with them in uniquely inventive ways that constantly prompt 'That was right there! How did I not see it!' The puzzles are not merely linguistic; they are structural, each one revealing something about the way meaning is encoded in Chinese writing that one has lived with for decades without noticing.

    Taiwan has been producing a striking number of games rooted in Chinese culture: *Nine Sols* (2024), Word Game from 2022. <u>Perhaps for many years to come, there will not be another game quite like either.</u> Both demonstrate what happens when cultural specificity is treated not as flavour but as foundation: the game's mechanics are inseparable from the writing system they inhabit, and the result is something that cannot be translated, only experienced. A game that makes the familiar strange and the strange legible.

- title: "Control: AWE"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/control_awe.jpg"
  posted: "2024-11-10"
  text: |
    *Control* (2019)'s second DLC clearly addresses *The Foundation* (2020)'s shortcomings. ***Control: AWE*** uses an extremely dense lore drop to let the Remedy Connected Universe's detail and richness feel present at every turn: rare in games to find a world this precise and vivid, a protagonist this helpless and small. Feeling the West Coast event's ripples on the East Coast, Alan Wake challenging time's causal structure, Novikov self-consistency principles, Monarch Solutions: the unknown lays the foundation for theory, and AWE lays the foundation for everything Remedy would build next.

    <u>The DLC is essentially a bridge: between *Control* (2019) and *Alan Wake 2* (2023), between the FBC and the Dark Place, between Remedy's present and their future.</u> That it functions as compelling standalone content while also serving this connective purpose is a testament to the studio's growing confidence in their own mythology. <u>Jesse Faden has never felt smaller, nor the universe around her more vast.</u>

- title: "Control: The Foundation"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2020
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/control_the_foundation.jpg"
  posted: "2024-11-06"
  text: |
    A thoroughly mediocre DLC, consistent with Remedy's tradition of not caring much about expansion content. ***Control: The Foundation*** promised significant FBC lore; what it delivered was the minor saga of the previous leadership, Ash and Northmoor. The level design is shockingly retrograde for the studio that produced the brilliant metroidvania of the base game: a single upward path, haphazardly placed checkpoints, enemy values and placement both problematic.

    <u>Remedy's essence is world-building and level design, and this DLC underdelivers on both.</u> Where the base game's Oldest House felt like a living thing, the Foundation feels like a corridor wearing a cave's skin. Expected much more; received the bare minimum.

- title: "Silent Hill 2 (Remake)"
  type: "game"
  creator: "Bloober Team"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/silent_hill_2_remake.jpg"
  posted: "2024-11-03"
  text: |
    One moment complaining about the obscure puzzles; the next, weeping over the letter Mary wrote. ***Silent Hill 2*** has always been a game about the distance between what one knows and what one is willing to know, and Bloober Team's remake preserves that distance with remarkable fidelity. The updated visuals serve the horror rather than diluting it: Toluca Lake is more oppressive, the fog thicker, the creature design more viscerally uncomfortable, and the environmental detail dense enough that returning to previously visited spaces produces genuine unease rather than familiarity.

    <u>Did Mary want release? I do not know. I only know her apology was undeserved, and James is a piece of work.</u> The brevity of that judgment is the point: after everything the game puts the player through, after the water, the moths, the nurses, the pyramid, the final letter, what remains is not understanding but conviction. <u>One does not leave *Silent Hill 2* (2001) with answers. One leaves it with a feeling, and the feeling is closer to complicity than catharsis.</u>

- title: "Red Dead Redemption 2"
  type: "game"
  creator: "Rockstar Games"
  creator_role: "by"
  year: 2018
  eval: "meh..."
  genre: "open world"
  image: "/assets/images/thoughts/games/red_dead_redemption_2.jpg"
  posted: "2024-11-02"
  text: |
    The story flows beautifully, delivery direct and moving; one cries at predictable moments and at unpredictable ones, and the craft is impossible to deny. But I kept yawning through the gameplay. ***Red Dead Redemption 2*** asks the player to spend an absurd amount of time riding horses through scenery that, in motion, is often far less visually arresting than it is in screenshots. <u>The open world is vast and detailed and has very little to say about its own vastness; the detail exists to be noticed, not to be meaningful.</u>

    <u>Another game that would suit adaptation far better than it suits the medium; another game that does not respect the player's time.</u> Rockstar's commitment to cinematic pacing in an interactive medium produces a peculiar friction: the story wants to move; the systems want to linger; the player sits between them, wondering when permission to proceed will be granted.

- title: "Alan Wake Remastered"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan_wake_remastered.jpg"
  posted: "2024-10-31"
  text: |
    Going back to the original ***Alan Wake*** after *Alan Wake 2* (2023) and *Control* (2019) makes one feel the distance of a generation and appreciate the sequel's achievement all the more. Remedy had already proven, with *Max Payne* (2001), that they could write: that game's noir voice, its comic-panel pacing, its relentless self-awareness were all evidence of a studio with real narrative instincts. But Alan Wake is reaching for something different, a slow-burn weird-fiction atmosphere that the 2010 studio did not yet know how to sustain. The voiceover carries too much weight; Barry absorbs the rest; the world-building has ambition but not yet the architectural confidence that *Control* (2019) and *Alan Wake 2* (2023) would later demonstrate. Combined with an uncomfortable control and combat system, the original's flaws overwhelm its virtues.

    <u>After all the frustration and disappointment, the final 'It's not a lake; it's an ocean' rings hollow: a line that should be devastating, arriving in a game that has not earned it.</u> Replaying it, one experiences the greatness of *Alan Wake 2* (2023), not the vision of an early Remedy. Only a sigh.

- title: "Alan Wake 2: The Lake House"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan_wake_2_lake_house.jpg"
  posted: "2024-10-26"
  text: |
    Many threads of the Remedy Connected Universe finally come together clearly in ***Alan Wake 2: The Lake House***. The art, detail, and creature design all rank among the best in any Remedy work: the Lake House itself is one of the studio's finest environments, a space that feels simultaneously institutional and otherworldly, each room carrying the residue of experiments whose consequences are still unfolding.

    Only regret: it is too short. Read every document, scrutinise every detail, and one is still looking at three-odd hours. But those three hours contain a density of lore and visual invention that justifies the entire DLC model. <u>The way the narrative connects *Control* (2019)'s FBC mythology with *Alan Wake 2* (2023)'s Dark Place is handled with the kind of precision that suggests Remedy have had this planned for years.</u> A shame the brevity limits the impact; a testament that the studio can make even a brief experience feel essential.

- title: "Event[0]"
  type: "game"
  creator: "Ocelot Society"
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/event_0.jpg"
  posted: "2024-10-16"
  text: |
    To maintain the illusion of control, the developers clearly put real effort into coding different response rules for Kaizen, the shipboard AI. But it does not take long for any attentive player to realise that ***Event[0]***'s Kaizen is not a real artificial intelligence but a state machine generating responses according to coded rules with many limitations. <u>Kaizen is not 'too dumb to help', as the crew suggested; it is more sadly 'too simplistic to feel human at all', and yet Kaizen's humanity is one of Event[0]'s core themes.</u>

    <u>The irony is structural and almost certainly unintentional: a game about human-AI communication that is undermined by the limitations of its own AI simulation.</u> In recent years, many developers have tried building RPGs with large language models. I hope someone eventually realises *Event[0]* (2016)'s original promise: not the chatbot as novelty, but the chatbot as character, with the depth of interaction that the premise demands.

- title: "Senua's Saga: Hellblade II"
  type: "game"
  creator: "Ninja Theory"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/senuas_saga.jpg"
  posted: "2024-10-08"
  text: |
    After the first game's moving, powerful depiction of psychosis, ***Senua's Saga: Hellblade II*** performs a complete narrative and thematic backflip. My greatest objection: the sequel frames psychosis as a superpower, as if Senua's illness gives her a supernatural understanding of the world. This is not only inaccurate but the precise opposite of what the first game was trying to say. *Hellblade: Senua's Sacrifice* (2017) was about the maltreatment of people with mental illness in Pictish tribal culture, and the lasting damage that resulted. The sequel? Senua becomes a god, and her psychosis is what lets her know the giants' names. So much for raising awareness of mental health and restoring the lived experience of psychosis.

    On visuals and sound: this is the only game in years that has made me feel Unreal Engine 5's real power. <u>If 'playable CG' of the highest order is what one is after, Hellblade II is the only option.</u> But visual fidelity in the service of thematic regression is a strange kind of achievement. <u>The game looks better than anything I have played; it says less than almost anything I have played.</u> The distance between those two facts is the distance between Ninja Theory's ambition and their execution.

- title: "Lords of the Fallen"
  type: "game"
  creator: "Hexworks"
  creator_role: "by"
  year: 2023
  eval: "disliked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/lords_of_the_fallen.jpg"
  posted: "2024-10-08"
  text: |
    I used to think the problem was optimisation. Now the optimisation is fixed, and it turns out everything except the map design is a problem. ***Lords of the Fallen***'s Umbral mob-packing can only generate frustration; the stiff animation is noticeably worse than even *Dark Souls* (2011) and *Dark Souls II* (2014), and completely destroys what should be the game's impact. Hair quality has no Unreal Engine 5 feel at all; maxed visuals cannot match *Hellblade II* (2024), *Layers of Fear* (2016), or even *Lies of P* (2023) in the same soulslike bracket.

    <u>Apart from a roughly average soulslike map design, I can find no virtue.</u> Hexworks have produced a game that is not bad enough to be interesting and not good enough to be enjoyable: the specific purgatory of competent mediocrity.

- title: "Thank Goodness You're Here!"
  type: "game"
  creator: "Coal Supper"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/thank_goodness_youre_here.jpg"
  posted: "2024-10-07"
  text: |
    This is almost certainly the most British game one can get nowadays. ***Thank Goodness You're Here!*** has had its dialogues humourously tuned to perfection, with wonderful voice acting for every single character: each line delivered with the kind of comic timing that cannot be written, only performed, and the performances here are uniformly excellent. My favourite sequence must be the two people arguing over their rubbish and bins, a scene so precisely observed in its pettiness that it transcends parody and becomes something closer to documentary.

    <u>Simply the most delightful game I have played in a long while.</u> Coal Supper understand something that most comedy games do not: that humour in games is not about jokes but about rhythm, about the gap between expectation and delivery, about the precise moment at which the mundane becomes absurd. Thank Goodness You're Here! never tries to be clever; it tries to be funny, and it succeeds with a consistency that is itself a kind of brilliance.

- title: "Hellblade: Senua's Sacrifice"
  type: "game"
  creator: "Ninja Theory"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/hellblade.jpg"
  posted: "2024-10-02"
  text: |
    ***Hellblade: Senua's Sacrifice*** is among the most emotionally complete games I have played: every mechanic, every visual and auditory design decision, every boss fight and puzzle fused with narrative in service of psychological portraiture. A game built with around twenty people that delivers a masterclass in how mechanics can do the work of prose. From the moment one sees Dillion's head tied to Senua's waist, the game establishes its central conceit: the player is not an observer but the fourteenth voice, one more fragment of Senua's fractured psyche, part of the darkness her father Zynbel cannot see.

    Before facing Hela, Senua must pass through two trials that embody different dimensions of her illness. Valravn's illusion trial is psychosis rendered as level design: angles shift, realities overlap, and Ninja Theory use the seamless transitions between planes to externalise Senua's experience of hallucination with terrifying precision. The core question lands not as text but as architecture: what is real, and whose reality is the real one? Surtr's fire, by contrast, is trauma made literal: the flames that consumed Senua's mother Galena at her father's instigation, the Viking slaughter that shattered her world, all crystallised into a single burning gauntlet. Through these two trials, the game assembles Senua's past piece by piece until she recognises Zynbel's manipulation for what it was, until she sees the value in her own dark inner world.

    <u>Dillion's death, Galena's death, the Viking slaughter: past traumas forged into Senua, every scream a distillation of pain and blood.</u> Facing Zynbel's manipulation and Hela's taunts, Senua shouts a great 'No!' in her mind. We watch the dark river of her consciousness surge. <u>Ninja Theory achieved something singular: a game that asks the player to inhabit a mind in crisis without exploiting that crisis for spectacle.</u> The permadeath threat that may or may not be real, the voices that counsel and contradict and plead: all of it produces empathy through immersion rather than through exposition. That the sequel would betray this achievement makes the original all the more precious.

- title: "Baldur's Gate 3"
  type: "game"
  creator: "Larian Studios"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/baldurs_gate_3.jpg"
  posted: "2024-09-30"
  text: |
    A typical Larian game with very clear strengths and very clear weaknesses, though many areas are noticeably weaker than *Divinity: Original Sin II* (2017). The most direct feeling: in DOS2 I was completely absorbed for 170 hours, went for full completion, and could not stop; in ***Baldur's Gate 3*** I felt drained before 100. The faithful rendering of 5th Edition D&D rules deserves respect, but dice-rolling and explicit rule display inevitably get in the way of the game itself: not as clean as DOS2's implicit visual mechanics, which communicated the same information without breaking the fictional frame.

    On story, same as DOS2: NPC personalities are vivid, voice acting is excellent, and NPC dialogue reactivity is consistently impressive. But the final chapter is disappointing. The upper city offers almost nothing to do; the lower city exploration is fine, but the level 12 cap kills the desire to complete quests; the main plot reduces to finding the villain's base; the final battle drags. <u>Despite all that, BG3 is a masterwork where the gems far outweigh the flaws, and could stand toe-to-toe with DOS2.</u> It is a game one loves not for what it does perfectly but for what it attempts at all: the sheer ambition of rendering a tabletop RPG in this medium, at this scale, with this degree of reactivity. That the ambition occasionally exceeds the execution is the price of trying.

- title: "Blasphemous 2"
  type: "game"
  creator: "The Game Kitchen"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/blasphemous_2.jpg"
  posted: "2024-09-24"
  text: |
    ***Blasphemous 2*** carries forward the excellent map design of the original while making two crucial additions: the combination of three weapon types raises the platforming ceiling and allows for more ambitiously designed platforming sections, and the choice of starting weapon creates different entry experiences for different players. These are not incremental improvements; they are structural innovations in play.

    Gameplay is enormously improved on the original: removed death drops, fixed mob-packing, and the map verticality is much better. Boss design loses some of the first game's larger-than-life grandeur, but compensates with improved interactivity in humanoid encounters; the final boss in particular is excellent. <u>The one disappointment is aesthetic: the art and world design are not quite at the level of the original, partly because the animator who gave *Blasphemous* (2019) its distinctive visual character departed, and the cutscenes have a jarring quality that undercuts the otherwise fluid visual language.</u> Still: a sequel that understands what to keep, what to change, and what to leave behind.

- title: "Astro Bot"
  type: "game"
  creator: "Team Asobi"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "platformer"
  image: "/assets/images/thoughts/games/astro_bot.jpg"
  posted: "2024-09-09"
  text: |
    ***Astro Bot*** succeeds because Team Asobi made 'fun' the organising principle of every level's mechanics and puzzles, a decision so simple that it sounds trivial until one considers how few studios actually commit to it. Whether it is an idea reminiscent of *Super Mario Odyssey* (2017)'s best moments, or a brief, affectionate recreation of Aloy's adventure on the Tallnecks, each level announces its conceit, explores it with precision, and ends before the exploration becomes repetition.

    <u>Team Asobi remind one that games exist to bring joy, and that joy, properly executed, is as demanding a design goal as any.</u> The one regret: I had seen too many review previews, and certain moments were spoiled. Lucky the surprises were endless anyway. Astro Bot is not a game that redefines the platformer; it is a game that remembers what the platformer was for.

- title: "Blasphemous"
  type: "game"
  creator: "The Game Kitchen"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/blasphemous.jpg"
  posted: "2024-09-09"
  text: |
    A 2D soulslike platformer soaked in penitence, the kind of game that improves on a second playthrough because the added difficulty perfectly matches the Penitent One's characterisation. ***Blasphemous*** understands something about the relationship between suffering and meaning that most games in the genre treat as flavour rather than structure: the tall Sanbenito hat pointing at the sky, each step from Albero toward the distant church, the weight of accumulated sin made literal through the progression system.

    <u>My favourite detail is the retelling of Our Lady of the Charred Visage and the story of María Coronel: to escape the pursuit of the cruel King Peter I, she poured hot oil on her own face, disfiguring herself to end his desire.</u> Our Lady of the Charred Visage mirrors the story: to escape the gaze drawn by her own beauty, she burned away half her face. But how could the god of Cvstodia be so merciful? Seeing her set her own face alight, the god decided to let the fire burn forever. In the end, she could not escape her fated gaze and attention. The Game Kitchen made a world in which cruelty and devotion are indistinguishable, and the horror is not in the cruelty but in the devotion.

- title: "INDIKA"
  type: "game"
  creator: "Odd Meter"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/indika.jpg"
  posted: "2024-09-09"
  text: |
    Less religious than expected: most of the underlying discussion centres on the conflict between sensibility and pure reason, and on definitions of free will and sin. ***INDIKA***'s first few minutes are stunning, particularly the water-drawing segment, which achieves the kind of seamless integration of mechanics and meaning that suggests an art game of rare ambition. One assumed this was a game that barely exists in recent years.

    But overall, quite disappointing. <u>INDIKA ends up feeling like a succession of unconnected small segments pasted together into something with no unified identity: the tonal register shifts from contemplative to comic to horrific without any of these shifts earning their place.</u> Each individual scene carries craft; the whole carries nothing. A game of excellent parts and absent architecture.

- title: "Another Crab's Treasure"
  type: "game"
  creator: "Aggro Crab"
  creator_role: "by"
  year: 2024
  eval: "meh..."
  genre: "soulslike"
  image: "/assets/images/thoughts/games/another_crabs_treasure.jpg"
  posted: "2024-09-01"
  text: |
    After ten cheerful hours saying 'this game is great', I hit Scuttleport and realised I absolutely cannot tolerate its three-dimensional map. ***Another Crab's Treasure*** deserves credit for attempting vertical soulslike map design when other studios will not even try, but the execution is punishing in ways the design does not account for: constant position-based deaths, invisible gaps between planks, falls that do not kill but force tedious backtracking without granting recovery resources.

    All the bosses are good bosses. The shell mechanic is fun. The environmental humour is consistently inventive. But the deliberate spite of Flotsam Vale and Scuttleport cannot be excused; the game is already hard enough without adding 'roundabout unfair difficulty' through geometry rather than combat. <u>Without those two zones, a great game. With them, the generosity of the early hours curdles into frustration.</u>

- title: "黑神话：悟空"
  title_en: "Black Myth: Wukong"
  type: "game"
  creator: "Game Science"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/black_myth.jpg"
  posted: "2024-08-31"
  text: |
    A middling game dragged further down by the studio's attitude. ***Black Myth: Wukong*** is a game whose every problem traces back to the same root cause: attitude. The invisible walls and poor exploration follow from scanning real heritage sites and then declining to modify them meaningfully, so that the Small Western Paradise looks vast but is almost entirely walled off by invisible barriers. The poor PS5 optimisation is attitude: two days before release, Game Science dropped a misleading PS5 footage video to squeeze a final round of non-refundable purchases. Late-game bosses being a mess and Flower Fruit Mountain having no exploratory appeal is attitude: 'We finished the game; for a first triple-A it is fine; the marketing and hype did the work.'

    <u>Fifty hours of feelings reduced to a single observation: when a studio's attitude toward its own audience is this visible, no amount of spectacle can compensate.</u>

- title: "Return of the Obra Dinn"
  type: "game"
  creator: "Lucas Pope"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/return_of_the_obra_dinn.jpg"
  posted: "2024-08-22"
  text: |
    Beyond the astonishing deductive logic and complex clues, what surprised me most about ***Return of the Obra Dinn*** is the sound design. Organ for the weight of disaster, violin for premeditated slaughter; opening the book, one hears strings without resolution: staccato that never resolves even after all sixty fates are determined, corresponding to the missing final chapter, The Bargain. <u>Lucas Pope understood that the sound of an unsolved mystery is not silence but unresolved harmony.</u>

    <u>Having played *The Case of the Golden Idol* (2022), I have even more admiration for Obra Dinn, which inspired the whole genre.</u> Pope's achievement is not merely that he created a detective game of uncommon logical rigour; it is that he made the act of deduction feel like an aesthetic experience, each correct identification landing not with the satisfaction of a puzzle solved but with the weight of a life acknowledged. I love this journey.

- title: "九日"
  title_en: "Nine Sols"
  type: "game"
  creator: "Red Candle Games"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/nine_sols.jpg"
  posted: "2024-08-18"
  text: |
    One of the strongest metroidvanias of 2024, and a high point for the genre in any recent year. ***Nine Sols*** is an extremely challenging metroidvania fusing the combat systems of *Sekiro* (2019) and *Hollow Knight* (2017) to produce the best parry-and-punish combat loop in recent years. Red Candle Games have built a game in which each area carries distinct colour and biome, echoing *Hollow Knight* (2017)'s approach but with the tonal specificity of a studio whose previous work includes *Detention* (2017) and *Devotion* (2019): every environment hints at the area boss's backstory and personality before the encounter begins.

    <u>Most surprising is the narrative. In an era when soulslike and metroidvania narratives are slow and obscure by default, to find something this clearly told, with such a beautiful character arc, is rare.</u> Given the studio's first two works, their ability to produce this map design and a run of boss fights this consistently interesting is remarkable. Red Candle Games have proven that a small studio with vision can compete with the genre's best on every front. People of Penglai: see you in dreams.

- title: "Hi-Fi RUSH"
  type: "game"
  creator: "Tango Gameworks"
  creator_role: "by"
  year: 2023
  eval: "liked"
  genre: "rhythm action"
  image: "/assets/images/thoughts/games/hi_fi_rush.jpg"
  posted: "2024-08-10"
  text: |
    A slightly flawed work of art. ***Hi-Fi RUSH*** is groundbreaking in its impact and rhythm animation: arguably launching a new sub-genre, with under ten hours of gameplay that flows effortlessly. <u>Tango Gameworks fused the action and the soundtrack so tightly that the game's rhythm is not an accompaniment but a structural principle, every enemy attack, every environmental hazard, every parry window locked to the beat.</u>

    Two hard flaws, though. First, the lack of enemy variety: with the range of mechanics available, particularly the magnetic pull, there was room for much more variety to deepen the late game, but in the final stages nearly all enemies can be beaten the same way. Second, the music has no highlights at all, a surprising weakness given the game's rhythm-game identity. Rhythmically it never leaves 4/4, every track locked to the same straight-ahead rock pulse, and the arrangement has no distinctive quality. Tango could have exploited odd time signatures to add rhythmic colour at key moments; instead, the studio seems so focused on the action side that it completely neglects the music's quality and variety. <u>A rare genre-launcher, but the flaws are real.</u> Most sadly, Tango will not get the chance to keep exploring this genre.

- title: "Animal Well"
  type: "game"
  creator: "Billy Basso"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "puzzle platformer"
  image: "/assets/images/thoughts/games/animal_well.jpg"
  posted: "2024-08-05"
  text: |
    The infinite potential hidden behind a handful of small items, brought to life by Billy Basso's remarkable design. ***Animal Well*** is an attempt to build a wordless dialogue with the player: each tool, each hidden interaction, each moment of environmental discovery is a sentence in a conversation whose grammar one learns through play alone. There is a white dog chasing frisbees instead of doing anything useful; a koala hopping along step by step; a white egret walking with haughty composure. All of them showing the player just how carefully Basso has worked.

    The only limitation is that solo development necessarily restricts scope; the game is shorter than it could be, and some systems feel as though they were reaching toward a complexity the timeframe could not accommodate. But with this level of talent, it is easy to imagine a future work that surpasses *Ori* (2015) without trying. Animal Well is a proof of concept for a design philosophy: that a single developer with sufficient vision can produce something that feels not small but concentrated.

- title: "Elden Ring: Shadow of the Erdtree"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2024
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/elden_ring_shadow_of_the_erdtree.jpg"
  posted: "2024-07-04"
  text: |
    After falling before Radahn dozens of times, I thought of the field of cerulean flowers suddenly visible at the coastal cliffs, of the small golden tree surrounded by coloured flowers in the village where the god was born and grew, of Miquella's imagined tender world and his own merciless cruelty, of the suffering of common people caught under warring gods, of the scarlet rot growing lonely on the ruins of ancient relics. ***Elden Ring: Shadow of the Erdtree*** is FromSoftware's most concentrated work: a DLC that feels less like an expansion and more like a refinement, every area operating at a density the base game's sheer scale occasionally diluted.

    The Land of Shadow is perhaps the most thematically coherent space FromSoftware have built. Everything here is buried history: Messmer's scorched-earth campaign against the Hornsent, Marika's founding violence sealed beneath the Erdtree's golden canopy, an entire civilisation erased so that grace could shine undisturbed above. The areas compress what the base game spread across a continent: Scadu Altus's foreboding darkness, the Ancient Ruins of Rauh overrun with jungle as though the land itself is reclaiming what was taken, the Abyssal Woods where combat gives way to pure dread, Rellana's elegant duel at the border crossing. Messmer the Impaler is the DLC's finest boss, a son hidden from history whose serpent-fire fighting style carries the fury of a purpose he can no longer justify. <u>Every ruin in the Land of Shadow asks the same question the Erdtree was planted to suppress: what was here before the golden age, and who burned it down?</u>

    Miquella's arc is the DLC's sharpest contribution. In the base game he was the sympathetic Empyrean, the cursed child who wanted only to heal his sister and free the world from the outer gods' grip. The Land of Shadow reveals what that compassion costs when it acquires divine power. At each cross scattered through the world, Miquella shed a part of himself, his love, his charm, his memories, his body, stripping away everything human to prepare for a godhood that would impose gentleness by force. His followers, Needle Knight Leda, Thiollier, Moore, love him because he made them love him; the enchantment is not a side effect but the method. <u>One assembles the fragments of Miquella's passage and the picture that coheres is compassion curdled into tyranny: the most well-intentioned god in the Lands Between is still a god, and the gentlest world he can imagine is one in which no one is free to refuse it.</u>

    A dimmed Tarnished, stumbling, still climbing to the top of the spiral tower. Promised Consort Radahn, resurrected and claimed, Miquella descending onto his back in the second phase to pour golden light into every attack: the final encounter is as overwhelming as anything FromSoftware have staged. Three dozen attempts, and the fight never felt unfair, only immense. That is the difference the Scadutree system makes when one engages with it honestly: the DLC rewards exploration with survivability, gating power through discovery rather than rote levelling. The Land of Shadow is a world where every character, every environmental detail speaks to the same question of what it costs to be chosen, and what it costs more to be unchosen.

- title: "Alan Wake 2: Night Springs"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan_wake_2_night_springs.jpg"
  posted: "2024-06-21"
  text: |
    Less a set of narrative additions to the RCU and more Sam Lake letting himself go and having fun for three hours. ***Alan Wake 2: Night Springs*** is Remedy in playful mode: the art direction is as excellent as ever, and each of the three episodes riffs on the studio's own mythology with a lightness that makes the brevity feel like a feature rather than a constraint. It made me increasingly excited for *The Lake House* (2024).

    <u>Remedy enjoying themselves is, it turns out, infectious.</u> Night Springs will not change anyone's understanding of the Remedy universe, but it confirms that the studio can operate in registers beyond the portentous and the terrifying. Three hours of joy from a studio that specialises in dread.

- title: "Rise of the Ronin"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2024
  eval: "liked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/rise_of_the_ronin.jpg"
  posted: "2024-06-17"
  text: |
    I love ***Rise of the Ronin*** deeply, and I will not pretend otherwise. Team Ninja produced the worst pathfinding system I have ever seen; the Blue Demon's moveset designer should probably have been let go; it drops frames the moment anything catches fire; and Team Ninja has yet to match *Nioh 2* (2020)'s highs.

    And yet. The Bakumatsu setting is vividly realised, the character relationships carry real weight, and the combat, when it works, still carries that unmistakable Team Ninja precision. <u>A deeply flawed game that I loved unreservedly, which is perhaps the most confusing critical position one can occupy.</u>

- title: "Detroit: Become Human"
  type: "game"
  creator: "Quantic Dream"
  creator_role: "by"
  year: 2018
  eval: "disliked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/detroit.jpg"
  posted: "2024-04-30"
  text: |
    The story is terrible; the Markus line in particular makes no sense. <u>***Detroit: Become Human*** is Quantic Dream's most technically accomplished game and its most intellectually bankrupt: a narrative about android liberation that manages to be simultaneously heavy-handed and incoherent, borrowing the iconography of the civil rights movement without any of the political understanding that would make such borrowing meaningful.</u>

    Incomprehensibly bad. The technology exists to impress; the writing exists to disappoint.

- title: "Sifu"
  type: "game"
  creator: "Sloclap"
  creator_role: "by"
  year: 2022
  eval: "meh..."
  genre: "action"
  image: "/assets/images/thoughts/games/sifu.jpg"
  posted: "2024-04-11"
  text: |
    There is a severe contradiction at the heart of ***Sifu*** between character progression and actual player growth, meaning most time is wasted replaying stages. <u>The ageing mechanic is conceptually brilliant: die young, learn faster; die old, die permanently.</u> But the execution creates a strange tension between roguelike structure and pattern-learning gameplay: enemy positions and moves do not change, so each run is less a new challenge than a repetition of a known one with higher stakes.

    How does one make the player feel stronger? <u>*Sekiro* (2019) solved this by eliminating the RPG layer entirely: growth is embedded in the player's skill, not in the character's stats, so the fixed encounters become a virtue rather than a contradiction.</u> Sifu reaches toward this and cannot quite grasp it.

- title: "Not for Broadcast"
  type: "game"
  creator: "NotGames"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "simulation"
  image: "/assets/images/thoughts/games/not_for_broadcast.jpg"
  posted: "2024-03-29"
  text: |
    Excellent story, but the execution has real problems. <u>***Not for Broadcast***'s interference-tuning scenes are almost always irritating: an important narrative beat is playing out on screen while one is simultaneously asked to focus on an interference pattern, splitting attention in a way that undermines both the gameplay and the story.</u> Several small mechanics exist that, if removed, would make the whole thing more interesting and more immersive.

    A missed opportunity: the premise is strong, the writing is sharp, and the central conceit of running a news broadcast during a political crisis produces moral discomfort. But NotGames seem unable to decide whether they are making a narrative game or a dexterity game, and the result is a hybrid that does neither as well as it should.

- title: "Disco Elysium"
  type: "game"
  creator: "ZA/UM"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/disco_elysium.jpg"
  posted: "2024-02-25"
  text: |
    ZA/UM built a game in which every conversation is a philosophical arena, every skill check a window into ideology made flesh, and the city of Revachol a monument to failed revolution. The detective's fractured psyche is not a character quirk but a structural argument: consciousness under capitalism is necessarily fragmented, pulled between competing material interests that present themselves as internal voices. Volition, Authority, Inland Empire, Electrochemistry—each skill is a reified social force, and the player's stat allocation determines which ideological currents dominate. This is not psychology; it is historical materialism rendered as game mechanics.

    The brilliance lies in how ZA/UM refuses recuperation. The game presents four political alignments—communism, fascism, ultraliberalism, moralism—and systematically demonstrates why three are dead ends and the fourth is the walking corpse of social democracy. Moralism is revealed as the ideology of international capital, enforcing austerity through the Coalition's gunboats. Fascism is shown as the psychic death drive of petit-bourgeois resentment. Ultraliberalism is exposed as capital's own sales pitch, exploitation rebranded as opportunity. And communism? Communism killed him, Inland Empire says, examining the hanged man. The revolution failed. The Commune of '02 was crushed. The marks are carved into every stone of Martinaise, and we still believe because belief is all that remains when material victory is foreclosed.

    The game's formal structure mirrors its ideological content: no combat system because violence under capitalism is not heroic but administrative; no XP from killing because the detective is not accumulating power but reconstructing a shattered worldview; no win state because there is no escape from Revachol, only the choice of how to inhabit its ruins. Sophisticated players recognize that the murder mystery is a MacGuffin. The real investigation is into how one continues after the revolution has already lost.

- title: "Resident Evil 4 Remake"
  type: "game"
  creator: "Capcom"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "survival horror"
  image: "/assets/images/thoughts/games/resident_evil_4_remake.jpg"
  posted: "2023-12-09"
  text: |
    The original was a turning point for the Resident Evil series, and its influence is visible in most survival horror games that followed: camera and colour directing player attention, deliberate use of gore to build atmosphere. ***Resident Evil 4*** set too many industry standards to count. The remake ditches the original's tank controls and makes RE4 feel like a proper action-shooter, combat system and direction working in seamless harmony: every encounter is legible, every set piece calibrated, every escalation earned.

    Capcom demonstrated that a remake can be more than restoration—it can be reinterpretation, taking a game that defined its era and proving it could define another. The village siege, the castle's vertical architecture, the island's industrial horror: each section maintains the original's pacing while rebuilding the mechanical language from scratch.

- title: "Starfield"
  type: "game"
  creator: "Bethesda Game Studios"
  creator_role: "by"
  year: 2023
  eval: "disliked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/starfield.jpg"
  posted: "2023-12-08"
  text: |
    Hilarious. Honestly worse than *Atomic Heart* (2023). ***Starfield*** gets absurd right at the start: they just hand one a ship? <u>The fundamental promise of space exploration, the slow accumulation of resources and knowledge and wonder, is undercut in the first hour by a generosity so undiscriminating that it strips all progression of meaning.</u> Bethesda seem not to understand that the player's relationship to a world is built through resistance, through the friction of earning one's place.

    Todd Howard clearly still does not understand why *Skyrim* (2011) and *Morrowind* (2002) succeeded, and rightly went home without an award. <u>One cannot make games like this and expect the audience not to notice.</u>

- title: "Alan Wake 2"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2023
  eval: "loved"
  pin: true
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/alan_wake_2.jpg"
  posted: "2023-11-14"
  text: |
    Spent twenty-odd hours in a state of dread and fear, completely immersed. 'Time means nothing here.' 'I'll keep showing you the light you need to see.' 'Alan, I think we are getting close.' 'It's not a loop. It's a spiral.' ***Alan Wake 2*** is Remedy's masterpiece: a game that takes everything the studio learned across two decades, every experiment with narrative structure, every risk with format and medium, and synthesises it into something that feels definitive. <u>The Dark Place is not a location but a condition: a space where narrative and reality are identical, where writing something does not represent the world but constitutes it.</u> The philosophical lineage runs through Borges into what might be called credulous metafiction: unlike postmodern irony, which uses self-awareness to produce detachment, Alan Wake 2's characters know they are inside a story and treat that knowledge with faith rather than cynicism. Alan's manuscripts do not describe events; they cause them. The horror is that the author has no more freedom than his characters.

    The dual-protagonist structure is the game's deepest formal achievement. Saga Anderson's Mind Place, an FBI case board of evidence, photographs, logical deduction, represents empirical rationalism: the world is discovered through procedure. Alan's story-rewriting represents the opposite, an idealist metaphysics in which the structure of the narrative determines the structure of the world. Neither is sufficient alone. And Alan is trapped. Mr. Scratch, his dark double, is not merely a doppelganger but the Dark Presence wearing Alan's face, occupying his life in the real world during the thirteen-year disappearance until the imposture becomes the public's only version of Alan; he has convinced Alan that he can only operate within the conventions of the horror genre, that the rules of horror are the rules of existence. The thirteen-year gap between the first *Alan Wake* (2010) and this sequel mirrors the imprisonment exactly: Remedy, too, spent over a decade circling back to a story they could not finish. This is where a Fisherian reading gains traction: not capitalist realism directly, but the structural parallel is precise. <u>Fisher defined capitalist realism as the inability to imagine alternatives to the present system; Alan's imprisonment is genre realism, the inability to imagine a story outside horror's logic.</u> The slow cancellation of the future becomes the slow cancellation of narrative possibility. The deeper Alan writes himself into the Dark Place, the less agency he retains.

    The 'We Sing' chapter, a twenty-minute rock opera staged as a late-night variety show, is where everything converges. The Old Gods of Asgard recite Alan's entire history in ballad-metal form while he physically fights through the set; combat and song fused, stage pyrotechnics and enemy wave intensity synchronised to the song's dynamics, the characters literally singing reality into a different shape, which is exactly what the Dark Place permits. Music as incantation. After the Ashtray Maze in *Control* (2019), I thought I would not be this stunned again for a long time; and then this. The manuscript pages the player collects predict events that then occur, but each cycle through the Dark Place modifies the pattern slightly. The spiral metaphor rejects pure determinism: repetition is not stasis but incremental transformation, each pass through trauma carrying the possibility of revision. The live-action sequences featuring Sam Lake as Alex Casey, the TV show Night Springs nested inside the game, the Final Draft mode that adds new manuscript pages on replay: Remedy have constructed a game in which every layer of fiction is also a layer of reality, and the player's own act of replaying becomes a narrative event, another turn of the spiral.

    My game of the year. Ahead of *Baldur's Gate 3* (2023) and *Lies of P* (2023).

- title: "Pentiment"
  type: "game"
  creator: "Obsidian Entertainment"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/pentiment.jpg"
  posted: "2023-11-04"
  text: |
    In Act I, Brother Piero tells Andreas that art is our path to the truth. ***Pentiment*** is Obsidian's finest work: a game that proves the studio's strengths were never in combat systems or inventory management but in writing, in the careful construction of a world dense enough to reward obsessive attention. The abbey, the town, the murals, the Roman ruins beneath: each layer of history visible through the layers above, each generation's mark partially erasing the one before.

    In a certain sense, twenty-five years later, Magdalene finally fulfilled Piero's original wish. <u>By the Christmas carol at the ending I was almost in tears: thinking of Andreas's son's death, of borrowing books from the nuns in the Scriptorium, of the layered history of the murals and the Roman ruins beneath.</u> Fifteen hours of game, containing an entire world.

- title: "Florence"
  type: "game"
  creator: "Mountains"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/florence.jpg"
  posted: "2023-10-26"
  text: |
    Mountains Studio built ***Florence*** around a simple formal constraint: every interaction must function as both gameplay and emotional communication, with no separation between the two. The conversation mechanics demonstrate this most clearly. Early conversations with Krish are represented as jigsaw puzzles with many pieces that take time to fit together—the mechanical difficulty of assembling the speech bubbles mirrors the cognitive effort of early attraction, when every word is considered. As the relationship deepens, the puzzles simplify to fewer, larger pieces that snap together instantly, the mechanic itself expressing comfort and familiarity. When the relationship fractures, the pieces multiply again, but now they feel laborious rather than exciting, the same mechanical difficulty carrying opposite emotional weight.

    The moving-in sequence translates cohabitation into spatial negotiation. The player drags Florence's belongings into Krish's apartment, physically making room, deciding what stays and what goes. The mechanic is literal—objects occupy space, space is finite—but the act of playing it produces the emotional experience of compromise and integration. The painting scenes work similarly: tapping to add brushstrokes, the rhythm of creation, then later the absence of that rhythm when creative energy drains from the relationship.

    The breakup reverses the moving-in sequence. The player drags belongings back out, the apartment emptying, the mechanical act of separation producing the emotional experience of loss. What made the earlier sequence feel like building now feels like dismantling, the same mechanic recontextualized by narrative progression. Thirty minutes, start to finish. The brevity is structural—the game covers the full arc of a relationship by compressing each phase to its essential mechanical expression.

- title: "Ghost Trick: Phantom Detective"
  type: "game"
  creator: "Capcom"
  creator_role: "by"
  year: 2010
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/ghost_trick.jpg"
  posted: "2023-10-26"
  text: |
    The philosophical discussion around death involving Yomiel, Lynne, and Jowd is brilliant. <u>***Ghost Trick: Phantom Detective***'s central idea, that a meteorite brought dualism to Earth, is inspired: a plot device that is simultaneously absurd and internally rigorous, sustaining the entire narrative's logic while leaving room for surprise.</u> The final hour packs in more plot than most games manage in thirty: setup seamless, watertight, every question answered, every curiosity rewarded.

    <u>Capcom at their best: a studio that understands narrative architecture as a kind of engineering, where every beam must bear weight and every joint must hold.</u> Ghost Trick is a machine with no wasted parts.

- title: "Ori and the Will of the Wisps"
  type: "game"
  creator: "Moon Studios"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/ori_and_the_will_of_the_wisps.jpg"
  posted: "2023-10-23"
  text: |
    ***Ori and the Will of the Wisps*** remains the finest fusion of metroidvania and platforming, surpassing even *Hollow Knight* (2017) in art direction and movement design. Moon Studios took everything that made *Ori and the Blind Forest* (2015) extraordinary and expanded it without dilution: the movement is more fluid, the world larger and more varied, and the boss encounters, a consistent weakness in the original, are here redesigned as cinematic set pieces that serve both the mechanical and narrative arcs.

    The final boss fight demonstrates this convergence: narrative, art, and mechanics work together not as a climax but as a resolution, the mechanical difficulty expressing emotional closure rather than simply testing skill. The escape sequence that follows maintains this integration—the collapsing environment, the musical crescendo, the platforming challenge all functioning as a single expressive gesture.

- title: "Lies of P"
  type: "game"
  creator: "Round8 Studio"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/lies_of_p.jpg"
  posted: "2023-10-11"
  text: |
    ***Lies of P*** is the best soulslike outside FromSoftware's own catalogue. Call it collage, call it stitched-together; it is stitched beautifully. The combat system borrows Dark Souls' stamina management and Sekiro's perfect guard timing, then adds a weapon assembly system that lets players combine blade and handle independently—creating hybrid movesets that feel distinct rather than derivative. The boss fights demonstrate this synthesis: each encounter demands pattern recognition and timing precision, but the Fable Arts system (special moves tied to weapon handles) introduces tactical variety that pure Souls combat lacks.

    Round8 understood that a soulslike's quality is measured not by originality but by coherence. The environmental storytelling follows FromSoftware's method—item descriptions, enemy placement, architectural decay all contributing to narrative—but the Belle Époque setting and Pinocchio framework make the borrowed structure feel purposeful rather than imitative. The lying mechanic, where player choices affect P's humanity and the world's response, integrates the narrative theme into the mechanical loop in a way FromSoftware rarely attempts.

- title: "Star Wars Jedi: Survivor"
  type: "game"
  creator: "Respawn Entertainment"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/star_wars_jedi_survivor.jpg"
  posted: "2023-09-21"
  text: |
    Did not expect so many innovations on top of the first game. ***Star Wars Jedi: Survivor***'s 3D traversal is excellent, striking a balance between metroidvania and soulslike that is unprecedented: the vertical movement, the shortcut architecture, the way each planet's map reveals its full shape only after hours of exploration. Planet design and atmosphere, aside from Jedha, holds consistently high across the board; the map is more complex but less confusing than the predecessor's.

    Respawn understood that the original *Fallen Order* (2019) was a proof of concept, not a finished vision, and they treated the sequel accordingly: every system has been rethought, every rough edge smoothed, every good idea given room to develop. A game-of-the-year contender.

- title: "Remnant II"
  type: "game"
  creator: "Gunfire Games"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  genre: "action RPG"
  image: "/assets/images/thoughts/games/remnant_ii.jpg"
  posted: "2023-08-24"
  text: |
    Deeply disappointing. Expected real solo and online play; ten hours in, I fully understand what 'shooting yourself in the foot' means. ***Remnant II***'s procedurally generated maps reduce the pleasure of exploration to a lottery; mob-packing makes solo play nearly impossible past the first zone; the supposedly celebrated puzzles are also unconvincing, with clues unclear and mechanics opaque, completely unlike the triple-A puzzle design they seem to be imitating.

    <u>The promised visual upgrade is modest; environment destruction is poorly implemented.</u> Only certain bosses and the gunplay feel worth praising. The old line: play with friends and even *Gollum* (2023) is a good time. This kind of shortcut-taking approach is not the right path.

- title: "OXENFREE II: Lost Signals"
  type: "game"
  creator: "Night School Studio"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/oxenfree_ii.jpg"
  posted: "2023-08-12"
  text: |
    A thorough disappointment. The first game's only real flaw, the walking simulator pacing, is not only unaddressed but made worse, making the already slow pace almost unbearable: a one-hour story stretched across five or six. <u>***OXENFREE II: Lost Signals*** is the sequel that confirms the worst suspicion about the original: that the magic was not a method but a lucky break.</u>

    *OXENFREE* (2016) was apparently just a fortunate accident. OXENFREE II is the evidence.

- title: "The Talos Principle"
  type: "game"
  creator: "Croteam"
  creator_role: "by"
  year: 2014
  eval: "meh..."
  genre: "puzzle"
  image: "/assets/images/thoughts/games/talos_principle.jpg"
  posted: "2023-07-12"
  text: |
    Pseudo-philosophy without rigorous logical architecture, which struggles to support a puzzle game with simple mechanics and linear structure. ***The Talos Principle***'s philosophical framing, all those portentous questions about consciousness and free will, would carry more weight if the puzzles themselves demanded the kind of cognitive flexibility the themes invoke. They do not. The game reaches for Descartes and Turing and the Ship of Theseus, but the puzzles reduce to familiar spatial logic: redirecting lasers, stacking boxes, timing fans. <u>There is a fundamental disconnect between what the game asks one to think about and what it asks one to do, and that disconnect hollows out both halves.</u>

    *The Witness* (2016) solved this problem by making its puzzles embody its philosophy: the island's mysteries are inseparable from the act of perception, so that solving them and understanding the game's ideas are the same activity. *Portal* (2007) solved it differently, by making the puzzles the philosophy, the comedy, and the narrative in one gesture. The Talos Principle, by contrast, separates its ideas from its mechanics so thoroughly that one can skip every terminal entry and lose nothing of the puzzle experience. The computer terminals are well-written as standalone philosophical dialogues; Milton is an interesting interlocutor. <u>But a game whose deepest thinking happens in text boxes rather than in play has misidentified its own medium.</u> If the level design here qualifies as 'textbook', *The Witness* (2016) would need to be deified.

- title: "Katana ZERO"
  type: "game"
  creator: "Askiisoft"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "action platformer"
  image: "/assets/images/thoughts/games/katana_zero.jpg"
  posted: "2023-07-10"
  text: |
    One of the most precisely built games I have played. In just four hours, ***Katana ZERO*** transmits the entire worldbuilding of a post-war alternate setting to the player. The Behemoth plushie under the sofa bed, the herbal tea every night before sleep, the cassette player opened before each mission, the glitch simulating Chronos's effect: using the format of the game itself to show a memory-erased soldier's past, present, and future.

    <u>Askiisoft understood that brevity is not a concession but a weapon: every scene in Katana ZERO carries the density it does because nothing is wasted.</u> The combat's instant-death mechanic is not mere difficulty; it is a narrative device, each failed attempt a timeline that did not happen, each success the canonical version. Form and content are inseparable. Four hours that leave a mark deeper than most forty-hour games manage.

- title: "The Legend of Zelda: Tears of the Kingdom"
  type: "game"
  creator: "Nintendo EPD"
  creator_role: "by"
  year: 2023
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/legend_of_zelda.jpg"
  posted: "2023-07-03"
  text: |
    By inheriting *Breath of the Wild* (2017)'s physics engine, ***The Legend of Zelda: Tears of the Kingdom*** achieves the same astonishing emergence as its predecessor: equip a burning ruby sword and one can traverse snowfields without cold-resistance armour; attach a bomb flower to an arrow and one can skip a shrine's intended puzzle entirely. But in TotK, that engine finds its true purpose. Ultrahand and Fuse together unlock a degree of world interactivity that the original was reaching toward without quite grasping: players can construct nearly infinite configurations, and the developers could not possibly have anticipated every solution. <u>It is as though BotW's physics engine was built for Ultrahand and Fuse all along, and the developers simply needed six years to realise it.</u>

    The reuse of Hyrule's map, predicted before launch as the game's greatest liability, becomes instead a source of unexpected resonance. Seeing Tarrey Town in the post-Upheaval world, seeing ancient ring-shaped ruins surrounding Kakariko Village, seeing Hyrule Castle risen and the chasm beneath it: one feels the weight of the near-decade that has passed. The underground and sky islands are layered onto the original geography with structural rigour: every Lightroot corresponds to a surface shrine, grounding the new spaces in the old. The underground appears barren at first, gloom-choked and hostile to traversal on foot, but building a hoverbike with Ultrahand and soaring through its dark sky transforms desolation into discovery. The Korok Forest redesign exemplifies this philosophy: where BotW used an invisible maze, TotK rewards players who understand the correspondence between underground and surface, who think to use Ascend from below. The developers are not merely adding content; they are teaching the player to read the world's geology.

    The main story is richer and more tightly paced than its predecessor. The ancient temples, Zelda's past slowly unveiled, Dragon's Tears scattered as geoglyphs across the landscape: all of it builds toward a Ganon encounter that would hold its own in a soulslike. Quality-of-life complaints from BotW persist: the cooking cutscenes, the shrine completion animations, the relative thinness of sky island content. But these are surface blemishes on a structural achievement. <u>*Elden Ring* (2022) edges it in world construction, art design, and combat; *Baldur's Gate 3* (2023) edges it in reactivity and text. But I do not think any game lets one feel as small within a world while simultaneously feeling as free.</u> Both BotW and Tears of the Kingdom changed game design: the first dismantled the open-world formula; the second rebuilt it with tools that make the player an architect rather than a tourist.

- title: "Divinity: Original Sin II"
  type: "game"
  creator: "Larian Studios"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/divinity.jpg"
  posted: "2023-06-22"
  text: |
    ***Divinity: Original Sin II***'s reactivity is exceptional: across the main quest, nearly every major choice produces visible, long-term consequences, and even across multiple playthroughs new plot threads continue to surface. <u>The world-building, the textual breadth and depth, the scene design: a world this vast and still this detailed is rare even in current triple-A.</u>

    The one disappointment is that the reactivity does not extend everywhere: many non-quest world scenes have quite low responsiveness. But none of that stops DOS2 being one of the greatest CRPGs. <u>It broke new ground in world-building, player agency, and environmental interactivity.</u> The standard against which *Baldur's Gate 3* (2023) would later be measured.

- title: "NieR:Automata"
  type: "game"
  creator: "PlatinumGames"
  creator_role: "by"
  year: 2017
  eval: "disliked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/nier_automata.jpg"
  posted: "2023-04-05"
  text: |
    The irony: a game that constantly talks about machines acquiring humanity manages to objectify women more visibly than almost anything else out there. The theme is humanisation; the execution is the sexualisation of robots. ***NieR:Automata***'s much-discussed 'genre transgression', stitching together a pile of genres, does not constitute genuine formal innovation without clear intent. Would that make Daniel Mullins a god? The repetitive multi-playthrough structure just fragments an already thin, shallow plot across multiple endings.

    <u>The central story that most needs telling is left untold; the sexualisation and innuendo most worth avoiding are in full swing.</u> The music is good, the only redeeming element. Anyone who tells me they love NieR:Automata is, in my eyes, in the same category as someone who tells me they love *Lolita* (1955).

- title: "Night in the Woods"
  type: "game"
  creator: "Infinite Fall"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/night_in_the_woods.jpg"
  posted: "2023-03-31"
  text: |
    When the snow falls on the small town, we will still be in the rehearsal room, trying to play another song I have never heard. I will still chat with Mom at the breakfast table and sit with Dad watching *Garbo & Malloy* in the evening; Malloy looks a bit like Beatrice, a pale blue crocodile, and Garbo looks a bit like Angus. When it is all about to end, we will still be eating pizza in Gregg and Angus's living room. Beatrice will call me Mae Mayday; I will call Beatrice Bea. When it is all about to end, we will still be running around the town, hunting ghosts on the hillside, performing at the Halloween fair. When it is all about to end, I will still go up to the roof with Mr Chazokov to look at the morning star, listen to stories about constellations, imagine this town's ancient legends. When it is all about to end, I will still wake from nightmares with the cat god's voice lingering. <u>***Night in the Woods*** is a game about the end of everything: of youth, of industry, of a way of life, of the town that sustained it.</u> Possum Springs is dying the way all small towns die, not with a catastrophe but with a slow leak of purpose, and Mae's return from college is less a homecoming than a confrontation with the fact that the home she remembers no longer exists.

    Mae dropped out of college because she stopped seeing things as things. She perceived the world as shapes: flat, abstract, geometric, drained of meaning. The game never names this clinically but the portrayal is precise; it is depersonalisation, and it is the reason she once attacked a classmate, unable to perceive him as a person. Beneath the surface, the town has its own pathology: a cult in the abandoned mines, older residents who sacrifice outsiders to a presence they believe sustains Possum Springs' fading economy. They are not villains in any cartoonish sense; they are desperate people who decided the future was worth killing for, which is also a description of every extractive industry that ever hollowed out a town like this. Against all of this, band practice. Four friends in a garage, playing songs badly, the rhythm game mechanically simple but narratively essential: the one communal act that still functions when everything else is falling apart.

    The game is inseparable from its context. The studio's dissolution, the tragedy of Alec Holowka's death, the allegations and the grief that followed: all of it now shadows the text, lending Mae's anxiety and Gregg's manic energy and Bea's exhaustion a weight the creators may not have intended but cannot disown. I will still remember Mom's every 'I love you honey' and Dad's every 'I love you kitten'. Angus told me 'Gregg is my corner'; <u>and Bea told me 'You are the closest thing I have to a sister. And I don't want you to die.'</u> When it is all about to end, I will still choose to leave school, come back to this town, and embrace my past, the town's past, everyone's past.

- title: "The Case of the Golden Idol"
  type: "game"
  creator: "Color Gray Games"
  creator_role: "by"
  year: 2022
  eval: "loved"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/case_of_the_golden_idol.jpg"
  posted: "2023-03-29"
  text: |
    Very different from my memory of detective games: though the format carries echoes of *Return of the Obra Dinn* (2018), in terms of immersion it is still a step below, possibly because Obra Dinn's protagonist can physically move through the world, creating a sense of spatial inhabitation that static scenes cannot replicate. ***The Case of the Golden Idol***'s deduction is well-constructed, with some logical leaps in places, but everything is filled in during the final tableau and epilogue.

    <u>Looking back, it is not a 'true' detective game in the deductive-reasoning sense, but the storytelling is first-rate.</u> Color Gray Games understood that the pleasure of detection is not the puzzle itself but the narrative the puzzle reveals, and they designed accordingly. A game that makes the act of knowing feel like the act of reading.

- title: "Wo Long: Fallen Dynasty"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2023
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/wo_long_fallen_dynasty.jpg"
  posted: "2023-03-19"
  text: |
    Since this is Team Ninja, comparison with *Nioh 2* (2020) is inevitable. ***Wo Long: Fallen Dynasty***'s moment-to-moment impact is stronger; the weapon and skill systems are simplified, less ARPG-feeling, but the simplification makes the combat more immediately enjoyable. The game is deliberately brief: lean rather than sprawling, scope traded for precision.

    <u>Two disappointments: the narrative, though Team Ninja has never made a great narrative in anything, and enemy variety.</u> The latter is a general soulslike problem, but compared to *Jedi: Fallen Order* (2019)'s enemy count, Wo Long already does better. The run is brief but precise; one senses Team Ninja saving their deeper ambitions for *Rise of the Ronin* (2024), and Wo Long is honest enough not to pretend otherwise.

- title: "To the Moon"
  type: "game"
  creator: "Freebird Games"
  creator_role: "by"
  year: 2011
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/to_the_moon.jpg"
  posted: "2023-03-06"
  text: |
    Poor script, poor gameplay, forced sci-fi that does not produce anything good. ***To the Moon***'s world looks packed, but one can only interact with three or four things per scene. Joey's appearance makes one wonder if Kan Gao actually read his own script. <u>The emotional manipulation is transparent; the mechanics are vestigial; the result is a game that asks for tears it has not earned.</u>

    The comparison to other narrative games of its era is instructive. *Life Is Strange* (2015) would later demonstrate how to integrate player choice into emotional storytelling so that the feeling arises from agency, not passivity; *What Remains of Edith Finch* (2017) would show how to make walking-simulator mechanics serve narrative rather than simply coexist with it. To the Moon, arriving earlier than both, attempts something simpler: a linear emotional arc delivered through RPG Maker exploration. The ambition is modest and the execution matches. The music, melancholic and beautifully composed, does most of the emotional heavy lifting; strip it away and what remains is a screenplay that would not survive a first-year workshop. <u>The music alone carries a genuine melancholy that the writing cannot match.</u> A game that would have been more honest as a short film.

- title: "OneShot"
  type: "game"
  creator: "Future Cat LLC"
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "adventure"
  image: "/assets/images/thoughts/games/oneshot.jpg"
  posted: "2023-02-26"
  text: |
    After the Daniel Mullins trilogy, one develops a certain immunity to save-file manipulation games. ***OneShot***'s supposed choice between saving the world and saving the cat raises a question the game never earns: is this world built well enough to care about? Are there any plot points that generate real investment? The pixel art is charming, Niko is likeable in an uncomplicated way, and the file-system interactions are cleverly implemented. But cleverness of delivery cannot substitute for depth of content. <u>The meta-framework, the fourth-wall breaks, the desktop notifications: all of it gestures toward profundity without doing the narrative work that would make the profundity felt.</u>

    What makes this particularly frustrating is the proximity to genuine excellence. *Undertale* (2015) used similar fourth-wall techniques but grounded them in a richly characterised world where every NPC carried enough personality to make the player's choices feel consequential. *Pony Island* (2016), released the same year, used less sophisticated file manipulation but built a tighter, more unsettling experience around it. *Inscryption* (2021) would later prove that the meta-game form can sustain real horror and genuine wonder simultaneously. OneShot has the technical vocabulary of these games without their emotional grammar. <u>A total waste of potential: not because the ideas are bad, but because the world they are deployed in is too thin to hold their weight.</u>

- title: "BioShock"
  type: "game"
  creator: "Irrational Games"
  creator_role: "by"
  year: 2007
  eval: "liked"
  genre: "FPS"
  image: "/assets/images/thoughts/games/bioshock.jpg"
  posted: "2022-12-05"
  text: |
    A game with real soul. <u>***BioShock***'s critique of Objectivism does not miss the details that reflect flaws in Marxism: Rapture is a monument to ideological purity of any kind, and the game's atmospheric achievement is in making that monument feel simultaneously awe-inspiring and claustrophobic.</u> The art deco decay, the distant whale song, the political slogans peeling off damp walls: Irrational Games built a world that critiques its own beauty.

    The mechanics have some deeply player-unfriendly moments, the hacking system worst among them. After ten hours, who is counting a few coins? The game still deserves respect.

- title: "It Takes Two"
  type: "game"
  creator: "Hazelight Studios"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "co-op adventure"
  image: "/assets/images/thoughts/games/it_takes_two.jpg"
  posted: "2022-11-26"
  text: |
    Most of the co-op puzzles are wonderfully original. ***It Takes Two***'s greatest achievement is that every chapter introduces a completely new mechanical conceit, explores it thoroughly, and moves on before repetition sets in: the Tree chapter's glue-and-explosive-projectile system, the Time Manipulation sequence, the snow chapter. The glue-weight mechanic in particular is a surprise, the kind of design idea that makes one sit up and pay attention.

    Difficulty is perfectly welcoming: great fun playing with my wife. <u>Hazelight understand that co-op is not a mode but a design philosophy: every puzzle assumes two minds, two perspectives, two sets of hands, and the solutions demand communication.</u> A game that makes playing together feel like the point, not the concession.

- title: "Life Is Strange: True Colors"
  type: "game"
  creator: "Deck Nine"
  creator_role: "by"
  year: 2021
  eval: "disliked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/life_is_strange.jpg"
  posted: "2022-11-15"
  text: |
    Pacing is a serious problem: sleepwalked through the first half on sheer willpower past several crushingly dull 'puzzles'. ***Life Is Strange: True Colors***'s empathy power keeps shifting in definition, reducing the protagonist to a pure plot device. *Life Is Strange* (2015)'s story is not much better, but it actually makes one care about the characters. True Colors' five vivid colours are an empty shell underneath.

    <u>Also: the advertised PS5 adaptive trigger support is functionally no different from no support at all.</u> A game that promises empathy as a mechanic and delivers empathy as a gimmick.

- title: "Ori and the Blind Forest"
  type: "game"
  creator: "Moon Studios"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/ori_and_the_blind_forest.jpg"
  posted: "2022-11-08"
  text: |
    The bash ability alone elevated ***Ori and the Blind Forest*** to legendary status. Every challenge after one gets bash is building toward the final escape sequence from Ginso Tree, where, for those few minutes, Ori's award-winning music and the fluid wall-climb-plus-bash combine into the most adrenaline-fuelled sequence I have ever experienced in a metroidvania, surpassing even *Hollow Knight* (2017)'s White Palace.

    <u>Watching *Ori and the Will of the Wisps* (2020) move toward *Hollow Knight* (2017)'s direction, we may never get platforming this good again.</u> What an adventure. Moon Studios understood that platforming is not a mechanic but a language, and in the Ginso Tree sequence, they achieved fluency.

- title: "Fallout 4"
  type: "game"
  creator: "Bethesda Game Studios"
  creator_role: "by"
  year: 2015
  eval: "disliked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/fallout_4.jpg"
  posted: "2022-11-05"
  text: |
    Dear Shaun: can you really not see that the Institute is using you? <u>***Fallout 4***'s central narrative collapses under the weight of its own inconsistencies.</u> What does the Institute Shaun leads actually need? He talks endlessly of grand altruism, of eliminating the Railroad and Brotherhood for humanity's future, but what threat have they actually posed? Life on the surface is not bad: Diamond City is doing fine. The Institute is running low on power; Vault 114 is full of uncontaminated people right above.

    Smart as Shaun is, why can he not see any of it? Though of course the player-character is no hero either: once I became Director I could have non-violently freed all the synths, but chose violence instead. Maybe the writers just had no basic logic. Is that it, Shaun?

- title: "The Elder Scrolls V: Skyrim - Special Edition"
  type: "game"
  creator: "Bethesda Game Studios"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  genre: "RPG"
  image: "/assets/images/thoughts/games/elder_scrolls_v.jpg"
  posted: "2022-10-26"
  text: |
    This really did not age well. In 2011, naturally the best open-world RPG: there were not many. But in 2022, open worlds have *Elden Ring* (2022), *Red Dead Redemption 2* (2018), and *Breath of the Wild* (2017); RPGs have the whole Fallout series and *The Outer Worlds* (2019). <u>***The Elder Scrolls V: Skyrim***'s mechanics are dated, random quests are lazy, RPG elements are rigid, dialogue reads like it was written by a child, and yet we still get the Special and Anniversary editions.</u>

    This game belongs to the past. Hard to imagine: in the same year *Portal 2* (2011), *Dark Souls* (2011), *Batman: Arkham City* (2011), and *Dead Space 2* (2011) all released. Which of those is not better than Skyrim?

- title: "Control"
  type: "game"
  creator: "Remedy Entertainment"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/control.jpg"
  posted: "2022-10-24"
  text: |
    A surprising experience. However many flaws ***Control*** has, however much the missions feel like fetch quests, however cheesy Jesse's inner monologue, it achieves atmospherically what most other SCP-adjacent, weird-fiction games simply do not. In just ten hours, this cleverly constructed, dark and chaotic building delivers immersion beyond all expectation.

    <u>The Ashtray Maze remains one of the most astonishing game sequences I have encountered.</u> Remedy built the Oldest House as a character rather than a setting, a space whose hostility and strangeness are not obstacles to navigation but invitations to curiosity. Control proved that Remedy's future lay not in linear action but in interconnected, exploratory worlds dense with lore and layered with meaning.

- title: "The Legend of Zelda: Breath of the Wild"
  type: "game"
  creator: "Nintendo EPD"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/legend_of_zelda_2.jpg"
  posted: "2022-10-20"
  text: |
    I thought after *Elden Ring* (2022) I would not have that free, comfortable feeling in a game for a long time, until I picked up the Switch again, opened ***The Legend of Zelda: Breath of the Wild***, and lost myself chasing Korok seeds: climbing mountain after mountain, swimming up waterfall after waterfall, watching a flying dragon leave a glimmer of light through the clouds, encountering a Lynel patrolling the plain with a great axe. I was saved from death by a flame spear on my back in the snowfield; maintained my temperature in the Gerudo Desert with ice harvested from the open plain. Every scene overflowing with freedom.

    <u>However many details I am critical of, watching the sunrise from the snowfield, it all evaporates.</u> Not sure how to accurately express my love for this world and what BotW gives me. Even the small green stamina wheel fills me with inexplicable affection.

- title: "Life Is Strange"
  type: "game"
  creator: "Dontnod Entertainment"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "interactive fiction"
  image: "/assets/images/thoughts/games/life_is_strange_2.jpg"
  posted: "2022-09-29"
  text: |
    The first four episodes' storytelling could hold its own against *The Last of Us* (2013); the final episode's writing and dialogue noticeably drop off, though it adds some quirky puzzles and meta elements. <u>***Life Is Strange*** is one of the better narrative games I have played: Dontnod understood that the power of choice in narrative games is not the choice itself but the feeling of having chosen, and they designed accordingly.</u>

    The voice acting drags everything down: lots of flat delivery, on par with the expressionless character models in immersiveness, falling well short of *The Last of Us* (2013), which is already a PS3-era game. The writing carries what the performances cannot, which is both a compliment and an indictment.

- title: "Doki Doki Literature Club!"
  type: "game"
  creator: "Team Salvato"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  genre: "visual novel"
  image: "/assets/images/thoughts/games/doki_doki_literature_club.jpg"
  posted: "2022-09-27"
  text: |
    Relatively low-grade jumpscares and fairly meaningless file manipulation. <u>***Doki Doki Literature Club!***'s most subversive element is the resistance against the visual novel's robotic conventions: the game knows it is a visual novel, and its horror arises from the friction between that knowledge and the player's expectations.</u> But at its core it is still the illusion of free will; the act of reading the account name to generate jumpscares actually deepens its mechanical quality.

    The horror elements are too crude; more psychological-health discussion would have had more depth. What remains is a clever formal exercise that mistakes cleverness for profundity.

- title: "The Hex"
  type: "game"
  creator: "Daniel Mullins Games"
  creator_role: "by"
  year: 2018
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/hex.jpg"
  posted: "2022-09-26"
  text: |
    My favourite Daniel Mullins game. ***The Hex***'s mixing of different game genres is masterful, the Lazarus segment especially, with its 2D-to-3D puzzle transitions. The final Walk calls to mind *The Beginner's Guide* (2015); I thought the *Fallout* (1997) mini-game appearing in the Walk was The Hex's biggest secret, and then something even more hair-raising followed. The meta is beautifully executed, and the gameplay is a big step up from *Pony Island* (2016).

    <u>Mullins understood that genre-mixing is not a gimmick but a narrative tool: each genre shift in The Hex reveals something about the character inhabiting it, so that the formal play carries emotional weight.</u> When one discovers the 'abeeper' easter egg, one hopes for an ARG like *Inscryption* (2021)'s; sadly not, but the ambition is visible.

- title: "Pony Island"
  type: "game"
  creator: "Daniel Mullins Games"
  creator_role: "by"
  year: 2016
  eval: "liked"
  genre: "puzzle"
  image: "/assets/images/thoughts/games/pony_island.jpg"
  posted: "2022-09-24"
  text: |
    Daniel Mullins' games all have a very similar style. As his first, ***Pony Island***'s puzzle element is more limited, surprisingly more action-leaning: the endless-runner segments, the code-injection puzzles, the boss encounters that corrupt the interface itself. But the game's real achievement is tonal. The premise, a broken arcade machine built by the devil to trap souls, sounds like a student project pitch; Mullins turns it into something disquieting by committing to the bit with absolute seriousness. <u>The devil's Q&A segment is astonishing: a moment where the game's self-awareness crosses from clever into something approaching sublime, where the conversation between player and program achieves a philosophical charge that most 'philosophical' games never reach.</u>

    What Pony Island understands, and what elevates it above its modest production values, is that meta-horror works best when it is also about something besides itself. The devil is not merely a game-design metaphor; he is a portrait of creative narcissism, of the artist who traps an audience in a closed system and demands their attention. The arcade machine's refusal to let one quit, its corrupted menus and false exits, is funny and frightening in equal measure because one recognises the impulse: the designer who cannot bear to be abandoned. *The Hex* (2018) and *Inscryption* (2021) go further, building more elaborate structures from this foundation. <u>But Pony Island established the Mullins template: games that know they are games, and whose horror arises from that knowledge, delivered with a brevity and confidence that most debuts cannot manage.</u>

- title: "Inscryption"
  type: "game"
  creator: "Daniel Mullins Games"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "card game"
  image: "/assets/images/thoughts/games/inscryption.jpg"
  posted: "2022-09-15"
  text: |
    Having read about ***Inscryption***'s ARG and finding the blue disc in the same location, Daniel Mullins truly commits to the meta concept in his own games. The Russian secret unearthed from old_data, Kaycee's life and death and the fates of world powers, all linked to P03's transcendence. Peeling reality layer by layer, encasing the dissected reality inside another reality, slotting all of that into an enormous ARG, then personally intercepting fans who broke the ARG.

    <u>This level of meta, I have barely seen in my whole gaming life.</u> I will always remember the night I accidentally pressed Ctrl+C at the new-game loading screen: like finding a hidden map in *Dark Souls* (2011), astonished and unnerved at the same time. Mullins is not making games about games; he is making games that are games about themselves, and the distinction matters.

- title: "Spiritfarer"
  type: "game"
  creator: "Thunder Lotus Games"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "adventure"
  image: "/assets/images/thoughts/games/spiritfarer.jpg"
  posted: "2022-09-12"
  text: |
    <u>After Gwen left, I never planted coffee beans again: sold them all to the wandering merchant.</u> ***Spiritfarer*** is a game about departure, and Thunder Lotus understood that the weight of departure is measured not by the leaving but by the rituals that precede it. Auntie Summer and Uncle Atul were the same; when they went, there was not much said, and it was hard.

    By the end, only Alice and Gustav stayed clearly in my memory. The later characters become increasingly grating: Bruce and Mickey's goofy entrance music, Jackie's dull care-worker arc. Time moved so slowly. Perhaps Thunder Lotus intended this to make one miss Summer, Gwen, and Atul more. Have not played a slow-paced game like this in a long time, and somehow got completely absorbed.

- title: "The Outer Worlds"
  type: "game"
  creator: "Obsidian Entertainment"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "RPG"
  image: "/assets/images/thoughts/games/outer_worlds.jpg"
  posted: "2022-08-19"
  text: |
    The first three hours are excellent, especially the moral dilemmas on Terra 2. Capitalism's company towns versus libertarian defectors: neither side looks right. People on the street notice one is wearing Marauder gear; Grace and Thomas remember what one has done for them. ***The Outer Worlds*** begins with promise and progressively empties.

    <u>From the moment one steps onto the Groundbreaker, the world hollows out; companion backstories are thin enough that even Parvati and Junlei's romance comes as a surprise.</u> The thin story and unfinished systems reflect Obsidian's helplessness at the time. Still, the CRPG-plus-immersive-sim combat loop is adhesive enough to carry one through: proof that mechanical design can compensate for a failing narrative, up to a point.

- title: "A Plague Tale: Innocence"
  type: "game"
  creator: "Asobo Studio"
  creator_role: "by"
  year: 2019
  eval: "disliked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/plague_tale.jpg"
  posted: "2022-08-08"
  text: |
    Gameplay too monotonous; enemy AI comparatively thin. ***A Plague Tale: Innocence***'s puzzles are decent, but motivation to push forward shrinks as the story progresses, because the story is just too thin. <u>The biggest stealth problem is that immersion barely exists: the protagonist does things that make no sense, like encountering English soldiers carrying lanterns and smashing the lanterns rather than knocking the soldier unconscious and taking one.</u>

    In both immersion and enemy AI, A Plague Tale: Innocence sits at the bottom of its genre. The PS5 adaptive trigger implementation is also abysmal: basic footstep synchronisation is beyond them.

- title: "DEATHLOOP"
  type: "game"
  creator: "Arkane Studios"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  genre: "FPS"
  image: "/assets/images/thoughts/games/deathloop.jpg"
  posted: "2022-08-07"
  text: |
    ***DEATHLOOP*** creates the illusion of a deeply designed, versatile playstyle, but the level design is extremely linear. In the second half, the player is overpowered: aside from Shift and Nexus, there is no incentive to use other slabs. Enemy AI is notoriously weak; 'enemy variety' is non-existent; the story is completely clichéd; the handholding is aggressive.

    <u>Compared to the *Dishonored* (2012) games, Deathloop feels like a pale imitation.</u> It claims INFORMATION IS EVERYTHING ON BLACKREEF, but the actual information given to the player is minimal. If it is gameplay one is after, save the time.

- title: "Cyberpunk 2077"
  type: "game"
  creator: "CD Projekt Red"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "RPG"
  image: "/assets/images/thoughts/games/cyberpunk_2077.jpg"
  posted: "2022-07-29"
  text: |
    It is 2022, patch 1.52, and there are still too many flaws. Background popping is unresolved; vehicles still fall from the sky. But gunplay with the DualSense, vehicle handling, facial detail, the main and side quest quality and immersion: all impressive. <u>***Cyberpunk 2077*** is a game that should not be good yet and is good anyway.</u> After *Horizon: Forbidden West* (2022) and *Ghost of Tsushima* (2020)'s high repetition rates and crushingly dull stories, landing on an open-world RPG with actual writing is completely unexpected.

    <u>CD Projekt Red's Night City achieves something most open worlds do not: it feels populated with intention rather than generated by algorithm.</u> The characters speak as though they have lives outside the quest; the side stories carry emotional weight disproportionate to their length; the main quest, for all the surrounding chaos, tells a story worth telling. That the technical scaffolding still wobbles beneath it all only makes the achievement more improbable.

- title: "Days Gone"
  type: "game"
  creator: "SIE Bend Studio"
  creator_role: "by"
  year: 2019
  eval: "meh..."
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/days_gone.jpg"
  posted: "2022-07-10"
  text: |
    Empty: too empty. Fresh at first, but ten-odd hours in, ***Days Gone*** is still the standard open-world-game formula. <u>The freaker hordes are a technical achievement and occasionally thrilling, a spectacle of emergent chaos that no other open-world game of its generation attempted at this scale, but the world between hordes is hollowed out, the missions repetitive, the characters serviceable but unmemorable.</u>

    The story is the only good part, and it is better than the game's reception suggested. Deacon St. John starts as a generic gruff protagonist but accrues unexpected dimension across the forty-hour runtime; the relationship with Boozer, in particular, achieves a quiet tenderness that the marketing never hinted at. <u>The game earns its emotional beats the slow way, through accumulation rather than spectacle, and the late-game revelations land precisely because one has spent so long in this world's particular brand of loneliness.</u> But the pacing is punishing: the first fifteen hours are a slog of repetitive camp-clearing and fetch quests that will lose most players before the narrative payoff arrives. Comparing this to *The Last of Us* (2013) is insulting to the latter, but Days Gone is not trying to be that; it is trying to be an open-world survival game with a heart, and it half-succeeds.

- title: "SOMA"
  type: "game"
  creator: "Frictional Games"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "horror"
  image: "/assets/images/thoughts/games/soma.jpg"
  posted: "2022-07-09"
  text: |
    'Catherine, are we alive?' ***SOMA***'s question comes down to the body: what is a mind without the substrate that generated it, and does the answer change if the substrate is silicon rather than carbon? Frictional Games built the PATHOS-II facility as an underwater thought experiment, each section posing a variation of the same question until the cumulative weight of the variations produces something closer to philosophy than to horror.

    The final choice is devastating not because it is surprising but because the game has spent five hours making one care about the answer. Whether one copies or does not copy, the question persists. <u>SOMA is a horror game that frightens the player not with monsters but with implications.</u>

- title: "Ghost of Tsushima: Director's Cut"
  type: "game"
  creator: "Sucker Punch Productions"
  creator_role: "by"
  year: 2021
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/ghost_of_tsushima.jpg"
  posted: "2022-06-28"
  text: |
    The optimal way to experience ***Ghost of Tsushima: Director's Cut*** is to ignore every side quest and play the main story straight through: a normal difficulty curve, minimal repetition. Regardless of approach, this sits alongside *Horizon Zero Dawn* (2017) and *Horizon Forbidden West* (2022) in the open-world canon: the visuals are comparatively superior, and everything else, every strength and every flaw, is indistinguishable from the formula.

    The combat introduces stance-switching as a rock-paper-scissors system that brings a welcome variety rare in open-world games. But those who compare the swordplay to *Sekiro* (2019) are dreaming: one can spam the triangle button to heavy-attack-break-guard through nearly every encounter, and enemy diversity is almost non-existent; four basic human types, two beast types, and bosses without any real challenge. In this respect Ghost of Tsushima mirrors Horizon more than it resembles anything FromSoftware has made; both games let one spam heavy attacks to end fights, except Horizon's machines at least have different canisters and elemental weaknesses to learn. The side quests are worse still. Lady Masako's nine-chapter arc builds toward a duel with the protagonist, after which Ghost simply says 'Don't try to kill me again.' <u>The only side story worth praising is the monk Norio's: a fully realised character in a sea of interchangeable quest-givers.</u>

    The visuals, at least, are beyond reproach. Following forty-nine identical foxes to Inari Shrines sounds tedious, and it is, but the scenery along the way never fails: one fox along a seaside cliff at dusk, another through a mountain snowfield. The main story carries the shadow of Kurosawa, though it does little more than rehearse the bushido-versus-modernisation conflict that film and game history have exhausted. <u>The PS5 adaptive trigger support elevates the entire experience. A beautiful open-world game, which is another way of saying an open-world game.</u>

- title: "The Forgotten City"
  type: "game"
  creator: "Modern Storyteller"
  creator_role: "by"
  year: 2021
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/forgotten_city.jpg"
  posted: "2022-06-22"
  text: |
    I know it started as a *Skyrim* (2011) mod, but when ***The Forgotten City*** suddenly became an FPS game after entering the Shrine of Diana, that still caught me off-guard. The story flows beautifully, the puzzle experience is excellent, and several plot twists expressed through the format of the game land with real force. Modern Storyteller took the strongest idea from their mod and built an entire game around it, and the restraint is admirable: no padding, no filler, just a tight time-loop mystery that rewards curiosity and punishes assumption.

    <u>My favourite puzzle game to date.</u> The Golden Rule is a narrative device and a design principle at once; the city is small enough to be fully knowable and complex enough to surprise on every loop.

- title: "Sayonara Wild Hearts"
  type: "game"
  creator: "Simogo"
  creator_role: "by"
  year: 2019
  eval: "disliked"
  genre: "rhythm"
  image: "/assets/images/thoughts/games/sayonara_wild_hearts.jpg"
  posted: "2022-06-19"
  text: |
    Is 'interactive art' too easy a category in games? As a 3D action-rhythm hybrid, ***Sayonara Wild Hearts***'s acceleration decay on the movement is set too high, and the camera never stays in one place for more than two bars, making the first-encounter experience terrible. The music is nothing remarkable; those who enjoy shopping-centre pop-rock will love it.

    Even for fans of that music, the near-total disconnect between the music and the controls makes no sense. <u>A game that fails on its own terms, which is worse than failing on someone else's.</u>

- title: "The Witness"
  type: "game"
  creator: "Thekla Inc."
  creator_role: "by"
  year: 2016
  eval: "meh..."
  genre: "puzzle"
  image: "/assets/images/thoughts/games/witness.jpg"
  posted: "2022-06-17"
  text: |
    Jonathan Blow gave me many a-ha moments again: the stream touchable from the top of the mountain, the apple appearing in the neighbouring garden, the sun as the key to a puzzle, clues woven into the jungle everywhere. <u>***The Witness*** produces wonder when the environment and the puzzles are in dialogue, when solving a panel reveals something about the world rather than merely opening a gate.</u>

    But none of this saves the game from the late-game feeling of 'unfair' and 'gimmicky'. Certain mountain-top puzzles contain zero puzzle-joy. Joseph Anderson's observation comes to mind: many puzzles here feel like Blow is just 'messing with the player'. If the intent is to make the player observe the surrounding world more carefully, why not add more environment-based puzzles that inspire wonder, instead of repeating the same flat panel puzzles hundreds of times?

- title: "What Remains of Edith Finch"
  type: "game"
  creator: "Giant Sparrow"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "adventure"
  image: "/assets/images/thoughts/games/what_remains_of_edith_finch.jpg"
  posted: "2022-06-13"
  text: |
    Might be the limits of my experience, but ***What Remains of Edith Finch*** is the first game that made me feel completely in the protagonist's perspective. Giant Sparrow achieved something that most walking simulators attempt and few accomplish: the shift from 'I am controlling a character' to 'I am this person, in this house, touching these objects'. <u>The most immersive section is clearly Lewis's story: the fish-gutting sequence is one of my favourite game sequences, a masterclass in using interactivity to dramatise the split between labour and imagination.</u>

    <u>Three hours containing thirty hours of experience.</u> Giant Sparrow know exactly how long a story needs to be, and not a moment longer.

- title: "Salt and Sanctuary"
  type: "game"
  creator: "Ska Studios"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/salt_and_sanctuary.jpg"
  posted: "2022-06-12"
  text: |
    Finally figured out why ***Salt and Sanctuary***'s feel is so hair-tearingly bad: collision volumes are not zeroed in 2D mode, combined with soulslike mechanics. <u>A boss attack can move the character half a screen with no player input; one can only dodge through the boss during an attack, presumably because collision volumes are temporarily removed.</u> The bosses themselves are poorly designed; the Kraekan Wyrm is particularly memorable for the wrong reasons.

    The story is decent; some mechanics like branding are interesting. But by soulslike standards, this is a rough, half-formed product.

- title: "TUNIC"
  type: "game"
  creator: "Andrew Shouldice"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/tunic.jpg"
  posted: "2022-06-12"
  text: |
    A beautiful puzzle game that could lose the soulslike component entirely. ***TUNIC***'s collecting, upgrades, and manual-page clues gave me a puzzle-and-play experience that often exceeded most *Zelda* (1986) puzzles: very many a-ha moments. <u>The manual system is clever: on the surface it is fifty scattered pages, but the underlying logic is one puzzle connected to another, with the manual itself functioning as a meta-puzzle that frames the entire experience.</u>

    The one disappointment is the boss design: long health bars, unclear invincibility frames, combined with the 2.5D camera rotation, and most boss fights feel empty. The Heir turns out to be the best-designed one, which is a surprise. Everything except boss fights highly recommended.

- title: "Dark Souls II: Scholar of the First Sin"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2015
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark_souls_ii.jpg"
  posted: "2022-06-03"
  text: |
    Understanding what went wrong with ***Dark Souls II: Scholar of the First Sin*** is not simple. Shibuya Tomohiro and Tanimura Yui inherited a franchise from Miyazaki and attempted genuine innovation within it, and the result is the most contested entry in the Souls catalogue: a game that is simultaneously the series' most ambitious experiment and its most mechanically compromised. Over two hundred hours and three playthroughs, I tried to untangle precisely where the problems lie, and the answer is almost everywhere at once. The estus flask takes over two seconds to use; the healing is visibly sluggish; the ADP stat, which governs roll i-frames, is described in-game as affecting 'agility and all resistances' with not a word about dodging or item speed; movement is locked to eight directions, making Brume Tower's narrow chains an exercise in unfairness; hitboxes are the worst FromSoftware have ever shipped. Sir Alonne's dash-grab can catch a player rolling sideways at maximum ADP with no model contact whatsoever. These are not edge cases; they are the rhythm of the experience. The base game's bosses are largely forgettable: the Smelter Demon in Iron Keep is the only encounter that left an impression across the entire first playthrough, and final boss Nashandra appears so late and with so little narrative preparation that she feels like a hollow shell.

    And yet Shibuya dared things Miyazaki never attempted. The bonfire ascetic system, which lets one selectively push a single area into New Game Plus difficulty without resetting the world, is the most elegant NG+ mechanic in the entire series; Freja appearing early in NG to ambush the player, new item placements, enemy repositioning: no subsequent FromSoftware title has matched the replayability this creates. <u>The DLC crowns are where the game's design ambition fully asserts itself: Fume Knight maximises DS2's slower combat tempo into the best boss in the game, the Sunken King's vertical puzzle design brings a *Zelda* (1986)-like spatial logic to a franchise that rarely attempts it, and Maldron the Assassin is the most characterful NPC invader in the entire series.</u> The world's lost interconnectedness is harder to excuse: the tunnel from Shaded Forest to Drangleic Castle transitions from bright sunshine to pouring rain with no spatial logic, and the pile of rubble blocking a shortcut, requiring one to circle the entire world to pass a door on the other side, reads less as design and more as mockery. Shibuya's death counter in Majula, greeting every new player with a global tally of deaths, reveals a fundamental misunderstanding of what made *Dark Souls* (2011) compelling: it was never the difficulty.

    But DS2's boldness, however clumsily executed, looks increasingly valuable in hindsight. *Elden Ring* (2022)'s New Game Plus offers nothing; *Dark Souls III* (2016)'s innovations are cautious and incremental. <u>In an era when FromSoftware's creative stagnation in NG+ design has become the norm, one misses DS2's willingness to fail interestingly.</u>

- title: "The Last of Us Part II"
  type: "game"
  creator: "Naughty Dog"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/last_of_us_part_ii.jpg"
  posted: "2022-05-19"
  text: |
    Played both parts consecutively, then needed nearly a week to process. ***The Last of Us Part II*** surpasses Part I in gameplay and atmospheric immersion by an almost embarrassing margin: companion AI now draws enemy fire and can be spotted independently, enemies scream fallen comrades' names, the stealth system responds with genuine precision, and the violence carries a visceral weight that makes every encounter feel consequential. The museum sequence between Ellie and Joel, reportedly two years in development, represents Naughty Dog at the peak of their environmental storytelling: the light direction, the space shuttle, the fake pickup, the wild boar are a masterclass in directing player emotion. Joel picking up the guitar at the opening connects directly to his throwaway promise in Part I, 'I might teach you how to play after we get back,' and the quiet domesticity of Jackson carries a tenderness that makes what follows land with full force.

    <u>Guilt saturates Ellie's arc: the wasted final years with Joel, the words never spoken, the flashbacks that intrude into every sequence until one understands that her rage at Abby is inseparable from her rage at herself.</u> Tommy arriving at the farm with a map, trying to guilt Ellie into finishing what he can no longer do himself, is the most quietly devastating manipulation in the game. The Abby sniper sequence is where I genuinely shifted perspective for the first time; the difficulty is punishing, and the revelation of the sniper's identity recontextualises everything. But Abby's section as a whole never achieves the immersion of Ellie's. Owen bringing Abby to the aquarium is an almost structural copy of the museum: bright warmth, then darkness, then reconciliation, the emotional architecture identical. The theatre confrontation between Abby and Ellie is the worst sequence in thirty hours: a near-total failure in plotting, staging, and enemy AI.

    <u>The deepest problem is *ludonarrative dissonance*.</u> The player experiences ten hours of Abby's perspective and may come to understand her; Ellie has no access to that understanding. She knows only that Joel killed Abby's father. To then ask Ellie to forgive, after crossing half of America, after killing hundreds of named enemies, after losing two fingers to Abby's teeth: the game demands a grace from its protagonist that it never gives her the information to arrive at. The player can forgive; Ellie cannot. She has no reason and no motive. Still: a deeply affecting experience whose gems far outweigh its flaws, even if the structural ambition occasionally exceeds the execution.

- title: "The Last of Us: Left Behind"
  type: "game"
  creator: "Naughty Dog"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/last_of_us_left_behind.jpg"
  posted: "2022-05-08"
  text: |
    Did not expect the DLC to be this good. ***The Last of Us: Left Behind***'s timing of the cuts between the two storylines is masterful: the present-tense survival sequences and the flashback sequences comment on each other with a precision that makes both sharper. At the photo booth I had no idea what was coming, so I picked the 'Love' filter to test Riley's reaction. Then came the awkward 'So...' 'So!'

    And I completely understood. Then: the car-window-smashing competition, the water gun fight, the end-of-days disco, and that brief kiss. <u>I will always remember the two options Riley gave: if I had a choice, I would always pick option two.</u> Let us just wait it out. Let us just be all poetic and lose our minds together. Only then did I understand why Ellie was so angry at Joel when they reached Tommy's camp.

- title: "The Last of Us Remastered"
  type: "game"
  creator: "Naughty Dog"
  creator_role: "by"
  year: 2014
  eval: "loved"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/last_of_us_remastered.jpg"
  posted: "2022-05-08"
  text: |
    From Tess to Sam to the final rescue of Ellie: too many tears. ***The Last of Us*** is a narrative game with almost no mechanical innovation, and it does not need any, because what it does with character and pacing and the slow accretion of trust between strangers is sufficient to carry the entire experience. I felt for the first time the fear of fungal spores, felt for the first time the gradual bonding between strangers, felt for the first time the experience of emerging from depression and grief through love.

    The moment with the giraffes: so fragile. Looking toward the distant hospital, not knowing whether to continue. <u>The section where Ellie gives Sam a robot toy, and what happens the next morning: the first time a game made me unable to stop crying.</u> Like Tommy says to Joel: 'Can't say I'd've done different.' After Joel says 'I swear' and the screen cuts to black, through the credits, I could not say a word.

- title: "Horizon Zero Dawn"
  type: "game"
  creator: "Guerrilla Games"
  creator_role: "by"
  year: 2017
  eval: "liked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/horizon_zero_dawn.jpg"
  posted: "2022-05-08"
  text: |
    Played through *Horizon: Forbidden West* (2022) first, so ***Horizon Zero Dawn***'s story had no surprises. Unexpectedly, the visuals were already very strong: character facial detail is lacking, but the scene and machine design detail is presented well. The machine designs remain Guerrilla's most distinctive contribution to the medium: each creature reads as both a plausible piece of technology and a convincing animal, and the combat system built around dismantling their components is inventive, rewarding precision and tactical thinking in a genre that usually settles for brute force.

    Story-wise, Part I is more expansive than Part II, though all of it is flattened by the static dialogue scenes. The central mystery, the unravelling of what happened to civilisation and Aloy's place within it, is one of the strongest narrative hooks in recent open-world games; the revelations in the Faro facility and GAIA Prime carry genuine weight. <u>Having come from Part II, one can relate to Aloy, though one wonders whether new players can feel the urgency of the world disaster through those static conversations.</u> A game whose ambition exceeded its studio's expressive tools at the time; the sequel would close that gap considerably. What Guerrilla understood from the start, and what distinguishes both Horizon games from their open-world peers, is that worldbuilding is not decoration but architecture: <u>the lore is load-bearing, and the game is stronger for it.</u>

- title: "Horizon Forbidden West"
  type: "game"
  creator: "Guerrilla Games"
  creator_role: "by"
  year: 2022
  eval: "liked"
  genre: "action RPG"
  image: "/assets/images/thoughts/games/horizon_forbidden_west.jpg"
  posted: "2022-05-05"
  text: |
    First-class open world, first-class main story, second-class side story. Only regret: Aloy's choices do not alter the story's direction, which takes some of the savour from an otherwise very open world. ***Horizon Forbidden West*** is beautiful: ancient human plans spread across vast land, machines of cultivation becoming harbingers of endings. <u>The warmth Horizon 2 gives is entirely opposite to the loneliness of *Elden Ring* (2022) from the same period: where FromSoftware's world is built on hostility and solitude, Guerrilla's is built on the possibility of community, and the contrast illuminates something about what each studio believes the post-apocalypse is for.</u>

    Aloy is probably one of the most likeable protagonists in any ARPG: brave, resolute, mature, and kind. But the open-world-game-in-a-can problem has not improved at all; the second half is dreadfully dull, the side quests too formulaic, the exploration rewards too predictable. Some of the handholding treats the player as genuinely stupid: Aloy narrating every puzzle solution before one has had a chance to attempt it is a particular frustration. <u>The tension between Guerrilla's exceptional worldbuilding and their adherence to the Ubisoft open-world template remains unresolved: one keeps wishing they would trust their own world enough to let it breathe.</u> Still: in a year dominated by *Elden Ring* (2022), Horizon Forbidden West offered something that game could not: warmth.

- title: "Nioh 2"
  type: "game"
  creator: "Team Ninja"
  creator_role: "by"
  year: 2020
  eval: "liked"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/nioh_2.jpg"
  posted: "2022-04-27"
  text: |
    A lot of assets carried over from the original, but ***Nioh 2*** invested heavily in environmental detail: even side missions in the same map feel fresh. <u>The action system does not need analysis: the most intricate combat design in the soulslike genre.</u> Ki Pulse, stance switching, burst counters, yokai abilities: Team Ninja layered system upon system and somehow produced not complexity but clarity.

    With the positives said, the flaws are equally clear. The box-room design limits replayability, and late-game boss design is poor: last-two-chapter bosses have too much hyper-armour, too little recovery animation, most propped up by sheer health. Gets dull toward the end, same as *Elden Ring* (2022)'s late game. But one does not remember a game like this for its endings; one remembers the first time Ki Pulse clicked, the first time three stance-switches threaded a combo through a yokai's guard. The muscle memory stays.

- title: "Hollow Knight"
  type: "game"
  creator: "Team Cherry"
  creator_role: "by"
  year: 2017
  eval: "loved"
  genre: "metroidvania"
  image: "/assets/images/thoughts/games/hollow_knight.jpg"
  posted: "2022-04-21"
  text: |
    Called a Metroid/Soulsborne hybrid, but ***Hollow Knight*** has a great deal of its own style. Excellent map design lets the player experience the transition from linear to semi-open-world on reaching the City of Tears; the skills are effectively soft-locks, encouraging exploration without demanding strict linear progression. <u>The atmosphere is remarkable: the bug kingdom of Hallownest feels simultaneously whimsical and funereal, a world whose beauty is inseparable from its decay.</u>

    The story is HK's only obvious weak point: in 2D, creating the vast soulsborne sense of world and guiding the player through fragmented storytelling is hard. Given how small Team Cherry is, a game of this scale is already remarkable. Hoping *Silksong* would not be far behind.

- title: "Elden Ring"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2022
  eval: "loved"
  pin: true
  genre: "soulslike"
  image: "/assets/images/thoughts/games/elden_ring.jpg"
  posted: "2022-04-10"
  text: |
    The Erdtree is visible from the first moment one steps into the Lands Between, golden and impossibly vast, and it never stops being visible. It orients everything: geography, theology, the player's trajectory across a world that feels less designed than discovered. ***Elden Ring*** is FromSoftware's most ambitious work, and for its first forty hours, possibly their finest. Limgrave opens into Liurnia's drowned melancholy; Liurnia gives way to the rot-poisoned nightmare of Caelid; beneath all of it, Siofra River's starlit cavern reveals a world under the world, an entire civilisation buried like a footnote. The legacy dungeons, Stormveil, Raya Lucaria, Leyndell, operate at the density of the best levels in *Dark Souls* (2011) while existing inside an open world whose hostility is inseparable from its beauty. <u>The dead dragon Gransax draped across Leyndell's walls, its spear lodged in the city's foundations like a geological fact, is the single most sublime image in any game I have played: an entire civilisation built around the corpse of the thing that nearly destroyed it.</u> Only Bluepoint's *Demon's Souls* (2020) is more visually accomplished overall, but even knowing that, the first sight of Altus Plateau stopped me cold. I had never seen a world this beautiful.

    Three playthroughs, then I put it down. The narrative immersion runs deeper than *Sekiro* (2019) or *Demon's Souls*, not through cutscene but through architecture and absence: one reads the world the way one reads ruins. The loneliness is structural. Where *Dark Souls* offered the illusion of a shared pilgrimage, bonfires carrying the warmth of other travellers' presence, the Lands Between is vast enough to dissolve that comfort entirely. One rides Torrent across an empty plateau and encounters nothing for minutes but wind and hostility. The silence between combat is the game's most distinctive texture; the orchestral eruptions in the boss arenas hit as hard as they do because the open world withholds music almost completely. On my third playthrough, in the ashes of the Roundtable Hold, I found Hewg still sitting at his anvil, memory gone, hammering at a commission he could no longer name for a Tarnished he could no longer remember. <u>I could not go back after that.</u> And yet: watching the community collectively excavate the endings at launch, participating for the first time in that shared archaeology, is a memory I cannot separate from the game itself.

    The late game is where the ambition curdles. Limgrave clearly consumed the greatest share of development; from the Mountaintops of the Giants onward, areas feel emptier, enemy variety thins, the same formulaic catacombs recur with diminishing returns. Boss design falls below all three *Dark Souls* entries, especially in the endgame: combo strings with vanishing punish windows, input-reading that replaces pattern legibility, an Elden Beast that spends more time fleeing across the arena than fighting. One does not defeat the Elden Beast so much as outlast its unwillingness to be present. One of the few games where melee is genuinely easier than magic: a second playthrough as a sorcerer, even with Lusat's Glintstone Staff at full scaling, felt inexplicably underpowered, as though the endgame was balanced around a sword and nothing else. And the New Game Plus offers nothing: no new placements, no remixed encounters, where *Dark Souls II* (2014) understood that NG+ should feel like a second reading revealing what the first pass obscured.

    More overwhelming than *Dark Souls III* (2016). Like completing *Dark Souls* for the first time: the same indescribable loneliness, returned and expanded across a world vast enough to contain it. The standard against which the late game fails is one the game itself set, and that is perhaps the highest compliment one can pay.

- title: "Sekiro: Shadows Die Twice"
  type: "game"
  creator: "FromSoftware"
  creator_role: "by"
  year: 2019
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/sekiro.jpg"
  posted: "2022-03-25"
  text: |
    Lady Butterfly, Genichiro, Isshin, the Guardian Ape, the Headless Ape: five bosses that demand endless attempts, each forcing the player to calm down and observe attack by attack, looking for the opening to counter. <u>***Sekiro: Shadows Die Twice*** is the purest expression of FromSoftware's boss design philosophy: every boss is a teacher, and the lesson is patience.</u>

    The posture system redefines what soulslike combat can be. Aggression is not recklessness but strategy, and the rhythm of deflect-attack-deflect produces a martial fluency no other game in the genre has matched. Where Dark Souls rewards defensive play and Bloodborne rewards calculated aggression, Sekiro demands constant engagement; the posture meter punishes hesitation as much as recklessness, forcing a conversational rhythm between player and boss that feels less like combat and more like a duel.

- title: "Star Wars Jedi: Fallen Order"
  type: "game"
  creator: "Respawn Entertainment"
  creator_role: "by"
  year: 2019
  eval: "liked"
  genre: "action-adventure"
  image: "/assets/images/thoughts/games/star_wars_jedi_fallen_order.jpg"
  posted: "2022-02-20"
  text: |
    <u>Setting aside the very visible borrowing: ***Star Wars Jedi: Fallen Order*** is an obvious composite, combining elements from *Dark Souls* (2011), *Sekiro* (2019), the Tomb Raider reboot, and *Hollow Knight* (2017), each seam quite apparent.</u> Map design is decent but the way the map is presented to the player is terrible; combat is sometimes padded through mob numbers rather than encounter design. The bugs were frequent on release, and puzzles are occasionally arbitrary.

    And yet. The reason to play is not any single mechanic but the totality of the Star Wars fantasy: the hum of the lightsaber, the Force push that sends stormtroopers tumbling, the first time one deflects a blaster bolt back at a scout trooper. Respawn understood that the pleasure of being a Jedi is essentially kinetic, and they built a movement and combat system that, for all its derivative DNA, captures that kinetic joy with real precision. Cal Kestis grows from a generic protagonist into someone worth caring about; Cere's backstory, in particular, carries genuine moral weight. <u>The story is decent, the exploration rewarding when the map cooperates, and the final sequence on Nur, where the game strips away all pretence of safety and reminds one what it means to be hunted, is one of the finest Star Wars moments in any medium since the original trilogy.</u> The ending is hard to accept, perhaps, but only because one has come to care enough to want a different outcome.

- title: "Cuphead"
  type: "game"
  creator: "StudioMDHR"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  genre: "platformer"
  image: "/assets/images/thoughts/games/cuphead.jpg"
  posted: "2022-02-08"
  text: |
    Difficulty is not very high: mostly pattern memorisation; no real worldbuilding either. But ***Cuphead***'s combat is precise: very fast, with a great sense of impact and rhythm. <u>StudioMDHR's hand-drawn animation, modelled on 1930s cartoons, is an achievement on its own terms, every frame carrying more craft than most games manage in their entire runtime.</u>

    The biggest misstep is the SIMPLE and REGULAR modes, with no in-game explanation at all; players only learn very late that SIMPLE mode does not count as completion. In one sentence: the combat is exceptional, but the game systems are poor.

- title: "Dark Souls: Remastered"
  type: "game"
  creator: "FromSoftware / QLOC"
  creator_role: "by"
  year: 2018
  eval: "meh..."
  genre: "soulslike"
  image: "/assets/images/thoughts/games/dark_souls_remastered.jpg"
  posted: "2021-12-22"
  text: |
    From the Undead Parish downward to Darkroot Garden, through the Valley of Drakes into the Depths. Dying endlessly in the Great Hollow, seeing the enormous tree reflected in the Ash Lake. ***Dark Souls: Remastered*** preserves the original's unified world map, that top-to-bottom interconnection that stunned a generation of players a decade ago, its oblique storytelling a barely-burning flame.

    <u>The never-setting sun over Anor Londo, the crossbreed one cannot bring oneself to kill in the Painted World.</u> Playing the first game after knowing the ending gives it an indescribable bleakness. The only pity: FromSoftware's youth shows too clearly, with too many wrong turns in boss design, not improving until the DLC.

- title: "Demon's Souls (Remake)"
  type: "game"
  creator: "Bluepoint Games"
  creator_role: "by"
  year: 2020
  eval: "loved"
  genre: "soulslike"
  image: "/assets/images/thoughts/games/demons_souls_remake.jpg"
  posted: "2021-11-29"
  text: |
    Bluepoint's remake of an ancient game: the soul mechanic anticipates the later *Dark Souls* (2011) series, though World Tendency itself was never replicated; the story feels like a Dark Souls prologue. The only flaw: all the bosses are too easy, the progression trivialised by Stormruler in 4-3. ***Demon's Souls*** is a proof of concept more than a fully realised vision, and playing it now, one feels the seams that FromSoftware would learn to hide.

    The final encounter with the Old One demonstrates what the game achieves despite its rough edges. Standing before the Maiden in Black, watching the deep fog, the scale and atmosphere work together to produce genuine awe. Bluepoint's visual fidelity adds weight to the original's atmosphere without altering its character: a remake that knows its place.

- title: "Papers, Please"
  type: "game"
  creator: "Lucas Pope"
  creator_role: "by"
  year: 2013
  eval: "liked"
  genre: "simulation"
  image: "/assets/images/thoughts/games/papers_please.jpg"
  posted: "2021-03-24"
  text: |
    Although structurally similar to some classic text games, the continuous narrative gives ***Papers, Please*** real room to breathe. <u>Lucas Pope understood that bureaucracy is not merely a setting but a mechanic: the act of checking documents, comparing faces, cross-referencing dates produces a rhythm that is simultaneously tedious and absorbing, and the tension between those two states is the game's entire emotional architecture.</u>

    The only issue: after discovering almost every mechanic around day 30, playability drops sharply, and long stretches with no new story content are not unusual. Love the setting and premise. A game that makes one feel complicit in systems one did not design.

- title: "The Beginner's Guide"
  type: "game"
  creator: "Davey Wreden"
  creator_role: "by"
  year: 2015
  eval: "loved"
  genre: "walking simulator"
  image: "/assets/images/thoughts/games/beginners_guide.jpg"
  posted: "2020-08-05"
  text: |
    Ninety minutes. ***The Beginner's Guide*** asks for ninety minutes and leaves a guilt that does not wash off. Davey Wreden walks the player through seventeen Source-engine levels made by a developer he calls Coda, narrating each one with the confidence of someone who believes proximity confers understanding: here is what Coda meant, here is why Coda stopped creating, here is the arc from prolific experimentation to silence. One trusts him. That trust is the trap. Midway through, one discovers that the lampposts appearing in level after level, presented as Coda's signature motif, were added by Wreden himself. He modified the work he claimed to be merely preserving. He added solutions to puzzles designed to be unsolvable: the prison chapter, where the player scrubs every surface and the door never opens, was Coda's statement about futile labour, and Wreden 'fixed' it because he could not tolerate a game without a way forward. <u>The game does not dramatise the creator-audience relationship so much as perform its failure in real time: by the final level, interpretation has become indistinguishable from invasion.</u>

    That final level is Coda's response. Not a game but a direct address, asking Davey to stop. Stop sharing the work. Stop adding lampposts. Stop turning private sketches into public exhibitions for his own validation. The player, who has been complicit in the narration for ninety minutes, absorbing Wreden's readings, following his framings, finds that complicity reflected back: one was not witnessing a friendship but participating in its violation. The trap is by design; one is meant to believe one thing, then discover one was wrong for believing it. Coda is fictional. The guilt is not.

    <u>The first game that made me cry.</u> Not because it resolves anything; it refuses resolution with a precision that feels structural rather than coy. What it leaves one with is a question that has no clean answer: whether the urge to interpret another person's interior life, to find meaning in their silences and withdrawals, is an act of empathy or an act of theft. As someone who has spent years translating other people's words into other languages, I have never encountered a shorter, more precise articulation of that anxiety. The Beginner's Guide does not ask to be enjoyed; it asks to be felt, and the feeling it produces is not comfort but recognition.
