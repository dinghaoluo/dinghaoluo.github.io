- title: "The Deserters"
  type: "book"
  creator: "Mathias Énard"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/books/deserters.jpg"
  posted: "2026-03-21"
  text: |
    Énard braids a foot soldier's trudge against a mathematician's cartography of historical pattern, both arcs reaching toward a totalising sweep of twentieth-century violence and displacement. The premise is sound; the execution is dutiful. ***The Deserters***, however, reads like a novel designed rather than written, each voice mechanically alternating without ever achieving the friction that would make one forget the architecture and simply follow the prose. One finishes it respecting the ambition but remembering almost nothing.

    Énard relies on the long, unbroken sentence, the prose carrying the weight of history in its refusal to pause. Here it feels more like obligation than discovery; the sentences unspool competently without building the momentum that would justify their length. The critical consensus positions Énard as a successor to the French maximalist tradition, and perhaps his other novels earn that comparison; this one does not. <u>The polyphony is technically accomplished and emotionally inert, a structure in search of its own urgency.</u>

- title: "Is a River Alive?"
  type: "book"
  creator: "Robert Macfarlane"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/books/is_a_river_alive.jpg"
  posted: "2026-03-20"
  text: |
    Does Robert Macfarlane actually care about rivers? The question sounds ungenerous, but ***Is a River Alive?*** earns it. He follows Giuliana, Cosmo, Yuvan and others into three different rivers' stories, which suggests caring. But the rivers are never honoured in their physical form, never allowed to exist on the page as more than rhetorical occasions; the flowing water is named but never felt. <u>The whole thing feels like an extended preamble to an empty thesis.</u> Macfarlane keeps invoking New Zealand's 2017 Whanganui River claim, Ecuador's constitutional provisions, the briefly granted personhood of the Ganges, because there are not many other solid cases, and none of them have meaningfully prevented ecological destruction. The *rights-of-nature* framework is offered with lyrical intensity but without philosophical or legal argument for the proposition that 'a river *is* alive'. Well if that's the case, what is Macfarlane trying to persuade one of?

    The book was called 'hypnotic' and 'urgent' when it came out, which is precisely the kind of language that flatters urgency without interrogating it. The hollowness of the content and the flatness of the characters end up producing a verdict harsher than I intended: <u>a river may be alive, but some people probably are not really alive.</u> Macfarlane writes beautifully, as always. But beauty without substance is decoration, and one expects more from a writer of his intelligence.

- title: "Capitalist Realism: Is There No Alternative?"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2009
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/books/capitalist_realism.jpg"
  posted: "2026-03-18"
  text: |
    Reading the afterword to Mark Fisher's first 'pamphlet', I kept picturing him in that small cabin, sorting through scattered notes on the eve of Occupy Wall Street and the Egyptian revolution, and felt an uncontrollable rush of admiration, and of sadness. There is something peculiarly moving about encountering ***Capitalist Realism*** from the threshold of 2009/2010: before the cracks had fully opened, before anti-capitalism briefly recovered the sense that it might once again speak in the future tense.

    The usual objection is that the book lacks philosophical substance, that it names a mood rather than constructs an argument. Fair enough: Fisher is not doing *Žižek*, and is not trying to. What he is doing, in barely eighty pages in the first edition, is something rarer: <u>handing an entire generation the vocabulary for what it already felt but could not say</u>. The privatisation of stress. The depoliticisation of mental illness. The way ecological catastrophe gets endlessly 'acknowledged' and then quietly metabolised, as though the acknowledgement itself were the solution. These are not arguments in the academic sense; they are acts of naming, and they land with the force of recognition. The orthodox left will note that Fisher never quite identifies capitalism as a social relation rooted in labour exploitation, that the critique floats as phenomenology unmoored from political economy. There is something to this. But Fisher understood that <u>no amount of 'correct' structural analysis matters if nobody can feel the structure pressing on them, and that making it felt is not ancillary to politics but prerequisite</u>. The very success of the phrase 'capitalist realism' proves the point: it entered the lexicon precisely because it named what was already there, inarticulate and suffocating.

    Philosophical arguments aside, Fisher's prose is so compressed and so precise that individual sentences carry the weight of entire chapters elsewhere. That closing line, 'From a situation in which nothing can happen, suddenly anything is possible again', manages to be a political programme and a prayer in the same breath. Knowing now about the unfinished *Acid Communism*, where Fisher was beginning to reframe neoliberalism not as an inevitability but as a counter-revolution against the thinkable, the pamphlet's final pages feel less like a conclusion than a coiled spring. By the end I was close to tears — not because the book solves anything; it does not, and it knows it does not — but because someone found the words.


- title: "Bleeding Edge"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/books/bleeding_edge.jpg"
  posted: "2026-03-11"
  text: |
    My favourite among the Pynchon-lites. *Inherent Vice* (2009) entertained me, *Shadow Ticket* (2025) amused me; ***Bleeding Edge*** stayed with me. In the year when nobody quite knew what to call that attack, when '11 September' and '9/11' were still competing for semantic territory, Pynchon charts the invisible threads linking American internet start-ups, the FBI and Gulf states, threading them through seemingly unrelated characters and producing countless set pieces that feel at once absurd and historically precise. <u>The DeepArcher virtual world reads now as elegy for the internet's lost utopian promise, and the novel's paranoid circuitry, its suspicion that <em>surveillance capitalism</em> was already embedding itself in the architecture of everyday life, has aged into prophecy.</u>

    It is also the most human of the Pynchon-lites, perhaps of all Pynchon (bar *Mason & Dixon* [1997]). Maxine's semi-separation from Horst carries real emotional weight; she reads like a sharper, more distinct Oedipa Maas from *The Crying of Lot 49* (1966), a woman whose investigative compulsion is not a retreat from feeling but a form of it. The domestic texture, Maxine and Horst circling each other while the boys orbit the uncertainty, earns the novel its emotional centre. Critics have called it Pynchon's most 'accessible' novel, which is true enough but misses the point: accessibility here is not a concession but a structural choice. <u>The domesticity is the ground against which the conspiracies register.</u> One walks through Silicon Alley alongside Maxine and feels the grief of a city still in shock, still trying to metabolise what happened, and the prose holds both the noir comedy and the mourning in the same breath. Will PTA adapt *Bleeding Edge*? I hope so. But I suspect only Pynchon's sentences can do this particular thing.

- title: "Gravity's Rainbow"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1973
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/books/gravitys_rainbow.jpg"
  posted: "2026-03-01"
  text: |
    Years from now I will still remember the V2 rocket shards scattered across London, the Kryptosam messages hidden inside them, the four tragedies behind those messages. I will still remember Katje's ancestor Frans massacring the dodos of Mauritius, the early twentieth-century German army massacring the Herero people of Africa, the Nazi army massacring European Jews in the Second World War. I will still remember the diffuse hope drifting through the wood-smoke air of the Zone in 1945, after the war ended. <u>These images persist not because Pynchon labours to make them beautiful, though they are, but because the structure of <b><i>Gravity's Rainbow</i></b> lodges them in one's mind the way the rocket's parabola lodges itself in the sky: an arc that contains both ascent and annihilation, both promise and gravity.</u>

    Inside each V2, a pendulum device integrated acceleration into velocity to calculate Brennschluss, the instant of engine cutoff where ascent surrendered to gravity. Franz Pökler was watching his daughter Ilse grow up in the same calculus: each annual visit to the camp a single data point, each integral converging, for both rocket and girl, on disappearance. <u>That is what this novel does better than any other war novel I have read: it makes the mathematics of destruction and the mathematics of a life rhyme, and the rhyme is unbearable.</u> The Pulitzer board called it 'unreadable' and 'obscene'. Both charges contain a grain of truth: Pynchon demands that one read against the current, and the obscenity is the world's, not his. The Zone is the space where national identities dissolve, where the *Elect* and the *Preterite* shuffle past each other in the rubble, where paranoia and anti-paranoia become indistinguishable. The Elect/Preterite distinction is perhaps Pynchon's most original theological contribution: a Calvinist framework repurposed to describe every system of power, every division between those who ride the rocket and those who are crushed beneath it. The novel's own form enacts this entropy, its narrative fragmenting and dissolving as surely as Slothrop does, until the text itself becomes a kind of Zone. Edward Mendelson called it an 'encyclopedic narrative' in the tradition of Dante and Melville. I would add only that it is also a deeply personal one.

    Pynchon, in unruly but precise language, writes the most anti-mainstream Second World War novel imaginable, and <u>I found myself dissolving alongside Slothrop in the Zone, watching a magnificent rainbow arch after the rain, eyes brimming.</u>

- title: "The City & the City"
  type: "book"
  creator: "China Miéville"
  creator_role: "by"
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/books/the_city_the_city.jpg"
  posted: "2026-01-18"
  text: |
    ***The City & the City*** is called *new weird*, but it is neither new nor weird. The premise, two cities occupying the same physical space, is genuinely interesting; it won the Hugo, the Clarke, the World Fantasy, and the Locus, which tells one more about prize committees than about the novel. Miéville's world-building is surprisingly poor for someone whose Bas-Lag novels thrive on maximalist invention. I kept losing suspension of disbelief in the second half: what happens to a dog from Besžel that wanders into Ul Qoma? Why would objects from one city not constantly end up in the other? <u>The concept of <em>unseeing</em> is philosophically rich, a Foucauldian disciplinary mechanism internalised as perception, but Miéville never interrogates it with the seriousness it deserves.</u>

    The ending is the real disappointment. The final thirty pages collapse a potentially myth-laden story into something half corporate thriller, half political farce. Breach, which should function as the novel's sublime unknowable, gets explained into banality. I should have tried harder to manage my expectations. <u>There is a version of this book that earns its allegorical weight, that makes the seeing and unseeing feel as strange and inevitable as Kafka's castle.</u> This is not that version.

- title: "Slaughterhouse-Five"
  type: "book"
  creator: "Kurt Vonnegut"
  creator_role: "by"
  year: 1969
  eval: "disliked"
  image: "/assets/images/thoughts/books/slaughterhousefive.jpg"
  posted: "2026-01-06"
  text: |
    I understand the book's canonical status, and Vonnegut's formal nerve is real: compressing the Dresden firebombing into a slim, unstuck-in-time fable takes a kind of courage. But ***Slaughterhouse-Five*** did not work for me. <u>The deadpan repetition of 'So it goes' has been called everything from the most effective literary device of the twentieth century to a morally irresponsible trivialisation of mass death.</u> I lean toward the latter. So it goes.

    Billy Pilgrim's passivity, far from being a radical critique of agency, reads to me as authorial abdication: Vonnegut uses time-travel as a *narrative anaesthetic*, numbing both character and reader to the violence rather than forcing confrontation with it. <u>The result is a novel that mistakes detachment for depth, and repetition for profundity.</u> Perhaps one needs to have read it in the shadow of Vietnam, when the deadpan itself felt like dissent. I came to it too late, and the distance shows.

- title: "The Prose Edda"
  type: "book"
  creator: "Snorri Sturluson, (ed.) Jesse L. Byock"
  creator_role: "by"
  year: 1220
  eval: "liked"
  image: "/assets/images/thoughts/books/prose_edda.jpg"
  posted: "2025-12-24"
  text: |
    Compared to the mythologies of other religions and peoples, Norse mythology as Snorri renders it, rooted in Iceland, filtered through a Christian lens and a *euhemeristic* framing device, is more chaotic, looser, but also darker and more direct. Snorri mythologises everything: wind, war, clouds. His gods are virtually indistinguishable from mortals, their temperaments and knowledge systems riddled with contradictions. Scholars like Anthony Faulkes and Ursula Dronke have long debated how much Snorri's systematising impulse reshaped oral traditions that were originally fragmentary and incoherent; <u>what survives, though, feels less like a polished theology and more like a record of divine dysfunction.</u> The gods slaughter the innocent: Þórr casually kicks the dwarf Litr to death on the way to send Baldr's body to Hel. They are morally bankrupt: Óðinn stealing Suttungr's mead with the self-righteousness of a conqueror. They are irrational: actual punishment for Loki only arriving after he has caused untold damage.

    Norse gods are not a better version of humanity in terms of morality, knowledge, or reason. The giants are actually wiser. <u>That is what makes Norse mythology singular among the world's religious narratives: it does not idealise its own pantheon.</u> The Ragnarök passage, frequently cited as one of the most powerful *eschatological* narratives in world literature, gains its force precisely because the gods who fall are already compromised, already petty, already too human. One reads the ***Prose Edda*** not to worship but to recognise.

- title: "Inherent Vice"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/inherent_vice.jpg"
  posted: "2025-12-19"
  text: |
    ***Inherent Vice*** is Pynchon's light novel. It reads far more smoothly than Shadow Ticket, and the jokes and puns suit my taste better, but there is a faint nagging feeling that Pynchon is not great at high-density dialogue. The PTA adaptation exposes this counterintuitively: Pynchon's prose is conversational, he regularly drops subjects mid-sentence, but his dense conversational scenes feel theatrical, and PTA's lines lifted straight from the text carry that same stagey quality. <u>The 'inherent vice' of the title, a legal term for a commodity's tendency to destroy itself, functions as a quiet metaphor for the counterculture's self-destruction at the turn of the seventies, the moment between the Summer of Love and the Manson murders when the dream curdled.</u>

    Still, I love Pynchon's detective stories, love how he reveals the mystery by refusing to resolve it, love his sentences. Doc Sportello is a stoned Philip Marlowe wandering the circuit-board streets of late-sixties Southern California, and if one never quite trusts what he understands, that is the point: epistemological uncertainty as genre principle. Same as Shadow Ticket: it was tremendous fun reading it. And <u>in Pynchon's catalogue, tremendous fun is never just fun.</u>

- title: "Models of the Mind: How Physics, Engineering and Mathematics Have Shaped Our Understanding of the Brain"
  type: "book"
  creator: "Grace Lindsay"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/books/models_of_the_mind.jpg"
  posted: "2025-12-14"
  text: |
    Fitting a proper survey of neuroscience's major models, Perceptron, attractor networks, DCN, Bayesian models, into a relatively slim volume is already an astonishing feat. Add Lindsay's accounts of each model's development history, sketches of key figures, accessible analogies, and clear examples, and ***Models of the Mind*** becomes, in my mind, the only essential introductory text for understanding computational neuroscience. The field has needed a book like this for years: something that sits between overly technical textbooks and the simplifications of popular science, something that respects the mathematics without weaponising it against the uninitiated. Lindsay, a computational neuroscientist herself, writes with the quiet authority of someone who has actually worked with these models, not merely read about them.

    My favourite passages: Lindsay on Hodgkin and Huxley's research before, during, and after the war, the way a world conflict interrupted and then redirected a programme of work that would reshape our understanding of neural signalling. Pavlov quietly in his lab through years of upheaval, the science continuing as the world outside burned. Pitts and McCulloch discussing philosophy and psychology while developing the first computational neurone model, two minds from utterly different backgrounds converging on a formal description of thought itself. <u>Every origin story of these models is a reminder that neuroscience is rooted in philosophy and mathematics.</u> Without both, we would be lost. <u>Lindsay makes one feel this not as a platitude but as a lived intellectual history, and that is rare.</u>

- title: "The Call of Cthulhu and Other Weird Stories"
  type: "book"
  creator: "H.P. Lovecraft, ed. S.T. Joshi"
  creator_role: "by"
  year: 1926
  eval: "liked"
  image: "/assets/images/thoughts/books/call_of_cthulhu.jpg"
  posted: "2025-12-08"
  text: |
    My first Penguin Orange. S. T. Joshi's editing is excellent: starting with *Dagon* (1917) and early stories less embedded in the Lovecraft mythos, building gradually to ***The Call of Cthulhu*** and *The Shadow Over Innsmouth* (1936), the collection maps a trajectory from apprentice weird fiction to the fully realised *cosmicism* of the later tales. The Penguin Classics imprimatur did real work for Lovecraft's literary legitimacy, placing him alongside Poe and Hawthorne in a series that implicitly argues for canonical status. <u>Whether one accepts that argument depends on how much one can metabolise the racism, which is not incidental to the fiction but often structural, woven into the very texture of what Lovecraft finds horrifying.</u>

    Surprisingly, the shorter stories are more gripping and more durable. My favourite passages and scenes are mostly in the shorts: the bleeding roof in *The Picture in the House* (1921), the narrator's despair in *The Outsider* (1926) looking into the mirror, the slow chromatic contamination in *The Colour Out of Space* (1927). Lovecraft's prose is famously purple, his characters flat, but in the compressed form of the short story these weaknesses matter less; the atmosphere does the work that character cannot. Favourites in order: *The Colour Out of Space* (1927), *The Whisperer in Darkness* (1931), *The Picture in the House* (1921), *The Outsider* (1926), *The Rats in the Walls* (1924). <u>One keeps returning to Lovecraft not for the writing, which is often overwrought, but for the feeling: that cold, vertiginous sensation of the human scale dissolving against something vast, indifferent, and very old.</u>

- title: "Solenoid"
  type: "book"
  creator: "Mircea Cărtărescu, trans. Sean Cotter"
  creator_role: "by"
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/books/solenoid.jpg"
  posted: "2025-11-29"
  text: |
    Cărtărescu's Bucharest is a vast living organism. The veins extending from the city centre vibrate with the solenoid's hum, breaking through the gaps in a neighbour's blind wall and the skin between librarian Palamar's thumb and forefinger. His prose is so precise, so sensorily saturated, that after six hundred pages scenes still rise up unbidden: Irina pressing the button by her bed, slowly descending from the ceiling; hundreds of Picketists screaming for help before the city-centre mortuary; the boat-shaped house; the labyrinthine school corridors; the narrator's nightmares pressing down on me too. <u>The failed-poet-turned-schoolteacher who narrates this book is not Cărtărescu, and is entirely Cărtărescu: a consciousness so porous that Bucharest's topography becomes indistinguishable from the topography of thought itself.</u> In a tradition running from Kafka through Borges to Schulz, the city is both literal and impossible, its architecture obeying *dream-logic* while remaining stubbornly, concretely Romanian.

    Between hallucination and dream, between solenoid and belly button, the book asks: what is reality? Is it the navel one can touch, the lice in one's hair? Then what are the other dimensions one cannot see, the ones that might offer answers, an escape plan? Memory is not reality, so what is memory? What lies at the city's edge, reachable by tram 21? Is a god who abandoned us still a god? Does an unreadable text carry meaning? <u>And finally, the question that gives the whole book its gravitational pull: how does one get saved?</u> The usual charge against Cărtărescu is maximalism, excess, a prose so rich it risks toppling into self-indulgence. Fair enough: this is not a novel that respects economy. But the maximalism is structural, not decorative. Every hallucinated image, every recursive nightmare, every obsessively catalogued Bucharest street feeds the same metaphysical engine. The book earns its six hundred pages because each one presses harder on the question of whether reality has an outside.

    What stays with me is the texture: the way Cărtărescu renders consciousness as a space one inhabits rather than a faculty one possesses. The solenoid under the house is not a metaphor. It is the thing itself, the hum beneath the ordinary, the force that warps the floorboards and lifts a woman from her bed. That the Nobel committee finally recognised him feels less like a vindication than a correction. <u>One finishes <b><i>Solenoid</i></b> not with answers but with the physical sensation of having been somewhere, having touched something real that cannot be named.</u> The closest analogue I know is waking from a dream one cannot quite recover, knowing it mattered, knowing it is already dissolving. The Picketists' revolt against death reads as political allegory: a protest movement whose enemy is not a regime but mortality itself, futile and magnificent in equal measure. The Voynich manuscript that threads through the novel is the perfect Cărtărescu object, real yet untranslatable, saturated with meaning that can never be confirmed. And the narrator's failed literary debut, the manuscript rejected by the Romanian establishment, mirrors Cărtărescu's own fraught relationship with a national canon that could never quite contain him.

- title: "Flesh"
  type: "book"
  creator: "David Szalay"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/books/flesh.jpg"
  posted: "2025-11-18"
  text: |
    Cannot accept the sheer number of hollow, empty sentences and scenes. Szalay's method in ***Flesh*** seems to depend entirely on a kind of studied quirkiness: his favourite move is 'say it once, then repeat in the next paragraph'. Quirky novels abound, and Szalay's is the least skilful, least substantial version of the impulse. 'He looks in the fridge. He smokes on the balcony. He watches TV.' <u>The critics have been calling this formally audacious; I call it formally vacant.</u>

    The contrast with Cărtărescu is instructive. Where Cărtărescu's maximalism in *Solenoid* (2015) earns its excess through genuine metaphysical ambition, pressing relentlessly against the limits of what fiction can hold, Szalay's minimalism never opens onto anything harder or stranger. <u>The spareness is not restraint; it is the absence of anything that would require restraint.</u> One finishes the book suspecting that the repetition-as-technique is not a style but a crutch, a way of filling pages without the burden of having something to say.

- title: "V."
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1963
  eval: "loved"
  image: "/assets/images/thoughts/books/v.jpg"
  posted: "2025-11-17"
  text: |
    Thousands of themes buried in Pynchon's Egypt, Virginia, New York, Malta, Paris, and mainland Italy: from modernity's dismantling of the individual (SHROUD and SHOCK, the 'Bad Priest's' progressive replacement of flesh with prosthesis and fetish), to the slave trade and pre-war African dealings (Bondelswarts bodies pressed together), to the shift from analogue to digital signal (the Kilroy figure scrawled across half a century). The dual structure, Profane's purposeless drift against Stencil's paranoid quest, enacts the central tension of *postmodern* existence: between entropy and the desperate imposition of meaning. Stencil reads V. into everything because he must; Profane reads nothing into anything because he cannot. <u>Between these two failures of interpretation, Pynchon builds an entire world.</u>

    But among all these themes, my favourite is Pynchon's yo-yo. Anyone who has ever watched a yo-yo understands Profane drifting aimlessly between first and last stops on the New York subway, understands Maijstral's repeating history, understands the tree-fruit-bird-shit-tree cycle in Slab's Cheese Danish No. 35, and can see the dozens of characters looping, crossing, colliding through this novel: dozens of yo-yos, inextricably tangled in eternal motion, their identities losing all meaning. <u>The yo-yo is Pynchon's most elegant image because it contains everything the novel wants to say about determinism and drift without requiring a single explanatory sentence.</u> What scholars call 'encyclopaedic narrative', what the poststructuralists call *ontological instability*, Pynchon calls a yo-yo.

    The Herero genocide chapters remain among the most devastating things Pynchon has written, and he was twenty-six when he wrote them. The systematic extermination in German South-West Africa, rendered with clinical precision and moral fury, announces the scope of Pynchon's moral vision from the very start. V. herself, progressively replacing her body with clockwork and glass until the children of Malta disassemble her on the street, is the novel's darkest joke: the Enlightenment project literalised as self-destruction. <u>One finishes <b><i>V.</i></b> feeling that Pynchon arrived fully formed, already in possession of every tool he would later refine.</u> The yo-yos are still spinning.

- title: "Maus"
  type: "book"
  creator: "Art Spiegelman"
  creator_role: "by"
  year: 1991
  eval: "loved"
  image: "/assets/images/thoughts/books/maus.jpg"
  posted: "2025-11-06"
  text: |
    Perhaps in the current climate, a book like ***Maus*** matters more than ever. Near the end of Part II, after Nazi persecution, family collapse, the eldest son dead, his wife a suicide, the parents reduced to smoke from a concentration camp furnace, the father, seeing his children give a Black man in New York a lift, says: how could you? Art asks: 'How can you, of all people, be racist!?' The father says: you don't understand, we are not like them. Suffering, apparently, is racially stratified too. This is the scene that detonates the entire book, the moment Spiegelman's metafictional apparatus, his mice and cats and pigs, stops being allegory and becomes accusation. <u>The animal masks slip, and what is underneath is not species but ideology.</u>

    This brings to mind Germany's early twentieth-century massacres in southern Africa, the Herero, the Bondelswarts, which Pynchon writes about in *V.* (1963), and nobody said much about Germany then. <u>So: if one does not speak up when others suffer, why should one's own pain deserve to be seen?</u> Maus asks this question not rhetorically but structurally, through the very form of a comic that refuses the consolations of visual realism. Marianne Hirsch coined the term *postmemory* largely in response to this book: the inherited trauma of children who did not experience the event but cannot escape its gravity. Spiegelman dramatises this in the fraught, frequently ugly interviews with his father, in his guilt over his mother Anja's suicide, in the famous scene where he sits at his drawing board surrounded by a pile of corpses wondering whether he has the right to turn suffering into art. No one who has read Maus forgets it. The Tennessee school board that banned it in 2022 understood its power better than they knew: <u>the book makes complicity visible, and complicity does not enjoy being looked at.</u>

- title: "As She Climbed Across the Table"
  type: "book"
  creator: "Jonathan Lethem"
  creator_role: "by"
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/books/as_she_climbed.jpg"
  posted: "2025-10-31"
  text: |
    Is ***As She Climbed Across the Table*** not one of the most romantic sci-fi novels ever written? Two hundred pages packed with delightful twists: quantum entanglement, the uncertainty principle, and blindsight woven together into a love story about a man losing his girlfriend to a void. Lack, the experimental anomaly that selectively absorbs some objects and rejects others, including the narrator Philip, is the purest metaphor for romantic rejection I have encountered in fiction. <u>One cannot argue with a hole in spacetime. One cannot persuade it to want you back.</u> The Lacanian resonance is obvious, the void that can never be filled, desire structured around absence, but Lethem wears the theory so lightly that it never suffocates the comedy.

    And what comedy. Lethem's prose elevates an already brilliant premise to cult-classic territory: joke after joke, pun after pun, delivered with the deadpan of someone who understands that the funniest things are also the saddest. The entanglement of the cosmos and consciousness, grand love and small love, calls to mind Nolan's *Interstellar* (2014), Fisher's essay on the same, the way physics occasionally stumbles into the territory of feeling and finds it was already there. What makes the novel work, finally, is that Lethem does not take it too seriously. The lightness is earned, not evasive. Philip's heartbreak is real, his jealousy of a particle-physics experiment genuinely absurd and genuinely painful, and <u>the resolution, such as it is, lands with the tenderness of someone who knows that love is mostly a matter of what the universe decides to let through.</u>

- title: "Waiting for Godot"
  type: "book"
  creator: "Samuel Beckett"
  creator_role: "by"
  year: 1953
  eval: "loved"
  image: "/assets/images/thoughts/books/waiting_for_godot.jpg"
  posted: "2025-10-26"
  text: |
    A play that seems to mean nothing and ends up meaning everything. ***Waiting for Godot*** generates a thousand different meanings in readers and audiences. A literal thinking hat that grants the oppressed a useless voice; a tree that signifies nothing but an eternal wait for the known-but-unknown. Nothing happens, twice, and the repetition is the point: Act II mirrors Act I the way one day mirrors the last, the way history under Beckett's gaze is less progress than stutter. <u>The play's genius is structural. It does not argue that life is meaningless; it constructs meaninglessness so precisely that meaning keeps leaking in through the cracks.</u>

    In Beckett's world one sees the traces of oppression and terror: Estragon's beatings, Vladimir's urinary afflictions, the boy or boys whose messages never clarify, Pozzo's rope around Lucky's neck. The Pozzo-Lucky dynamic reads as capitalism in miniature, master and slave bound in mutual degradation, Lucky performing thought on command until the thought itself collapses into a torrent of fragmented academic language, the Western intellectual tradition choking on its own debris. But aside from a few lines from Vladimir, nobody takes it seriously. Nobody revolts. They wait. They fill time with games, with boots, with carrots and turnips. <u>The passivity is the horror, and it is also, somehow, the comedy.</u>

    Is this not a mirror held up to our own society? Beckett, an Irishman writing in French in the aftermath of a war he lived through as a Resistance member, understood that the most accurate depiction of the human condition is not tragedy but the inability to decide whether one is living a tragedy at all. The tree sprouts leaves between acts, and nothing changes. Vladimir and Estragon consider hanging themselves and conclude that the bough might not hold. One finishes the play, or watches it end, with the sensation that Beckett has described something one already knew but could not say: the paralysis is not imposed from without. <u>It is the waiting itself, the belief that Godot will come, that keeps one rooted to the spot.</u>

- title: "The Secret History"
  type: "book"
  creator: "Donna Tartt"
  creator_role: "by"
  year: 1992
  eval: "meh..."
  image: "/assets/images/thoughts/books/secret_history.jpg"
  posted: "2025-10-25"
  text: |
    My first Donna Tartt. The prose is as advertised: flowing, propulsive, writing psychological thriller in a register that feels like postmodern literature. Reading the first few chapters, I thought: this is what Paul Auster wanted to be but never managed. The inverted mystery structure, borrowed from Greek tragedy, the murder revealed on the first page, is genuinely effective, and the first half sustains its suspense cleanly. <u>The Dionysian frenzy gone wrong, the bacchanal that tips into real death, is a premise good enough to build a career on.</u> Charles and Francis in particular are vivid, drawn with a precision that makes their later unravelling feel earned.

    The characterisation and plotting become rather too cliched and flat in the second half, which is a shame. Tartt has been credited with inventing *dark academia*, and one can see why: the aesthetic is seductive, the Vermont campus rendered with a sensory richness that makes one want to enrol. But the novel's weakness is also its genre's weakness. Once the murder is done, the paranoia and guilt spiral into territory that dozens of lesser thrillers have since colonised, and at five hundred pages the narrative wanders where at three hundred it might have been a compact suspense gem. The final dissolution still satisfies, and for a debut it is already remarkable. <u>But one leaves <b><i>The Secret History</i></b> suspecting that Tartt's gifts, which are considerable, needed a tighter frame to fully ignite.</u>

- title: "When Breath Becomes Air"
  type: "book"
  creator: "Paul Kalanithi"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  image: "/assets/images/thoughts/books/when_breath_becomes_air.jpg"
  posted: "2025-10-25"
  text: |
    I want to know what kind of family produces a Paul who, knowing he is dying and cannot meaningfully contribute to raising children, still decides to have a baby with Lucy, and even returns to the operating room after learning of the pregnancy. Beyond name-dropping Yeats, Eliot, and Wittgenstein, there is nothing in ***When Breath Becomes Air*** that actually demonstrates Paul's love of literature or philosophy. The one attempt at atheism is riddled with errors. <u>Cancer does not automatically make one a good writer, husband, father, or doctor.</u> Came expecting profound reflections on death; left mainly mourning the loss of what was apparently a very skilled neurosurgeon.

    Memoirs of terminal illness carry an implicit *moral authority* that can silence criticism; Kalanithi's book benefits from that silence more than it earns it. The literary name-dropping gestures at depth without achieving it, and the family ethics remain unexamined beneath the elegiac prose. <u>One suspects the book's reputation rests less on what it says than on the fact that its author did not survive to hear the objections.</u>

- title: "Sátántangó"
  type: "book"
  creator: "László Krasznahorkai, trans. George Szirtes"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/books/satantango.jpg"
  posted: "2025-10-18"
  text: |
    Krasznahorkai writes the comings and goings of a desolate Hungarian village like a stage play: twelve scenes corresponding to tango steps, six forward, six back, from the opening bells through the pipe-organ roar, the rain and dancing footsteps, cycling back to the bells tolling again at the final step. The structure is a closed system. No one escapes. Irimiás, the false messiah who returns to the village with promises of collective salvation, is both darkly comic and genuinely terrifying: a man who manipulates because manipulation is the only form of agency available in a world where the state has withdrawn and left nothing but mud. <u>Susan Sontag called Krasznahorkai the contemporary master of the apocalypse, and <b><i>Sátántangó</i></b> is where the apocalypse begins, not with fire but with rain and pálinka and the slow erosion of the will to resist.</u>

    The whole thing is remarkably compact. The long sentences, which in description sound forbidding, are in practice easy to follow, hypnotic rather than punishing, closer to the experience of walking through heavy rain than of deciphering a puzzle. The images and dialogue are vivid: the doctor sitting by his window with a glass of pálinka, drinking it empty and refilling it over and over, watching the world outside through the weeds in his room, letting his mind drift. There is something grotesque and darkly funny beneath the misery, as if somewhere in Central Europe there really is such a man, such a village, such an endless autumn. Béla Tarr's seven-hour film adaptation understood this tone perfectly, translating the prose's oppressive rhythm into black-and-white duration. <u>But the novel stands on its own as one of the great post-communist European novels: a book about what happens when a system collapses and what is left is not freedom but the unbearable obligation to keep going without any idea where.</u>

- title: "Shadow Ticket"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/books/shadow_ticket.jpg"
  posted: "2025-10-13"
  text: |
    It may be because I have not read it closely enough, but ***Shadow Ticket*** is the funniest and the emptiest Pynchon I have read. Funny because his absurdism and free-associative weirdness are on full display: motorcycle gangs tearing through the Hungarian desert, a golem from Czechoslovakia, <u>a self-aware and imperishable cheese whose maker is essentially the Al Capone of dairy</u>. The private-eye structure, Hicks McTaggart trailing a runaway heiress from Milwaukee through New York to Belgrade and Budapest, invites the *Inherent Vice* (2009) comparison, and it holds to a point: both are detective novels in the loosest sense, both meander gloriously. But where Doc Sportello's California haze carried *epistemological* weight, the 1932 setting here tips the balance toward period intrigue, and the paranoid circuitry never quite connects to a central charge.

    So why empty? Because beyond pre-war Milwaukee's atmosphere of *manufactured compliance* and Central Europe's universal dread, Pynchon does not do much dissection of ideology. The deeper political and metaphysical pressure one expects from Pynchon is present but muted; the political resonances feel gestural rather than structural. Unlike *Vineland* (1990), where government repression seeps into the depths of the crowd and lays fear-bombs at the base of resistance movements, or *The Crying of Lot 49* (1966), where Oedipa's paranoia becomes a genuine epistemological crisis, Shadow Ticket reads more as *reconciliation* than reinvention: a return to signature concerns rather than a late-career departure. <u>Of course, the worst Pynchon is still better than most fiction; within his own catalogue, though, Shadow Ticket is comparatively shallow.</u> But hell, I cannot say I did not have a tremendous time reading it.

- title: "Vineland"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/vineland.jpg"
  posted: "2025-10-09"
  text: |
    Pynchon writes the walking wounded of Nixon's War on Drugs and the long shadow of Vietnam: the students and activists killed by federal agents, the scholars swept away by historical tides, the loveless marriages, the stubborn love between a father and a daughter. Through one serious joke after another he paints America's most miserable decades of the twentieth century. At the turn of the seventies and eighties, the end of the hippie era, government repression seeped into the depths of the crowd, laying fear-bombs at the base of every resistance movement. The critical consensus has always been that ***Vineland*** is 'minor Pynchon', more accessible, warmer, less labyrinthine than the major novels. Fair enough: this is not the Pynchon of unruly sentence-architecture and encyclopaedic ambition. <u>What it is, instead, is the Pynchon who loves his people.</u> Brock Vond is one of his most chilling creations precisely because he is banal, a federal enforcer whose violence is institutional rather than demonic; Frenesi Gates, the radical-turned-informant, carries the entire betrayal of the sixties in her camera lens; and Prairie's search for her mother is the most emotionally legible quest in the whole catalogue. The Thanatoids, those television-zombie half-dead, feel less like satire now than prophecy.

    All the idealism and tomorrow-will-be-better hope, shattered by the camera. The beautiful dreams of 24fps and Corvairs, the joy preserved on film and bass lines, so simply erased, seized, cleared, destroyed. <u>Pynchon understood before most that the sixties were not merely defeated but <em>metabolised</em>, their imagery and vocabulary absorbed by the very system they opposed.</u> Reagan-era America did not need to suppress the counterculture; it bought the footage. Yet the novel refuses despair outright. 'I'm not gonna forget,' someone says, and means it. Our eternal Summer of Love: 'While we had it, we really had some fun.' I believe him. <u>The warmth in that line is not nostalgia; it is evidence.</u>

- title: "4 3 2 1"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/4321.jpg"
  posted: "2025-09-27"
  text: |
    So what defines each Ferguson? Auster's answer seems to be: relationships. Whether each Ferguson's love life, family dynamics, or relationship with the political and social world, all become anchor points, however minor, with far-reaching consequences. Since the eighties Auster has been probing a world of possibility and *coincidence*, and that impulse finally comes into full bloom in ***4 3 2 1***, across eight hundred and sixty-odd pages. Growing up in post-war Newark, each Ferguson becomes a mirror for the counterculture, anti-war sentiment, and the Summer of Love. <u>At that point the multiple Fergusons stop feeling like individuals and start feeling like Auster's own version of <em>ukiyo-e</em>: reflections of a moment, floating pictures of a world in flux.</u>

    The structure is audacious, four parallel narratives held together by a single origin point, and it invites the obvious comparison to musical counterpoint, four voices playing variations on the same theme. The risk is blurring, and it happens: somewhere around pages five or six hundred, after I gave up tracking each character's specific timeline, the distinctions between Fergusons dissolved. But this turned out to be the point. Auster is not asking one to care equally about each version; he is asking one to feel the weight of contingency itself, the vertigo of lives that could have been otherwise. The novel is deeply autobiographical, almost embarrassingly so, Jewish-American Newark childhood, the writer's vocation, the political turmoil of the sixties. But autobiography metabolised into form becomes something rarer than memoir. This is the book where Auster's lifelong obsession with chance stops being a device and becomes a cosmology: identity is not chosen but assembled through accident, and the four Fergusons are the proof. The rest of the book, once I surrendered to it, was pure pleasure.

- title: "Invisible"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 2009
  eval: "disliked"
  image: "/assets/images/thoughts/books/invisible.jpg"
  posted: "2025-08-30"
  text: |
    I had hoped that after *The New York Trilogy* (1987), *Moon Palace* (1989), and *Leviathan* (1992), Auster might have learned to stop writing flat, stock female characters with exhausted inner lives. He has not. He has doubled down. <u>Auster's women, with the possible exception of Mrs Hume in <em>Moon Palace</em>, all seem to be beautiful and desperate to sleep with the protagonist</u>: the French-American beauty Margot in New York, and even the narrator's own sister Gwyn. Compared to the intricate threads and callbacks of his earlier work, the watery plot here is a massive step down. Postmodernism should not have to sink this low.

    For all its *postmodern* gestures, ***Invisible*** reads like a very polished but ultimately shallow literary thriller. The tri-partite narrative structure and the shifting points of view promise a destabilisation of truth that never truly arrives; one can see the machinery but not feel the vertigo. <u>Where Auster's best work makes <em>coincidence</em> feel like metaphysics, here the formal tricks feel merely decorative, appliqued onto a story that has nothing underneath to destabilise.</u> The incest subplot, presumably intended to shock, instead reads as a tired provocation, and the Parisian section drifts into travelogue. One finishes the book suspecting that Auster wrote it on autopilot, relying on his established repertoire of doublings and unreliable narrators without interrogating why any of it should matter this time round.

- title: "A Pale View of Hills"
  type: "book"
  creator: "Kazuo Ishiguro"
  creator_role: "by"
  year: 1982
  eval: "loved"
  image: "/assets/images/thoughts/books/pale_view_of_hills.jpg"
  posted: "2025-08-28"
  text: |
    Even having read one Ishiguro in Chinese translation, *The Remains of the Day* (1989), I had not anticipated that he could already, this early, use such calm, precise, spare, detached language to produce such dense emotion. Using her daughter's homecoming as a catalyst, Etsuko renders the *unreliability of memory* in fragments, and behind those unreliable shards is a heartbroken, regretful, socially constrained mother. <u>She wants to tell Niki things, but knows that death cannot just be laid on the table, so she can only reconstruct that summer from decades ago, piece by piece.</u>

    The critical reading that Sachiko is Etsuko's alter ego, a displaced self-portrait narrated in the third person, feels almost too neat, yet the text earns it. Ishiguro threads survivor's guilt, emigration, and maternal failure into a single braid so fine that one only sees the full pattern retrospectively: Sachiko's neglect of Mariko mirrors Etsuko's of Keiko, the unnamed woman by the river haunts both timelines, and the decision to leave Japan carries a guilt that cannot be spoken in any language Etsuko now possesses. <u>What makes <b><i>A Pale View of Hills</i></b> extraordinary is its refusal to resolve. Memory here is not stable archive but emotional negotiation, shaped by grief into something that protects the rememberer at the cost of accuracy.</u> Ishiguro understands, long before *The Remains of the Day* (1989) would make it his signature, that the most devastating stories are the ones the narrator cannot quite bring herself to tell.

    'Keiko was happy that day. We rode on the cable-cars.' Suppressed feeling presses against the page, almost but not quite breaking through. Faber placed several blank pages at the back of the edition; behind them, a distant, faint hill in fog. That image stayed with me long after I closed the book.

- title: "The New York Trilogy"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1987
  eval: "liked"
  image: "/assets/images/thoughts/books/new_york_trilogy.jpg"
  posted: "2025-08-24"
  text: |
    Auster's earliest prose already carries the faint current of *Moon Palace* (1989) and *Leviathan* (1992), and the same dependence on *coincidence*. Three so-called detective stories with no traditional twists or endings, all pointing ultimately toward the protagonist's *deconstruction of self*. Quinn, consumed by an obsession that leads nowhere, never solves the 'Paul Auster mystery'; Blue, lost in a riddle of identity, can never explain Black/White's motives; and what happened to Fanshawe, nobody knows. <u>The trilogy uses detective fiction as scaffolding for something quite different: an interrogation of authorship, identity, and the limits of language.</u> The detective's search for clues becomes a metaphor for the futile search for stable meaning, and the genre's promise of resolution is deliberately, almost cruelly, withheld.

    In ***The New York Trilogy*** one can see many of Auster's recurring images: China, erotic coincidence, merged opposites, alienation, the city as labyrinth. The self-referential gesture of inserting 'Paul Auster' as a character in *City of Glass* (1985) is *postmodern* metafiction at its most explicit, but it works because the novel has already destabilised identity so thoroughly that the author's name becomes just another floating signifier. The weaknesses that persist across Auster's later career are already visible here too: female characters written almost entirely flat, complex psychological passages that feel muddled rather than mysterious. These are not minor flaws; they recur with enough consistency to constitute a blind spot. <u>Still, as a debut statement of intent, the Trilogy is formidable. It announced a writer whose world would run on chance, solitude, and the suspicion that narrative itself is a conspiracy we agree to believe in.</u>

- title: "We Have Always Lived in the Castle"
  type: "book"
  creator: "Shirley Jackson"
  creator_role: "by"
  year: 1962
  eval: "liked"
  image: "/assets/images/thoughts/books/we_have_always_lived_in_the_castle.jpg"
  posted: "2025-08-15"
  text: |
    Merricat and her sister's quiet dream-life, in a Gothic village and castle, circles in endless repetition, like the crack on the pavement outside Stella's coffee shop: it was always there. Life inside the castle froze completely after the great poisoning night: the sugar bowl coated in arsenic, old books nailed to trees, the manor gates locked shut. <u>Jackson replaces the traditional Gothic castle with a bourgeois household haunted by family secrets, and inverts the genre's central trope: it is the outside world that poses the threat, not the dark interior.</u> The villagers' hostility is *The Lottery* (1948) writ domestic, a mob driven by resentment of female autonomy and nonconformity.

    But Merricat senses change coming: the nailed-up book falls, an unseen relative crashes in, everything teeters at the edge of collapse, and Merricat chooses to become that collapse itself. What makes ***We Have Always Lived in the Castle*** so unsettling is the gap between Merricat's cheerful tone and the horror of her actions, the way Jackson withholds the revelation of guilt and then frames it through the narrator's own self-justifying logic. One is made complicit in Merricat's worldview long before understanding its true nature. The rituals, the buried objects, the protective incantations, all occupy a zone between childish superstition and genuine menace. <u>Mark Fisher would have called this <em>eeriness</em>: the unexpected presence of agency where one expects absence, or the absence of it where one expects presence. Jackson got there decades before anyone named the feeling.</u>

- title: "Leviathan"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/books/leviathan.jpg"
  posted: "2025-08-14"
  text: |
    Auster wrote in the opening of *The New York Trilogy* (1987): 'nothing was real except chance.' He uses *coincidence* and infinite possibility to build worlds that feel familiar and profoundly alien at once, and ***Leviathan*** is perhaps the purest expression of this method. Sachs's life is shaped by dozens of coincidences: meeting Peter, meeting Maria, the fall from a fire escape, the accidental killing. Even the title originates in a coincidence born of Sachs's curiosity after committing a terrible act. <u>The critical reading of Sachs as 'the accidental radical' feels precisely right: his journey from celebrated novelist to domestic terrorist is driven not by ideology but by <em>contingency</em>, a chain of events that look like fate only in retrospect.</u> Auster deliberately refuses to give Sachs a satisfying political manifesto, making his violence morally unresolvable.

    In the final chapter, Sachs's 'political act' is really just an expression of guilt and pain. Is he a hypocrite? His life has nothing to do with politics, yet he deceives himself and his friends, insisting he is acting for some 'cause'. All his courage, righteousness, and remorse collapse at the end into a cowardice he cannot even name. <u>The Hobbesian resonance of the title cuts both ways: rather than the state containing chaos, Sachs becomes a one-man leviathan, a self-appointed sovereign acting outside the law, and the irony is that this sovereign is governed entirely by accident.</u> Meanwhile Peter Aaron, whose initials mirror Auster's own, races to write the story before the FBI can define it, making the act of narration itself a *counter-political* gesture. Leviathan is just Sachs's imaginary enemy, and the tragedy is that he never sees this.

- title: "The Crying of Lot 49"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1966
  eval: "loved"
  image: "/assets/images/thoughts/books/crying_of_lot_49.jpg"
  posted: "2025-08-11"
  text: |
    Pynchon's sentences are little bombs that detonate the instant one reaches them: one is left with the shattered remains of reality, piecing the original story back together oneself. This is not a complaint. With stubborn effort I followed Oedipa Maas through the 'circuit-board' streets of 1960s Southern California, trying to crack the Tristero mystery or convince myself it does not exist. The novel famously offers four possible interpretations and refuses to resolve any of them: the Tristero is real; Oedipa is projecting pattern onto noise; she is the victim of Inverarity's elaborate hoax; or she is simply going mad. <u>Pynchon's genius is to make each reading equally viable, and to insist that the impossibility of choosing between them is itself the point.</u> Oedipa functions as a kind of *Maxwell's Demon*, sorting signal from noise in an information-saturated America, and the novel enacts in its form the same *entropic* uncertainty it describes.

    Oedipa, sliding gradually into conspiracy-theory obsession, is a radical feminist icon of sixties American counterculture, though the text never announces her as such. She is curious, suspicious, postmodern, standing directly across from the Leviathan of patriarchal and corporate America, losing her grip on reality as she dissolves into Tristero's never-sounded horn. Loveless marriage, her one-night stand fleeing with an underage girl, even her therapist succumbing to psychedelics: every male figure in her world fails her, manages her, or disappears. <u>The feminist reading, that her quest for the Tristero is also a quest for <em>autonomous subjectivity</em>, feels as structurally essential as the thermodynamic one.</u>

    By the final auction scene Oedipa has almost nothing left, only her obsession with the truth. She is Kafka's Josef K., the Hunter in *Bloodborne* (2015), and Neo in *The Matrix* (1999): trapped in a system whose architecture she can almost perceive but never quite confirm. ***The Crying of Lot 49*** is about to begin. It never does. Pynchon leaves one there, on the threshold, and the silence that follows is the most eloquent thing in the book.

- title: "Moon Palace"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/books/moon_palace.jpg"
  posted: "2025-08-10"
  text: |
    Despite real frustration with Auster's treatment of several female characters, especially Kitty Wu and Mrs Hume, I could not resist ***Moon Palace***'s astonishing literary force. The *coincidences* here are stacked to the point of absurdity: Marco Stanley Fogg, whose very name encodes three famous wanderers, stumbles into employment with his own grandfather, then befriends and loses his own father. One either reads this as *postmodern* allegory or as authorial manipulation, and whether the novel works depends entirely on which side one falls. <u>I fell on the side of allegory, intoxicated by the seemingly offhand plot revelations, by Marco and his uncle Victor's mutual dependence, pitiful but never pitiable, by the casually dropped 'A here exists only in relation to a there', by Fogg's homeless wandering through Central Park like a secular ascetic discovering that dispossession is its own kind of knowledge.</u>

    Auster's obsession with chance has never been mere cleverness; in Moon Palace it reaches something like a *cosmology*. The moon recurs as motif and metaphor: Victor's Moon Palace restaurant, the 1969 lunar landing, the lunar imagery in Effing's desert paintings. The moon is the irrational, the gravitational pull of accident on identity, and Fogg's life orbits it helplessly. <u>Searching for Effing's cave, and through it for meaning, and finding nothing, lost in the American desert, watching the moon finally 'find its place in the darkness': drifting Marco Fogg, like Phileas Fogg returning from his circumnavigation of the globe, finally makes peace with his own life.</u> That final image is one of the most beautiful things Auster ever wrote. I cannot forgive the flat women; I cannot deny the force.

- title: "Stolen"
  type: "book"
  creator: "Ann-Helén Laestadius, trans. Rachel Willson-Broyles"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  image: "/assets/images/thoughts/books/stolen.jpg"
  posted: "2025-07-27"
  text: |
    A *Bildungsroman* set among the Sami indigenous people of northern Sweden. Slow-paced, but illuminating: I learned a great deal about the conflicts between Sami and Swedish settlers over reindeer herding, about Sami customs and the quiet violence of *cultural erasure*. <u>The Scandinavian version of indigenous-settler conflict rarely makes it to screen or page, which gives the novel a certain documentary urgency.</u> Laestadius, who is Sami herself, writes from inside the culture with an authenticity that most outsider accounts of indigenous life conspicuously lack.

    The coming-of-age element is interesting enough, but though eleven years pass in the novel, from 2008 to 2019, Elsa's character arc remains thin. Her personality stays too consistent from childhood to adulthood; she still feels like a little girl by the 2019 sections, and the emotional range narrows rather than deepens. <u>A novel that spans a decade ought to show its protagonist metabolising time, not merely enduring it.</u> Still worth reading for the world it opens, but ***Stolen*** needed stronger bones.

- title: "The Year of Dreaming Dangerously"
  type: "book"
  creator: "Slavoj Žižek"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/year_of_dreaming_dangerously.jpg"
  posted: "2025-07-11"
  text: |
    Žižek the polemicist, stirring Marx's *surplus value* together with Lacan's *surplus enjoyment* in his iron pot, as always. In ***The Year of Dreaming Dangerously*** he writes about the London streets of 2011 and Tahrir Square, about how that year's great awakening was killed, buried, and had flowers planted on the grave by media spectacle and liberal recuperation. The diagnosis is sharp: each uprising briefly punctured the membrane of *capitalist realism*, only to be narrativised into harmlessness by the very system it threatened. What Žižek understands, and what the orthodox left sometimes forgets, is that the problem was never the absence of anger but the absence of a framework capable of converting anger into programme. <u>The protesters could occupy the square but not the concept.</u>

    He no longer believes history will gently self-correct, the way the old-school Marxists waited for productive forces to finally burst through the chains of production relations. Žižek's capitalism is a self-renewing, status-quo-preserving monster, kept alive precisely by crises, feeding on its own contradictions rather than succumbing to them. Institutionally manufactured scarcity, the commodification of dissent, the liberal co-optation of radical energy: these are not bugs but features. We need radical transformation, he insists, and perhaps he is right. But 2011 was fifteen years ago, and nothing that fierce has come back. The book's greatest strength, its sense of urgency, is also the source of its pathos. <u>One finishes it aware that the dreaming was real, the danger was real, and the waking was permanent.</u>

- title: "Did Somebody Say Totalitarianism? Five Interventions in the (Mis)use of a Notion"
  type: "book"
  creator: "Slavoj Žižek"
  creator_role: "by"
  year: 2001
  eval: "liked"
  image: "/assets/images/thoughts/books/did_somebody_say_totalitarianism.jpg"
  posted: "2025-06-05"
  text: |
    Žižek is not defending totalitarianism. He is trying to show that 'anti-totalitarianism' functions as liberal ideology's self-deception mechanism: the conceptual blockade that forecloses any serious left politics by equating every emancipatory project with the Gulag. ***Did Somebody Say Totalitarianism?*** is full of deliberate provocation; using Agamben's 'Muslim' to denote the Muselmann of Nazi concentration camps is a prime example, designed to make the reader flinch and then think about why they flinched. <u>What Žižek grasps, and what makes the provocation more than mere contrarianism, is that the liberal sanctification of suffering has its own ideological function: it turns historical atrocity into a moral absolute that conveniently immunises the present order from critique.</u>

    His strength is directness and sharpness, though some Lacanian concepts remain overly opaque, giving the rhythm an uneven quality, lurching between electrifying polemic and passages that feel like theoretical throat-clearing. But the insight at the intersection of politics and psychoanalysis is undeniable. Chapter three applies almost too obviously to a certain country's current situation, and, more diffusely, to the liberal democracies too: sanctifying tragedy, tabooising totalitarianism, concretising the individual, dogmatising myth. The pattern Žižek identifies, in which the very invocation of 'totalitarianism' becomes a thought-stopper rather than a thought, feels more relevant now than when he wrote it. <u>One does not have to follow every Lacanian loop to recognise the central claim: that the loudest anti-totalitarians are sometimes the ones least willing to examine the structures they defend.</u>

- title: "The Outsider"
  type: "book"
  creator: "Albert Camus"
  creator_role: "by"
  year: 1942
  eval: "loved"
  image: "/assets/images/thoughts/books/outsider.jpg"
  posted: "2025-01-21"
  text: |
    I envy Meursault. I am helplessly unable to say what I mean, helplessly unable to refuse someone who wants me, helplessly performing grief at funerals, helplessly living as an insider. Existing in this society feels like moving behind a membrane I cannot pierce. Pretending to care, just to get through tomorrow.

    That is the raw nerve of ***The Outsider***. Camus writes in terse, paratactic sentences, stripped of causal connectives, and this formal austerity is not mere style: it enacts the absurd at the level of syntax, each sentence landing as a discrete fact unmoored from consequence. Meursault does not weep at his mother's funeral. Meursault shoots a man on a beach. The court condemns him less for the killing than for the failure to perform, and in that gap between act and performance Camus locates the entire indictment of social convention. <u>The justice system does not want truth; it wants legibility. What it cannot read, it destroys.</u>

    Postcolonial criticism rightly notes the unnamed Arab, the colonial violence that Camus renders invisible even as he renders Meursault's alienation visible. One should hold both things at once: the novel's philosophical power and its moral blind spot, the precision of its diagnosis and the narrowness of its sympathy. But what draws me back, what makes me envy Meursault rather than merely analyse him, is simpler and harder to say. <u>He refuses to lie. He refuses the membrane.</u> By the final pages, facing execution, he opens himself to the 'gentle indifference of the world' and finds it fraternal. I have never managed that. I suspect most people have not. Pretending to care, just to get through tomorrow.

- title: "Misogyny"
  type: "book"
  creator: "Chizuko Ueno"
  creator_role: "by"
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/books/misogyny.jpg"
  posted: "2025-01-05"
  text: |
    Ueno says in ***Misogyny*** that she has moved beyond her early structuralist phase, and one can tell. Her critique of patriarchy is not limited to a 'structural victim' framework; she tracks individual women and the mother-daughter dynamic as living, evolving things, refusing the temptation to collapse persons into positions. In Ueno's account, patriarchal misogyny takes root inside each individual from the moment men and women enter their designated roles. 'Becoming a man' means the homosocial alliance between men, deriving self-worth from male recognition, alienating and disdaining women, desiring the desire of other men. 'Becoming a woman' means recognising oneself as the object of male sexual projection. Women's value in patriarchal society is entirely determined by men, and only those, whether men or women, who are conscious of this mechanism can meaningfully resist it. <u>The structural insight is not new, but Ueno's achievement is in showing how the structure lives inside the individual, reproducing itself through affect and identification rather than simple coercion.</u>

    The one real flaw: roughly half the argumentation leans on Freud and fictional characters, which produces a curious unevenness, as though the sociological precision of the best passages keeps drifting toward psychoanalytic speculation that cannot quite bear the weight placed on it. But perhaps that is also a kind of honesty about the difficulty of the subject: misogyny is not only a system but a pathology, and pathology invites the clinical gaze even when that gaze is insufficient. What is harder to forgive are some of the reader responses Ueno implicitly addresses, gems like 'women enjoy their gender privileges while playing the victim', which is genuinely embarrassing to encounter in the discourse surrounding a book this serious. <u>Ueno herself would call it what it is: misogyny wearing the mask of rationality.</u>

- title: "The Weird and the Eerie"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/weird_and_the_eerie.jpg"
  posted: "2024-12-25"
  text: |
    Similar to Zampano in Danielewski's *House of Leaves* (2000), Fisher's dismantling of Freud's *unheimlich* depends on a boundary: between 'familiar' and 'strange', between presence and absence, between what should be there and what should not. The weird is the unexpected strangeness inside the everyday; without familiarity there can be no weird. The eerie is the unexpected absence or presence of agency: the importance of love in Nolan's *Interstellar* (2014) is eerie, as are M. R. James's ancient ruins, and, by extension, the agentless operations of capital itself, structures that produce effects beyond anyone's intention. Fisher understood that these were not merely aesthetic categories but political ones. <u>The eerie describes not just a mode of fiction but the logic of late capitalism: a system that seems to run by itself, haunting the present with futures that never arrived.</u>

    My favourite passage is the reading of H. G. Wells's *The Door in the Wall* (1911), where Fisher identifies the eerie as a threshold affect, a feeling generated by the gap between what is glimpsed and what is accessible. His prose is compressed and precise, each sentence carrying more weight than most critics manage in a paragraph. A shame, then, that so many unexplained references dilute that brilliance: the book sometimes assumes a reader who has already done the homework, and the density of allusion can feel exclusionary rather than enriching. But ***The Weird and the Eerie*** is Fisher's last completed work, published weeks before his death, and perhaps there is something fitting about its fragmentary quality, its gestures toward readings that will never be finished. <u>One leaves it wanting more, which is both the book's limitation and its most powerful effect.</u>

- title: "On Intelligence"
  type: "book"
  creator: "Jeff Hawkins"
  creator_role: "by"
  year: 2004
  eval: "meh..."
  image: "/assets/images/thoughts/books/on_intelligence.jpg"
  posted: "2024-12-07"
  text: |
    ***On Intelligence*** closes with a range of specific predictions, some genuinely interesting: for instance, 'if lower brain regions predict incoming signals, higher regions need not process them'. The memory-prediction framework is intuitive and appealingly clean, a hierarchical model in which the neocortex stores temporal sequences and uses them to anticipate sensory input. The trouble is that twenty years of hippocampal and prefrontal recordings have largely complicated or contradicted the picture. Place cells and grid cells suggest the hippocampus is doing something far richer than sitting atop a cortical hierarchy as a passive relay; entorhinal-hippocampal loops are bidirectional and deeply entangled with spatial cognition, relational binding, and episodic memory in ways that resist reduction to sequence storage. The prefrontal cortex, meanwhile, involves working memory, executive control, and rule-based reasoning that cannot be flattened into hierarchical pattern matching. Hawkins treats the cortex as a single, homogeneous algorithm, which is elegant but anatomically untenable: V1 and dorsolateral PFC differ in cytoarchitecture, connectivity, and function in ways his framework cannot accommodate. <u>And the near-total absence of subcortical structures, neuromodulation, and the thalamus from the model is not a simplification but an omission.</u>

    Still, one cannot deny the audacity of the vision. Hawkins was willing to think further and speak more boldly than most neuroscientists or computational scientists, and the memory-prediction framework anticipated aspects of *predictive coding* that would later gain serious traction. <u>Already ahead of most popular neuroscience writers on that score alone, even if the specifics have not aged well.</u>

- title: "Phantoms in the Brain"
  type: "book"
  creator: "V. S. Ramachandran, Sandra Blakeslee"
  creator_role: "by"
  year: 1998
  eval: "loved"
  image: "/assets/images/thoughts/books/phantoms_in_the_brain.jpg"
  posted: "2024-11-02"
  text: |
    Ramachandran writes in the preface of ***Phantoms in the Brain*** that he wanted to be a science communicator like Oliver Sacks. Having finished it: he has succeeded, and in some respects surpassed the model. Both Ramachandran and Sacks make a convincing case for the significance of case studies in modern science, for the stubborn power of careful observation at the bedside. Through conversation, behavioural experiment, and the combination of clinical and neural data, Ramachandran generates highly testable hypotheses from minimal apparatus: a mirror box, a cotton swab, a patient's willingness to talk. The elegance is in the simplicity. <u>Where the field was building ever-larger imaging pipelines, Ramachandran was asking a person with a phantom limb to close their eyes and tell him what they felt.</u>

    Most striking is his discussion of individual rationalisation: the brain does not just perceive, it interprets, and in the course of interpreting, perception inevitably gets re-interpreted against objective reality. A patient with a paralysed left arm believes they 'did not want to raise it', not that they could not. The left hemisphere, that tireless confabulator, constructs a narrative of coherence even when the evidence screams contradiction. Ramachandran's speculation, that our drive for cognitive consistency is so powerful it actively distorts reality, extends far beyond clinical neurology. It is a lesson for non-patients too: every intact brain is performing the same trick, just more quietly. <u>One finishes the book wondering how much of what one calls 'reason' is simply the confabulator working overtime, and how rarely one catches it in the act.</u>

- title: "A Short History of Nearly Everything"
  type: "book"
  creator: "Bill Bryson"
  creator_role: "by"
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/books/short_history_of_nearly_everything.jpg"
  posted: "2024-08-23"
  text: |
    I deeply regret only reading this in my third year of a PhD. Bill Bryson covers biology, evolution, geology, climate, ancient humans, and the history of science in a single sweep, treating each topic with real depth and written in the wittiest, most effortless prose of any popular science book I have read. The effortlessness is, of course, the hardest thing to achieve: Bryson spent three years researching the book, and the lightness of the writing conceals an enormous quantity of absorbed knowledge, distilled into anecdotes and explanations that feel as natural as conversation. <u>Where most science communicators choose between rigour and accessibility, Bryson refuses the trade-off, managing to be both precise and funny, often in the same sentence.</u>

    What sets ***A Short History*** apart from other ambitious surveys is Bryson's instinct for the human story behind the discovery. Science here is not a march of disembodied facts but a procession of obsessives, misfits, and feuding personalities whose vanity and brilliance are equally responsible for what we know. The eccentricities of the scientists are not decorative asides; they illuminate how knowledge actually gets made, which is to say, messily, contingently, and often by people who would be unbearable at dinner. <u>One of those books that are simply excellent without faults, and the kind of book that makes one briefly, intensely angry at every science teacher who made the subject feel like a chore.</u>

- title: "Metazoa: Animal Life and the Birth of the Mind"
  type: "book"
  creator: "Peter Godfrey-Smith"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/metazoa.jpg"
  posted: "2024-03-31"
  text: |
    The world of philosophy would be better with more hands-on, empiricist thinkers like Peter Godfrey-Smith. Same experience as with *Other Minds* (2016): what he does best is still the anecdote, the concrete image that carries philosophical weight without needing to announce itself. <u>A female octopus throwing rubbish at a male who keeps harassing her while she builds a nest is an image I will never forget, and it does more argumentative work than a dozen thought experiments about qualia.</u> Godfrey-Smith's central claim, that subjective experience probably evolved as organisms needed to manage increasingly complex bodies, is persuasive precisely because he arrives at it through observation rather than speculation: sponges respond to their environment through chemical signals but lack a nervous system that integrates information in the relevant way, and so probably lack experience. The boundary is not sharp but gradual, consciousness arriving in degrees rather than as a binary switch, which is both philosophically honest and scientifically productive.

    On the evolutionary path, intelligence takes a thousand strange forms, all arising from a simple circuit distinguishing self from other. That thread runs through what looks like a scattered collection of stories about corals, mantis shrimps, reef fish, and cephalopods, binding them into a single argument about how matter becomes mind. Godfrey-Smith's writing is as seductive as his philosophy: patient, precise, willing to sit with uncertainty rather than forcing premature resolution. There is a generosity in this approach, a refusal to treat the hard problem of consciousness as either solved or insoluble, that feels rare in a field dominated by confident declarations from both sides. One leaves ***Metazoa*** not with answers but with a richer sense of the question, and <u>with the conviction that philosophy done in wetsuits and on reefs is philosophy done right.</u>

- title: "On Women"
  type: "book"
  creator: "Susan Sontag"
  creator_role: "by"
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/books/on_women.jpg"
  posted: "2024-01-08"
  text: |
    Many of Sontag's observations in ***On Women*** are pointed, sometimes devastatingly so. Capitalist society has men defining femininity as superficial, then concluding that women are superficial: the circularity is so perfect it almost looks designed, which is precisely her point. The liberation of women, Sontag insists, is fundamentally different from the liberation of men, because female liberation requires men to give up part of their power, which is why women's liberation and equality are not the same thing. <u>Equality within existing structures merely distributes the spoils more evenly; liberation demands that the structures themselves be dismantled.</u> These are not arguments that have dated. If anything, the contemporary discourse around 'lean in' feminism, which asks women to succeed on terms defined by patriarchal capitalism, proves Sontag's distinction still cuts.

    The second half is a critique of Leni Riefenstahl: clear in its positions, uncompromising in its refusal to separate aesthetics from politics, but the argumentation is a bit thin, not entirely convincing. Sontag wants to demonstrate that Riefenstahl's visual language is inherently fascist, that the celebration of physical beauty and heroic submission cannot be disentangled from the ideology it served. The claim is strong, perhaps too strong for the evidence marshalled here, which feels compressed to the point of assertion. One senses the essay reaching for the force of *Fascinating Fascism* (1975) without quite achieving it. Still, the collection as a whole serves as a reminder that Sontag's feminism was never comfortable, never programmatic: <u>it was the feminism of someone who resisted the label even as she could not stop thinking about the problem.</u> That discomfort is part of its value.

- title: "When We Cease to Understand the World"
  type: "book"
  creator: "Benjamín Labatut"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/when_we_cease_to_understand_the_world.jpg"
  posted: "2023-05-31"
  text: |
    Labatut has written something that should not work. ***When We Cease to Understand the World*** is a hybrid of essay, speculative biography, and literary fiction, threaded together with a confidence that borders on recklessness: real scientists, real breakthroughs, real atrocities, all laced with invented interiority and hallucinatory prose until the seams between fact and fabrication dissolve entirely. The usual objection writes itself: this is irresponsible, this is fakery. But the book's genius lies precisely in that dissolution. Labatut understands that the history of twentieth-century science is already stranger than fiction, already saturated with moral vertigo, and that the conventional nonfiction frame, with its careful attribution and hedged claims, cannot capture what it felt like to stand at the edge of the unknowable and keep pushing. Fritz Haber's nitrogen fixation feeding the world and gassing the trenches; Schwarzschild solving Einstein's field equations while dying on the Eastern Front; Heisenberg and Schr\u00f6dinger tearing quantum mechanics apart from opposite ends. <u>One story bleeds into the next like a wound that will not close.</u>

    The stories of Grothendieck and Mochizuki Shinichi, though, are what I keep returning to. Grothendieck, retreating from mathematics into hermitic madness, as if the structures he had uncovered were too vast for a single mind to hold without cracking. Mochizuki, publishing a proof so impenetrable that the mathematical community could neither verify nor refute it, sealed inside his own logic like a message in a bottle no one can open. Labatut threads these lives together in the manner of *Cloud Atlas* (2004): one line connecting everyone's fate to the fate of the world, each chapter a step closer to the point where understanding tips into its own negation. The Bola\u00f1o comparison is apt; both are Chilean, both drawn to the intersection of brilliance and destruction. But Labatut is doing something more compressed, more vertiginous. <u>He is asking whether the act of knowing, pushed far enough, becomes indistinguishable from the act of going mad.</u> A week after finishing, the awe had not faded. It still has not.

- title: "The Rise and Fall of the Third Reich"
  type: "book"
  creator: "William L. Shirer"
  creator_role: "by"
  year: 1960
  eval: "liked"
  image: "/assets/images/thoughts/books/rise_and_fall_of_the_third_reich.jpg"
  posted: "2023-03-04"
  text: |
    A fifty-plus-hour monument to the journalistic conviction that being there counts for something. Shirer reported from inside Nazi Germany until 1940, and that proximity gives his narrative an immediacy no purely archival historian can replicate: <u>the texture of rallies witnessed first-hand, the quality of light in rooms where decisions were made.</u> The academic objections are well-rehearsed. Hans Mommsen called it superficial. Gordon Craig questioned the analytical framework. Richard Evans and Deborah Lipstadt have labelled it outdated, and they are not wrong: Shirer leans too heavily on the *Sonderweg* thesis, that old argument about a uniquely German national character marching inevitably toward catastrophe, which later historiography has largely dismantled. The later chapters lean even more heavily on Hitler's deteriorating mental state, and the accuracy of those sources is naturally suspect, filtered through memoirs written by men with every reason to redirect blame.

    What survives, though, is the sheer narrative richness. As a work of moral philosophy or Holocaust scholarship, ***The Rise and Fall of the Third Reich*** has been superseded many times over; one reaches for Primo Levi, for Hannah Arendt, for Evans's own Third Reich trilogy. But as a narrative act, the accumulation of detail, the relentless forward momentum through two decades of escalating horror, the book remains formidable. <u>Shirer was 'just a journalist', his critics said. Perhaps. But journalism of this ambition and this density has its own kind of authority: that of a witness who refused to look away, even when the analytical tools at his disposal were blunter than the moment demanded.</u>

- title: "Time, Love, Memory: A Great Biologist and His Quest for the Origins of Behaviour"
  type: "book"
  creator: "Jonathan Weiner"
  creator_role: "by"
  year: 1999
  eval: "liked"
  image: "/assets/images/thoughts/books/time_love_memory.jpg"
  posted: "2022-06-22"
  text: |
    The journalist's craft is on full display. Weiner builds Seymour Benzer's story the way a good documentary filmmaker constructs a portrait: through interviews, through the texture of a lab, through the faces of collaborators and rivals who leap off the page with startling economy. This is nothing like Eric Kandel's autobiography, which is essentially a career retrospective narrated by its subject; Weiner's approach is more alive, more externally observed, and the liveliness matters. <u>One gets a sense not just of Benzer's intellectual trajectory, from physicist to molecular biologist to neurogenetics pioneer, but of the atmosphere in which that trajectory unfolded: the Caltech corridors, the mutant fly stocks, the Drosophila courtship songs played back on oscilloscopes.</u> The discoveries that would eventually underpin the 2017 Nobel for circadian rhythm research, the period and timeless genes, are rendered here as human stories first, scientific achievements second.

    The inevitable bias is structural. A book about Benzer is a book about the gene, and Weiner cannot help but foreground genetic determinism in a way that the science itself has long since outgrown. Everyone now understands that genes cannot be as deterministic as the early geneticists imagined; the gene-behaviour relationship is probabilistic, contextual, shaped by environment and development in ways Benzer's single-gene mutant screens could not capture. <u>Paired with Sapolsky's <em>Behave</em> (2017), which insists on the full causal chain from gene to hormone to neural circuit to culture, <b><i>Time, Love, Memory</i></b> finds its proper place: a brilliant portrait of one end of the explanatory spectrum, best read with the awareness that the other end exists.</u>

- title: "Behave: The Biology of Humans at Our Best and Worst"
  type: "book"
  creator: "Robert Sapolsky"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/behave.jpg"
  posted: "2022-06-12"
  text: |
    More readable than *Why Zebras Don't Get Ulcers* (1994), and broader in scope. Sapolsky's organising conceit is deceptively simple: start with the second before a behaviour occurs (the amygdala fires, the prefrontal cortex does or does not intervene), then zoom out, step by step, through hormones, then neurodevelopment, then genes, then evolution, then culture, until one has traversed the entire causal chain from synapse to civilisation. It is a staggering feat of synthesis, and what makes ***Behave*** work is Sapolsky's refusal to let any single level of explanation claim priority. The gene matters, but so does the hormone; the hormone matters, but so does the childhood; the childhood matters, but so does the culture that shaped the childhood. <u>One finishes the book understanding, viscerally, that the question 'why did this person do this?' never has a single answer.</u>

    Even with a psychology background, I encountered experiments I had never heard of. Two in particular have stayed with me. The drone soldier in the Iraq War: a man who kills by remote control, thousands of miles from the explosion, and still develops PTSD, because the brain does not fully distinguish between pulling a trigger and clicking a mouse when the consequence is a human body coming apart on a screen. <u>And the Christmas truce of 1914: soldiers climbing out of trenches to exchange gifts with men they had been trying to kill hours earlier, because proximity and shared humanity, given even the smallest opening, can override the most powerful propaganda.</u> Sapolsky's determinism has drawn criticism from philosophers who insist on the irreducibility of agency. Perhaps they are right. But the book's moral force does not depend on settling that question. <u>It depends on making one feel, with the weight of seven hundred pages of evidence, that understanding why we behave as we do is the precondition for behaving better.</u>

- title: "The Idiot"
  type: "book"
  creator: "Fyodor Dostoevsky"
  creator_role: "by"
  year: 1869
  eval: "loved"
  image: "/assets/images/thoughts/books/idiot.jpg"
  posted: "2021-07-26"
  text: |
    Dostoevsky set out to write 'a truly beautiful man' and produced instead a figure whose beauty is indistinguishable from catastrophe. Prince Myshkin's innocence, his social blindness, his radical empathy, are not flaws in an otherwise functional character; they are the character, and they make his destruction inevitable from the opening pages. The moment he sees Aglaya and glimpses Nastasya Filippovna's portrait, the architecture of his breakdown is already legible. <u>Two women who function not as love interests in any conventional sense but as a wall between Myshkin and the superficiality of aristocratic life, each representing a dimension of experience his innocence cannot metabolise: Nastasya's suffering, Aglaya's pride, both demanding a response he is constitutionally incapable of giving.</u> The tragedy is structural before it is emotional.

    What makes ***The Idiot*** extraordinary, and what separates it from the more schematic explorations of goodness in literature, is that Dostoevsky never states the opposition directly. The innocent versus the worldly: one expects this to be the thesis, announced and elaborated. Instead, Dostoevsky disperses it across more than a dozen characters whose individual characterisation is remarkably precise, letting the reader arrive at Myshkin's fate only gradually, only in Part IV, through the accumulated weight of social interactions, failed interventions, and mounting dread. The *yurodivyi*, the holy fool of Russian Orthodox tradition, haunts the novel's margins without ever being invoked by name. Rowan Williams reads Myshkin as an experiment in *kenotic love*, self-emptying love, and perhaps that is right: <u>but what Dostoevsky shows is that self-emptying, in a world that runs on self-interest, is not sainthood but annihilation.</u> The 'idiot' is just a gentle child standing on the other side of a gauze curtain. The curtain never lifts.

- title: "Twelve Rules for Life: An Antidote to Chaos"
  type: "book"
  creator: "Jordan B. Peterson"
  creator_role: "by"
  year: 2018
  eval: "hated"
  image: "/assets/images/thoughts/books/twelve_rules_for_life.jpg"
  posted: "2021-06-01"
  text: |
    <u>Opens by bragging about a Quora answer's upvote count, which tells one everything one needs to know about the epistemological standards that follow.</u> ***Twelve Rules for Life*** is a dad-lecture delivered at volume, dressed in Jungian archetypes and lobster neuroscience, with the logic tossed out somewhere around page three and never retrieved. Watch any of Peterson's debates against someone who actually knows their field, Žižek on Marx, any competent biologist on the naturalistic fallacy, and every argument collapses into strategic ambiguity. Our undergraduate professor had a term for this kind of figure: a prime example of an opportunist.

    The lobster hierarchy argument, the book's one claim to scientific grounding, has been demolished by every serious biologist who bothered to engage with it; serotonin does not operate in crustacean nervous systems the way Peterson implies, and the inferential leap from decapod dominance displays to human social organisation is not even wrong, merely vacant. <u>What remains, once the lobsters are dispatched, is a self-help book for people who mistake confidence for competence, dressed in enough Jungian mythology to feel intellectual without requiring any of the intellectual labour.</u>

- title: "Marx: A Very Short Introduction"
  type: "book"
  creator: "Peter Singer"
  creator_role: "by"
  year: 1980
  eval: "liked"
  image: "/assets/images/thoughts/books/marx.jpg"
  posted: "2021-04-11"
  text: |
    The most compelling Marx introduction I have read, and the reason is structural: Singer maps Marx's personal intellectual development alongside the theoretical architecture, so that *alienation*, *surplus value*, and collectivism arrive not as a list of doctrines but as stages in a single mind's confrontation with industrial capitalism. The treatment of *alienation* is particularly strong. Singer traces it from the *1844 Manuscripts* (1844) through to *Capital* (1867) without losing the thread, making a persuasive case that the early Marx and the mature Marx are engaged in the same project, however much the Althusserians insist on an epistemological break. One can disagree; the structuralist objection, that Singer overweights the young Hegelian Marx at the expense of the historical materialist, has force. <u>But <b><i>Marx: A Very Short Introduction</i></b> has the virtue of coherence, and for an introduction, coherence matters more than comprehensiveness.</u>

    The detail that has stayed with me longest is the *Wissenschaft* mistranslation. Marx understood his theory as *Wissenschaft*, a term that in German encompasses systematic knowledge far more broadly than the English 'science'. But it got rendered as 'Science', capital-S, and Karl Popper seized on that translation to attack Marxism for failing the *falsifiability* criterion, a criterion Marx never claimed to meet because he was not doing science in Popper's narrow sense. <u>It is a perfect illustration of how posterity misreads, how a translation error can calcify into a philosophical refutation that generations of students accept without question.</u> Singer spots this and names it cleanly. His final remarks on China, written with a philosopher's caution but a realist's awareness that the Chinese experiment was testing Marx's categories in ways Marx himself could not have anticipated, remain spot-on decades later.

- title: "The Hitchhiker's Guide to the Galaxy"
  type: "book"
  creator: "Douglas Adams"
  creator_role: "by"
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/books/hitchhikers_guide_to_the_galaxy.jpg"
  posted: "2021-02-01"
  text: |
    Hard to justify having only just read ***The Hitchhiker's Guide to the Galaxy*** now, but here we are. <u>Adams is doing something genuinely rare: using comedy as a load-bearing philosophical structure rather than decorating an existing one.</u> The destruction of Earth for a hyperspace bypass, the bureaucratic indifference of the Vogons, the supercomputer that spends millennia computing the answer to life, the universe, and everything only to deliver '42', these are not jokes with philosophical implications; they are philosophical arguments delivered as jokes. The puns are relentless, the setups absurdly patient, Adams spending half a page constructing the scaffolding for a single small gag. That commitment to the bit is what separates him from lesser comic writers.

    What surprised me most was the melancholy. Beneath the absurdism is a genuine bleakness: Arthur Dent is a man who has lost everything, his home, his planet, his species, and the universe responds with paperwork and bad poetry. Slartibartfast explaining how the Vogon demolition fleet arrived, 'That's bureaucracy for you!', is funny precisely because it is terrifying. <u>Adams understood, long before it became fashionable to say so, that the real horror is not malice but indifference; that the universe is not hostile, merely unhelpful.</u> <u>He has people thinking seriously about the role of towels in civilisation, and somehow that sentence is not a joke.</u> I loved every page. The towel stays packed.

- title: "Seven Brief Lessons on Physics"
  type: "book"
  creator: "Carlo Rovelli"
  creator_role: "by"
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/books/seven_brief_lessons_on_physics.jpg"
  posted: "2020-11-30"
  text: |
    I came to this after *The Order of Time* (2017), already convinced that Rovelli can write. ***Seven Brief Lessons on Physics*** confirmed it and then some. In barely eighty pages he covers general relativity, quantum mechanics, the architecture of the cosmos, elementary particles, quantum gravity, thermodynamics, and what it means to be human in a universe governed by these laws. <u>The compression alone is an achievement; that it reads like poetry is something else entirely.</u>

    The passage that stayed with me longest connects the second law of thermodynamics to simple probability: heat 'flows' from hot to cold not because of any law commanding it but because that configuration is overwhelmingly more likely to occur. <u>Rovelli makes this feel not like a textbook explanation but like a revelation, a moment when the universe's deepest organising principle turns out to be nothing more exotic than counting.</u> Lesson six is essentially a condensed version of the first half of *The Order of Time* (2017): time's existence is a product of our ignorance; time is not an objective feature of reality but an artefact of our limited access to the world's microscopic details. The final chapter closes with the line 'We are the source of amazement in our own eyes,' and whatever one thinks of Rovelli's physics, that sentence does something to the reader.

    I understand the criticism. Some physicists find his lyrical register suspect, as though writing beautifully about loop quantum gravity were itself evidence of a lack of rigour, even a kind of fakery. The speculative ideas do bleed into the popular writing in ways that make them seem more settled than they are. Fair enough. <u>But Rovelli's ideas and the way he articulates them genuinely move me, and I say this as a neuroscience student who came to physics as a passionate outsider, looking not for technical mastery but for the feeling of a structure glimpsed.</u> A neuroscience student's physics dream.

- title: "How We Remember: Brain Mechanisms of Episodic Memory"
  type: "book"
  creator: "Michael Hasselmo"
  creator_role: "by"
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/books/how_we_remember.jpg"
  posted: "2020-11-25"
  text: |
    ***How We Remember*** is the single book that has most shaped my thinking about memory mechanisms. More than Kandel's *In Search of Memory* (2006), which is mostly autobiography dressed as neuroscience; more than any review paper or textbook chapter. <u>Hasselmo does what almost no one else manages: he integrates computational modelling, pharmacology, and systems-level physiology into a coherent account of how the <em>hippocampus</em> encodes and retrieves <em>episodic memory</em>, with <em>acetylcholine</em> as the fulcrum between encoding and retrieval states.</u> The framework is clean without being reductive. One reads it and the hippocampal circuit clicks into place, not as a list of anatomical connections but as a system with dynamics, with states, with reasons for being wired the way it is.

    I first encountered this book early in my PhD, and it set the terms for how I think about the problems I work on daily: what does it mean for a circuit to switch between modes, how do neuromodulators sculpt the computational landscape, what is the relationship between oscillatory dynamics and the information the network carries. These are not abstract questions for me; they are the questions I bring to the recording rig. Hasselmo answered some of them, sharpened others, and made the rest feel tractable. I am planning to re-read it soon. <u>Some books one returns to not because one has forgotten them but because one has grown enough to read them differently.</u>

- title: "Your Brain Is a Time Machine: The Neuroscience and Physics of Time"
  type: "book"
  creator: "Dean Buonomano"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  image: "/assets/images/thoughts/books/your_brain_is_a_time_machine.jpg"
  posted: "2020-10-25"
  text: |
    Misleading title. ***Your Brain Is a Time Machine*** spends far too long on the physics of time, relativity, the block universe, and explains all of it poorly; anyone genuinely interested would do better with Rovelli's *The Order of Time* (2017). The neuroscience half, which ought to be the book's centre of gravity, is where one expects Buonomano to deliver, and he does not. The kappa and tau effect experiments are genuinely striking, but the treatment stops well short of the question that matters: how does the brain actually construct temporal experience? <u>The book meanders between physics, neuroscience, and philosophy without committing to any of them.</u>

    Coming back to this five years into a PhD in hippocampal electrophysiology, the gaps are sharper than I first realised. Buonomano barely touches *time cells*, the hippocampal neurons that fire at specific moments during a temporal interval, despite the fact that they are arguably the strongest evidence for the brain's intrinsic timing capacity beyond the sub-second scale. The distinction between *interval timing*, likely striatal and cerebellar, and the *episodic temporal organisation* performed by hippocampal sequences is never drawn. *Theta phase precession*, the mechanism by which place cells compress behavioural sequences into single oscillatory cycles, goes unmentioned, yet it is perhaps the most elegant neural solution to the problem of binding events across time. Eichenbaum's late reviews remain more focused and more useful. <u>The brain is indeed a time machine; Buonomano simply never opens the hood.</u>

- title: "The Language Instinct: How the Mind Creates Language"
  type: "book"
  creator: "Steven Pinker"
  creator_role: "by"
  year: 1994
  eval: "meh..."
  image: "/assets/images/thoughts/books/language_instinct.jpg"
  posted: "2020-08-30"
  text: |
    Are there references? The e-book has none at all. A bold move for a book whose central claim, that language is an innate biological instinct shaped by natural selection, has been contested by linguists, anthropologists, and connectionists for three decades. <u>One cannot even check.</u>

    Strip the missing citations away and there is still a problem of tone. ***The Language Instinct*** presents the nativist position with a confidence that reads less like scientific conviction than like salesmanship, as though sheer rhetorical momentum could settle a debate that Chomsky himself never managed to close. <u>The book asks for a faith that science should not require, and without references, faith is all it can offer.</u>

- title: "Enlightenment Now: The Case for Reason, Science, Humanism, and Progress"
  type: "book"
  creator: "Steven Pinker"
  creator_role: "by"
  year: 2018
  eval: "disliked"
  image: "/assets/images/thoughts/books/enlightenment_now.jpg"
  posted: "2020-08-30"
  text: |
    <u>Steven Pinker is the walking definition of confirmation bias: select the data that confirm your thesis, ignore the rest, call the result 'reason'.</u> I checked some of the claims after finishing and felt genuinely deceived, and I am still angry about it. <u>Cherry-picked time periods, poverty lines wielded like stage props, ecological catastrophe waved away with a graph that stops before the trend reverses.</u> When critics point this out he accuses them of 'progressophobia', which is the intellectual equivalent of putting one's fingers in one's ears. Plus there has been recent controversy. I cannot stand this man, approximately the same level of dislike I have for Musk.

    The deeper problem with ***Enlightenment Now*** is not the cherry-picking itself but the rhetorical framework that makes the cherry-picking invisible. Pinker presents data as though data were self-interpreting, as though the mere display of a graph settles an argument. The result is a book that mistakes correlation for causation with the confidence of someone who has confused their own optimism for evidence.

- title: "The Origin of Consciousness in the Breakdown of the Bicameral Mind"
  type: "book"
  creator: "Julian Jaynes"
  creator_role: "by"
  year: 1976
  eval: "loved"
  image: "/assets/images/thoughts/books/origin_of_consciousness_in_the_breakdown_of_the_bicameral_mind.jpg"
  posted: "2020-07-05"
  text: |
    ***The Origin of Consciousness in the Breakdown of the Bicameral Mind*** is probably the book that influenced me most deeply during secondary school, before I had any formal training in neuroscience or philosophy of mind, before I had the vocabulary to say why it mattered. Jaynes's thesis is wild and almost certainly wrong in its specifics: that ancient humans lacked subjective *consciousness* as we know it, that the right hemisphere issued commands experienced as the voices of gods, that the *bicameral mind* collapsed under the weight of societal complexity and the invention of writing. The neuroscience does not hold up. The historical evidence, built largely on the contrast between the *Iliad* and the *Odyssey*, reads too much into linguistic absence. Dennett and others have noted that Jaynes defines *consciousness* so narrowly, as metaphor-based introspective narration, that the argument risks circularity.

    None of this diminishes the book's power. <u>What Jaynes understood, and what has aged remarkably well, is the claim that <em>consciousness</em> is fundamentally metaphorical: that we grasp the inner world through spatial and physical metaphors, that 'seeing' a point and 'grasping' an idea are not decorative language but the very architecture of self-awareness.</u> This anticipates Lakoff and Johnson, Damasio's narrative self, and a whole tradition of *embodied cognition* that Jaynes could not have known was coming. The thesis that metaphor gave birth to *consciousness* is the thread I still pull on.

    Coming back to it now, what strikes me is not the rightness or wrongness of the *bicameral mind* but the audacity of the question. <u>Jaynes asked how <em>consciousness</em> began, not what it is, and in doing so forced everyone who came after him to reckon with the possibility that subjective experience has a history, that it was not always there, that it arrived.</u> I need to re-read it properly someday, with the training I now have. But even the memory of reading it at fifteen, the feeling of an entire framework for understanding the mind snapping into focus, has not faded.
- title: "Entangled Life"
  type: "book"
  creator: "Merlin Sheldrake"
  creator_role: "by"
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/books/entangled_life_chinese.jpg"
  posted: "2024-10-01"
  text: |
    I translated this book by Sheldrake into Chinese, which was published as 《菌络万象》 by HouLang Press in October 2024.

    The translation's release feels long overdue. From childhood memories of Frodo sneakily picking mushrooms in *The Lord of the Rings* (1954), to hiking during my uni years in search of fungi, I have had my share of encounters with the fungal world, but never a way to explore it in depth. So when Editor Fei from HouLang Press reached out more than three years ago to ask whether I would be interested in translating this famed work by Sheldrake, I agreed without hesitation.

    I did not expect that decision to unfold into three years of work. Over that time, my understanding of fungi was turned completely inside out. Abstract terms became tangible structures; within the entanglement and interweaving of mycelium, I found myself tracing systems of communication, rules of life, forms of exchange, and a kind of unity across all things.

    Looking back on this journey, I am especially grateful to my wife for constant encouragement and support; to Editor Fei, whose brilliant editorial care has bordered on the meticulous; to Zhou for rigorous and knowledgeable proofreading; and to Congcong for a cover design full of quiet vitality. This translation only exists because of all of them.


