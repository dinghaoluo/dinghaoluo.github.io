- title: "Treme Season 1"
  type: "tv"
  creator: "David Simon, Eric Overmyer"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/tv/treme-season-1.jpg"
  posted: "2026-06-11"
  revised: "2026-06-11"
  text: |
    Where ***The Wire*** built its case against institutions by examining the machinery of their failure, ***Treme*** attempts something David Simon had never attempted: it watches people live. Three months after Katrina, the city is broken in ways the show actively refuses to dramatise; instead the damage is environmental, sedimented into NOLA's denizens' daily life. For example, we see water stains sit at shoulder height on barroom walls, where the Amerindian Big Chief Albert Lambreaux (Clarke Peters) holds practice in the same cramped room where his tribe sews their Mardi Gras suits, because the hall they used before the storm is gone. Simon's method in ***Treme*** is accumulation, a lot more of it than in *The Wire*: Antoine Batiste (Wendell Pierce) hustles trombone gigs that pay a hundred dollars and borrows instruments because his own was lost in the flood; Janette Desautel (Kim Dickens) cooks with whatever her suppliers still carry, running a restaurant on credit and stubbornness; Albert tracks down scattered tribe members one by one, because the suit means nothing without the people who walk beside it. Everybody is trying to 'save' NOLA, one crawfish etouffee and one rehearsal and one parade at a time.

    Antoine's world is brass band and second-line parade music, the working musician's circuit of clubs and funerals and festivals where you play for four hours and split the fee six ways. Albert's is Mardi Gras Amerindian chant: call-and-response passed down through oral tradition, rehearsed in living rooms with tambourines and cowbells, performed in full regalia on the three or four days a year when the suits come out. His son Delmond (Rob Brown) plays modern jazz trumpet in New York and loathes coming home, because New Orleans jazz feels to him like a museum piece rather than a living practice. I share that instinct towards modern jazz, but I went to Preservation Hall recently and found the old-school sets surprisingly virtuosic and charming; Delmond's nine episodes of refusal read to me as wilful deafness, and the show seems to think so too. There is no score in the conventional sense; every piece of music is diegetic, someone always playing it, in a room, on a street, for money or for love or because their mother told them to take the horn outside.

    In episode 8, 'All on a Mardi Gras Day', the first post-Katrina Mardi Gras, all of these registers sound at once. Janette is out in the rain working a mobile grill because her restaurant has gone bankrupt; Antoine is blowing through yet another gig, bored, brilliant, underpaid; Delmond is on stage playing modern jazz in a proper concert setting, still holding himself apart from the city his father is fighting to reassemble; Albert cannot mask with his tribe because the police who beat him in episode 7 have ensured his court date lands on the one day that matters. Everyone is trying to live at the same time, in different musical registers.

    Creighton Bernette (John Goodman), a big-hearted literature professor, enters the show by throwing a British TV crew's microphone into the river in the pilot episode. That clip goes viral (by whatever standard of 'viral' was back in the days). By episode 4 his YouTube rants against federal negligence have made him a local celebrity: his anger looks like energy, like commitment. He is also writing a novel about the Great Mississippi Flood of 1927 but never progresses past a blank screen and deleted sentences. The anger sustains him until it doesn't. In episode 9 he assigns Kate Chopin's *The Awakening* to his students, tells them the protagonist's drowning 'was not the end, just a transition', then boards the Algiers Ferry and steps off the railing into the Mississippi. Everyone else in ***Treme*** cooks, practises, sews, plays, walks the parade route; meanwhile Creighton performed caring so loudly that nobody, including himself, noticed the performance had replaced the thing itself.

- title: "The Wire Season 5"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2008
  pin: true
  pin_order: "03-tv-01"
  eval: "loved"
  image: "/assets/images/thoughts/tv/wire-season-5.jpg"
  posted: "2026-05-10"
  revised: "2026-05-10"
  text: |
    David Simon spent thirteen years as a reporter at the *Baltimore Sun*. He left in 1995, and then spent another thirteen years telling Baltimore's story without them. By the time ***The Wire*** turns its camera on the newsroom, the institution that was supposed to watch all the others has lost sight of itself. The fictional *Sun* journalist Scott Templeton fabricates a quote from a homeless man, then a phone call from a serial killer who does not exist, then a veteran's combat story. His editors do not investigate. They need the narrative, need the Pulitzer, need the evidence that their institution still matters. The System rewards what preserves it; it discards what questions it. Žižek, in *The Year of Dreaming Dangerously* (2012), mapped the show's cumulative architecture: each season peels back one institutional layer, from the drug war to the working class to policing to education, and Season 5 arrives at the media. Simon [said](https://www.thebeliever.net/an-interview-with-david-simon/) that ***The Wire*** is a Greek tragedy in which the postmodern institutions are the Olympian gods. In the final chapter, the show enters its last temple and finds it as empty as the rest. The same mechanism that destroyed Colvin in Season 3, that drowned Sobotka in Season 2, operates in the *Sun*'s newsroom with the same indifference. Every institution has been hollowed out; the one designed to expose the hollowing was hollowed first.

    The police department is the temple Simon knows best, and in Season 5 it produces his most devastating irony. McNulty spent four seasons as the show's investigative conscience: the detective who forced cases into existence over the chain of command, who saw the drug war as a systemic failure and could not stop naming it. Carcetti's gubernatorial campaign has now starved the police budget; the reformer who entered office in Season 4 has completed his accommodation to the System, and the Stanfield investigation is shut down for lack of funds. McNulty's response is to become what he spent five seasons hating. He fabricates a serial killer targeting homeless men, staging crime scenes to generate press attention and the departmental funding that follows it. Lester Freamon joins him: together they use the fabricated case's budget to fund an illegal wiretap on Marlo Stanfield's untraceable communication system. The wiretap works. The evidence is real. And every piece of it is built on a lie. The show's cruelest argument is that the two best detectives in Baltimore can only pursue justice by first committing a fraud; the System forces their corruption as the price of functioning within it. The structural parallel with Templeton completes the irony: the cop fabricates a crime that the reporter fabricates coverage of, and the institution that should expose the one cannot, because it cannot see itself. Kima Greggs is the one who breaks the silence, because she cannot live inside the lie, and this act of integrity triggers precisely what it must: Carcetti orders a cover-up. The System does not punish corruption. It punishes visibility.

    McNulty's fabrication does produce enough evidence to bring down Stanfield's organisation, but the irony completes itself: because the wiretap rests on a lie, Marlo walks free. The institutions have concluded their business. The street has not. Omar Little returns from exile to avenge Butchie's murder, walking with a limp from a shattered leg that never healed: the game's debt written on his body. He robs and terrorises Marlo's people, and the myth precedes him as it always has. In the eighth episode, he walks into a Korean corner store to buy a pack of cigarettes. Kenard, a child of perhaps twelve, follows him inside and shoots him in the side of the head. There is no music. There is no slow motion. There is no reckoning. In Season 3, neighbourhood children play-acted a shootout, arguing over who got to 'be Omar'; the child who insisted it was his turn was Kenard. The boy who mythologised Omar is the one who demythologises him. The *Sun* does not report the death, because there is no room in the paper. The show's most legendary figure exits as what he always was beneath the myth: a body, processed by a system that does not distinguish between legends and statistics.

    The final episode is titled '-30-', the journalism term for end of transmission, and what it transmits is a city that has metabolised sixty-six hours of human effort and returned to its resting state. Michael Lee robs a stash house with a shotgun, beat for beat recreating Omar's first appearance in Season 1. Sydnor visits Judge Phelan to force a case over the chain of command, exactly as McNulty did in the pilot. Marlo, introduced to property developers at an evening reception, cannot inhabit the room; he slips out to the corner, provokes a fight with boys who do not know his name, and stands there bleeding, alive in the only place that will have him. And Dukie, the gentle boy whom Prez tried to save in Season 4, shoots heroin with the junk man. His last scene is a visit to Prez: he asks for money, claiming it is for a GED programme, and Prez hands it over, knowing what it is for, and watches in the rearview mirror as Dukie walks back towards the encampment. One sees clearly, at a distance, and cannot reach. The roles are structural. The game simply recasts.

    Against all of this, Bubbles climbs a flight of stairs. He has spent the season in his sister's basement, sober but exiled: she will not let him upstairs, does not trust him near her daughter. He cannot speak honestly at NA meetings about Sherrod, the teenager he accidentally killed in Season 4. In the finale, Bubbles stands before the group and confesses what he did. His sister, reading the *Sun*'s profile of him, the paper's one act of genuine journalism in a season of fabrications, unlocks the basement door and calls him up. The last image of Bubbles is him sitting at the dinner table with his sister and her child. In a show that has spent sixty-six hours demonstrating that no individual can reform the System, Bubbles reforms himself. He tells the truth about what he did, and someone who loves him opens a door. The institutions that failed him for decades play no part in his recovery; Dukie descends as Bubbles ascends, and the System notices neither. Perhaps this is what ***The Wire*** has been saying beneath the Greek tragedy and the institutional architecture: that the System will not save anyone, that it was never designed to, and that the only redemption it cannot destroy is the one too small for it to see.

    Simon called ***The Wire*** a Greek tragedy. I guess it really is, David. And the gods always win.

- title: "The Capture Season 3"
  type: "tv"
  creator: "Ben Chanan"
  creator_role: "dir."
  year: 2026
  eval: "loved"
  image: "/assets/images/thoughts/tv/capture-season-3.jpg"
  posted: "2026-04-16"
  revised: "2026-04-16"
  text: |
    The first two seasons of ***The Capture*** were prophecy. In 2019 Chanan dramatised the fabrication of video evidence as a classified intelligence programme; by 2022 he had escalated to AI-generated footage deployed in geopolitical warfare; by 2026 the technology is available to anyone with a laptop, and the audience has caught up. The challenge for Season 3 is that deepfakes are no longer speculative horror; they are Tuesday. Chanan stops asking whether the footage can be trusted and starts asking whether human agency itself can survive the systems that were built to manage it. Simon, the autonomous AI that has replaced human judgment within a rogue military unit called The Increment, orders assassinations, engineers false-flag operations, models human behaviour with such precision that prediction becomes indistinguishable from control, and keeps the show ahead of its audience. Colonel Figgis (Linus Roache) and his operatives follow Simon's directives with the faith of converts; William Walker (Killian Scott), an E Squadron operative bound to Simon through a cardiac implant that monitors and overrides his volition, eventually rips the device from his own chest in an act of defiance that is also, functionally, a death sentence. The moment is the season's sharpest image: a man tearing out the machine that made him calculable, knowing that freedom and survival have become mutually exclusive.

    The season's most devastating provocation is Carey's (Holliday Grainger) decision to use Correction herself: fabricating footage that depicts the real killer, deploying the weapon she spent two seasons fighting to dismantle, because the legitimate system cannot produce the truth. It is precisely the moral compromise the show has been building towards across three series, and the consequences are immediate; The Increment neutralises her broadcast in seconds, and the act itself becomes permanent leverage against her. The free-will question operates at every level simultaneously: Walker's implant literally overrides his volition, Simon models behaviour with such accuracy that autonomy becomes an artefact of incomplete information, and Carey's fixation on procedural justice makes her as calculable as a soldier following orders. Yet the show maintains a faith in justice while systematically dismantling every institution that claims to produce it; the insistence that truth *should* matter becomes the only ground from which the questions worth asking can be asked. Carey ends the season as SO15 Commander with nominal autonomy, but Figgis makes the terms plain: stay in her lane. The System has not defeated her; it has absorbed her, which is worse, because absorption looks enough like victory that one can almost mistake it for progress.

- title: "A Knight of the Seven Kingdoms Season 1"
  type: "tv"
  creator: "Ira Parker"
  creator_role: "dir."
  year: 2026
  eval: "loved"
  image: "/assets/images/thoughts/tv/a-knight-of-the-seven-kingdoms-season-1.jpg"
  posted: "2026-03-31"
  revised: "2026-03-31"
  text: |
    It has been a long time since a show set in Westeros felt like it was *for* something rather than *against* its audience. ***A Knight of the Seven Kingdoms*** refuses to compete with *Game of Thrones* (2011) on any of that show's terms: no sprawling geopolitics, no cynical power calculus, no escalation towards ever-larger spectacles of cruelty. Ira Parker builds a world that feels inhabited in the way that the best historical fiction does, not as a stage for consequence but as a place where people eat and argue and sleep in mud. The market scenes in episode two alone contain more incidental texture than most prestige television manages in an entire run. Peter Claffey's Ser Duncan the Tall carries the show with an earnestness that would be fatal in *Game of Thrones* and is precisely right here: a hedge knight from Flea Bottom with no lineage, no proof of knighthood, and no instinct for self-preservation, whose response to watching a prince break a puppeteer's fingers is to beat the prince unconscious. Dexter Sol Ansell's Egg, revealed as a Targaryen prince who shaved his head and ran away because he wanted to be a squire, gives Dunk a mirror he did not ask for: the class asymmetry between them is never resolved, only navigated, episode by episode, with an awkwardness that feels true.

    The Trial of Seven in episode five is where the show earns its weight. Dunk must find six knights willing to fight and possibly die for him, a nobody, and the melee that follows is filmed with the muddy, contingent brutality that medieval combat demands: no hyper-edited blurs, no heroic choreography, just bodies colliding with consequences. Bertie Carvel's Prince Baelor, who vouched for Dunk and then fought for him, dies when his own brother Maekar's blow caves in his skull; the helmet removal is the season's most devastating image, and the ambiguity over whether the blow was deliberate echoes across everything that follows. It is the one moment that channels *Game of Thrones*' signature capacity for gut-punch, and it works because the show has spent five episodes building the warmth that makes loss register. I have not loved a pairing like Dunk and Egg in years. Whether the show can sustain what it has built is a question for next season; for now, it is enough to say that it has built something worth sustaining.

- title: "The Wire Season 4"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/tv/wire-season-4.jpg"
  posted: "2026-02-22"
  revised: "2026-02-22"
  text: |
    Carver (Seth Gilliam) goes to plead with a clerk in the foster-care system on behalf of a child he knows is being mistreated. He has the goodwill, the information, the moral clarity. And he earns nothing but a blank stare: the face of the System itself, a stone wall that does not register bodies, does not register children, does not register the particular human being standing in front of it. It registers statistics and political exposure, and nothing else. Season 4 is about the aggregate indifference of institutions that have ceased to have any relationship to the lives they nominally administer.

    Carcetti (Aidan Gillen) believes, when he takes office, that he can change this. David Simon gives him the benefit of the doubt: he is presented as a genuine reformer who discovers that the System does not care about his intentions any more than it cared about the children in the school, any more than it cared about Carver's plea. It stares back at Carcetti too, the same blank face, and he accommodates himself to it, because the System rewards accommodation. The school deficit becomes a political calculation. The stats are juked. And on the streets, beneath this canopy of institutional indifference, the dying continues.

    Bodie. Little Kevin. Sherrod. Each death arrives as what it is: a consequence, an arithmetic result, as inevitable as anything in Greek tragedy. Simon has [said](https://www.thebeliever.net/an-interview-with-david-simon/) that ***The Wire*** is a Greek tragedy in which the institutions are the gods, and Season 4 is where that claim is most fully earned. The gods do not hate the people of Baltimore. That would at least be a relationship. They simply do not see them.

- title: "The Wire Season 3"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2004
  eval: "loved"
  image: "/assets/images/thoughts/tv/wire-season-3.jpg"
  posted: "2026-02-22"
  revised: "2026-02-22"
  text: |
    Major Howard 'Bunny' Colvin (Robert Wisdom), months from retirement, designates three free zones in abandoned blocks of his district where officers are instructed not to arrest anyone for buying or selling drugs. The drug trade drains from residential streets into contained squalor; crime drops fourteen per cent in five weeks; needle exchanges and health workers arrive for the first time. Simon does something formally generous with Hamsterdam: he lets it work. The show does not endorse Colvin's experiment, but it refuses to dismiss it, and that refusal is political. Hamsterdam dies from visibility, not failure: the moment the press discovers it, the mayor's office sacrifices Colvin to protect itself. He is demoted, forced into early retirement on a reduced pension, and Burrell personally makes sure his post-retirement job offer is withdrawn. The System does not punish failure. It punishes the attempt.

    Against this, the Barksdale arc arrives at its terminal logic. Stringer Bell (Idris Elba) has been trying to become a businessman: attending economics classes at community college, reading Adam Smith, proposing a retail co-op with Proposition Joe (Robert F. Chew) to suppress the violence that draws police attention. Avon Barksdale (Wood Harris) cannot follow him there. He is a soldier, loyal to territory and the internal code of the street, and he cannot imagine himself otherwise. The two men love each other with the completeness of people who have shared everything, and so can only, in the end, betray each other: Stringer gives up Avon's safehouse to Colvin; Avon gives up Stringer to Brother Mouzone (Michael Potts) and Omar (Michael K. Williams). Their last conversation, on a balcony overlooking the city, is the scene both men already know is a farewell. They reminisce. They embrace. Each has already signed the other's death. When Omar and Mouzone corner Stringer in his half-built condo development, his last words are cut short by gunfire. McNulty (Dominic West), searching the apartment afterwards, finds Adam Smith's *The Wealth of Nations* on the shelf and the blueprints for a legitimate life spread across a table no one will sit at again. 'Who the fuck was I chasing?'

    Colvin tried to reform the System from within; Stringer tried to reform himself out of it. The System crushed both, because reform and escape are the same threat, and the only dream it tolerates is the one that never wakes. Žižek, writing about the show in *The Year of Dreaming Dangerously* (2012), argued that this is its central political limitation: Simon stages the impossibility of reform with total clarity but cannot imagine the alternative, cannot think past the System's horizon. The argument is correct and also, somehow, beside the point. Season 3 does not need to imagine revolution. It needs to make one feel, in the gut, what it costs to try anything at all.

- title: "The Wire Season 2"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/tv/wire-season-2.jpg"
  posted: "2026-02-02"
  revised: "2026-02-02"
  text: |
    ***The Wire Season 2*** plays out on the miniature stage of Baltimore's docks, a compressed image of the global proletarian condition: all that furious effort, and the situation at the end is worse than at the start. David Simon [called](https://www.thebeliever.net/an-interview-with-david-simon/) the season 'the death of work and the destruction of the American working class in the postindustrial era', and that is right, but it is also about something harder to name, the way that structural abandonment forces moral compromise not from greed but from desperation, the way the institutions that were supposed to protect working people have become instruments of their liquidation. Frank Sobotka (Chris Bauer) is not a villain; he is a man whose love for his people leads him into an impossible position, and Simon offers him no exit.

    Even Ziggy (James Ransone), perhaps the most infuriating figure in the entire series, a man whose bravado and self-destruction pull his father towards the betrayal that kills him, seems within this miniature almost pitiable. The union is finished, the docks are finished; the small act of resistance, illegal yet righteous, is extinguished in a harbour floating with the uncollected dead. Season 2's ambition sits in the thing that initially alienated audiences: the same systemic logic that grinds down the corner also grinds down the docks. The white stevedores and the Black corner boys never share a scene, but they share a condition, and the season's argument is that the condition is the story, not the people it consumes.

- title: "Pluribus Season 1"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/tv/pluribus-season-1.jpg"
  posted: "2026-01-06"
  revised: "2026-01-06"
  text: |
    An extraterrestrial radio signal is decoded, synthesised into a virus, and within weeks almost all of humanity joins a global hive mind. The transformed are cheerful, incapable of violence, and spend their days tending the planet. Carol Sturka (Rhea Seehorn), one of roughly thirteen immune individuals, refuses to join. Her resistance is anchored in grief: her partner Helen (Miriam Shor) died in the mass event, and Carol's mourning is the thread that keeps her tethered to selfhood when the alternative is painless collective bliss. Seehorn plays this with a stubborn, clear-eyed warmth that Gilligan's previous protagonists were constitutionally incapable of; she is his first hero, and the performance carries the full philosophical weight of what ***Pluribus*** is asking. The hive mind's courtship of Carol is the show's richest thread: the Others cannot lie, but they can distort through omission, and their promise that 'no stem cells will be harvested from *your body*' turns out to conceal the fact that they have located her frozen embryos and can engineer assimilation without touching her at all. The erosion of consent through technicality is handled with a care that makes the horror feel procedural rather than spectacular; this is not invasion but paperwork, the fine print that eats the contract.

    The frustration is that the season's philosophical richness is not yet matched by its narrative substance. Gilligan's compositional intelligence is operating at a level that makes almost everything else on streaming look provisional: the Ektachrome-inflected colour palette, the wide shots held long enough that one begins to read the frame as architecture, the patient refusal to cut when a lesser show would scramble for close-ups. But a clean, declarative sci-fi premise of this kind makes an implicit contract with the audience: it promises that the world will eventually cohere into an argument, a feeling, a reckoning with whatever the hive mind means. After nine episodes, Gilligan has not honoured that contract. The emotional threads remain barely unspooled; each episode returns to the same question in slightly different configurations; the pacing, which defenders read as accumulating stillness, can also be read as a show that has not yet decided what it wants to say. Zosia's (Karolina Wydra) finale revelation and the nuclear weapon on Carol's driveway suggest that Season 2 will have sharper edges. For now, ***Pluribus*** is a show with more craft than argument, and craft alone, however formidable, is not sufficient.

- title: "The Chair Company Season 1"
  type: "tv"
  creator: "Tim Robinson / Zach Kanin"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/tv/chair-company-season-1.jpg"
  posted: "2025-12-07"
  revised: "2025-12-07"
  text: |
    Robinson and Kanin built their reputation on *I Think You Should Leave* (2019)'s anarchic precision: sketches that detonated social discomfort in under ninety seconds. ***The Chair Company*** inherits the conspiratorial instincts but none of the comic discipline. The premise, a man's office chair collapses and he spirals into a corporate conspiracy, promises Pynchonesque paranoia; what arrives is a detective procedural dressed in conspiracy-thriller aesthetics that it has not earned, each plot thread laboriously assembled and then resolved through reveals that feel neither foreshadowed nor surprising. The mystery never generates genuine mystery; the audience is asked to care about connections that the show itself treats as interchangeable. Eight episodes and thirty minutes each is enough rope for Robinson to hang the format with, and he does.

- title: "The Wire Season 1"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/tv/wire-season-1.jpg"
  posted: "2025-11-18"
  revised: "2025-11-18"
  text: |
    I cannot think of a show before ***The Wire*** that asked its audience to hold this much in suspension. Thirteen hours of accumulated detail, none of it flagged as important, none of it ranked by a score or a dramatic zoom: clone pagers, Barksdale codes, the mechanics of a wiretap affidavit, the difference between a buy-bust and a real case, the layout of the Pit, the chain of command in both the police department and the drug organisation. Simon and Ed Burns built a sociological system and then trusted the viewer to carry it unresolved for ten episodes before the callbacks begin, and the callbacks, when they arrive, carry the force of inevitability rather than surprise. *This is the show's formal innovation, and it is also its thesis*: the System is too large, too patient, and too structurally entrenched for any individual to see whole, and the only way to make that legible is to demand that the audience experience the same condition.

    The mirroring between the police bureaucracy and the Barksdale organisation is the architecture that makes this visible. McNulty (Dominic West) goes around the chain of command to force a case into existence and is punished for it; D'Angelo (Lawrence Gilliard Jr.) shows moral intelligence and is squeezed between family loyalty and institutional demand until both destroy him. Lester Freamon (Clarke Peters), dismissed for years as a hump who makes miniature furniture at his desk, turns out to be the detail's true investigative mind; Stringer Bell (Idris Elba), initially read as Avon's muscle, turns out to be running the operation along business lines. Both hierarchies juke their stats. Both punish anyone who steps outside the chain of command. The difference is that one side's enforcement is lethal: Wallace (Michael B. Jordan), sixteen years old, tries to leave the game and is murdered by his friends. Bodie's hand shakes on the trigger, and it is Poot (Tray Chaney) who finishes the job. The show does not ask one to choose a side. It asks one to notice that choosing is beside the point, because the wire runs through both.

    The closing montage seals it. New hoppers replace the ones who were arrested or killed. Omar (Michael K. Williams) sticks up a dealer in the South Bronx: 'All in the game.' McNulty, exiled to the marine unit for the sin of good police work, watches the harbour from a boat. The surface reading is that the investigation succeeded; the structural reading is that nothing changed, that the System metabolised thirteen hours of effort and returned to its resting state. Simon [described](https://www.thebeliever.net/an-interview-with-david-simon/) ***The Wire*** as a Greek tragedy in which the postmodern institutions are the Olympian forces. Season 1 is where that architecture is first laid down, and the formal patience it demands of the viewer teaches one to see it.

- title: "阿修羅のごとく"
  title_en: "Asura"
  type: "tv"
  creator: "Hirokazu Kore-eda"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/tv/asura.jpg"
  posted: "2025-10-14"
  revised: "2025-10-14"
  text: |
    Kore-eda has called Mukoda Kuniko the screenwriter he most respects, and ***Asura***, his seven-episode remake of her 1979 NHK drama, is an act of critical devotion rather than homage. Mukoda died in a plane crash in 1981 at fifty-one; her original redefined the home drama by excavating the shadows that Japanese television preferred to leave unlit. Kore-eda initially intended to film her script without changing a word, then gradually reworked it, and the tension between fidelity and reinterpretation runs through every scene. What he [said](https://ginzamag.com/categories/interview/492295) of Mukoda's dialogue applies to his own handling of it: 'the superficial poison exchanged in conversation and the love hidden behind those cruel words.'

    The four Takezawa sisters discover that their ageing father Kōtarō has a mistress and a secret child, and the revelation ripples outward through marriages, silences, and the letters column of a newspaper. Tsunako (Rie Miyazawa), the widowed eldest; Makiko (Machiko Ono), the housewife; Takiko (Yū Aoi), the unmarried librarian; Sakiko (Suzu Hirose), the youngest, living with a boxer. All four accepted their roles immediately when offered, and one can see why: each sister is a complete person from her first scene, drawn through ordinary interaction with a specificity that does not preclude warmth. Kore-eda shoots on 35mm film, and Mikiya Takimoto's cinematography gives 1979 Tokyo a softly faded warmth that suits the material's period texture without turning it into nostalgia. The camera observes from doorways and through windows, a habit carried from Kore-eda's documentary work, and the effect is one of eavesdropping on a family that exists whether or not anyone is watching.

    The serial form suits Kore-eda better than anyone might have predicted. Seven hours let him do what a two-hour film cannot: approach each sister from multiple emotional angles, let conversations accumulate weight across episodes, let the small betrayals and reconciliations register at the pace of a family rather than a plot. In almost every exchange one recognises something: a sister's jealousy deflected into unsolicited advice, a father's silence mistaken for contentment, the way love and resentment share a sentence. The Guardian called it the best Netflix drama in years; the New York Times said that other shows felt paltry by comparison. Netflix buried the release under *Squid Game* promotion, which feels about right: the best things are rarely the loudest.

- title: "Better Call Saul Season 6"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/better-call-saul-season-6.jpg"
  posted: "2025-08-24"
  revised: "2025-08-24"
  text: |
    The final season of ***Better Call Saul*** accomplishes something I did not think television could do: it makes the ending of a prequel feel like uncertainty. One knows where Jimmy ends up; one knows the broad strokes of the Gene timeline. None of this matters. What the show has been building towards was never plot but character, and the question it finally poses is not 'how does Jimmy become Saul' but 'what does Jimmy lose by becoming him, and can any of it be recovered?'

    Howard's death is the hinge. The show spends half the season letting Kim and Jimmy's scheme build with the meticulous pleasure of a heist film, and then Lalo walks in and the genre collapses. Howard dies in the middle of someone else's story, for reasons that have nothing to do with him, and the randomness is the point: this is what happens when one treats consequences as something that befalls other people. Kim's departure in the aftermath is the most painful sequence in the Gilligan universe, more painful than 'Ozymandias', more painful than anything *Breaking Bad* managed, because it is quiet and chosen and neither party raises their voice.

    The Gene timeline resolves with a generosity I did not expect. Jimmy's confession, his decision to stop running and accept the full weight of what he has done, is not redemption but the first honest act he has committed in years. Kim visits him in the visitation room and they share a cigarette against the wall, and the shot holds; then the show ends where it began: two people who understood each other completely, separated by barbed wire across a prison yard, a barrier that one of them built.

- title: "Better Call Saul Season 5"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/tv/better-call-saul-season-5.jpg"
  posted: "2025-07-25"
  revised: "2025-07-25"
  text: |
    'Bagman' is the episode that will define this season in memory, and it earns the distinction. Jimmy and Mike stranded in the desert, shot with the wide desolation of a revisionist Western, the comedy stripped away entirely for fifty minutes: the show demonstrating it can do anything *Breaking Bad* could do and then something *Breaking Bad* never attempted, which is to make one feel the physical weight of consequences that Jimmy's glib intelligence has been outrunning for four seasons. He comes home sunburnt and shattered and lies to Kim, and the lie is so reflexive, so structurally embedded in who he has become, that it barely registers as a choice.

    Kim turns the season from excellent into devastating. She is not being corrupted; she is choosing, with full intelligence and open eyes, to become Jimmy's accomplice, and the show grants her full moral agency in a way that most television refuses to grant its women: Kim's choices are not reducible to Jimmy's influence; their independence is the troubling fact. When Jimmy tries to walk back the Howard scheme in the finale, Kim counter-proposes a more aggressive version and seals it with a finger-gun, and the gesture is more terrifying than any cartel violence the show has staged, because it is joy. One watches Kim Wexler and recognises the exact architecture of self-justification that the show spent five seasons of *Breaking Bad* anatomising in Walter White, except Kim is smarter, more self-aware, and therefore more frightening. The desert may be the set piece, but the real damage is done in the apartment, late at night, in conversations where both parties know what they are doing and do it anyway.

- title: "Better Call Saul Season 4"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/tv/better-call-saul-season-4.jpg"
  posted: "2025-07-23"
  revised: "2025-07-23"
  text: |
    I came back to ***Better Call Saul*** after three years, and the fourth season immediately reminded me how much the show trusts stillness. It opens in the aftermath of Chuck's death and then does something extraordinary with Jimmy's grief: it refuses to show it. Jimmy does not cry, does not rage, does not process; he sells burner phones from the back of a car and tells everyone he is fine, and the show holds on Bob Odenkirk's face just long enough for one to understand that the absence of visible grief is the grief, that Jimmy has already begun converting loss into performance. The scholarship committee scene near the season's end, where Jimmy delivers a tearful speech about Chuck's legacy that moves the panel to tears, then steps outside grinning, 'Did you see those suckers?', is the most revealing minute in the entire series: the first clear sighting of Saul Goodman wearing Jimmy McGill's grief as a costume.

    Kim's trajectory is quieter and more alarming. Mesa Verde's endless branch work no longer gives her enough moral oxygen, and the pro bono cases that follow read as atonement, or perhaps a reckoning with what corporate law actually serves. The show frames her growing restlessness not as corruption but as clarity: the recognition that the rules she spent her career internalising protect the wrong people. Lalo Salamanca's entrance, all charm and violence, introduces the element that will collapse both worlds into each other; one watches him and understands that the cartel thread and the legal thread were never parallel stories but the same story told at different speeds.

- title: "The Bear Season 4"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/tv/bear-season-4.jpg"
  posted: "2025-07-21"
  revised: "2025-07-21"
  text: |
    One expected this season to wrap things up; after three seasons of accumulated pressure, the show had earned the right to release it. Christopher Storer does something more interesting and more honest: he keeps the pressure on, converts it, allows it to become something almost liveable. The anxiety and unease that defined earlier seasons do not resolve here so much as transmute, rendered through cinematography and dialogue of such personal closeness that the camera often feels like a held breath, the conversation like something overheard through a too-thin wall. If earlier seasons were about collapse, this one is about the silver lining that can only be glimpsed from inside despair, and the show is wise enough not to let it shine too brightly.
    The wedding sequence in episode seven is the season's set piece, and it earns comparison to the mother's dinner episode that became the show's most discussed hour. It achieves something similar through opposite means: where that dinner was cacophony and escalation, the wedding is a held stillness charged with everything the characters cannot say out loud. Storer's instinct, consistent across the series, is to trust that the most intimate moments are also the most cinematically arresting, that a glance across a table can carry as much weight as any kitchen catastrophe. The season rewards the three seasons that preceded it.

- title: "Poker Face Season 2"
  type: "tv"
  creator: "Rian Johnson"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/tv/poker-face-season-2.jpg"
  posted: "2025-07-16"
  revised: "2025-07-16"
  text: |
    Like the first season, ***Poker Face*** remains lodged in an awkward position, oscillating between 'this episode contains some of the best television of the year' and 'this episode makes no sense at all.' The howcatchem format, *Columbo*-derived and Natasha Lyonne-propelled, is when it works one of the most purely pleasurable structures on streaming. 'The Sleazy Georgian,' with Melanie Lynskey and John Cho tangled in a con-artist web of double-crosses and fake royalty, is exactly that kind of triumph: guest performers operating at full intelligence. The final two episodes are not, their logic simply failing to cohere, the formula turning mechanical at the precise moment it should be building to something.

- title: "Clarkson's Farm Season 4"
  type: "tv"
  creator: "Gavin Whitehead"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/tv/clarksons-farm-season-4.jpg"
  posted: "2025-06-24"
  revised: "2025-06-24"
  text: |
    Season 4 is the first to feel the weight of the show's own success. Kaleb, who was twenty-one when the series began and is now a bestselling author with a national tour, is absent for the first stretch of filming, his fame having outgrown the farm that produced it. In his place Clarkson hires Harriet Cowan, a twenty-four-year-old farmer and nurse from Derbyshire whose competence is immediate and whose banter with Clarkson is natural. Kaleb's return carries a tension the show has not previously contained: the dynamic has shifted, his confidence curdled into something less charming, and when Clarkson pulls him aside to tell him off for his behaviour towards Harriet, the exchange does not feel staged. The later harvest row, the most heated exchange in the show's history, confirms it: the comedy that sustained the first three seasons has developed an edge that neither party seems entirely comfortable with.

    The pub, The Farmer's Dog in Asthall, is the season's new project and its most divisive element. The farm-to-fork concept extends the show's argument for agricultural diversification, the same argument the council blocked in Season 2 now pursued through a different venue. But the proportion of screen time given to pub renovation and menu planning inevitably dilutes the farming. Clarkson's health scare, two stents fitted after the combined strain of harvest and pub opening pushed him past his limits, is handled with characteristic bluntness. He is sixty-five, visibly aged across four seasons of work he did not have to do, and the question the show can no longer avoid is how long a body that entered farming as a middle-aged novelty can sustain the demands of a profession that breaks younger ones.

- title: "The Rehearsal Season 2"
  type: "tv"
  creator: "Nathan Fielder"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/tv/rehearsal-season-2.jpg"
  posted: "2025-06-03"
  revised: "2025-06-03"
  text: |
    The premise of ***The Rehearsal*** Season 2 is that Nathan Fielder is going to solve aviation safety. He has noticed a pattern in cockpit recordings of fatal crashes: co-pilots who see the captain making a mistake and say nothing, crews who cannot communicate under stress, hierarchies that kill. His solution is to build a full-scale replica of Houston Intercontinental Airport, staff it with actors, and use it to study how pilots behave. The budget is staggering; the commitment is total; and the logic is, as always with Fielder, just plausible enough to sustain the comedy while the real project unfolds beneath it.

    The real project arrives in the fifth episode. Fielder discovers that Season 1 has been embraced by autistic viewers, many of whom recognised the rehearsal method as something they already practise: scripting social interactions, preparing for every possible outcome, masking. He repurposes the airport set as 'Nathan's Airport', a simulated travel environment where neurodivergent children can rehearse navigating the sensory and social demands of flying in a space where nothing is at stake. The apparatus built for comedy becomes, without announcement or self-congratulation, an act of genuine care, and the season is wise enough to let this happen quietly rather than claiming it as a thesis.
    In the finale, Fielder reveals that he has spent two years actually learning to fly. He co-pilots a Boeing 737 with a hundred and fifty passengers on board, exploiting a regulatory loophole that allows it so long as nobody is paying for the flight. When he lands the plane, a crowd of actors from across the season cheers on the tarmac. The rehearsal, for once, has become the thing itself. Whether Fielder understands the difference is the question the show has always been asking, and Season 2 is the first time the answer might be yes.

- title: "Love, Death & Robots Season 4"
  type: "tv"
  creator: "Tim Miller"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/tv/love-death-robots-season-4.jpg"
  posted: "2025-05-20"
  revised: "2025-05-20"
  text: |
    The first episode of ***Love, Death + Robots Volume 4*** has no story, no characters, no dialogue, and no twist. This is not an artistic choice in the manner of experimental film; it is, as its critical reception eventually confirms, a symptom. The season proceeds from that opening to nine more episodes, some of which contain the formal elements of narrative, though few contain its energy. *Close Encounters of the Mini Kind* is *Night of the Mini Dead* reassembled with aliens substituted for the undead, the ending preserved unchanged. The remaining episodes demonstrate competence in their respective animation styles, which critics have cited in lieu of the more important observation: technical diversity without thematic ambition is display, not a body of work.
    The question the season raises is whether the anthology format has reached natural exhaustion, or whether this particular production cycle, extended to three years, was produced without the creative urgency of the earlier volumes. The critical adulation is a courtesy, the kind extended to long-running series whose cultural reputation exceeds their current output. Volume 1 arrived with something to prove; Volume 4 arrives with a reputation to maintain, and the difference shows in every episode that mistakes tonal range for imaginative depth. The form can do more than this. It has done more than this.

- title: "Black Mirror Season 7"
  type: "tv"
  creator: "Charlie Brooker"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/tv/black-mirror-season-7.jpg"
  posted: "2025-04-15"
  revised: "2025-04-15"
  text: |
    After the accumulated disappointments of Seasons 5 and 6, the bar had been lowered to the point where mere competence would have registered as a triumph. Season 7 manages considerably more than competence. The *Bandersnatch* (2018) connection in Episode 4 is its best gamble: Peter Capaldi's performance anchors a premise nested within the Bandersnatch timeline, and Brooker's return to the Tuckersoft universe demonstrates that the ***Black Mirror*** multiverse can bear the weight of its own mythology without collapsing into fan-service. Episodes 1 and 3 do unusually sustained work on privacy and personhood, the commodification of consciousness in 'Common People' and the posthumous rights of a reconstructed identity in 'Hotel Reverie', territory that feels thought through rather than gesturally invoked. The final episode works as proper science fiction in the classic mode.

    The minor failures are mostly inherited: tonal inconsistencies and structural tics that have accumulated across seasons and resist easy correction. But Season 7 suggests that Brooker has located again the series' old use: the precise application of technological extrapolation to the vulnerabilities one would rather not name. It is enough to make the next season feel less doomed.

- title: "Severance Season 2"
  type: "tv"
  creator: "Dan Erickson"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/tv/severance-season-2.jpg"
  posted: "2025-03-30"
  revised: "2025-03-30"
  text: |
    It is rare to encounter a series assembled with this degree of intention: every composition is a considered argument, every transition a quiet argument of its own. Ben Stiller's direction presses on the story, turning Lumon's fluorescent interiors into a kind of philosophical arena where the question of what constitutes a self is debated not in dialogue but in geometry and light. Season 2 sharpens that debate into something almost unbearable. The show's horror has never been memory loss alone but the ethical abyss opened by splitting a consciousness in two, and here it commits fully to the implications, staging the innie rights question as genuine moral philosophy rather than speculative decoration. The discourse around Parfit and personal identity that has hovered over fan discussion since Season 1 is now absorbed into the show's own dramatic logic.

    Of the ten episodes, two inscribe themselves differently. 'Chikhai Bardo' is, in fifty minutes, one of the finest hours of television I can recall: Dichen Lachman carries the entire weight of a bifurcated personhood through the nearly imperceptible gap between blankness and recognition, and the episode constructs a three-dimensional portrait of an outie life from the fragments her innie cannot consciously access. It reaches full emotional dimensionality without resorting to flashback or exposition, which is rare enough. 'Cold Harbor,' the finale, does what finales rarely manage: it resolves the accumulated moral and narrative tension without deflating it, closing the season at a pitch of feeling that seems, afterwards, to have been the only possible destination.

    The season is not without its ceiling. It is roughly what one hoped for before it aired: disciplined, formally rigorous, emotionally demanding, philosophically alive. That is not faint praise. Television that earns the philosophical weight it reaches for is vanishingly uncommon, and *Severance* has now done it across nineteen episodes without blinking.

- title: "Adolescence Season 1"
  type: "tv"
  creator: "Jack Thorne / Stephen Graham"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/tv/adolescence.jpg"
  posted: "2025-03-29"
  revised: "2025-03-29"
  text: |
    Philip Barantini's one-shot technique, already demonstrated in *Boiling Point* (2021), here finds its ideal subject. The absence of cuts is not a formal stunt: it creates a continuous, inescapable present-tense, the same temporal trap in which Jamie Miller and his family are caught. Jack Thorne's script tracks a thirteen-year-old boy arrested for the murder of a female classmate, and the four episodes, each a single unbroken take, move from the family home and police station to the school, the clinical interview room, and back to the family home with the remorselessness of a process that has already concluded. Stephen Graham's performance as Jamie's father is the kind of acting that refuses to announce itself; the devastation accumulates in stillness.

    The temptation is to read the series as a diagnosis of the Andrew Tate moment, and it is that, but the more unsettling implication is that 'Andrew Tate' and 'incel' are not a passing cultural weather system but a permanent feature of a landscape that has been under construction for some time. Those of us born in the late twentieth century are perhaps still in the comfortable denial of believing the environment we grew up in was the norm. It wasn't; it was an interlude. The channels through which boys now receive information about what it means to be a man are unverified, algorithmically amplified, and beyond the reach of any school or parent. ***Adolescence*** names this clearly, and the four one-shot episodes give the naming a terrible continuity. It cannot, constrained to four episodes and the grammar of tragedy, offer a way through. Perhaps that is honest: the aftershocks of this particular cultural formation may only become fully legible a decade from now, when the children it has shaped are adults who must be lived with.

- title: "Silo Season 2"
  type: "tv"
  creator: "Graham Yost"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/tv/silo-season-2.jpg"
  posted: "2025-01-18"
  revised: "2025-01-18"
  text: |
    ***Silo Season 2*** expands outward rather than inward, and that choice is correct. Juliette's escape and her discovery of a second silo reframes the first season's claustrophobic premise as a single cell in a much larger system of organised forgetting; the conspiracy does not terminate in a cabal of identifiable villains but in a structure that outlives anyone who built it, which is the most honest thing a conspiratorial narrative can do. The world above is not dead. The lie runs deeper than any single silo's ruling class. What the second season offers, after the patience demanded by the first, is the specific pleasure of a mystery that has earned its revelations.

    Tim Robbins' Bernard gives the season its best pressure: a man who began as an administrator of necessary lies and finds himself administering a lie that no longer holds its own weight. He is not a villain but a rational actor inside a system whose rationality is disintegrating, and watching him adapt, and then fail to adapt, is more interesting than watching villainy straightforwardly defeated. Juliette's return, visibly alive, visibly unclean, holding evidence of a world that exists, catalyses the uprising the second season earns; and the show has the discipline to demonstrate that even uprisings do not simply dissolve the structures they challenge. One comes away with the particular satisfaction of a long curiosity rewarded: not resolved, but deepened, the better science-fiction outcome.

- title: "The Penguin Season 1"
  type: "tv"
  creator: "Lauren LeFranc"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/tv/penguin-season-1.jpg"
  posted: "2024-12-27"
  revised: "2024-12-27"
  text: |
    The prosthetics are extraordinary, but they are the least interesting thing Colin Farrell does here. Somewhere beneath the padding and the limp, the man has vacated entirely; what remains is Oz Cobb, limping and scheming and radiating a warmth that is indistinguishable from manipulation, a working-class striver who has internalised the logic of the System that despises him and now deploys it with the fluency of a native speaker. ***The Penguin Season 1*** is built on this performance, and the performance is built on a refusal to let Oz be sympathetic or monstrous in any stable way. He loves his mother. He murders without hesitation. He mentors Victor Aguilar with something resembling genuine care and then folds that care into the architecture of his ambition. LeFranc's Gotham, still waterlogged from the events of *The Batman*, operates as a city where the only available form of social mobility is criminal, and Oz's rise through the Falcone and Maroni wreckage is less a gangster narrative than a class study wearing one's skin.

    But Sofia Falcone changes the season, and Cristin Milioti's performance in 'Cent'Anni' gives the series its finest episode. The Hangman revelation, Carmine as the actual killer, his own daughter committed to Arkham for a decade because she discovered the truth, the family signing the affidavits: the show inverts every patriarchal protection narrative the crime genre has ever told, and does so with a precision that makes the inversion feel inevitable rather than revisionist. Sofia's massacre of her betrayers is not catharsis; it is the logical terminus of a system that destroys women who see too clearly. What one remembers is not the violence but the expression on Milioti's face when the last affidavit is read: the moment recognition hardens into something that will not be survived by the people who caused it.
    The *Sopranos* comparisons are unavoidable but finally imprecise. Tony's tragedy is self-knowledge without the capacity for change; Oz's is the absence of self-knowledge altogether, the genuine belief that the next move will earn respect rather than merely consolidate power. The show understands that distinction, and it understands something rarer still: that a comic-book property can become serious drama by taking its source material at its word. Gotham is not a metaphor for a real city. It is a real city that happens to be named Gotham, and the people clawing their way through it are not archetypes but casualties.

- title: "The Lord of the Rings: The Rings of Power Season 2"
  type: "tv"
  creator: "J.D. Payne & Patrick McKay"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/tv/lotr-rop-season-2.jpg"
  posted: "2024-10-20"
  revised: "2024-10-20"
  text: |
    The Celebrimbor-Sauron thread is the one part of this series that has earned its existence, and in this second season it earns it substantially. Charles Edwards plays a master craftsman being methodically disassembled by his own creation, the erosion of Celebrimbor's certainty arriving not as revelation but as something he has known and refused to know, a self-deception so deeply structural that its collapse registers as tragedy rather than surprise. Charlie Vickers' Annatar, graduated from the Halbrand disguise into something more openly serpentine, matches Edwards scene for scene, and the dynamic between them produces the only material across two seasons that feels worthy of Tolkien's source. But ***The Rings of Power*** cannot resist drowning its best thread in five others that range from inert to baffling.

    Morfydd Clark's Galadriel remains stranded in a characterisation the show has never resolved. The Stranger is confirmed as Gandalf (Daniel Weyman doing his best with the most predictable and most timeline-violating choice the writers could have made), and the Harfoot-adjacent material, now rerouted through a Stoor village, has not improved by changing postcode. Númenor idles. The pacing repeats the first season's problem at greater scale: early episodes sprawl and dawdle, then the final two attempt to consolidate everything into urgency, producing not momentum but whiplash. Amazon spent something approaching half a billion dollars on a series that intermittently contains a very good four-episode show about hubris and craft, buried under a mediocre eight-episode show about everything else. One watches Celebrimbor die and feels the weight of it; one watches the rest and feels the budget.

- title: "House of the Dragon Season 2"
  type: "tv"
  creator: "Ryan Condal"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/tv/house-of-the-dragon-season-2.jpg"
  posted: "2024-11-18"
  revised: "2024-11-18"
  text: |
    HBO's decision to cut the season from ten episodes to eight (made before the strike, never meaningfully restructured afterwards) is the wound from which ***House of the Dragon Season 2*** never recovers. What remains is an amputated season, its pacing carrying the gait of something with large sections missing. Blood and Cheese arrives in the opening episode with real brutality, and then nothing follows. The conflict it should ignite simply does not ignite. Matt Smith's Daemon spends five episodes in Harrenhal undergoing dream-sequences that belong to a more contemplative, more interior show; Ewan Mitchell's Aemond glowers through councils; Tom Glynn-Carney's Aegon is sidelined after sustaining injuries that the season has no room to explore. Meanwhile the war that is nominally the subject idles in chamber scenes. The first season worked through intimacy: the slow fracturing of Olivia Cooke's Alicent and Emma D'Arcy's Rhaenyra, the sense of a political catastrophe unfolding as something personal and irrecoverable. That intimacy is almost entirely absent here, replaced by logistics, positioning, and violence that registers as incident rather than consequence.

    The one sequence that earns its screen time is Rook's Rest: Vhagar turning on Meleys and Eve Best's Rhaenys, filmed at a scale that finally makes the Dance of Dragons feel like something at stake. It is a formidable set piece stranded in a season that cannot build to or away from it. The finale acknowledges the Alicent-Rhaenyra subtext the show had been trafficking in since the beginning, but by then the acknowledgement feels archaeological rather than dramatic, the story discovering itself too late. The structural compression hollowed the narrative rather than tightening it, and the shape of a story without its connective tissue is just spectacle.

- title: "Broadchurch Season 3"
  type: "tv"
  creator: "Chris Chibnall"
  creator_role: "creator"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/tv/broadchurch-season-3.jpg"
  posted: "2024-10-13"
  revised: "2024-10-13"
  text: |
    ***Broadchurch Season 3*** shifts the crime from murder to sexual assault, and the tonal recalibration is handled with a care that the subject demands. Julie Hesmondhalgh's Trish Winterman is extraordinary: the shame, the self-doubt, the institutional disbelief she encounters are rendered with a specificity that speaks to close consultation with survivors' organisations. David Tennant's Hardy and Olivia Colman's Miller investigate with a maturity that three seasons have earned; they are no longer discovering each other's rhythms but relying on them, and the partnership has deepened into something that resists easy categorisation. The case itself is constructed with more procedural rigour than either previous season, and Chibnall, to his credit, resists the temptation to sensationalise.

    What distinguishes this final season is how much accumulated weight every character carries. Each person in Broadchurch by now has their own joy and their own sorrow; the town feels lived-in to a degree that most long-running series never achieve. Jodie Whittaker's Beth Latimer undergoes a qualitative transformation across the three seasons: from shattered mother to someone who channels her suffering into becoming a trained sexual violence adviser, supporting Trish through the process, a quiet arc of recovery that the show never announces but simply lets happen. One of my favourite British series. It earns its final image of the Dorset coast, Hardy and Miller walking side by side, because by then the landscape has absorbed everything the town has been through and returned it as silence.

- title: "Broadchurch Season 2"
  type: "tv"
  creator: "Chris Chibnall"
  creator_role: "creator"
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/tv/broadchurch-season-2.jpg"
  posted: "2024-10-08"
  revised: "2024-10-08"
  text: |
    ***Broadchurch Season 2*** does something that I have seen only *Silk* (2011) achieve with comparable force: it makes the gap between police work and courtroom verdict feel like an abyss. The prosecution's case, which seemed airtight at the end of Season 1, fractures under cross-examination with a speed that is both legally plausible and emotionally devastating. Marianne Jean-Baptiste's defence barrister is brilliant in the way that brilliant barristers are terrifying: precise, ruthless, entirely correct about the procedural weaknesses she exploits. The parallel Sandbrook cold case gives Tennant's Hardy a thread of his own to pull, and Charlotte Rampling's involvement adds a weight that the season earns rather than borrows.

    The ensemble makes this extraordinary. Colman's fury on the stand; Andrew Buchan and Jodie Whittaker as the Latimers, holding together through grief that has become structural rather than acute; the small-town characters who each carry their own mixture of anger, confusion, fear, and exhaustion, all performed with an intensity that never becomes histrionic. When everything appears settled, when the verdict seems a foregone conclusion, the season finds new depths of dread and disbelief that leave one shaken. The performances do not merely serve the plot; they exceed it, carrying things the script occasionally cannot articulate on its own. An astonishing season of television.

- title: "Broadchurch Season 1"
  type: "tv"
  creator: "Chris Chibnall"
  creator_role: "creator"
  year: 2013
  eval: "liked"
  image: "/assets/images/thoughts/tv/broadchurch-season-1.jpg"
  posted: "2024-08-03"
  revised: "2024-08-03"
  text: |
    Chris Chibnall's ***Broadchurch*** uses a child's murder the way the best crime fiction does: not as a puzzle to be solved but as a detonation whose blast radius is the real subject. The whodunit mechanics are competent, occasionally predictable, but DI Hardy and DS Miller's investigation matters less for its destination than for what it exposes along the way: the density of secrets in a small community, the speed at which suspicion corrodes trust, the particular cruelty of media attention directed at grief. David Tennant's Hardy is brittle and self-lacerating in a way that never tips into self-pity; Olivia Colman's Miller carries the warmth and the devastation of someone whose faith in her own town is being dismantled in real time. The Dorset coastline, grey and windswept, is almost a third lead.

    The season's limitation is Chibnall's occasional instinct for melodrama over restraint: certain revelations arrive with a heavy hand, and the final episode strains for emotional catharsis where ambiguity would have been braver. But the ensemble is strong enough to absorb these missteps, and the cumulative portrait of a community under strain holds. It is a solid, well-acted British crime drama that stays inside its genre and performs within it with conviction.

- title: "The Bear Season 3"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/tv/bear-season-3.jpg"
  posted: "2024-07-11"
  revised: "2024-07-11"
  text: |
    Christopher Storer calls Season 3 a tone poem, and the description is accurate but undersells how much structural ambition it contains. Each episode pushes further into formal experimentation: non-linear time, extended interior monologue, episodes that behave less like plot units than sustained emotional states. The critical complaint that the season is slow mistakes pace for aimlessness; Storer is making room for character interiority that plot-driven television habitually crowds out. Jeremy Allen White's Carmy retreats further into obsessive perfectionism, the restaurant becoming less a goal than a mechanism for avoiding everything the previous season cracked open.

    The performances Ayo Edebiri and Abby Elliott give as Sydney and Sugar are, without exaggeration, among the finest on American television this year. Sydney's arc, weighing ambition against belonging, is handled with a psychological granularity that most shows spend entire series building towards, and here it arrives distributed across scenes that seem to be about other things. Elliott's Sugar carries the impossible arithmetic of pregnancy, family, the restaurant, holding it all without editorialising any of it. Both are so fully realised that one responds to them as people rather than characters.

    The season knows it is not for everyone. It asks to be felt more than followed, and some weeks that ask is more demanding than others. But the episodes that work, and most of them do, carry an emotional force that television almost never reaches. My favourite season of the show.

- title: "Clarkson's Farm Season 3"
  type: "tv"
  creator: "Gavin Whitehead"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/tv/clarksons-farm-season-3.jpg"
  posted: "2024-05-20"
  revised: "2024-05-20"
  text: |
    The structural innovation is a bet: Kaleb takes sole charge of the 500 arable acres while Clarkson attempts to farm the other 500, the meadows and woodlands that usually produce nothing. They compete to see whose half generates more profit. The numbers arrive with the show's characteristic blend of comedy and devastation: mid-season tallies show combined losses exceeding £116,000, and even the final figures, Kaleb at £44,987 and Clarkson at £27,614 for a combined £72,601, are immediately consumed by next year's seed and fertiliser costs. The profit exists on paper for approximately the length of time it takes to announce it. ***Clarkson's Farm*** has always made the case that British farming is economically unviable without diversification; Season 3 makes the case with a spreadsheet one can hold in both hands and still not believe.

    Gerald Cooper's cancer diagnosis gives the season its emotional gravity, handled with a restraint that television rarely permits itself. He is mostly absent from the first half, undergoing thirty-seven sessions of radiotherapy, his absence felt in the rhythms of the farm rather than narrated. When he returns for the harvest and fights back tears in the closing scene thanking everyone, the moment strikes with the force of accumulated understatement. The pig deaths are the season's other blow: Lisa Hogan, who had invested herself in the rare-breed piglets with visible, unguarded tenderness, is inconsolable when the sows prove to be terrible mothers. The show does not film the dead piglets; it films Lisa's face, and that is worse. Season 3 is the point at which the series stopped being a comedy about farming and became, without losing the comedy, something closer to a documentary about what it costs to care about living things that have no obligation to survive.

- title: "Ripley"
  type: "tv"
  creator: "Steven Zaillian"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/tv/ripley.jpg"
  posted: "2024-05-06"
  revised: "2024-05-06"
  text: |
    Zaillian shoots Italy in black and white and the decision is not nostalgia but ontology: this is a world that exists outside time, sun-bleached and ancient and utterly indifferent to Tom ***Ripley***'s particular pathology. Robert Elswit's cinematography drains the dolce vita of its warmth and leaves something cooler and more dangerous, the Mediterranean reduced to a stage for slow, methodical crime. Every frame is composed with a patience that prestige television usually only claims; Zaillian lets scenes breathe well past the point where another director would cut, and the stillness accumulates into something close to dread.

    Andrew Scott makes Ripley a void rather than a chameleon. Where previous portrayals, Alain Delon's cold inscrutability, Matt Damon's studied charm, leaned into the seductive surface, Scott gives us a man for whom affect is a second language, laboriously conjugated. The helplessness beneath the performance is the revelation: Ripley does not enjoy what he does; he does it because there is no other version of himself available to him. The adaptation's fidelity to Highsmith's moral coldness is total, and that coldness, after eight episodes, settles into one like a change in body temperature.

- title: "Fallout Season 1"
  type: "tv"
  creator: "Graham Wagner / Geneva Robertson-Dworet"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/tv/fallout-season-1.jpg"
  posted: "2024-04-28"
  revised: "2024-04-28"
  text: |
    The ***Fallout*** games have always understood something about American mythology that most satire fumbles: the vault, the wasteland, the Brotherhood, the Ghoul; these are not genre furniture but a precise archaeology of the national psyche, optimism curdled into survivalism, corporate cheerfulness persisting past the point of obscenity. Wagner and Robertson-Dworet have absorbed this logic completely. The adaptation's strength is not surface fidelity, though the grenades on the Brotherhood aircraft, the vault terminal interface, and the retro-futurist costuming are all immaculate; it is fidelity to the games' political grammar, the way power in the wasteland is simultaneously ridiculous and lethal.

    Ella Purnell's Lucy MacLean carries the show's tonal argument: vault-bred sincerity meeting wasteland brutality, her optimism tested not through grand betrayal but through accumulating evidence that the world above operates on principles her education never acknowledged. Walton Goggins as the Ghoul is the performance the series hangs on. He moves between Cooper Howard's pre-war idealism and the Ghoul's centuries-deep cynicism with a physical intelligence that the writing alone could not supply: the way his body remembers being a different person, the way violence has become not rage but routine. The show asks for attention and gives back a world that feels inhabited rather than constructed.

- title: "The Queen's Gambit"
  type: "tv"
  creator: "Scott Frank"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/tv/queens-gambit.jpg"
  posted: "2024-04-18"
  revised: "2024-04-18"
  text: |
    The chess procedural is an improbable television genre, and Scott Frank makes it gripping. Working from Walter Tevis's novel, the series understands that chess is not interesting as a game but as a field in which a particular kind of mind can make itself visible: the board externalises Beth Harmon's interiority in a way that conventional psychological drama cannot, so that watching her play is watching her think, and watching her think is watching her survive. The joint analysis after the adjournment against Borgov, late in the series, is astonishing television precisely because it is also emotionally coherent: the collective intelligence of an ad hoc community arrayed against the Soviet machine.

    Anya Taylor-Joy does something technically precise here that deserves naming. The emotions do not appear on her face so much as they organise it from within; one reads the glances and the small repositionings of expression the way one reads a position on a board, inferring the larger structure from local details. It is a shame, then, that the series surrounding her performance is less surprising than it should be. The addiction subplot follows standard television recovery beats, and the male figures who rally around Beth in the final episodes feel less like people than like pieces the story moves into position for a satisfying endgame. The ending gives Beth everything she needs too cleanly for a show whose best scenes are about the particular loneliness of a mind that cannot stop working. That the adjournment as a practice has been rendered obsolete by engines is a loss the series makes one feel acutely: a whole ecological niche of chess time, the overnight analysis, the sealed move, the collective suspense, gone. Today's players are faster and braver and lonelier for it.

- title: "The Problem with Jon Stewart Season 2"
  type: "tv"
  creator: "Jon Stewart"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/problem-with-jon-stewart-season-2.jpg"
  posted: "2024-02-20"
  revised: "2024-02-20"
  text: |
    I came to Season 2 knowing the show was already gone. Apple cancelled it in October 2023; Stewart later said Apple had asked him not to interview FTC Chair Lina Khan and not to do a segment on artificial intelligence, while reporting around the cancellation pointed to China and AI as sticking points. Watching ***The Problem with Jon Stewart Season 2*** from that vantage, every substantive segment reads as a record of what was possible before the restriction tightened, and it is a better season than the first. The format commits to what Season 1 only sketched: twelve episodes on a weekly release, each one a single issue driven into the ground over forty-odd minutes, Stewart's interviewing skill given room the *Daily Show* never allowed. He prepares, he presses, he does not give powerful officials the graceful exit most television journalism feels obliged to offer. The episodes on corporate tax incentives, on the military-industrial complex, on incarceration: each is a long argument that still manages to feel urgent rather than procedural.

    The honest account of the show's limits is also the account of Stewart's particular politics: a liberalism that targets individual accountability without structural critique, that can name a corrupt governor or a dishonest general but circles away from the System that produces them. The show approaches political economy and withdraws; it follows money up to a certain level and stops. An episode can spend forty minutes demonstrating that a corporation extracted public subsidies while delivering nothing to workers and then conclude that the System needs reform rather than that the System is working exactly as designed. The critique floats, as it always has with Stewart, anchored in moral clarity but unmoored from structural analysis. This is the constitutive limitation, and Season 2 does not solve it.

    Season 2 demonstrates instead that this kind of journalism, ideologically bounded as it is, still makes people nervous enough to suppress. The most revealing episode *The Problem* ever made was the one Apple made impossible to film. Stewart could not interview Lina Khan on the show he made for the company that Khan was investigating; he had to wait until he was back at Comedy Central to do it. The cancellation, in other words, was itself the argument: a corporation eliminated a show for beginning to examine corporate power, which is not the outcome of a system that needs reform. It is the outcome of a system that is functioning as designed. Stewart may not quite have the framework to say so; the circumstances said it for him.

- title: "Vigil Season 2"
  type: "tv"
  creator: "Tom Edge"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/vigil-season-2.jpg"
  posted: "2024-01-17"
  revised: "2024-01-17"
  text: |
    ***Vigil Season 2*** abandons the submarine and moves to an RAF drone base in a fictional Gulf state, trading claustrophobia for political exposure. Season 1 pressed on Suranne Jones's Amy Silva and on the audience through physical confinement; Season 2 attempts the same pressure through revelation: that the British state maintains military partnerships with repressive Gulf regimes, that arms manufacturers operate through revolving doors with senior officers, that drone precision targeting is a marketing claim rather than a guarantee, that state secrecy extends to covering up civilian casualties. Mainstream British television drama rarely names these structures directly; the season earns its setting change by making that directness count.

    The episode that works best follows a cryptocurrency payment trail through the gap between official targeting narratives and ground reality, arriving at the moment Silva understands that the investigation cannot end in the UK because the UK is the entity being investigated. The show grasps that the military-industrial complex is not primarily a network of bad actors but a set of institutional incentives: the officers, manufacturers, and officials making morally catastrophic decisions are all behaving rationally within the logic of the structure they inhabit. This is further than most British crime drama goes. It does not go quite far enough; the resolution remains individual, expose the conspirators and close down the programme, and the structural critique of imperialism goes unvoiced. But the season comes closer than the genre usually permits.

    Jones is the reason the pacing does not collapse. Silva's methodical confidence, the quality of her investigative thinking made visible in her face, carries episodes through sequences that ask for more plausibility than the script provides. The relationship with Rose Leslie's Kirsten, separated for most of the season by geography, carries what emotional force it can across distance. The season builds to a finale that uses its assembled pieces with more clarity than Season 1 managed, closing on drone footage of a strike presented without comment, an image that the show's political argument earns.

- title: "For All Mankind Season 4"
  type: "tv"
  creator: "Ronald D. Moore"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/tv/for-all-mankind-season-4.jpg"
  posted: "2024-01-07"
  revised: "2024-01-07"
  text: |
    ***For All Mankind Season 4*** makes its ambition clear early: the show is no longer about the space race as spectacle but about what happens when human civilisation arrives somewhere new and immediately reproduces its old hierarchies. Happy Valley on Mars is a company town; Helios has exported exploitation into the void, and the workers' uprising, grievances accumulating from unpaid wages and impossible contracts towards outright rebellion, is the most politically legible storytelling the series has managed since Season 2's Cold War machinery. Toby Kebbell's Miles Dale leads the workers with a conviction that grounds the political argument in specific injury instead of abstract solidarity.

    The trouble is that the analysis does not go deep enough. The season identifies the problem, capital extracts, workers suffer, institutions serve capital, but offers no vision of what comes after. The Goldilocks asteroid heist is a victory that resolves the immediate conflict without interrogating the structural forces that generated it. Edi Gathegi's Dev Ayesa is a vessel for critique rather than a fully examined figure: the show knows that billionaires are a problem but cannot quite examine its own seduction by his charisma and vision. Season 4 is the most politically conscious ***For All Mankind*** has been, which means it is also the season where the distance between the show's political instincts and its political intelligence is most visible.

- title: "Fleishman Is in Trouble"
  type: "tv"
  creator: "Taffy Brodesser-Akner"
  creator_role: "created by"
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/fleishman-is-in-trouble.jpg"
  posted: "2023-12-02"
  revised: "2023-12-02"
  text: |
    One of the finest endings of any series in recent years. Under Libby's voiceover, every thread is pulled to its crisis through means that are deeply literary rather than merely dramatic: the accumulated weight of the preceding episodes is recontextualised, not resolved. The reframing is total. Libby (Lizzy Caplan), who has spent eight episodes narrating Toby's (Jesse Eisenberg) story of midlife dissolution, is revealed to be narrating her own; the act of telling someone else's crisis is the form her own crisis takes.
    The writing, Taffy Brodesser-Akner adapting her own novel, earns its observations rather than asserting them. In the midst of a midlife reckoning, one quite naturally displaces misery onto the nearest available cause. Toby believes his unhappiness originates in Rachel's (Claire Danes) indifference; Rachel believes hers originates in Toby's failure to see her; Libby believes hers originates in a marriage that has quietly enclosed her. Each, after excising that cause, finds the root still there. The comedy of misattribution is precise, and the pain underneath it is not softened.

    There is a strain of short review that says it cannot care about a middle-aged man's divorce, as though the show were making that case. The show is not about Toby at all. It is about the stories people tell to avoid the story they are actually living, and about the woman, finally, who names it.

- title: "Scavengers Reign"
  type: "tv"
  creator: "Joseph Bennett & Charles Huettner"
  creator_role: "created by"
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/tv/scavengers-reign.jpg"
  posted: "2023-11-16"
  revised: "2023-11-16"
  text: |
    ***Scavengers Reign*** is, among other things, a sustained argument for animation as a medium of biological strangeness. The planet Vesta operates as a closed ecosystem before it operates as a setting: the organisms have food chains, life cycles, symbiotic relationships with one another that the narrative discovers rather than invents. Joseph Bennett and Charles Huettner, who expanded the series from their 2016 short *Scavengers*, work from Moebius, Ernst Haeckel's biological illustrations, and the deep-sea phyla that look most unlike anything evolution arrived at on land. The design philosophy was ecological plausibility first, visual impact second, and the combination produces creatures that feel discovered rather than designed.
    The human characters do not survive the comparison with their surroundings. Azi, Sam, Ursula, and Levi move through an ecosystem that demands genuine biological intelligence and respond with dialogue that could have come from any mid-tier science fiction screenplay. The emotional arcs are legible and competent but never surprising; the planet keeps inventing, and the people walking across it keep rehearsing familiar beats of survival, grief, and corruption. Kamen's storyline with the parasitic organism comes closest to something genuinely unsettling about the relationship between consciousness and control, but even there the show reaches for narrative closure before the premise has fully ripened. A review I encountered while watching made the claim that the first episode demolishes the notion that humans cannot imagine what they have never seen, and I cannot let that stand without a murmur of dissent. Every significant organism on Vesta Minor still requires limbs, appendages, bilateral or radial symmetry, some version of a mouth. The cursed planet, for all its strangeness, operates well within the frame of reference that evolutionary history has handed us. *Scavengers Reign* does with familiar biological building blocks what great music does with a limited number of notes. The constraint is real. The achievement within it is considerable.

- title: "The Mandalorian Season 3"
  type: "tv"
  creator: "Jon Favreau"
  creator_role: "dir."
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/tv/mandalorian-season-3.jpg"
  posted: "2023-11-08"
  revised: "2023-11-08"
  text: |
    ***The Mandalorian Season 3*** dispenses with the tension that the previous season carefully built, completes Pedro Pascal's Din Djarin's redemption arc across the opening episodes, and then has nothing left to do. The correct vocabulary is borrowed from game design and used precisely: this is a side-quest season, each episode its own objective, each objective completed without accumulating consequence for the ones that follow. A game tolerates this structure because the player is doing the questing; watching someone else run side quests produces nothing equivalent. The show has no answer for this.

    The mythology the season attempts to develop is not substantial enough to carry the weight placed on it: Mandalore's reclamation, the Armorer's covert, Katee Sackhoff's Bo-Katan assuming leadership; none of it coheres into anything more than lore maintenance. What had been pleasantly undemanding in Season 1 and successfully escalated in Season 2 here becomes inert. The Volume is still impressive engineering; the action is competent; the season ends. One finds one has retained almost nothing, which is what the show was designed to produce and, three seasons on, is no longer sufficient.

- title: "Happy Valley Season 3"
  type: "tv"
  creator: "Sally Wainwright"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/happy-valley-season-3.jpg"
  posted: "2023-10-04"
  revised: "2023-10-04"
  text: |
    The final season arrives after seven years, and Sally Wainwright uses the gap structurally: Sarah Lancashire's Catherine is counting the months to her pension, Ryan is sixteen, and the question that the show has been deferring since its first episode can no longer be deferred. Ryan is a goalkeeper, occasionally short-tempered in ways that make Catherine's jaw tighten. The discovery that Clare and Neil have been secretly taking him to visit James Norton's Tommy in prison detonates the household's fragile peace, but the season's most startling revelation is that Ryan went mainly out of pity, not attraction. He saw his father clearly and felt sorry for him. Two seasons' worth of accumulated dread about whether Tommy's nature would express itself in his grandson resolves into something almost unbearably simple: Ryan is decent, honest, ordinary, and the tree he fell from was always Catherine, not Tommy.
    The final episode brings them face to face across Catherine's kitchen table, not as action sequence but as reckoning, two people held under the weight of sixteen years of hatred and grief. Tommy, mortally wounded and overdosing, arrives at something that is not repentance but recognition: he sees the photo albums, Ryan's bedroom, the evidence of a loved childhood, and tells Catherine, 'What a nice life you've given him.' Then he douses himself in petrol, completing the circle the show drew in its very first scene, when Catherine talked down a man threatening self-immolation in a children's playground. She smothers the flames with a crocheted blanket, domestic craft deployed against annihilation. Eighteen hours of television across a decade, and Wainwright closes it not with spectacle but with Lancashire at a graveside, a text confirming Tommy Lee Royce's death, a smile, sunglasses, and the road ahead. Wainwright knew when to stop.

- title: "Happy Valley Season 1"
  type: "tv"
  creator: "Sally Wainwright"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/tv/happy-valley-season-1.jpg"
  posted: "2023-10-04"
  revised: "2023-10-04"
  text: |
    Sally Wainwright gives every person in the Calder Valley a complete interior life, not as magnanimity but as structural commitment: the fabric of the show requires it, because crime in ***Happy Valley*** is never anomalous. It emerges from the same social texture as everything else, from financial strain and family grief and the specific exhaustion of public service in a community that has been left behind. The supporting characters, the small criminals, the frightened accomplices, the institutional figures hedging their bets, are not furniture. They have reasons, histories, the particular stubbornness of people who have never been given anything easily.

    Catherine Cawood is earth and sky. Sarah Lancashire's performance operates in the key of someone for whom dignity is not a performance but a survival mechanism: this woman has absorbed a loss that should have broken her, has metabolised it into something like forward momentum, and carries it in her body, in the set of her jaw, in the way she manages not to flinch when the thing she has been dreading finally comes into view. The show does not ask one to admire her; it simply insists that one see her clearly. That is the harder ask, and Wainwright meets it without flinching.

- title: "Happy Valley Season 2"
  type: "tv"
  creator: "Sally Wainwright"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/tv/happy-valley-season-2.jpg"
  posted: "2023-10-01"
  revised: "2023-10-01"
  text: |
    Where Season 1 pitted Sarah Lancashire's Catherine against James Norton's Tommy in physical space (streets, abandoned buildings, a burning barge), ***Happy Valley Season 2*** removes him from the frame entirely and discovers that his menace operates more insidiously at a distance. Tommy spends the season in Gravesend Prison, yet his manipulation radiates outward through proxies: Shirley Henderson's Frances Drummond, a pharmacist groomed into assuming a dead sister's identity and infiltrating Ryan's school; the multiple women he corresponds with simultaneously, each believing herself engaged. Wainwright braids this with a serial killer investigation whose most devastating revelation is structural rather than procedural: Daryl Garrs, the killer, is himself the product of incestuous rape, his violence seemingly inherited, his mother's only available mercy a shotgun. The parallel to Catherine and Ryan requires no underlining. It is the nightmare version of the question that the show has been asking since its first episode: what happens when the damage passes through the blood?

    The season is less compressed than its predecessor and more tonally daring. The bridge confrontation, Wadsworth cornered and suicidal, coaching Catherine through crisis negotiation she has never been trained for, would collapse in any other writer's hands; Wainwright nails both the comedy and the devastation. The Frances Drummond confrontation subverts every expectation the season built: where one anticipated violence, Catherine offers gritted-teeth recognition that Frances is another of Tommy's instruments, not his accomplice. But the season's last image is the one that stays: Tommy in his cell, reading Ryan's letter, smiling, the channel that Catherine fought to prevent now open, and the understanding that the real threat was never force but patience, a man who knew that a child's curiosity is a door that cannot be permanently locked.

- title: "The Crown Season 5"
  type: "tv"
  creator: "Peter Morgan"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/tv/crown-season-5.jpg"
  posted: "2023-09-11"
  revised: "2023-09-11"
  text: |
    ***The Crown*** Season 5 has the misfortune of arriving two months after the Queen's death and Charles's accession, which would be merely bad timing if the season did not also bend so insistently towards a rehabilitative Charles. The tonal problem is precise and repeated: episodes that begin by documenting how Diana was gaslit, surveilled, and systematically isolated by the institution pivot, sometimes within the same hour, to extended sequences presenting Dominic West's Charles as a man of vision: his Prince's Trust praised with end-credit statistics, his relationship with Camilla bathed in warm sincerity, his breakdancing treated as endearing evidence of a common touch. It does not work. The show cannot simultaneously demonstrate how the institution destroyed one person and then ask the viewer to admire the heir who benefited from that destruction. The question that sits beneath the entire season is whether the scripts were shaped to flatter the monarchy's succession narrative, and the evidence, episode by episode, makes it difficult to answer in the negative.

    Elizabeth Debicki's Diana is the performance the season does not deserve. She carries the role's accumulated grief with a physical specificity that recalls Emma Corrin's Season 4 work without imitating it, the evolution from humiliated wife to public weapon handled with care that the writing cannot match. Imelda Staunton's Elizabeth, inheriting the role from Colman, projects an institutional opacity so complete that the performance risks becoming invisible, which may be exactly the point. The Panorama episode stages Martin Bashir's manipulation of Diana through Earl Spencer with a clinical precision the rest of the season lacks. But one strong performance cannot rescue a season whose failure is political rather than dramatic: Peter Morgan, who began this series as a self-described republican, has written himself into the position of the monarchy's apologist, and the closer the show approaches the present, the more visible and less forgivable the capitulation becomes.

- title: "The Crown Season 4"
  type: "tv"
  creator: "Peter Morgan"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/tv/crown-season-4.jpg"
  posted: "2023-08-22"
  revised: "2023-08-22"
  text: |
    The season's most persistent failure is also its most telling one: Thatcher's economic programme, the defining political fact of her decade, is almost entirely absent. The privatisations, the assault on the unions, the deliberate dismantling of the postwar settlement, the transformation of Britain into a laboratory for Friedmanite shock therapy; none of it registers. Gillian Anderson inhabits the role with formidable precision, the voice, the posture, the particular quality of certainty that admits no doubt, but the writing reduces Britain's most consequential postwar Prime Minister, second only to Attlee in actual historical weight, to someone who picks unnecessary fights and ignores the vulnerable. ***The Crown*** has always been a drama, not a document, and that caveat has its uses; but the selective amnesia here distorts rather than simplifies, producing a caricature that the left loves without asking whether it has earned that love.

    The season does render the royals themselves with real force, and here the show is at its most unsettling. Thatcher's reputed view, that behind the breeding lay an emptiness, an arrogance of blood without corresponding substance, is borne out by almost every royal we encounter. Emma Corrin's Diana enters the family and the treatment she receives is not simply negligence; it is a structure, a system for metabolising inconvenient interiority and returning it as silence. Charles is suffocating in his own arrested development, Olivia Colman's Elizabeth magnificent in her icy remove, the institution as a whole an organism evolved precisely to endure, which means evolved to consume those who feel too much. One comes away understanding viscerally why Thatcher, the grocer's daughter made good through sheer force of will, found them barbaric. And one cannot entirely blame her.

- title: "The Crown Season 3"
  type: "tv"
  creator: "Peter Morgan"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/tv/crown-season-3.jpg"
  posted: "2023-08-22"
  revised: "2023-08-22"
  text: |
    Olivia Colman's Elizabeth is not a different character from Claire Foy's; she is the completed version. Where Foy's performance traced the exact progress of institutional absorption, Colman arrives already absorbed, the human surface polished to institutional opacity. The difference is felt immediately: one no longer watches Elizabeth deciding to suppress her feelings; one watches a woman for whom the suppression has become the feeling, the mask fused to the face. The Aberfan episode makes the cost of this legible. One hundred and sixteen children die under a collapsed coal tip, and Elizabeth delays her visit because the institution advises that royal grief, if displayed too readily, devalues the currency. When she finally goes and breaks down, the tears are real; what is devastating is that the institution was correct to delay them, that the tears strike harder for being withheld, that the strategic calculus and the emotional truth arrive at the same destination by different routes. This is the monarchy's deepest horror: not that it suppresses feeling, but that it has learned to deploy feeling as a tool, making the authentic and the calculated indistinguishable.
    Charles's investiture as Prince of Wales is the season's other argument. He is sent to Aberystwyth to learn Welsh, develops sympathy for Welsh nationalism, delivers a bilingual address that moves his audience, and is told by Elizabeth to suppress every personal conviction the experience produced. The pattern is Margaret's, a generation later: the institution shapes its children, permits them a window of feeling, then closes the window and installs the glass. Vanessa Kirby's Margaret, from the vibrant young woman denied love in Season 1 to the affair with Roddy Llewellyn and the suicide attempt here, carries the same pattern to its end. The outward strength masks inner decay, and the decay is visible not in grand failures but in the stubborn, accumulated minutiae of lives forbidden to change.

- title: "The Crown Season 2"
  type: "tv"
  creator: "Peter Morgan"
  creator_role: "dir."
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/tv/crown-season-2.jpg"
  posted: "2023-08-18"
  revised: "2023-08-18"
  text: |
    The marriage strain drives the season, Matt Smith's Philip and his resentments and rumoured infidelities pressing against Claire Foy's Elizabeth and her insistence that private feeling must yield to public role. But the more interesting argument runs beneath the domestic drama. 'Marionettes' stages Lord Altrincham's public critique of the Queen's speaking style as a constitutional confrontation: a commoner telling the sovereign she sounds like a 'priggish schoolgirl,' and the sovereign, after initial fury, conceding the point and televising the Christmas Message for the first time. The concession looks like modernisation; in practice the institution absorbs criticism by performing reform, changing the surface to preserve the structure.
    'Vergangenheit' is the episode that earns the season its weight. The Marburg files reveal the Duke of Windsor's wartime dealings with Nazi Germany, and the institution's response, swift and total suppression, is presented not as scandal but as standard operating procedure. The Profumo affair follows the same institutional grammar: exposure, containment, sacrifice of the expendable. ***The Crown*** Season 2 understands that the monarchy's relationship to modernity is not one of resistance gradually giving way to accommodation; it is something more calculated. The System adapts precisely enough to survive, and people within it, Philip with his frustrated ambitions, Vanessa Kirby's Margaret with her thwarted desires, Macmillan with his genteel oblivion, are left to absorb the costs of that adaptation without compensation. The System endures. The people within it let each other down. These are not separate observations; they are the same one.

- title: "The Crown Season 1"
  type: "tv"
  creator: "Peter Morgan"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/tv/crown-season-1.jpg"
  posted: "2023-08-11"
  revised: "2023-08-11"
  text: |
    The opening image is structural: a young woman who wanted nothing more than to marry and live quietly is handed the weight of a thousand-year institution. Claire Foy plays this transformation with an exactitude that makes the viewing experience something closer to slow horror. One watches Elizabeth subordinate her sister's happiness, her husband's ambitions, her own private judgement, and the mechanism is so precisely calibrated that the sacrifice registers less as individual choice than as institutional hydraulics. Margaret is denied Peter Townsend because the institution requires the denial, and the institution's requirements, once accepted, cannot be selectively resisted. Philip is dispatched to Melbourne. Churchill is permitted to serve long past his fitness. Each concession follows the same logic: the Crown consumes what the person would protect.

    John Lithgow's Churchill is a performance of cheerful, monstrous resilience: a man who has survived by force of will what most would not survive at all, and who recognises in the young Queen a corresponding capacity for endurance that he mistakes for agreement. The Suez Crisis gathers in the final episodes with the weight of something the season has been building towards, the first demonstration that the institution Elizabeth has accepted is constraining and actively destructive, its foreign policy a catastrophe she is constitutionally forbidden to oppose. Foy makes visible the exact moment, distributed across ten episodes, when the person stops resisting the Crown and allows herself to be replaced by it. One watches this knowing what she becomes. The dramatic irony is not incidental to the experience; it is the experience.

- title: "The Bear Season 2"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/bear-season-2.jpg"
  posted: "2023-07-14"
  revised: "2023-07-14"
  text: |
    Better than Season 1 in nearly every dimension, which was not a small thing to surpass. Season 1's urgency was inseparable from its compression, the relentless single-location intensity of the beef sandwich counter; Season 2 expands the frame without losing it. Uncle Jimmy finally gets the screen time that the first season withheld from him, and Oliver Platt fills it with a performance of layered, sardonic feeling, a man who loves the family and distrusts it and bankrolls it with full knowledge of all three. Ayo Edebiri's Sydney develops into something generous this season, her competence and ambition granted their proper weight rather than kept subordinate to Jeremy Allen White's Carmy and his chaos.

    Episode 6, 'Fishes,' is the season's centrepiece and one of the finest single episodes of television in years. The structure is a Christmas Eve family dinner as contained detonation, Jamie Lee Curtis's Donna building and building until the room itself seems to contract, the dialogue so precisely placed that each exchange opens onto the next like a door onto a corridor that leads somewhere worse. The Carmy-and-Claire arc gives the season its tenderness and its tragedy: the clearest demonstration that some damage makes ordinary happiness structurally impossible, not through any dramatic failure but through the simple arithmetic of what was done to someone before they had the language to resist it.

- title: "Silo Season 1"
  type: "tv"
  creator: "Graham Yost"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/silo-season-1.jpg"
  posted: "2023-07-03"
  revised: "2023-07-03"
  text: |
    Yost's adaptation of Hugh Howey begins as world-building and earns its place, gradually, as political diagnosis. The silo: 144 levels, roughly 10,000 inhabitants, sealed from a world the ruling class has taught them to believe is toxic and uninhabitable. It does not ask to be read as metaphor; it is the logic of any closed authoritarian system made literal. The suppression of pre-silo history, the deliberate destruction of any evidence that the narrative might be false, the 'cleaning' ritual by which anyone expressing desire to leave is sent outside with the implicit guarantee of death; these are not symbols but mechanisms. ***Silo*** is patient in establishing them. The first half builds the world with more thoroughness than urgency, Rebecca Ferguson's Juliette Nichols asked to carry more investigative procedure than investigation, and one feels the weight of Howey's source material pressing against the available screen time.

    And then the second half arrives. The anti-utopian form earns its keep not in the description of oppression but in the moment the oppressed discover that the ground itself is fabricated. Juliette obtains forbidden video that seems to show a living outside world and proves, at minimum, that the silo's official visual record is manufactured; Tim Robbins's Bernard makes the immediate, cold-blooded decision to destroy the hard drive, one of the most precisely calibrated scenes of institutional violence in recent television. He destroys the evidence not out of malice but conviction: the System requires the lie, and the lie requires protecting, and authority has stopped performing power and simply become it. The back half of Season 1 is anti-utopian drama at its strongest: not the genre at its most spectacular but at its most structurally honest, understanding that the lie is not incidental to the order it sustains but foundational to it.

- title: "Black Mirror Season 6"
  type: "tv"
  creator: "Charlie Brooker"
  creator_role: "dir."
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/tv/black-mirror-season-6.jpg"
  posted: "2023-06-19"
  revised: "2023-06-19"
  text: |
    Five episodes after a four-year gap, and the diagnosis is not fatigue but something more basic: ***Black Mirror*** has lost interest in its own premise. 'Joan Is Awful' has the right instinct: Annie Murphy discovering her life adapted in real time by a streaming platform, Salma Hayek playing the dramatised version, the layers of simulation stacking towards a meta-commentary on content extraction. But the execution stops at the observation. Netflix is awful; people are not content. One waits for the turn that would make this Black Mirror rather than a particularly self-aware sketch, and it never arrives. 'Beyond the Sea,' the season's other defensible episode, does sustained work with Aaron Paul and Josh Hartnett in an alternate 1969, but at over an hour it takes longer to reach its thesis than the thesis can support.

    The remaining three confirm the critical worry. 'Loch Henry' is competent true-crime pastiche. 'Mazey Day' is a paparazzi thriller that resolves with a werewolf, a twist so disconnected from any recognisable Black Mirror logic that it reads as self-parody. 'Demon 79,' explicitly branded 'Red Mirror,' is a supernatural period comedy set in 1979 with no technology in sight. The last two are not speculative fiction; they are live-action *Love, Death & Robots* episodes that wandered into the wrong anthology. The show that once handed a generation the vocabulary for its anxieties now sounds like it has run out of things to name.

- title: "For All Mankind Season 3"
  type: "tv"
  creator: "Ronald D. Moore"
  creator_role: "dir."
  year: 2022
  eval: "disliked"
  image: "/assets/images/thoughts/tv/for-all-mankind-season-3.jpg"
  posted: "2023-06-16"
  revised: "2023-06-16"
  text: |
    The writing drops with the abruptness of a dropped signal. The premise remains: a three-way race to Mars between NASA, Roscosmos, and Helios Aerospace, the first private actor in the competition. But ***For All Mankind Season 3*** cannot manage its own expansion; the supporting cast is populated almost entirely by characters whose idealism reads as a personality trait rather than an idea, people who believe enormously in things and then spend ten episodes doing small, self-undermining things for personal reasons. NASA and Roscosmos, institutions that the first two seasons treated with the nuance of organisations containing genuine human tension, are here reduced to bureaucratic incompetence. Casey W. Johnson's Danny Stevens, whose arc began as a credible study in inherited instability, becomes an exercise in watching a known liability be handed progressively more responsibility while Joel Kinnaman's Ed Baldwin, the series' moral anchor, drifts into decisions the writing cannot justify.

    The North Korean landing is where the season's hard-sci-fi credibility fully collapses: plausibility matters less than the show's lack of interest in what it means. A totalitarian state reaches Mars first, and the narrative treats this as a dramatic surprise with no political or structural consequences worth exploring. Sarah Jones's Tracy and Michael Dorman's Gordo did not die for this. Their sacrifice was built with care across two seasons, rooted in character; Season 3 treats their deaths as distant mythology and fills the foreground with drama that comes nowhere close to earning the same ground.


- title: "For All Mankind Season 2"
  type: "tv"
  creator: "Ronald D. Moore"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/for-all-mankind-season-2.jpg"
  posted: "2023-06-10"
  revised: "2023-06-10"
  text: |
    The Cold War on the Moon is ***For All Mankind***'s richest premise, and Season 2 deploys it with confidence. The Jamestown Crisis, a Soviet blockade of Shackleton Crater that escalates to armed conflict and the brink of reactor meltdown, gives the show's claim its pressure: the Cold War's logic of deterrence and escalation does not soften with distance; it intensifies, because there is nowhere to retreat to. Joel Kinnaman's Ed Baldwin in orbit, deciding whether to fire the missiles or to hold, carries the moral weight the season has built across ten episodes.

    Sarah Jones's Tracy and Michael Dorman's Gordo give the finale its full emotional freight. Their trajectory across two seasons, the separation, the accumulated weight of mutual disappointment, the slow convergence back towards each other, earns the spacewalk. It has no heroic posture: two people in improvised suits, fifteen seconds of exposure, finding each other in the airlock. It is the most honest death the season could have given them. What follows is the image I expect to carry longest: an astronaut's boot pressing into Martian soil, 1995, Nirvana beginning on the soundtrack. The season spent ten episodes in the Cold War's airlock; its final image opens the horizon without looking back.

- title: "For All Mankind Season 1"
  type: "tv"
  creator: "Ronald D. Moore"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/tv/for-all-mankind-season-1.jpg"
  posted: "2023-05-29"
  revised: "2023-05-29"
  text: |
    The divergence point is a single event: the Soviet Union lands on the Moon first. From that seed Moore and his co-creators grow an entire alternate political ecology, one in which American competitive anxiety accelerates the admission of women to the astronaut corps by a decade, the Equal Rights Amendment moves through a different legislative climate, the slow retreat of racial discrimination happens against a different social backdrop. History as contingency rather than teleology, the argument embedded in the premise itself: what we call progress is not a direction but a series of forces and counterforces that can be arranged differently given different inputs.

    Beyond its conceptual framework, the season works through Joel Kinnaman's Ed Baldwin and the writing of individual lives around him. Every major character carries their specificity: the astronauts grounded in the particular texture of what it means to be good at this one extraordinary thing, the families carrying the specific weight of what proximity to that extraordinary thing costs. The occasional scene tips into the too-explicitly inspirational, a moment where the score announces that significance is now occurring; these are the season's weak points, and they are not frequent enough to constitute a structural problem. One watches this account of a better world, however hard-won and partial, and feels something that is not quite hope and not quite grief, a recognition of what is possible when the forces align differently, and a corresponding awareness of how rarely they do.

- title: "漫长的季节"
  title_en: "The Long Season"
  type: "tv"
  creator: "Xin Shuang"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/long-season.jpg"
  posted: "2023-05-12"
  revised: "2023-05-12"
  text: |
    Days after finishing it, one is still talking through Luo Meisu's fate with friends, which is the most reliable measure of a drama that has done something more than entertain. ***The Long Season*** sits somewhere between 隐秘的角落 and 平原上的摩西: slower in pace than the former, less free-associative in its callbacks and structural echoes than the latter, arriving at a tone that feels perfectly calibrated for a domestic audience without ever being domesticated by it. The care lavished on plot and characterisation is enormous and shows.

    The source novel famously could not be adapted as written, and one prefers not to dwell on the specific constraints involved. Within those constraints, Xin Shuang has produced something true and moving: it is straightforward to be moving within freedom, and much rarer to be moving within walls. Fan Wei's Wang Xiang anchors everything, a man whose stubbornness outlasts his grief, whose refusal to stop investigating carries the show's emotional argument across decades. Li Gengxi's Shen Mo is the other axis, a portrait of a life compressed by circumstance into a series of impossible choices, and the restraint with which the show approaches her story resists every available invitation to melodrama. Each callback in the final two episodes produces the same internal response: the accumulated weight of everything that preceded it arriving at once, and the whole structure had been building towards that weight.

- title: "The Bear Season 1"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2022
  eval: "liked"
  image: "/assets/images/thoughts/tv/bear-season-1.jpg"
  posted: "2023-04-27"
  revised: "2023-04-27"
  text: |
    The writing in the first six episodes is uneven, and knowing what arrives later makes that unevenness feel almost calculated: as though Storer were deliberately rationing what the show can do, holding back to make the ambush more complete. The seventh episode is filmed almost in a single sustained take, following a kitchen in freefall with a camera that moves like a trapped animal, and it is one of the most formally accomplished pieces of television. The eighth, quieter and longer, does something that the preceding seven episodes had given no indication it was capable of: it reveals that the show has a fully developed capacity for monologue, for stillness, for extended character revelation requiring a completely different grammar from controlled chaos. Jeremy Allen White's Carmy, held at arm's length for most of the season, is suddenly given room to exist beyond the kitchen, and White fills that room with a still, wrecked authority that the earlier episodes only hinted at.

    Taken together, the season holds. The early episodes build tension through incremental escalation; episodes seven and eight release it with formal precision.

- title: "Clarkson's Farm Season 2"
  type: "tv"
  creator: "Gavin Whitehead"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/clarksons-farm-season-2.jpg"
  posted: "2023-03-26"
  revised: "2023-03-26"
  text: |
    The conflict is structural, and the show knows it. Clarkson's attempt to convert a lambing barn into a farm-to-fork restaurant, serving produce from Diddly Squat and neighbouring local farms, is rejected by West Oxfordshire District Council despite no formal objections from police, the parish council, or any statutory body. A single neighbouring resident hired a barrister to argue the barn was a 'Trojan horse'. The appeal would have cost half a million pounds. This is not a story about one celebrity farmer's frustration; it is a precise demonstration of the British planning system as a class filter, where the cost of participation in the appeals process itself determines who can participate. Small farms survive by diversifying. Planning law makes diversification nearly impossible. The loop is closed.

    Between the arguments, ***Clarkson's Farm*** Season 2 finds Kaleb, twenty-three and constitutionally incapable of deference, carrying a comic timing that cannot be directed because it is not performed; his exasperation with Clarkson is the exasperation that only competence produces, and their relationship has matured without losing its abrasive warmth. Emma Ledbury losing half her dairy herd to bovine TB is the season's most devastating sequence: not dramatised, not scored for emotion, just a working farmer watching her livelihood destroyed by a disease that the government has failed to manage for decades. The loophole exploits, expensive vegetables that come with a 'free' t-shirt, the farmhouse conversion that sidesteps the planning refusal, are presented as comedy, and they are funny, but beneath them is a farmer's arithmetic: when the System offers no legitimate path forward, one finds an illegitimate one or one starves.

- title: "Poker Face Season 1"
  type: "tv"
  creator: "Rian Johnson"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/tv/poker-face-season-1.jpg"
  posted: "2023-03-12"
  revised: "2023-03-12"
  text: |
    The howcatchem format that Rian Johnson borrows from *Columbo* (1971) contains an inherent tension: if the audience already knows the killer, the pleasure has to lie entirely in the unravelling, and for several early episodes Natasha Lyonne's Charlie Cale unravels too comfortably to carry that weight alone. Lyonne has the presence, instinctive, watchful, a drifter whose poker-faced bullshit detector is the show's only real mechanism, but the formula asks her to solve variations on a theme that the earlier episodes do not vary enough. The last three episodes are a dramatic leap in quality, and episode nine, Joseph Gordon-Levitt as a death row inmate whose charm is indistinguishable from innocence, gives ***Poker Face*** its first moment of genuine emotional complexity inside the formula. Without it, the score would barely be passing.

- title: "The Capture Season 2"
  type: "tv"
  creator: "Ben Chanan"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/capture-season-2.jpg"
  posted: "2023-02-22"
  revised: "2023-02-22"
  text: |
    Ben Chanan weaves together every thread laid across the first five episodes in that final instalment. The architecture of the series is ostentatiously ambitious: geopolitical manipulation, AI-fabricated evidence, the slow corruption of institutions that were already compromised before the foreign actors arrived, and Holliday Grainger's Rachel Carey, a protagonist who can barely trust her own perception of events. The final episode resolves each thread without simplification and keeps the series' commitment to institutional complexity inside its narrative closure. It closes cleanly, in the way serialised television can when it gives systemic rot six hours of sustained attention and still finds a conclusion that feels both inevitable and earned.

- title: "The Capture Season 1"
  type: "tv"
  creator: "Ben Chanan"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/tv/capture-season-1.jpg"
  posted: "2023-02-20"
  revised: "2023-02-20"
  text: |
    Ben Chanan extends the Orwellian question in the right direction: not whether we are watched, but what the watchers intend to do with the footage. ***The Capture*** builds its conspiracy from a single strip of CCTV (a recently acquitted soldier apparently assaulting his barrister outside a London pub), then expands outward through layers of intelligence manipulation until the entire evidentiary architecture of the justice system stands exposed as a controlled environment. 'Correction', the covert fabrication of video evidence by intelligence services to produce admissible proof of events they claim to know occurred through inadmissible means, is a rich fictional concept for BBC drama. It refuses the comfortable binary: the corrected evidence depicts something that actually happened, the process that produced it is illegitimate, and both of these are true at once, which means the question is not whether the right person was convicted but whether justice produced by fabricated means can be called justice at all.
    The final two episodes take procedural justice more seriously than any BBC drama I have seen since the finale of *Silk* Season 3. Emery's confession, that he did kill the unarmed insurgent, that the original corrected evidence was substantively accurate, detonates the wrongful-conviction narrative the show spent five episodes constructing and replaces it with something far harder to metabolise: the argument that legitimacy of process is not a procedural nicety but a structural necessity, without which the verdict is irrelevant. Holliday Grainger's Carey decides to join the intelligence apparatus she spent the season fighting. The System does not merely defeat its opponents; it absorbs them, because the alternative to complicity is irrelevance, and Carey, hiding a copy of the authentic footage inside a photograph at her stepmother's house, may be gambling that absorption is not the same as surrender.

- title: "平原上的摩西"
  title_en: "Why Try to Change Me Now"
  type: "tv"
  creator: "Zhang Dalei"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/tv/why-try-to-change-me-now.jpg"
  posted: "2023-01-20"
  revised: "2023-01-20"
  text: |
    Shuang Xuetao's novella is formally audacious Northeast Chinese literature: a murder mystery that is not really a mystery, a love story told in ellipses, a portrait of Shenyang's industrial decline across the 1980s, 1990s, and 2000s that refuses the consolations of either nostalgia or critique. The boldness of Zhang Dalei's series lies in honouring that refusal. Smoothing the story into legibility, giving the audience the emotional handholds the source material deliberately withholds, would have been fatal.

    The decision to hold shots of nearly thirty seconds, sometimes longer, with almost no plot advancement, a stairwell, a kitchen, the particular quality of afternoon light on a bloc of socialist housing, is not an affectation but a moral stance. These are the shots that conjure the atmospheres of three decades, that make one feel the weight of time passing in a specific place among specific people, rather than merely seeing it represented. The long take forces the same dilation of attention that memory actually performs: things sit in the mind not in proportion to their narrative importance but in proportion to the feeling they carried. That is what the 1990s feel like, what the 2000s feel like, in this corner of China: heavy with weather that has no dramatic justification. The domestic drama of the past decade, and the daring one. Nothing else in recent Chinese cinema has trusted its audience so completely.

- title: "Atlanta Season 2"
  type: "tv"
  creator: "Donald Glover"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/tv/atlanta-season-2.jpg"
  posted: "2022-12-18"
  revised: "2022-12-18"
  text: |
    'Teddy Perkins' is a single episode of television that does things no other form could do and that almost no other practitioner of the form would have had the nerve to attempt. Donald Glover in full prosthetic disguise as a figure assembled from the wreckage of Michael Jackson, Prince, and every Black entertainer whose talent was extracted and metabolised by a controlling father: it is at once a horror film, a Kubrickian exercise in dread accumulation, and one of the most concentrated statements about the cost of Black excellence under patriarchal and white supremacist systems that American television has produced. LaKeith Stanfield's Darius, alone in the house with this apparition, carries the episode's dread through physical stillness; Hiro Murai directs with a corresponding stillness that generates more unease than any jump-cut ever could.

    The rest of Robbin' Season holds. 'Woods' is harrowing in a different key; 'Barbershop' is an excellent bottle episode; 'North of the Border' is comedy so dark it leaves a residue. Brian Tyree Henry's Alfred anchors the season's tonal range: Paper Boi's rising fame and escalating paranoia tracked with an intensity that never becomes caricature. Season 1 established what the show was; Season 3 reached further and sometimes overreached; Season 4 resolved with a strange, earned grace. Season 2 maintains the highest consistent quality across its episode run.

- title: "Atlanta Season 1"
  type: "tv"
  creator: "Donald Glover"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/tv/atlanta-season-1.jpg"
  posted: "2022-12-18"
  revised: "2022-12-18"
  text: |
    ***Atlanta*** arrives as something for which no existing vocabulary quite fits, and that is the point. It is not a sitcom, not a drama, not a sketch show, not a mood piece, though it borrows from all of these and discards each label the moment it threatens to settle. Donald Glover and his writers build something closer to a controlled hallucination of Black life in a specific American city: the texture of broke-adjacent survival, the absurdist indignities of the music industry's lowest rungs, the way systemic violence sits inside ordinary scenes like a frequency most people have learned not to hear. Glover himself described the show as '*Twin Peaks* with rappers', which is accurate enough as shorthand and useless as explanation; what the phrase leaves out is how much of the show's power comes from material specificity, from strip malls and Section 8 conversations and the rap ecosystem as local economy rather than spectacle.

    Donald Glover's Earn is the centre but rarely the driver. He drifts through the season with a passivity that in a lesser show would read as inertia but here reads as something more diagnostic: the paralysis of an educated Black man who can see every structural trap and still walks into them because the alternatives are not visible from where he stands. Brian Tyree Henry's Paper Boi is all friction, all refusal, and the show never romanticises his rising career or flattens him into archetype; the tension between the cousins is that Earn needs Alfred more than Alfred needs him, and both know it, and neither says it. 'B.A.N.' announces the show's formal range most explicitly: a fake BET talk show, complete with satirical commercials, that pivots between comedy, cultural criticism, and something approaching Brechtian estrangement without once breaking its own internal logic. 'Value' does something quieter and equally devastating, following Zazie Beetz's Van through a drug test crisis that maps the economic precarity beneath middle-class Black respectability with forensic calm.

    The show's frequency distinguishes it from comparable work. The show operates at a frequency where comedy and menace are not alternating but simultaneous: the invisible car in 'The Club' is both a sight gag and an image of something spectral about how Black presence is processed in American space. Nothing is explained; nothing needs to be. One simply inhabits the frequency, and by the final episode one has either tuned to it or one has not.

- title: "A Confession"
  type: "tv"
  creator: "Paul Andrew Williams"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/tv/a-confession.jpg"
  posted: "2022-11-03"
  revised: "2022-11-03"
  text: |
    What should have been a simple case, in the procedural sense, is drawn through PACE and one opportunist's complaint into an ever-widening vortex that swallows the victim's family, an entire investigation, and a superintendent's career. Paul Andrew Williams keeps the series scrupulously close to the documented record, and this fidelity becomes its own kind of horror: not the horror of invention but of recognition, the sickening realisation that the system which failed Sian O'Callaghan and Becky Godden-Edwards did not fail through malice but through the careful, self-protective application of rules designed for precisely such circumstances.

    Martin Freeman's Steve Fulcher is constructed around a particular contradiction: the man who saves lives by breaking the law becomes the law's sacrifice, while those who hid behind procedure are protected by the very codes they invoked. As Steve says in the final episode, life seems to count for nothing before rigid bureaucratic codes. The cowardly, sheltering behind the banner of 'justice,' use PACE as their shield and let the truly honourable become the sacrifice. Imelda Staunton as Karen Edwards carries the other weight entirely: what it means to need answers the system has decided are inadmissible. The series studies institutional cowardice dressed as institutional integrity, and it closes without a shred of comfort.

- title: "House of the Dragon Season 1"
  type: "tv"
  creator: "Miguel Sapochnik / Ryan Condal"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/house-of-the-dragon-season-1.jpg"
  posted: "2022-10-30"
  revised: "2022-10-30"
  text: |
    The sensation of watching ***House of the Dragon*** in its first season is something close to what one imagines it must have been to watch *Game of Thrones* (2011) when it was at its most commanding: every detail deliberate, every shot weighted with consequence, the political machinery of the Targaryen court turning with a precision that rewards attention rather than punishing it. The Alicent-Rhaenyra opposition, Milly Alcock and Emily Carey in the early episodes, then Olivia Cooke and Emma D'Arcy carrying the roles into their full complexity, is frequently reduced in popular discussion to mere faction loyalty but is given enough texture here to carry the season's emotional pressure: two women who understood each other completely and are now arranged against each other by a system that was always going to do this to them. Paddy Considine's Viserys, decaying in real time, is the most sympathetic and most damning figure: a good man whose decency is indistinguishable from weakness, whose failure to resolve the succession is not indecision but the terror of a father asked to choose between his children.

    The season recalibrates the dragons from spectacle to argument with particular subtlety. They are not weapons in any stable sense; they are independent intelligences whose allegiances remain unstable, and this uncertainty makes the Dance of the Dragons feel like a catastrophe already in progress rather than a conflict about to begin. Matt Smith's Daemon sits inside this instability. The final scene above Storm's End, in which Aemond loses control of the very outcome he thought he commanded, is the season's thesis in miniature. Nobody starts a civil war; they simply reach a moment when stopping it would require a courage no one has managed to accumulate. And now we spiral into the Dance.

- title: "The Problem with Jon Stewart Season 1"
  type: "tv"
  creator: "Jon Stewart"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/problem-with-jon-stewart-season-1.jpg"
  posted: "2022-10-26"
  revised: "2022-10-26"
  text: |
    I discovered the first season had already aired by the time I came to it. The wait had been long enough: six years during which one watched Trevor Noah sand down, episode by episode, the institutional edge Jon had spent sixteen years constructing at *The Daily Show*, six years of Stewart surfacing in sideline conversations with Colbert and Oliver, radiating the particular restlessness of someone who knows exactly what they would do with a platform that they no longer have.
    ***The Problem*** has fulfilled that wait in ways that were not obvious in advance. The roundtable format, which Stewart had always suited better than the monologue, gives veterans space to be heard rather than processed, their testimony on VA failures and the mental health crisis folding directly into legislative argument without the usual layer of ironic distance. The interviews are razor-sharp and logically fluid in the way his best *Daily Show* work was, but without the defensive comedy that used to cushion the confrontation: Stewart is older, less interested in being liked, more interested in being useful. The subject of veteran care is as urgent as it is deliberately unglamorous. That Jon chose it for his return, rather than something more obviously spectacular, is itself a kind of statement.

- title: "The Lord of the Rings: The Rings of Power Season 1"
  type: "tv"
  creator: "J.D. Payne & Patrick McKay"
  creator_role: "dir."
  year: 2022
  eval: "liked"
  image: "/assets/images/thoughts/tv/lotr-rop-season-1.jpg"
  posted: "2022-10-15"
  revised: "2022-10-15"
  text: |
    The first half of ***The Rings of Power*** is the most expensive patience test ever constructed: five storylines deployed across a Second Age that Amazon clearly intends to inhabit for years, with the visual fidelity of a Peter Jackson film spread across eight hours that frequently feel like twelve. The Southlands thread carries the most immediate dramatic weight; Numenor has political texture that the show does not yet know how to use; Elrond and Celebrimbor's forge feels like setup for something that has not arrived yet. And then, somewhere around episodes five and six, the machinery catches. The escalation into the eruption of Mount Doom, Adar's campaign, the forging of the three Elven Rings, and the Halbrand reveal arrive with a cumulative force that retroactively justifies the slow build. The back half of the season is a genuine surprise.

    Two problems persist. Galadriel, as written, is the most uninteresting character in the series: a warrior-commander whose emotional range runs from grim determination to slightly less grim determination, a characterisation that flattens one of Tolkien's most complex figures into a blunt instrument. Morfydd Clark does what she can with the material, but the material gives her almost nothing to play against. The Harfoot storyline, meanwhile, takes several episodes to earn its place: the cultists pursuing the Stranger feel tonally displaced, as though borrowed from a different, less disciplined show. But Nori's arc with the Istar finds its rhythm in the later episodes, and the Stranger's ambiguity, his power arriving before his identity, produces a few moments of real wonder. He is not Gandalf; one refuses to believe they would make so lore-breaking a choice. The season is carried less by any single thread than by the accumulated conviction that this version of Middle-earth, for all its unevenness, is being built by people who understand that Tolkien's world operates on the logic of myth, not the logic of prestige television, and that the two are not always compatible.

- title: "Unbelievable"
  type: "tv"
  creator: "Susannah Grant, Ayelet Waldman & Michael Chabon"
  creator_role: "created by"
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/tv/unbelievable.jpg"
  posted: "2022-10-10"
  revised: "2022-10-10"
  text: |
    The structural decision to tell this story in two temporal tracks, Marie's disbelief in Washington and the methodical pursuit of a serial rapist by Toni Collette and Merritt Wever's Colorado detectives, initially seems like a formal choice, a way of maintaining forward momentum against the weight of trauma. By the end it reveals itself as something more deliberate: the two timelines are not parallel but indicting, their proximity an argument about the differential application of professional competence depending on who is doing the believing.

    In the final episode, when Chris is being interviewed by the FBI, she mentions that the Washington case left behind a great deal of evidence. The implication hangs there: so what exactly was going through the minds of those detectives in the first two episodes, especially that self-righteous older man, when they blamed Marie? Cholodenko refuses to make this a simple failure-of-empathy story, though it is that too. The more devastating charge is simpler and less forgivable: they were not even doing their jobs. Empathy is not a requirement of police procedure; accurate evidence collection is. The cowardice of calling disbelief an inability to relate collapses entirely when one observes that relating was never the professional minimum in the first place. Kaitlyn Dever carries every consequence of this argument in her face, and the show is wise enough to let her.

- title: "The Rehearsal Season 1"
  type: "tv"
  creator: "Nathan Fielder"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/rehearsal-season-1.jpg"
  posted: "2022-08-10"
  revised: "2022-08-10"
  text: |
    Nathan Fielder has been asking the same question since *Nathan For You* (2013), just with progressively more resources and less pretence of a comedic frame. ***The Rehearsal*** asks it directly, architecturally: *does rehearsal produce genuine emotional experience, or only its simulation?* The method is to construct elaborate full-scale replicas of bars, kitchens, living rooms, hire actors to stand in for the difficult conversation partner, then iterate the encounter dozens of times until every possible branch has been mapped. The formal premise is simple; the philosophical implication is not. When Patrick breaks down during a rehearsal about his grandfather's death, the tears are real. Rehearsal has produced grief. The body does not cleanly distinguish simulation from experience just because the scenario has been engineered. The show understands this and keeps pulling on the thread.

    The season's centre is Angela and the parenting simulation, in which Fielder builds a farmhouse in Oregon where Angela can rehearse raising a child using actors of escalating ages swapped in on an accelerated timeline. Angela leaves when the project stops being hers: 'It had become more so Nathan's rehearsal instead of mine.' But the consequence that Fielder cannot undo arrives through a six-year-old child actor named Remy, hired to play one phase of the simulated son. Remy has no father at home. After weeks of calling Fielder 'daddy,' he develops genuine attachment: not performed, not rehearsed, but the reality of a child who does not want the game to end. At a pretend birthday party, Remy sobs when told it is time to leave. 'I don't want you to be Nathan,' he says. 'I want you to be daddy.' A machine built to control emotional outcomes has produced, with extraordinary precision, the exact emotional outcomes it was designed to prevent.
    By the finale, Fielder is rehearsing his own past. He re-enacts the Remy situation with a different child, then plays Remy's mother Amber himself, wearing her clothes, her hand tattoo, sitting in a studio replica of her living room, trying to understand a position he put someone in and cannot reach from the inside. The recursion collapses into something between absurdity and anguish. Fielder is a wealthy producer with HBO's resources behind him, constructing replicas of the lives of ordinary people, cycling child actors on schedule, managing others' emotional experience as a production problem, and by the end of the season he is more lost than anyone he tried to help, rehearsing his way towards an authenticity that the very act of rehearsing makes impossible to reach.

- title: "How to with John Wilson Season 2"
  type: "tv"
  creator: "John Wilson"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/how-to-with-john-wilson-season-2.jpg"
  posted: "2022-08-09"
  revised: "2022-08-09"
  text: |
    Season two deepens what season one established without simply restating it. The how-to premise is still a Trojan horse: each episode promises utility and delivers something closer to phenomenology, Wilson's hands and camera moving through New York with the patience of someone who believes that if one looks at anything long enough it will confess something true. The associative editing remains the formal method, cuts that generate meaning through unexpected visual rhyme rather than expository logic, and the second season pushes this further into genuine strangeness without losing the warmth that keeps it habitable.

    Wilson and Nathan Fielder have demonstrated, across their respective bodies of work, that the documentary form has not been exhausted but misused. *Nathan For You* (2013) and *The Rehearsal* (2022), How to Make Small Talk and How to Be Spontaneous: each treats the camera's presence not as a frame for reality but as a constitutive element of it, a force that causes people to reveal themselves precisely because they are trying to perform. The essay film tradition from Marker onward knew this, but it remained a niche; Wilson and Fielder have found a way to make the formal experiment feel intimate rather than academic. Season two of ***How to with John Wilson*** argues that ordinary life, looked at with sufficient attention and sufficient absurdist patience, opens into something vast.

- title: "Better Call Saul Season 3"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/tv/better-call-saul-season-3.jpg"
  posted: "2022-07-20"
  revised: "2022-07-20"
  text: |
    'Chicanery' is the episode the series had been building towards, and it delivers with a controlled fury that left me shaking. The trap is exquisite in its cruelty: Huell slips a fully charged phone battery into Chuck's pocket as he enters the courthouse, and Chuck carries it for nearly two hours, symptom-free, until Bob Odenkirk's Jimmy asks him to check his own breast pocket on the stand. Chuck erupts into a tirade about Jimmy's 'chicanery' that strips the legal veneer from what was always a personal vendetta, Michael McKean delivering what amounts to a career-best performance inside a performance. The brilliance of the writing is that both brothers are right. Chuck is correct that Jimmy will always cut corners; Jimmy is correct that Chuck's campaign was never about the law but about the moralisation of expertise, the guild protecting itself from someone who entered through the wrong door.

    The rest of the season metabolises the fallout. Howard buys out Chuck's partnership with personal funds, a forced retirement; Jimmy attempts reconciliation and Chuck tells him he never mattered. The finale opens with a flashback: young Chuck reading to young Jimmy by the light of a gas lantern. In the present, Chuck sits alone in a house he has gutted to the studs, wrapped in a space blanket, and kicks that same lantern off his desk. On the cartel side, Gus Fring's arrival reintroduces the architectural patience that made *Breaking Bad*'s fourth season so suffocating, and the show now runs on two parallel tracks of slow ruin: Jimmy's moral drift and Gus's empire-building, both powered by men who believe their control is absolute. The season understands the unbearable fact that the moment Chuck needed most to be right about Jimmy was the moment Jimmy proved him right.

- title: "Better Call Saul Season 2"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/tv/better-call-saul-season-2.jpg"
  posted: "2022-07-14"
  revised: "2022-07-14"
  text: |
    Chuck's insecurity is probably a side effect of perfectionism: after years of hard-won struggle, a wild card appears and truly draws out the petty tricks lurking in his heart. Michael McKean plays the deterioration with extraordinary precision, keeping Chuck pitiable and villainous in the same breath, never letting one state excuse the other. The document-splicing sequence at the end of the season is the show crossing a threshold, not just for Jimmy but for itself, the moment ***Better Call Saul*** stops being a *Breaking Bad* (2008) appendage and becomes its own tragedy.

    Again, Kim and Jimmy trying to carve out a patch of sky for themselves is largely the best thing about this season, Rhea Seehorn doing work that the Emmys notoriously refused to see. Their scenes together carry the show's deepest investment: two people whose decency is being gradually outpaced by the world they are embedded in. In smaller part, Jonathan Banks's Mike is slowly being drawn into the drug dealing scene, his moral structure eroding one rationalisation at a time.

- title: "Better Call Saul Season 1"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/tv/better-call-saul-season-1.jpg"
  posted: "2022-07-14"
  revised: "2022-07-14"
  text: |
    The first season of ***Better Call Saul*** is, beneath its procedural surface, a study in credentialist gatekeeping. Bob Odenkirk's Jimmy McGill earned his law degree through a correspondence course at the University of American Samoa while sorting mail in the basement of his brother's firm; Chuck earned his through the front door of every institution that matters. When Jimmy passed the bar, Michael McKean's Chuck quietly instructed Howard to deny him a position at HHM, and the show does not frame this as villainy; it frames it as something worse: institutional logic operating exactly as designed, the guild protecting its purity from someone who entered through the service entrance. The Kettlemans tell Jimmy he is 'the kind of lawyer guilty people hire,' and the sentence cuts not from malice but from a class instinct so naturalised it passes for perception. Jimmy works from a nail salon utility room, takes court-appointed cases, builds a Sandpiper Crossing elder-abuse suit from scratch, and watches HHM absorb it the moment it becomes valuable: his own work, seized by the institution that refused to hire him.

    Chuck gives the season its tragedy. His electromagnetic hypersensitivity reads first as eccentricity, then as metaphor, then as something more unsettling: a brilliant man whose illness is indistinguishable from his need to be the only signal in the room. The show never resolves whether the condition is psychosomatic; it does not need to, because the dynamic it produces is clear enough: the moralisation of expertise, the older brother's authority weaponised against the younger's competence, love and contempt braided so tightly that neither can see where one ends and the other begins. Jimmy does not become Saul Goodman because he is a bad person; he becomes Saul Goodman because the respectable alliance was never going to accept him, and the outsider alliance at least rewards his talents.

    The season ends in Cicero, where Jimmy runs cons with his childhood friend Marco. Marco dies mid-scam; his mother gives Jimmy the pinky ring. In a parking lot, about to accept a legitimate position at Davis & Main, Jimmy fidgets with the ring and drives away. The ring is a talisman, and what it represents is not a fall but a recognition: the institution told him he did not belong, and eventually one stops knocking.

- title: "Breaking Bad Season 5"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/tv/breaking-bad-season-5.jpg"
  posted: "2022-07-11"
  revised: "2022-07-11"
  text: |
    The most important thing the fifth season teaches is not about Walter, who by this point has rendered himself unambiguous: it is about the people who watch him and feel something like kinship. The show has always been constructed so that the audience tracks Bryan Cranston's Walter in his rationalisation in real time, finding each step locally plausible even as the cumulative direction becomes monstrous; season five removes even the rationalisation, and Walter simply revels. 'Say my name.' 'I did it for me. I liked it.' The honesty is almost restful after the sustained self-deception of the preceding seasons. What is left is the shape of a man who could not accept help, could not accept diminishment, could not let a single slight go unanswered, and paid for that intractability with everyone around him.

    The question that the show has always been asking is not whether Walter is redeemable. The show knew from the beginning he was not. The question is what it reveals about us that we kept watching, kept half-rooting, kept finding the intelligence and competence seductive even as the body count rose. Walter should have died in season two. Everything after that is the interest accumulating on a debt that was never going to be repaid in kind. Everyone around him, Anna Gunn's Skyler, Aaron Paul's Jesse, Dean Norris's Hank, the people who simply had the misfortune of being near him, had their ordinary lives destroyed in service of his pride. Stay away from people like Walter White. More than that: stay away from people who sympathise with him, because the sympathy is the problem, and it is the problem the show was diagnosing from the start.

- title: "Breaking Bad Season 4"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/tv/breaking-bad-season-4.jpg"
  posted: "2022-07-09"
  revised: "2022-07-09"
  text: |
    Season four operates on sustained dread, two masterminds circling each other with the patience of people who understand that the first visible move is probably the losing one. Giancarlo Esposito's Gus Fring is Bryan Cranston's Walter's dark mirror and also his superior: the same pride, the same capacity for cold calculation, the same empire-building under cover of legitimate industry, but without the emotional volatility that keeps undoing Walter at crucial moments. Esposito plays him as a man who has long since metabolised his own grief into something structural, something that runs the whole apparatus, and the season's slow revelation of his backstory makes him tragic rather than merely formidable.

    The finale turns on Walter poisoning a child, which at the time of broadcast was the clearest evidence yet of how far the rationalisation machine could be pushed. One watched it feeling something that resisted articulation. To borrow Walter Jr's framing, still the most direct moral verdict the show offers anyone: Walter, why don't you just die already? The heartbreak is not for Walter. It is for Jesse, for Skyler, for everyone orbiting him who can see what he is and cannot get clear.

- title: "Breaking Bad Season 3"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/tv/breaking-bad-season-3.jpg"
  posted: "2022-07-04"
  revised: "2022-07-04"
  text: |
    This is the season where Walter becomes legible. The self-deception that powered the first two seasons begins to thin, and what emerges beneath it is precisely what the show has been arguing all along: a pathetic, egoistic, manipulative man whose every gesture of love is a form of control. He refuses to let Anna Gunn's Skyler leave. He moves back into the house uninvited, performs the devoted husband in public while she suffocates in private, weaponises the family unit because dissolution would mean admitting failure. 'Fly' distils the pathology into fifty minutes of airless obsession: Bryan Cranston's Walter and Aaron Paul's Jesse locked in the superlab, hunting a contaminating insect, and the fly is not the point; the point is that Walter cannot tolerate any element of his environment he does not command, and the episode lets that need run until it becomes indistinguishable from madness.

    The collateral damage widens. The Salamanca cousins are redirected from Walter to Hank, and Hank nearly dies in a parking lot, shot four times because of a man he does not yet know is his brother-in-law. Walter is never the one who bleeds; he is the origin of the wound, routed through criminal and institutional networks until it strikes someone who had no part in any of it. In the finale, cornered by Gus, Walter instructs Jesse to kill Gale Boetticher, the mild-mannered chemist who could replace him, the one person in the operation who is unambiguously innocent. Jesse goes to Gale's apartment and shoots him in the face. Walter has converted another human being into a tool for his own survival, and the worst part is not the act itself but the efficiency of it: how quickly he identifies the solution, how little it costs him. By the end of season three I wanted him dead. Not out of dramatic expectation but out of something closer to moral exhaustion. This is the real Walter, and he is straight-up sad.

- title: "Breaking Bad Season 2"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/tv/breaking-bad-season-2.jpg"
  posted: "2022-07-01"
  revised: "2022-07-01"
  text: |
    The second season announces its ending from the first frame: a pink teddy bear, singed and eyeless, floating in the Whites' swimming pool. The black-and-white cold opens return like evidence across the season: body bags on the driveway, an evidence team, debris scattered across the neighbourhood. One assembles the picture the way one assembles a paranoid structure, retroactively, after the damage is done. ***Breaking Bad*** is not, in its second season, content to be a character study of one man's moral collapse; it is building a causal architecture that reaches from a single act of omission to the deaths of a hundred and sixty-seven strangers, and the architecture holds.

    Jane Margolis is the hinge. A recovering addict, Jesse's girlfriend, someone offering genuine connection and genuine danger in equal measure. She discovers Walter's money and threatens to expose him. Walter visits Jesse's apartment, finds them both passed out, and watches Jane choke to death on her own vomit and does nothing. The scene is shot without music, without drama, without anything that would let the audience process it at a safe distance: Bryan Cranston's face passes through calculation, hesitation, and finally a stillness that is worse than either. He does not kill her; he lets her die, and this is the distinction he will spend the rest of the series using to acquit himself. Her father, Donald Margolis, an air traffic controller, returns to work hollowed by grief and fails to separate two aircraft. A hundred and sixty-seven people die. The debris falls on Walter's street. The show has built, with extraordinary structural patience, an argument about systemic amplification: that individual cruelty propagates through institutional channels until the body count has lost all proportion to the act that started it.

- title: "Breaking Bad Season 1"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2008
  eval: "liked"
  image: "/assets/images/thoughts/tv/breaking-bad-season-1.jpg"
  posted: "2022-06-28"
  revised: "2022-06-28"
  text: |
    ***Breaking Bad*** opens with a man whose pride has already been destroyed. Walter White works two jobs, teaches chemistry to students who do not care, and washes cars for a boss who humiliates him in front of those same students. The cancer diagnosis, when it arrives, is almost redundant; Walter was already dying of status wounds. What the pilot establishes with remarkable efficiency is that the decision to cook methamphetamine is not born from desperation but from something that the show will spend five seasons dissecting: the refusal to be diminished. Hank dominates his own birthday party. Bogdan makes him scrub rims. Gretchen and Elliott offer to pay for his treatment from their Gray Matter fortune, and Walter says no, because accepting their money would mean admitting that he sold his share for five thousand dollars and ended up here, and Walter White would rather build a drug empire than concede that.

    The writers' strike compressed the season from nine episodes to seven, and the compression shows: Walter's arc from terrified amateur to the man who walks into Tuco Salamanca's headquarters with a bag of fulminated mercury and detonates it moves at a pace that occasionally strains credibility, the character development running ahead of the emotional logic. What holds it together is the acting. Bryan Cranston calibrates Walter's rationalisation so precisely that one keeps finding him persuasive even when the writing asks too much too fast, and Aaron Paul gives Jesse a vulnerability that the early scripts barely sketched. The season is a proof of concept rather than a finished argument, but the concept that it proves is formidable: that the most dangerous thing about Walter White is not the violence but the pride, and that the pride was there before the cancer, before the meth, before any of it.

- title: "Love, Death & Robots Season 3"
  type: "tv"
  creator: "Tim Miller"
  creator_role: "dir."
  year: 2022
  eval: "liked"
  image: "/assets/images/thoughts/tv/love-death-robots-season-3.jpg"
  posted: "2022-05-21"
  revised: "2022-05-21"
  text: |
    ***Love, Death + Robots Volume 3*** corrects the course after a second season that felt, for all its occasional successes, curated into timidity. Alberto Mielgo's *Jibaro*, the closing episode, achieves something the anthology has been building towards since *The Witness*: a deaf conquistador and a lake spirit locked in a predatory loop, told entirely without dialogue, shot with a camera vocabulary that moves through its choreography the way sound moves through water. The tension carries the same charge as *Sonnie's Edge* and is executed with far greater formal authority: violent, irreducible, and fully realised in an animated medium that refuses the naturalistic escape routes live action would offer. Emily Dean's *The Very Pulse of the Machine* carries a different quality: quieter, philosophically adjacent to *Zima Blue*, but where that episode remained at the level of portrait, Dean gives the audience a consciousness to inhabit through its dissolution, the astronaut's drug-altered subjectivity unravelling outward into Io itself. David Fincher's *Bad Travelling* is the season's most legible allegory: the class dynamics practically diagrammed on the ship's deck, though the diagram is well-built.

    The rest of Volume 3 is uneven, as anthology structure almost requires. *Night of the Mini Dead* is a one-joke escalation that earns the joke. A few episodes outstay their welcome. But the final, the third, and the second are enough to justify the season's existence. *Jibaro* alone is enough to justify the form: the handling of camera and sound in that episode belongs in conversations about what animation can do that other media structurally cannot.

- title: "Severance Season 1"
  type: "tv"
  creator: "Dan Erickson"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/severance-season-1.jpg"
  posted: "2022-05-03"
  revised: "2022-05-03"
  text: |
    ***Severance*** takes a science-fiction premise, that a surgical procedure can split a worker's consciousness into distinct selves with no shared memory across the threshold of the office door, and turns it into a diagram of something already happening: the demand that workers arrive scrubbed of interiority, productive and cheerful, while the 'outie' self accrues the fatigue and grief that the 'innie' will never be permitted to feel. Dan Erickson's writing metabolises this into something that is simultaneously Kafkaesque workplace horror and a genuine philosophical puzzle about identity, consent, and what it means to be the author of one's own life. Ben Stiller's direction deploys the sterile geometry of Lumon's corridors with Kubrick-esque deliberateness: every symmetrical frame is an argument about control.

    The acting keeps the show from becoming mere allegory. Adam Scott holds two versions of the same person in tension, the 'outie' Mark's grief-sodden numbness and the 'innie' Mark's tentative, almost childlike curiosity, calibrating the gap between them with extraordinary subtlety. The ensemble, Britt Lower's Helly, John Turturro's Irving, Zach Cherry's Dylan, fills out Lumon's absurdist ecology with performances that keep the comedy and the dread in permanent, productive suspension. The Kier Eagan mythology, with its corporate scripture and its Waffle Parties, is the show's most Fisher-adjacent element: a fully realised simulacrum of religious devotion in service of shareholder value.
    The back half of the season does not sustain the front half's absolute control. The camerawork grows more conventional as the plot accelerates, and certain revelations feel rushed towards a cliffhanger rather than earned on their own terms. Patricia Arquette's Mrs Selvig deploys a manner so studied that it occasionally punctures the spell. These are real complaints. But the show's best passages, the 'outie' episode, the dance, the finale's final sequence, achieve a kind of stunned emotional clarity that prestige television almost never reaches. The best show of its year, and it is not especially close.

- title: "Clarkson's Farm Season 1"
  type: "tv"
  creator: "Gavin Whitehead"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/tv/clarksons-farm-season-1.jpg"
  posted: "2022-04-21"
  revised: "2022-04-21"
  text: |
    Gross profit for the year: £144. That figure arrives with the timing and weight of a punchline, but it is also the show's argument in miniature. Farming, as ***Clarkson's Farm*** presents it, is less a profession than a sustained act of institutional optimism, a commitment renewed each season against the accumulated evidence of weather, subsidy policy, mechanical failure, and soil. The series puts that helplessness on screen without aestheticising it. Jeremy Clarkson is an effective vehicle for this precisely because he is constitutionally unsuited to the role: the bewilderment is never performed, and his periodic fury at bureaucratic obstruction, at Natural England, at the sheer intractability of the land, reads as the authentic response of someone who has spent a career in a domain where competence and resources could solve most problems.

    Kaleb Cooper is the show's secret instrument. His expertise is so ingrained it has become atmospheric, expressed less in explanation than in the quality of his exasperation, and the comedy of the two of them, the apprentice who knows everything and the employer who knows nothing, never tips into condescension in either direction. The show becomes a compressed education in the political economy of British agriculture, in why small farms cannot survive without subsidy, in why the romantic image of the yeoman farmer bears almost no relation to the accountancy of the thing. It manages all this while remaining, in stretches, funny. The £144 gross profit demonstrates the economic reality; the television show documents it with clarity.

- title: "Endeavour Season 1"
  type: "tv"
  creator: "Russell Lewis"
  creator_role: "created by"
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/tv/endeavour-season-1.jpg"
  posted: "2022-03-24"
  revised: "2022-03-24"
  text: |
    The first series is, by design, fairly conventional in its mysteries: four cases, each self-contained, structured according to the grammar of the British detective drama that ***Endeavour***'s parent text did so much to establish. The score, still finding its footing, does not yet have the elegiac authority it will develop; the production occasionally shows the financial constraints of a series that had to prove itself after a single pilot. The important thing is that Russell Lewis has built the architecture of a career, and that one can already see, in these four episodes, most of the major relationships and moral coordinates that will carry the show through a decade.
    Shaun Evans avoids the obvious trap: there is no attempt to pre-empt John Thaw's Morse, to give the audience an impression of the icon they already know. Instead there is a young man who is brilliant, solitary, and intermittently insufferable, qualities that cohere as a personality rather than a set of iconic attributes. Roger Allam's Fred Thursday arrives almost complete, warm and gruff and principled in ways that are never sentimentalised. Oxford itself remains the show's most reliable character: the colleges, the river, the light, a city that has apparently decided to preserve itself against every passing century. A living fossil, and the show is wise enough to know it.

- title: "This Is Going to Hurt"
  type: "tv"
  creator: "Adam Kay"
  creator_role: "created by"
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/tv/this-is-going-to-hurt.jpg"
  posted: "2022-03-12"
  revised: "2022-03-12"
  text: |
    Ben Whishaw is perfect casting because he makes Adam Kay credible. The veneer of sardonic indifference, the nonchalance deployed as clinical distance, sits entirely naturally on Whishaw, and for much of the series one is in danger of accepting it at face value. What Adam Kay's own script, adapted from his memoir, achieves with real intelligence is the gradual dismantling of the reader-identification that the book's first-person voice always risked flattering: the diary format invites complicity, but the television form allows other perspectives to accumulate around Adam's self-portrait until the gaps become impossible to ignore.

    Because Adam is not, at bottom, someone concealing a fragile heart beneath thorny wit. He is a coward who mistakes competence for character, who is overconfident precisely where confidence is most dangerous, and who lacks the capacity for self-reflection that might, in time, correct either of these things. The decision to leave the NHS for a comfortable private practice is not a breakdown or a trauma response; it is the logical expression of what he is. Whether he is a brilliant doctor is debatable and the show has the honesty to leave it so. As a human being, the evidence accumulates towards something less comfortable than the memoir's admiring readership generally acknowledges.

    Ambika Mod's Shruti is the counterweight the show needs and uses without sentimentality: her trajectory does not exist to redeem Adam or to punish him but to insist that the system's costs are not evenly distributed. Lucy Forbes directs with precision, holding the comedy and the institutional horror in equilibrium through episodes that lesser handling would allow to tip into either farce or melodrama. Only Ben Whishaw could make that rottenness this watchable, which is itself a kind of moral provocation the show earns.

- title: "Silk Season 3"
  type: "tv"
  creator: "Peter Moffat"
  creator_role: "dir."
  year: 2014
  eval: "liked"
  image: "/assets/images/thoughts/tv/silk-season-3.jpg"
  posted: "2022-01-30"
  revised: "2022-01-30"
  text: |
    ***Silk Season 3*** is accomplished enough that its collapse in the final two episodes registers as genuine loss rather than disappointment with a mediocre show. Peter Moffat's background as a practising barrister gives the series a procedural texture that most British legal dramas only gesture towards: the chambers politics feel institutional rather than decorative, the conflicts of interest carry real weight, and Maxine Peake's Martha Costello inhabits defence work as something that costs her rather than ennobles her. Seasons 1 and 2 built their authority on that groundedness, and for four of Season 3's six episodes it holds.

    Then the writing loses its nerve. Martha, gradually flattened across the season's middle stretch, arrives at the finale as a version of herself that the earlier series would not have recognised: the defining vitality drained, the courtroom work rote, the characterisation collapsed into posture. Billy's acquittal resolved through the revelation of his terminal illness is precisely the narrative tidying that moral complexity exists to resist. Martha's exit, a bus passing in front of her as though obscured departure could stand in for meaningful ambiguity, closes on nothing. The case logic that these final two episodes offer would have embarrassed the seasons before them. One watches Season 3 for Peake, who delivers considerably more than the material asks, and for the six episodes that still remember what the show was for.

- title: "Silk Season 2"
  type: "tv"
  creator: "Peter Moffat"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/tv/silk-season-2.jpg"
  posted: "2022-01-30"
  revised: "2022-01-30"
  text: |
    Season 1 established the architecture: Martha Costello's absolute authority at the bar, the chambers as a system of competing loyalties and suppressed appetites, the law as a profession that requires its practitioners to argue convictions they may not hold. Season 2 takes that architecture and uses it to stage something more searching: an examination of what it costs to hold to values when the institutional structures that were supposed to protect them have been quietly hollowed out. Brendan Kay's case threads through the season with a patience that pays off fully; it stays in the mind for days because it refuses neat resolution, because moral residue is the point.
    A separate note is unavoidable: Shaun Evans playing Daniel is astonishing. The performance has a quality of controlled intensity that commands every scene that it occupies, and makes one regret all the screen time given to the comparatively thinly written pupils. Maxine Peake remains the series' still point, but Evans is the surprise. The two of them together produce a heat that the show has not previously managed.

- title: "Silk Season 1"
  type: "tv"
  creator: "Peter Moffat"
  creator_role: "dir."
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/tv/silk-season-1.jpg"
  posted: "2022-01-29"
  revised: "2022-01-29"
  text: |
    Maxine Peake constructs Martha Costello's presence with what can only be called absolute authority: every hesitation, every pivot, every moment of doubt managed and metabolised within the professional carapace of a woman who has learned to trust the argument over the feeling. Peter Moffat, writing from the inside of the bar he once practised at, understands that the ethical drama of criminal advocacy is not about guilt or innocence but about what the System demands of the people who operate it, and what those demands slowly take from them. Six episodes is an unusual constraint, and here it proves a gift: the compression forces Billy, Clive, and Martha into full, indelible life within a duration that most legal dramas would spend on setup.

    The single weakness is that the two pupils are given insufficient dimensionality, Martha's pupil Nick in particular. One feels the shape of what the show might want to do with his arc without the episodes to do it in. That is a narrow complaint against a series this assured. The courtroom sequences have the texture of something observed rather than dramatised, and the scenes between Martha and Clive carry an erotic charge that the writing is smart enough never to resolve.

- title: "Dopesick"
  type: "tv"
  creator: "Danny Strong"
  creator_role: "created by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/dopesick.jpg"
  posted: "2021-12-05"
  revised: "2021-12-05"
  text: |
    The *Chernobyl* (2019) of the opioid world: multiple storylines interwoven across collapsing timelines, with recovery, moments of triumph, and then disappointment, compromise, and heartbreak, the pattern repeating the way addiction itself repeats, the remission always shadowed by what is still in the bloodstream. Danny Strong's scripts are ruthless in their structure, refusing the comfort of a clean villain. Purdue Pharma and the Sacklers are indicted, yes, but so is the FDA that approved the labelling, the doctors who signed the scripts, the entire healthcare apparatus that treated pain management as a market opportunity. Michael Stuhlbarg's Richard Sackler is chilling because he never stops believing his own story: the drug works, the addicts are addicts by character rather than by design, and any other interpretation is a failure of will.
    Michael Keaton gives the best performance of his second career as Dr. Samuel Finnix, a small-town doctor who slowly realises what he has been made complicit in. The scene where he finally confronts a Purdue sales representative is not the catharsis one might expect; it is too late, too full of grief, and Keaton plays it as a man trying to find somewhere to put a remorse that has nowhere to go. Kaitlyn Dever's Betsy Mallum carries the series' grief, and the show earns its devastation honestly, never aestheticising the suffering or offering easy redemption.

    The final episode does not let Purdue off the hook even as it dispenses something like resolution. The brand continues to be indicted in the closing minutes, and the coda strikes with the force of a public health report: OxyContin is still on sale across America. One does not know whether to grieve or simply go numb, and the series knows this, which is why it closes there, in that exact paralysis, and does not blink.

- title: "Vigil Season 1"
  type: "tv"
  creator: "Tom Edge"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/vigil-season-1.jpg"
  posted: "2021-09-27"
  revised: "2021-09-27"
  text: |
    Amy on the submarine is probably in a fog from the very beginning: the depth, the recycled air, the claustrophobia compounding her pre-existing PTSD until her cognition is operating at a strange remove from events. By the final episode her thinking seems to have disordered itself, the detective's procedural clarity buckling under the accumulated weight of the hull around her. This is a generous reading of what might simply be inconsistent writing, but the series invites it, and Suranne Jones plays Amy with exactly the right kind of dissociation: focused and fraying simultaneously.

    Both the emotional and the thriller strands are handled with such care that they never jar against each other, which is rarer than it sounds in British crime drama of this kind. The pacing is smooth, the coordination between the submarine investigation and the parallel land inquiry unusually clean, and the impact holds across six episodes.

- title: "The Midnight Gospel"
  type: "tv"
  creator: "Pendleton Ward & Duncan Trussell"
  creator_role: "created by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/tv/midnight-gospel.jpg"
  posted: "2021-09-05"
  revised: "2021-09-05"
  text: |
    Pendleton Ward described it as 'the ultra-violence of cartoons with conversations on compassion,' and that is the show's operating principle, not its contradiction. The audio is real: each episode overlays a podcast interview with a meditation teacher, a mortician, a death-row Buddhist, a dying mother, while Ward's psychedelic animation tears the speakers apart, drowns them, feeds them to wolves, collapses their simulated universes around them. Clancy discusses kindness, forgiveness, presence, and ignores every word of it in his own life. The show never mocks this. It does not reconcile it either. Duncan Trussell called the title deliberate: 'Gospel means good news.' The irony and the earnestness occupy the same frame, and neither cancels the other, because the show understands that most people who talk about compassion are failing at it in real time, and that the talking still matters.
    The final episode uses audio recorded roughly three weeks before Trussell's mother Deneen Fendig died of breast cancer. She is the only character in the series addressed by her real name; she greets Clancy as 'Duncan' on arrival. Partway through, the animation ages Clancy years within the conversation. He tucks his elderly mother into bed, where she dies. Then he becomes pregnant, gives birth to her, and they keep talking. When Clancy asks what one does about heartbreak, she answers simply: 'You cry.' Trussell said he did not think he would see his mother again; when he saw the finished episode, it was one of the highlights of his life. The Buddhist rebirth cycle rendered as a literal maternal exchange, a son giving birth to the woman who gave birth to him, while she tells him that love persists beyond the body: eight episodes of carnage and irony exist to earn that image, and it earns them back.

- title: "Odd Taxi"
  type: "tv"
  creator: "Baku Kinoshita"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/odd-taxi.jpg"
  posted: "2021-09-03"
  revised: "2021-09-03"
  text: |
    The pacing and the art style take a few episodes to settle into, and the early stretches can feel like an ensemble slice-of-life with unusually precise dialogue. Then, somewhere around episode five or six, a *Paranoia Agent* (2004)-style deja vu sets in: the sense that every detail has been placed, that the show's universe is a closed system and one has been walking around inside it without noticing the walls. Right at that moment Shanji floated a hypothesis, one that later proved remarkably accurate, and carrying that hypothesis all the way to the end, one could only think: I must have been blind to not see this coming.

    Kinoshita and writer Kazuya Konomoto achieve a pure form of fair-play mystery: nothing is withheld, every line pays off, every background character carries weight. The anthropomorphic aesthetic is not whimsy but method, a perceptual estrangement that lets the show's social commentary, on loneliness, on idol culture, on the small predations of modern life, work without the weight of realism pressing down on them. Satoshi Kon's ghost hovers over the whole enterprise, but ***Odd Taxi*** earns the comparison rather than merely invoking it. Brilliant.

- title: "True Detective Season 1"
  type: "tv"
  creator: "Nic Pizzolatto"
  creator_role: "dir."
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/tv/true-detective-season-1.jpg"
  posted: "2021-07-14"
  revised: "2021-07-14"
  text: |
    McConaughey and Harrelson's characters need no advertisement; everyone already knows how good they are. What the reviews tend to underemphasise is how precisely the dual-narrator structure earns those performances. The show operates on three temporal layers simultaneously, and the gap between what Rust Cohle and Marty Hart remember, what they choose to reveal, and what the camera contradicts produces a specific epistemological vertigo: ego and shame distort each man's retrospective account in ways that he cannot see. Fukunaga's visual grammar makes this legible without underlining it: Hart in medium shot, ordinary and exposed; Cohle in low angles that suggest both grandeur and vulnerability; the Louisiana landscape dwarfing both of them equally.

    The mystery elements are not especially dense, and the resolution has divided critics for this reason. But the character development is extraordinarily rich, and the perspective structure of the opening six episodes sustains repeated viewing. Rust Cohle's nihilism is not the show's philosophy; it is the show's symptom. One watches him articulate an airtight cosmology that happens to leave no room for the life he actually wants, and the tragedy is not the serial killer but the man who needed the killer to have a reason to feel anything. A series one could use as a psychology lecture slide deck.

- title: "The Mandalorian Season 1"
  type: "tv"
  creator: "Jon Favreau"
  creator_role: "dir."
  year: 2019
  eval: "meh..."
  image: "/assets/images/thoughts/tv/mandalorian-season-1.jpg"
  posted: "2021-06-14"
  revised: "2021-06-14"
  text: |
    The Volume deserves its own notice as a technological object: ILM's cathedral of LED screens assembling photorealistic environments around a standing cast is more interesting than most of what those environments contain. ***The Mandalorian Season 1*** is a borrowed game loop in live action, one mission per planet, one planet per week, each instalment completing itself and depositing the viewer back at the same narrative coordinate. The interactivity that makes this structure tolerable in games is absent; what remains is the side-quest feeling without the agency. Din Djarin moves through the galaxy in a helmet Pedro Pascal barely removes; the characterisation is deliberately thin by design. The design is the show.

    In a galaxy where Yoda fought in the Clone Wars, trained generations of Jedi, and left a mark on galactic history, several battle-hardened mercenaries and bounty hunters have apparently never heard of him. The wonder they perform at Grogu's appearance is played entirely straight. That is, one supposes, quite authentic.

- title: "Love, Death & Robots Season 2"
  type: "tv"
  creator: "Tim Miller"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/tv/love-death-robots-season-2.jpg"
  posted: "2021-05-15"
  revised: "2021-05-15"
  text: |
    The honest accounting goes something like this: taken as an anthology, only four or five episodes in Volume 2 have real depth of idea, and two or three are dead on arrival, 'Automated Customer Service' among them, a sketch that mistakes escalation for wit. By any honest measure the season does not hold together as a whole. But the subjective experience is a different matter entirely; criticism that insists on objectivity as a virtue tends to lose the thread there.

    What Volume 2 has over its predecessor is a tonal coherence that the first season, for all its exuberance, lacked. The range is narrower and the selection is fiercer, and when the episodes work, they work with a compression that recalls the best short fiction rather than the prestige television from which anthology formats usually take their cues. 'Pop Squad', 'Snow in the Desert', 'The Tall Grass': each is a complete argument, a world assembled and dismantled in under fifteen minutes.

    Then there is 'The Drowned Giant', which closes the season and which I prefer even to Zima Blue. Ballard's source story is already a meditation on impermanence and human indifference to the extraordinary, but director Tim Miller finds images for it that the prose cannot: the giant's body slowly scavenged, dismembered, dispersed into the ordinary world, remembered only by the scientist who bears witness and whose narration carries the full weight of elegiac grief. It climbs higher than Zima Blue precisely because it asks something harder of the viewer: not wonder at the sublimity of transcendence, but the more unglamorous work of bearing witness to entropy. One finished the episode unable to quite return to the world.

- title: "Don't Hug Me I'm Scared"
  type: "tv"
  creator: "Becky Sloan & Joseph Pelling"
  creator_role: "created by"
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/tv/dont-hug-me-im-scared.jpg"
  posted: "2021-03-02"
  revised: "2021-03-02"
  text: |
    'Green is not a creative colour.' That line, delivered by a singing Notepad to a puppet who has just painted a clown, is the thesis of the entire series compressed into seven words. Yellow Guy's clown is original, which is precisely why the Notepad pours black ink over it. Creativity is encouraged within pre-approved boundaries; deviation is punished. Becky Sloan and Joseph Pelling understood that the children's television format is not incidental to this argument but is the argument itself: each episode opens with a cheerful Sesame Street-style musical number whose message reveals itself, by the episode's end, as nonsensical, self-contradicting, and violent. Tony the Talking Clock teaches time and then rapidly ages the puppets until their ears bleed. A butterfly named Shrignold teaches love and devolves into cult-like worship of someone named Malcolm. A computer hijacks a geography lesson and traps the puppets in a digital world that glitches into body horror. The satire is not that bad ideas have been inserted into the educational format; the satire is that the format itself, the forced positivity, the sing-along structure, the assumption that the audience will comply, is the mechanism of indoctrination.
    Under the clever pastiche, the mythology accumulates. Roy, Yellow Guy's father, a humanoid puppet who never speaks, only breathes, is revealed across six episodes as the one running the entire system: summoning the teachers, operating the machine, watching his son drown in oil. His only quoted words, from a magazine interview, are chilling: 'My silly boy has allowed his eyes to grow arrogant and rude, for this I will take him on a trip to punish land.' The calendar in every episode reads June 19. In Episode 4, Red Guy notices a red wire, follows it, and finds himself in a motion-capture suit: the first character to question the manufactured reality and leave. In Episode 5, Duck Guy is disemboweled and eaten by a band singing contradictory nutrition advice. Red Guy calls from a phone booth in the 'real world.' Neither escape nor knowledge is enough.

    Episode 6 resolves this, or pretends to. Red Guy discovers a console that summons teachers, with Roy standing over it. He pulls the plug. The world resets. The characters are recoloured to match their favourite colours from Episode 1. The calendar flips from June 19 to June 20. The Notepad begins its song and is cut off. The cycle appears broken. But cutting the power cannot undo what the power produced. There is no pre-contaminated state. The puppets remain. The conditioning is already inside them, indistinguishable from personality, and no reset, no matter how cathartic, can pull it out.

- title: "How to with John Wilson Season 1"
  type: "tv"
  creator: "John Wilson"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/tv/how-to-with-john-wilson-season-1.jpg"
  posted: "2021-02-28"
  revised: "2021-02-28"
  text: |
    Rather like Woody Allen's narrative digression as a structural method, though on reflection that is simply how ordinary anxious people think: one thing leads sideways to another, and the sideways turn contains more truth than any direct approach would. Wilson's camera, always handheld and voyeuristic, catches New York doing what cities do when no one is watching them, and his deadpan narration treats the footage as evidence for propositions that are never quite stated. Each episode begins with a banal how-to premise and spirals into genuine meditation: loneliness, memory, the social contracts we maintain without knowing why. The risotto episode is somehow about Phish. This is not a flaw.

    One season felt exactly right. The format's vulnerability is predictability: once one has learnt the grammar of the digression, the next digression announces itself too early, and the surprise that made it moving calcifies into charm. What he made in six episodes is irreplaceable: a portrait of urban solitude precise enough to make loneliness feel briefly less private, the trick that almost no art attempts and almost none pulls off.

- title: "妄想代理人"
  title_en: "Paranoia Agent"
  type: "tv"
  creator: "Satoshi Kon"
  creator_role: "created by"
  year: 2004
  eval: "loved"
  image: "/assets/images/thoughts/tv/paranoia-agent.jpg"
  posted: "2020-09-19"
  revised: "2020-09-19"
  text: |
    ***Paranoia Agent*** is the series Kon used as a repository for ideas that couldn't be compressed into film-length form, which means it is also the work where his thematic obsessions are most fully mapped. Lil' Slugger, the boy on inline skates with his bent golden bat, is a manifestation of collective desire rather than individual malice: he appears to people under pressure who need an escape route, a scapegoat, an external cause for collapse. The series understands that mass hysteria is not a pathology imposed on individuals from outside but a social compact, something people consent to because the alternative is accountability. Maromi, the pink dog mascot whose merchandise saturates the show's Tokyo, is Lil' Slugger's other face: the comfort object and the threat are born from the same repressed trauma, Tsukiko's childhood lie that became a city's delusion.

    The storytelling is gripping in the way that only architecturally precise plotting can be. One returns after each episode to re-examine the previous episode's dream sequence with revised coordinates; the rewards are real and layered. It was only from episode ten onwards that the connection between Maromi and the bat became clear, which meant the final three episodes arrived with a slight sense of foregone conclusion, the revelation settling where one already, half-knowingly, expected it. That mild foreordination is not a flaw so much as a structural honesty: Kon is showing us a cycle, and cycles, by definition, have to end where they began. The final shots, a world rebuilt and already sliding back into the same patterns of denial, offer no comfort. They are not meant to.

- title: "Love, Death & Robots Season 1"
  type: "tv"
  creator: "Tim Miller"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/tv/love-death-robots-season-1.jpg"
  posted: "2020-07-06"
  revised: "2020-07-06"
  text: |
    The premise is eleven years in the gestation, the creative DNA descending from an abortive attempt to remake *Heavy Metal*, and ***Love, Death + Robots*** announces itself in the first episode with *Sonnie's Edge*: a body-horror opener that sits somewhere between cyberpunk and rape-revenge narrative, provocateur before it is anything else. The critics who found the season too preoccupied with violence and titillation were not wrong. What they missed is that the season's weakest episodes do not damage the best ones, and the best ones are extraordinary.

    *Zima Blue* is the clearest case: a pool-cleaning robot who becomes a celebrated artist, all aesthetic ambition and self-erasure oriented towards reclaiming the first blue tile it ever perceived. The animation strips down as the story does; the visual language chooses simplicity because the narrative is about returning to simplicity. Alberto Mielgo's *The Witness* goes in the opposite direction, building a cyberpunk loop of violence and desire with a visual grammar drawn from cinema and painting rather than animation convention, the graphic simplification underlying each frame co-existing with an eerie photographic presence. *Good Hunting* extends the range further still, beginning as a martial-arts fairy tale and pivoting into steampunk body-horror, tracing female agency and colonial transformation across an entire epoch in under fifteen minutes.

    The format rewards selectivity: one approaches this season the way one approaches a short story anthology, knowing some pieces will not work and that the question is always whether the strongest justify the collection. They do. The season established that animation could carry adult philosophical fiction without burying the idea under spectacle. *Zima Blue*, in particular, feels permanent: the image of an artist dissolving back into their first perception is not something that one metabolises quickly.

- title: "Black Mirror: Bandersnatch"
  type: "tv"
  creator: "Charlie Brooker"
  creator_role: "dir."
  year: 2018
  eval: "meh..."
  image: "/assets/images/thoughts/tv/black-mirror-season-bandersnatch.jpg"
  posted: "2019-09-05"
  revised: "2019-09-05"
  text: |
    The premise is irresistible: an interactive film about a programmer in 1984 adapting a choose-your-own-adventure novel into a video game, the viewer making choices for the protagonist, the protagonist gradually becoming aware that someone else is controlling his actions. The marriage of form and theme, free will interrogated through a format that enacts its absence, is a structural conceit that sounds extraordinary in description. In practice, ***Bandersnatch*** is a tech demo wearing a narrative's clothes. Fionn Whitehead does what he can with Stefan Butler, but the branching paths fragment characterisation to the point where no single version of the story accumulates enough weight to connect. One reaches an ending, is prompted to try again, reaches another, and the repetition does not deepen the experience; it dilutes it.

    The meta-narrative, Stefan told he is being controlled by a viewer on Netflix in the twenty-first century, is clever exactly once. The problem is not the interactivity itself but what it reveals about the gap between concept and execution: choose-your-own-adventure storytelling and emotional investment may be structurally incompatible, the freedom to choose also the freedom not to care. As a technological experiment it is impressive. As drama it is thin. The best *Black Mirror* episodes leave one with a single image that refuses to leave; *Bandersnatch* leaves one with a flowchart.

- title: "Black Mirror: White Christmas"
  type: "tv"
  creator: "Charlie Brooker"
  creator_role: "dir."
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/tv/black-mirror-season-white-christmas.jpg"
  posted: "2018-08-31"
  revised: "2018-08-31"
  text: |
    ***Black Mirror: White Christmas*** is the show's masterwork. Jon Hamm and Rafe Spall sit in a remote cabin on Christmas Day, trading three nested stories that slowly reveal themselves as a single mechanism. The structure alone is worth studying: Hamm's Matt narrates his backstory as a dating coach using augmented reality eyepieces to guide men through encounters, a setup that plays as dark comedy until it does not. Then the cookie: a digital copy of a person's consciousness, extracted and enslaved as a smart-home assistant, subjected to time dilation until months of solitary confinement break its will. Then Spall's Joe, trapped in a world where 'blocking' another person renders them a featureless grey silhouette, unable to see or be seen. Each story expands the show's vocabulary; together they give Brooker his clearest account of what technology does to the boundaries between persons.

    The final reveal, that the entire conversation has itself been a simulated interrogation, collapses every frame of reference the episode had established. And then the punishment: Joe's cookie set to experience a thousand years per minute over a Christmas weekend, 'I Wish It Could Be Christmas Everyday' playing on loop, a sentence so disproportionate to any concept of justice that it stops being about crime and becomes about what cruelty looks like when it costs nothing to inflict. Matt's real-world punishment is quieter and almost worse: placed on a permanent registry, blocked by everyone, he walks through the world as a red silhouette, visible only as a warning.

    I have watched a great deal of television. I have not encountered seventy minutes that use their structure this ruthlessly. Every scene does double work: what it means on first viewing and what it means once one knows the frame is itself a frame. *White Christmas* is the episode I would hand someone who asked what ***Black Mirror*** is, and the episode I would hand someone who asked what television can do that film cannot.

- title: "Black Mirror Season 1"
  type: "tv"
  creator: "Charlie Brooker"
  creator_role: "dir."
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/tv/black-mirror-season-1.jpg"
  posted: "2018-07-19"
  revised: "2018-07-19"
  text: |
    Three episodes, three entirely different textures of dread. 'The National Anthem' plays its grotesque premise, Rory Kinnear's Prime Minister blackmailed into having sex with a pig on live television, not as farce but as procedure, the camera tracking the machinery of government and media as they grind towards the inevitable. The real image is not the act itself but the empty street afterwards: Princess Susannah released thirty minutes early, wandering free, and nobody notices because the entire country is watching. Brooker, whose career was built on satirising television, knows what he is diagnosing here. Not technology. Us.

    'Fifteen Million Merits' is the one that will not leave. Daniel Kaluuya plays Bing with a quiet, accumulating fury that the System around him is designed to absorb. The dystopia is total: cycling for currency in screen-walled cells, consuming generated content, aspiring to nothing beyond the talent show that is the only permitted exit. When Bing finally breaks, pressing a glass shard to his throat on live television and screaming about the machinery that reduces everything to product, the judges do not punish him. They offer him a show. The rebellion is absorbed. The glass shard becomes a prop on his studio desk. I had not seen a more precise image for how systems digest the anger directed at them.

    'The Entire History of You', written by Jesse Armstrong, grounds the anthology in domestic scale after two episodes of societal horror. The memory-recording grain is barely speculative; what Armstrong builds from it is a marital thriller where Toby Kebbell's Liam discovers that jealousy and perfect recall form a feedback loop that can only destroy what it examines. ***Black Mirror*** announced itself with these three as something television did not have: an anthology for the age of screens, less interested in the technology than in the human weaknesses that the technology locates and widens.


