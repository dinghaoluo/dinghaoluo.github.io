- title: "Taiwan Travelogue"
  title_en: "臺灣漫遊錄"
  type: "book"
  creator: "Yang Shuang-zi, trans. Lin King (EN)"
  creator_role: "by"
  year: 2020
  eval: "disliked"
  image: "/assets/images/thoughts/books/taiwan-travelogue.jpeg"
  posted: "2026-07-06"
  revised: "2026-07-08"
  text: |
    I wrote a full review ([Who won the Booker? On transcreation and *Taiwan Travelogue*](/writing/taiwan-travelogue/)) on Lin King's English translation of the book, which won the International Booker in 2026. These briefer thoughts below are dedicated to the original Chinese text.

    Yang Shuang-zi's ambitious frame narrative sets ***Taiwan Travelogue*** to have been written in 1954 by the fictional Japanese novelist Aoyama Chizuko, whose first book was adapted into a film which brought her the opportunity to travel to colonial Taiwan. However, the ambitious frame immediately collapses the first moment a Chinese reader encounters the manga speech-bubble-style dialogue between Aoyama and her local translator, Chizuru. Aoyama, this supposedly celebrated author, speaks in exclamations like 「太厲害了！」 (which I almost could not help translate as 'sugoi!' instead of 'so great!' since it sounds so cartoonish and anachronistic) and vocalisations such as 「嗚嗯唔哼」 (which can only be approximated in English as 'hmmm... hnnngh...'), with Chizuru who has 'eyes curving into little arcs' and offers 'privilege tickets' as a favour. And by chapter five Yang's Aoyama has thrown grammar out of the window, with sentences whose participles do not agree with the subject at all (e.g. 'As the Empire's southern colony, and its first colony, I am interested in observing the crossed influences of the two places' cultural styles during my time on the Island.'). All of this is the shōjo-manga cadence Yang Shuang-zi's earlier career in yuri light fiction has employed, which in itself is certainly not a problem, but simply destroys any suspension of disbelief when the frame narrative puts the characters in 1930s Taiwan. 
    
    ***Taiwan Travelogue*** names each of its chapter with various foods in colonial Taiwan and pre-war Japan, signposting their importance in the narrative. Sadly, the foods are described superficially and mostly bear no connection to the plot at all: we see a numbered sequence of cooking steps for most of these dishes, and the specifications (as they can only be called this) of such dishes fit what cookbooks and tourism brochures would print. Hilariously, the fictional-author frame was itself so unpersuasive that Spring Hill placed 'Aoyama Chizuko' in the author position on the [first Taiwanese edition](https://zh.wikipedia.org/zh-hant/臺灣漫遊錄) and Yang Shuang-zi in the translator slot. Readers later complained of deception until the third printing removed the false author line.

    The novel does, in various places, deliver its colonial thesis, though only as cursory thoughts rather than as scenes. The prologue by the fictional scholar Hiyoshi Sagako goes further, reading Aoyama's chapter-IX 'homage' to Nishikawa Mitsuru (the leading Japanese colonial-literature writer in 1940s Taiwan) as indirectly 'self-critique' of her own earlier serialised Taiwan dispatches which later 'became' this book in our hands. These are the passages English-language critics (Eunice Lim in [*Suspect*](https://singaporeunbound.org/suspect-journal/2025/2/13/a-colonial-taiwan-lost-and-found-in-translation), Chialan Sharon Wang in [*Taiwan Lit*](https://taiwanlit.org/articles/bastardizing-memory-through-sh%C5%8Djo-cultural-and-historical-translation-in-yang-shuang-zis-taiwan-travelogue-a-novel-%E5%8F%B0%E7%81%A3%E6%BC%AB%E9%81%8A%E9%8C%84)) have quoted as the novel's serious achievement in its otherwise yuri light-novel frame, and I tend to agree on these fronts. But most of the book is spent elsewhere, *in* the yuri cadence, where Aoyama presses Chizuru into wearing a kimono, telling her that she will look wonderful in it, and where Aoyama repeats her 'friendship' advances under the plain colonial power differential, despite recognising that the Empire's southwards expansion is aggressive and brute. Yang does not once frame any of it as a problem, even in the afterwords which are supposed to offer reflection. Considering that Yang clearly understands the importance of this subject, the lack of serious discussion thereof seems more like a misplacement of priority. I found it a well-intentioned book, weirdly reminding me of another of my recent reads, Paul Auster's *Brooklyn Follies* (2005), in that it wants to appear politically thoughtful but does not earn its mark.

- title: "The Sense of an Ending"
  type: "book"
  creator: "Julian Barnes"
  creator_role: "by"
  year: 2011
  eval: "liked"
  image: "/assets/images/thoughts/books/sense-of-an-ending.jpg"
  posted: "2026-06-15"
  revised: "2026-06-15"
  text: |
    It's hard to read ***The Sense of an Ending*** without thinking about the science of memory reconsolidation: every retrieval destabilises the stored trace and re-encodes it, so what returns to storage is not the original but a version shaped by the self doing the recall. Tony Webster has been re-recording his 1960s schooldays, his Bristol relationship with Veronica Ford, Adrian Finn's suicide, for forty years. The Tony who narrates Part One believes he was broadly reasonable, broadly hurt, never unjustified, never cruel; he remembers his letter to Adrian, written when Adrian began dating Veronica, as 'brief, anodyne'. And when we the readers see Veronica return the actual letter in Part Two, it is sexually vicious, calls her a cockteaser, wishes pregnancy on her, instructs Adrian to 'consult the mother'. Each recall has rewritten the trace cycle by cycle into something compatible with the peaceable man Tony *needs* himself to be. Barnes dramatises the process without naming the science. Every review of this book, including this one, ends up supplying the citation he withheld.

    Barnes later [wrote in the Guardian](https://www.theguardian.com/books/2021/jun/14/julian-barnes-on-the-sense-of-an-ending-i-learned-to-do-more-by-saying-less) that the title was *not*, contrary to popular belief, borrowed deliberately from Sir Frank Kermode's 1967 *The Sense of an Ending: Studies in the Theory of Fiction*: he 'had not heard of Kermode's book, let alone read it'. If that's the case, then it is one of the most beautiful coincidences that Kermode's book does offer a valuable insight into Barnes' novel: Kermode argued that we make time bearable by converting *chronos* into *kairos*; that is, converting formless duration of time into key narrative moments (and it is by another wondrous coincidence that I myself happened to be working on a project named *Kairos* when I read Barnes' book). Barnes' narrator carved, from that formless duration, stories and justifications that may have never existed: Adrian is the brilliant friend who chose philosophy over life, Veronica the difficult ex that probably never loved him, himself the moderate observer. Barnes implicates the reader along the same line. We have been reading Tony's re-encoded version as if it were the original recording, sharing (I certainly did as I read Part One) his irritation at Veronica's withholding; the withholding turns out to be the only adequate response to a man whose English reasonableness has been doing the editing for him. Tony, even in the final pages of the novel, remains inside the loop, still re-encoding, and Barnes never grants him the moment of clear recognition the genre would normally supply. The novel, despite being clearly not of the mystery genre, never resolves. 

- title: "The Trial"
  title_en: "Der Proceß"
  type: "book"
  creator: "Franz Kafka, trans. Breon Mitchell (EN)"
  creator_role: "by"
  year: 1925
  eval: "loved"
  image: "/assets/images/thoughts/books/the-trial.jpg"
  posted: "2026-05-27"
  revised: "2026-05-27"
  text: |
    K. is arrested on the morning of his thirtieth birthday and executed on his last day of being thirty: nearly a full year, during which the Court neither imprisons him, nor requires his attendance. But the Court waits and sprawls, spreading into every aspect of K.'s life. And K., who could have walked away at any point, who should know the proceedings have no binding force unless he grants them one, unfortunately chooses to submit. He adjusts his Sunday schedule around the hearing times. He prepares his defence. He even goes actively looking for the Court in attics and tenements and (unsurprisingly) finds it everywhere, because by looking he has already conceded its jurisdiction. The System's invasion is gradual and total: Court personnel appear in his bank, his lodgings, on street corners; the architecture of daily life reveals itself to have been the Court's architecture all along, merely unnoticed until K. began paying the kind of attention that constitutes submission.

    As a universally acknowledged fact it is impossible for a review of ***The Trial*** not to mention Kafka's most famous parable: 'Before the Law' talks about a man who sits before an open door for his entire life, waiting for permission to enter, and dies without entering. Before he dies, the doorkeeper finally tells him that the door was meant only for him and is now being shut. The man's deference to the System is the door's only lock; again, even in this little parable we see that *control relies on submission*. And K. *almost* recognises this; the conversation with the chaplain is the closest that he comes to seeing that the Court's authority is *produced* by the defendant's belief in it, that his own compliance is the engine of his prosecution. He sees it and, being far too late, cannot act on what he sees anymore: he has already internalised the Court's frame so thoroughly that even recognising the absurdity does not release him from it. He walks to his execution like a dog, and the shame, Kafka writes, will outlive him.

    As Breon Mitchell notes in his translation preface, Kafka died before settling the chapter order; Mitchell's translation preserves crossed-out passages and variant wordings in an appendix, so we read the novel knowing it has no authoritative sequence. The effect is that K.'s year feels unfinished in the same way his defence is unfinished: there is no moment where the Court announces a verdict, no scene that closes the case. The execution arrives mid-sentence, mid-life, as casually and comically as the arrest did. And one suspects Kafka's point is simpler and worse: the shame K. feels as he dies, the shame Kafka says will outlive him, does not require a conclusion. It only requires that enough people, like K., keep showing up to hearings they were never compelled to attend. The System functions by threats and intimidation. I fear that we already know this but simply do not act.

- title: "The Brooklyn Follies"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 2005
  eval: "meh..."
  image: "/assets/images/thoughts/books/brooklyn-follies.jpg"
  posted: "2026-05-14"
  revised: "2026-05-15"
  text: |
    Auster's prose remains a pleasure to read: the sentences are warm, the coincidences (as I wrote in my [review of *The New York Trilogy*](/thoughts/#the-new-york-trilogy) [1987]) land with their usual offhand grace, and Nathan Glass's voice carries the melancholy of a man who has (indeed) come to Brooklyn to die quietly and instead finds himself drawn back into life. But ***The Brooklyn Follies*** is a book that wants credit for its politics without earning them. It advocates 'voting Democrat', 'protecting the little guy', and embraces some of its characters' queerness with what it clearly considers generosity, almost as if Auster wrote the last few chapters of the book whilst constantly patting himself on the back. And yet if one just squints slightly, they would see that every woman in the novel exists as a surface: Marina is beautiful and available; Rachel is shrill and estranged; Joyce is a body Nathan admires from across a room. They are described from the outside, assessed for attractiveness, and then set aside once the men have extracted what they need from the interaction. The progressive posture makes this worse, not better. A book that signals its enlightenment on every other axis while writing women as though it were still 1955 is dishonest at best.

    I noted the same problem in *Moon Palace* (1989) and found that it had grown to an unforgivable extent in *Invisible* (2009), which would fail the Bechdel Test with flying colours. ***The Brooklyn Follies*** sits between them chronologically and morally: the sexism is less grotesque than in *Invisible*, but the gap between the book's self-image and its actual gender politics is wider, because here Auster is actively *performing* progressivism while reproducing the same flat, male-gaze portraiture that he has never interrogated. What a waste of his wonderful prose. It was not until *4 3 2 1* (2017), more than a decade later, that one could detect any movement away from such bigotry at all. But that would prove too little, and literally, too late.

- title: "Is a River Alive?"
  type: "book"
  creator: "Robert Macfarlane"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/books/is-a-river-alive.jpg"
  posted: "2026-03-21"
  revised: "2026-03-22"
  text: |
    Does Robert Macfarlane actually care about rivers? The question sounds ungenerous, but ***Is a River Alive?*** (ironically) earns it. Macfarlane follows Giuliana, Cosmo (whose brother is Merlin Sheldrake who wrote [*Entangled Life*](/thoughts/#entangled-life)), Yuvan and others into three different rivers' stories, which *does* suggest some level of caring, but the rivers are never honoured in their physical form, never allowed to exist on the page as more than rhetorical devices; the flowing water is named but never felt. The whole book feels like an extended preamble to an empty thesis. Macfarlane keeps invoking New Zealand's 2017 Whanganui River claim, Ecuador's constitutional provisions, the briefly granted personhood of the Ganges, because there are not many other solid cases, and none of them have meaningfully prevented ecological destruction. The *rights-of-nature* framework is offered with lyrical intensity but without philosophical or legal argument for the proposition that 'a river *is* alive'. I couldn't help feeling that Macfarlane was *not* actually trying to argue for rivers being alive, but then, if that's the case, what *is* he arguing for? And I'm sad to report that I was unable to find an answer to this question anywhere in the book.

    The book's prose invites the familiar language of urgency and enchantment when discussing environmental issues, which is precisely the kind of language that flatters seriousness without interrogating it. The hollowness of the content and the flatness of the human presences end up prompting in me a verdict harsher than I initally intended: a river may be alive, but this book certainly doesn't feel alive. Macfarlane writes beautifully indeed, but beauty without substance is decoration, and I sure expected more from a writer of his capabilities.

- title: "Capitalist Realism: Is There No Alternative?"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/books/capitalist-realism.jpg"
  posted: "2026-03-18"
  revised: "2026-03-18"
  text: |
    Reading Mark Fisher's first 'pamphlet', I kept thinking about the world it arrived into: the end of 2009, a full year into the worst financial crisis since the Depression, with no left alternative in sight. The Occupy movement was two years away; Corbyn, six. There must have been something moving about encountering ***Capitalist Realism*** in that silence, before anti-capitalism briefly recovered the sense that it might once again speak in the future tense. Reading it now, as the Labour Party moves away from Corbynism under Starmer, as Trump fractures democracy and institutional transparency in the US, my appreciation of the book comes with a deep, deep sadness.

    The usual objection to ***Capitalist Realism*** is that the book lacks philosophical substance, that it names a mood rather than constructs an argument. Fair enough: Fisher is not doing *Žižek*, but he is also not trying to. What he is doing, in barely eighty pages in the first edition, is something else entirely: handing an entire generation the vocabulary for what it already felt but could not say. The privatisation of stress. The depoliticisation of mental illness. The way ecological catastrophe gets endlessly 'acknowledged' and then quietly metabolised, as though the acknowledgement itself were the solution. These are, indeed, not arguments in the academic sense. The orthodox left will also note that Fisher never quite identifies capitalism as a social relation rooted in labour exploitation, that the critique floats as phenomenology unmoored from political economy. There is something to this, but Fisher understands that no amount of 'correct' structural analysis matters if nobody can *feel* the structure bearing down on them, and that making it felt is itself an awakening political act, the prerequisite without which no programme can begin. The very [success](https://shorturl.at/RqM1d) of the phrase 'capitalist realism' proves the point: it entered the lexicon precisely because it recognised what was already there, inarticulate yet suffocating.

    Philosophical arguments aside, Fisher's prose is so compressed and so precise that individual sentences carry the weight of entire chapters elsewhere. That closing line, 'From a situation in which nothing can happen, suddenly anything is possible again', manages to be a political programme *and* a prayer in the same breath. Knowing now about the unfinished *Acid Communism*, where Fisher was beginning to reframe neoliberalism as a counter-revolution against the thinkable, the book's final pages feel like a coiled spring. Fisher died in January 2017, and the privatisation of stress he described so clearly in these pages gained a terrible retroactive authority. By the end of the book I was close to tears.

- title: "Bleeding Edge"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/books/bleeding-edge.jpg"
  posted: "2026-03-11"
  revised: "2026-03-11"
  text: |
    This is my new favourite amongst the Pynchon-lites. *Inherent Vice* (2009) was entertaining, *Shadow Ticket* (2025) was hilarious, but ***Bleeding Edge*** merges those qualities with the paranoia, political insight, melancholy and emotionality more often found in his longer works. In the year when nobody quite knew what to call that attack, when '11 September' and '9/11' were still competing for semantic territory, Pynchon charts the invisible threads linking Silicon Alley start-ups, federal agencies, off-shore money, and the shadow economies around 11 September, threading them through seemingly unrelated characters and producing countless set pieces that feel at once absurd and historically precise. The DeepArcher virtual world reads now as elegy for the internet's lost utopian promise, and the novel's paranoid circuitry, its suspicion that *surveillance capitalism* was already embedding itself in the architecture of everyday life, has aged into prophecy.

    It is also the most human of the Pynchon-lites, perhaps of all Pynchon (bar *Mason & Dixon* [1997] which I have just started to work through). Maxine's semi-separation from Horst carries real emotional weight; she reads like a sharper, more distinct Oedipa Maas from *The Crying of Lot 49* (1966), a woman whose investigative compulsion grows out of feeling rather than away from it. The domestic texture, Maxine and Horst circling each other while the boys orbit the uncertainty, provides a deeply emotional backdrop for all that is/will be happening as we approach that fateful day. It is not until the end of the novel, as we walk alongside Maxine in Silicon Alley, that we feel the weight of the moment. And the world has never been the same ever since.

- title: "Gravity's Rainbow"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/books/gravitys-rainbow.jpg"
  posted: "2026-03-01"
  revised: "2026-03-01"
  text: |
    I have a full essay on ***Gravity's Rainbow*** [here](/writing/gravitys-rainbow/).

    The V-2 arrives faster than its own sound; the person beneath the arc hears nothing before impact, and the coordinate was chosen before launch. Everything after engine cutoff is ballistic, uncorrectable, and the people who chose the target area need never see the result. Pynchon's Preterite (from *praeteritus*, 'passed over') are the people beneath that arc: they are selected as objects, registered as target, labour, resource, stimulus, waste, but passed over as subjects, never encountered on their own terms. What the 760 pages keep working towards is whether any coordinate can be chosen as a beginning rather than imposed as a destination; the novel tests this through an unlaunched Herero counter-rocket, through Slothrop's uninterpreted rainbow, and finally through the audience's unfinished hymn on the last page, where Gottfried can hear Blicero but cannot answer, and the book stops precisely where the answering voice would begin.

    Inside the V-2's guidance system, a pendulum-and-coil integrator translated acceleration into the charge that eventually triggers Brennschluss, the instant of engine cutoff where powered ascent surrendered to gravity. Franz Pökler, one of the German scientists that works on the V-2 programme, watches his daughter Ilse grow up in the same calculus: each annual reunion with Ilse is a single data point, and he has to integrate over these *dt*s, for both the rocket and his daughter, to reconstruct the trajectories which they have taken. That is a clear exemplar of one of Pynchon's most impressive skills: he synchronises the mathematics (along with the historicity and philosophy) of destruction and those of a life, a feeling, a thought, a memory. And as the *Elect* and the *Preterite* shuffle past each other in the rubble of the post-war Zone, the novel's own form, as well as its protagonist Slothrop, also undergo a dissolution, a fragmentation that serve to confuse, to put us in the shoes of those who walked the ruins of Europe in 1945. This confusion may have partly contributed to the Pulitzer Prize jury's [charges of 'unreadable' and 'turgid'](https://www.nytimes.com/1974/05/08/archives/pulitzer-jurors-his-third-novel.html), but if in return we get a war novel that will surely survive the end of civilisation, generalisable to every war, every battle, every human conflict, every horrid death and every new technology, it is perhaps worth it for ***Gravity's Rainbow*** to be a little 'turgid' and contain the multitude that it was designed to contain.

    Pynchon, in unruly yet precise language, writes a Second World War novel that dismantles every convention of the genre. And years from now I will still remember, also, that as I flipped through the last episodes of the book, I found myself dissolving alongside Slothrop in the Zone, watching a magnificent rainbow arch after the rain, eyes brimming.

- title: "The City & the City"
  type: "book"
  creator: "China Miéville"
  creator_role: "by"
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/books/city-the-city.jpg"
  posted: "2026-01-18"
  revised: "2026-01-18"
  text: |
    ***The City & the City*** is often called *new weird*, but it is neither new nor weird. The premise, two cities occupying the same physical space, is interesting but goes entirely to waste. It did win the Hugo, the Clarke, the World Fantasy, and the Locus, which tells one more about prize committees than about the novel, since Miéville's world-building is surprisingly poor for someone whose novels are known for their maximalism: the rules of inter-city communication and materialisation are so underspecified that throughout my read, I kept losing suspension of disbelief. For example, what happens to a dog from Besžel that wanders into Ul Qoma? And why would objects from one city not constantly end up in the other, causing confusion? Well, one could argue that most of such questions have been defensively blocked by the concept of 'unseeing', but this very concept of *unseeing*, despite being philosophically rich (a Foucauldian disciplinary mechanism internalised as perception), is never interrogated with the seriousness it deserves. The world of the novel is thus built on shaky foundations, the crumbling of which really shouldn't be surprising to anyone losing track of the mechanism in the second half of the book.

    The ending only adds to this disappointment. The final thirty pages collapse a potentially myth-laden story into something half corporate thriller, half political farce. Breach, which should function as the novel's sublime unknowable, gets explained into banality. In retrospect, I should have tried harder to manage my expectations when I first felt Miéville's 'brushing-off' of the 'unseeing' concept. There is a version of this book that makes the seeing and unseeing feel as strange and inevitable as the Hiss in Remedy's *Control*. This is not that version.

- title: "The Prose Edda"
  type: "book"
  creator: "Snorri Sturluson, trans. Jesse L. Byock (EN)"
  creator_role: "by"
  year: 1220
  eval: "liked"
  image: "/assets/images/thoughts/books/prose-edda.jpg"
  posted: "2025-12-24"
  revised: "2025-12-24"
  text: |
    What a cluster of irrational, morally bankrupt, cavalier and indifferent gods! Þórr casually kicks the dwarf Litr to death at Baldr's funeral, Óðinn steals Suttungr's mead with the self-righteousness of a conqueror, and Loki's actual punishment arrives only after he has caused untold damage. Norse mythology as Snorri Sturluson renders it, rooted in thirteenth-century Christian Iceland and filtered through a euhemeristic framing device (in the Prologue, the Æsir are reframed as Trojan refugees who passed themselves off as gods among the Northern peoples, through the rationalisation offered in the etymology of 'Asia-Æsir'), is looser and darker than its Greek or Hindu counterparts. Snorri mythologises everything, the wind, the war, the clouds, whilst keeping his gods virtually indistinguishable from mortals. However much his systematising impulse reshaped oral traditions originally fragmentary, what comes through is an undeniable record of divine dysfunction.

    Now, the obvious implication of this mythological/theological dysfunction is that Norse gods are not a better version of humanity; they are simply a more weather-controlling, gold-engendering, shape-shifting species of us. The giants often match, if not surpass, them: Útgarða-Loki tricks Þórr into wrestling Old Age, drinking from the ocean, and lifting the Midgard Serpent disguised as a cat (all in a single visit, all without Þórr realising); Vafþrúðnir trades cosmic knowledge with Óðinn as an equal; and the gods generally win their contests through cunning and violence, not intellectual superiority. The pantheon's singularity among the world's major religious narratives is that Snorri does not idealise it: he denies his gods both virtue and final victory, and Ragnarök, often cited as one of the most powerful eschatological visions in world literature, reads more like a settling of accounts, not unlike what Judgement Day is (or should I say 'will be'?) for  Christian humans.

- title: "Inherent Vice"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/inherent-vice.jpg"
  posted: "2025-12-19"
  revised: "2025-12-19"
  text: |
    ***Inherent Vice*** is the second of the 'Pynchon-lites' that I've read. It flows far more smoothly than *Shadow Ticket* (2025), and its jokes and puns suit my taste better, but there is a faint nagging feeling that Pynchon is not great at high-density dialogue. The Paul Thomas Anderson almost verbatim adaptation exposes this clearly: on one hand, Pynchon's prose *is* conversational, with subjects and implied words often dropped entirely like in real life, but when dialogue gets dense, the overlaying of such conversational sentences can feel, quite counterintuitively, theatrical on the page, and PTA's adaptation, lifting lines straight from the text, carries that same stagey quality when actors deliver them aloud.

    Still, I love Pynchon's detective stories, and love how he reveals the mystery and then refuses to resolve it. Doc Sportello is a stoned noir detective wandering the circuit-board (ref. *The Crying of Lot 49*) streets of late-sixties Southern California, and similar to in his other works, Pynchon again pins epistemological uncertainty (which engenders paranoia and all the other wonderful themes in his novels) as his genre principle. And we can see this even in the book's title itself: 'inherent vice' is a maritime insurance term for a commodity's tendency to deteriorate from within, irrespective of external damage (butter spoiling, iron rusting, wine fermenting, all independent of the carrier's negligence), and Pynchon attaches it here to the counterculture at the turn of the seventies, the moment between the Summer of Love and the Manson murders when the  dream curdled. Doc's California is already in the deterioration phase referred to by the insurance metaphor: the movement's spoiling, stalling, fading away, with no one external to blame. Things *will* fall apart. Same as *Shadow Ticket* (2025), despite the 'lite'-ness, it was tremendous fun reading ***Inherent Vice***.

- title: "Models of the Mind"
  type: "book"
  creator: "Grace Lindsay"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/books/models-of-the-mind.jpg"
  posted: "2025-12-14"
  revised: "2025-12-14"
  text: |
    Grace Lindsay's central claim in ***Models of the Mind*** is straightforward, (mostly) uncontroversial, but still often unrecognised in the field of neuroscience: the brain, often described as the most complex object in the known universe, simply cannot be understood without mathematics. Out of a palpable desire to convince the remaining non-believers, Lindsay then walks through twelve chapters of how the field has done that, from spherical-cow-style simplifications of single neurones (Hodgkin-Huxley axon dynamics, integrate-and-fire models) through learning rules (Hebb, the Perceptron, backpropagation), memory (Hopfield networks, attractor dynamics), dimensionality reduction (low-dimensional motor control), Bayesian decision-making, and so on, finally landing on the grand unified theories (ironically in the plural): Friston's free energy, Hawkins' thousand brains, Tononi's integrated information. The book is quite short for this ambitious scope, with the obvious goal to not overwhelm the casual reader; the mathematics is, however, merely hidden away in the appendix, allowing any curious soul to wander in for a deeper adventure.

    Now, this is really not a typical popular-science book. Lindsay actively avoids flattening the models into metaphor. The Perceptron is the Perceptron; Hodgkin-Huxley is a system of differential equations and is named as such; predictive coding is shown to be a specific computational claim, not vibes about expectation. Each chapter pairs the model with its history (e.g. McCulloch and Pitts in 1943, Hodgkin and Huxley at Plymouth before the war), which is inevitably entangled with mathematics, physics, philosophy, computer science, dialogues between fields with birthdates centuries apart: mathematics in the field of neuroscience was never an imposition from outside biology, but a series of moves biologists themselves made when verbal description ran out (one is reminded of [how postwar British biophysics actually came into being](https://www.kcl.ac.uk/randall/history): John Randall, the Birmingham physicist who co-invented the cavity magnetron that won the radar war, took the Wheatstone Chair of Physics at King's in 1946 and founded the MRC Biophysics Research Unit that would, within a few years, house Rosalind Franklin and produce Photograph 51). By the final chapter, Lindsay has spent eleven chapters showing what a working model of the brain looks like, so when she then dismisses the grand unified theories as a category, one trusts that she knows what she is dismissing.

- title: "The Call of Cthulhu and Other Weird Stories"
  type: "book"
  creator: "H.P. Lovecraft, ed. S.T. Joshi"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/call-of-cthulhu.jpg"
  posted: "2025-12-08"
  revised: "2025-12-08"
  text: |
    I am grateful that my first literary contact with Lovecraft was compiled by S. T. Joshi, who wrote the two-volume Lovecraft biography *I Am Providence* (2010) and spent decades restoring Lovecraft's texts to the forms he actually wrote, after years of textual mishandling by August Derleth (who, beyond standard editorial alterations, [marketed sixteen of his own stories as posthumous collaborations](https://www.hplovecraft.com/writings/derleth.aspx) with Lovecraft, mostly built from 'one or more ideas' from Lovecraft's *Commonplace Book*). Joshi orders the volume chronologically, starting with *Dagon* (1917) and early stories less embedded in the Lovecraft mythos, building gradually and organically to *The Call of Cthulhu* (1928) and *The Shadow Over Innsmouth* (1936). 
    
    There is, of course, much discussion to be had on Lovecraft as a human being: Penguin has decided to include compilations of his works in collections that decide 'what counts as great American literature'. Whether one accepts such a decision depends on how much one can stomach the racism and xenophobia that sit not at the margins of Lovecraft's fiction but at its centre. We see that what horrifies Lovecraft most reliably is a Black character, a foreign cult, a Polish-Jewish landlord, the half-human inhabitants of Innsmouth. It's hard to imagine that Joshi would be unaware of such propensities of Lovecraft, but one thing about compilations is that they create a layered dissociation between texts and their authors: in this case that is a good thing, since the Lovecraftian stories are more easily enjoyed as standalone pieces embedded in an almost preconceived world, with Lovecraft's bigotry as a backdrop that lingers without permeating through the reading experience.

    Surprisingly (at least to me), the shorter stories are much more bone-chilling and palatable. My favourite passages and scenes are mostly in the shorts: the bleeding roof in *The Picture in the House* (1920), the narrator's despair in *The Outsider* (1926) looking into the mirror, the slow chromatic contamination in *The Colour Out of Space* (1927). Lovecraft's prose is famously purple and his characters flat, but the compression of the short story format keeps both problems below the threshold where they would damage the atmosphere; in the longer novellas (*At the Mountains of Madness* (1936) being the obvious example), the purple prose has more square footage to occupy, and the flatness of the narrator becomes harder to ignore. However, seeing the successes of David Lynch, Remedy Entertainment, Mark Danielewski makes me believe that one thing is for sure: people return to Lovecraft, even past the prose and the politics, for the specific cold feeling of human scale dissolving against something vast, indifferent, and very, very old.

- title: "Solenoid"
  type: "book"
  creator: "Mircea Cărtărescu, trans. Sean Cotter (EN)"
  creator_role: "by"
  year: 2015
  pin: true
  pin_order: "01-book-01"
  eval: "loved"
  image: "/assets/images/thoughts/books/solenoid.jpg"
  posted: "2025-11-29"
  revised: "2025-11-29"
  text: |
    I have a full review of ***Solenoid*** here: [Nothing Is Strange to a Child](/writing/solenoid/).

    'Bucharest is not at all a real city in my books. It's a state of mind and it's a metaphor,' Cărtărescu said in a [2022 interview](https://theuntranslated.wordpress.com/2022/10/06/mircea-cartarescus-interview-for-de-reactor-on-solenoid-mites-butterflies-kafka-untranslatability-censorship-a-paradise-in-ruins-and-his-latest-novel-theodoros/). That state of mind, that metaphor, wrapped in Cărtărescu's masterful maximalism, creates a whole distinct and (borrowing a central notion from the book) child-like world. The book's Bucharest is 1980s tramlines, factories, apartment blocks, vacant lots, hospital wards, and labyrinthine school corridors, rendered with such precision and such sensory saturation that its ordinary surfaces begin to feel like organic tissue. Cărtărescu attacks the readers with an overwhelming barrage of details so vivid that the familiar feels strange again, similar to how staring at a word for too long often renders the word unfamiliar. Cărtărescu examines the banal and the familiar so deeply that structure starts to give way to minutiae, and we are forced to examine with him and question our heuristics and *a priori* believes.
    
    And this is the way Cărtărescu lays the groundwork for the strangeness of his Bucharest. After such banalities as lice in the narrator's hair and taking the tram to work, Cărtărescu introduces us to the solenoid buried under a boat-shaped house that the narrator just bought (six such solenoids are revealed across the novel). The narrator, after having sex in the house's bedroom with Irina (another teacher from the school in which he teaches), sees that his partner has been lifted from the bed. Surprised? Not quite, as the narrator just acknolwedges it as a fact. It's something that just *happens*, like all the other strangenesses in Cărtărescu's Bucharest. The city is at once literal and impossible, its architecture obeying dream-logic while remaining stubbornly, concretely Eastern European.

    I rarely wait so long after finishing a title before I write down my thoughts. It's just that even weeks after finishing ***Solenoid***, I am still finding that ordinary objects (a school corridor, a pavement, a friend's bookshelf, the skin on the back of one's hand) have started to feel slightly wrong, as though Cărtărescu had walked through them first and left a hum that I cannot quite locate. Moving through Cărtărescu's Bucharest, thus, is one of the greatest and most impactful reading experiences of my life.

- title: "Flesh"
  type: "book"
  creator: "David Szalay"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/books/flesh.jpg"
  posted: "2025-11-18"
  revised: "2025-11-18"
  text: |
    Upfront, I do want to acknowledge that the stripped prose of ***Flesh*** seems to be deliberate. Szalay [said](https://thebookerprizes.com/the-booker-library/features/reading-guide-flesh-by-david-szalay) that he wanted the book to convey that 'our existence is a physical experience before it is anything else'. Well... István either indeed does not have the words for what happens to him, or Szalay is stubbornly refusing to believe that even someone as reserved and pulled-back as István would reach for the necessary words to contextualise the world around and within him. István says 'Okay' hundreds of times across the book, and beyond that his speech is largely limited to 'Yes', 'No', 'I don't know', 'Maybe'. Interiority is denied to the reader entirely, and crucially, it is denied without an encouragement for the reader to interrogate or (at the very least) understand István's feelings. And we have to realise that this denial is,at the end of the day, completely implemented on the indefensible assumption, by Szalay, that István would not be able or care to describe his experiences, even to himself. Szalay is asking that the reader buy this assumption wholesale and not think about it. Ah, but the moment when the reader begins to be suspicious of István's silence is the moment when the novel collapses. 

    The core of the issue is that Szalay (similar to many other 'form-over-substance' minimalist writers) wants *both* stripped prose *and* a tabloid plot: a fifteen-year-old on a Hungarian housing estate sleeping with a married forty-two-year-old, juvenile detention for a killing he did not commit, the Iraq War, private security work in London, a chauffeuring job that ends with him marrying the widow of the London billionaire he was driving. The trouble is that Szalay applies the same withholding to all of it. During the opening seduction, István's whole interior is 'he doesn't feel anything for her', 'she's just this old woman', 'it's like she hardly exists'. When István kills a man, the closest we get to his mind is a single line of police interrogation: 'You wanted him dead, didn't you?'. On his return from Iraq we are told 'normality' feels 'like a sort of outrage'. Three hundred plus pages, the repetition-as-technique starts looking like a way of filling pages without having to work out what the events would have meant to the protagonist. So at which point does this cross from 'minimalism' to 'laziness'?

- title: "V."
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1963
  eval: "loved"
  image: "/assets/images/thoughts/books/v.jpg"
  posted: "2025-11-17"
  revised: "2025-11-17"
  text: |
    Pynchon buries thousands of themes across Egypt, Virginia, New York, Malta, Paris, and mainland Italy, ranging from modernity's dismantling of the individual (SHROUD and SHOCK, the 'Bad Priest's' progressive replacement of flesh with prosthesis and fetish), to German colonial violence in South-West Africa (Herero and Bondelswarts bodies pressed together), to the shift from analogue to digital signal (the Kilroy figure scrawled across half a century). The dual structure, Profane's purposeless drift against Stencil's paranoid quest, enacts the central tension of *postmodern* existence: between entropy and the desperate imposition of meaning. Stencil reads V. into everything because he must; Profane reads nothing into anything because he cannot. Between these two failures of interpretation, Pynchon builds an entire world.
    But among all these themes, my favourite is Pynchon's yo-yo. Anyone who has ever watched a yo-yo understands Profane drifting aimlessly between first and last stops on the New York subway, understands Maijstral's repeating history, understands the tree-fruit-bird-shit-tree cycle in Slab's Cheese Danish No. 35, and can see the dozens of characters looping, crossing, colliding through this novel: dozens of yo-yos, inextricably tangled in eternal motion, their identities losing all meaning. The yo-yo contains everything the novel wants to say about determinism and drift without requiring a single explanatory sentence. What scholars call 'encyclopaedic narrative', what the poststructuralists call *ontological instability*, Pynchon calls a yo-yo.

    The Herero genocide chapters remain among the most devastating things Pynchon has written, and he was barely twenty-five when he wrote them. The systematic extermination in German South-West Africa, rendered with clinical precision and moral fury, announces the scope of Pynchon's moral vision from the very start. V. herself, progressively replacing her body with clockwork and glass until the children of Malta disassemble her on the street, literalises the Enlightenment project as self-destruction, and Pynchon frames it as comedy. ***V.*** already feels like Pynchon arriving fully formed, in possession of every tool he would later refine. The yo-yos are still spinning.

- title: "Maus"
  type: "book"
  creator: "Art Spiegelman"
  creator_role: "by"
  year: 1991
  eval: "loved"
  image: "/assets/images/thoughts/books/maus.jpg"
  posted: "2025-11-06"
  revised: "2025-11-06"
  text: |
    Early in Part II, after Nazi persecution, family collapse, the eldest son dead, his wife a suicide, their parents reduced to smoke from concentration camp furnaces, the father, seeing his son and daughter-in-law give a Black hitchhiker a lift, says: how could you? Art asks: 'How can you, of all people, be racist!?' The father says: you don't understand, we are not like them. Suffering, apparently, is racially stratified too. The scene detonates the entire book, the moment Spiegelman's metafictional apparatus, his mice and cats and pigs, stops being allegory and becomes accusation. The animal masks slip, and what is underneath is not species but ideology.
    This brings to mind Germany's early twentieth-century massacres in southern Africa, the Herero and the Bondelswarts, which Pynchon writes about in *V.* (1963), and the way imperial violence is so often treated as prehistory until Europe names itself the victim. So: if one does not speak up when others suffer, why should one's own pain deserve to be seen? Maus asks this question not rhetorically but structurally, through the very form of a comic that refuses the consolations of visual realism. Marianne Hirsch coined the term *postmemory* partly in response to this book: the inherited trauma of children who did not experience the event but cannot escape its gravity. Spiegelman dramatises this in the fraught, frequently ugly interviews with his father, in his guilt over his mother Anja's suicide, in the famous scene where he sits at his drawing board surrounded by a pile of corpses wondering whether he has the right to turn suffering into art. No one who has read Maus forgets it. When a Tennessee school board removed it from an eighth-grade curriculum in 2022, the gesture understood the book's power better than it knew: the book makes complicity visible, and complicity does not enjoy being looked at.

- title: "As She Climbed Across the Table"
  type: "book"
  creator: "Jonathan Lethem"
  creator_role: "by"
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/books/as-she-climbed.jpg"
  posted: "2025-10-31"
  revised: "2025-10-31"
  text: |
    Is ***As She Climbed Across the Table*** not one of the most romantic sci-fi novels ever written? Two hundred pages packed with delightful twists: quantum entanglement, the uncertainty principle, and blindsight woven together into a love story about a man losing his girlfriend to a void. Lack, the experimental anomaly that selectively absorbs some objects and rejects others, including the narrator Philip, is the purest metaphor for romantic rejection I have encountered in fiction. One cannot argue with a hole in spacetime. One cannot persuade it to want one back. The Lacanian resonance is obvious, the void that can never be filled, desire structured around absence, but Lethem wears the theory so lightly that it never suffocates the comedy.

    And what comedy. Lethem's prose gives an already brilliant premise its afterlife: joke after joke, pun after pun, delivered with the deadpan of someone who understands that the funniest things are also the saddest. The entanglement of the cosmos and consciousness, grand love and small love, calls to mind Nolan's *Interstellar* (2014), Fisher's essay on the same, the way physics occasionally stumbles into the territory of feeling and finds it was already there. Lethem does not take the novel too seriously, and the lightness is earned, not evasive. Philip's heartbreak is real, his jealousy of a particle-physics experiment absurd and painful, and the resolution, such as it is, arrives with the tenderness of someone who knows that love is mostly a matter of what the universe decides to let through.

- title: "Waiting for Godot"
  title_en: "En attendant Godot"
  type: "book"
  creator: "Samuel Beckett, trans. Samuel Beckett (EN)"
  creator_role: "by"
  year: 1952
  eval: "loved"
  image: "/assets/images/thoughts/books/waiting-for-godot.jpg"
  posted: "2025-10-26"
  revised: "2025-10-26"
  text: |
    ***Waiting for Godot*** seems to mean nothing and generates too many meanings to stabilise. Lucky's thinking hat grants the oppressed a useless voice; the lone tree signifies nothing but an eternal wait for the known-but-unknown. Nothing happens, twice, and the repetition is the point: Act II mirrors Act I the way one day mirrors the last, the way history under Beckett's gaze is less progress than stutter. The structure does the thinking. It does not argue that life is meaningless; it constructs meaninglessness so precisely that meaning keeps leaking in through the cracks.
    In Beckett's world one sees the traces of oppression and terror: Estragon's beatings, Vladimir's urinary afflictions, the boy or boys whose messages never clarify, Pozzo's rope around Lucky's neck. The Pozzo-Lucky dynamic reads as capitalism in miniature, master and slave bound in mutual degradation, Lucky performing thought on command until the thought itself collapses into a torrent of fragmented academic language, the Western intellectual tradition choking on its own debris. But aside from a few lines from Vladimir, nobody takes it seriously. Nobody revolts. They wait. They fill time with games, with boots, with carrots and turnips. The passivity is the horror, and it is also, somehow, the comedy.
    Beckett, an Irishman writing in French in the aftermath of a war he lived through as a Resistance member, understood that the most accurate depiction of the human condition is not tragedy but the inability to decide whether one is living a tragedy at all. The tree sprouts leaves between acts, and nothing changes. Vladimir and Estragon consider hanging themselves and conclude that the bough might not hold. By the end, Beckett seems to have described something one already knew and could not say: the paralysis is not imposed from without. It is the waiting itself, the belief that Godot will come, that keeps one rooted to the spot.

- title: "The Secret History"
  type: "book"
  creator: "Donna Tartt"
  creator_role: "by"
  year: 1992
  eval: "meh..."
  image: "/assets/images/thoughts/books/secret-history.jpg"
  posted: "2025-10-25"
  revised: "2025-10-25"
  text: |
    My first Donna Tartt. The prose is as advertised: flowing, propulsive, writing psychological thriller with the cadence of postmodern literature. Reading the first few chapters, I thought: this is what Paul Auster wanted to be but never managed. The inverted mystery structure, borrowed from Greek tragedy, the murder revealed on the first page, is effective, and the first half sustains its suspense cleanly. The Dionysian frenzy gone wrong, the bacchanal that tips into real death, is a premise good enough to build a career on. Charles and Francis in particular are vivid, drawn with a precision that makes their later unravelling feel earned.

    The characterisation and plotting become rather too cliched and flat in the second half, which is a shame. Tartt has been credited with inventing *dark academia*, and one can see why: the aesthetic is seductive, the Vermont campus rendered with a sensory richness that makes one want to enrol. But the novel's weakness is also its genre's weakness. Once the murder is done, the paranoia and guilt spiral into territory that dozens of lesser thrillers have since colonised, and at five hundred pages the narrative wanders where at three hundred it might have been a compact suspense gem. The final dissolution still satisfies, and for a debut it is already remarkable. But one leaves ***The Secret History*** suspecting that Tartt's gifts, which are considerable, needed a tighter frame.

- title: "When Breath Becomes Air"
  type: "book"
  creator: "Paul Kalanithi"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  image: "/assets/images/thoughts/books/when-breath-becomes-air.jpg"
  posted: "2025-10-25"
  revised: "2025-10-25"
  text: |
    I want to know what kind of family produces a Paul who, knowing he is dying and may not meaningfully contribute to raising children, still decides to have a baby with Lucy and pushes himself back into the operating room while his illness is only temporarily held at bay. Beyond name-dropping Yeats, Eliot, and Wittgenstein, there is nothing in ***When Breath Becomes Air*** that actually demonstrates Paul's love of literature or philosophy. The one attempt at atheism is riddled with errors. Cancer does not automatically make one a good writer, husband, father, or doctor. I came expecting profound reflections on death; left mainly mourning the loss of what was apparently a very skilled neurosurgeon.

    Memoirs of terminal illness carry an implicit *moral authority* that can silence criticism; Kalanithi's book benefits from that silence more than it earns it. The literary name-dropping gestures at depth without achieving it, and the family ethics remain unexamined beneath the elegiac prose. One suspects the book's reputation rests less on what it says than on the fact that its author did not survive to hear the objections.

- title: "Sátántangó"
  type: "book"
  creator: "László Krasznahorkai, trans. George Szirtes (EN)"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/books/satantango.jpg"
  posted: "2025-10-18"
  revised: "2025-10-18"
  text: |
    Krasznahorkai writes the comings and goings of a desolate Hungarian village like a stage play: twelve scenes corresponding to tango steps, six forward, six back, from the opening bells through the pipe-organ roar, the rain and dancing footsteps, cycling back to the bells tolling again at the final step. The structure is a closed system. No one escapes. Irimiás, the false messiah who returns to the village with promises of collective salvation, is both darkly comic and terrifying: a man who manipulates because manipulation is the only form of agency available in a world where the state has withdrawn and left nothing but mud. Susan Sontag called Krasznahorkai the Hungarian master of the apocalypse, and ***Sátántangó*** is where the apocalypse begins, not with fire but with rain and pálinka and the slow erosion of the will to resist.
    The whole thing is remarkably compact. The long sentences, which in description sound forbidding, are in practice easy to follow, hypnotic rather than punishing, closer to the experience of walking through heavy rain than of deciphering a puzzle. The images and dialogue are vivid: the doctor sitting by his window with a glass of pálinka, drinking it empty and refilling it over and over, watching the world outside through the weeds in his room, letting his mind drift. There is something grotesque and darkly funny beneath the misery, as if somewhere in Central Europe there really is such a man, such a village, such an endless autumn. It is one of the great late-socialist European novels: a book about what happens when a system has rotted from within and what is left is not freedom but the unbearable obligation to keep going without any idea where.

- title: "Shadow Ticket"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/books/shadow-ticket.jpg"
  posted: "2025-10-13"
  revised: "2025-10-13"
  text: |
    It may be because I have not read it closely enough, but ***Shadow Ticket*** is the funniest and the emptiest Pynchon I have read. Funny because his absurdism and free-associative weirdness are everywhere: motorcycle gangs in the Hungarian-Croatian borderlands, a Czech golem, a self-aware and imperishable cheese whose maker is the Al Capone of dairy. The private-eye structure, Hicks McTaggart trailing a runaway heiress from Milwaukee through New York to Belgrade and Budapest, invites the *Inherent Vice* (2009) comparison, and it holds to a point: both are detective novels in the loosest sense, both meander gloriously. But where Doc Sportello's California haze carried *epistemological* weight, the 1932 setting here tips the balance towards period intrigue, and the paranoid circuitry never quite connects to a central charge.

    The emptiness comes from what Pynchon leaves undissected: beyond pre-war Milwaukee's atmosphere of *manufactured compliance* and Central Europe's universal dread, he does not do much with ideology. The deeper political and metaphysical pressure one expects from Pynchon is present but muted; the political resonances feel gestural rather than structural. Unlike *Vineland* (1990), where government repression seeps into the depths of the crowd and lays fear-bombs at the base of resistance movements, or *The Crying of Lot 49* (1966), where Oedipa's paranoia becomes a genuine epistemological crisis, *Shadow Ticket* reads more as *reconciliation* than reinvention: a return to signature concerns, not a late-career departure. Of course, the worst Pynchon is still better than most fiction; within his own catalogue, though, *Shadow Ticket* is comparatively shallow. But hell, I cannot say I did not have a tremendous time reading it.

- title: "Vineland"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/vineland.jpg"
  posted: "2025-10-09"
  revised: "2025-10-09"
  text: |
    Pynchon writes the walking wounded of Nixon's War on Drugs and the long shadow of Vietnam: the students and activists killed by federal agents, the scholars swept away by historical tides, the loveless marriages, the stubborn love between a father and a daughter. Through one serious joke after another he paints America's most miserable decades of the twentieth century. At the turn of the sixties and seventies, the end of the hippie era, government repression seeped into the depths of the crowd, laying fear-bombs at the base of every resistance movement. The critical consensus has always been that ***Vineland*** is 'minor Pynchon', more accessible, warmer, less labyrinthine than the major novels. Fair enough: this is not the Pynchon of unruly sentence-architecture and encyclopaedic ambition. What it is, instead, is the Pynchon who loves his people. Brock Vond is one of his most chilling creations precisely because he is banal, a federal enforcer whose violence is institutional rather than demonic; Frenesi Gates, the radical-turned-informant, carries the entire betrayal of the sixties in her camera lens; and Prairie's search for her mother is the most emotionally legible quest in the whole catalogue. The Thanatoids, those television-zombie half-dead, now read as prophecy.

    All the idealism and tomorrow-will-be-better hope was shattered by the camera. The beautiful dreams of 24fps and Corvairs, the joy preserved on film and bass lines, were so simply erased, seized, cleared, destroyed. Pynchon understood before most that the sixties were defeated by being *metabolised*, their imagery and vocabulary absorbed by the very system they opposed. Reagan-era America did not need to suppress the counterculture; it bought the footage. Yet the novel refuses despair outright. 'I'm not gonna forget,' someone says, and means it. Our eternal Summer of Love: 'While we had it, we really had some fun.' I believe him. The warmth in that line is not nostalgia; it is evidence.

- title: "4 3 2 1"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/4321.jpg"
  posted: "2025-09-27"
  revised: "2025-09-27"
  text: |
    Auster's answer to what defines each Ferguson seems to be: relationships. Each Ferguson's love life, family dynamics, and relation to the political and social world become anchor points, however minor, with far-reaching consequences. Since the eighties Auster has been probing a world of possibility and *coincidence*, and that impulse finally comes into full bloom in ***4 3 2 1***, across eight hundred and sixty-odd pages. Growing up in post-war Newark, each Ferguson becomes a mirror for the counterculture, anti-war sentiment, and the Summer of Love. At that point the multiple Fergusons stop feeling like individuals and start feeling like Auster's own version of *ukiyo-e*: reflections of a moment, floating pictures of a world in flux.
    The structure is audacious, four parallel narratives held together by a single origin point, and it invites the obvious comparison to musical counterpoint, four voices playing variations on the same theme. The risk is blurring, and it happens: somewhere around pages five or six hundred, after I gave up tracking each character's specific timeline, the distinctions between Fergusons dissolved. But this turned out to be the point. Auster is not asking one to care equally about each version; he is asking one to feel the weight of contingency itself, the vertigo of lives that could have been otherwise. The novel is deeply autobiographical, almost embarrassingly so, Jewish-American Newark childhood, the writer's vocation, the political turmoil of the sixties. But autobiography metabolised into form becomes something rarer than memoir. This is the book where Auster's lifelong obsession with chance stops being a device and becomes a cosmology: identity is not chosen but assembled through accident, and the four Fergusons are the proof. The rest of the book, once I surrendered to it, was pure pleasure.

- title: "A Pale View of Hills"
  type: "book"
  creator: "Kazuo Ishiguro"
  creator_role: "by"
  year: 1982
  eval: "loved"
  image: "/assets/images/thoughts/books/pale-view-of-hills.jpg"
  posted: "2025-08-28"
  revised: "2025-08-28"
  text: |
    Even having read *The Remains of the Day* (1989) before this, I had not anticipated that Ishiguro could already, this early, use such calm, precise, spare, detached language to produce such dense emotion. Using her daughter's homecoming as a catalyst, Etsuko renders the *unreliability of memory* in fragments, and behind those unreliable shards is a heartbroken, regretful, socially constrained mother. She wants to tell Niki things, but knows that death cannot just be laid on the table, so she can only reconstruct that summer from decades ago, piece by piece.
    The critical reading that Sachiko is Etsuko's alter ego, a displaced self-portrait narrated in the third person, feels almost too neat, yet the text earns it. Ishiguro threads survivor's guilt, emigration, and maternal failure into a single braid so fine that one only sees the full pattern retrospectively: Sachiko's neglect of Mariko mirrors Etsuko's of Keiko, the unnamed woman by the river haunts both timelines, and the decision to leave Japan carries a guilt that cannot be spoken in any language Etsuko now possesses. ***A Pale View of Hills*** is extraordinary in its refusal to resolve. Memory here is not stable archive but emotional negotiation; grief bends it into something that protects the rememberer at the cost of accuracy. Ishiguro understands, long before *The Remains of the Day* (1989) would make it his signature, that the most devastating stories are the ones the narrator cannot quite bring herself to tell.

    'Keiko was happy that day. We rode on the cable-cars.' Suppressed feeling presses against the page, almost but not quite breaking through. Faber placed several blank pages at the back of the edition; behind them, a distant, faint hill in fog. That image stayed with me long after I closed the book.

- title: "The New York Trilogy"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1987
  eval: "liked"
  image: "/assets/images/thoughts/books/new-york-trilogy.jpg"
  posted: "2025-08-24"
  revised: "2025-08-24"
  text: |
    Auster's earliest prose already carries the faint current of *Moon Palace* (1989) and *Leviathan* (1992), and the same dependence on *coincidence*. The trilogy comprises three so-called detective stories with no traditional twists or endings, all pointing towards the protagonist's *deconstruction of self*. Quinn, consumed by an obsession that leads nowhere, never solves the 'Paul Auster mystery'; Blue, lost in a riddle of identity, can never explain Black/White's motives; and what happened to Fanshawe, nobody knows. The trilogy uses detective fiction as scaffolding for something quite different: an interrogation of authorship, identity, and the limits of language. The detective's search for clues becomes a metaphor for the futile search for stable meaning, and the genre's promise of resolution is deliberately, almost cruelly, withheld.

    In ***The New York Trilogy*** one can see many of Auster's recurring images: China, erotic coincidence, merged opposites, alienation, the city as labyrinth. The self-referential gesture of inserting 'Paul Auster' as a character in *City of Glass* (1985) is *postmodern* metafiction at its most explicit, and the novel has already destabilised identity so thoroughly that the author's name becomes just another floating signifier. The weaknesses that persist across Auster's later career are already visible here too: female characters written almost entirely flat, complex psychological passages that feel muddled rather than mysterious. These are not minor flaws; they recur with enough consistency to constitute a blind spot. Still, as a debut statement of intent, the Trilogy is formidable. It announced a writer whose world would run on chance, solitude, and the suspicion that narrative itself is a conspiracy we agree to believe in.

- title: "We Have Always Lived in the Castle"
  type: "book"
  creator: "Shirley Jackson"
  creator_role: "by"
  year: 1962
  eval: "liked"
  image: "/assets/images/thoughts/books/we-have-always-lived-in-the-castle.jpg"
  posted: "2025-08-15"
  revised: "2025-08-15"
  text: |
    Merricat and her sister's quiet dream-life, in a Gothic village and castle, circles in endless repetition, like the crack on the pavement outside Stella's coffee shop: it was always there. Life inside the castle froze completely after the great poisoning night: the sugar bowl laced with arsenic, old books nailed to trees, the manor gates locked shut. Jackson replaces the traditional Gothic castle with a bourgeois household haunted by family secrets, and inverts the genre's central trope: it is the outside world that poses the threat, not the dark interior. The villagers' hostility is *The Lottery* (1948) writ domestic, a mob driven by resentment of female autonomy and nonconformity.

    But Merricat senses change coming: the nailed-up book falls, an unseen relative crashes in, everything teeters at the edge of collapse, and Merricat chooses to become that collapse itself. ***We Have Always Lived in the Castle*** draws its unease from the gap between Merricat's cheerful tone and the horror of her actions, the way Jackson withholds the revelation of guilt and then frames it through the narrator's own self-justifying logic. One is made complicit in Merricat's worldview long before understanding its true nature. The rituals, the buried objects, the protective incantations, all occupy a zone between childish superstition and genuine menace. Mark Fisher would have called this *eeriness*: the unexpected presence of agency where one expects absence, or the absence of it where one expects presence. Jackson got there decades before Fisher gave that feeling this vocabulary.

- title: "Leviathan"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/books/leviathan.jpg"
  posted: "2025-08-14"
  revised: "2025-08-14"
  text: |
    Auster wrote in the opening of *The New York Trilogy* (1987): 'nothing was real except chance.' He uses *coincidence* and infinite possibility to build worlds that feel familiar and alien at once, and ***Leviathan*** is perhaps the purest expression of this method. Sachs's life turns on dozens of coincidences: meeting Peter, meeting Maria, the fall from a fire escape, the accidental killing. Even the title originates in a coincidence born of Sachs's curiosity after committing a terrible act. The critical reading of Sachs as 'the accidental radical' feels precisely right: his movement from celebrated novelist to domestic terrorist is driven not by ideology but by *contingency*, a chain of events that look like fate only in retrospect. Auster deliberately refuses to give Sachs a satisfying political manifesto, making his violence morally unresolvable.

    In the final chapter, Sachs's 'political act' is really just an expression of guilt and pain. Is he a hypocrite? His life has nothing to do with politics, yet he deceives himself and his friends, insisting he is acting for some 'cause'. All his courage, righteousness, and remorse collapse at the end into a cowardice he cannot even name. The Hobbesian resonance of the title cuts both ways: Sachs becomes a one-man leviathan, a self-appointed sovereign acting outside the law, and the irony is that this sovereign is governed entirely by accident. Meanwhile Peter Aaron, whose initials mirror Auster's own, races to write the story before the FBI can define it, making the act of narration itself a *counter-political* gesture. Leviathan is just Sachs's imaginary enemy, and the tragedy is that he never sees this.


- title: "The Crying of Lot 49"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1966
  eval: "loved"
  image: "/assets/images/thoughts/books/crying-of-lot-49.jpg"
  posted: "2025-08-11"
  revised: "2025-08-11"
  text: |
    Pynchon's sentences are little bombs that detonate the instant one reaches them: one is left with the shattered remains of reality, piecing the original story back together oneself. This is not a complaint. With stubborn effort I followed Oedipa Maas through the 'circuit-board' streets of 1960s Southern California, trying to crack the Tristero mystery or convince myself it does not exist. The novel famously offers four possible interpretations and refuses to resolve any of them: the Tristero is real; Oedipa is projecting pattern onto noise; she is the victim of Inverarity's elaborate hoax; or she is simply going mad. Pynchon keeps each reading equally viable and makes the impossibility of choosing part of the experience. Oedipa becomes a kind of *Maxwell's Demon*, sorting signal from noise in an information-saturated America, and the novel enacts in its form the same *entropic* uncertainty it describes.

    Oedipa, sliding gradually into conspiracy-theory obsession, can be read as a feminist figure in sixties American counterculture, though the text never announces her as such. She is curious, suspicious, postmodern, standing directly across from the Leviathan of patriarchal and corporate America, losing her grip on reality as she dissolves into Tristero's never-sounded horn. Loveless marriage, her one-night stand fleeing with an underage girl, even her therapist succumbing to psychedelics: every male figure in her world fails her, manages her, or disappears. The feminist reading, that her quest for the Tristero is also a quest for *autonomous subjectivity*, feels as structurally essential as the thermodynamic one.
    By the final auction scene Oedipa has almost nothing left, only her obsession with the truth. She is Kafka's Josef K., the Hunter in *Bloodborne* (2015), and Neo in *The Matrix* (1999): trapped in a system whose architecture she can almost perceive but never quite confirm. ***The Crying of Lot 49*** is about to begin. It never does. Pynchon leaves one there, on the threshold, and the silence that follows is the most eloquent thing in the book.

- title: "Moon Palace"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/books/moon-palace.jpg"
  posted: "2025-08-10"
  revised: "2025-08-10"
  text: |
    Despite real frustration with Auster's treatment of several female characters, especially Kitty Wu and Mrs Hume, I could not resist ***Moon Palace***'s astonishing literary force. The coincidences here are stacked to the point of absurdity: Marco Stanley Fogg, whose very name encodes three famous wanderers (Marco Polo, Henry Morton Stanley, Phileas Fogg; Uncle Victor spells it out early on), stumbles into employment with his own grandfather, then befriends and loses his own father. One either reads this as postmodern allegory or as authorial manipulation, and whether the novel works depends entirely on which side one falls. I fell on the side of allegory, intoxicated by the seemingly offhand revelations, by Marco and Victor's mutual dependence, pitiful but never pitiable, by the casually dropped 'A here exists only in relation to a there', by Fogg's homeless wandering through Central Park like a secular ascetic discovering that dispossession is its own kind of knowledge, and the self one thought one had was only ever a provisional arrangement of accidents.

    Auster's obsession with chance has never been mere cleverness; in ***Moon Palace*** it reaches something like a cosmology. The moon recurs as motif and metaphor: the Moon Palace restaurant whose neon sign Marco can see from his apartment window, the 1969 lunar landing that opens the narrative, the lunar imagery in Effing's paintings made alone inside a Utah cave during his hermit years. The moon is the irrational, the gravitational pull of accident on identity, and Fogg's life orbits it helplessly. Searching for Effing's cave, and through it for meaning, and finding that the site has been flooded, the paintings irrecoverable, Marco arrives at a California beach to watch the moon 'find its place in the darkness'. The arc that begins with a name given by immigration officials ends with a man standing at the western edge of the continent, having run out of land, finally still. I cannot forgive the flat women; the force of that final image forgives nothing either, and persists regardless.

- title: "The Year of Dreaming Dangerously"
  type: "book"
  creator: "Slavoj Žižek"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/year-of-dreaming-dangerously.jpg"
  posted: "2025-07-11"
  revised: "2025-07-11"
  text: |
    Žižek the polemicist is stirring Marx's *surplus value* together with Lacan's *surplus enjoyment* in his iron pot, as always. In ***The Year of Dreaming Dangerously*** he writes about the London streets of 2011 and Tahrir Square, about how that year's great awakening was killed, buried, and had flowers planted on the grave by media spectacle and liberal recuperation. The diagnosis is sharp: each uprising briefly punctured the membrane of *capitalist realism*, only to be narrativised into harmlessness by the very system it threatened. What Žižek understands, and what the orthodox left sometimes forgets, is that the problem was never the absence of anger but the absence of a framework capable of converting anger into programme. The protesters could occupy the square but not the concept.
    He no longer believes history will gently self-correct, the way the old-school Marxists waited for productive forces to finally burst through the chains of production relations. Žižek's capitalism is a self-renewing, status-quo-preserving monster, kept alive precisely by crises, feeding on its own contradictions rather than succumbing to them. Institutionally manufactured scarcity, the commodification of dissent, the liberal co-optation of radical energy: these are not bugs but features. We need radical transformation, he insists, and perhaps he is right. But 2011 was nearly fifteen years ago, and nothing that fierce has come back. The book's greatest strength, its sense of urgency, is also the source of its pathos. The dreaming was real, the danger was real, and the waking was permanent.

- title: "Did Somebody Say Totalitarianism? Five Interventions in the (Mis)use of a Notion"
  type: "book"
  creator: "Slavoj Žižek"
  creator_role: "by"
  year: 2001
  eval: "liked"
  image: "/assets/images/thoughts/books/did-somebody-say-totalitarianism.jpg"
  posted: "2025-06-05"
  revised: "2025-06-05"
  text: |
    Žižek is not defending totalitarianism. He is trying to show that 'anti-totalitarianism' is liberal ideology's self-deception mechanism: the conceptual blockade that forecloses any serious left politics by equating every emancipatory project with the Gulag. ***Did Somebody Say Totalitarianism?*** is full of deliberate provocation; his discussion of Agamben's Muselmann, the camp figure reduced to bare survival, is a prime example, designed to make the reader flinch and then think about why they flinched. The provocation is more than mere contrarianism because Žižek grasps that the liberal sanctification of suffering has its own ideological function: it turns historical atrocity into a moral absolute that conveniently immunises the present order from critique.
    His strength is directness and sharpness, though some Lacanian concepts remain overly opaque, giving the rhythm an uneven quality, lurching between electrifying polemic and passages that feel like theoretical throat-clearing. But the insight at the intersection of politics and psychoanalysis is undeniable. Chapter three applies almost too obviously to a certain country's current situation, and, more diffusely, to the liberal democracies too: sanctifying tragedy, tabooising totalitarianism, concretising the individual, dogmatising myth. The pattern Žižek identifies, in which the very invocation of 'totalitarianism' becomes a thought-stopper rather than a thought, feels more relevant now than when he wrote it. One does not have to follow every Lacanian loop to recognise the claim: the loudest anti-totalitarians are sometimes the ones least willing to examine the structures they defend.

- title: "We Do Not Part"
  title_en: "작별하지 않는다"
  type: "book"
  creator: "Han Kang, trans. 卢鸿金 (CN: 《不做告别》)"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/books/we-do-not-part.jpg"
  posted: "2025-01-25"
  revised: "2025-01-25"
  text: |
    A woman travels to snowbound Jeju to care for a friend's bird and finds herself inside a history the island has spent decades trying to forget. The 4.3 Incident, the South Korean government's massacre of tens of thousands of Jeju civilians between 1948 and 1954, is the wound ***We Do Not Part*** circles without ever fully exposing, because full exposure would be a kind of violence the novel refuses to commit. Han Kang's method is indirection: memory surfaces through objects, through snow, through the body of a bird that has to be kept alive while the caretaker herself is barely holding together.

    The structure is nonlinear and dreamlike, closer to *Human Acts* than to *The Vegetarian* in its excavation of state violence, but where *Human Acts* reconstructed the Gwangju massacre through multiple first-person accounts, this novel works through a single consciousness dissolving under the weight of what it encounters. The prose operates at the threshold between grief and hallucination, and the distinction between the two is precisely what the novel refuses to settle.
    Han Kang's refusal to instrumentalise suffering keeps this from becoming a historical novel in the usual sense. The massacre is not a lesson; it is not redeemed by narrative; it does not produce wisdom or closure. The dead remain dead; the living remain implicated. The bird survives, which is the closest thing to hope the book permits, and even that feels provisional. Han Kang writes about atrocity the way Tarkovsky films water: as an element that saturates everything, that one moves through rather than observes. It belongs beside *Human Acts* among her most important books.

- title: "The Outsider"
  title_en: "L'Étranger"
  type: "book"
  creator: "Albert Camus, trans. Joseph Laredo (EN)"
  creator_role: "by"
  year: 1942
  eval: "loved"
  image: "/assets/images/thoughts/books/outsider.jpg"
  posted: "2025-01-21"
  revised: "2025-01-21"
  text: |
    I envy Meursault. I am helplessly unable to say what I mean, helplessly unable to refuse someone who wants me, helplessly performing grief at funerals, helplessly living as an insider. Existing in this society feels like moving behind a membrane I cannot pierce. Pretending to care, just to get through tomorrow.

    That is the raw nerve of ***The Outsider***. Camus writes in terse, paratactic sentences, stripped of causal connectives, and this formal austerity is not mere style: it enacts the absurd at the level of syntax, each sentence landing as a discrete fact unmoored from consequence. Meursault does not weep at his mother's funeral. Meursault shoots a man on a beach. The court condemns him less for the killing than for the failure to perform, and in that gap between act and performance Camus locates the entire indictment of social convention. The justice system does not want truth; it wants legibility. What it cannot read, it destroys.
    Postcolonial criticism rightly notes the unnamed Arab, the colonial violence that Camus renders invisible even as he renders Meursault's alienation visible. One should hold both things at once: the novel's philosophical power and its moral blind spot, the precision of its diagnosis and the narrowness of its sympathy. But the thing that draws me back, that leaves me envying Meursault rather than merely analysing him, is simpler and harder to say. He refuses to lie. He refuses the membrane. By the final pages, facing execution, he opens himself to the 'gentle indifference of the universe' and finds it fraternal. I have never managed that. I suspect most people have not. Pretending to care, just to get through tomorrow.

- title: "Misogyny"
  title_en: "女ぎらい"
  type: "book"
  creator: "Chizuko Ueno, trans. 王兰 (CN: 《厌女》)"
  creator_role: "by"
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/books/misogyny.jpg"
  posted: "2025-01-05"
  revised: "2025-01-05"
  text: |
    Ueno says in ***Misogyny*** that she has moved beyond her early structuralist phase, and one can tell. Her critique of patriarchy is not limited to a 'structural victim' framework; she tracks individual women and the mother-daughter dynamic as living, evolving things, refusing the temptation to collapse persons into positions. In Ueno's account, patriarchal misogyny takes root inside each individual from the moment men and women enter their designated roles. 'Becoming a man' means the homosocial alliance between men, deriving self-worth from male recognition, alienating and disdaining women, desiring the desire of other men. 'Becoming a woman' means recognising oneself as the object of male sexual projection. Women's value in patriarchal society is entirely determined by men, and only those, whether men or women, who are conscious of this mechanism can meaningfully resist it. The structural insight is not new, but Ueno's achievement is in showing how the structure lives inside the individual, reproducing itself through affect and identification rather than simple coercion.
    The one real flaw: roughly half the argumentation leans on Freud and fictional characters, which produces a curious unevenness, as though the sociological precision of the best passages keeps drifting towards psychoanalytic speculation that cannot quite bear the weight placed on it. But perhaps that is also a kind of honesty about the difficulty of the subject: misogyny is a system and a pathology, and pathology invites the clinical gaze even when that gaze is insufficient. What is harder to forgive are some of the reader responses Ueno implicitly addresses, gems like 'women enjoy their gender privileges while playing the victim', which is embarrassing to encounter in the discourse surrounding a book this serious. Ueno herself would call it what it is: misogyny wearing the mask of rationality.

- title: "The Weird and the Eerie"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/weird-and-the-eerie.jpg"
  posted: "2024-12-25"
  revised: "2024-12-25"
  text: |
    Similar to Zampanò in Danielewski's *House of Leaves* (2000), Fisher's dismantling of Freud's *unheimlich* starts by refusing to reduce the weird and the eerie to the return of the familiar. The weird is the intrusion of what does not belong; the eerie is the disturbance produced by failures of presence, absence and agency. The importance of love in Nolan's *Interstellar* (2014) is eerie, as are M. R. James's ancient ruins, and, by extension, the agentless operations of capital itself, structures that produce effects beyond anyone's intention. Fisher understood these as aesthetic categories and political ones. The eerie describes the logic of late capitalism as much as a mode of fiction: a system that seems to run by itself, haunting the present with futures that never arrived.
    My favourite passage is the reading of H. G. Wells's *The Door in the Wall* (1911), where Fisher identifies the eerie as a threshold affect, a feeling generated by the gap between what is glimpsed and what is accessible. His prose is compressed and precise, each sentence carrying more weight than most critics manage in a paragraph. A shame, then, that so many unexplained references dilute that brilliance: the book sometimes assumes a reader who has already done the homework, and the density of allusion can feel exclusionary rather than enriching. But ***The Weird and the Eerie*** is Fisher's last completed work, published weeks before his death, and perhaps there is something fitting about its fragmentary quality, its gestures towards readings that will never be finished. One leaves it wanting more, which is both the book's limitation and its most powerful effect.

- title: "On Intelligence"
  type: "book"
  creator: "Jeff Hawkins"
  creator_role: "by"
  year: 2004
  eval: "meh..."
  image: "/assets/images/thoughts/books/on-intelligence.jpg"
  posted: "2024-12-07"
  revised: "2024-12-07"
  text: |
    ***On Intelligence*** closes with a range of specific predictions, some interesting: lower cortical areas, in Hawkins's account, should predict much of their own input, leaving higher areas to deal with what those predictions cannot absorb. The memory-prediction framework is intuitive and appealingly clean, a hierarchical model in which the neocortex stores temporal sequences and uses them to anticipate sensory input. The trouble is that twenty years of hippocampal and prefrontal recordings have largely complicated or contradicted the picture. Place cells and grid cells suggest the hippocampus is doing something far richer than sitting atop a cortical hierarchy as a passive relay; entorhinal-hippocampal loops are bidirectional and deeply entangled with spatial cognition, relational binding, and episodic memory in ways that resist reduction to sequence storage. The prefrontal cortex, meanwhile, involves working memory, executive control, and rule-based reasoning that cannot be flattened into hierarchical pattern matching. Hawkins treats the cortex as a single, homogeneous algorithm, which is elegant but anatomically untenable: V1 and dorsolateral PFC differ in cytoarchitecture, connectivity, and function in ways his framework cannot accommodate. And the near-total absence of subcortical structures, neuromodulation, and the thalamus from the model is not a simplification but an omission.
    Still, one cannot deny the audacity of the vision. Hawkins was willing to think further and speak more boldly than most neuroscientists or computational scientists, and the memory-prediction framework helped popularise a cortical intuition that overlaps with *predictive coding*, even though predictive coding itself already had a technical history by 2004. That he brought this intuition into popular neuroscience with such force puts him ahead of most popular neuroscience writers, even if the specifics have not aged well.

- title: "Phantoms in the Brain"
  type: "book"
  creator: "V. S. Ramachandran, Sandra Blakeslee"
  creator_role: "by"
  year: 1998
  eval: "loved"
  image: "/assets/images/thoughts/books/phantoms-in-the-brain.jpg"
  posted: "2024-11-02"
  revised: "2024-11-02"
  text: |
    ***Phantoms in the Brain*** reads in the tradition of Oliver Sacks, and in some respects surpasses the model. Both Ramachandran and Sacks make a convincing case for the significance of case studies in modern science, for the stubborn power of careful observation at the bedside. Through conversation, behavioural experiment, and the combination of clinical and neural data, Ramachandran generates highly testable hypotheses from minimal apparatus: a mirror box, a cotton swab, a patient's willingness to talk. The elegance is in the simplicity. Where the field was building ever-larger imaging pipelines, Ramachandran was asking a person with a phantom limb to close their eyes and tell him what they felt.
    Most striking is his discussion of individual rationalisation: the brain does not just perceive, it interprets, and in the course of interpreting, perception inevitably gets re-interpreted against objective reality. A patient with a paralysed left arm believes they 'did not want to raise it', not that they could not. The left hemisphere, that tireless confabulator, constructs a narrative of coherence even when the evidence screams contradiction. Ramachandran's speculation, that our drive for cognitive consistency is so powerful that it actively distorts reality, extends far beyond clinical neurology. It is a lesson for non-patients too: every intact brain is performing the same trick, just more quietly. The book leaves one wondering how much of what one calls 'reason' is simply the confabulator working overtime, and how rarely one catches it in the act.

- title: "Entangled Life"
  title_en: "菌络万象"
  type: "book"
  creator: "Merlin Sheldrake, trans. Dinghao Luo (CN)"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/entangled-life-chinese.jpg"
  posted: "2024-10-01"
  revised: "2024-10-01"
  text: |
    I spent three years inside this book. When Editor Fei from Houlang Books asked whether I would translate Sheldrake's ***Entangled Life*** into Chinese, I agreed without hesitation; from childhood memories of Frodo sneaking mushrooms in *The Lord of the Rings* to hiking during my university years in search of fungi, I had accumulated encounters with the fungal world without ever possessing a vocabulary for them. The translation, published in October 2024, took longer than any project I have undertaken, and the reason is simple: Sheldrake writes with the precision of a Cambridge mycologist and the lyrical reach of a nature essayist, and matching both modes in Chinese required dismantling and rebuilding nearly every sentence. Abstract terms became tangible structures; within the entanglement and interweaving of mycelium, I found myself tracing systems of communication, metabolic exchange, and a kind of unity across kingdoms that no textbook had prepared me for.

    Sheldrake's provocation is that fungi challenge the very concept of biological individuality. Mycorrhizal networks connect the roots of trees in arrangements so densely linked that Sheldrake's own doctoral fieldwork in Panama, tracing nutrient transfer through underground systems at the Smithsonian Tropical Research Institute, reads almost like systems neuroscience conducted underground. The 'Wood Wide Web' metaphor has since become a cultural phenomenon, and here the book's relationship to evidence grows complicated: Justine Karst and colleagues have challenged whether the three foundational claims, that mycorrhizal networks are widespread, that mature trees send resources to seedlings, that trees preferentially support kin, hold up under scrutiny. Having spent three years inside Sheldrake's prose, I can say that he hedges more carefully than his popularisers; the caveats are there, buried in subordinate clauses, doing quiet work. But the popular narrative, the one that entered the discourse and stayed, ran well ahead of what the data could support. There is a lesson here about the gap between what a careful writer actually writes and what the culture decides to hear.
    What remains, after the controversy, is the writing itself, and the breadth of intellectual curiosity: psilocybin, fermentation, lichen symbiosis, mycoremediation. Sheldrake never treats fungi as a single subject but as a lens through which to refract questions about agency, cognition, and the boundaries of selfhood. That his father, Rupert Sheldrake, has spent decades at the margins of scientific respectability with his theory of morphic resonance only sharpens the interest: here is the son, working within the institutional frameworks the father rejected, arriving by legitimate means at conclusions about interconnectedness that rhyme, uncomfortably, with the father's unorthodox claims. The tension is never acknowledged in the text, but it hums beneath every page like mycelium beneath a forest floor. I am grateful beyond measure to my wife for constant encouragement; to Editor Fei, whose editorial care bordered on the meticulous; to Zhou for rigorous proofreading; and to Congcong for a cover design full of quiet vitality. This translation exists because of all of them.

- title: "A Short History of Nearly Everything"
  type: "book"
  creator: "Bill Bryson"
  creator_role: "by"
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/books/short-history-of-nearly-everything.jpg"
  posted: "2024-08-23"
  revised: "2024-08-23"
  text: |
    I deeply regret only reading this in my third year of a PhD. Bill Bryson covers biology, evolution, geology, climate, ancient humans, and the history of science in a single sweep, treating each topic with real depth and written in the wittiest, most effortless prose of any popular science book I have read. The effortlessness is, of course, the hardest thing to achieve: Bryson spent three years researching the book, and the lightness of the writing conceals an enormous quantity of absorbed knowledge, distilled into anecdotes and explanations that feel as natural as conversation. Where most science communicators choose between rigour and accessibility, Bryson refuses the trade-off, managing to be both precise and funny, often in the same sentence.
    Bryson's instinct is for the human story behind the discovery. Science here is not a march of disembodied facts but a procession of obsessives, misfits, and feuding personalities whose vanity and brilliance are equally responsible for what we know. The eccentricities of the scientists are not decorative asides; they illuminate how knowledge actually gets made, which is to say, messily, contingently, and often by people who would be unbearable at dinner. It is one of those books so accomplished that one stops looking for faults, and a book that makes one briefly, intensely angry at every science teacher who made the subject feel like a chore.

- title: "Metazoa: Animal Life and the Birth of the Mind"
  type: "book"
  creator: "Peter Godfrey-Smith"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/metazoa.jpg"
  posted: "2024-03-31"
  revised: "2024-03-31"
  text: |
    The world of philosophy would be better with more hands-on, empiricist thinkers like Peter Godfrey-Smith. As in *Other Minds* (2016), his gift is still the anecdote, the concrete image that carries philosophical weight without needing to announce itself. A female octopus throwing rubbish at a male who keeps harassing her while she builds a nest is an image I will never forget, and it does more argumentative work than a dozen thought experiments about qualia. Godfrey-Smith's claim, that subjective experience probably evolved as organisms needed to manage increasingly complex bodies, is persuasive precisely because he arrives at it through observation rather than speculation: sponges respond to their environment through chemical signals but lack a nervous system that integrates information in the relevant way, and so probably lack experience. The boundary is not sharp but gradual, consciousness arriving in degrees rather than as a binary switch, which is both philosophically honest and scientifically productive.

    On the evolutionary path, intelligence takes a thousand strange forms, all arising from a simple circuit distinguishing self from other. That thread runs through what looks like a scattered collection of stories about corals, mantis shrimps, reef fish, and cephalopods, binding them into a single argument about how matter becomes mind. Godfrey-Smith's writing is as seductive as his philosophy: patient, precise, willing to sit with uncertainty rather than forcing premature resolution. There is a generosity in this approach, a refusal to treat the hard problem of consciousness as either solved or insoluble, that feels rare in a field dominated by confident declarations from both sides. One leaves ***Metazoa*** not with answers but with a richer sense of the question, and with the conviction that philosophy done in wetsuits and on reefs is philosophy done right.

- title: "On Women"
  type: "book"
  creator: "Susan Sontag"
  creator_role: "by"
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/books/on-women.jpg"
  posted: "2024-01-08"
  revised: "2024-01-08"
  text: |
    Many of Sontag's observations in ***On Women*** are pointed, sometimes devastatingly so. Capitalist society has men defining femininity as superficial, then concluding that women are superficial: the circularity is so perfect that it almost looks designed, which is precisely her point. The liberation of women, Sontag insists, differs from the liberation of men because female liberation requires men to give up part of their power, which is why women's liberation and equality are not the same thing. Equality within existing structures merely distributes the spoils more evenly; liberation demands that the structures themselves be dismantled. These are not arguments that have dated. If anything, the contemporary discourse around 'lean in' feminism, which asks women to succeed on terms defined by patriarchal capitalism, proves Sontag's distinction still cuts.

    The second half is a critique of Leni Riefenstahl: clear in its positions, uncompromising in its refusal to separate aesthetics from politics, but the argumentation is a bit thin, not entirely convincing. Sontag wants to demonstrate that Riefenstahl's visual language is inherently fascist, that the celebration of physical beauty and heroic submission cannot be disentangled from the ideology it served. The claim is strong, perhaps too strong for the evidence marshalled here, which feels compressed to the point of assertion. One senses the essay reaching for the force of *Fascinating Fascism* (1975) without quite achieving it. Still, the collection as a whole reminds one that Sontag's feminism was never comfortable, never programmatic: it was the feminism of someone who resisted the label even as she could not stop thinking about the problem. That discomfort is part of its value.

- title: "When We Cease to Understand the World"
  title_en: "Un verdor terrible"
  type: "book"
  creator: "Benjamín Labatut, trans. Adrian Nathan West (EN)"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/when-we-cease-to-understand-the-world.jpg"
  posted: "2023-05-31"
  revised: "2023-05-31"
  text: |
    Labatut has written something that should not work. ***When We Cease to Understand the World*** is a hybrid of essay, speculative biography, and literary fiction, threaded together with a confidence that borders on recklessness: real scientists, real breakthroughs, real atrocities, all laced with invented interiority and hallucinatory prose until the seams between fact and fabrication dissolve entirely. The usual objection writes itself: this is irresponsible, this is fakery. But the book's genius lies precisely in that dissolution. Labatut understands that the history of twentieth-century science is already stranger than fiction, already saturated with moral vertigo, and that the conventional nonfiction frame, with its careful attribution and hedged claims, cannot capture what it felt like to stand at the edge of the unknowable and keep pushing. The examples are relentless: Fritz Haber's nitrogen fixation feeding the world and gassing the trenches; Schwarzschild solving Einstein's field equations while dying on the Eastern Front; Heisenberg and Schr\u00f6dinger tearing quantum mechanics apart from opposite ends. One story bleeds into the next like a wound that will not close.
    I keep returning, though, to Grothendieck and Mochizuki. Grothendieck retreated from mathematics into hermit-like isolation, as if the structures he had uncovered were too vast for a single mind to hold without cracking. Mochizuki published a proof so impenetrable that much of the mathematical community could neither verify nor refute it, sealed inside his own logic like a message in a bottle that no one can open. Labatut threads these lives together in the manner of *Cloud Atlas* (2004): one line connecting everyone's fate to the fate of the world, each chapter a step closer to the point where understanding tips into its own negation. The Bola\u00f1o comparison is apt; both are Chilean, both drawn to the intersection of brilliance and destruction. But Labatut is doing something more compressed, more vertiginous. He is asking whether the act of knowing, pushed far enough, becomes indistinguishable from the act of going mad. A week after finishing, the awe had not faded. It still has not.

- title: "The Rise and Fall of the Third Reich"
  type: "book"
  creator: "William L. Shirer"
  creator_role: "by"
  year: 1960
  eval: "liked"
  image: "/assets/images/thoughts/books/rise-and-fall-of-the-third-reich.jpg"
  posted: "2023-03-04"
  revised: "2023-03-04"
  text: |
    This is a fifty-plus-hour monument to the journalistic conviction that being there counts for something. Shirer reported from inside Nazi Germany until 1940, and that proximity gives his narrative an immediacy no purely archival historian can replicate: the texture of rallies witnessed first-hand, the quality of light in rooms where decisions were made. The academic objections are well-rehearsed: later historians have questioned the analytical framework, the moral psychology, and the book's dependence on a *Sonderweg* thesis, that old argument about a uniquely German national character marching inevitably towards catastrophe, which later historiography has largely dismantled. The later chapters lean even more heavily on Hitler's deteriorating mental state, and the accuracy of those sources is naturally suspect, filtered through memoirs written by men with every reason to redirect blame.

    What survives, though, is the sheer narrative richness. As a work of moral philosophy or Holocaust scholarship, ***The Rise and Fall of the Third Reich*** has been superseded many times over; one reaches for Primo Levi, for Hannah Arendt, for Evans's own Third Reich trilogy. But as a narrative act, the accumulation of detail, the relentless forward momentum through two decades of escalating horror, the book remains formidable. Shirer was 'just a journalist', his critics said. Perhaps. But journalism of this ambition and this density has its own kind of authority: that of a witness who refused to look away, even when the analytical tools at his disposal were blunter than the moment demanded.

- title: "Time, Love, Memory"
  type: "book"
  creator: "Jonathan Weiner"
  creator_role: "by"
  year: 1999
  eval: "liked"
  image: "/assets/images/thoughts/books/time-love-memory.jpg"
  posted: "2022-06-22"
  revised: "2022-06-22"
  text: |
    Weiner builds Seymour Benzer's story the way a good documentary filmmaker constructs a portrait: through interviews, through the texture of a lab, through the faces of collaborators and rivals who leap off the page with startling economy. This is nothing like Eric Kandel's autobiography, which is mostly a career retrospective narrated by its subject; Weiner's approach is more alive, more externally observed, and the liveliness is the point. One gets a sense of Benzer's intellectual trajectory, from physicist to molecular biologist to neurogenetics pioneer, and of the atmosphere in which that trajectory unfolded: the Caltech corridors, the mutant fly stocks, the Drosophila courtship songs played back on oscilloscopes. The discoveries that would eventually underpin the 2017 Nobel for circadian rhythm research, the period and timeless genes, are rendered here as human stories first, scientific achievements second.

    The inevitable bias is structural. A book about Benzer is a book about the gene, and Weiner cannot help but foreground genetic determinism in a way that the science itself has long since outgrown. Everyone now understands that genes cannot be as deterministic as the early geneticists imagined; the gene-behaviour relationship is probabilistic, contextual, dependent on environment and development in ways that Benzer's single-gene mutant screens could not capture. Paired with Sapolsky's *Behave* (2017), which insists on the full causal chain from gene to hormone to neural circuit to culture, ***Time, Love, Memory*** finds its proper place: a portrait of one end of the explanatory spectrum, best read with the awareness that the other end exists.

- title: "Behave"
  type: "book"
  creator: "Robert Sapolsky"
  creator_role: "by"
  year: 2017
  eval: "liked"
  image: "/assets/images/thoughts/books/behave.jpg"
  posted: "2022-06-12"
  revised: "2022-06-12"
  text: |
    ***Behave*** is more readable than *Why Zebras Don't Get Ulcers* (1994), and broader in scope. Sapolsky's organising conceit is deceptively simple: start with the second before a behaviour occurs (the amygdala fires, the prefrontal cortex does or does not intervene), then zoom out, step by step, through hormones, then neurodevelopment, then genes, then evolution, then culture, until one has traversed the entire causal chain from synapse to civilisation. ***Behave*** works through Sapolsky's refusal to let any single level of explanation claim priority. The gene matters, but so does the hormone; the hormone matters, but so does the childhood; the childhood matters, but so does the culture that shaped the childhood. The book makes the question 'why did this person do this?' feel viscerally unanswerable by any single level of explanation.
    Even with a psychology background, I encountered examples I had never heard of. The drone operator in the post-9/11 wars: a person who kills by remote control, thousands of miles from the explosion, and still develops PTSD, because the brain does not fully distinguish between pulling a trigger and clicking a mouse when the consequence is a human body coming apart on a screen. And the Christmas truce of 1914: soldiers climbing out of trenches to exchange gifts with men they had been trying to kill hours earlier, because proximity and shared humanity, given even the smallest opening, can override the most powerful propaganda. Sapolsky's determinism has drawn criticism from philosophers who insist on the irreducibility of agency. Perhaps they are right. But the book's moral force does not depend on settling that question. It depends on making one feel, with the weight of seven hundred pages of evidence, that understanding why we behave as we do is the precondition for behaving better.

- title: "The Idiot"
  type: "book"
  creator: "Fyodor Dostoevsky, trans. Richard Pevear & Larissa Volokhonsky (EN)"
  creator_role: "by"
  year: 1869
  eval: "loved"
  image: "/assets/images/thoughts/books/idiot.jpg"
  posted: "2021-07-26"
  revised: "2021-07-26"
  text: |
    Dostoevsky set out to write 'a truly beautiful man' and produced instead a figure whose beauty is indistinguishable from catastrophe. Prince Myshkin's innocence, his social blindness, his radical empathy, are not flaws in an otherwise functional character; they are the character, and they make his destruction inevitable from the opening pages. The moment he glimpses Nastasya Filippovna's portrait and sees Aglaya, the architecture of his breakdown is already legible. The two women function not as love interests in any conventional sense but as a wall between Myshkin and the superficiality of aristocratic life, each representing a dimension of experience his innocence cannot metabolise: Nastasya's suffering, Aglaya's pride, both demanding a response he is constitutionally incapable of giving. The tragedy is structural before it is emotional.

    ***The Idiot*** is extraordinary, and separates itself from the more schematic explorations of goodness in literature, because Dostoevsky never states the opposition directly. The innocent versus the worldly: one expects this to be the thesis, announced and elaborated. Instead, Dostoevsky disperses it across more than a dozen characters whose individual characterisation is remarkably precise, letting the reader arrive at Myshkin's fate only gradually, only in Part IV, through the accumulated weight of social interactions, failed interventions, and mounting dread. The *yurodivyi*, the holy fool of Russian Orthodox tradition, haunts the novel's margins without ever being invoked by name. Rowan Williams reads Myshkin as an experiment in *kenotic love*, self-emptying love, and perhaps that is right: but what Dostoevsky shows is that self-emptying, in a world that runs on self-interest, is not sainthood but annihilation. The 'idiot' is just a gentle child standing on the other side of a gauze curtain. The curtain never lifts.

- title: "The Vaccine Race"
  title_en: "疫苗竞赛"
  type: "book"
  creator: "Meredith Wadman, trans. 罗爽 (CN)"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/vaccine-race.jpg"
  posted: "2021-05-15"
  revised: "2021-05-15"
  text: |
    The standard history of vaccine development is told from the institutional centre outward: Wistar, NIH, Merck, the scientists who filed the patents. ***The Vaccine Race*** moves in the other direction. Wadman's account of WI-38, the cell line derived from a fetus aborted in Sweden in 1962, which became the substrate for rubella, rabies, polio, and hepatitis A vaccines, never lets the anonymous Swedish woman from whom the tissue came drift entirely out of view. She had not been asked for consent; she had not heard her name connected to the science; she found out only when Wadman contacted her, fifty years later. This is science history framed as labour history: it accounts for who paid the costs as well as who accumulated the credit.

    The Hayflick dispute gives the book its dramatic spine. Hayflick removed his WI-38 cultures from Wistar to Stanford; the NIH confiscated them; a lawsuit settled ambiguously, clarifying nothing about who owns human biological material, while Merck generated billions annually from the rubella vaccine programme without compensating him. Wadman is sympathetic but not credulous: Hayflick was right about the science, difficult as a person, and operating inside a legal framework that had not yet caught up with what his work made possible. The case belongs in direct genealogy with Henrietta Lacks, and Wadman knows it.

    The book holds the institutional and the intimate in the same frame: Stanley Plotkin's patient decades of rubella vaccine development, and the twenty thousand children born with congenital rubella syndrome during the 1964-65 epidemic, the constituency whose suffering motivated the entire project, are given equal moral weight with the men who ran the trials and filed the patents. The institutionalised children, prisoners, and orphans enrolled in trials they could not refuse are here, receiving the same archival attention as the scientists. Read in the shadow of the mRNA approvals of 2020-21, the questions that Wadman raises about consent, ownership, and whose bodies underwrite scientific progress feel considerably more live than historical.

- title: "Bottle of Lies"
  title_en: "仿制药的真相"
  type: "book"
  creator: "Katherine Eban, trans. 高天羽 (CN)"
  creator_role: "by"
  year: 2019
  eval: "disliked"
  image: "/assets/images/thoughts/books/bottle-of-lies.jpg"
  posted: "2021-04-20"
  revised: "2021-04-20"
  text: |
    ***Bottle of Lies*** is excellently reported. Eban spent a decade on the investigation, and the specific picture that she constructs, data falsification, contaminated products, FDA inspection protocols that gave plants months of advance warning to fabricate compliance, is thorough and credible. The whistleblower Dinesh Thakur's case against Ranbaxy, which eventually yielded a $500 million settlement, is built with care.

    The frame is the problem. The most damning finding in the book is structural fraud: Eban documents a two-tiered global supply chain in which higher-quality drugs are routed to Western markets while substandard versions reach HIV patients in Africa and Asia. This is a story about a pharmaceutical system that extracts cost from the poorest end of its supply chain, and the book declines to treat it as such. The FDA emerges as under-resourced rather than under-incentivised. The $500 million settlement becomes the resolution. Thakur becomes the hero. The structure stays standing.

- title: "The Remains of the Day"
  title_en: "长日将尽"
  type: "book"
  creator: "Kazuo Ishiguro, trans. 冯涛 (CN)"
  creator_role: "by"
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/books/remains-of-the-day.jpg"
  posted: "2021-04-15"
  revised: "2021-04-15"
  text: |
    I first came to ***The Remains of the Day*** in Chinese, years before Ishiguro's English prose became part of my reading life, and even through that mediation the restraint was already audible: Stevens's voice has the quality of a piece of music played almost too softly, the structure intact because the silence around it does so much of the work. Stevens is one of literature's great unreliable narrators because he has perfected a form of self-deception so total that truth and falsehood have become irrelevant categories. He does not suppress his feelings for Miss Kenton; he has constructed an entire philosophy of professional 'dignity' that makes such feelings structurally invisible.

    Ishiguro lets one see everything Stevens cannot, without once breaking the first-person frame. The dramatic irony is sustained across the entire novel, and it is devastating precisely because it is so quiet. Stevens recounts his life at Darlington Hall with the care of a man polishing silver, and one watches the years drain away, the political complicity deepen, the one person who might have saved him walk out of the door.

    Lord Darlington's Nazi sympathies are handled with the same reticence Stevens applies to everything: acknowledged, explained away, folded back into the larger narrative of service and duty. The novel's argument is that institutional loyalty, carried far enough, becomes a form of moral abdication, and Stevens is both its illustration and its victim. The bus-stop scene near the end, where Stevens and Miss Kenton acknowledge what might have been and recognise it is irretrievably gone, is among the most heartbreaking passages in postwar fiction. Ishiguro does not raise his voice. He does not need to.

- title: "The Genius of Birds"
  title_en: "鸟类的天赋"
  type: "book"
  creator: "Jennifer Ackerman, trans. 沈汉忠 & 李思琪 (CN)"
  creator_role: "by"
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/books/genius-of-birds.jpg"
  posted: "2021-04-08"
  revised: "2021-04-08"
  text: |
    ***The Genius of Birds*** dismantles the architecture of a prejudice. 'Bird brain' encodes a specific neuroscientific assumption: intelligence requires a neocortex, mammals hold a monopoly on complex cognition, and the avian brain, lacking cortical lamination, must be operating at a lower level. Ackerman demolishes this assumption with the patience of someone who knows the evidence is on her side. New Caledonian crows craft multi-step tools; Clark's nutcrackers cache tens of thousands of seeds and retrieve them months later; songbirds acquire dialects through a developmental process that parallels human language acquisition with uncanny precision.

    The deepest argument is about convergent evolution: intelligence is not a single architectural achievement but a problem that evolution has solved more than once, through different neural substrates. Some bird brains pack neurons at densities that can exceed primate cortex, achieving comparable cognitive feats through circuits that look nothing like ours. This should unsettle anyone who thinks of the mammalian brain as the pinnacle of cognitive design.

    The book is organised by cognitive domain, tool use, spatial memory, social intelligence, song, and each chapter builds from field observations to laboratory findings to theoretical implications. Ackerman writes with real enthusiasm and without condescension, though the treatment leans towards celebration rather than critical assessment of where the field's claims outrun its evidence. That is a minor fault. The book makes one see birds differently, and once the seeing changes, it does not change back.

- title: "Life Ascending"
  title_en: "生命的跃升"
  type: "book"
  creator: "Nick Lane"
  creator_role: "by"
  year: 2009
  eval: "disliked"
  image: "/assets/images/thoughts/books/life-ascending.jpg"
  posted: "2021-03-25"
  revised: "2021-03-25"
  text: |
    I came to ***Life Ascending*** having already been converted by Lane's *The Vital Question*, and the disappointment was proportional to the expectation. The structure, ten chapters for ten 'great inventions' of evolution, imposes a listicle format on material that resists it. The origin-of-life and complex-cell chapters are strong because they draw on Lane's own bioenergetic research, but the later chapters on consciousness and death read as though Lane felt obligated to fill a quota and reached for topics outside his expertise.

    The writing is competent throughout but lacks the sustained argumentative drive that makes *The Vital Question* thrilling. Lane is at his best when tracing proton gradients across membranes; he is less convincing when speculating about the evolutionary origins of subjective experience. A book that had been five chapters rather than ten, concentrating on what Lane actually knows, would have been twice as good.

- title: "Order out of Chaos"
  title_en: "La nouvelle alliance: Métamorphose de la science"
  type: "book"
  creator: "Ilya Prigogine & Isabelle Stengers, trans. 曾庆宏 & 沈小峰 (CN: 《从混沌到有序》)"
  creator_role: "by"
  year: 1979
  eval: "meh..."
  image: "/assets/images/thoughts/books/order-out-of-chaos.jpg"
  posted: "2021-03-22"
  revised: "2021-03-22"
  text: |
    The equations of classical mechanics work identically forwards and backwards in time; the second law of thermodynamics does not. ***Order out of Chaos*** opens with this contradiction, not as a curiosity to be filed away but as the fundamental unresolved fracture in physics, the place where the Newtonian synthesis quietly fails. Prigogine and Stengers read this fracture as an opportunity: if irreversibility is real and universal, then the emergence of order from non-equilibrium conditions is not an anomaly to be explained away but the basic mode through which nature produces complexity.

    The book then oversells itself. Prigogine and Stengers have a habit of gesturing towards consequences the thermodynamic argument cannot reach: biology, consciousness, social complexity are all invoked, but the leap from dissipative structures in Bénard convection cells to 'a new dialogue with nature' is rhetorically exciting and scientifically underspecified. The popular-science tone smooths over the places where the argument is still contested or incomplete, and one comes away with a more triumphalist picture than the science warrants.
    The book was hugely influential in the 1980s precisely because it arrived when people were hungry for a scientific framework that could accommodate complexity, emergence, and irreversibility, things that felt philosophically urgent but were marginalised in the physics mainstream. That cultural role is real. Reading it now, though, a lot of it has the flavour of promissory notes that did not fully cash out.

- title: "The Self Illusion"
  title_en: "自我的本质"
  type: "book"
  creator: "Bruce Hood, trans. 钱静 (CN)"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/self-illusion.jpg"
  posted: "2021-03-15"
  revised: "2021-03-15"
  text: |
    ***The Self Illusion*** makes a case familiar from Buddhist philosophy but argued through cognitive neuroscience: the self is not a thing but a process, not a unified agent directing experience but a narrative assembled after the fact from multiple independent neural systems. Hood draws on classic experiments, the split-brain studies of Gazzaniga, the confabulation work of Ramachandran, priming effects that implicate unconscious processes in what subjects retrospectively report as deliberate choices, to argue that the coherent "I" who seems to be the author of one's life is a useful fiction rather than a fact.

    The argument is sound as far as it goes, and the survey of supporting evidence is clear and well-organised. Where the book is less satisfying is in working out what follows. If the self is an illusion, what does that mean for responsibility, autonomy, and intention? Hood gestures at these implications without fully developing them, and the final chapters slide into a mild optimism, the self is an illusion, but our social identities are real even if our inner selves are not, that avoids the conclusion it appears to be approaching.

    The best chapters are the neurological case studies, where the evidence for self-construction is most concrete: patients who confabulate motives, patients who cannot update their self-model after injury, the split-brain patient whose left hemisphere invents explanations for what the right hemisphere has just done. The theoretical ambition slightly exceeds the grip.

- title: "Overcomplicated"
  title_en: "为什么需要生物学思维"
  type: "book"
  creator: "Samuel Arbesman, trans. 贾拥民 (CN)"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/overcomplicated.jpg"
  posted: "2021-03-10"
  revised: "2021-03-10"
  text: |
    ***Overcomplicated*** is a solid introduction to complexity as a property of modern technological systems, though not the book for anyone wanting a formal entry into complexity science. Arbesman identifies four factors that generate what he calls 'overcomplicated' systems: accretion, interaction, edge cases, and the sheer passage of time, and argues that we need to abandon the engineering instinct towards abstraction and adopt instead a biological mode of thinking, one attuned to feedback, cascading failures, and emergent behaviour.

    The argument is clear and the examples are well chosen, even if the prose occasionally circles a point longer than necessary. ***Overcomplicated*** is useful for what it is: a readable primer that frames the right questions without claiming to answer them. It does not try to be more, and that restraint is a virtue.

- title: "Irrational Man"
  title_en: "非理性的人"
  type: "book"
  creator: "William Barrett, trans. 段德智 (CN)"
  creator_role: "by"
  year: 1958
  eval: "meh..."
  image: "/assets/images/thoughts/books/irrational-man.jpg"
  posted: "2021-03-09"
  revised: "2021-03-09"
  text: |
    ***Irrational Man*** traces existentialism from Kierkegaard through Nietzsche, Heidegger, and Sartre, and the opening section on the cultural and philosophical context is the most useful part. The four portraits that follow are less reliable: Barrett is more interested in elaborating his own reading than in presenting each thinker on their own terms, and the argument has a self-circling quality, fragments assembled around a thesis that never fully coheres. As an introduction to existentialism it is serviceable; as a path into the thinkers themselves, a roundabout one.

- title: "Reality Is Not What It Seems"
  title_en: "La realtà non è come ci appare"
  type: "book"
  creator: "Carlo Rovelli, trans. Simon Carnell & Erica Segre (EN)"
  creator_role: "by"
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/books/reality-is-not-what-it-seems.jpg"
  posted: "2021-02-26"
  revised: "2021-02-26"
  text: |
    Rovelli does what almost no other physicist-writer manages: he makes the conceptual architecture of loop quantum gravity feel intelligible and beautiful, and he does it without dumbing anything down. ***Reality Is Not What It Seems*** shares the sweeping historical vision of *Seven Brief Lessons on Physics*, but extends it into deeper territory, tracing the line from Democritus through Einstein to the granular structure of spacetime itself, where space is woven from discrete loops rather than continuous, and time emerges from quantum transactions rather than serving as a backdrop.

    Rovelli writes about physics the way the best essayists write about anything: as though the reader's understanding were not an obstacle to be overcome but a capacity to be trusted. The chapters on Dante's cosmology and on the philosophical implications of quantum gravity are not digressions; they are the book's argument, that physics has always been entangled with how we imagine reality, and that the imagination is constitutive of the science, not separate from it. As with *Seven Brief Lessons*, the prose is effortlessly fluid, and one comes away informed and altered in how one pictures the world.

- title: "We Are Our Brains"
  title_en: "Wij zijn ons brein"
  type: "book"
  creator: "Dick Swaab, trans. 王奕瑶, 陈琰璟, & 包爱民 (CN: 《我即我脑》)"
  creator_role: "by"
  year: 2014
  eval: "disliked"
  image: "/assets/images/thoughts/books/we-are-our-brains.jpg"
  posted: "2021-02-20"
  revised: "2021-02-20"
  text: |
    Swaab's reputation as a researcher had led me to expect rigour, and the first half delivers something close to it: a tour through his own work on sexual differentiation, brain development, and ageing, enriched by personal anecdotes and case histories that ground the neuroscience in actual patients and recollection. But the second half collapses into a grab-bag of topics, consciousness, memory, free will, treated with a generality that borders on negligence. The logical slope is the real problem: 'we are our brains' is stated as self-evident, yet the book never once engages with embodied cognition, as though the entire post-Damasio literature did not exist.
    The claim that sexual orientation is 'determined before birth,' supported almost entirely by Swaab's own finding that the SCN is larger in homosexual men, does not constitute the proof he presents it as. And structurally, ***We Are Our Brains*** reads like a snippet collection, each chapter a self-contained vignette with no connective tissue. The book needed an argument; it settled for a bibliography.

- title: "Self as Method"
  title_en: "把自己作为方法"
  type: "book"
  creator: "Xiang Biao & Wu Qi, trans. David Ownby (EN)"
  creator_role: "by"
  year: 2020
  eval: "meh..."
  image: "/assets/images/thoughts/books/self-as-method.jpg"
  posted: "2021-02-19"
  revised: "2021-02-19"
  text: |
    A conversation between anthropologist Xiang Biao and journalist Wu Qi, structured as an intellectual autobiography that doubles as a methodological statement. The insights are real but infrequent. Xiang's work on 'Zhejiang Village' in Beijing, and the conviction that it produced, that theory must be grounded, that intellectuals must learn to see from below, can be summarised as 'treat people as people,' which is what the puzzling title roughly means. The problem is that ***Self as Method*** does not always practice what it preaches. Xiang says 'understanding is natural, not difficult, but we often refuse to understand,' a claim that sounds profound until one asks whether most people would agree, at which point its distance from the ground becomes visible.

    For someone who spent twenty years at Oxford and the Max Planck Institute, Xiang's knowledge of his own institutional environment is oddly thin: he calls the colleges 'mainly for undergraduate teaching,' when anyone who has been through the tutorial system knows that is not what colleges are mainly for. The praise of 'gentry spirit' and the injunction to 'know your own environment' sit uneasily with these lapses.

- title: "Why We Sleep"
  type: "book"
  creator: "Matthew Walker"
  creator_role: "by"
  year: 2017
  eval: "hated"
  image: "/assets/images/thoughts/books/why-we-sleep.jpg"
  posted: "2021-02-15"
  revised: "2021-02-15"
  text: |
    ***Why We Sleep*** made me angry in a way that only dishonest science can. Matthew Walker's thesis, that sleep deprivation is a catastrophic public-health crisis linked to cancer, Alzheimer's, obesity, and shortened lifespan, is presented with the confidence of settled consensus. It is not. Alexey Guzey's detailed debunking, published in 2019, identified manipulated graphs, cherry-picked studies, exaggerated causal claims built from correlational data, and citations that did not support the assertions that Walker attached to them. Walker's partial response acknowledged some errors but failed to address the core problems, and the scientific community's largely silent acceptance of a bestselling book riddled with factual errors became its own case study in how popular science publishing fails.

    The message that sleep matters is uncontroversial; the specific statistical claims are the problem, and a scientist who distorts data in service of a 'good' message is still distorting data. I felt deceived, and I do not forgive books that deceive me.

- title: "The Hitchhiker's Guide to the Galaxy"
  type: "book"
  creator: "Douglas Adams"
  creator_role: "by"
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/books/hitchhikers-guide-to-the-galaxy.jpg"
  posted: "2021-02-01"
  revised: "2021-02-01"
  text: |
    I came to ***The Hitchhiker's Guide to the Galaxy*** far too late, but here we are. Adams is doing something rare: making comedy carry the philosophical structure rather than decorating an existing one. The destruction of Earth for a hyperspace bypass, the bureaucratic indifference of the Vogons, the supercomputer that spends millennia computing the answer to life, the universe, and everything only to deliver '42', these are not jokes with philosophical implications; they are philosophical arguments delivered as jokes. The puns are relentless, the setups absurdly patient, Adams spending half a page constructing the scaffolding for a single small gag. That commitment to the bit separates him from lesser comic writers.

    The surprise is the melancholy. Beneath the absurdism runs something bleak: Arthur Dent is a man who has lost everything, his home, his planet, his species, and the universe responds with paperwork and bad poetry. The Vogon demolition fleet arriving with all its paperwork filed correctly is funny precisely because it is terrifying. Adams understood, long before it became fashionable to say so, that the real horror is not malice but indifference; that the universe is not hostile, merely unhelpful. He has people thinking seriously about the role of towels in civilisation, and somehow that sentence is not a joke. I loved every page. The towel stays packed.

- title: "The Vital Question"
  title_en: "复杂生命的起源"
  type: "book"
  creator: "Nick Lane, trans. 严曦 (CN)"
  creator_role: "by"
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/books/vital-question.jpg"
  posted: "2021-01-22"
  revised: "2021-01-22"
  text: |
    Lane's argument in ***The Vital Question*** is bioenergetic: the reason complex life exists at all, the reason eukaryotic cells arose only once in four billion years, comes down to energy. Bacteria and archaea are trapped by their own cell membranes: to maintain proton gradients for ATP synthesis, they must distribute copies of their genome near the membrane surface, and the energetic cost of maintaining hundreds of genome copies prevents them from expanding. The endosymbiotic event, an archaeon engulfing a bacterium that became the mitochondrion, liberated the host cell from this constraint, concentrating respiration in a dedicated organelle and freeing the nuclear genome to expand, diversify, and eventually produce every complex organism on Earth.

    The alkaline hydrothermal vent hypothesis for the origin of life is the book's other contribution: Lane argues that life began not in a primordial soup but at submarine vents where natural proton gradients across thin iron-sulphide barriers could drive the reduction of CO₂ by H₂, producing organic molecules without enzymes. The elegance of this proposal is that it explains why all life, from archaea to mitochondria to chloroplasts, uses proton gradients: because life was born inside one.
    Lane does not write down to his reader; the chemistry is real, the terminology exact. This is the most intellectually thrilling science book I have encountered: a single argument, pursued with total commitment, that redraws the map of life's deepest history.

- title: "The Case of the Speluncean Explorers"
  title_en: "洞穴奇案"
  type: "book"
  creator: "Peter Suber, trans. 陈福勇 & 张世泰 (CN)"
  creator_role: "by"
  year: 1998
  eval: "loved"
  image: "/assets/images/thoughts/books/case-of-the-speluncean-explorers.jpg"
  posted: "2021-01-16"
  revised: "2021-01-16"
  text: |
    A group of cave explorers, trapped underground with no hope of rescue, kill and eat one of their number to survive. The question is whether they should be convicted of murder. Peter Suber takes Lon Fuller's original 1949 hypothetical and extends it with nine fictional judicial opinions, each arguing from a different school of legal philosophy: natural law, positivism, legal realism, feminist jurisprudence, economic analysis, and more. The book is one of the most elegant introductions to legal reasoning I have encountered, and it requires no background in law to follow.

    ***The Case of the Speluncean Explorers*** gets its force from the architecture of doubt: each opinion seems persuasive until the next one arrives and dismantles it, so that the reader is constantly revising their own position, discovering that their intuitions rest on philosophical commitments they had not examined. The sequencing is exact; Suber anticipates exactly where the reader's objections will form and addresses them through the next judge's reasoning, creating a momentum that carries the book in a single sitting.

    By the end, the point is not that one judgment is correct and the others wrong. The point is that legal reasoning is a machine for exposing the philosophical assumptions one brings to punishment, necessity, authority, and mercy.


- title: "Crows"
  title_en: "乌鸦简史"
  type: "book"
  creator: "Candace Savage, trans. 贺霞 (CN)"
  creator_role: "by"
  year: 2005
  eval: "liked"
  image: "/assets/images/thoughts/books/crows.jpg"
  posted: "2021-01-08"
  revised: "2021-01-08"
  text: |
    Savage is a prolific Canadian nature writer, and ***Crows*** is a compact survey of humanity's long, ambivalent relationship with corvids: revered in Indigenous cosmologies, reviled in European folklore, and increasingly studied by cognitive scientists who keep finding that crows are smarter than the experimental paradigms designed to test them. The book is at its best when it draws on field observations and cultural history, weaving myth, ornithology, and anecdote into something that reads more like a portrait than a monograph.

    The weakness is the extended treatment of Bernd Heinrich's crow research, which occupies more space than it earns. Heinrich's framework for understanding avian intelligence feels dated, particularly his insistence on a hierarchy in which emotion is more 'primitive' than reason, a view that comparative cognition has moved well past. A book about crows should not make the reader doubt that its principal scientist understands what intelligence is.
    The book is structured less as a history than as a series of encounters, and that looser form is both strength and limitation: intimate enough to make corvid intelligence feel vivid, too scattered to build a sustained argument.


- title: "The Rules of Contagion"
  title_en: "传染"
  type: "book"
  creator: "Adam Kucharski, trans. 谷晓阳, 李曈, 王兴伟, & 王雪萍 (CN)"
  creator_role: "by"
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/books/rules-of-contagion.jpg"
  posted: "2021-01-05"
  revised: "2021-01-05"
  text: |
    A rare popular-science book about mathematical modelling that actually explains the models. Kucharski traces the SIR framework from its epidemiological origins through its surprisingly wide applications: sociology, economics, criminology, online virality. The structure is tight, the introduction of technical material is well judged, and the repeated mathematical architecture behind diseases, ideas, financial panics, and violent crime is presented with enough specificity to be instructive rather than merely analogical.

    The most striking section is the application of contagion models to violence: that outbreaks of violent crime can be modelled, and sometimes predicted, using the same equations that track measles transmission. Kucharski handles the ethical and methodological complications without flinching. The book's only real weakness is a shortage of figures; for a book about models and transmission dynamics, the absence of diagrams and graphs is a puzzling omission. 'In the time it takes to read this book, roughly 300 people worldwide will have died of malaria, over 500 of AIDS, and about 80, mostly children, of measles.' ***The Rules of Contagion*** earns its urgency.

- title: "How We Remember"
  type: "book"
  creator: "Michael Hasselmo"
  creator_role: "by"
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/books/how-we-remember.jpg"
  posted: "2020-11-25"
  revised: "2020-11-25"
  text: |
    ***How We Remember*** is the single book that has most shaped my thinking about memory mechanisms. More than Kandel's *In Search of Memory* (2006), which made the field feel human and historical but did not give me a working systems account; more than any review paper or textbook chapter. Hasselmo does what almost no one else manages: he integrates computational modelling, pharmacology, and systems-level physiology into a coherent account of how the *hippocampus* encodes and retrieves *episodic memory*, with *acetylcholine* as the fulcrum between encoding and retrieval states. The framework is clean without being reductive. One reads it and the hippocampal circuit clicks into place, not as a list of anatomical connections but as a system with dynamics, with states, with reasons for being wired the way it is.

    I first encountered this book early in my PhD, and it set the terms for how I think about the problems I work on daily: what does it mean for a circuit to switch between modes, how do neuromodulators sculpt the computational landscape, what is the relationship between oscillatory dynamics and the information the network carries. These are not abstract questions for me; they are the questions I bring to the recording rig. Hasselmo answered some of them, sharpened others, and made the rest feel tractable. Some books wait for the reader to grow enough to read them differently.

- title: "Your Brain Is a Time Machine"
  title_en: "大脑是台时光机"
  type: "book"
  creator: "Dean Buonomano, trans. 闾佳 (CN)"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  image: "/assets/images/thoughts/books/your-brain-is-a-time-machine.jpg"
  posted: "2020-10-25"
  revised: "2020-10-25"
  text: |
    Misleading title. ***Your Brain Is a Time Machine*** spends far too long on the physics of time, relativity, the block universe, and explains all of it poorly; anyone interested would do better with Rovelli's *The Order of Time* (2017). The neuroscience half, which ought to be the book's centre of gravity, is where one expects Buonomano to deliver, and he does not. The kappa and tau effect experiments are striking, but the treatment stops well short of the question that matters: how does the brain actually construct temporal experience? The book meanders between physics, neuroscience, and philosophy without committing to any of them.
    Buonomano barely touches *time cells*, the hippocampal neurons that fire at specific moments during a temporal interval, despite the fact that they are arguably the strongest evidence for the brain's intrinsic timing capacity beyond the sub-second scale. The distinction between *interval timing*, likely striatal and cerebellar, and the *episodic temporal organisation* performed by hippocampal sequences is never drawn. *Theta phase precession*, the mechanism by which place cells compress behavioural sequences into single oscillatory cycles, goes unmentioned, yet it is perhaps the most elegant neural solution to the problem of binding events across time. Eichenbaum's late reviews remain more focused and more useful. The brain is indeed a time machine; Buonomano simply never opens the hood.

- title: "The Language Instinct"
  type: "book"
  creator: "Steven Pinker"
  creator_role: "by"
  year: 1994
  eval: "meh..."
  image: "/assets/images/thoughts/books/language-instinct.jpg"
  posted: "2020-08-30"
  revised: "2020-08-30"
  text: |
    Pinker argues that language is a biological adaptation produced through natural selection, not a cultural invention transmitted across generations. Pinker marshals genuine observations in support: all human cultures develop language; deaf children exposed to impoverished sign input spontaneously invent systematic sign languages; specific brain regions are implicated in language in ways that suggest specialisation. These are real phenomena and they deserve explanation. The problem is not the observations but the conclusion Pinker draws: that they settle the debate between nativism and its alternatives. Both sides accept these observations; neither side has resolved what they mean.

    The poverty-of-stimulus argument, the book's argumentative centrepiece, is its most exposed flank. Sampson argued that its logic would make learning in general mysterious: no learner receives negative evidence from nature, and yet learning occurs. Statistical learning research has since shown the stimulus to be far richer than Pinker assumed. The connectionist challenge from Elman and colleagues showed that domain-general networks can acquire grammatical structure without innately specified rules, a finding the book does not adequately address. Evans and Levinson later argued, from cross-linguistic evidence, that the direct universals are far fewer and less profound than nativist accounts imply, and that recursion itself may not be universal. Even on the nativist side, Chomsky's own revisions to Universal Grammar and his rejection of Pinker's evolutionary account left the foundations looser than the book suggests. The book presents nativism not as a live research programme contested on multiple fronts but as a matter approaching settlement. Pinker's book has the energy of good science writing; it lacks the good faith.

- title: "Enlightenment Now"
  type: "book"
  creator: "Steven Pinker"
  creator_role: "by"
  year: 2018
  eval: "disliked"
  image: "/assets/images/thoughts/books/enlightenment-now.jpg"
  posted: "2020-08-30"
  revised: "2020-08-30"
  text: |
    ***Enlightenment Now*** is a book of graphs. Pinker selects fifteen metrics of human wellbeing and plots their improvement, presenting the display of data as though data were self-interpreting. The method does not bear scrutiny. The poverty line deployed throughout is $1.90 per day, a threshold so low that critics have pointed out the absurd result: fewer people counted as poor than as hungry or malnourished. What it measures is not poverty but the lower edge of destitution. The violence statistics use per-capita rates across centuries, ignoring the methodological objection that war deaths, as a fat-tailed distribution, cannot be analysed with standard statistics: the century without a world war looks like permanent progress until the next one arrives. The ecological frame is similarly selective: biodiversity collapse, fresh-water stress, and alternative welfare measures such as the Genuine Progress Indicator sit outside the story.

    The framework that holds all of this together is the rhetorical move of loading 'Enlightenment' onto whichever side of any argument Pinker favours, and attributing every counterexample to 'anti-Enlightenment forces' or 'progressophobia', an accusation that ridicules rather than rebuts. The contradiction at the book's ideological core: Pinker credits historical progressive movements for the moral progress his graphs document, then uses those same graphs to dismiss contemporary concerns about inequality, ecological collapse, and structural violence as irrational sentiment. The book mistakes the optimism of the comfortable for evidence, and calls the discomfort of everyone else a cognitive bias.

- title: "The Strange Order of Things"
  title_en: "万物的古怪秩序"
  type: "book"
  creator: "Antonio Damasio, trans. 李恒威 (CN)"
  creator_role: "by"
  year: 2018
  eval: "disliked"
  image: "/assets/images/thoughts/books/strange-order-of-things.jpg"
  posted: "2020-08-20"
  revised: "2020-08-20"
  text: |
    The problem with ***The Strange Order of Things*** is not the biological thesis itself. Damasio is at his best when he traces homeostasis from single-celled life through nervous systems to feeling, making the case that affect is not a late human ornament but an elaboration of ancient life-regulating machinery. In that narrower form, the argument is persuasive: it gives feelings evolutionary depth and refuses the bad popular split between cognition as high brain work and affect as animal residue.

    The book becomes frustrating when homeostasis is asked to explain culture by sheer expansion. Religion, music, art, ethics, education, governance, technology, and artificial intelligence are pulled into the same orbit without enough middle terms between bodily regulation and cultural form. The examples start to decorate the framework rather than test it. Damasio's earlier books, especially *Descartes' Error*, could make a large claim feel earned because the clinical cases created pressure on the theory. Here the theory arrives first and everything else is asked to confirm it. By the end, homeostasis has become less an explanation than a permission slip for explaining everything, which is exactly how a strong biological concept becomes intellectually useless.

- title: "Consciousness and the Brain"
  title_en: "脑与意识"
  type: "book"
  creator: "Stanislas Dehaene, trans. 章熠 (CN)"
  creator_role: "by"
  year: 2014
  eval: "liked"
  image: "/assets/images/thoughts/books/consciousness-and-the-brain.jpg"
  posted: "2020-08-10"
  revised: "2020-08-10"
  text: |
    Dehaene's argument in ***Consciousness and the Brain*** is systematic and specific: consciousness is the global broadcast of information to widely distributed cortical networks, the signature of a particular computational architecture rather than a mysterious additional ingredient. The book is an extended case for global workspace theory, supplemented by experimental paradigms (masking, continuous flash suppression, the attentional blink) that allow consciousness to be turned on and off by the experimenter and the difference between conscious and unconscious processing to be studied directly.

    The experimental chapters are the book's strength. Dehaene is a rigorous cognitive neuroscientist, and the evidence from signatures of consciousness (the late cortical ignition, the P300, the involvement of frontoparietal networks) is assembled with precision. The argument that consciousness leaves a distinctive neural footprint, identifiable across different kinds of content and different kinds of manipulation, is well supported.

    Where I found the theory less convincing was in its handling of phenomenal consciousness. Dehaene dismisses the hard problem somewhat too quickly for a book that claims to explain consciousness itself. Global workspace theory is strong on access consciousness, on what becomes available to report and act on, but the question of why any of it should be experienced at all remains open, and the book proceeds as though closing the functional account were the same as closing the experiential one. Valuable for the neuroscience; incomplete as philosophy.

- title: "Aroused"
  title_en: "激素小史"
  type: "book"
  creator: "Randi Hutter Epstein, trans. 杨惠东 (CN)"
  creator_role: "by"
  year: 2018
  eval: "liked"
  image: "/assets/images/thoughts/books/aroused.jpg"
  posted: "2020-07-31"
  revised: "2020-07-31"
  text: |
    The history of endocrinology makes for good reading. ***Aroused*** moves from the nineteenth-century experimenters who first identified that organs produce chemical messengers into the bloodstream, through the isolation of insulin, oestrogen, testosterone, and cortisol, to the present-day complexity of the hormonal system and the political controversies it has generated. Epstein is a medical journalist, and the book has the journalist's gift for story: the scientists are characters, the discoveries are dramas, and the wrong turns are as interesting as the right ones.

    The book is sharpest where science and ideology collide. The testosterone chapter takes on popular claims about aggression with genuine scepticism: the evidence that testosterone causes aggression in humans is far weaker than received wisdom requires, and Epstein traces both the studies and the mythology with care. The insulin chapter is absorbing for different reasons: the extraordinary disputes over priority and credit behind its discovery turn the history of science into something closer to a court case, with consequences for millions of people depending on the result.

    What the book trades off for readability is depth. Epstein describes the hormonal system through analogy rather than mechanism, and the analogies are good but not always sufficient; someone who wants to understand how the hypothalamic-pituitary axis actually works (the feedback loops, the pulse patterns, the receptor dynamics) will need to look elsewhere. The history is excellent; the science, simplified for a general audience, sacrifices enough precision that a specialist would find it frustrating at the edges.

- title: "The Quantum Story"
  title_en: "量子通史"
  type: "book"
  creator: "Jim Baggott, trans. 于秀秀 (CN)"
  creator_role: "by"
  year: 2011
  eval: "liked"
  image: "/assets/images/thoughts/books/quantum-story.jpg"
  posted: "2020-06-15"
  revised: "2020-06-15"
  text: |
    ***The Quantum Story*** takes the form of forty chapters, each anchored to a specific paper or experimental result, spanning Planck's 1900 blackbody paper through early-twenty-first-century debates on decoherence and quantum information. The approach is historiographically careful: characters appear as people with commitments and blind spots rather than as emblems of ideas, and Baggott, a physical chemist trained at Oxford, distinguishes throughout between what physicists believed and what the evidence supported. The prose is fluid for material this demanding.

    The main reservation is scale. The book reliably tracks who presented what argument to whom and when, but it is steep, and the later chapters on quantum information and decoherence are compressed enough that readers without prior background will need to supplement. One does not need to finish it to benefit: the early chapters on the old quantum theory and the Copenhagen debates reward reading even if the later sections remain partially opaque, and the book is less forbidding in practice than most reviewers suggest.

- title: "The Immortal Life of Henrietta Lacks"
  title_en: "永生的海拉"
  type: "book"
  creator: "Rebecca Skloot, trans. 刘旸 (CN)"
  creator_role: "by"
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/books/immortal-life-of-henrietta-lacks.jpg"
  posted: "2020-05-20"
  revised: "2020-05-20"
  text: |
    Rebecca Skloot spent ten years researching ***The Immortal Life of Henrietta Lacks***, and the research shows. The book weaves three stories together: the scientific history of HeLa cells, the most widely used human cell line in biological research; the biography of Henrietta Lacks herself, a Black woman from Baltimore who died of cervical cancer in 1951 and from whose tumour the cells were taken without her knowledge or consent; and Skloot's own investigation, conducted alongside Henrietta's daughter Deborah, which is as much about the Lacks family's relationship with a history they were excluded from as it is about the cells.

    The ethical dimensions are handled without sentimentality. Skloot does not flatten the researchers who took the cells into villains; the medical culture of the 1950s treated biological samples as institutional property rather than as belonging to the patient, and Lacks was not uniquely wronged so much as paradigmatically wronged in a system that wronged many. The cruelty is not that her cells were taken, but that the family learned from journalists rather than scientists, that they remained poor while institutions profited, and that Henrietta became a cell line before she became a person in the historical record.

- title: "In the Blink of an Eye"
  title_en: "第一只眼"
  type: "book"
  creator: "Andrew Parker, trans. 于翀涵 & 李晨昊 (CN)"
  creator_role: "by"
  year: 2003
  eval: "meh..."
  image: "/assets/images/thoughts/books/in-the-blink-of-an-eye.jpg"
  posted: "2020-05-12"
  revised: "2020-05-12"
  text: |
    Andrew Parker's career has moved between the Australian Museum, Oxford, and the Natural History Museum in London, and ***In the Blink of an Eye*** carries the breadth of that accumulated natural history visibly. The book is stocked with animal optics, structural colour, and evolutionary oddities; many of the examples are interesting, and the prose moves well. As science communication it is enjoyable.

    As a case for its own argument, it is less satisfying. Parker's Light Switch Theory holds that the Cambrian Explosion was triggered by the evolution of eyes in predators, which suddenly made external appearance a matter of survival for prey; it receives surprisingly little dedicated treatment for a book premised on a single thesis. The theory's deeper problem is timing: critics including Martin Brasier have argued that predatory behaviour was already spreading well before camera-type eyes appeared in the fossil record, which means the sequence the theory requires does not hold.

- title: "Complexity"
  title_en: "复杂"
  type: "book"
  creator: "Melanie Mitchell, trans. 唐璐 (CN)"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/complexity.jpg"
  posted: "2020-05-05"
  revised: "2020-05-05"
  text: |
    Melanie Mitchell writes about complexity science from the inside: she has worked with John Holland on genetic algorithms and with Douglas Hofstadter on analogy and cognition, and the book reflects intimate knowledge of the field, not an encyclopaedic pass through it. ***Complexity*** covers cellular automata, self-organised criticality, genetic algorithms, network theory, and information theory as it applies to living systems, and the survey is well judged, building from simple examples towards the harder conceptual questions.

    What the field lacks, and what Mitchell honestly acknowledges it lacks, is a satisfactory definition of complexity itself. The book is a tour of phenomena that seem to instantiate something called complexity, systems where rich behaviour emerges from simple rules, where small-scale interactions generate large-scale structure without a blueprint, but the theoretical unity is still aspirational. The multiple candidate definitions (computational, thermodynamic, logical depth, effective complexity) are reviewed without resolution.

    The most useful insight, and the one that stuck longest, is that complexity often lives at the boundary between order and chaos: too much order and the system cannot adapt; too much disorder and no pattern persists long enough to be selected for. This "edge of chaos" framing has been contested, and Mitchell is honest about the evidence, but as a heuristic it has kept its grip. A clear, honest introduction to a field still looking for itself.

- title: "The Hobbit"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1937
  eval: "loved"
  image: "/assets/images/thoughts/books/hobbit.jpg"
  posted: "2020-02-20"
  revised: "2020-02-20"
  text: |
    I read ***The Hobbit*** in Chinese at around fifteen; Peter Jackson's films had come first, then the trilogy, and the prequel was the last of the sequence. The world announced itself immediately: Bilbo's pantry stocked for a party he did not plan, the riddles in the dark, Smaug's voice rumbling through the Lonely Mountain. When I reread it in English at Cambridge, walking through countryside not unlike the English pastoral that Tolkien loved, the tone I had missed in the Chinese reading came through: that mixture of cosiness and danger, of fireside warmth and sudden violence, which is Tolkien's signature and which no imitator has ever replicated.

    Bilbo's heroism is the heroism of someone who would rather be at home. He is not brave; he is stubborn, and curious, and too polite to refuse. The riddle contest with Gollum, the best scene Tolkien ever wrote in any book, is a contest between two creatures who are far more alike than either would admit, and the Ring passes between them through an accident that Tolkien later elevated into theology. On rereading, the melancholy outweighs the adventure: Thorin's death, the desolation of the dragon, the sense that every quest exacts a cost the questers did not anticipate. A children's book that an adult reads differently, and the difference is the point.

- title: "The Return of the King"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1955
  eval: "loved"
  image: "/assets/images/thoughts/books/return-of-the-king.jpg"
  posted: "2020-02-10"
  revised: "2020-02-10"
  text: |
    The ending is the book. Everything in ***The Return of the King*** builds towards the Scouring of the Shire and the Grey Havens, and those final chapters turn victory into an accounting of cost. Frodo saves the Shire but cannot live in it; the wound is too deep, the Ring's absence an amputation that will not heal. When he sails from the Grey Havens, he sails because there is nowhere left for him in the world he saved. Tolkien understood that the hero's reward could be departure, and that some wounds can only be treated by leaving everything one fought for behind.
    The battle sequences are extraordinary, Pelennor Fields in particular, but they matter less on rereading than Denethor's despair, Éowyn's fury, and Sam carrying Frodo up Mount Doom. Sam carries the moral weight of the entire trilogy, and his endurance is not heroic in any classical sense; it is the endurance of someone who loves his friend and cannot imagine stopping. The destruction of the Ring, Frodo's failure at the Crack of Doom and Gollum's accidental redemption, is Tolkien's deepest theological statement: that grace operates through the least likely instruments, that mercy shown to the wretched is never wasted even when it appears to have been.

    I finished the trilogy at Cambridge in early 2020, weeks before the world shut down, and the Grey Havens hit differently than they had in Chinese as a child: a farewell to a place I was about to leave. The Shire was scoured; the hobbits rebuilt it; but Frodo could not stay. I have carried that image since.

- title: "The Two Towers"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1954
  eval: "loved"
  image: "/assets/images/thoughts/books/two-towers.jpg"
  posted: "2019-12-20"
  revised: "2019-12-20"
  text: |
    The structural gamble of ***The Two Towers*** is to split the Fellowship and run two narratives in parallel without intercutting: Books III and IV are self-contained, and the effect is disorienting in exactly the way that Tolkien intends. The reader experiences the separation as the characters do, with no knowledge of how the other half fares. Book III, the war narrative, has Helm's Deep and the Ents' march on Isengard, which are the trilogy's most kinetic set pieces; Book IV, Frodo and Sam's journey through Ithilien and into Mordor, operates at the opposite pitch: slow, intimate, claustrophobic.

    Gollum is the great achievement of this volume. Tolkien gives him interiority without redemption: the Sméagol-Gollum duality, the creature arguing with itself, wanting to be good and wanting the Ring, is psychologically precise in a way that nothing else in the trilogy attempts. Sam's distrust of Gollum and Frodo's pity for him create a three-way dynamic that carries more tension than any battle. The tragedy is that Frodo is right to show mercy, and Sam is right not to trust, and neither rightness prevents the catastrophe that follows.
    Treebeard's grief for the lost forests is the passage that hit hardest on rereading. Tolkien was writing about industrialisation, about the destruction of the English countryside that he loved, and Treebeard's slow, patient fury at the felling of trees has an ecological resonance now that it could not have had in 1954. The Ents are Tolkien's answer to the question of what happens when the natural world decides to fight back, and the answer is both magnificent and insufficient: they win the battle and lose the war, because the forests are already diminished beyond recovery.

- title: "The Fellowship of the Ring"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1954
  eval: "loved"
  image: "/assets/images/thoughts/books/fellowship-of-the-ring.jpg"
  posted: "2019-11-10"
  revised: "2019-11-10"
  text: |
    I first read ***The Fellowship of the Ring*** as a child in Chinese, and the textures outlasted the plot: Frodo sneaking mushrooms from Farmer Maggot's field, the smell of pipe-weed in the Prancing Pony, the terror of the Nazgûl on the road. When I came back to it at Cambridge, reading the English for the first time, those textures sharpened into something architectural. Tolkien builds Middle-earth the way that a geologist builds a landscape: layer by layer, stratum by stratum, each culture and language resting on the one beneath it, and the reader's experience of depth is structural rather than metaphorical. One feels the weight of history in every place name because the history is actually there, documented in appendices and unpublished manuscripts, generating the text from below.

    The departure from the Shire is the emotional foundation of the entire trilogy. Tolkien understood something that most fantasy writers do not: that adventure means loss, that leaving home is a wound, not merely the beginning of a story, that the story spends three volumes failing to heal. The Shire chapters are long because they need to be; the reader must love the Shire as much as Frodo does, or the sacrifice means nothing.

    Reading this in England changed it. I had walked through the Cambridgeshire fields that look exactly like the Shire, and the hobbits' world had become something remembered rather than imagined, which made the threat to it feel personal in a way that the earlier reading in Guangzhou had not. The Council of Elrond, which had once felt tedious, now read as the most important chapter in the book: a room full of people who do not trust each other deciding that someone must carry an impossible burden, and the smallest person in the room volunteering.

- title: "Connectome"
  title_en: "连接组"
  type: "book"
  creator: "Sebastian Seung, trans. 孙天齐 (CN)"
  creator_role: "by"
  year: 2012
  eval: "meh..."
  image: "/assets/images/thoughts/books/connectome.jpg"
  posted: "2019-09-20"
  revised: "2019-09-20"
  text: |
    ***Connectome*** is strongest when it stays with the machinery: electron microscopy, image segmentation, *C. elegans*, mouse retina, the stubborn fact that neural circuits have to be traced before they can be understood. Seung is good at making scale legible. A synapse becomes a data problem; a cubic millimetre of tissue becomes an almost absurd archive. Reading it at Cambridge, when neuroscience was becoming a professional path rather than an intellectual weather system around me, I appreciated the ambition, and the book did clarify why wiring diagrams matter.

    The problem is the slogan behind the project: the connectome as the self. That compresses a genuine insight into a metaphysical overreach. Connectivity constrains memory, personality, and behaviour, but it is not the whole person, and a static map of connections is not the same thing as dynamics, neuromodulation, plasticity, embodiment, or history. The late gestures towards mind-uploading make the problem worse, turning a concrete technical programme into aspirational transhumanist fog. As a map of a field, ***Connectome*** is serviceable; as an argument about identity, it mistakes the wiring diagram for the life conducted through it.

- title: "Journey to Rodrigues"
  title_en: "Voyage à Rodrigues"
  type: "book"
  creator: "J.M.G. Le Clézio, trans. 杨晓敏 (CN: 《罗德里格斯岛之旅》)"
  creator_role: "by"
  year: 1986
  eval: "liked"
  image: "/assets/images/thoughts/books/journey-to-rodrigues.jpg"
  posted: "2019-07-10"
  revised: "2019-07-10"
  text: |
    ***Journey to Rodrigues*** is Le Clézio's most intimate non-fiction: a pilgrimage to the island where his grandfather searched for pirate treasure at the Anse aux Anglais, following the same paths, reading the same volcanic landscape, trying to understand a man he never met through the geography the man obsessed over. The book is companion to the novel *The Prospector* (1985), which fictionalises the same material, but what the novel dramatises, the journal records: the angles of sunlight on black sand, the precise coordinates of ravines mapped in the grandfather's notes, the slow accretion of geographical knowledge that becomes, in Le Clézio's hands, a form of love.

    What surfaces beneath the treasure-hunting narrative is a meditation on inheritance and loss. The grandfather's obsession was driven by the forced sale of the family estate, Eureka, on Mauritius; a dispossession that scattered the family and turned the treasure into a substitute for what could not be recovered. Le Clézio's Mauritian roots run deep, and Rodrigues is a site where personal and colonial history intersect: a tiny fragment of the Indian Ocean world that European empires used and discarded. The treasure is never found, and Le Clézio arrives at the admission that closes the book: one cannot share dreams, not even an ancestor's. Coming to this after years of reading Le Clézio, I recognised the same restlessness that drove Hogan's flights and Lalla's return: the pull of origins, the persistence of what is invisible.

- title: "And Quiet Flows the Don"
  title_en: "Тихий Дон"
  type: "book"
  creator: "Mikhail Sholokhov, trans. 金人 (CN: 《静静的顿河》)"
  creator_role: "by"
  year: 1940
  eval: "liked"
  image: "/assets/images/thoughts/books/and-quiet-flows-the-don.jpg"
  posted: "2019-05-10"
  revised: "2019-05-10"
  text: |
    ***And Quiet Flows the Don*** is formidable in scale, though the scale kept me at some distance. Sholokhov spent more than a decade writing the four volumes, following the Cossack communities of the Don region through the First World War, the Revolution, and the Civil War. The strongest pages understand history as weight bearing down on households: conscription, rumour, hunger, reprisal, grief. The Cossack world feels dense with seasonal labour, horses, songs, kinship, pride, and old grudges, and the novel's achievement is to make that world substantial enough that its destruction carries weight.

    Grigory is the novel's moral pivot, a man of profound instinct and no ideology who fights on both sides, loves two women, kills many men, and survives everything except his own contradictions. Sholokhov does not give him a programme; he gives him desires, loyalties, pride, and a capacity for violence and tenderness in approximately equal measure. That makes him absorbing, yet also exhausting. The novel's passions are huge and often repetitive, and the women around Grigory, especially Aksinia and Natalya, carry the consequences of a world described more fully than they are allowed to inhabit.

    The steppe sections are the parts I admire most. Sholokhov renders the Don's flooding, the grass, the hawks, and the changing weather as a record of human events, so that landscape and history move alongside each other with a patience the plot sometimes lacks. Still, admiration is the right word. The novel is monumental, and sometimes one feels the monumentality being hauled into place.

    The final image, Grigory returned to his ruined home with his son in his arms, everything else gone, is desolate because it refuses drama: this is just what remained.

- title: "In Search of Memory"
  title_en: "追寻记忆的痕迹"
  type: "book"
  creator: "Eric Kandel, trans. 罗跃嘉 (CN)"
  creator_role: "by"
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/books/in-search-of-memory.jpg"
  posted: "2019-03-15"
  revised: "2019-03-15"
  text: |
    The autobiographical and scientific strands of ***In Search of Memory*** belong to the same argument at different scales. Kandel begins with Vienna: the Anschluss, classmates who stopped speaking to him, Kristallnacht two days after his ninth birthday, his departure with his brother in April 1939 and his parents' escape in September. Those scenes give memory an urgency that precedes the laboratory. The Nobel is an outcome, not the centre of gravity. Coming after Godfrey-Smith's philosophy of science, the book felt like an account from inside how a research programme finds its object: a question about history, trauma, and mind narrowing until it can be touched.

    The *Aplysia* chapters turn reductionism into an intellectual discipline. Kandel chooses the sea slug because the gill-withdrawal reflex, identifiable neurons, and sensory-motor synapses make one piece of memory experimentally legible. Serotonin, cAMP, PKA, CREB: short-term synaptic modulation opening into long-term structural change. Psychoanalysis supplies the question, behaviourism the behavioural grammar, cellular neurobiology the mechanism, and molecular biology the point at which memory begins to show its machinery. Kandel is generous about that machinery of discovery as well: Tauc, Schwartz, Greengard, Bailey, and the Columbia group appear as part of the apparatus, not as ornamental acknowledgements around a solitary genius.

    Kandel's great strength is his refusal to let explanation disenchant. The childhood memories of Vienna are not explained away by synapses; the synapses make their persistence stranger, more material, and more moving. His conversion from literature and psychoanalysis to biology becomes the book's real drama: a humanistic question surviving by becoming experimental. By the end, a life has become a method.

- title: "Origins of Human Communication"
  title_en: "人类沟通的起源"
  type: "book"
  creator: "Michael Tomasello, trans. 蔡雅菁 (CN)"
  creator_role: "by"
  year: 2008
  eval: "meh..."
  image: "/assets/images/thoughts/books/origins-of-human-communication.jpg"
  posted: "2018-10-08"
  revised: "2018-10-08"
  text: |
    Tomasello argues that human language and communication arise from a uniquely human capacity for shared intentionality, for understanding that another being has goals and beliefs distinct from one's own, and for using that understanding to communicate rather than merely to signal. The comparative developmental psychology is the book's strongest material: the experiments distinguishing what human infants can do from what great apes can do, and locating the divergence in the capacity for joint attention, are carefully constructed and the conclusions well-supported.

    What I found less convincing was the theoretical architecture erected on this foundation. The jump from shared intentionality to the full complexity of human linguistic convention involves several moves that Tomasello makes quickly and that I was not always persuaded were warranted. The insight is real: human communication's distinctive feature lies in mutuality of understanding, the fact that both parties know what both parties intend, more than in complexity of signal. The book reads like a specialist monograph partially adapted for a wider audience without completing the transformation; the evidence sections are rigorous, but the broader claims accumulate more smoothly than the evidence supports.

- title: "Sapiens"
  title_en: "קיצור תולדות האנושות"
  title_en_lang: "he"
  type: "book"
  creator: "Yuval Noah Harari, trans. 林俊宏 (CN: 《人类简史》)"
  creator_role: "by"
  year: 2011
  eval: "hated"
  image: "/assets/images/thoughts/books/sapiens.jpg"
  posted: "2018-08-15"
  revised: "2018-08-15"
  text: |
    ***Sapiens*** gets worse the more one knows. Harari's claim that large-scale human cooperation depends on shared imagined orders is useful for about ten pages. Money, nations, corporations, and legal systems do rely on collective belief. Then the book starts treating the observation as a master key, and the damage begins. Myth, institution, ideology, material constraint, and coercive state power keep being flattened into the same explanatory surface, as though naming something a fiction were the same as explaining how it works.

    Coming after Bakewell's patient intellectual history, the contrast was clarifying: she made ideas live in specific rooms and bodies; Harari turns specificity into fuel for a universal mechanism. The Cognitive Revolution becomes a switch, the Agricultural Revolution becomes a fraud, and modern history becomes a sequence of elegant reversals. 'Wheat domesticated us' is brilliant popular writing and weak historical explanation: it names a reversal, then lets the reversal do work that evidence should do. The book is full of this trick. A sentence arrives, the reader feels the click of recognition, and the actual historical argument quietly disappears.

    Big history can be rigorous. This is TED-talk metaphysics with footnotes. The prose makes one feel as though complexity has been mastered when it has mostly been compressed. The book is confident, seductive, and careless exactly where it most needs discipline. I do not forgive books that teach people to mistake shortcuts for synthesis.

- title: "At the Existentialist Café"
  title_en: "存在主义咖啡馆"
  type: "book"
  creator: "Sarah Bakewell, trans. 沈敏一 (CN)"
  creator_role: "by"
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/books/at-the-existentialist-cafe.jpg"
  posted: "2018-07-10"
  revised: "2018-07-10"
  text: |
    ***At the Existentialist Café*** has the right origin story: Sartre, Beauvoir, and Raymond Aron in the Bec-de-Gaz bar in 1933, with Aron pointing to an apricot cocktail and telling Sartre that phenomenology could make philosophy out of that glass. Bakewell understands why the anecdote matters. Existentialism, in her account, learns to think from rooms, bodies, and pressure: the drink on the table, the waiter, the political choices that follow one out of the café and into history.

    I read the Chinese edition in Xiaoshu Guan in Hangzhou during a summer trip back from university. I had gone there for Tadao Ando's building rather than for the shelves; as far as I remember, the book could not be borrowed out, so I returned the next day and spent two travelling days there finishing it. The circumstance now feels almost comically appropriate. Bakewell's whole method is to return abstractions to their settings, making phenomenology less an academic vocabulary than a discipline of attention.

    The book gave me my first sustained encounter with phenomenology as a practice rather than a theory. Husserl's injunction to go back to the things themselves, to describe experience as it actually presents itself rather than as theory predicts it will, is rendered here as an intellectual revolution with consequences in literature, psychology, and politics. Bakewell moves from Sartre and Beauvoir's cafés to Heidegger's forest paths, from Merleau-Ponty's body to the political compromises and betrayals of the twentieth century, without letting the ideas float free of the people who carried them. The portrait of Beauvoir is the book's most valuable contribution: examined without either the hagiography of the devoted partner or the condescension of the feminist critique, she emerges as a philosopher in her own right whose existentialist inheritance shaped her feminism in ways that are still worth arguing about. I left Xiaoshu Guan with the sense that philosophy had acquired furniture, weather, and a body.

- title: "Words of a Dwarf"
  title_en: "侏儒の言葉"
  type: "book"
  creator: "Ryunosuke Akutagawa (CN: 《侏儒的话》)"
  creator_role: "by"
  year: 1927
  eval: "liked"
  image: "/assets/images/thoughts/books/words-of-a-dwarf.jpg"
  posted: "2018-06-28"
  revised: "2018-06-28"
  text: |
    ***Words of a Dwarf*** is a large collection of aphorisms, some of them a single sentence, some extending to a paragraph. Akutagawa presents them in the preface not as a stable system of thought but as glimpses of his thought changing over time, and they read exactly that way: the residue of an extremely intelligent and often exhausted mind, witty, self-mocking, occasionally brilliant, and frequently despairing. The title announces the author's own assessment of his enterprise; he is the dwarf, and these are his words, and the diminutive is a defence as much as a modesty.

    The best aphorisms are precise to the point of cruelty, and Akutagawa directs the cruelty primarily at himself and at the category of 'artist.' His relationship to his own creativity was tormented: he wrote compulsively, felt the compulsion as a pathology, and observed it with the same analytic detachment that he brought to his fiction.

    Three aphoristic turns crystallise the book's temper: morality reduced to convenience, nature loved because it does not envy or deceive, and mysticism recast as something that civilisation advances rather than abolishes. They suggest a writer whose scepticism had become too sharp to leave anything intact, least of all himself.

- title: "Kappa"
  title_en: "河童"
  type: "book"
  creator: "Ryunosuke Akutagawa (CN: 《河童》)"
  creator_role: "by"
  year: 1927
  eval: "loved"
  image: "/assets/images/thoughts/books/kappa.jpg"
  posted: "2018-06-20"
  revised: "2018-06-20"
  text: |
    ***Kappa*** takes Akutagawa's moral compression and gives it a whole society to inhabit. The frame is already unstable: Patient No. 23, confined in a mental hospital, recounts his time in the country of the kappa, and the more precise his report becomes, the less secure the boundary between hallucination and diagnosis feels. The country begins as a grotesque mirror of Japan, then hardens into an industrial civilisation whose absurdities expose human arrangements by making them administratively literal. Fathers ask unborn children whether they wish to enter the world; one child declines, citing heredity and the badness of kappa existence. Workers displaced by machinery are killed under the Worker Slaughter Law and turned into food. Books are manufactured by feeding paper, ink, and powdered donkey brain into a machine.

    Coming after the short stories, the expansion is startling. Akutagawa usually reveals a moral system through one decision; here he builds the system first and lets every institution disclose its own insanity: family, labour, censorship, religion, artistic celebrity, sexual pursuit, intellectual fashion. The jokes are often very funny, but they are funny in the way that a trap closing can be funny. Geel can explain worker meat as efficiency without raising his voice. The factory can mass-produce books, paintings, and music as though culture were merely another industrial output. The Church of Life can preach 'live vigorously' while Tok, the poet, drifts towards the one answer that doctrine cannot metabolise.

    Tok's suicide burns through the satire's own form. The gunshot interrupts Mag's anecdote about a kappa who dies after being told he might be a frog; afterwards, even death is immediately turned into interpretation, plagiarism, loneliness, pathology. Published in 1927, the year that Akutagawa killed himself, the scene feels impossible to keep at aesthetic distance. The horror of ***Kappa*** is that the insane patient may be the only one describing society with any accuracy. By the end, when he wants to return to Kappa-land rather than merely visit it again, the joke has become unbearable.

- title: "Rashomon"
  title_en: "羅生門"
  type: "book"
  creator: "Ryunosuke Akutagawa, trans. 林少华 (CN: 《罗生门》)"
  creator_role: "by"
  year: 1915
  eval: "loved"
  image: "/assets/images/thoughts/books/rashomon.jpg"
  posted: "2018-06-10"
  revised: "2018-06-10"
  text: |
    Akutagawa wrote in the range of a few hundred to a few thousand words, and within that constraint he achieved a density of psychological and moral observation that longer works can rarely sustain. The stories in ***Rashomon and Other Stories*** are varied in subject but unified in disposition: a precise, often ironic, sometimes blackly comic attention to the moment when human beings make the choice that reveals what they actually are.

    The title story, in which a servant sheltering at the Rashomon gate watches a woman stealing hair from corpses and then robs her of her clothes, uses its shock economy with perfect control: the logic of each decision follows from the previous one, producing an effect both morally horrifying and psychologically exact. "In a Grove," the most famous, gives seven separate accounts of a samurai's death and achieves its effect not by revealing the truth but by demonstrating that the truth has been made irrecoverable by the self-interest of everyone who might provide it.

    Akutagawa's formal precision, his refusal to pad, his trust in the reader's intelligence to follow implications that are never stated, produces in a few pages what most novels spend hundreds of pages working towards. I read the collection in an afternoon and thought about it for weeks.

- title: "The Wall"
  title_en: "Le Mur"
  type: "book"
  creator: "Jean-Paul Sartre, trans. 桂裕芳 (CN: 《墙》)"
  creator_role: "by"
  year: 1939
  eval: "loved"
  image: "/assets/images/thoughts/books/wall.jpg"
  posted: "2018-05-20"
  revised: "2018-05-20"
  text: |
    ***The Wall*** is Sartre's existentialism at the moment before it hardens into a public vocabulary. The five stories still carry the roughness of ideas being discovered in fiction rather than applied to it, which is why they feel more alive to me than a cleaner philosophical demonstration would. The title story is almost perfectly built: three condemned prisoners, one night before execution, and a body discovering in advance that it has already been exiled from itself. Fear is not described as an emotion but as a material rearrangement of the body: sweat, chill, bowels, skin, the absurd persistence of physical detail when the future has narrowed to a wall.

    The brilliance of "The Wall" is that its ending does not simply illustrate absurdity; it makes absurdity operational. Pablo's joke becomes true after truth and intention slip out of alignment, without the universe needing anything as comforting as moral design. Elsewhere, the collection is less flawless but still electric. "Erostratus" turns hatred of humanity into a ridiculous performance of self-importance; "Intimacy" is crueler and subtler, watching a woman discover that the freedom she narrates for herself is not the same thing as freedom that she can inhabit.

    The stories are strongest when the existentialist thesis and the dramatic situation become indistinguishable: not philosophy inside fiction, but fiction as the place where philosophy first feels physically dangerous.

- title: "Descartes' Error"
  type: "book"
  creator: "Antonio Damasio"
  creator_role: "by"
  year: 1994
  eval: "meh..."
  image: "/assets/images/thoughts/books/descartes-error.jpg"
  posted: "2018-05-15"
  revised: "2018-05-15"
  text: |
    The clinical cases are ***Descartes' Error*** at its best. Elliott, the patient who retained full intellectual function after a frontal tumour removal but could no longer make any decision worth making, is one of the most unsettling figures in modern neuroscience writing; Phineas Gage, the nineteenth-century railway worker who survived a tamping iron through his skull but not the personality that he had before it, is reinterpreted through lesion reconstruction to similar effect. These cases almost make Damasio's argument by themselves: emotional feedback is not noise contaminating rational deliberation but integral to it, and Cartesian mind-body dualism is not just philosophically questionable but neurologically false.

    The somatic marker hypothesis, the formal claim about how bodily states guide reasoning, is less satisfying. Damasio equivocates between the claim that emotional feedback matters for all reasoning and the narrower, more defensible claim that it matters specifically for social and personal decisions; the clinical evidence supports the latter, not necessarily the former. The mechanistic account of what a somatic marker actually is and how it is computationally instantiated remains gestural. The theoretical chapters repeat and elaborate without sharpening. The cases do the argument's work; the argument cannot quite return the favour.

- title: "We"
  title_en: "Мы"
  type: "book"
  creator: "Yevgeny Zamyatin, trans. 陈超 (CN: 《我们》)"
  creator_role: "by"
  year: 1924
  eval: "liked"
  image: "/assets/images/thoughts/books/we.jpg"
  posted: "2018-05-10"
  revised: "2018-05-10"
  text: |
    ***We*** is the novel Orwell read and reviewed before writing *Nineteen Eighty-Four*, and it deserves better than being known only as a precursor. D-503, a spacecraft engineer in the totalitarian One State, begins keeping a diary because the government requires it; what he records instead is his falling in love with I-330, a woman connected to an underground resistance movement. Citizens live in glass apartments, have sex by permit, and treat imagination as a disease.

    The dystopian machinery is familiar because it was original when Zamyatin invented it. The surveillance, the performative uniformity, the controlled language: these devices have accumulated context through their more famous successors, and reading the source now requires an effort to read through the accumulated borrowings. What feels freshest is the narrator's voice: D-503 is not a heroic rebel but a genuine true believer whose consciousness is cracked open against his will, and his record of that cracking is more psychologically exact than most of the genre.

    The ending is ambiguous where *1984*'s is not, and I prefer the ambiguity: whether D-503 has been repaired and I-330's resistance crushed, or whether he has merely reassembled the self that was broken, is a question that Zamyatin leaves open because the One State leaves nothing unresolvable.

- title: "Heart of Darkness"
  type: "book"
  creator: "Joseph Conrad"
  creator_role: "by"
  year: 1899
  eval: "loved"
  image: "/assets/images/thoughts/books/heart-of-darkness.jpg"
  posted: "2018-04-08"
  revised: "2018-04-08"
  text: |
    Marlow's journey up the Congo River is framed as an anecdote told aboard a yawl anchored in the Thames estuary, and the choice of frame is doing everything. The Thames is also a river of darkness, Marlow remarks, recalling the Roman legionaries who brought civilisation to Britain the way that Leopold II's agents bring it to the Congo, and the point is made with the quiet devastation of someone who has worked out exactly what to say and refuses to make it easier than it is.

    ***Heart of Darkness*** is not a comfortable book, and the discomfort is not confined to the horror it describes. The prose is dense, recursive, resistant, Marlow's voice looping back over its own hesitations in a way that makes linear comprehension difficult. The technique is the argument: this is what it is like to try to report back on something that Western civilisation cannot acknowledge about itself without dismantling the language in which it speaks. Kurtz's famous last words, 'the horror, the horror,' are not description but diagnosis, the only honest thing that a European consciousness can say when it has seen clearly what it has been doing.

    I read it before watching *Apocalypse Now*, and the reversal of the usual order was instructive: the novella's Congo is not Vietnam, but the structure of the imperial project, the extraction of resources and the destruction of people under the rhetoric of civilisation, is the same structure. Coppola understood this.

    The image of Marlow at the end, having decided not to tell Kurtz's fiancée the truth, is the most precise description of complicity that I have encountered in any text: the decision not to disturb someone's sustaining illusions because their sustaining illusions are also yours.

- title: "The Other Brain"
  type: "book"
  creator: "R. Douglas Fields"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/other-brain.jpg"
  posted: "2018-03-20"
  revised: "2018-03-20"
  text: |
    The brain sciences, as popularly presented, are largely the sciences of neurons. ***The Other Brain*** argues for a corrective: glia, the non-neuronal cells long treated as mere support tissue, are implicated in learning, memory, disease, and possibly consciousness in ways that had been systematically overlooked. Fields spent his career studying glia and writes the book partly as scientific history, partly as a polemic against neuron-centrism.

    The strongest sections address specific mechanisms: the role of astrocytes in modulating synaptic transmission, and the way that myelin-producing oligodendrocytes regulate the timing of neural signals and their implications for psychiatric disease. Fields writes for a general audience with reasonable clarity, though the density of terminology accumulates.

    The book's polemical energy is also its weakness: the case that glia have been ignored is made so insistently that the equally important caveat, that neurons remain central and the glial revolution is still largely prospective, gets somewhat lost. Read with that caution, it is a useful expansion of the standard model.

- title: "On the Origin of Species"
  type: "book"
  creator: "Charles Darwin"
  creator_role: "by"
  year: 1859
  eval: "loved"
  image: "/assets/images/thoughts/books/on-the-origin-of-species.jpg"
  posted: "2018-03-08"
  revised: "2018-03-08"
  text: |
    Reading ***On the Origin of Species*** as a biology student who had been taught evolution as settled fact was like hearing the argument for something that I thought I already knew and discovering that I had not understood it at all. Darwin proceeds with Victorian thoroughness, accumulating domestic pigeons, barnacles, coral reefs, and the distribution of finches across islands until the evidence has weight and the theory has the feel of inevitability. The argument is not presented as a sudden illumination but as a long patient pressure, and the prose has the same quality: unhurried, exact, and relentlessly cumulative.

    What I had not expected was how much of the argument turns on difficulty rather than simplicity. Darwin spends entire chapters on problems with his theory: how does a complex structure like the eye arise? How do sterile worker castes in insects evolve? He addresses these not by dismissing them but by working through them with the same analytical care as the supporting evidence, and the intellectual honesty of these passages makes the book convincing. The reader watches a mind that has honestly grappled with every objection and not been dissuaded.

    The chapter on the imperfection of the geological record struck me most: Darwin acknowledges that the fossil evidence available in 1859 is inadequate to his theory, then argues that this is what we should expect given the conditions of fossilisation, and turns an apparent weakness into a prediction. A hundred and fifty years later, the prediction has largely held.

    The book is beautiful in the way that comprehensive arguments are beautiful when the comprehension has been honestly earned rather than imposed, when the theory has been made to do genuine work rather than just to explain what the theorist already believed.

- title: "Thus Spoke Zarathustra"
  title_en: "Also sprach Zarathustra"
  type: "book"
  creator: "Friedrich Nietzsche, trans. 钱春绮 (CN: 《查拉图斯特拉如是说》)"
  creator_role: "by"
  year: 1883
  eval: "hated"
  image: "/assets/images/thoughts/books/thus-spoke-zarathustra.jpg"
  posted: "2018-02-20"
  revised: "2018-02-20"
  text: |
    ***Thus Spoke Zarathustra*** is structured like a sequence of revelations, but the revelations rarely survive the tone in which they arrive. Zarathustra descends from his mountain, speaks, withdraws, returns, sings, meets animals and disciples and higher men; each episode creates another platform for pronouncement. The Übermensch and eternal recurrence arrive surrounded by rhythm, metaphor, and posture, yet the book keeps asking for awe before it has earned assent. After a while the ego of the performance was all that I could hear.

    The sharp passages on ressentiment, herd morality, and self-deception do exist, and they explain why people keep extracting individual lines from the book. But the surrounding voice smothers them. The work wants aphorism, scripture, poem, philosophical novel, and sermon all at once, and the mixture brings out the worst kind of authorial self-regard: the sense that sounding elevated has become a substitute for thinking through the claim. The book mistakes height for force and becomes exhausting: a long performance of profundity that keeps admiring its own mountain.

- title: "The Unbearable Lightness of Being"
  title_en: "Nesnesitelná lehkost bytí"
  type: "book"
  creator: "Milan Kundera, trans. 许钧 (CN: 《不能承受的生命之轻》)"
  creator_role: "by"
  year: 1984
  eval: "loved"
  image: "/assets/images/thoughts/books/unbearable-lightness-of-being.jpg"
  posted: "2018-01-20"
  revised: "2018-01-20"
  text: |
    The title poses a question that the novel never quite stops asking: if there is no eternal recurrence, if everything happens only once and therefore as good as never happened, does that make life unbearably light or unbearably meaningless? Tomas, the Prague surgeon and serial philanderer, believes in lightness; Tereza, the woman that he cannot stop himself from marrying, believes in heaviness, in the irreversibility of choices and the moral weight of love. They answer the fundamental question differently, and ***The Unbearable Lightness of Being*** is about what happens when one loves someone who does that.

    The novel is also political, set against the Prague Spring of 1968 and the Soviet invasion that followed. Tomas's surgical career is destroyed because he publishes an essay drawing an analogy between Czech collaborators and Oedipus, intending a philosophical argument, and the regime takes it as a political accusation. The way that power flattens the nuances of private discourse into a single readable surface is something that Kundera understands from the inside.

    Sabina, the artist who betrays and moves on, who has no programme beyond the refusal of kitsch, is the novel's moral posture, and it is not enough; the novel knows that it is not enough. The novel ends not with Tomas and Tereza arguing but with them in the countryside, briefly happy before their deaths, after the dog who bound their domestic life has gone. It is the most human thing that Kundera ever wrote, and the most forgiving.

- title: "The Joke"
  title_en: "Žert"
  type: "book"
  creator: "Milan Kundera, trans. 蔡若明 (CN: 《玩笑》)"
  creator_role: "by"
  year: 1967
  eval: "loved"
  image: "/assets/images/thoughts/books/joke.jpg"
  posted: "2018-01-15"
  revised: "2018-01-15"
  text: |
    ***The Joke*** was Kundera's first novel and still feels like one of his best, which is part of why reading it early made the rest of his work arrive with such force. Ludvik writes a postcard to a girl that he wants to impress: "Optimism is the opium of the people! A healthy atmosphere stinks of stupidity! Long live Trotsky!" He is denounced, expelled from the party and the university, and sent to work in the mines with other political undesirables. The joke costs him everything.

    Fifteen years later, he returns. He has identified the man responsible for his condemnation and arranged, through careful seduction, to sleep with his wife as an act of revenge. The seduction succeeds. The revenge is a complete failure: the marriage has already dissolved on its own terms, the wife turns out to welcome the encounter for reasons that have nothing to do with Ludvik, and the man that he wanted to wound is past caring about any of it. History has quietly rendered his fifteen-year project of retribution incoherent.

    The title's joke keeps widening beyond the postcard: Ludvik assumes that private grievance can be preserved intact, that revenge can make time answerable, that the score can still be settled after history has moved on. It does not work. The final image, of a folk music festival in Ludvik's home town proceeding with perfect sincerity as his life collapses around it, is one of Kundera's most devastating acts of compression.

- title: "Immortality"
  title_en: "Nesmrtelnost"
  type: "book"
  creator: "Milan Kundera, trans. 王振孙 & 郑克鲁 (CN: 《不朽》)"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/immortality.jpg"
  posted: "2018-01-10"
  revised: "2018-01-10"
  text: |
    ***Immortality*** is Kundera's longest and most formally ambitious novel, and the one in which the line between fiction and essay most completely dissolves. The novel begins with a woman in her sixties at a swimming pool, making a graceful girlish gesture as she waves goodbye to her instructor; Kundera decides to write a novel about her and names her Agnes. Agnes's story runs alongside meditations on Goethe and Bettina von Arnim, who represents the obsessive fan's desire to possess a great man's image, and alongside a direct appearance by Kundera himself in conversation with a character called Professor Avenarius.

    The novel's great subject is the desire to leave a trace, to be remembered, to secure some permanent version of oneself against the forgetting that awaits everyone. Goethe curated his own image deliberately and well; Bettina constructed a Goethe for herself regardless of what he actually was. Both strategies fail, for different reasons. Agnes, who wants only to disappear into silence, carries the novel's moral intelligence but is also its most passive figure.

    The gesture at the opening, a sixty-year-old woman's momentary girlishness, returns at the end as the purest form of what the novel has been about: a fragment of behaviour that is entirely personal, entirely inexplicable, entirely itself, and therefore the closest thing to genuine immortality that anyone achieves.

- title: "Life is Elsewhere"
  title_en: "Život je jinde"
  type: "book"
  creator: "Milan Kundera, trans. 袁筱一 (CN: 《生活在别处》)"
  creator_role: "by"
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/books/life-is-elsewhere.jpg"
  posted: "2018-01-06"
  revised: "2018-01-06"
  text: |
    The title comes from Rimbaud, and the irony is structural. Jaromil, the poet-protagonist of ***Life is Elsewhere***, is a young man of genuine lyric gift who is also a narcissist, a mommy's boy, and a petty informer. He denounces his girlfriend's brother to the secret police and regards his own suffering as more important than the actual suffering that it causes. Kundera traces his formation with a remorselessness that is also a kind of pity: Jaromil did not invent himself; his mother invented him, and the revolution found him convenient.

    The satire of Romantic aesthetics is precise. Kundera knows the tradition from inside, and his portrait of the young poet who confuses intensity of feeling with artistic virtue, who believes that the purity of his suffering makes him a better writer, and who is talented and dangerous in the same motion, is one of literature's most devastating self-critiques of a cultural type.

    The scene in which Jaromil's revolutionary enthusiasm has led him to a very bad place, and he dies young enough not to have to live with what he has become, is both tragedy and mercy: the novel withholds from him the reckoning that would have been more honest and more damning. Kundera gives Jaromil the Romantic's death, young and passionate and incomplete, and in doing so completes the indictment.

- title: "Slowness"
  title_en: "La lenteur"
  type: "book"
  creator: "Milan Kundera, trans. 马振骋 (CN: 《慢》)"
  creator_role: "by"
  year: 1995
  eval: "liked"
  image: "/assets/images/thoughts/books/slowness.jpg"
  posted: "2017-12-12"
  revised: "2017-12-12"
  text: |
    ***Slowness*** reads like a compact late-Kundera diagram beside the larger machinery of ***The Joke*** and ***The Unbearable Lightness of Being***. Two stories run in parallel across a single French night: an episode from a libertine's memoirs set in the eighteenth century, in which pleasure is measured in the time taken to reach it; and a contemporary academic conference at the same chateau, in which no one remembers anything and everyone performs. The argument is stated almost baldly: speed is the form that forgetting takes, and the world moves fast in order not to have to remember. The libertine's amour, conducted with ceremony and slowness, is also a form of memory; the modern conference, organised around forgetting, produces only spectacle.

    The novel is too schematic for its length, a diagram rather than a fiction, but the diagnosis is sharp. The scene in which a conference participant gets on a motorcycle and drives very fast so that the embarrassing moment that everyone witnessed will be forgotten has the quality of a cartoon that is also exact. A primer for what follows.

- title: "A Wild Sheep Chase"
  title_en: "羊をめぐる冒険"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《寻羊冒险记》)"
  creator_role: "by"
  year: 1982
  eval: "loved"
  image: "/assets/images/thoughts/books/a-wild-sheep-chase.jpg"
  posted: "2017-11-20"
  revised: "2017-11-20"
  text: |
    I read this in my first year of university, having already encountered the Sheep Man and the Dolphin Hotel in *Dance Dance Dance* without knowing their origin. That backwards reading turned out to fit Murakami uncannily well. The Sheep Man's first appearance arrived as recognition rather than revelation, and the Dolphin Hotel's original form already carried the sadness of what it would become. ***A Wild Sheep Chase*** is built for that kind of belatedness: everyone seems to have entered the story after the decisive event has already happened elsewhere.

    The hardboiled outline is almost absurdly clean: a divorced advertising copywriter uses a photograph from the Rat in a campaign, the Boss's secretary notices a sheep with a star-shaped mark, and the narrator is sent north with a woman whose ears seem to possess their own metaphysical agency. The clues lead through Sapporo, the Dolphin Hotel, the Sheep Professor, a Hokkaido mountain road, then finally to the Rat's empty house. Yet the form keeps draining agency from the detective plot. The narrator follows instructions, waits, cooks, reads, runs, runs out of cigarettes, meets the Sheep Man, and slowly learns that the search was never arranged for his enlightenment.

    The sheep's path through the Sheep Professor, the Boss, and the Rat gives the novel a strange political charge: power as possession, a force that enters bodies and leaves institutions behind. Murakami sketches that allegory lightly, trusting the absurdity to carry the politics. The book's real force gathers in the Rat's absence. By the time the narrator speaks with him in the dark, Rat has already hanged himself to kill the sheep inside him, turning disappearance into the only remaining act of resistance. The ending carries the particular ache of early Murakami: a friend already lost, a mystery solved too late to matter, and J's bar left with money for the dead to keep drinking.

- title: "Other Minds"
  type: "book"
  creator: "Peter Godfrey-Smith"
  creator_role: "by"
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/books/other-minds.jpg"
  posted: "2017-11-15"
  revised: "2017-11-15"
  text: |
    Godfrey-Smith is a philosopher of biology and also a scuba diver, and ***Other Minds*** keeps both forms of attention active at once. The book uses cephalopods, especially octopuses, to ask how minds can arise along evolutionary paths almost completely separate from our own. Octopuses and vertebrates share a common ancestor so distant that their nervous systems feel like different answers to the same ancient problem: how a body senses, acts, remembers, and holds a world together.

    The underwater scenes give the philosophy its pressure. Godfrey-Smith watches octopuses in their rocky dens, their arms investigating the world with a semi-independent intelligence, their skin shifting colour and texture as if the boundary between perception and expression had loosened. From there the book moves outward: the Cambrian, nervous systems, animal bodies, the evolutionary usefulness of experience. It never pretends that the hard problem has been solved. The restraint matters. Godfrey-Smith lets uncertainty stay open while still making the question feel materially sharper.

    I loved it because it shifted consciousness from sealed human interior to evolutionary event with multiple possible architectures. The octopus becomes a companion mind from another branch of life: close enough to meet one's gaze, distant enough to expose how provincial our usual theories of mind can be.

- title: "Advice for a Young Investigator"
  title_en: "Reglas y consejos sobre investigación científica"
  type: "book"
  creator: "Santiago Ramón y Cajal, trans. Neely Swanson & Larry W. Swanson (EN)"
  creator_role: "by"
  year: 1897
  eval: "loved"
  image: "/assets/images/thoughts/books/advice-for-a-young-investigator.jpg"
  posted: "2017-10-08"
  revised: "2017-10-08"
  text: |
    Cajal wrote this short book for young scientists, and it reads like advice from a grandfather who has learned everything the hard way and wants to spare beginners the wasted time. The chapters cover topics that no one teaches: the temperament required for scientific work, the danger of premature publication, the importance of choosing a problem that is neither too large nor too small, the specific psychological traps that afflict intelligent people who are not yet disciplined. The tone is bracing rather than gentle: Cajal does not flatter beginners.

    His taxonomy of bad scientific characters, the egotist who publishes before confirming, the polymathic dilettante who never commits, the neurotic perfectionist who revises forever, is observationally sharp and recognisably accurate. His description of how great discoveries are made, not by searching for them but by attention to anomalies that do not fit the current framework, anticipates later philosophy of science. His insistence on the necessity of willpower, of sitting at the bench when one does not feel inspired, is unfashionable and correct.

    The book is a product of its era in ways that require adjustment: Cajal's assumptions about who does science are narrow, and some of the career advice reflects a university environment nothing like the present one. But the psychological core remains intact. I have gone back to it repeatedly.

- title: "Recollections of My Life"
  title_en: "Recuerdos de mi vida"
  type: "book"
  creator: "Santiago Ramón y Cajal, trans. E. Horne Craigie & Juan Cano (EN)"
  creator_role: "by"
  year: 1917
  eval: "loved"
  image: "/assets/images/thoughts/books/recollections-of-my-life.jpg"
  posted: "2017-09-15"
  revised: "2017-09-15"
  text: |
    Cajal won the Nobel Prize in Physiology or Medicine in 1906 for discovering that the nervous system is composed of discrete individual cells rather than a continuous network, but ***Recollections of My Life*** is not a book about that discovery. It is a book about the conditions under which a scientist forms. Cajal's childhood in rural Aragon reads like a picaresque novel: a restless, difficult boy who drew obsessively, was apprenticed to a barber, briefly jailed, and finally directed by a father who understood the energy but not the form towards medicine. The path to the microscope was indirect and private.

    The autobiography's force is the combination of self-knowledge and scientific honesty. Cajal describes his successes and his errors: the years spent on dead-end problems, the experiments that failed, the periods of depression and doubt. He is forensically clear about how he learned to look at things, literally, through a microscope, and the cultivation of that kind of attention is itself a major theme of the book. The observer who established that nerve cells were discrete rather than fused into a continuous net is the same observer who learned as a child to draw what he saw rather than what he expected to see.

    Cajal's determination carries a particular quality: it is not the ambition of someone who expects to be recognised, but the stubbornness of someone who is convinced by his own observations and will not let the absence of agreement stop him.

- title: "The Three-Body Problem Trilogy"
  title_en: "三体"
  type: "book"
  creator: "Liu Cixin (刘慈欣)"
  creator_role: "by"
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/books/three-body-problem-trilogy.jpg"
  posted: "2017-08-10"
  revised: "2017-08-10"
  text: |
    Liu Cixin begins with the Cultural Revolution, the death of an astrophysicist, and a daughter who makes first contact with an alien civilisation in despair of her own species, and then escalates across three volumes to the destruction of the solar system, the weaponisation of dimensions, and the collapse of the universe. The scale of the ***Three-Body Problem*** trilogy is vertiginous in the best sense.

    What distinguishes it from ordinary space opera is the philosophical and scientific seriousness. The dark forest in the second volume is Liu's solution to the Fermi Paradox: the universe is silent because every intelligent civilisation, knowing that others exist and that resources are finite, must choose between destroying first or being destroyed. Detection means death. The logic is inexorable and terrible, and Liu develops it not as a plot device but as a sustained philosophical argument about survival under genuine scarcity.

    The third volume is the most emotionally demanding. Cheng Xin makes two decisions that may doom humanity, and the novel refuses to condemn her for either; the horror is structural, not personal, a universe in which correct moral intuitions and rational survival decisions point in opposite directions. The final sections, in which the universe is revealed to have been weaponised down from eleven dimensions to three, bring the dark forest logic to its ultimate conclusion and produce a sense of scale that very few works of fiction have given me. I read all three in a single summer, barely surfacing.

- title: "The Origin of Consciousness in the Breakdown of the Bicameral Mind"
  type: "book"
  creator: "Julian Jaynes"
  creator_role: "by"
  year: 1976
  eval: "loved"
  image: "/assets/images/thoughts/books/origin-of-consciousness-in-the-breakdown-of-the-bicameral-mind.jpg"
  posted: "2017-02-14"
  revised: "2017-02-14"
  text: |
    ***The Origin of Consciousness in the Breakdown of the Bicameral Mind*** is probably the book that influenced me most deeply during secondary school, before I had any formal training in neuroscience or philosophy of mind, before I had the vocabulary to say why it mattered. Jaynes's thesis is wild and almost certainly wrong in its specifics: that ancient humans lacked subjective *consciousness* as we know it, that the right hemisphere issued commands experienced as the voices of gods, that the *bicameral mind* collapsed under the weight of societal complexity and the invention of writing. The neuroscience does not hold up. The historical evidence, built largely on the contrast between the *Iliad* and the *Odyssey*, reads too much into linguistic absence. Dennett and others have noted that Jaynes defines *consciousness* so narrowly, as metaphor-based introspective narration, that the argument risks circularity.

    None of this diminishes the book's power. What Jaynes understood, and what has aged remarkably well, is the claim that *consciousness* is metaphorical at its base: that we grasp the inner world through spatial and physical metaphors, that 'seeing' a point and 'grasping' an idea are not decorative language but the very architecture of self-awareness. This anticipates Lakoff and Johnson, Damasio's narrative self, and a whole tradition of *embodied cognition* that Jaynes could not have known was coming. The thesis that metaphor gave birth to *consciousness* is the thread I still pull on.

    Coming back to it now, the audacity of the question matters more than the rightness or wrongness of the *bicameral mind*. Jaynes asked how *consciousness* began, not what it is, and in doing so forced everyone who came after him to reckon with the possibility that subjective experience has a history, that it was not always there, that it arrived. I need to re-read it properly someday, with the training I now have. But even the memory of that first reading, the feeling of an entire framework for understanding the mind snapping into focus, has not faded.

- title: "The Sun Also Rises"
  type: "book"
  creator: "Ernest Hemingway"
  creator_role: "by"
  year: 1926
  eval: "loved"
  image: "/assets/images/thoughts/books/sun-also-rises.jpg"
  posted: "2016-10-20"
  revised: "2016-10-20"
  text: |
    Jake Barnes's war wound is the novel's structural principle, not its subject. His impotence is physical, but the entire expatriate world Hemingway builds around him, the endless drinking in Paris, the aimless movement between cafés and countries, is impotent too. ***The Sun Also Rises*** is about people who have been damaged beyond repair trying to live as though they have not been, and the tension between those two states produces the novel's particular kind of agony: everything is said in the gaps between what is actually spoken.

    The Pamplona section catches fire. The bullfighting sequences do something that I did not expect: they establish the only site of genuine value in the entire novel. Pedro Romero's artistry in the ring requires presence, courage, and a willingness to face death without evasion, and against his example, every other character's avoidance and self-deception stands exposed. Brett's affair with Romero amounts to destruction, not seduction; she knows that she will ruin him, he is too young and too pure for her damage, and she sends him away before it is too late. That act of renunciation is the closest thing to heroism that the novel permits, and it comes from the character least expected to produce it.
    The ending is devastating in the way that only Hemingway can be devastating: with economy. 'Oh, Jake, we could have had such a damned good time together.' 'Yes. Isn't it pretty to think so?' Two sentences that contain a whole novel's worth of grief, and neither character raises their voice. This was the first time that I understood that a great novel could be built almost entirely from what it refuses to say.

- title: "Underground"
  title_en: "アンダーグラウンド / 約束された場所で"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《地下》)"
  creator_role: "by"
  year: 1998
  eval: "loved"
  image: "/assets/images/thoughts/books/underground.jpg"
  posted: "2016-10-08"
  revised: "2016-10-08"
  text: |
    ***Underground*** is Murakami at his furthest from his usual territory: no magical realism, no jazz references, no passive male protagonist drifting through encounters. Published in Japanese across two books, the 1997 survivor interviews and the 1998 Aum-member interviews, it is journalism as oral history: a series of interviews about the 1995 sarin gas attack on the Tokyo subway system conducted by Aum Shinrikyo. Murakami talked to dozens of people and asked them to tell him what happened. Then he listened.

    What emerges is not a document about terrorism in the usual sense. The perpetrators are almost absent from the first part; instead, Murakami lets the survivors speak in their own voices, with their own rhythms of memory and retrospection. A morning commute interrupted. The smell that was not quite the smell of anything. The slow understanding that something had gone wrong. Each account is ordinary and devastating in its ordinariness: these are people who boarded trains to go to work, and their ordeal is rendered through the specific texture of their individual days rather than through abstraction.

    The second part interviews Aum members. This is harder reading because many are not shown as monsters. Several are educated, thoughtful, disillusioned with ordinary Japanese society in ways that are familiar from Murakami's fiction. The book forces the question of what creates the conditions in which someone commits mass murder for an ideology, and it refuses to answer simply; its argument, stated in the introduction, is that Japanese society must examine what it offered these people, and what it failed to offer them, if it wants to understand how Aum was possible. On a later reread, it had only grown.

- title: "1Q84"
  type: "book"
  creator: "Haruki Murakami, trans. 施小炜 (CN)"
  creator_role: "by"
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/books/1q84.jpg"
  posted: "2016-09-15"
  revised: "2016-09-15"
  text: |
    A thousand pages of ***1Q84*** felt like being trapped in an elaborate mechanism whose gears turn endlessly without producing anything. The premise is irresistible: Aomame climbs down an emergency staircase on the Tokyo expressway and enters an alternate 1984, where two moons hang in the sky and Little People emerge from the mouths of the dead to build air chrysalises. But Murakami does almost nothing with the apparatus. The Little People are never explained, the air chrysalises are never explained, and the novel's engine turns out to be a love story between two people who held hands once in primary school and have been searching for each other for twenty years. That love story, taken alone, is touching. The problem is that it does not need a thousand pages, a cult, a private investigator, or a metaphysical architecture to work. *1Q84* is the longest and most exhausting argument that I have encountered for the proposition that more is less.

- title: "The Great Gatsby"
  type: "book"
  creator: "F. Scott Fitzgerald"
  creator_role: "by"
  year: 1925
  eval: "meh..."
  image: "/assets/images/thoughts/books/great-gatsby.jpg"
  posted: "2016-08-15"
  revised: "2016-08-15"
  text: |
    ***The Great Gatsby*** is so cleanly constructed that the craft almost conceals its coldness. Nick Carraway narrates with a detachment that shades into complicity; Daisy Buchanan is more symbol than person; Gatsby himself is less a tragic figure than a cautionary illustration of the American myth of self-reinvention. The green light, the eyes of Doctor T. J. Eckleburg, the Valley of Ashes: the symbolism is precise, occasionally heavy-handed.

    What I found harder to enter was the investment. Fitzgerald is forensically good at depicting the emptiness of wealth and the casual cruelty of the very rich, but his novel requires the reader to care about these people, and I found it difficult to do so. Gatsby's love for Daisy feels more like obsession with a projection than genuine feeling, and the novel treats this as tragedy rather than as a study in narcissism.

    The prose is undeniably good: 'So we beat on, boats against the current, borne back ceaselessly into the past' is one of the better last sentences in American fiction. But the book kept me at arm's length.

- title: "Beloved"
  type: "book"
  creator: "Toni Morrison"
  creator_role: "by"
  year: 1987
  eval: "liked"
  image: "/assets/images/thoughts/books/beloved.jpg"
  posted: "2016-08-10"
  revised: "2016-08-10"
  text: |
    124 was spiteful. 124 was loud. 124 was quiet. Morrison structures her novel in three movements, each named by what haunts the house, and ***Beloved*** itself operates like a haunting: circling, returning, refusing to resolve into linear sense. Sethe killed her baby daughter rather than let schoolteacher take her back to Sweet Home, and the novel holds that act without judgement or excuse, letting the reader sit inside the impossible logic of a mother who murders out of love, who cuts her child's throat with a handsaw because slavery is worse than death and she knows this from the inside.

    The narrative is fragmented by design. Events surface in pieces, approached from different angles, accumulating meaning through repetition rather than revelation. Morrison's 'rememory,' the idea that traumatic memories exist as physical things in the world, things that one can bump into even if they are not one's own, is the novel's most powerful formal device: it makes the past remembered and re-encountered, an obstacle that one cannot walk around. The stream-of-consciousness passages in Part Two, where Sethe's, Denver's, and Beloved's voices merge until individual identity dissolves, are unlike anything else in American fiction that I had read at that point.

    The ending unsettles the whole structure: 'This is not a story to pass on.' Morrison writes a story that she then instructs us to forget, and the instruction is itself unforgettable, a final turn of the screw that makes the reader complicit in exactly the erasure that the novel spent three hundred pages resisting. I understood perhaps half of what Morrison was doing. The half that I understood was enough.

- title: "Hard-Boiled Wonderland and the End of the World"
  title_en: "世界の終りとハードボイルド・ワンダーランド"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《世界尽头与冷酷仙境》)"
  creator_role: "by"
  year: 1985
  eval: "liked"
  image: "/assets/images/thoughts/books/hard-boiled-wonderland-and-the-end-of-the-world.jpg"
  posted: "2016-07-20"
  revised: "2016-07-20"
  text: |
    The split narrative is the achievement. Two stories alternate chapter by chapter: a 'Hard-Boiled Wonderland' in which the narrator works as a human data processor for a shadowy organisation called the System, his subconscious weaponised as an encryption device; and the 'End of the World,' a walled town of eerie stillness where a new arrival reads dreams from unicorn skulls in a library, gradually losing his shadow and, with it, his capacity to feel. The two narratives mirror and eventually collapse into each other, and the revelation that the walled town is the narrator's own subconscious gives the book its strongest structural charge.

    The 'End of the World' sections are the reason I still think about it. The town operates on dream logic, where causality is suspended and events have the hushed inevitability of a fairy tale. The Librarian, who may be the same woman across both narratives, reads dreams without understanding them, and her presence has a tenderness that Murakami's female characters do not always achieve. The shadow's slow disappearance, what it costs to surrender one's emotional core in exchange for perfect safety, remains the book's cleanest image.
    The 'Hard-Boiled' chapters are funnier and more recognisably Murakami: sandwiches, whisky, a chubby granddaughter and her eccentric scientist grandfather. They are also thinner, more schematic, more attached to a cyberpunk-noir apparatus that has not aged as well as the walled town. The final choice, between a safe eternity and the dangerous, mortal, feeling world, still gives the novel real weight. I like the book most as an architectural experiment with one extraordinary half and one entertaining but less durable half.

- title: "To Kill a Mockingbird"
  type: "book"
  creator: "Harper Lee"
  creator_role: "by"
  year: 1960
  eval: "meh..."
  image: "/assets/images/thoughts/books/to-kill-a-mockingbird.jpg"
  posted: "2016-07-08"
  revised: "2016-07-08"
  text: |
    ***To Kill a Mockingbird*** arrives with so much accumulated prestige that it is difficult to read it fresh. Scout's narration has a charm that the novel earns, and the childhood sequences, the Radley house, the summer games with Dill, the schoolyard rituals, are well-observed. The trial of Tom Robinson carries the moral weight, and Atticus Finch remains one of literature's more durable portraits of principled legal defence against a racist system.

    The framing is harder to accept. The novel asks us to admire Atticus as a white man who does the right thing in a racist town, and it measures racial injustice almost entirely through what it costs the white characters to witness it. Calpurnia is the most important Black character and she exists mainly to raise white children well. Tom Robinson, the actual victim, is given less interiority than almost anyone else in the book. The moral framework is compassionate but paternalistic, more concerned with Atticus's conscience than with the lives of the people that he is defending, and the novel's enduring reputation as the pre-eminent American novel about racism reflects something about which stories are told by whom and for which audience.
    It is a well-crafted, emotionally legible novel. It is also, now, easier to see what it leaves out.

- title: "South of the Border, West of the Sun"
  title_en: "国境の南、太陽の西"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《国境以南太阳以西》)"
  creator_role: "by"
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/books/south-of-the-border-west-of-the-sun.jpg"
  posted: "2016-07-05"
  revised: "2016-07-05"
  text: |
    Murakami stripped down to the bone. Hajime has everything that a person is supposed to want: a good marriage, a successful business, two healthy children. When Shimamoto reappears after decades, his contentment becomes irrelevant. ***South of the Border, West of the Sun*** hinges on the rupture between the life one has and the life one might have had, and Murakami traces it with the spare, almost merciless economy of a short story stretched to novella length.

    The title maps the emotional terrain: 'South of the Border' references the Nat King Cole record Hajime and Shimamoto listened to as children, evoking romantic possibility and the warmth of shared memory; 'West of the Sun' points somewhere colder, a Siberian delirium in which farmers walk towards the horizon and freeze to death, mistaking exhaustion for purpose. Shimamoto may be real or may not. The envelope that she leaves contains only sand.

    But the subplot that cuts deepest is Izumi. Hajime's casual cruelty in high school, sleeping with her cousin out of sheer boredom and barely registering the damage, echoes forward in ways that he cannot undo, and seeing what his thoughtlessness did to her is worse than anything that Shimamoto's disappearance could inflict. The novel refuses resolution, and the refusal is the point.

- title: "The Giver"
  type: "book"
  creator: "Lois Lowry"
  creator_role: "by"
  year: 1993
  eval: "meh..."
  image: "/assets/images/thoughts/books/giver.jpg"
  posted: "2016-06-25"
  revised: "2016-06-25"
  text: |
    ***The Giver*** is strongest as a first dystopia: clean premise, controlled revelation, moral machinery simple enough to be legible without becoming stupid. Jonas lives in the Community, a society that has eliminated war, pain, inequality, and choice; everything is assigned, from careers to family units to the time of one's death. As Receiver of Memory, he inherits the suppressed history of the world before Sameness, every colour and mountain and snowfall and cruelty that the Community traded away for peace and order.

    The book's strength is also its limit. Lowry is very good at rendering ethical horror as administrative calm, and Jonas's first experience of colour, the red apple turning red in mid-air, remains a beautifully economical image of impoverished safety. But the world is so neatly arranged around its thesis that the novel often feels like a moral demonstration rather than a living society. Memory means depth; choice means pain; safety means flattening. The relationship between Jonas and the Giver gives the book warmth, but the structure keeps announcing what each symbol is for.

    As an initiation into dystopian thinking, it is elegant; as a novel, it feels too clean, too pedagogical, too eager for every piece of the world to know its job.

- title: "Gender Trouble"
  type: "book"
  creator: "Judith Butler"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/gender-trouble.jpg"
  posted: "2016-06-20"
  revised: "2016-06-20"
  text: |
    The first gender-studies book I read, and the one that cracked open a way of thinking that I did not know existed. Butler's claim, that gender is performative, not expressive of an interior identity, a repeated set of stylised acts that produce the illusion of a stable gendered self, was electrifying on first encounter. ***Gender Trouble*** is not easy reading. Butler's prose is dense, recursive, and assumes familiarity with Foucault, Lacan, and Beauvoir that I did not have. I understood perhaps sixty per cent on the first pass and returned to it twice.

    What I grasped, and what has stayed, is the demolition of the sex/gender distinction: Butler's argument that even 'biological sex' is itself a category whose boundaries are drawn by the same cultural forces that produce gender. This was the intellectual move that changed how I thought about identity, not as something discovered but as something constructed, and the construction is never finished, never stable, always open to subversion. The drag analysis in the final chapters, where Butler argues that drag does not imitate a prior original but exposes the fact that all gender is imitation without an original, is the book's most famous passage and its most vivid. I did not follow every argument. I did not need to. The underlying logic, that the 'natural' is always effect rather than origin, produced by repetition until the seams are invisible, had been arriving through a very different idiom for weeks. The framework was enough.

- title: "The Giants"
  title_en: "Les Géants"
  type: "book"
  creator: "J.M.G. Le Clézio, trans. 赵英晖 & 许钧 (CN: 《巨人》)"
  creator_role: "by"
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/books/giants.jpg"
  posted: "2016-06-18"
  revised: "2016-06-18"
  text: |
    ***The Giants*** is the logical terminus of Le Clézio's experimental period, and it reads like a final, furious statement before the long exhale of *Desert* (1980). Hyperpolis, the colossal shopping centre that is the novel's setting and antagonist, is consumer capitalism rendered as architecture: a space so vast, so saturated with commodities, signage, and artificial light that it ceases to be a place and becomes a condition. One does not enter Hyperpolis; one is absorbed by it. The prose catalogues merchandise with a relentlessness that borders on vertigo, and the typographic experiments of *War* (1970) are pushed further here: pages filled with advertising slogans, brand names, numerical sequences, the textual detritus of a civilisation that communicates exclusively through commerce.

    If *War* diagnoses the war, *The Giants* names the general. The 'giants' of the title are not people but systems: the corporate structures, the advertising machines, the distribution networks that have replaced human contact with transaction. Le Clézio achieves something rare here: a novel that makes one feel the oppressiveness of abundance, the specific violence of having too much rather than too little.
    Reading *The Giants* last among the early novels felt right. The trajectory from *The Book of Flights* (1969) through *War* to this book describes a tightening spiral: from global flight, to urban warfare, to the belly of the machine itself. Around these years, Le Clézio was already turning towards Panama and Mexico, towards indigenous communities and a completely different kind of book. I understand now why that turn had to happen. One cannot keep writing from inside Hyperpolis without losing one's mind. Something had to give, and what gave was the entire project.

- title: "The Autumn of the Patriarch"
  title_en: "El otoño del patriarca"
  type: "book"
  creator: "Gabriel García Márquez, trans. 轩乐 (CN: 《族长的秋天》)"
  creator_role: "by"
  year: 1975
  eval: "loved"
  image: "/assets/images/thoughts/books/autumn-of-the-patriarch.jpg"
  posted: "2016-06-12"
  revised: "2016-06-12"
  text: |
    ***The Autumn of the Patriarch*** is the most demanding of the Márquez novels that I read that summer, and the most formally extreme. A dictator, the Patriarch, has ruled a nameless Caribbean nation for somewhere between one hundred and two hundred years; the novel opens with his death and circles outward from that event through a series of long, winding sentences that can extend for pages without a full stop. The prose is deliberately disorienting: narrators shift mid-sentence, time collapses, events are described, contradicted, revised, and the reader is positioned inside a collective memory that has been so thoroughly corrupted by power that the truth is irretrievable.

    The formal difficulty is not obscurantism. It is the argument. A dictatorship that has lasted long enough destroys its subjects and the possibility of clear testimony; what remains is not history but rumour, fear, and myth. The Patriarch himself is less a character than a gravitational field, pulling everything around him into distortion. He is vain, ignorant, superstitious, capable of extraordinary cruelty and occasional tenderness, and the novel refuses to reduce him to a single mode. Márquez seems to be working through a question: how does a man come to embody an entire system of oppression, and what does that system do to the man in return?

    The loneliness is almost absolute: a man who has wielded absolute power for a century dies surrounded by no one who knew him, in a palace overrun by cows, and his death changes almost nothing, because the structures that he embodied have long since outlived any individual who inhabits them.

- title: "No One Writes to the Colonel"
  title_en: "El coronel no tiene quien le escriba"
  type: "book"
  creator: "Gabriel García Márquez, trans. 陶玉平 (CN: 《没有人给他写信的上校》)"
  creator_role: "by"
  year: 1961
  eval: "loved"
  image: "/assets/images/thoughts/books/no-one-writes-to-the-colonel.jpg"
  posted: "2016-05-22"
  revised: "2016-05-22"
  text: |
    ***No One Writes to the Colonel*** is the driest of Márquez's major works and, in some ways, the most precise. The unnamed colonel has been waiting fifteen years for the military pension that he is owed. He is old, ill, poor, and his wife is sick; they live on borrowed money and a fighting cock that their dead son Agustín left behind. Each week the colonel goes to the dock to collect the mail that never arrives. Each week he walks home. Márquez describes this repeated ritual, this systematic disappointment, with such matter-of-fact precision that the comedy and the tragedy become indistinguishable.

    The colonel is not a pathetic figure; he is an absurdly dignified one. He refuses to sell the cock, though selling it would solve their immediate problems; he refuses to despair, though despair would be the rational response to his situation. His wife begs him to accept the reality of their circumstances. He cannot, or will not. Márquez writes his stubbornness without condescension, as though dignity in the face of systematic state neglect were not delusion but the only sane response to an insane situation.

    The setting is a swampy tropical town under an unnamed dictatorship; political violence happens just off the page, referenced in the cockfighting pit, clandestine papers and censored newspapers. Agustín was killed for distributing clandestine political literature. The colonel's pension was earned in a civil war that his side may or may not have won, that was certainly not won for people like him. The novella ends with the colonel's answer when his wife asks what they will eat: "mierda." Three decades of waiting, and what remains is this single word, delivered with absolute composure. It is the funniest and saddest ending I know.

- title: "Love in the Time of Cholera"
  title_en: "El amor en los tiempos del cólera"
  type: "book"
  creator: "Gabriel García Márquez, trans. 杨玲 (CN: 《霍乱时期的爱情》)"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/books/love-in-the-time-of-cholera.jpg"
  posted: "2016-05-17"
  revised: "2016-05-17"
  text: |
    If ***One Hundred Years of Solitude*** is Márquez building a world, ***Love in the Time of Cholera*** is Márquez doing something harder: making a love story that by any ordinary standard is pathological read as one of the great romantic accounts in literature. Florentino Ariza waits fifty-one years, nine months, and four days for Fermina Daza, by then Fermina Urbino, to become available again, having been rejected in their youth. He does not wait with dignity; he sleeps with hundreds of women, conducts affairs, buries his mother, and never entirely stops. When the opportunity finally arrives, both are in their seventies. Márquez does not resolve this. He holds the contradiction open: Florentino is faithful and faithless simultaneously, romantic and grotesque, a man whose love is real and whose conduct is real and who refuses the choice between them.

    The cholera of the title is double. The epidemic is historical, part of the Caribbean world that Márquez constructs with the same loving specificity as Macondo; but it is also a metaphor for lovesickness, which Florentino's doctor initially mistakes for cholera when the young man arrives with all the symptoms. Márquez treats love with the clinical detachment of a physician observing an illness, and the effect is both funny and devastating: here is a condition that consumes a human life, produces all the symptoms of derangement, and is given the social sanction of poetry and song.

    The ending, on the river, is one of the most morally ambiguous in all of the novels that I have read: the boat flying the yellow cholera flag so that no one will board it, the two old lovers finally together in a space that is neither past nor future, time itself having stopped at the point where love is possible.

- title: "War"
  title_en: "La Guerre"
  type: "book"
  creator: "J.M.G. Le Clézio, trans. 李焰明 & 袁筱一 (CN: 《战争》)"
  creator_role: "by"
  year: 1970
  eval: "loved"
  image: "/assets/images/thoughts/books/war.jpg"
  posted: "2016-05-15"
  revised: "2016-05-15"
  text: |
    The war of Le Clézio's title is not fought with weapons. It is fought with fluorescent lighting, with the hum of refrigeration units, with the ceaseless noise of traffic and the saturating assault of advertising. ***War*** opens with the declaration that the war is here and spends its entirety proving it: modern urban existence is a form of warfare waged against the senses, and no ceasefire has been signed. Bea B. wanders through the city not as a character in any traditional sense but as a consciousness under siege, and the prose registers light, sound, texture, and movement with an accumulating density that becomes, for the reader, its own form of bombardment. Le Clézio embeds photographs and diagrams into the text, breaking the boundary between novel and visual art, and the disorientation is structural: one does not read this book so much as endure it.

    The supermarket sequence is the centrepiece. Le Clézio transforms the hypermarché into a battlefield where consumer goods sit like ammunition on shelves, where the sheer material surplus of capitalist abundance registers as violence against the body. This is not polemic; it is closer to phenomenology, the rendering of pre-reflective perception until objects press against consciousness with physical weight. Having read *The Book of Flights* (1969) a month earlier, I recognise the continuity: Hogan's flights across continents end in the same trap, the same inescapable modernity. But *War* refuses to flee. It stays in the city and fights, and the difference is everything.

    Le Clézio writes as though language were an instrument of the war that he describes, each sentence a controlled detonation aimed at the reader's complacency. The incantatory accumulation of sensory detail builds layer upon layer until reading itself becomes an act of endurance. I came out of this book and the city looked different.

- title: "One Hundred Years of Solitude"
  title_en: "Cien años de soledad"
  type: "book"
  creator: "Gabriel García Márquez, trans. 范晔 (CN: 《百年孤独》)"
  creator_role: "by"
  year: 1967
  eval: "loved"
  image: "/assets/images/thoughts/books/one-hundred-years-of-solitude.jpg"
  posted: "2016-05-08"
  revised: "2016-05-08"
  text: |
    ***One Hundred Years of Solitude*** is the novel that most powerfully demonstrated to me what fiction could do. The Buendía family builds Macondo from jungle mud, and over the course of a century the village is visited by alchemy and war, banana companies and civil conflicts, love and amnesia and finally oblivion. Márquez writes in a mode that takes the miraculous as given: Remedios the Beauty ascends to heaven while hanging laundry; a yellow plague of butterflies announces the arrival of Mauricio Babilonia; the patriarch José Arcadio Buendía speaks to the ghost of Prudencio Aguilar for years before anyone realises he is mad. The prose holds all of this with the same equanimity it holds the mundane, and the effect is not of a fairy tale but of a complete world, one in which the boundary between the natural and the supernatural has never been drawn.

    What I did not expect was the melancholy. The Buendía men repeat themselves compulsively: the same given names cycle through the generations, the same character patterns recur with slight variations, the same doomed projects absorb the same energies. Colonel Aureliano Buendía fights thirty-two civil wars and loses every one of them; he ends his life making gold fish in his workshop, melting them down, and making them again. The family's incapacity to love without destroying is figured by the incest at the family's origin and its end. Faulkner is structurally present; so is Borges in the self-consuming circularity. But the voice belongs entirely to Márquez.

    The novel is built like a trap that can only be understood once it has closed: the last Buendía reads the Sanskrit parchment that was written at the novel's beginning, translating the fate of his family in the moment it reaches its fulfilment, and the city is erased before he finishes the last page. I thought about Macondo for weeks after finishing. Some books end; this one lingers.

- title: "The Book of Flights"
  title_en: "Le Livre des fuites"
  type: "book"
  creator: "J.M.G. Le Clézio, trans. 王文融 (CN: 《逃之书》)"
  creator_role: "by"
  year: 1969
  eval: "loved"
  image: "/assets/images/thoughts/books/book-of-flights.jpg"
  posted: "2016-04-18"
  revised: "2016-04-18"
  text: |
    Le Clézio subtitles ***The Book of Flights*** 'roman d'aventures,' which is either irony or confession: the adventure is flight itself, perpetual and purposeless, across continents and through prose that refuses to settle into any genre one could name. Jeune Homme Hogan moves from Southeast Asia to Mexico to unnamed cities, not towards anything but away from everything, and the book follows him with a restlessness that infects its own form. Fiction dissolves into essay; essay dissolves into manifesto; manifesto dissolves into lists, diagrams, typographic eruptions that scatter words across the page like debris. Le Clézio is not writing a novel. He is writing against the novel, and the tension between the two produces something that I had not encountered before.

    Hogan flees consumer modernity: its noise, its advertising, its relentless colonisation of attention. But Le Clézio is honest enough to acknowledge the paradox. The book is itself a product, an object that sits on shelves in bookshops, a participant in the very economy that it rails against. At one point Le Clézio addresses the reader directly, accusing them of complicity; at another he turns the accusation on himself. The flight is impossible because the escapee carries the prison with him, because language and consciousness are already structured by the civilisation that he is trying to leave behind.
    This was my first Le Clézio. I found in him a writer who could hold rage and tenderness in the same sentence, who could catalogue the horrors of modern existence without flinching and then turn a page and describe the light on a tropical river with a precision that borders on prayer. I read everything of his that I could find in the weeks that followed.


- title: "Things Fall Apart"
  type: "book"
  creator: "Chinua Achebe"
  creator_role: "by"
  year: 1958
  eval: "liked"
  image: "/assets/images/thoughts/books/things-fall-apart.jpg"
  posted: "2016-04-10"
  revised: "2016-04-10"
  text: |
    Okonkwo is one of the most frustrating protagonists that I have encountered, and ***Things Fall Apart*** is better for it. His fear of becoming his father, lazy and debt-ridden and buried in disgrace, drives everything: the wrestling, the violence, the refusal to show tenderness even to his favourite daughter, the murder of Ikemefuna. Achebe writes Okonkwo's rigidity without apology or distance, letting the reader admire his strength while watching it become the instrument of his destruction.

    The first two parts are richer than the third. Achebe's portrait of Igbo village life before the missionaries arrive has a depth and texture that makes its own argument: the justice system, the religious practices, the proverbs that carry generations of accumulated wisdom, the elaborate social hierarchy. This is not a simple society awaiting civilisation; it is a complete world with its own logic. When the missionaries and the District Commissioner arrive in Part Three, the collision feels inevitable but no less devastating for that.

    The final paragraph is the cruellest thing in the book. The District Commissioner, contemplating Okonkwo's suicide, decides it might merit 'a reasonable paragraph' in the book that he plans to write: *The Pacification of the Primitive Tribes of the Lower Niger*. An entire life, an entire culture, reduced to a footnote by the man who destroyed it. Achebe performs in one sentence the very erasure that his novel exists to resist.

- title: "Dance Dance Dance"
  title_en: "ダンス・ダンス・ダンス"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《舞！舞！舞！》)"
  creator_role: "by"
  year: 1988
  eval: "loved"
  image: "/assets/images/thoughts/books/dance-dance-dance.jpg"
  posted: "2016-03-25"
  revised: "2016-03-25"
  text: |
    I came to ***Dance Dance Dance*** without having read *A Wild Sheep Chase*, arriving at the Dolphin Hotel with no knowledge of what it had once been. This turned out to be its own kind of reading experience: the narrator returns to Sapporo to find that the original building, worn and human, has been razed and replaced by a sterile corporate tower bearing the same name, and I felt the loss as absence rather than as history. On a hidden floor of the new hotel, the Sheep Man waits in his filthy suit with the only wisdom that matters: keep dancing, do not stop, do not ask why.

    The command is not inspiration; it is survival. Murakami wrote this during Japan's bubble years, and the novel registers the era's manic emptiness with a precision that has only sharpened since. Every character that the narrator meets has been hollowed out by success or by the pursuit of it: the film star Gotanda, elegant and imploding; the receptionist Yumiyoshi, warm but enclosed; the call girl with her own peculiar code. The narrator himself drifts through their lives not as agent but as witness, connected to each of them and helping none.

    Gotanda makes this Murakami's most affecting novel for me. He is everything that the narrator is not, famous, beautiful, wealthy, and he is the one who stops dancing. What happens to him arrives without melodrama, almost as an aside, and its quietness is the worst thing about it. Murakami trusts that understated devastation cuts deeper than spectacle, and he is right. Arriving at the hotel blind, with no memory of its former life, was somehow the truer way to encounter this book.

- title: "The God Delusion"
  type: "book"
  creator: "Richard Dawkins"
  creator_role: "by"
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/books/god-delusion.jpg"
  posted: "2016-02-15"
  revised: "2016-02-15"
  text: |
    ***The God Delusion*** was the right book at the right time. I was questioning received beliefs with the intensity of someone who had only recently discovered that questioning was permitted, and Dawkins provided the scaffolding: a clear, witty, unapologetic argument that religious belief is a testable hypothesis, a claim about the world rather than a sacred domain exempt from scrutiny. The 'Ultimate Boeing 747 Gambit' did more to reorganise my thinking than anything else that I read that year: if complex life requires a designer, the designer must be even more complex and therefore even less likely to have arisen without explanation. Natural selection provides what design cannot: incremental, non-random accumulation of complexity. The regress stops.

    The Spectrum of Theistic Probability, a scale from 1 (absolute certainty that God exists) to 7 (absolute certainty that God does not), is the framework that I still use when people press me on whether I am 'really' an atheist. Dawkins places himself at 6.9: not certain, but as close to certain as one can responsibly be. This precision matters. It distinguishes confident disbelief from the dogmatic mirror image of faith.

    The book's weakness is the one that its critics identify: Dawkins attacks religion as a social phenomenon with great force but engages theology at the level of its crudest expressions. Terry Eagleton's objection, that criticising religion without reading theology is like holding forth on biology from the *Book of British Birds*, is not entirely fair, nor is it entirely wrong. The arguments work against the religion that I actually encountered growing up; whether they work against Aquinas or Tillich is a different question, and Dawkins does not seem interested in finding out. But the book did what it needed to do: it gave me permission to think what I was already thinking, and it gave me reasons.

- title: "The Wind-Up Bird Chronicle"
  title_en: "ねじまき鳥クロニクル"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《奇鸟行状录》)"
  creator_role: "by"
  year: 1994
  eval: "liked"
  image: "/assets/images/thoughts/books/wind-up-bird-chronicle.jpg"
  posted: "2016-01-20"
  revised: "2016-01-20"
  text: |
    Toru Okada is among fiction's most passive protagonists, and ***The Wind-Up Bird Chronicle*** tests whether passivity itself might constitute a form of resistance. His wife vanishes, his cat vanishes, and instead of acting in any conventional sense, he descends into a dry well to sit in darkness. Around this void, Murakami layers an encyclopedic collection of narratives: Lieutenant Mamiya's account of the Japanese army on the Manchurian-Mongolian border, encounters with psychics and corrupt politicians, set pieces that accumulate without fully resolving. The book is a sprawling, ungainly thing, and I mean that partly as a compliment.

    The Manchuria sections are what anchor the whole work. There is a scene of extreme violence in which Boris the Manskinner has a prisoner flayed alive in front of assembled soldiers, and it has stayed with me longer than anything else that Murakami has written. Its force comes less from the violence itself than from its structural placement: embedding wartime atrocity inside a domestic story about a man searching for his missing cat forces one to see that historical evil and personal unhappiness share a root system. Noboru Wataya, the sinister brother-in-law, crystallises this: less a crude villain than a politician whose corruption is inseparable from the institutional machinery around him.

    The third volume sags and the novel never quite coheres, which is why I admire it more than I love it. But Murakami's ambition here is on a different scale from his other work, and the well itself, dark, silent, transformative, is the image that I return to.

- title: "Twelfth Night"
  type: "book"
  creator: "William Shakespeare"
  creator_role: "by"
  year: 1602
  eval: "loved"
  image: "/assets/images/thoughts/books/twelfth-night.jpg"
  posted: "2015-09-15"
  revised: "2015-09-15"
  text: |
    I read ***Twelfth Night*** for AP English at my international school in Guangzhou, and it was the first Shakespeare that made me laugh out loud. The cross-dressing plot, Viola disguised as Cesario, Olivia falling for Cesario, Orsino falling for Cesario without knowing it, is a machine for producing confusion, and the play runs the machine with glee. Malvolio in yellow stockings, believing that Olivia loves him, is the funniest thing in Shakespeare, and the cruelty is the reason: everyone is in on the joke except the one person that it destroys. Sir Toby Belch and Sir Andrew Aguecheek are wonderful idiots, and Feste the fool speaks the only real wisdom in the play, which is Shakespeare's recurring trick but never better deployed than here.

    The play is about disguise, but identity is a costume here, and removing one costume only reveals another underneath. Viola cannot stop being Cesario even when she wants to; Orsino cannot stop performing lovesickness; Olivia cannot stop performing grief. Everyone is playing a part, and the comedy arises from the fact that the parts have taken over. I wrote an essay on this for class and got an A, which at the time felt like the most important thing. It was not, but the play was.

- title: "Siddhartha"
  type: "book"
  creator: "Hermann Hesse, trans. 杨玉功 (CN: 《悉达多》)"
  creator_role: "by"
  year: 1922
  eval: "disliked"
  image: "/assets/images/thoughts/books/siddhartha.jpg"
  posted: "2015-05-10"
  revised: "2015-05-10"
  text: |
    ***Siddhartha*** follows its eponymous Brahmin's son through asceticism, desire, wealth, despair, and final enlightenment by a river in ancient India. Hesse's thesis is that wisdom cannot be transmitted through doctrine and must be lived, which gives the novel a form as schematic as its argument: each stage of Siddhartha's life is a phase to be passed through and discarded, and the people that he moves through with, Kamala the courtesan, Govinda the friend, the ferryman Vasudeva, exist as vehicles for his development rather than as people. Kamala provides the sensual education that leads Siddhartha back to renunciation; the novel does not seem to notice the asymmetry of this arrangement, or to consider what Kamala's experience of it might be.

    A fable needs either its architecture or its characters; ***Siddhartha*** has the architecture but characters that remain opaque, Orientalist projections of 'Eastern wisdom' onto a landscape of archetypes. Bland, if not offensive.

- title: "Zen and the Art of Motorcycle Maintenance"
  title_en: "禅与摩托车维修艺术"
  type: "book"
  creator: "Robert M. Pirsig, trans. 张国辰 (CN)"
  creator_role: "by"
  year: 1974
  eval: "loved"
  image: "/assets/images/thoughts/books/zen-and-the-art-of-motorcycle-maintenance.jpg"
  posted: "2015-04-15"
  revised: "2015-04-15"
  text: |
    ***Zen and the Art of Motorcycle Maintenance*** was the first book that I read that convinced me that philosophy was not a separate activity from living but a description of the same thing being done more carefully. The narrator rides a motorcycle from Minnesota to California with his son Chris, weaving the travel narrative together with extended 'Chautauquas,' discursive passages on the nature of Quality. Quality, as the narrator develops it, is the pre-intellectual entity that gives things their value: it precedes both classical analytical thinking and romantic intuitive feeling, and one responds to it before deciding how to categorise the response.

    The book's structure is doubled: the narrator that we meet is the cautious, diminished survivor of a previous self, Phaedrus, a rhetoric professor who pursued the definition of Quality with such intensity that it broke him into the psychiatric system. As the road narrative progresses, the Chautauquas reconstruct Phaedrus's argument, and the two narratives are on a collision course. The revelatory thing was that philosophical obsession appeared here as a thing that happens to a person, not an abstraction: the questions about how the world works are the same questions as the ones about how to live in it, and confusing the two can break a mind.

    The motorcycle maintenance of the title is the book's best metaphor: the difference between treating a machine as something to be understood and treating it as an instrument to be managed is the same difference that Pirsig finds everywhere, between relating to the world and merely using it. I had not read anything that worked this way before, and the feeling of the philosophical ground shifting beneath the travel narrative was new and completely absorbing.

- title: "Animal Farm"
  type: "book"
  creator: "George Orwell"
  creator_role: "by"
  year: 1945
  eval: "disliked"
  image: "/assets/images/thoughts/books/animal-farm.jpg"
  posted: "2015-03-10"
  revised: "2015-03-10"
  text: |
    I came to ***Animal Farm*** already suspicious of Orwell, having read *Nineteen Eighty-Four* a few months earlier and come away thinking that he was less revolutionary than his reputation. The fable confirmed the suspicion. The allegory is transparent: the pigs are the Bolsheviks, Napoleon is Stalin, Snowball is Trotsky, Boxer is the credulous proletariat who works himself into collapse for masters who do not deserve his loyalty. The narrative arc, revolution betrayed from within, is presented as though it were an inevitable law of political physics rather than a specific historical outcome, and there the book fails. By collapsing 'socialism' into 'Stalinism,' ***Animal Farm*** lets every reader conclude that collective projects are doomed, which amounts to a defence of the *status quo* rather than a critique of power.
    Orwell called himself a democratic socialist, and perhaps he was, but the book that he wrote has been more useful to the right than to any left. The CIA bought the film rights through intermediaries and funded the 1954 animated adaptation, altering the ending to remove the scene where pigs and humans become indistinguishable, turning Orwell's ambiguous fable into a straightforward anti-communist tract. Orwell's own 'List,' the names of suspected communist sympathisers that he passed to the Information Research Department in 1949, does not help his case. Intent is not reception: whatever Orwell meant, ***Animal Farm*** becomes propaganda against the very class that it claims to champion.

- title: "Kafka on the Shore"
  title_en: "海辺のカフカ"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《海边的卡夫卡》)"
  creator_role: "by"
  year: 2002
  eval: "liked"
  image: "/assets/images/thoughts/books/kafka-on-the-shore.jpg"
  posted: "2015-02-15"
  revised: "2015-02-15"
  text: |
    After *Norwegian Wood* I expected quiet realism and got an Oedipal fable wrapped in Murakami's most elaborate metaphysical machinery. Two narratives alternate: Kafka Tamura, a fifteen-year-old running from his father's prophecy that he will kill his father and sleep with his mother, and Nakata, an elderly, simple-minded man who talks to cats and stumbles into a murder. The tonal distance from *Norwegian Wood* was the first surprise; the second was how effortlessly Murakami juggles modes, moving from domestic realism to the supernatural without a single apologetic transition.

    The supporting characters carry the book. Oshima, the haemophiliac librarian whose conversations with Kafka about Schubert and Greek tragedy form the intellectual spine, is among the most fully realised figures in Murakami's work. Miss Saeki's contained grief over her dead lover becomes almost architectural; when her past finally breaks through, the effect is devastating precisely because it has been so carefully withheld. But the novel's ambition exceeds its discipline in places: the Oedipal consummations feel more like provocations than earned consequences, and the Colonel Sanders figure drifts into whimsy where it needed weight.

    ***Kafka on the Shore*** showed me that Murakami's range extends far beyond his reputation as a writer of wistful love stories, and that the surrealist mode could carry genuine emotional force. I liked it; I did not love it; but I could see where it was reaching.

- title: "Nineteen Eighty-Four"
  type: "book"
  creator: "George Orwell"
  creator_role: "by"
  year: 1949
  eval: "meh..."
  image: "/assets/images/thoughts/books/nineteen-eighty-four.jpg"
  posted: "2015-01-15"
  revised: "2015-01-15"
  text: |
    Everyone told me that ***Nineteen Eighty-Four*** was the most important political novel ever written. I finished it thinking that Orwell had written a cautionary tale that was itself more useful to the powerful than to the powerless. The totalitarian machinery is convincing enough; the telescreens, the Thought Police, the endless revisions of history are vivid in the way that a well-constructed nightmare is vivid. But what proved harder to shake was the suspicion that Orwell's sympathies were less revolutionary than his reputation suggests. The proles, who constitute eighty-five per cent of the population, are dismissed in a few contemptuous paragraphs: they are too stupid, too passive, too animalistic to revolt. The only people who matter in this novel are Party intellectuals, and the only revolution that Orwell can imagine is one conducted by educated men writing diaries. For a writer who claimed to stand with the working class, this is a remarkable failure of imagination.
    O'Brien's torture of Winston is effective horror, but it is horror in the service of a thesis that I am not sure I accept: that power is its own justification, that the Party wants power for the sake of power. The passage reads as despair dressed up as political analysis. I came away thinking that Orwell was better at describing what he feared than at understanding how resistance actually works.

- title: "Norwegian Wood"
  title_en: "ノルウェイの森"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CN: 《挪威的森林》)"
  creator_role: "by"
  year: 1987
  eval: "loved"
  image: "/assets/images/thoughts/books/norwegian-wood.jpg"
  posted: "2014-12-20"
  revised: "2014-12-20"
  text: |
    My first Murakami, and the book that taught me that a novel could be built almost entirely from accumulated mundane detail: meals cooked alone, records stacked by the turntable, walks to nowhere in particular. The story is simple enough to summarise in a sentence; what Toru Watanabe remembers of his university years in late-sixties Tokyo, pulled between Naoko, who is drowning in grief after their best friend Kizuki's suicide, and Midori, who is violently, uncompromisingly alive. But the summary misses everything. What Murakami achieves here is a novel where the emotional weight gathers not in the dramatic events but in the spaces between them: the silences during Toru's visits to Ami Hostel, the exact quality of light in Naoko's room, the careful way that Reiko tunes her guitar before playing.

    The deaths accumulate quietly. Kizuki kills himself at seventeen and opens a wound that never closes. Naoko follows. And in a single devastating parenthetical, the narrator mentions that Hatsumi, too, will take her own life: not as revelation but as an aside, buried in the middle of an unrelated paragraph, and the effect is closer to how grief actually arrives; not as climax but as ambush, something one walks into while thinking about something else. Every novel that I had read until then treated death as a dramatic event. Murakami treats it as weather.
    The architecture is almost schematic: Naoko is the past, Midori is the present; Ami Hostel is withdrawal, Tokyo is engagement; Toru is strung between them, unable to choose either. But the prose dissolves the scheme into something lived and textured, and when Toru says 'Death is not the opposite of life but an innate part of it,' ***Norwegian Wood*** has earned every word of it. I read it in three days and could not listen to the Beatles for weeks afterwards without feeling Naoko's absence like vertigo.

- title: "A Game of Thrones"
  type: "book"
  creator: "George R.R. Martin"
  creator_role: "by"
  year: 1996
  eval: "loved"
  image: "/assets/images/thoughts/books/a-game-of-thrones.jpg"
  posted: "2014-12-10"
  revised: "2014-12-10"
  text: |
    Ned Stark spends the novel being the protagonist, which is why his execution at the Sept of Baelor shocks as completely as it does. ***A Game of Thrones*** trains the reader in all the conventions of heroic fantasy: the righteous lord, the noble quest, the truth that must be told; then it violates them cleanly and without apology. Joffrey gives the order; Ilyn Payne lifts the sword; Arya is watching from the crowd. The fantasy genre had done many things before this. It had not done this.

    The structural choice works in tandem with the subversion: eight rotating point-of-view chapters, each character seeing the same events from entirely different angles, each carrying different blind spots. Ned Stark's honour is not a virtue in King's Landing; it is a liability, and the novel knows this long before Ned does. Tyrion's intelligence earns contempt rather than respect. Daenerys, three thousand miles away on the Dothraki sea, is becoming someone that the novel will take three more volumes to reconnect with the main plot. Martin's thesis, worked out through structure rather than statement, is that Westeros is a system, and the system rewards cruelty and punishes honour without exception.

    Reading this in a single week, what I understood was the momentum: the sense that anything could happen, that the rules of narrative protection did not apply. That this same quality made it impossible to continue is something that I understood only later. After Ned's execution, the series commits to a grimness that accumulates its own conventions; characters that one has followed are no longer safe, and eventually the body count becomes as formulaic as the heroics that it displaced. I stopped at the end of this first book, not quite willing to follow Martin where he was going, and have not gone back.

- title: "Naive. Super"
  title_en: "Naiv. Super."
  type: "book"
  creator: "Erlend Loe (CN: 《我是个年轻人，我心情不太好》)"
  creator_role: "by"
  year: 1996
  eval: "liked"
  image: "/assets/images/thoughts/books/naive-super.jpg"
  posted: "2014-11-25"
  revised: "2014-11-25"
  text: |
    The narrator of ***Naive. Super*** has stopped studying, has moved into his brother's empty apartment, and has decided to start over with small things. He loses a game of croquet, buys a ball and a peg board, and begins to rebuild his days through repetitive play. He makes lists. He faxes a meteorologist friend. He reads books about the solar system. The prose style matches this programme: very short sentences, each one factual and deliberate, accumulating the way that small things accumulate when large things are temporarily unavailable.

    Loe wrote this as a kind of anti-novel, and the comedy arises from the gap between the flatness of the prose and the scale of the questions that it turns out to be asking: what does one do when the narrative that one's life was supposed to follow no longer makes sense, when ambition feels like a language once spoken but no longer remembered? The answer, here, is to simplify radically. The mallet. The balls. The letters to the beavers. This book gave permission for a certain kind of sadness: the suggestion that slowing down completely, going back to childhood basics, is a necessary recalibration rather than a failure. I was not having the particular crisis that the narrator is having, but I understood the feeling of wanting to start again with smaller things, and the book was funny and sad and exact about it.

- title: "Fahrenheit 451"
  type: "book"
  creator: "Ray Bradbury"
  creator_role: "by"
  year: 1953
  eval: "liked"
  image: "/assets/images/thoughts/books/fahrenheit-451.jpg"
  posted: "2014-11-20"
  revised: "2014-11-20"
  text: |
    The first dystopia that I read, before *Nineteen Eighty-Four*, before *Brave New World*, and maybe the simplest gut punch. Firemen burn books; one fireman starts reading them; the world outside his window is already on fire in a different sense. Bradbury's prose has a feverish quality that suited the shock of that first reading: the sentences run hot, full of images that arrive before one has time to think about them, and the burning of the old woman's library, her choice to stay and burn with her books, was the first scene in a novel that frightened me.

    ***Fahrenheit 451*** thinks through fire more than through argument: Bradbury writes it the way that other writers write water, as an element that reveals everything that it destroys. Montag's rebellion is clumsy and half-formed, and the ending, the book people walking along the railroad tracks, memorising entire novels to preserve them, is more hopeful than the novel has earned. But I did not care about earned endings. I cared that someone had written a book about what happens when a culture stops reading, and that the book itself was the answer.

- title: "A Brief History of Time"
  title_en: "时间简史"
  type: "book"
  creator: "Stephen Hawking, trans. 许明贤 & 吴忠超 (CN)"
  creator_role: "by"
  year: 1988
  eval: "liked"
  image: "/assets/images/thoughts/books/a-brief-history-of-time.jpg"
  posted: "2014-10-25"
  revised: "2014-10-25"
  text: |
    The publisher warned Hawking that each equation in ***A Brief History of Time*** would halve sales, which is why the book contains only one. The resulting text is a sustained act of translation: black holes, the Big Bang, the uncertainty principle, the arrow of time, rendered in prose accessible to anyone prepared to slow down for a few dense pages. Coming to this without any physics background, I found myself understanding perhaps sixty per cent with real confidence, which felt like success rather than failure.

    Hawking is best when he leaves the strangeness intact: at very small scales the universe becomes probabilistic rather than deterministic, spacetime curves around mass, black holes emit radiation and eventually evaporate, and asking what came before the Big Bang may be a category error similar to asking what is north of the North Pole. These are structural revisions to how one conceives of reality, not incremental surprises. Hawking's achievement is making the strangeness legible without pretending that it is comfortable. Some of the cosmology has since been updated and the later chapters on quantum gravity are harder than the early ones, but the book still has the thing it first gave me: the conviction that the universe is so much weirder than intuition allows, and that this is magnificent rather than frightening.

- title: "The Golden Age"
  title_en: "黄金时代"
  type: "book"
  creator: "Wang Xiaobo (王小波)"
  creator_role: "by"
  year: 1991
  eval: "liked"
  image: "/assets/images/thoughts/books/golden-age.jpg"
  posted: "2014-10-15"
  revised: "2014-10-15"
  text: |
    I read ***The Golden Age*** in late middle school and understood it the way one understands anything shocking on first encounter: viscerally, without context. Wang Er and Chen Qingyang are 'sent down' to rural Yunnan during the Cultural Revolution, and what follows is a story about sex, boredom, punishment, and the human body's stubborn refusal to comply with political directives. The sexual frankness was what hit me first; Wang Xiaobo writes about the body with a bluntness that felt transgressive in a way that I had not encountered in Chinese literature, and at that point transgression was its own justification.

    What I missed, and what I can see now, is the satire. The 'struggle sessions,' the self-criticisms, the absurd bureaucratic machinery of political correction, are not backdrop but subject: Wang Xiaobo is writing about a system that attempts to regulate desire itself, and the comedy arises from the system's inevitable failure. ***The Golden Age*** is a novel about the body as the last site of resistance when every other form of dissent has been foreclosed. I did not have the vocabulary for that yet. I just thought it was funny and strange and unlike anything that I had read before, and that was enough.

- title: "Sophie's World"
  title_en: "Sofies verden"
  type: "book"
  creator: "Jostein Gaarder, trans. 萧宝森 (CN: 《苏菲的世界》)"
  creator_role: "by"
  year: 1991
  eval: "meh..."
  image: "/assets/images/thoughts/books/sophies-world.jpg"
  posted: "2014-09-25"
  revised: "2014-09-25"
  text: |
    ***Sophie's World*** is a textbook dressed as a novel. Sophie Amundsen receives letters from a mysterious philosopher who walks her through the history of Western thought from Thales to Sartre, and for the first half the pedagogical framing almost works: the philosophy is simplified but not falsified, and the progression from the pre-Socratics through Descartes and Hume has the pleasure of a well-drawn map. Then the metafictional reveal arrives: Sophie and Alberto are characters in a book written by a Norwegian UN major for his daughter Hilde's birthday, and they gradually become aware of their own fictional status.

    The problem is that the novel can never decide whether it is a philosophy primer with fictional decoration or a story with philosophical interruptions, and it is not quite either. The characters remain what they were from the beginning: vehicles for exposition, and the metafictional layer raises real questions about consciousness and free will without having the craft to pursue them. I came away with the outline of Western philosophy's history and very little else. I wanted more than an outline.

- title: "Offending the Audience"
  title_en: "Publikumsbeschimpfung"
  type: "book"
  creator: "Peter Handke (CN: 《骂观众》)"
  creator_role: "by"
  year: 1966
  eval: "loved"
  image: "/assets/images/thoughts/books/offending-the-audience.jpg"
  posted: "2014-06-08"
  revised: "2014-06-08"
  text: |
    ***Offending the Audience*** contains no story, no characters, no scenery. Handke's actors come on stage and spend the first section telling the audience exactly what is not happening: there is no play here, no narrative, no pretence that this stage is somewhere else. The demolition of theatrical convention is conducted in near-monotone, and the effect on first encounter was the feeling of a floor disappearing.

    The famous ending, a long escalating list of accusations hurled directly at the audience, was funny and shocking and slightly bewildering. The insults are the piece's logical conclusion: if the audience is denied the comfortable position of spectator from the beginning, if the event consists entirely of direct address, then the ending turns passive presence into complicity, and the insults are what that complicity has coming. The simpler shock was that someone had written a play that ended by yelling at the people watching it, and this seemed an act of rare honesty.

    By the end, ***Offending the Audience*** feels like a diagnosis of what performances usually do: manufacture a separation between stage and auditorium that allows everyone to pretend that they are not implicated in what they are watching. The insults, in removing that comfort, are paradoxically the most welcoming thing in the piece. I did not understand all of this then. The feeling of the floor disappearing was enough.

- title: "The Kite Runner"
  title_en: "追风筝的人"
  type: "book"
  creator: "Khaled Hosseini, trans. 李继宏 (CN)"
  creator_role: "by"
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/books/kite-runner.jpg"
  posted: "2013-12-15"
  revised: "2013-12-15"
  text: |
    ***The Kite Runner*** was the first novel that I read that made me understand what fiction could do. Amir watches Hassan get raped in an alley and does nothing; I read that scene and felt something that I could not name, a physical revulsion not at the violence but at the cowardice, at how completely I understood Amir's paralysis. Hosseini never lets Amir off the hook. The guilt does not fade; it metastasises. Amir frames Hassan for theft to push him out of sight, and the novel's most devastating detail is that Hassan knows and goes quietly, carrying the shame that Amir put on him without a word of accusation.

    The move to America could have been an escape, but Hosseini uses it as a slow compression. Baba pumps petrol and Amir writes stories and the Afghan community in Fremont re-creates a country that no longer exists. When Rahim Khan's phone call pulls Amir back to Taliban-controlled Kabul, the return operates on two levels: a man going back to rescue his best friend's orphaned son, and a man going back because twenty years of running have not outpaced a single act of looking away. The revelation that Hassan was Baba's illegitimate son, that the Pashtun patriarch had crossed the ethnic line that he publicly upheld, reframes the entire novel's architecture of shame.

    What I understood was the story; what I missed was the politics. The Hazara-Pashtun hierarchy, the Soviet invasion, the Taliban's particular cruelty towards ethnic minorities: these were furniture to me then, context that I did not know I needed. The novel's weakness is visible now: Hassan is too saintly, too passive, more instrument of Amir's redemption than a person with his own interiority. But none of that mattered. What mattered was that someone had written a book in which a boy's worst moment followed him for decades, and that the only possible response was to go back. 'For you, a thousand times over.'


