- title: "A Knight of the Seven Kingdoms Season 1"
  type: "tv"
  creator: "Ira Parker"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/a_knight_of_the_seven_kingdoms_season_1.jpg"
  posted: "2026-03-31"
  text: |
    It has been a long time since a medieval show felt this alive. Not alive in the way of spectacle, dragons and massacres and the usual currency, but alive in the sense that its world seems to have existed before the camera arrived and will continue to exist after it leaves. The market scenes in episode two alone contain more incidental texture than most prestige television manages in an entire run: the mud, the commerce, the social stratification worn as casually as clothing. Compared to *Game of Thrones* (2011), which at its best rendered Westeros as an empire of consequence, aKotSK feels more inhabited, the way *Kingdom Come: Deliverance 2* (2025) feels inhabited after a long stretch of *Skyrim* (2011): <u>the difference between a simulation and a world.</u>

    The source material helps. Martin's *Dunk and Egg* novellas are lower in register than the main saga, closer to adventure and fellowship than to geopolitical horror, and Ira Parker has the good sense not to reach for gravitas the material does not want. The tournament in episode five is precisely what a medieval fight scene should be: chaotic, contingent, and shot without the hyper-edited blurs that have made action cinema feel increasingly like a report of combat rather than combat itself. <u>One watches and does not want it to end.</u>

    But it is the relationship at the centre that makes the season what it is: a hedge knight of no lineage and a prince in hiding, bound by something that neither can quite name and that the show declines to sentimentalise. The class asymmetry between them is never resolved, only navigated, episode by episode, with an awkwardness that feels true. <u>One has not loved a pairing like this in years.</u> Whether the show can sustain what it has built is a question for next season; for now, it is enough to say that it has built something worth sustaining.

- title: "The Wire Season 4"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/the_wire_season_4.jpg"
  posted: "2026-02-22"
  text: |
    There is a scene in which Carver goes to plead with a clerk in the foster-care system on behalf of a child he knows is being mistreated. He has the goodwill, the information, the moral clarity. And he earns nothing but a blank stare: the face of the system itself, a stone wall that does not register bodies, does not register children, does not register the particular human being standing in front of it. <u>It registers statistics and political exposure, and nothing else.</u> This is what Season 4 is about: not corruption in the ordinary sense, not villains who could be removed and replaced, but the aggregate indifference of institutions that have ceased to have any relationship to the lives they nominally administer.

    Carcetti believes, when he takes office, that he can change this. David Simon gives him the benefit of the doubt: he is not presented as a cynic, but as a man who discovers that the system does not care about his intentions any more than it cared about the children in the school, any more than it cared about Carver's plea. It stares back at Carcetti too, the same blank face, and he accommodates himself to it, because accommodation is what the system rewards. The education budget goes unspent. The stats are juked. And on the streets, beneath this canopy of institutional indifference, the dying continues.

    Bodie. Little Kevin. Sherrod. Each death lands as what it is: not a dramatic event but a consequence, an arithmetic result, as inevitable as anything in Greek tragedy. Simon has described ***The Wire*** as a Greek tragedy in which the institutions are the gods, and Season 4 is where that claim is most fully earned. <u>The gods do not hate the people of Baltimore. That would at least be a relationship. They simply do not see them.</u> And that is the more devastating truth.

- title: "The Wire Season 3"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2004
  eval: "loved"
  image: "/assets/images/thoughts/films/the_wire_season_3.jpg"
  posted: "2026-02-22"
  text: |
    Every season of ***The Wire*** is its own Baltimore epic, and the third is the one about the dream of reform: what it looks like, how briefly it holds, and what it costs the people who believed in it. Bunny Colvin's Hamsterdam, that strange, temporary drug utopia carved out of abandoned blocks in West Baltimore, is the season's central provocation, and Simon does something formally interesting with it: he lets it work. Under the influx of social services, the zone becomes something like an incubator for the possible, a space in which human beings who have been written off by every institution can briefly, provisionally, be treated as human beings. The show does not endorse it. But it refuses to dismiss it, and that refusal is political.

    Against this, the Barksdale arc arrives at its terminal logic. Stringer Bell has been trying to become a businessman: attending economics lectures, reading Adam Smith, proposing cartel arrangements with rival organisations to suppress the violence that draws police attention. Avon Barksdale cannot follow him there. He is a soldier, loyal to territory and reputation and the internal code of the street, and he cannot imagine himself otherwise. <u>The two men love each other with the completeness of people who have shared everything, and so can only, in the end, destroy each other.</u> Every small dream each of them holds is crushed in the shadow of a conflict that is not really about either of them, but about the impossibility of escaping the structure they were born into.

    The season's final image is Stringer's apartment: the blueprints for the legitimate life he almost lived, spread across a table no one will sit at again. <u>Not because the dream was realistic. It was not. But because he dreamed it at all, and because the show takes that seriously.</u>

- title: "The Wire Season 2"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/the_wire_season_2.jpg"
  posted: "2026-02-02"
  text: |
    Played out on the miniature stage of Baltimore's docks, a compressed image of the global proletarian condition: all that furious effort, and the situation at the end is worse than at the start. David Simon has said the season is about the death of work, and that is precisely right, but it is also about something harder to name, the way that structural abandonment forces moral compromise not from greed but from desperation, the way the institutions that were supposed to protect working people have become instruments of their liquidation. <u>Frank Sobotka is not a villain; he is a man whose love for his people leads him into an impossible position, and Simon offers him no exit.</u>

    Even Ziggy, perhaps the most infuriating figure in the entire series, a man who shames his cousin and causes his father's death through a kind of spectacular self-destruction, seems within this miniature almost pitiable, which is a considerable achievement. The union is finished, the docks are finished; the small act of resistance, illegal yet righteous, is extinguished on a river floating with the uncollected dead. What makes Season 2 the show's most ambitious movement is precisely what initially alienated audiences: the insistence that the same systemic logic that grinds down the corner also grinds down the docks, that <u>the tragedy is not racial but economic, and that the economy does not care who it destroys.</u>

- title: "Pluribus Season 1"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/pluribus_season_1.jpg"
  posted: "2026-01-06"
  text: |
    Among the most visually beautiful television I watched this year, and I mean that without qualification: Gilligan's compositional intelligence, his feeling for colour and negative space, is operating at a level that makes almost everything else on streaming look provisional. The Carol and Zosia relationship has a quiet charge that the show's best episodes develop with genuine patience; Manousos's search for truth gives the science-fiction premise its moral spine. All of which makes the structural frustration harder to dismiss. A clean, declarative sci-fi premise of this kind makes an implicit contract with the audience: it promises that the world it builds will eventually cohere into an argument, a feeling, a reckoning with whatever the central concept turns out to mean. <u>After a full season, Gilligan has not yet honoured that contract.</u> Both the emotional and the philosophical threads remain barely unspooled when the finale arrives and then simply stops.

    The comparison to *Severance* (2022) is inevitable, and not entirely fair, but it is instructive. *Severance* (2022) spent its first season constructing a world dense enough that its slow pace felt like pressure accumulating rather than time passing. <u><b><i>Pluribus</i></b> is still laying its foundations.</u> That is not a fatal condition for a series with this much craft behind it; it is, however, a genuine problem, and one that patience alone will not solve.

- title: "The Chair Company Season 1"
  type: "tv"
  creator: "Patrick Somerville"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/the_chair_company_season_1.jpg"
  posted: "2025-12-07"
  text: |
    The higher the expectation, the greater the disappointment. Somerville built his reputation on *Station Eleven* (2021)'s formal elegance; ***The Chair Company*** inherits none of it, delivering instead an amateur-hour detective procedural dressed up in conspiracy-theory aesthetics it has not earned. The Pynchonesque paranoia one was promised never materialises: what arrives in its place is plot mechanics, laboured reveals, and <u>the dull satisfaction of a mystery that was never mysterious.</u> <u>Some failures are instructive; this one is merely irritating.</u>

- title: "The Wire Season 1"
  type: "tv"
  creator: "David Simon"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/the_wire_season_1.jpg"
  posted: "2025-11-18"
  text: |
    A textbook example of something that looks simple but never stays at the surface: little wonder that Žižek too uses ***The Wire*** to diagnose the American Zeitgeist, finding in it the Lacanian Real of a society that cannot look directly at what produces it. What David Simon and Ed Burns built in Season 1 is essentially a sociological system rendered as drama, in which the police bureaucracy and the Barksdale organisation mirror each other so precisely that the show's central moral insight, that <u>institutions grind people up regardless of which side of the wire they are on</u>, arrives not as argument but as form.

    The most striking thing, watching the final episodes pull threads together in callbacks: one suddenly realises how many seeds were sown in the ten hours before, with a patience and structural confidence that television almost never permits itself. The show asks one to hold enormous amounts of information in suspension, trusting that it will eventually cohere, and it does, resolutely, without the coercion of melodrama. <u>Greek tragedy was the comparison David Simon himself reached for: the institutions as gods, indifferent, systemic, and crushing. He was not wrong.</u>

- title: "The Bear Season 4"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/the_bear_season_4.jpg"
  posted: "2025-07-21"
  text: |
    One expected this season to wrap things up; after three seasons of accumulated pressure, the show had earned the right to release it. What Christopher Storer does instead is more interesting and more honest: he keeps the pressure on, converts it, allows it to become something almost liveable. The anxiety and unease that defined earlier seasons do not resolve here so much as transmute, rendered through cinematography and dialogue of such personal closeness that the camera often feels like a held breath, the conversation like something overheard through a too-thin wall. <u>If earlier seasons were about collapse, this one is about the silver lining that can only be glimpsed from inside despair, and the show is wise enough not to let it shine too brightly.</u>

    The wedding sequence in episode seven is the season's set piece, and it earns comparison to the mother's dinner episode that became the show's most discussed hour. It achieves something similar through opposite means: where that dinner was cacophony and escalation, the wedding is a held stillness charged with everything the characters cannot say out loud. <u>Storer's instinct, consistent across the series, is to trust that the most intimate moments are also the most cinematically arresting, that a glance across a table can carry as much weight as any kitchen catastrophe.</u> The season rewards the three seasons that preceded it.

- title: "Poker Face Season 2"
  type: "tv"
  creator: "Rian Johnson"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/poker_face_season_2.jpg"
  posted: "2025-07-16"
  text: |
    Like the first season, ***Poker Face*** remains lodged in an awkward position, oscillating between 'this episode contains some of the best television of the year' and 'this episode makes absolutely no sense.' <u>The show's howcatchem format, <em>Columbo</em>-derived and Natasha Lyonne-propelled, is when it works one of the most purely pleasurable structures on streaming: a showcase for guest performers, a vehicle for Lyonne's preternatural ease, and a demonstration that the procedural can still produce genuine surprise.</u> The con-artist episode this season is exactly that kind of triumph. <u>The final two episodes are not, their logic simply failing to cohere, the formula turning mechanical at the precise moment it should be building to something.</u>

- title: "The Rehearsal Season 2"
  type: "tv"
  creator: "Nathan Fielder"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/the_rehearsal_season_2.jpg"
  posted: "2025-06-03"
  text: |
    The obvious defence of Nathan Fielder's project has always been available: it is all performance, all simulation, all elaborate play-pretend, and the emotions it produces are therefore contained, deniable, the tears shed over constructed scenarios no more consequential than tears shed at the cinema. <u>Season 2 makes this defence impossible to maintain.</u> Here the emotions are real, the meanings are real, and for once the impact is real in a way that reaches beyond the frame, beyond the simulacra, into something that does not dissolve when the cameras stop.

    Fielder has always worked at the edge of the ethical, staging rehearsals for life events with a precision that mimics care while raising questions about what care actually requires, whether it can be manufactured, whether the distinction between genuine feeling and performed feeling holds under sufficient repetition and attention. Season 2 takes this further. <u>It finds something on the other side of the methodology that the methodology itself could not have predicted: not exposure of simulation's limits, but evidence of simulation's strange productive power, its capacity to generate the real thing.</u> Favourite series of the first half of 2025. He has outdone himself again, which, given the benchmark he set, is not a small thing to say.

- title: "Black Mirror Season 7"
  type: "tv"
  creator: "Charlie Brooker"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/black_mirror_season_7.jpg"
  posted: "2025-04-15"
  text: |
    <u>After the accumulated disappointments of Seasons 5 and 6, the bar had been lowered to the point where mere competence would have registered as a triumph.</u> Season 7 manages considerably more than competence. The *Bandersnatch* (2018) connection in Episode 4 is its most inspired gambit: Peter Capaldi's performance anchors an alternate-history premise, and Brooker's return to the Tuckersoft universe demonstrates that the ***Black Mirror*** multiverse can bear the weight of its own mythology without collapsing into fan-service. Episodes 1 and 3 do unusually sustained work on privacy and personhood, the commodification of consciousness in 'Common People' and the posthumous rights of a reconstructed identity in 'Hotel Reverie', territory that feels thought through rather than gesturally invoked. The final episode lands as a properly compelling science fiction narrative in the classic mode.

    The minor failures are mostly inherited: tonal inconsistencies and structural tics that have accumulated across seasons and resist easy correction. <u>But Season 7 suggests that Brooker has located again what the series is actually for, the precise application of technological extrapolation to the vulnerabilities one would rather not name.</u> It is enough to make the next season feel worth anticipating.

- title: "Severance Season 2"
  type: "tv"
  creator: "Ben Stiller"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/severance_season_2.jpg"
  posted: "2025-03-30"
  text: |
    It is rare, in 2025, to encounter a series assembled with this degree of intention: every composition is a considered argument, every transition a quiet thesis statement. Ben Stiller's direction does not merely serve the story; it interrogates it, turning Lumon's fluorescent interiors into a kind of philosophical arena where the question of what constitutes a self is debated not in dialogue but in geometry and light. Season 2 sharpens that debate into something almost unbearable. <u>The show has always known that its central horror is not the loss of memory but the ethical abyss opened by splitting a consciousness in two, and here it commits fully to the implications, staging the innie rights question as genuine moral philosophy rather than speculative decoration.</u> The discourse around Parfit and personal identity that has hovered over fan discussion since Season 1 is now absorbed into the show's own dramatic logic.

    Of the nine episodes, two inscribe themselves differently. 'Gemma' is, in fifty minutes, one of the finest hours of television I can recall: Patricia Arquette carries the entire weight of a bifurcated personhood through the nearly imperceptible gap between blankness and recognition, and the episode constructs a three-dimensional portrait of an outie life from the fragments her innie cannot consciously access. That the episode achieves full emotional dimensionality without resorting to flashback or exposition is the kind of formal achievement that justifies the medium. 'Farewell,' the finale, does what finales rarely manage: it resolves the accumulated moral and narrative tension without deflating it, closing the season at a pitch of feeling that seems, afterwards, to have been the only possible destination.

    The season is not without its ceiling. It is roughly what one hoped for before it aired: disciplined, formally rigorous, emotionally demanding, philosophically alive. That is not faint praise. <u>Television that earns the philosophical weight it reaches for is vanishingly uncommon, and <em>Severance</em> has now done it across twenty episodes without blinking.</u>

- title: "Adolescence Season 1"
  type: "tv"
  creator: "Philip Barantini"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/adolescence_season_1.jpg"
  posted: "2025-03-29"
  text: |
    Philip Barantini's one-shot technique, already demonstrated in *Boiling Point* (2021), here finds its ideal subject. <u>The absence of cuts is not a formal stunt: it creates a continuous, inescapable present-tense, the same temporal trap in which Jamie Miller and his family are caught.</u> Jack Thorne's script tracks a thirteen-year-old boy arrested for the murder of a female classmate, and the four episodes, each a single unbroken take, move from the police station to the family home to the prison interview room with the remorselessness of a process that has already concluded. Stephen Graham's performance as Jamie's father is the kind of acting that refuses to announce itself; the devastation accumulates in stillness.

    The temptation is to read the series as a diagnosis of the Andrew Tate moment, and it is that, but the more unsettling implication is that 'Andrew Tate' and 'incel' are not a passing cultural weather system but a permanent feature of a landscape that has been under construction for some time. Those of us born in the late twentieth century are perhaps still in the comfortable denial of believing the environment we grew up in was the norm. It wasn't; it was an interlude. <u>The channels through which boys now receive information about what it means to be a man are unverified, algorithmically amplified, and beyond the reach of any school or parent.</u> ***Adolescence*** names this clearly and with great formal and dramatic skill. What it cannot do, constrained to four episodes and the grammar of tragedy, is offer a way through. Perhaps that is honest: the aftershocks of this particular cultural formation may only become fully legible a decade from now, when the children it has shaped are adults who must be lived with.

- title: "The Bear Season 3"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/the_bear_season_3.jpg"
  posted: "2024-07-11"
  text: |
    Christopher Storer describes Season 3 as a tone poem, and the description is accurate but undersells how much structural ambition is packed into it. Each episode pushes further into formal experimentation: non-linear time, extended interior monologue, episodes that function less as plot units than as sustained emotional states. The critical complaint that the season is slow mistakes pace for aimlessness; what Storer is doing is making room for character interiority that plot-driven television habitually crowds out.

    The performances Ayo Edebiri and Abby Elliott give as Sydney and Sugar this season are, without exaggeration, among the finest on American television in recent memory. Sydney's arc, weighing ambition against belonging, is handled with the kind of psychological granularity that most shows spend entire series building toward and here arrives quietly, distributed across scenes that seem to be about other things. Sugar's pregnancy, the restaurant, the family, the impossible arithmetic of holding it all: Abby Elliott makes one feel the weight of each calculation without editorialising it. <u>I adore both of them completely, and I mean that in the way one means it about people, not characters.</u>

    The season knows it is not for everyone. <u>It asks to be felt more than followed, and some weeks that ask is more demanding than others.</u> But the episodes that land, and most of them do, carry the kind of moving force that television almost never reaches. My favourite season yet, and I suspect it will be some time before anything matches it.

- title: "Fallout Season 1"
  type: "tv"
  creator: "Graham Wagner"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/fallout_season_1.jpg"
  posted: "2024-04-28"
  text: |
    The ***Fallout*** games have always understood something about American mythology that most satire fumbles: <u>the vault, the wasteland, the Brotherhood, the Ghoul, these are not just genre furniture but a precise archaeology of the national psyche, its optimism curdled into survivalism, its corporate cheerfulness persisting long past the point of obscenity.</u> Wagner and his writers have absorbed this logic completely, and the adaptation's most impressive feat is not the fidelity to surface detail, though the grenades on the Brotherhood aircraft, the vault terminal interface, the retro-futurist costuming are all immaculate, but the fidelity to the games' internal political grammar, the way power in the wasteland is always simultaneously ridiculous and lethal.

    Walton Goggins as the Ghoul is the performance the series hangs on, and he carries it without apparent effort, moving between Cooper Howard's pre-war idealism and the Ghoul's centuries-deep cynicism with a physical intelligence that the writing alone could not supply. But the real achievement is structural: <u>a show that demands nothing from its viewers except attention, and rewards that attention with a world that feels inhabited.</u> The moment the solar sail unfurled in the games had a particular quality of sublimity that translation to another medium should have diminished. Somehow it does not.

- title: "Happy Valley Season 1"
  type: "tv"
  creator: "Sally Wainwright"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/happy_valley_season_1.jpg"
  posted: "2023-10-04"
  text: |
    Sally Wainwright gives every person in the Calder Valley a complete interior life, not as an act of liberal generosity but as a structural commitment: the fabric of the show requires it, because crime in ***Happy Valley*** is never anomalous. It emerges from the same social texture as everything else, from financial pressure and family grief and the specific exhaustion of public service in a community that has been quietly left behind. The supporting characters, the small criminals, the frightened accomplices, the institutional figures hedging their bets, are not furniture. They have reasons, histories, the particular stubbornness of people who have never been given anything easily.

    <u>Catherine Cawood is earth and sky.</u> Sarah Lancashire's performance operates in the register of someone for whom dignity is not a performance but a survival mechanism: this woman has absorbed a loss that should have broken her, has metabolised it into something that functions like forward momentum, and carries it in her body, in the set of her jaw, in the way she manages not to flinch when the thing she has been dreading finally comes into view. <u>The show does not ask one to admire her; it simply insists that one see her clearly.</u> That is the harder ask, and Wainwright meets it without flinching.

- title: "The Crown Season 4"
  type: "tv"
  creator: "Various"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/the_crown_season_4.jpg"
  posted: "2023-08-22"
  text: |
    The season's most persistent failure is also its most telling one: Thatcher's economic programme, the defining political fact of her decade, is almost entirely absent. The privatisations, the assault on the unions, the deliberate dismantling of the postwar settlement, the transformation of Britain into a laboratory for Friedmanite shock therapy, none of it registers. What remains is a Thatcher who exists primarily to be cold, inflexible, war-hungry. Britain's most consequential postwar Prime Minister, second only to Attlee in actual historical weight, is reduced to someone who picks unnecessary fights and ignores the vulnerable. ***The Crown*** has always been a drama, not a document, and that caveat has its uses; but the selective amnesia here distorts rather than simplifies, producing a caricature the left loves without asking whether it has earned that love.

    What the season does render with real force is the royals themselves, and here the show is at its most unsettling. Thatcher's reputed view, that behind the breeding lay an emptiness, an arrogance of blood without corresponding substance, is borne out by almost every royal we encounter. <u>The treatment of Diana is not simply negligence; it is a structure, a system for metabolising inconvenient interiority and returning it as silence.</u> Charles is suffocating in his own arrested development, the Queen magnificent in her icy remove, the institution as a whole an organism evolved precisely to endure, which means evolved to consume those who feel too much. <u>One comes away understanding viscerally why Thatcher, the grocer's daughter made good through sheer force of will, found them barbaric. And one cannot entirely blame her.</u>

- title: "The Bear Season 2"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/the_bear_season_2.jpg"
  posted: "2023-07-14"
  text: |
    <u>Better than Season 1 in nearly every register, which was not a small achievement to surpass.</u> Season 1's urgency was inseparable from its compression, the relentless single-location pressure cooker of the beef sandwich counter; Season 2 expands the frame without losing the pressure. Uncle Jimmy finally gets the screen time the first season withheld from him, and Oliver Platt fills it with a performance of layered, sardonic feeling, a man who loves the family and distrusts it and bankrolls it with full knowledge of all three. Sydney's arc develops into something generous, her competence and ambition granted their proper weight rather than kept subordinate to Carmy's chaos.

    Episode 6, 'Fishes,' is the season's centrepiece and one of the finest single episodes of television in years. The structure is a Christmas Eve family dinner as pressure vessel, Jamie Lee Curtis's Donna building and building until the room itself seems to contract, and the tension-building is several levels above anything in Season 1, the dialogue so precisely placed that each exchange opens onto the next like a door onto a corridor that leads somewhere worse. <u>The Carmy-and-Claire arc gives the season its tenderness and its tragedy: the clearest demonstration that some damage makes ordinary happiness structurally impossible, not through any dramatic failure but through the simple arithmetic of what was done to someone before they had the language to resist it.</u> Series of the year, without question.

- title: "For All Mankind Season 1"
  type: "tv"
  creator: "Ronald D. Moore"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/for_all_mankind_season_1.jpg"
  posted: "2023-05-29"
  text: |
    The divergence point is a single event: the Soviet Union lands on the Moon first. From that seed Moore and his co-creators grow an entire alternate political ecology, one in which American competitive anxiety accelerates the admission of women to the astronaut corps by a decade, the Equal Rights Amendment moves through a different legislative climate, the slow retreat of racial discrimination happens against a different social backdrop. <u>History as contingency rather than teleology, the argument embedded in the premise itself, the argument that what we call progress is not a direction but a series of pressures and counter-pressures that can be arranged differently given different inputs.</u>

    What makes the season work beyond its conceptual architecture is the writing of individual lives inside that architecture. Every major character carries their specificity: the astronauts ground in the particular texture of what it means to be good at this one extraordinary thing, the families carrying the specific weight of what proximity to that extraordinary thing costs. The occasional scene tips into the too-explicitly inspirational, the kind of moment where the score announces that significance is now occurring; these are the season's weak points, and they are not frequent enough to constitute a structural problem. <u>One watches this account of a better world, however hard-won and partial, and feels something that is not quite hope and not quite grief, a recognition of what is possible when the pressures align differently, and a corresponding awareness of how rarely they do.</u>

- title: "The Bear Season 1"
  type: "tv"
  creator: "Christopher Storer"
  creator_role: "dir."
  year: 2022
  eval: "liked"
  image: "/assets/images/thoughts/films/the_bear_season_1.jpg"
  posted: "2023-04-27"
  text: |
    The writing in the first six episodes is uneven, and knowing what arrives later makes that unevenness feel almost calculated: as though Storer were deliberately rationing what the show can do, holding back to make the ambush more complete. <u>The seventh episode is filmed almost in a single sustained take, following a kitchen in freefall with a camera that moves like a trapped animal, and it is one of the most formally accomplished pieces of television in recent memory.</u> The eighth, quieter and longer, does something the preceding seven episodes had given no indication it was capable of: it reveals that the show has a fully developed capacity for monologue, for stillness, for the kind of extended character revelation that requires a completely different grammar from controlled chaos.

    Stunning, taken together. <u>The unevenness in the earlier episodes stops feeling like a weakness once one understands it as an accumulation, a slow pressurisation that makes the release so total.</u> Very much looking forward to Season 2.

- title: "Poker Face Season 1"
  type: "tv"
  creator: "Rian Johnson"
  creator_role: "dir."
  year: 2022
  eval: "liked"
  image: "/assets/images/thoughts/films/poker_face_season_1.jpg"
  posted: "2023-03-12"
  text: |
    Quite by-the-numbers, and the first half can feel, episode by episode, a little too comfortably inert. The 'howcatchem' format Rian Johnson borrows from *Columbo* (1971) contains an inherent tension: if the audience already knows the killer, the pleasure has to lie entirely in Charlie's unravelling of the crime, and for several early episodes the unravelling is not interesting enough to carry that weight alone. <u>Fortunately the last three episodes represent a dramatic leap in writing quality, finding genuine originality inside the formula, letting the mechanics of the inverted detective story do something other than simply repeat themselves.</u> Special mention to episode nine: without it, the score would barely be passing.

- title: "The Capture Season 2"
  type: "tv"
  creator: "Ben Chanan"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/the_capture_season_2.jpg"
  posted: "2023-02-22"
  text: |
    Jaw-dropping, watching Ben Chanan weave together every thread laid across the first five episodes in that final instalment. The architecture of the series is almost ostentatiously ambitious: geopolitical manipulation, AI-fabricated evidence, the slow corruption of institutions that were already compromised before the foreign actors arrived, and a protagonist who can barely trust her own perception of events. <u>That it all lands, and lands cleanly, is the kind of thing one wants to hold up as proof that television can do things film cannot.</u> <u>How is it even possible to tell such a convoluted story so well? And how long before one sees storytelling this brilliant again.</u>

- title: "Atlanta Season 2"
  type: "tv"
  creator: "Donald Glover"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/atlanta_season_2.jpg"
  posted: "2022-12-18"
  text: |
    <u>'Teddy Perkins' is thirty minutes of television that does things no other form could do and that almost no other practitioner of the form would have had the nerve to attempt.</u> Donald Glover in full prosthetic disguise as a figure assembled from the wreckage of Michael Jackson, Prince, and every Black entertainer whose talent was extracted and metabolised by a controlling father: it is at once a horror film, a Kubrickian exercise in dread accumulation, and one of the most concentrated statements about the cost of Black excellence under patriarchal and white supremacist systems that American television has produced. Hiro Murai directs with a stillness that generates more unease than any jump-cut ever could.

    The rest of Robbin' Season holds. 'Woods' is harrowing in a different register; 'Barbershop' is a masterclass in the bottle episode; 'North of the Border' is comedy so dark it leaves a residue. Season 1 established what the show was; Season 3 reached further and sometimes overreached; Season 4 resolved with a strange, earned grace. But this is the season with the highest consistent quality, the one where every formal ambition found its right vessel. <u>Across all four seasons, this is the one that will be remembered longest.</u>

- title: "House of the Dragon Season 1"
  type: "tv"
  creator: "Miguel Sapochnik / Ryan Condal"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/house_of_the_dragon_season_1.jpg"
  posted: "2022-10-30"
  text: |
    The sensation of watching ***House of the Dragon*** in its first season is something close to what one imagines it must have been to watch *Game of Thrones* (2011) when it was still capable of surprise: every detail deliberate, every shot weighted with consequence, the political machinery of the Targaryen court turning with a precision that rewards attention rather than punishing it. The Alicent-Rhaenyra opposition, frequently reduced in popular discussion to mere faction loyalty, is given enough texture to function as the emotional spine of the season, <u>two women who understood each other completely and are now arranged against each other by a system that was always going to do this to them.</u>

    What the season accomplishes most quietly is its recalibration of the dragons from spectacle to argument. They are not weapons in any stable sense; they are independent intelligences whose allegiances are genuinely uncertain, and this uncertainty is what makes the Dance of the Dragons feel like a catastrophe already in progress rather than a conflict about to begin. Aemond is probably the only living soul who grasps this fully, and the final scene above Storm's End, in which he loses control of the very outcome he thought he commanded, is the season's thesis in miniature. <u>Nobody starts a civil war; they simply reach a moment when stopping it would require a courage no one has managed to accumulate.</u> And now we spiral into the Dance.

- title: "The Problem with Jon Stewart Season 1"
  type: "tv"
  creator: "Jon Stewart"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/the_problem_with_jon_stewart_season_1.jpg"
  posted: "2022-10-26"
  text: |
    Only recently discovered the first season had already aired by the time I came to it. The wait had been long enough: fourteen years during which one watched Trevor Noah erode, episode by episode, the institutional credibility Jon had spent two decades constructing at *The Daily Show*, fourteen years of Stewart appearing in sideline conversations with Colbert and Oliver, radiating <u>the particular restlessness of someone who knows exactly what they would do with a platform they no longer have.</u>

    The Problem has fulfilled that wait in ways that were not obvious in advance. The roundtable format, which Stewart had always suited better than the monologue, gives veterans space to be heard rather than processed, their testimony on VA failures and the mental health crisis folding directly into legislative argument without the usual layer of ironic distance. The interviews are razor-sharp and logically fluid in the way his best *Daily Show* work was, but without the defensive comedy that used to cushion the confrontation: <u>Stewart is older, less interested in being liked, more interested in being useful.</u> The subject of veteran care is as urgent as it is deliberately unglamorous. That Jon chose it for his return, rather than something more obviously spectacular, is itself a kind of statement. Anticipation for this series has never been higher.

- title: "How to with John Wilson Season 2"
  type: "tv"
  creator: "John Wilson"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/how_to_with_john_wilson_season_2.jpg"
  posted: "2022-08-09"
  text: |
    Season two deepens what season one established without simply restating it. <u>The how-to premise is still a Trojan horse: each episode promises utility and delivers something closer to phenomenology, Wilson's hands and camera moving through New York with the patience of someone who believes that if one looks at anything long enough it will confess something true.</u> The associative editing remains the formal engine, cuts that generate meaning through unexpected visual rhyme rather than expository logic, and the second season pushes this further into genuine strangeness without losing the warmth that keeps it habitable.

    What Wilson and Nathan Fielder have demonstrated, across their respective bodies of work, is that the documentary form has not been exhausted but misused. *Nathan For You* (2013) and *The Rehearsal* (2022), How to Make Small Talk and How to Be Spontaneous: each treats the camera's presence not as a frame for reality but as a constitutive element of it, a pressure that causes people to reveal themselves precisely because they are trying to perform. The essay film tradition from Marker onward knew this, but it remained a niche; Wilson and Fielder have found a way to make the formal experiment feel intimate rather than academic. <u>Season two of <b><i>How to with John Wilson</i></b> is a sustained argument that ordinary life, looked at with sufficient attention and sufficient absurdist patience, opens into something vast.</u>

- title: "Better Call Saul Season 2"
  type: "tv"
  creator: "Vince Gilligan / Peter Gould"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/films/better_call_saul_season_2.jpg"
  posted: "2022-07-14"
  text: |
    Chuck's insecurity is probably a side effect of perfectionism: after years of hard-won struggle, a wild card appears and truly draws out the petty tricks lurking in his heart. Michael McKean plays the deterioration with extraordinary precision, keeping Chuck pitiable and villainous in the same breath, never letting one state excuse the other. <u>The document-splicing sequence at the end of the season is the show crossing a threshold, not just for Jimmy but for itself, the moment <b><i>Better Call Saul</i></b> stops being a <em>Breaking Bad</em> (2008) appendage and becomes its own tragedy.</u>

    Again, the best thing about this season is largely Kim and Jimmy trying to carve out a patch of sky for themselves, Rhea Seehorn doing work that the Emmys notoriously refused to see. <u>Their scenes together carry the show's deepest investment: two people whose fundamental decency is being gradually outpaced by the world they are embedded in.</u> In smaller part, Mike is slowly being drawn into the drug dealing scene, his moral architecture eroding one rationalisation at a time. And I have a feeling that Gus is gonna come out soon.

- title: "Breaking Bad Season 5"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/films/breaking_bad_season_5.jpg"
  posted: "2022-07-11"
  text: |
    The most important thing the fifth season teaches is not about Walter, who by this point has rendered himself unambiguous: it is about the people who watch him and feel something like kinship. The show has always been constructed so that the audience tracks Walter's rationalisation in real time, finding each step locally plausible even as the cumulative direction becomes monstrous; season five removes even the rationalisation, and Walter simply revels. 'Say my name.' 'I did it for me. I liked it.' The honesty is almost restful after the sustained self-deception of the preceding seasons. <u>What is left is the shape of a man who could not accept help, could not accept diminishment, could not let a single slight go unanswered, and paid for that intractability with everyone around him.</u>

    The question the show has always been asking is not whether Walter is redeemable. The show knew from the beginning he was not. The question is what it reveals about us that we kept watching, kept half-rooting, kept finding the intelligence and competence compelling even as the body count rose. Walter should have died in season two. Everything after that is the interest accumulating on a debt that was never going to be repaid in kind. Everyone around him, Skyler, Jesse, Hank, the people who simply had the misfortune of being near him, had their ordinary lives destroyed in service of his pride. <u>Stay away from people like Walter White. More than that: stay away from people who sympathise with him, because the sympathy is the problem, and it is the problem the show was diagnosing from the start.</u>

- title: "Breaking Bad Season 4"
  type: "tv"
  creator: "Vince Gilligan"
  creator_role: "dir."
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/films/breaking_bad_season_4.jpg"
  posted: "2022-07-09"
  text: |
    Season four operates on sustained dread, two masterminds circling each other with the patience of people who understand that the first visible move is probably the losing one. <u>Gus Fring is Walter's dark mirror and also his superior: the same pride, the same capacity for cold calculation, the same empire-building under cover of legitimate industry, but without the emotional volatility that keeps undoing Walter at crucial moments.</u> Giancarlo Esposito plays him as a man who has long since metabolised his own grief into something structural, something that runs the whole apparatus, and the season's slow revelation of his backstory makes him tragic rather than merely formidable.

    The finale turns on Walter poisoning a child, which at the time of broadcast was the clearest evidence yet of how far the rationalisation machine could be pushed. One watched it feeling something that resisted articulation. To borrow Walter Jr's framing, still the most direct moral verdict the show offers anyone: Walter, why don't you just die already? <u>The heartbreak isn't for Walter. It is for Jesse, for Skyler, for everyone orbiting him who can see what he is and can't get clear.</u>

- title: "Severance Season 1"
  type: "tv"
  creator: "Ben Stiller"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/severance_season_1.jpg"
  posted: "2022-05-03"
  text: |
    The central conceit of ***Severance***, that a surgical procedure can split a worker's consciousness into distinct selves with no shared memory across the threshold of the office door, is more than a science-fiction premise. <u>It is a diagram of something already happening: the demand that workers arrive scrubbed of interiority, productive and cheerful, while the 'outie' self accrues the fatigue and grief that the 'innie' will never be permitted to feel.</u> Dan Erickson's writing metabolises this into something that is simultaneously Kafkaesque workplace horror and a genuine philosophical puzzle about identity, consent, and what it means to be the author of one's own life. Ben Stiller's direction deploys the sterile geometry of Lumon's corridors with Kubrick-esque deliberateness: every symmetrical frame is an argument about control.

    What distinguishes the show from mere allegory is the acting. Adam Scott holds two versions of the same person in tension, the 'outie' Mark's grief-sodden numbness and the 'innie' Mark's tentative, almost childlike curiosity, calibrating the gap between them with extraordinary subtlety. The ensemble, Britt Lower's Helly, John Turturro's Irving, Zach Cherry's Dylan, fills out Lumon's absurdist ecology with performances that keep the comedy and the dread in permanent, productive suspension. <u>The Kier Eagan mythology, with its corporate scripture and its Waffle Parties, is the show's most Fisher-adjacent achievement: a fully realised simulacrum of religious devotion in service of shareholder value.</u>

    The back half of the season does not sustain the front half's absolute control. The camerawork grows more conventional as the plot accelerates, and certain revelations feel rushed toward a cliffhanger rather than earned on their own terms. The actress playing Mrs Selvig deploys a register so mannered it occasionally punctures the spell. These are real complaints. But the show's best passages, the 'outie' episode, the dance, the finale's final sequence, achieve a kind of stunned emotional clarity that prestige television almost never reaches. <u>The best show of its year, and it is not especially close.</u>

- title: "Clarkson's Farm Season 1"
  type: "tv"
  creator: "Gavin Whitehead"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/films/clarksons_farm_season_1.jpg"
  posted: "2022-04-21"
  text: |
    <u>Gross profit for the year: £144.</u> That figure arrives with the timing and weight of a punchline, but it is also the show's thesis statement. Farming, as ***Clarkson's Farm*** presents it, is less a profession than a sustained act of institutional optimism, a commitment renewed each season against the accumulated evidence of weather, subsidy policy, mechanical failure, and soil. What the series does unusually well is to put that helplessness on screen without aestheticising it. Jeremy Clarkson is an effective vehicle for this precisely because he is constitutionally unsuited to the role: the bewilderment is never performed, and his periodic fury at bureaucratic obstruction, at Natural England, at the sheer intractability of the land, reads as the authentic response of someone who has spent a career in a domain where competence and resources could solve most problems.

    Kaleb Cooper is the show's secret instrument. His expertise is so ingrained it has become atmospheric, expressed less in explanation than in the quality of his exasperation, and the comedy of the two of them, the apprentice who knows everything and the employer who knows nothing, never tips into condescension in either direction. The show functions as a compressed education in the political economy of British agriculture, in why small farms cannot survive without subsidy, in why the romantic image of the yeoman farmer bears almost no relation to the accountancy of the thing. That it manages all this while remaining, in stretches, funny, is the achievement. <u>Not a living, but a very good television show.</u>

- title: "Endeavour Season 1"
  type: "tv"
  creator: "Shaun Evans"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/endeavour_season_1.jpg"
  posted: "2022-03-24"
  text: |
    The first series is, by design, fairly conventional in its mysteries: four cases, each self-contained, structured according to the grammar of the British detective drama that ***Endeavour***'s parent text did so much to establish. The score, still finding its footing, does not yet have the elegiac authority it will develop; the production occasionally shows the financial constraints of a series that had to prove itself after a single pilot. None of this matters much. <u>What matters is that Russell Lewis has built the architecture of a career, and that one can already see, in these four episodes, most of the major relationships and moral coordinates that will carry the show through a decade.</u>

    Shaun Evans avoids the obvious trap: there is no attempt to pre-empt John Thaw's Morse, to give the audience an impression of the icon they already know. Instead there is a young man who is brilliant, solitary, and intermittently insufferable, qualities that cohere as a personality rather than a set of iconic attributes. Roger Allam's Fred Thursday arrives essentially complete, warm and gruff and principled in ways that are never sentimentalised. <u>Oxford itself remains the show's most reliable character: the colleges, the river, the light, a city that has apparently decided to preserve itself against every passing century.</u> A living fossil, and the show is wise enough to know it.

- title: "Silk Season 2"
  type: "tv"
  creator: "Richard Laxton"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/films/silk_season_2.jpg"
  posted: "2022-01-30"
  text: |
    Season 1 established the architecture: Martha Costello's absolute authority at the bar, the chambers as a system of competing loyalties and suppressed appetites, the law as a profession that requires its practitioners to argue convictions they may not hold. Season 2 takes that architecture and uses it to stage something more searching: an examination of what it costs to hold to values when the institutional structures that were supposed to protect them have been quietly hollowed out. Brendan Kay's case threads through the season with a patience that pays off fully; it is the kind of storyline that stays in the mind for days <u>not because it resolves neatly but because it doesn't, because the feeling of moral residue is the point.</u>

    A separate note is unavoidable: Shaun Evans playing Daniel is simply stunning. The performance has a quality of controlled intensity that commands every scene it occupies, and makes one regret all the screen time given to the comparatively thinly written pupils. Maxine Peake remains the series' still centre, but Evans is the surprise. <u>The two of them together produce a heat the show has not previously managed.</u>

- title: "Silk Season 1"
  type: "tv"
  creator: "Richard Laxton"
  creator_role: "dir."
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/films/silk_season_1.jpg"
  posted: "2022-01-29"
  text: |
    <u>Maxine Peake constructs Martha Costello's presence with what can only be called absolute authority: every hesitation, every pivot, every moment of doubt managed and metabolised within the professional carapace of a woman who has learned to trust the argument over the feeling.</u> Peter Moffat, writing from the inside of the bar he once practised at, understands that the ethical drama of criminal advocacy is not about guilt or innocence but about what the system demands of the people who operate it, and what those demands slowly take from them. Six episodes is an unusual constraint, and here it proves a gift: the compression forces Billy, Clive, and Martha into full, indelible life within a duration that most legal dramas would spend on setup.

    The single weakness is that the two pupils are given insufficient dimensionality, Martha's pupil Nick in particular. One feels the shape of what the show might want to do with his arc without the episodes to do it in. That is a narrow complaint against a series this assured. <u>The courtroom sequences have the texture of something observed rather than dramatised, and the scenes between Martha and Clive carry an erotic charge that the writing is smart enough never to resolve.</u>

- title: "Vigil Season 1"
  type: "tv"
  creator: "James Strong"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/vigil_season_1.jpg"
  posted: "2021-09-27"
  text: |
    Amy on the submarine is probably in a fog from the very beginning: the depth, the recycled air, the claustrophobia compounding her pre-existing PTSD until her cognition is operating at a strange remove from events. By the final episode her thinking seems to have disordered itself, the detective's procedural clarity buckling under the accumulated pressure of the hull around her. This is a generous reading of what might simply be inconsistent writing, but the series invites it, and Suranne Jones plays Amy with exactly the right kind of dissociation: focused and fraying simultaneously.

    Both the emotional and the thriller strands are handled with such care that they never jar against each other, which is rarer than it sounds in British crime drama of this kind. The pacing is smooth, the coordination between the submarine investigation and the parallel land inquiry exemplary, and the impact is not diminished by a single degree across six episodes. <u>BBC drama of this ambition and this quality does not arrive every year.</u> <u>One finishes it slightly dazed, as if one had also been breathing recycled air.</u>

- title: "True Detective Season 1"
  type: "tv"
  creator: "Cary Joji Fukunaga"
  creator_role: "dir."
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/films/true_detective_season_1.jpg"
  posted: "2021-07-14"
  text: |
    McConaughey and Harrelson's characters need no advertisement; everyone already knows how good they are. What the reviews tend to underemphasise is how precisely the dual-narrator structure earns those performances. The show operates on three temporal layers simultaneously, and the gap between what Rust Cohle and Marty Hart remember, what they choose to reveal, and what the camera contradicts produces a specific epistemological vertigo. <u>Truth is always perspectival, never singular.</u> Each man's retrospective account is shaped by ego and shame in ways he cannot see. Fukunaga's visual grammar makes this legible without underlining it: Hart in medium shot, ordinary and exposed; Cohle in low angles that suggest both grandeur and vulnerability; the Louisiana landscape dwarfing both of them equally.

    The mystery elements are not especially dense, and the resolution has divided critics for this reason. But the character development is extraordinarily rich, and the perspective structure of the opening six episodes is compelling enough to sustain repeated viewing. Rust Cohle's nihilism is not the show's philosophy; it is the show's symptom. <u>One watches him articulate an airtight cosmology that happens to leave no room for the life he actually wants, and the tragedy is not the serial killer but the man who needed the killer to have a reason to feel anything.</u> The kind of series one could use as a psychology lecture slide deck.

- title: "The Mandalorian Season 2"
  type: "tv"
  creator: "Jon Favreau"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/the_mandalorian_season_2.jpg"
  posted: "2021-06-19"
  text: |
    The standard objection to Season 1 was that its anthology structure, one mission per episode, one planet per week, kept the narrative from accumulating weight. Season 2 resolves this without abandoning the formula: the episodic container is retained, the Volume technology and Pedro Pascal's helmeted, near-silent characterisation of Din Djarin remain constant, but the episodes are threaded now into the larger Star Wars timeline in a way that makes the world feel inhabited. <u>Tatooine's binary sunset returns carrying everything it was always supposed to carry.</u> Moff Gideon's Dark Troopers give the season its escalating dread. Bo-Katan Kryze, Ahsoka Tano, Boba Fett himself: the reappearances are not merely fan service, though they are that too, but structural joints that connect this corner of the galaxy to a history the audience already knows and therefore does not need explained.

    The Volume, ILM's vast LED stagecraft, earns its place in Season 2 in a way it did not always in Season 1: the environments are richer, the lighting more precise, and the directors, ranging from Dave Filoni to Robert Rodriguez to Peyton Reed, use the technology without being used by it. The season's final episode, Chapter 16, arrives at the image it has been building towards, a familiar green lightsaber in a dark corridor, and earns it through everything the season has laid in before. <u>Din Djarin barely shows his face across eight episodes, and yet the emotional logic of his arc is complete, tightly wound, and lands with force.</u> The standalone universe quality that made Season 1 feel slightly adrift is gone. What remains is something far more complete.

- title: "Love, Death & Robots Season 2"
  type: "tv"
  creator: "Tim Miller"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/love_death_robots_season_2.jpg"
  posted: "2021-05-15"
  text: |
    The honest accounting goes something like this: taken as an anthology, only four or five episodes in Volume 2 have real depth of idea, and two or three are dead on arrival, 'Automated Customer Service' among them, a sketch that mistakes escalation for wit. By any objective measure five stars is a reach. But the subjective experience is a different matter entirely, and this is where criticism that insists on objectivity as a virtue tends to lose the thread.

    What Volume 2 has over its predecessor is a tonal coherence the first season, for all its exuberance, lacked. The range is narrower and the selection is fiercer, and when the episodes work, they work with a compression that recalls the best short fiction rather than the prestige television from which anthology formats usually take their cues. 'Pop Squad', 'Snow in the Desert', 'The Tall Grass': each is a complete argument, a world assembled and dismantled in under fifteen minutes.

    Then there is 'The Drowned Giant', which closes the season and which is, without qualification, the finest single episode the series has produced, Zima Blue included. Ballard's source story is already a meditation on impermanence and human indifference to the extraordinary, but director Tim Miller finds images for it that the prose cannot: the giant's body slowly scavenged, dismembered, dispersed into the ordinary world, remembered only by the scientist who bears witness and whose narration carries the full weight of elegiac grief. <u>It climbs higher than Zima Blue precisely because it asks something harder of the viewer: not wonder at the sublimity of transcendence, but the more unglamorous work of bearing witness to entropy.</u> <u>One finished the episode unable to quite return to the world.</u>

- title: "How to with John Wilson Season 1"
  type: "tv"
  creator: "John Wilson"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/how_to_with_john_wilson_season_1.jpg"
  posted: "2021-02-28"
  text: |
    Rather like Woody Allen's narrative digression as a structural method, though on reflection that is simply how ordinary anxious people think: one thing leads sideways to another, and the sideways turn contains more truth than any direct approach would. Wilson's camera, always handheld and voyeuristic, catches New York doing what cities do when no one is watching them, and his deadpan narration treats the footage as evidence for propositions that are never quite stated. <u>Each episode begins with a banal how-to premise and spirals into genuine meditation: loneliness, memory, the social contracts we maintain without knowing why.</u> The risotto episode is somehow about Phish. This is not a flaw.

    One season is exactly right. The format's vulnerability is predictability: once one has learnt the grammar of the digression, the next digression announces itself too early, and the surprise that made it moving calcifies into charm. Wilson's instinct to stop is similarly correct. What he made in six episodes is irreplaceable: <u>a portrait of urban solitude so precise that one finishes it feeling less alone, which is the trick that almost no art attempts and almost none pulls off.</u>


