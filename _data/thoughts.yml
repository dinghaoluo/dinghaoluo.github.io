- title: "Satantango"
  type: "book"
  creator: "László Krasznahorkai, trans. George Szirtes"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/satantango.jpg"
  posted: "2025-10-18"
  text: |
    Krasznahorkai writes the comings and goings of a desolate Hungarian village like a stage play that has somehow been left out in the rain. The twelve chapters answer to the steps of a tango, moving forward and back, from the bells, organ-thunder, rain, and dancing feet of the opening to the bell that returns at the end. That formal circularity could have felt too neat in another book, but here it gives the whole thing a grim, trance-like inevitability. Everyone seems to be moving, but only within a choreography already laid down for them. A mechanistic bureaucracy of human lives, if one wills.<br><br>
    It's incredible how compact the novel feels. The sentences are long, of course, but never muddy. One can follow Krasznahorkai's prose almost physically, scene by scene, voice by voice, as if the whole village were being slowly lit on a stage. The book's bleakness is real, but it is never monotonous. Again and again, misery tips over into absurdity, and absurdity into something close to comedy.<br><br>
    And then there is the doctor, still my favourite presence in the book: sitting by the window with his palinka, draining one glass and pouring the next, watching the world outside through his overgrown room and spinning out endless, pointless, magnificent conjectures. He feels like a perfect Krasznahorkai figure, half ridiculous and half tragic, at once detached from the village and totally trapped inside its orbit. *Satantango* is full of human wreckage, but it is arranged with such precision, and such bitter comic timing, that the whole ruin starts to feel almost musical.
    

- title: "When Breath Becomes Air"
  type: "book"
  creator: "Paul Kalanithi"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  image: "/assets/images/thoughts/when_breath_becomes_air.jpg"
  posted: "2025-10-25"
  text: |
    I went into *When Breath Becomes Air* hoping for a serious meditation on death, cancer, and the limits of medicine. Instead, I found a memoir that too often mistakes literary name-dropping for intellectual depth. Yeats, Eliot, Wittgenstein and others appear, but mostly as cultural shorthand rather than as thinkers Paul seems to have wrestled with in any sustained way. The same goes for the book's gestures towards philosophy and atheism. This may be harsh, but cancer does not automatically turn someone into a good writer.<br><br>
    What I found harder to accept, though, was the family ethic at the book's centre. Knowing he was dying, knowing he would never be able to put any real labour into raising a child, Paul still chose to have one with Lucy, and even returned to the OR after learning she was pregnant. The book clearly wants this to read as courage, vocation, fullness of life. I could only see a gifted neurosurgeon making choices that felt, at best, deeply questionable. By the end, I was less moved by his reflections than saddened by the loss of an exceptionally skilled surgeon. For a book so often praised for its wisdom on mortality, it left me thinking mostly about what was missing.

- title: "The Secret History"
  type: "book"
  creator: "Donna Tartt"
  creator_role: "by"
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/secret_history.jpg"
  posted: "2025-10-25"
  text: |
    My first Donna Tartt, and the prose is exactly as advertised: fluid, elegant, almost indecently easy to keep reading. What surprised me more was the texture of it. For long stretches, *The Secret History* feels less like a conventional psychological thriller than like a postmodern novel that happens to have wandered into a murder plot. After the opening chapters, I kept thinking: this is what Paul Auster always seemed to want to be, and never quite managed. Tartt understands that the real engine is not the mystery itself, but atmosphere, self-mythologising, and the slow corruption of perception. No wonder the novel has had the reception it has; it flatters the reader into complicity almost as well as Richard flatters himself.<br><br>
    The first half is excellent. The suspense is kept unusually clean, and the characters arrive with real contour rather than mere function. Charles and Francis in particular have that slightly excessive, faintly doomed vividness the book needs. Tartt is also very good at making the whole Hampden apparatus feel both ridiculous and dangerous, which is probably why the novel still towers over so many later dark-academia imitators.<br><br>
    The problem is that the second half does lose something. The plot and character work flatten out more than they should, and what had felt poisonous and singular starts, regrettably, to edge towards cliche. Even so, the final dissolution is deeply satisfying. Tartt clearly understands that a novel like this lives or dies by disintegration, by the sense that what was once hermetic and self-enclosed must eventually leak, fray, and rot. Looking back, one can imagine a leaner three-hundred-page version of *The Secret History* becoming an almost perfectly compact suspense novel, with tighter attention to its crucial nodes of action. At well over five hundred pages, the narrative does sprawl. But then again, this was Tartt's debut. As first novels go, it is still a little monstrous in the best way.

- title: "Waiting for Godot"
  type: "book"
  creator: "Samuel Beckett"
  creator_role: "by"
  year: 1951
  eval: "loved"
  image: "/assets/images/thoughts/waiting_for_godot.jpg"
  posted: "2025-10-26"
  text: |
    What's funny is that the supposedly 'anti-meaning' *Waiting for Godot* has ended up generating an absurd surplus of meanings. That is part of Beckett's trick. The stage is nearly bare, the tree signifies almost nothing except waiting itself, and Godot remains at once named and unknowable. Yet the emptier the apparatus becomes, the more violently readers and audiences try to fill it. Beckett strips drama back to a road, a tree, a pair of bodies, and a delay, and somehow that near-vacuum keeps behaving like a meaning factory.<br><br>
    In this baren world, we see residue of terror lying around the play's edges. Estragon is beaten, apparently as a matter of routine. Pozzo calls Lucky 'Pig' and drags him on a rope like a slave. The boy, or boys, arrive from Godot with their baffling little reports, carrying traces of threat and hierarchy they cannot themselves understand. Beckett gives us a world full of oppression, but wrapped in clowning, cross-talk, hat-swaps, and the exhausted shell of vaudeville. Apart from a few moments from Vladimir, almost nobody really takes any of it seriously.<br><br>
    That, I suppose, is where the sense of 'exactness' comes from. The play's emptiness is never really empty. Beneath all the waiting, repetition, and anti-meaning, one keeps seeing the ordinary social life of suffering: visible, undeniable, and somehow still treated as background noise. Beckett's world is absurd, yes, but it is also uncomfortably familiar.

- title: "As She Climbed Across the Table"
  type: "book"
  creator: "Jonathan Lethem"
  creator_role: "by"
  year: 1997
  eval: "liked"
  image: "/assets/images/thoughts/as_she_climbed.jpg"
  posted: "2025-10-31"
  text: |
    Isn't this just one of the most romantic science-fiction novels? *As She Climbed Across the Table* takes a premise that could easily have collapsed into pure gimmickry (a physicist falling in love with a void called Lack) and turns it into something at once absurd, tender, and... cosmic. One can't help but admire Lethem's tonal balance: Lethem keeps folding quantum uncertainty, obsession, and emotional blindness into one another without ever becoming pompous about it.<br><br>
    What really pushes it into the 'cult-classic' territory is the prose. The book is full of jokes, puns, and conceptual mischief, but never in the dead, overengineered way this sort of novel often risks. Lethem understands that a premise like this only works if it keeps its lightness. The result is a novel that moves between the miniature and the immense, between private jealousy and something like metaphysical longing, while remaining tremendous fun almost line by line. That playfulness is exactly why the romance lands. He does not take the whole thing too seriously, which is what lets it feel serious in the right places.

- title: "Maus"
  type: "book"
  creator: "Art Spiegelman"
  creator_role: "by"
  year: 1980
  eval: "loved"
  image: "/assets/images/thoughts/maus.jpg"
  posted: "2025-11-06"
  text: |
    Books like *Maus* only become more and more relevant in times like this. One of the book's most quietly devastating moments comes near the end of the second volume: after everything Vladek has lived through, after the camps, the family breaking apart, his son Richieu's death, his wife Anja's suicide, his parents turned into smoke through the crematoria, he still reacts with disgust when his younger son Art and Francoise (Art's fiancée) pick up a Black hitchhiker. Art's response is the obvious one: how can someone who suffered so much still be racist. Vladek's answer is worse precisely because it is so familiar: 'you don't understand. We were different.'<br><br>
    That scene is where *Maus* cuts deepest. It refuses the comforting lie that suffering automatically makes people better, broader, or more humane. Pain does not guarantee solidarity. Memory does not necessarily enlarge moral vision. One can survive catastrophe and still cling to the same brutal logic of 'us' and 'them'. In that sense, *Maus* is not just a Holocaust narrative or a book about inherited trauma. It is also a book about the limits of suffering as moral education.<br><br>
    Reading that scene, I could not help thinking of earlier genocides that Europe either ignored or absorbed with very little fuss, the same historical murk that Pynchon drags into *V.*. If one stays silent when others suffer, on what grounds does one later demand that one's own suffering be seen? *Maus* does not ask that question directly, but it leaves it hanging there all the same.

- title: "V."
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1963
  eval: "loved"
  image: "/assets/images/thoughts/v.jpg"
  posted: "2025-11-17"
  text: |
    My second favourite read of 2025. *V.* reads like young Pynchon was teaching himself just how much a novel could hold. Egypt, Virginia, New York, Malta, Paris, South-West Africa: every pocket of the book seems to be hiding another system, another ruin, another dead zone where history has gone slightly inanimate. The great subjects are already here in embryo: the deconstruction of the individual, the fake animosity between flesh and mechanism (SHROUD & SHOCK was such an interesting idea), slavery and colonial trade (South-west Africa makes its reappearances in later Pynchon novels as well), waste, plastics, prosthetics, siege, fetish, entropy. It's ingenious that Pynchon centres the novel partially around the idea of 'yo-yo'... Yo-yoing is not just Benny Profane's gimmick. It is the book's state of mind.
    The idea of a yo-yo is probably still my favourite thing in this novel. Anyone who has seen one can understand Profane drifting on the New York subway, shuttling between termini with all the pathos of movement and none of the dignity of progress. One can understand what Fausto Maijstral means by history's repetitions. One can understand why so many of the book's lives feel trapped in recoil, return, and re-enactment. The trajectories pile up more and more densely until identity itself begins to lose contour. The yo-yo keeps moving, but only within the limits of its string. That is what makes *V.* feel so different from the more monumental later Pynchons: it is already full of world-historical dread, but the dread is still spring-loaded, still comic, still flickering with schlemihl energy.
    Another thing that stays with me is how much of the novel is organised around the gradual victory of the inanimate. Machines, plastic, prosthetic surfaces, dead landscapes, human beings treated as objects and finally treating themselves the same way: all of it gives *V.* its peculiar chill. The book is still baggier than Pynchon's more mature masterpieces, and sometimes one can feel Pynchon reaching past his current grasp. But that is part of the thrill. The lines of force are already there, crossing and tangling like yo-yos on too few strings. Characters meet, miss, collide, return to origin, and set off again. One push, one release, back to the start. It is a novel of recurrences, and one of the very few debuts that already feels written by someone who has seen the whole sick circuitry.

- title: "Flesh"
  type: "book"
  creator: "David Szalay"
  creator_role: "by"
  year: 2025
  eval: "hated"
  image: "/assets/images/thoughts/flesh.jpg"
  posted: "2025-11-18"
  text: |
    One can see what admirers of *Flesh* are responding to. Szalay's stripped-down style has been praised as brutally pared back, all surface and bone, and most would be amiss to deny the novel's exteriority, inarticulacy, and how it portrays a man pushed along by forces larger than itself. Istvan's journey from Hungary through war, migration, money, and sex is clearly meant to register as a European life reduced to impulse, contingency, and damage. On paper, that sounds severe in an interesting way.<br><br>
    Nonetheless, in practice I found the book almost impossible to take seriously. Szalay's prose seems to depend on a kind of calculated quirkiness: the one-line paragraphs, the clipped present tense, the habit of stating something and then restating it in the next paragraph as though repetition by itself could generate force. Plenty of quirky novels exist, and much better ones too. Here the method feels almost technique-free, as if style had been reduced to a few visible tics and then left to do all the lifting. What others read as austere minimalism or a perfect match for Istvan's damaged inarticulacy, I mostly experienced as hollowness. By the second half, the whole thing had started to resemble a script draft with the connective tissue stripped out.<br><br>
    That is what finally put me off *Flesh*. I can sympathise with flatness, if it opens onto something harder, stranger, or more exact. Here it rarely does. The scenes arrive, the scenes stop, the bodies keep moving, and one is meant to infer depth from the blankness. Sometimes that works. More often it feels like being handed an affectless sequence of gestures and being asked to mistake omission for seriousness. Perhaps there are readers who genuinely enjoy being parcelled through a novel one thin paragraph at a time. I am not one of them.

- title: "Solenoid"
  type: "book"
  creator: "Mircea Cărtărescu, trans. Sean Cotter"
  creator_role: "by"
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/solenoid.jpg"
  posted: "2025-11-29"
  text: |
    I finished Mircea Cărtărescu's *Solenoid* over the course of nearly two weeks near the end of the year. Before that, I knew him only as one of those 'perennial Nobel names', and little more. And by the time I finished *Solenoid*, I had already placed Cărtărescu beside Pynchon as one of my two favourite living writers.
    Cărtărescu's Romania exudes a magical realism that is grounded in reality but never confined by it, and the novel finds a strange equilibrium between the grotesque and the ingenious. What impressed me most was how thoroughly it rewired my sense of what belonged to the novel and what belonged to the world. When the Voynich manuscript appeared, I half-assumed, idiotically, that it too must be one of Cărtărescu's inventions ('Well this surely sounds fictional enough...'). Then came Charles Hinton, The Gadfly, the fourth dimension, and all the rest. Reading *Solenoid* felt like (borrowing a phrase from the book) returning to a child's mode of perception, where dreams and memories, myths and facts, all seem made from the same substance.
    And then there is Bucharest itself, which in *Solenoid* becomes a gigantic living thing. The city sings, with its solenoids humming through blind walls, labyrinthine school corridors, ship-shaped houses, mortuaries full of Picketists crying for help, and nightmare after nightmare that leaves one short of breath. Beneath all this, the novel keeps asking the largest questions in the most intimate way. What is reality? What is memory? How do we escape? (And escape from what?) This was my favourite read of 2025, and not by a small margin.

- title: "The Call of Cthulhu and Other Weird Stories"
  type: "book"
  creator: "H.P. Lovecraft, ed. S.T. Joshi"
  creator_role: "by"
  year: 1928
  eval: "liked"
  image: "/assets/images/thoughts/call_of_cthulhu.jpg"
  posted: "2025-12-08"
  text: |
    My first Penguin Orange, and S.T. Joshi's editing is excellent. What he does especially well is give the collection a real gradient: it begins with the earlier, less fully mythos-bound pieces like *Dagon* and the smaller thrillers, then gradually moves towards the heavier, more fully embedded novellas like *The Call of Cthulhu* and *The Shadow over Innsmouth*. That structure suits Lovecraft unusually well. One can feel the mythos thickening story by story, without the book ever collapsing into a mere sampler of the 'famous ones'.<br><br>
    What surprised me most was that the short stories are often better, and certainly more durable, than the longer pieces. The moments that stayed with me most are mostly in the shorter works: the blood dripping from the roof in *The Picture in the House*, the despair of *The Outsider* when the narrator finally looks into the mirror. The novellas may be more important to the Lovecraftian superstructure, but the shorter stories often hit harder, with less drag and less pulp flab. They feel closer to the nerve.
    My favourites, in order: *The Colour Out of Space*, *The Whisperer in Darkness*, *The Picture in the House*, *The Outsider*, and *The Rats in the Walls*.

- title: "Models of the Mind"
  type: "book"
  creator: "Grace Lindsay"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/models_of_the_mind.jpg"
  posted: "2025-12-14"
  text: |
    Within a relatively slim volume, Grace Lindsay pulls off something borderline marvelous: a lucid, genuinely readable survey of the major models in neuroscience, from perceptrons and attractors to deep convolutional networks, Bayesian inference, and beyond. That alone would already be an impressive feat. What makes *Models of the Mind* stand out, though, is the book's deeper architecture: the historical through-lines, the scientist-profiles, the knack for finding metaphors that clarify without dumbing anything down. For me, it has become the only truly indispensable introductory book for anyone trying to understand computational neuroscience as a field rather than as a scattered heap of fashionable terms.<br><br>
    My favourite passages are still the ones where the conceptual scaffolding briefly gives way to biography and contingency: Hodgkin and Huxley moving through the years before, during, and after the Second World War; Pavlov, still bent over his workbench amid political turbulence; Pitts and McCulloch hashing things out at that fertile border between philosophy, psychology, and early neural-network thinking. Those episodes make the book's larger point impossible to miss. Neuroscience did not spring fully formed from wet-lab empiricism. It is rooted, stubbornly and inescapably, in philosophy and mathematics. Strip either away, and the whole enterprise starts to grope in the dark.

- title: "Inherent Vice"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/inherent_vice.jpg"
  posted: "2025-12-19"
  text: |
    Another 'Pynchon-lite'. *Inherent Vice* reads much more smoothly than *Shadow Ticket*, and the jokes and puns land far more often for me (than did the ones in *Shadow Ticket*), but I still couldn't help but felt that faint, lingering sense that Pynchon is not especially good at writing dense dialogue. Watching PTA's adaptation gave me the same feeling. Counter-intuitively, Pynchon's prose is deeply dialogic: He is always dropping subjects, bending syntax, making the narration itself sound half-spoken... and yet when he actually writes extended dialogue, it can start to feel oddly theatrical.<br><br<
    The film only makes that clearer. Lines that feel airy and playful on the page can become stagey once transferred more or less directly into speech. There is something slightly 'overperformed' about them, as though Pynchon is always at his best when dialogue is filtered through prose rather than left to stand on its own. That does not ruin the novel, but it does give it a particular texture: one is always aware that the voices are being mediated by a stylist, not simply overheard.<br><br>
    Still, I liked it a great deal. I like Pynchon's detective stories, I like his unique way of disclosing a mystery's 'solution', and I like his sentences too much to mind the awkwardness for long. As with *Shadow Ticket*: it was tremendous fun reading it.

- title: "The Prose Edda"
  type: "book"
  creator: "Snorri Sturluson, (ed.) Jesse L. Byock"
  creator_role: "by"
  year: 1220
  eval: "liked"
  image: "/assets/images/thoughts/prose_edda.jpg"
  posted: "2025-12-24"
  text: |
    Compared with the mythologies of many other religions and peoples, the Norse myths preserved in the *Prose Edda* feel much looser and less orderly, but also darker and far more direct. Snorri and the old Norse mythologised almost everything (e.g. wind, war, clouds) and yet the world they built never really hardened into a stable moral or intellectual system. That looseness is part of what makes the *Prose Edda* so distinctive.<br><br>
    What struck me most is that these gods are barely better than human beings, if at all (which reminded me of Greek myths at large). They are violent, morally compromised, and often irrational. Thor, while accompanying Baldr's body to Hel, casually kicks the dwarf Litr to death. Odin steals Suttungr's mead through deception. Loki causes disaster after disaster, and only very late does anyone impose real punishment on him. Again and again, the gods feel less like ideals than like magnified human defects.<br><br>
    That, to me, is what makes Norse mythology especially singular. Its gods are not humanity's better version, not morally, not intellectually, not even temperamentally. If anything, the giants often seem more impressive in knowledge. What the *Prose Edda* gives us is a mythological world in which divinity does not purify human weakness, but enlarges it. That is why it feels stranger, harsher, and more alive than most.

- title: "The City & the City"
  type: "book"
  creator: "China Miéville"
  creator_role: "by"
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/the_city_the_city.jpg"
  posted: "2026-01-18"
  text: |
    Marketed as 'new weird', though in truth neither especially new nor especially weird. What The City & the City does have is a superb premise: Beszel and Ul Qoma occupying the same physical space, their citizens drilled into the discipline of 'unseeing', and a murder that slips between the two and involves a 'Big Other'. The problem is that the idea is stronger than the world built to sustain it.<br><br>
    That weakness becomes harder to ignore in the second half. At first the conceit is so elegant that one is willing to go along with almost anything. Later, the seams start showing, and the suspension of disbelief becomes hard to maintain: What happens if a Beszel dog runs into Ul Qoma? Why do objects not constantly drift physically into the other city? The novel works far better as allegory (selective perception, social training, learned blindness etc.) than as an actual inhabited world. Once the literal mechanics start demanding attention and conscious recalibration from the reader in order to work, suspension of disbelief begins to thin out fast.<br><br>
    What disappointed me most, though, was the ending. For much of the novel, Breach and Orciny hang over everything with the promise of something truly uncanny. Then the final stretch shrinks that charge into something half-political, half-conspiratorial, almost bureaucratic in its smallness. Clever, yes. Haunting, not really. A premise this good should have opened into something stranger, darker, and more disorienting. Instead it settles for being ingenious. Guess I should have tried harder to manage my expectations.

- title: "Gravity's Rainbow"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1973
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/gravitys_rainbow.jpg"
  posted: "2026-03-01"
  text: |
    Years later, I will still remember the V2 fragments scattered across London, the Kryptosam message hidden inside them, and the four tragedies behind that message. I will still remember Katje's ancestor Frans van der Groov and the dodos of Mauritius, the Hereros in Südwest Afrika, and the genocide of Europe's Jews. I will still remember the air in Germany's postwar 'Zone', with its creosote and fuel, and that thin, diffused hope drifting through it all. What *Gravity's Rainbow* never allows is the comfort of treating these as separate histories. Pynchon keeps binding them into one continuum, one long modern history in which extermination recurs, and in which progress seems to refine technique far more reliably than it does conscience.<br><br>
    That is why the V2 matters so much. The German rocket operators fire a calculation; the rocket hits a coordinate. No face, no voice, no legible human life lost. Just... numbers. In that sense the rocket brings colonial horror home: the same anonymity that had long made massacre possible elsewhere (the Namas, the Hereros...) now falls westward on London.<br><br>
    Against all this stand Franz Pökler and Ilse: while the rocket has its Brennschluss, its differentials and trajectories, Pökler measures time in years, watching his daughter grow up, not knowing that at some point he will no longer be able to see her at all. One also watches helplessly as Slothrop, initially an actual human with intentions, ambitions and hopes, gradually dissolving into a spectre, losing (or gaining?) all of his freedom, becoming eventually only a legend in the wind blowing through 'the Zone'. With language that is at once unruly and exact, Pynchon writes, in some sense, the most anti-mainstream Second World War novel: no clean heroism, no stable moral centre, only the oscillation between 'the System' and 'the Zone', between the terror that everything connects and the terror that nothing does. And so, with Slothrop, as the self comes apart in 'the Zone', I look up at the vast rainbow after the rain and feel every emotion at once — grief, awe, pity, terror — with tears gathering at the rim of the eye.

- title: "Bleeding Edge"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/bleeding_edge.jpg"
  posted: "2026-03-11"
  text: |
    My favourite of all the 'Pynchon-lites'. Set in 2001 (that strange year when after the attack, people had not yet settled on what to call it — '11 September'? '9/11'? ...), *Bleeding Edge* turns the world into a web of unexpected connections. The invisible lines between Silicon Alley start-ups, the FBI, Gulf money, and the coming security state run through characters who at first seem to have nothing to do with one another. Ah, the **grand web of paranoia** that Pynchon fans are so familiar with... What gives the book its peculiar tension is that Pynchon holds the 9/11 attacks back until surprisingly late, so that much of the novel unfolds under a suspended future terror everyone already knew was coming.<br><br>
    It is also the most humane of the 'Pynchon-lites'. Maxine may initially resemble Oedipa Maas (quick, intuitive, alert to hidden patterns) but she is far more distinct and fully realised. Pynchon stays unusually close to her consciousness, and that closeness gives the novel an emotional weight rare in his other works (bar maybe *Mason & Dixon*). I think of Maxine and Horst's half-broken, half-enduring relationship, her life with Otis and Ziggy, and March's antithetically broken family... Critics often note the book's domestic core, and they are right to do so: beneath all the paranoia, this is one of Pynchon's warmest novels.<br><br>
    That warmth is what makes the novel linger. Yes, it does capture the moment when the internet age curdles into the age of terror and 'security'; and yes, DeepArcher remains one of Pynchon's most haunting creations. But what stays with me is that *Bleeding Edge*, for all its conspiracies and terrors, never loses sight of ordinary emotions (clearly exemplified in both the opening and ending chapters of the book). Well, this is only my personal opinion: of all the later Pynchons, this is the one PTA should adapt.

- title: "Is a River Alive?"
  type: "book"
  creator: "Robert Macfarlane"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/is_a_river_alive.jpg"
  posted: "2026-03-20"
  text: |
    Does Robert Macfarlane really care about rivers? To say 'no' would be unfair: Indeed, it must have taken a lot of effort to follow Giuliana, Yuvan, and others through three river worlds in Ecuador, India, and eastern Canada, and Macfarlane has been partaking for years in the wider 'Rights of Nature' conversation. But to say 'yes' without qualification would not be justified. For a book with such an ambitious question as the title, the rivers themselves often feel strangely out of focus, displaced by companions, by advocacy, by atmosphere. Well... what *about* the rivers?<br><br>
    Much of the book reads like a long prelude to an argument that never quite arrives. That probably explains the repeated return to the 2017 Whanganui River settlement: it remains one of the clearest and most famous examples available. But even then, the case is more 'invoked' than 'tested'. Macfarlane never really supplies the philosophical or legal rigour needed to make the idea that 'a river *is* alive' feel fully earned. The book seems to want conviction from the reader before it has done enough to engender it.<br><br>
    That is what makes the book so frustrating. The prose is indeed lyrical, and the urgency is real enough, but the Macfarlane's proposal stays oddly hollow. The content feels thin, the people flatter than they should be, and one keeps coming back to the same question: what exactly is Macfarlane trying to persuade the reader of? By the end, this one unkind thought is hard to shake: 'A river may be alive, but certainly can't say the same for some characters in this book.'

