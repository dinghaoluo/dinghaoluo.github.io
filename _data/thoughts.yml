- title: "Is a River Alive?"
  type: "book"
  creator: "Robert Macfarlane"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/books/is_a_river_alive.jpg"
  posted: "2026-03-21"
  text: |
    Does Robert Macfarlane actually care about rivers? The question sounds ungenerous, but ***Is a River Alive?*** earns it. Macfarlane follows Giuliana, Cosmo, Yuvan and others into three different rivers' stories, which suggests some level of caring, but the rivers are never honoured in their physical form, never allowed to exist on the page as more than rhetorical devices; the flowing water is named but never felt. <u>The whole thing feels like an extended preamble to an empty thesis.</u> Macfarlane keeps invoking New Zealand's 2017 Whanganui River claim, Ecuador's constitutional provisions, the briefly granted personhood of the Ganges, because there are not many other solid cases, and none of them have meaningfully prevented ecological destruction. The *rights-of-nature* framework is offered with lyrical intensity but without philosophical or legal argument for the proposition that 'a river *is* alive'. Well if that's the case, what is Macfarlane trying to persuade one of?

    The book was called 'hypnotic' and 'urgent' when it came out, which is precisely the kind of language that flatters urgency without interrogating it. The hollowness of the content and the flatness of the characters end up producing a verdict harsher than I intended: <u>a river may be alive, but some people probably are not really alive.</u> Macfarlane writes beautifully, as always, but beauty without substance is decoration, and one expects more from a writer of his intelligence.

- title: "Les Déserteurs"
  title_en: "The Deserters"
  type: "book"
  creator: "Mathias Énard"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/books/deserters.jpg"
  posted: "2026-03-18"
  text: |
    Énard braids a foot soldier's trudge against a mathematician's cartography of historical pattern, both arcs reaching toward a totalising sweep of twentieth-century violence and displacement. The premise is sound; the execution is dutiful. ***The Deserters***, however, reads like a novel designed rather than written, each voice mechanically alternating without ever achieving the friction that would make one forget the architecture and simply follow the prose. One finishes it respecting the ambition but remembering almost nothing.

    Énard relies on the long, unbroken sentence, the prose carrying the weight of history in its refusal to pause. Here it feels more like obligation than discovery; the sentences unspool competently without building the momentum that would justify their length. The critical consensus positions Énard as a successor to the French maximalist tradition, and perhaps his other novels earn that comparison; this one does not. <u>The polyphony is technically accomplished and emotionally inert, a structure in search of its own urgency.</u>

- title: "Capitalist Realism: Is There No Alternative?"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2009
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/books/capitalist_realism.jpg"
  posted: "2026-03-18"
  text: |
    Reading the afterword to Mark Fisher's first 'pamphlet', I kept picturing him in that small cabin, sorting through scattered notes on the eve of Occupy Wall Street and the Egyptian revolution, and felt an uncontrollable rush of admiration, and of sadness. There is something peculiarly moving about encountering ***Capitalist Realism*** from the threshold of 2009/2010: before the cracks had fully opened, before anti-capitalism briefly recovered the sense that it might once again speak in the future tense.

    The usual objection is that the book lacks philosophical substance, that it names a mood rather than constructs an argument. Fair enough: Fisher is not doing *Žižek*, and is not trying to. What he is doing, in barely eighty pages in the first edition, is something rarer: <u>handing an entire generation the vocabulary for what it already felt but could not say</u>. The privatisation of stress. The depoliticisation of mental illness. The way ecological catastrophe gets endlessly 'acknowledged' and then quietly metabolised, as though the acknowledgement itself were the solution. These are not arguments in the academic sense; they are acts of naming, and they land with the force of recognition. The orthodox left will note that Fisher never quite identifies capitalism as a social relation rooted in labour exploitation, that the critique floats as phenomenology unmoored from political economy. There is something to this. But Fisher understood that <u>no amount of 'correct' structural analysis matters if nobody can feel the structure pressing on them, and that making it felt is not ancillary to politics but prerequisite</u>. The very success of the phrase 'capitalist realism' proves the point: it entered the lexicon precisely because it named what was already there, inarticulate and suffocating.

    Philosophical arguments aside, Fisher's prose is so compressed and so precise that individual sentences carry the weight of entire chapters elsewhere. That closing line, 'From a situation in which nothing can happen, suddenly anything is possible again', manages to be a political programme and a prayer in the same breath. Knowing now about the unfinished *Acid Communism*, where Fisher was beginning to reframe neoliberalism not as an inevitability but as a counter-revolution against the thinkable, the pamphlet's final pages feel less like a conclusion than a coiled spring. By the end I was close to tears, not because the book solves anything (it does not, and it knows it does not), but because someone found the words.


- title: "Bleeding Edge"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/books/bleeding_edge.jpg"
  posted: "2026-03-11"
  text: |
    My favourite among the Pynchon-lites. *Inherent Vice* (2009) entertained me, *Shadow Ticket* (2025) amused me; ***Bleeding Edge*** stayed with me. In the year when nobody quite knew what to call that attack, when '11 September' and '9/11' were still competing for semantic territory, Pynchon charts the invisible threads linking American internet start-ups, the FBI and Gulf states, threading them through seemingly unrelated characters and producing countless set pieces that feel at once absurd and historically precise. <u>The DeepArcher virtual world reads now as elegy for the internet's lost utopian promise, and the novel's paranoid circuitry, its suspicion that <em>surveillance capitalism</em> was already embedding itself in the architecture of everyday life, has aged into prophecy.</u>

    It is also the most human of the Pynchon-lites, perhaps of all Pynchon (bar *Mason & Dixon* [1997]). Maxine's semi-separation from Horst carries real emotional weight; she reads like a sharper, more distinct Oedipa Maas from *The Crying of Lot 49* (1966), a woman whose investigative compulsion is not a retreat from feeling but a form of it. The domestic texture, Maxine and Horst circling each other while the boys orbit the uncertainty, earns the novel its emotional centre. Critics have called it Pynchon's most 'accessible' novel, which is true enough but misses the point: accessibility here is not a concession but a structural choice. <u>The domesticity is the ground against which the conspiracies register.</u> One walks through Silicon Alley alongside Maxine and feels the grief of a city still in shock, still trying to metabolise what happened, and the prose holds both the noir comedy and the mourning in the same breath. Will PTA adapt *Bleeding Edge*? I hope so. But I suspect only Pynchon's sentences can do this particular thing.

- title: "Gravity's Rainbow"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1973
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/books/gravitys_rainbow.jpg"
  posted: "2026-03-01"
  text: |
    Years from now I will still remember the V2 rocket shards scattered across London, the Kryptosam messages hidden inside them, the four tragedies behind those messages. I will still remember Katje's ancestor Frans massacring the dodos of Mauritius, the early twentieth-century German army massacring the Herero people of Africa, the Nazi army massacring European Jews in the Second World War. I will still remember the diffuse hope drifting through the wood-smoke air of the Zone in 1945, after the war ended. <u>These images persist not because Pynchon labours to make them beautiful, though they are, but because the structure of ***Gravity's Rainbow*** lodges them in one's mind the way the rocket's parabola lodges itself in the sky: an arc that contains both ascent and annihilation, both promise and gravity.</u>

    Inside each V2, a pendulum device integrated acceleration into velocity to calculate Brennschluss, the instant of engine cutoff where ascent surrendered to gravity. Franz Pökler was watching his daughter Ilse grow up in the same calculus: each annual visit to the camp a single data point, each integral converging, for both rocket and girl, on disappearance. <u>That is what this novel does better than any other war novel I have read: it makes the mathematics of destruction and the mathematics of a life rhyme, and the rhyme is unbearable.</u> The Pulitzer board called it 'unreadable' and 'obscene'. Both charges contain a grain of truth: Pynchon demands that one read against the current, and the obscenity is the world's, not his. The Zone is the space where national identities dissolve, where the *Elect* and the *Preterite* shuffle past each other in the rubble, where paranoia and anti-paranoia become indistinguishable. The Elect/Preterite distinction is perhaps Pynchon's most original theological contribution: a Calvinist framework repurposed to describe every system of power, every division between those who ride the rocket and those who are crushed beneath it. The novel's own form enacts this entropy, its narrative fragmenting and dissolving as surely as Slothrop does, until the text itself becomes a kind of Zone. Edward Mendelson called it an 'encyclopedic narrative' in the tradition of Dante and Melville. I would add only that it is also a deeply personal one.

    Pynchon, in unruly but precise language, writes the most anti-mainstream Second World War novel imaginable, and <u>I found myself dissolving alongside Slothrop in the Zone, watching a magnificent rainbow arch after the rain, eyes brimming.</u>

- title: "The City & the City"
  type: "book"
  creator: "China Miéville"
  creator_role: "by"
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/books/the_city_the_city.jpg"
  posted: "2026-01-18"
  text: |
    ***The City & the City*** is called *new weird*, but it is neither new nor weird. The premise, two cities occupying the same physical space, is interesting; it won the Hugo, the Clarke, the World Fantasy, and the Locus, which tells one more about prize committees than about the novel. Miéville's world-building is surprisingly poor for someone whose Bas-Lag novels thrive on maximalist invention. I kept losing suspension of disbelief in the second half: what happens to a dog from Besžel that wanders into Ul Qoma? Why would objects from one city not constantly end up in the other? <u>The concept of <em>unseeing</em> is philosophically rich, a Foucauldian disciplinary mechanism internalised as perception, but Miéville never interrogates it with the seriousness it deserves.</u>

    The ending is the real disappointment. The final thirty pages collapse a potentially myth-laden story into something half corporate thriller, half political farce. Breach, which should function as the novel's sublime unknowable, gets explained into banality. I should have tried harder to manage my expectations. <u>There is a version of this book that earns its allegorical weight, that makes the seeing and unseeing feel as strange and inevitable as Kafka's castle.</u> This is not that version.

- title: "Slaughterhouse-Five"
  type: "book"
  creator: "Kurt Vonnegut"
  creator_role: "by"
  year: 1969
  eval: "disliked"
  image: "/assets/images/thoughts/books/slaughterhousefive.jpg"
  posted: "2026-01-06"
  text: |
    I understand the book's canonical status, and Vonnegut's formal nerve is real: compressing the Dresden firebombing into a slim, unstuck-in-time fable takes a kind of courage. But ***Slaughterhouse-Five*** did not work for me. <u>The deadpan repetition of 'So it goes' has been called everything from the most effective literary device of the twentieth century to a morally irresponsible trivialisation of mass death.</u> I lean toward the latter. So it goes.

    Billy Pilgrim's passivity, far from being a radical critique of agency, reads to me as authorial abdication: Vonnegut uses time-travel as a *narrative anaesthetic*, numbing both character and reader to the violence rather than forcing confrontation with it. <u>The result is a novel that mistakes detachment for depth, and repetition for profundity.</u> Perhaps one needs to have read it in the shadow of Vietnam, when the deadpan itself felt like dissent. I came to it too late, and the distance shows.

- title: "The Prose Edda"
  type: "book"
  creator: "Snorri Sturluson, (ed.) Jesse L. Byock"
  creator_role: "by"
  year: 1220
  eval: "liked"
  image: "/assets/images/thoughts/books/prose_edda.jpg"
  posted: "2025-12-24"
  text: |
    Compared to the mythologies of other religions and peoples, Norse mythology as Snorri renders it, rooted in Iceland, filtered through a Christian lens and a *euhemeristic* framing device, is more chaotic, looser, but also darker and more direct. Snorri mythologises everything: wind, war, clouds. His gods are virtually indistinguishable from mortals, their temperaments and knowledge systems riddled with contradictions. Scholars like Anthony Faulkes and Ursula Dronke have long debated how much Snorri's systematising impulse reshaped oral traditions that were originally fragmentary and incoherent; <u>what survives, though, feels less like a polished theology and more like a record of divine dysfunction.</u> The gods slaughter the innocent: Þórr casually kicks the dwarf Litr to death on the way to send Baldr's body to Hel. They are morally bankrupt: Óðinn stealing Suttungr's mead with the self-righteousness of a conqueror. They are irrational: actual punishment for Loki only arriving after he has caused untold damage.

    Norse gods are not a better version of humanity in terms of morality, knowledge, or reason. The giants are actually wiser. <u>That is what makes Norse mythology singular among the world's religious narratives: it does not idealise its own pantheon.</u> The Ragnarök passage, frequently cited as one of the most powerful *eschatological* narratives in world literature, gains its force precisely because the gods who fall are already compromised, already petty, already too human. One reads the ***Prose Edda*** not to worship but to recognise.

- title: "Inherent Vice"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/inherent_vice.jpg"
  posted: "2025-12-19"
  text: |
    ***Inherent Vice*** is Pynchon's light novel. It reads far more smoothly than Shadow Ticket, and the jokes and puns suit my taste better, but there is a faint nagging feeling that Pynchon is not great at high-density dialogue. The PTA adaptation exposes this counterintuitively: Pynchon's prose is conversational, he regularly drops subjects mid-sentence, but his dense conversational scenes feel theatrical, and PTA's lines lifted straight from the text carry that same stagey quality. <u>The 'inherent vice' of the title, a legal term for a commodity's tendency to destroy itself, functions as a quiet metaphor for the counterculture's self-destruction at the turn of the seventies, the moment between the Summer of Love and the Manson murders when the dream curdled.</u>

    Still, I love Pynchon's detective stories, love how he reveals the mystery by refusing to resolve it, love his sentences. Doc Sportello is a stoned Philip Marlowe wandering the circuit-board streets of late-sixties Southern California, and if one never quite trusts what he understands, that is the point: epistemological uncertainty as genre principle. Same as Shadow Ticket: it was tremendous fun reading it. And <u>in Pynchon's catalogue, tremendous fun is never just fun.</u>

- title: "Models of the Mind: How Physics, Engineering and Mathematics Have Shaped Our Understanding of the Brain"
  type: "book"
  creator: "Grace Lindsay"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/books/models_of_the_mind.jpg"
  posted: "2025-12-14"
  text: |
    Fitting a proper survey of neuroscience's major models, Perceptron, attractor networks, DCN, Bayesian models, into a relatively slim volume is already an astonishing feat. Add Lindsay's accounts of each model's development history, sketches of key figures, accessible analogies, and clear examples, and ***Models of the Mind*** becomes, in my mind, the only essential introductory text for understanding computational neuroscience. The field has needed a book like this for years: something that sits between overly technical textbooks and the simplifications of popular science, something that respects the mathematics without weaponising it against the uninitiated. Lindsay, a computational neuroscientist herself, writes with the quiet authority of someone who has actually worked with these models, not merely read about them.

    My favourite passages: Lindsay on Hodgkin and Huxley's research before, during, and after the war, the way a world conflict interrupted and then redirected a programme of work that would reshape our understanding of neural signalling. Pavlov quietly in his lab through years of upheaval, the science continuing as the world outside burned. Pitts and McCulloch discussing philosophy and psychology while developing the first computational neurone model, two minds from utterly different backgrounds converging on a formal description of thought itself. <u>Every origin story of these models is a reminder that neuroscience is rooted in philosophy and mathematics.</u> Without both, we would be lost. <u>Lindsay makes one feel this not as a platitude but as a lived intellectual history, and that is rare.</u>

- title: "The Call of Cthulhu and Other Weird Stories"
  type: "book"
  creator: "H.P. Lovecraft, ed. S.T. Joshi"
  creator_role: "by"
  year: 1926
  eval: "liked"
  image: "/assets/images/thoughts/books/call_of_cthulhu.jpg"
  posted: "2025-12-08"
  text: |
    My first Penguin Orange. S. T. Joshi's editing is excellent: starting with *Dagon* (1917) and early stories less embedded in the Lovecraft mythos, building gradually to ***The Call of Cthulhu*** and *The Shadow Over Innsmouth* (1936), the collection maps a trajectory from apprentice weird fiction to the fully realised *cosmicism* of the later tales. The Penguin Classics imprimatur did real work for Lovecraft's literary legitimacy, placing him alongside Poe and Hawthorne in a series that implicitly argues for canonical status. <u>Whether one accepts that argument depends on how much one can metabolise the racism, which is not incidental to the fiction but often structural, woven into the very texture of what Lovecraft finds horrifying.</u>

    Surprisingly, the shorter stories are more gripping and more durable. My favourite passages and scenes are mostly in the shorts: the bleeding roof in *The Picture in the House* (1921), the narrator's despair in *The Outsider* (1926) looking into the mirror, the slow chromatic contamination in *The Colour Out of Space* (1927). Lovecraft's prose is famously purple, his characters flat, but in the compressed form of the short story these weaknesses matter less; the atmosphere does the work that character cannot. Favourites in order: *The Colour Out of Space* (1927), *The Whisperer in Darkness* (1931), *The Picture in the House* (1921), *The Outsider* (1926), *The Rats in the Walls* (1924). <u>One keeps returning to Lovecraft not for the writing, which is often overwrought, but for the feeling: that cold, vertiginous sensation of the human scale dissolving against something vast, indifferent, and very old.</u>

- title: "Solenoid"
  type: "book"
  creator: "Mircea Cărtărescu, trans. Sean Cotter"
  creator_role: "by"
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/books/solenoid.jpg"
  posted: "2025-11-29"
  text: |
    Cărtărescu's Bucharest is a vast living organism. The veins extending from the city centre vibrate with the solenoid's hum, breaking through the gaps in a neighbour's blind wall and the skin between librarian Palamar's thumb and forefinger. His prose is so precise, so sensorily saturated, that after six hundred pages scenes still rise up unbidden: Irina pressing the button by her bed, slowly descending from the ceiling; hundreds of Picketists screaming for help before the city-centre mortuary; the boat-shaped house; the labyrinthine school corridors; the narrator's nightmares pressing down on me too. <u>The failed-poet-turned-schoolteacher who narrates this book is not Cărtărescu, and is entirely Cărtărescu: a consciousness so porous that Bucharest's topography becomes indistinguishable from the topography of thought itself.</u> In a tradition running from Kafka through Borges to Schulz, the city is both literal and impossible, its architecture obeying *dream-logic* while remaining stubbornly, concretely Romanian.

    Between hallucination and dream, between solenoid and belly button, the book asks: what is reality? Is it the navel one can touch, the lice in one's hair? Then what are the other dimensions one cannot see, the ones that might offer answers, an escape plan? Memory is not reality, so what is memory? What lies at the city's edge, reachable by tram 21? Is a god who abandoned us still a god? Does an unreadable text carry meaning? <u>And finally, the question that gives the whole book its gravitational pull: how does one get saved?</u> The usual charge against Cărtărescu is maximalism, excess, a prose so rich it risks toppling into self-indulgence. Fair enough: this is not a novel that respects economy. But the maximalism is structural, not decorative. Every hallucinated image, every recursive nightmare, every obsessively catalogued Bucharest street feeds the same metaphysical engine. The book earns its six hundred pages because each one presses harder on the question of whether reality has an outside.

    What stays with me is the texture: the way Cărtărescu renders consciousness as a space one inhabits rather than a faculty one possesses. The solenoid under the house is not a metaphor. It is the thing itself, the hum beneath the ordinary, the force that warps the floorboards and lifts a woman from her bed. That the Nobel committee has not yet recognised him feels less like an oversight than a scandal. <u>One finishes ***Solenoid*** not with answers but with the physical sensation of having been somewhere, having touched something real that cannot be named.</u> The closest analogue I know is waking from a dream one cannot quite recover, knowing it mattered, knowing it is already dissolving. The Picketists' revolt against death reads as political allegory: a protest movement whose enemy is not a regime but mortality itself, futile and magnificent in equal measure. The Voynich manuscript that threads through the novel is the perfect Cărtărescu object, real yet untranslatable, saturated with meaning that can never be confirmed. And the narrator's failed literary debut, the manuscript rejected by the Romanian establishment, mirrors Cărtărescu's own fraught relationship with a national canon that could never quite contain him.

- title: "Flesh"
  type: "book"
  creator: "David Szalay"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/books/flesh.jpg"
  posted: "2025-11-18"
  text: |
    Cannot accept the sheer number of hollow, empty sentences and scenes. Szalay's method in ***Flesh*** seems to depend entirely on a kind of studied quirkiness: his favourite move is 'say it once, then repeat in the next paragraph'. Quirky novels abound, and Szalay's is the least skilful, least substantial version of the impulse. 'He looks in the fridge. He smokes on the balcony. He watches TV.' <u>The critics have been calling this formally audacious; I call it formally vacant.</u>

    The contrast with Cărtărescu is instructive. Where Cărtărescu's maximalism in *Solenoid* (2015) earns its excess through genuine metaphysical ambition, pressing relentlessly against the limits of what fiction can hold, Szalay's minimalism never opens onto anything harder or stranger. <u>The spareness is not restraint; it is the absence of anything that would require restraint.</u> One finishes the book suspecting that the repetition-as-technique is not a style but a crutch, a way of filling pages without the burden of having something to say.

- title: "V."
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1963
  eval: "loved"
  image: "/assets/images/thoughts/books/v.jpg"
  posted: "2025-11-17"
  text: |
    Thousands of themes buried in Pynchon's Egypt, Virginia, New York, Malta, Paris, and mainland Italy: from modernity's dismantling of the individual (SHROUD and SHOCK, the 'Bad Priest's' progressive replacement of flesh with prosthesis and fetish), to the slave trade and pre-war African dealings (Bondelswarts bodies pressed together), to the shift from analogue to digital signal (the Kilroy figure scrawled across half a century). The dual structure, Profane's purposeless drift against Stencil's paranoid quest, enacts the central tension of *postmodern* existence: between entropy and the desperate imposition of meaning. Stencil reads V. into everything because he must; Profane reads nothing into anything because he cannot. <u>Between these two failures of interpretation, Pynchon builds an entire world.</u>

    But among all these themes, my favourite is Pynchon's yo-yo. Anyone who has ever watched a yo-yo understands Profane drifting aimlessly between first and last stops on the New York subway, understands Maijstral's repeating history, understands the tree-fruit-bird-shit-tree cycle in Slab's Cheese Danish No. 35, and can see the dozens of characters looping, crossing, colliding through this novel: dozens of yo-yos, inextricably tangled in eternal motion, their identities losing all meaning. <u>The yo-yo is Pynchon's most elegant image because it contains everything the novel wants to say about determinism and drift without requiring a single explanatory sentence.</u> What scholars call 'encyclopaedic narrative', what the poststructuralists call *ontological instability*, Pynchon calls a yo-yo.

    The Herero genocide chapters remain among the most devastating things Pynchon has written, and he was twenty-six when he wrote them. The systematic extermination in German South-West Africa, rendered with clinical precision and moral fury, announces the scope of Pynchon's moral vision from the very start. V. herself, progressively replacing her body with clockwork and glass until the children of Malta disassemble her on the street, is the novel's darkest joke: the Enlightenment project literalised as self-destruction. <u>One finishes ***V.*** feeling that Pynchon arrived fully formed, already in possession of every tool he would later refine.</u> The yo-yos are still spinning.

- title: "Maus"
  type: "book"
  creator: "Art Spiegelman"
  creator_role: "by"
  year: 1991
  eval: "loved"
  image: "/assets/images/thoughts/books/maus.jpg"
  posted: "2025-11-06"
  text: |
    Perhaps in the current climate, a book like ***Maus*** matters more than ever. Near the end of Part II, after Nazi persecution, family collapse, the eldest son dead, his wife a suicide, their parents reduced to smoke from concentration camp furnaces, the father, seeing his son and daughter-in-law give a Black man in New York a lift, says: how could you? Art asks: 'How can you, of all people, be racist!?' The father says: you don't understand, we are not like them. Suffering, apparently, is racially stratified too. This is the scene that detonates the entire book, the moment Spiegelman's metafictional apparatus, his mice and cats and pigs, stops being allegory and becomes accusation. <u>The animal masks slip, and what is underneath is not species but ideology.</u>

    This brings to mind Germany's early twentieth-century massacres in southern Africa, the Herero, the Bondelswarts, which Pynchon writes about in *V.* (1963), and nobody said much about Germany then. <u>So: if one does not speak up when others suffer, why should one's own pain deserve to be seen?</u> Maus asks this question not rhetorically but structurally, through the very form of a comic that refuses the consolations of visual realism. Marianne Hirsch coined the term *postmemory* largely in response to this book: the inherited trauma of children who did not experience the event but cannot escape its gravity. Spiegelman dramatises this in the fraught, frequently ugly interviews with his father, in his guilt over his mother Anja's suicide, in the famous scene where he sits at his drawing board surrounded by a pile of corpses wondering whether he has the right to turn suffering into art. No one who has read Maus forgets it. The Tennessee school board that banned it in 2022 understood its power better than they knew: <u>the book makes complicity visible, and complicity does not enjoy being looked at.</u>

- title: "As She Climbed Across the Table"
  type: "book"
  creator: "Jonathan Lethem"
  creator_role: "by"
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/books/as_she_climbed.jpg"
  posted: "2025-10-31"
  text: |
    Is ***As She Climbed Across the Table*** not one of the most romantic sci-fi novels ever written? Two hundred pages packed with delightful twists: quantum entanglement, the uncertainty principle, and blindsight woven together into a love story about a man losing his girlfriend to a void. Lack, the experimental anomaly that selectively absorbs some objects and rejects others, including the narrator Philip, is the purest metaphor for romantic rejection I have encountered in fiction. <u>One cannot argue with a hole in spacetime. One cannot persuade it to want one back.</u> The Lacanian resonance is obvious, the void that can never be filled, desire structured around absence, but Lethem wears the theory so lightly that it never suffocates the comedy.

    And what comedy. Lethem's prose elevates an already brilliant premise to cult-classic territory: joke after joke, pun after pun, delivered with the deadpan of someone who understands that the funniest things are also the saddest. The entanglement of the cosmos and consciousness, grand love and small love, calls to mind Nolan's *Interstellar* (2014), Fisher's essay on the same, the way physics occasionally stumbles into the territory of feeling and finds it was already there. What makes the novel work, finally, is that Lethem does not take it too seriously. The lightness is earned, not evasive. Philip's heartbreak is real, his jealousy of a particle-physics experiment absurd and painful, and <u>the resolution, such as it is, lands with the tenderness of someone who knows that love is mostly a matter of what the universe decides to let through.</u>

- title: "En attendant Godot"
  title_en: "Waiting for Godot"
  type: "book"
  creator: "Samuel Beckett"
  creator_role: "by"
  year: 1953
  eval: "loved"
  image: "/assets/images/thoughts/books/waiting_for_godot.jpg"
  posted: "2025-10-26"
  text: |
    A play that seems to mean nothing and ends up meaning everything. ***Waiting for Godot*** generates a thousand different meanings in readers and audiences. A literal thinking hat that grants the oppressed a useless voice; a tree that signifies nothing but an eternal wait for the known-but-unknown. Nothing happens, twice, and the repetition is the point: Act II mirrors Act I the way one day mirrors the last, the way history under Beckett's gaze is less progress than stutter. <u>The play's genius is structural. It does not argue that life is meaningless; it constructs meaninglessness so precisely that meaning keeps leaking in through the cracks.</u>

    In Beckett's world one sees the traces of oppression and terror: Estragon's beatings, Vladimir's urinary afflictions, the boy or boys whose messages never clarify, Pozzo's rope around Lucky's neck. The Pozzo-Lucky dynamic reads as capitalism in miniature, master and slave bound in mutual degradation, Lucky performing thought on command until the thought itself collapses into a torrent of fragmented academic language, the Western intellectual tradition choking on its own debris. But aside from a few lines from Vladimir, nobody takes it seriously. Nobody revolts. They wait. They fill time with games, with boots, with carrots and turnips. <u>The passivity is the horror, and it is also, somehow, the comedy.</u>

    Is this not a mirror held up to our own society? Beckett, an Irishman writing in French in the aftermath of a war he lived through as a Resistance member, understood that the most accurate depiction of the human condition is not tragedy but the inability to decide whether one is living a tragedy at all. The tree sprouts leaves between acts, and nothing changes. Vladimir and Estragon consider hanging themselves and conclude that the bough might not hold. One finishes the play, or watches it end, with the sensation that Beckett has described something one already knew but could not say: the paralysis is not imposed from without. <u>It is the waiting itself, the belief that Godot will come, that keeps one rooted to the spot.</u>

- title: "The Secret History"
  type: "book"
  creator: "Donna Tartt"
  creator_role: "by"
  year: 1992
  eval: "meh..."
  image: "/assets/images/thoughts/books/secret_history.jpg"
  posted: "2025-10-25"
  text: |
    My first Donna Tartt. The prose is as advertised: flowing, propulsive, writing psychological thriller in a register that feels like postmodern literature. Reading the first few chapters, I thought: this is what Paul Auster wanted to be but never managed. The inverted mystery structure, borrowed from Greek tragedy, the murder revealed on the first page, is effective, and the first half sustains its suspense cleanly. <u>The Dionysian frenzy gone wrong, the bacchanal that tips into real death, is a premise good enough to build a career on.</u> Charles and Francis in particular are vivid, drawn with a precision that makes their later unravelling feel earned.

    The characterisation and plotting become rather too cliched and flat in the second half, which is a shame. Tartt has been credited with inventing *dark academia*, and one can see why: the aesthetic is seductive, the Vermont campus rendered with a sensory richness that makes one want to enrol. But the novel's weakness is also its genre's weakness. Once the murder is done, the paranoia and guilt spiral into territory that dozens of lesser thrillers have since colonised, and at five hundred pages the narrative wanders where at three hundred it might have been a compact suspense gem. The final dissolution still satisfies, and for a debut it is already remarkable. <u>But one leaves ***The Secret History*** suspecting that Tartt's gifts, which are considerable, needed a tighter frame to fully ignite.</u>

- title: "When Breath Becomes Air"
  type: "book"
  creator: "Paul Kalanithi"
  creator_role: "by"
  year: 2016
  eval: "disliked"
  image: "/assets/images/thoughts/books/when_breath_becomes_air.jpg"
  posted: "2025-10-25"
  text: |
    I want to know what kind of family produces a Paul who, knowing he is dying and cannot meaningfully contribute to raising children, still decides to have a baby with Lucy, and even returns to the operating room after learning of the pregnancy. Beyond name-dropping Yeats, Eliot, and Wittgenstein, there is nothing in ***When Breath Becomes Air*** that actually demonstrates Paul's love of literature or philosophy. The one attempt at atheism is riddled with errors. <u>Cancer does not automatically make one a good writer, husband, father, or doctor.</u> Came expecting profound reflections on death; left mainly mourning the loss of what was apparently a very skilled neurosurgeon.

    Memoirs of terminal illness carry an implicit *moral authority* that can silence criticism; Kalanithi's book benefits from that silence more than it earns it. The literary name-dropping gestures at depth without achieving it, and the family ethics remain unexamined beneath the elegiac prose. <u>One suspects the book's reputation rests less on what it says than on the fact that its author did not survive to hear the objections.</u>

- title: "Sátántangó"
  type: "book"
  creator: "László Krasznahorkai, trans. George Szirtes"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/books/satantango.jpg"
  posted: "2025-10-18"
  text: |
    Krasznahorkai writes the comings and goings of a desolate Hungarian village like a stage play: twelve scenes corresponding to tango steps, six forward, six back, from the opening bells through the pipe-organ roar, the rain and dancing footsteps, cycling back to the bells tolling again at the final step. The structure is a closed system. No one escapes. Irimiás, the false messiah who returns to the village with promises of collective salvation, is both darkly comic and terrifying: a man who manipulates because manipulation is the only form of agency available in a world where the state has withdrawn and left nothing but mud. <u>Susan Sontag called Krasznahorkai the Hungarian master of the apocalypse, and ***Sátántangó*** is where the apocalypse begins, not with fire but with rain and pálinka and the slow erosion of the will to resist.</u>

    The whole thing is remarkably compact. The long sentences, which in description sound forbidding, are in practice easy to follow, hypnotic rather than punishing, closer to the experience of walking through heavy rain than of deciphering a puzzle. The images and dialogue are vivid: the doctor sitting by his window with a glass of pálinka, drinking it empty and refilling it over and over, watching the world outside through the weeds in his room, letting his mind drift. There is something grotesque and darkly funny beneath the misery, as if somewhere in Central Europe there really is such a man, such a village, such an endless autumn. <u>One of the great post-communist European novels: a book about what happens when a system collapses and what is left is not freedom but the unbearable obligation to keep going without any idea where.</u>

- title: "Shadow Ticket"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/books/shadow_ticket.jpg"
  posted: "2025-10-13"
  text: |
    It may be because I have not read it closely enough, but ***Shadow Ticket*** is the funniest and the emptiest Pynchon I have read. Funny because his absurdism and free-associative weirdness are on full display: motorcycle gangs tearing through the Hungarian desert, a golem from Czechoslovakia, <u>a self-aware and imperishable cheese whose maker is essentially the Al Capone of dairy</u>. The private-eye structure, Hicks McTaggart trailing a runaway heiress from Milwaukee through New York to Belgrade and Budapest, invites the *Inherent Vice* (2009) comparison, and it holds to a point: both are detective novels in the loosest sense, both meander gloriously. But where Doc Sportello's California haze carried *epistemological* weight, the 1932 setting here tips the balance toward period intrigue, and the paranoid circuitry never quite connects to a central charge.

    So why empty? Because beyond pre-war Milwaukee's atmosphere of *manufactured compliance* and Central Europe's universal dread, Pynchon does not do much dissection of ideology. The deeper political and metaphysical pressure one expects from Pynchon is present but muted; the political resonances feel gestural rather than structural. Unlike *Vineland* (1990), where government repression seeps into the depths of the crowd and lays fear-bombs at the base of resistance movements, or *The Crying of Lot 49* (1966), where Oedipa's paranoia becomes a genuine epistemological crisis, Shadow Ticket reads more as *reconciliation* than reinvention: a return to signature concerns rather than a late-career departure. <u>Of course, the worst Pynchon is still better than most fiction; within his own catalogue, though, Shadow Ticket is comparatively shallow.</u> But hell, I cannot say I did not have a tremendous time reading it.

- title: "Vineland"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/vineland.jpg"
  posted: "2025-10-09"
  text: |
    Pynchon writes the walking wounded of Nixon's War on Drugs and the long shadow of Vietnam: the students and activists killed by federal agents, the scholars swept away by historical tides, the loveless marriages, the stubborn love between a father and a daughter. Through one serious joke after another he paints America's most miserable decades of the twentieth century. At the turn of the seventies and eighties, the end of the hippie era, government repression seeped into the depths of the crowd, laying fear-bombs at the base of every resistance movement. The critical consensus has always been that ***Vineland*** is 'minor Pynchon', more accessible, warmer, less labyrinthine than the major novels. Fair enough: this is not the Pynchon of unruly sentence-architecture and encyclopaedic ambition. <u>What it is, instead, is the Pynchon who loves his people.</u> Brock Vond is one of his most chilling creations precisely because he is banal, a federal enforcer whose violence is institutional rather than demonic; Frenesi Gates, the radical-turned-informant, carries the entire betrayal of the sixties in her camera lens; and Prairie's search for her mother is the most emotionally legible quest in the whole catalogue. The Thanatoids, those television-zombie half-dead, feel less like satire now than prophecy.

    All the idealism and tomorrow-will-be-better hope, shattered by the camera. The beautiful dreams of 24fps and Corvairs, the joy preserved on film and bass lines, so simply erased, seized, cleared, destroyed. <u>Pynchon understood before most that the sixties were not merely defeated but <em>metabolised</em>, their imagery and vocabulary absorbed by the very system they opposed.</u> Reagan-era America did not need to suppress the counterculture; it bought the footage. Yet the novel refuses despair outright. 'I'm not gonna forget,' someone says, and means it. Our eternal Summer of Love: 'While we had it, we really had some fun.' I believe him. <u>The warmth in that line is not nostalgia; it is evidence.</u>

- title: "4 3 2 1"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/4321.jpg"
  posted: "2025-09-27"
  text: |
    So what defines each Ferguson? Auster's answer seems to be: relationships. Whether each Ferguson's love life, family dynamics, or relationship with the political and social world, all become anchor points, however minor, with far-reaching consequences. Since the eighties Auster has been probing a world of possibility and *coincidence*, and that impulse finally comes into full bloom in ***4 3 2 1***, across eight hundred and sixty-odd pages. Growing up in post-war Newark, each Ferguson becomes a mirror for the counterculture, anti-war sentiment, and the Summer of Love. <u>At that point the multiple Fergusons stop feeling like individuals and start feeling like Auster's own version of <em>ukiyo-e</em>: reflections of a moment, floating pictures of a world in flux.</u>

    The structure is audacious, four parallel narratives held together by a single origin point, and it invites the obvious comparison to musical counterpoint, four voices playing variations on the same theme. The risk is blurring, and it happens: somewhere around pages five or six hundred, after I gave up tracking each character's specific timeline, the distinctions between Fergusons dissolved. But this turned out to be the point. Auster is not asking one to care equally about each version; he is asking one to feel the weight of contingency itself, the vertigo of lives that could have been otherwise. The novel is deeply autobiographical, almost embarrassingly so, Jewish-American Newark childhood, the writer's vocation, the political turmoil of the sixties. But autobiography metabolised into form becomes something rarer than memoir. This is the book where Auster's lifelong obsession with chance stops being a device and becomes a cosmology: identity is not chosen but assembled through accident, and the four Fergusons are the proof. The rest of the book, once I surrendered to it, was pure pleasure.

- title: "Invisible"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 2009
  eval: "disliked"
  image: "/assets/images/thoughts/books/invisible.jpg"
  posted: "2025-08-30"
  text: |
    I had hoped that after *The New York Trilogy* (1987), *Moon Palace* (1989), and *Leviathan* (1992), Auster might have learned to stop writing flat, stock female characters with exhausted inner lives. He has not. He has doubled down. <u>Auster's women, with the possible exception of Mrs Hume in <em>Moon Palace</em>, all seem to be beautiful and desperate to sleep with the protagonist</u>: the French-American beauty Margot in New York, and even the narrator's own sister Gwyn. Compared to the intricate threads and callbacks of his earlier work, the watery plot here is a massive step down. Postmodernism should not have to sink this low.

    For all its *postmodern* gestures, ***Invisible*** reads like a very polished but ultimately shallow literary thriller. The tri-partite narrative structure and the shifting points of view promise a destabilisation of truth that never truly arrives; one can see the machinery but not feel the vertigo. <u>Where Auster's best work makes <em>coincidence</em> feel like metaphysics, here the formal tricks feel merely decorative, appliqued onto a story that has nothing underneath to destabilise.</u> The incest subplot, presumably intended to shock, instead reads as a tired provocation, and the Parisian section drifts into travelogue. One finishes the book suspecting that Auster wrote it on autopilot, relying on his established repertoire of doublings and unreliable narrators without interrogating why any of it should matter this time round.

- title: "A Pale View of Hills"
  type: "book"
  creator: "Kazuo Ishiguro"
  creator_role: "by"
  year: 1982
  eval: "loved"
  image: "/assets/images/thoughts/books/pale_view_of_hills.jpg"
  posted: "2025-08-28"
  text: |
    Even having read one Ishiguro in Chinese translation, *The Remains of the Day* (1989), I had not anticipated that he could already, this early, use such calm, precise, spare, detached language to produce such dense emotion. Using her daughter's homecoming as a catalyst, Etsuko renders the *unreliability of memory* in fragments, and behind those unreliable shards is a heartbroken, regretful, socially constrained mother. <u>She wants to tell Niki things, but knows that death cannot just be laid on the table, so she can only reconstruct that summer from decades ago, piece by piece.</u>

    The critical reading that Sachiko is Etsuko's alter ego, a displaced self-portrait narrated in the third person, feels almost too neat, yet the text earns it. Ishiguro threads survivor's guilt, emigration, and maternal failure into a single braid so fine that one only sees the full pattern retrospectively: Sachiko's neglect of Mariko mirrors Etsuko's of Keiko, the unnamed woman by the river haunts both timelines, and the decision to leave Japan carries a guilt that cannot be spoken in any language Etsuko now possesses. <u>What makes ***A Pale View of Hills*** extraordinary is its refusal to resolve. Memory here is not stable archive but emotional negotiation, shaped by grief into something that protects the rememberer at the cost of accuracy.</u> Ishiguro understands, long before *The Remains of the Day* (1989) would make it his signature, that the most devastating stories are the ones the narrator cannot quite bring herself to tell.

    'Keiko was happy that day. We rode on the cable-cars.' Suppressed feeling presses against the page, almost but not quite breaking through. Faber placed several blank pages at the back of the edition; behind them, a distant, faint hill in fog. That image stayed with me long after I closed the book.

- title: "The New York Trilogy"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1987
  eval: "liked"
  image: "/assets/images/thoughts/books/new_york_trilogy.jpg"
  posted: "2025-08-24"
  text: |
    Auster's earliest prose already carries the faint current of *Moon Palace* (1989) and *Leviathan* (1992), and the same dependence on *coincidence*. Three so-called detective stories with no traditional twists or endings, all pointing ultimately toward the protagonist's *deconstruction of self*. Quinn, consumed by an obsession that leads nowhere, never solves the 'Paul Auster mystery'; Blue, lost in a riddle of identity, can never explain Black/White's motives; and what happened to Fanshawe, nobody knows. <u>The trilogy uses detective fiction as scaffolding for something quite different: an interrogation of authorship, identity, and the limits of language.</u> The detective's search for clues becomes a metaphor for the futile search for stable meaning, and the genre's promise of resolution is deliberately, almost cruelly, withheld.

    In ***The New York Trilogy*** one can see many of Auster's recurring images: China, erotic coincidence, merged opposites, alienation, the city as labyrinth. The self-referential gesture of inserting 'Paul Auster' as a character in *City of Glass* (1985) is *postmodern* metafiction at its most explicit, but it works because the novel has already destabilised identity so thoroughly that the author's name becomes just another floating signifier. The weaknesses that persist across Auster's later career are already visible here too: female characters written almost entirely flat, complex psychological passages that feel muddled rather than mysterious. These are not minor flaws; they recur with enough consistency to constitute a blind spot. <u>Still, as a debut statement of intent, the Trilogy is formidable. It announced a writer whose world would run on chance, solitude, and the suspicion that narrative itself is a conspiracy we agree to believe in.</u>

- title: "We Have Always Lived in the Castle"
  type: "book"
  creator: "Shirley Jackson"
  creator_role: "by"
  year: 1962
  eval: "liked"
  image: "/assets/images/thoughts/books/we_have_always_lived_in_the_castle.jpg"
  posted: "2025-08-15"
  text: |
    Merricat and her sister's quiet dream-life, in a Gothic village and castle, circles in endless repetition, like the crack on the pavement outside Stella's coffee shop: it was always there. Life inside the castle froze completely after the great poisoning night: the sugar bowl coated in arsenic, old books nailed to trees, the manor gates locked shut. <u>Jackson replaces the traditional Gothic castle with a bourgeois household haunted by family secrets, and inverts the genre's central trope: it is the outside world that poses the threat, not the dark interior.</u> The villagers' hostility is *The Lottery* (1948) writ domestic, a mob driven by resentment of female autonomy and nonconformity.

    But Merricat senses change coming: the nailed-up book falls, an unseen relative crashes in, everything teeters at the edge of collapse, and Merricat chooses to become that collapse itself. What makes ***We Have Always Lived in the Castle*** so unsettling is the gap between Merricat's cheerful tone and the horror of her actions, the way Jackson withholds the revelation of guilt and then frames it through the narrator's own self-justifying logic. One is made complicit in Merricat's worldview long before understanding its true nature. The rituals, the buried objects, the protective incantations, all occupy a zone between childish superstition and genuine menace. <u>Mark Fisher would have called this <em>eeriness</em>: the unexpected presence of agency where one expects absence, or the absence of it where one expects presence. Jackson got there decades before anyone named the feeling.</u>

- title: "Leviathan"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/books/leviathan.jpg"
  posted: "2025-08-14"
  text: |
    Auster wrote in the opening of *The New York Trilogy* (1987): 'nothing was real except chance.' He uses *coincidence* and infinite possibility to build worlds that feel familiar and profoundly alien at once, and ***Leviathan*** is perhaps the purest expression of this method. Sachs's life is shaped by dozens of coincidences: meeting Peter, meeting Maria, the fall from a fire escape, the accidental killing. Even the title originates in a coincidence born of Sachs's curiosity after committing a terrible act. <u>The critical reading of Sachs as 'the accidental radical' feels precisely right: his journey from celebrated novelist to domestic terrorist is driven not by ideology but by <em>contingency</em>, a chain of events that look like fate only in retrospect.</u> Auster deliberately refuses to give Sachs a satisfying political manifesto, making his violence morally unresolvable.

    In the final chapter, Sachs's 'political act' is really just an expression of guilt and pain. Is he a hypocrite? His life has nothing to do with politics, yet he deceives himself and his friends, insisting he is acting for some 'cause'. All his courage, righteousness, and remorse collapse at the end into a cowardice he cannot even name. <u>The Hobbesian resonance of the title cuts both ways: rather than the state containing chaos, Sachs becomes a one-man leviathan, a self-appointed sovereign acting outside the law, and the irony is that this sovereign is governed entirely by accident.</u> Meanwhile Peter Aaron, whose initials mirror Auster's own, races to write the story before the FBI can define it, making the act of narration itself a *counter-political* gesture. Leviathan is just Sachs's imaginary enemy, and the tragedy is that he never sees this.


- title: "Antkind"
  type: "book"
  creator: "Charlie Kaufman"
  creator_role: "by"
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/books/antkind.jpg"
  posted: "2025-08-12"
  text: |
    B. Rosenberger Rosenberg, film critic, discovers a three-month-long stop-motion film by an unknown genius, watches it, loses it in a fire, and spends seven hundred pages trying to reconstruct it from memory. The premise sustains a Kaufman screenplay better than it sustains a novel, and the novel knows it. ***Antkind*** is a book about its own impossibility, a comedy of reconstruction that keeps collapsing under the mass of what it is trying to reconstruct.

    B. is insufferable by design: performatively progressive, intellectually vain, a walking catalogue of the anxieties that attend anyone who has made criticism their identity. Kaufman uses him the way *Synecdoche, New York* uses Caden Cotard: as a figure whose neurotic self-awareness becomes its own trap, each layer of insight producing a new layer of blindness. The satire of critical culture is sharp, the set pieces are inventive, and Kaufman's ear for the rhythms of intellectual self-deception is as good on the page as it is on screen.

    <u>The problem is structural: at 720 pages, the recursive loops that energise a two-hour film become exhausting.</u> There are stretches of a hundred pages where the novel circles the same joke, each iteration diminishing rather than deepening it. I suspect Kaufman knows this, and that the exhaustion is partly the point, but knowing the knife is designed to cut does not make the cut less tedious. I liked it; I could not love it; I am glad it exists.

- title: "The Crying of Lot 49"
  type: "book"
  creator: "Thomas Pynchon"
  creator_role: "by"
  year: 1966
  eval: "loved"
  image: "/assets/images/thoughts/books/crying_of_lot_49.jpg"
  posted: "2025-08-11"
  text: |
    Pynchon's sentences are little bombs that detonate the instant one reaches them: one is left with the shattered remains of reality, piecing the original story back together oneself. This is not a complaint. With stubborn effort I followed Oedipa Maas through the 'circuit-board' streets of 1960s Southern California, trying to crack the Tristero mystery or convince myself it does not exist. The novel famously offers four possible interpretations and refuses to resolve any of them: the Tristero is real; Oedipa is projecting pattern onto noise; she is the victim of Inverarity's elaborate hoax; or she is simply going mad. <u>Pynchon's genius is to make each reading equally viable, and to insist that the impossibility of choosing between them is itself the point.</u> Oedipa functions as a kind of *Maxwell's Demon*, sorting signal from noise in an information-saturated America, and the novel enacts in its form the same *entropic* uncertainty it describes.

    Oedipa, sliding gradually into conspiracy-theory obsession, is a radical feminist icon of sixties American counterculture, though the text never announces her as such. She is curious, suspicious, postmodern, standing directly across from the Leviathan of patriarchal and corporate America, losing her grip on reality as she dissolves into Tristero's never-sounded horn. Loveless marriage, her one-night stand fleeing with an underage girl, even her therapist succumbing to psychedelics: every male figure in her world fails her, manages her, or disappears. <u>The feminist reading, that her quest for the Tristero is also a quest for <em>autonomous subjectivity</em>, feels as structurally essential as the thermodynamic one.</u>

    By the final auction scene Oedipa has almost nothing left, only her obsession with the truth. She is Kafka's Josef K., the Hunter in *Bloodborne* (2015), and Neo in *The Matrix* (1999): trapped in a system whose architecture she can almost perceive but never quite confirm. ***The Crying of Lot 49*** is about to begin. It never does. Pynchon leaves one there, on the threshold, and the silence that follows is the most eloquent thing in the book.

- title: "Moon Palace"
  type: "book"
  creator: "Paul Auster"
  creator_role: "by"
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/books/moon_palace.jpg"
  posted: "2025-08-10"
  text: |
    Despite real frustration with Auster's treatment of several female characters, especially Kitty Wu and Mrs Hume, I could not resist ***Moon Palace***'s astonishing literary force. The *coincidences* here are stacked to the point of absurdity: Marco Stanley Fogg, whose very name encodes three famous wanderers, stumbles into employment with his own grandfather, then befriends and loses his own father. One either reads this as *postmodern* allegory or as authorial manipulation, and whether the novel works depends entirely on which side one falls. <u>I fell on the side of allegory, intoxicated by the seemingly offhand plot revelations, by Marco and his uncle Victor's mutual dependence, pitiful but never pitiable, by the casually dropped 'A here exists only in relation to a there', by Fogg's homeless wandering through Central Park like a secular ascetic discovering that dispossession is its own kind of knowledge.</u>

    Auster's obsession with chance has never been mere cleverness; in Moon Palace it reaches something like a *cosmology*. The moon recurs as motif and metaphor: Victor's Moon Palace restaurant, the 1969 lunar landing, the lunar imagery in Effing's desert paintings. The moon is the irrational, the gravitational pull of accident on identity, and Fogg's life orbits it helplessly. <u>Searching for Effing's cave, and through it for meaning, and finding nothing, lost in the American desert, watching the moon finally 'find its place in the darkness': drifting Marco Fogg, like Phileas Fogg returning from his circumnavigation of the globe, finally makes peace with his own life.</u> That final image is one of the most beautiful things Auster ever wrote. I cannot forgive the flat women; I cannot deny the force.

- title: "Stöld"
  title_en: "Stolen"
  type: "book"
  creator: "Ann-Helén Laestadius, trans. Rachel Willson-Broyles"
  creator_role: "by"
  year: 2021
  eval: "meh..."
  image: "/assets/images/thoughts/books/stolen.jpg"
  posted: "2025-07-27"
  text: |
    A *Bildungsroman* set among the Sami indigenous people of northern Sweden. Slow-paced, but illuminating: I learned a great deal about the conflicts between Sami and Swedish settlers over reindeer herding, about Sami customs and the quiet violence of *cultural erasure*. <u>The Scandinavian version of indigenous-settler conflict rarely makes it to screen or page, which gives the novel a certain documentary urgency.</u> Laestadius, who is Sami herself, writes from inside the culture with an authenticity that most outsider accounts of indigenous life conspicuously lack.

    The coming-of-age element is interesting enough, but though eleven years pass in the novel, from 2008 to 2019, Elsa's character arc remains thin. Her personality stays too consistent from childhood to adulthood; she still feels like a little girl by the 2019 sections, and the emotional range narrows rather than deepens. <u>A novel that spans a decade ought to show its protagonist metabolising time, not merely enduring it.</u> Still worth reading for the world it opens, but ***Stolen*** needed stronger bones.


- title: "The Hearing Test"
  type: "book"
  creator: "Eliza Barry Callahan"
  creator_role: "by"
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/books/hearing_test.jpg"
  posted: "2025-07-20"
  text: |
    The critics praised ***The Hearing Test*** for its quiet clarity, its diary-like detachment, its formal restraint -- and these praises identify the book's problem exactly. Callahan structures the novel in four movements like a symphony; the narrator keeps a 'score' of her year after sudden hearing loss, a conceit that operates across registers of music, record-keeping, and bodily trauma. The idea is coherent. The execution leaves the experience at arm's length.

    Sudden deafness is not a detached condition. The drone in the right ear, the way a body that cannot hear itself speak begins to feel foreign, the terror of a world going quiet without permission -- ***The Hearing Test*** notes these things rather than inhabiting them. <u>The narrator feels like someone who has been told about sudden hearing loss and rendered it carefully; she does not feel like someone living inside it.</u> At 150 pages, the formal architecture -- the four movements, the scored record -- has the quality of scaffolding that was never removed: visible as construction, not yet solid as experience.

- title: "The Year of Dreaming Dangerously"
  type: "book"
  creator: "Slavoj Žižek"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/year_of_dreaming_dangerously.jpg"
  posted: "2025-07-11"
  text: |
    Žižek the polemicist, stirring Marx's *surplus value* together with Lacan's *surplus enjoyment* in his iron pot, as always. In ***The Year of Dreaming Dangerously*** he writes about the London streets of 2011 and Tahrir Square, about how that year's great awakening was killed, buried, and had flowers planted on the grave by media spectacle and liberal recuperation. The diagnosis is sharp: each uprising briefly punctured the membrane of *capitalist realism*, only to be narrativised into harmlessness by the very system it threatened. What Žižek understands, and what the orthodox left sometimes forgets, is that the problem was never the absence of anger but the absence of a framework capable of converting anger into programme. <u>The protesters could occupy the square but not the concept.</u>

    He no longer believes history will gently self-correct, the way the old-school Marxists waited for productive forces to finally burst through the chains of production relations. Žižek's capitalism is a self-renewing, status-quo-preserving monster, kept alive precisely by crises, feeding on its own contradictions rather than succumbing to them. Institutionally manufactured scarcity, the commodification of dissent, the liberal co-optation of radical energy: these are not bugs but features. We need radical transformation, he insists, and perhaps he is right. But 2011 was fifteen years ago, and nothing that fierce has come back. The book's greatest strength, its sense of urgency, is also the source of its pathos. <u>One finishes it aware that the dreaming was real, the danger was real, and the waking was permanent.</u>

- title: "Did Somebody Say Totalitarianism? Five Interventions in the (Mis)use of a Notion"
  type: "book"
  creator: "Slavoj Žižek"
  creator_role: "by"
  year: 2001
  eval: "liked"
  image: "/assets/images/thoughts/books/did_somebody_say_totalitarianism.jpg"
  posted: "2025-06-05"
  text: |
    Žižek is not defending totalitarianism. He is trying to show that 'anti-totalitarianism' functions as liberal ideology's self-deception mechanism: the conceptual blockade that forecloses any serious left politics by equating every emancipatory project with the Gulag. ***Did Somebody Say Totalitarianism?*** is full of deliberate provocation; using Agamben's 'Muslim' to denote the Muselmann of Nazi concentration camps is a prime example, designed to make the reader flinch and then think about why they flinched. <u>What Žižek grasps, and what makes the provocation more than mere contrarianism, is that the liberal sanctification of suffering has its own ideological function: it turns historical atrocity into a moral absolute that conveniently immunises the present order from critique.</u>

    His strength is directness and sharpness, though some Lacanian concepts remain overly opaque, giving the rhythm an uneven quality, lurching between electrifying polemic and passages that feel like theoretical throat-clearing. But the insight at the intersection of politics and psychoanalysis is undeniable. Chapter three applies almost too obviously to a certain country's current situation, and, more diffusely, to the liberal democracies too: sanctifying tragedy, tabooising totalitarianism, concretising the individual, dogmatising myth. The pattern Žižek identifies, in which the very invocation of 'totalitarianism' becomes a thought-stopper rather than a thought, feels more relevant now than when he wrote it. <u>One does not have to follow every Lacanian loop to recognise the central claim: that the loudest anti-totalitarians are sometimes the ones least willing to examine the structures they defend.</u>


- title: "We Do Not Part"
  title_en: "작별하지 않는다"
  type: "book"
  creator: "Han Kang, trans. e. yaewon and Paige Aniyah Morris"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/books/we_do_not_part.jpg"
  posted: "2025-01-25"
  text: |
    A woman travels to snowbound Jeju to care for a friend's bird and finds herself inside a history the island has spent decades trying to forget. The 4.3 Incident, the South Korean government's massacre of tens of thousands of Jeju civilians between 1948 and 1954, is the wound ***We Do Not Part*** circles without ever fully exposing, because full exposure would be a kind of violence the novel refuses to commit. Han Kang's method is indirection: memory surfaces through objects, through snow, through the body of a bird that has to be kept alive while the caretaker herself is barely holding together.

    The structure is nonlinear and dreamlike, closer to *Human Acts* than to *The Vegetarian* in its excavation of state violence, but where *Human Acts* reconstructed the Gwangju massacre through multiple first-person accounts, this novel works through a single consciousness dissolving under the weight of what it encounters. <u>The prose operates at the threshold between grief and hallucination, and the distinction between the two is precisely what the novel refuses to settle.</u>

    What makes this more than a historical novel is Han Kang's refusal to instrumentalise suffering. The massacre is not a lesson; it is not redeemed by narrative; it does not produce wisdom or closure. The dead remain dead; the living remain implicated. The bird survives, which is the closest thing to hope the book permits, and even that feels provisional. <u>Han Kang writes about atrocity the way Tarkovsky films water: as an element that saturates everything, that you move through rather than observe.</u> This is, alongside *Human Acts*, her most important book.

- title: "L'Étranger"
  title_en: "The Outsider"
  type: "book"
  creator: "Albert Camus"
  creator_role: "by"
  year: 1942
  eval: "loved"
  image: "/assets/images/thoughts/books/outsider.jpg"
  posted: "2025-01-21"
  text: |
    I envy Meursault. I am helplessly unable to say what I mean, helplessly unable to refuse someone who wants me, helplessly performing grief at funerals, helplessly living as an insider. Existing in this society feels like moving behind a membrane I cannot pierce. Pretending to care, just to get through tomorrow.

    That is the raw nerve of ***The Outsider***. Camus writes in terse, paratactic sentences, stripped of causal connectives, and this formal austerity is not mere style: it enacts the absurd at the level of syntax, each sentence landing as a discrete fact unmoored from consequence. Meursault does not weep at his mother's funeral. Meursault shoots a man on a beach. The court condemns him less for the killing than for the failure to perform, and in that gap between act and performance Camus locates the entire indictment of social convention. <u>The justice system does not want truth; it wants legibility. What it cannot read, it destroys.</u>

    Postcolonial criticism rightly notes the unnamed Arab, the colonial violence that Camus renders invisible even as he renders Meursault's alienation visible. One should hold both things at once: the novel's philosophical power and its moral blind spot, the precision of its diagnosis and the narrowness of its sympathy. But what draws me back, what makes me envy Meursault rather than merely analyse him, is simpler and harder to say. <u>He refuses to lie. He refuses the membrane.</u> By the final pages, facing execution, he opens himself to the 'gentle indifference of the world' and finds it fraternal. I have never managed that. I suspect most people have not. Pretending to care, just to get through tomorrow.

- title: "Misogyny"
  title_en: "女ぎらい"
  type: "book"
  creator: "Chizuko Ueno, trans. 王兰 (CN: 《厌女》)"
  creator_role: "by"
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/books/misogyny.jpg"
  posted: "2025-01-05"
  text: |
    Ueno says in ***Misogyny*** that she has moved beyond her early structuralist phase, and one can tell. Her critique of patriarchy is not limited to a 'structural victim' framework; she tracks individual women and the mother-daughter dynamic as living, evolving things, refusing the temptation to collapse persons into positions. In Ueno's account, patriarchal misogyny takes root inside each individual from the moment men and women enter their designated roles. 'Becoming a man' means the homosocial alliance between men, deriving self-worth from male recognition, alienating and disdaining women, desiring the desire of other men. 'Becoming a woman' means recognising oneself as the object of male sexual projection. Women's value in patriarchal society is entirely determined by men, and only those, whether men or women, who are conscious of this mechanism can meaningfully resist it. <u>The structural insight is not new, but Ueno's achievement is in showing how the structure lives inside the individual, reproducing itself through affect and identification rather than simple coercion.</u>

    The one real flaw: roughly half the argumentation leans on Freud and fictional characters, which produces a curious unevenness, as though the sociological precision of the best passages keeps drifting toward psychoanalytic speculation that cannot quite bear the weight placed on it. But perhaps that is also a kind of honesty about the difficulty of the subject: misogyny is not only a system but a pathology, and pathology invites the clinical gaze even when that gaze is insufficient. What is harder to forgive are some of the reader responses Ueno implicitly addresses, gems like 'women enjoy their gender privileges while playing the victim', which is embarrassing to encounter in the discourse surrounding a book this serious. <u>Ueno herself would call it what it is: misogyny wearing the mask of rationality.</u>

- title: "The Weird and the Eerie"
  type: "book"
  creator: "Mark Fisher"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/weird_and_the_eerie.jpg"
  posted: "2024-12-25"
  text: |
    Similar to Zampano in Danielewski's *House of Leaves* (2000), Fisher's dismantling of Freud's *unheimlich* depends on a boundary: between 'familiar' and 'strange', between presence and absence, between what should be there and what should not. The weird is the unexpected strangeness inside the everyday; without familiarity there can be no weird. The eerie is the unexpected absence or presence of agency: the importance of love in Nolan's *Interstellar* (2014) is eerie, as are M. R. James's ancient ruins, and, by extension, the agentless operations of capital itself, structures that produce effects beyond anyone's intention. Fisher understood that these were not merely aesthetic categories but political ones. <u>The eerie describes not just a mode of fiction but the logic of late capitalism: a system that seems to run by itself, haunting the present with futures that never arrived.</u>

    My favourite passage is the reading of H. G. Wells's *The Door in the Wall* (1911), where Fisher identifies the eerie as a threshold affect, a feeling generated by the gap between what is glimpsed and what is accessible. His prose is compressed and precise, each sentence carrying more weight than most critics manage in a paragraph. A shame, then, that so many unexplained references dilute that brilliance: the book sometimes assumes a reader who has already done the homework, and the density of allusion can feel exclusionary rather than enriching. But ***The Weird and the Eerie*** is Fisher's last completed work, published weeks before his death, and perhaps there is something fitting about its fragmentary quality, its gestures toward readings that will never be finished. <u>One leaves it wanting more, which is both the book's limitation and its most powerful effect.</u>

- title: "On Intelligence"
  type: "book"
  creator: "Jeff Hawkins"
  creator_role: "by"
  year: 2004
  eval: "meh..."
  image: "/assets/images/thoughts/books/on_intelligence.jpg"
  posted: "2024-12-07"
  text: |
    ***On Intelligence*** closes with a range of specific predictions, some interesting: for instance, 'if lower brain regions predict incoming signals, higher regions need not process them'. The memory-prediction framework is intuitive and appealingly clean, a hierarchical model in which the neocortex stores temporal sequences and uses them to anticipate sensory input. The trouble is that twenty years of hippocampal and prefrontal recordings have largely complicated or contradicted the picture. Place cells and grid cells suggest the hippocampus is doing something far richer than sitting atop a cortical hierarchy as a passive relay; entorhinal-hippocampal loops are bidirectional and deeply entangled with spatial cognition, relational binding, and episodic memory in ways that resist reduction to sequence storage. The prefrontal cortex, meanwhile, involves working memory, executive control, and rule-based reasoning that cannot be flattened into hierarchical pattern matching. Hawkins treats the cortex as a single, homogeneous algorithm, which is elegant but anatomically untenable: V1 and dorsolateral PFC differ in cytoarchitecture, connectivity, and function in ways his framework cannot accommodate. <u>And the near-total absence of subcortical structures, neuromodulation, and the thalamus from the model is not a simplification but an omission.</u>

    Still, one cannot deny the audacity of the vision. Hawkins was willing to think further and speak more boldly than most neuroscientists or computational scientists, and the memory-prediction framework anticipated aspects of *predictive coding* that would later gain serious traction. <u>That he anticipated the core intuition of predictive coding before it had a name puts him ahead of most popular neuroscience writers, even if the specifics have not aged well.</u>

- title: "Phantoms in the Brain"
  type: "book"
  creator: "V. S. Ramachandran, Sandra Blakeslee"
  creator_role: "by"
  year: 1998
  eval: "loved"
  image: "/assets/images/thoughts/books/phantoms_in_the_brain.jpg"
  posted: "2024-11-02"
  text: |
    Ramachandran writes in the preface of ***Phantoms in the Brain*** that he wanted to be a science communicator like Oliver Sacks. Having finished it: he has succeeded, and in some respects surpassed the model. Both Ramachandran and Sacks make a convincing case for the significance of case studies in modern science, for the stubborn power of careful observation at the bedside. Through conversation, behavioural experiment, and the combination of clinical and neural data, Ramachandran generates highly testable hypotheses from minimal apparatus: a mirror box, a cotton swab, a patient's willingness to talk. The elegance is in the simplicity. <u>Where the field was building ever-larger imaging pipelines, Ramachandran was asking a person with a phantom limb to close their eyes and tell him what they felt.</u>

    Most striking is his discussion of individual rationalisation: the brain does not just perceive, it interprets, and in the course of interpreting, perception inevitably gets re-interpreted against objective reality. A patient with a paralysed left arm believes they 'did not want to raise it', not that they could not. The left hemisphere, that tireless confabulator, constructs a narrative of coherence even when the evidence screams contradiction. Ramachandran's speculation, that our drive for cognitive consistency is so powerful it actively distorts reality, extends far beyond clinical neurology. It is a lesson for non-patients too: every intact brain is performing the same trick, just more quietly. <u>One finishes the book wondering how much of what one calls 'reason' is simply the confabulator working overtime, and how rarely one catches it in the act.</u>

- title: "A Short History of Nearly Everything"
  type: "book"
  creator: "Bill Bryson"
  creator_role: "by"
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/books/short_history_of_nearly_everything.jpg"
  posted: "2024-08-23"
  text: |
    I deeply regret only reading this in my third year of a PhD. Bill Bryson covers biology, evolution, geology, climate, ancient humans, and the history of science in a single sweep, treating each topic with real depth and written in the wittiest, most effortless prose of any popular science book I have read. The effortlessness is, of course, the hardest thing to achieve: Bryson spent three years researching the book, and the lightness of the writing conceals an enormous quantity of absorbed knowledge, distilled into anecdotes and explanations that feel as natural as conversation. <u>Where most science communicators choose between rigour and accessibility, Bryson refuses the trade-off, managing to be both precise and funny, often in the same sentence.</u>

    What sets ***A Short History*** apart from other ambitious surveys is Bryson's instinct for the human story behind the discovery. Science here is not a march of disembodied facts but a procession of obsessives, misfits, and feuding personalities whose vanity and brilliance are equally responsible for what we know. The eccentricities of the scientists are not decorative asides; they illuminate how knowledge actually gets made, which is to say, messily, contingently, and often by people who would be unbearable at dinner. <u>One of those books so accomplished that one stops looking for faults, and the kind of book that makes one briefly, intensely angry at every science teacher who made the subject feel like a chore.</u>

- title: "Metazoa: Animal Life and the Birth of the Mind"
  type: "book"
  creator: "Peter Godfrey-Smith"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/metazoa.jpg"
  posted: "2024-03-31"
  text: |
    The world of philosophy would be better with more hands-on, empiricist thinkers like Peter Godfrey-Smith. Same experience as with *Other Minds* (2016): what he does best is still the anecdote, the concrete image that carries philosophical weight without needing to announce itself. <u>A female octopus throwing rubbish at a male who keeps harassing her while she builds a nest is an image I will never forget, and it does more argumentative work than a dozen thought experiments about qualia.</u> Godfrey-Smith's central claim, that subjective experience probably evolved as organisms needed to manage increasingly complex bodies, is persuasive precisely because he arrives at it through observation rather than speculation: sponges respond to their environment through chemical signals but lack a nervous system that integrates information in the relevant way, and so probably lack experience. The boundary is not sharp but gradual, consciousness arriving in degrees rather than as a binary switch, which is both philosophically honest and scientifically productive.

    On the evolutionary path, intelligence takes a thousand strange forms, all arising from a simple circuit distinguishing self from other. That thread runs through what looks like a scattered collection of stories about corals, mantis shrimps, reef fish, and cephalopods, binding them into a single argument about how matter becomes mind. Godfrey-Smith's writing is as seductive as his philosophy: patient, precise, willing to sit with uncertainty rather than forcing premature resolution. There is a generosity in this approach, a refusal to treat the hard problem of consciousness as either solved or insoluble, that feels rare in a field dominated by confident declarations from both sides. One leaves ***Metazoa*** not with answers but with a richer sense of the question, and <u>with the conviction that philosophy done in wetsuits and on reefs is philosophy done right.</u>


- title: "A Moveable Feast: The Restored Edition"
  type: "book"
  creator: "Ernest Hemingway, ed. Seán Hemingway"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/a_moveable_feast.jpg"
  posted: "2024-02-15"
  text: |
    The 1964 edition of ***A Moveable Feast*** cast Hadley as the saint and Pauline Pfeiffer as the predator who destroyed the marriage. The 2009 restored edition, assembled by grandson Seán Hemingway from manuscript materials Mary Hemingway shaped or suppressed, complicates that narrative: the drafts are more self-critical, more tender toward Pauline, more ambivalent about blame. Neither edition can claim to represent what Hemingway intended, because the manuscript was unfinished when he died, and both are editorial constructions built from the same fragments.

    What survives either version is the Paris prose. The early chapters, Hemingway writing in cafés, the hunger that sharpened his sentences, the walks along the Seine, have a luminosity that is Hemingway at his least defended. <u>The famous discipline of omission is visible here not as technique but as temperament: a man for whom the act of cutting was indistinguishable from the act of seeing.</u> The portraits of other writers, Stein, Fitzgerald, Ford, are acts of controlled demolition, each kindness concealing a blade, and in the restored edition you can sometimes see the blade being sharpened in one draft and sheathed in another.

    The Fitzgerald chapter is still the most devastating literary portrait I know. Hemingway loved Fitzgerald, admired his talent, and watched him destroy himself with the same attention he brought to watching bulls die in the ring. The tenderness and the cruelty are the same gesture. That is the book's lesson, and it applies to the book itself.

- title: "On Women"
  type: "book"
  creator: "Susan Sontag"
  creator_role: "by"
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/books/on_women.jpg"
  posted: "2024-01-08"
  text: |
    Many of Sontag's observations in ***On Women*** are pointed, sometimes devastatingly so. Capitalist society has men defining femininity as superficial, then concluding that women are superficial: the circularity is so perfect it almost looks designed, which is precisely her point. The liberation of women, Sontag insists, is fundamentally different from the liberation of men, because female liberation requires men to give up part of their power, which is why women's liberation and equality are not the same thing. <u>Equality within existing structures merely distributes the spoils more evenly; liberation demands that the structures themselves be dismantled.</u> These are not arguments that have dated. If anything, the contemporary discourse around 'lean in' feminism, which asks women to succeed on terms defined by patriarchal capitalism, proves Sontag's distinction still cuts.

    The second half is a critique of Leni Riefenstahl: clear in its positions, uncompromising in its refusal to separate aesthetics from politics, but the argumentation is a bit thin, not entirely convincing. Sontag wants to demonstrate that Riefenstahl's visual language is inherently fascist, that the celebration of physical beauty and heroic submission cannot be disentangled from the ideology it served. The claim is strong, perhaps too strong for the evidence marshalled here, which feels compressed to the point of assertion. One senses the essay reaching for the force of *Fascinating Fascism* (1975) without quite achieving it. Still, the collection as a whole serves as a reminder that Sontag's feminism was never comfortable, never programmatic: <u>it was the feminism of someone who resisted the label even as she could not stop thinking about the problem.</u> That discomfort is part of its value.

- title: "When We Cease to Understand the World"
  title_en: "Un verdor terrible"
  type: "book"
  creator: "Benjamín Labatut, trans. Adrian Nathan West"
  creator_role: "by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/books/when_we_cease_to_understand_the_world.jpg"
  posted: "2023-05-31"
  text: |
    Labatut has written something that should not work. ***When We Cease to Understand the World*** is a hybrid of essay, speculative biography, and literary fiction, threaded together with a confidence that borders on recklessness: real scientists, real breakthroughs, real atrocities, all laced with invented interiority and hallucinatory prose until the seams between fact and fabrication dissolve entirely. The usual objection writes itself: this is irresponsible, this is fakery. But the book's genius lies precisely in that dissolution. Labatut understands that the history of twentieth-century science is already stranger than fiction, already saturated with moral vertigo, and that the conventional nonfiction frame, with its careful attribution and hedged claims, cannot capture what it felt like to stand at the edge of the unknowable and keep pushing. Fritz Haber's nitrogen fixation feeding the world and gassing the trenches; Schwarzschild solving Einstein's field equations while dying on the Eastern Front; Heisenberg and Schr\u00f6dinger tearing quantum mechanics apart from opposite ends. <u>One story bleeds into the next like a wound that will not close.</u>

    The stories of Grothendieck and Mochizuki Shinichi, though, are what I keep returning to. Grothendieck, retreating from mathematics into hermitic madness, as if the structures he had uncovered were too vast for a single mind to hold without cracking. Mochizuki, publishing a proof so impenetrable that the mathematical community could neither verify nor refute it, sealed inside his own logic like a message in a bottle no one can open. Labatut threads these lives together in the manner of *Cloud Atlas* (2004): one line connecting everyone's fate to the fate of the world, each chapter a step closer to the point where understanding tips into its own negation. The Bola\u00f1o comparison is apt; both are Chilean, both drawn to the intersection of brilliance and destruction. But Labatut is doing something more compressed, more vertiginous. <u>He is asking whether the act of knowing, pushed far enough, becomes indistinguishable from the act of going mad.</u> A week after finishing, the awe had not faded. It still has not.

- title: "The Rise and Fall of the Third Reich"
  type: "book"
  creator: "William L. Shirer"
  creator_role: "by"
  year: 1960
  eval: "liked"
  image: "/assets/images/thoughts/books/rise_and_fall_of_the_third_reich.jpg"
  posted: "2023-03-04"
  text: |
    A fifty-plus-hour monument to the journalistic conviction that being there counts for something. Shirer reported from inside Nazi Germany until 1940, and that proximity gives his narrative an immediacy no purely archival historian can replicate: <u>the texture of rallies witnessed first-hand, the quality of light in rooms where decisions were made.</u> The academic objections are well-rehearsed. Hans Mommsen called it superficial. Gordon Craig questioned the analytical framework. Richard Evans and Deborah Lipstadt have labelled it outdated, and they are not wrong: Shirer leans too heavily on the *Sonderweg* thesis, that old argument about a uniquely German national character marching inevitably toward catastrophe, which later historiography has largely dismantled. The later chapters lean even more heavily on Hitler's deteriorating mental state, and the accuracy of those sources is naturally suspect, filtered through memoirs written by men with every reason to redirect blame.

    What survives, though, is the sheer narrative richness. As a work of moral philosophy or Holocaust scholarship, ***The Rise and Fall of the Third Reich*** has been superseded many times over; one reaches for Primo Levi, for Hannah Arendt, for Evans's own Third Reich trilogy. But as a narrative act, the accumulation of detail, the relentless forward momentum through two decades of escalating horror, the book remains formidable. <u>Shirer was 'just a journalist', his critics said. Perhaps. But journalism of this ambition and this density has its own kind of authority: that of a witness who refused to look away, even when the analytical tools at his disposal were blunter than the moment demanded.</u>

- title: "Time, Love, Memory: A Great Biologist and His Quest for the Origins of Behaviour"
  type: "book"
  creator: "Jonathan Weiner"
  creator_role: "by"
  year: 1999
  eval: "liked"
  image: "/assets/images/thoughts/books/time_love_memory.jpg"
  posted: "2022-06-22"
  text: |
    The journalist's craft is on full display. Weiner builds Seymour Benzer's story the way a good documentary filmmaker constructs a portrait: through interviews, through the texture of a lab, through the faces of collaborators and rivals who leap off the page with startling economy. This is nothing like Eric Kandel's autobiography, which is essentially a career retrospective narrated by its subject; Weiner's approach is more alive, more externally observed, and the liveliness matters. <u>One gets a sense not just of Benzer's intellectual trajectory, from physicist to molecular biologist to neurogenetics pioneer, but of the atmosphere in which that trajectory unfolded: the Caltech corridors, the mutant fly stocks, the Drosophila courtship songs played back on oscilloscopes.</u> The discoveries that would eventually underpin the 2017 Nobel for circadian rhythm research, the period and timeless genes, are rendered here as human stories first, scientific achievements second.

    The inevitable bias is structural. A book about Benzer is a book about the gene, and Weiner cannot help but foreground genetic determinism in a way that the science itself has long since outgrown. Everyone now understands that genes cannot be as deterministic as the early geneticists imagined; the gene-behaviour relationship is probabilistic, contextual, shaped by environment and development in ways Benzer's single-gene mutant screens could not capture. <u>Paired with Sapolsky's <em>Behave</em> (2017), which insists on the full causal chain from gene to hormone to neural circuit to culture, ***Time, Love, Memory*** finds its proper place: a brilliant portrait of one end of the explanatory spectrum, best read with the awareness that the other end exists.</u>

- title: "Behave: The Biology of Humans at Our Best and Worst"
  type: "book"
  creator: "Robert Sapolsky"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/behave.jpg"
  posted: "2022-06-12"
  text: |
    More readable than *Why Zebras Don't Get Ulcers* (1994), and broader in scope. Sapolsky's organising conceit is deceptively simple: start with the second before a behaviour occurs (the amygdala fires, the prefrontal cortex does or does not intervene), then zoom out, step by step, through hormones, then neurodevelopment, then genes, then evolution, then culture, until one has traversed the entire causal chain from synapse to civilisation. It is an extraordinary feat of synthesis, and what makes ***Behave*** work is Sapolsky's refusal to let any single level of explanation claim priority. The gene matters, but so does the hormone; the hormone matters, but so does the childhood; the childhood matters, but so does the culture that shaped the childhood. <u>One finishes the book understanding, viscerally, that the question 'why did this person do this?' never has a single answer.</u>

    Even with a psychology background, I encountered experiments I had never heard of. The drone soldier in the Iraq War: a man who kills by remote control, thousands of miles from the explosion, and still develops PTSD, because the brain does not fully distinguish between pulling a trigger and clicking a mouse when the consequence is a human body coming apart on a screen. <u>And the Christmas truce of 1914: soldiers climbing out of trenches to exchange gifts with men they had been trying to kill hours earlier, because proximity and shared humanity, given even the smallest opening, can override the most powerful propaganda.</u> Sapolsky's determinism has drawn criticism from philosophers who insist on the irreducibility of agency. Perhaps they are right. But the book's moral force does not depend on settling that question. <u>It depends on making one feel, with the weight of seven hundred pages of evidence, that understanding why we behave as we do is the precondition for behaving better.</u>

- title: "The Idiot"
  type: "book"
  creator: "Fyodor Dostoevsky"
  creator_role: "by"
  translator: "Richard Pevear and Larissa Volokhonsky"
  year: 1869
  eval: "loved"
  image: "/assets/images/thoughts/books/idiot.jpg"
  posted: "2021-07-26"
  text: |
    Dostoevsky set out to write 'a truly beautiful man' and produced instead a figure whose beauty is indistinguishable from catastrophe. Prince Myshkin's innocence, his social blindness, his radical empathy, are not flaws in an otherwise functional character; they are the character, and they make his destruction inevitable from the opening pages. The moment he sees Aglaya and glimpses Nastasya Filippovna's portrait, the architecture of his breakdown is already legible. <u>Two women who function not as love interests in any conventional sense but as a wall between Myshkin and the superficiality of aristocratic life, each representing a dimension of experience his innocence cannot metabolise: Nastasya's suffering, Aglaya's pride, both demanding a response he is constitutionally incapable of giving.</u> The tragedy is structural before it is emotional.

    What makes ***The Idiot*** extraordinary, and what separates it from the more schematic explorations of goodness in literature, is that Dostoevsky never states the opposition directly. The innocent versus the worldly: one expects this to be the thesis, announced and elaborated. Instead, Dostoevsky disperses it across more than a dozen characters whose individual characterisation is remarkably precise, letting the reader arrive at Myshkin's fate only gradually, only in Part IV, through the accumulated weight of social interactions, failed interventions, and mounting dread. The *yurodivyi*, the holy fool of Russian Orthodox tradition, haunts the novel's margins without ever being invoked by name. Rowan Williams reads Myshkin as an experiment in *kenotic love*, self-emptying love, and perhaps that is right: <u>but what Dostoevsky shows is that self-emptying, in a world that runs on self-interest, is not sainthood but annihilation.</u> The 'idiot' is just a gentle child standing on the other side of a gauze curtain. The curtain never lifts.

- title: "Twelve Rules for Life: An Antidote to Chaos"
  type: "book"
  creator: "Jordan B. Peterson"
  creator_role: "by"
  year: 2018
  eval: "hated"
  image: "/assets/images/thoughts/books/twelve_rules_for_life.jpg"
  posted: "2021-06-01"
  text: |
    <u>Opens by bragging about a Quora answer's upvote count, which tells one everything one needs to know about the epistemological standards that follow.</u> ***Twelve Rules for Life*** is a dad-lecture delivered at volume, dressed in Jungian archetypes and lobster neuroscience, with the logic tossed out somewhere around page three and never retrieved. Watch any of Peterson's debates against someone who actually knows their field, Žižek on Marx, any competent biologist on the naturalistic fallacy, and every argument collapses into strategic ambiguity. Our undergraduate professor had a term for this kind of figure: a prime example of an opportunist.

    The lobster hierarchy argument, the book's one claim to scientific grounding, has been demolished by every serious biologist who bothered to engage with it; serotonin does not operate in crustacean nervous systems the way Peterson implies, and the inferential leap from decapod dominance displays to human social organisation is not even wrong, merely vacant. <u>What remains, once the lobsters are dispatched, is a self-help book for people who mistake confidence for competence, dressed in enough Jungian mythology to feel intellectual without requiring any of the intellectual labour.</u>


- title: "The Vaccine Race: Science, Politics, and the Human Costs of Defeating Disease"
  type: "book"
  creator: "Meredith Wadman"
  creator_role: "by"
  year: 2017
  eval: "liked"
  image: "/assets/images/thoughts/books/the_vaccine_race.jpg"
  posted: "2021-05-15"
  text: |
    ***The Vaccine Race*** centres on WI-38, the fetal cell line derived by Leonard Hayflick in 1961 that became the basis for vaccines against rubella, rabies, polio, and hepatitis A. Wadman reconstructs the science and the politics simultaneously: how the cell line was developed, why it was controversial, and how the institutions and individuals who controlled it shaped vaccine development for half a century.

    The Hayflick dispute -- in which he took his WI-38 cells from the National Institutes of Health in a quarrel over ownership -- is the book's dramatic spine. Wadman is sympathetic to Hayflick without being credulous: the man was difficult, correct about the science, and operating in a framework that had not yet worked out who owned biological research material. The questions he raises about the ownership of human cell lines remained unresolved at the time of writing, and his case sits in a direct line with the Henrietta Lacks case.

    <u>The book is most valuable for its attention to the forgotten figures: the women who donated the fetal tissue, the nurses and assistants whose labour made the cell line possible, and Stanley Plotkin's patient decades-long effort to develop a rubella vaccine that would prevent the disabilities that drove his work.</u> History written outward from the laboratory bench rather than downward from the institutional.

- title: "Bottle of Lies: The Inside Story of the Generic Drug Boom"
  type: "book"
  creator: "Katherine Eban"
  creator_role: "by"
  year: 2019
  eval: "liked"
  image: "/assets/images/thoughts/books/bottle_of_lies.jpg"
  posted: "2021-04-20"
  text: |
    Katherine Eban spent a decade investigating the generic drug industry and ***Bottle of Lies*** is the result: a meticulously reported account of systematic fraud at the Indian pharmaceutical company Ranbaxy, which falsified drug quality data for products sold in the United States and around the world, and of the FDA's failure to detect and deter this fraud for years. The book's principal source is the whistleblower Dinesh Thakur, whose story runs through the narrative as both personal drama and legal case study.

    The investigative reporting is excellent. Eban builds the case through documents, testimony, and on-the-ground reporting in India, and the picture she constructs of a regulatory system unable to effectively audit factories thousands of miles away is both specific and systemic. The FDA emerges not as corrupt but as structurally inadequate: too few inspectors, too dependent on advance notice, too easy to game by companies that know exactly where the agency is looking.

    What makes the book more than a corporate exposé is its attention to the patients at the end of the supply chain: HIV patients in Africa receiving substandard antiretrovirals, patients in the United States whose generic medications were made in conditions the companies' own data showed were unacceptable. <u>The fraud is not abstract; it is a calculation that patients who cannot pay for branded drugs will not be able to verify what they are given, and that calculation was correct for a very long time.</u>

- title: "The Remains of the Day"
  title_en: "日の名残り"
  type: "book"
  creator: "Kazuo Ishiguro"
  creator_role: "by"
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/books/the_remains_of_the_day.jpg"
  posted: "2021-04-15"
  text: |
    I read 长日将尽 in Chinese first, years before coming to the English, and the experience of returning to ***The Remains of the Day*** in Ishiguro's own prose was like hearing a piece of music you know from a recording performed live: the same structure, the same notes, but a directness the translation could only approximate. Stevens is one of literature's great unreliable narrators, not because he lies but because he has perfected a form of self-deception so total that truth and falsehood have become irrelevant categories. He does not suppress his feelings for Miss Kenton; he has constructed an entire philosophy of professional 'dignity' that makes such feelings structurally invisible.

    <u>The genius is that Ishiguro lets the reader see everything Stevens cannot, without once breaking the first-person frame.</u> The dramatic irony is sustained across the entire novel, and it is devastating precisely because it is so quiet. Stevens recounts his life at Darlington Hall with the care of a man polishing silver, and the reader watches the years drain away, the political complicity deepen, the one person who might have saved him walk out of the door.

    Lord Darlington's Nazi sympathies are handled with the same reticence Stevens applies to everything: acknowledged, explained away, folded back into the larger narrative of service and duty. The novel's argument is that institutional loyalty, carried far enough, becomes a form of moral abdication, and Stevens is both its illustration and its victim. The bus-stop scene near the end, where Stevens and Miss Kenton acknowledge what might have been and recognise it is irretrievably gone, is among the most heartbreaking passages in postwar fiction. <u>Ishiguro does not raise his voice. He does not need to.</u>

- title: "Marx: A Very Short Introduction"
  type: "book"
  creator: "Peter Singer"
  creator_role: "by"
  year: 1980
  eval: "liked"
  image: "/assets/images/thoughts/books/marx.jpg"
  posted: "2021-04-11"
  text: |
    I came to this because I was reading Singer's work on animal liberation and effective altruism, and wanted to understand the intellectual foundations of his early career. Singer wrote this in 1980, before the utilitarian turn that would define his later reputation, and the book carries traces of a different Singer: one still working through Marx's categories, still treating historical materialism as a live option rather than a historical curiosity. The most compelling Marx introduction I have read, and the reason is structural: Singer maps Marx's personal intellectual development alongside the theoretical architecture, so that *alienation*, *surplus value*, and collectivism arrive not as a list of doctrines but as stages in a single mind's confrontation with industrial capitalism. The treatment of *alienation* is particularly strong. Singer traces it from the *1844 Manuscripts* (1844) through to *Capital* (1867) without losing the thread, making a persuasive case that the early Marx and the mature Marx are engaged in the same project, however much the Althusserians insist on an epistemological break. One can disagree; the structuralist objection, that Singer overweights the young Hegelian Marx at the expense of the historical materialist, has force. <u>But ***Marx: A Very Short Introduction*** has the virtue of coherence, and for an introduction, coherence matters more than comprehensiveness.</u>

    The *Wissenschaft* mistranslation is the sharpest passage. Marx understood his theory as *Wissenschaft*, a term that in German encompasses systematic knowledge far more broadly than the English 'science'. But it got rendered as 'Science', capital-S, and Karl Popper seized on that translation to attack Marxism for failing the *falsifiability* criterion, a criterion Marx never claimed to meet because he was not doing science in Popper's narrow sense. <u>It is a perfect illustration of how posterity misreads, how a translation error can calcify into a philosophical refutation that generations of students accept without question.</u> Singer spots this and names it cleanly. His final remarks on China, written with a philosopher's caution but a realist's awareness that the Chinese experiment was testing Marx's categories in ways Marx himself could not have anticipated, remain spot-on decades later.













- title: "The Genius of Birds"
  title_en: "鸟类的天赋"
  type: "book"
  creator: "Jennifer Ackerman"
  creator_role: "by"
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/books/the_genius_of_birds.jpg"
  posted: "2021-04-08"
  text: |
    What ***The Genius of Birds*** does best is dismantle the architecture of a prejudice. 'Bird brain' is not merely an insult; it encodes a specific neuroscientific assumption, that intelligence requires a neocortex, that mammals hold a monopoly on complex cognition, that the avian brain, lacking cortical lamination, must be operating at a lower register. Ackerman demolishes this assumption with the patience of someone who knows the evidence is on her side. New Caledonian crows craft multi-step tools; Clark's nutcrackers cache tens of thousands of seeds and retrieve them months later; songbirds acquire dialects through a developmental process that parallels human language acquisition with uncanny precision.

    <u>The deepest argument is about convergent evolution: intelligence is not a single architectural achievement but a problem that evolution has solved more than once, through fundamentally different neural substrates.</u> Bird brains pack neurons at densities that exceed primate cortex, achieving comparable cognitive feats through circuits that look nothing like ours. This should unsettle anyone who thinks of the mammalian brain as the pinnacle of cognitive design.

    The book is organised by cognitive domain, tool use, spatial memory, social intelligence, song, and each chapter builds from field observations to laboratory findings to theoretical implications. Ackerman writes with genuine enthusiasm and without condescension, though the treatment leans toward celebration rather than critical assessment of where the field's claims outrun its evidence. <u>That is a minor fault. The major achievement is making one see birds differently, and once the seeing changes, it does not change back.</u>

- title: "Life Ascending: The Ten Great Inventions of Evolution"
  title_en: "生命的跃升"
  type: "book"
  creator: "Nick Lane"
  creator_role: "by"
  year: 2009
  eval: "disliked"
  image: "/assets/images/thoughts/books/life_ascending.jpg"
  posted: "2021-03-25"
  text: |
    I came to ***Life Ascending*** having already been converted by Lane's *The Vital Question*, and the disappointment was proportional to the expectation. The structure, ten chapters for ten 'great inventions' of evolution, imposes a listicle format on material that resists it. The origin-of-life and complex-cell chapters are strong because they draw on Lane's own bioenergetic research, but the later chapters on consciousness and death read as though Lane felt obligated to fill a quota and reached for topics outside his expertise.

    <u>The writing is competent throughout but lacks the sustained argumentative drive that makes *The Vital Question* thrilling.</u> Lane is at his best when tracing proton gradients across membranes; he is less convincing when speculating about the evolutionary origins of subjective experience. A book that had been five chapters rather than ten, concentrating on what Lane actually knows, would have been twice as good.

- title: "Order out of Chaos: Man's New Dialogue with Nature"
  title_en: "从混沌到有序"
  type: "book"
  creator: "Ilya Prigogine and Isabelle Stengers, trans. 曾庆宏 and 沈小峰 (CH)"
  creator_role: "by"
  year: 1984
  eval: "meh..."
  image: "/assets/images/thoughts/books/order_out_of_chaos.jpg"
  posted: "2021-03-22"
  text: |
    The quality of Chinese science translation in the early reform era was remarkably high, as one can see from the period's renderings of Maugham and Fitzgerald; that ***Order out of Chaos*** received such a poor translation is its own indictment of how little science was valued at the time. The book itself is a sketch of a revolution: Prigogine wants to emphasise the fusion of different modes of thinking, but his own framework remains stubbornly classical, all binaries and oppositions, every culture reduced to 'conflict.' <u>The sections on complex systems, the very reason I picked the book up, are sparse and unsatisfying.</u> Readers seeking a genuine introduction to non-equilibrium thermodynamics or complexity would do better with more recent work; this book, despite its ambitions, undercuts its own argument.

- title: "The Self Illusion: How the Social Brain Creates Identity"
  type: "book"
  creator: "Bruce Hood"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/the_self_illusion.jpg"
  posted: "2021-03-15"
  text: |
    ***The Self Illusion*** makes a case familiar from Buddhist philosophy but argued through cognitive neuroscience: the self is not a thing but a process, not a unified agent directing experience but a narrative assembled after the fact from multiple independent neural systems. Hood draws on classic experiments -- the split-brain studies of Gazzaniga, the confabulation work of Ramachandran, priming effects that implicate unconscious processes in what subjects retrospectively report as deliberate choices -- to argue that the coherent "I" who seems to be the author of one's life is a useful fiction rather than a fact.

    The argument is sound as far as it goes, and the survey of supporting evidence is clear and well-organised. Where the book is less satisfying is in working out what follows. If the self is an illusion, what does that mean for responsibility, autonomy, and intention? Hood gestures at these implications without fully developing them, and the final chapters slide into a mild optimism -- the self is an illusion, but our social identities are real even if our inner selves are not -- that feels less like a conclusion than a way of avoiding one.

    <u>The best chapters are the neurological case studies, where the evidence for self-construction is most concrete: patients who confabulate motives, patients who cannot update their self-model after injury, the split-brain patient whose left hemisphere invents explanations for what the right hemisphere has just done.</u> The theoretical ambition slightly exceeds the grip.

- title: "Overcomplicated: Technology at the Limits of Comprehension"
  title_en: "过于复杂"
  type: "book"
  creator: "Samuel Arbesman"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/overcomplicated.jpg"
  posted: "2021-03-10"
  text: |
    A solid introduction to complexity as a property of modern technological systems, though not the book for anyone wanting a formal entry into complexity science. Arbesman identifies four factors that generate what he calls 'overcomplicated' systems: accretion, interaction, edge cases, and the sheer passage of time, and argues that we need to abandon the engineering instinct toward abstraction and adopt instead a biological mode of thinking, one attuned to feedback, cascading failures, and emergent behaviour.

    <u>The argument is clear and the examples are well chosen, even if the prose occasionally circles a point longer than necessary.</u> The Chinese translation is decent, despite a few baffling errors. ***Overcomplicated*** is useful for what it is: a readable primer that frames the right questions without claiming to answer them. It does not try to be more, and that restraint is a virtue.

- title: "Irrational Man: A Study in Existential Philosophy"
  title_en: "非理性的人"
  type: "book"
  creator: "William Barrett"
  creator_role: "by"
  year: 1958
  eval: "meh..."
  image: "/assets/images/thoughts/books/irrational_man.jpg"
  posted: "2021-03-09"
  text: |
    Friends who study philosophy warned me that Barrett likes to talk to himself, and they were not wrong. ***Irrational Man*** is a serviceable overview of existentialist thought, tracing the lineage from Kierkegaard through Nietzsche, Heidegger, and Sartre, and the first section on the intellectual context is useful. But the second part, the portraits of the four masters, has a patchwork quality, as though Barrett assembled fragments without fully integrating them. <u>The question the book leaves unanswered is the one it should have begun with: anyone who wants a survey of existentialism would be better served reading the existentialists themselves.</u>

- title: "The Myth of Mirror Neurons: The Real Neuroscience of Communication and Cognition"
  title_en: "神秘的镜像神经元"
  type: "book"
  creator: "Gregory Hickok, trans. unknown (CH)"
  creator_role: "by"
  year: 2014
  eval: "meh..."
  image: "/assets/images/thoughts/books/the_myth_of_mirror_neurons.jpg"
  posted: "2021-03-04"
  text: |
    Hickok's thesis is that the mirror neuron framework, the idea that understanding others' actions requires internally simulating them via a dedicated 'mirror' system, has been vastly overhyped, and that the actual neuroscience of language and action understanding is more distributed and more interesting than the mirror story allows. On this he is largely right. The debunking chapters are effective: Hickok dismantles the strongest claims methodically, showing where the data have been over-interpreted and where alternative explanations fit better.

    <u>The problem is that demolition is easier than construction, and Hickok's alternative framework, while sensible, lacks the conceptual vividness that made mirror neurons so seductive in the first place.</u> A necessary corrective, but not quite the 'real neuroscience' the subtitle promises.

- title: "Reality Is Not What It Seems: The Journey to Quantum Gravity"
  title_en: "现实不似你所见"
  type: "book"
  creator: "Carlo Rovelli"
  creator_role: "by"
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/books/reality_is_not_what_it_seems.jpg"
  posted: "2021-02-26"
  text: |
    Rovelli does what almost no other physicist-writer manages: he makes the conceptual architecture of loop quantum gravity feel not merely intelligible but beautiful, and he does it without dumbing anything down. ***Reality Is Not What It Seems*** shares the sweeping historical vision of *Seven Brief Lessons on Physics*, but extends it into deeper territory, tracing the line from Democritus through Einstein to the granular structure of spacetime itself, where space is woven from discrete loops rather than continuous, and time emerges from quantum transactions rather than serving as a backdrop.

    <u>Rovelli writes about physics the way the best essayists write about anything: as though the reader's understanding were not an obstacle to be overcome but a capacity to be trusted.</u> The chapters on Dante's cosmology and on the philosophical implications of quantum gravity are not digressions; they are the book's argument, that physics has always been entangled with how we imagine reality, and that the imagination is constitutive of the science, not separate from it. As with *Seven Brief Lessons*, the prose is effortlessly fluid, and one comes away not merely informed but altered in how one pictures the world.

- title: "Thing Explainer: Complicated Stuff in Simple Words"
  type: "book"
  creator: "Randall Munroe"
  creator_role: "by"
  year: 2015
  eval: "disliked"
  image: "/assets/images/thoughts/books/thing_explainer.jpg"
  posted: "2021-02-22"
  text: |
    Beautifully drawn, and Munroe is as funny as ever, but ***Thing Explainer*** is conceptually hollow. The conceit, explaining complex systems using only the thousand most common English words, sounds charming and produces a book that is almost entirely useless to anyone who actually wants to learn. The 'ring of fire' is the only object in the entire book identified by its real name. <u>Stripping away technical vocabulary is not the same thing as making knowledge accessible; sometimes the jargon is the knowledge, and removing it removes the thing you were trying to explain.</u> An entertaining game that mistakes itself for pedagogy.

- title: "We Are Our Brains: A Neurobiography of the Brain, from the Womb to Alzheimer's"
  title_en: "我即我脑"
  type: "book"
  creator: "Dick Swaab, trans. unknown (CH)"
  creator_role: "by"
  year: 2014
  eval: "disliked"
  image: "/assets/images/thoughts/books/we_are_our_brains.jpg"
  posted: "2021-02-20"
  text: |
    Swaab's reputation as a researcher had led me to expect rigour, and the first half delivers something close to it: a tour through his own work on sexual differentiation, brain development, and ageing, enriched by personal anecdotes and case histories that ground the neuroscience in lived experience. But the second half collapses into a grab-bag of topics, consciousness, memory, free will, treated with a generality that borders on negligence. <u>The logical slope is the real problem: 'we are our brains' is stated as self-evident, yet the book never once engages with embodied cognition, as though the entire post-Damasio literature did not exist.</u>

    The claim that sexual orientation is 'determined before birth,' supported almost entirely by Swaab's own finding that the SCN is larger in homosexual men, does not constitute the proof he presents it as. And structurally, ***We Are Our Brains*** reads like a snippet collection, each chapter a self-contained vignette with no connective tissue. The book needed an argument; it settled for a bibliography.

- title: "Self as Method: Thinking Through and Beyond"
  title_en: "把自己作为方法"
  type: "book"
  creator: "Xiang Biao and Wu Qi"
  creator_role: "by"
  year: 2020
  eval: "meh..."
  image: "/assets/images/thoughts/books/self_as_method.jpg"
  posted: "2021-02-19"
  text: |
    A conversation between anthropologist Xiang Biao and journalist Wu Qi, structured as an intellectual autobiography that doubles as a methodological statement. The insights are real but infrequent. Xiang's work on 'Zhejiang Village' in Beijing, and the conviction it produced, that theory must be grounded, that intellectuals must learn to see from below, can be summarised as 'treat people as people,' which is what the puzzling title roughly means. The problem is that ***Self as Method*** does not always practice what it preaches. Xiang says 'understanding is natural, not difficult, but we often refuse to understand,' a claim that sounds profound until you ask whether most people would agree, at which point its distance from the ground becomes visible.

    <u>For someone who spent twenty years at Oxford and the Max Planck Institute, Xiang's knowledge of his own institutional environment is oddly thin: he calls the colleges 'mainly for undergraduate teaching,' when anyone who has been through the tutorial system knows that is not what colleges are mainly for.</u> The praise of 'gentry spirit' and the injunction to 'know your own environment' sit uneasily with these lapses.

- title: "Why We Sleep: Unlocking the Power of Sleep and Dreams"
  type: "book"
  creator: "Matthew Walker"
  creator_role: "by"
  year: 2017
  eval: "hated"
  image: "/assets/images/thoughts/books/why_we_sleep.jpg"
  posted: "2021-02-15"
  text: |
    ***Why We Sleep*** made me angry in a way that only dishonest science can. Matthew Walker's thesis, that sleep deprivation is a catastrophic public-health crisis linked to cancer, Alzheimer's, obesity, and shortened lifespan, is presented with the confidence of settled consensus. It is not. Alexey Guzey's detailed debunking, published in 2019, identified manipulated graphs, cherry-picked studies, exaggerated causal claims built from correlational data, and citations that did not support the assertions Walker attached to them. Walker's partial response acknowledged some errors but failed to address the core problems, and the scientific community's largely silent acceptance of a bestselling book riddled with factual errors became its own case study in how popular science publishing fails.

    <u>The message that sleep matters is uncontroversial; the specific statistical claims are the problem, and a scientist who distorts data in service of a 'good' message is still distorting data.</u> I felt deceived, and I do not forgive books that deceive me.

- title: "The Nao of Brown"
  title_en: "布朗的世界"
  type: "book"
  creator: "Glyn Dillon"
  creator_role: "by"
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/books/the_nao_of_brown.jpg"
  posted: "2021-02-14"
  text: |
    Glyn Dillon's watercolour panels are some of the most beautiful artwork I have seen in a graphic novel. Nao Brown works in a London toy shop, collects Japanese vinyl figures, and is tormented by intrusive thoughts of extraordinary violence: visions of stabbing, burning, destroying, arriving without warning and departing without explanation. The book is partly about obsessive-compulsive disorder and partly about the gap between how a person looks from the outside and what is happening within, and Dillon's visual style, lush, warm, suffused with colour, becomes the formal expression of that gap. <u>The world Nao inhabits is red and golden and tender; the world inside her head is none of those things, and the contrast is the book's engine.</u>

    The narrative braids Nao's story with a fictional manga about a Buddhist monk, and the two threads mirror and illuminate each other without ever collapsing into allegory. The Chinese translation is superb, both in rendering Dillon's prose and in its typesetting, which preserves the visual rhythm of the original. ***The Nao of Brown*** is the rare graphic novel that uses the form not as illustration but as argument: what Dillon achieves with colour, layout, and the relationship between panel and page could not be achieved in prose alone.

- title: "The Hitchhiker's Guide to the Galaxy"
  type: "book"
  creator: "Douglas Adams"
  creator_role: "by"
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/books/hitchhikers_guide_to_the_galaxy.jpg"
  posted: "2021-02-01"
  text: |
    Hard to justify having come to ***The Hitchhiker's Guide to the Galaxy*** so late, but here we are. <u>Adams is doing something rare: using comedy as a load-bearing philosophical structure rather than decorating an existing one.</u> The destruction of Earth for a hyperspace bypass, the bureaucratic indifference of the Vogons, the supercomputer that spends millennia computing the answer to life, the universe, and everything only to deliver '42', these are not jokes with philosophical implications; they are philosophical arguments delivered as jokes. The puns are relentless, the setups absurdly patient, Adams spending half a page constructing the scaffolding for a single small gag. That commitment to the bit is what separates him from lesser comic writers.

    What surprised me most was the melancholy. Beneath the absurdism runs something bleak: Arthur Dent is a man who has lost everything, his home, his planet, his species, and the universe responds with paperwork and bad poetry. Slartibartfast explaining how the Vogon demolition fleet arrived, 'That's bureaucracy for you!', is funny precisely because it is terrifying. <u>Adams understood, long before it became fashionable to say so, that the real horror is not malice but indifference; that the universe is not hostile, merely unhelpful.</u> <u>He has people thinking seriously about the role of towels in civilisation, and somehow that sentence is not a joke.</u> I loved every page. The towel stays packed.



- title: "Power, Sex, Suicide: Mitochondria and the Meaning of Life"
  title_en: "能量、性、死亡"
  type: "book"
  creator: "Nick Lane, trans. unknown (TW)"
  creator_role: "by"
  year: 2005
  eval: "loved"
  image: "/assets/images/thoughts/books/power_sex_suicide.jpg"
  posted: "2021-01-24"
  text: |
    Read immediately after *The Vital Question*, ***Power, Sex, Suicide*** covers much of the same bioenergetic ground but with additional sections, above all on the 'warm-blooded revolution,' Lane's argument about how the evolution of endothermy was driven by mitochondrial energy capacity. On that specific claim, Lane's metabolic hypothesis did not quite convince me, but the broader framework is characteristically thrilling: Lane traces the thread of mitochondrial biology through energy production, the evolution of sex (as a mechanism for purging deleterious mitochondrial mutations), and the role of apoptosis in multicellular life, each chapter building on the last with a narrative momentum rare in science writing.

    <u>The prose is as fluid as in *The Vital Question*, written a decade later, confirming that Lane's gift for making dense biochemistry vivid was there from the beginning.</u> The Taiwanese translation is of high quality, though the occasional rendering choices, 'proton pump' as 質子幫浦 rather than the perfectly serviceable 質子泵, required some adjustment. A minor quibble against what is, in substance and ambition, among the finest science books I have encountered.

- title: "The Vital Question: Why Is Life the Way It Is?"
  title_en: "复杂生命的起源"
  type: "book"
  creator: "Nick Lane, trans. 严曦 (CH)"
  creator_role: "by"
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/books/the_vital_question.jpg"
  posted: "2021-01-22"
  text: |
    I spent a week reading 严曦's Chinese translation with the attention one reserves for books that reorganise how one thinks about the world, and ***The Vital Question*** did exactly that. Lane's central argument is bioenergetic: the reason complex life exists at all, the reason eukaryotic cells arose only once in four billion years, comes down to energy. Bacteria and archaea are trapped by their own cell membranes: to maintain proton gradients for ATP synthesis, they must distribute copies of their genome near the membrane surface, and the energetic cost of maintaining hundreds of genome copies prevents them from expanding. The endosymbiotic event, an archaeon engulfing a bacterium that became the mitochondrion, liberated the host cell from this constraint, concentrating respiration in a dedicated organelle and freeing the nuclear genome to expand, diversify, and eventually produce every complex organism on Earth.

    The alkaline hydrothermal vent hypothesis for the origin of life is the book's other major contribution: Lane argues that life began not in a primordial soup but at submarine vents where natural proton gradients across thin iron-sulphide barriers could drive the reduction of CO₂ by H₂, producing organic molecules without enzymes. <u>The elegance of this proposal is that it explains why all life, from archaea to mitochondria to chloroplasts, uses proton gradients: because life was born inside one.</u>

    Lane does not write down to his reader. The chemistry is real, the terminology is precise, and the translator 严曦 handles the difficulty with a rigour that elevates the Chinese edition into something pleasurable to read. <u>This is the most intellectually thrilling science book I have encountered: a single argument, pursued with total commitment, that redraws the map of life's deepest history.</u>


- title: "The Case of the Speluncean Explorers: Nine New Opinions"
  title_en: "洞穴奇案"
  type: "book"
  creator: "Peter Suber"
  creator_role: "by"
  year: 1998
  eval: "loved"
  image: "/assets/images/thoughts/books/the_case_of_the_speluncean_explorers.jpg"
  posted: "2021-01-16"
  text: |
    A group of cave explorers, trapped underground with no hope of rescue, kill and eat one of their number to survive. The question is whether they should be convicted of murder. Peter Suber takes Lon Fuller's original 1949 hypothetical and extends it with nine fictional judicial opinions, each arguing from a different school of legal philosophy: natural law, positivism, legal realism, feminist jurisprudence, economic analysis, and more. The book is one of the most elegant introductions to legal reasoning I have encountered, and it requires no background in law to follow.

    <u>What makes ***The Case of the Speluncean Explorers*** so compelling is the architecture of doubt: each opinion seems persuasive until the next one arrives and dismantles it, so that the reader is constantly revising their own position, discovering that their intuitions rest on philosophical commitments they had not examined.</u> The sequencing is masterful; Suber anticipates exactly where the reader's objections will form and addresses them through the next judge's reasoning, creating a momentum that carries the book in a single sitting.

    The Chinese translation is uneven: the rendering is often ungrammatical in ways that obscure the legal reasoning, with sentence structures that do not exist in standard Chinese. There is no alternative Chinese edition; read the English original if at all possible.


- title: "RHS Genealogy for Gardeners: Plant Families Explored and Explained"
  title_en: "英国皇家园艺学会植物分类指南"
  type: "book"
  creator: "Ross Bayton and Simon Maughan"
  creator_role: "by"
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/books/rhs_genealogy_for_gardeners.jpg"
  posted: "2021-01-08"
  text: |
    I had never had the slightest interest in botany or gardening before picking up this book, and ***RHS Genealogy for Gardeners*** dragged me in. The hardback edition is beautiful: the illustrations are precise and generous, the layout invites browsing, and Bayton and Maughan treat plant taxonomy not as a dry classification exercise but as a key to seeing the relationships that connect seemingly unrelated species. One comes away understanding why a strawberry and a rose are cousins, and why that matters.

    <u>The book turned me into a collector of names, which is perhaps the first symptom of botanical infection.</u> I discovered that I had been mispronouncing 檗 for twenty-one years, which is exactly the kind of humbling, delightful correction that makes taxonomic reading worthwhile. The Chinese edition is handsomely produced. A book that opened a door I did not know existed.


- title: "Crows: Encounters with the Wise Guys of the Avian World"
  title_en: "乌鸦简史"
  type: "book"
  creator: "Candace Savage, trans. unknown (CH)"
  creator_role: "by"
  year: 2005
  eval: "liked"
  image: "/assets/images/thoughts/books/crows.jpg"
  posted: "2021-01-08"
  text: |
    Savage is a prolific Canadian nature writer, and ***Crows*** is a compact survey of humanity's long, ambivalent relationship with corvids: revered in Indigenous cosmologies, reviled in European folklore, and increasingly studied by cognitive scientists who keep finding that crows are smarter than the experimental paradigms designed to test them. The book is at its best when it draws on field observations and cultural history, weaving myth, ornithology, and anecdote into something that reads more like a portrait than a monograph.

    The weakness is the extended treatment of Bernd Heinrich's crow research, which occupies more space than it earns. Heinrich's framework for understanding avian intelligence feels dated, particularly his insistence on a hierarchy in which emotion is more 'primitive' than reason, a view that comparative cognition has moved well past. <u>A book about crows should not make the reader doubt that its principal scientist understands what intelligence is.</u>

    The Chinese edition's title -- 乌鸦简史, 'A Brief History of Crows' -- misrepresents a book structured as encounters, not history; the translation is rough in places.


- title: "The Rules of Contagion: Why Things Spread — and Why They Stop"
  title_en: "传染"
  type: "book"
  creator: "Adam Kucharski, trans. unknown (CH)"
  creator_role: "by"
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/books/the_rules_of_contagion.jpg"
  posted: "2021-01-05"
  text: |
    A rare popular-science book about mathematical modelling that actually explains the models. Kucharski traces the SIR framework from its epidemiological origins through its surprisingly wide applications: sociology, economics, criminology, online virality. The structure is tight, the introduction of technical material is well judged, and the central insight, that the same mathematical architecture describes the spread of diseases, ideas, financial panics, and violent crime, is presented with enough specificity to be instructive rather than merely analogical.

    <u>The most striking section is the application of contagion models to violence: that outbreaks of violent crime can be modelled, and sometimes predicted, using the same equations that track measles transmission.</u> Kucharski handles the ethical and methodological complications without flinching. The book's only real weakness is a shortage of figures; for a book about models and transmission dynamics, the absence of diagrams and graphs is a puzzling omission. 'In the time it takes to read this book, roughly 300 people worldwide will have died of malaria, over 500 of AIDS, and about 80, mostly children, of measles.' ***The Rules of Contagion*** earns its urgency.

- title: "Great Myths of the Brain"
  type: "book"
  creator: "Christian Jarrett"
  creator_role: "by"
  year: 2014
  eval: "liked"
  image: "/assets/images/thoughts/books/great_myths_of_the_brain.jpg"
  posted: "2020-12-10"
  text: |
    ***Great Myths of the Brain*** does what the title promises: it systematically examines popular beliefs about the brain and evaluates the evidence for each. Jarrett is a science writer rather than a researcher, which means the treatment is broader than deep, but the breadth is appropriate for the purpose. The ten-per-cent myth, the left-brain/right-brain dichotomy, the Mozart effect, the idea that we are born with all the neurons we will ever have: these are addressed with clarity and appropriate attention to what the evidence actually shows.

    The book works best when Jarrett addresses beliefs that are half-true rather than wholly false, where the myth captures something real but distorts it. The ten-per-cent claim is nonsense if taken literally, but the underlying intuition that much of the brain's activity is non-conscious and not directly accessible to introspection is correct; the distortion is what makes the myth persistent. <u>The myths that survive debunking are always the ones with a grain of truth at their centre, and the interesting task is to locate the grain rather than simply discard the myth entire.</u>

    Where the book is weaker is in chapters on myths that remain contested in the literature, where Jarrett's confident demystifications occasionally oversimplify active debates. The neuroplasticity chapter, in particular, corrects some overclaims with other overclaims. Useful as an undergraduate primer or a reference for checking specific claims; not a book to reason with.

- title: "Seven Brief Lessons on Physics"
  type: "book"
  creator: "Carlo Rovelli"
  creator_role: "by"
  translator: "Simon Carnell and Erica Segre"
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/books/seven_brief_lessons_on_physics.jpg"
  posted: "2020-11-30"
  text: |
    I came to this after *The Order of Time* (2017), already convinced that Rovelli can write. ***Seven Brief Lessons on Physics*** confirmed it and then some. In barely eighty pages he covers general relativity, quantum mechanics, the architecture of the cosmos, elementary particles, quantum gravity, thermodynamics, and what it means to be human in a universe governed by these laws. <u>The compression alone is an achievement; that it reads like poetry is something else entirely.</u>

    The lesson on thermodynamics connects the second law to simple probability: heat 'flows' from hot to cold not because of any law commanding it but because that configuration is overwhelmingly more likely to occur. <u>Rovelli makes this feel not like a textbook explanation but like a revelation, a moment when the universe's deepest organising principle turns out to be nothing more exotic than counting.</u> Lesson six is essentially a condensed version of the first half of *The Order of Time* (2017): time's existence is a product of our ignorance; time is not an objective feature of reality but an artefact of our limited access to the world's microscopic details. The final chapter closes with the line 'We are the source of amazement in our own eyes,' and whatever one thinks of Rovelli's physics, that sentence does something to the reader. For someone who had spent months on neuroscience reading about how the brain constructs experience, the phrase lands with additional weight: the brain is not just the organ that perceives the universe, but the one that generates the amazement at having perceived it at all.

    I understand the criticism. Some physicists find his lyrical register suspect, as though writing beautifully about loop quantum gravity were itself evidence of a lack of rigour, even a kind of fakery. The speculative ideas do bleed into the popular writing in ways that make them seem more settled than they are. Fair enough. <u>But Rovelli's ideas and the way he articulates them move me, and I say this as a neuroscience student who came to physics as a passionate outsider, looking not for technical mastery but for the feeling of a structure glimpsed.</u> A neuroscience student's physics dream.

- title: "How We Remember: Brain Mechanisms of Episodic Memory"
  type: "book"
  creator: "Michael Hasselmo"
  creator_role: "by"
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/books/how_we_remember.jpg"
  posted: "2020-11-25"
  text: |
    ***How We Remember*** is the single book that has most shaped my thinking about memory mechanisms. More than Kandel's *In Search of Memory* (2006), which is mostly autobiography dressed as neuroscience; more than any review paper or textbook chapter. <u>Hasselmo does what almost no one else manages: he integrates computational modelling, pharmacology, and systems-level physiology into a coherent account of how the <em>hippocampus</em> encodes and retrieves <em>episodic memory</em>, with <em>acetylcholine</em> as the fulcrum between encoding and retrieval states.</u> The framework is clean without being reductive. One reads it and the hippocampal circuit clicks into place, not as a list of anatomical connections but as a system with dynamics, with states, with reasons for being wired the way it is.

    I first encountered this book early in my PhD, and it set the terms for how I think about the problems I work on daily: what does it mean for a circuit to switch between modes, how do neuromodulators sculpt the computational landscape, what is the relationship between oscillatory dynamics and the information the network carries. These are not abstract questions for me; they are the questions I bring to the recording rig. Hasselmo answered some of them, sharpened others, and made the rest feel tractable. <u>Some books one returns to not because one has forgotten them but because one has grown enough to read them differently.</u>


- title: "The Elephant Vanishes"
  title_en: "象の消滅"
  type: "book"
  creator: "Haruki Murakami, trans. Alfred Birnbaum and Jay Rubin"
  creator_role: "by"
  year: 1993
  eval: "liked"
  image: "/assets/images/thoughts/books/the_elephant_vanishes.jpg"
  posted: "2020-11-15"
  text: |
    A collection of seventeen short stories that maps the emotional territory Murakami's novels would later colonise. The standout is 'Barn Burning,' in which a young man's wealthy acquaintance casually confesses to burning down barns as a hobby, and the narrator's girlfriend vanishes without explanation. The story operates on the same principle as the best Murakami: something is wrong, the wrongness is never resolved, and the absence of resolution is itself the meaning. Lee Chang-dong's film *Burning* (2018) expanded the class-warfare subtext into a full-blown indictment of Korean inequality, but the original story's power lies in its refusal to explain.

    'The Elephant Vanishes' itself is nearly as good: a municipal elephant and its keeper disappear from a locked enclosure, and the narrator, who watched them from a hillside, insists that the elephant seemed to shrink before vanishing. <u>Murakami is at his most unsettling when the fantastic intrudes not as spectacle but as a quiet violation of proportion, a shift in scale that the world absorbs without comment.</u>

    The weaker stories, 'A Window,' 'The Second Bakery Attack,' blur together in the way that minor Murakami always does: competent, melancholy, slightly detached. But ***The Elephant Vanishes*** is the collection that established the template, and the best pieces, 'Barn Burning,' 'The Elephant Vanishes,' 'Sleep,' have a compression and a strangeness that the novels do not always achieve.

- title: "Your Brain Is a Time Machine: The Neuroscience and Physics of Time"
  type: "book"
  creator: "Dean Buonomano"
  creator_role: "by"
  year: 2017
  eval: "meh..."
  image: "/assets/images/thoughts/books/your_brain_is_a_time_machine.jpg"
  posted: "2020-10-25"
  text: |
    Misleading title. ***Your Brain Is a Time Machine*** spends far too long on the physics of time, relativity, the block universe, and explains all of it poorly; anyone interested would do better with Rovelli's *The Order of Time* (2017). The neuroscience half, which ought to be the book's centre of gravity, is where one expects Buonomano to deliver, and he does not. The kappa and tau effect experiments are striking, but the treatment stops well short of the question that matters: how does the brain actually construct temporal experience? <u>The book meanders between physics, neuroscience, and philosophy without committing to any of them.</u>

    Coming back to this five years into a PhD in hippocampal electrophysiology, the gaps are sharper than I first realised. Buonomano barely touches *time cells*, the hippocampal neurons that fire at specific moments during a temporal interval, despite the fact that they are arguably the strongest evidence for the brain's intrinsic timing capacity beyond the sub-second scale. The distinction between *interval timing*, likely striatal and cerebellar, and the *episodic temporal organisation* performed by hippocampal sequences is never drawn. *Theta phase precession*, the mechanism by which place cells compress behavioural sequences into single oscillatory cycles, goes unmentioned, yet it is perhaps the most elegant neural solution to the problem of binding events across time. Eichenbaum's late reviews remain more focused and more useful. <u>The brain is indeed a time machine; Buonomano simply never opens the hood.</u>

- title: "The Language Instinct: How the Mind Creates Language"
  type: "book"
  creator: "Steven Pinker"
  creator_role: "by"
  year: 1994
  eval: "meh..."
  image: "/assets/images/thoughts/books/language_instinct.jpg"
  posted: "2020-08-30"
  text: |
    Are there references? The e-book has none at all. A bold move for a book whose central claim, that language is an innate biological instinct shaped by natural selection, has been contested by linguists, anthropologists, and connectionists for three decades. <u>One cannot even check.</u>

    Strip the missing citations away and there is still a problem of tone. ***The Language Instinct*** presents the nativist position with a confidence that reads less like scientific conviction than like salesmanship, as though sheer rhetorical momentum could settle a debate that Chomsky himself never managed to close. <u>The book asks for a faith that science should not require, and without references, faith is all it can offer.</u>

- title: "Enlightenment Now: The Case for Reason, Science, Humanism, and Progress"
  type: "book"
  creator: "Steven Pinker"
  creator_role: "by"
  year: 2018
  eval: "disliked"
  image: "/assets/images/thoughts/books/enlightenment_now.jpg"
  posted: "2020-08-30"
  text: |
    <u>Steven Pinker is the walking definition of confirmation bias: select the data that confirm your thesis, ignore the rest, call the result 'reason'.</u> I checked some of the claims after finishing and felt deceived, and I am still angry about it. <u>Cherry-picked time periods, poverty lines wielded like stage props, ecological catastrophe waved away with a graph that stops before the trend reverses.</u> When critics point this out he accuses them of 'progressophobia', which is the intellectual equivalent of putting one's fingers in one's ears. Plus there has been recent controversy. I cannot stand this man, approximately the same level of dislike that I have for Musk.

    The deeper problem with ***Enlightenment Now*** is not the cherry-picking itself but the rhetorical framework that makes the cherry-picking invisible. Pinker presents data as though data were self-interpreting, as though the mere display of a graph settles an argument. The result is a book that mistakes correlation for causation with the confidence of someone who has confused their own optimism for evidence.




- title: "The Strange Order of Things: Life, Feeling, and the Making of Cultures"
  type: "book"
  creator: "Antonio Damasio"
  creator_role: "by"
  year: 2018
  eval: "liked"
  image: "/assets/images/thoughts/books/the_strange_order_of_things.jpg"
  posted: "2020-08-20"
  text: |
    Antonio Damasio's argument in ***The Strange Order of Things*** is sweeping and somewhat polemical: that feelings, not reason, are the foundation of human culture, mind, and civilisation, and that this priority of feeling over cognition runs against the dominant narratives of both neuroscience and philosophy. Homeostasis -- the body's management of its own internal state -- is the ground on which feelings are built, and feelings are the bridge between the biological and the cultural; nothing in the latter makes sense without the former.

    The evolutionary argument is well constructed. Damasio traces the development of homeostatic regulation from single-celled organisms through invertebrates to the vertebrate nervous system, and the case that feelings are a late elaboration of ancient regulatory mechanisms rather than a uniquely human emergence is persuasive. The chapters on cultural homeostasis, on how art, religion, and political organisation function as homeostatic regulators at the level of societies, are more speculative but genuinely interesting.

    Where the book struggles is in its treatment of cognition. Damasio's insistence that reason without feeling is insufficient is correct and well-evidenced, but he sometimes writes as though reason were merely feeling's servant, which is a different and stronger claim. <u>The book is most convincing when it argues that feelings have been systematically underestimated; it is less convincing when it implies that cognition has been systematically overestimated.</u> An important corrective, moderately overstated.

- title: "Consciousness and the Brain: Deciphering How the Brain Codes Our Thoughts"
  type: "book"
  creator: "Stanislas Dehaene"
  creator_role: "by"
  year: 2014
  eval: "liked"
  image: "/assets/images/thoughts/books/consciousness_and_the_brain.jpg"
  posted: "2020-08-10"
  text: |
    Dehaene's argument in ***Consciousness and the Brain*** is systematic and specific: consciousness is the global broadcast of information to widely distributed cortical networks, the signature of a particular computational architecture rather than a mysterious additional ingredient. The book is an extended case for global workspace theory, supplemented by experimental paradigms -- masking, continuous flash suppression, the attentional blink -- that allow consciousness to be turned on and off by the experimenter and the difference between conscious and unconscious processing to be studied directly.

    The experimental chapters are the book's strength. Dehaene is a rigorous cognitive neuroscientist, and the evidence from signatures of consciousness (the late cortical ignition, the P300, the involvement of frontoparietal networks) is assembled with precision. The argument that consciousness leaves a distinctive neural footprint, identifiable across different kinds of content and different kinds of manipulation, is well supported.

    Where I found the theory less convincing was in its handling of phenomenal consciousness. Dehaene dismisses the hard problem somewhat too quickly for a book that claims to explain consciousness rather than merely its functional correlates. <u>Global workspace theory is a compelling account of access consciousness -- of what becomes available to report and act on -- but the question of why any of it should be experienced at all remains open, and the book proceeds as though closing the functional account were the same as closing the experiential one.</u> Valuable for the neuroscience; incomplete as philosophy.

- title: "Aroused: The History of Hormones and How They Control Just About Everything"
  title_en: "激素小史"
  type: "book"
  creator: "Randi Hutter Epstein, trans. 杨惠东 (CH)"
  creator_role: "by"
  year: 2018
  eval: "liked"
  image: "/assets/images/thoughts/books/aroused.jpg"
  posted: "2020-07-31"
  text: |
    The history of endocrinology makes for surprisingly good reading. ***Aroused*** moves from the nineteenth-century experimenters who first identified that organs produced chemical messengers into the bloodstream, through the isolation of insulin, oestrogen, testosterone, and cortisol, to the present-day complexity of the hormonal system and the political controversies it has generated. Epstein is a medical journalist, and the book has the journalist's gift for story: the scientists are characters, the discoveries are dramas, and the wrong turns are as interesting as the right ones.

    The chapter on testosterone is probably the most carefully handled. The evidence that testosterone causes aggression in humans is far weaker than popular belief requires, and Epstein traces both the studies and the ideology with appropriate scepticism. The chapter on insulin, and the extraordinary disputes over priority and credit behind its discovery, is absorbing.

    What the book trades off for readability is depth. Someone who wants to understand how the hypothalamic-pituitary axis actually works -- the feedback loops, the pulse patterns, the receptor dynamics -- will need to look elsewhere. Epstein describes the hormonal system with analogy rather than mechanism, and the analogies are good but not always sufficient. <u>The history is excellent; the science, simplified for a general audience, sacrifices enough precision that a specialist would find it frustrating at the edges.</u>

- title: "How To: Absurd Scientific Advice for Common Real-World Problems"
  type: "book"
  creator: "Randall Munroe"
  creator_role: "by"
  year: 2019
  eval: "liked"
  image: "/assets/images/thoughts/books/how_to.jpg"
  posted: "2020-06-25"
  text: |
    Randall Munroe applies the same method he uses in *What If?* (2014) -- take an absurd premise and pursue it with rigorous physics until something breaks -- but in ***How To*** the premises are practical advice gone wrong. How to cross a river. How to send a message. How to build a lava moat. Each chapter begins with straightforward advice and escalates through increasingly impractical solutions, always with accurate calculations and occasional diagrams.

    The charm of the *What If?* franchise is that the physics is real. The absurdity is structural, a product of taking a question seriously that was not meant to be taken seriously, and the educational effect is genuine: by the time one finishes the chapter on digging a hole, one learns something about density gradients and thermal conductivity. Munroe's voice -- precise, deadpan, mildly alarmed by his own conclusions -- carries the book. <u>The most useful entry is the chapter on landing a plane, which explains aerodynamic fundamentals more clearly than any textbook explanation I had encountered, because being told to land a plane without a pilot's licence is an excellent reason to pay attention.</u> Light reading, but Munroe's light is illuminating.

- title: "The Quantum Story: A History in 40 Moments"
  type: "book"
  creator: "Jim Baggott"
  creator_role: "by"
  year: 2011
  eval: "liked"
  image: "/assets/images/thoughts/books/the_quantum_story.jpg"
  posted: "2020-06-15"
  text: |
    Jim Baggott structures ***The Quantum Story*** as forty moments in the development of quantum mechanics, from Planck's 1900 paper on blackbody radiation to the early twenty-first century's quantum information and decoherence debates. The format is unusual: each chapter is named for a year and built around a specific paper, experimental result, or theoretical development, and the cumulative effect is something between a history of physics and an annotated bibliography.

    The historical narrative is well done. The characters are drawn precisely enough to feel like people rather than emblems of ideas, and Baggott is careful about the distinction between what physicists believed at the time and what the evidence, in retrospect, supported. The Copenhagen interpretation's historical dominance is treated as a contingent fact about the community rather than a settled verdict, which is the right approach.

    Where the book thins out is in the later chapters, where the pace of development outstrips the format. The discussion of quantum information, decoherence, and the modern interpretation debates is too compressed to be satisfying, and a reader without existing knowledge of the Everett interpretation or quantum computing will find themselves needing to supplement elsewhere. <u>The book works best as a reference to be dipped into rather than a narrative to be read straight through: the format that gives it coherence at the beginning becomes a limitation at the end.</u>

- title: "Seeing in the Dark: How Amateur Astronomers Are Discovering the Wonders of the Universe"
  type: "book"
  creator: "Timothy Ferris"
  creator_role: "by"
  year: 2001
  eval: "liked"
  image: "/assets/images/thoughts/books/seeing_in_the_dark.jpg"
  posted: "2020-06-05"
  text: |
    Timothy Ferris spent years visiting amateur astronomers across North America and ***Seeing in the Dark*** is the resulting portrait, a book in which the science of the night sky and the sociology of the people who observe it are interleaved with genuine warmth. The amateurs Ferris visits include retired teachers with backyard reflectors and enthusiasts with observatory-grade equipment, but what unites them is the experience of standing under the sky in the dark long enough to let the eyes adapt and the scale register.

    The science chapters are well done for a popular audience: the sections on star formation, galaxy clusters, and the scale of the universe are accurate and well pitched. But the book's heart is the human material, the stories of how people came to amateur astronomy, what they are looking for, and what they find. Ferris never sentimentalises this, but he clearly loves the community.

    <u>Amateur astronomers are, the book notes, among the last people in a developed country who regularly spend significant time in actual darkness; and the darkness changes what is possible to perceive: the faint galaxy on the edge of visibility requires a kind of attention the lit world does not cultivate.</u>

- title: "The Immortal Life of Henrietta Lacks"
  title_en: "永生的海拉"
  type: "book"
  creator: "Rebecca Skloot"
  creator_role: "by"
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/books/the_immortal_life_of_henrietta_lacks.jpg"
  posted: "2020-05-20"
  text: |
    Rebecca Skloot spent ten years researching ***The Immortal Life of Henrietta Lacks***, and the research shows. The book weaves three stories together: the scientific history of HeLa cells, the most widely used human cell line in biological research; the biography of Henrietta Lacks herself, a Black woman from Baltimore who died of cervical cancer in 1951 and from whose tumour the cells were taken without her knowledge or consent; and Skloot's own investigation, conducted alongside Henrietta's daughter Deborah, which is as much about the Lacks family's relationship with a history they were excluded from as it is about the cells.

    The ethical dimensions are handled without sentimentality. Skloot does not flatten the researchers who took the cells into villains; the medical culture of the 1950s treated biological samples as institutional property rather than as belonging to the patient, and Lacks was not uniquely wronged so much as paradigmatically wronged in a system that wronged many. <u>The cruelty is not that her cells were taken, but that the family learned from journalists rather than scientists, that they remained poor while institutions profited, and that Henrietta became a cell line before she became a person in the historical record.</u>

- title: "In the Blink of an Eye: A Perspective on Film Editing"
  type: "book"
  creator: "Walter Murch"
  creator_role: "by"
  year: 1995
  eval: "liked"
  image: "/assets/images/thoughts/books/in_the_blink_of_an_eye.jpg"
  posted: "2020-05-12"
  text: |
    Walter Murch edited *The Godfather*, *Apocalypse Now*, and *The English Patient*, and ***In the Blink of an Eye*** is his theoretical account of what editing is and how it works. The central question is: why do cuts work? Why does the viewer, presented with a discontinuous sequence of images, not experience them as discontinuous but as a continuous narrative? Murch's answer involves both cognitive psychology and film grammar, but his most provocative claim is that the cut works because it replicates the structure of human memory, which is also a discontinuous sequence of images assembled into apparent continuity by the mind.

    The discussion of the "rule of six" -- the six criteria Murch ranks, in order, when deciding whether a cut should be made -- is the book's most practically useful section, and it reads not as a rulebook but as a description of editorial intuition made explicit. Emotion is ranked first, above story logic and spatial continuity, because film is a medium of emotion first and grammar second.

    <u>The deepest point is almost casual: Murch notes that the blink itself occurs at moments of cognitive transition, and he suggests that the cut is the filmic equivalent of the blink, a punctuation mark the mind has already prepared for.</u> Whether or not this is literally true, it is a beautiful model.

- title: "Complexity: A Guided Tour"
  type: "book"
  creator: "Melanie Mitchell"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/complexity.jpg"
  posted: "2020-05-05"
  text: |
    Melanie Mitchell writes about complexity science from the inside: she has worked with John Holland on genetic algorithms and with Douglas Hofstadter on analogy and cognition, and the book reflects intimate rather than merely encyclopaedic knowledge of the field. ***Complexity*** covers cellular automata, self-organised criticality, genetic algorithms, network theory, and information theory as it applies to living systems, and the survey is well judged, building from simple examples toward the harder conceptual questions.

    What the field lacks, and what Mitchell honestly acknowledges it lacks, is a satisfactory definition of complexity itself. The book is a tour of phenomena that seem to instantiate something called complexity -- systems where rich behaviour emerges from simple rules, where small-scale interactions generate large-scale structure without a blueprint -- but the theoretical unity is still aspirational. The multiple candidate definitions (computational, thermodynamic, logical depth, effective complexity) are reviewed without resolution.

    <u>The most useful insight, and the one that stuck longest, is that complexity often lives at the boundary between order and chaos: too much order and the system cannot adapt; too much disorder and no pattern persists long enough to be selected for.</u> This "edge of chaos" framing has been contested, and Mitchell is honest about the evidence, but as a heuristic it has kept its grip. A clear, honest introduction to a field still looking for itself.

- title: "The Synaptic Organization of the Brain"
  type: "book"
  creator: "Gordon M. Shepherd (ed.)"
  creator_role: "ed."
  year: 2004
  eval: "liked"
  image: "/assets/images/thoughts/books/the_synaptic_organization_of_the_brain.jpg"
  posted: "2020-04-15"
  text: |
    I bought this for the hippocampus chapter and stayed for the first two chapters on synaptic physiology and circuit principles, which provided conceptual scaffolding I had not found elsewhere. As a reference work, ***The Synaptic Organization of the Brain*** does its job: each chapter treats a brain region as a circuit, emphasising the canonical connectivity and the physiological properties of each synapse type.

    But it is a dated reference now, and the datedness matters. The hippocampus chapter, the only one I feel qualified to evaluate in detail, contains much that is still correct, the basic trisynaptic circuit, the properties of long-term potentiation, the principal cell types, but some specifics, particularly regarding CA2 inputs and outputs, have changed substantially in the past fifteen years. <u>More significantly, the book says almost nothing about functional significance: the question of how hippocampal circuits relate to behaviour is not its concern.</u> Useful as an anatomical dictionary to consult between experiments; not a book to learn from.





- title: "The Hobbit"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1937
  eval: "loved"
  image: "/assets/images/thoughts/books/the_hobbit.jpg"
  posted: "2020-02-20"
  text: |
    The first time was in Chinese, as a child, and what I remember is the feeling of a world that went on beyond the edges of the page: Bilbo's pantry stocked for a party he did not plan, the riddles in the dark, Smaug's voice rumbling through the Lonely Mountain. When I reread ***The Hobbit*** in English at Cambridge, walking through the same kind of countryside Tolkien walked through, the book felt different. The adventure was still there, but so was something I had missed as a child: the tone, that mixture of coziness and danger, of fireside warmth and sudden violence, which is Tolkien's signature and which no imitator has ever replicated.

    Bilbo's heroism is the heroism of someone who would rather be at home, and that is why it works. He is not brave; he is stubborn, and curious, and too polite to refuse. The riddle contest with Gollum, the best scene Tolkien ever wrote in any book, is a contest between two creatures who are far more alike than either would admit, and the Ring passes between them not through force or cunning but through a kind of accident that Tolkien later elevated into theology. <u>Rereading it as an adult, what struck me was not the adventure but the melancholy: Thorin's death, the desolation of the dragon, the sense that every quest exacts a cost the questers did not anticipate.</u> A children's book that an adult reads differently, and the difference is the point.

- title: "The Fellowship of the Ring"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1954
  eval: "loved"
  image: "/assets/images/thoughts/books/the_fellowship_of_the_ring.jpg"
  posted: "2020-01-10"
  text: |
    I first read ***The Fellowship of the Ring*** as a child in Chinese, and what stayed was not the plot but the textures: Frodo sneaking mushrooms from Farmer Maggot's field, the smell of pipe-weed in the Prancing Pony, the terror of the Nazgûl on the road. When I came back to it at Cambridge, reading the English for the first time, those textures sharpened into something architectural. Tolkien builds Middle-earth the way a geologist builds a landscape: layer by layer, stratum by stratum, each culture and language resting on the one beneath it, and the reader's experience of depth is not metaphorical but structural. One feels the weight of history in every place name because the history is actually there, documented in appendices and unpublished manuscripts, generating the text from below.

    The departure from the Shire is the emotional foundation of the entire trilogy. Tolkien understood something that most fantasy writers do not: that adventure means loss, that leaving home is a wound, not merely the beginning of a story, that the story spends three volumes failing to heal. The Shire chapters are long because they need to be; the reader must love the Shire as much as Frodo does, or the sacrifice means nothing.

    <u>Reading this in England changed it. I had walked through the Cambridgeshire fields that look exactly like the Shire, and the hobbits' world had become something remembered rather than imagined, which made the threat to it feel personal in a way it had not when I was a child reading in Guangzhou.</u> The Council of Elrond, which I had found tedious at twelve, now read as the most important chapter in the book: a room full of people who do not trust each other deciding that someone must carry an impossible burden, and the smallest person in the room volunteering.

- title: "The Two Towers"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1954
  eval: "loved"
  image: "/assets/images/thoughts/books/the_two_towers.jpg"
  posted: "2019-12-20"
  text: |
    The structural gamble of ***The Two Towers*** is to split the Fellowship and run two narratives in parallel without intercutting: Books III and IV are self-contained, and the effect is disorienting in exactly the way Tolkien intends. The reader experiences the separation as the characters do, with no knowledge of how the other half fares. Book III, the war narrative, has Helm's Deep and the Ents' march on Isengard, which are the trilogy's most kinetic set pieces; Book IV, Frodo and Sam's journey through Ithilien and into Mordor, operates at the opposite register, slow, intimate, claustrophobic.

    Gollum is the great achievement of this volume. Tolkien gives him interiority without redemption: the Sméagol-Gollum duality, the creature arguing with itself, wanting to be good and wanting the Ring, is psychologically precise in a way that nothing else in the trilogy attempts. Sam's distrust of Gollum and Frodo's pity for him create a three-way dynamic that carries more tension than any battle. <u>The tragedy is that Frodo is right to show mercy, and Sam is right not to trust, and neither rightness prevents the catastrophe that follows.</u>

    Treebeard's grief for the lost forests is the passage that hit hardest on rereading. Tolkien was writing about industrialisation, about the destruction of the English countryside he loved, and Treebeard's slow, patient fury at the felling of trees has an ecological resonance now that it could not have had in 1954. The Ents are Tolkien's answer to the question of what happens when the natural world decides to fight back, and the answer is both magnificent and insufficient: they win the battle and lose the war, because the forests are already diminished beyond recovery.

- title: "The Return of the King"
  type: "book"
  creator: "J.R.R. Tolkien"
  creator_role: "by"
  year: 1955
  eval: "loved"
  image: "/assets/images/thoughts/books/the_return_of_the_king.jpg"
  posted: "2019-11-15"
  text: |
    The ending is the book. Everything in ***The Return of the King*** builds toward the Scouring of the Shire and the Grey Havens, and what makes those final chapters devastating is that they are not about victory but about what victory costs. Frodo saves the Shire but cannot live in it; the wound is too deep, the Ring's absence an amputation that will not heal. When he sails from the Grey Havens, he sails because there is nowhere left for him in the world he saved. <u>Tolkien understood that the hero's reward is not the kingdom but the departure, and that some wounds can only be treated by leaving everything you fought for behind.</u>

    The battle sequences are extraordinary, Pelennor Fields in particular, but they matter less on rereading than Denethor's despair, Éowyn's fury, and Sam carrying Frodo up Mount Doom. Sam is the moral centre of the entire trilogy, and his endurance is not heroic in any classical sense; it is the endurance of someone who loves his friend and cannot imagine stopping. The destruction of the Ring, Frodo's failure at the Crack of Doom and Gollum's accidental redemption, is Tolkien's deepest theological statement: that grace operates through the least likely instruments, that mercy shown to the wretched is never wasted even when it appears to have been.

    <u>I finished the trilogy at Cambridge in early 2020, weeks before the world shut down, and the Grey Havens hit differently than they had in Chinese as a child: not as an ending but as a farewell to a place I was about to leave.</u> The Shire was scoured; the hobbits rebuilt it; but Frodo could not stay. I have carried that image since.

- title: "Connectome: How the Brain's Wiring Makes Us Who We Are"
  title_en: "连接组"
  type: "book"
  creator: "Sebastian Seung"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/connectome.jpg"
  posted: "2019-09-20"
  text: |
    Sebastian Seung's central claim in ***Connectome*** is that "you are your connectome" -- that the specific wiring of your neural circuits encodes your memories, personality, and identity in a way that goes beyond what genetics alone can explain. The book makes this argument accessibly, moving from cellular neuroscience through developmental biology to the project of mapping complete neural circuits at scale, and the scientific chapters are clear and informative.

    Where I found myself more sceptical was in the philosophical extrapolation. Seung's argument that connectomic mapping might eventually allow a form of mind-uploading or radical life extension requires several moves that he makes with more speed than rigour, and the book becomes less a scientific argument than an aspirational manifesto in its final sections. The distinction between "encoded in" and "is", between correlation and identity, is one he gestures at without resolving.

    The strongest material is technical: the description of how electron microscopy and image analysis can trace neural connections at nanometre resolution, and the real examples from C. elegans and mouse retina, give the project a concreteness that the grander claims lack. <u>The book is most honest when most modest: connectomics is a new window onto neural organisation, and what it will reveal about mind and memory is a question the technology has not yet been running long enough to answer.</u> I read it at the start of my PhD and found it a useful map of both the ambitions and the limits of the field I was entering.

- title: "And Quiet Flows the Don"
  title_en: "静静的顿河 / Тихий Дон"
  type: "book"
  creator: "Mikhail Sholokhov, trans. 金人 (CH)"
  creator_role: "by"
  year: 1940
  eval: "loved"
  image: "/assets/images/thoughts/books/and_quiet_flows_the_don.jpg"
  posted: "2019-05-10"
  text: |
    ***And Quiet Flows the Don*** is the kind of novel that changes the scale of what you think a novel can do. Sholokhov spent more than a decade writing the four volumes, following the Cossack communities of the Don region through the First World War, the Revolution, and the Civil War, and the scale is earned rather than merely ambitious: the history is never backdrop but always character, reshaping the lives of Grigory Melekhov and those around him with the same indifference and force that it reshapes everything.

    Grigory is the novel's moral pivot, a man of profound instinct and no ideology who fights on both sides, loves two women, kills many men, and survives everything except his own contradictions. Sholokhov does not give him a politics or a programme; he gives him desires and loyalties and a capacity for violence and tenderness in approximately equal measure, and the tragedy is that the historical moment demands a clear allegiance that he cannot, by nature, provide. The Cossack world he represents is caught between two certainties that will both, eventually, consume it.

    The prose in the sections set on the steppe has an ecological density I found remarkable. Sholokhov renders landscape not as scenery but as a system: the Don's flooding, the grass, the hawks, functioning as a register of the human events alongside which they occur. The novel earns its length because the history it describes cannot be abbreviated; to compress the Cossacks' destruction would be to falsify it.

    <u>The final image -- Grigory returned to his ruined home with his son, the river in the background, everything gone -- is one of the most desolate endings in twentieth-century fiction, not because it is dramatic but because it refuses drama: this is just what remained.</u>

- title: "In Search of Memory"
  title_en: "追寻记忆的痕迹"
  type: "book"
  creator: "Eric Kandel"
  creator_role: "by"
  year: 2006
  eval: "liked"
  image: "/assets/images/thoughts/books/in_search_of_memory.jpg"
  posted: "2019-03-15"
  text: |
    Eric Kandel's autobiography runs in two registers at once: a scientific narrative of how memory research developed from psychoanalysis through behaviourism to cellular neuroscience, and a personal memoir of a Jewish boy from Vienna who fled in 1939 and spent the rest of his life pursuing questions he frames, in retrospect, as shaped by what he witnessed as a child. The two registers do not always sit comfortably together, and ***In Search of Memory*** is most persuasive when it stays close to the science.

    The chapters on the Aplysia work are the book's best. Kandel's choice of the sea slug, with its large identifiable neurons, as a model organism for studying synaptic plasticity is explained with the clarity of a great teacher, and the progression from short-term to long-term potentiation, and then from cellular to molecular mechanisms, reads like a detective story with occasional Nobelist cameos. The science is now foundational, and reading it in narrative form gives a sense of how contingent the discoveries were, how much depended on which animal someone happened to try.

    Where the book is weaker is in the autobiographical framing. Kandel is generous to colleagues and honest about priority disputes, but the psychoanalytic chapters and the Vienna prologue feel like imposed structure rather than organic memoir. <u>The most revealing passage is not about memory at all, but about Kandel's conversion from prospective humanities student to biologist, which he attributes to the intellectual excitement of understanding something mechanistically that psychoanalysis could only describe -- that conversion is the real story, and it goes slightly underexplored.</u>

- title: "Theory and Reality: An Introduction to the Philosophy of Science"
  type: "book"
  creator: "Peter Godfrey-Smith"
  creator_role: "by"
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/books/theory_and_reality.jpg"
  posted: "2019-01-10"
  text: |
    The philosophy-of-science textbook I wish had existed when I started asking these questions. Godfrey-Smith writes with a clarity that makes the book feel effortless, which is deceptive: the clarity is a product of genuine mastery, not simplification. ***Theory and Reality*** moves from logical positivism through Popper, Kuhn, Lakatos, Feyerabend, and the sociology-of-science debates with a steady hand, never caricaturing a position in order to demolish it, always granting each framework the strongest version of its argument before identifying where it fails.

    <u>What distinguishes this from other introductions is that Godfrey-Smith has philosophical commitments of his own, a naturalistic, broadly pragmatist orientation, but he presents them as one position among several rather than as the destination the reader is being steered toward.</u> The effect is a book that teaches you how to think about science without telling you what to think, which is a rarer achievement than it sounds. As a reference work during my Cambridge philosophy-of-science modules, it was indispensable; as a book to read straight through, it is a pleasure.

- title: "Origins of Human Communication"
  title_en: "人类沟通的起源"
  type: "book"
  creator: "Michael Tomasello, trans. 蔡雅菁 (CH)"
  creator_role: "by"
  year: 2008
  eval: "meh..."
  image: "/assets/images/thoughts/books/origins_of_human_communication.jpg"
  posted: "2018-10-08"
  text: |
    Tomasello argues that human language and communication arise from a uniquely human capacity for shared intentionality, for understanding that another being has goals and beliefs distinct from one's own, and for using that understanding to communicate rather than merely to signal. The comparative developmental psychology is the book's strongest material: the experiments distinguishing what human infants can do from what great apes can do, and locating the divergence in the capacity for joint attention, are carefully constructed and the conclusions well-supported.

    What I found less convincing was the theoretical architecture erected on this foundation. The jump from shared intentionality to the full complexity of human linguistic convention involves several moves that Tomasello makes quickly and that I was not always persuaded were warranted. <u>The core insight is real and important: what makes human communication distinctive is not complexity of signal but mutuality of understanding, the fact that both parties know what both parties intend.</u> The book reads like a specialist monograph partially adapted for a wider audience without completing the transformation; the evidence sections are rigorous, but the broader claims accumulate more smoothly than the evidence supports.

- title: "Sapiens: A Brief History of Humankind"
  title_en: "人类简史"
  type: "book"
  creator: "Yuval Noah Harari, trans. 林俊宏 (CH)"
  creator_role: "by"
  year: 2011
  eval: "liked"
  image: "/assets/images/thoughts/books/sapiens.jpg"
  posted: "2018-08-15"
  text: |
    ***Sapiens*** is a history of humanity narrated at such a scale that it forces perspective: ten thousand years of accumulated human culture as a brief episode in the story of a primate species that happened to develop language and symbolic thought. Harari's central thesis, that what distinguishes Homo sapiens from other species is the ability to believe and coordinate around shared fictions, including money, nations, religions, and laws, is elegantly stated and usefully provocative.

    The book's strength is its willingness to make the uncomfortable observation: that agriculture may have made most people's lives worse rather than better in the short term, that the cognitive revolution that enabled human cooperation also enabled the myths that have caused most of recorded suffering. Harari is not a pessimist, but he is honest about the costs of progress in ways that popular histories usually avoid.

    The weakness is the opposite: at this scale, every particular is smoothed away, and the confident generalisations are hard to verify and sometimes wrong on closer examination. <u>As an introduction to a way of thinking about human history rather than as a work of history itself, the book has genuine value; as the latter, it requires a more sceptical reading.</u>

- title: "At the Existentialist Café"
  type: "book"
  creator: "Sarah Bakewell, trans. 沈敏一 (CH)"
  creator_role: "by"
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/books/at_the_existentialist_cafe.jpg"
  posted: "2018-07-10"
  text: |
    ***At the Existentialist Café*** does what the best intellectual history does: it makes the ideas inseparable from the lives of the people who had them, so that phenomenology is not a set of doctrines but a way of sitting in a bar and noticing the texture of an apricot cocktail. Bakewell moves between biography and philosophy with the ease of someone who has lived in both, following Sartre, Beauvoir, Heidegger, Merleau-Ponty, and others through the cafes of Paris, the internment camps of the Second World War, and the philosophical disagreements that tracked all of this.

    The book gave me my first sustained encounter with phenomenology as a practice rather than a theory. Husserl's injunction to go back to the things themselves, to describe experience as it actually presents itself rather than as theory predicts it will, is rendered here as a genuine intellectual revolution with consequences in literature, psychology, and politics. The treatment of Heidegger is admirably honest: Bakewell neither excuses his Nazism nor dismisses his philosophy because of it.

    <u>What I took away most was the portrait of Beauvoir, examined without either the hagiography of the devoted partner or the condescension of the feminist critique, as a philosopher in her own right whose existentialist inheritance shaped her feminism in ways that are still worth arguing about.</u>

- title: "Words of a Dwarf"
  title_en: "侏儒の言叶 / 侏儒の言葉"
  type: "book"
  creator: "Ryūnosuke Akutagawa"
  creator_role: "by"
  year: 1927
  eval: "liked"
  image: "/assets/images/thoughts/books/words_of_a_dwarf.jpg"
  posted: "2018-06-28"
  text: |
    ***Words of a Dwarf*** is a collection of several hundred aphorisms, some of them a single sentence, some extending to a paragraph. Akutagawa wrote them over several years, and they read less like a unified argument than like the residue of an extremely intelligent and often exhausted mind: witty, self-mocking, occasionally brilliant, and frequently despairing. The title announces the author's own assessment of his enterprise; he is the dwarf, and these are his words, and the diminutive is a defence as much as a modesty.

    The best aphorisms are precise to the point of cruelty, and Akutagawa directs the cruelty primarily at himself and at the category of 'artist.' His relationship to his own creativity was tormented: he wrote compulsively, felt the compulsion as a pathology, and observed it with the same analytic detachment he brought to his fiction.

    <u>Two aphorisms crystallise the book's temper: 'Life is more like a line from Baudelaire than a chapter from Marx,' and his observation that he had inherited no religion and no other safeguard against nausea before nature.</u> Both suggest a writer who had already decided what his ending would be.

- title: "Kappa"
  title_en: "河童 / 河童"
  type: "book"
  creator: "Ryūnosuke Akutagawa"
  creator_role: "by"
  year: 1927
  eval: "liked"
  image: "/assets/images/thoughts/books/kappa.jpg"
  posted: "2018-06-20"
  text: |
    ***Kappa*** is Akutagawa's most satirical work, set in the land of the kappa, mythological Japanese water creatures who turn out to have a sophisticated capitalist society that inverts human arrangements in ways designed to expose them. In Kappa-land, unborn children are asked whether they want to be born and have the right to refuse; the unemployed are slaughtered and turned into food; art has been so completely commodified that its social function is entirely absorbed by the market.

    The satire is of its era, 1920s Japan, and requires some adjustment for the contemporary reader. But the satirical method, taking human social arrangements and defamiliarising them by transposing them into the absurd, retains its effect.

    <u>The novel's darkest passages concern the artist Tok, who produces work his society consumes in vast quantities and who finds this consumption debasing, and whose eventual suicide is rendered with a gravity that breaks the satirical frame and suggests that Akutagawa was not entirely keeping his distance from his own character.</u> He died by suicide the same year he published it.

- title: "Rashomon and Other Stories"
  title_en: "罗生门 / 羅生門"
  type: "book"
  creator: "Ryūnosuke Akutagawa"
  creator_role: "by"
  year: 1915
  eval: "loved"
  image: "/assets/images/thoughts/books/rashomon_and_other_stories.jpg"
  posted: "2018-06-10"
  text: |
    Akutagawa wrote in the range of a few hundred to a few thousand words, and within that constraint he achieved a density of psychological and moral observation that longer works can rarely sustain. The stories in ***Rashomon and Other Stories*** are varied in subject but unified in disposition: a precise, often ironic, sometimes blackly comic attention to the moment when human beings make the choice that reveals what they actually are.

    The title story, in which a servant sheltering at the Rashomon gate watches a woman stealing hair from corpses and then robs her of her clothes, uses its shock economy with perfect control: the logic of each decision follows from the previous one, and the result is both morally horrifying and psychologically exact. "In a Grove," the most famous, gives seven separate accounts of a samurai's death and achieves its effect not by revealing the truth but by demonstrating that the truth has been made irrecoverable by the self-interest of everyone who might provide it.

    <u>Akutagawa's formal precision, his refusal to pad, his trust in the reader's intelligence to follow implications that are never stated, produces in a few pages what most novels spend hundreds of pages working toward.</u> I read the collection in an afternoon and thought about it for weeks.

- title: "A Short History of Tractors in Ukrainian"
  type: "book"
  creator: "Marina Lewycka"
  creator_role: "by"
  year: 2005
  eval: "liked"
  image: "/assets/images/thoughts/books/a_short_history_of_tractors_in_ukrainian.jpg"
  posted: "2018-05-30"
  text: |
    ***A Short History of Tractors in Ukrainian*** does the difficult thing that comic novels occasionally manage: it is simultaneously funny and genuinely sad, and the two registers do not undercut each other. Valentina, the young Ukrainian woman who arrives to marry the elderly widower Nikolai, is rendered as farce, as opportunist using an old man's loneliness, but Lewycka refuses to let her remain only that; what emerges is also a portrait of a woman in desperate circumstances using the only leverage she has. The daughters, Vera and Nadia, trying to protect their father while managing their own fractured sisterhood, are the emotional centre.

    The short history of tractors that Nikolai is writing provides the novel's structural irony: he is composing a history of Ukrainian technological ambition while surrounded by the human consequences of Ukraine's actual twentieth century, the famine, the war, the displacement.

    <u>Lewycka holds the comedy and the historical weight at the same distance simultaneously, so that neither makes the other feel inappropriate.</u> A light book with a heavier shadow than it appears to have.

- title: "The Wall"
  title_en: "墙 / Le Mur"
  type: "book"
  creator: "Jean-Paul Sartre"
  creator_role: "by"
  year: 1939
  eval: "liked"
  image: "/assets/images/thoughts/books/the_wall.jpg"
  posted: "2018-05-20"
  text: |
    The five stories in ***The Wall*** were Sartre's first published fiction, and they read like a writer testing the existentialist ideas he was developing philosophically. The title story is the most controlled: a prisoner expected to be executed at dawn discovers, in the course of the night, that his body has ceased to be properly his, that the detachment of consciousness from its physical conditions in the face of death produces something like nausea and something like clarity. The ending, in which his joke becomes the truth, makes the story's point about the impossibility of prediction and the absurdity of what we take seriously.

    The collection is uneven. "Erostratus" is the weakest, a portrait of a misanthropic exhibitionist that feels more like an exercise than a story. "Intimacy" is the most psychologically detailed: a married woman who claims to want to leave her husband discovers that she cannot, that the story she tells herself about her desire for freedom is less true than she believed.

    <u>The stories work best when the philosophical content generates narrative pressure rather than decorating a story that could exist without it, when the existentialist thesis and the dramatic situation are genuinely the same thing rather than two things held together by authorial will.</u>

- title: "We"
  title_en: "我们 / Мы"
  type: "book"
  creator: "Yevgeny Zamyatin"
  creator_role: "by"
  year: 1924
  eval: "liked"
  image: "/assets/images/thoughts/books/we.jpg"
  posted: "2018-05-10"
  text: |
    ***We*** is the novel Orwell and Huxley are assumed to have read before writing their dystopias, and it deserves better than being known only as a precursor. D-503, a spacecraft engineer in the totalitarian One State, begins keeping a diary because the government requires it; what he records instead is his falling in love with I-330, a woman connected to an underground resistance movement. Citizens live in glass apartments, have sex by permit, and refer to feelings as 'disease.'

    The dystopian machinery is familiar because it was original when Zamyatin invented it. The surveillance, the performative uniformity, the controlled language: these devices have accumulated context through their more famous successors, and reading the source now requires an effort to read through the accumulated borrowings. What feels freshest is the narrator's voice: D-503 is not a heroic rebel but a genuine true believer whose consciousness is cracked open against his will, and his record of that cracking is more psychologically nuanced than most of the genre.

    <u>The ending is ambiguous where *1984*'s is not, and I prefer the ambiguity: whether D-503 has been repaired and I-330's resistance crushed, or whether he has merely reassembled the self that was broken, is a question that Zamyatin leaves open because the One State leaves nothing unresolvable.</u>

- title: "The Lover"
  title_en: "情人 / L'Amant"
  type: "book"
  creator: "Marguerite Duras"
  creator_role: "by"
  year: 1984
  eval: "loved"
  image: "/assets/images/thoughts/books/the_lover.jpg"
  posted: "2018-04-25"
  text: |
    ***The Lover*** is narrated by an old woman describing, in a prose that refuses chronological order, a love affair between her fifteen-year-old self and a wealthy Chinese man in colonial French Indochina. Duras writes in a present tense that is also retrospective, the memory always mediated through the distance of age, and the effect is both intimate and alienating: one is inside the experience and watching it from the outside simultaneously.

    The relationship between desire and power is the novel's real subject. She is white and poor; he is Chinese and rich; the colonial hierarchy inverts their positions within it, so that she holds racial power over him even as she is economically dependent. Duras is precise about this inversion without making it comfortable, and the sexual scenes are rendered with the same unflinching clarity as the poverty of the narrator's family.

    What the novel does that I had not expected is locate the love as real. It is not the love of two people who could have built a life together; the social circumstances prohibit it, and both parties understand this from the beginning. But the novel argues that its reality does not depend on its permanence, that what happened on the back streets of Saigon in the 1930s was both an economic transaction and a genuine encounter, and that these two things can coexist without one cancelling the other.

    <u>The prose, spare and undecorated, achieves an accumulation of intensity through restraint: each sentence withholds something, and the withholding becomes the meaning.</u>

- title: "Heart of Darkness"
  type: "book"
  creator: "Joseph Conrad"
  creator_role: "by"
  year: 1899
  eval: "loved"
  image: "/assets/images/thoughts/books/heart_of_darkness.jpg"
  posted: "2018-04-08"
  text: |
    Marlow's journey up the Congo River is framed as an anecdote told aboard a yawl anchored in the Thames estuary, and the choice of frame is doing everything. The Thames is also a river of darkness, Marlow remarks, recalling the Roman legionaries who brought civilisation to Britain the way Leopold II's agents bring it to the Congo, and the point is made with the quiet devastation of someone who has worked out exactly what to say and refuses to make it easier than it is.

    ***Heart of Darkness*** is not a comfortable book, and not only because of the horror it describes. The prose is dense, recursive, resistant, Marlow's voice looping back over its own hesitations in a way that makes linear comprehension difficult. The technique is the argument: this is what it is like to try to report back on something that Western civilisation cannot acknowledge about itself without dismantling the language in which it speaks. Kurtz's famous last words, 'the horror, the horror,' are not description but diagnosis, the only honest thing a European consciousness can say when it has seen clearly what it has been doing.

    I read it before watching *Apocalypse Now*, and the reversal of the usual order was instructive: the novella's Congo is not Vietnam, but the structure of the imperial project, the extraction of resources and the destruction of people under the rhetoric of civilisation, is the same structure. Coppola understood this.

    <u>The image of Marlow at the end, having decided not to tell Kurtz's fiancée the truth, is the most precise description of complicity I have encountered in any text: the decision not to disturb someone's sustaining illusions because their sustaining illusions are also yours.</u>

- title: "Hi Izuru Tokoro no Kōjō"
  title_en: "日出国的工厂 / 日出処の工場"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1987
  eval: "liked"
  image: "/assets/images/thoughts/books/hi_izuru_tokoro_no_kojo.jpg"
  posted: "2018-03-25"
  text: |
    ***Hi Izuru Tokoro no Kōjō*** is the odd book in Murakami's bibliography: seven factory visits, conducted in 1987, written up with the curiosity and light touch he usually reserves for fiction. The factories are chosen for their specificity rather than their representativeness -- a studio that makes anatomical specimens for medical schools, a wig manufacturer, a CD pressing plant, a wedding hall, a rubber factory, a dairy farm, a suit maker -- and Murakami approaches each as he approaches a jazz record: interested in the craft, the vocabulary, and the people who have devoted their attention to one narrow thing.

    The humour is real but not condescending. Murakami is delighted by the anatomical specimen factory, by the precision of the process and the composure of the workers, and the delight is infectious. The best pieces have the quality of his early short fiction: an ordinary thing described from an angle that makes it strange, and the strangeness turns out to be revealing.

    What emerges over the seven visits is a quiet disquiet the text rarely names directly. These are highly efficient operations, and the people inside them are skilled and purposeful, and yet the overall effect is of a world in which human beings are one component among many, their individuality absorbed by the system's requirements. <u>Murakami registers this without dwelling on it, which is more unsettling than protest would be: the factories function beautifully, and that is precisely the problem.</u> A light book with a shadow in it.

- title: "The Other Brain"
  type: "book"
  creator: "R. Douglas Fields"
  creator_role: "by"
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/books/the_other_brain.jpg"
  posted: "2018-03-20"
  text: |
    The brain sciences, as popularly presented, are largely the sciences of neurons. ***The Other Brain*** argues for a corrective: glia, the non-neuronal cells that outnumber neurons by roughly ten to one, are implicated in learning, memory, disease, and possibly consciousness in ways that had been systematically overlooked. Fields spent his career studying glia and writes the book partly as scientific history, partly as a polemic against neuron-centrism.

    The strongest sections address specific mechanisms: the role of astrocytes in modulating synaptic transmission, the way myelin-producing oligodendrocytes regulate the timing of neural signals and their implications for psychiatric disease. Fields writes for a general audience with reasonable clarity, though the density of terminology accumulates.

    <u>The book's polemical energy is also its weakness: the case that glia have been ignored is made so insistently that the equally important caveat, that neurons remain central and the glial revolution is still largely prospective, gets somewhat lost.</u> Read with that caution, it is a useful expansion of the standard model.

- title: "On the Origin of Species"
  type: "book"
  creator: "Charles Darwin"
  creator_role: "by"
  year: 1859
  eval: "loved"
  image: "/assets/images/thoughts/books/on_the_origin_of_species.jpg"
  posted: "2018-03-08"
  text: |
    Reading ***On the Origin of Species*** as a biology student who had been taught evolution as settled fact was like hearing the argument for something I thought I already knew and discovering I had not understood it at all. Darwin proceeds with Victorian thoroughness, accumulating domestic pigeons, barnacles, coral reefs, and the distribution of finches across islands until the evidence has weight and the theory has the feel of inevitability. The argument is not presented as a sudden illumination but as a long patient pressure, and the prose has the same quality: unhurried, exact, and relentlessly cumulative.

    What I had not expected was how much of the argument turns on difficulty rather than simplicity. Darwin spends entire chapters on problems with his theory: how does a complex structure like the eye arise? How do sterile worker castes in insects evolve? He addresses these not by dismissing them but by working through them with the same analytical care as the supporting evidence, and the intellectual honesty of these passages is what makes the book convincing. The reader watches a mind that has genuinely grappled with every objection and not been dissuaded.

    The chapter on the imperfection of the geological record struck me most: Darwin acknowledges that the fossil evidence available in 1859 is inadequate to his theory, then argues that this is what we should expect given the conditions of fossilisation, and turns an apparent weakness into a prediction. A hundred and fifty years later, the prediction has largely held.

    <u>The book is beautiful in the way that comprehensive arguments are beautiful when the comprehension has been honestly earned rather than imposed, when the theory has been made to do genuine work rather than just to explain what the theorist already believed.</u>

- title: "Thus Spoke Zarathustra"
  title_en: "查拉图斯特拉如是说 / Also sprach Zarathustra"
  type: "book"
  creator: "Friedrich Nietzsche"
  creator_role: "by"
  year: 1883
  eval: "liked"
  image: "/assets/images/thoughts/books/thus_spoke_zarathustra.jpg"
  posted: "2018-02-20"
  text: |
    Nietzsche wrote ***Thus Spoke Zarathustra*** as a philosophical novel in four parts, and the register is closer to prophecy or invective than to argument. Zarathustra descends from his mountain to teach humanity the Übermensch and the eternal recurrence; the humans he encounters are mostly unready, and his speeches grow increasingly isolated. The aphoristic density is total: almost every passage has been extracted at some point as a motivational quotation, which is both evidence of the prose's power and a caution about reading it out of context.

    What I found most compelling was not the positive doctrine but the passages on ressentiment: the way small souls misrepresent their weakness as virtue and their impotence as moral purity. This is the Nietzsche who made *The Genealogy of Morality* possible, and the connection is clear.

    <u>The book is most powerful when read as a diagnosis of what we have called morality and least convincing when read as a prescription for what to do about it.</u> As critique, it is devastating; as alternative, it remains gesturally incomplete. I came away impressed by the demolition and uncertain about the construction.

- title: "Being and Time"
  title_en: "存在与时间 / Sein und Zeit"
  type: "book"
  creator: "Martin Heidegger"
  creator_role: "by"
  year: 1927
  eval: "liked"
  image: "/assets/images/thoughts/books/being_and_time.jpg"
  posted: "2018-02-10"
  text: |
    ***Being and Time*** is the most demanding text I had encountered up to that point, and I did not understand a large part of it. Heidegger's project, to provide a fundamental ontology that asks what it means 'to be' by starting from the being that asks the question, is announced in the first pages and pursued with a relentlessness that neither pauses for the reader nor simplifies. The technical vocabulary, Dasein, thrownness, fallenness, being-in-the-world, being-toward-death, must be assembled patiently because each term does precise work that ordinary language cannot do without loading it in ways Heidegger wants to avoid. The ambition -- that philosophical vocabulary, built precisely enough, can reach what ordinary speech automatically covers over -- sits in productive tension with weeks of Kundera arguing the opposite: that only the novel, through irreducibility and the specific weight of a particular life, can reach what any system necessarily misses.

    What I managed to take away from a first reading was the phenomenological analysis of everyday life: the world as equipment, the hammer that becomes invisible when it works and visible only when it breaks. The analysis of anxiety, in which the world withdraws and Dasein confronts its own thrown finitude, was the passage I returned to most. Being-toward-death not as a fact to be confronted occasionally but as the structural condition that gives Dasein its ownmost possibility: this landed.

    <u>Reading Heidegger in Chinese at eighteen was probably a mistake: already at two removes from the original, with layers of mediation adding opacity that were not Heidegger's.</u> I would return to it more carefully in later years.

- title: "The Unbearable Lightness of Being"
  title_en: "不能承受的生命之轻"
  type: "book"
  creator: "Milan Kundera, trans. 许钧 (CH)"
  creator_role: "by"
  year: 1984
  eval: "loved"
  image: "/assets/images/thoughts/books/the_unbearable_lightness_of_being.jpg"
  posted: "2018-01-20"
  text: |
    The title poses a question that the novel never quite stops asking: if there is no eternal recurrence, if everything happens only once and therefore as good as never happened, does that make life unbearably light or unbearably meaningless? Tomas, the Prague surgeon and serial philanderer, believes in lightness; Tereza, the woman he cannot stop himself from marrying, believes in heaviness, in the irreversibility of choices and the moral weight of love. They answer the fundamental question differently, and ***The Unbearable Lightness of Being*** is about what happens when one loves someone who does that.

    The novel is also political, set against the Prague Spring of 1968 and the Soviet invasion that followed. Tomas's surgical career is destroyed because he publishes an essay drawing an analogy between Czech collaborators and Oedipus, intending a philosophical argument, and the regime takes it as a political accusation. The way power flattens the nuances of private discourse into a single readable surface is something Kundera understands from the inside.

    Sabina, the artist who betrays and moves on, who has no programme beyond the refusal of kitsch, is the novel's moral posture, and it is not enough; the novel knows it is not enough. <u>The novel ends not with Tomas and Tereza arguing but with them in the countryside, dancing, with a dog, a little before they die. It is the most human thing Kundera ever wrote, and the most forgiving.</u>

- title: "The Joke"
  title_en: "玩笑"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1967
  eval: "loved"
  image: "/assets/images/thoughts/books/the_joke.jpg"
  posted: "2018-01-15"
  text: |
    ***The Joke*** was Kundera's first novel and his best, and I read it last, which meant it arrived with the full weight of everything I had come to expect from him, and still exceeded it. Ludvik writes a postcard to a girl he wants to impress: "Optimism is the opium of the people! A healthy atmosphere stinks of stupidity! Long live Trotsky!" He is denounced, expelled from the party and the university, and sent to work in the mines with other political undesirables. The joke costs him everything.

    Fifteen years later, he returns. He has identified the man responsible for his condemnation and arranged, through careful seduction, to sleep with his wife as an act of revenge. The seduction succeeds. The revenge is a complete failure: the marriage has already dissolved on its own terms, the wife turns out to welcome the encounter for reasons that have nothing to do with Ludvik, and the man he wanted to wound is past caring about any of it. History has quietly rendered his fifteen-year project of retribution incoherent.

    This is Kundera's central joke, the one the title names. Not the postcard, but the assumption that our private grievances and private acts of vengeance matter to history, that time pauses for us, that the score can be settled. It does not. It will not. <u>The final image, of a folk music festival in Ludvik's home town proceeding with perfect sincerity as his life collapses around it, is the most quietly devastating thing Kundera ever wrote.</u>

- title: "Immortality"
  title_en: "不朽"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/immortality.jpg"
  posted: "2018-01-10"
  text: |
    ***Immortality*** is Kundera's longest and most formally ambitious novel, and the one in which the line between fiction and essay most completely dissolves. The novel begins with a woman in her sixties at a swimming pool, making a graceful girlish gesture as she waves goodbye to her instructor; Kundera decides to write a novel about her and names her Agnes. Agnes's story runs alongside meditations on Goethe and Bettina von Arnim, who represents the obsessive fan's desire to possess a great man's image, and alongside a direct appearance by Kundera himself in conversation with a character called Professor Avenarius.

    The novel's great subject is the desire to leave a trace, to be remembered, to secure some permanent version of oneself against the forgetting that awaits everyone. Goethe curated his own image deliberately and well; Bettina constructed a Goethe for herself regardless of what he actually was. Both strategies fail, for different reasons. Agnes, who wants only to disappear into silence, is closest to the novel's moral centre but also its most passive figure.

    <u>The gesture at the opening, a sixty-year-old woman's momentary girlishness, returns at the end as the purest form of what the novel has been about: a fragment of behaviour that is entirely personal, entirely inexplicable, entirely itself, and therefore the closest thing to genuine immortality that anyone achieves.</u>

- title: "Life is Elsewhere"
  title_en: "生活在别处"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/books/life_is_elsewhere.jpg"
  posted: "2018-01-06"
  text: |
    The title comes from Rimbaud, and the irony is structural. Jaromil, the poet-protagonist of ***Life is Elsewhere***, is a young man of genuine lyric gift who is also a narcissist, a mommy's boy, and a petty informer. He denounces his girlfriend's brother to the secret police and regards his own suffering as more important than the actual suffering it causes. Kundera traces his formation with a remorselessness that is also a kind of pity: Jaromil did not invent himself; his mother invented him, and the revolution found him convenient.

    The satire of Romantic aesthetics is precise. Kundera knows the tradition from inside, and his portrait of the young poet who confuses intensity of feeling with artistic virtue, who believes the purity of his suffering makes him a better writer, and who is talented and dangerous in the same motion, is one of literature's most devastating self-critiques of a cultural type.

    <u>The scene in which Jaromil's revolutionary enthusiasm has led him to a very bad place, and he dies young enough not to have to live with what he has become, is both tragedy and mercy: the novel withholds from him the reckoning that would have been more honest and more damning.</u> Kundera gives Jaromil the Romantic's death, young and passionate and incomplete, and in doing so completes the indictment.

- title: "The Book of Laughter and Forgetting"
  title_en: "笑忘录"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/books/the_book_of_laughter_and_forgetting.jpg"
  posted: "2018-01-02"
  text: |
    ***The Book of Laughter and Forgetting*** is not a novel in any conventional sense: seven parts, different characters in each, different registers, different relationships between fiction and essay. What holds them together is the two themes of the title: laughter and forgetting, and the political system that weaponises both. A couple walks on a beach and the husband gradually disappears. An American student in Paris has a sexual encounter with a character called Kundera, who then discusses her in an essay. The borders between fiction and commentary are continuously violated.

    The political argument cuts deepest. The first section, in which the photograph of the Communist Party leaders in 1948 is slowly altered as members are purged, so that what remains is the hat of Clementis who has been erased, is the most devastating image of the Soviet archive I have encountered in fiction. The chapter called "Litost" introduces a Czech concept for a state of torment created by the sudden sight of one's own misery, and it is one of the sharpest single analyses of a human emotion in any novel I have read.

    <u>The book refuses to be summed up because it is itself a refusal of the kind of totalising narrative that it describes totalitarianism as practising: it assembles fragments and lets them mean, rather than imposing meaning on them.</u>

- title: "Ignorance"
  title_en: "无知"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/books/ignorance.jpg"
  posted: "2017-12-25"
  text: |
    Two Czech emigrants return to Prague after 1989, both expecting a homecoming the city cannot provide. ***Ignorance*** is Kundera's meditation on the return that is not a return, the country that has continued without you, and the past that turns out to have been experienced differently by everyone who was present for it. Josef meets Irena; they had a brief encounter before emigration that he cannot remember and that she has preserved with a fidelity that now feels absurd.

    The novel's organising concept, which Kundera frames through a rereading of Odysseus, is that the nostalgia of exile is not really for the place left behind but for the self who lived there, who no longer exists in any recoverable form. The return does not restore what was lost; it proves that what was lost cannot be restored. Irena's friends in Paris have no curiosity about what she has actually been through; they ask only whether she has finally come home.

    <u>The brevity of the novel is its argument: the return, which ought to take an entire heroic narrative, is compressed into a short, quiet, disappointed act.</u> Kundera writes the failure of the Great Return with a precision and restraint that is more devastating than grief would be.

- title: "Laughable Loves"
  title_en: "好笑的爱"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1969
  eval: "liked"
  image: "/assets/images/thoughts/books/laughable_loves.jpg"
  posted: "2017-12-20"
  text: |
    Seven stories about seduction, lies, and the games people play around desire. ***Laughable Loves*** was published before Kundera had developed his full philosophical machinery, and the lightness of touch that distinguishes his best work is already present here. The eroticism is never purely erotic; the seductions are always about something other than themselves: power, boredom, the desire to see oneself as a certain kind of person, the relief of not being known.

    The standout story is "The Hitchhiking Game", in which a young couple plays a game of roles during a holiday drive that starts as flirtation and ends as something neither of them intended. Kundera watches the process by which the role gradually absorbs the person, and the terror of the ending is that no one can be certain whether the game revealed something true or created it. <u>The entire collection circles this question: what parts of us are chosen, and what parts are merely convenient fictions that have lasted long enough to become indistinguishable from character.</u>

- title: "The Festival of Insignificance"
  title_en: "庆祝无意义"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 2013
  eval: "liked"
  image: "/assets/images/thoughts/books/the_festival_of_insignificance.jpg"
  posted: "2017-12-17"
  text: |
    Kundera's last novel is slight in length but not in intention. Four Parisian friends drift through conversations, a party, and the city itself, and Kundera uses their exchanges to meditate on insignificance as a philosophical rather than merely negative category. The small, the unimportant, the moments that leave no trace: these are not the failures of meaning but its necessary ground. The joke at the novel's centre, Stalin telling a story that he repeats and modifies until no one knows what the original was, is familiar Kundera territory.

    The novel is too brief and too comfortable to rank among his major work. But reading it after *The Book of Laughter and Forgetting* and *The Unbearable Lightness of Being*, the lightness felt deliberate rather than insufficient. <u>Kundera in his eighties had chosen not to argue but to play, and the decision to make insignificance the subject of his final novel is itself a kind of joke with a long punchline.</u>

- title: "The Farewell Waltz"
  title_en: "告别圆舞曲"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1972
  eval: "liked"
  image: "/assets/images/thoughts/books/the_farewell_waltz.jpg"
  posted: "2017-12-14"
  text: |
    The most conventionally plotted of the Kundera novels I read that winter. Five days at a spa town, a jazz trumpeter named Klima, the girlfriend who tells him she is pregnant, and the woman he slept with once who actually is. The plot is farce by design: misunderstandings compound, identities are confused, and the ending is dark in a way the comic surface does not prepare for.

    Kundera seems to be exploring the relationship between irresponsibility and freedom. Klima is a man who has kept his options permanently open, who mistakes multiplicity for liberty, and the novel watches what happens when the world refuses to accommodate his lightness. <u>The farewell waltz of the title is both a specific plot element and Kundera's general disposition toward the arrangements people make: temporary, graceful, always pending dissolution.</u> More entertainment than argument, but Kundera's entertainment is never without its undertow.

- title: "Slowness"
  title_en: "慢"
  type: "book"
  creator: "Milan Kundera"
  creator_role: "by"
  year: 1995
  eval: "liked"
  image: "/assets/images/thoughts/books/slowness.jpg"
  posted: "2017-12-12"
  text: |
    ***Slowness*** was my first Kundera, and I chose it because it was the shortest. Two stories run in parallel across a single French night: an episode from a libertine's memoirs set in the eighteenth century, in which pleasure is measured in the time taken to reach it; and a contemporary academic conference at the same chateau, in which no one remembers anything and everyone performs. The argument is stated almost baldly: speed is the form that forgetting takes, and the world moves fast in order not to have to remember. The libertine's amour, conducted with ceremony and slowness, is also a form of memory; the modern conference, organised around forgetting, produces only spectacle.

    The novel is too schematic for its length, a diagram rather than a fiction, but the diagnosis is sharp. <u>The scene in which a conference participant gets on a motorcycle and drives very fast so that the embarrassing moment everyone witnessed will be forgotten has the quality of a cartoon that is also exact.</u> A primer for what follows.

- title: "Brain Gender"
  type: "book"
  creator: "Melissa Hines"
  creator_role: "by"
  year: 2004
  eval: "liked"
  image: "/assets/images/thoughts/books/brain_gender.jpg"
  posted: "2017-12-10"
  text: |
    Melissa Hines was one of my first-year lecturers at Cambridge, and her lectures had a quality I later recognised as characteristic of the best science communicators: the ability to make you care about a subject you had no prior investment in. ***Brain Gender*** has the same quality. The book surveys what is known, and what is contested, about sex differences in cognition and behaviour, drawing on endocrinology, neuroimaging, and developmental psychology with an evenness of tone that never tips into advocacy.

    <u>What Hines manages, and what many popular treatments of sex differences fail at, is holding the complexity without either dismissing the evidence for biological contributions or overstating what those contributions mean.</u> The hormonal studies, particularly the work on congenital adrenal hyperplasia and its effects on play behaviour, are presented with the appropriate caveats intact. The book is a model of how to write about a politically charged scientific topic without letting the politics determine the conclusions.

- title: "A Wild Sheep Chase"
  title_en: "羊をめぐる冒険"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1982
  eval: "liked"
  image: "/assets/images/thoughts/books/a_wild_sheep_chase.jpg"
  posted: "2017-11-20"
  text: |
    I read this in my first year of university, having already encountered the Sheep Man and the Dolphin Hotel in *Dance Dance Dance* without knowing their origin. Coming to ***A Wild Sheep Chase*** after its sequel is a strange experience: the Sheep Man's first appearance, which should have been a revelation, was instead a recognition, and the Dolphin Hotel's original form carried the weight of knowing what it would become. Whether this backward reading enriched or diminished the book I am still not sure.

    The novel is Murakami's first sustained piece of ambition. The plot borrows from hardboiled detective fiction: a mysterious client, a quest through increasingly strange Hokkaido geography, a companion with supernaturally beautiful ears, and at the end, a mountain lodge and a dead friend. But the detective genre requires agency, and Murakami's narrator has almost none; things happen to him, around him, occasionally through him, but never because of him. The passivity that would later deepen into a philosophical position in *The Wind-Up Bird Chronicle* is here more like temperament, an inability to engage that registers as its own form of stubbornness.

    The Rat's death is the emotional centre, and Murakami handles it with characteristic restraint: the narrator arrives, the Rat is already gone, and the loss registers not as shock but as confirmation of something already felt. The political dimension, the Boss's shadowy right-wing empire, the sheep as a metaphor for power, is sketched rather than explored, which is probably wise. <u>Murakami is not a political writer. He is a writer of loneliness, and loneliness is what this book does best.</u>

- title: "Other Minds: The Octopus, the Sea, and the Deep Origins of Consciousness"
  type: "book"
  creator: "Peter Godfrey-Smith"
  creator_role: "by"
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/books/other_minds.jpg"
  posted: "2017-11-15"
  text: |
    Godfrey-Smith is a philosopher of biology and also a scuba diver, and both activities inform ***Other Minds***. The book uses cephalopods, particularly octopuses, as a lens on the deep evolutionary origins of consciousness. Octopuses and vertebrates share a common ancestor so distant that their nervous systems represent two almost entirely separate experiments in building complex minds; studying what the octopus experiences, and how its distributed neural architecture compares to our own, becomes a way of asking what consciousness requires and what it is for.

    The strongest chapters are those where philosophy and marine biology are integrated. Godfrey-Smith's descriptions of observing octopuses in their rocky underwater dens are vivid, and the evolutionary argument about when and why subjective experience arose is carefully constructed. The book is honest about what we do not know: the hard problem of consciousness is not solved here, and the uncertainty is handled with appropriate intellectual rigour rather than papered over with speculation.

    <u>What the book gave me was a cleaner framing of what the question actually is: not whether octopuses are conscious in the way humans are, but whether the distinction between having some experience and having none is as clean as we assume, and what it would mean if it is not.</u> A brief, well-made book for a difficult subject.

- title: "Philosophy of Language"
  type: "book"
  creator: "Alexander Miller"
  creator_role: "by"
  year: 2007
  eval: "liked"
  image: "/assets/images/thoughts/books/philosophy_of_language.jpg"
  posted: "2017-11-10"
  text: |
    ***Philosophy of Language*** runs from Frege and Russell through Grice, Davidson, and the later Wittgenstein, and is designed to be read alongside rather than instead of the primary texts. Miller's presentation is unusually careful about distinguishing what a position says from what is wrong with it, and the sequencing -- sense and reference first, then descriptions, then the attacks on description theories, then a shift to meaning and use -- follows the historical development closely enough to make the debates feel alive rather than settled.

    The chapters on Grice are the strongest. The distinction between natural and non-natural meaning, and the analysis of utterer's meaning in terms of intentions and recognitions-of-intentions, is explained with a clarity that made me understand why so many subsequent debates in philosophy of language organised themselves around Grice's framework. The chapters on Wittgenstein's later work are necessarily partial; no one compresses the *Philosophical Investigations*. But they do the important thing, which is to make the argument against private language accessible before the reader encounters the original.

    <u>What the book does well is sustain a through-line: language is shown not as a set of names attached to objects but as an activity embedded in practice, a conclusion arrived at gradually through the accumulated failures of more reductive accounts.</u> I used it for a Logic and Philosophy of Language paper at Cambridge, and it holds up as a reference.

- title: "Advice for a Young Investigator"
  type: "book"
  creator: "Santiago Ramón y Cajal"
  creator_role: "by"
  year: 1897
  eval: "loved"
  image: "/assets/images/thoughts/books/advice_for_a_young_investigator.jpg"
  posted: "2017-10-08"
  text: |
    Cajal wrote this short book for young scientists, and it reads like advice from a grandfather who has learned everything the hard way and wants to save you the time. The chapters cover topics that no one teaches: the temperament required for scientific work, the danger of premature publication, the importance of choosing a problem that is neither too large nor too small, the specific psychological traps that afflict intelligent people who are not yet disciplined. The tone is bracing rather than gentle: Cajal does not flatter beginners.

    His taxonomy of bad scientific characters, the egotist who publishes before confirming, the polymathic dilettante who never commits, the neurotic perfectionist who revises forever, is observationally sharp and recognisably accurate. His description of how great discoveries are made, not by searching for them but by attention to anomalies that do not fit the current framework, anticipates later philosophy of science. His insistence on the necessity of willpower, of sitting at the bench when one does not feel inspired, is unfashionable and correct.

    <u>The book is a product of its era in ways that require adjustment: Cajal's assumptions about who does science are narrow, and some of the career advice reflects a university environment nothing like the present one.</u> But the psychological core remains intact. I have gone back to it repeatedly.

- title: "Recollections of My Life"
  type: "book"
  creator: "Santiago Ramón y Cajal"
  creator_role: "by"
  year: 1901
  eval: "loved"
  image: "/assets/images/thoughts/books/recollections_of_my_life.jpg"
  posted: "2017-09-15"
  text: |
    Cajal won the Nobel Prize in Physiology or Medicine in 1906 for discovering that the nervous system is composed of discrete individual cells rather than a continuous network, but ***Recollections of My Life*** is not a book about that discovery. It is a book about the conditions under which a scientist forms. Cajal's childhood in rural Aragon reads like a picaresque novel: a restless, difficult boy who drew obsessively, was apprenticed to a barber, briefly jailed, and finally directed by a father who understood the energy but not the form toward medicine. The path to the microscope was indirect and private.

    What makes the autobiography exceptional is the combination of self-knowledge and scientific honesty. Cajal describes not only his successes but his errors: the years spent on dead-end problems, the experiments that failed, the periods of depression and doubt. He is forensically clear about how he learned to look at things, literally, through a microscope, and the cultivation of that kind of attention is itself a major theme of the book. The observer who discovers that the synapse is a gap and not a junction is the same observer who learned as a child to draw what he saw rather than what he expected to see.

    <u>Cajal's determination carries a particular quality: it is not the ambition of someone who expects to be recognised, but the stubbornness of someone who is convinced by his own observations and will not let the absence of agreement stop him.</u>

- title: "The Three-Body Problem Trilogy"
  title_en: "三体"
  type: "book"
  creator: "Liu Cixin (刘慈欣)"
  creator_role: "by"
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/books/the_three_body_problem_trilogy.jpg"
  posted: "2017-08-10"
  text: |
    Liu Cixin begins with the Cultural Revolution, the death of an astrophysicist, and a daughter who makes first contact with an alien civilisation in despair of her own species, and then escalates across three volumes to the destruction of the solar system, the weaponisation of dimensions, and the collapse of the universe. The scale of the ***Three-Body Problem*** trilogy is vertiginous in the best sense.

    What distinguishes it from ordinary space opera is the philosophical and scientific seriousness. The central concept of the second volume, the dark forest, is Liu's solution to the Fermi Paradox: the universe is silent because every intelligent civilisation, knowing that others exist and that resources are finite, must choose between destroying first or being destroyed. Detection means death. The logic is inexorable and terrible, and Liu develops it not as a plot device but as a sustained philosophical argument about survival under genuine scarcity.

    The third volume is the most emotionally demanding. Cheng Xin makes two decisions that may doom humanity, and the novel refuses to condemn her for either; the horror is structural, not personal, a universe in which correct moral intuitions and rational survival decisions point in opposite directions. <u>The final sections, in which the universe is revealed to have been weaponised down from eleven dimensions to three, bring the dark forest logic to its ultimate conclusion and produce a sense of scale that very few works of fiction have given me.</u> I read all three in a single summer, barely surfacing.

- title: "Colorless Tsukuru Tazaki and His Years of Pilgrimage"
  title_en: "色彩を持たない多崎つくると、彼の巡礼の年"
  type: "book"
  creator: "Haruki Murakami, trans. 施小炜 (CH)"
  creator_role: "by"
  year: 2013
  eval: "liked"
  image: "/assets/images/thoughts/books/colorless_tsukuru_tazaki_and_his_years_of_pilgrimage.jpg"
  posted: "2017-03-10"
  text: |
    The colour-name conceit is the book's hook and its limitation. Tsukuru Tazaki, whose name means 'to build' but contains no colour, was once the fifth member of an inseparable group of friends in Nagoya; the other four, Red, Blue, White, Black, expelled him without explanation when he was nineteen. The trauma nearly kills him. At thirty-six, urged by his girlfriend Sara, he visits each friend to learn why. Murakami structures the novel as a pilgrimage, each encounter yielding a piece of the story, and the pilgrim's reward is ugly: Shiro accused Tsukuru of raping her, which he did not do. She was later found strangled. The murder is never solved.

    The emotional mechanics are solid. <u>Tsukuru's 'colourlessness,' his sense of being necessary but inessential, is the most psychologically precise character study Murakami has produced.</u> The visits to Nagoya and Helsinki have the quiet procedural rhythm of a detective novel, and Kuro's account of what happened to Shiro is harrowing. But the Haida subplot is the problem: a college friend who appears, tells a strange nested story about a six-fingered pianist and a death token, and then vanishes. The supernatural elements introduce a register the novel's realist spine cannot support, and the deliberately unresolved ending, while thematically consistent, left me wanting more than Murakami was willing to give. Liszt's 'Le mal du pays' plays in the background throughout, and its melancholy is the right key for the whole book.

- title: "The Origin of Consciousness in the Breakdown of the Bicameral Mind"
  type: "book"
  creator: "Julian Jaynes"
  creator_role: "by"
  year: 1976
  eval: "loved"
  image: "/assets/images/thoughts/books/origin_of_consciousness_in_the_breakdown_of_the_bicameral_mind.jpg"
  posted: "2017-02-14"
  text: |
    ***The Origin of Consciousness in the Breakdown of the Bicameral Mind*** is probably the book that influenced me most deeply during secondary school, before I had any formal training in neuroscience or philosophy of mind, before I had the vocabulary to say why it mattered. Jaynes's thesis is wild and almost certainly wrong in its specifics: that ancient humans lacked subjective *consciousness* as we know it, that the right hemisphere issued commands experienced as the voices of gods, that the *bicameral mind* collapsed under the weight of societal complexity and the invention of writing. The neuroscience does not hold up. The historical evidence, built largely on the contrast between the *Iliad* and the *Odyssey*, reads too much into linguistic absence. Dennett and others have noted that Jaynes defines *consciousness* so narrowly, as metaphor-based introspective narration, that the argument risks circularity.

    None of this diminishes the book's power. <u>What Jaynes understood, and what has aged remarkably well, is the claim that <em>consciousness</em> is fundamentally metaphorical: that we grasp the inner world through spatial and physical metaphors, that 'seeing' a point and 'grasping' an idea are not decorative language but the very architecture of self-awareness.</u> This anticipates Lakoff and Johnson, Damasio's narrative self, and a whole tradition of *embodied cognition* that Jaynes could not have known was coming. The thesis that metaphor gave birth to *consciousness* is the thread I still pull on.

    Coming back to it now, what strikes me is not the rightness or wrongness of the *bicameral mind* but the audacity of the question. <u>Jaynes asked how <em>consciousness</em> began, not what it is, and in doing so forced everyone who came after him to reckon with the possibility that subjective experience has a history, that it was not always there, that it arrived.</u> I need to re-read it properly someday, with the training I now have. But even the memory of reading it at fifteen, the feeling of an entire framework for understanding the mind snapping into focus, has not faded.

- title: "Sputnik Sweetheart"
  title_en: "スプートニクの恋人"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1999
  eval: "meh..."
  image: "/assets/images/thoughts/books/sputnik_sweetheart.jpg"
  posted: "2017-01-15"
  text: |
    A love triangle built from unrequited desire: K loves Sumire, Sumire loves Miu, Miu loves no one. The title supplies the metaphor; like the Soviet satellite, each character orbits in solitude, transmitting signals no one receives. The Ferris wheel scene, Miu trapped overnight watching her doppelgänger through a window, is Murakami's most concentrated image of dissociation and the single passage I would save from this book.

    But ***Sputnik Sweetheart*** is too thin for its own premise. Sumire vanishes on a Greek island, and the disappearance, which should have the uncanny weight of 'Barn Burning's' vanished woman, registers as a plot device rather than a mystery. K narrates with Murakami's characteristic first-person melancholy, but the melancholy has nowhere to go. <u>*Sputnik Sweetheart* reads like a sketch for a novel Murakami did not write.</u>

- title: "after the quake"
  title_en: "神の子どもたちはみな踊る"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 2000
  eval: "meh..."
  image: "/assets/images/thoughts/books/after_the_quake.jpg"
  posted: "2016-12-10"
  text: |
    Six stories set in the weeks following the 1995 Kobe earthquake, and none takes place in Kobe. The formal conceit is elegant: trauma experienced as displacement, the earthquake always off-screen, registered through television and rumour and unease. 'Super-Frog Saves Tokyo' is the standout, a six-foot frog recruiting a mild office worker to fight a monstrous worm beneath the city, and 'Honey Pie' earns its warmth without sentimentality, with Junpei deciding to write fiction that can protect people. But the remaining four stories blur together. The restraint that produces subtlety in the best pieces produces blandness in the weakest, and by the time I finished ***after the quake*** I could not remember much of 'UFO in Kushiro' or 'Thailand' beyond their premises. A collection with two strong stories and four I have already forgotten.


- title: "The Book of General Ignorance"
  type: "book"
  creator: "John Lloyd and John Mitchinson"
  creator_role: "by"
  year: 2006
  eval: "liked"
  image: "/assets/images/thoughts/books/the_book_of_general_ignorance.jpg"
  posted: "2016-11-20"
  text: |
    A compendium of things you think you know that turn out to be wrong, presented in the format of the BBC panel show *QI*. ***The Book of General Ignorance*** is not a book you read so much as a book you dip into, each entry a self-contained demolition of a common misconception: chameleons do not change colour to match their surroundings, the Great Wall of China is not visible from space, and there are not five senses but anywhere from nine to twenty-one depending on how you count.

    <u>The pleasure is in the rhythm of correction: the confident assertion, the brief pause, and then the floor dropping out from under everything you thought you knew.</u> Lloyd and Mitchinson write with the brisk wit of people who find the world more interesting than most people give it credit for. It is not a profound book and does not pretend to be; it is a book that made me enjoy being wrong, which at sixteen was a useful lesson.

- title: "S."
  type: "book"
  creator: "J.J. Abrams and Doug Dorst"
  creator_role: "by"
  year: 2013
  eval: "liked"
  image: "/assets/images/thoughts/books/s.jpg"
  posted: "2016-11-15"
  text: |
    The physical object is extraordinary. ***S.*** arrives as a weathered library copy of a novel called *Ship of Theseus* by a fictional author named V.M. Straka, complete with a Dewey Decimal sticker and a mock checkout card spanning 1957 to 2000. Tucked between the yellowed pages are postcards, handwritten letters, photographs, a napkin with notes, a compass, a decoder disc. Two university students, Eric and Jen, have filled the margins with handwritten annotations in different ink colours, building a conversation across multiple reading passes, investigating Straka's true identity and falling for each other in the process.

    The inner novel follows an amnesiac called S., shanghaied aboard a ship with mute, stitched-mouth sailors, moving across time and geography in a struggle against Vevoda, a sinister arms manufacturer. The Straka-Caldeira relationship, hidden in the footnotes, forms a third narrative layer. As an exercise in bookmaking, *S.* is among the most ambitious literary objects I have encountered: you read the novel, you read the margin notes, you read the inserts, and the three experiences create a fourth that none of them could produce alone.

    <u>But a brilliant piece of publishing is not the same thing as a brilliant novel.</u> The inner novel reads like competent genre fiction; Jen and Eric's margin romance is engaging but never quite escapes its own cleverness; and the conspiracy plot resolves with a whimper. *The Guardian* got it right: 'a brilliant piece of publishing rather than a wholly coherent rethinking of the novel.' I loved holding it in my hands. I liked reading it. The gap between those two experiences is the book's limitation and, in a way, its thesis.

- title: "The Sun Also Rises"
  type: "book"
  creator: "Ernest Hemingway"
  creator_role: "by"
  year: 1926
  eval: "loved"
  image: "/assets/images/thoughts/books/the_sun_also_rises.jpg"
  posted: "2016-10-20"
  text: |
    Jake Barnes's war wound is the novel's structural principle, not its subject. His impotence is physical, but the entire expatriate world Hemingway builds around him, the endless drinking in Paris, the aimless movement between cafés and countries, is impotent too. ***The Sun Also Rises*** is about people who have been damaged beyond repair trying to live as though they have not been, and the tension between those two states produces the novel's particular kind of agony: everything is said in the gaps between what is actually spoken.

    The Pamplona section is where the book catches fire. The bullfighting sequences do something I did not expect: they establish the only site of genuine value in the entire novel. Pedro Romero's artistry in the ring requires presence, courage, and a willingness to face death without evasion, and against his example, every other character's avoidance and self-deception stands exposed. Brett's affair with Romero amounts to destruction, not seduction; she knows she will ruin him, he is too young and too pure for her damage, and she sends him away before it is too late. <u>That act of renunciation is the closest thing to heroism the novel permits, and it comes from the character least expected to produce it.</u>

    The ending is devastating in the way only Hemingway can be devastating: with economy. 'Oh, Jake, we could have had such a damned good time together.' 'Yes. Isn't it pretty to think so?' <u>Two sentences that contain a whole novel's worth of grief, and neither character raises their voice.</u> I read this at sixteen, and it was the first time I understood that a great novel could be built almost entirely from what it refuses to say.

- title: "Underground"
  title_en: "地下 / アンダーグラウンド"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/books/underground.jpg"
  posted: "2016-10-08"
  text: |
    ***Underground*** is Murakami at his furthest from his usual territory: no magical realism, no jazz references, no passive male protagonist drifting through encounters. This is a work of journalism, oral history, a series of interviews with survivors of the 1995 sarin gas attack on the Tokyo subway system conducted by Aum Shinrikyo. Murakami talked to dozens of people and asked them to tell him what happened. Then he listened.

    What emerges is not a document about terrorism in the usual sense. The perpetrators are almost absent from the first part; instead, Murakami lets the survivors speak in their own registers, with their own rhythms of memory and retrospection. A morning commute interrupted. The smell that was not quite the smell of anything. The slow understanding that something had gone wrong. Each account is ordinary and devastating in its ordinariness: these are people who boarded trains to go to work, and their ordeal is rendered through the specific texture of their individual days rather than through abstraction.

    The second part interviews Aum members. This is harder reading, not because they are shown as monsters but because many are not. Several are educated, thoughtful, disillusioned with ordinary Japanese society in ways that are familiar from Murakami's fiction. <u>The book forces the question of what creates the conditions in which someone commits mass murder for an ideology, and it refuses to answer simply; its argument, stated in the introduction, is that Japanese society must examine what it offered these people, and what it failed to offer them, if it wants to understand how Aum was possible.</u> I came back to this during a later reread in college, and it had only grown.

- title: "The Age of Insight"
  type: "book"
  creator: "Eric Kandel"
  creator_role: "by"
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/books/the_age_of_insight.jpg"
  posted: "2016-09-22"
  text: |
    Kandel built his scientific career on the neuroscience of memory; ***The Age of Insight*** is the product of a lifelong parallel obsession with Viennese modernist art. The book takes as its subject the intersection of painting, psychoanalytic theory, and nascent neuroscience at the turn of the twentieth century: Klimt, Schiele, and Kokoschka in the Secession; Freud and his circle in the coffee houses; Schnitzler writing plays about the unconscious before anyone had named it. Kandel's argument is that these apparently separate activities were responding to the same questions, that the artist and the scientist and the playwright were all groping toward an understanding of what lies beneath the surface of conscious experience.

    The neurobiological sections are the most reliable; Kandel's explications of visual processing, face recognition, and the neural correlates of aesthetic pleasure are clear and well-grounded. The Freud material is treated with more reverence than the current state of evidence warrants, and some of the art-historical synthesis feels strained. But the ambition is the point: Kandel is arguing that the scientific study of the mind and the artistic representation of inner life are continuous rather than opposed, and that Vienna 1900 was not coincidentally producing both at once.

    <u>Reading this as a student just beginning to think about neuroscience gave it a particular charge: here was a discipline with a history, with aesthetic connections and cultural ambitions, linked to everything I already cared about.</u>

- title: "1Q84"
  title_en: "1Q84"
  type: "book"
  creator: "Haruki Murakami, trans. 施小炜 (CH)"
  creator_role: "by"
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/books/1q84.jpg"
  posted: "2016-09-15"
  text: |
    A thousand pages in 施小炜's Chinese, and the experience of reading ***1Q84*** felt like being trapped in an elaborate mechanism whose gears turn endlessly without producing anything. The premise is irresistible: Aomame climbs down an emergency staircase on the Tokyo expressway and enters an alternate 1984, where two moons hang in the sky and Little People emerge from the mouths of the dead to build air chrysalises. But Murakami does almost nothing with the apparatus. The Little People are never explained, the air chrysalises are never explained, and the novel's engine turns out to be a love story between two people who held hands once in primary school and have been searching for each other for twenty years. That love story, taken alone, is touching. The problem is that it does not need a thousand pages, a cult, a private investigator, or a metaphysical architecture to work. <u>*1Q84* is the longest and most exhausting argument I have encountered for the proposition that more is less.</u>

- title: "The Narrow Gate"
  title_en: "窄门"
  type: "book"
  creator: "André Gide"
  creator_role: "by"
  year: 1909
  eval: "liked"
  image: "/assets/images/thoughts/books/the_narrow_gate.jpg"
  posted: "2016-09-10"
  text: |
    ***The Narrow Gate*** follows Jérôme and Alissa from childhood through the years in which their love, apparently mutual and certainly deep, fails to arrive at the union both parties seem to desire. Alissa is the obstacle: she believes that the narrow gate of the title requires her to sacrifice earthly happiness for spiritual progress, and she pursues sainthood with a rigour that destroys her. Jérôme watches, comprehends, and is unable to intervene; he loves her too much and too little.

    What makes the novel disturbing rather than simply sad is the ambiguity of Alissa's interiority. Gide includes her journal in the final section, and her own voice reveals something that Jérôme could not see: that she feared she would be insufficient for earthly love, and that renunciation was as much self-protection as spirituality. She is not a saint thwarted by a world unwilling to martyrdom; she is a young woman who has learned to dress her terror of ordinary happiness in the language of transcendence.

    <u>The economy is remarkable: a novella-length text that contains an entire portrait of two damaged people and a love that destroys itself through excess of feeling.</u> It is not pleasurable, exactly, but the precision of its psychological observation is hard to shake.

- title: "The Great Gatsby"
  type: "book"
  creator: "F. Scott Fitzgerald"
  creator_role: "by"
  year: 1925
  eval: "meh..."
  image: "/assets/images/thoughts/books/the_great_gatsby.jpg"
  posted: "2016-08-15"
  text: |
    ***The Great Gatsby*** is so cleanly constructed that the craft almost conceals its coldness. Nick Carraway narrates with a detachment that shades into complicity; Daisy Buchanan is more symbol than person; Gatsby himself is less a tragic figure than a cautionary illustration of the American myth of self-reinvention. The green light, the eyes of Doctor T. J. Eckleburg, the Valley of Ashes: the symbolism is precise, occasionally heavy-handed.

    What I found harder to enter was the investment. Fitzgerald is forensically good at depicting the emptiness of wealth and the casual cruelty of the very rich, but his novel requires the reader to care about these people, and I found it difficult to do so. Gatsby's love for Daisy feels more like obsession with a projection than genuine feeling, and the novel treats this as tragedy rather than as a study in narcissism.

    <u>The prose is undeniably good: 'So we beat on, boats against the current, borne back ceaselessly into the past' is one of the better last sentences in American fiction.</u> But the book kept me at arm's length.

- title: "Beloved"
  type: "book"
  creator: "Toni Morrison"
  creator_role: "by"
  year: 1987
  eval: "liked"
  image: "/assets/images/thoughts/books/beloved.jpg"
  posted: "2016-08-10"
  text: |
    124 was spiteful. 124 was loud. 124 was quiet. Morrison structures her novel in three movements, each named by what haunts the house, and ***Beloved*** itself operates like a haunting: circling, returning, refusing to resolve into linear sense. Sethe killed her two-year-old daughter rather than let schoolteacher take her back to Sweet Home, and the novel holds that act without judgement or excuse, letting the reader sit inside the impossible logic of a mother who murders out of love, who cuts her child's throat with a handsaw because slavery is worse than death and she knows this from the inside.

    The narrative is fragmented by design. Events surface in pieces, approached from different angles, accumulating meaning through repetition rather than revelation. Morrison's 'rememory,' the idea that traumatic memories exist as physical things in the world, things you can bump into even if they are not yours, is the novel's most powerful formal device: it makes the past not merely remembered but re-encountered, an obstacle you cannot walk around. The stream-of-consciousness passages in Part Two, where Sethe's, Denver's, and Beloved's voices merge until individual identity dissolves, are unlike anything else in American fiction I had read at that point.

    <u>What unsettled me most was the ending: 'This is not a story to pass on.' Morrison writes a story she then instructs us to forget, and the instruction is itself unforgettable, a final turn of the screw that makes the reader complicit in exactly the kind of erasure the novel spent three hundred pages resisting.</u> I was sixteen when I read it and I understood perhaps half of what Morrison was doing. The half I understood was enough.

- title: "Hard-Boiled Wonderland and the End of the World"
  title_en: "世界の終りとハードボイルド・ワンダーランド"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/books/hard_boiled_wonderland_and_the_end_of_the_world.jpg"
  posted: "2016-07-20"
  text: |
    The split narrative is the achievement. Two stories alternate chapter by chapter: a 'Hard-Boiled Wonderland' in which the narrator works as a human data processor for a shadowy organisation called the System, his subconscious weaponised as an encryption device; and the 'End of the World,' a walled town of eerie stillness where a new arrival reads dreams from unicorn skulls in a library, gradually losing his shadow and, with it, his capacity to feel. The two narratives mirror and eventually collapse into each other, and the revelation that the walled town is the narrator's own subconscious, projected outward as a permanent landscape, is one of the most structurally satisfying twists Murakami has engineered.

    The 'End of the World' sections are what made me love this book. There is a quietness to them unlike anything else in Murakami's work: the town operates on dream logic, where causality is suspended and events have the hushed inevitability of a fairy tale. The Librarian, who may be the same woman across both narratives, reads dreams without understanding them, and her presence has a tenderness that Murakami's female characters do not always achieve. <u>The shadow's slow disappearance, what it costs to surrender your emotional core in exchange for perfect safety, is an image I have carried since.</u>

    The 'Hard-Boiled' chapters are funnier and more recognisably Murakami: sandwiches, whisky, a chubby granddaughter and her eccentric scientist grandfather. But the humour serves as counterweight to the other narrative's encroaching sorrow, and the final choice, between a safe eternity in the walled town and a return to the dangerous, mortal, feeling world, is one I think about more often than I would like to admit. <u>Of all Murakami's novels, ***Hard-Boiled Wonderland and the End of the World*** is the one whose architecture impressed me most.</u>

- title: "To Kill a Mockingbird"
  type: "book"
  creator: "Harper Lee"
  creator_role: "by"
  year: 1960
  eval: "meh..."
  image: "/assets/images/thoughts/books/to_kill_a_mockingbird.jpg"
  posted: "2016-07-08"
  text: |
    ***To Kill a Mockingbird*** arrives with so much accumulated prestige that it is difficult to read it fresh. Scout's narration has a charm that the novel earns, and the childhood sequences, the Radley house, the summer games with Dill, the schoolyard rituals, are well-observed. The trial of Tom Robinson is the moral centre, and Atticus Finch remains one of literature's more durable portraits of principled legal defence against a racist system.

    What I found harder to accept was the framing. The novel asks us to admire Atticus as a white man who does the right thing in a racist town, and it measures racial injustice almost entirely through what it costs the white characters to witness it. Calpurnia is the most important Black character and she exists mainly to raise white children well. Tom Robinson, the actual victim, is given less interiority than almost anyone else in the book. <u>The moral framework is compassionate but paternalistic, more concerned with Atticus's conscience than with the lives of the people he is defending, and the novel's enduring reputation as the pre-eminent American novel about racism reflects something about which stories are told by whom and for which audience.</u>

    It is a well-crafted, emotionally legible novel. It is also, now, easier to see what it leaves out.

- title: "South of the Border, West of the Sun"
  title_en: "国境の南、太陽の西"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/books/south_of_the_border_west_of_the_sun.jpg"
  posted: "2016-07-05"
  text: |
    Murakami stripped down to the bone. Hajime has everything a person is supposed to want: a good marriage, a successful business, two healthy children. When Shimamoto reappears after decades, his contentment becomes irrelevant. ***South of the Border, West of the Sun*** hinges on the rupture between the life you have and the life you might have had, and Murakami traces it with the spare, almost merciless economy of a short story stretched to novella length.

    The title maps the emotional terrain: 'South of the Border' references the Nat King Cole record Hajime and Shimamoto listened to as children, evoking romantic possibility and the warmth of shared memory; 'West of the Sun' points somewhere colder, a Siberian delirium in which farmers walk toward the horizon and freeze to death, mistaking exhaustion for purpose. Shimamoto may be real or may not. The envelope she leaves contains only sand.

    <u>But the subplot that cuts deepest is Izumi. Hajime's casual cruelty in high school, sleeping with her cousin out of sheer boredom and barely registering the damage, echoes forward in ways he cannot undo, and seeing what his thoughtlessness did to her is worse than anything Shimamoto's disappearance could inflict.</u> The novel refuses resolution, and the refusal is the point.

- title: "Entangled Life"
  type: "book"
  creator: "Merlin Sheldrake"
  creator_role: "by"
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/books/entangled_life_chinese.jpg"
  posted: "2024-10-01"
  text: |
    I spent three years inside this book. When Editor Fei from HouLang Press asked whether I would translate Sheldrake's ***Entangled Life*** into Chinese, I agreed without hesitation; from childhood memories of Frodo sneaking mushrooms in *The Lord of the Rings* to hiking during my university years in search of fungi, I had accumulated encounters with the fungal world without ever possessing a vocabulary for them. The translation, published as 《菌络万象》in October 2024, took longer than any project I have undertaken, and the reason is simple: Sheldrake writes with the precision of a Cambridge mycologist and the lyrical reach of a nature essayist, and matching both registers in Chinese required dismantling and rebuilding nearly every sentence. Abstract terms became tangible structures; within the entanglement and interweaving of mycelium, I found myself tracing systems of communication, metabolic exchange, and a kind of unity across kingdoms that no textbook had prepared me for.

    The book's central provocation is that fungi challenge the very concept of biological individuality. Mycorrhizal networks connect the roots of trees in arrangements so intricate that Sheldrake's own doctoral fieldwork in Panama, tracing nutrient transfer through underground systems at the Smithsonian Tropical Research Institute, reads less like botany than systems neuroscience. The 'Wood Wide Web' metaphor has since become a cultural phenomenon, and here the book's relationship to evidence grows complicated: Justine Karst and colleagues have challenged whether the three foundational claims, that mycorrhizal networks are widespread, that mature trees send resources to seedlings, that trees preferentially support kin, hold up under scrutiny. Having spent three years inside Sheldrake's prose, I can say that he hedges more carefully than his popularisers; the caveats are there, buried in subordinate clauses, doing quiet work. But the popular narrative, the one that entered the discourse and stayed, ran well ahead of what the data could support. <u>There is a lesson here about the gap between what a careful writer actually writes and what the culture decides to hear.</u>

    What remains, after the controversy, is the writing itself, and the sheer breadth of intellectual curiosity on display: from psilocybin to fermentation, from lichen symbiosis to mycoremediation, Sheldrake never treats fungi as a single subject but as a lens through which to refract questions about agency, cognition, and the boundaries of selfhood. That his father, Rupert Sheldrake, has spent decades at the margins of scientific respectability with his theory of morphic resonance only sharpens the interest: here is the son, working within the institutional frameworks the father rejected, arriving by legitimate means at conclusions about interconnectedness that rhyme, uncomfortably, with the father's unorthodox claims. <u>The tension is never acknowledged in the text, but it hums beneath every page like mycelium beneath a forest floor.</u> I am grateful beyond measure to my wife for constant encouragement; to Editor Fei, whose editorial care bordered on the meticulous; to Zhou for rigorous proofreading; and to Congcong for a cover design full of quiet vitality. This translation exists because of all of them.

- title: "Journey to Rodrigues"
  title_en: "Voyage à Rodrigues"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 1986
  eval: "liked"
  image: "/assets/images/thoughts/books/voyage_a_rodrigues.jpg"
  posted: "2019-07-10"
  text: |
    ***Voyage à Rodrigues*** is Le Clézio's most intimate non-fiction: a pilgrimage to the island where his grandfather searched for pirate treasure at the Anse aux Anglais, following the same paths, reading the same volcanic landscape, trying to understand a man he never met through the geography the man obsessed over. The book is companion to the novel *Le Chercheur d'or* (1985), which fictionalises the same material, but what the novel dramatises, the journal records: the angles of sunlight on black sand, the precise coordinates of ravines mapped in the grandfather's notes, the slow accretion of geographical knowledge that becomes, in Le Clézio's hands, a form of love.

    What surfaces beneath the treasure-hunting narrative is a meditation on inheritance and loss. The grandfather's obsession was driven by the forced sale of the family estate, Eureka, on Mauritius; a dispossession that scattered the family and turned the treasure into a substitute for what could not be recovered. Le Clézio's Mauritian roots run deep, and Rodrigues functions as a site where personal and colonial history intersect: a tiny fragment of the Indian Ocean world that European empires used and discarded. <u>The treasure is never found, and Le Clézio arrives at the admission that closes the book: one cannot share dreams, not even an ancestor's.</u> Coming to this after years of reading Le Clézio, I recognised the same restlessness that drove Hogan's flights and Lalla's return: the pull of origins, the persistence of what is invisible.

- title: "Burnt Heart and Other Romances"
  title_en: "Cœur brûlé et autres romances"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 2000
  eval: "liked"
  image: "/assets/images/thoughts/books/coeur_brule.jpg"
  posted: "2019-06-15"
  text: |
    Le Clézio's use of 'romances' in ***Cœur brûlé et autres romances*** is characteristically precise: these are not love stories but tales in the old mode, closer to the medieval *roman* tradition of quest, encounter, and transformation than to any modern genre convention. The collection sits in Le Clézio's mature period, after the experiments and after the great transitional works like *Désert* (1980) and *Étoile errante* (1992), and the prose has the clarity of a writer who no longer needs to prove anything through formal innovation. Stories like 'La Montagne du dieu vivant' evoke sacred landscapes with a precision that is almost devotional; 'Barsa, ou La vie comme elle est' turns the same attention toward women navigating poverty and violence with no resources beyond persistence.

    <u>Where *La Ronde et autres faits divers* (1982) observed, *Cœur brûlé* transfigures: the same attention to the marginal and the overlooked, but filtered through a register that allows for wonder without sentimentality.</u> The 'romances' framework gives these stories a shape that differs from the naturalist mode; there is something mythic in the architecture, as though Le Clézio were writing modern fairy tales for people who have outgrown the consolation of fairy tales. The fire in the title burns steadily rather than spectacularly, and the warmth is real.


- title: "The Giver"
  type: "book"
  creator: "Lois Lowry"
  creator_role: "by"
  year: 1993
  eval: "liked"
  image: "/assets/images/thoughts/books/the_giver.jpg"
  posted: "2016-06-25"
  text: |
    ***The Giver*** is a book I might have read earlier but came to at sixteen, and the delay might have helped. Jonas lives in the Community, a society that has eliminated war, pain, inequality, and choice; everything is assigned, from careers to family units to the time of one's death. As the Receiver of Memory, Jonas inherits the suppressed history of the world before Sameness, every colour and mountain and snowfall and human cruelty that the Community has traded away for peace and order. The novel turns on the question of whether the trade is worth it.

    Lowry does not write dystopia as satire; the Community is rendered with genuine sympathy as well as horror, and Jonas's growing unease is credible rather than polemical. The relationship between Jonas and the old Receiver (the Giver) is the emotional core of the book: the transfer of memory as a form of inheritance, the weight of human experience passed from one person to another as a burden and a gift. <u>What stays with me is the moment Jonas first experiences colour, the red apple turning red in mid-air, and understands for the first time that the world has been impoverished by its own safety.</u>

    The ending is famously ambiguous and was controversially resolved in the trilogy sequels. I prefer the ambiguity: whether Jonas escapes or dies in the snow, the novel has made its argument.

- title: "Gender Trouble: Feminism and the Subversion of Identity"
  type: "book"
  creator: "Judith Butler"
  creator_role: "by"
  year: 1990
  eval: "loved"
  image: "/assets/images/thoughts/books/gender_trouble.jpg"
  posted: "2016-06-20"
  text: |
    The first gender-studies book I read, and the one that cracked open a way of thinking I did not know existed. Butler's central claim, that gender is performative, not expressive of an interior identity, a repeated set of stylised acts that produce the illusion of a stable gendered self, was electrifying to encounter at sixteen. ***Gender Trouble*** is not easy reading. Butler's prose is dense, recursive, and assumes familiarity with Foucault, Lacan, and Beauvoir that I did not have. I understood perhaps sixty per cent on the first pass and returned to it twice.

    <u>What I grasped, and what has stayed, is the demolition of the sex/gender distinction: Butler's argument that even 'biological sex' is itself a category whose boundaries are drawn by the same cultural forces that produce gender.</u> This was the intellectual move that changed how I thought about identity, not as something discovered but as something constructed, and the construction is never finished, never stable, always open to subversion. The drag analysis in the final chapters, where Butler argues that drag does not imitate a prior original but exposes the fact that all gender is imitation without an original, is the book's most famous passage and its most vivid. I did not follow every argument. I did not need to. The underlying logic -- that the 'natural' is always effect rather than origin, produced by repetition until the seams are invisible -- had been arriving in a very different register for weeks. The framework was enough.

- title: "The Giants"
  title_en: "Les Géants"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/books/les_geants.jpg"
  posted: "2016-06-18"
  text: |
    ***Les Géants*** is the logical terminus of Le Clézio's experimental period, and it reads like a final, furious statement before the long exhale of *Désert* (1980). Hyperpolis, the colossal shopping centre that serves as the novel's setting and antagonist, is consumer capitalism rendered as architecture: a space so vast, so saturated with commodities, signage, and artificial light that it ceases to be a place and becomes a condition. One does not enter Hyperpolis; one is absorbed by it. The prose catalogues merchandise with a relentlessness that borders on vertigo, and the typographic experiments of *La Guerre* (1970) are pushed further here: pages filled with advertising slogans, brand names, numerical sequences, the textual detritus of a civilisation that communicates exclusively through commerce.

    If *La Guerre* diagnoses the war, *Les Géants* names the general. The 'giants' of the title are not people but systems: the corporate structures, the advertising machines, the distribution networks that have replaced human contact with transaction. <u>Le Clézio achieves something rare here: a novel that makes one feel the oppressiveness of abundance, the specific violence of having too much rather than too little.</u>

    Reading *Les Géants* last among the early novels felt right. The trajectory from *Le Livre des fuites* (1969) through *La Guerre* to this book describes a tightening spiral: from global flight, to urban warfare, to the belly of the machine itself. After this, Le Clézio would leave for Panama and Mexico, would live among indigenous peoples, would return with a completely different kind of book. I understand now why he had to leave. One cannot keep writing from inside Hyperpolis without losing one's mind. Something had to give, and what gave was the entire project.

- title: "The Prospector"
  title_en: "Le Chercheur d'or"
  type: "book"
  creator: "J.M.G. Le Clézio, trans. 许钧 (CH)"
  creator_role: "by"
  year: 1985
  eval: "liked"
  image: "/assets/images/thoughts/books/le_chercheur_dor.jpg"
  posted: "2016-06-14"
  text: |
    ***Le Chercheur d'or*** is Le Clézio at his most conventionally novelistic, and that is not a complaint. Alexis grows up on the estate of Boucan in Mauritius, a childhood paradise rendered with the same sensory precision I recognise from *Désert* (1980): the quality of light through trees, the weight of tropical air, the sea always present. When a cyclone destroys the estate and his father dies leaving nothing but debt, Alexis inherits not property but obsession: among the papers lie documents pointing to a corsair's treasure buried at the Anse aux Anglais on Rodrigues Island. He sails on the schooner *Zeta*, and the search consumes years of his life.

    The treasure is never found; this is the novel's argument. What Alexis discovers instead is Ouma, a woman of Manaf heritage, and a love that the colonial order will not permit to last. Le Clézio handles the social architecture of British Mauritius with precision: the Franco-Mauritian planter class losing its grip, Alexis's childhood friend Denis existing in a parallel world, Ouma's community displaced and eventually deported. The First World War takes Alexis to Ypres and the Somme; he returns to find the world has not paused in his absence.

    <u>When Alexis burns his treasure documents 'pour être libre,' one understands that the gold was never in the ground; it was in Boucan before the cyclone, in Denis and the sea, in Ouma, in everything colonial modernity dismantled and dispersed.</u> The novel closes on the constellation Argo Navis, the celestial ship: what remains after all the searching is a dream of voyage suspended in the sky where no one can destroy it. After the experimental fury of *La Guerre* (1970), Le Clézio's mature prose moves like water over stone; clear, patient, shaping everything it touches.

- title: "The Autumn of the Patriarch"
  title_en: "族长的秋天"
  type: "book"
  creator: "Gabriel García Márquez, trans. 轩乐 (CH)"
  creator_role: "by"
  year: 1975
  eval: "loved"
  image: "/assets/images/thoughts/books/the_autumn_of_the_patriarch.jpg"
  posted: "2016-06-12"
  text: |
    ***The Autumn of the Patriarch*** is the most demanding of the Márquez novels I read that summer, and the most formally extreme. A dictator, the Patriarch, has ruled a nameless Caribbean nation for somewhere between one hundred and two hundred years; the novel opens with his death and circles outward from that event through a series of long, winding sentences that can extend for pages without a full stop. The prose is deliberately disorienting: narrators shift mid-sentence, time collapses, events are described, contradicted, revised, and the reader is positioned inside a collective memory that has been so thoroughly corrupted by power that the truth is irretrievable.

    The formal difficulty is not obscurantism. It is the argument. A dictatorship that has lasted long enough destroys not only its subjects but the possibility of clear testimony; what remains is not history but rumour, fear, and myth. The Patriarch himself is less a character than a gravitational field, pulling everything around him into distortion. He is vain, ignorant, superstitious, capable of extraordinary cruelty and occasional tenderness, and the novel refuses to reduce him to a single register. Márquez seems to be working through a question: how does a man come to embody an entire system of oppression, and what does that system do to the man in return?

    <u>What stays with me is the loneliness at the book's core: a man who has wielded absolute power for a century and who dies surrounded by no one who knew him, in a palace overrun by cows, and whose death changes almost nothing, because the structures he embodied have long since outlived any individual who inhabits them.</u>

- title: "Desert"
  title_en: "Désert"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 1980
  eval: "loved"
  image: "/assets/images/thoughts/books/desert_le_clezio.jpg"
  posted: "2016-06-10"
  text: |
    One could read ***Désert*** as two separate novels pressed together: the story of Nour, a young man following the sheikh Ma el Aïnine and the 'blue men' of the desert across the Sahara in 1909 as French colonial forces close in; and the story of Lalla, a young woman of desert descent living in a shantytown near Tangier, who migrates to Marseille and briefly becomes a fashion model before returning to give birth in Morocco. The two narratives never meet in any literal sense. What connects them is the desert itself, which in Le Clézio's prose functions not as backdrop but as a form of consciousness, a way of being in the world that the modern city has systematically destroyed.

    This is the Le Clézio novel that changed everything, and one understands why. The experimental density of the early work has given way to prose that moves like desert wind: expansive, patient, capable of sustained lyrical passages that arrive with devastating force. Nour's trek is rendered with hallucinatory precision; one feels the sun, the sand, the thirst, the slow attrition of bodies under impossible conditions. Lalla's Marseille is its inverse: cold, grey, hostile, a city that sees North African immigrants as labour and nothing more. Her encounter with Es Ser, the mysterious blue-clad desert spirit, carries an almost religious weight, and Le Clézio is wise enough never to explain what Es Ser is. <u>The structural argument is what makes *Désert* extraordinary: by placing the colonial destruction of an indigenous way of life alongside the contemporary experience of immigration, Le Clézio reveals them as the same story told twice, the same dispossession echoing across decades.</u> Lalla is Nour's inheritor whether she knows it or not, and her return to Morocco at the novel's end carries a weight that is at once personal and historical. I came to it already knowing I would love it, and it surpassed what I expected.

- title: "Leaf Storm"
  title_en: "枯枝败叶"
  type: "book"
  creator: "Gabriel García Márquez, trans. 刘习良 and 笋季英 (CH)"
  creator_role: "by"
  year: 1955
  eval: "loved"
  image: "/assets/images/thoughts/books/leaf_storm.jpg"
  posted: "2016-06-06"
  text: |
    ***Leaf Storm*** was García Márquez's first novel, written before the Macondo mythology had fully formed, and it arrives with the peculiar intensity of a writer discovering what he can do. Three members of a family, a colonel, his son, and his granddaughter, sit with the corpse of a reclusive French doctor waiting for the burial that the entire town would prefer not to happen. The novel is told in three voices that circle the same silent body, and the time shifts constantly: present tense, memory, memory of memory, a structure that generates a sense of thick historical sediment pressing down on a single room.

    What the novel is really about is obligation: the colonel made a promise to the doctor years ago, and he keeps it now at the cost of the whole town's resentment. The leaf storm of the title is the wave of immigration and then devastation that came with the banana company, leaving the town depleted and bitter. The doctor arrived with that wave and stayed after it left, and the town blames him for reasons the novel only gradually discloses. Márquez uses the social pressures accumulated across decades to make even a simple act of burial feel like an act of defiance.

    <u>The colonel's solitary insistence on doing what he said he would do is the moral argument of the book, stated without sentimentality or fanfare: a man keeps his word in a town that has forgotten what a word is worth, and the keeping costs him everything except his own estimation of himself.</u> The prose is less fully formed than the later novels, but the moral vision is there from the start.

- title: "The Story of the Foot and Other Fantasies"
  title_en: "Histoire du pied et autres fantaisies"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 2011
  eval: "liked"
  image: "/assets/images/thoughts/books/histoire_du_pied.jpg"
  posted: "2016-06-04"
  text: |
    The subtitle 'fantaisies' in ***Histoire du pied et autres fantaisies*** signals a Le Clézio I had not expected: playful, strange, occasionally whimsical. After the gravity of *Désert* (1980) and *Étoile errante* (1992), the register is disorienting, though 'lightness' is the wrong word; these are stories where the everyday turns strange without warning, where bodies and landscapes carry the weight of the fantastical without ever quite departing from the recognisable world. Le Clézio published this three years after the Nobel, and the writing has the ease of a writer with nothing left to prove and everything left to explore.

    The stories are uneven, which is itself informative. <u>When Le Clézio is bound to the real, to the weight of places and the texture of lived experience, his prose carries an authority that few writers I have read can match; when he untethers entirely, the writing loses its anchor.</u> The strongest pieces hold the real and the imagined in tension, the material world always on the verge of dissolving into something else. I came to this collection between heavier Le Clézio novels and found in it a register I did not know he had. The fantaisies are minor work by his standards, but Le Clézio's minor is most writers' major.

- title: "The Round and Other Cold Hard Facts"
  title_en: "La Ronde et autres faits divers"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 1982
  eval: "loved"
  image: "/assets/images/thoughts/books/la_ronde.jpg"
  posted: "2016-05-30"
  text: |
    ***La Ronde et autres faits divers*** marks a shift. After the experimental novels of the late sixties and early seventies, Le Clézio turns to the short story and, with it, to people: a teenager gang-raped in an HLM housing project; a girl watching the demolition of the ruined building where she hides from the world; a fourteen-year-old boy wandering the city looking for his brother while the adult world closes in. The eleven stories here read like dispatches from the margins, each built around a fait divers, a small human catastrophe that would not make the front page but that contains, in compressed form, the entire structure of a life lived under pressure.

    What strikes me most is the precision of Le Clézio's attention. In 'Moloch', the childbirth of a woman alone in a mobile home is rendered through a maritime vocabulary, pain arriving in waves, the word 'vague' recurring like a mantra until the page itself seems to heave. In 'Orlamonde', a girl's daily escape to a ruined theatre on a cliff is the only space left where death is impossible and dreams still reign; when the demolition is announced, the yellow of the construction machines becomes a colour of death. <u>Le Clézio does not sentimentalise his characters; he renders their circumstances with an exactness that makes sentimentality unnecessary, and the facts are devastating.</u>

    'David', the closing story, folds the collection's concerns into a single image: a boy who believes in angels, fighting the giants alone in a vast deserted valley, standing in a supermarket flooded with artificial light. One recognises the language of *La Guerre* (1970), but the register has changed entirely. The anger has not diminished; it has found a quieter, more devastating delivery.

- title: "Raga: An Approach to the Invisible Continent"
  title_en: "Raga. Approche du continent invisible"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/books/raga.jpg"
  posted: "2016-05-27"
  text: |
    Le Clézio calls Oceania the 'continent invisible,' and ***Raga*** is his attempt to make it visible. The title is the name of Pentecost Island in the Apma language, and the book is neither novel nor essay but something between the two: a meditation on the Pacific islands, their peoples, their languages, and the systematic destruction of their cultures by European colonialism. Le Clézio travelled to Vanuatu in 2005, to Ambrym and Espiritu Santo, and the writing carries the specificity of a place actually inhabited rather than merely observed. He describes navigational traditions, the social architecture of communities built around the sea, and one senses behind the prose a genuine bewilderment at the scale of what has been lost.

    The colonial critique is unsparing. Le Clézio traces the arrival of missionaries, traders, and administrators, but also the practice of blackbirding: the coercive kidnapping of Pacific Islanders for forced labour on plantations in Australia, Fiji, and New Caledonia. The violence is not only military but bureaucratic, educational, spiritual; the subtler dismantling of indigenous systems through religion and economic dependency. <u>The force of the book comes not from idealisation but from specificity: Le Clézio names what was lost, describes its texture, and thereby makes the absence tangible.</u>

    What separates *Raga* from the anticolonial polemic one might expect is the tone. Le Clézio writes with sadness rather than anger, and the sadness is infectious. The invisible continent remains invisible not because no one has looked but because the looking came too late; the old knowledge is dissolving, and what is left is fragments, stories, the memory of navigating by stars that satellites have rendered obsolete.

- title: "Chronicle of a Death Foretold"
  title_en: "一桩事先张扬的凶杀案"
  type: "book"
  creator: "Gabriel García Márquez, trans. 魏然 (CH)"
  creator_role: "by"
  year: 1981
  eval: "liked"
  image: "/assets/images/thoughts/books/chronicle_of_a_death_foretold.jpg"
  posted: "2016-05-25"
  text: |
    Everyone in the town knows Santiago Nasar is going to be killed. The Vicario twins have announced their intentions, have sharpened their knives in the market, have told nearly every person they encounter what they plan to do. And yet it happens. ***Chronicle of a Death Foretold*** is built around this paradox: a murder that was public knowledge in advance, preventable until the moment it became irreversible, and a community that failed to prevent it.

    Márquez structures the novella as a journalist's retrospective inquiry, the narrator returning years later to piece together what happened. The structure is anti-climactic by design: we know the outcome from the first sentence. What Márquez investigates is the machinery of collective inaction, the misunderstandings and deflections that allowed a foretold death to unfold with the logic of a Greek tragedy. The honour culture that motivates the twins, the social pressure that silences bystanders, the rumour and confusion that meant the warning never reached Santiago.

    <u>What remains is a question the novel does not answer: whether the death was truly inevitable, or whether it was the product of a hundred small choices that might individually have gone otherwise.</u> The community's guilt is distributed so widely that no one in particular seems responsible, which is, Márquez suggests, perhaps the most chilling form of culpability.

- title: "Wandering Star"
  title_en: "Étoile errante"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 1992
  eval: "loved"
  image: "/assets/images/thoughts/books/etoile_errante.jpg"
  posted: "2016-05-24"
  text: |
    Two girls, two exiles, one fleeting encounter. Esther is a French Jewish teenager fleeing the Nazis across the mountains from Saint-Martin-Vésubie into Italy; Nejma is a Palestinian orphan displaced by the founding of Israel, ending up in the Nour Chams refugee camp. They meet once, briefly, in Jerusalem, and exchange names, and that exchange carries the weight of everything the novel refuses to resolve. ***Étoile errante*** is Le Clézio at his most restrained and his most devastating: a novel about the twentieth century's most intractable conflict, told not through politics or polemic but through two parallel experiences of losing one's home.

    Le Clézio's structural choice is the argument. By placing the Jewish exodus and the Palestinian Nakba in a single narrative frame, without privileging either, he forces the reader to hold both sufferings simultaneously. Some have called this a weakness, arguing that the novel should take sides; I think they are wrong. <u>The point is that exile itself is a universal grammar, that the wandering star of the title belongs to no one people, and that recognising this does not diminish the specificity of either girl's pain but rather enlarges the capacity for understanding.</u>

    Esther's passage across the mountains has a physical immediacy that Le Clézio handles with the same sensory precision I recognise from his earlier novels, but turned toward entirely different purposes. Where *La Guerre* (1970) uses sensation to depict assault, *Étoile errante* uses it to register flight: the cold of mountain passes, the exhaustion of bodies pushed beyond their limits, the simple animal persistence of survival. Nejma's sections in the refugee camp are sparser, quieter, and all the more devastating for it. Le Clézio does not moralise. He shows, and what he shows is enough.

- title: "No One Writes to the Colonel"
  title_en: "没有人给他写信的上校"
  type: "book"
  creator: "Gabriel García Márquez, trans. 陶玉平 (CH)"
  creator_role: "by"
  year: 1961
  eval: "loved"
  image: "/assets/images/thoughts/books/no_one_writes_to_the_colonel.jpg"
  posted: "2016-05-22"
  text: |
    ***No One Writes to the Colonel*** is the driest of Márquez's major works and, in some ways, the most precise. The unnamed colonel has been waiting fifteen years for the military pension he is owed. He is old, ill, poor, and his wife is sick; they live on borrowed money and a fighting cock that their dead son Agustín left behind. Each week the colonel goes to the dock to collect the mail that never arrives. Each week he walks home. The novella's genius is that it describes this repeated ritual, this systematic disappointment, with such matter-of-fact precision that the comedy and the tragedy become indistinguishable.

    The colonel is not a pathetic figure; he is an absurdly dignified one. He refuses to sell the cock, though selling it would solve their immediate problems; he refuses to despair, though despair would be the rational response to his situation. His wife begs him to accept the reality of their circumstances. He cannot, or will not. Márquez writes his stubbornness without condescension, as though dignity in the face of systematic state neglect were not delusion but the only sane response to an insane situation.

    The setting is a swampy tropical town under an unnamed dictatorship; political violence happens just off the page, referenced in the cancelled boxing matches and the censored newspapers. Agustín was killed for distributing clandestine political literature. The colonel's pension was earned in a civil war that his side may or may not have won, that was certainly not won for people like him. <u>The novella ends with the most famous last line in Colombian literature, the colonel's answer when his wife asks what they will eat: "mierda."</u> Three decades of waiting, and what remains is this single word, delivered with absolute composure. It is the funniest and saddest ending I know.

- title: "The Ritornello of Hunger"
  title_en: "Ritournelle de la faim"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 2008
  eval: "liked"
  image: "/assets/images/thoughts/books/ritournelle_de_la_faim.jpg"
  posted: "2016-05-20"
  text: |
    ***Ritournelle de la faim*** was published the same month Le Clézio won the Nobel Prize, and reads like a book written to honour a debt. Ethel, modelled on Le Clézio's mother, grows up between Mauritian colonial privilege and the deprivation of wartime Paris; hunger arrives not as a single event but as a refrain, a ritournelle that recurs through the decades and shapes everything that follows. The family's decline is precise and unsparing: from the drawing rooms of the Mauritian gentry, through the theft of an inheritance that scatters the family, to the cold apartments of occupied Paris where food is rationed and sometimes absent.

    The structure is looser than Le Clézio's experimental novels, more memoir than fiction, and the writing has a gentleness I had not seen in him before. The hunger is not metaphorical. It is physical, specific, and Le Clézio refuses to romanticise it. <u>The ritournelle, the recurring refrain, is the structural principle: hunger comes back, memory comes back, and the novel circles its subject the way one circles a wound one cannot quite bring oneself to touch.</u> Le Clézio wrote that this was a story 'in memory of a young girl who was, despite herself, a heroine at twenty.' It is a quieter book than what I had come to expect from him, but the quietness is earned; this is a son writing about his mother, and the restraint is a form of respect.

- title: "Love in the Time of Cholera"
  title_en: "霍乱时期的爱情"
  type: "book"
  creator: "Gabriel García Márquez, trans. 杨玲 (CH)"
  creator_role: "by"
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/books/love_in_the_time_of_cholera.jpg"
  posted: "2016-05-17"
  text: |
    If ***One Hundred Years of Solitude*** is Márquez building a world, ***Love in the Time of Cholera*** is Márquez doing something harder: convincing you that a love story which by any ordinary standard is pathological is also, genuinely, one of the great romantic accounts in literature. Fermín Daza waits fifty-one years, nine months, and four days for Fermina Urbino to become available again, having been rejected in their youth. He does not wait with dignity; he sleeps with hundreds of women, conducts affairs, buries his mother, and never entirely stops. When the opportunity finally arrives, both are in their seventies. Márquez does not resolve this. He holds the contradiction open: Fermín is faithful and faithless simultaneously, romantic and grotesque, a man whose love is real and whose conduct is real and who refuses the choice between them.

    The cholera of the title is double. The epidemic is historical, part of the Caribbean world Márquez constructs with the same loving specificity as Macondo; but it is also a metaphor for lovesickness, which Fermín's doctor initially mistakes for cholera when the young man arrives with all the symptoms. Márquez treats love with the clinical detachment of a physician observing an illness, and the effect is both funny and devastating: here is a condition that consumes a human life, produces all the symptoms of derangement, and is given the social sanction of poetry and song.

    <u>The ending, on the river, is one of the most morally ambiguous in all of the novels I have read: the boat flying the yellow cholera flag so that no one will board it, the two old lovers finally together in a space that is neither past nor future, time itself having stopped at the point where love is possible.</u>

- title: "War"
  title_en: "La Guerre"
  type: "book"
  creator: "J.M.G. Le Clézio, trans. 李焰明 and 袁筱一 (CH)"
  creator_role: "by"
  year: 1970
  eval: "loved"
  image: "/assets/images/thoughts/books/la_guerre.jpg"
  posted: "2016-05-15"
  text: |
    The war of Le Clézio's title is not fought with weapons. It is fought with fluorescent lighting, with the hum of refrigeration units, with the ceaseless noise of traffic and the saturating assault of advertising. ***La Guerre*** opens with the declaration that the war is here and spends its entirety proving it: modern urban existence is a form of warfare waged against the senses, and no ceasefire has been signed. Bea B. wanders through the city not as a character in any traditional sense but as a consciousness under siege, and the prose registers light, sound, texture, and movement with an accumulating density that becomes, for the reader, its own form of bombardment. Le Clézio embeds photographs and diagrams into the text, breaking the boundary between novel and visual art, and the disorientation is structural: one does not read this book so much as endure it.

    The supermarket sequence is the centrepiece. Le Clézio transforms the hypermarché into a battlefield where consumer goods sit like ammunition on shelves, where the sheer material surplus of capitalist abundance registers as violence against the body. This is not polemic; it is closer to phenomenology, the rendering of pre-reflective perception until objects press against consciousness with physical weight. Having read *Le Livre des fuites* (1969) a month earlier, I recognise the continuity: Hogan's flights across continents end in the same trap, the same inescapable modernity. But *La Guerre* refuses to flee. It stays in the city and fights, and the difference is everything.

    <u>Le Clézio writes as though language were an instrument of the war he describes, each sentence a controlled detonation aimed at the reader's complacency.</u> The Chinese translation by 李焰明 and 袁筱一 captures what I would have thought untranslatable: the incantatory accumulation of sensory detail, the prose building layer upon layer until reading itself becomes an act of endurance. I came out of this book and the city looked different.

- title: "One Hundred Years of Solitude"
  title_en: "百年孤独"
  type: "book"
  creator: "Gabriel García Márquez, trans. 范晔 (CH)"
  creator_role: "by"
  year: 1967
  eval: "loved"
  image: "/assets/images/thoughts/books/one_hundred_years_of_solitude.jpg"
  posted: "2016-05-08"
  text: |
    ***One Hundred Years of Solitude*** is the novel that most powerfully demonstrated to me what fiction could do. The Buendía family builds Macondo from jungle mud, and over the course of a century the village is visited by alchemy and war, banana companies and civil conflicts, love and amnesia and finally oblivion. Márquez writes in a register that takes the miraculous as given: Remedios the Beauty ascends to heaven while hanging laundry; a yellow plague of butterflies announces the arrival of Mauricio Babilonia; the patriarch José Arcadio Buendía speaks to the ghost of Prudencio Aguilar for years before anyone realises he is mad. The prose holds all of this with the same equanimity it holds the mundane, and the effect is not of a fairy tale but of a complete world, one in which the boundary between the natural and the supernatural has never been drawn.

    What I did not expect was the melancholy. The Buendía men repeat themselves compulsively: the same given names cycle through the generations, the same character patterns recur with slight variations, the same doomed projects absorb the same energies. Colonel Aureliano Buendía fights thirty-two civil wars and loses every one of them; he ends his life making gold fish in his workshop, melting them down, and making them again. The family's incapacity to love without destroying is figured by the incest at the family's origin and its end. Faulkner is structurally present; so is Borges in the self-consuming circularity. But the voice belongs entirely to Márquez.

    <u>The novel is built like a trap that can only be understood once it has closed: the last Buendía reads the Sanskrit parchment that was written at the novel's beginning, translating the fate of his family in the moment it reaches its fulfilment, and the city is erased before he finishes the last page.</u> I thought about Macondo for weeks after finishing. Some books end; this one lingers.

- title: "Thinking, Fast and Slow"
  type: "book"
  creator: "Daniel Kahneman"
  creator_role: "by"
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/books/thinking_fast_and_slow.jpg"
  posted: "2016-04-22"
  text: |
    Kahneman divides the mind into System 1 and System 2, the fast and the slow of the title, and builds the book as a guided tour of everywhere that fast thinking leads us astray. The heuristics and biases programme he developed with Amos Tversky across decades of experiments is laid out here for a general audience: anchoring effects, the availability heuristic, loss aversion, the planning fallacy, the WYSIATI principle (What You See Is All There Is). Each chapter introduces a concept, supports it with experiments, and then invites the reader to catch the same bias operating in themselves. The pedagogical structure works exceptionally well.

    What elevates the book above a catalogue of cognitive errors is Kahneman's honesty about the limits of the framework. He acknowledges that System 1 is not only a source of bias but also the seat of intuitive expertise, and he is careful to distinguish cases where fast thinking is reliable (a chess grandmaster reading a board) from cases where it is systematically misleading (stock pickers who believe they have skill). The section on expert intuition is among the most nuanced treatments I have encountered of when to trust gut feeling and when to be suspicious of it.

    The final third, on experienced versus remembered self, is the most philosophically interesting. Kahneman's research shows that we evaluate experiences not by their duration or average quality but by their peak and their ending, that the self who does the experiencing and the self who later remembers are not the same entity and often have conflicting interests. <u>The implication, which Kahneman states plainly but does not fully resolve, is that pursuing happiness and pursuing a good life as we will remember it may be two genuinely different projects with different optimal strategies.</u> I have thought about this distinction more than almost anything else I read that year.

- title: "The Book of Flights"
  title_en: "Le Livre des fuites"
  type: "book"
  creator: "J.M.G. Le Clézio"
  creator_role: "by"
  year: 1969
  eval: "loved"
  image: "/assets/images/thoughts/books/le_livre_des_fuites.jpg"
  posted: "2016-04-18"
  text: |
    Le Clézio subtitles ***Le Livre des fuites*** 'roman d'aventures,' which is either irony or confession: the adventure is flight itself, perpetual and purposeless, across continents and through prose that refuses to settle into any genre one could name. Jeune Homme Hogan moves from Southeast Asia to Mexico to unnamed cities, not towards anything but away from everything, and the book follows him with a restlessness that infects its own form. Fiction dissolves into essay; essay dissolves into manifesto; manifesto dissolves into lists, diagrams, typographic eruptions that scatter words across the page like debris. Le Clézio is not writing a novel. He is writing against the novel, and the tension between the two produces something I had not encountered before.

    What Hogan flees, fundamentally, is consumer modernity: its noise, its advertising, its relentless colonisation of attention. But Le Clézio is honest enough to acknowledge the paradox. The book is itself a product, an object that sits on shelves in bookshops, a participant in the very economy it rails against. At one point Le Clézio addresses the reader directly, accusing them of complicity; at another he turns the accusation on himself. <u>The flight is impossible not because the world is too large but because the escapee carries the prison with him, because language and consciousness are already structured by the civilisation he is trying to leave behind.</u>

    This was my first Le Clézio. I found in him a writer who could hold rage and tenderness in the same sentence, who could catalogue the horrors of modern existence without flinching and then turn a page and describe the light on a tropical river with a precision that borders on prayer. I read everything of his I could find in the weeks that followed.


- title: "Strange Tales from Tokyo"
  title_en: "东京奇谭集 / 東京奇譚集"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 2005
  eval: "liked"
  image: "/assets/images/thoughts/books/strange_tales_from_tokyo.jpg"
  posted: "2016-04-16"
  text: |
    Five stories set in or adjacent to contemporary Tokyo, each turning on the hinge where the ordinary world admits something it should not. The collection is more modest in ambition than *The Elephant Vanishes* or the later *Men Without Women*, and several of the pieces feel more like exercises than revelations, but at its best ***Strange Tales from Tokyo*** demonstrates that Murakami's short form works best when he refuses to explain what he has shown.

    "Hanalei Bay" is the standout. A woman returns each year to Hawaii where her son drowned while surfing, and the story accumulates quietly over many years until it arrives at an ending that does not resolve so much as recognise what grief has cost her. The restraint is everything: Murakami neither sentimentalises nor explains, and the supernatural element that arrives late in the story feels earned rather than imposed. "Chance Traveler" and "The Kidney-Shaped Stone That Moves Every Day" work almost as well, both circling questions about coincidence and the people we fail to hold onto.

    The final story, "A Shinagawa Monkey," is the weakest: a talking monkey who steals women's names is a fine image but the story cannot decide whether it wants to be a fable or something stranger. <u>Still, this collection confirmed something I had begun to suspect about Murakami: his instincts are sharpest when the canvas is small, when the strangeness has to earn its place sentence by sentence rather than accumulating across hundreds of pages.</u>

- title: "After Dark"
  title_en: "天黑以后 / アフターダーク"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 2004
  eval: "liked"
  image: "/assets/images/thoughts/books/after_dark.jpg"
  posted: "2016-04-12"
  text: |
    ***After Dark*** is shorter than most Murakami novels, closer to novella length, and its premise is almost theatrical: a single night in Tokyo, midnight to dawn, following a small cluster of characters whose paths barely intersect. Mari sits alone in a Denny's, reading; nearby, her comatose sister Eri sleeps in a room that grows increasingly strange; a young trombone player named Takahashi drifts in from the street. Murakami employs an unusual narrative device, a "we" that watches like a camera, a floating observer who can describe what it sees but cannot access what characters think. The result is a novel that feels curiously cinematic, all surface and atmosphere.

    The weakness is that the camera conceit overpromises. It creates distance where intimacy might have landed harder, and the television subplot involving Eri adds symbolism that does not quite cohere. But the nocturnal Tokyo atmosphere is Murakami at his most precise: the interiors of convenience stores at two in the morning, the rhythm of a city that never fully sleeps, the particular loneliness of public spaces when almost no one is in them. <u>Mari and Eri's estrangement is the novel's emotional core, but Murakami approaches it so obliquely that you register its weight only retrospectively, when the night ends and dawn begins to gather.</u> A minor work, but genuinely felt.

- title: "Things Fall Apart"
  type: "book"
  creator: "Chinua Achebe"
  creator_role: "by"
  year: 1958
  eval: "liked"
  image: "/assets/images/thoughts/books/things_fall_apart.jpg"
  posted: "2016-04-10"
  text: |
    Okonkwo is one of the most frustrating protagonists I have encountered, and ***Things Fall Apart*** is better for it. His fear of becoming his father, lazy and debt-ridden and buried in disgrace, drives everything: the wrestling, the violence, the refusal to show tenderness even to his favourite daughter, the murder of Ikemefuna. Achebe writes Okonkwo's rigidity without apology or distance, letting the reader admire his strength while watching it become the instrument of his destruction.

    The first two parts are richer than the third. Achebe's portrait of Igbo village life before the missionaries arrive has a depth and texture that serves as its own argument: the justice system, the religious practices, the proverbs that carry generations of accumulated wisdom, the elaborate social hierarchy. This is not a simple society awaiting civilisation; it is a complete world with its own logic. When the missionaries and the District Commissioner arrive in Part Three, the collision feels inevitable but no less devastating for that.

    <u>The final paragraph is the cruellest thing in the book. The District Commissioner, contemplating Okonkwo's suicide, decides it might merit 'a reasonable paragraph' in the book he plans to write: *The Pacification of the Primitive Tribes of the Lower Niger*.</u> An entire life, an entire culture, reduced to a footnote by the man who destroyed it. Achebe performs in one sentence the very erasure his novel exists to resist.

- title: "Dance Dance Dance"
  title_en: "ダンス・ダンス・ダンス"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1988
  eval: "loved"
  image: "/assets/images/thoughts/books/dance_dance_dance.jpg"
  posted: "2016-03-25"
  text: |
    I came to ***Dance Dance Dance*** without having read *A Wild Sheep Chase*, arriving at the Dolphin Hotel with no knowledge of what it had once been. This turned out to be its own kind of reading experience: the narrator returns to Sapporo to find that the original building, worn and human, has been razed and replaced by a sterile corporate tower bearing the same name, and I felt the loss as absence rather than as history. On a hidden floor of the new hotel, the Sheep Man waits in his filthy suit with the only wisdom that matters: keep dancing, do not stop, do not ask why.

    The command is not inspiration; it is survival. Murakami wrote this during Japan's bubble years, and the novel registers the era's manic emptiness with a precision that has only sharpened since. Every character the narrator meets has been hollowed out by success or by the pursuit of it: the film star Gotanda, elegant and imploding; the receptionist Yumiyoshi, warm but enclosed; the call girl with her own peculiar code. The narrator himself drifts through their lives not as agent but as witness, connected to each of them and helping none.

    <u>What makes this Murakami's most affecting novel, for me, is Gotanda. He is everything the narrator is not, famous, beautiful, wealthy, and he is the one who stops dancing.</u> What happens to him arrives without melodrama, almost as an aside, and its quietness is the worst thing about it. Murakami trusts that understated devastation cuts deeper than spectacle, and he is right. I read 寻羊冒险记 a year later, in my first year of university, and the Dolphin Hotel's original shape finally came into focus. But I have never been able to shake the feeling that arriving at the hotel blind, with no memory of its former life, was somehow the truer way to encounter this book.

- title: "Men Without Women"
  title_en: "没有女人的男人们"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 2014
  eval: "meh..."
  image: "/assets/images/thoughts/books/men_without_women.jpg"
  posted: "2016-03-22"
  text: |
    Seven stories about men from whom women have departed, by death, disappearance, or the simple passage of time. The best are 'Drive My Car,' about a widowed stage director who hires a woman to drive him, a story built on what is not said rather than what is, and 'Yesterday,' about a friend who asks the narrator to date his girlfriend on his behalf. Both pieces use Murakami's characteristic restraint to productive effect: the emotions are present but refracted through indirection.

    The weaker stories fail because that indirection becomes evasion rather than technique. 'An Independent Organ' has an interesting premise but overstates its case; the title story is among the weaker Murakami endings, landing on a vagueness that reads as incomplete rather than deliberately open. <u>***Men Without Women*** has the quality of late Murakami: technically accomplished, consistently melancholy, and occasionally pointing toward a feeling rather than arriving at it.</u> 'Drive My Car' alone justifies the book, and Hamaguchi's film adaptation (2021) earned what the story earned.

- title: "Pinball, 1973"
  title_en: "1973年的弹子球"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1980
  eval: "meh..."
  image: "/assets/images/thoughts/books/pinball_1973.jpg"
  posted: "2016-03-12"
  text: |
    Murakami's second novel finds the same unnamed narrator in Tokyo, now developing an obsession with tracking down a specific pinball machine: a three-flipper Spaceship he used to play, connected in his mind with the dead Naoko. The search has all the structural hallmarks that will recur across his career, the strange women, the late-night conversations, the music at the wrong moment, but the object at the centre does not quite carry the metaphysical weight it is asked to bear. Rat, meanwhile, is in a coastal town with a girl he is preparing to leave and finding that he cannot make himself feel the appropriate things.

    <u>***Pinball, 1973*** is an apprentice work in the most useful sense: it shows Murakami assembling the vocabulary he would later deploy to fuller effect.</u> The pinball machine is a less credible obsession than the sheep or the well or the birds that follow it, but the sensibility that makes those later obsessions resonate is already fully present.

- title: "The Beautiful Brain: The Drawings of Santiago Ramón y Cajal"
  type: "book"
  creator: "Eric A. Newman, Alfonso Araque, and Janet M. Dubinsky (eds.)"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/books/the_beautiful_brain.jpg"
  posted: "2016-03-10"
  text: |
    This is the book that made me want to study the brain. I do not say that lightly. I had been circling neuroscience since reading Jaynes and Sacks, but ***The Beautiful Brain*** collapsed the distance between curiosity and commitment: here were drawings of neurons, made by hand over a century ago, that were simultaneously rigorous science and genuine art, and the fact that they were both at once seemed like a declaration about what the study of the brain could be.

    Santiago Ramón y Cajal won the 1906 Nobel Prize for establishing the neuron doctrine, that the nervous system is composed of discrete, individual cells communicating across gaps, not a continuous fused network as Camillo Golgi believed. The irony is that Cajal used Golgi's own silver staining technique to prove Golgi wrong, and at the Nobel ceremony, Golgi spent his lecture attacking Cajal's theory. The drawings themselves, approximately eighty reproductions sourced from the Cajal Institute in Madrid, are the book's reason for existing. <u>Purkinje cells spread their dendritic fans like coral; pyramidal neurons branch upward with the elegance of river systems viewed from above; retinal layers reveal an architecture that no diagram in a modern textbook has improved upon.</u>

    Cajal trained as a painter before becoming a scientist, and what these drawings demonstrate is that observation and representation are not separate skills but the same skill applied in two directions. In an era before electron microscopy or fluorescent imaging, the ability to see through a microscope and render what you saw with precision was itself a form of scientific argument. <u>The drawings have not aged because the brain has not changed, and the act of looking carefully, which is all Cajal ever did, turns out to be inexhaustible.</u> I looked at this book for hours in a Guangzhou bookshop and knew, with the certainty that only arrives once or twice, what I was going to do with my life.

- title: "Firefly"
  title_en: "萤"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1984
  eval: "liked"
  image: "/assets/images/thoughts/books/firefly.jpg"
  posted: "2016-02-20"
  text: |
    The title story is the seed from which *Norwegian Wood* eventually grew: a university student in a mountain dormitory, a friend whose girlfriend died by suicide, a woman to whom the narrator gives a firefly in a glass jar. The firefly's slow fade in the darkness became the story's central image, later expanded across an entire novel. Reading 萤 knowing what it generates is a particular experience: the story is complete in itself, tender and carefully calibrated, but feels like a scale model of something much larger.

    The rest of the collection circles similar territory, men at a distance from the women they are near, loss that has not yet been identified as loss, the specific quality of Japanese university life as a place of suspended animation. None of these pieces have the assured strangeness of the best *Elephant Vanishes* stories, but they have a delicacy that the longer later work sometimes sacrifices for metaphysical ambition. <u>Murakami before he decided to be Murakami: the voice is already assembled, and what is absent is the decision to complicate it.</u>

- title: "The God Delusion"
  type: "book"
  creator: "Richard Dawkins"
  creator_role: "by"
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/books/the_god_delusion.jpg"
  posted: "2016-02-15"
  text: |
    ***The God Delusion*** was the right book at the right time. I was sixteen, questioning received beliefs with the intensity of someone who had only recently discovered that questioning was permitted, and Dawkins provided the scaffolding: a clear, witty, unapologetic argument that religious belief is a testable hypothesis, not a sacred domain exempt from scrutiny. The 'Ultimate Boeing 747 Gambit' did more to reorganise my thinking than anything else I read that year: if complex life requires a designer, the designer must be even more complex and therefore even less likely to have arisen without explanation. Natural selection provides what design cannot: incremental, non-random accumulation of complexity. The regress stops.

    The Spectrum of Theistic Probability, a scale from 1 (absolute certainty God exists) to 7 (absolute certainty God does not), is the framework I still use when people press me on whether I am 'really' an atheist. Dawkins places himself at 6.9: not certain, but as close to certain as one can responsibly be. This precision matters. It distinguishes confident disbelief from the dogmatic mirror image of faith.

    <u>The book's weakness is the one its critics identify: Dawkins attacks religion as a social phenomenon with great force but engages theology at the level of its crudest expressions.</u> Terry Eagleton's objection, that criticising religion without reading theology is like holding forth on biology from the *Book of British Birds*, is not entirely fair, nor is it entirely wrong. The arguments work against the religion I actually encountered growing up; whether they work against Aquinas or Tillich is a different question, and Dawkins does not seem interested in finding out. But at sixteen, the book did what it needed to do: it gave me permission to think what I was already thinking, and it gave me reasons.

- title: "TV People"
  title_en: "电视人"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1990
  eval: "liked"
  image: "/assets/images/thoughts/books/tv_people.jpg"
  posted: "2016-02-08"
  text: |
    The title story is about a small, slightly wrong-shaped man who delivers a television to the narrator's apartment while the narrator is home. No one else notices him or the television; the narrator is the only one who sees that something new has installed itself in the domestic space without permission or announcement. The story is about the normalisation of intrusion, the way new things simply arrive one day and become furniture.

    ***TV People*** as a collection is Murakami's most consistently uncanny short work. 'The Wind-Up Bird and Tuesday's Women' sketches what would become the novel; 'Lederhosen' has a muted horror to it that does not resolve; 'Sleep' is the collection's best piece, about a woman who stops sleeping and finds, in the insomnia, a life she had not known she was missing. <u>The stories work by refusing to explain what is wrong: something is wrong, and the wrongness is allowed to accumulate without resolution, which is Murakami's most reliable technique and never more precisely deployed than here.</u>

- title: "The Wind-Up Bird Chronicle"
  title_en: "ねじまき鳥クロニクル"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1994
  eval: "liked"
  image: "/assets/images/thoughts/books/the_wind_up_bird_chronicle.jpg"
  posted: "2016-01-20"
  text: |
    Toru Okada is among fiction's most passive protagonists, and ***The Wind-Up Bird Chronicle*** tests whether passivity itself might constitute a form of resistance. His wife vanishes, his cat vanishes, and instead of acting in any conventional sense, he descends into a dry well to sit in darkness. Around this void, Murakami layers an encyclopedic collection of narratives: Lieutenant Mamiya's account of the Japanese army on the Manchurian-Mongolian border, encounters with psychics and corrupt politicians, set pieces that accumulate without fully resolving. The book is a sprawling, ungainly thing, and I mean that partly as a compliment.

    The Manchuria sections are what anchor the whole work. There is a scene of extreme violence involving the Manskinner, a prisoner of war being flayed alive in front of assembled soldiers, that has stayed with me longer than anything else Murakami has written. <u>What makes it so effective is not the violence itself but its structural placement: embedding wartime atrocity inside a domestic story about a man searching for his missing cat forces you to see that historical evil and personal unhappiness share a root system.</u> Noboru Wataya, the sinister brother-in-law, crystallises this: less a crude villain than a politician whose corruption is inseparable from the institutional machinery around him.

    The third volume sags and the novel never quite coheres, which is why I admire it more than I love it. But Murakami's ambition here is on a different scale from his other work, and the well itself, dark, silent, transformative, is the image I return to.



- title: "A Slow Boat to China"
  title_en: "去中国的小船"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1983
  eval: "meh..."
  image: "/assets/images/thoughts/books/a_slow_boat_to_china.jpg"
  posted: "2016-01-12"
  text: |
    Murakami's earliest stories, written before he had fully assembled his register. The title piece, about three encounters with Chinese people that accumulate into a sense of being cut off from some origin one cannot name, is the best of them: melancholy in a way that is precise rather than gestural, tracing a specific urban displacement without explaining it. The narrator watches these encounters collect around him and understands that he is moving away from something, though China in the story is less a place than a direction, a horizon that recedes.

    The other stories in ***A Slow Boat to China*** are lighter, more experimental, and less assured. <u>Reading this collection after the mature Murakami is to hear the same sensibility at an earlier developmental stage, the themes all present in outline but not yet fully inhabited.</u>

- title: "The Second Bakery Attack"
  title_en: "再袭面包店"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1986
  eval: "meh..."
  image: "/assets/images/thoughts/books/the_second_bakery_attack.jpg"
  posted: "2016-01-05"
  text: |
    The title story is the best thing here. A couple wakes up in the middle of the night with a hunger so overwhelming it can only be understood as metaphysical, and the narrator realises it is connected to an old transgression: years ago he and a friend had attempted to rob a bakery but accepted Wagner records instead of bread, leaving a curse unresolved. The only remedy is to complete the attack. The story's logic, playful and slightly unhinged, is early Murakami at his most appealing.

    The rest of ***The Second Bakery Attack*** is more variable. The other stories feel like sketches: the themes that will later organise his novels are present here in outline, the unexplained losses, the music that arrives at the wrong moment, the women who disappear before they can be understood. Nothing here is bad, but most of it is the blueprint rather than the building. <u>A useful companion to the longer work, but not a destination in itself.</u>

- title: "Twelfth Night"
  type: "book"
  creator: "William Shakespeare"
  creator_role: "by"
  year: 1602
  eval: "loved"
  image: "/assets/images/thoughts/books/twelfth_night.jpg"
  posted: "2015-09-15"
  text: |
    Read for AP English at my international school in Guangzhou, and the first Shakespeare that made me laugh out loud. The cross-dressing plot, Viola disguised as Cesario, Olivia falling for Cesario, Orsino falling for Cesario without knowing it, is a machine for producing confusion, and ***Twelfth Night*** runs the machine with glee. Malvolio in yellow stockings, believing Olivia loves him, is the funniest thing in Shakespeare, and what makes it funny is the cruelty: everyone in on the joke except the one person it destroys. Sir Toby Belch and Sir Andrew Aguecheek are wonderful idiots, and Feste the fool speaks the only real wisdom in the play, which is Shakespeare's recurring trick but never better deployed than here.

    <u>The play is about disguise, but what it really demonstrates is that identity is a costume, and removing one costume only reveals another underneath.</u> Viola cannot stop being Cesario even when she wants to; Orsino cannot stop performing lovesickness; Olivia cannot stop performing grief. Everyone is playing a part, and the comedy arises from the fact that the parts have taken over. I wrote an essay on this for class and got an A, which at the time felt like the most important thing. It was not, but the play was.

- title: "The Island"
  title_en: "岛"
  type: "book"
  creator: "Victoria Hislop, trans. 陈新宇 (CH)"
  creator_role: "by"
  year: 2005
  eval: "loved"
  image: "/assets/images/thoughts/books/the_island.jpg"
  posted: "2015-06-15"
  text: |
    Spinalonga is a small island off northeast Crete that served as Greece's last active leper colony until 1957, and ***The Island*** builds a family saga across the generations who lived in its shadow. In the village of Plaka, which faces it across the water: Giorgis the boatman, who rows the sick across and rows the dead back. His wife Eleni, a schoolteacher, contracts leprosy and is sent over. Their daughters diverge into the novel's moral geometry: Anna is beautiful, reckless, and adulterous; Maria is quieter and more patient, and when she contracts leprosy too, the colony becomes not a death sentence but the occasion for her full life, where she meets Dr. Kyritsis, who is developing a cure, and where the community of the sick turns out to be more alive than anything in the village.

    The moral lines are drawn clearly enough that a fifteen-year-old can follow them without difficulty, and Hislop is careful with the historical detail: the colony's architecture, the actual progression of leprosy treatment in mid-century Greece, the quality of a community that knows itself diseased and forgotten by the world outside. The prose is workmanlike, the plot melodramatic in ways I can see clearly now, and the bad characters are very bad while the good ones are very good.

    <u>What the novel does, and what I responded to without having the vocabulary for it, is use the colony as a space where normal social hierarchies dissolve: beauty and status matter less than courage and the willingness to stay.</u> It carried me completely at the time, which is not nothing.

- title: "Siddhartha"
  title_en: "悉达多"
  type: "book"
  creator: "Hermann Hesse, trans. 杨玉功 (CH)"
  creator_role: "by"
  year: 1922
  eval: "disliked"
  image: "/assets/images/thoughts/books/siddhartha.jpg"
  posted: "2015-05-10"
  text: |
    ***Siddhartha*** follows its eponymous Brahmin's son through asceticism, desire, wealth, despair, and final enlightenment by a river in ancient India. Hesse's thesis is that wisdom cannot be transmitted through doctrine and must be lived, which gives the novel a form as schematic as its argument: each stage of Siddhartha's life is a phase to be passed through and discarded, and the people he moves through with, Kamala the courtesan, Govinda the friend, the ferryman Vasudeva, exist as vehicles for his development rather than as people. Kamala provides the sensual education that leads Siddhartha back to renunciation; the novel does not seem to notice the asymmetry of this arrangement, or to consider what Kamala's experience of it might be.

    <u>A fable needs either its architecture or its characters; ***Siddhartha*** has the architecture but characters that are essentially opaque, Orientalist projections of 'Eastern wisdom' onto a landscape of archetypes.</u> At fifteen I found it inert and cold. I have not returned to it.

- title: "Zen and the Art of Motorcycle Maintenance"
  title_en: "禅与摩托车维修艺术"
  type: "book"
  creator: "Robert M. Pirsig, trans. 张国辰 (CH)"
  creator_role: "by"
  year: 1974
  eval: "loved"
  image: "/assets/images/thoughts/books/zen_and_the_art_of_motorcycle_maintenance.jpg"
  posted: "2015-04-15"
  text: |
    ***Zen and the Art of Motorcycle Maintenance*** was the first book I read that convinced me philosophy was not a separate activity from living but a description of the same thing being done more carefully. The narrator rides a motorcycle from Minnesota to California with his son Chris, weaving the travel narrative together with extended 'Chautauquas,' discursive passages on the nature of Quality. Quality, as the narrator develops it, is the pre-intellectual entity that gives things their value: it precedes both classical analytical thinking and romantic intuitive feeling, and is what you are responding to before you have decided how to categorise your response.

    The book's structure is doubled: the narrator we meet is the cautious, diminished survivor of a previous self, Phaedrus, a rhetoric professor who pursued the definition of Quality with such intensity that it broke him into the psychiatric system. As the road narrative progresses, the Chautauquas reconstruct Phaedrus's argument, and the two narratives are on a collision course. What Pirsig manages, and what made this feel revelatory at fifteen, is the demonstration that philosophical obsession is not an abstraction but a thing that happens to a person: the questions about how the world works are the same questions as the ones about how to live in it, and confusing the two can break you.

    <u>The motorcycle maintenance of the title is the book's best metaphor: the difference between treating a machine as something to be understood and treating it as an instrument to be managed is the same difference Pirsig finds everywhere, between relating to the world and merely using it.</u> At fifteen I had not read anything that worked this way before, and the feeling of the philosophical ground shifting beneath the travel narrative was new and completely absorbing.

- title: "And the Mountains Echoed"
  title_en: "群山回唱"
  type: "book"
  creator: "Khaled Hosseini, trans. 康慨 (CH)"
  creator_role: "by"
  year: 2013
  eval: "liked"
  image: "/assets/images/thoughts/books/and_the_mountains_echoed.jpg"
  posted: "2015-03-20"
  text: |
    ***And the Mountains Echoed*** is Hosseini's most formally ambitious novel: a family tree that branches across decades and continents, each chapter following a different character connected, often at several removes, to a single act of separation at the novel's opening. In a 1952 Afghan village, a father sells his young daughter Pari to a wealthy Kabul family, and the novel spends its remaining pages tracking what that decision sends into the world: through a French poet and her estranged daughter, a Greek doctor, an Afghan-American surgeon, a house in Kabul that changes hands and centuries.

    The structure works in episodes rather than as a continuous narrative, and the best of them, Abdullah's childhood, the cold precision of Nila Wahdati's section, earn their weight independently. The problem is cohesion: the novel accumulates characters without always giving them sufficient reason to coexist within the same architecture, and some branches feel like detours rather than amplifications of the central wound. Coming to this after *The Kite Runner* and *A Thousand Splendid Suns*, I expected the emotional impact to scale with the structural ambition; it did not quite. <u>The individual voices are often vivid, but the connections between them carry the sense of architecture being imposed rather than revealed.</u> Hosseini has something to say about separation and inheritance; the multi-generational form is the right vehicle; the execution is more dutiful than felt.

- title: "Animal Farm"
  type: "book"
  creator: "George Orwell"
  creator_role: "by"
  year: 1945
  eval: "disliked"
  image: "/assets/images/thoughts/books/animal_farm.jpg"
  posted: "2015-03-10"
  text: |
    I came to ***Animal Farm*** already suspicious of Orwell, having read *Nineteen Eighty-Four* a few months earlier and come away thinking he was less revolutionary than his reputation. The fable confirmed the suspicion. The allegory is transparent: the pigs are the Bolsheviks, Napoleon is Stalin, Snowball is Trotsky, Boxer is the credulous proletariat who works himself to death for masters who do not deserve his loyalty. The narrative arc, revolution betrayed from within, is presented as though it were an inevitable law of political physics rather than a specific historical outcome, and that is where the book fails. <u>By collapsing 'socialism' into 'Stalinism,' ***Animal Farm*** lets every reader conclude that collective projects are doomed, which amounts to a defence of the status quo rather than a critique of power.</u>

    Orwell called himself a democratic socialist, and perhaps he was, but the book he wrote has been more useful to the right than to any left. The CIA bought the film rights through intermediaries and funded the 1954 animated adaptation, altering the ending to remove the scene where pigs and humans become indistinguishable, turning Orwell's ambiguous fable into a straightforward anti-communist tract. Orwell's own 'List,' the names of suspected communist sympathizers he passed to the Information Research Department in 1949, does not help his case. <u>Intent is not reception: whatever Orwell meant, ***Animal Farm*** functions as propaganda against the very class it claims to champion.</u>

- title: "Kafka on the Shore"
  title_en: "海辺のカフカ"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 2002
  eval: "liked"
  image: "/assets/images/thoughts/books/kafka_on_the_shore.jpg"
  posted: "2015-02-15"
  text: |
    After *Norwegian Wood* I expected quiet realism and got an Oedipal fable wrapped in Murakami's most elaborate metaphysical machinery. Two narratives alternate: Kafka Tamura, a fifteen-year-old running from his father's prophecy that he will kill his father and sleep with his mother, and Nakata, an elderly, simple-minded man who talks to cats and stumbles into a murder. The tonal distance from *Norwegian Wood* was the first surprise; the second was how effortlessly Murakami juggles registers, moving from domestic realism to the the supernatural without a single apologetic transition.

    The supporting characters carry the book. <u>Oshima, the haemophiliac librarian whose conversations with Kafka about Schubert and Greek tragedy form the intellectual spine, is among the most fully realised figures in Murakami's work.</u> Miss Saeki's contained grief over her dead lover becomes almost architectural; when her past finally breaks through, the effect is devastating precisely because it has been so carefully withheld. But the novel's ambition exceeds its discipline in places: the Oedipal consummations feel more like provocations than earned consequences, and the Colonel Sanders figure drifts into whimsy where it needed weight.

    ***Kafka on the Shore*** showed me that Murakami's range extends far beyond his reputation as a writer of wistful love stories, and that the surrealist register could carry genuine emotional force. I liked it; I did not love it; but I could see where it was reaching.

- title: "The Alchemist"
  title_en: "牧羊少年奇幻之旅"
  type: "book"
  creator: "Paulo Coelho (CH)"
  creator_role: "by"
  year: 1988
  eval: "liked"
  image: "/assets/images/thoughts/books/the_alchemist.jpg"
  posted: "2015-01-20"
  text: |
    A shepherd boy named Santiago dreams of treasure buried beneath the Egyptian pyramids. ***The Alchemist*** is the story of his journey: across the Strait of Gibraltar, through North Africa, to an alchemist who teaches him to speak the language of the world and read the omens. Coelho's prose is deliberately fable-like, stripped of local specificity and psychological depth, which is both the book's method and its limitation. The simplicity is intentional: the novel is a parable about following one's 'Personal Legend,' and parables require archetypal figures rather than characters.

    At fifteen, I liked the idea more than the execution. The concept that there is a dream you were born to fulfil, that the universe conspires to help you reach it if you attend to the right signs, appealed precisely because I was anxious about direction. But the novel kept slipping toward something that felt less like wisdom and more like reassurance: every obstacle Santiago encounters is overcome with suspicious ease, and the 'Soul of the World' that supposedly animates everything is never quite distinguished from a vague feeling of positivity. <u>***The Alchemist*** is more useful as a mood than as an argument.</u> Something in it stays, the image of the desert speaking, the idea that sustained attention to signs is itself a form of attentiveness to life, but the philosophy dissolves under examination.

- title: "Nineteen Eighty-Four"
  type: "book"
  creator: "George Orwell"
  creator_role: "by"
  year: 1949
  eval: "meh..."
  image: "/assets/images/thoughts/books/nineteen_eighty_four.jpg"
  posted: "2015-01-15"
  text: |
    Everyone told me ***Nineteen Eighty-Four*** was the most important political novel ever written. I finished it thinking Orwell had written a cautionary tale that was itself more useful to the powerful than to the powerless. The totalitarian machinery is convincing enough; the telescreens, the Thought Police, the endless revisions of history are vivid in the way a well-constructed nightmare is vivid. But what proved harder to shake was the suspicion that Orwell's sympathies were less revolutionary than his reputation suggests. The proles, who constitute eighty-five per cent of the population, are dismissed in a few contemptuous paragraphs: they are too stupid, too passive, too animalistic to revolt. The only people who matter in this novel are Party intellectuals, and the only revolution Orwell can imagine is one conducted by educated men writing diaries. <u>For a writer who claimed to stand with the working class, this is a remarkable failure of imagination.</u>

    O'Brien's torture of Winston is effective horror, but it is horror in the service of a thesis I am not sure I accept: that power is its own justification, that the Party wants power for the sake of power. It reads less like political analysis than like despair dressed up as insight. I came away thinking that Orwell was better at describing what he feared than at understanding how resistance actually works.

- title: "Norwegian Wood"
  title_en: "ノルウェイの森"
  type: "book"
  creator: "Haruki Murakami, trans. 林少华 (CH)"
  creator_role: "by"
  year: 1987
  eval: "loved"
  image: "/assets/images/thoughts/books/norwegian_wood.jpg"
  posted: "2014-12-20"
  text: |
    My first Murakami, and the book that taught me a novel could be built almost entirely from accumulated mundane detail: meals cooked alone, records stacked by the turntable, walks to nowhere in particular. The story is simple enough to summarise in a sentence; what Toru Watanabe remembers of his university years in late-sixties Tokyo, pulled between Naoko, who is drowning in grief after their best friend Kizuki's suicide, and Midori, who is violently, uncompromisingly alive. But the summary misses everything. What Murakami achieves here is a novel where the emotional weight gathers not in the dramatic events but in the spaces between them: the silences during Toru's visits to Ami Hostel, the exact quality of light in Naoko's room, the careful way Reiko tunes her guitar before playing.

    The deaths accumulate quietly. Kizuki kills himself at seventeen and opens a wound that never closes. Naoko follows. And in a single devastating parenthetical, the narrator mentions that Hatsumi, too, will take her own life: not as revelation but as an aside, buried in the middle of an unrelated paragraph, and the effect is closer to how grief actually arrives; not as climax but as ambush, something you walk into while thinking about something else. <u>Every novel I had read until then treated death as a dramatic event. Murakami treats it as weather.</u>

    The architecture is almost schematic: Naoko is the past, Midori is the present; Ami Hostel is withdrawal, Tokyo is engagement; Toru is strung between them, unable to choose either. But the prose dissolves the scheme into something lived and textured, and when Toru says 'Death is not the opposite of life but an innate part of it,' ***Norwegian Wood*** has earned every word of it. I read 挪威的森林 in three days, in 林少华's translation which handles the simplicity of Murakami's Japanese with unusual grace, and could not listen to the Beatles for weeks afterwards without feeling Naoko's absence like vertigo.

