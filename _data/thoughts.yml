# film reviews
# -------------------------------------------------------

- title: "Obsession"
  type: "film"
  creator: "Curry Barker"
  creator_role: "dir."
  year: 2026
  eval: "loved"
  image: "/assets/images/thoughts/films/obsession.jpg"
  posted: "2026-07-05"
  revised: "2026-07-05"
  text: |
    One would think, as 'careful what you wish for' has been literalised in film and fiction so many times that the phrase functions as a plot synopsis on its own, that there is nothing left to explore within the grasp of the monkey paws. But Curry Barker's ***Obsession*** shows that the space is nowhere near exhausted. Baron Bailey (Michael Johnston), a music store employee, buys a novelty 'One Wish Willow' from a voodoo shop and wishes for his coworker Nikki Freeman (Inde Navarrette) to 'love me more than anyone in the world'. Well, despite knowing roughly how this would play out, I was still shocked by the refreshing horror that Barker was able to render on the philosophical level, by how viscerally 'brain-in-a-vat' the parable eventually got.

    Partially thanks to the incredible performance by Inde Navarrette, and partially to how much Barker (confidently) trusts his audience, Ari Aster's *Hereditary* (2018) was the first thing that came to mind as I walked out of the theatre: horror generated mostly by weirdness and eerieness, by relatable settings and dilemmas, by following an emotional logic to its endpoint, without much jump-scare scaffolding (all the 'jump-scares' in this feature are predictably preceded by sonic buildup which counter-intuitively made them scarier due to, possibly, Pavlovian conditioning of the audience). In contrast, *Backrooms* (Kane Parsons, 2026), which I reviewed a few weeks ago, offers the counter-example. Parsons had a spatial premise that amounted to horror on its own, then imposed a psychological reading on it that flattened the space; Barker starts from a psychological premise and lets the horror grow from working it out.

    I especially want to dwell a bit on the title 'Obsession': Baron's wish is nothing like love, despite wishing for Nikki to 'love' him. His 'Nikke should love me more than anyone else in the world' places himself on the object position of the verb; his cowardice and indecisiveness are left unexamined, and he allows himself to push all the responsibility, all the proactiveness that is required of true 'love', onto Nikki. Everything the film does with this premise (and I don't want to risk spoiling the fantastic horror by describing the specifics) follows from the fact that Baron has requested something with the *shape* of love but not the substance, mostly because he himself has no idea what love is. When one late scene forces Bear to confront his selfish, actual wish (Is it 'obsession', as the film's title suggests, or 'love'?), his line, roughly, is 'is being with me really that bad?' Well, yes, Baron. By the end of the film he would come to the same conclusion as us the audience, but then it would have been too late.

    On one last note about the budget, since it's been a hot topic ever since the film's release: Barker's masterpiece could not have succeeded without Inde Navarrette, who is doing several characters' worth of work in this film. The film grossed over $400 million on a $750,000 budget, a Focus Features record. Multiple outlets, including [BroBible](https://brobible.com/culture/article/how-much-was-inde-navarrette-paid-to-star-in-obsession/) citing Supriya Ganesh of *The Pitt* on the record, have reported that Navarrette was paid a flat $20,000 for the role with no back-end participation; Navarrette has neither confirmed nor denied the figure. If accurate, the responsibility lies with Focus Features. A first-time theatrical director working with $750,000 has little to offer up front; the studio, once the film began earning nine figures, should have arranged retroactive back-end compensation. I hope, in the worst case that Focus does not do what is right, that Navarrette's glorious performance opens the doors that it should for her.

- title: "Lake Mungo"
  type: "film"
  creator: "Joel Anderson"
  creator_role: "dir."
  year: 2008
  eval: "loved"
  image: "/assets/images/thoughts/films/lake-mungo.jpg"
  posted: "2026-06-26"
  revised: "2026-06-26"
  text: |
    On the dry lakebed at Lake Mungo, Alice Palmer (a name that definitely was a nod to *Twin Peaks*) accidentally saw her own drowned body through her phone's camera lens: a standing figure with one eye shut, face pale, immediately recognisable as herself. She buried the phone at the site after the encounter and said nothing after returning home from the Lake Mungo school trip. Joel Anderson (whose only film was ***Lake Mungo***) assembled this mockumentary from what the family finds afterwards: home videos, photographs, the parapsychologist's transcripts, everything held in perfect posteriority, with guilt and pain unbeknownst to them yet on the day Alice died.

    Mathew Palmer's ghost photographs turn out to be fabrications; the parapsychologist's sessions yield nothing conclusive; by the time the family has worked through both, they have concluded there is no 'haunting'. Alice had been in the home videos all along, at the edges of frames from evenings that had seemed ordinary, present in footage they had already watched without scrutinising, and the retroactive discovery shows that those exact evenings she was indeed standing at the frame's edge while they were filming something else.

    It's hard to look at the emotional core of ***Lake Mungo*** and not think of some recent found-footage films that made a lot more (***Lake Mungo*** was a box-office disaster at under $30,000 with a 1.4-million-dollar budget) money: *Strange Harvest* and the *Backrooms* are found-footage films in which the grainy texture, the degraded image, and the *form* that the film takes are ends in themselves. In ***Lake Mungo*** the footage fills the gap between the emotional touches, and the form serves the function, where it's clear that Anderson knew that he just *had to* make a found-footage mockumentary and there was no other way to tell this story.

    In Ray Kemeny's office, when asked 'Are you scared of dying?' Alice said: 'Of course, isn't everyone scared of dying?' She turns her fear into a rhetorical universal, unanswerable by definition; Alice probably does not want it answered, either. Was she scared in her last few weeks? What was she thinking over the long days until death? She had filmed her own corpse on a dry lakebed, buried the evidence, and when a psychic gave her an opening, she closed it with 'of course'. The film gives the family no more than this; neither do we come away with more, having watched the same footage they watched.


- title: "The Souvenir Part II"
  type: "film"
  creator: "Joanna Hogg"
  creator_role: "dir."
  year: 2021
  eval: "disliked"
  image: "/assets/images/thoughts/films/souvenir-part-ii.jpg"
  posted: "2026-06-24"
  revised: "2026-06-24"
  text: |
    If the [first film](/thoughts/#the-souvenir) is about how a class safety net lets Julie keep her blindness intact, ***The Souvenir Part II*** is about what that blindness costs everyone else. Hogg gives herself a convenient frame: Anthony has died, Julie will process the loss by making her graduation film about him, and the process itself will constitute Julie 'finding her voice'. When Julie pitches the project to the graduate committee she uses Anthony's own line back to them: 'I want to show life as I imagine it', the same phrase he had spoken to her in the first film. Inside an environment that protects her from every direction, using the words of a drug addict who could not stop lying, Julie makes a self-therapeutic film and calls the result her own voice. What a piece of self-congratulation.

    The same uncritical self-focus runs the rest of the film. Yes, a panel of middle-aged white male academics rejects Julie's graduation proposal, but she can ring her mother, ask for £10,000, and requisition her classmates' credits and future careers to work through a relationship none of them ever understood. The rejection-then-mother sequence is the moment where Hogg could have turned the camera hardest on her own class position: a woman filmmaker blocked at the institutional door, walking around it with family money. Instead she films it as a triumph. Rosalind's £10,000 is not framed as irony but as solution; the committee's rejection is not the reality Julie has to sit with but an obstacle to be routed around. [Katherine Connell, in *Cinema Scope*](https://cinema-scope.com/cinema-scope-magazine/too-good-at-goodbyes-the-souvenir-part-ii-and-joanna-hoggs-cinema-of-memory/), reads this generously, arguing that Hogg 'cannily shows how her class background enables her to circumvent such institutional barriers'. But cannily showing is not cannily critiquing, and the gap between the two is exactly the step Hogg refuses to take.

- title: "The Souvenir"
  type: "film"
  creator: "Joanna Hogg"
  creator_role: "dir."
  year: 2019
  eval: "meh..."
  image: "/assets/images/thoughts/films/souvenir.jpg"
  posted: "2026-06-24"
  revised: "2026-06-24"
  text: |
    Julie (Honor Swinton Byrne), a film student in 1984, is living in a Knightsbridge flat when Anthony (Tom Burke), a self-described Foreign Office employee, moves in and stays. He is also a heroin addict who cannot stop lying, even inside what is otherwise a sincere relationship. Joanna Hogg, restaging her own affair from the same decade, rebuilds the Knightsbridge flat down to possessions she has kept for thirty years, casts Tilda Swinton as her mother Rosalind, and casts Swinton's daughter Honor as the young version of herself. In the [BOMB interview](https://bombmagazine.org/articles/2019/05/30/reemergence-of-a-past-joanna-hogg-interviewed/) that accompanied the film, Hogg calls Julie 'obviously a version of myself', describes her writing method as 'almost like a work of archeology', and returns repeatedly to the word 'processing'. The words 'responsibility' and 'complicity' never appear. She places herself in the position of one still coming out of a shadow, not one who might have contributed to it.

    Whether from naïveté or class-inflected habit, Julie never lets herself see Anthony clearly, and Hogg films that not-seeing with the tragic weight of a first love. Rosalind sees Anthony completely, does not name what she sees, and instead keeps writing cheques: covering the rent, covering the film school shortfalls, covering whatever amount is needed to keep Julie's independence looking intact. The cheque-writing recurs across the film and each recurrence tells the same thing. Julie's ability to remain, inside this relationship, the innocent and betrayed party depends on a middle-class safety net that never once actually retracts. And yet Anthony stays the film's centre, romanticised into a kind of sculpture, while the net stays visible without ever being critiqued. Hogg shows the mechanism at length and never questions it. After Anthony dies of an overdose at the Wallace Collection, in a public toilet next to the gallery where he had first shown her the Fragonard, the film ends with Julie mourning as the wronged party. Yes, Anthony was the one lying, but Julie was also the one whose mother's cheques allowed her to keep not looking, and this is the responsibility Hogg has still not touched.

- title: "Close-Up"
  title_en: "نمای نزدیک"
  type: "film"
  creator: "Abbas Kiarostami"
  creator_role: "dir."
  year: 1990
  eval: "liked"
  image: "/assets/images/thoughts/films/close-up.jpg"
  posted: "2026-06-19"
  revised: "2026-06-19"
  text: |
    I did not know, watching ***Close-Up*** for the first time, that any of it was documentary. The courtroom scenes, the family interviews, the man on trial answering the judge's questions and calling himself Hossein Sabzian, all of it I took as a drama portrayed by professional actors, and it was only afterwards that I found out that the trial was real, Sabzian was Sabzian, captured by Kiarostami who had persuaded a Tehran judge to allow cameras in the courtroom. Sabzian tells the judge, on camera, at length, that pretending to be Makhmalbaf made him feel like a real filmmaker. I, for one, did not doubt that he loved cinema outside the courtroom, but I really couldn't tell whether his testimony in court, where performance becomes a *requirement* for sympathy, was true or performed.

    Then there is the ending, which I still find hard to summarise. Sabzian is released from prison and met at the gate by the real Mohsen Makhmalbaf; Makhmalbaf rides him across Tehran on a motorcycle towards the Ahankhah house, and the audio cuts out repeatedly through the ride. Kiarostami claimed the wireless microphone had malfunctioned. Godfrey Cheshire established, years later, that at least some of the dropout was engineered in post-production. So the film ends with Kiarostami faking a documentary accident to withhold the sound of an event that actually happened. Here, again, we find ourselves at the crossroad of reality and documentary. Kiarostami had every reason to hand us the emotional payoff: the real Makhmalbaf's first words to the man who had been pretending to be him, said inside a moment neither of them could have staged, would have been the film's obvious climax. But Kiarostami probably realises that by the end of the trial the audience would have started to want a verdict on Sabzian, either 'genuine cinephile' or 'manipulator who performed the plea in court'. Letting Makhmalbaf's real words through would have supplied whichever piece of evidence the audience needed to settle it, and Kiarostami would rather leave his own film with a hole in it. Whether ***Close-Up*** is better or worse for it I cannot say, but it sure adds a unique taste to the famous motorcycle scene.

    It's hard to talk about Kiarostami without mentioning Panahi, who was one of Kiarostami's long-term assistants. One would expect Panahi to have learned Kiarostami's way of pointing a camera at the seam between the real and the staged, and for a while he probably did as his mentor had done. However, looking at his recent *No Bears* (2022) and *It Was Just an Accident* (2025), I keep finding that he has replaced Kiarostami's ambiguity with elaborate scenes *about* ambiguity. Kiarostami left a camera running in a courtroom. Panahi, in contrast, stages courtrooms. Somewhere along the way, the essence of what his teacher was doing has been lost. Unlike Kiarostami's attempt to fake microphone drop-offs *for a narrative purpose*, this, I would say, has certainly left Panahi's films worse off.

- title: "Backrooms"
  type: "film"
  creator: "Kane Parsons"
  creator_role: "dir."
  year: 2026
  eval: "meh..."
  image: "/assets/images/thoughts/films/backrooms.png"
  posted: "2026-06-14"
  revised: "2026-06-14"
  text: |
    Kane Parsons was seventeen when he uploaded the first short 'Backrooms' videos onto YouTube, and the videos had what Mark Fisher would call the weird and the eerie in concentrated form: lamps humming over carpet that extends to the horizon, spatial geometry without any sense of consistency, rooms whose purpose is legible (office, corridor, stairwell) but whose *reason* is not. The horror in those videos lay entirely in the gap between function and presence; one could recognise what a room was for without being able to say why it was there. We carry generalised schema-based memories as heuristics for defining the world: we recognise instantiations of such schemata, and Parsons' early YouTube videos broke these schemata with such a force that the resulting confusion amounts to cosmic horror almost spontaneously.

    ***Backrooms*** sustains this 'cosmicness' for its first act: Clark (Chiwetel Ejiofor) steps through the furniture store basement wall into consecutive rooms, each styled differently, each familiar in isolation and collectively impossible, each haunted by that-which-shall-not-be-named in a Lovecraftian sense. For the opening forty minutes, horror pervades with the same spontaneity as Parsons' early YouTube videos, and nothing concrete *needs* to happen inside those impossible spaces (bar the occasional scare provided by the silhouetted creature, seemingly hostile but never directly presented as such). The turn comes when Clark starts bringing other people in: the rope sequence, where his employee Kat and her boyfriend Bobby are tethered and sent into the labyrinth, is the film's best scare precisely because we still cannot see what takes Bobby, only hear the line go taut and snap. Unfortunately after that, the film begins committing to answers it cannot afford.

    The film lost me entirely when the silhouetted creature eventually emerges in full: 'Pirate Clark', an unhumanly tall distortion of Clark's own furniture-store mascot, the pirate costume from his budget television ads grotesquely scaled up and given a body. The Backrooms, it turns out, *copy* what one brings into them in a manner reminiscent of certain SCP entries, and what Clark brought was himself. The schemata-breaking logic of the first act collapses into something legible, answerable, *therapeutic*: a man confronting a literalised version of his self-loathing. What had been a question about space becomes a question about character, and character is answerable in a way that broken spatial geometry is not; the horror, the moment it acquires a face and a psychological explanation, ceases to be horror at all. It is the same trajectory the *Alien* franchise traced over four decades (from Ridley Scott's half-seen jaw in 1979 to the biological close-ups of last year's grandest disappointment *Alien: Earth*), except Parsons managed to ruin his own 'Alien' in a single film rather than four decades of sequels.

- title: "My Father's Shadow"
  type: "film"
  creator: "Akinola Davies Jr."
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/my-fathers-shadow.jpg"
  posted: "2026-05-26"
  revised: "2026-05-26"
  text: |
    On 12 June 1993, the day of Nigeria's presidential election, Akin and Remi (played by the real-life brothers Godwin and Chibuike Marvellous Egbo) are taken by their long-absent father Folarin (Sope Dirisu) across Lagos. The boys do not know what day it is. The Davies brothers, in ***My Father's Shadow***, decide to put the kids' not-knowing front and centre, and see those chaotic times through the kids' lens. The camera stays at the height of their gaze. Folarin's six months of unpaid wages, his affair, his recurring nosebleeds, the military checkpoint where a soldier seems to recognise him as someone who was somewhere he should not have been: all of these arrive as moments the boys merely observe, with the camera observing with them. The result is a deceptive 'narrative thinness', but I do think that the thinness *is* the point. The Davies brothers built a film whose narration cannot exceed its observers' horizons, thus diluting, constraining, but (strangely) also amplifying the political weight of the day.

    Politics enters the kids' view as fragments. They glimpse newspaper headlines at a kiosk, hear voices at a café arguing over Abiola and Babangida, see military trucks at the edge of a frame, sense the gates of the notorious 'Bonny Camp' drifting past the bus window. None of these are explained to us the audience, but we understand them as the kids do, as they accumulate into an overwhelming background voice. We dissolve, as the kids do, into this voice, into the eyes of the people under brutal rules, into the tears of those whose friends, families, colleagues perish.

    The 'big reveal' comes in the final act, where at a café, the boys are eating, and the television announces what is happening: Babangida's military government has annulled the election. We see people rise from their tables; the streets begin to move; the fragments the boys have been brushing past all afternoon resolve into the single event of which they have been but ambient signs all along. The film cuts forward from there to Folarin's funeral... Something happened in Lagos that day, and the boys' father did not come home. And yes, Akinola and Wale Davies lost their own father very young; on some level, the film reconstructs what the Davies brothers could not remember.

    Now, Moshood Kashimawo Olawale Abiola, the man whose democratic victory was annulled by Babangida on television that afternoon, had won what is still widely held to be the freest and fairest election in Nigerian history. He died in detention five years later. The boys, of course, would not have known any of this yet.

- title: "Stiller Freund"
  title_en: "Silent Friend"
  type: "film"
  creator: "Ildikó Enyedi"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/stiller-freund.png"
  posted: "2026-05-25"
  revised: "2026-05-25"
  text: |
    Enyedi braids three timelines together, all intersecting at a ginkgo tree in Marburg, and the tree gives the film its question: how curiosity makes empathy possible across boundaries. There is a neurologist stranded during COVID (Tony Leung) who pivots from brain research to scanning the tree's electrical activity (and obviously I have deep gripes about the pseudo-science presented here, but that's beside the point); a solitary student in 1972 (Enzo Brumm) who inherits his roommate's geranium and slowly befriends it; and a German university's first female student in 1908 (Luna Wedler) fighting institutional exclusion while discovering photography. The three plotlines converge on *communication*: across species, across eras, across the gendered and linguistic chasms humans keep building around themselves.

    Brumm and Wedler play curiosity as a bodily process: Hannes goes from knowing nothing about plants to rigging a sensor so the geranium can open the residence gate when it 'hears' voices (probably by sensing mechanical vibrations at certain frequencies); by the end he treats the plant as a companion whose displeasure he takes seriously. The progression is comic and sincere, capturing, eerily, how scientific curiosity operates: one probes, connects, tries to understand, and in doing so dissolves a boundary one did not know was arbitrary.

    Leung and Seydoux, by contrast, fail to convey that curiosity in any way more interesting than pseudo-scientific 'neuroscience' gimmicks; this is not the actors' fault, but their characters are vehicles for the film's thesis without undergoing the transformation that would make the thesis convincing. Grete's timeline (shot in black-and-white 35mm, Wedler earning the Mastroianni at Venice) is beautiful in isolation but never overlaps thematically with the other two stories; one admires the craft without feeling the resonance.

    Lovely sentences are scattered through the film, about plants existing on timescales that dwarf human attention, about the boundaries of perception being choices rather than facts; they arise naturally, but do not accumulate into an argument. They remain 'aperçus', individually sharp, collectively scattered. I liked ***Stiller Freund***; still, what a pity.

- title: "Un poeta"
  title_en: "A Poet"
  type: "film"
  creator: "Simón Mesa Soto"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/un-poeta.jpg"
  posted: "2026-04-24"
  revised: "2026-04-24"
  text: |
    I did not realise that Ubeimar Rios, the actor playing Oscar Restrepo, is debuting in ***Un Poeta***. A literature professor in Medellín gives us a performance with the quality of someone inhabiting a possible version of his own life rather than acting; I would not have known had I not read it afterwards. His Oscar loves poetry: he idolises the suicidal José Asunción Silva, despises García Márquez, argues about Colombian verse on street corners, and makes regular spectacles of himself at poetry readings, ranting about artistic futility to rooms that have long stopped caring. His passion for literature is visible in every tirade, almost physically present. He is also a drunk, a terrible father, and the sort of man whom everyone around him has learned to tolerate rather than respect; Mesa Soto holds these two facts in the same frame for two hours, patiently and without ever asking the audience to choose.

    Oscar takes a substitute teaching job and discovers Yurlady (Rebeca Andrade, also a first-timer), a fourteen-year-old from a poor barrio whose writing surprises him. He brings her into Medellín's literary establishment, and after that each use of her enables the next: the poetry school packages her as a progressive mascot to attract donors; the European backers write cheques for a story about a girl rescued from poverty through verse; Yurlady's family sees money and extends a hand; Oscar wants a second chance at relevance. Everyone involved is convinced that what they are doing is *helping*. The progressive language and the exploitation wear the same face; the self-justification at each level is so total that it barely registers as deception. Oscar is, I think, the least malicious person in this chain, and for that exact reason the most usable: his love of poetry is genuine, and under this System, genuine care for art is itself a resource that the machinery can extract from. The person who cares the most becomes the one that everyone else can most efficiently convert into a tool.

    Shot on 16mm with a cast drawn entirely from non-professionals, ***Un Poeta*** has the texture of something observed rather than staged; the satire cuts deeper for it, each scene playing as naturalistic comedy until it becomes clear that nobody in the room intends to intervene. I opened this review with the fact that Rios is a literature professor, and two hours later that fact has changed shape. He did not need to learn how to play a man who loves poetry and cannot survive on it. He already knew.

- title: "세계의 주인"
  title_en: "The World of Love"
  type: "film"
  creator: "Yoon Ga-eun"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/world-of-love.jpg"
  posted: "2026-04-26"
  revised: "2026-04-26"
  text: |
    '***The World of Love***'; the Korean title is '세계의 주인', closer to 'master of the world', something that the Chinese translation '世界的主人' captures quite well. The protagonist is Lee Joo-in (Seo Su-bin), 이주인, with '주인' having the double entendre of 'owner', 'master'. Her name is the title's claim; and it took me most of Yoon Ga-eun's third feature to work out what Yoon meant by it. For the first thirty minutes, the film plays like a teen comedy: Jooin is bright, physical, fearless, play-fighting with friends and practising taekwondo. Then a school petition circulates against a sex offender released into the neighbourhood, and it contains a sentence: 'sexual assault completely destroys a person's life'. Jooin will not sign the petition. In the argument that follows she says something that shocks the room, and the audience realises, with the characters, that she is speaking from her experience of being a survivor. A cousin, also a survivor, was once derided in court for not being sad enough; Jooin has seen what that scrutiny looks like, and she has answered it by refusing to perform pain at all (*This did not destroy me. See? I am bright and playful, and I govern my own world*).

    The world does not accept this, though. Anonymous notes arrive; classmates who signed without hesitation treat her silence as evidence of something unsayable. Nobody asks what she thinks; they ask why she will not perform what they expect her to feel. Yoon constructs this machinery with patient, almost documentary precision: the notes, the whispered re-readings of Jooin's brightness as concealment, the slow withdrawal of people who were her 'friends' a week earlier. At home, the strain falls differently. Her father, absent for three years, reads her texts and rarely replies. Her younger brother Hae-in has his own performance: magic tricks for the family, worries placed into a box and made to disappear. He stages a talent show to do this in front of his mother and sister; neither comes, and the trick fails. Jooin performs wholeness and the world calls it a lie. Hae-in performs healing and the family cannot even show up to watch. Everyone around Jooin has decided what shape her suffering should take; when it refuses that shape, they find it easier to doubt the suffering than to revise the expectation. There is a slight sense, at times, that the film knows this too neatly, that every thread points the same direction with a precision that leaves little room for mess. Then again, that precision is also why the film cuts as deep as it does; a messier film might feel more truthful scene by scene and lose the force of the whole.

    The car wash scene is the film's centre of gravity. Jooin and her mother sit in the car while the machinery roars around them, and Yoon places the camera on the backseat, turning the audience into a passenger. Jooin screams, cries, completely breaking down: why didn't you watch over me, you're my mother, you should have been looking. Most of it is swallowed by the noise. Her mother says nothing. She hands her a tissue, then water.

- title: "عنکبوت مقدس"
  title_en: "Holy Spider"
  type: "film"
  creator: "Ali Abbasi"
  creator_role: "dir."
  year: 2022
  eval: "liked"
  image: "/assets/images/thoughts/films/holy-spider.jpg"
  posted: "2026-04-28"
  revised: "2026-04-28"
  text: |
    Abbasi has [said](https://www.huffpost.com/entry/holy-spider-iranian-true-crime-interview_n_635bec1fe4b044fae3e8cd72) he wanted to make not a serial killer film but a film about a *serial killer society*, and ***Holy Spider*** is at its most convincing when it follows that approach. Saeed Hanaei (Mehdi Bajestani) murders sixteen sex workers in Mashhad, and Abbasi locates the killings inside an institutional architecture: police who will not file missing-persons reports, a courtroom that tilts towards the defence, a public that gathers outside in solidarity *with the killer*. The city does not merely fail to stop the murders; it cannot bring itself to call them wrong. This is, I think, the 'serial killer society' that Abbasi is trying to capture.

    Rahimi (Zar Amir Ebrahimi, who won Best Actress at Cannes), the journalist that Abbasi invented to carry the investigation, holds the film's procedural half together. She arrives in Mashhad and cannot even get a hotel room as a single woman; the police chief shows up at her door on the pretence of discussing the case and, when she rejects his advances, threatens her with the fact that nobody would believe her over him; her male reporter counterpart Sharifi (Arash Ashtiani), who is ostensibly her ally, repeats rumours about her past and self-censors his own reporting to avoid offending religious authorities. Every man in the institutional chain wears the same carnelian ring that Saeed wears; Abbasi does not underline this, but it is hard to miss. Ebrahimi plays Rahimi with a taut, furious restraint that holds the procedural together even when the plotting crumbles around her (she poses as bait on her first night out, with Sharifi as her tail; he promptly loses sight of her and Hanaei in the backstreets). Her determination, in this context, reads less as procedural convention than as sustained defiance against a city whose institutions would rather she disappeared too.

    It is a shame, then, that the film does not extend the same attention to the sixteen women that Rahimi is fighting for. The camera gives Saeed interiority and gives his victims, at most, the few minutes before they die; even in a film about a society that refuses to see these women, the film itself struggles to see them. Perhaps this is the trade-off: Abbasi's subject is the machinery, not the individuals it destroys, and a film that tried to hold sixteen lives in focus would be a different one. The thinness still shows.

    When Saeed is finally caught, the relief is oddly thin, as though it belongs to a different kind of film; Abbasi's detachment is so thorough that the catharsis reads less as justice delivered than as the director's wish imposed on a society that would not have produced it on its own terms. Rahimi, on a bus back to Tehran, watches a video of Saeed's son demonstrating the murders on his little sister, rehearsing the strangling with something that looks like joy. The spider's web holds.

- title: "برادران لیلا"
  title_en: "Leila's Brothers"
  type: "film"
  creator: "Saeed Roustayi"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/leilas-brothers.jpg"
  posted: "2026-04-26"
  revised: "2026-04-26"
  text: |
    Leila's four brothers are, in various configurations, unemployed. And it was Leila (Taraneh Alidoosti) that holds the family together financially and logistically; she is the only person in the household who works steadily and plans beyond the next week. Now, she devises a scheme to pool resources and open a shop in a soon-to-be-converted mall space, a scheme that requires cooperation from men who have never cooperated with anything except their own self-destruction, and a father (Saeed Poursamimi) who has been secretly hoarding cash while his children go hungry, whose single ambition is to spend forty gold coins at a wedding to claim the title of clan patriarch, a currency that circulates only among men who already have enough.

    And by the midway mark of the film, after everything she has done for these men, Leila stands on the patio above the celebration, looking down at the men on the dance floor eating, drinking, throwing money in the air, performing their status for one another. She has paid for this; she has paid for all of it; and in that moment she becomes visible to herself as what she has always structurally been: an outsider to the System, which is sustained by her and women like her. The men below are not grateful, not even aware. They are inside a closed circuit of masculine exchange, with gold coins, patriarch titles, social capital. And Leila's labour is the invisible infrastructure upon which that circuit runs. Roustayi holds the camera on Alidoosti's face long enough for the recognition to settle: no self-pity, only the colder understanding that her exclusion is structural, that the System requires her invisibility to function.

    That contradiction widens into the national argument of ***Leila's Brothers***. Iran's economy, crushed by sanctions and inflation that the film tracks in real time (gold prices soaring tenfold in a single montage), has produced a society in which legitimate economic mobility has been replaced by speculation: cryptocurrency, foreign exchange, pyramid schemes, the frantic circulation of money through channels that produce nothing and employ no one. The people inside this system are doing exactly what Esmail does with his gold coins: converting real resources into symbolic capital, performing wealth for an audience of other performers, while the ordinary people whose labour underwrites the whole arrangement are not even variables in the equation. Leila's position on that patio is Iran's position: sustaining a system that does not see her, that cannot afford to see her, because seeing her would mean acknowledging that the entire architecture of masculine honour and speculative finance is built on someone else's back. The Iranian government [banned the film and sentenced Roustayi to six months](https://www.theguardian.com/film/2023/aug/16/iranian-director-saeed-roustayi-jailed-cannes-film-screening-leilas-brothers) for screening it at Cannes without state approval; the sentence is its own confirmation that the argument struck where it was aimed.

- title: "The Drama"
  type: "film"
  creator: "Kristoffer Borgli"
  creator_role: "dir."
  year: 2026
  eval: "loved"
  image: "/assets/images/thoughts/films/drama.jpg"
  posted: "2026-04-18"
  revised: "2026-04-18"
  text: |
    Borgli has made two films now about thought crimes: *Dream Scenario* (2023; wonderful acting by Nick Cage, by the way) about a man persecuted for appearing in other people's nightmares, and now ***The Drama***, about a woman persecuted for a thought upon which she never acted. Borgli keeps returning to the social machinery that processes thought crimes, more than to the thoughts themselves.

    At a wedding tasting, one week before the ceremony, Rachel (Alana Haim) proposes a confessions game: everyone shares the worst thing they have ever done. Mike (Mamoudou Athie), her husband, admits he once used his ex-girlfriend as a human shield against an attacking dog. Rachel follows, recounting with disarming levity how as a child she lured a mentally disabled boy into a trailer, locked him in a closet, and left him there overnight while a search party combed the neighbourhood (she did not even tell others where the boy was when asked; 'out of fear', she said). Charlie (Robert Pattinson), Emma's fiancé, offers something vague about cyberbullying, so underspecified it may not have happened at all. Then Emma (Zendaya), anxious and more than a little drunk, confesses that as a lonely, bullied fifteen-year-old she had planned a school shooting she *never carried out*. Borgli films the room coldly as it receives this. Nobody asks why; probably nobody thinks to care about why. Rachel turns on her with a fury she frames as personal (a cousin of hers was paralysed in a shooting), but the speed of the turn betrays something else: having just narrated her own actually-committed crime with a shrug, she converts the guilt she cannot face inwards into outrage she can direct outwards. The person who proposed the game and set the conditions for the exposure becomes the first to weaponise it, because prosecuting Emma's thought crime is so much easier than sitting with what her own confession revealed about herself.

    The machinery extends well beyond Rachel. Charlie spirals into fantasy sequences where Borgli replaces Zendaya with the teenage Emma (Jordyn Curet) holding a gun; he nearly sleeps with a coworker days before the wedding. Everyone in the room has carried something, and everyone responds to Emma's disclosure by fortifying their own moral position rather than examining hers. The confessions game becomes a precise metaphor for how contemporary American culture processes gun violence at large: the rush to assign culpability, the performance of outrage as proof of one's own goodness, the refusal to ask the harder question ('Why? What drove young Emma to have such terrible thoughts?'). Nobody at the dinner table wants to know what engendered the thought crimes, because the answer would implicate structures they benefit from and a failure of care they participate in. A pro-gun father in Louisiana, the grinding isolation of school bullying, a world that offered a fifteen-year-old no legible exit: these are conditions that could be met with therapy, with genuine conversation, with the kind of sustained attention that costs something. Instead they are met with a confessions game at a wine tasting, where the worst thing you have ever done is either a punchline or a prosecution, and only the person who did not act is made to answer for it.

- title: "Project Hail Mary"
  type: "film"
  creator: "Phil Lord & Christopher Miller"
  creator_role: "dir."
  year: 2026
  eval: "liked"
  image: "/assets/images/thoughts/films/project-hail-mary.jpg"
  posted: "2026-03-28"
  revised: "2026-03-28"
  text: |
    In the first half I was briefly returned to something I had thought lost: the feeling of watching *Interstellar* (2014) in a cinema for the first time, that specific species of awe that comes from naive eyes confronting the scale of the cosmos. The curiosity, the problem-solving, the slow revelation of an alien intelligence utterly unlike anything human: all of it works. Rocky is one of the strangest and most affecting screen presences in recent science fiction, and the film earns every moment of connection between him and Ryland Grace (Ryan Gosling). This was the space film I had been wanting since *Interstellar* (2014) and *Arrival* (2016), the one that treats scientific ingenuity as a mode of being before it treats it as a plot device.

    And then the second half arrives, and with it, the studio. The emotional machinery, which in the first hour runs quietly beneath the surface, is suddenly dragged into the open and operated at maximum volume. Subtlety is abandoned; several passages feel as though they are pointing at the audience and screaming. There is a particular kind of Hollywood emotional manipulation that works by removing all ambiguity from a scene, so the viewer has no choice but to feel the prescribed feeling at the prescribed moment, and this film, beholden to the demands of the mainstream blockbuster, falls into that trap repeatedly in its second half. The grief becomes performance; the wonder becomes instruction.
    One leaves with a sense of waste that is, in its own way, as powerful as any feeling the film intended to produce. It is not often that a film's failure is itself interesting, but here the gap between what the first hour promises and what the second hour delivers is so wide that it becomes its own kind of argument about the structural conditions under which science fiction is allowed to exist in mainstream cinema.

- title: "Hoppers"
  type: "film"
  creator: "Daniel Chong"
  creator_role: "dir."
  year: 2026
  eval: "hated"
  image: "/assets/images/thoughts/films/hoppers.jpg"
  posted: "2026-03-23"
  revised: "2026-03-23"
  text: |
    ***Hoppers*** wears environmentalist clothing so conspicuously that one is invited to admire the tailoring and leave the politics underneath alone. Mabel, a nineteen-year-old student, gains access to technology that lets her inhabit a robotic beaver to infiltrate the animal world and oppose a mayor's plan to build a freeway through a wildlife glade. The premise promises systemic critique: capital and state power colluding to destroy the commons. But the film dissolves its own argument. By the final act the mayor's ecological violence is quietly forgiven, the freeway rerouted, the glade preserved, and the resolution is personal reconciliation rather than structural change. The message, stripped bare: capitalism is fine as long as individual capitalists have a change of heart. Pixar has produced its most politically instructive film, though not in the way it intended.
    More damning is the hierarchy that the film constructs and then refuses to examine. An Animal Council grants representation to mammals, birds, amphibians, reptiles, and fish; insects receive a seat but their queen is accidentally killed by Mabel without moral consequence, and an insect is dispatched by being eaten, played for laughs. The film needs a villain and, unwilling to indict the mayor whose project would have destroyed a habitat, settles on the Insect Prince; but one struggles to name what Titus actually did wrong. His queen was killed by the protagonist's recklessness. His people hold the least representation on the Council. His seizure of power is the most rational response in the entire film. The environmental ethic extends precisely as far as charismatic megafauna; beyond that threshold, some animals, it seems, are more equal than others. Mabel's recklessness, which triggers a political coup, an assassination, and a wildfire, is forgiven without a word of explanation, because the film has already decided that the impulsiveness of a passionate young woman is endearing when it is catastrophic. The beavers are cute. That is all this film has, and it is not enough.

- title: "Marty Supreme"
  type: "film"
  creator: "Josh Safdie"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/marty-supreme.jpg"
  posted: "2026-02-14"
  revised: "2026-02-14"
  text: |
    A table-tennis hustler (Timothée Chalamet) on the 1950s Lower East Side, loosely drawn from the life of Marty Reisman, who sold shoes by day and ran the underground circuits by night until he hustled his way to a world championship bid in Bombay. The opening and closing passages suggest a Safdie working in a new key: restrained, almost elegiac, willing to let silence do something other than function as the gap before the next assault on the senses. Then the middle hour arrives, and it is as though Safdie panics, packing in the entanglement with a pen magnate's wife (Gwyneth Paltrow), the humiliating sponsorship deal, every conceivable dramatic beat compressed into a pitch of escalating anxiety. The anxiety that defines Safdie's filmmaking modulates here from style into something closer to compulsion, and the film strains under the weight of its own incident.
    And yet Chalamet. The performance is a surprise: not the mannered intensity one might have expected, but something more mercurial, more physically committed, more alive to the comedy latent in obsession. He carries the film's worst passages without making them feel unearned. That Safdie trusted him with a character this abrasive and this charming simultaneously, and that the trust was warranted, is the most interesting thing about ***Marty Supreme***.

- title: "Hamnet"
  type: "film"
  creator: "Chloé Zhao"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/hamnet.jpg"
  posted: "2026-02-08"
  revised: "2026-02-08"
  text: |
    I wept through the second half and needed a further half-hour to recover after the credits rolled. I have not cried like this at any film since *Aftersun* (2022). O'Farrell's novel is one of those rare acts of historical reimagination that completely recontextualises an existing work for those who know it, revealing *Hamlet* as Shakespeare's grief made legible, the dead boy given back his name and therefore his reality. Zhao's adaptation is faithful to that project: mourning is not singular, two people loving the same child can lose entirely different things, and the film lives in the distance between those losses.

    Jessie Buckley's Agnes grieves as the body grieves: through proximity, through the refusal to let go of the physical fact of her son. Her performance gives the film its strongest grief and, by some margin, one of the year's finest. Every scene in which she tends to the dying child or rages at the absent husband carries the weight of a grief that has no use for metaphor, that wants only the thing itself, the warmth of a living boy, and cannot have it. Paul Mescal's Will grieves differently: he metabolises the loss into language, transforms the dead child into a character, gives the grief a name and a stage and an audience. The dialectic the film inherits from O'Farrell is never resolved, because it cannot be. Agnes's fury at Will's transformation of their son's death into aesthetic object is as morally correct as it is, structurally, beside the point: the play exists, and the play will outlast both of them.
    Zhao adds the landscape, the English countryside suffused with an almost mythic luminosity that turns place into participant, a world that registers the death of a child as a kind of ontological wound. Zhao straightens O'Farrell's non-linear intercutting into chronological progression, yet the effect is oddly similar: the landscape holds the living and the dead in the same temporal plane, achieving through place what the novel achieved through structure. Jacobi Jupe's Hamnet is a fleeting presence, felt more than seen, and the casting is impeccable: a child so alive in his early scenes that his absence, when it arrives, registers as a physical subtraction from the frame. The film's final passage, in which Agnes watches Will perform as the Ghost and hears him speak 'Remember me', draws grief, art, and history into a single moment that one cannot watch unmoved.

    As in the novel, the word 'remember' does what neither grief could do alone: it holds the living and the dead in the same breath. The father's art does not console the mother; the mother's rage does not unmake the art. What remains is the name that was real before it was a character, and the recognition that love, having survived what it most feared, persists as the memory of a warmth that no play can reproduce and no amount of language can extinguish.

- title: "Tardes de soledad"
  title_en: "Afternoons of Solitude"
  type: "film"
  creator: "Albert Serra"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/tardes-de-soledad.jpg"
  posted: "2026-01-30"
  revised: "2026-01-30"
  text: |
    Serra claims he takes no position, and the claim is both true and insufficient. The repetition, the same preparations, the same entry into the ring, the same choreography of suffering and struggle, builds into something so close to the zen of pure duration that one might mistake the film's neutrality for aestheticism. It is not. The repetition amplifies: cruelty, accumulated across a season, is not diluted by familiarity but intensified, so that the distance between the opening and closing of a bull's eye and the twitching of its face becomes a space in which moral feeling can no longer be deferred. The blow that nearly kills, when it comes, is the arrival of something the whole season has been promising.

    Spanish bullfighting has never had anything to do with fairness or courage, and one cannot speak of 'verdad' in the sense Serra reaches for, because the thing in the ring is not truth but spectacle built upon death, performance that requires a corpse to complete itself. And yet, as Serra intuits, the repetition legitimises. 'Repetition legitimises' is not an apology for the institution; it is a diagnosis of why the institution persists, why even the viewer who grieves for the dying animal, who wishes the bull could turn the violence back on the matador, is still carried along by centuries of accumulated history. The film does not resolve the contradiction, because the contradiction is the point: one is sucked down into the whirlpool of the absurd, and the film holds one there, and asks what it is like not to be able to look away.

- title: "O Agente Secreto"
  title_en: "The Secret Agent"
  type: "film"
  creator: "Kleber Mendonça Filho"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/o-agente-secreto.jpg"
  posted: "2026-01-25"
  revised: "2026-01-25"
  text: |
    The unfortunate limit here is my own unfamiliarity with Brazilian history, which means I could only proceed as the young woman does in the film's present-day framing: listening to recordings, piecing together fragments, stepping one piece at a time into the story of Brazil's north in the years of lead. The arrangement is formally precise, the outsider's partial knowledge mirrored within the film's own structure, so that the experience of not-quite-knowing, of reconstructing an atrocity from its residues, becomes the film's epistemological argument instead of a deficiency to be overcome.
    Mendonça Filho has always been a director of place, Recife as a living entity with its own memory and its own grievances, and here the city's past is almost geological, layered beneath the present, accessible only through the kind of patient archaeology that the film itself enacts. Even with incomplete historical coordinates, the images still moved me: this is what it looks like when a society tries to forget what its own institutions did to its own people, and what it costs to remember.

- title: "صوت هند رجب"
  title_en: "The Voice of Hind Rajab"
  type: "film"
  creator: "Kaouther Ben Hania"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/voice-of-hind-rajab.jpg"
  posted: "2026-01-24"
  revised: "2026-01-24"
  text: |
    Ben Hania builds the entire film inside a single room: the Palestine Red Crescent call centre in Ramallah, where dispatchers spend three and a half hours trying to coordinate safe passage for an ambulance to reach a child trapped in a car with the bodies of her family. Hind Rajab does not appear on screen. She is present only as a voice, her own recorded voice, and the film places that voice at its centre with a restraint that makes the surrounding silence unbearable. The dispatchers negotiate, plead, follow procedure; the procedure fails; the ambulance is dispatched after claimed approval; contact is lost. Twelve days later the car is found with 335 bullet holes. Everyone is dead: Hind, her six family members, both paramedics.

    The formal decision to keep all violence off-screen is not squeamishness; it is an argument about where the obscenity actually resides. What one watches is not killing but bureaucracy: the calls, the waiting, the careful language of coordination that masks the fact that no coordination is possible when one party has decided that a child's life is expendable. The contemporary critical habit of separating aesthetic evaluation from moral weight is exactly what this film exposes as obscene. Some critics, confronted with this material, reached for formal reservations about the ethics of embedding a real child's voice in a dramatic reconstruction. The only available response is that the child is dead, that the recording exists, and that the refusal to hear it is itself a political act. Ben Hania has been characteristically direct: 'When you amplify the voice of Palestinians, you are accused of being exploitative.' She called that accusation another way of silencing the film.

    The structural parallel does not need to be argued because the evidence argues it: the same bureaucratic dehumanisation, the same rhetorical apparatus deployed to make the killing of children administratively legible, the same international architecture of looking away. I sat in the dark for a long time afterwards. The film does not argue this; it shows it. That is what witness means.

- title: "Blue Moon"
  type: "film"
  creator: "Richard Linklater"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/blue-moon.jpg"
  posted: "2026-01-20"
  revised: "2026-01-20"
  text: |
    Ethan Hawke has once again delivered a career-highlight performance for Linklater, and if last year's finest actress was beyond doubt Rose Byrne in *If I Had Legs I'd Kick You* (2025), then last year's finest actor is equally beyond doubt Hawke. The performance captures the 'pathetic' quality, in the original sense, the quality of pathos as structure rather than as sentiment: a man living inside an unrealistic fantasy of love, helplessly self-deluding, and doing so with total conviction. Hart's sexuality, the loneliness that could not be safely spoken in 1943 and perhaps barely in any decade since, is everywhere present, the engine behind the drinking, behind the infatuated longing, behind the lyricist who thinks highly of himself yet has long since burned through his best years and consoles himself with excuses as younger talent makes what he once made look effortless.

    Linklater shoots the film in a single night at Sardi's, which is exactly the right formal choice: this is a man at the end of a long performance, the curtain about to come down, and the evening's duration gives Hawke the space to let the performance breathe, to let the self-deception falter and reform. The film understands that Rodgers (Andrew Scott) and Hart's dissolution was professional and also a kind of abandonment, and that Hart's final months were spent in the psychic posture of someone who knows they have been left but cannot entirely believe it.
    It has been nearly half a month since I watched it, yet Hart's expressions refuse to leave: the moment he crouches to pick up playing cards from the floor, the look of infatuated longing he turns on the woman he cannot have. Some performances settle into memory not as scenes but as gestures, a few square inches of screen that contain an entire life. This is one of those.

- title: "28 Years Later"
  type: "film"
  creator: "Danny Boyle"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/28-years-later.jpg"
  posted: "2026-01-20"
  revised: "2026-01-20"
  text: |
    The iPhone 15 Pro Max cinematography is the film's most discussed feature and its most revealing decision. Anthony Dod Mantle, who shot the original *28 Days Later* on Canon XL1 MiniDV cameras, here returns to a small consumer device, and the lo-fi texture, hallucinatory and raw, suits the material far better than conventional horror grammar would. ***28 Years Later*** is set on a fortified island commune off the Northumberland coast, a self-sustaining enclave where survivors have lived in carefully maintained safety for nearly three decades. The metaphor is legible immediately: a walled society that has preserved itself by excluding everything beyond its borders, a literalisation of fortress Britain that Boyle and Alex Garland, reunited after their reported falling-out, deploy with more political intent than the marketing suggests.

    When the journey to the mainland begins, the film finds its footing. The Rage Virus has evolved; the Infected have changed over twenty-eight years in ways the film wisely declines to fully explain, and the mainland itself, overgrown and feral, becomes a character in the manner of the depopulated London that made the original so iconic. Aaron Taylor-Johnson's Jamie carries the main arc with a physicality that reads as exhaustion rather than performed toughness, and Jodie Comer (Isla), in a role that could have been thankless, brings a precision to her scenes that suggests a larger presence in the planned sequels. The political subtext is sharper than one expects from a franchise entry: who gets inside the walls, who is left outside, and what forms of violence the protected class will sanction to maintain the distinction.
    Boyle's restless formal gestures remain, the rapid edits and disorienting angles that have followed him since *Trainspotting* and occasionally lapse into self-parody. But something has shifted. The psychedelia serves the horror rather than competing with it, and there are passages, particularly in the film's final movement, where the lo-fi texture and the hallucinatory pacing fuse into something unsettling in a way his recent work has not been. The ending is partly setup for *The Bone Temple*, the Nia DaCosta-directed sequel, which robs it of the self-contained force the original achieved. More interesting than anything Boyle has made in years; the old energy is intermittently present, and this time, it amounts to a return.

- title: "Lurker"
  type: "film"
  creator: "Alex Russell"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/lurker.jpg"
  posted: "2026-01-12"
  revised: "2026-01-12"
  text: |
    ***Lurker*** opens on a calculated miracle. Matthew (Théodore Pellerin), working the floor of a minimalist LA clothing boutique, puts 'My Love Song for You' on the store speakers the moment Oliver (Archie Madekwe), a rising British pop star, walks through the door; he has trawled Oliver's socials and knows the song is a favourite. He feigns ignorance, and the con works: Oliver invites him backstage. Russell refuses the term that genre convention would supply. Matthew is not a fan; the word implies a stable subject adoring a stable object, and neither description fits. Pellerin inhabits the role with a restraint so total that one never catches the performance signalling where one should be afraid; the attention that Matthew pays to Oliver has already crossed into something closer to predation, and the distinction dissolved long before the film began.

    He positions himself as Oliver's documentarian, quits the boutique, begins contributing visual work to the album cycle. When Jamie (Sunny Suljic), a former colleague, joins the entourage as a stylist and fits in with the effortless warmth that Matthew can only simulate, the response is immediate: Matthew sabotages him, is shunned, and acquires leverage so ugly that the film's restraint in depicting it makes one flinch harder than any explicit scene could. The escalation follows the exact same logic as the opening gesture in the boutique, merely raised to a pitch that the social contract can no longer absorb. Russell films the entire arc on 16mm, a counter-intuitive choice for a subject steeped in digital celebrity; the grain makes the world feel bodily, continuous with an older tradition of obsession that predates the algorithm.

    Russell is mapping a topology of desire in which the craving for recognition and the aura of proximity to fame fuse into something that no longer resembles either. The relationship proves mutually parasitic: Oliver feeds on Matthew's fixation as surely as Matthew feeds on Oliver's luminance. Concert sequences filmed at real parties, with Madekwe performing live to real crowds, collapse the boundary between the film's gaze and Matthew's own; one watches Matthew watching Oliver and recognises the structure of one's own spectatorship.

    The ending arrives with a time jump that resets everything and solves nothing. Matthew's documentary premieres at a festival; Oliver attends, stripped of his pop-star artifice. A young photographer approaches Matthew, says he admires him, and asks: 'What do I have to do?' The film cuts before Matthew can answer. Obsession of this kind reproduces itself; it requires no particular host, only the structure of longing that the host once activated. I keep returning, afterwards, to 'My Love Song for You' playing in the boutique at the very beginning. It's a Nile Rodgers track from 1983, *Adventures in the Land of the Good Groove*, and choosing it might be one of the best decisions Russell made. The song is unhurriedly, uncomplicatedly sincere; Rodgers wrote it as nothing more or less than a love song, Bernard Edwards's bass line ambling alongside like it's simply glad to be present. That sincerity makes Matthew's deployment of it devastating: he weaponises genuine tenderness as a lure, and the song never stops being beautiful even after one understands what it has been conscripted to do. It sits there at the opening like a small, clear bell, and the rest of the film is the echo.

- title: "Eternity"
  type: "film"
  creator: "David Freyne"
  creator_role: "dir."
  year: 2025
  eval: "hated"
  image: "/assets/images/thoughts/films/eternity.jpg"
  posted: "2026-01-12"
  revised: "2026-01-12"
  text: |
    ***Eternity*** asks what a woman would do with infinite time, and answers: choose between two men. Larry (Miles Teller) dies first, choking on a pretzel at a gender-reveal party; Joan (Elizabeth Olsen), terminal with cancer, follows. In the afterlife she discovers that Luke (Callum Turner), her first husband, killed in the Korean War, has been waiting sixty-seven years at the Junction. Joan is granted a rare exemption: she may sample two themed eternities before choosing. She chooses Luke first, a mountain idyll, and grows dissatisfied; she returns to Larry, who has been tending bar at the Junction rather than enter eternity without her. The resolution privileges the domestic: the small moments of a long marriage outweigh the unfinished romance. A film that builds an entire metaphysical architecture only to arrive at the conclusion that a woman's highest aspiration, in life and in death, is to select which man deserves her.
    The conspicuously progressive surface, the pointed glance at the Korean War, the afterlife's diverse transit hub, cannot camouflage the conservatism underneath. Luke's sixty-seven-year vigil is framed as devotion; structurally, it makes a claim, a dead soldier's sacrifice converted into romantic credit that Joan must honour or reject. Larry's refusal to enter eternity without Joan is presented as the ultimate proof of love; structurally, it is the same claim in a different key. The film never considers the possibility that Joan might want neither; that eternity, unburdened by mortality, could be the first context in which a woman's desires are not triangulated through men. No amount of conceptual scaffolding rescues a director's unreconstructed gaze from itself.

- title: "2000 метрів до Андріївки"
  title_en: "2000 Meters to Andriivka"
  type: "film"
  creator: "Mstyslav Chernov"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/2000-meters-to-andriivka.jpg"
  posted: "2026-01-11"
  revised: "2026-01-11"
  text: |
    The moment that will not leave: Sheva says his wife told him on the phone to come home, to get home by any means possible. Sheva says, 'You know I can't come.' His wife replies, 'I know, but you know I have to ask you.' In four lines, an entire grammar of love under the pressure of war: the impossible request, the refusal that is also a confession, and the acknowledgement that the asking itself was necessary, even knowing the answer. Chernov, following the Oscar-winning *20 Days in Mariupol* with a film of equal moral ferocity, understands that documentary at the limit does not explain or contextualise; it bears witness to what language still manages to do.

    Fedya, who never saw himself as a soldier and never wanted to be one, offers a counterpoint that the film holds in careful, unresolved tension against Sheva's stoic determination. And then there is the Russian soldier they capture at Andriivka, who when asked 'Why did you come here?' answers: 'I don't know why we came here.' Three men on opposite sides of the same failure of political imagination, each one conscripted by forces that bear no relation to anything one would call a choice. Chernov frames this without editorialising, which is the only honest thing to do.

    The particular cruelty Chernov keeps returning to is spatial and epistemological at once: in modern industrial warfare, one can never see the enemy, never identify the direction from which the shells are falling. The front is a horizon that retreats as one approaches it. The village of Andriivka, two thousand metres away, might as well be on another planet. Chernov documents the phenomenology of fighting for something one cannot see, cannot reach, and cannot quite believe in, while the phone keeps ringing and someone on the other end says, just come home.

- title: "یک تصادف ساده"
  title_en: "It Was Just an Accident"
  type: "film"
  creator: "Jafar Panahi"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/it-was-just-an-accident.jpg"
  posted: "2025-11-30"
  revised: "2025-11-30"
  text: |
    It is hard to imagine that this was made by a director willing to endure imprisonment for his political convictions. The setup is promising: Vahid (Vahid Mobasseri), a mechanic, believes he has recognised, from a prosthetic-leg sound and a garage encounter, his secret-police torturer Eghbal (Ebrahim Azizi), and the film should radiate with the voltage of that uncertainty. Instead, every character is a cardboard ideological stereotype; the proclamations are tired and unoriginal; and the film drifts towards an absolution-shaped ambiguity, as though the foot soldiers of the state apparatus were merely following orders and are therefore innocent, free to kill with impunity and deserving of release when all is said and done. We have not heard quite enough of that argument since the Nuremberg trials? Iranian cinema needs new blood; there is no longer any reason to wait for Panahi.

- title: "Bugonia"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/bugonia.jpg"
  posted: "2025-11-30"
  revised: "2025-11-30"
  text: |
    This is Lanthimos's cleanest, most coherently told film, and sufficient proof, unlike *Poor Things* (2023), that he is capable of sustaining his own style while working across a broad, straightforwardly presented canvas. The remake's bones come from Jang Joon-hwan's *Save the Green Planet!* (2003), that cult monument to Korean absurdism, and Lanthimos has the good sense not to smother the source: the captor-captive dynamic, class hierarchy, and conspiracy-as-theology all survive the transplant intact. Jesse Plemons and Aidan Delbis make for a wonderfully mismatched pair of true believers, and Emma Stone's CEO, deadpan and impenetrable, is the film's still centre around which all the delusion orbits.

    The critique of capital is muted, present more as atmosphere than argument, but that restraint is itself a formal choice: the film leaves the System unexplained and renders, viscerally, how the System produces the men inside it. The title's entomological mythology, ***bugonia***, the ancient fantasy of bees spontaneously generated from a bovine carcass, sits perfectly over the film's horror: that conspiracy thinking is not an aberration but a metabolic process, the mind's attempt to generate meaning from the rotting body of late capitalism. Anyone might end up as a human specimen in Teddy's laboratory; in 2025, that feels like plain description.

- title: "어쩔 수가 없다"
  title_en: "No Other Choice"
  type: "film"
  creator: "Park Chan-wook"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/cant-help-it.jpg"
  posted: "2025-11-25"
  revised: "2025-11-25"
  text: |
    The title is spoken first by the American executives who fire Yoo Man-su: the market leaves them no other choice. It recurs as Man-su himself adopts it, a phrase that migrates from the language of capital to the language of murder without changing its grammar. Park Chan-wook spent twenty years developing this adaptation of Donald Westlake's *The Ax*, and one senses the patience in every frame: the tonal architecture, shifting from slapstick to horror to something closer to economic theology, is controlled with a precision that makes *Parasite* (2019) look comparatively blunt in its class mechanics. Park understands what Bong's film only gestured towards: late capitalism creates competitors before it creates monsters. Man-su does not target the executives who destroyed his livelihood; he targets his fellow laid-off workers, the people who should be his comrades, because the System has made solidarity unthinkable and competition the only available grammar of survival.
    I recognised something in Man-su that I did not want to recognise. Lee Byung-hun, opposite Son Ye-jin as his wife Mi-ri, builds the performance around a specific contradiction: a craftsman who loves papermaking, who valued his twenty-five years of labour, and who is blindsided by the discovery that capital does not care what one produces or who produces it. The worsening toothache is a precise metaphor, moral decay made somatic, and Park lets it do its work without commentary. The Žižekian disavowal is everywhere: 'I know this is wrong, but I have no other choice' is the formula that enables every killing, every lie, every domestic betrayal. And the ending is the bleakest joke of all: Man-su gets the job, walks into a paper mill run entirely by machines, and stands alone in a mausoleum of automation. The competition is over. The competitors are dead. The job no longer requires a human being. I left the cinema thinking about every application I have ever sent into a market that was not designed to answer. Park has said it is hard to be optimistic, and the film honours that difficulty without flinching.

- title: "If I Had Legs I'd Kick You"
  type: "film"
  creator: "Mary Bronstein"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/if-i-had-legs-id-kick-you.jpg"
  posted: "2025-11-23"
  revised: "2025-11-23"
  text: |
    Several times nearly unable to breathe: hard to believe this runs under two hours. Mary Bronstein's debut takes the figure of the hole as its organising principle and means it literally twice over. Linda (Rose Byrne, in a performance of terrifying physical commitment) is a psychotherapist whose daughter depends on a gastric feeding tube; a hole in the bedroom ceiling opens one night and will not close. The two apertures rhyme, and Linda's magical thinking binds them: she cannot separate the wound in her child's body from the wound in the architecture, and the film's claustrophobic grammar refuses to separate them either. Her husband Charles (Christian Slater) is at sea, unreachable; her own therapist (Conan O'Brien, in a turn of unnerving flatness) offers nothing she can use. Byrne plays Linda as unstoppable kinetic energy hurling itself against real and invented enemies alike, which makes the moments when she stops, drinks, and goes helpless all the more frightening, as though no force, however fierce, can survive the weight of anxiety and parenthood combined.

    Maternal overwhelm is not sentiment but phenomenology: a texture of experience that most cinema gestures towards and then domesticates into something manageable. Bronstein refuses management. A$AP Rocky's James, the motel superintendent, radiates a warmth that Linda cannot absorb; the supporting cast compound what she already carries, each presence another demand on a body that has nothing left to give. She removes the feeding tube herself in a sequence that feels simultaneously like liberation and catastrophe; the two holes in the film collapse into one. The distance between what a parent needs and what a parent can bear is the weather the film inhabits, and weather does not resolve. I sat afterwards in something that resembles the silence after a ceiling has given way.

- title: "One Battle After Another"
  type: "film"
  creator: "Paul Thomas Anderson"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/one-battle-after-another.jpg"
  posted: "2025-11-16"
  revised: "2025-11-16"
  text: |
    PTA's loose adaptation of Pynchon's *Vineland* (1990) arrives in VistaVision and in a political moment that makes the novel's paranoid vision of state authoritarianism feel less like satire than like reportage. Leonardo DiCaprio carries Pat Calhoun with the same combination of haplessness and stubborn decency he brought to *Once Upon a Time in Hollywood* (2019), a man whose survival strategy is gentleness in an environment that punishes it. Sean Penn's Col. Steven J. Lockjaw, the film's engine of federal menace, is the performance that anchors the film: Penn plays him with a bureaucratic calm more frightening than any display of force, a functionary who has confused obedience with patriotism so completely that the distinction no longer registers. Teyana Taylor's Perfidia, from radical to informant to fugitive, is never reduced to a symbol of betrayal; Taylor plays the trajectory as a series of impossible choices, each one closing a door that was already closing.

    PTA believes in la revolución. He believes Chase Infiniti's Willa can escape the grip of Lockjaw, believes that humanism will prevail even when the justice at the end arrives through institutions that are themselves compromised. Pynchon's California was sown with dread; PTA's is sown with seeds of hope, and it is precisely this hope, rare and unguarded in American cinema of this scale, that distinguishes the film from its source. There is so much here that moves one to tears, yet PTA adopts a bystander's tone, recounting the story with an objectivity that renders the rebels unsaintly and Lockjaw no simple fool. That even this humble optimism should feel, by 2025, like too much to dream says everything about the distance between the California Pynchon imagined and the one we inhabit now. The credits roll over a VistaVision landscape that is still, somehow, luminous.

- title: "Κυνόδοντας"
  title_en: "Dogtooth"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/films/dogtooth.jpg"
  posted: "2025-11-02"
  revised: "2025-11-02"
  text: |
    Somewhat rawer than Lanthimos's later work, and all the more viscerally disturbing for it: the clinical detachment that would become his signature is still slightly porous here, letting more horror leak through than *The Lobster* (2015) or *The Favourite* (2018) ever permit. The Father (Christos Stergioglou) and Mother (Michelle Valley) have constructed an airtight reality for their children, a closed system in which the words for things are wrong and the wrongness has become invisible. Žižek would relish the setup: the children's self-oppression is the object of analysis, the way ideology sustains itself without external enforcement.

    Only the Eldest Daughter (Angeliki Papoulia) rebels, and even her rebellion cannot escape the grammar of the system it resists. She bashes out her own dogtooth with a dumbbell, fulfilling the parents' rule that a child is ready to leave when a canine falls out; she climbs into the boot of a car, accepting their teaching that cars are the only safe passage beyond the fence. The escape enacts the very logic it means to refuse; even the act of leaving follows the parents' rules, and the film offers no way to tell whether what lies beyond them is liberation or death. The Son and Younger Daughter remain; their compliance requires no visible coercion, which is precisely the point. The parents never had to manufacture consent, because the closed system had already produced it. The father parks at work and walks away. The boot of the car stays shut.

- title: "A House of Dynamite"
  type: "film"
  creator: "Kathryn Bigelow"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/a-house-of-dynamite.jpg"
  posted: "2025-11-02"
  revised: "2025-11-02"
  text: |
    The finest war film of the past five years, and the film that Garland's *Civil War* (2024) wanted to be. The distinction is worth insisting upon. Garland's film was obsessed with the spectacle of collapse: cameras in helmets, bullets in walls, the aestheticised grammar of photojournalism applied to domestic catastrophe. Bigelow's is the opposite move entirely. There is no real gunfire in ***A House of Dynamite***, no bullets, no explosions; the entire confrontation is conducted in language, in rooms, across conference tables and encrypted terminals. Bigelow replays the same nineteen-minute window three times, each pass ascending the chain of command: first Capt. Olivia Walker (Rebecca Ferguson) at the operations desk, reading the data as it arrives; then SecDef Reid Baker (Jared Harris), receiving Walker's analysis and deciding what to withhold; then the President (Idris Elba), acting on a version of events that has already been filtered twice. Each repetition reveals how much was lost in translation, how the institutional machinery between signal and decision compresses reality with loss.

    The film's austerity is a refusal to compromise the approach for the market. The nuclear strike is never shown. The film's final minutes deliver the knowledge that it is already done, that those who caused it have retreated into a shelter, that the destruction of countless lives is occurring off-screen as the credits approach. And yet one's chest tightens as though the blast were visible. Bigelow understands something that the action cinema she helped define largely forgot: that the body responds to the implication of violence more deeply than to its depiction. The retaliatory strike is primed, the misreading may or may not have been a misreading, and the curtain falls on an information-age war whose most devastating weapon was a memo.

    There is a tradition of chamber-drama nuclear films, from Lumet's *Fail Safe* (1964) onward, and ***A House of Dynamite*** sits squarely in that lineage while feeling wholly contemporary. The characters are recognisable as specific specimens of institutional behaviour: the careerist who cannot admit error, the analyst who knows the truth but lacks the authority to make it matter, the administrator who confuses procedure with wisdom. One recognises them because they are everywhere. Completing the trajectory that began with *The Hurt Locker* (2008) and *Zero Dark Thirty* (2012), Bigelow has moved the camera steadily inward, from the body in the blast radius to the mind that authorised it. The architecture of catastrophe was always institutional; this film simply follows the wiring all the way back to the switch.

- title: "Renoir"
  type: "film"
  creator: "Chie Hayakawa"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/renoir.jpg"
  posted: "2025-10-14"
  revised: "2025-10-14"
  text: |
    Fuki (Yui Suzuki) is eleven and living in the interval between knowing and understanding: she knows her father (Lily Franky) is dying, but the knowledge has not yet collapsed into grief, and Hayakawa films this interval with extraordinary delicacy. The title invokes Renoir's portraits of children, and Hayakawa's camera shares something of that gaze: attentive, unhurried, aware that what it regards will not stay this way. The adult world circulates around Fuki in conversations she half-overhears, in marriage stories that don't quite resolve into lessons, in the small rituals with which she shores herself against what she cannot yet fully imagine. She ties a red thread outside the window. She writes her dreams into a diary. These gestures are simply what an eleven-year-old does when the world becomes too large and too quiet simultaneously.

    Hayakawa makes everything feel appropriately weightless, the particular weightlessness of childhood perception, right up until it doesn't. The film's tonal economy is such that when death arrives it arrives without announcement, without swelling score, without the apparatus of cinematic grief; it arrives the way death actually arrives for children, as an abrupt revision of everything that was assumed to be permanent. I sat very still afterwards. The red thread stays in the mind long after the screen goes dark.

- title: "Drømmer"
  title_en: "Dreams"
  type: "film"
  creator: "Dag Johan Haugerud"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/dreams.jpg"
  posted: "2025-10-02"
  revised: "2025-10-02"
  text: |
    Johanne (Ella Overbye) is seventeen and in love with her French teacher Johanna (Selome Emnetu), and the film unfolds this condition with the patience and exactness of a Rohmer moral tale: nothing is forced, nothing is hurried, and the oblique angles through which the longing is revealed accumulate until the feeling becomes unmistakable without ever having been declared. The *Before* trilogy comparison that naturally suggests itself applies only partially; where Linklater works in dyads, constructing a private world for two people against the noise of everywhere else, Haugerud opens the structure outward, refracts the inquiry through multiple subjectivities, so that questions of unrequited love, of what it means to give and to receive, arrive from many angles rather than deepening along a single axis. Johanne channels her longing into an autofiction novella, and the intergenerational argument that erupts around its publication, over who owns an intimate experience once it has been rendered into art, proves as charged and as irreducible as the desire that produced it.

    The obliquity is the point: most of the dialogue feels entirely casual, entirely incidental, precisely because it is never only incidental. The middle chapter of Haugerud's 'Sex, Dreams, Love' trilogy, in open conversation with Kieslowski's *Three Colours*, ***Dreams*** won the Golden Bear at Berlin, and the recognition feels correct in the way that only the rarest festival prizes do: already obvious before it was announced. The film traces a love that never found resolution and somehow achieves the opposite: something complete settles in the mind and does not leave. I keep returning to it in the way one returns to a piece of music that named something one had not yet learned to say.

- title: "Sex"
  type: "film"
  creator: "Dag Johan Haugerud"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/sex.jpg"
  posted: "2025-09-29"
  revised: "2025-09-29"
  text: |
    I watched ***Sex*** the day after *Drømmer* (2024), and together these two films have done something irreversible: Haugerud is now, simply, the director one most wants to hear from next. Where *Drømmer* (2024) works through multiplication of perspective, ***Sex*** achieves its effect through a more concentrated provocation: 'sex' becomes an other, a third term in every conversation, something that defines and shapes intimate relationships from outside them, spoken of rather than enacted, discussed with the careful honesty of people who have decided, at some cost, to tell the truth. Jan Gunnar Røise's chimney sweep and Thorbjørn Harr's manager are not case studies; they are people, and the distinction carries the film.

    Haugerud's screenplays have, consistently and almost inexplicably, a quality of disarming sincerity, the sense that these characters are actually saying what they mean, not performing saying what they mean. It manifests in the discussions of sex and marriage, in the self-examination of what feels 'natural' within a long relationship, in the way both families orient themselves towards their children with a tenderness that is neither idealised nor ironised. There is no position from which the film condescends to its characters, and none from which it condescends to its audience. ***Sex*** won the Europa Cinemas Label at Berlinale and the Nordic Council Film Prize, but the awards are secondary to the film itself: it makes one feel, with renewed and slightly uncomfortable clarity, the full difficulty and the full necessity of being honest with the people one loves. I walked home from the cinema in silence, which is something I almost never do.

- title: "Sirât"
  type: "film"
  creator: "Óliver Laxe"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/sirât.jpg"
  posted: "2025-09-23"
  revised: "2025-09-23"
  text: |
    Luis (Sergi Lopez) and his son Esteban (Bruno Nunez Arjona) arrive at a remote rave in the Moroccan desert, distributing a photograph of Mar, their missing daughter and sister, who vanished at one of these endless parties months earlier. They follow a group of ravers deeper into the wilderness, towards one last gathering, while radio dispatches report the outbreak of a wider war. Laxe, working out of a Galician sensibility drawn to marginal landscapes and the spiritual weight they bear, finds in the Sahara a terrain that does not represent existential collapse so much as enact it. Shot on Super 16mm by Mauro Herce, the film's grain makes the desert feel bodily, continuous with an older tradition of images that digital photography cannot replicate.

    Kangding Ray's electronic score is the film's nervous system: the sound of human order persisting against geological time, insisting on pattern in the one domain where insistence still seems possible. In the minefield sequence, sprightly arpeggios play against mortal danger with a counterintuitive lightness that makes the scene more harrowing, not less. The space is too large for ideology, too indifferent for faith, and yet the film does not mistake emptiness for nihilism; it finds in the desert a form of attention stripped of every consolation except attention itself.
    ***Sirât***, the straight path: in Islamic eschatology, the bridge thinner than a hair and sharper than a sword that every soul must cross on the Day of Judgment. Laxe literalises both meanings. The journey through the desert is a moral test that offers no grading rubric; the characters walk because walking is what remains. I left the film feeling scoured, as though the sand had reached in through the screen and done its work directly. That is not a complaint.

- title: "On Becoming a Guinea Fowl"
  type: "film"
  creator: "Rungano Nyoni"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/on-becoming-a-guinea-fowl.jpg"
  posted: "2025-09-21"
  revised: "2025-09-21"
  text: |
    Shula (Susan Chardy) drives home from a costume party and finds her Uncle Fred's body on a remote road. She is strangely unaffected, and the strangeness is the film's first move: Nyoni opens on a death that should bring relief and finds that the dead perpetrator has taken with him every target for anger, reconciliation, and grief. The survivors are left holding wounds for which no living person can now be held accountable, and the funeral that follows becomes a theatre in which the family's rituals of mourning are weaponised to enforce exactly the silence that made the abuse possible. The women crawl into the mourning house on their hands and knees; the men socialise outside. Shula's cousin Bupe is hospitalised, her confession found on a phone. Her mother tells her to keep quiet: Fred is dead, it is in the past.

    Nyoni understands something that most social-issue cinema gets catastrophically wrong: the structure of patriarchy is not dismantled by the removal of any individual patriarch; it self-perpetuates through ritual, through the choreography of grief, through the etiquette that requires the abused to mourn their abuser with decorum and visible sorrow. The guinea fowl metaphor earns its place precisely because it refuses heroism: these birds do not fight, do not escape, do not organise. They become alert. They warn each other. It is, within the architecture of power the film describes, the only agency the system permits. Nyoni is uncomfortably precise about the pre-emptive suppression at the heart of feminist resistance within such a framework: the bars of the structure become conditions of thought, so that even the methods one might contemplate are already accounted for, already neutralised.

    And yet the film does not offer this as tragedy alone. It offers it as diagnosis, and diagnosis, as Fisher understood, is prerequisite to politics. Fred's young widow Chichi, married to him at eleven or twelve, is blamed by the aunties for his death; Shula's own mother knew and consulted the aunties, who spoke to Fred, who promised to stop, and the circuit closed. The system runs on promises that turn into permissions, and the film names every relay in the circuit until the wiring is visible to everyone in the room. In the final scene Shula begins screeching the guinea fowl call, and the young women join her, their voices swelling into something that sounds less like protest than like an alarm that has been waiting, for a very long time, to go off.

- title: "Eddington"
  type: "film"
  creator: "Ari Aster"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/eddington.jpg"
  posted: "2025-09-13"
  revised: "2025-09-13"
  text: |
    Ari Aster has transplanted the horror grammar of *Hereditary* (2018) and *Midsommar* (2019) into a neo-Western set in fictional Eddington, New Mexico, in May 2020, and the toolkit turns out to be entirely adequate to a moment in which the distinction between the fable and the documentary has itself become difficult to locate. Sheriff Joe Cross (Joaquin Phoenix) challenges incumbent Mayor Ted Garcia (Pedro Pascal) in a local election; COVID arrives, George Floyd's murder triggers a small protest movement, and a data centre being built at the edge of town silently reorganises every allegiance. Aster subverts Chekhov's gun throughout: setups that should pay off dissolve into noise, handwriting clues lead nowhere, and the violence that finally erupts in the film's extended shootout arrives with the senseless inevitability of something that traditional cause-and-effect can no longer explain.

    The gun is on the mantelpiece in the first scene because the gun is always on the mantelpiece in America, and the question Aster is asking is whether the grammar that connects the gun to its firing has already broken down. Phoenix plays Joe with a blunt physicality that never tips into caricature; Emma Stone's Louise, Joe's wife, carries a history with the Mayor that the film parcels out in increments designed to make one recalibrate sympathies repeatedly. Aster grasps what most satirists of this moment do not: the pathology is continuous with ordinary life, conspiracy grows from the same soil as the barbecues, pandemic grievance passes through the same channels as neighbourhood gossip. The corporate interests funding the data centre operate beneath all the political theatre, indifferent to which side wins, and the film's deepest horror is that the violence may have been orchestrated by forces that none of the combatants can see. The empty streets of Eddington after the shooting look like every small American town one has ever driven through, which is the point.

- title: "Sorry Baby"
  type: "film"
  creator: "Eva Victor"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/sorry-baby.jpg"
  posted: "2025-08-10"
  revised: "2025-08-10"
  text: |
    Agnes (Eva Victor), a reclusive literature professor at a New England liberal arts college, was sexually assaulted by her academic advisor Preston Decker (Louis Cancelmi) three years ago. Victor writes, directs, and performs the role across five non-chronological chapters that mirror how trauma fractures memory: the timeline jumps and circles and collapses in on itself, placing the assault in the middle section rather than the climax, refusing the redemption arc that the genre typically demands. The assault itself is never shown; an unmoving camera holds on Decker's house as the sun sets and night falls, and Agnes eventually stumbles out hours later. Cancelmi plays Decker with a politeness so affable that it becomes the most disturbing performance in the film; he is never a cartoon villain, which is precisely why the violation feels irreparable.

    The dark humour is not a defence against the trauma but a mode of inhabiting it: Victor's background in comedy gives the writing an ear for the absurd collisions that follow assault, the doctor's visit, the jury duty, the stray cat, each encounter exposing how people around Agnes choose or fail to offer empathy. Naomi Ackie's Lydie, Agnes's best friend now pregnant and moved to New York, provides the film's warmest presence without turning warmth into resolution; Lucas Hedges's Gavin, an unlikely love interest, offers something gentler still. The film trusts its audience to hold contradictory tones simultaneously, which is a rarer form of respect than it sounds, and the five-chapter structure earns its fragmentation because grief and assault do not organise themselves into linear narratives.
    That a film this precise about sexual violence could also be this formally alive, this resistant to the conventions that usually flatten such material into either advocacy or misery, is Victor's real achievement. I came away from ***Sorry Baby*** carrying something that feels less like a message than like a changed internal weather, the particular humidity of having been told a truth one did not know how to ask for.

- title: "Magnolia"
  type: "film"
  creator: "Paul Thomas Anderson"
  creator_role: "dir."
  year: 1999
  eval: "loved"
  image: "/assets/images/thoughts/films/magnolia.jpg"
  posted: "2025-07-21"
  revised: "2025-07-21"
  text: |
    8:2, 8:2, 8:2. The number surfaces throughout ***Magnolia*** in the margins of the frame, almost subliminal, the way scripture might surface in a world that has forgotten it is still being read. Paul Thomas Anderson builds three hours of interlocking anguish, an Altmanesque lattice of broken fathers and damaged children and dying men who all need, urgently, to say something before time closes, and then sends frogs down from the sky. Straight out of *Exodus*. Jason Robards's Earl Partridge lies on his deathbed, confessing to Philip Seymour Hoffman's nurse Phil what he did to his wife and son; Tom Cruise's Frank T.J. Mackey, the estranged son, has armoured himself in toxic-masculinity seminars so thoroughly that one forgets, until Cruise lets the mask slip, that the armour is covering a terrified child. Jeremy Blackman's Stanley, the current quiz-show prodigy, is the 'before'; William H. Macy's Donnie Smith, the former quiz kid, is the 'after'. The plague falls on sinners and innocents alike, because that is how plagues work, and that is what Anderson understands about the world.

    Everyone in ***Magnolia*** is living inside someone else's past, tormented by what was done to them by people who were themselves tormented by what was done to them. Philip Baker Hall's Jimmy Gator, the game-show host, is dying too, and his daughter Claudia (Melora Walters) has spiralled into addiction under the weight of an abuse the film implies but never names; Julianne Moore's Linda Partridge, Earl's trophy wife, discovers that guilt can arrive decades late and still detonate. Cycle upon cycle, a structure of inherited pain so dense and so recursive that it starts to feel geological. The frog rain does not redeem; it interrupts, a gasp in which something true might briefly become sayable, and Anderson's emotional intelligence lies in refusing to let the interruption be mistaken for a solution.
    Donnie Smith remains, the former quiz kid, screaming into the strange rain with total sincerity: 'I have so much love to give, I just don't know where to put it.' That line, delivered by Macy at full volume into weather that makes no sense, contains the whole film. The past is not through with one; it never is. But every now and then it rains frogs, and for a moment everyone stops performing. John C. Reilly's Officer Jim Kurring finds Donnie outside the bar, bloodied and braced and desperate, and what passes between them is the nearest the film comes to grace.

- title: "خرس نیست"
  title_en: "No Bears"
  type: "film"
  creator: "Jafar Panahi"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/films/no-bears.jpg"
  posted: "2025-07-06"
  revised: "2025-07-06"
  text: |
    The point bears repeating: a director's imprisonment does not retrospectively redeem the work. ***No Bears*** arrived with Panahi already serving a six-year sentence, completed and smuggled out just before his arrest, and the international reception was coloured by an entirely human impulse to make the suffering count by inflating the art. Understandable. Insufficient.

    The film's central device, Panahi playing himself directing remotely from a border village while his film-within-a-film spirals beyond his control, is a variation on self-reflexive fourth-wall dissolution that has been practised since at least Godard and has by now lost whatever defamiliarising charge it once carried. The parallel between Panahi's constrained position and the entrapment of his characters is legible enough, but legibility is not the same as power. One must be able to distinguish courage from excellence; the failure to do so helps neither.

- title: "Punch-Drunk Love"
  type: "film"
  creator: "Paul Thomas Anderson"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/punch-drunk-love.jpg"
  posted: "2025-06-29"
  revised: "2025-06-29"
  text: |
    The first third of ***Punch-Drunk Love*** is a sustained panic attack, and it is not enjoyable in any conventional sense: Barry Egan's (Adam Sandler) world is so compressed by his seven sisters' contempt, so coiled with misdirected rage, that the film's colour bursts feel like alarms going off inside the nervous system. Anderson calibrates the discomfort precisely, which is to say he makes it feel involuntary rather than designed. Then the middle third opens into something unexpected: a love story, tender, complicated by Barry's lies but never undermined by them, because Lena Leonard (Emily Watson) sees something in him that the film insists is really there. Sandler, working in a mode nobody had yet allowed him to find, makes Barry's yearning feel enormous and completely unperformed.

    The final third is where the film becomes quietly extraordinary. Barry flies to Hawaii, confronts Philip Seymour Hoffman's Dean Trumbell with a concentrated calmness that reads as the other side of his rage, and returns changed. Anderson gives Barry a redemptive arc that most films of this kind would not dare make coherent, and makes it coherent anyway, not through epiphany or therapy but through the physics of love: a man whose entire body has been an instrument of anxiety learns, in the presence of one person, to be still. The phone booth lights up the moment Lena answers. The colour palette shifts from oppressive white to warm gold. I came away in awe of the calibration: a little love, a little comedy, a little violence, a little greasiness, the proportions somehow always exactly right, the whole thing saturated with a singular strangeness that belongs to no other filmmaker working in English.

    Jon Brion's score is inseparable from the achievement. PTA forbade any harmonium on the soundtrack, so Brion built the anxious textures from prepared piano and a dreidel with air vents, two slightly out-of-tune chords Doppler-shifting as it spins. But Sandler's on-set noodling on the prop harmonium was recorded, and fragments leaked into later cues: the diegetic and the non-diegetic bleed into each other until the distinction stops mattering, which is exactly what happens to Barry's inner life and his outer one. It is a score that participates in the story rather than describing it, and the film without it would be a different, lesser thing.

- title: "Little Miss Sunshine"
  type: "film"
  creator: "Jonathan Dayton and Valerie Faris"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/little-miss-sunshine.jpg"
  posted: "2025-06-17"
  revised: "2025-06-17"
  text: |
    One thinks back to a year ago, flying high with Lindsay, lying on a mattress talking about the meaning of life. Lindsay, laughing helplessly, said that it is the suffering that defines our lives. One was unconvinced then, argued back, found the claim too neat, too consoling in its bleakness. A year has passed and it has proved true, or true enough that the distinction no longer seems to matter.
    Steve Carell's Frank delivers the Proust speech to Paul Dano's Dwayne on the roadside slope, and it is the film's thesis, delivered flatly and without ceremony: Proust thought the suffering years were his best years, because they made him who he was, and one would not want to miss out on all that suffering. The film, directed with complete tonal control by Dayton and Faris, earns this moment because it does not treat the Hoover family's disasters as darkly comic backdrop but as costly. Alan Arkin's Grandpa's death costs something. Dwayne's shattered dream costs something. Greg Kinnear's Richard's failure costs something. The humiliation of the pageant finale costs something, and then Abigail Breslin's Olive transforms it into something else entirely.

    One must acknowledge: seeing Steve Carell's face, one can only think of Michael. This is not quite a criticism. It says something about the performance's generosity that the ghost of Dunder Mifflin does not capsize the scene; Frank's wisdom holds anyway. The road movie structure is a container for something older and stranger, a meditation on what it means to stay in the car, keep driving, and count the suffering as the substance of the thing rather than its obstacle. Proust in a VW bus. One was unconvinced a year ago. One is not unconvinced now.

- title: "Taxi"
  type: "film"
  creator: "Jafar Panahi"
  creator_role: "dir."
  year: 2015
  eval: "meh..."
  image: "/assets/images/thoughts/films/taxi.jpg"
  posted: "2025-06-15"
  revised: "2025-06-15"
  text: |
    Part of one wants to declare this film vitally important, to perform the appropriate solidarity: Panahi, banned from making films in Iran, unable to accept his Golden Bear at the Berlinale, has suffered imprisonment for his convictions in ways that ought to shame every government that speaks the language of artistic freedom. The impulse is understandable. It is also, as a basis for aesthetic judgement, completely useless.

    Because the film, evaluated on its own terms, reads like a directed writing exercise. The format, a series of conversations filmed inside a Tehran ***taxi*** Panahi drives himself, produces scattered vignettes and occasional flashes of wit; but scattered vignettes and occasional wit are not sufficient to constitute a film. Courage is not a formal argument. Watching *Taxi*, one is moved by what it cost to make it, and left cold by what it is.

- title: "The Summer Book"
  type: "film"
  creator: "Charlie McDowell"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/summer-book.jpg"
  posted: "2025-06-09"
  revised: "2025-06-09"
  text: |
    High summer on the Finnish archipelago operates by a different clock. The light refuses to leave. A newly planted poplar, a newly arrived storm, a family appearing on the neighbouring island: events of a scale that would be invisible elsewhere arrive here with the full weight of the world. Tove Jansson's 1972 novel understands this tempo precisely, and Charlie McDowell's adaptation, shot on 16mm among islands that seem to exist slightly outside ordinary time, has absorbed that understanding into every frame. Sturla Brandth Grøvlen's cinematography captures particular, tactile details of light and texture rather than postcard panoramas; the warmth that emerges feels analogue in the oldest sense, as though the film stock itself remembers what digital cannot.

    The film's subject is, on its surface, the relationship between a grandmother and nine-year-old Sophia navigating a summer of loss. But Jansson's structural insight, which McDowell preserves, is that grief and vitality occupy the same space in childhood, and that a child can hold both without needing to resolve the contradiction. The island becomes a kind of ontological enclosure in which the end of life and its beginning coexist without embarrassment. Glenn Close's grandmother is frank about her own approaching death in the way that only the very old and the very young can be: without performance, without the middle-aged machinery of denial. Emily Matthews, in her first role, matches her with an appealingly restless directness. Anders Danielsen Lie's father, retreated into his illustrations and his numbness, is the grief the film does not narrate but lets one feel through absence.

    One thinks of *The Outrun* (2024): Saoirse on the Orkney grass, standing at the sea's edge, becoming wind, becoming a downpour, becoming part of the world's eternal turning. ***The Summer Book*** achieves something adjacent but quieter, less turbulent in its beauty and therefore more permanent-feeling. Hania Rani's score shimmers beneath the surface without ever competing with the ambient sound of waves and wind, and the closing archival footage of Jansson herself, hair decorated with Midsummer flowers on the island that inspired the novel, bridges fiction and autobiography with a grace the film has earned. It asks very little of one's critical apparatus and takes everything else. The most beautiful film I have seen in years.

- title: "The Phoenician Scheme"
  type: "film"
  creator: "Wes Anderson"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/phoenician-scheme.jpg"
  posted: "2025-05-31"
  revised: "2025-05-31"
  text: |
    Anatole 'Zsa-Zsa' Korda (Benicio del Toro), arms dealer and richest man in 1950s Europe, pulls his only daughter Liesl (Mia Threapleton) out of a convent to name her his heir over nine younger sons. Korda then drags Liesl and her Norwegian entomologist tutor Bjorn (Michael Cera) through a globetrotting circuit of robber-baron meetings to pitch a hydroelectric scheme that no one funds. The business trip is a mechanism for something else: a father trying to reconnect with the daughter he abandoned after her mother's murder, which Liesl suspects he arranged. Anderson, working with Roman Coppola's story, has found in this father-daughter architecture a warmth that *The French Dispatch* (2021) and *Asteroid City* (2023) deliberately withheld.

    Anderson introduces a fluidity, an almost conspiratorial warmth between the camera and its subjects, that his films have not risked in years; the film feels, improbably, like the director choosing to be present in his own work again. The signature grammar remains: symmetrical compositions, deadpan deliveries, the Anderson palette of mustards and teals. But where *Asteroid City* retreated into nested frames and *The French Dispatch* into anthologised detachment, ***The Phoenician Scheme*** commits to a single propulsive narrative, and the commitment produces a sincerity that Anderson's recent pictures had kept under lock. Threapleton, in her breakout role, meets del Toro's volcanic charm with a stillness that makes the reconciliation feel earned rather than inevitable. Korda funds the scheme himself in the end, donates his fortune, and takes a kitchen job; it is a darkly comic redemption that Anderson frames with exactly the right distance, close enough to feel something, far enough to wonder whether one should.

- title: "Sinners"
  type: "film"
  creator: "Ryan Coogler"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/sinners.jpg"
  posted: "2025-05-25"
  revised: "2025-05-25"
  text: |
    Ludwig Göransson's score is the only thing in ***Sinners*** that operates at the level of its ambition. The blues-to-rock-to-hip-hop-to-gospel-to-African-drum oner that erupts when Sammie (Miles Caton) plays 'I Lied to You' at the juke joint opening is, by some distance, the most extraordinary set piece of the year: a single continuous shot in which the music tears through six eras, each flowing into the next with a temporal fluidity that makes the sequence feel visionary. Göransson, recording on a period Dobro resonator and collaborating with Brittany Howard, Raphael Saadiq, and Rhiannon Giddens, deserved a better film around him.

    The film around that sequence does not deserve it. Michael B. Jordan's twin brothers Smoke and Stack are charismatic enough, but Coogler asks the vampire mythology to do more structural work than its wet-paper logic can bear. The siege at the juke joint is hilariously illogical: characters who have just been told how the vampires operate proceed to do exactly what they were told not to do, and the staging compounds the error by making the geography of the house impossible to follow. Jack O'Connell's Remmick, the lead vampire, is an allegory for cultural appropriation that the screenplay states once, loudly, and then never dramatises with any depth. The final act abandons even the pretence of internal coherence and delivers a prolonged shootout that plays like a crowd-pleasing spectacle in search of a film that could justify it. I came away admiring Göransson's sequence and mourning the two hours that surround it.

- title: "Joyland"
  type: "film"
  creator: "Saim Sadiq"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/joyland.jpg"
  posted: "2025-05-03"
  revised: "2025-05-03"
  text: |
    Glimpsed through the backs of Haider (Ali Junejo) and Biba, Mumtaz's (Rasti Farooq) interiority arrives obliquely, accumulating in locked rooms and stolen minutes behind closed doors. She wants to work; she wants to be self-sufficient; she wants a life in which she can come and go without accounting for it to anyone. These are not extravagant demands. In a society that accommodates transgender women only through voyeuristic fascination, and looks with blithe indifference on male incompetence and appetite, her desires read as utopian. Haider, the youngest son in the patriarchal Rana household, takes a job at an erotic dance theatre and falls for Biba; the affair is the catalyst, but Sadiq's structural intelligence means that the real displacement happens to Mumtaz, who is made to quit her own job the moment Haider starts earning. The economy of desire in this film is zero-sum: every freedom one character takes is subtracted from another.

    Saim Sadiq's debut, winner of the Cannes Un Certain Regard Jury Prize, is unusual in the patience with which it refuses to offer Mumtaz as simply a victim, or Biba as simply a symbol. Both characters are permitted the full weight of personhood: contradiction, will, desire, a complicated stake in the systems that constrain them. The film was banned by Pakistan's censor board before a partial reinstatement, a reception that demonstrates rather efficiently the point it is trying to make. Alina Khan's Biba, a real transgender actress in the role, brings a physicality that resists every available framework for reading her, which is precisely the film's argument. The patriarch Salmaan Peerzada plays carries the older generation's authority with a gentleness that makes the cruelty of the system he upholds all the more legible; one cannot hate him, which is the problem.

    The question Sadiq lodges in the final image is not who survived, but at what cost, and by what logic survival was allocated. Mumtaz's freedom, when it comes, arrives in the form that the film's world makes available to her. It is the only form available. That is the most devastating sentence the film speaks, and it says it without a word.

- title: "ナミビアの砂漠"
  title_en: "Desert of Namibia"
  type: "film"
  creator: "Yamanaka Yoko"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/desert-of-namibia.jpg"
  posted: "2025-04-21"
  revised: "2025-04-21"
  text: |
    Kana (Kawai Yumi) is insufferable. She is manipulative, dishonest, casually cruel, serially unfaithful, and constitutionally incapable of sitting still in her own life. She cycles between Honda (Kanichiro), a gentle live-in boyfriend she finds boring, and Hayashi (Kaneko Daichi), a self-assured creator whose confidence she mistakes for substance, lies to both with a fluency that suggests she has lied to herself first, and drifts through a laser hair-removal salon with the specific restlessness of someone who suspects, correctly, that none of this is the life she was meant to live. Japanese cinema has a long tradition of aimless young women in the city, from Ozu's working girls to the disaffected heroines of Koreeda and Hamaguchi, but Yamanaka Yoko does something different with the type: she refuses to aestheticise the drift. ***Desert of Namibia*** does not frame Kana's contradictions as enigma or malaise; it inhabits them with a sincerity so total that judgement becomes irrelevant.

    Kawai's performance is the engine. She plays Kana with a physical restlessness that is never performed: the constant fidgeting, the way she occupies a room by destabilising it, the escalation from emotional volatility into outright violence against the man she chose. Yamanaka never flinches from this, never softens Kana into someone the audience can comfortably root for, and never reduces her to a diagnosis. The recurring image of a Namibian waterhole livestream, animals gathering at an artificial trough in the desert, becomes the film's quiet organising metaphor: Kana, too, orbits structures she did not build, drinking from sources that cannot sustain her. Yamanaka structures the film as a series of domestic scenes that accumulate into character rather than plot, and the FIPRESCI jury at Directors' Fortnight was right to recognise the achievement here: purity taken to its extreme condenses into the ordinary, and the ordinary, looked at with enough attention, becomes difficult to dismiss. All of Kana's contradictions, the cruelty and the tenderness, the compulsive dishonesty and the inarticulate longing for something true, dissolve not into resolution but into the simple fact of a person continuing to exist. It is a second feature, after *Amiko* (2017), of remarkable assurance.

- title: "Mickey 17"
  type: "film"
  creator: "Bong Joon-ho"
  creator_role: "dir."
  year: 2025
  eval: "hated"
  image: "/assets/images/thoughts/films/mickey-17.jpg"
  posted: "2025-04-14"
  revised: "2025-04-14"
  text: |
    I finished the film in a state of bewilderment, the kind produced not by complexity but by its opposite: the sensation of watching a director who apparently did not know what film he was making. ***Mickey 17*** claims to be a love story between Nasha and Robert Pattinson's Mickey; Naomi Ackie's Nasha is characterised so flimsily that the woman present in the final act is functionally a different character from the one introduced in the first, the connective tissue between them simply absent. It claims to satirise Trump-inflected authoritarian populism; the grassroots movement that supposedly sustains Mark Ruffalo's demagogue receives no exposition adequate to the satirical weight the film tries to place on it, and the civilian resistance organisation materialises near the end as though someone remembered it was needed. The film gestures towards the social structure of Niflheim's native creatures, towards the ethics of colonial extermination, towards cross-species communication, towards the personhood of expendable clones, and towards the political economy of a disposable workforce; it develops none of these threads to any point of consequence, dropping each in turn as if attention itself were too costly to sustain. The result passes through science fiction, satire, and romance without stopping long enough to belong to any of them, and earns no description except juvenile. The film's only irony is unintentional: a satire of a leader who does not know what he wants, made by a director who demonstrably did not know what he wanted to make.

- title: "Иди и смотри"
  title_en: "Come and See"
  type: "film"
  creator: "Elem Klimov"
  creator_role: "dir."
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/films/come-and-see.jpg"
  posted: "2025-04-13"
  revised: "2025-04-13"
  text: |
    Aleksei Kravchenko was fourteen when he played Flyora, and the change on his face cannot be faked. Watch face after face pass from life to death. Watch the houses erased by fire and bullets. Watch Flyora age years in the span of days, his face transformed from a boy's earnest excitement into something that has no name in peacetime. Watch the cattle and the horses and the donkeys massed on the blood-soaked hillside in the rain, desperate and uncomprehending. Klimov films atrocity without the editorial distance that usually makes atrocity bearable for an audience; there is no cut that offers relief, no compositional beauty that aestheticises the suffering into something one can appreciate from outside.
    The title comes from Revelation 6: as each seal is opened, one of the four living creatures says 'Come and see', and what follows is a horseman. Conquest, war, famine, death. Klimov and co-writer Ales Adamovich, who fought as a teenage partisan in Belarus, drew on survivor testimony and on the specific historical record: the Khatyn massacre, where an entire village was herded into a barn and burned alive, and the broader campaign that destroyed over five thousand Belarusian settlements and killed roughly a quarter of the country's population. ***Come and See*** does not contextualise this for its audience. It does not explain. It puts one inside the burning barn and asks whether one can continue to watch. The answer the film demands is the answer its title commands: one must.

    The closest comparison in recent cinema is Glazer's *The Zone of Interest* (2023), which approaches the same historical catastrophe through its photographic negative: the violence offscreen, the perpetrators shown in their domestic ordinariness. The two films arrive at the same place by opposite routes. ***Come and See*** puts one inside the horror until the horror becomes the only reality there is. That Klimov never directed another film after completing it is not incidental; it is the only coherent response to having made it. He died in 2003, having spent eighteen years not making films, which is its own kind of testimony.

- title: "Bacalaureat"
  title_en: "Graduation"
  type: "film"
  creator: "Cristian Mungiu"
  creator_role: "dir."
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/films/graduation.jpg"
  posted: "2025-03-27"
  revised: "2025-03-27"
  text: |
    Mungiu frames the moral catastrophe of contemporary Romania through the most intimate possible unit: a father's love for his daughter, curdled by the System he has spent his life both resisting and depending on. He has been mapping Romanian institutional pathology since *4 Months, 3 Weeks and 2 Days* (Palme d'Or, 2007); ***Graduation***, which shared the Best Director prize at Cannes with Olivier Assayas, is the entry where the lens turns inward. Romeo (Adrian Titieni) is not a villain; that is the film's most precise move. He is a man of genuine principle who has arrived, step by step, at a position of total compromise, and Mungiu's camera observes this without mercy and without accusation, which is a harder thing to sustain than either. The absurdism is structural: in a country where every institution runs on favours and mutual obligation, the attempt to shield one's child from corruption becomes itself an act of corruption. The network of informal exchange that Romeo enters to secure Eliza's examination results is not an aberration from the System; it is the System, metabolised into social life so completely that no one involved experiences it as wrongdoing.

    Eliza (Maria Drăguș) is the still point around whom this rotates. She is simultaneously the reason for everything and the party with the least agency over any of it: the assault, the exams, the parental expectations, the future that has been decided in advance. Mungiu understands that Eliza's resignation is not passivity but a lucid reading of her situation, and the film escapes the shape of a corruption procedural by staying with that lucidity. The moment she discovers her father's affair arrives with a strange, vertiginous release: as if, in that instant, the architecture of obligation that has organised her entire life reveals itself as contingent, and she sees, for the first time, that she might live for herself.

- title: "R.M.N."
  type: "film"
  creator: "Cristian Mungiu"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/rmn.jpg"
  posted: "2025-03-24"
  revised: "2025-03-24"
  text: |
    ***R.M.N.*** is sharper for being set somewhere that refuses the easy geography of the European refugee debate. Matthias (Marin Grigore) returns from a German slaughterhouse to a Transylvanian village that is itself a minority within Europe: Romanian, Hungarian, German, and Roma communities coexisting in a region with its own long history of being the unwanted party, the inconvenient cultural remainder. When Csilla (Judith State), who manages a local bakery, hires two Sri Lankan workers because no local Romanian will accept the wage on offer, the resulting explosion of collective rage is not irrational; it is the entirely predictable output of a community whose culture and economic development have been left behind by the forces that now, in the form of foreign labour policy, arrive to administer its consequences. Mungiu has always been interested in the structural production of moral failure, and here he is at his most forensic.

    The film's centrepiece is a nearly seventeen-minute unbroken town hall meeting, a scene that becomes a clinical demonstration of how democratic process can become the formal vehicle for something much older and darker. Every perspective in the room has its internal coherence: the capitalist factory owner sees a labour problem; the male chauvinist sees a threat to an order that benefits him; the declining village sees itself being erased. None of them are wrong about their own situation. They are simply wrong about its cause, and the Sri Lankan workers provide an outlet for resentments whose actual sources are diffuse, structural, and impossible to confront in a town meeting. Tensions redirect; the most vulnerable absorb what the System produces; and in the end, as Mungiu's films reliably conclude, no one benefits. The title, a Romanian abbreviation for MRI, is exact: this is imaging of a social body's interior dysfunction, conducted without anaesthetic.

- title: "4 luni, 3 săptămâni și 2 zile"
  title_en: "4 Months, 3 Weeks and 2 Days"
  type: "film"
  creator: "Cristian Mungiu"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/4-months-3-weeks-and-2-days.jpg"
  posted: "2025-03-22"
  revised: "2025-03-22"
  text: |
    The Palme d'Or was correct. Mungiu's camera follows Otilia (Anamaria Marinca) through a single day in 1987 Communist Romania, and the way that camera regards a woman's face as she navigates an illegal abortion is itself a political act. There is no male gaze here. What remains is observation rigorous enough to refuse both the aestheticisation of suffering and the pretence of neutrality. These are different refusals, and sustaining both at once is harder than it looks.

    Ceaușescu's Decree 770 is never named. It does not need to be. It is the air in every room, the thing that bends every interaction, every calculation, every wall that Otilia and Găbița (Laura Vasiliu) run into. Those walls are built by men: Mr. Bebe (Vlad Ivanov), whose terms are stated with the calm of someone who knows his leverage; the hotel clerk; Adi (Alexandru Potocean), whose birthday-dinner conversation grinds on while Otilia sits in silence, carrying what she has just carried across the city. Mungiu's camera stays with her through that dinner in an unbroken take that makes its case without a word of thesis. This apartment, this table, this slush-covered street: bearable places. The hotel bathroom is not. What Otilia carries out of it, wrapped and wordless, is not just a foetus but the entire weight of a system that called itself a state. Four months, three weeks, two days. The only exposition the film needs.

- title: "秋刀魚の味"
  title_en: "An Autumn Afternoon"
  type: "film"
  creator: "Yasujiro Ozu"
  creator_role: "dir."
  year: 1962
  eval: "liked"
  image: "/assets/images/thoughts/films/an-autumn-afternoon.jpg"
  posted: "2025-03-17"
  revised: "2025-03-17"
  text: |
    Ozu's final film is, as always with late Ozu, a study in the architecture of resignation. Shuhei (Chishu Ryu), an ageing widower, observes a former teacher, Sakuma (Eijiro Tono), reduced to drunken dependency on his unmarried daughter and recognises the pattern: his own Michiko (Shima Iwashita), who runs the household and cares for her brother, is being consumed by the same structural obligation. The decision to arrange her marriage is presented as an act of paternal generosity, a liberation. ***An Autumn Afternoon*** is too precise a film to accept this framing uncritically. It shows, with the formal composure that makes Ozu's compassion feel almost unbearable, a woman whose life trajectory was decided before she was consulted. The 'escape' from being her father and brother's unpaid domestic labour is, in practice, entry into the cage of patriarchal marriage; one form of erasure replaces another, and the System calls it love.
    Michiko's tears on the night before her wedding say everything the film's surface politeness cannot. She never told anyone she wanted Miura; by the time her father discovers the feeling, Miura has married someone else, and the groom the family arranges is never shown on screen. The low camera, the symmetrical interiors, the unhurried cuts: Ozu's formal vocabulary is so controlled that the small disruptions, a lowered gaze, an unanswered question, a glass refilled one too many times, carry the weight of violence. The drinking scenes between Shuhei and his friends are warm and melancholic, men who fought in the Pacific War processing their obsolescence with saké and rueful humour, but the warmth does not disguise the film's quiet document: a patriarchal order that reproduces itself through the bodies of its daughters while congratulating itself on its tenderness. The taste of saury, autumn, the season of things ending. I walked out admiring Ozu's formal perfection and resenting the world he so faithfully records.

- title: "The Brutalist"
  type: "film"
  creator: "Brady Corbet"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/brutalist.jpg"
  posted: "2025-03-02"
  revised: "2025-03-02"
  text: |
    ***The Brutalist*** oscillates between the monumental and the minute with a confidence that its three-and-a-half-hour runtime earns. László Tóth, a Hungarian Jewish architect who survived the camps, arrives in postwar America with his Bauhaus training and his trauma and discovers that the New World's promise operates on the same transactional logic as the Old World's violence: patronage, dependency, the conversion of genius into an asset on someone else's balance sheet. Adrien Brody's performance is extraordinary in its refusal of the expected Holocaust-survivor mode; Tóth is not noble or broken in the ways cinema has taught us to expect. He is proud, difficult, addicted, brilliant, and intermittently cruel, a man whose creative vision is indistinguishable from his damage. Guy Pearce's Harrison Lee Van Buren is the American capitalist as patron-predator: generous in the way that power is generous, which is to say conditionally, revocably, and with interest.

    The architecture is not metaphor; it is the literal medium through which the film's arguments about capital, ambition, and cowardice are conducted. Tóth's community centre, brutalist in form, uncompromising in its refusal of ornament, is both his masterwork and the instrument of his subjugation: it can only exist because Van Buren funds it, and Van Buren funds it because owning a genius is a form of collecting. The film understands that the relationship between artist and patron under capitalism is not collaboration but a special kind of violence: the patron purchases not the work but the dependency, and the dependency is the point. Felicity Jones as Erzsébet, arriving from Europe with her own damage and her own intelligence, completes the triangle; her presence does not soften the film's thesis but sharpens it, because she sees what László cannot afford to see. Corbet shoots on VistaVision, Lol Crawley's cinematography giving every frame the quality of an archive photograph, something already historical, already a document of what ambition cost. The film earned a Venice Silver Lion for direction and three Academy Awards: Best Actor for Brody, Best Cinematography, and Best Score. An epic about three people, which is the only kind of epic I believe in.

- title: "Black Box Diaries"
  type: "film"
  creator: "Shiori Ito"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/black-box-diaries.jpg"
  posted: "2025-03-02"
  revised: "2025-03-02"
  text: |
    Shiori Ito films her own rape case from the inside: the police interviews, the civil suit, the press conferences, the surveillance footage of herself being surveilled. The documentary form here is not a choice but a necessity; when the institutional machinery refuses to produce an account of what happened, the survivor becomes the documentarian by default. ***Black Box Diaries*** is raw, structurally uneven, and occasionally repetitive in the way that activism in real time is repetitive: the same arguments made to different institutions, the same evidence weighed and found insufficient, the same story told again because nobody listened the first time. The formal roughness is not a weakness. It is the texture of a system that forces endurance as the price of acknowledgement.

    The devastating part, beyond the personal testimony, is how slowly change arrives. After years of litigation, media exposure, international attention, and a successful civil verdict, the legal reforms are real but belated: Japan revised its sex-crime laws, expanded the language of non-consent, and raised the age of consent from thirteen to sixteen, which is progress of a kind that makes one want to scream. Yamaguchi still insists 'we both need to reflect'. Ito won her case to the Supreme Court, and what she won was closer to precedent than Japan's civil law system formally allows: a ruling that lower courts will rarely defy, though the next woman will still face the black box. If Japan, with its functioning judiciary and free press, moves this slowly, then China, where the #MeToo movement was suppressed before it could establish legal footholds, is a silence one does not need to imagine.

- title: "National Theatre Live: Prima Facie"
  type: "film"
  creator: "Justin Martin"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/national-theatre-live-prima-facie.jpg"
  posted: "2025-02-24"
  revised: "2025-02-24"
  text: |
    Two hours with Jodie Comer and no intermission, no relief. Suzie Miller's play moves the way trauma moves: fast, then suddenly airless. Comer's Tessa arrives as a working-class barrister who has built her entire identity on the adversarial machine, on cross-examination, on the clean cold grammar of evidence. She is good at this. She is proud of being good at this. The law rewards the kind of mind that can separate feeling from fact, and Tessa has spent years perfecting that separation. Then the separation is done to her.

    The play understands what the legal system structurally refuses to understand: trauma rewrites memory from the inside. The law demands consistency; trauma produces exactly the opposite. Miller, who practised criminal law herself, knows where the teeth are, and Comer makes one feel every tooth. The shift, when it comes, is not melodramatic. It is worse: it is procedural. A woman is processed through a system that was designed, over generations, to protect the *status quo* of male prerogative, and the processing looks perfectly orderly from the outside.

    I was shaken afterwards, the way one is shaken when a system's cruelty is finally made visible rather than merely arguable. The law, Miller is saying, is not neutral. It is the shape that a society gives to its deepest commitments, and for centuries those commitments have included the tacit belief that women's bodies are not fully their own to govern. Tessa was told, as a schoolgirl, that her generation would change the world. The play ends on that memory, on the gap between what was promised and what was delivered. Comer makes that gap feel briefly closeable, standing in the light alone, having carried everything.

- title: "밤의 해변에서 혼자"
  title_en: "On the Beach at Night Alone"
  type: "film"
  creator: "Hong Sangsoo"
  creator_role: "dir."
  year: 2017
  eval: "meh..."
  image: "/assets/images/thoughts/films/on-the-beach-at-night-alone.jpg"
  posted: "2025-02-10"
  revised: "2025-02-10"
  text: |
    This is a manifesto film, and the manifesto is stated plainly enough: if it was true love, why couldn't they be together? Hong seems to believe that he and Kim Min-hee were wronged by the world, transformed into monsters by a society incapable of tolerating desire that breaks convention. The sincerity of that wound is not in question. What is in question is the film that Hong built to house it. His autobiographical confession, delivered through a director-surrogate whose stated method amounts to shooting until something emerges, produces exactly the kind of stream-of-consciousness that such a method implies: unmoored, circular, committed to nothing except its own grievance. Stream-of-consciousness is not the same as unfiltered thought. Le Clézio and Woolf use it to pull the brain inside out and hold it to the light; here it becomes camouflage for a film that has decided in advance what it wants to say and never tests that decision against anything.

    The seams show in the details. Why would a sister not know that her sibling prefers to live alone? Why would a husband, after years of marriage, compliment his wife's cooking and follow it with 'thank you', as though receiving a service from a stranger? Hong's naturalism, usually so precise in its social embarrassments, here feels constructed by someone too absorbed in his own case to observe the people around him. Kim Min-hee won the Silver Bear at Berlin for this performance, and her work has a raw exposure that the film does not deserve. The manifesto collapses not under outside scrutiny but under its own falseness.

- title: "Bastarden"
  title_en: "The Promised Land"
  type: "film"
  creator: "Nikolaj Arcel"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/bastard.jpg"
  posted: "2025-02-09"
  revised: "2025-02-09"
  text: |
    The vast Jutland heath speaks before any character does: a landscape so obdurate and wind-scoured that the mere fact of men and women trying to cultivate it reads as defiant absurdity. Watching Ludvig Kahlen (Mads Mikkelsen) persist against the clay and the cold and the sadism of the local nobleman, I felt the tenacity not as heroism in any classical sense but as something more creaturely, more desperate: a refusal of the conditions one has been assigned by birth. Ann Barbara (Amanda Collin) gives the film its moral pressure, and her partnership with Kahlen carries the kind of weight that historical epics usually bury under production design. Mikkelsen rarely speaks more than necessary, which is exactly right.

    I looked up the history afterwards. Ann Barbara appears to belong more to fiction than to the archival record, and Kahlen's heath project did not possess the clean moral shape that the film gives it. The film knows enough not to tell us this. It ends instead on the image of the heath beginning, just barely, to yield, and that image does what the historical record cannot: it makes the attempt feel sufficient, the trying feel like a form of arriving. The harshness of the land argues its own case. I came away with earth under my fingernails.

- title: "벌새"
  title_en: "House of Hummingbird"
  type: "film"
  creator: "Bora Kim"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/house-of-hummingbird.jpg"
  posted: "2025-02-04"
  revised: "2025-02-04"
  text: |
    There is a scene early in the film: the parents had been fighting the night before, the mother stabbing the father's arm with a glass lamp in self-defence, and the next morning they are sitting in front of the television, chatting, laughing, as though the wound were in a different house altogether. Eunhee (Park Ji-hoo) watches this and says, in that oblique way the film has of sharpening a moment into an aphorism: 'Because they never look each other in the eye.' She does not yet understand that she is diagnosing herself. She has a boyfriend who distributes his affections indiscriminately, a manga habit that no one in her life bothers to understand, a tumour growing behind her ear that she initially treats as a minor inconvenience. She moves through her own life at an angle, deflecting rather than confronting, surviving by strategic non-engagement.

    Bora Kim shoots 1994 Seoul with the patience of someone who knows that the Seongsu Bridge collapse is coming but refuses to use it as punctuation. The disaster arrives; it is not an event so much as a weather system, the kind of rupture that does not produce epiphany but accumulates in the body alongside everything else. The film understands adolescent interiority in this exact way: pain is not clarifying. It is disorganising. One does not emerge from it wiser in any legible way; one simply finds, at some unmarked point, that one has stopped flinching from certain things.

    Park Ji-hoo's final movement carries all of this without explaining any of it. Eunhee before is the same Eunhee after, except that something behind the face has shifted its weight. The tumour gets cut out. The life, punctured and painful and entirely hers, gets picked up again. It is one of the most accurate portraits of girlhood I have seen on screen.

- title: "Sometimes I Think About Dying"
  type: "film"
  creator: "Rachel Lambert"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/sometimes-i-think-about-dying.jpg"
  posted: "2025-02-02"
  revised: "2025-02-02"
  text: |
    The static office tableaux recall the visual grammar of Robert Zemeckis's *Here* (2024), though the emotional tone could not be further away: where that film reaches for the cosmic, Lambert reaches for the granular, the almost invisible interior life of a woman who has learned to live very far inside herself. The closer comparison is *Fallen Leaves* (2023): the same deadpan warmth, the same faith that loneliness is not a permanent condition so much as a frequency one can shift from, given the right accident of proximity. Fran (Daisy Ridley) does not want to die; she imagines it the way one might imagine emigrating, as an abstraction that allows her to live at a safe distance from her actual life.
    The inner world of a withdrawn person is not impoverished. It is excessively full, and the problem is not emptiness but the absence of any circuit between that fullness and the world outside. Ridley renders this with a stillness that feels hard-won. Robert's (Dave Merheje) arrival does not resolve it. It simply produces one moment, in a restaurant, when the owner looks at them both and says 'you two should come', and something in Fran's face allows it in. I found it very difficult not to smile at that. The tenderness is never performed, and for that reason it is real.

- title: "Interstellar"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/films/interstellar.jpg"
  posted: "2025-01-28"
  revised: "2025-01-28"
  text: |
    I have lost count of how many times I have watched ***Interstellar***, and each time the film reveals something the previous viewings had not prepared me for. Not in the sense of hidden detail, though the engineering of Kip Thorne's physics into the visual fabric of Gargantua is extraordinary; but in the sense that the emotional depth keeps compounding, as though the film were accruing compound interest on every rewatch. The premise is ecological collapse: the blight, the dust, the quiet extinction of crop after crop, a world not ending in spectacle but in agricultural failure, which is to say in the failure of the systems that sustain ordinary life. NASA operates in secret because the political imagination has contracted to the point where collective ambition is no longer fundable, no longer even speakable. Mark Fisher, who in *The Weird and the Eerie* (2016) wrote about ***Interstellar***, would recognise this instantly: it is capitalist realism made literal, a civilisation that can no longer imagine its own future and so dismantles the institutions that once tried to build one.
    What Fisher identifies as the film's risk of kitsch sentimentality is, for me, its most radical move: love becomes an eerie agent rather than an escape from the eerie. The gravitational anomalies, the messages from across spacetime, the agency operating behind Cooper's bookshelf: these are eerie in Fisher's precise sense, a presence where there should be absence, an intelligence acting through physics. The orthodox reading is that the reveal domesticates the mystery: future humanity is 'they', love is the variable that transcends dimension, the cosmic 'collapses' back into the familial. But to call this 'domestication' is to assume that the familial is small. Cooper watches his children age decades in minutes while he himself remains the same, tears streaming down his face as 23 years of messages play in sequence. Love, instead of being the answer to the film's physics, becomes the thing that makes the physics unbearable.
    Every Nolan film before this one keeps its emotional content behind glass. *Inception* (2010) is a locked room; *The Dark Knight* (2008) is a thought experiment; *The Prestige* (2006) is a mechanism. ***Interstellar*** is the film where Nolan finally breaks that glass. The docking sequence, Zimmer's organ shaking the theatre, the TARS countdown, Cooper's refusal to accept the odds: especially the last, a scene about stubbornness and physics and a courage that looks, from the outside, indistinguishable from insanity. The tesseract sequence that follows is Nolan's most ambitious formal construction, a five-dimensional space made navigable by a father's memory of his daughter's bedroom, and the fact that it works, visually and emotionally and (potentially) scientifically, is an achievement I cannot quite account for. Murph's equation solved on the watch-hand: a father's love encoded in gravity, arriving years too late yet exactly on time.

- title: "The Substance"
  type: "film"
  creator: "Coralie Fargeat"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/substance.jpg"
  posted: "2025-01-27"
  revised: "2025-01-27"
  text: |
    The prison is architectural. Once the system has been built around a woman, made of gazes and expectations and the market logic of female desirability, there is no door marked exit. Elisabeth Sparkle (Demi Moore) discovers this by degrees, then all at once: Sue (Margaret Qualley) is not a way out but a doubling of the trap, younger and more perfect and just as expendable, the same machine running faster. Coralie Fargeat's visual grammar, all hyper-saturated surfaces and grossly amplified bodily sounds, mimics the aesthetics of advertising in order to weaponise them; one is made to inhabit the male gaze before the film turns it inside out and makes it grotesque.

    The Cronenbergian escalation of the final act is not excess for its own sake. It is the logical conclusion of a premise taken seriously: if the body is the site of a woman's social value, and if that value is subject to constant competitive depreciation, then the endpoint of fully internalising this system is self-destruction made literal. Moore carries the film's emotional mathematics in her face throughout; her casting is not irony but precision, a career of public scrutiny folded into the role. The New Year's broadcast sequence is apocalyptic in the correct sense: a revelation, not just a bloodbath.

    The cycle of younger, more beautiful: like slamming one's own face against a mirror, again and again, until the mirror wins.

- title: "C'è ancora domani"
  title_en: "There's Still Tomorrow"
  type: "film"
  creator: "Paola Cortellesi"
  creator_role: "dir."
  year: 2023
  eval: "disliked"
  image: "/assets/images/thoughts/films/theres-still-tomorrow.jpg"
  posted: "2025-01-25"
  revised: "2025-01-25"
  text: |
    Is this what feminist filmmaking looks like now: a film steeped in domestic violence that pivots, in its final act, to women's suffrage as the answer? The 1946 ballot is framed as liberation. But tomorrow Delia (Paola Cortellesi) goes home. Tomorrow she is still married to the same man in the same apartment in the same structural dispensation that a single vote cannot touch. Cortellesi's tonal dissonance, domestic violence staged with the choreography of a musical number, has been defended as alienation technique; one finds it more symptomatic, a film uncertain whether it wants to horrify or charm, choosing both and achieving neither fully. Italy's enthusiasm is telling: a cultural object that allows a society to feel its conscience has been pricked without requiring it to sit with any actual discomfort.

- title: "Jacqueline Novak: Get On Your Knees"
  type: "film"
  creator: "Jacqueline Novak"
  creator_role: "by"
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/jacqueline-novak-get-on-your-knees.jpg"
  posted: "2025-01-13"
  revised: "2025-01-13"
  text: |
    The only stand-up special in the past two years that I have loved, and one of the best-written comedies I know of, in any form. On its surface: a sustained meditation on a specific sex act. In its actual operation: a post-structuralist feminist manifesto about the violence that is encoded in language, about who gets to name acts and bodies and what those names do to the people named. Why is it called a 'boner' if bones are not involved? Why 'penetrate'? Why 'enter'? These are not jokes building to punchlines; they are arguments, and they are argued with a rigour that most academic feminism cannot match because it cannot also be this funny.
    Novak, directed by Natasha Lyonne in a staging that transforms Town Hall into something between a lecture hall and a confessional, deploys erudite language as a weapon: the elevated diction is strategy, a claim on the authority that male sexual narrative has always assumed for itself. The metaphorical and allegorical layering accumulates until the special achieves something I had not anticipated: philosophical velocity, the feeling that language is being used to do something that language does not usually agree to do.

    The energy in this room, this recording, this hour, is almost never seen in stand-up. I am still thinking about it.

- title: "I Saw the TV Glow"
  type: "film"
  creator: "Jane Schoenbrun"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/films/i-saw-the-tv-glow.jpg"
  posted: "2025-01-10"
  revised: "2025-01-10"
  text: |
    ***I Saw the TV Glow*** is not a film without ideas. The trans allegory is legible and its emotional logic is real: Owen's (Justice Smith) dissociation is the experience of living in the wrong body, the Pink Opaque is the fantasy of a self that fits, Mr. Melancholy is the repression that would hollow one out rather than let one name what one is. Jane Schoenbrun has encoded this honestly; the film has reportedly been an 'egg crack' for viewers who walked out and came out. That is not nothing. The problem is that the film has confused allegorical sincerity with formal achievement. Its dreamlike aesthetic, the 1990s suburban decay, the VHS distortion, the colour pushed until saturation becomes symptom, accumulates atmosphere without constructing an argument. Lynch does something different: his surrealism has internal logic, symbols that evolve through recurrence and variation, a geometry that does formal work. For Schoenbrun, style is the subject; when style is all there is, one arrives back at the question of who can watch this.

    The answer is: primarily those who already recognise themselves in Owen. The film is a mirror for dysphoric viewers, a recognition of something they already carry; it does not have the formal resources to make an outside viewer feel that recognition from scratch. The distinction between advocacy and art is the distinction that the film cannot navigate. A Bildungsroman this conventional, even in its inverted structure, its anti-development, its hollow adulthood, belongs to a long tradition of queer cinema without distinguishing itself within it. The widespread acclaim that the film earned has more to do with A24's institutional cultivation of trans cinema as a prestige category, and with a critical culture that invests in what the film represents rather than what it formally achieves. One understands the investment. The film itself is mediocre.

- title: "好东西"
  title_en: "Her Story"
  type: "film"
  creator: "邵艺辉"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/herstory.jpg"
  posted: "2024-12-31"
  revised: "2024-12-31"
  text: |
    An urban companion piece to ***出走的决心*** (2024): where Yin Lichuan's film dramatises the decades of patriarchal accumulation that precede a woman's departure, Shao Yihui asks what happens after she has already left. Wang Tiemei (Song Jia), former investigative journalist turned struggling new-media editor, raises her daughter Moli (Zeng Mumei) alone in a Shanghai walk-up; the found family she builds with upstairs neighbour Xiao Ye (Zhong Chuxi), a band singer prone to emotional freefall, is the film's answer to the question that *出走的决心* deliberately leaves open. Both films are didactic. Both understand that the didacticism is the point: in a culture where feminist discourse is routinely dismissed as 女拳, the act of naming (menstruation, consent, performative allyship, the specific exhaustion of single motherhood) is itself a political intervention, not a failure of subtlety.

    ***Her Story*** avoids comfortable pedagogy through its target selection. The film's sharpest satire is reserved for the men who have learned to perform feminism without surrendering its structural dividends: the ex-husband who reads Chizuko Ueno and announces a vasectomy as a gesture of loyalty; the drummer who prides himself on knowing Tiemei's journalism while competing with another man over her attention. These are men whose language has changed faster than their behaviour, and the dinner scene in which they outbid each other in feminist credentials, while Moli asks 'what's this?' and is told '有毒的东西', is the film's most concentrated comic achievement. The pulled punch lands harder than the thrown one: Shao understands that the men most worth satirising are the ones who believe themselves exempt from satire.
    The limitation is structural and the film knows it. This is Shanghai, the Former French Concession, a metropolitan bubble where feminist solidarity can be practised because the cultural infrastructure permits it. The sound montage, Xiao Ye transforming the rhythms of Tiemei's domestic labour into something that sounds like music, is beautiful, but it is the beauty of a life already liberated enough to aestheticise its own struggle. The women in *出走的决心* do not have this luxury. ***Her Story*** is the feminism that follows awakening; it is also, honestly, the feminism available to those who can afford to have already woken up. That the film acknowledges this through its oblique references to 2015, the year that Tiemei wrote her most hopeful article, the year that investigative journalism in China began its terminal decline, suggests that Shao is aware of the gap between what her film depicts and what the country outside the Concession endures.

- title: "کیک محبوب من"
  title_en: "My Favourite Cake"
  type: "film"
  creator: "Maryam Moghaddam & Behtash Sanaeeha"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/my-favourite-cake.jpg"
  posted: "2024-12-31"
  revised: "2024-12-31"
  text: |
    ***My Favourite Cake*** condenses what might have been a lifetime's worth of tenderness into a single evening. Mahin (Lily Farhadpour), seventy and widowed for three decades, lives alone in Tehran; her children are abroad, her days are structural repetition, her solitude something she has learned to inhabit rather than resist. When she meets Faramarz (Esmail Mehrabi), a retired taxi driver, and brings him home, Moghaddam and Sanaeeha unfold the encounter with an unhurried warmth that makes one forget, briefly, that every gesture on screen is a criminal offence under the Islamic Republic: the uncovered hair, the poured wine, the slow dance in the living room. The directors knew what they were filming. They were banned from travelling to Berlin for the premiere, their passports confiscated, and the state pursued them through its usual machinery of intimidation. That a seventy-year-old woman enjoying an evening of ordinary human connection constitutes, under this regime, an act of defiance is the film's quietest and sharpest argument.
    The shift, when it comes, does not register as a twist; it registers as gravity. The film spends its first hour constructing something fragile between two people, a mutual recognition that they still possess the capacity to be tender with a stranger, and the joy is laced with something sharper because one can feel, even as it accumulates, that it will not hold. Farhadpour carries this entire trajectory in her face, moving from guarded curiosity to open delight to something harder to name, the expression of someone who has been reminded of what she has been missing and must now reckon with the reminder's cost. I walked away with an evening compressed to a point of light: brief, impossibly warm, and already gone.

- title: "La Bête"
  title_en: "The Beast"
  type: "film"
  creator: "Bertrand Bonello"
  creator_role: "dir."
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/films/la-bete.jpg"
  posted: "2024-12-27"
  revised: "2024-12-27"
  text: |
    ***The Beast*** arrives with formidable formal apparatus: three timelines, three genres, Léa Seydoux transforming across each while remaining recognisably the same consciousness, and a sci-fi frame in 2044 where the state offers to purify one's DNA of the catastrophic emotional residue that the past has left. It is, on paper, a film about how the same desire repeats across historical time, condemned to identical catastrophe under different period costumes. The Henry James source, *The Beast in the Jungle* (1903), is one of the great stories about deferred catastrophe, the life hollowed out not by disaster but by endless anticipation of it; Bonello finds in that premise a vehicle for thinking about compulsion and repetition. But the 2044 frame gestures towards real questions about consciousness and identity: what survives the purge, whether the self that emerges is still the same self; the film has no interest in pursuing them. The science fiction is atmosphere, not argument.

    The 2014 subplot, Louis (George MacKay) in Los Angeles consuming redpill content, radicalised by heterosexual grievance into something approaching incel logic, is the film's most contemporaneously legible thread and its least developed. Bonello seems to find 1910 Belle Époque Paris aesthetically irresistible; the emotional weight stays stubbornly there, in long-lingering shots of period interior, while the LA material passes quickly, its political implications half-sketched. The unearned devotion that Seydoux's Gabrielle grants Louis across every timeline is either her character's existential self-dissolution or the romantic logic of the James source rotated forward intact and unreexamined; the film declines to say which. Seydoux performs this ambiguity with complete conviction. The film has not earned her.

- title: "Here"
  type: "film"
  creator: "Bas Devos"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/here.jpg"
  posted: "2024-12-23"
  revised: "2024-12-23"
  text: |
    Bas Devos works in a mode so quiet and so precise that it can take a full act before one realises that the film has already done something extraordinary. There is no plot, not in any conventional sense: Stefan (Stefan Gota), a Romanian construction worker wrapping up a job before the city empties for winter, crosses paths with Shuxiu (Liyo Gong), a Chinese-Belgian researcher who studies moss, and something passes between them. A shared bowl of soup. A mutual willingness to stay still in each other's company. That is almost everything. And yet the film does not feel empty; it feels full in the way that presence, as opposed to event, can be full. Devos's fixed camera and his sensitivity to the soft, lateral light at Brussels's edges give the film the texture of careful observation: one senses that each frame has been held long enough for something real to accumulate inside it. The moss is not incidental. Shuxiu's science becomes the film's philosophy: these organisms that persist at the margins, photosynthesising in the cracks, making something from almost nothing. Stefan and Shuxiu are, in their different forms of displacement and solitude, a little like that. The film earns the analogy without pressing on it. The residue is harder to name. The encounter is neither consummated nor abandoned; it simply is, for as long as it lasts, and Devos treats that temporariness with neither melancholy nor forced significance. A person encounters nature, a person encounters another person, a person encounters themselves. I came out into the street feeling, for a few minutes, that the world was slightly more permeable than I had previously assumed.

- title: "The Outrun"
  type: "film"
  creator: "Nora Fingscheidt"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/outrun.jpg"
  posted: "2025-01-26"
  revised: "2025-01-26"
  text: |
    The structure is nonlinear in the way that recovery itself is nonlinear: not a dramatic choice but a phenomenological one, the film spiralling between Orkney's slow, immense present and London's jittery flashbacks as though Rona's memory cannot hold a sequence without the sequence cracking open. Fingscheidt withholds the landscape deliberately. In the first half, Orkney is muted, grey, a place that Rona (Saoirse Ronan) endures rather than inhabits; London, in contrast, blazes with colour and kinetic damage. As sobriety accumulates, the ratio inverts. The cliffs and the North Atlantic open up, frame by frame, as though the land were waiting for her to be capable of seeing it. It is a precise visual argument: the world does not change; one's capacity to receive it does.
    Ronan's Rona is flinty and frail in equal measure. The physicality of being drunk, the sheer muscular effort of being sober, the moment on the clifftop when she conducts the waves with her arms outstretched as though she could command the storm. I watched that scene and felt something dislodge. I too want to stand like that, proud and certain as though one could truly govern the weather, composed amid nature's merciless absurdity. The 'nerd layer', Amy Liptrot's voiceover passages about corncrakes and selkies and the geological tremors that run through Orkney like a nervous system, gives the film a texture that most addiction narratives lack: the sense that the world is not a backdrop to recovery but its instrument. The corncrake, heard but never seen, migrating thousands of miles with a thirty-per-cent survival rate, is a metaphor that the film is wise enough never to state aloud.

    The outrun itself becomes the decisive image: the rough grazing beyond the cultivated field, where land meets sea, where nothing is domestic and nothing is entirely wild. Rona's recovery happens in precisely that space. By the end I was not thinking about addiction at all; I was thinking about what it would mean to belong to a landscape so completely that the landscape begins to repair what the self could not.

- title: "Anora"
  type: "film"
  creator: "Sean Baker"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/films/anora.jpg"
  posted: "2024-12-22"
  revised: "2024-12-22"
  text: |
    Baker shoots a tragedy with the pacing and tonal palette of a screwball comedy, and for a while the energy holds; Mikey Madison is raw and committed in a way that the film never fully deserves. The problem is structural: the script consistently elects the least truthful version of every scene, reaching for farce at precisely the moments when Anora's situation demands something more honest. The oligarch-family farce in the third act runs at such extended, exhausting length that one suspects Baker simply did not know how to end the film that he had actually made. And the ending he does land on, with Igor (Yuri Borisov) positioned as a soulful rescuer of the battered female lead, is merely the oldest available comfort narrative, dressed in indie-film clothes. The lives of sex workers carry social and moral weight that the film keeps promising to reckon with and never does. Amusingly, this film, ostensibly with a female protagonist, can barely pass the sexy lamp test: swap Anora for an object of equivalent aesthetic appeal and the plot of the first act changes not at all.

- title: "0.5ミリ"
  title_en: "0.5mm"
  type: "film"
  creator: "Momoko Ando"
  creator_role: "dir."
  year: 2014
  eval: "meh..."
  image: "/assets/images/thoughts/films/05mm.jpg"
  posted: "2024-12-16"
  revised: "2024-12-16"
  text: |
    There is a ninety-minute film buried inside ***0.5mm***'s three-hour-and-sixteen-minute runtime, and it is a good one. The opening family tragedy and Sawa's (Sakura Ando) subsequent drift into homelessness have the quiet, undecorated specificity of social realism at its best; Sakura Ando commits to every frame with a physical intelligence that consistently exceeds her material. Had the film followed Sawa and the child to a clean resolution, it might have been something still and lacerating. Instead, Momoko Ando structures the middle act as a picaresque through the lives of elderly men, each episode becoming a semi-autonomous short film about Japan's ageing crisis, and the cumulative effect is dissipation rather than accumulation. The thesis scatters. What is being said about elder care, about loneliness, about the gendered distribution of caregiving labour? The film declines to decide.

    The film does, inadvertently, commit to a parade of men who moralise without self-awareness: men who pontificate about duty and tradition while being cared for, men whose grand pronouncements about life arrive in the mouths of characters that the film never adequately interrogates. For a film directed by a woman, adapted from her own novel, this is a striking amount of unexamined patriarchal ventriloquism. The episodic structure, which could have been a formal strength, becomes an excuse for each segment to introduce its own tonal world, its own half-articulated concern, without any of them earning the runtime they consume. Momoko Ando clearly wanted to make a film about the distance between people, the 0.5 millimetres that separate intimacy from intrusion; what she made is a film that cannot decide whether it is social commentary, character study, or picaresque dark comedy, and so becomes none of them with conviction.

- title: "Janet Planet"
  type: "film"
  creator: "Annie Baker"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/janet-planet.jpg"
  posted: "2024-12-16"
  revised: "2024-12-16"
  text: |
    Annie Baker's theatrical practice has always been interested in duration as meaning: her plays earn their length by insisting that the audience remain present alongside characters who do not resolve, who persist. That patience, translated to cinema, produces something I had not quite seen before: a film that captures how a child lives inside a parent's life, not beside it, not safely downstream of it, but submerged. Lacy does not observe her mother Janet from the protected distance that childhood mythology assigns to children. She participates, with a calm and an intensity that occasionally tip into something almost frightening in its maturity. The episodic structure, each chapter organised around an adult who drifts through Janet's orbit (Will Patton, Sophie Okonedo, Elias Koteas, each excellent, each playing a variety of need that Janet cannot meet) and then away, mirrors the way memory actually organises a summer: as a sequence of presences rather than narrative arc.

    The comparison to Bergman is not facile. There is something in the mother-daughter dynamic here that recalls *Autumn Sonata* (1978) without reproducing it: where Bergman's film is about the violence of retrospection, Baker's is about the subtler damage of living too close. Julianne Nicholson's Janet is warm, damaged, and intermittently oblivious to her daughter with the selective blindness of self-absorbed love: present but somehow never quite enough. Zoe Ziegler as Lacy is an uncanny piece of casting; the watchfulness she brings is a phenomenon rather than a performance. The natural light and fixed camera recall *Anatomy of a Fall* (2023) in their commitment to observational fidelity, but Baker's film is warmer, more interior, less prosecutorial. Both films trust that placing two women in the same landscape and letting the camera hold will reveal something irreducible. Baker's reveals the particular grief of a child who understands her mother before her mother understands herself. I am still thinking about Lacy: watchful, patient, unsurprised.

- title: "82년생 김지영"
  title_en: "Kim Ji-young, Born 1982"
  type: "film"
  creator: "Kim Do-young"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/kim-ji-young-born-1982.jpg"
  posted: "2024-12-15"
  revised: "2024-12-15"
  text: |
    My wife observed that ***Kim Ji-young, Born 1982*** tells the story of the daughter in *Like a Rolling Stone* (2024), and the lineage is exact: same generational transmission of suffering, same culture of endurance passed from mother to daughter like an heirloom nobody chose. The charge of didacticism is fair and beside the point. When a single woman's life becomes the vessel for three generations of accumulated accommodation, when simply boarding a bus is occasion for fear, when being harmed still invites condemnation, one does not need dialectical complexity. One needs testimony, and the more direct the better.

    Kim Do-young's restraint is the film's great intelligence. There are no villains constructed for catharsis; there is only a system operating smoothly, its violence distributed so evenly across fathers, husbands, bosses, and well-meaning relatives that no single node is identifiable as the source. Jung Yu-mi inhabits that distributed violence with a precision that avoids both martyrdom and melodrama. Gong Yoo, as the husband, gives the system its most disarming face: loving, supportive, and entirely blind to what his comfort costs. The review-bombing campaign by male fans who could not countenance their favourite actress appearing in a feminist film is, of course, the film's argument made more forcefully than the film ever manages. We need exactly this didacticism, and the more the better.

- title: "The Internet's Own Boy: The Story of Aaron Swartz"
  type: "film"
  creator: "Brian Knappenberger"
  creator_role: "dir."
  year: 2014
  eval: "liked"
  image: "/assets/images/thoughts/films/internets-own-boy.jpg"
  posted: "2024-12-09"
  revised: "2024-12-09"
  text: |
    ***The Internet's Own Boy*** documents, in the end, more than a story about one person. Aaron Swartz was fourteen when he co-authored RSS; he helped build Creative Commons, co-founded Reddit, led the campaign that killed SOPA. By twenty-six he was dead, driven there by a federal prosecution that sought thirty-five years in prison for downloading academic papers that JSTOR itself declined to pursue charges over. Knappenberger's film is straightforwardly hagiographic, and the usual criticism applies: it is advocacy, not balance. But the advocacy is correct. The Computer Fraud and Abuse Act is a law written to protect capital dressed as cybersecurity, and Carmen Ortiz's office wielded it with the particular cruelty of a state making an example. The film is at its sharpest when it lets the disproportion speak for itself: publicly funded research, locked behind publisher paywalls, and the person who tried to liberate it treated as a felon.

    Watching in 2024, the prosecution has become a familiar American cruelty. The surprise is the atmosphere of the early internet the film briefly recovers: a period when the infrastructure was still young enough for individuals to shape it, when open access and decentralisation were not nostalgic positions but plausible futures. Tim Berners-Lee appears in the film to say, in effect, that Swartz's ideals were the internet's founding assumptions, not radical outliers. That this now sounds like elegy tells one everything about what has happened since. The idealism has been defeated by privatisation, metabolised into the language of corporate 'openness' while the actual structures of enclosure, Elsevier, Springer Nature, the platform monopolies, have only consolidated. A handful of genuine revolutionaries still push open-source and open-access causes, but they operate in a landscape Aaron would barely recognise. The film is released under Creative Commons, which is the right gesture. It is also, by now, a historical document about a world that no longer exists.

- title: "دانه‌ی انجیر معابد"
  title_en: "The Seed of the Sacred Fig"
  type: "film"
  creator: "Mohammad Rasoulof"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/seed-of-the-sacred-fig.jpg"
  posted: "2024-12-09"
  revised: "2024-12-09"
  text: |
    Rasoulof shot this film inside Iran while under sentence of imprisonment, then smuggled it out and fled the country before its Cannes premiere. That biographical fact is not separable from the film: one watches it knowing that the footage of women burning their hijabs around roadside fires, the images of protesters beaten and killed on Tehran streets, the faces of young people looking directly into phone cameras as if addressing the future directly, are not reconstructed. The documentary material and the fiction share the same air. The domestic allegory is tight, perhaps too tight. Iman (Missagh Zareh), the newly promoted investigating judge, becomes the regime in miniature: a man whose authority requires the submission of those closest to him, whose paranoia escalates in proportion to his family's awareness of what is happening outside their windows. The allegory maps so directly that it occasionally reads as thesis before drama; one can see the structural argument assembling itself in real time, each domestic confrontation an echo of the state's confrontation with its citizens. The mother's acquiescence (Soheila Golestani), still washing dishes and scrubbing the sink under obligations she has metabolised across a lifetime, is not weakness; it is a survival logic that the film understands even as the daughters (Mahsa Rostami, Setareh Maleki) cannot fully forgive it. The daughters grew up breathing different air, and they cannot pretend otherwise. 'The world may change, but God's law does not': the film knows that line is not a conviction but a shelter, and treats it accordingly. The protests, in Rasoulof's framing, become something close to a collective nervous system becoming conscious of itself: a dispersed grief and courage moving through a population simultaneously, each individual act of defiance part of a signal the whole network is transmitting. That the embers are still there, three years on, is evidence that the signal cannot be fully suppressed.

- title: "بچه‌های آسمان"
  title_en: "Children of Heaven"
  type: "film"
  creator: "Majid Majidi"
  creator_role: "dir."
  year: 1997
  eval: "liked"
  image: "/assets/images/thoughts/films/children-of-heaven.jpg"
  posted: "2024-12-01"
  revised: "2024-12-01"
  text: |
    Majidi works squarely in the lineage of De Sica: a single lost object, a family too poor to replace it, and the entire weight of a social structure made visible through the gap. Ali loses his sister Zahra's shoes; the siblings share his sneakers between school shifts; Ali enters a footrace whose third prize is a new pair. The plot is so simple that it sounds like a fable, and ***Children of Heaven*** earns the comparison to *Bicycle Thieves* through the same commitment to observing poverty without diagnosing it. The family is dignified, resourceful, loving; their material constraint is a fact, never a moral occasion. Amir Farrokh Hashemian and Bahare Seddiqi, both children, perform with a naturalism that makes the word 'performance' feel wrong: what they communicate, guilt and solidarity and hope, arrives through glances and posture, not dialogue.

    The ending is the film's quiet coup. Ali, who needs third place, accidentally wins. The camera finds his blistered feet in a fishpond, goldfish circling his toes, and the image holds. There is no resolution, only the persistence of two children who have not yet learned that the world is structured against them. That this emerged from late-1990s Iranian cinema, alongside Kiarostami's *Taste of Cherry* and the early work of Panahi, is not incidental: a tradition of humanist realism that used its own formal restraint as a way to speak past censorship, making art that was simultaneously local and irreducibly universal. One sees, in these two children's eyes, a small, stubborn hope. It is enough.

- title: "出走的决心"
  title_en: "Like a Rolling Stone"
  type: "film"
  creator: "Yin Lichuan"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/like-a-rolling-stone.jpg"
  posted: "2024-12-01"
  revised: "2024-12-01"
  text: |
    ***Like a Rolling Stone*** is careful, in its first half, to show Li Hong's suffering not as spectacle but as atmosphere: the way a household can be organised entirely around one person's moods, the gravitational field of her husband (Jiang Wu) bending every small domestic act slightly out of true. Yin Lichuan understands that the most insidious abuse trains its victim to explain it away, to convert pain into patience, to inherit from her own mother the conviction that endurance is a form of dignity. 'I know how hard it is raising children, everyone says mothers are the greatest.' 'I raised children too, and I never complained once.' These consolations are not kindness; they are the mechanism by which suffering is glorified into obligation and passed, intact, to the next generation.
    Li Hong's eventual departure is not triumphant in the way that liberation narratives usually require it to be. It is frightened and uncertain and furiously necessary, and Yong Mei plays it with a restraint that refuses the audience the catharsis of uncomplicated vindication. The film trusts us to understand that the difficulty of leaving is itself part of the indictment. And Li Hong's words to Xiaoxue near the end: 'I hope you will not end up like your mother.' A sentence so simple and so loaded that it carries the weight of the entire film. I hope future generations can say no without hesitation. I hope every woman can live for herself. The film does not promise this. Li Hong drives on.

- title: "Anthony Jeselnik: Bones and All"
  type: "film"
  creator: "Anthony Jeselnik"
  creator_role: "by"
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/bones-and-all.jpg"
  posted: "2024-12-01"
  revised: "2024-12-01"
  text: |
    That Jeselnik can still work this system in 2024 deserves recognition on its own terms. The political atmosphere around stand-up has calcified into two camps (comedians who perform transgression as a proxy for reactionary politics and comedians who have pre-emptively retreated into safety) and Jeselnik occupies neither. His one-liners remain structurally transgressive without being ideologically so: the darkness is formal, a matter of where the sentence turns, not a vehicle for anything as lazy as an opinion. The opening pregnancy joke sets the tone immediately; the laxative bit is one of the tightest constructions in the set; the trans joke works precisely because the delivery goes somewhere the audience's pattern-recognition cannot anticipate, which is what Jeselnik does when the system is working.
    The trouble is that the system is not always working. Twenty years in, the architecture of his one-liners (setup, misdirection, dark pivot) has become so legible that one can feel several of the twists arriving before they connect, the forced quality of a mechanism whose precision has become its own kind of predictability. The Rogan material gestures towards something more personal and more interesting: Jeselnik's position within the stand-up community, the growing sense among peers that his arrogance has crossed from persona into character, the question of whether a comedian whose entire method depends on control can survive in a culture that increasingly demands vulnerability. There is something to it. But the jokes themselves, especially in the current climate, remain singular: both pathetic and funny, which is harder to achieve than either quality alone. Nobody else in American stand-up is attempting it with this commitment.

- title: "The End of the Tour"
  type: "film"
  creator: "James Ponsoldt"
  creator_role: "dir."
  year: 2015
  eval: "liked"
  image: "/assets/images/thoughts/films/end-of-the-tour.jpg"
  posted: "2024-11-25"
  revised: "2024-11-25"
  text: |
    ***The End of the Tour*** is a film about a five-day conversation between two writers, and its achievement is that it is not really about writing at all. It is about loneliness. David Lipsky interviews David Foster Wallace during the final leg of the *Infinite Jest* book tour in 1996; they drive through the Midwest, eat junk food, visit a megachurch bookstore, and talk with the wary intimacy of two people who recognise each other's defences. Jason Segel's Wallace is a revelation: the bandana, the nervous chewing tobacco, the dogs pressed against his legs, the way intelligence and discomfort coexist in every sentence. The performance captures something I had not expected a Hollywood film to attempt, let alone achieve: the specific quality of a mind that understands its own traps and cannot stop falling into them. Wallace's anxiety about fame, about entertainment as a colonising force, about the recursive spiral of sincerity becoming performance becoming sincerity, is rendered as a condition he has to inhabit rather than intellectual posture. He is visibly afraid that *Infinite Jest*'s success will turn him into the thing he wrote against: a commodity of the attention economy.

    The DFW estate opposed the film, and their objection has force: to dramatise a writer who spent his career warning against the seductions of entertainment is to enact exactly the commodification he feared. The film knows this and cannot resolve it, and it does not pretend to be Wallace; it offers instead the shape of two people circling each other's loneliness. Jesse Eisenberg's Lipsky, all admiration and competitive envy, is the correct lens: he cannot help turning the encounter into material, which makes him Wallace's fear made flesh. It is a shame, then, that Ponsoldt brings so little beyond his two performers. The direction is self-effacing to the point of absence; the Midwestern landscapes register as mood board, and the framing device (Lipsky learning of Wallace's suicide in 2008 and returning to the tapes) uses retrospective tragedy to lift conversations that the film has not always earned on their own terms. The title phrase, *of course you end up becoming yourself*, reads as both comfort and verdict: identity is a destination reached involuntarily, and by then it is too late to be anyone else. Segel's Wallace stays with me. The film around him has already faded.

- title: "Incendies"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/films/incendies.jpg"
  posted: "2024-11-11"
  revised: "2024-11-11"
  text: |
    The first half of ***Incendies***, through to the NIHAD chapter, is the best thing Villeneuve has made. The chapter-based structure gives the parallel timelines a classical severity: the twins Jeanne (Mélissa Désormeaux-Poulin) and Simon (Maxim Gaudette) trace their mother's past from Montreal, while Nawal's journey through sectarian violence, her imprisonment, her defiance under torture, is filmed with a realism that earns its brutality. Lubna Azabal carries the film: she inhabits a woman caught in the machinery of religious war, helpless but unbroken, and the depiction of that war, Christians and Muslims locked in cycles of reciprocal atrocity, is unflinching without being pornographic. There is a genuine political intelligence at work in these sequences, an understanding that sectarian violence is self-consuming, that the categories of perpetrator and victim dissolve when the cycles of violence have gone on long enough.

    Then the second half arrives and the realism shatters. The revelation that Nihad is simultaneously brother, torturer, rapist, and father is a piece of Oedipal machinery so engineered that it retroactively converts everything that preceded it from political testimony into plot device. After one has seen the hypocrisy of religious war, the courage of one woman persisting through it, how does one accept the perfect coincidence of a reunion that belongs to a different, far less serious film? The theatrical source, Mouawad's play, may justify the classical-tragedy architecture, but classical tragedy earns its revelations through inevitability; Villeneuve earns his through contrivance. This is, I suspect, a pattern that predates *Dune*: the willingness to sacrifice emotional truth for narrative architecture, to plant foreshadowing so deliberate it announces itself as foreshadowing. *Polytechnique*, *Prisoners*, *Enemy*, all display some version of this tendency: a filmmaker who builds beautiful structures and then furnishes them with mechanisms rather than people. Incendies is the version where the mechanism is most visible, because the human material it displaces is so strong.

- title: "Arizona Dream"
  type: "film"
  creator: "Emir Kusturica"
  creator_role: "dir."
  year: 1993
  eval: "meh..."
  image: "/assets/images/thoughts/films/arizona-dream.jpg"
  posted: "2024-11-10"
  revised: "2024-11-10"
  text: |
    The most charitable reading of ***Arizona Dream*** is that it was always meant to be a film about failure, about the American Dream as a particular variety of beautiful, inert paralysis. If so, Kusturica has succeeded almost too completely: the film itself is paralysed. Every character is left at precisely the point where their story might ignite, and the flying fish and Faye Dunaway's flying machine hover over the whole enterprise as symbols that never quite become meaning, markers of an absent thought rather than a present one. The performances from Johnny Depp, Faye Dunaway, Jerry Lewis, and Lili Taylor have a uniformly somnambulist quality that *Underground* (1995) never had, not for a single frame; where Kusturica's Balkan films drew energy from collective derangement, from the carnivalesque excess of a people living through history at full volume, the film musters only a private, inward listlessness. One keeps waiting for the film to commit to something, and the waiting is itself the film. Kusturica's great subject has always been the dream, collective or personal, as a force that is simultaneously life-giving and catastrophic; transplanted to American soil, that force drains away to little more than an offhand voyeurism.

- title: "Straume"
  title_en: "Flow"
  type: "film"
  creator: "Gints Zilbalodis"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/straume.jpg"
  posted: "2024-11-08"
  revised: "2024-11-08"
  text: |
    ***Flow*** is the animated film that *The Wild Robot* (2024) should have been. Made on a tiny budget using open-source software, by a Latvian director and a small team, it achieves a visual fidelity (water simulation, light refraction, the quality of late-afternoon gold through leaves) that rivals anything a major studio has produced. But technique is the least of it. Zilbalodis understands that the camera is an emotional instrument first, and that conviction distinguishes the film from almost all its contemporaries. The world is flooded; humans are gone; the animals that remain must navigate structures built for a species that no longer exists. The allegory is legible without ever being laboured.

    The dark grey cat at the centre is, categorically, a cat: solitary, suspicious, reluctant to accept help, constitutionally averse to trust. The film's entire arc is the slow, wordless erosion of that reluctance, and it earns every millimetre of it. The two secretary birds' standoff held me completely still; the capybara's impassive serenity becomes a kind of running philosophical counterpoint. Every animal moves with a specificity of weight and hesitation that communicates interiority without anthropomorphism, which is an extraordinary technical and imaginative feat.

    The score drifts and accumulates, textural rather than manipulative, and the film is all the more affecting for it. *Flow* knows exactly what it is and executes with mastery; *The Wild Robot* gestures at depth without reaching it. It is a film about learning to let go, and the final image earns its silence.

- title: "หลานม่า"
  title_en: "How to Make Millions Before Grandma Dies"
  type: "film"
  creator: "Pat Boonnitipat"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/how-to-make-millions-before-grandma-dies.jpg"
  posted: "2024-10-28"
  revised: "2024-10-28"
  text: |
    Boonnitipat has made a precisely calibrated sentimentality: the film knows exactly how much emotion to release at any given moment and withholds the rest with impressive discipline. The structure does its work through accumulation rather than surprise, each emotional shift arriving just early enough to reframe what came before. M's arc, from a young man calculating an inheritance to a grandson who has, almost without noticing, become someone who actually shows up, is handled without a single line of explanatory dialogue; it accrues through gesture and proximity and the quiet arithmetic of small acts. Billkin plays M with a casualness that disguises how much precision the role requires; he makes the transformation invisible, which is the point.

    The film understands that in East Asian family structures, filial obligation and genuine love are not opposites, and that the machinery of inheritance can corrupt both without entirely destroying either. Usha Seamkhum's Amah is a specific woman; I left the cinema having spent time with a person. The trouble, in a film this controlled, is that the control occasionally tips into design. Boonnitipat's hand is so steady that certain beats arrive with the faint click of a mechanism, and the third act leans on a revelation that the first two acts have not quite earned. The emotional discipline that is the film's great strength is also, in these moments, its limitation: it withholds so carefully that the release, when it comes, feels slightly calculated. Amah's face remains, though. Specific, irreplaceable, hers.

- title: "The Wild Robot"
  type: "film"
  creator: "Chris Sanders"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/films/wild-robot.jpg"
  posted: "2024-10-27"
  revised: "2024-10-27"
  text: |
    ***The Wild Robot*** arrives trailing superlatives and a production design that draws, not insincerely, from the watercolour softness of classical illustration. The animation is beautiful; the intention is earnest; the sentimentality is the problem. Sanders has not yet worked out how to earn the feelings he wants the audience to have, so he deploys music, morale, and ideology at escalating volume and trusts that the accumulation will do the work. Occasionally it does, after a fashion. But one is always aware of the mechanism, always conscious of being worked on rather than moved. As a children's film it is adequate; as a film that aspires to the condition of the best animation, which thinks and feels simultaneously, it is awkward.

- title: "Secrets & Lies"
  type: "film"
  creator: "Mike Leigh"
  creator_role: "dir."
  year: 1996
  eval: "loved"
  image: "/assets/images/thoughts/films/secrets-lies.jpg"
  posted: "2024-10-21"
  revised: "2024-10-21"
  text: |
    Mike Leigh's improvisational method has always been a way of arriving at emotional truths that scripted cinema cannot reach, and ***Secrets & Lies*** is its supreme vindication. The café scene, an unbroken eight-minute two-shot of Cynthia meeting Hortense for the first time, contains more genuine human surprise than most films manage in their entirety. Cynthia does not know she is about to meet her biological daughter; Hortense does not know what her birth mother will be like; Leigh, characteristically, let Brenda Blethyn discover the reveal in real time during rehearsal, and the emotional archaeology of that discovery is preserved in every frame. The shock, the denial, the cascading recollection, the shame: Blethyn performs these not as sequential beats but as a single, sustained detonation. It is one of the great screen performances.

    But the film's scope extends far beyond the reunion. Leigh constructs an entire ecosystem of working-class and lower-middle-class London: Cynthia's caustic relationship with her other daughter Roxanne (Claire Rushbrook), Maurice's (Timothy Spall) quiet suppression of his own family's grief, the barbecue sequence in which every accumulated lie in the family finally ruptures under the weight of proximity. Blethyn's breakdown at the barbecue, the hysterical confession that opens with laughter and ends somewhere beyond tears, is the performance of a lifetime. Families in Leigh's work are not collections of individuals but systems, and the lies that hold a system together are structural, not incidental. Hortense's arrival does not create the dysfunction; it merely makes the existing arrangement unsustainable. Marianne Jean-Baptiste's quiet dignity provides the counterweight the film needs: she watches, she listens, she does not judge, and her restraint makes Blethyn's disintegration all the more unbearable. The silence breaks, and what floods in is not peace but something rawer: the family, for the first time, seeing each other.

- title: "La Chimera"
  type: "film"
  creator: "Alice Rohrwacher"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/la-chimera.jpg"
  posted: "2024-10-21"
  revised: "2024-10-21"
  text: |
    Alice Rohrwacher has been making the same film for a decade, and ***La Chimera*** is the version where every thread finally coheres. Arthur, Josh O'Connor in a crumpled linen suit and an expression of permanent, bewildered grief, is an English archaeologist turned *tombarolo* who can feel the dead beneath the soil. He dowses for Etruscan tombs in 1980s Tuscany, not for profit but because the underground is the only place that brings him close to Beniamina, the lover he has lost. The Orpheus parallel is explicit and entirely earned: Arthur descends, again and again, into the earth, and each time he surfaces with artefacts instead of the person he came for. Rohrwacher shoots on 16mm and 35mm, mixing formats and aspect ratios, breaking into direct address; the grain is so tactile that one can almost feel the emulsion, and none of it feels like affectation. The handmade quality is the point. This is a film about what is lost when objects are extracted from context, and its own formal texture insists on context at every level. Isabella Rossellini, as Flora, haunts the margins like a woman who has decided that grief is a permanent address; Carol Duarte's Italia brings the warmth and ground that the film needs.

    The political dimension lifts it above myth. The *tombaroli* are working-class men who dig with their hands and sell to middlemen who sell to dealers who sell to museums; the value accrues upward, the labour and the risk stay at the bottom, and the Etruscans who made the objects with devotional care are reduced to a supply chain. Grave-robbing as capitalist extraction is not a metaphor Rohrwacher imposes; it is the literal mechanics of the antiquities trade, and Rohrwacher makes one feel the obscenity of it without ever moralising. *Happy as Lazzaro* (2018) attempted something similar (the persistence of feudal class structures within modernity) but its fable logic occasionally floated free of material consequence. Here the myth is grounded in sweat and dialect and the specific weight of terracotta pulled from clay. O'Connor is magnificent: he plays Arthur as a man who has already crossed the threshold and is only pretending, badly, to still be among the living. The final descent, the choice not to return, is the only honest act the film permits. Arthur goes under, and this time he does not come back.

- title: "白日之下"
  title_en: "In Broad Daylight"
  type: "film"
  creator: "Lawrence Kan"
  creator_role: "dir."
  year: 2023
  eval: "disliked"
  image: "/assets/images/thoughts/films/in-broad-daylight.jpg"
  posted: "2024-10-15"
  revised: "2024-10-15"
  text: |
    The subject matter is real and it is sickening: the abuse of care-home residents in Hong Kong's private welfare system, the institutional failures that let it continue, the journalism required to drag it into daylight. ***In Broad Daylight*** has the raw material for a furious, rigorous film about investigative journalism under pressure. Lawrence Kan instead makes a film where the investigation happens almost entirely offscreen. The journalist goes undercover; an hour of narrative time passes; the editor declares there is no evidence. Then a single bathing scene, lingered over for what feels like five minutes, and suddenly the story is publishable. The entire procedural middle, the grind of evidence-gathering, the editorial negotiation, the legal exposure, is simply absent. One does not need to have watched *Spotlight* (2015) or *All the President's Men* (1976) to understand that the journalism film's fundamental obligation is to make the work visible. Kan skips the work and keeps the emotion.

    And the emotion is unbearable because it is cheap. The sentimental sequences are so overwrought they approach self-parody: swelling music, slow motion, the full arsenal of manipulative technique deployed without irony or restraint. The bathing scene itself raises an uncomfortable question: is filming elderly nudity at this length, for this purpose, exposure of institutional abuse or reproduction of it? The film has not considered the question. Jennifer Yu's performance is committed, and the Hong Kong Film Awards rewarded the subject rather than the craft, which is a familiar pattern. If this is what passes for serious investigative cinema in Hong Kong, the diagnosis is worse than the disease it claims to document.

- title: "Midnight Run"
  type: "film"
  creator: "Martin Brest"
  creator_role: "dir."
  year: 1988
  eval: "loved"
  image: "/assets/images/thoughts/films/midnight-run.jpg"
  posted: "2024-10-12"
  revised: "2024-10-12"
  text: |
    George Gallo's screenplay for ***Midnight Run*** is the best action-comedy script I have encountered, and I say this as someone who generally finds the genre disposable. The premise is formula: bounty hunter Jack Walsh must transport bail-jumping accountant Jonathan Mardukas cross-country from New York to Los Angeles while the FBI, a rival bounty hunter, and the mob give chase. The dialogue is not formula. De Niro and Grodin talk at each other for two hours with the verbal precision of a chamber play, and the comedy emerges not from set-pieces but from the slow, needle-sharp erosion of Walsh's defences. Grodin's deadpan is merciless: he asks about the failed marriage, the ethics of the job, the cigarette habit, with the serene persistence of a therapist who happens to be handcuffed to his patient. De Niro, in what remains his finest comedic performance, lets the irritation build until it becomes indistinguishable from affection.

    I laughed from beginning to end, which almost never happens. The film's trick is that it earns its warmth through friction rather than sentiment: these two men do not bond over shared vulnerability or a contrived crisis of conscience; they bond because they are stuck together long enough for the performance of hostility to become unsustainable. Yaphet Kotto as the perpetually humiliated FBI agent and John Ashton as the hapless rival bounty hunter are pitch-perfect supporting turns in a script that gives every character a distinct comic voice. The final scene is one of the quietest, most perfectly judged endings in American commercial cinema: no speech, no embrace, just a gesture that says everything the preceding two hours refused to say aloud.

- title: "年少日記"
  title_en: "Time Still Turns the Pages"
  type: "film"
  creator: "Cheuk Yik-him"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/time-still-turns-the-pages.jpg"
  posted: "2024-10-07"
  revised: "2024-10-07"
  text: |
    ***Time Still Turns the Pages*** is a rare film in Chinese-language cinema: one that looks directly at the violence of East Asian academic pressure and refuses to blink. The dual-timeline structure, a secondary-school teacher discovering a student's suicide note, his own childhood flooding back, is handled with a formal restraint that belies how harrowing the material is. The ten-year-old Yau-kit practises Schumann's 'Träumerei' while his father beats him for inadequate grades; the melody threads through the film as the last surviving connection between two brothers, one of whom did not make it out of childhood. The revelation of which brother the adult protagonist actually is confirms what one had already suspected and could not bear to have confirmed. The father (Ronald Cheng, cast against type) is not a monster in the cinematic sense; he is a successful professional who believes he is building character, which is worse, because it is ordinary.

    A child whose only modes of communication with the world are pain, despair, and false hope: how many East Asian families carry this story as quiet, corrosive fact? The film knows the answer and does not pretend otherwise. The mother's silence holds the household together; her inaction bears part of the house's weight. Cheuk Yik-him, in a debut feature, captures the interior life of a child who has concluded, with the terrifying logic available to children, that he is the problem. 'Träumerei' recurs not as sentiment but as evidence, the trace of a boy who existed, who was capable of beauty, and who was told in every language except words that this was not enough. I was in tears by the end. Not because the film manipulates; it does not. Because it remembers.

- title: "Billy & Molly: An Otter Love Story"
  type: "film"
  creator: "Charlie Hamilton James"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/films/billy-molly.jpg"
  posted: "2024-10-05"
  revised: "2024-10-05"
  text: |
    The comparison to *My Octopus Teacher* (2020) is not incidental; it is structural. Both films follow the same arc: a man discovers a wild animal, projects emotional significance onto the encounter, narrates the relationship as mutual transformation, and expects the audience to find this meaningful rather than presumptuous. ***Billy & Molly*** substitutes a Shetland otter for a South African octopus and swaps Craig Foster's midlife spiritual crisis for Billy Mail's quieter domestic one, but the underlying conceit is identical. The animal is adorable. The scenery is beautiful. The human protagonist is convinced of his own importance in another species' life, and the film never pauses to interrogate whether that conviction is earned or merely convenient.

    The otter is very cute; I concede this freely. But the lengths Billy goes to in habituating Molly, the grooming of a wild animal into dependency framed as love, the attachment presented as reciprocal when it is almost certainly one-directional, produce a persistent unease the film has no interest in addressing. The dialogue feels off, the attachment feels off, everything feels off in the specific way that self-congratulatory nature documentaries feel off: the animal is real, the emotion projected onto it is not, and the film's sentimentality lives in that gap. Seventy-seven minutes, and I left having learned nothing about otters and rather too much about the human need to be loved back by things that cannot consent to the arrangement.

- title: "遥望南方的童年"
  title_en: "The Rising Star Kindergarten"
  type: "film"
  creator: "Yi Han"
  creator_role: "dir."
  year: 2007
  eval: "disliked"
  image: "/assets/images/thoughts/films/rising-star-kindergarten.jpg"
  posted: "2024-09-30"
  revised: "2024-09-30"
  text: |
    Yi Han's film is about left-behind children in rural Jiangxi, a subject that deserves a filmmaker capable of interrogating the political-economic system that produces sixty million of them. Yi Han gives it instead a self-congratulatory parable about one good man's doomed attempt to run a kindergarten, shot on consumer DV with non-professional actors, in which the suffering of children is aestheticised into moral atmosphere and the structural causes of their abandonment (the hukou system, rural disinvestment, the entire architecture of uneven development that funnels labour southward to the factories) are reduced to scenery. The authentic Gan dialect and the real village locations give the film a documentary texture that its narrative does not earn. Realism of surface is not the same as realism of analysis, and ***The Rising Star Kindergarten*** has the former in abundance and the latter not at all.

    The teacher-saviour framing is the problem. Yi Mingtang pours his resources into his makeshift school; his wife sacrifices; the young teacher Li Xiang learns and grows; the state arrives only to shut the kindergarten down for regulatory non-compliance. The structure invites the audience to admire the individual who tried rather than to indict the system that made his failure inevitable, which is precisely how poverty cinema neutralises its own subject. The state appears as the force that closes the door but never as the entity that built the house with no exits. The parents who migrated south are absent presences, longed for but never examined; their desperation flattened into a sentimental absence rather than understood as a consequence of policy. The final image, the teacher leading the children up a hill to gaze southward towards their parents, is so nakedly manipulative that it crossed the threshold from pathos into comedy. When a film about genuine suffering produces an involuntary laugh in its closing shot, something has gone wrong with the distance between the filmmaker and his material. That it is almost universally beloved tells one everything about the appetite for self-congratulatory compassion: a film that lets the audience feel virtuous for having watched it, without requiring them to think about why sixty million children were abandoned in the first place.

- title: "Alien: Romulus"
  type: "film"
  creator: "Fede Álvarez"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/alien-romulus.jpg"
  posted: "2024-08-26"
  revised: "2024-08-26"
  text: |
    The franchise has always been Lovecraftian before it was anything else. Scott's 1979 film understood that the xenomorph is not an antagonist but a fact: a biological system operating with total indifference to human meaning, produced by a universe that did not consult us and does not care. Every sequel since has struggled to preserve that cosmic dread while delivering the genre satisfactions that justify a studio budget; most have failed. Álvarez comes closer than anyone since Cameron, and he does it by returning to the franchise's other foundational insight: that the real horror is not the creature but the institution that keeps feeding people to it.

    Rain (Cailee Spaeny) and her companions are indentured miners on a sunless colony world, working contracts that Weyland-Yutani extends unilaterally, with no legal recourse and no exit. Their entire plan, boarding a derelict space station swarming with organisms they cannot comprehend, is driven not by curiosity or military orders but by poverty. They need cryostasis equipment because they literally cannot afford freedom any other way. The franchise began with blue-collar workers dying because a corporation valued a specimen over their lives; forty-five years later, Álvarez makes a film where blue-collar workers die because a corporation has made escape from labour so impossible that a derelict full of xenomorphs looks like the better option. The structural critique has not changed. The conditions have worsened.

    The Z-01 compound, Weyland-Yutani's refined version of the Prometheus black goo, is the film's sharpest thematic device. The corporation's ambition, genetically enhanced humans who can thrive in space, sounds almost benign in the abstract, the language of progress and adaptation. What it produces in practice is the Offspring: a human-xenomorph hybrid born of Kay's mutated pregnancy, an abomination that kills its own mother immediately after birth. Every attempt to harness cosmic forces for corporate profit ends in the same place: a body destroyed and a boardroom none the wiser. The reproductive horror here is not incidental to the Alien franchise; it is the franchise. Giger's original designs were explicitly about sexual violation, the facehugger as forced impregnation, the chestburster as fatal birth. Álvarez adds the layer of corporate mediation: Kay's body is violated not directly by the xenomorph but by a compound manufactured by the company, administered by an android whose loyalty has been reprogrammed from 'protect Rain' to 'serve Weyland-Yutani directives'. The violation is institutional before it is biological.

    The digital resurrection of Ian Holm's likeness as the android Rook is the film's most uncomfortable moment, and not in the way Álvarez intended. A dead actor's likeness, extracted and reanimated for corporate purposes, in a film whose explicit theme is the corporate extraction and reanimation of biological material for profit. The studio became Weyland-Yutani without noticing, which is, if nothing else, a vindication of the franchise's thesis that the corporation is the organism that cannot recognise itself as monstrous. The zero-gravity sequence, in which Rain disables the station's gravity to shoot the xenomorphs without their acid blood breaching the hull, is the best set piece the franchise has produced since the power-loader fight in *Aliens*: a tactical solution and a visual metaphor at once, bodies suspended in darkness, weightless, stripped of every orientation except survival. The production design keeps faith with Giger's biomechanical aesthetic while the Romulus and Remus modules split the visual grammar neatly between *Alien*'s claustrophobic industrialism and *Aliens*' militarised functionality. For those of us for whom cosmic horror is not a genre preference but a disposition, the conviction that the universe is not hostile so much as comprehensively indifferent, the relief of watching a blockbuster that actually believes in it is considerable.

- title: "Inside Out 2"
  type: "film"
  creator: "Kelsey Mann"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/films/inside-out-2.jpg"
  posted: "2024-08-03"
  revised: "2024-08-03"
  text: |
    The original *Inside Out* (2015) depended on a metaphor, emotions as agents with competing interests inside a child's mind, that was both conceptually precise and emotionally shattering. ***Inside Out 2*** extends the metaphor into puberty by adding Anxiety, Envy, Ennui, and Embarrassment to the console, and the expansion is more mechanical than inspired. Each new emotion arrives as a character type rather than a psychological insight: Anxiety is neurotic and fast-talking, Ennui reclines on a couch, Embarrassment hides in his hoodie. The allegorical machinery, which in the first film felt like discovery, here feels like product design. Riley's adolescent crisis follows a trajectory that is, by Pixar's own standards, formulaic: the old emotions are sidelined, the new ones overcorrect, equilibrium is restored through a lesson about complexity.

    And yet the formula is not dishonest. An adolescence that uses happiness as its default setting, punctuated by hiccups of anxiety and self-doubt, is clichéd precisely because it is accurate: most children do experience puberty as a series of interruptions to a baseline they assumed was permanent. The panic attack sequence is the film's one moment of genuine formal ambition, and it strikes hard: the screen narrows, the colour drains, the internal voices collapse into static, and for thirty seconds the film captures something that most adult dramas about mental health fail to convey. That moment is relatable in a way that does not feel earned by the surrounding film so much as smuggled into it. I left with the sense of a studio that knows exactly what it is doing and no longer needs to risk anything to do it.

- title: "Kinds of Kindness"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/kinds-of-kindness.jpg"
  posted: "2024-08-03"
  revised: "2024-08-03"
  text: |
    *Poor Things* (2023) was made with Tony McNamara, not Efthimis Filippou; the warmth, the narrative momentum, the accessibility, those were collaborative inflections. ***Kinds of Kindness*** reads, partly, as an assertion of creative self, the film Lanthimos needed to make in the wake of the Academy's attention, a return to the coldness of *Dogtooth* (2009) in its refusal to accommodate. Lanthimos with Filippou is colder, stranger, and more interested in power as a structural feature of intimacy than as something to be escaped or redeemed. The three-part structure here is not an anthology in the conventional sense; it is a single argument made three times from different angles, each segment a variation on the theme of voluntary submission, the cult as the universal condition of belonging.

    The plausibility is the disturbing part. The cult in Ari Aster's *Midsommar* (2019) requires Sweden, rituals, a trip; Lanthimos's cult is just the social fabric, slightly skewed, operating through the same mechanisms of approval and punishment that govern ordinary life. Unlike Aster's sealed ritual space, the horror here arrives without blood or explicit enmity: the absorption is gentle, almost indistinguishable from care, a community composed of smiles and compassion whose members are alone in ways the smiles cannot cover. The film's deadpan tone is not affectlessness: it is the affectlessness of people who have metabolised their subjugation so thoroughly they can no longer feel the edges of it. Jesse Plemons across all three segments is extraordinary in precisely this way, each version of compliance subtly distinct.

    The critical consensus that ***Kinds of Kindness*** is Lanthimos on autopilot misreads what autopilot means here. His tics are not laziness; they are a consistent phenomenology of coercion, applied with greater clarity and precision than anything since *The Lobster* (2015). This is a film that trusts its audience to sit inside discomfort without being handed a way out, and the trust is earned. How could one not love it.

- title: "香火"
  title_en: "Incense"
  type: "film"
  creator: "Ning Hao"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/incense.jpg"
  posted: "2024-07-14"
  revised: "2024-07-14"
  text: |
    Ning Hao's debut is small-scale absurdism at full strength. A monk's temple is crumbling, its Buddha statue damaged beyond repair; he travels to the city to raise money for restoration and is robbed, scammed, cheated, and deceived at every turn by people no less desperate than himself. ***Incense*** runs ninety-seven minutes and wastes nothing. The camera follows the monk through a landscape of petty swindles with a documentary patience that owes more to Jia Zhangke's *Xiao Wu* (1997) than to any tradition of religious cinema, and the effect is not satirical distance but a grinding intimacy with a world where everyone steals from the person one rung below them.

    Little people rob, steal, and swindle from each other; above them, the officials sit smoking, drinking, and playing cards. This is not subtext; it is the film's structural principle. The monk's faith is sincere but immaterial: the money flows upward. The temple crumbles because nobody with power sees value in preserving it, and the distinction between active destruction and bureaucratic indifference is the space in which the film operates. Ning Hao would later become one of China's most commercially successful directors, but this first work has a rawness and a fury that his later comedies, however entertaining, never recovered. It is the film of a young man who has looked at the machinery of Chinese capitalism from the bottom and decided to describe exactly what he sees. The incense burns. The prayer goes unanswered. The bulldozer arrives on schedule.

- title: "偶然と想像"
  title_en: "Wheel of Fortune and Fantasy"
  type: "film"
  creator: "Ryusuke Hamaguchi"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/films/wheel-of-fortune-and-fantasy.jpg"
  posted: "2024-07-11"
  revised: "2024-07-11"
  text: |
    Hamaguchi's triptych works the same seam as *Drive My Car* (2021): the gap between what is rehearsed and what is felt, between the script people carry into a room and the thing that actually happens when they open their mouths. The first story, a love triangle conducted almost entirely in a taxi and a stairwell, is elegant and slightly airless. The second, a student's botched seduction of a professor via his own novel, is the most overtly literary and the most uneven; its interest in the erotic charge of language is real but its resolution feels contrived. ***Wheel of Fortune and Fantasy*** builds, and the building is the structure.

    The third story is extraordinary. Two women meet at a school reunion, recognise each other as old friends, and slowly discover that neither is who the other thinks she is. The mistaken identity could be farce; Hamaguchi makes it the occasion for something closer to grace. The conversation that follows, in which two strangers decide to inhabit the roles they have been assigned and speak truths they could not have spoken as themselves, is Hamaguchi's purest expression of what fiction can do: create a space where honesty becomes structurally possible. The emotion arrives not despite the artifice but through it, which is a paradox the film does not resolve so much as simply demonstrate. I left the cinema carrying the third story like a small, warm object, turning it over.

- title: "Tschick"
  title_en: "Goodbye Berlin"
  type: "film"
  creator: "Fatih Akin"
  creator_role: "dir."
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/films/tschick.jpg"
  posted: "2024-07-01"
  revised: "2024-07-01"
  text: |
    ***Goodbye Berlin*** performs a neat structural trick: it presents itself as a Bildungsroman, reveals itself to be a road movie, and then circles back to confirm that it was a Bildungsroman all along, the road being the mechanism through which the growing-up happens. Maik (Tristan Göbel), neglected by alcoholic parents, friendless and fourteen, is recruited by Tschick (Anand Batbileg), a Russian-German outsider with a stolen Lada and no particular destination, into a summer journey across the Brandenburg countryside. Wolfgang Herrndorf's source novel is beloved in Germany for good reason: it captures the specific texture of adolescent friendship, the way two lonely people can build, in the space of a few weeks, a private world with its own logic and vocabulary.

    Fatih Akin's adaptation is lighter than his usual mode, and the lightness suits the material. The encounters along the way, a homeless girl scavenging at a rubbish dump, a family of Serbian immigrants, an eccentric old man, are sketched quickly and warmly without tipping into picaresque formula. The unspoken gives the film its weight: Tschick's sexuality, which the film handles with a delicacy that avoids both the closet drama and the coming-out narrative; Maik's dawning recognition that his home life is not normal; the quiet understanding that this summer cannot last and that the Lada will eventually run out of road. It is not a film that reinvents its genre, but it inhabits the genre with enough warmth and specificity that the familiarity becomes a virtue. I left fond of both boys and faintly envious of Maik's hair.

- title: "隐入尘烟"
  title_en: "Return to Dust"
  type: "film"
  creator: "Li Ruijun"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/return-to-dust.jpg"
  posted: "2024-06-30"
  revised: "2024-06-30"
  text: |
    Li Ruijun shoots with the patience of someone who trusts that the world contains enough meaning if one waits long enough to see it. The cinematography of ***Return to Dust*** has the quality the original Chinese title gestures towards: things half-hidden, half-absorbed into their surroundings, a light that does not beautify so much as simply attend. Guiying (Hai Qing) and Youtie (Wu Renlin) are filmed this way too, not as subjects to be pitied or celebrated but as people living inside the same indifferent landscape that will eventually take them back.

    The film's politics are inscribed in its form. China's rural dispossession is not declaimed; it is demonstrated through the texture of what Guiying and Youtie must do each day to remain in existence. Their lives contain a specific kind of dignity that is invisible to the city logic surrounding them, a dignity the film refuses to explain or defend, simply records. The fact that the film was pulled from Chinese platforms makes this refusal feel even more pointed: the censors understood what a patient, humane gaze could do to their preferred narrative of rural modernisation.
    The love between them is clumsy and tenacious and entirely real. It is not the love of people who have chosen each other from a position of abundance; it is the love of people who have found each other at the edge of being discarded, and made something inside that edge. Their lives are not necessarily less meaningful than city people's. But they are the ones who are sacrificed, and the film knows it, and does not look away.

- title: "우리들"
  title_en: "The World of Us"
  type: "film"
  creator: "Yoon Ga-eun"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/films/world-of-us.jpg"
  posted: "2024-06-16"
  revised: "2024-06-16"
  text: |
    Yoon Ga-eun's debut films entirely at a child's eye level, and that commitment's precision makes ***The World of Us*** so piercing. Sun (Choi Soo-in) is quiet, introverted, routinely excluded by her classmates with the casual efficiency that children reserve for those who do not fit. During summer break she befriends Jia (Seol Hye-in), a transfer student, and for a few weeks the world reconfigures: they share secrets, invent games, build the private architecture that intense childhood friendships produce. Then school resumes, and Jia is absorbed into the popular group, the same girls who bullied Sun, and drops her. The betrayal is not dramatised; it simply happens, with the observational restraint of Koreeda at his best. There are no villains. Jia's defection is driven by her own precarious social and economic position: she cannot afford solidarity with the outcast.

    The question the film asks, with a quietness that makes the asking almost unbearable, is the one Sun asks herself: when do we play, then? The 왕따 phenomenon, the systematic exclusion that structures Korean schoolyard hierarchies, is not presented as aberration but as social fact: cruelty here is not innate but systemic, reproduced through peer pressure, class stratification, and the absence of adult structures capable of seeing it. Yoon never condescends to her child actors or to her audience. The camera stays low, the compositions are patient, and the emotional pitch is that of a child processing a wound she does not yet have the vocabulary to name. I left the film remembering every friendship that ended this way, and knowing that the silence afterwards was the worst part.

- title: "香蕉天堂"
  title_en: "Banana Paradise"
  type: "film"
  creator: "Wang Tung"
  creator_role: "dir."
  year: 1989
  eval: "disliked"
  image: "/assets/images/thoughts/films/banana-paradise.jpg"
  posted: "2024-06-10"
  revised: "2024-06-10"
  text: |
    Does anyone truly believe that a man who has been selfish and petty and small his entire life would suddenly find himself, and find clarity, after encountering a single rape narrative? The film wants to use identity fragmentation and the Mainlander experience in Taiwan as its critical frame, and those are real subjects. But underneath the framework sits a story about a backwards individual, lazy and incapable and constitutionally unwilling to learn, who simply rots as the times move past him, and whose rot the film treats as tragedy rather than judgement.

- title: "悪は存在しない"
  title_en: "Evil Does Not Exist"
  type: "film"
  creator: "Ryusuke Hamaguchi"
  creator_role: "dir."
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/films/evil-does-not-exist.jpg"
  posted: "2024-05-26"
  revised: "2024-05-26"
  text: |
    The glamping meeting scene is the film's centre of gravity, and the conversations in the car are almost everything else worth holding onto. Hamaguchi stages the town hall with his characteristic patience, the back-and-forth between corporate representatives and village residents building something dialectical, neither side simply right, the 'evil' of the title already complicating itself before it has been named. Then the film moves towards its conclusion and one begins to sense that Hamaguchi is circling something he cannot quite reach.

    The ending arrives as violence and then as black screen, and the interpretive latitude it offers feels like unresolved intention. If *Drive My Car* (2021) was as complete as it was, one suspects now that this had something to do with Murakami's architecture holding the material in shape: the plot mechanics, the theatrical readings, the emotional throughline, all provided by source material that Hamaguchi was free to inhabit and extend. Left to his own structural instincts, the pieces here do not assemble. The film ends with the uncomfortable feeling that the director knew this too.

- title: "밀양"
  title_en: "Secret Sunshine"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/secret-sunshine.jpg"
  posted: "2024-05-06"
  revised: "2024-05-06"
  text: |
    Shin-ae moves to Miryang, her dead husband's hometown, with her young son, seeking the quiet restart that grief sometimes promises and never delivers. When the son is kidnapped and murdered, the film could have become a revenge narrative or a courtroom drama; Lee Chang-dong makes it neither. Shin-ae converts to Christianity. The church community absorbs her with the warm, suffocating efficiency of an institution that has a script for suffering. She finds consolation, briefly, in the structure of faith, and then visits her son's killer in prison to offer forgiveness, the act the church has been preparing her for, only to discover that the killer has already found God and forgiven himself. The theft is total: he has taken her son, and now he has taken the one moral act she had left. Jeon Do-yeon's Cannes-winning performance captures the unravelling that follows not as spectacle but as erosion, a woman losing purchase on the surface of her own life one handhold at a time.

    The comparison with Lee's later *Poetry* (2010) is instructive. Both films centre on women confronting moral weight that should be unbearable: Shin-ae as victim, Mija as the grandmother of a perpetrator. ***Secret Sunshine*** asks whether faith can metabolise suffering; *Poetry* asks whether art can. Both arrive at the same scepticism, but the routes diverge: Secret Sunshine dramatises the failure of forgiveness as institutional claim, while Poetry dramatises the cost of empathy when complicity is structural. Song Kang-ho's Jong-chan, the mechanic who orbits Shin-ae with a quiet, secular tenderness the film never sentimentalises, provides the counterpoint the church cannot: care without theology, presence without programme. The title means 'secret sunshine', and Lee leaves it ambiguous whether the grace it names exists anywhere outside the word itself.

- title: "초록물고기"
  title_en: "Green Fish"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 1997
  eval: "liked"
  image: "/assets/images/thoughts/films/green-fish.jpg"
  posted: "2024-04-10"
  revised: "2024-04-10"
  text: |
    Lee Chang-dong's debut borrows from the gangster genre with the openness of a director who has not yet decided what his own cinema will sound like. Makdong (Han Suk-kyu), discharged from the army, returns to a Seoul that has swallowed his family's neighbourhood in concrete and expressways, and drifts into organised crime through the path of least resistance: a chance encounter with a woman, a debt of loyalty to her gangster boyfriend, the absence of any other structure to hold him. The plot is conventional enough that one can see the Kurosawa and Kitano shadows the early critics noted: the loyal foot-soldier, the doomed romance, the violence that arrives not as catharsis but as accounting. ***Green Fish*** does not transcend these conventions so much as inhabit them with an emotional seriousness that makes the formula feel temporarily inhabited.

    But the second half reveals something the genre framework cannot contain. The scenes between Makdong and his disintegrating family, the way Lee films economic displacement not as backdrop but as the engine of the narrative's tragedy, point directly towards the director who would make *Poetry* (2010) and *Oasis* (2002). The gangster plot is the surface; beneath it is a film about what happens to people when the city they grew up in is demolished and rebuilt without consulting them. Even the most formulaic plot cannot bury Lee Chang-dong's voice: the insistence that structural violence, the kind that does not announce itself, is the real subject, and that individual choices are legible only against the systems that constrain them. It is a first film in the best sense: one can see everything that will follow, and one can also see the director deciding, in real time, that he will need more than genre to say it.

- title: "Paris, Texas"
  type: "film"
  creator: "Wim Wenders"
  creator_role: "dir."
  year: 1984
  eval: "meh..."
  image: "/assets/images/thoughts/films/paris-texas.jpg"
  posted: "2024-04-01"
  revised: "2024-04-01"
  text: |
    Forty years ago the archetype was still legible as romance: the damaged, drifting man, the woman who loved him despite the cowbell he locked around her ankle, the paranoid possessiveness aestheticised as yearning. Sam Shepard's screenplay is beautiful in its construction of the American mythological landscape, the desert, the road, the gulf between interior life and language, and Robby Müller's cinematography earns every frame of its reputation. But the film depends entirely on Travis (Harry Dean Stanton) for its emotional weight, and the more honestly one examines his perspective, the more the beauty curdles. Jane (Nastassja Kinski) exists almost entirely as the object of Travis's guilt and memory; her appearance behind the peep-show glass is theoretically a deconstruction of the male gaze, the glass as literalised barrier, the reversed roles in the confessional monologue, but the film remains too in love with its own longing to follow the deconstruction through.

    Replace both women in the screenplay with their functions and the plot proceeds. Wenders remains a director one cannot quite fathom: a technical master in permanent service to a masculine interiority he never quite interrogates.

- title: "熱帶魚"
  title_en: "Tropical Fish"
  type: "film"
  creator: "Chen Yu-Hsun"
  creator_role: "dir."
  year: 1995
  eval: "loved"
  image: "/assets/images/thoughts/films/tropical-fish.jpg"
  posted: "2024-03-19"
  revised: "2024-03-19"
  text: |
    Chen Yu-Hsun's debut is one of the strangest and most tender films to emerge from 1990s Taiwan: a kidnapping comedy in which captivity is liberation, the criminals are warmer than the institutions, and the tropical fish of the title drift through the boy's dreams like emissaries from a world where pressure does not exist. Ah-Jiang (Lin Chia-hung), a junior high student drowning under Taiwan's joint entrance examination system, is taken hostage by a small-time crook and brought to rural Chiayi County, where the kidnapper's family, bumbling and generous and incapable of menace, proceed to treat him better than anyone in Taipei ever did. The premise sounds whimsical. It is not. The satire cuts precisely where it needs to: the examination system that reduces children to test scores, the media circus that converts a child's terror into spectacle, the urban-rural divide that makes the countryside simultaneously backwards and free. Wen Ying's performance as the kidnapper's aunt earned a Golden Horse and deserved it; she carries the film's moral pressure with a naturalism that makes every Taipei adult look like a caricature by comparison.

    ***Tropical Fish*** is magical realism rather than mere absurdism because its fantasy is sincere. The dream sequences, in which tropical fish swim through the air and the boy's imagination breaks free of every wall his waking life has built around him, are not decorative; they are the film's argument, a claim that the interior life of a child under institutional pressure is richer and stranger and more valuable than anything the institution measures. Chen Yu-Hsun is working in a different mode from the austere formalism of Hou Hsiao-Hsien or the architectural cool of Edward Yang: his Taiwan is loud, bilingual, chaotic, funny, and underneath the comedy there is a fury about what the system does to the young that never quite surfaces as polemic but never quite disappears either. The tropical fish are the thing the examination cannot quantify and the kidnapper cannot cage: the stubborn, ungovernable fact of a child's imagination. Wu Bai's soundtrack seals it. A film that should not cohere and coheres completely.

- title: "I Origins"
  type: "film"
  creator: "Mike Cahill"
  creator_role: "dir."
  year: 2014
  eval: "disliked"
  image: "/assets/images/thoughts/films/i-origins.jpg"
  posted: "2024-03-17"
  revised: "2024-03-17"
  text: |
    The first ten minutes of ***I Origins*** set up a premise with some genuine intrigue: a molecular biologist studying the evolution of the eye encounters a woman whose iris pattern challenges his materialist assumptions. After that, the science vanishes entirely, replaced by the kind of spiritual mysticism that films about scientists invariably reach for when the screenwriter runs out of research. The eye-pattern database, the reincarnation hypothesis, the trip to India: none of it withstands even cursory scrutiny from the discipline the film claims to inhabit. This would matter less if the film were honest about being a romance with metaphysical trappings, but it insists on its scientific credentials with an earnestness that makes the scientific illiteracy worse, not better.

    Two things about the film are troubling rather than merely incompetent. First: the protagonist's entire career appears to have been built on the labour of his female first-year PhD student, whose work he presents on television without acknowledgement, a dynamic the film treats as romance rather than exploitation. Second, and this is the one that ought to have sunk the film's reputation: a man brings an unrelated child back to his hotel room in a foreign country on the basis of an iris scan and a feeling, and the film frames this as spiritual revelation rather than the safeguarding crisis it plainly is. That this passed without remark tells one something about how readily audiences will forgive narrative logic when the packaging is sufficiently pretty. The packaging here is very pretty. The film is nonsense.

- title: "Robot Dreams"
  type: "film"
  creator: "Pablo Berger"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/robot-dreams.jpg"
  posted: "2024-03-13"
  revised: "2024-03-13"
  text: |
    ***Robot Dreams*** is a wordless film about a dog who builds a robot, and it destroyed me. Dog is lonely in 1980s New York; he orders a companion from a kit; they assemble each other's happiness over a single summer: rollerskating in Central Park, bowling, Coney Island. Earth, Wind & Fire's 'September' plays as they skate, and for a few minutes the film achieves a joy so unguarded it feels reckless. Then Dog and Robot fall asleep on the sand, and when Dog wakes the seawater has rusted Robot in place, immovable. He leaves to fetch tools; when he returns the beach is locked for the season, not reopening until June. The rest of the film is the aftermath: Dog trying to break back in, failing, the seasons turning, Robot dreaming of escape on the frozen sand. Pablo Berger, adapting Sara Varon's 2007 graphic novel, tells this story without a single word of dialogue, and the absence of language is not a constraint but the point. There is nothing to say. The loss has already happened.

    The film earns its power through refusal. Dog and Robot do not find each other again. They move on, separately, into lives that are not unhappy but carry the shape of the absence. Dog buys a new robot, Tin, and this time coats him with oil before the beach. Robot, salvaged from a junkyard and rebuilt by a raccoon with a boombox for a body, finds a life of his own. In the final sequence Robot spots Dog on the street below his rooftop; he imagines running down, and the fantasy dissolves. He stays hidden. He plays 'September' instead, and Dog, hearing it, dances on the pavement without knowing who is playing it. The film knows what most films about love refuse to admit: that the end of a relationship is not a failure of feeling but a fact of time, and that the people we lose do not stop existing; they simply continue elsewhere, carrying the same music. 'September' recurs in the final sequence, and I was in pieces. Not because the film is manipulative; it is the opposite of manipulative. Because it is true. Some friendships are perfect and finite, and the finitude is not a flaw but the condition of the perfection. I have not stopped thinking about it.

- title: "Dune: Part Two"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/dune-part-two.jpg"
  posted: "2024-03-03"
  revised: "2024-03-03"
  text: |
    The first Dune established a grammar, grandiose and patient and utterly committed to scale, and Part Two spends three hours conjugating it into something immense. Villeneuve's palette has never been more controlled: the gold-washed imperial interiors against the blue-black of Giedi Prime against the infinite buff of Arrakis, each world a fully realised phenomenology. The production design operates at the level where the film's ideas and its surfaces become indistinguishable. Hans Zimmer's score has learned to breathe more freely, less demonstrative than in the first film, more embedded in the images themselves.

    Paul's surrender is not triumph, and the critical discourse around Villeneuve's changes to Herbert's ending has not always foregrounded this clearly enough. Muad'Dib's final acceptance of the messianic role is a moral catastrophe rendered as spectacle, and Villeneuve is precise about the horror of it: the jihad is declared, the machinery of holy war begins to turn, and Chani's response is not argument but refusal. She takes up the maker hooks and mounts a sandworm and rides out into the open desert, and the film ends not on Paul's victory but on her departure.

    I wept uncontrollably. The tears were not for Paul (Timothée Chalamet), whose fate is exactly what he chose. They were for Chani (Zendaya), and for the particular clarity of her grief, and for the recognition that the most heroic act in the film is simply to leave. The last image is hers, not his.

- title: "남산의 부장들"
  title_en: "The Man Standing Next"
  type: "film"
  creator: "Woo Min-ho"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/man-standing-next.jpg"
  posted: "2024-02-19"
  revised: "2024-02-19"
  text: |
    The conventional narrative of the 10.26 Incident frames KCIA Director Kim Jae-gyu's assassination of Park Chung-hee as an act of political conscience: a man who could no longer serve a dictator and chose, at the decisive moment, democracy. ***The Man Standing Next*** dismantles this mythology with surgical patience. Woo Min-ho's film, based on the nonfiction account, constructs the forty days before the assassination as a claustrophobic power struggle in which Kim Gyu-pyeong (Lee Byung-hun, superb) is a bureaucrat watching the floor disappear beneath him. His rival, security chief Gwak Sang-cheon, is consolidating influence; the president's inner circle is contracting; the Busan-Masan uprising has made martial law a live possibility. Kim shoots the president after running out of room.

    The film's great insight is that self-preservation and political courage can produce identical outcomes, and that history does not care which one was operating. Lee Byung-hun plays the ambiguity without resolution: one watches his face in the final dinner scene and cannot determine whether what one sees is conviction, panic, or the point at which they become indistinguishable. The period detail is meticulous, the pacing is controlled, and the ensemble, particularly Lee Hee-joon as the swaggering Gwak, gives every scene the texture of men performing loyalty while calculating betrayal. The assassination itself is less important than the mechanism that made it inevitable: a system that concentrates power so absolutely that the only exit is violence, and then calls the violence revolutionary after the fact. The tide of history pushes different cogs to the shore. Some of them happen to be holding a gun.

- title: "서울의 봄"
  title_en: "12.12: The Day"
  type: "film"
  creator: "Kim Sung-su"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/1212.jpg"
  posted: "2024-02-12"
  revised: "2024-02-12"
  text: |
    Kim Sung-su compresses nine hours of the December 12, 1979 military coup into a thriller so taut it barely lets one breathe, and the formal achievement carries real political stakes. Seven weeks after Park Chung-hee's assassination, Major General Chun Doo-gwang (Hwang Jung-min, terrifying in his banality) mobilises troops without authorisation, arrests the Army Chief of Staff, and overwhelms the Capital Security Command led by Lee Tae-shin (Jung Woo-sung). The names are fictionalised; the history is not. ***12.12: The Day*** reconstructs the coup as what it was: not a revolution but a power grab by men who understood that the window between one dictatorship and the next was closing. Hwang Jung-min plays the coup leader with the specific charisma of a man who has confused ambition with destiny; Jung Woo-sung, as the loyalist commander who tries and fails to hold the constitutional line, provides the moral weight the film needs without ever becoming sentimental about it.

    Thirteen million admissions in South Korea is not a box-office figure; it is a referendum. The film arrived at a moment when Korean audiences were ready to look again at the machinery that produced Chun's dictatorship, the Gwangju Uprising, and the long road to 1987. ***12.12: The Day*** locates something more enduring than a political thriller: the insistence that the mainline narrative, the one that tells a nation its own history critically rather than triumphantly, is the only mainline narrative worth having. Reflexive patriotism tells citizens they were always brave; reflexive critique tells them the bravery was contested, contingent, and nearly lost. The film sides with the latter. It does not celebrate the loyalists who resisted so much as mourn the fact that resistance was not enough, and that the democratic spring the title names would take another eight years to arrive.

- title: "Louis CK: Back to the Garden"
  type: "film"
  creator: "Louis C.K."
  creator_role: "by"
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/louis-ck-back-to-the-garden.jpg"
  posted: "2024-02-05"
  revised: "2024-02-05"
  text: |
    The delivery is as sharp as it has ever been, which is saying something given the technical standard of the post-2017 specials. The bit about parents dying is extraordinary in the exact sense: the observation that one parent dies while the other seemingly never does, and it is never the one one would prefer, is delivered with the specific emotional logic of someone who has been thinking about mortality in an unusually careful and unusually honest way. It locates a feeling so precisely that the audience recognises it before they have time to decide whether they should.
    The thematic coherence is looser than in his peak specials. Louis C.K. was never really a narrative comedian in the Seinfeld or Chappelle sense, never someone whose hour builds to a single unified statement, and so the scattered quality of ***Back to the Garden***, recorded at Madison Square Garden, registers more as freedom than deficiency. The material moves between abortion laws, biblical literalism, and encounters with homeless men in New York with a confidence that does not need a through-line to hold.

- title: "Chłopi"
  title_en: "The Peasants"
  type: "film"
  creator: "DK & Hugh Welchman"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/chlopi.jpg"
  posted: "2024-02-04"
  revised: "2024-02-04"
  text: |
    *Loving Vincent* (2017) announced a technique: every frame a painting, actors filmed then rendered in oil, the entire history of Post-Impressionism conscripted into cinema. *The Peasants* (2023) makes lacerating use of what *Loving Vincent* (2017) only demonstrated. Where that film used Van Gogh's aesthetic as a kind of commemorative transport, here the Welchmans have found a visual language, Polish folk art with its flat planes and chaotic, saturated colour and its roots in embroidery and woodcut, that is not decorative but argumentative. The Summer chapter's turbulence is rendered in strokes so agitated and so densely packed that the image itself becomes overwhelming: form enacts content, bringing the film closer to Reymont's Nobel Prize-winning 1904 novel than any realist adaptation could manage.

    The Welchmans are telling an 1897 story in 2023 and the discovery, which the film presses on with quiet insistence, is that nothing has changed. The misogyny persists: the mechanisms by which a community decides which women are permissible and which must be expelled are as operational now as they were then, requiring only the update of their vocabulary. Jagna (Kamila Urzedowska) cannot win because the category of winning has been defined in advance to exclude her. By the end she has accepted this: not resigned to it, not broken by it, but stripped of the illusion that any meaningful act is available to her, and the acceptance is more suffocating than any overtly violent scene the film contains.

    I was close to tears at the end. Not from pity, which the film refuses to solicit, but from the recognition of a structure so durable it might as well be natural law.

- title: "Hereditary"
  type: "film"
  creator: "Ari Aster"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/hereditary.jpg"
  posted: "2024-01-17"
  revised: "2024-01-17"
  text: |
    Ari Aster's debut is most usefully understood as a film about conditioning. The horror does not arrive in discrete jolts; it is administered cumulatively, through sound design and framing and the patient repetition of images and gestures that will later be recontextualised with surgical precision. Colin Stetson's score trains the body to respond before the mind has processed the threat. The tongue-click, first introduced as a minor character detail, becomes by the end a kind of involuntary dread response, which is Pavlovian in the most exact clinical sense: Aster has associated the stimulus with the reaction so thoroughly that the sound alone is enough. Toni Collette's Annie is the instrument through which the conditioning registers: her performance operates on a frequency that most actors cannot reach, a grief so physically specific that one watches her body before one processes her words. By the time the car scene arrives, Aster has spent an hour teaching the audience to dread exactly this shape of loss, which makes it the single most unwatchable moment in twenty-first-century horror.

    The occult architecture is elaborate and well-researched, Paimon drawn from the Ars Goetia and woven into the family's history with a rigour that distinguishes it from the decorative Satanism of lesser films. What one sees in retrospect, knowing *Midsommar* (2019) and *Beau Is Afraid* (2023), is the DNA of an entire career: the closed system in which the protagonist has never had a choice, the horror as the revelation of a predetermined structure rather than a disruption of a safe one, the occult as a metaphor for the specific terror of inherited fate. Alex Wolff's Peter in the final act is a body being moved by forces he cannot name; his performance after Charlie's death, the morning-after scene in particular, is so precisely calibrated between shock and dissociation that the audience cannot tell where acting ends and genuine distress begins. ***Hereditary*** establishes all of this so completely and with such technical command that the subsequent films feel like elaborations of its first statement.

    The final sequence offers no catharsis and asks for none. The horror is that it is all perfectly logical.

- title: "Nu aștepta prea mult de la sfârșitul lumii"
  title_en: "Do Not Expect Too Much from the End of the World"
  type: "film"
  creator: "Radu Jude"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/do-not-expect.jpg"
  posted: "2023-12-27"
  revised: "2023-12-27"
  text: |
    I know nothing about Romanian history. I am not equipped to parse the quotations from Basho, Baudelaire, Bernhard, DeLillo, and Žižek that stud the film like footnotes in a novel that does not believe in novels. None of this mattered. ***Do Not Expect Too Much from the End of the World*** gave me, in one hundred and sixty-three minutes of a single day in Bucharest, the most fully realised, most alive character I encountered in cinema all year. Ilinca Manolache’s Angela is an overworked, underpaid production assistant driving across the city to interview workplace-accident victims for a corporate safety video. Between stops she produces TikTok rants as Bobiță, an Andrew Tate-esque filter-morphed grotesque who spews misogynistic filth with the practised cadence of someone metabolising an entire culture’s toxicity through satire. Jude shoots Angela’s odyssey in black and white, cramped aspect ratio, intercut with colour footage from Lucian Bratu’s 1981 film *Angela merge mai departe*, in which a different Angela, a female taxi driver, navigates the same streets under Ceaușescu. The two Angelas call and respond across forty years; Dorina Lazar and László Miske, who appeared in Bratu's original, return here as older versions of themselves, their bodies carrying the distance between the two Romanias. What has changed is the economic system; what has not changed is the exploitation.

    The film's second movement is the corporate video shoot itself, and the formal discipline turns cruel there. Ovidiu Pîrșan, playing himself, a real worker maimed on the job, is coached by the multinational's German marketing director (Nina Hoss, icily professional) to reshape his testimony: less blame, more personal responsibility, a version of events the corporation can distribute without liability. The fixed camera holds. Pîrșan adjusts his account, take after take, and what one watches is the real-time manufacture of a lie that will be called a 'safety awareness campaign', and the lie is built from the body of the person it was designed to protect. Jude has always understood that capitalism does not suppress the truth so much as commission a more profitable version of it; here the mechanism is laid bare with a patience that borders on cruelty. The roadside memorial crosses that flash past Angela's car, one for every traffic death on the E85 corridor, are the film's recurring image: the dead, acknowledged and uncounted. I came in knowing nothing about Romania. I left carrying the weight of one day in a city I have never visited, and the conviction that Radu Jude is making the most politically serious cinema in Europe.

- title: "Zielona granica"
  title_en: "Green Border"
  type: "film"
  creator: "Agnieszka Holland"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/films/zielona-granica.jpg"
  posted: "2023-12-26"
  revised: "2023-12-26"
  text: |
    Agnieszka Holland shoots the 2021 Poland-Belarus border crisis in black and white with a severity that refuses aestheticisation: the forest is not beautiful; it is the space where people die of exposure while two states use them as instruments of geopolitical leverage. ***Green Border*** follows a Syrian family, a Polish border guard, and a group of humanitarian activists through the same crisis from different angles, and the multi-perspective structure is the film’s strength and its limitation. The refugee experience is rendered with an unflinching physicality, the cold, the hunger, the cyclical deportation across the border and back, that earns its comparisons to documentary. The guard’s gradual moral erosion is credibly performed. The activists provide the ethical framework the film needs without becoming mouthpieces.

    Where the film falters is precisely where its humanitarian convictions are strongest. The visceral force of what Holland shows is undeniable; what she does not provide is a framework for understanding why it happens. The geopolitical machinery, Lukashenko’s weaponisation of refugees, the EU’s complicity in externalising its borders, Poland’s domestic politics, is gestured at but never structurally examined. One feels the suffering with absolute clarity and leaves with almost no analytical purchase on the systems that produce it. The PiS government’s hysterical response, comparing Holland to Nazi propagandists, a particularly vile accusation given that her father survived the Holocaust, tells one more about the film’s political context than the film itself manages to articulate. It is a serious, committed work of border cinema that describes the symptoms of a crisis without diagnosing the disease. The Venice Special Jury Prize was deserved; so is the reservation.

- title: "The Zone of Interest"
  type: "film"
  creator: "Jonathan Glazer"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/zone-of-interest.jpg"
  posted: "2023-12-25"
  revised: "2023-12-25"
  text: |
    Glazer's sound and image design make this one of the most formally unsettling Second World War films in a decade. Not a single moment is quiet. Children shriek with laughter in a garden thick with flowers while those beyond the wall are shrieking too; a gunshot cleaves the summer air; somewhere, machinery runs without ceasing. The camera does not flinch or recoil, because the camera does not know there is anything to flinch from. It sits in one indifferent corner after another, filming Rudolf Höss (Christian Friedel) managing his logistics, his promotion, his swimming pool, as though camp administration and career advancement were problems of the same order, which, for him, they are. Sandra Hüller's Hedwig is perhaps the more unsettling performance: she sorts through confiscated clothing with a shopper's eye, tries on a dead woman's lipstick, and admires herself in the mirror. The horror is that she is not performing cruelty. She is performing domesticity.

    Arendt wrote that the Nazi bureaucratic apparatus constructed a linguistic and procedural system allowing its officers to kill without reflection: the gas chambers were efficiency problems, the crematoria were throughput questions, and the officer who solved them well was doing his job well. Glazer has built a cinema equivalent of this system. One watches a brother play at being an officer gassing his sibling; one hears Hedwig tell her mother that she has become the queen of Auschwitz, and the pride in her voice is a domestic pride, the pride of a woman whose household is well ordered. No interiority is offered, because interiority is precisely what the perpetrators abolished in themselves.

    The warmest possible mise-en-scène, the garden, the light, the children's laughter, carries the film's argument: normalcy is not the opposite of atrocity but one of its enabling conditions. Johnnie Burn's sound design places the audience in the same structural position as the Höss family, hearing the camp without seeing it, pressing the horror back beyond the frame until imagination must do what the image refuses. The thermal-imaging nocturne sequences, in which a local girl hides apples for prisoners in the dark, are the only moments the film permits something like moral action; they arrive in a visual grammar so alien to the sunlit domesticity that surrounds them that goodness itself looks like it belongs to a different species. The wall between the garden and Auschwitz, Glazer has said, is a wall anyone can build. The film makes one believe it.

- title: "Perfect Days"
  type: "film"
  creator: "Wim Wenders"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/perfect-days.jpg"
  posted: "2023-12-20"
  revised: "2023-12-20"
  text: |
    In the daily routine repeated without end, one does not see Mr. Hirayama's loneliness. One does not see the 'great beauty of East Asia' that short reviews reach for, nor any glorification of the working class, nor a manifesto about the dignity of simple labour. One sees simply one person's life: the cassette tapes chosen each morning with the seriousness of a liturgical selection, the photographs of light through leaves accumulated in boxes under the bed, the Faulkner novel read by torch in a narrow room, the moment of stillness before the cleaning begins.

    The readings that want to make this into a statement, about mindfulness, about late capitalism's discontents, about the vanishing art of attention, are not wrong exactly, but they are performing a kind of critical restlessness that the film itself declines. Hirayama does not live simply as a rebuke to anything. He lives as he lives. Koji Yakusho's performance is the rarest thing in contemporary cinema: a portrayal of contentment that is not achieved at the cost of complexity, that carries the weight of everything renounced without dramatising the renunciation. The short reviews hell-bent on reading the film as some kind of manifesto are, frankly, baffling; they have mistaken a life for an argument.

- title: "あの夏、いちばん静かな海。"
  title_en: "A Scene at the Sea"
  type: "film"
  creator: "Takeshi Kitano"
  creator_role: "dir."
  year: 1991
  eval: "liked"
  image: "/assets/images/thoughts/films/a-scene-at-the-sea.jpg"
  posted: "2023-12-14"
  revised: "2023-12-14"
  text: |
    An anomaly in Kitano's filmography and a reminder of the range he contains. Shigeru (Claude Maki), a deaf-mute garbage collector, finds a broken surfboard and becomes consumed by the need to surf. His girlfriend Takako (Hiroko Oshima), equally deaf and mute, watches from the sand with a patience that is not passivity but devotion. ***A Scene at the Sea*** has almost no dialogue because its protagonists live in silence, and Kitano respects the silence completely. Where *Violent Cop* (1989) and *Boiling Point* (1990) operated through eruption, this film operates through stillness; the violence is replaced by the sea, which is just as indifferent and just as final.

    Joe Hisaishi’s score is, without overstatement, one of his finest: a simple piano theme that recurs like a tide, never insisting, never resolving. It gives the film a warmth that Kitano’s camera, characteristically fixed and patient, does not provide on its own. The ending is the sea taking what it wants, as the sea always does, and Takako waiting on an empty beach beside a surfboard and a pair of shoes that will not be collected. Kitano’s peculiar tenderness, the warmth that coexists with brutality in everything he makes, is here distilled to its essence. One watches two people who cannot speak to the world find a way to speak to each other, and the world does not care, and the film does not pretend otherwise. Quiet, strange, and full of a gentleness that Kitano’s other films keep buried under their violence.

- title: "怪物"
  title_en: "Monster"
  type: "film"
  creator: "Hirokazu Kore-eda"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/monster.jpg"
  posted: "2023-11-25"
  revised: "2023-11-25"
  text: |
    The structure of ***Monster*** arrives like a kind of epistemological ambush. The first chapter presents itself as a thriller about institutional negligence: a mother, Saori (Sakura Ando), watching the school's carefully managed face and knowing something is being hidden behind it. The audience joins her certainty, builds alongside it, feels the outrage accumulate. Then the film pivots to the teacher Hori (Eita Nagayama), and every certainty dissolves; the monster has migrated, the villain has become a victim, the school's stonewalling reveals new shape. By the time the third chapter arrives, the one that belongs to Minato (Soya Kurokawa) and Yori (Hinata Hiiragi), one understands that Kore-eda was never interested in the thriller machinery at all. The thriller was scaffolding.

    What Yuji Sakamoto's screenplay accomplishes, and what Kore-eda's direction metabolises into feeling, is the demonstration that the most suffocating structures of harm are not dramatic or even intentional: they are simply the aggregate weight of ordinary people failing to look directly at what is in front of them. The decoy themes, institutional cover-up, class resentment, even the surface reading of the film as a study in perspectival truth, peel away one by one. What remains is a friendship between two boys who are discovering something about themselves that the world around them has no language for, only interdictions. The third chapter earns its tenderness by having first shown the world that makes tenderness dangerous: Minato and Yori building a secret place together in an abandoned railcar, a private architecture that the adult world reads as aberration. Ryuichi Sakamoto's final score, submitted as individual piano pieces before his death, holds the film together in its most fragile moments with the particular authority of someone who had already said goodbye.

    Kore-eda has never been a director who reached for formal experimentation without reason. The radical structure here is not a display of craft; it is the argument. The film won the Queer Palm and the Best Screenplay prize at Cannes, both of which it had earned, though neither quite names its singular quality: the way it marshals structural sophistication entirely in the service of a very old, very simple subject. The final image, the two boys running through tall grass towards a light that may be the world or may be the end of it, is the first moment in the film where the camera lets them be free. I did not expect to name this my favourite film of 2023, but here we are.

- title: "Asteroid City"
  type: "film"
  creator: "Wes Anderson"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/asteroid-city.jpg"
  posted: "2023-07-24"
  revised: "2023-07-24"
  text: |
    After *The French Dispatch* (2021) I wrote a note to myself: Anderson has grown conscious of the detachment his long-cultivated style produces, and is now making that consciousness the subject. The French Dispatch remained in love with its own architecture, a film one admires the way one admires a beautifully printed magazine, at a slight and deliberate remove. ***Asteroid City*** goes further, makes the remove itself the wound. The quarantine at the film's centre, characters stranded in a desert town after an alien interruption that changes nothing and explains nothing, is Anderson's clearest allegory yet: for the pandemic's enforced stillness, for grief that cannot be processed because the ordinary machinery of life has stopped, for the way we reach for form and structure precisely when experience has become too raw to hold. The multi-layered metatheatrical frame, a television programme about a stage play about a fictional event, is not mere cleverness; it is the argument. Art does not resolve grief. It houses it.
    The window-ledge exchange between Augie (Jason Schwartzman) and Midge (Scarlett Johansson) in Act 3 is the only emotionally direct scene I have encountered in Anderson's recent work, two people speaking to each other across a threshold without the armour of irony or composition, using scripted dialogue to let the audience sense something real pressing through the performance. It works partly because everything surrounding it is so thoroughly mediated. Beyond that scene, every surge of feeling is buried deep in detail and text, accessible only to those willing to slow down inside the film's deliberate rhythms. The storytelling is considerably more coherent than *The French Dispatch* (2021), the filmmaking is Anderson's mature post-*Bottle Rocket* (1996) voice at full command, and the allusions accumulate into something capacious: mid-century American utopianism, the Cold War's peculiar anxiety, astrophysics as both wonder and dread. 'You can't wake up if you don't fall asleep' is not a resolution; it is a direction of travel, which is all Anderson is willing to offer, and all he needs to.

- title: "Oppenheimer"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/films/oppenheimer.jpg"
  posted: "2023-07-23"
  revised: "2023-07-23"
  text: |
    After *Tenet* (2020) one might have hoped the lesson was learned. It was not. For a sustained stretch somewhere in the film's middle hour, whole passages of dialogue are simply inaudible, swamped by Ludwig Göransson's score and Nolan's habitual conviction that the visceral and the legible need not coincide. Robert Downey Jr.'s Strauss is not a naturally projecting presence, his performance carefully calibrated to a quieter register, and so the details of the Senate hearing sequences, which carry the film's political argument, dissolve into texture. One fills in the gaps from prior knowledge of the history and feels dimly cheated for having to. This is not a stylistic choice that rewards; it is a recurring technical failure dressed as aesthetic philosophy.
    And yet. ***Oppenheimer*** is quintessential Nolan in all the ways that matter: the dense interlocking timelines, the cross-cut chronologies that keep deferring their own resolution, the accumulating weight of a man who understood exactly what he had done and was made to understand it again, institutionally, in the security hearings that stripped him of everything. The final third pulls the cord tight with an elegance Nolan rarely achieves: 'Now you have to face the consequences of your own achievement.' The Trinity test sequence earns its silence. Cillian Murphy carries the film's moral gravity without strain. The problems are real and the film survives them, which is itself a kind of verdict on Nolan's filmmaking, always more forceful than it has any right to be given how much it insists on working against itself.

- title: "Barbie"
  type: "film"
  creator: "Greta Gerwig"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/films/barbie.jpg"
  posted: "2023-07-23"
  revised: "2023-07-23"
  text: |
    The premise is absurdist and the execution relentless: in just under two hours, Gerwig and Baumbach smuggle in a meditation on personhood, on the impossible double bind of femininity, on what it costs to acquire interiority in a world that preferred one decorative, and on the strange dignity of choosing mortality, imperfection, a body that changes and ends. America Ferrera's Gloria monologue names the double bind with the compressed force of a manifesto, and the audience in the theatre where I saw it applauded, loudly, repeatedly, not as a courtesy but as something closer to relief. The film knows exactly what it is doing with its pinks and its plastics, using the visual grammar of commodity spectacle to say something that commodity spectacle normally works to suppress.
    As a film it is not quite a masterpiece: the Mattel corporate satire is too easy, the third act softens at moments where harder edges might have served better, and crowd-pleasers by definition cannot afford the risks that produce genuine formal greatness. But there is a version of cinematic experience that has nothing to do with formal perfection, a version in which the right film meets the right audience at the right cultural moment and produces something that exceeds any individual work's merits. That is what happened here. I left the theatre certain that something had been said that needed saying, in the loudest possible room, with the lights on. Please, no sequel.

- title: "Spider-Man: Across the Spider-Verse"
  type: "film"
  creator: "Joaquim Dos Santos, Kemp Powers & Justin K. Thompson"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/films/spider-man-across-the-spider-verse.jpg"
  posted: "2023-07-22"
  revised: "2023-07-22"
  text: |
    The innovations accumulate so fast one barely registers any single one before the next arrives: variable frame rates that give each universe its own temporal texture, Gwen Stacy (Hailee Steinfeld) in a world bleeding watercolour that shifts with her emotional state, the canon-event sequences rendered in stark noir black-and-white, and above all the comic-book annotations, Ben-Day dots and panel borders and thought bubbles that exist as genuine three-dimensional objects in the space of the animation, not decoration but grammar. Animated film has a territory that live-action cannot enter, and *Into the Spider-Verse* (2018) already mapped more of it than any film in years; ***Across the Spider-Verse*** extends that map in every direction simultaneously, inventing software and pipelines where existing tools ran out.

    The difficulty is that the film is a first half. The final twist arrives with the structural logic of something that was always there, latent in everything that preceded it, and detonates; then the credits roll, and one is left holding an incomplete circuit. Every formal choice carries narrative weight, which is the only test that matters, and the film passes it brilliantly for two hours before declining to finish the exam. The emotional logic of Miles's (Shameik Moore) refusal of the canon-event framework is powerful, but it is also, by the film's own admission, an argument that has not yet been tested by consequences. The technical ambition remains staggering. The story it serves is, for now, a promissory note.

- title: "Sicario"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/films/sicario.jpg"
  posted: "2023-06-27"
  revised: "2023-06-27"
  text: |
    The official genre is crime thriller. The actual subject is a person watching her own moral framework dissolve in real time, and finding there is nothing beneath it. Kate Macer (Emily Blunt) enters the film believing in systems, in law, in the idea that state power and ethical action can occupy the same space; the film spends its runtime methodically demonstrating that this belief is a luxury, maintained only by not looking too closely. Villeneuve and Roger Deakins shoot her diminishment with extraordinary precision: the plastic bag at her feet on the flight to Juárez, an object of mundane wrongness that she cannot name; the last wash of desert light before the interdiction corridor opens and the night-vision takes over, beauty folded into impending violence until the two become indistinguishable.

    The helplessness is more important than the violence, a physical sensation, something that rises from the gut rather than registering in the mind. The trigger that cannot be pulled is not a moral victory; it is the last point at which she exists as a subject rather than an instrument. Taylor Sheridan's script understands that the most honest thing a film about American drug policy can do is refuse its protagonist, and the audience, the resolution they came prepared to receive. One leaves not disturbed exactly, but altered, carrying a weight that does not belong to fiction.

- title: "Hannah Gadsby: Something Special"
  type: "film"
  creator: "Hannah Gadsby"
  creator_role: "by"
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/hannah-gadsby-something-special.jpg"
  posted: "2023-05-19"
  revised: "2023-05-19"
  text: |
    The final callback connects so cleanly, with such structural precision, that one suspects the whole hour was built backwards from that single moment. The proposal bit, Gadsby's account of the panicky, derailed, spectacularly botched proposal to Jenney Shamash, would justify the hour on its own; the stretch in the middle where the rhythm briefly loosens is the only demurral.

    The comparison to *Nanette* (2018) is unavoidable, and *Something Special* invites it deliberately. In *Nanette* (2018), Gadsby anatomised the callback as a mechanism for artificially resolving tension, a comedic sleight-of-hand that papers over unhealed wounds. Here, the callback returns, deployed freely and warmly, and the argument implicit in that choice is more interesting than anything said aloud: that the same structural device can signify harm or health depending entirely on the psychic position from which it is deployed. What was once a trap is now just a tool. Gadsby is happy, and the form reflects it, and it is a quietly radical thing to watch a comedian allow the shape of their work to change because their life has. The special is built around a wedding, around queer joy, around the domestic, and it treats these subjects with the same intellectual seriousness it once directed at trauma. This is the rarer achievement.

- title: "Nope"
  type: "film"
  creator: "Jordan Peele"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/nope.jpg"
  posted: "2023-04-29"
  revised: "2023-04-29"
  text: |
    A horror film in which visual control is taken to its absolute limit. Hoyte van Hoytema shoots the Californian high desert on large-format IMAX film, and every frame is strikingly beautiful in the way that vast, indifferent things are beautiful: not inviting, not safe, but impossible to look away from. This is formally appropriate, because ***Nope*** is a film about the compulsion to look, about the economy of spectacle and the violence that underwrites it, and Peele has structured it so that the terror never requires one to squint through the dread. Every minute is frightening. The aesthetics and the argument are the same argument.
    The Gordy subplot is the key that unlocks the rest of the film: a chimp on a sitcom set, trained and exhibited and finally ungovernable, mirrors the alien entity not as metaphor but as structural rhyme. Both are wild things enlisted into the spectacle machine; both exact a cost when the contract breaks down. The film's deepest subject is the history of that machine and who has paid to run it, from the uncredited Black jockey in Muybridge's motion studies onward, and Peele trusts the intelligence of his audience enough not to annotate it. I dismissed the film last year on the basis of its middling reputation. I now regret that deeply, and consider it an instructive lesson in the limits of aggregated taste.

- title: "The Hours"
  type: "film"
  creator: "Stephen Daldry"
  creator_role: "dir."
  year: 2002
  eval: "liked"
  image: "/assets/images/thoughts/films/hours.jpg"
  posted: "2023-04-24"
  revised: "2023-04-24"
  text: |
    ***The Hours*** holds three timelines in suspension, and David Hare's screenplay keeps them from collapsing into each other by finding the precise points of structural resonance: a woman reading, a woman choosing, a woman refusing to be managed, the same act refracted across 1923, 1951, and 2001, each instance informing the others without explaining them. The film is adapted from Michael Cunningham's novel, which is itself a meditation on *Mrs Dalloway* (1925), and the risk of nested literary homage at this depth is that the whole edifice becomes airless, a demonstration of influence rather than an experience of it. Not entirely escaped: Meryl Streep's 2001 Clarissa moves through a New York literary world that has aged less evocatively than the other two timelines, and the structural parallels in her scenes sometimes feel governed by the architecture rather than by their own necessity.

    Nicole Kidman's monologue at the station, Julianne Moore's at the dining table: the performers locate something that exists prior to the literary scaffolding, a quality of desperation that Woolf would have recognised but that belongs equally to these specific women in these specific moments. Philip Glass's score is the fourth structural element, its cycling piano phrases working not as emotional underlining but as something closer to a formal argument: the same interval returning and returning, never quite resolved, because resolution is not what the film is interested in. The two timelines that work are among the most carefully felt achievements in literary adaptation; the third holds the film just short of where it might have reached. Those monologues, and that score, carry it remarkably far regardless.

- title: "The Lost Daughter"
  type: "film"
  creator: "Maggie Gyllenhaal"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/lost-daughter.jpg"
  posted: "2023-04-23"
  revised: "2023-04-23"
  text: |
    Jessie Buckley appearing was a surprise, and a welcome one. She plays the younger Leda in flashback, and the film's gambit depends on one accepting that Olivia Colman and Buckley are the same character at different ages and the same interiority at different pressures, the same impulses made legible by the presence of the other. Gyllenhaal makes that gambit pay. The adaptation from Ferrante's novella retains the source's discomfort: its refusal to resolve the question of whether Leda's choices were the right ones, its insistence that ambivalence is not a failure of character but a condition of consciousness in a world that offers women incompatible lives.
    The final scene struck with exactly the force of *Aftersun* (2022). That is high praise and also a precise description: the same quality of accumulated, quiet devastation, the same sense of something that was present throughout the film finally finding its name in the last possible moment. That name is not stated. It does not need to be.

- title: "The Whale"
  type: "film"
  creator: "Darren Aronofsky"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/whale.jpg"
  posted: "2023-04-09"
  revised: "2023-04-09"
  text: |
    In the daughter's essay, she writes that *Moby Dick* (1851)'s boring chapters, all those exhaustive taxonomies of blubber and rigging, exist for one purpose: to spare the reader from the sad story of Ahab's life. It is the most precise description of this film one has yet encountered, and the original review found it before any critic did. The critical consensus reached for 'monument', for 'a chamber piece of grief and grace'. More honestly: boring chapters. Charlie's 600-pound body, the compulsive eating, the claustrophobic aspect ratio boxing him into that apartment: these are the cetological digressions, the scaffolding of deflection. Aronofsky and Samuel D. Hunter's adaptation understands, perhaps more than it is given credit for, that the body is not the subject. The body is the evasion.
    The body evades something simpler and less cinematic: a man who loved someone, lost them, and decided the only appropriate response was to become unrecognisable. Alan's death is the wound the film circles without ever quite pressing. Brendan Fraser's performance holds because he never plays the fat suit; he plays the grief underneath it, the specific quality of a person who has decided, at some cellular level, to be done. Hong Chau's Liz is the film's most honest presence, too exhausted for pity, too loyal to leave. Sadie Sink's fury as the daughter is almost too clean, almost too legible as instrument of catharsis. But then the essay arrives.

    Does Charlie make peace with himself at the end? The film ends on an image, not an answer. He rises: literally, improbably, the body finally doing what it has refused for years. Whether this is redemption or simply the last convulsion of a system shutting down is left to one's own need for resolution. One suspects Aronofsky wants it both ways, and one suspects that is the correct artistic instinct. Some whales are too large to land cleanly. The boring chapters were always the point.

- title: "오아시스"
  title_en: "Oasis"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/oasis.jpg"
  posted: "2023-03-24"
  revised: "2023-03-24"
  text: |
    Sol Kyung-gu's Jong-du walks out of prison in the opening minutes and within an hour of screen time has done something unforgivable. Lee Chang-dong does not soften it, does not cut away to the magical-realist interlude fast enough to mitigate what is happening, does not ask for sympathy prematurely. The assault is there, on the screen, wrong. The film then stays with this wrongness more seriously than almost anything Korean cinema has attempted.

    Gong-ju lives in a dark apartment, warehoused by a family for whom her existence is a bureaucratic inconvenience; Jong-du is an ex-convict who took the blame for his brother's crime and received neither gratitude nor recognition for it. The social contract has failed both of them in entirely different ways, and the film refuses to pretend that this shared exclusion makes them equivalent, or makes what happened between them sanctioned. The quieter and less comfortable claim is that a man who has governed his impulses this badly can still perform an act as precise and tender as cutting down the tree branch whose shadow terrified her, that desire and care are not allocated only to those who have already demonstrated themselves worthy of them.

    The magical-realist sequences, in which the palsy lifts and Gong-ju moves freely through her own apartment, are heartbreaking in inverse proportion to how briefly they last. Moon So-ri's performance is one of the most committed physical transformations in the cinema of this period, achieved without prosthetics, without softening. When the film ends one is not certain that anything has been resolved. When do the mad find each other. The ***oasis*** is not an escape from the question; it is the question, briefly habitable.

- title: "椒麻堂会"
  title_en: "A New Old Play"
  type: "film"
  creator: "Qiu Jiongjiong"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/a-new-old-play.jpg"
  posted: "2023-03-21"
  revised: "2023-03-21"
  text: |
    Honesty first: by the end of three hours, one could not claim everything had clicked into place. The architecture of Qiu Jiongjiong's Sichuan opera epic is too eccentric, too deliberately resistant to the satisfactions of conventional closure, for that kind of tidy accounting. Fake Monk moves through the entire span of twentieth-century Chinese history, from the Republican era through the Cultural Revolution and into Reform, and the film watches him go with the calm of something that has already accepted the futility of conclusions.

    The textures lodge in the memory more than the through-lines: the painted backdrops of hand-made sets that never pretend to be anything but sets; the Yin-Yang borderland tavern with its pandas, presiding over the transition between life and whatever follows; the wall-poster slogans layered over one another like geological strata of political instruction; the lice on the children's bodies; the maggots in the excrement. Qiu is a painter first and the film looks like one, non-naturalistic and precise in its artifice. One can, inexplicably, imagine him having tremendous fun making it, the cast having tremendous fun performing it, everyone in on a private joke about the relationship between spectacle and suffering that Sichuan opera has known since long before any of them were born.
    The comparisons that assembled themselves while watching, shadows of other directors moving at the edge of the frame, remained stubbornly unresolved by the credits. Not Hou, not Apichatpong, though the film shares genealogical material with both. Something more singular than either, and less finished. A thoroughly singular film that does not know, or does not care, whether it has succeeded. That might be the most honest position available to a work of this ambition.

- title: "The Florida Project"
  type: "film"
  creator: "Sean Baker"
  creator_role: "dir."
  year: 2017
  eval: "liked"
  image: "/assets/images/thoughts/films/florida-project.jpg"
  posted: "2023-03-20"
  revised: "2023-03-20"
  text: |
    The children act with a skill so complete it stops being remarkable and becomes simply the world of the film: Brooklynn Prince's Moonee is one of those performances that makes one distrust the very concept of performance, because there is no seam between the child and the character. Willem Dafoe's Bobby, the motel manager, holds the other side of the frame: too aware of what is coming, too decent to look away, never empowered to intervene. The emotional temperature climbs sharply through the final third, accumulating with the precision of someone who knows exactly how much one can hold before something breaks. And then it breaks, correctly, completely.

    The iPhone-shot epilogue is maddening. One understands the practical logic, the guerrilla filming inside Disney World, the aesthetic argument about childhood's different visual language. One understands it and remains unmoved by the argument: a film that has operated at this level of formal control for ninety minutes cannot simply switch to a different camera and call the rupture intentional. The ending as it stands before those final minutes is the ending the film deserves. Clean, specific, unsparing. It loses to *Gagarine* (2020) in the final reckoning, which says something about what a film can do with a similar repertoire of images, similarly marginalised children, and a camera that stays the course.

- title: "Drive My Car"
  type: "film"
  creator: "Ryusuke Hamaguchi"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/drive-my-car.jpg"
  posted: "2023-03-07"
  revised: "2023-03-07"
  text: |
    Murakami's stories are probably like this too. Take '*Barn Burning*' (1983) as an example: suffused from start to finish with a kind of spirituality and inexplicable strangeness, a plotlessness that is not emptiness but something closer to held breath. ***Drive My Car*** is the same. Hidetoshi Nishijima's Kafuku is a man who has stopped listening to his own grief, and at an unhurried pace the film draws out the most important dialogues and performances, trusting that the repetition of Chekhov's lines across the multilingual *Uncle Vanya* rehearsals will do, slowly, what grief does: return one again and again to the same words until one understands them differently.
    The film's force lies not in the three-hour runtime but in the brevity of certain scenes: that brief exchange at the waste disposal site, which arrives quietly and passes quietly, and yet concentrates the film's entire emotional argument into two or three minutes of parking-lot light. The quietness of a road film, the patience of a theatrical rehearsal, and an emotional depth not far from that of *Burning* (2018), which is to say: something that does not resolve, but opens.

- title: "Im Westen nichts Neues"
  title_en: "All Quiet on the Western Front"
  type: "film"
  creator: "Edward Berger"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/all-quiet-on-the-western-front.jpg"
  posted: "2023-02-12"
  revised: "2023-02-12"
  text: |
    Every few years a film like this arrives. Five years before, it was *Dunkirk* (2017), which gave the chaos of retreat its own grammar of sound and image. Two years before, it was *1917* (2019), which made the logic of the front visceral through the unbroken gaze of a single day. And then ***All Quiet on the Western Front***: Felix Kammerer's Paul Bäumer enlisting full of patriotic ardour, and the film's cold, steady insistence on showing exactly what that ardour buys. The addition of the armistice subplot, with Daniel Brühl as the beleaguered Erzberger, absent from earlier adaptations, turns the film into something almost unbearably pointed: men dying by the minute while diplomats negotiate over lunch, the clock running down to eleven o'clock on November eleventh, the war ending by schedule while necessity has already become irrelevant. One of the great anti-war films.

- title: "Aftersun"
  type: "film"
  creator: "Charlotte Wells"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/aftersun.jpg"
  posted: "2023-02-11"
  revised: "2023-02-11"
  text: |
    Adult Sophie is thirty-one, the age her father Calum (Paul Mescal) was when they took their last holiday together at a Turkish resort in 1999. She was eleven then (Frankie Corio, in her screen debut); and he was young enough that other guests assumed they were siblings. She has the footage and almost nothing else: a few scenes of the two of them goofing around, his face half-cut by the frame, his voice audible but his attention already elsewhere. ***Aftersun*** is built from what that footage can and cannot show. Charlotte Wells constructs three visual layers and lets them bleed into each other: the MiniDV recordings Sophie actually has, the 35mm scenes she imagines from moments she did not witness, and a strobe-lit rave that belongs to neither past nor present, where adult Sophie tries to reach a man who is no longer there. It is a film about memory as reconstruction, and it is almost impossible to write about without simplifying what it refuses to explain.

    The holiday itself is full of warmth, which is why it devastates. Calum teaches Sophie to play pool, buys her ice cream, arranges a mud bath day trip, lets her stay up too late with older kids by the pool. But Wells keeps the camera on him when Sophie leaves the frame: practising tai chi on the balcony at dawn, reading self-help books, walking into the ocean alone at night until the water closes over him. He weeps on the hotel bed after his birthday; Sophie arranged for tourists to sing for him, and he watched stoically, then fell apart in private. His arm is in a cast that the film never explains. When Sophie signs them both up for karaoke night, Calum cannot bring himself to join her on stage; she sings R.E.M.'s 'Losing My Religion' alone, and the camera holds on their backs afterwards, never aligned, as he offers singing lessons instead of an apology. Sophie sees all of this and none of it: she is eleven, and the grammar for what her father is going through does not exist in her vocabulary yet.
    The film ends with Queen and Bowie's 'Under Pressure'. At the resort, Calum dances to the last song of the night, and Sophie watches him from across the floor. Wells cuts between this and the rave, where adult Sophie fights through the strobe to reach him; Oliver Coates's remix strips the song to isolated vocals, dissonant drones, and a low cello, until what was once a pop song becomes unrecognisable, stripped to the frequency of grief. She finds him, briefly. They hold each other. Then he slips from her arms and walks away, through a corridor, through a door, into the flashing dark. The camcorder footage plays on, showing a man who loved his daughter completely and could not stay, and a girl who will spend twenty years learning to read what she watched.

- title: "Make Happy"
  type: "film"
  creator: "Bo Burnham"
  creator_role: "by"
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/films/make-happy.jpg"
  posted: "2023-01-29"
  revised: "2023-01-29"
  text: |
    The title is the trap. '***Make Happy***' names the transaction at the centre of every comedy special: the performer's obligation, the audience's expectation, the implicit contract that the evening will end with everyone feeling good. Burnham spends an hour honouring that contract with almost terrifying precision: the lighting rigs, the key changes, the callback structures, the songs that pivot from parody to sincerity mid-verse. The command of the stage is total; every visual cue and musical swerve has been calibrated to within an inch of its life. One watches not so much for the jokes, which are sharp, as for the spectacle of a twenty-five-year-old conducting an arena with the authority of a seasoned theatre director.

    The rot eating through the centre turns it from bravura display into something stranger. The performance is, explicitly, the problem: the better Burnham makes the audience feel, the more he implicates both parties in a transaction that leaves him hollow. The final sequence, after the lights go down and the crowd is dismissed, is among the most nakedly honest things one has seen in what is nominally a comedy context. Not honest in the confessional-podcast sense, but structurally honest: the form itself cracks open, and what's inside is not pathos performed for effect but something that has been there the whole time, held at arm's length by the sheer proficiency of the show. 'Are You Happy?' is the question addressed to himself, alone on the stage, and the silence that follows it has no punchline. The predecessor to '*Inside*', but perhaps the sharper diagnosis: the illness was already fully legible in 2016.

- title: "Taylor Tomlinson: Look at You"
  type: "film"
  creator: "Taylor Tomlinson"
  creator_role: "by"
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/taylor-tomlinson-look-at-you.jpg"
  posted: "2023-01-27"
  revised: "2023-01-27"
  text: |
    There is a received idea in stand-up that the best comedy requires a certain willingness to wound: to go for the throat, to risk offence as evidence of seriousness, to make the audience slightly uncomfortable with itself. The corollary is that clean comedy is soft comedy, that the refusal to be offensive is a failure of nerve. Tomlinson makes the whole framework look provincial. Her material on her bipolar disorder diagnosis, her upbringing in evangelical Christianity, the specific texture of her romantic self-sabotage, is as dark as anything the edgelord tradition produces; it simply doesn't require collateral damage to get there. The craft underneath is almost suspiciously tight: setups that seem digressive turn out to be necessary, callbacks arrive from unexpected angles, and the tonal management between confession and absurdism is handled with a lightness that conceals enormous structural work.

    She has identified, whether consciously or not, that the transgression the good male comedians traffic in is itself a kind of safety: shock as a substitute for actual exposure. Tomlinson is more exposed, and more precise, and funnier. That one walks away from this special feeling neither implicated nor depleted is not a sign of its gentleness. It is a sign of its intelligence.

- title: "Drew Michael: Red Blue Green"
  type: "film"
  creator: "Drew Michael"
  creator_role: "by"
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/drew-michael-red-blue-green.jpg"
  posted: "2023-01-23"
  revised: "2023-01-23"
  text: |
    One goes in expecting the bare-stage minimalism of his 2018 HBO debut, that experiment in performing anxiety at close range with no audience and near-darkness for cover, and finds instead something harder to categorise. Red, Blue, Green names the American political tripartism the special is orbiting: the two tribal colours locked in their defining relation with each other, and the green as the position that refuses both terms. The philosophical architecture is Žižekian in the best sense, not in the sense of name-dropping Lacan, but in the specific sense of using the joke as the shortest distance between an audience and an ideological contradiction it has been trained not to see. Several sequences give one that particular vertigo of watching someone think faster than the room can follow.
    The Žižek comparison has limits, which Michael himself half-acknowledges: where Žižek's digressions are the point, some of Michael's feel like a thinker who has not yet found the right vessel for every idea. The final five minutes are the clearest instance of this: a sustained, flickering argument collapses into something closer to a summary, a tl;dr that underestimates what the preceding hour has already built. It is a genuine misstep, and a frustrating one, because the rest of the special earns an attention one does not usually bring to stand-up. One of one's favourites regardless. The ideas are worth the stumble.

- title: "The Batman"
  type: "film"
  creator: "Matt Reeves"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/batman.jpg"
  posted: "2023-01-08"
  revised: "2023-01-08"
  text: |
    Among DC films it stands second only to Nolan's trilogy, which is already an unusual achievement for a franchise that has spent the better part of a decade mistaking scale for weight. Reeves's film has something more granular and harder to engineer: an understanding of rain as atmosphere and argument. Greig Fraser's cinematography makes Gotham's perpetual wetness into a moral condition: corruption as weather, the city's rot expressed through the particular way neon reflects in standing water, the way every crime scene is also a study in fluid dynamics. One has not seen rain used so deliberately in recent cinema: it belongs to the film's ethics rather than its aesthetics.
    The length, nearly three hours, generates the anxiety it is supposed to dispel in critics, but the film does not bloat because Reeves understands that pace is a function of attention, not of cutting rate. Robert Pattinson's Batman is a traumatised detective narrating a city he cannot save, and the film takes seriously the ethical asymmetry between his methods and his stated goals in a way no prior DC iteration has managed. The Riddler's terrorism-as-grievance arc is handled without the usual genre flinch: the film does not refuse to follow the logic of its villain's worldview to its uncomfortable conclusions, and the psychological collision between Batman and a figure who shares his class rage but not his self-restraint reaches heights DC has not touched in a long time.

- title: "Tár"
  type: "film"
  creator: "Todd Field"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/films/tár.jpg"
  posted: "2023-01-01"
  revised: "2023-01-01"
  text: |
    The cancel arc that structures the final act is too familiar by now: the accumulated complaints, the viral clip, the institutional withdrawal of support. Field executes it with the same meticulous hand he brings to everything else, which only makes the conventionality more apparent. Blanchett's performance resists conventionality entirely, operating in a mode so precise and so interior that one can watch the same scene twice and come away with a different account of what Lydia ***Tár*** is actually doing. The patterns she perceives, in the music, in her pursuers, in the acoustic bleed of the world: whether these are paranoia or perception, whether the film knows the difference, one suspects no one will ever settle the question.

- title: "The Banshees of Inisherin"
  type: "film"
  creator: "Martin McDonagh"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/banshees-of-inisherin.jpg"
  posted: "2023-01-01"
  revised: "2023-01-01"
  text: |
    Every line of dialogue is doing two jobs at once. On the surface: Colin Farrell's Pádraic and Brendan Gleeson's Colm on a small island in 1923, one of whom has decided without explanation to end a long friendship, and the consequences of that decision spiralling outward into damage that cannot be undone. Underneath: the Irish *Civil War*, audible in the cannon-fire drifting from the mainland, refracted into this private conflict between two people who were once inseparable and are now enacting in miniature the same logic of principled, irrecoverable rupture. McDonagh has always worked at the intersection of the absurd and the devastatingly specific, but here the surrealism is structural, built into the premise rather than applied from above: a man cutting off his own fingers as the terms of a peace that is not peace.
    The emotional collisions are saturating because the framework holds them so precisely. Grief, cruelty, bewilderment, the particular loneliness of the kind person in a world that has decided kindness is not enough: all of it holds. Colin Farrell's performance is a beautiful thing, open-faced and undefended in a way that makes the accumulating damage almost unbearable to watch.

- title: "The English Patient"
  type: "film"
  creator: "Anthony Minghella"
  creator_role: "dir."
  year: 1996
  eval: "loved"
  image: "/assets/images/thoughts/films/english-patient.jpg"
  posted: "2022-11-21"
  revised: "2022-11-21"
  text: |
    Memory and landscape are the same thing in ***The English Patient***: the desert is not a setting but a psychic condition, indifferent to national borders and lethal to anyone who mistakes its beauty for permission. Long after the plot has dissolved, the images outlast the romance between Almásy and Katherine: Ralph Fiennes's Count Almásy crossing the Saharan emptiness with Kristin Scott Thomas's Katherine dead in his arms, her weight against the heat, the sheer defiant absurdity of the gesture. One carries that image the way one carries certain lines of poetry, not as information but as sensation.
    Minghella compresses and reorders Ondaatje's novel, amplifying the central affair while quieting the postcolonial textures that surround it; critics who found the film a romanticisation of the colonial gaze are not wrong, exactly, but they are accounting for a different film than the one Minghella made. The Swimmers' Cave, with its prehistoric rock paintings of figures moving through a sea that no longer exists, gives the story its true scale: not tragedy as plot mechanism but tragedy as geological fact, as the record of what was once possible in a world that has since dried out. Kip and Hana's promise to meet at the church stays because they already know it will not be kept. The film earns its devastation by refusing to explain it.

- title: "Otac na službenom putu"
  title_en: "When Father Was Away on Business"
  type: "film"
  creator: "Emir Kusturica"
  creator_role: "dir."
  year: 1985
  eval: "liked"
  image: "/assets/images/thoughts/films/when-father-was-away-on-business.jpg"
  posted: "2022-10-17"
  revised: "2022-10-17"
  text: |
    The film is narrated by Malik, but it belongs to the women. Through the Informbiro purges, through Meša's denunciation and his labour camp and his womanising and his return, two women move who were never truly loved their entire lives, and Kusturica and Abdulah Sidran refuse to sentimentalise either the politics or the marriage that frames them. The child's perspective, episodic and half-comprehending, creates the dramatic irony Kusturica needs: we see the full weight of what ideology has done to a family precisely because Malik cannot.

    The quietest question hangs over everything: who truly loves whom? Malik truly loves Sasha. The answer is a child's, unqualified and complete, offered against a backdrop in which adults have almost entirely forgotten how.

- title: "Neal Brennan: 3 Mics"
  type: "film"
  creator: "Neal Brennan"
  creator_role: "by"
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/films/neal-brennan-3-mics.jpg"
  posted: "2022-08-26"
  revised: "2022-08-26"
  text: |
    Three microphones on a bare stage: one for one-liners, one for stand-up, one for what Brennan calls 'emotional stuff'. The conceit sounds like a therapy exercise dressed up as a format, and frankly it is, and the staging makes no pretence otherwise. Critics were quick to position it alongside the wave of confessional comedy that *Nanette* (2018) would later crystallise into a genre, but Brennan got there earlier and without the retrospective theorising. The one-liners are sharp enough that the pivots to the centre mic never feel like relief; they feel like a change in atmospheric pressure.

    The story about Brennan's father is the emotional hinge. Brennan's father had ten children with four women and, by all accounts, treated none of them well; Brennan tells the story with a compression that makes the pauses between sentences carry the weight. Obviously staged, those pauses, rehearsed into apparent spontaneity through months of Off-Broadway performance before Netflix ever touched it. It doesn't matter. The story has been worn smooth; Brennan has told it enough times to find its exact shape. Some emotions don't require rawness to transmit; they require precision. Emotions transcend time and space, as the original note says, and this one crosses the footlights intact every time.

- title: "色，戒"
  title_en: "Lust, Caution"
  type: "film"
  creator: "Ang Lee"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/lust-caution.jpg"
  posted: "2022-08-14"
  revised: "2022-08-14"
  text: |
    Eileen Chang's novella is a cold, compressed thing: a woman who mistakes embodied desire for political commitment and pays for the confusion with her life. Ang Lee's adaptation won the Golden Lion at Venice and generated a great deal of noise about its explicit sex scenes, which was in many ways the wrong argument to have. The scenes are not provocation but epistemology: they are how the film tracks the redistribution of power between Wang Jiazhi and Mr. Yee, the shift from her instrumentalising his desire to something more catastrophic and mutual. The mahjong sequences perform the same function with their clothes on. Rodrigo Prieto's cinematography keeps everything lush and airless simultaneously, the occupied Shanghai interiors beautiful in the way that traps are beautiful.

    Tang Wei's performance is, without qualification, one of the great debut performances in cinema. She has to be at least four things at once: the student activist, the operative, the woman lost in what she thought she was only performing, and the person who in her final moments before execution chooses, again, to live for someone else. That last compound of self-erasure and genuine feeling is the film's impossible centre, and she holds it. The irony the original note identifies is real and worth sitting with: Tang Wei was effectively blacklisted from mainland Chinese media following the film's release, her advertisements pulled, her career in China dismantled, while Tony Leung, who shared every explicit scene, faced no consequences whatsoever. The film is about a woman used by everyone around her and then discarded; its aftermath reproduced the structure precisely.

- title: "かぐや姫の物語"
  title_en: "The Tale of Princess Kaguya"
  type: "film"
  creator: "Isao Takahata"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/tale-of-princess-kaguya.jpg"
  posted: "2022-07-29"
  revised: "2022-07-29"
  text: |
    The theory formed during the film and hasn't dissolved since: Kaguya spends her entire life living for men and the social order men built. Her father is the engine of her conformity, projecting onto her a vision of noble femininity that has nothing to do with who she is; her mother is the opposite pole, representing the natural life and the individual she might have been, but entirely without the authority to protect her. The court offers not elevation but a more elaborate form of captivity. Takahata's source material, the ancient Taketori Monogatari, treats Kaguya as an object of male longing; he gives her interiority, grief, and a rage so intense that the flight sequence, when she tears through the village in desperation, becomes one of animation's most viscerally honest moments.

    The ascension at the film's end is not rescue. The moon-people arrive with their lotus procession and their forgetfulness, and there is something unmistakably funerary about it: the lunar robe carries an uncanny echo of the Meng Po soup, that Chinese mythology's instrument of oblivion, the draught that strips a soul of everything it knew before sending it onward. Kaguya weeps as the robe settles over her shoulders. She has finally found in the woodcutter's grandson, in the seasons, in the particular texture of the world she was exiled into, something worth living for; and the moon takes it all away. One is not watching a return to celestial origin. One is watching a silent death, grief transmuted into visual poetry so fine it barely announces what it is. 虫　鳥　獣　草　木　花

- title: "The Painted Veil"
  type: "film"
  creator: "John Curran"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/painted-veil.jpg"
  posted: "2022-07-05"
  revised: "2022-07-05"
  text: |
    John Curran shot on location in Guangxi province, and the landscape does what landscape can only do when it is real: the mist over the mountains, the cholera-stricken village, the particular quality of light in a place that has never accommodated the people passing through it, all of it pressing on the characters in ways that studio work cannot simulate. Alexandre Desplat's score keeps the emotional temperature from tipping into sentimentality, and Ron Nyswaner's screenplay is disciplined about what it takes from Somerset Maugham and what it quietly sets aside. Maugham's novel is a colder thing, more sardonic about Kitty, less interested in redemption as a category; the film softens this, which is a concession, and one that Maugham purists reasonably note. Set against the world of Westerners living in China during the colonial period, though, the film's emotional texture is flawless: the discomfort of privilege in a place it has damaged, the impossibility of genuine connection across the distance that colonialism manufactures even between two people who love each other, all of it present without being declaimed.

    Short in runtime and every character fully dimensional. Edward Norton's Walter Fane, bacteriologist, is a man who chose medicine because it was the only arena in which his emotional rigidity could pass as virtue; Naomi Watts's Kitty moves from opacity to something genuine without the transformation being announced. The quietest film, the most fluid. It stays.

- title: "Ricky Gervais: SuperNature"
  type: "film"
  creator: "Ricky Gervais"
  creator_role: "by"
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/ricky-gervais-supernature.jpg"
  posted: "2022-05-26"
  revised: "2022-05-26"
  text: |
    Markedly different from *Humanity* (2018), *Politics* (2004), *Animals* (2003), and the earlier specials. The material is looser: the show calls itself SuperNature but relatively little of it is about the supernatural, and there is considerably more reliance on offence and irony, more of those so-called 'dark jokes', which is also why there is more self-clarification than before. The controversy was predictable and, in its broad outlines, not entirely without basis: the trans material walks a line that not everyone will find it walks successfully, and the irony defence, deployed mid-set, is a formal risk that the audience has to accept or reject in real time. One does not see this as a regression. The self-clarification is part of the argument, not a concession to it; Gervais is interested in the mechanism of offence, in what the joke reveals about the listener as much as the told, and the self-aware structure is the means of that investigation rather than a retreat from it.
    The comparison with Jimmy Carr is instructive. There is a kind of dark comedian who operates by accumulating transgression, by stockpiling the forbidden: the joke is simply that the thing has been said. Gervais has never been that comedian, and the distance between the two positions has widened into something more like a gulf. *SuperNature* is the stand-up set that has made one laugh the most in recent years, and it is not close. The Jimmy Carrs of the world could perhaps have shared a stage with Ricky Gervais five or ten years ago. They cannot anymore.

- title: "Die Wannseekonferenz"
  title_en: "The Wannsee Conference"
  type: "film"
  creator: "Matti Geschonneck"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/films/die-wannseekonferenz.jpg"
  posted: "2022-05-18"
  revised: "2022-05-18"
  text: |
    Quite disappointing, and the disappointment has a formal source: the film cannot decide what it is. As dramatic reconstruction it does a poor job of dissecting the historical record or metabolising information into something an audience can feel rather than merely register; as documentary it refuses the tools that might make the material illuminating. The film feels like reading conference minutes for ninety minutes, the horror present at the level of content but absent at the level of form. The comparison with the 2001 HBO film *Conspiracy* (2001), with Kenneth Branagh as Heydrich, is not flattering to Geschonneck: that earlier version understood that bureaucratic evil requires a specific dramatic architecture, one that makes the banality visible as banality rather than simply presenting it.

    The performances are the one unambiguous achievement. The cast captures that nonchalant, administrative quality with precision: men who discuss genocide the way one discusses supply logistics, the indifference itself a form of violence. There are a few moments that strike with real unease. But the body of Holocaust cinema is already rich with works that make the horror legible in its full inhumanity: this one adds almost nothing to that inheritance.

- title: "The French Dispatch"
  type: "film"
  creator: "Wes Anderson"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/french-dispatch.jpg"
  posted: "2022-01-17"
  revised: "2022-01-17"
  text: |
    'Try to make it sound like you wrote it that way on purpose.' That line, spoken by Bill Murray's Arthur Howitzer Jr. to one of his writers, is both editorial advice and a compressed statement of Wes Anderson's entire method: the artefact so controlled that it no longer reads as control but as inevitability. ***The French Dispatch*** is, on its surface, a celebration of humanist magazine journalism, of the idiosyncratic mind let loose on a subject it loves. The technical and visual dimension is obvious. The emotional life underneath the symmetry is less expected.

    The film's force lies in the stories' withholding: the painter behind glass, the journalist who keeps her professional distance even at the cost of connection, the student leader whose revolutionary moment is already receding by the time it arrives. Each figure seems to be enclosed within an invisible wall, surrounded by companions and yet alone in a way the companions cannot touch, sealed inside their own obsession. This is precisely the loneliness that Anderson's detached, mechanical filmmaking style is equipped to capture: isolation rendered as aesthetic system, grief held at arm's length and thereby made visible.
    Long-time Anderson viewers will find the film both familiar and disorienting; the disorientation comes from 'moving' and 'delicate' being exactly the right words, which they rarely are for his work. Of all his films, The French Dispatch is the most tender. One does not always notice tenderness when it is this well-armoured.

- title: "Don't Look Up"
  type: "film"
  creator: "Adam McKay"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/films/dont-look-up.jpg"
  posted: "2022-01-11"
  revised: "2022-01-11"
  text: |
    The satirical premise is sound, and when the film connects it connects with real force: Leonardo DiCaprio's Dr. Randall Mindy, transformed from a nervous academic into a media-managed celebrity scientist, is his finest comic work, and the bureaucratic inertia of the Planetary Defence sequences has the bleak accuracy of genuine institutional satire. The problem is inconsistency of confidence. McKay seems uncertain whether he is making a film or delivering a brief, and that uncertainty produces sequences, particularly the two post-credits additions and the film's broader treatments of political media, that abandon the tone entirely for something closer to sketch comedy. 'Dark comedy' names a tonal contract; one cannot honour it selectively. The satire is good when it trusts itself. Everything else is carried by DiCaprio, which is a narrow base for a film of this ambition.

- title: "The Last Duel"
  type: "film"
  creator: "Ridley Scott"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/last-duel.jpg"
  posted: "2022-01-02"
  revised: "2022-01-02"
  text: |
    To call it a medieval 'Me Too' film is accurate but insufficient, the label flattening what the film does with the *Rashomon* (1950) structure into something tidier than it deserves. Whatever the outcome, whatever the truth of the matter, everything remains about men: their reputations and their rights, their fiefs and their property. The film's most telling formal gesture is the one it makes with chapter titles. All three chapters are titled 'The truth according to' their respective subjects; but in chapter three, the words 'according to Lady Marguerite' fade from the screen, leaving only: 'the truth.' The quiet certainty of that subtitle is more devastating than any argument the film could have made aloud.
    Matt Damon's Carrouges is the film's structural hinge and its most deliberately uncomfortable achievement. He pursues the duel not for Marguerite but for his own punctured honour, and the screenplay written with Nicole Holofcener never lets one forget it. The stud horse scene, so briefly placed and so precisely chosen, is the most emblematic metaphor in the entire film: Carrouges inspecting the animal's breeding potential with the same proprietary satisfaction he brings to every claim he makes on Marguerite. Adam Driver's Le Gris, by contrast, is the film's most unsettling figure precisely because the film allows him charm: the second chapter presents a man who genuinely believes his own version, and the audience's brief inclination to believe it with him is the trap. Jodie Comer carries chapter three with a stillness that accumulates unbearable weight. Her victory at the end is not a triumph; it is survival, and the film does not pretend otherwise.

    The duel sequence itself is as physically and viscerally gripping as anything in *Game of Thrones* (2011), the mud and desperation stripping the ritual of any glamour. But the shot after it is harder to shake: a woman watching, free for now but tethered to a world that will never actually change its mind about her. Scott has made brutal, masculine spectacles for forty years. This one finally knows what it is looking at.

- title: "Blade Runner 2049"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/films/blade-runner-2049.jpg"
  posted: "2021-08-01"
  revised: "2021-08-01"
  text: |
    The proposition is ancient: creator and created, much like giver and receiver, seeking to erect an order of domination built on the accident of origin, an order that declares itself permanent. The ending is therefore self-evident from early in the film's runtime; the question it is actually asking is not what will happen but whether the structure can survive contact with the feeling it generates. It cannot, and the film knows it cannot, and that foreknowledge gives every frame a quality of elegy.

    Villeneuve and Roger Deakins fully realise a particular science-fictional imagination, one whose closest cinematic antecedent is Tarkovsky's *Solaris* (1972): the idea that outer space, or its equivalent, is finally a mirror for interior states, and that the most advanced imaging technology is most useful when it renders smallness rather than spectacle. Ryan Gosling's K moves through that world with the melancholy of someone discovering that even his most intimate feelings may have been manufactured, while Ana de Armas's Joi and Harrison Ford's Deckard give the film its two most piercing variations on love as projection and ruin. Everything that *Solaris* gestured towards but Soviet-era cinema could not render at full visual scale is here given that scale. Deakins' Oscar for this film was overdue by a decade; the protein farm alone, the holographic sea, the Las Vegas ruins in their orange haze, constitute a visual argument that commercial cinema can still aspire to the sacred.

- title: "Stalker"
  type: "film"
  creator: "Andrei Tarkovsky"
  creator_role: "dir."
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/films/stalker.jpg"
  posted: "2021-07-28"
  revised: "2021-07-28"
  text: |
    The city is sepia; the Zone is colour. The transition happens during the trolley ride, and Tarkovsky designs it so that one cannot pinpoint the exact frame where the world changes. This is the first argument the film makes: faith does not arrive as a discrete event. It saturates. The Zone itself, Tarkovsky insisted, does not symbolise anything: 'The Zone is a zone, it's life, and as a man makes his way across it he may break down or he may come through.' The three men carry themselves into it more than they move towards anything inside. The Writer (Anatoly Solonitsyn) carries the exhaustion of a man who no longer believes his own talent; the Professor (Nikolai Grinko) carries a twenty-kiloton bomb; the Stalker (Alexander Kaidanovsky) carries nothing but the faith that the journey itself is sufficient. He is, as Tarkovsky said, 'invincible because of his faith and his will to serve others,' but the invincibility looks like weakness, like the willingness to weep in a puddle while stronger men argue above him.

    The Room grants not what one wishes but what one is. Porcupine entered wishing to resurrect his brother and received wealth instead, because the Room saw his essence more clearly than he could. Then Porcupine hanged himself. This is the knowledge that paralyses all three at the threshold: the Writer refuses because he will not 'pour the filth in my soul on to anyone's head'; the Professor reveals his bomb but cannot detonate it; the Stalker, whose faith depends on the Room's existence, cannot risk discovering that the Room does not work. Nobody crosses. The climax of a two-and-a-half-hour journey through alien territory is three men sitting in the rain outside a door they cannot bring themselves to open. The film does not punish them for this. It holds the shot while rain falls inside the Room and stops, while the three faces register everything the Room would have shown them if they had entered, and it asks nothing further.
    Then the return. Sepia again, the Stalker's cramped apartment, his daughter Monkey reading at the table. She appears to push three glasses across the surface with her mind while Beethoven's 'Ode to Joy' plays half-buried under the noise of a passing train. The glasses move after the vibration stops. In the film's opening, a glass moved from train vibration alone; at the end, the causal order inverts. Whether this is miracle or coincidence is not the question the film is asking. The question is simpler: the Zone's colour leaked into this final scene despite it being set in the city, the apartment filmed in the same palette as the alien territory the men could not bring themselves to enter. Faith has done something to the world around it, and the film's last image is a child born already marked by something her father spent his life guiding others towards and could never claim for himself.

- title: "Django Unchained"
  type: "film"
  creator: "Quentin Tarantino"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/films/django-unchained.jpg"
  posted: "2021-07-26"
  revised: "2021-07-26"
  text: |
    A story of the utmost simplicity, with only one dramatic reversal in the whole film, yet the screenplay and cinematography still manage to lead one by the hand. Robert Richardson's widescreen compositions, all amber plantation interiors pressing against sunblasted exteriors, do something more than establish period: they externalise the argument that beauty and atrocity are not opposites but neighbours. Jamie Foxx's Django moves through that beauty with a silence that the film gradually fills with purpose, and having now seen several of Tarantino's pictures, I think I understand: his films are about the sheer visceral pleasure of watching.

    The usual objection is that pleasure is the wrong response to slavery. Fair enough, and the argument has been made with real force. But Tarantino's method is not exactly naivety, and it is not exactly exploitation either. By routing the liberation fantasy through genre, through the Spaghetti Western and blaxploitation traditions, through the Nibelung myth translated into Mississippi soil, he creates a frame inside which the audience's enjoyment becomes the subject. The sensation of vast historical weight and suffocating helplessness pressing against each other on screen is something precious few directors can produce. That Christoph Waltz's Dr Schultz must die precisely because his Enlightenment scruples cannot survive Candie's world is not sentimentality. It is the film's most honest admission: some moral positions cost everything, and the screen does not protect one from the bill.

- title: "Inglourious Basterds"
  type: "film"
  creator: "Quentin Tarantino"
  creator_role: "dir."
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/films/inglourious-basterds.jpg"
  posted: "2021-07-19"
  revised: "2021-07-19"
  text: |
    A masterwork of Hitchcock-style tension: every chapter makes one's palms sweat, and the climax of the final chapter is, ironically, the least brilliant of the lot. Tarantino applies Hitchcock's distinction between surprise and suspense with rare thoroughness. Surprise gives the audience one second of shock; suspense gives it twenty minutes of dread. The bomb under the table, as Hitchcock famously put it. In ***Inglourious Basterds***, the audience carries the weight of dramatic irony through nearly every scene, watching conversations unfold with the knowledge that any word could detonate the situation.

    The tavern sequence in Chapter Four is the purest expression of this: a room full of people who know almost everything except the one thing that would save them. Tarantino's camera holds on a face, a hand, a glass of whisky, and the accumulated stillness becomes agonising. Christoph Waltz's Hans Landa belongs in the company of Hitchcock's most charming antagonists: danger located entirely in pleasantness, in the virtuoso performance of social grace. Opposite him, Brad Pitt's Aldo Raine and Mélanie Laurent's Shosanna give the film its two counter-forces: blunt theatrical vengeance on one side, patient and self-consuming vengeance on the other. The film is also, at another level, a meditation on cinema itself as a weapon, a fantasy of history rewritten through the sheer force of the image. It makes one newly aware of breathing.

- title: "The Lobster"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2015
  eval: "liked"
  image: "/assets/images/thoughts/films/lobster.jpg"
  posted: "2021-07-11"
  revised: "2021-07-11"
  text: |
    The metaphor is obvious; so obvious the film sometimes feels like a pile of stacked metaphors, each one labelled. Two totalitarian regimes, the Hotel's enforced coupling and the Loners' enforced solitude, frame the space between them as the only territory where something like authentic desire might exist, except of course that territory is also a trap. Lanthimos works in the tradition of alienation effects, flat delivery and ritualistic movement and classical music laid over mundane violence, and when the method is working it produces the cold clarity of thought made flesh.

    Certain passages feel closer to cinematic poetry, to the pure image and sensation one finds in *The Colour of Pomegranates* (1969). But the plot keeps pulling one out of the imagery and the metaphorical mode, back into the mechanics of allegory, and here the allegory strains against the particularity it needs, the mechanics of the metaphor crowding out the texture of actual life. The score's use of the tritone is equally heavy-handed: the cello staccato motif is striking and apt at first, the diabolus in musica as social prescription, but deploying the same motif unchanged in the second half starts to feel like laziness rather than rigour. All that said, on balance the virtues outweigh the flaws. The film earns its Cannes Jury Prize. It earns it, and it knows it, and that smugness is its most human quality.

- title: "They Live"
  type: "film"
  creator: "John Carpenter"
  creator_role: "dir."
  year: 1988
  eval: "meh..."
  image: "/assets/images/thoughts/films/they-live.jpg"
  posted: "2021-07-11"
  revised: "2021-07-11"
  text: |
    I came here via Žižek, which is probably both the most honest and the most damning thing one can say about a film. The sunglasses are a near-perfect materialisation of what Žižek calls 'going through the fantasy': the ideological curtain not hidden behind reality but constituting it, readable only once one learns to look. OBEY. CONSUME. MARRY AND REPRODUCE. The subliminal grammar of late capitalism rendered in neon, legible at last. Carpenter made the film as a direct assault on Reaganite consumerism, and that directness is both its strength and its limitation. Roddy Piper's Nada and Keith David's Frank are less characters than social positions forced into collision, which is exactly why the film can afford its bluntness.

    The discomfort is not with the politics but with the method. Old cinema's reflex is to externalise everything: inner resistance becomes a six-minute alley brawl, ideology becomes a physical pair of glasses one can put on and take off. The metaphor does not breathe; it overflows the frame. Žižek reaches for this film precisely because the interpretation almost writes itself, which is to say the film does the critic's work for him. There is something faintly disappointing in that. Carpenter's rage is genuine, the allegory is effective, and yet one leaves feeling the film has been more useful to theory than to cinema.

- title: "Dallas Buyers Club"
  type: "film"
  creator: "Jean-Marc Vallée"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/dallas-buyers-club.jpg"
  posted: "2021-07-09"
  revised: "2021-07-09"
  text: |
    Jean-Marc Vallée's film does something event-based drama rarely manages: it moves one not through accumulated sentiment but through a specific, located image. McConaughey surrounded by monarchs, the butterflies indifferent to his dying body, and the waterworks simply would not stop from that moment on. The scene earns its beauty because nothing before it has been beautiful in that way; the film's visual grammar is otherwise raw, handheld, documentary-adjacent, and the sudden stillness strikes like a blow. McConaughey lost nearly fifty pounds for this role and the performance goes far beyond the physicality: Ron Woodroof begins as a homophobic rodeo cowboy and ends as an unlikely advocate, and the transformation never once feels schematic.

    The film has since accumulated a retrospective criticism worth absorbing: Rayon is a composite fictional character, and casting Jared Leto, however fully committed, in a transgender role raises questions the film itself cannot answer. The libertarian framing of the FDA as villain has been read as politically convenient, sidelining the collective activism of ACT UP in favour of a lone-wolf narrative. These are real tensions, and they sit inside the film whether one wants them to or not. And yet Leto's performance remains, whatever one thinks of the casting: there is a scene where Rayon, dying, visits her estranged father in a suit, and the controlled devastation Leto brings to it belongs to a different, better film straining to get out. Jared Leto was, for a period, made for roles that demand this kind of dissolution.

    Vallée holds the whole thing together through restraint: the camera never editorialises, the score never tells one what to feel, and the film's political anger stays in the body rather than the dialogue. It is not a perfect film. It is a powerful one, and the butterflies refuse to leave.

- title: "Mighty Aphrodite"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1995
  eval: "loved"
  image: "/assets/images/thoughts/films/mighty-aphrodite.jpg"
  posted: "2021-06-28"
  revised: "2021-06-28"
  text: |
    Like more than half of Allen's films it centres on a couple in marital crisis, but here the arrival of a child is itself half the source of conflict: adoption as the event that crystallises, rather than resolves, every unspoken tension between Lenny and Amanda. The domestic comedy is familiar Allen territory; what is not familiar is the frame. The Greek chorus, shot at the ancient theatre of Taormina in Sicily and led by F. Murray Abraham with the weary authority of a man who has seen this particular tragedy too many times, is parody and genuine moral commentary at once. Cassandra prophesies and is ignored; Tiresias holds court; the chorus expresses exasperation in chorus, the classical machinery of fate grinding against the banality of *Manhattan* (1979) real estate and neurotic self-deception. The anachronism is the joke, but the joke earns its keep.
    Mira Sorvino's Linda Ash, the biological mother Lenny unearths, is the film's quiet gravitational point, and the Academy Award was not wrong. She is written as lowbrow, naive, cheerfully indestructible, and Sorvino plays her without condescension, making Linda the only character in the film who seems entirely at peace with who she is. The comedy of Lenny's Aristophanic hubris, his need to locate and improve the source of his son's genetic inheritance, rebounds off her imperviousness to improvement. Allen choreographs the collision between the elevated classical frame and Linda's cheerfully unreconstructed existence with the timing of someone who has spent fifty years listening to jazz: each cut lands where the beat falls. Impulse drives everyone in this film slightly mad, and it is all the more pleasurable for that.

- title: "Radio Days"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1987
  eval: "loved"
  image: "/assets/images/thoughts/films/radio-days.jpg"
  posted: "2021-06-27"
  revised: "2021-06-27"
  text: |
    Allen has always been a filmmaker of voices, but ***Radio Days*** is the film where the voice is the subject. The unnamed narrator, Allen himself, circles through a mosaic of 1940s Queens and Manhattan memories without ever quite landing in one: a story begins, glows briefly, and gives way to another, the whole structure mimicking the experience of tuning a dial through stations late at night. The comparison to Fellini's *Amarcord* (1973) is inevitable and not wrong, but where Fellini's nostalgia has a peasant's earthiness, Allen's is urban, bookish, shot through with the particular frequency of radio: a medium that required the listener to build the world from sound alone, the way memory builds it from what survives.
    The radio binds the film's scattered episodes together the way a melody binds variations: Rockaway and Manhattan, working-class family and glamorous studio, all tuned to the same signal. The film accumulates grief rather than mere warmth because radio voices are the voices of people one never sees, and memory works the same way. Allen's narrator confesses uncertainty, skips over gaps, romanticises without apology, because the point is not reconstruction but feeling: the feeling of a world that existed in full and is now accessible only as signal, and a weakening one at that. From one story to the next, from domestic comedy to radio studio to Rockaway beach, everything circles around voices that belong only to the past. These voices only get dimmer and dimmer.

- title: "Det sjunde inseglet"
  title_en: "The Seventh Seal"
  type: "film"
  creator: "Ingmar Bergman"
  creator_role: "dir."
  year: 1957
  eval: "loved"
  image: "/assets/images/thoughts/films/seventh-seal.jpg"
  posted: "2021-06-27"
  revised: "2021-06-27"
  text: |
    Antonius Block (Max von Sydow, twenty-seven and already carrying the weight of a man who has been alive too long) plays chess with Death because the game is all he has: a delay of the inevitable while he searches for something worth the delay. He confesses his strategy to a hooded figure he takes for a priest. The figure is Death, who replies: 'I'll remember that.' Block says he wants to perform 'one meaningful deed.' At the witch-burning, he begs the condemned girl to show him the Devil, because the Devil must know God. She tells him to look into her eyes. He looks and sees only terror. Jöns (Gunnar Björnstrand) delivers what I think is the film's most devastating speech: 'Her poor brain has just made a discovery. Emptiness under the moon... We stand powerless, our arms hanging at our sides, because we see what she sees, and our terror and hers are the same.' Block insists: 'It can't be so!' But her hands have been broken by the villagers, and God says nothing. Gunnar Fischer's hard sidelighting and German Expressionist chiaroscuro give the sky a luminosity that belongs to another physics entirely, and the faces it illuminates are the faces of people who have asked the question and received nothing back.

    What Block finds instead of God is a bowl of wild strawberries and a cup of milk shared with Jof (Nils Poppe) and Mia (Bibi Andersson), a juggler and his wife with their infant son Mikael. Their names suggest Joseph and Mary. The strawberries and milk are a secular Eucharist: natural elements requiring no human process, offered without ceremony, received without irony. Block promises to remember this hour of peace for the rest of his life, and the promise is sincere because the rest of his life is short. His 'one meaningful deed' arrives not as theology but as strategy: he knocks over the chess pieces to distract Death while the holy family escapes. Total self-sacrifice as a diversion, a move Death cannot comprehend because it serves no one's interest, least of all the man who makes it. The Dance of Death on the hilltop at dawn, that famous silhouette that Bergman improvised with remaining crew and bewildered tourists when he saw the sky, is the image the film was always moving towards: Block's search for God answered by an accident of light, the figures silhouetted against a dramatic cloud that had nothing to do with the script. Jof sees the vision and describes it from a safe distance, his family beside him, the rain washing the tears from the dancers' faces, and it is precisely because he never sought God that he is the only one left to watch.

- title: "Manhattan Murder Mystery"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1993
  eval: "loved"
  image: "/assets/images/thoughts/films/manhattan-murder-mystery.jpg"
  posted: "2021-06-25"
  revised: "2021-06-25"
  text: |
    Allen made *Husbands and Wives* (1992) in 1992 with a handheld camera and the energy of a controlled demolition, every marriage in it cracking along pre-existing fault lines. ***Manhattan Murder Mystery***, made the following year with Marshall Brickman, his old *Annie Hall* (1977) collaborator, is the tonal antidote: lighter, swifter, warmer, and just as structurally precise. The mystery plot becomes couples therapy by other means, Carol's obsessive pursuit of the possible murder next door dragging Larry out of comfortable inertia, their shared project of amateur detection doing what decades of marriage had not quite managed to do, making them interesting to each other again. At one hundred tight minutes, every scene does double work: advancing the mystery while documenting the marriage.

    The casting of Diane Keaton and Alan Alda is part of the argument the film is making. Keaton brings the chemistry she and Allen built across *Annie Hall* (1977) and everything since, the bickering shorthand of two people who share a private language built from years of irony and proximity. Alda as Ted is the live threat to Larry's complacency, charming and attentive and just attentive enough to Carol to keep Larry honest. Anjelica Huston's Marcia, glamorous and theatrical, completes the quadrangle, a foil for everything Carol has sublimated into suburban routine. The screenplay is packed with reversals, each one landing with the click of a well-made mechanism. It is about murder, yes, and also about the clash of passion and interest between partners, about marital crisis, about real love: all of it compressed into a thriller that never forgets it is a comedy. One of Allen's finest, and one that has never quite received its due.

- title: "Love Letter"
  type: "film"
  creator: "Shunji Iwai"
  creator_role: "dir."
  year: 1995
  eval: "liked"
  image: "/assets/images/thoughts/films/love-letter.jpg"
  posted: "2021-05-31"
  revised: "2021-05-31"
  text: |
    The opening stays with Hiroko, and for a while the film's melancholy is precise: grief metabolised as correspondence, memory reconstructed through the uncanny mirror of a stranger who shares a dead man's name. Iwai turns Otaru's winter whites into an emotional language, and Miho Nakayama's dual performance earns its reputation. The doppelgänger conceit, which draws inevitable comparisons to Kieślowski's *The Double Life of Véronique* (1991), is rigorous about its own meaning: the coincidence of names and faces doesn't resolve grief, it refracts it.
    The second half is where my patience gets tested. What had been restrained tips into melodrama for its own sake, the film visibly straining to achieve the cathartic release it has been deferring, leaving sentiment without the structural justification for it. Etsushi Toyokawa's Akiba Shigeru does not help: every scene in which he speaks actively undermines whatever emotional logic the film had been assembling. It is a performance that makes one aware of the effort in real time, which is precisely what a performance like this cannot afford.

- title: "The Father"
  type: "film"
  creator: "Florian Zeller"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/father.jpg"
  posted: "2021-04-02"
  revised: "2021-04-02"
  text: |
    Watching this, one involuntarily draws the comparison with *Amour* (2012): both films orbit the dissolution of an elderly person's grip on the world, both refuse the sentimental consolation that most films about ageing reach for, and both are, in their very different ways, formally uncompromising. The comparison is worth making only to note where Zeller departs from Haneke's rigorous external gaze. *Amour* (2012) watches from outside. ***The Father*** goes inside and stays there.

    The technique Zeller uses, adapted from his own stage play, is to install the audience within Anthony's deteriorating subjectivity without announcing it. The apartment reconfigures. Actors shift between scenes without explanation. Time folds back on itself. These are not surrealist devices, not Kaufman-style experiments in ontological instability for their own sake: they are clinical descriptions of what Alzheimer's feels like from within, and that accuracy makes the film's third act so distressing. Anthony Hopkins does not perform confusion; he inhabits a state in which confusion is indistinguishable from reality, which is a different thing entirely. Olivia Colman's Anne gives that subjectivity its necessary counterweight, the exhausted tenderness of someone forced to keep translating a world that no longer stays put.

    Zeller adds to the discourse around dementia on screen by refusing to separate technical accomplishment from moral seriousness. The formal choice to follow the patient's perspective is not a stylistic flourish; it is an ethical position. One emerges not having watched a man lose his mind but having, briefly and at a remove, lost one's own.

- title: "Hannah Gadsby: Nanette"
  type: "film"
  creator: "Hannah Gadsby"
  creator_role: "by"
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/hannah-gadsby-nanette.jpg"
  posted: "2021-03-31"
  revised: "2021-03-31"
  text: |
    The first half plays like conventional stand-up, and plays well: Gadsby is warm, self-deprecating, funny about growing up gay in Tasmania, funny about the pride parade, funny about coming out. The audience settles into the rhythm. Then Gadsby announces that she is quitting comedy, and proceeds to explain why by deconstructing the mechanism she has just been using on them. A joke requires two components: tension (the setup) and release (the punchline). For a performer who has survived violence, who has spent years making herself the butt of her own story, the tension is the trauma she survived, and the punchline is the moment she agrees to trivialise it. 'Self-deprecation from someone who already exists in the margins is not humility,' she says. 'It is humiliation. I put myself down in order to speak, in order to seek permission to speak. And I simply will not do that anymore.'
    The bus stop story is the structural proof. First telling: a man mistakes Gadsby for a man hitting on his girlfriend, realises Gadsby is a woman, backs off. 'I don't hit women.' Punchline arrives; the audience laughs. Second telling, forty minutes later, without the punchline: the man came back and beat her. Bystanders did nothing. The audience waits for the release that comedy has trained them to expect. It does not come. 'This tension is yours.' One critic described sitting in 'a kind of heartbroken trance.' Gadsby builds from this towards Picasso: his affair with seventeen-year-old Marie-Thérèse Walter when he was forty-two, married, at the height of his reputation. 'A seventeen-year-old girl is just never ever in her prime. Ever. I am in my prime. Would you test your strength out on me?' The threat is real. The comedy has been disassembled and something else is standing in its place.

    The resolution comes through Van Gogh. 'We have the sunflowers not because Vincent van Gogh suffered. It's because Vincent van Gogh had a brother who loved him. Through all the pain, he had a tether, a connection to the world.' This is not a pivot back to warmth; it is an argument about what art actually requires. Genius does not need suffering. It needs a witness. ***Nanette*** was filmed at the Sydney Opera House Concert Hall after the smaller venue sold out, and the scale of the space matters: the same-sex marriage debate was live in Australia, and Gadsby was dismantling the comedy form inside the country's most iconic cultural institution. The argument is clear enough; what stays is the experience of watching an audience trained to laugh sitting in silence because the performer has refused them the mechanism that would let them off the hook.

- title: "Children of Men"
  type: "film"
  creator: "Alfonso Cuarón"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/children-of-men.jpg"
  posted: "2021-03-28"
  revised: "2021-03-28"
  text: |
    Cuarón called it 'the anti-Blade Runner': for every concept, the art department had to produce a real-world example. The fertility premise is the only speculative element in the film. Everything else, the refugee cages, the government-issued Quietus suicide kits, the detention centres that look like Abu Ghraib, is 2006 with the institutional fabric beginning to fail. Jim Clay's production design was shot in East London and dressed to look worse; Emmanuel Lubezki used an 18mm lens with almost no close-ups, no conventional coverage, because, as he put it, 'conventional coverage is what makes most movies feel the same.' The car ambush that appears to be a single four-minute shot is actually six sections filmed at four locations over a week with five seamless digital transitions, and the remarkable thing about the technique is how completely invisible it makes itself. The blood that splatters the lens during the Bexhill battle was accidental, the result of a camera operator who had fallen that morning leaving only one afternoon take; Cuarón yelled 'cut' and was drowned out by an explosion; Lubezki called it a miracle and kept it, because the blood does what no directorial choice could have achieved deliberately: it places the audience physically inside the violence rather than behind a screen watching it.
    The ceasefire is the scene the film exists to reach. Kee's (Clare-Hope Ashitey) baby cries inside a bombed-out apartment building during the Bexhill battle. A soldier screams 'Ceasefire!' The shooting stops. Total silence. Soldiers who have not seen a human child in nearly twenty years drop to their knees, make the sign of the cross. They part to let Theo (Clive Owen) and Kee through. Some pray; some crane forward to look. Then an RPG hits the government line and fighting resumes immediately, because one baby's cry cannot reverse two decades of institutional collapse. Theo has been shot. He teaches Kee to burp the child. She names her Dylan, after Theo and Julian's lost son. He loses consciousness as the ship *Tomorrow* emerges from the fog. Children's laughter is heard over black. The hope the film extends is exactly as fragile as that image: a small boat in grey water, a name that insists on futurity, and the Human Project remaining invisible, unconfirmed, possibly a myth, because Cuarón knows that showing the cure would betray the film's insistence that 2027 is not prophecy but diagnosis.

- title: "Allen v. Farrow"
  type: "film"
  creator: "Kirby Dick / Amy Ziering"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/allen-v-farrow.jpg"
  posted: "2021-03-26"
  revised: "2021-03-26"
  text: |
    The first objection one hears is that the film withholds Woody Allen's perspective. It does not: Dick and Ziering note from the outset that Allen declined all interview requests, include his recent audio recordings and public statements, and construct the documentary so that his evasions, his destruction of evidence, his decades of reputation management through legal and financial pressure, are all visible in their own words and on their own timeline. To say the film is one-sided is to say that a prosecution brief is one-sided. The question is whether the evidence holds.
    It holds. Setting aside the Yale-New Haven clinic, whose methodology and conditions the documentary examines with appropriate scepticism, the record is not the clean exoneration Allen's defenders usually imply. The custody court found his behaviour towards Dylan grossly inappropriate, and Frank Maco, the Litchfield County state's attorney, said there was probable cause while declining to prosecute in order to spare Dylan Farrow the ordeal of a trial, a fact the film makes clear and which Allen's supporters have consistently inverted into exculpation. The timeline is not disputed. The pattern of behaviour is not disputed.

    The second objection is bias. Yes: documentary filmmaking is not neutral, and advocacy documentaries are a genre with its own conventions and pressures. But the bias charge, when applied to this film, becomes a deflection: it asks one to weigh the affective investment of Dylan Farrow's testimony against the structural investment Woody Allen has spent thirty years making in his own innocence, and to find them equivalent. They are not equivalent. To look at all of it and see nothing is not scepticism; it is a choice.

- title: "Avatar"
  type: "film"
  creator: "James Cameron"
  creator_role: "dir."
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/films/avatar.jpg"
  posted: "2021-03-21"
  revised: "2021-03-21"
  text: |
    The one arresting thing is the motion capture, already mature enough in 2009 to carry an entire world into being: a technical achievement that deserved a better vehicle. Everything else is the furniture of a male-power fantasy from a decade that produced many. The first half establishes a functional enough main storyline between Jake and Neytiri, but the second half dismantles whatever credit the film had accumulated. Female characters become appendages to male agency; Grace Augustine exists to die and propel Jake's arc; Neytiri, for all her initial ferocity, ends the film needing rescue. The Na'vi, assembled from composite colonial fantasies of noble savagery, are there to be saved by a man who absorbs their culture precisely as well as a coloniser imagines he could. Cameron believes his own pro-indigenous framing. That gap between intent and execution is not interesting; it is merely depressing.

- title: "Возвращение"
  title_en: "The Return"
  type: "film"
  creator: "Andrei Zvyagintsev"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/return.jpg"
  posted: "2021-03-10"
  revised: "2021-03-10"
  text: |
    Before reading any analysis, one could only vaguely sense that this was something more than a father-son film. Zvyagintsev opens with the father posed in sleep exactly as Mantegna posed the dead Christ: simultaneously present and already absent, divine and mortal, a body that carries its own allegorical freight before it speaks a single word. From there, the film systematically withholds: twelve years of absence unexplained, a destination on the island unnamed, an object in the buried box never revealed. The questions pile up and are never answered, because answering them would collapse the film's actual subject back into mere plot.

    Stripped of backstory, the film becomes the bare structure of a test. The two brothers, Andrei who reaches towards the father's authority and Ivan whose resistance is the only honest response to a presence that demands submission without explanation, enact something that feels mythological in the oldest sense: not metaphor but archetype, a story about what it means to be subjected to a power that makes no account of itself. Whether the father is God, the Soviet state's ghost returning under Putin, or simply the crushing logic of patriarchy given flesh, the film refuses to choose, and that refusal is the source of everything. Ivan's final scream at the drowned body echoes the cry of dereliction: not prayer but accusation, addressed to a god who came and went and explained nothing. One cannot watch it without reaching for the allegory, and one reaches for it because the film has made that reaching feel necessary.

- title: "The Reader"
  type: "film"
  creator: "Stephen Daldry"
  creator_role: "dir."
  year: 2008
  eval: "meh..."
  image: "/assets/images/thoughts/films/reader.jpg"
  posted: "2021-03-09"
  revised: "2021-03-09"
  text: |
    Schlink's novel sustains a cold, unsentimental first-person voice that holds the moral ambiguity in tension without resolving it; Daldry's adaptation warms everything up until the ethical questions float on the surface like decorative scum. The suicide scene is extended to an unbearable degree, the camera lingering as though emotional length were the same as emotional depth. What was a rigorous, uncomfortable literary exercise in complicity becomes softcore erotica with Holocaust framing, the body prioritised over the moral problem the body is supposed to embody. Every legal question raised in the courtroom sequences evaporates before it can become uncomfortable. The score dominates scenes where silence was the only honest choice. Better to read the book; failing that, better almost anything else.

- title: "Левиафан"
  title_en: "Leviathan"
  type: "film"
  creator: "Andrei Zvyagintsev"
  creator_role: "dir."
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/films/leviathan-левиафан.jpg"
  posted: "2021-02-21"
  revised: "2021-02-21"
  text: |
    ***Leviathan*** is a film of formidable formal discipline. Its scope is vast in the way that cold and silence are vast: the Kola Peninsula coastline, the Arctic light, Mikhail Krichman's cinematography making desolation feel like a philosophical argument. Aleksei Serebryakov's Kolya stands at the centre of that argument as a man too ordinary to become heroic and too stubborn to vanish quietly. Zvyagintsev layers his Leviathans deliberately: Hobbes's sovereign state as sea monster, the biblical beast from the Book of Job, and the literal whale skeleton bleaching on the beach outside Kolya's house. The remarkable thing about that skeleton is what it does not do in the film: it is simply there, passed by, taken for granted, part of the landscape. Nobody in the film stops to contemplate it. Nobody needs to. The deepest impressions are always the ones that the film refuses to underline.
    On finishing it, there is a strange and indescribable alienation, an after-effect that takes hours to metabolise. The whale skeleton echoes in the mind long after the film has ended, insisting on a meaning that one cannot quite close. Close behind it: the barbecue scene, everyone drinking and eating in the ruins while portraits of the dispossessed, Lenin first among them, become shooting targets. History treated as target practice, ideology as something to pot at for sport. The Orthodox church built on the ruins of Kolya's home in the final sequence completes the film's argument about the unholy alliance between state power and religious authority in Putin-era Russia: the individual is devoured, the institution consecrates the devouring, and life continues.

- title: "Human Nature"
  type: "film"
  creator: "Michel Gondry"
  creator_role: "dir."
  year: 2001
  eval: "loved"
  image: "/assets/images/thoughts/films/human-nature.jpg"
  posted: "2021-02-19"
  revised: "2021-02-19"
  text: |
    Kaufman's screenplay is a grand parable built from three broken people and a set of nested ironies: a woman rejected by 'civilization' on account of her body hair, who retreated to the woods and built a life there; a scientist trapped between the demands of social propriety and the animal urgency he has spent his career conditioning away; a feral man raised among apes, who through nurture was never contaminated by 'civilization' at all. The three-way structure is beautifully engineered, each narrator contradicting the others from the grave or the laboratory or the wilderness, the unreliability not a postmodern tic but the whole point: everyone in this film is lying, including to themselves, about what they want and what they are.
    Kaufman understands, and the film keeps returning to, sexual desire as the one force that traverses all three states, the one constant that 'civilization' works hardest to manage and most consistently fails to contain. The satire of behaviourism, of Skinnerian conditioning applied to table manners as though the fork were the border between the human and the animal, is at its funniest when it is also most exact. Gondry's handmade visual wit meshes here with Kaufman's cynicism better than critics at the time allowed. 'You fuck the mind,' one character observes; but a pretty mind is more fuckable.

- title: "Adaptation."
  type: "film"
  creator: "Spike Jonze"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/adaptation.jpg"
  posted: "2021-02-17"
  revised: "2021-02-17"
  text: |
    Four nested layers of narrative, each one eating the one below it: Kaufman's inability to adapt Susan Orlean's book, dramatised inside the film that pretends to be the adaptation; Orlean's book, dramatised inside that; Donald's commercial thriller, contaminating the whole structure from within; and the real Kaufman, somewhere outside all of it, watching. The screenplay credits include the fictional twin brother as co-writer, a move so audacious that awards bodies had to treat an invented person as a credited writer. Brian Cox's McKee cameo is both a savage joke at screenwriting-manual culture and a sincere capitulation to it: the third act that Charlie resists and Donald embodies arrives anyway, and the film is honest enough not to pretend otherwise.

    Nicolas Cage carries the architecture in the body. Charlie hunches, sweats through every social interaction, narrates his own self-loathing in voice-over that the film gradually reveals as another layer of the screenplay he cannot write; Donald bounces through the same rooms with the loose confidence of someone who has never once doubted that the world wants to hear from him. The two performances are so physically distinct that one forgets they occupy the same body: Charlie's shoulders curl inward, Donald's open outward, and the difference becomes two entire theories of what art is for. Charlie believes adaptation requires fidelity to the source's resistance; Donald believes it requires a car chase. The film sides with neither and both, which is the cruelest possible answer, because it means the third act that Charlie has spent the whole film resisting arrives anyway, and by then it has become the only honest ending. And then, at a certain moment, the recursive machinery locks, and one suddenly understands both this film and the sensation of watching a Kaufman-scripted film: a structure becoming conscious of itself in real time, and dragging one along into the recognition.

- title: "I'm Thinking of Ending Things"
  type: "film"
  creator: "Charlie Kaufman"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/im-thinking-of-ending-things.jpg"
  posted: "2021-02-16"
  revised: "2021-02-16"
  text: |
    The ice cream bin at the school is full of disposed cups. This detail, easy to miss on a first viewing, reframes everything: the janitor has been running this fantasy before. The car ride, the girlfriend, the visit to his parents, the stop for ice cream, the drive to the school where he works: not a narrative but a loop, executed again and again in the basement of a building where he mops floors. Jessie Buckley's Young Woman changes names between scenes (Lucy, Louisa, Lucia, Ames), changes professions (physicist, poet, painter, gerontologist), changes clothing in what appears to be continuous time. She is a composite of every girl the janitor ever noticed, assembled from poems he memorised and films he loved and a woman who smiled at him at a trivia night whom he never approached. Jake finishes her sentences because they are his sentences. She recites 'Bonedog' by Eva H.D. as though she wrote it; the book is later visible on Jake's shelf. She delivers Pauline Kael's review of *A Woman Under the Influence* (1974) verbatim, impersonating Kael. The Oscar Wilde quote 'Most people are other people' is attributed to her as an original thought. Kaufman is not hiding any of this. Ten minutes in, the structure announces itself, and from that point one can actively map each shift, the borrowed voices, the shelf of consumed media, the loneliness that has no original material of its own.
    The farmhouse dinner is the loop's most painful iteration. Jake's parents (Toni Collette and David Thewlis) age and de-age between cuts without acknowledgment: the father goes from dark-haired and energetic to grey, doddering, Alzheimer-ridden; the mother shifts from imperious younger self to elderly. Nobody eats. The parents gush, getting their own stories wrong. The janitor is trying to work out when would have been the best time to bring a girl home, and no answer satisfies, because the real answer is that he never brought anyone. At the Tulsey Town ice cream stop, two servers look down on Jake: they are the popular girls who mocked the janitor in a school hallway. One frightened worker has bruises on her hands that match Jake's. She warns the Young Woman not to 'go forward in time.' She is Jake's self-image made visible.

    The *Oklahoma!* dream ballet in the school is the loop's final iteration. Young Jake dances as Curly; the janitor is Jud; the Young Woman is Laurey. Unlike the musical, the villain wins. The janitor stabs young Jake. Then old Jake delivers the Nobel Prize acceptance speech from *A Beautiful Mind* (2001) verbatim, in bad high-school-quality age makeup, to an audience wearing the same makeup: his parents, the ice cream girls, Buckley, everyone he has ever remembered. The DVD of *A Beautiful Mind* was on his shelf. The fantasy escalates from borrowed poems through borrowed reviews through a borrowed love story through a borrowed Nobel speech, each layer further from reality, each more desperately compensatory. The final shot is the janitor's car buried under snow in the school parking lot. He went inside, let the fantasy play out one more time, and did not come back out. Kaufman's choice to render the death as dream ballet and animated pig and musical number rather than as the novel's graphic description is itself the film's deepest act of empathy: it lets the dying man have his fantasy, which is all he ever had.

- title: "Solaris"
  type: "film"
  creator: "Andrei Tarkovsky"
  creator_role: "dir."
  year: 1972
  eval: "loved"
  image: "/assets/images/thoughts/films/solaris.jpg"
  posted: "2021-02-14"
  revised: "2021-02-14"
  text: |
    Tarkovsky's Solaris station is not *2001*'s pristine cathedral of ambition. It is cluttered and decaying, a museum of human failure, and that failure is the point. Kubrick asked what humanity might become; Tarkovsky asked what it has already lost. The film opens with forty minutes on Earth, entirely absent from Lem's novel: Kelvin (Donatas Banionis) at his father's dacha, rain falling on a pond, a retired pilot recounting strange things he saw above the ocean. Then the highway sequence: nearly five minutes of 1970s Tokyo (Akasaka and Iikura) shot as 'the city of the future,' Japanese road signs and multi-lane expressways that looked alien to Soviet audiences, the sound design growing abrasive until a hard cut to silence and water. Tarkovsky reportedly included it so that impatient viewers would leave. Those who remain are the audience the film wants.

    The weightless library is the scene I return to. Hari (Natalya Bondarchuk) sits studying Bruegel's *Hunters in the Snow* (1565), one of five Bruegel paintings that decorate the station. Weightlessness begins: candles float first, then the chandelier ripples, then a candelabra glides upward. A copy of Don Quixote drifts past. Kris and Hari begin to levitate, embrace, and slowly spin before the Bruegel while Bach's chorale prelude BWV 639 returns on the soundtrack. It lasts roughly thirty seconds. Kubrick's floating pen in *2001* (1968) is a moment of technological elegance; Tarkovsky's floating books are a moment of humanist elegy. But Hari has already drunk liquid oxygen and painfully resurrected, has already been told by Sartorius (Anatoly Solonitsyn) that she is 'not a woman and not a human being, just a reproduction, a mechanical reproduction.' She will petition to be destroyed. Kelvin will wake to find her gone, with only a farewell note. The ocean manufactures what one has lost, and losing it a second time is worse, because the second loss carries the knowledge that the grief itself was legible enough to be replicated.
    The final shot is the answer to a question the film has been asking since the dacha. Kelvin appears to have returned home. Rain falls indoors. He kneels before his father in a direct allusion to Rembrandt's *Return of the Prodigal Son* (1669). The camera pulls back through clouds to reveal: the house and pond sit on a small island in the surface of the Solaris ocean. Tarkovsky's explanation was precise: 'He has been recreated by the Ocean, the materialisation of his homesickness.' Whether this is surrender or the only authentic choice available is not adjudicated. Empirical reality, which the station's scientists spent the entire film defending, has produced nothing but cruelty, sterile corridors, and the destruction of what it could not classify. The ocean offers Kelvin his father, his home, his rain, everything he grieved, and if the price is that none of it is real, the film's final image asks whether the distinction ever mattered as much as the scientists believed it did.

- title: "Spartacus"
  type: "film"
  creator: "Stanley Kubrick"
  creator_role: "dir."
  year: 1960
  eval: "liked"
  image: "/assets/images/thoughts/films/spartacus.jpg"
  posted: "2021-02-10"
  revised: "2021-02-10"
  text: |
    The most vivid impressions: the same commitment to practical scale as *2001*, Kirk Douglas's button-like chin anchoring every frame, and an ending that is spectacularly bad. Kubrick himself reportedly despised the film's sentimental climax, and he was right; a single restrained shot of Varinia departing with the child would have done more than all that broad melodrama on the Appian Way, and would have been truer to what the historical record allows. The irony is that the film's political spine, Dalton Trumbo's name in the credits breaking the blacklist, is far more radical than anything in the denouement.

- title: "Dr. Strangelove or: How I Learned to Stop Worrying and Love the Bomb"
  type: "film"
  creator: "Stanley Kubrick"
  creator_role: "dir."
  year: 1964
  eval: "loved"
  image: "/assets/images/thoughts/films/dr-strangelove-or-how-i-learned-to-stop-worrying-and-love-th.jpg"
  posted: "2021-02-02"
  revised: "2021-02-02"
  text: |
    Peter Sellers across three roles is not merely extraordinary as a performance; it is extraordinary as an argument. Mandrake, Muffley, and Strangelove map onto three modes of institutional failure: bureaucratic impotence, liberal ineffectuality, and the amoral technocrat whose uncontrollable gloved hand keeps betraying the fascism beneath the procedural surface. The three settings, Burpelson, the War Room, the bomber cockpit, are all the geography a film about the end of the world requires. Kubrick achieves a tension and grandeur within these stripped constraints that most directors cannot reach with entire continents.

    Strangelove's final monologue, the mine-shaft proposal, the survival calculus, the barely suppressed glee, is nothing other than the logic of the figures who surrounded every major populist authoritarian movement of the following half-century: the technocrat who has made his peace with catastrophe and begun to find it useful. George C. Scott's General Turgidson and Sterling Hayden's General Ripper complete the triptych from the other side: one a buffoon who mistakes testosterone for strategy, the other a paranoiac whose private madness has acquired institutional authority. One watches it now and recognises the grammar immediately: the conspiratorial cartography, the eugenic undercurrent dressed as crisis management, the sense that the speaker has been waiting a long time for this moment. Kubrick made a film about the early 1960s and accidentally made a repeating template. The laugh-track of history has not worn it out.

- title: "背靠背，脸对脸"
  title_en: "Back to Back, Face to Face"
  type: "film"
  creator: "Huang Jianxin"
  creator_role: "dir."
  year: 1994
  eval: "loved"
  image: "/assets/images/thoughts/films/back-to-back-face-to-face.jpg"
  posted: "2021-01-31"
  revised: "2021-01-31"
  text: |
    Simply beautiful, and simply inexhaustible: two-plus hours with not a moment of drag, every character sharply drawn, every minor functionary essential to the machinery of the plot. Wang Shuangli, acting director of a local cultural centre, perpetually passed over, perpetually manoeuvring, is one of Chinese cinema's great creations: not a tragic figure in the Western sense, not a comic one either, but a precise and devastating specimen of a particular mode of survival. The title announces the method: 'back to back' in estrangement, 'face to face' in performed cordiality, and the entire film lives in the gap between those two orientations.
    The allegorical texture is dense, line by line, and the visual allegory is equally unmissable: a film about institutional China that works as a portrait of institutional life everywhere that face (面子) and power decouple from merit. What is harder to explain is why the experience of watching is two solid hours of laughter, of marveling at how people can be so cunning and so vicious and so recognisable, and then, against all expectation, to end on a note that is (relatively) generous. One does not leave feeling consoled. One leaves feeling that the System has been named, and that naming it, precisely and without sentimentality, is its own kind of grace.

- title: "Persischstunden"
  title_en: "Persian Lessons"
  type: "film"
  creator: "Vadim Perelman"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/films/persian-lessons-persischstunden.jpg"
  posted: "2021-01-30"
  revised: "2021-01-30"
  text: |
    The plot is solidly conventional: nothing arrives that one did not see forming. But the cinematography and direction accomplish the task of telling the story commendably, which is more than most Holocaust films manage to do with a comparable premise. The classroom scenes in the first half are occasionally overwrought; in a film where detail is everything, where Nahuel Pérez Biscayart's Gilles must remember every invented word of a language he fabricated to survive, any lapse in precision costs the drama something real. The final sequence, in which those invented words resolve into the names of the murdered, strikes with the force of a moral argument, not a cinematic flourish. An anti-fascist film this accomplished is rare; one has waited years for one.

- title: "The Abyss"
  type: "film"
  creator: "James Cameron"
  creator_role: "dir."
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/films/abyss.jpg"
  posted: "2021-01-16"
  revised: "2021-01-16"
  text: |
    Every emotion in the film is engineered, and the engineering is masterful: the claustrophobia of flooded corridors, the oxygen-deprivation delirium, the CPR sequence that Mary Elizabeth Mastrantonio reportedly broke down filming and which breaks one watching it. Every character has a distinct personality, a fact that increases predictability somewhat, the audience knowing roughly who will survive and who will not, but the predictability does not blunt the impact because Cameron's craft lies not in surprise but in inevitability, in making the audience feel that each event could not have been otherwise.
    Who could remain unmoved at the sight of a vast non-human civilisation, benevolent and alien and utterly beyond the terms of any ideology that has governed human violence? Who could stay calm during the underwater 'car chase' sequence, the two figures in darkened water, air running out, the numbers on the gauge too small? Not a single decision in the film is free from the dual pull of emotion and reason; not a single decision feels arbitrary or jarring. Cameron makes the mechanics of feeling transparent at a scale almost no one else can reach, without making them cheap. A supreme demonstration of his craft as writer and director both.

- title: "Synecdoche, New York"
  type: "film"
  creator: "Charlie Kaufman"
  creator_role: "dir."
  year: 2008
  eval: "loved"
  image: "/assets/images/thoughts/films/synecdoche-new-york.jpg"
  posted: "2021-01-08"
  revised: "2021-01-08"
  text: |
    In the opening scene, two months pass at one breakfast table. The radio drifts from September 22 to Halloween; the milk expires; the newspaper dates shift. Nobody changes clothes. The conversation does not reset. ***Synecdoche, New York*** announces its method here: time moves the way it feels from inside a life, slow in the early minutes and then suddenly decades have gone, and the film will not stop to say when. Caden Cotard (Philip Seymour Hoffman), whose surname is borrowed from a psychiatric delusion in which patients believe themselves already dead, receives a MacArthur grant and uses it to build a full-scale replica of New York in a Manhattan warehouse. Actors are hired to play the people in his life. Then actors are hired to play those actors. The production never opens. It is always in rehearsal, always expanding, always one revision away from capturing the totality of a life that keeps happening while he tries to capture it.

    Meanwhile his first wife Adele (Catherine Keener) leaves for Berlin with their daughter Olive and paints canvases so small that gallery visitors need magnifying spectacles to see them. Kaufman has said her work is 'in a way much more effective than Caden's,' and the film agrees: she distils and succeeds; he inflates and fails. Sammy (Tom Noonan), an actor who claims to have been following Caden for twenty years, is cast to play him and mimics him so completely that Sammy eventually casts his own double, a man to play Sammy playing Caden. Hazel (Samantha Morton) buys a house that is perpetually on fire, real flames visible, smoke filling every room, and lives in it for thirty years before dying of smoke inhalation. The fire is never explained, and the refusal to explain it is the point: the film is not asking to be decoded but absorbed, each surreal detail a synecdoche for something too large to name directly. Hoffman holds all of this together through physical deterioration, pustules and seizures and a faucet gash that never heals, his body curling inward as the decades blur past, and his performance is so anchored in recognisable human bewilderment that the abstraction never floats free of grief.

    In the final act, Caden surrenders direction of the production to Millicent Weems (Dianne Wiest), the actress who played a cleaning lady named Ellen. He takes her role. He becomes the cleaning woman in his own play, receiving instructions through an earpiece, shuffling through the ruins of the empty warehouse while Millicent narrates his every step. She tells him: 'You realise you are not special. You have struggled into existence and are now slipping silently out of it. This is everyone's experience. Every single one.' Then Caden says, suddenly, 'I know what to do with this play now. I have an idea.' The earpiece gives him his final direction: 'Die.' He does. The one instruction he cannot revise, arriving at the exact moment he understands what his life's work should have been.

- title: "L.A. Confidential"
  type: "film"
  creator: "Curtis Hanson"
  creator_role: "dir."
  year: 1997
  eval: "liked"
  image: "/assets/images/thoughts/films/la-confidential.jpg"
  posted: "2021-01-03"
  revised: "2021-01-03"
  text: |
    There is a version of film criticism in which *Infernal Affairs* (2002) is treated as the definitive modern noir, and that version is wrong. ***L.A. Confidential*** does everything the genre asks of it and then does something rarer: it gives each of its three protagonists a distinct moral grammar, so that the Nite Owl conspiracy unfolds differently depending on which set of eyes is reading it. Russell Crowe's Bud White operates on fury and a private code about women; Guy Pearce's Ed Exley on ambition mistaken for principle; Kevin Spacey's Jack Vincennes on exhausted cynicism performing itself as charm. The performances are dazzling in the specific sense that they illuminate each other by contrast.

    The second half offers almost nothing one could not see coming, and yet the suspense never relents. That is a rarer technical achievement than most critics acknowledge: to generate genuine tension not from uncertainty about plot but from the feeling of inevitability pressing down on people who are still trying to choose. Brian Helgeland and Hanson's adaptation of Ellroy's sprawling novel strips the machinery to the necessary elements and not one joint shows. By the end, partial justice is achieved and the institution survives intact, which is the most honest ending a film about the LAPD in the 1950s could possibly have.

- title: "Nomadland"
  type: "film"
  creator: "Chloé Zhao"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/films/nomadland.jpg"
  posted: "2021-01-02"
  revised: "2021-01-02"
  text: |
    The score is far too weak for the images it accompanies. Einaudi's piano pieces are lovely objects in their own right, but as deployed here they arrive slightly too readily, too smoothly, softening the film's documentary edges at precisely the moments when those edges should cut. Zhao assembles an accumulation of stories: every person Fern (Frances McDormand) encounters forms a closed loop, every departure is also a potential return, every ending another beginning on the same road. It is a nomad's idealist dream of how transience works. One suspects the real itineraries are less circular, the coincidences rarer. That the film needs the dream to function is not a flaw; it is the confession.

- title: "Gattaca"
  type: "film"
  creator: "Andrew Niccol"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/gattaca.jpg"
  posted: "2021-01-01"
  revised: "2021-01-01"
  text: |
    I had no idea the ending could be that good. The film earns it by spending ninety minutes being scrupulously, almost defiantly understated: the production design mixes 1950s architecture with near-future technology not as nostalgia but as a warning that this future has in some sense already arrived, and the performances stay cold and precise in step with the world they inhabit. The central irony is structural: Jerome Morrow (Jude Law), the genetically optimal man, destroys himself in an incinerator wearing a silver medal, the emblem of his only failure, while Vincent Freeman (Ethan Hawke), born without correction and given a 99% probability of cardiac failure, boards a spacecraft for Titan. The eugenics project does not produce flourishing; it produces a caste system in which perfection is as fatal as imperfection, only differently.
    Niccol understands what most science fiction films of the era did not: the horror of a genetic hierarchy is not primarily spectacular; it lives in the skin-cell readers by the office door, the urine tests, the quiet administrative violence of being classified in-valid before one has done anything. The film explores eugenics using 1% of luck as its moral lever, and the lever holds. There is no gene for the human spirit is a tagline that should be embarrassing but is not, because the film has actually argued it.

- title: "Soul"
  type: "film"
  creator: "Pete Docter"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/soul.jpg"
  posted: "2020-12-27"
  revised: "2020-12-27"
  text: |
    Jon Batiste's jazz and Trent Reznor and Atticus Ross's Great Before score were composed in deliberate isolation: the two teams did not communicate early on, so that Earth and the soul world would sound like different planets. The separation works. Batiste's pieces carry the weight of bodies at instruments, fingers on keys, breath through brass; Reznor and Ross build glassy synths and pulsing resonance for a place where nothing has mass yet. ***Soul*** lives in the collision of those two palettes, and its argument emerges from a story that Herbie Hancock told the filmmakers: during a Miles Davis concert, Hancock played a chord so catastrophically wrong that he thought he had destroyed the whole night. Davis paused, then played notes that made the chord right. He did not hear it as a mistake; he heard it as something that happened, part of reality to be dealt with. Docter has said this anecdote captured what the film was trying to say, and it does: the film builds its entire first act around Joe Gardner (Jamie Foxx) treating jazz improvisation as a spiritual destination, the flow state as transcendence, and then methodically dismantles the frame. Joe achieves the gig of his dreams with Dorothea Williams (Angela Bassett) and feels nothing. 'I thought I'd feel different,' he tells her. Dorothea answers with a parable about a fish searching for the ocean while already swimming in it.

    The dismantling is structural, not sentimental. 22 (Tina Fey), the pre-life soul who has resisted being born for millennia, accidentally inhabits Joe's body and discovers pizza, a maple seed spiralling to the ground, the barbershop where Dez (Donnell Rawlings) tells his own story while handing her a lollipop. Joe dismisses all of it: 'Those really aren't purposes, 22. That's just regular old living.' He does not hear himself. The film's sharpest move is staging this as Joe's failure to listen to his own sentence, the answer sitting inside the dismissal. When the Jerrys later correct him directly, 'A spark isn't a soul's purpose. Where did you get that idea?', the revelation arrives not as new information but as something that was already there, the way Hancock's wrong chord was already music before Davis made it legible. The ending is quiet in a way that Pixar rarely permits: Joe steps outside, a maple seed lands in his hand, and for the first time he notices it. We do not learn what happens next, and that uncertainty is the argument.

- title: "Perfect Blue"
  type: "film"
  creator: "Satoshi Kon"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/perfect-blue.jpg"
  posted: "2020-12-19"
  revised: "2020-12-19"
  text: |
    Mental illness films have a structural advantage that is also a temptation: with an unreliable narrator, any ending can be retroactively justified, any incoherence absorbed into the premise. The film simply declares: the character was unwell; the ambiguity was intentional. Kon refuses this escape. ***Perfect Blue*** closes its ending hard. Every act of violence, every distortion of Mima's reality, is attributed with clinical precision to Rumi, whose psychotic merger with the idol she manages is rendered not as mystery but as diagnosis. The resolution is so tight that the final shock strikes heavily: there is no interpretive slack to cushion it.

    This is also a film that understands exactly where to cut. Not in the editorial sense only, though the editing is surgical, but in the sense of knowing precisely which moment in a scene carries the most damage, and driving the camera into it. Every transition cuts in the most painful available place. Kon Satoshi is often discussed alongside Aronofsky, who purchased the rights partly to recreate a single sequence, but the influence runs deeper than any individual image: it is an understanding of how identity fractures under the pressure of being watched, an understanding that Perfect Blue achieves in 81 minutes with no wasted frame. Mima's final words to her reflection are not reassurance. They are a claim staked against the void, and one is not entirely sure it holds.

- title: "Vertigo"
  type: "film"
  creator: "Alfred Hitchcock"
  creator_role: "dir."
  year: 1958
  eval: "liked"
  image: "/assets/images/thoughts/films/vertigo.jpg"
  posted: "2020-12-19"
  revised: "2020-12-19"
  text: |
    The second half arrives as a genuine surprise: the film has taken such care to embed one in Scottie's (James Stewart) limited perspective that the revelation of the plot, delivered in Judy's letter and then withheld from Scottie for another reel, produces a disorientation that the title has been promising all along. It is not dizziness from heights; it is the dizziness of learning that the reality one has been inhabiting was a construction, and that the construction was designed specifically for one's own consumption. This is Hitchcock at his most ruthlessly self-aware about what cinema does to audiences.

    The second half is harder to sit with. The sequence in which Scottie rebuilds Judy into Madeleine, choosing her clothes and hair and posture, is a textbook enactment of what Laura Mulvey would later theorise as the male gaze turned architectural: the woman as raw material, the man as sculptor. Kim Novak plays the humiliation with extraordinary restraint, which only sharpens it. The film is aware of what it is doing; whether that awareness is critique or complicity is the question it refuses to answer cleanly. The romance is the part the film does not know how to account for, or chooses not to address: Scottie's love for Madeleine is never explained from Madeleine's side, and after the revelation Judy's love for Scottie is barely more legible. Hitchcock's plotting here is thin, and no amount of atmospherics fully papers over it. The murderous husband walks away entirely unremarked upon by the detective whose job was presumably to find him. It is a film one admires more than one trusts.

- title: "North by Northwest"
  type: "film"
  creator: "Alfred Hitchcock"
  creator_role: "dir."
  year: 1959
  eval: "liked"
  image: "/assets/images/thoughts/films/north-by-northwest.jpg"
  posted: "2020-12-18"
  revised: "2020-12-18"
  text: |
    The crop-duster sequence has been studied so thoroughly, borrowed from so many times, reconstructed in so many analyses, that encountering the original carries a faint strangeness: the sensation of meeting a face one knows only from copies. Hitchcock and editor George Tomasini built the sequence on an inversion of every convention of cinematic threat: no shadows, no music, blinding midday light, flat open prairie, a camera that holds its wide shots long past the point of comfort. The emptiness is the weapon. By the time the plane appears, the editing has trained one to expect nothing, so when the attack comes, it comes from a direction the film has spent minutes insisting was empty.

    The United Nations building, seen as it stood in 1959, prompts a different kind of reflection. Six decades on, the building is still there, largely unchanged, presiding over a world that has managed to accumulate almost no additional architecture of international cooperation in the intervening decades. The particular stagnation of the post-Cold War order, the inability to build new institutions at the scale the mid-century briefly imagined possible, makes the building look like a relic of ambition. Hitchcock meant it as backdrop. It has become a more complicated image than he intended.

- title: "Rear Window"
  type: "film"
  creator: "Alfred Hitchcock"
  creator_role: "dir."
  year: 1954
  eval: "loved"
  image: "/assets/images/thoughts/films/rear-window.jpg"
  posted: "2020-12-14"
  revised: "2020-12-14"
  text: |
    The courtyard set at Paramount was one of the largest indoor constructions in studio history: thirty-one apartments, working plumbing, a full day-to-night lighting cycle, real animals. Hitchcock built a world and then refused to let the camera leave the room from which it is observed. This is the formal constraint that generates everything. The audience's perspective becomes identical to Jeff's (James Stewart), not as a technique but as a condition: one cannot see around the corner, cannot enter the apartments, cannot escape the frame of the window. Cinema's essential voyeurism, usually disavowed, is here both the subject and the mechanism.
    The courtyard contains enough life to keep the film from becoming merely a formal exercise. Each apartment is a storyline; each storyline is a possible future for Jeff and Lisa (Grace Kelly); and the three sections of the narrative, the mystery, the near-resolution, the crisis, divide the film so cleanly that on paper it sounds schematic. Watching, one feels none of the joins. The world contained in that small rectangle of light and sound expands to fill the entire available attention, and by the time Thorwald turns and looks directly back, the rupture of the voyeuristic compact is as physically shocking as anything Hitchcock ever produced. The whole world in a small ***rear window***. The camera never leaves the room, and neither does one.

- title: "La planète sauvage"
  title_en: "Fantastic Planet"
  type: "film"
  creator: "René Laloux"
  creator_role: "dir."
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/films/la-planete-sauvage-fantastic-planet.jpg"
  posted: "2020-12-10"
  revised: "2020-12-10"
  text: |
    Twenty-five people worked for four years to produce 1,073 pencil drawings in pastel shades, each animated as cardboard cutouts against painted backgrounds: not cel animation, not rotoscope, but something deliberately two-dimensional and collage-like, motion that is stiff and choppy in a way that makes the world feel governed by its own physics rather than ours. Roland Topor, who co-founded the Panic Movement with Jodorowsky and spent his career making art that resembles sixteenth-century engravings of things that should not exist, designed every frame of ***Fantastic Planet*** as a self-sufficient image. A cage-bodied creature snakes an arm through its own exoskeleton to trap flying animals, shakes them to death, and laughs; it does not eat them. An intestinal desert curls upward when moistened by rain. Clothing-making mollusks exude foam directly onto the body. The imagery does not illustrate an allegory about colonialism or dehumanisation, though the allegory is legible enough: it generates its own logic, closer to Bosch than to any parable, and the viewer enters through sensation before arriving at meaning. Alain Goraguer's score, built from electric piano, reverb-heavy guitar, wordless chanting, and baroque string textures that recall his years arranging for Serge Gainsbourg, does the same work: it establishes the phenomenological terms before the narrative has time to settle.

    The film was co-produced between France and Czechoslovakia, production beginning in Prague in 1968 and halting when Soviet forces invaded that August. It survived the normalisation period because it was bringing in hard currency, and the surrealism that would have alarmed censors in live-action passed through because animation lowered ideological defences. The political content is there for anyone looking: a Draag council scene that parodies central planning, 'de-Omization' campaigns whose bureaucratic euphemism sanitises mass extermination, an oppressor species whose intellectual self-regard masks the banality of its cruelty. But the Grand Prix at Cannes in 1973 did not come from coded topicality alone, and Criterion's restoration is not the reason it still feels alive. Topor and Laloux built a world that operates on different rules and trusted the accumulated strangeness to do what argument alone could not: make the viewer feel, bodily, what it is like to be small, disposable, and subject to forces that do not recognise one's existence as a category worth preserving.

- title: "Ran"
  type: "film"
  creator: "Akira Kurosawa"
  creator_role: "dir."
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/films/ran.jpg"
  posted: "2020-12-01"
  revised: "2020-12-01"
  text: |
    My first Kurosawa, which means I came to it unprepared and saw only part of what was there: the cloud-sea above the battlefield, shot in a scale that makes individual suffering look cosmically small; and the jester Kyoami's loyalty, the film's clearest moral force and the most moving thing in it, a devotion that has no strategic logic and therefore no end point. I regret not attending to the details more carefully, which is a different problem from the film's. The whole film feels like a Shakespeare play, and this is not a loose comparison.

    Kurosawa spent a decade developing ***Ran***, transposing *King Lear* onto the Sengoku period warlord Hidetora Ichimonji (Tatsuya Nakadai), who divides his domain among three sons and is destroyed by the calculation. Where Shakespeare works within a Christian moral framework, Kurosawa operates in Buddhist terms: the chaos that follows, ran in Japanese, is not punishment so much as karma made visible, the sins of conquest propagating forward through time until nothing is left. Toru Takemitsu's score plays against the images rather than with them, which is the right instinct; some of the great battle sequences run almost in silence, the carnage aestheticised into something that looks like a Noh performance, beautiful and terrible in equal measure. Lady Kaede, played by Mieko Harada, rivals Shakespeare's own villains in complexity. I will watch it again and see everything I missed.

- title: "Подземље"
  title_en: "Underground"
  type: "film"
  creator: "Emir Kusturica"
  creator_role: "dir."
  year: 1995
  eval: "loved"
  image: "/assets/images/thoughts/films/underground.jpg"
  posted: "2020-11-28"
  revised: "2020-11-28"
  text: |
    The charge against Kusturica has always been ready to hand: that ***Underground*** launders catastrophe into spectacle, that its grotesque festivity makes the very history it mourns look like a party. The charge is Žižek's, [argued](https://www.ntticc.or.jp/pub/ic_mag/ic018/intercity/zizek_E.html) at length in 1997, and it is worth taking seriously even if one disagrees in the end. Kusturica achieves something older and stranger than political allegory: he fuses narrative film with film-poem, so that the logic governing individual shots is lyric rather than dramatic, governed by rhythm and repetition rather than cause and effect. Every image carries the weight of magical realism, rooted in Balkan soil and oral tradition, in the brass bands and drunken weddings and exploding tanks (the same energy returns, looser and funnier, in *Black Cat, White Cat* three years later) that are less metaphors for Yugoslav chaos than its native idiom. Dušan Kovačević's three-part structure, spanning WWII through the cold war to the 1990s wars, enacts a cyclical theory of history in which violence and festivity are identical: the feast is the massacre, the dance is the dirge.
    The cellar where violence and festivity literally coexist is an ideological bubble, Titoism in aspic, time preserved in amber while history burns above. That the people trapped below come to believe WWII is still running is less a plot device than a diagnosis: collective delusion sustained by those in power, a nation fed its own mythology until the mythology is all that remains. And when the characters finally surface, they surface into ruin. The film earns its three-hour runtime because the epic length is itself the argument: history takes that long to devour a people. The Goran Bregović soundtrack never stops; the music is not commentary but atmosphere, an assault that refuses to let one step back into critical distance.

    The final sequence, the floating island, the last dance above water, tender and final beyond recovery: the film finds release without resolution. There is no homeland left to return to, so the film invents one, makes it float, and then lets it drift. That image is mourning without consolation, and it has not left me since.

- title: "The Rainmaker"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1997
  eval: "meh..."
  image: "/assets/images/thoughts/films/rainmaker.jpg"
  posted: "2020-11-24"
  revised: "2020-11-24"
  text: |
    I went in on the strength of the name, and the name does not quite redeem it. Coppola's direction is assured and unshowy, which in 1997 already marked a change of mode from his operatic phase, but assurance applied to John Grisham yields a film that is intelligent without being surprising. The idealist-versus-institution courtroom structure arrives fully assembled: the young lawyer with no resources, the corrupt corporation, the bought judge replaced by a better one at the opportune moment. Matt Damon's Rudy Baylor is moral weight without interiority, a position in an argument rather than a person, which is arguably true of the Grisham template generally. The final monologue, where Baylor dresses up his decision to quit law as principled disillusionment, is the film's least honest moment: one is invited to read it as integrity, but skill level and temperament are equally plausible explanations, and the screenplay does not have the rigour to insist on the distinction. Danny DeVito, at least, seems to be enjoying himself.


- title: "버닝"
  title_en: "Burning"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/burning.jpg"
  posted: "2020-11-15"
  revised: "2020-11-15"
  text: |
    Lee Chang-dong takes Murakami's 'Barn Burning,' a twenty-page story of ambiguity and absence, and loads it with everything Murakami left out: class, geography, rage, and a violence that the original never had to confront. In Faulkner's 'Barn Burning' (1939), the poor man burns the rich man's property. In Lee's film, the rich man burns the poor's. Jong-su (Yoo Ah-in) reads Faulkner throughout ***Burning*** and says he sees himself in the writing, and Lee described his own film as 'the story of a young Faulkner living in the Murakami world.' The inversion is the key. Murakami's narrator is settled and married; Jong-su is a delivery driver and aspiring novelist from Paju, a farm town near the DMZ so close you can hear North Korean propaganda from loudspeakers across the border, and his father is in prison for assaulting a civil servant. From the first scene the triangle is loaded: Jong-su scrapes; Hae-mi (Jeon Jong-seo, in her screen debut) works part-time and mime-eats tangerines; Ben, played by Steven Yeun with a calibrated blankness that never quite registers as human, lives in a huge Gangnam apartment, drives a Porsche, and describes his profession as 'playing.'

    The sunset dance is the scene that splits the film open. At Jong-su's father's farm, the three have been smoking marijuana. Hae-mi, topless, dances to Miles Davis's 'Générique' against a sky streaked red and purple, the scene shot over an entire month to capture consistent twilight. Jong-su watches and weeps. Ben yawns. That single divergence encodes everything: the aspiring writer who cannot articulate what he feels, and the rich man for whom other people are interesting the way barns are interesting, briefly, before they burn. Shortly after, Ben confides to Jong-su that he burns greenhouses as a hobby, one every two months, always abandoned ones whose absence nobody will notice and whose destruction the police will not investigate. Jong-su checks every greenhouse in the area. None burn.

    Hae-mi disappears. Her cat, Boil, reappears in Ben's apartment; a pink watch that Jong-su gave her sits in Ben's drawer. Her suitcase remains in her unnaturally clean flat. The film provides evidence and withholds it in equal measure, and the withholding is the class argument made formal: some people can be erased because no structure exists to notice their absence, and the ambiguity the audience feels about whether Hae-mi is dead or simply gone is itself a reproduction of the social invisibility that makes her disposable. Lee said the film asks 'whether some people are like greenhouses that nobody cares about,' and Yeun, who to this day says he is the only person who knows who Ben really is, told the filmmakers that Ben's motive would be 'the emptiness in his heart.'

    The ending is a five-minute handheld take. Jong-su stabs Ben, who does not resist, and for the first time in the film, Ben sheds a tear. Jong-su strips off his blood-soaked clothes, burns them alongside the Porsche, and walks naked to his truck in the falling snow. The nudity mirrors Hae-mi's dance; both are strippings-bare. Lee: 'The last scene can be read as a warning about how rage can explode, but it can also ask for the meaning behind what happens when rage explodes in this way.' I do not think the film answers that question. I think the question is the point.

- title: "The Trial of the Chicago 7"
  type: "film"
  creator: "Aaron Sorkin"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/trial-of-the-chicago-7.jpg"
  posted: "2020-11-10"
  revised: "2020-11-10"
  text: |
    Sorkin's gift, and his limitation, is that he knows precisely how to ignite ideological fury in an audience. Within the first ten minutes of '***The Trial of the Chicago 7***', one is squarely on the side of the Seven: the historical backdrop is laid in with the efficiency of a master playwright, the prosecution is established as a Nixon-era political instrument, and Judge Julius Hoffman's open bias has been made unmistakable. Sorkin understands that the courtroom is always a stage, that legal procedure is political theatre, and he choreographs accordingly, fast and righteous and crackling with walk-and-talk energy even when nobody is walking anywhere. The usual objection is that he simplifies: that the genuine ideological fractures between the defendants, Abbie Hoffman's anarchic carnival against Tom Hayden's institutional liberalism, are flattened into a clean dramatic arc. Fair enough. But the simplification is in service of something real, a film that asks what the legitimate expression of political fury looks like when every institution has been corrupted against one.
    Watching it is painful in a way that implicates the viewer rather than flattering them. This was a group of young people who believed in equality and peace, in civil rights, in every ideal that constitutes human decency at its minimum: and under a government rife with political manipulation, their only means of expressing that belief in front of the court was to read aloud the names of the dead. More than four thousand names. The scene in which Tom Hayden (Eddie Redmayne) reads them out, the room filling with the sound of a war's accounting, is one of the few moments in the film where Sorkin's machinery stops and something else takes over: grief, stripped of rhetoric. Five years of imprisonment were waiting for these men, and that verdict fell in front of a full press gallery. That the 2020 release date, arriving in the middle of the George Floyd protests and a contested election, made the film feel not like history but like a live broadcast: that was not Sorkin's achievement, but it was the film's.

- title: "Mother"
  type: "film"
  creator: "Bong Joon-ho"
  creator_role: "dir."
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/films/mother.jpg"
  posted: "2020-11-07"
  revised: "2020-11-07"
  text: |
    '***Mother***' sits on the same elevation as '*Memories of Murder* (2003)', and the screenplay surpasses it. Where '*Memories of Murder* (2003)' follows detectives fumbling through a real unsolved case, confronting the limits of institutional justice from the outside, 'Mother' inverts the perspective entirely: a desperate woman investigates from within, and the investigation destroys her. Bong Joon-ho and Park Eun-kyo co-wrote the script with a structural ruthlessness that few crime films manage, building an unreliable protagonist whose distortions the audience shares right up until the moment the distortions become impossible to maintain. Kim Hye-ja, cast precisely because the audience knew her as warmth personified from decades of television, is used against that warmth with surgical precision: the film is a deliberate subversion of her public image, and she carries every gram of it.

    The acupuncture motif carries the screenplay: memory literally pressed out of the body, repressed and reinstated and finally performed as a dance in a field, the opening and closing image recontextualised into something between a ritual and a horror. Bong does not write villains; he writes people trapped by love and circumstance who do monstrous things for reasons one can follow all the way down. The film withholds catharsis as a matter of principle: the truth is buried, the justice system is irrelevant, and the final image is not resolution but endurance. I love it.

- title: "Life of Pi"
  type: "film"
  creator: "Ang Lee"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/films/life-of-pi.jpg"
  posted: "2020-11-07"
  revised: "2020-11-07"
  text: |
    The question '***Life of Pi***' poses, whether the beautiful story or the brutal one is true, is not meant to be answered: the story one chooses to inhabit is not decoration but survival, and narrative is not an ornament on top of experience but the very structure that makes experience bearable. Ang Lee and cinematographer Claudio Miranda shoot the Pacific as a liminal space, a boundary between life and death where bioluminescent water, breaching whales, and a floating carnivorous island exist in the same order of reality as Pi's (Suraj Sharma) grief and faith. The CGI tiger Richard Parker, created at enormous technical cost, is somehow less remarkable than the ocean itself: a vast, beautiful, terrifying character that dwarfs every human claim on it.

    The structural irony that Rhythm and Hues Studios, responsible for the film's extraordinary visual effects, filed for bankruptcy two weeks before it won the Oscar for Best Visual Effects, is a parable the film would have approved of: the beautiful story and the brutal story coexisting, one visible, one not. But watching it, one does not think about any of that. Whether it is the metaphysics of the story itself or the oceanic vistas, every moment reaches exactly where one cries. Some films earn their tears; this one makes the tears feel like understanding.

- title: "Stuart: A Life Backwards"
  type: "film"
  creator: "David Attwood"
  creator_role: "dir."
  year: 2007
  eval: "liked"
  image: "/assets/images/thoughts/films/stuart-a-life-backwards.jpg"
  posted: "2020-11-07"
  revised: "2020-11-07"
  text: |
    ***Stuart: A Life Backwards*** is a story that strikes one clean through, one that does not release in the usual way. Based on Alexander Masters' memoir of the same name, it tells the life of Stuart Shorter, a charismatic, violent, and homeless man whom Masters befriended through Cambridge activist circles, in reverse chronological order: beginning with the end and working backwards towards the wound. The reversal is not a gimmick. To understand how someone becomes who they are, one must resist the temptation of narrative momentum; one must slow down, turn around, look.
    Benedict Cumberbatch plays Masters with exactly the right degree of restrained bewilderment, the man who is listening harder than he knows how to articulate, the audience's surrogate in every scene. But the film belongs, unmistakably, to Tom Hardy as Stuart. Hardy does not perform vulnerability; he inhabits a kind of feral tenderness that makes every frame feel like it might crack. The famous charge against biographical drama is that it flattens its subjects into legible arcs of suffering and redemption. ***Stuart*** refuses this. Stuart Shorter remains strange, difficult, and irreducible to the last, and Hardy never lets the camera steal his personhood in the name of sympathy. Both performances are extraordinary, but Hardy's is one of the finest pieces of British acting of the decade.

    The film is ruthless about trauma: it does not ennoble; it compounds, each wound making the next more likely and more severe. There is no catharsis on offer. Instead there is the sense that this particular life, told backwards, has the structure of an elegy, and that the only honest response to it is to sit with that.

- title: "Night on Earth"
  type: "film"
  creator: "Jim Jarmusch"
  creator_role: "dir."
  year: 1991
  eval: "liked"
  image: "/assets/images/thoughts/films/night-on-earth.jpg"
  posted: "2020-10-31"
  revised: "2020-10-31"
  text: |
    Five cab rides, five cities, one November night: Jarmusch's ***Night on Earth*** is structured as a suite of small comedies and smaller elegies, each contained within the liminal capsule of a taxicab, each finding in that mobile confessional booth a different shade of human loneliness. The Helsinki segment is the one that lingers, four men condensing an entire social geography of grief into fifteen minutes of darkness. But the surprise of the film, on first encounter, is Rome: Roberto Benigni, playing a driver who subjects his dying priest passenger to an escalating catalogue of sexual confession, carries twenty-odd minutes almost entirely alone, and the fact that the priest dies mid-confession, leaving Gino still talking into the silence, tips the comedy into something stranger and more affecting than farce.
    The Cantonese title translates the film as 'This Minute on Earth,' which captures something the English title misses: not the whole night spread across geography, but the density of a single present moment, wherever one happens to be. Jarmusch is not interested in plot; he is interested in the irreducible texture of an encounter, the way two strangers in a confined space for twenty minutes can brush against each other's entire interior lives without ever quite touching.

- title: "Sherlock Jr."
  type: "film"
  creator: "Buster Keaton"
  creator_role: "dir."
  year: 1924
  eval: "liked"
  image: "/assets/images/thoughts/films/sherlock-jr.jpg"
  posted: "2020-10-28"
  revised: "2020-10-28"
  text: |
    Spectacular is the right word, but it barely touches it. ***Sherlock Jr.*** is a film that thinks about cinema as a problem, as a question about the relationship between the watcher and the watched, and then solves the problem through physical comedy of the most precise and dangerous kind. Keaton's projectionist steps into the film-within-a-film and is immediately, violently rejected by it, the landscape cutting around him with each edit so that he finds himself in a garden, then on a street, then at the edge of a cliff, then in a desert, his body the only constant in a world that refuses to cohere. The sequence predates every theoretical account of unstable cinematic space by decades. It was achieved without optical effects, through locked-off camera positions and meticulous in-camera editing, which makes it no less miraculous.

    The chase sequence is masterfully shot, one watches it with hands over one's head, not so much from suspense as from the sheer kinetic pressure of Keaton's invention. He performed everything himself, including the motorcycle ride in which he sits on the handlebars unaware the driver has fallen off, and the combination of technical precision and physical courage is so sustained that the film occasionally becomes a demonstration of what a human body can survive for the sake of a joke. All of which makes the final image, Keaton peering through the projection booth window at the screen to learn how one is supposed to court a woman, so unexpectedly tender. He spent the whole film trying to enter the movie. At the end, he still needs it to tell him what to do. There is more melancholy in that conceit than the slapstick earns any right to contain, and somehow it does.

- title: "My Octopus Teacher"
  type: "film"
  creator: "Pippa Ehrlich and James Reed"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/films/my-octopus-teacher.jpg"
  posted: "2020-10-26"
  revised: "2020-10-26"
  text: |
    The South African kelp forest in ***My Octopus Teacher*** is filmed with the patience and chromatic richness the subject deserves, and the octopus herself, in her camouflage and play and predation, holds the attention throughout. But the framing is harder to accept than the film seems to realise. Craig Foster declines to intervene when a shark attacks the octopus on the grounds that doing so would be 'interfering with nature,' which raises an obvious question he never pauses to answer: is he not part of nature? The octopus may have sought his proximity precisely as a form of protection; the relationship was not symmetrical in the way the film prefers to present it.

    What the film calls 'learning' is, more precisely, a man using a non-human creature as the occasion for his own emotional restoration. The octopus is consistently framed as a teacher, a gift, a presence that exists in order to illuminate Foster's interiority. Not once does the film extend genuine imaginative humility towards what the octopus's experience of this year might have been. The title announces the problem: *My* Octopus Teacher. The possessive, unremarked, says everything.

- title: "Tokyo Godfathers"
  type: "film"
  creator: "Satoshi Kon"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/tokyo-godfathers.jpg"
  posted: "2020-10-25"
  revised: "2020-10-25"
  text: |
    What immediately strikes one about ***Tokyo Godfathers*** is how completely it sets aside the mode one associates with Satoshi Kon. There is almost none of that technique from *Paranoia Agent* (2004) or *Paprika* (2006) of exploiting animation to dissolve the boundary between the psychological and the real, of using the medium's plasticity as a tool for epistemological anxiety. Save for the recurring angel motif, delicately placed, this is a film that trusts its story to carry everything: three homeless people, a found baby, and a Tokyo on Christmas Eve dense with coincidence. The coincidence is the point. Kon constructs a secular miracle narrative in which the city itself seems to conspire towards reunion, each improbable accident nudging these three lives back towards the connections they have severed.

    Gin, Hana, and Miyuki are among the most fully realised characters in animated film: an alcoholic with a lost daughter, a transgender woman with an abandoned past, a teenage runaway who stabbed her father in a moment she has been living inside ever since. The film treats each of them with the same unadorned compassion, never pitying them, never requiring them to redeem themselves through suffering, simply accompanying them through a night that changes the terms of their lives. The plotting risks melodrama at every turn and somehow holds its footing, because Kon understands that the genre conventions, the Christmas setting, the cascade of unlikely salvation, are not weaknesses to be concealed but honest acknowledgements that some stories require a little grace to resolve.

    And that final お父さん from Miyuki, three syllables addressed to the father she fled and feared was dead, delivered with a simplicity that makes everything preceding it suddenly cohere. Animation can render the emotional absolute in a mode that bypasses irony entirely. One did not expect to be levelled by it. One was.

- title: "Dark Waters"
  type: "film"
  creator: "Todd Haynes"
  creator_role: "dir."
  year: 2019
  eval: "liked"
  image: "/assets/images/thoughts/films/dark-waters.jpg"
  posted: "2020-10-18"
  revised: "2020-10-18"
  text: |
    Todd Haynes and cinematographer Ed Lachman shot ***Dark Waters*** on vintage lenses through a desaturated palette of greys and institutional browns, and the effect is not period recreation but diagnosis: the film looks the way West Virginia's contaminated water table feels. Every frame borrows the visual grammar of 1970s paranoia cinema, *All the President's Men* (1976) and *The Parallax View* (1974), as though Haynes understood that a story about a chemical company poisoning an entire region for decades required the formal language of conspiracy, because that is precisely what it was. Mark Ruffalo's Robert Bilott is not a crusading attorney; he is a corporate defence lawyer who stumbled onto the wrong file and could not put it down. Ruffalo plays him hunched, almost flinching, the posture of a man who knows the institution he is fighting is the same institution that trained him.

    PFOA does not break down in the environment or in the body, which is why they are called forever chemicals, and the film has the same quality of persistence, of something that lodges and will not leave. Haynes films corporate malfeasance not as aberration but as system: the boardrooms are staffed not by villains but by the logic of routine decision-making, the consensus that concealment and profit are simply how things are done. This reading of institutional evil is more frightening than any individual antagonist, and it stays.

- title: "活着"
  title_en: "To Live"
  type: "film"
  creator: "Zhang Yimou"
  creator_role: "dir."
  year: 1994
  eval: "loved"
  image: "/assets/images/thoughts/films/to-live.jpg"
  posted: "2020-10-17"
  revised: "2020-10-17"
  text: |
    The shadow puppets are Zhang Yimou's invention, absent from Yu Hua's novel entirely, and they do the work that no dialogue in ***To Live*** could manage. Fugui's puppet theatre is the one thing that survives every political upheaval: the gambling debts, the civil war, the Great Leap Forward. It is art as the residue of a life that history keeps stripping bare. When the puppets are finally burned during the Cultural Revolution, the loss registers not as political commentary but as something closer to an amputation. Zhang understood that if he gave his protagonist a craft, the destruction of that craft would say more about the era than any speech could.

    Ge You's Fugui won Best Actor at Cannes, and the performance earns it through what it refuses to do. He does not break down. He does not rage. He endures, and the endurance is its own form of horror, because it reveals how completely an era can train the survival instinct to override every other human response. The Fengxia death scene is where Zhang's method becomes most devastating: she bleeds to death in childbirth because the trained doctors have been imprisoned as class enemies, and the only available help is young Red Guard students who have memorised ideology and nothing of medicine. They feed her seven mantou because that is what they know how to do, and the gap between their earnestness and her dying is the entire indictment.

    The film was banned in China, and what earned the ban was not polemic but precision. Zhang says what he says without raising his voice. People of that era watched everything happen with no grammar for agency, no framework in which their actions could alter what was coming, and the helplessness simply floated in the air. Gong Li's Jiazhen carries the losses her husband cannot articulate, and the two of them together constitute a portrait of survival so complete it becomes its own accusation: that a government could do this to its people, and that its people could live through it, and that living through it was not the same as being unharmed.

- title: "让子弹飞"
  title_en: "Let the Bullets Fly"
  type: "film"
  creator: "Jiang Wen"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/films/let-the-bullets-fly.jpg"
  posted: "2020-10-11"
  revised: "2020-10-11"
  text: |
    ***Let the Bullets Fly*** gives one Zhang Mazi as the only unmasked figure in a world of costumes. Every other character in the film is performing: Chow Yun-fat's Huang Silang maintains a theatrical warlord's grandeur that is itself a double bluff, since the real Silang and his body double are interchangeable, identity dissolved into the mechanics of power. Ge You's Tang operates entirely through servility and calculation. Zhang Mazi alone refuses the performance, and the refusal is his weapon: his authenticity is not naivety but a form of aggression, the one move that a system built on mutual pretence cannot absorb. Jiang Wen plays this with the physical confidence of someone who has thought about what heroism actually looks like and decided it looks like a man who cannot be anyone other than himself.

    The film broke box office records in China in 2010, earning 674 million yuan, and was read immediately as political allegory: the bandit-governor opposition mapped onto contemporary power structures, the townspeople's uprising freighted with implications the censors apparently decided to tolerate. Jiang Wen has been deliberately evasive about the allegory in every interview since, which is itself a political statement of considerable precision. The film is a Rorschach test: every audience member reads their own politics into the three-way struggle between bandit, warlord, and townsfolk, and each reading is defensible because the allegory refuses to declare itself.

    The Leone connection is real and visible in the wide-frame compositions, the operatic standoffs, the sense that violence is both spectacle and argument. But where Leone's West is mythological, Jiang Wen's Republican-era China is specifically, unmistakably political, and the action carries a distinctly Chinese argument about authentic selfhood against systemic absorption. The ending, in which everyone departs for Shanghai and the victory feels oddly hollow, is the honest conclusion: systems outlast individuals, and the pleasure of watching someone refuse to be bought is not the same as watching them win. That the film delivers this with wit and formal confidence, at the scale of popular entertainment, still feels rare. It does not reach *Devils on the Doorstep* (2000) or *In the Heat of the Sun* (1994). It was never going to. But very good Jiang Wen is a category most directors never approach.

- title: "鬼子来了"
  title_en: "Devils on the Doorstep"
  type: "film"
  creator: "Jiang Wen"
  creator_role: "dir."
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/films/devils-on-the-doorstep.jpg"
  posted: "2020-10-11"
  revised: "2020-10-11"
  text: |
    The plot of ***Devils on the Doorstep*** turns on the interpreter Dong Hanchen (Yuan Ding), who does not translate so much as falsify. Standing between Japanese prisoner and Chinese villagers, he rewrites threats as politeness and pleas as insults, each deliberate mistranslation widening a gap that no amount of goodwill can bridge. The device makes language itself the site of tragedy: communication, ordinarily the medium of communion, becomes the instrument through which two groups of people are shepherded towards a catastrophe that neither side can see forming. Dong Hanchen translates not between languages but between incompatible worlds, and the comedy of the early scenes, the villagers and their captive stumbling towards something resembling mutual recognition, curdles precisely because the audience can see the falsification that the characters cannot.

    Hanaya Kosaburo (Teruyuki Kagawa) is the film's proof of Jiang Wen's thesis that circumstances merely reveal different facets of the same person. As a prisoner stripped of power, Hanaya displays a genuine, almost pathetic gratitude; restored to his uniform, he becomes capable of atrocity. The transformation is merciless because it is not a transformation at all. What crumbles under pressure turns out to be everything one had assumed was bedrock, and the film dramatises this with the consistency of a controlled experiment: the same body, three different men, the variable being nothing more than who holds the weapon. The villagers undergo the same dissolution. The film earned a seven-year ban from Chinese authorities and Jiang Wen's removal from the director's chair, because a war film with no heroes, only people trying to live, is a rebuke to every nationalist mythology that insists otherwise.

    The last minutes make the argument formally. Shot entirely in black and white until then, the film shifts to colour for the severed head's POV: the world seen through dying eyes, suddenly vivid, the marketplace and the sky and the Japanese soldiers rendered in the saturated tones of a life that is leaving. It is the most radical formal choice in Jiang Wen's filmography, and it earns its place because it refuses the comfort of martyrdom. The head does not see meaning. It sees colour. And then it sees nothing.

- title: "太阳照常升起"
  title_en: "The Sun Also Rises"
  type: "film"
  creator: "Jiang Wen"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/sun-also-rises.jpg"
  posted: "2020-10-08"
  revised: "2020-10-08"
  text: |
    Three cinematographers shot ***The Sun Also Rises***, each handling different episodes, and the result is a film that feels less like a single narrative than like three distinct visual worlds held in orbit by Jiang Wen's conviction that they rhyme. Zhou Yun's Mad Mother, standing on the train shouting into wind, is the image I keep returning to: a woman whose grief has crossed into a state that looks like madness from outside and feels like the only honest response from within. The sexual repression wound so tight it achieves its own gravity, the cold blue-grey sky pressing down on everything, Jiang Wen's distinctly corporeal camerawork: any one of these would justify watching. Together they make a sensory argument, a film that insists on being felt before it is understood.

    The four non-linear episodes move backwards through decades of Chinese history, and the structure enforces Jiang Wen's demand at the formal level. The cold-to-warm alternation in the opening scene, where Zhou Yun is knocked down by Fang Zushe, rhymes with the cold-to-warm alternation in the final scene with the newborn, and it is a correspondence that does not announce itself, that one only notices after the fact, and that, once noticed, makes the film feel as though it had been dreaming of its own ending from the first frame. The cyclical structure underneath the surrealism is not obscure; it is patient. The film lost money, earning thirty million against an eighty-million-yuan budget, and the commercial failure is almost a confirmation: this was never a film built to be understood on first encounter. One spent the middle half-lost and half-bewildered, which is probably the correct state. By the end, I only wanted to cry.

- title: "Judgment at Nuremberg"
  type: "film"
  creator: "Stanley Kramer"
  creator_role: "dir."
  year: 1961
  eval: "meh..."
  image: "/assets/images/thoughts/films/judgment-at-nuremberg.jpg"
  posted: "2020-10-06"
  revised: "2020-10-06"
  text: |
    ***Judgment at Nuremberg*** is, in practice, something like an extended, magnificently acted documentary. Abby Mann's screenplay, adapted from his own television play, refuses simplification in its distribution of blame: the intranational pressures on ordinary Germans, the reluctance to testify against one's own people, appeasement, the complicity of the Soviet Union and Britain and the Vatican, patriotism deployed as legal defence, the concept of so-called Laws of Nature invoked as moral absolute. The film does not simplify any of this, and the defence attorney's arguments are presented with enough force that Maximilian Schell won the Oscar by playing the least comfortable person in the room. One personally disagrees with Judge Haywood's verdict, and that disagreement itself illustrates the problem with anchoring jurisprudence in natural law: the intuitions feel universal until they don't.

    But the film keeps reaching for the human and forgetting that what belongs in a courtroom is jurisprudence. The issues touched on here resist being deeply examined in any bounded time, and at nearly three hours the film still feels like it has only scratched the surface of what rigorous legal argument might demand. The emotional climax, when Burt Lancaster finally speaks, is undeniably powerful; one wishes the film had trusted the law as much as it trusts the feeling.

- title: "The Godfather: Part III"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1990
  eval: "meh..."
  image: "/assets/images/thoughts/films/godfather-part-iii.jpg"
  posted: "2020-10-04"
  revised: "2020-10-04"
  text: |
    Unquestionably the weakest of the trilogy, and the weaknesses are structural rather than incidental. Beyond the evident pressure of a rushed production, ***The Godfather: Part III*** suffers from two compounding problems: the last-minute replacement of Winona Ryder with Sofia Coppola in the role of Mary, which places a performer of limited experience inside the film's climax; and the general quality of reluctance that haunts the project, the sense of a third act being performed out of obligation to the first two rather than generated from its own necessity. Michael's ending is indefensible by any internal logic the trilogy has established, and the opera-house finale, which should devastate, is undermined before it can take hold.
    The trilogy problem is a real one. A third chapter almost always disappoints, burdened by the obligation to resolve what the first two films were wise enough to leave in productive tension. *The Return of the King* (2003) remains the exception that tests the rule. Once one accepts that this film was probably impossible to make well, it becomes bearable: a flawed conclusion to something that did not need a conclusion, carrying enough of the Corleone atmosphere to remind one, ruefully, of what was there before.

- title: "The Godfather: Part II"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1974
  eval: "loved"
  image: "/assets/images/thoughts/films/godfather-part-ii.jpg"
  posted: "2020-10-04"
  revised: "2020-10-04"
  text: |
    The dual chronology of ***The Godfather: Part II*** is not a structural conceit but the thesis itself. Vito's rise through 1910s Little Italy and Michael's consolidation of power in 1958 alternate in extended blocks, and the parallelism forces a comparison at every cut: Vito built his empire to protect his family; Michael destroys his family to protect his empire. Gordon Willis shoots the two timelines in different temperatures, the immigrant origin story bathed in warm sepia tones, Michael's present rendered in cold institutional light, and the colour itself becomes the moral argument that no dialogue needs to state. The same empire, two men, opposite trajectories. The warmth was lost.

    Al Pacino's Michael in the Senate hearing sits with absolute stillness while Tom Hagen (Robert Duvall) performs outrage on his behalf, and the stillness is the performance: power exercised through silence, control so total it reads as absence. When the mask finally cracks, in the confrontation with Kay, the rupture feels like something structural giving way. Robert De Niro speaks less than anyone in his storyline and communicates everything, his young Vito calibrated through months of studying Brando's performance frame by frame, his Sicilian learned over four months in Trapani. The final image, Michael alone and ageing and irretrievably isolated, is among the most wrenching conclusions in American cinema: a man who won every battle and has no one left to tell.

- title: "The Godfather"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1972
  eval: "loved"
  image: "/assets/images/thoughts/films/godfather.jpg"
  posted: "2020-10-03"
  revised: "2020-10-03"
  text: |
    Paramount wanted to fire Coppola multiple times during production. They wanted a cheap, contemporary-set gangster picture; he fought for a 1940s period film. They wanted Robert Redford or Ryan O'Neal as Michael; he insisted on the then-unknown Al Pacino. When the rushes came back, executives thought the prints were defective because Gordon Willis had underexposed them so severely that Marlon Brando's eyes were invisible. Robert Evans, Paramount's head of production, rejected Coppola's two-hour director's cut and demanded a longer version with more family scenes. The final film runs nearly three hours, fifty minutes longer than Coppola wanted, and the irony is that Evans demanding more made ***The Godfather*** better. Almost nothing about how this film was made should have worked.

    Everything works. Willis's chiaroscuro, the deliberate masking of faces in shadow, turned out to be the visual language the material required: the darkness in the office, the sunlight at the wedding, the moral grammar established in the first five minutes and sustained for three hours. Brando stuffed cotton wool in his cheeks for his secret audition, applied shoe polish to his hair, and was so transformed that executives watching the tape did not recognise him; the performance that emerged carries the same quality of invention, a man built from the inside out, the voice and the stillness and the authority all arriving as though they had always existed. Lenny Montana, who played Luca Brasi, was a real enforcer for the Colombo crime family, and was so visibly nervous performing opposite Brando that Coppola added the scene of Brasi rehearsing his speech to incorporate the anxiety. 'Leave the gun, take the cannoli' was ad-libbed by Richard Castellano. The film is full of these accidents that became inevitabilities.

    The baptism montage, Michael renouncing Satan at the altar while his men execute the heads of the Five Families, remains among the most devastating uses of cross-cutting in cinema: the sacred and the profane not juxtaposed but fused, the irony so precise it reads as moral verdict. Willis's photography, warm and amber and almost nostalgic, gives the violence a beauty that is itself part of the argument: this is how power mythologises itself, and the film is honest enough to let the audience feel the seduction before it shows the cost. Watching it, one can see the conversation that would unfold across decades, Scorsese in sustained dialogue with Coppola, demythologising what Coppola mythologised. It would not be wrong to say the model is this formidable. Thanks to 山鸡 for the commentary, which made the detail finally legible.

- title: "Stardust Memories"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1980
  eval: "liked"
  image: "/assets/images/thoughts/films/stardust-memories.jpg"
  posted: "2020-10-01"
  revised: "2020-10-01"
  text: |
    ***Stardust Memories*** is Allen's most nakedly adversarial film, and the one that got him into the most trouble with audiences who couldn't tell whether they were the target. Sandy Bates, Allen's transparent surrogate, attends a retrospective of his own work while being besieged by fans, critics, and studio executives demanding he stay funny, stay accessible, stay theirs. The Fellinian debt is acknowledged rather than concealed: the black-and-white cinematography, the harem of idealised women, the director paralysed by memory and mortality all arrive stamped with *8½* (1963)'s return address. What Allen adds, in his own characteristically sideways fashion, is the comedy of bad faith, the spectacle of an artist performing self-examination so ostentatiously that the performance becomes its own indictment. The film's ending, in which the 'film' Sandy has been making is revealed to be the film one has been watching, is the oldest postmodern trick in the book; but Allen earns it, because the whole edifice has been building towards that recursive collapse.

    The critics who felt personally mocked were not wrong, exactly; but later reassessments have converged on a more uncomfortable reading: Allen is satirising Sandy's elitism as much as he is satirising the fans, staging a narcissist's fantasy of being misunderstood and then quietly letting the staging show. The women are projections, as they so often are in this filmography, but here that projection is part of the pathology. One line cuts through all of it: 'Relationships depend on luck. But people just don't want to acknowledge that.' Delivered with the flat finality of someone who has thought about this for twenty years and arrived nowhere, it is Allen's credo and his alibi simultaneously. The film that surrounds it is too smart to be comforting, and too funny to be forgiven.

- title: "Following"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 1998
  eval: "meh..."
  image: "/assets/images/thoughts/films/following.jpg"
  posted: "2020-09-22"
  revised: "2020-09-22"
  text: |
    ***Following*** is the film Nolan had to make before he could make anything else, and it shows. Shot over a year of weekends on a budget of roughly six thousand pounds, in black and white, with a cast of mostly non-professionals, it has the stripped-down intensity of a calling card and the structural ambitions of someone who has already decided that chronology is a problem to be solved. The three-strand timeline, distinguishable by Bill's bruising, does create genuine dramatic irony; the detective's final onion-peeling of evidence is a satisfying piece of construction.

    The trouble is that the non-linear editing has no purpose beyond demonstrating that it can be done. The structure reveals a twist without deepening character or sharpening theme; once the trick is understood, the film becomes, retroactively, a fairly slight story about a man being manipulated. The lead performs shifty anxiety throughout, which is at least appropriate to the material, but the second lead's performance is something else entirely, the manner of someone reading lines with conviction they have not yet earned. One reaches for *Following* mainly when one needs a clear example of editing deployed as ostentation rather than argument: the formal ambition is real, but it has not yet found an object commensurate with it.

- title: "Manhattan"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1979
  eval: "liked"
  image: "/assets/images/thoughts/films/manhattan.jpg"
  posted: "2020-09-21"
  revised: "2020-09-21"
  text: |
    The opening of ***Manhattan*** is a sustained act of mythologisation: Isaac Davis narrating competing love letters to New York over Gershwin's *Rhapsody in Blue* (1924), Gordon Willis's black-and-white cinematography turning a city in fiscal crisis into pure romantic abstraction. Allen understood that Gershwin could do ideological work, that the music would seduce the audience into accepting Isaac's worldview before Isaac had demonstrated he deserved it. The plot is, as noted, fairly straightforward: a narcissist cycles through women, damages each of them in proportion to his self-regard, and ends by reaching for the one person in the film who behaves with genuine integrity, only to discover, via that final scene, that he has left it too late.

    The whole film is a narcissist staging his own tragedy, which means one is never quite sure how much of the irony is intentional. The critical reading that Tracy, far from being a passive figure, is the one person in the film with moral clarity, has accrued weight over the decades, not least because it makes the ending devastating in a way that resolves otherwise nagging discomfort. That final scene, its dialogue set against the Gershwin that has been selling Isaac's self-image all along, is utterly shameless in the best possible sense: the music turns ironic, the myth collapses, and what is left is a man who has talked himself out of the only uncomplicated thing he had. Very typical Woody Allen.

- title: "Love and Death"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1975
  eval: "liked"
  image: "/assets/images/thoughts/films/love-and-death.jpg"
  posted: "2020-09-20"
  revised: "2020-09-20"
  text: |
    ***Love and Death*** is Allen doing Shakespearean theatre in the manner of a stage comedy, which is a more precise description than it might sound. The film deploys its homages with the confidence of someone who has actually read the originals: Tolstoyan family trees and epic historical canvas, Dostoevskian interior monologue and existential guilt, Bergmanesque death imagery direct from *The Seventh Seal* (1957), dream sequences that borrow the austerity of *Wild Strawberries* (1957). The parody is affectionate throughout, never cheap, the kind that can only be written by someone who admires what they are mocking. Allen has described it as his personal favourite among his early comedies; one can see why, because it is the film where his absorption in Russian literature, genuine and deep, finds a form that matches it.

    Diane Keaton's Sonja gives the film its philosophical pressure: more articulate than Allen's Boris, less encumbered by cowardice, she combines Natasha's passion with Ivan Karamazov's relentless interrogation of God and mortality. The debates between the two characters keep returning to the same Dostoevskian joke, namely that profound philosophical questions yield no satisfying answers, delivered here in vaudeville packaging. The pile of sources, Tolstoyan, Dostoevskian, Shakespearean, Bergmanesque, flagged and catalogued and stitched together, holds because Allen understands them well enough to let them contradict each other productively. It arrives at the same place *Annie Hall* (1977) would, two years later: life is meaningless and also worth every argument about whether it is.

- title: "The Purple Rose of Cairo"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1985
  eval: "liked"
  image: "/assets/images/thoughts/films/purple-rose-of-cairo.jpg"
  posted: "2020-09-15"
  revised: "2020-09-15"
  text: |
    ***The Purple Rose of Cairo*** threads its meta conceit through every layer of the film instead of using it as a frame and stepping back. Tom Baxter walks out of the screen, and the gag immediately becomes a question: what does a fictional character lack that a real person has, and is the answer, whatever it is, a desirable thing to possess? Jeff Daniels plays both Tom and the actor Gil Shepherd, the wide-eyed movie hero and the calculating Hollywood professional, and the contrast does the film's argumentative work quietly but precisely. Tom is loyal, romantic, brave, and incapable of real consequence; Gil is real, flawed, and gone the moment his career requires it. Cecilia, choosing Gil, chooses reality, and reality delivers what it always promises: betrayal dressed as pragmatism.

    The Depression-era setting is not incidental. The film understands why cinema existed in the 1930s as a social institution, why Cecilia goes back every day, why the same film plays to the same audience who mouth the dialogue along with the screen. Allen loves cinema enough to make a film about the cruelty of loving it too much. The ending, Cecilia watching Fred Astaire dance through her tears until the tears dry and something close to consolation settles over her face, is among the most precisely calibrated final images in his filmography. One was still naively waiting for Gil Shepherd when the film ended; the film, having predicted this, had already moved on. It ranks close to *Annie Hall* (1977) in one's estimation, and not by accident.

- title: "Du levande"
  title_en: "You, the Living"
  type: "film"
  creator: "Roy Andersson"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/you-the-living.jpg"
  posted: "2020-09-09"
  revised: "2020-09-09"
  text: |
    ***You the Living*** is the second panel of Andersson's informal Living Trilogy, and arguably the most purely comic of the three: fifty-odd vignettes, each a single static wide-angle take, each a sealed universe of minor humiliation and inarticulate longing. The title is lifted from Goethe's *Roman Elegies* (1795), an injunction to savour the warmth of one's bed, and the cruelty of the irony is characteristic: these people are alive in the technical sense only. A man is executed for botching a tablecloth trick before royalty; a psychiatrist confesses he can no longer help anyone; a brass band wanders perpetually through rain. The Brechtian apparatus, the pallid faces and flat line readings, the artifice of the constructed sets, all conspire to produce not detachment but something stranger: an ironic compassion, a grief at arm's length.
    That evening the occasion of watching was itself freighted: *Annie Hall* (1977) had just finished in the same sitting, and the combination was almost too much. What Andersson shares with Allen, across their vast stylistic differences, is the conviction that comedy and sorrow are not opposites but the same substance in two phases. One can only say that *You the Living* (2007) is an excellent film, and that it left one quite sorrowful, in a way that took some time to place.

- title: "Annie Hall"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1977
  eval: "loved"
  image: "/assets/images/thoughts/films/annie-hall.jpg"
  posted: "2020-09-09"
  revised: "2020-09-09"
  text: |
    ***Annie Hall*** was originally called *Anhedonia*, the clinical term for the inability to experience pleasure, and the first rough cut ran 140 minutes and contained a murder mystery. Allen and editor Ralph Rosenblum spent months in the editing room dismantling the film they had shot and discovering, inside it, the film it was supposed to be: a neurotic's post-mortem on a relationship already dead at the opening frame. That the greatest American romantic comedy was found in the cutting, carved out of a sprawling mess by two people who kept removing material until only the essential remained, is itself an argument about how art sometimes arrives: through recognition inside the wreckage. The cocaine sneeze was unscripted. Diane Keaton wore her own clothes. The eggs monologue, the one about needing the eggs, was conceived two hours before the final screening. The film that beat *Star Wars* (1977) for Best Picture was assembled from accidents that turned out to be inevitabilities.

    The formal arsenal is the comedy's skeleton and its subject simultaneously. The fourth-wall addresses, the split-screen therapy session where Alvy and Annie describe the same relationship in incompatible terms, the subtitle scene where what is said and what is meant run in parallel and never converge: each device is not decoration but a precise notation of how a neurotic mind processes intimacy. Alvy cannot simply experience the relationship; he must narrate it, annotate it, freeze-frame it, pull Marshall McLuhan from behind a lobby card to win an argument. The formal invention is the character flaw. Keaton's Annie operates in a different mode entirely, her performance so naturalistic against Allen's vaudeville that the gap between them becomes visible as a difference not of opinion but of being. She is present where he is retrospective, and the film knows this, which is why it sides with her even as it tells his story.

    The final montage of memories, joyful scenes now coloured by knowledge of loss, achieves what very few films manage: it makes the sadness feel earned rather than manufactured. The Groucho Marx joke, 'I wouldn't want to belong to any club that would have me as a member', is less punchline than diagnosis, a man unable to accept anything that would consent to make him happy. And then the eggs: 'I thought of that old joke. This guy goes to a psychiatrist and says, "Doc, my brother's crazy. He thinks he's a chicken." And the doctor says, "Well, why don't you turn him in?" And the guy says, "I would, but I need the eggs."' I came away from it with the specific ache of mourning romantic idealism itself, the impossibility of sustaining the feeling that sustains everything else, and the knowledge that one keeps trying anyway, because one needs the eggs. Loved it completely.

- title: "Sånger från andra våningen"
  title_en: "Songs from the Second Floor"
  type: "film"
  creator: "Roy Andersson"
  creator_role: "dir."
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/films/songs-from-the-second-floor.jpg"
  posted: "2020-08-29"
  revised: "2020-08-29"
  text: |
    Coming to ***Songs from the Second Floor*** only after *A Pigeon Sat on a Branch Reflecting on Existence* (2014) produces an odd temporal vertigo, the sensation of reading the first chapter of a book after already knowing its final page. The opening work of the Living Trilogy is also its most formally austere: 46 static tableau shots, every one of them in wide-angle fixed frame, with the exception of a single reverse tracking shot that stands out precisely because of its singularity. The chalky makeup, the flat affect, the cramped institutional interiors built in Andersson's Stockholm studio, Studio 24: the sense of alienation crosses the screen without mediation. A girl does not know she is walking towards her death. A merchant does not know he is walking towards his ruin. The audience does not know the building outside the frame is swaying. Andersson names this condition 'unknowing', and makes it contagious.

    The film's deepest and most unsettling project is the representation of *taming*: it is saturated with its images while deliberately evacuating any reflection on it. People stand indifferent before a man weeping in the street. A teacher's cries for help register as ambient noise. A young girl is sacrificed at a cliff-side altar in a desperate bid to restart economic progress, and the bystanders shuffle away as though from a middling theatrical event. By draining the scenes of moral commentary, Andersson sharpens the satirical edge past the point of comfort. The critique lives in that contrast between the depicted fact and the film's silence about it. Compared to *A Pigeon Sat on a Branch* (2014), there is here a slightly clearer through-line in Karl's story, but the film resists it, keeps pulling towards the collective rather than the individual. Civilisation gridlocked; everyone stranded; César Vallejo quoted somewhere in the middle: 'I am sorry, but I cannot do anything.' It is one of the most disquieting films one has seen.

- title: "Inception"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/films/inception.jpg"
  posted: "2020-08-29"
  revised: "2020-08-29"
  text: |
    The rotating hotel corridor in ***Inception*** was a hundred-foot set suspended on concentric rings, powered by electric motors, and Joseph Gordon-Levitt performed all but one of his own stunts across three weeks of filming. The freight train that tears through city streets was a real railway engine shell mounted on a tractor-trailer chassis driven through downtown Los Angeles. Hans Zimmer built the entire score on subdivisions and multiplications of the tempo of Édith Piaf's 'Non, je ne regrette rien', the musical cue that warns dreamers of an impending kick, which means the famous brass notes are the Piaf song stretched to match dream-level time dilation. So much of this film was actually built rather than rendered, and the dream-world has weight because of it: the materiality is the argument, the proof that constructed realities can feel as solid as the one you wake into.
    The emotional content is real but it sits in a locked room at the centre of all the machinery, and the machinery is so spectacular that one sometimes forgets to feel it. Nolan shelved the project from 2001 to 2009, deciding he needed the experience of three films before he could execute it, and the patience shows in the scaffolding: every exposition beat arrives through Ariadne's surrogate-audience function, the dream-level geography clean once the anxiety of first encounter subsides. The top spins and the cut comes, and Nolan has said the key is that Cobb is not looking at it, that he does not care, which is either the film's deepest emotional statement or its most elegant evasion. One notices the distance. Whether the distance is the point is the question the film declines to answer.

- title: "La vita è bella"
  title_en: "Life Is Beautiful"
  type: "film"
  creator: "Roberto Benigni"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/life-is-beautiful.jpg"
  posted: "2020-07-26"
  revised: "2020-07-26"
  text: |
    ***Life Is Beautiful*** is a textbook demonstration of plant-and-payoff so precise it feels almost theoretical: every element introduced in the film's first half, the romantic comedy set in sun-soaked pre-war Tuscany, returns with doubled force in the concentration camp sequences of the second. The riddle-loving Aryan doctor, the hat trick, the 'Good morning, Princess!', 'Buongiorno, Principessa!', the wink shared between father and son: Benigni and co-writer Vincenzo Cerami laid these fuses with extraordinary care. The formal conceit, comedy first so that one falls in love before one is asked to watch someone suffer, is borrowed from Chaplin's logic in *The Great Dictator* (1940), but the emotional arithmetic is Benigni's own. Guido's game, the fiction he constructs around the camp's rules to protect his son Giosuè, is storytelling as an act of love so total it constitutes a moral philosophy.

    The critical controversy, whether a Holocaust comedy risks trivialising atrocity, feels beside the point in the watching of it. Benigni called the film a fable, and the word is precise: fables are not documentaries, they are machines for transmitting moral truth through the imagination. The setups are already delightful when they first appear, so that their later returns function as recognition and grief simultaneously. One could barely believe Guido was dead even at the ending; when the boy runs out to see the American tank and the score swells, one was already in tears. The film has constructed a space in which the feeling is the only true thing. Loved this film beyond almost anything.

- title: "The Irishman"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2019
  eval: "liked"
  image: "/assets/images/thoughts/films/irishman.jpg"
  posted: "2020-07-24"
  revised: "2020-07-24"
  text: |
    ***The Irishman*** is structured as a triple-layered flashback, Frank Sheeran (Robert De Niro) narrating from a nursing home in old age, and that retrospective distance colours every act of violence with something it rarely has in Scorsese's earlier gangster films: not glamour but regret, time pressing down on every frame. Joe Pesci's Russell Bufalino is the anti-*Goodfellas* (1990) performance, a man whose power is expressed entirely through quietness, the soft voice and the patient silences more frightening than any of Tommy DeVito's eruptions. Al Pacino's Hoffa is charismatic and stubborn and tragic, a man who cannot stop being himself even when being himself is the thing that will kill him, and the phrase 'I heard you paint houses', mob code for killing, carries the weight of every euphemism the film uses to keep the violence at one remove from the men who order it.
    The scene near the end where Frank goes alone to select his coffin sits particularly vivid. The salesman asks whether it is for a woman or a man, and Frank says: 'For me.' A man who has outlived everything that gave his life its shape chooses the box he will be placed in alone. The ending, Frank asking the nurse to leave the door a little bit open, is Scorsese's final word on a career spent romanticising these men: no achievement, no justice, only an old man in a room, waiting for no one who is coming.

- title: "The Wolf of Wall Street"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/wolf-of-wall-street.jpg"
  posted: "2020-07-23"
  revised: "2020-07-23"
  text: |
    It is hard to articulate exactly what one feels about ***The Wolf of Wall Street***, and the difficulty belongs to the film. DiCaprio's speeches, his set pieces of narco-euphoria, the physical comedy of the quaalude crawl: every small gesture is calibrated to embody the nouveau riche desperate to turn money into spectacle. The performance finds the animal joy in Belfort's derangement without once asking for sympathy, and Scorsese, who has spent his career filming charismatic criminals, understands that the most damning portrait is the one that never lifts its finger to point. The film makes the audience complicit, engineers three hours of uncomfortable pleasure, and then leaves the final image, Belfort's seminar audience mirroring us in our seats, as a quiet indictment of everyone in the room.
    As storytelling craft, the film is frighteningly tight. The Swiftian reading, that this is savage satire rather than glamorisation, has been argued at length, and the debate will not be settled here: whether Belfort's story is taken as critique or as spectacle, the narrative architecture holds either reading without strain. Whether it captures the reality of Wall Street, only those who ran it can say. The storytelling itself is among the tightest Scorsese has produced.

- title: "The Aviator"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2004
  eval: "loved"
  image: "/assets/images/thoughts/films/aviator.jpg"
  posted: "2020-07-23"
  revised: "2020-07-23"
  text: |
    One first encountered Howard Hughes through the name on the letterhead of the Howard Hughes Medical Institute, and assumed, reasonably enough, that it honoured some eminent scientist. The reality is stranger and more telling: HHMI was founded by an aviator-industrialist who wanted medical research to probe the genesis of life processes, which places him somewhere between a twentieth-century Elon Musk and Tony Stark, a wealthy tech obsessive whose reach exceeded every sensible boundary. Scorsese understands this type instinctively. ***The Aviator*** is not a conventional biopic in the mode of celebrating its subject from a respectful distance; it is a film about what ambition costs when the mind that houses it begins to crack.

    DiCaprio renders Hughes's OCD not as quirk or colour but as genuine, debilitating terror, and the performance is all the more remarkable for never losing the character's imperial self-certainty even as the compulsions tighten around him. Robert Richardson's cinematography deserves its own acknowledgement: the progression from warm two-strip Technicolor pastiche in the early sequences to a coldly clinical palette later is one of the more elegant uses of colour as psychological notation in contemporary cinema. That 山鸡 suggests DiCaprio is best suited to playing the unhinged may be reductive, but it contains enough truth to sting. One adored this film.

- title: "Mulholland Dr."
  type: "film"
  creator: "David Lynch"
  creator_role: "dir."
  year: 2001
  eval: "liked"
  image: "/assets/images/thoughts/films/mulholland-dr.jpg"
  posted: "2020-07-22"
  revised: "2020-07-22"
  text: |
    ***Mulholland Dr.*** is, with some effort, untangleable: the first two-thirds as Diane Selwyn's guilt-ridden wish-fulfilment fantasy, the final act as its brutal dissolution, the blue box as the threshold object that lets the real intrude upon the imagined. The Silencio theatre sequence, in which Rebekah Del Rio's a cappella 'Llorando' continues after she collapses mid-performance, crystallises the film's governing logic: the illusion survives the body that produces it. As a piece of arthouse cinema, that scene earns its reputation; the film around it is a less settled proposition.

    The critical consensus that the film is 'incomprehensible' is mostly the wrong objection, a failure of patience rather than a genuine narrative defect, but there are real structural problems here that the Lacanian scaffolding (desire structured around absence, fantasy collapsing when the Real intrudes) tends to paper over rather than resolve. Lynch's most significant miscalculation may have been underestimating how thoroughly the Freudian apparatus would be deployed: now every dream in a film automatically summons the couch, producing a critical discourse so thick with psychoanalytic attribution that the film's stranger, more irreducible textures get flattened. Taken as a semi-commercial semi-arthouse object, it is more than acceptable. As the greatest film of the century, the designation a BBC poll awarded it, one remains sceptical.

- title: "Frequency"
  type: "film"
  creator: "Gregory Hoblit"
  creator_role: "dir."
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/films/frequency.jpg"
  posted: "2020-07-22"
  revised: "2020-07-22"
  text: |
    The premise of ***Frequency***, a ham radio inexplicably bridging 1969 and 1999 via an aurora borealis anomaly, asks for a particular kind of good faith, and the film earns it. Behind that device is a family drama about a son who never got to know his father, wrapped in a science-fiction shell just substantial enough to carry the emotional weight without collapsing under its own logic. Dennis Quaid and Jim Caviezel, who never share the screen, generate genuine chemistry through the architecture of Toby Emmerich's screenplay and the formal conceit that forces them to act against a radio microphone rather than each other.

    The thriller mechanics, the butterfly-effect ripples that saving a life in 1969 sends cascading through a 1999 murder investigation, are tighter than the genre usually demands, and the telegraphing of beats, the way certain shots hint clearly at what is coming, reads less as a flaw than as craft. By the final act, one wanted to cry. It is a very fine story.

- title: "The Thirteenth Floor"
  type: "film"
  creator: "Josef Rusnak"
  creator_role: "dir."
  year: 1999
  eval: "loved"
  image: "/assets/images/thoughts/films/thirteenth-floor.jpg"
  posted: "2020-07-21"
  revised: "2020-07-21"
  text: |
    ***The Thirteenth Floor*** arrived alongside *The Matrix* (1999) and *eXistenZ* (1999), forming an unofficial triptych of simulation-theory cinema at the end of the millennium. It is the quietest of the three, a noir detective story at its surface, and it was commercially crushed by the cultural gravity of *The Matrix* (1999), which means its philosophical ambition has been consistently undervalued. The adaptation of Daniel F. Galouye's novel *Simulacron-3* (1964) gives the film a literary pedigree that arguably makes it the oldest root of what later became the modern simulation-cinema family tree: nested realities, the question of whether simulated consciousness deserves moral consideration, and the vertigo of a 'base reality' that may itself be suspect.

    The effects date in the way that *Tron* (1982) dates: the 'edges of the world' imagery, where the simulation simply stops and gives way to wire-frame void, carries the same endearing period texture. Everything else holds up rather well. As a precursor to *Inception* (2010), the structural kinship is clear: layered constructed realities, protagonists navigating downward through ontological floors, an ambiguous ending that refuses to confirm where bottom is.

- title: "Coherence"
  type: "film"
  creator: "James Ward Byrkit"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/coherence.jpg"
  posted: "2020-07-17"
  revised: "2020-07-17"
  text: |
    ***Coherence*** is gripping in the most literal sense: one's attention does not slip for the full eighty-odd minutes, no small thing for a film shot over five nights without a script, on character notes alone. The many-worlds conceit, a passing comet acting as a decoherence event that allows the boundaries between parallel versions of the same dinner party to dissolve, is handled with the confidence of a film that uses science as structural logic rather than as decoration.

    The complaints one wants to register are less about the film itself than about its reception. Reviews from self-identified 'science students' insisting the quantum-mechanical background is 'hardcore' or 'rigorously accurate' deserve a precise objection: neither the Copenhagen interpretation nor the Everettian many-worlds reading supplies empirical warrant for a passing comet producing visible parallel-timeline bleed at a dinner party in Los Angeles. The question of why this particular setup is held to be more scientifically rigorous than *Your Name* (2016)'s comet-and-time-swap is one the film's more credulous admirers have not adequately addressed. Suspension of disbelief is the correct frame, and the film earns it honestly. One should not mistake that generosity for physics.

- title: "Les quatre cents coups"
  title_en: "The 400 Blows"
  type: "film"
  creator: "François Truffaut"
  creator_role: "dir."
  year: 1959
  eval: "meh..."
  image: "/assets/images/thoughts/films/400-blows.jpg"
  posted: "2020-07-17"
  revised: "2020-07-17"
  text: |
    The first half of ***The 400 Blows*** holds the attention; the latter portion confirms what 山鸡 had suggested, that the French New Wave would not be immediately congenial. I can relate to only a very small sliver of Antoine Doinel's (Jean-Pierre Léaud) world: the indifferent parents, the punishing school system, the particular Parisian grimness of the postwar bourgeois interior are all recognisable as types, but the texture of that life is distant in a way that proximity to one's own formation makes it difficult to bridge. The jump-cut editing, the deliberate refusal of classical continuity, sits against the grain of one's instincts in a way that feels honest to acknowledge rather than dress up as appreciation.

    And yet, with all of that, the film holds. The image quality is startlingly crisp for a film shot in 1959; it looks nothing like 1959. Truffaut won Best Director at Cannes and deserved it. Then Antoine runs, reaches the sea, and Truffaut freezes the frame on his face. The ocean one had been anticipating since before the film began, the sea large enough to hold a brutal adolescence, arrived, and offered nothing, and that was everything.

- title: "Shutter Island"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/films/shutter-island.jpg"
  posted: "2020-07-15"
  revised: "2020-07-15"
  text: |
    ***Shutter Island*** operates in the key of sustained dread, the kind that Scorsese engineers not through shock but through the slow, architectural accumulation of wrongness: an island that withholds its geometry, a face that won't quite match its name, a score that tilts the inner ear just enough to make solid ground feel provisional. The film borrows the grammar of noir and Gothic melodrama, storms, labyrinthine corridors, women who appear and dissolve, and turns them into a phenomenology of guilt. Dennis Lehane's source novel is a puzzle box; Scorsese's adaptation is something stranger, a meditation on what the mind will construct to protect itself from what it already knows.

    The ending at the lighthouse gathers everything the film has withheld and presses it into a single ethical question. Teddy Daniels (Leonardo DiCaprio) asks whether it is worse to live as a monster or to die as a good man, and the line carries the weight of a verdict passed from the inside. The horror is not the revelation but the choice: that a mind, fully restored to itself, might deliberately reach back into the dark rather than bear what lucidity costs. Scorsese holds on the lighthouse long enough for its symbolism to collapse into something rawer, not a beacon but a terminus, the place where self-knowledge and self-erasure become indistinguishable. Over three months of half-watched films passed before anything struck with comparable force.

- title: "시"
  title_en: "Poetry"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2010
  pin: true
  pin_order: "02-film-01"
  eval: "loved"
  image: "/assets/images/thoughts/films/poetry.jpg"
  posted: "2020-07-14"
  revised: "2020-07-14"
  text: |
    Lee Chang-dong's moral rigour has rarely felt as exposed as it does in ***Poetry***. Mija, played by Yoon Jung-hee, is sixty-six years old, newly diagnosed with early Alzheimer's, enrolled in a community poetry class because she wants to learn how to see beauty, and in possession of a terrible secret about her teenage grandson. The film does not arrange these facts dramatically; it simply lets them accumulate. Yoon had been absent from the screen for sixteen years when Lee wrote this role specifically for her; it became her final performance, and after the film she was herself diagnosed with Alzheimer's. Knowing this changes nothing about the craft, which is one of extraordinary control, and everything about its weight.

    Her grandson Wook is one of five schoolboys who, over six months, repeatedly raped a classmate; the girl kept a journal and then drowned herself in the river. The film opens with an extended shot of her body floating downstream, before we know who she is. The fathers of the other boys organise a settlement: thirty million won to the dead girl's mother, five million per family, the problem reduced to logistics. They discuss cost-splitting and press management; they never discuss the girl. Mija is the only person in the film who looks at the victim. She visits Agnes's mother, she goes to the bridge where Agnes jumped, and in the end she turns her own grandson in to the police.

    Near the end, Mija and Wook play badminton together in the courtyard at dusk. A car pulls up behind them. Police have come to arrest Wook. As he is led past her to the car, Mija hits the shuttlecock again, and their eyes meet. Whether her dementia has erased the very moral choice she made, or whether she is simply saying goodbye, the film does not say. The poem that closes the film, 'Agnes's Song', is Mija's only completed work. It begins in her voice and shifts, midway through, into the dead girl's: Lee has [said](https://emanuellevy.com/interviews/poetry-interview-with-director-lee-chang-dong/) that 'the two have become one through a poem'. It arrives as both elegy and absolution, though the film is wise enough not to confirm which.

- title: "Apocalypse Now"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/films/apocalypse-now.jpg"
  posted: "2020-07-08"
  revised: "2020-07-08"
  text: |
    I had read *Heart of Darkness* (1899) and thought: this cannot be filmed. Not the prose, which is Conrad's instrument of entrapment, and not the novella's claim that the darkness is not in Africa but in the men who arrive there with lanterns and ledgers and the vocabulary of civilisation. Then ***Apocalypse Now*** appeared, and the moment Willard's target turned out to be named Kurtz, something snapped into focus. Coppola understood that Conrad's subject was not Africa but the structure of imperial self-mythology, which is why transposing it to the American war in Vietnam is not an adaptation so much as a translation into the idiom where the argument is still alive. The river journey deepens into jungle that the film renders as a kind of sentient suffocation, each stop further from command and closer to the unmediated thing that command exists to deny.

    The Do Lung Bridge sequence is the philosophical bottom. Willard arrives at a forward position being shelled in darkness, finds no commanding officer, and encounters a soldier who, when asked who is in charge, replies: 'Ain't you?' The line is the war's epitaph. Kilgore's helicopter assault, Wagner's 'Ride of the Valkyries' blasting over napalm strikes while surfers scout the break, is the absurdist self-mythology of American military power performed as spectacle for its own audience, and the horror is that the spectacle works, that the music makes it beautiful, that one watches with something dangerously close to exhilaration before the smell of napalm in the morning arrives and the exhilaration curdles. Walter Murch, who coined the credit 'Sound Designer' on this film, understood that war cinema's most insidious weapon is its capacity to make destruction gorgeous.
    Marlon Brando arrived on set at three hundred pounds, had not read *Heart of Darkness*, and improvised an eighteen-minute monologue in near-darkness that Coppola and the editors carved into Kurtz's philosophical core. 'The horror, the horror' works exactly as it works in Conrad: not as description but as the only honest account a mind can give of itself after it has seen what it has done. The production's own descent, Typhoon Olga destroying sets, Martin Sheen suffering a heart attack, Coppola mortgaging his house, became legend, and the legend is appropriate because the film is about what happens when an enterprise built on rational purpose travels far enough from its origin to discover what it was for. Every sense of shock from reading the novella applies here, because it is the same shock.

- title: "Baraka"
  type: "film"
  creator: "Ron Fricke"
  creator_role: "dir."
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/films/baraka.jpg"
  posted: "2020-07-07"
  revised: "2020-07-07"
  text: |
    ***Baraka*** is the cinema of the overwhelming image, and for much of its ninety-six minutes the ambition holds. Almost every frame is composed with a rigour that makes most narrative filmmaking look slovenly; Fricke's 70mm photography turns the human face, the ritual gesture, and the geological formation into objects of equivalent and mutual gravity. The cut between the chick-processing factory and the Tokyo morning commute is the film at its strongest: baby birds sorted along conveyor belts, then salarymen sorted through subway turnstiles, the visual rhyme so precise and so brutal that the argument, that industrial modernity processes human beings as it processes livestock, arrives without a single word, in the gap between two images. It is Eisensteinian montage deployed with absolute economy, delivered in the form of a juxtaposition lasting perhaps ninety seconds.
    Outside this sequence and a handful of others, the film struggles to escape the aesthetic of the very wealthy graduation reel. Scenes from different continents accumulate rather than cohere; the transitions feel arbitrary where they should feel inevitable, as though Fricke trusted the beauty of each individual shot more than the argument they might collectively make. The film gestures at a unified vision of humanity without quite constructing one. What it does construct is still enough.

- title: "12 Angry Men"
  type: "film"
  creator: "Sidney Lumet"
  creator_role: "dir."
  year: 1957
  eval: "loved"
  image: "/assets/images/thoughts/films/12-angry-men.jpg"
  posted: "2020-07-06"
  revised: "2020-07-06"
  text: |
    At the outset of ***12 Angry Men*** one assumes, reasonably, that twelve characters confined to a single room for ninety-five minutes will blur into an undifferentiated mass of grievance and opinion. By the halfway mark, each juror has become as distinct as a character in a nineteenth-century novel: their class anxieties, their projection mechanisms, their specific modes of intellectual dishonesty all legible in the way they hold their bodies, the syntax of their interruptions, the precise character of their stubbornness. Sidney Lumet's camera performs the psychological pressure invisibly, migrating from wide-angle shots above the sightline in the early deliberations, spacious, calibrated, almost bureaucratic, to telephoto lenses below eye level as the room contracts around the last holdout, the space itself becoming an instrument of the film's argument.

    The film is not, finally, about whether the boy is guilty; it is about what it costs a man to confront the fact that his certainty was never about the boy at all. Lee J. Cobb's Juror 3 carries a wound that the film discloses slowly and without sentimentality: the estranged son, the photograph, the accumulated damage of a man who loved harshly and cannot account for what was lost. His final breakdown, barely two words, barely a whisper, is not catharsis in the theatrical sense but something rawer: a man finally seeing himself clearly enough to surrender a verdict he has been carrying around in place of grief. The film ends and the boy walks out into sunlight the camera has never shown us, because the story was always about the room.

- title: "Portrait de la jeune fille en feu"
  title_en: "Portrait of a Lady on Fire"
  type: "film"
  creator: "Céline Sciamma"
  creator_role: "dir."
  year: 2019
  eval: "meh..."
  image: "/assets/images/thoughts/films/portrait-of-a-lady-on-fire.jpg"
  posted: "2020-07-06"
  revised: "2020-07-06"
  text: |
    ***Portrait of a Lady on Fire*** has been received as a landmark of queer cinema, and the case is not baseless: Sciamma constructs a visual world from which the male gaze is architecturally excluded, where desire is rendered through the dynamics of mutual looking rather than the unidirectional economy of painter and subject, and where the 18th-century setting removes modern identity vocabulary entirely, universalising the love story by stripping it of its labels. The female gaze is practised frame by frame; looking itself becomes the film's grammar.

    The ending, however, sits in uncomfortable proximity to a failure that has become a pattern. When queer films resolve into lingering shots of beautiful women weeping to Vivaldi, grief aestheticised until it becomes another form of gorgeous suffering, one wonders whether the refusal of resolution has done any real work or simply substituted mood for meaning. *Call Me by Your Name* (2017) reached for the same mood and found only a fireplace and an ache without origin. Sciamma's film is more disciplined, more intelligent, and at least free of that film's troubling age dynamics; but the final passage, with its emotional ellipses and its unmotivated transitions, suggests that 'queer' is still being conflated with 'atmospheric inconclusiveness.' The earlier scenes, when the women are simply together and the film trusts that sufficiency, are worth the rest of it.

- title: "The Hobbit: The Battle of the Five Armies"
  type: "film"
  creator: "Peter Jackson"
  creator_role: "dir."
  year: 2014
  eval: "meh..."
  image: "/assets/images/thoughts/films/battle-of-the-five-armies.jpg"
  posted: "2014-12-18"
  revised: "2014-12-18"
  text: |
    ***The Hobbit: The Battle of the Five Armies*** disposes of Smaug in its first ten minutes and then has nothing to replace him. Two hours of CGI battle across Erebor and the dale follow, five armies colliding without the tactical clarity that made Helm's Deep or Pelennor Fields legible as spaces. The film's one genuine thread is Thorin's gold-fever arc: Richard Armitage earns the dragon sickness, the paranoia accumulating slowly enough to feel psychological rather than magical, and his confrontation with Bilbo (Martin Freeman) on the battlements was the thing that the story was actually building towards. But the film cannot give that thread room to breathe. Azog, the CGI antagonist that was invented for the trilogy, has never been convincing as a physical threat, and the duel on the frozen lake resolves a rivalry that the film manufactured rather than found. Freeman plays the loss quietly, and the film moves on.

    The comparison with Jackson's own *The Return of the King* (2003) is unavoidable and does not go well. Where that film gave its deaths time to register, Théoden's charge into the dawn, Frodo and Sam on the mountain, the Grey Havens farewell, this one moves through Thorin's final scene and does not linger. *The Return of the King* understood that endings are the only thing that justifies the length of what precedes them; this film treats Thorin's death as just another sequence and Bilbo's homecoming as coda rather than conclusion.

- title: "The Hobbit: The Desolation of Smaug"
  type: "film"
  creator: "Peter Jackson"
  creator_role: "dir."
  year: 2013
  eval: "liked"
  image: "/assets/images/thoughts/films/desolation-of-smaug.jpg"
  posted: "2013-12-18"
  revised: "2013-12-18"
  text: |
    Benedict Cumberbatch's Smaug gives ***The Hobbit: The Desolation of Smaug*** its reason to exist. His voice gives the dragon an intelligence that scale alone cannot provide: the creature has been lying on this hoard for a hundred and fifty years with no one to talk to, and the conversation with Bilbo plays as a cat toying with its food, intellectually superior and faintly amused. Smaug already knows the answers before he asks; every flattering epithet Bilbo offers ('Luck-wearer', 'Riddle-maker', 'Barrel-rider') is accepted as his due, and 'Barrel-rider' is immediately seized on and deduced. Martin Freeman matches the performance exactly, trembling hands and wide eyes and a hobbit forcing himself to be clever while something ancient and immensely powerful watches him with what is, evidently, boredom. The boredom is more frightening than the fire. The sequence runs forty minutes in the mountain and produces the only scene in the trilogy where the dramatic stakes feel entirely real, because the power imbalance is total and Freeman's physical fear is the only thing holding it together.

    Everything around Smaug is filler of varying quality. The first half, through Mirkwood's hallucinatory corridors, Thranduil's halls, and into Lake-town's corrupt politics, builds momentum that the previous film consistently dissipated. But Legolas appears despite being absent from the book; Tauriel (Evangeline Lilly) is invented entirely, her romance with Kíli a subplot that the story has no need of, and Lilly does more with it than it deserves. The barrel chase, thrilling for three minutes, extends past the point where spectacle sustains itself. The film ends before completing its own confrontation, cutting to credits as Smaug bears down on Lake-town with 'I am fire. I am death'; a structural gamble that requires trust that the previous film did not earn, and that leaves the audience holding a cliffhanger where a third film must now carry a battle that in the novel occupied a single short chapter. This film comes closest to justifying the trilogy, and it does so almost entirely in the scenes where one small man and one very large dragon are alone in a room together.

- title: "The Hobbit: An Unexpected Journey"
  type: "film"
  creator: "Peter Jackson"
  creator_role: "dir."
  year: 2012
  eval: "liked"
  image: "/assets/images/thoughts/films/an-unexpected-journey.jpg"
  posted: "2012-12-19"
  revised: "2012-12-19"
  text: |
    In a single evening at Bag End, the dwarves sing two songs. 'Misty Mountains Cold' is a mournful a cappella dirge: Thorin (Richard Armitage) begins alone, a low rumble, and the others join until the room falls silent and thirteen exiles become a people with a cause. Minutes earlier, the same dwarves performed a slapstick plate-tossing routine while Bilbo (Martin Freeman) flinched in the corner. ***The Hobbit: An Unexpected Journey*** cannot decide which of these films it wants to be, and that indecision runs through every frame: the White Council scenes reach for *Lord of the Rings* gravitas while Radagast rides a rabbit-drawn sled with bird droppings caked to his face; the Riddles in the Dark sequence, the film's one genuinely Tolkien scene, plays out with the focused intimacy of a two-hander, Andy Serkis shifting between Sméagol's childlike delight and Gollum's snarl mid-sentence, the Ring changing hands through accident and mercy rather than force; and then the Goblin-town escape collapses into a physics-defying chase so weightless that critics compared it to a video-game demo. One slim children's novel distributed across three films forces Jackson to invent, and what he invents pulls in every direction at once.

    Freeman is the justification. His Bilbo is all closure at first, arms crossed, chin tucked, retreating from every intrusion, and then the Took side surfaces in micro-moments: the unconscious lean towards the map, the sprint after the departing company with the contract flapping behind him. The casting is so exact that the transition from reluctant host to someone who leaps over Gollum's head out of pity rather than force feels continuous with the body language Freeman established in the first ten minutes. The film's deeper problem is that it cannot give Freeman's performance enough room. The 48fps decision compounds the tonal confusion: the hyper-clear frame strips the world of the photographic texture that allowed the *LotR* films to feel lived-in, sets become visible as sets, makeup becomes visible as makeup, and the fantasy contract that 24fps preserves is broken. The Shire looked exactly as I remembered it; the rest of the film spent two and a half hours trying to be something that Tolkien's novel never needed to be.


