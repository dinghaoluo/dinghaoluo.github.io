- title: "A Game of Thrones"
  type: "book"
  creator: "George R.R. Martin"
  creator_role: "by"
  year: 1996
  eval: "loved"
  image: "/assets/images/thoughts/books/a_game_of_thrones.jpg"
  posted: "2014-12-10"
  text: |
    Ned Stark spends the novel being the protagonist, which is why his execution at the Sept of Baelor hits as hard as it does. ***A Game of Thrones*** trains the reader in all the conventions of heroic fantasy — the righteous lord, the noble quest, the truth that must be told — and then violates them cleanly and without apology. Joffrey gives the order; Ilyn Payne lifts the sword; Arya is watching from the crowd. The fantasy genre had done many things before this. It had not done this.

    The structural choice works in tandem with the subversion: eight rotating point-of-view chapters, each character seeing the same events from entirely different angles, each carrying different blind spots. Ned Stark's honour is not a virtue in King's Landing; it is a liability, and the novel knows this long before Ned does. Tyrion's intelligence earns contempt rather than respect. Daenerys, three thousand miles away on the Dothraki sea, is becoming someone the novel will take three more volumes to reconnect with the main plot. Martin's thesis, worked out through structure rather than statement, is that Westeros is a system, and the system rewards cruelty and punishes honour without exception.

    <u>At fourteen, reading this in a single week, what I understood was the momentum: the sense that anything could happen, that the rules of narrative protection did not apply.</u> That this same quality made it impossible to continue is something I understood only later. After Ned's execution, the series commits to a grimness that accumulates its own conventions; characters one has followed are no longer safe, and eventually the body count becomes as formulaic as the heroics it displaced. I stopped at the end of this first book, not quite willing to follow Martin where he was going, and have not gone back.

- title: "Naive. Super"
  title_en: "我是个年轻人，我心情不太好"
  type: "book"
  creator: "Erlend Loe (CH)"
  creator_role: "by"
  year: 1996
  eval: "liked"
  image: "/assets/images/thoughts/books/naive_super.jpg"
  posted: "2014-11-25"
  text: |
    The narrator of ***Naive. Super*** has stopped studying, has moved into his brother's empty apartment, and has decided to start over with small things. He gets a croquet mallet and hits balls against a wall. He makes lists. He writes letters to a beavers' association asking questions about beavers. He reads books about the solar system. The prose style matches this programme: very short sentences, each one factual and deliberate, accumulating the way small things accumulate when you have decided that large things are temporarily unavailable.

    Loe wrote this as a kind of anti-novel, and the comedy arises from the gap between the flatness of the prose and the scale of the questions it turns out to be asking: what do you do when the narrative your life was supposed to follow no longer makes sense, when ambition feels like a language you once spoke but now cannot remember? The answer, here, is to simplify radically. The mallet. The balls. The letters to the beavers. <u>There is something in this book that functions as permission for a certain kind of sadness: the suggestion that slowing down completely, going back to childhood basics, is a necessary recalibration rather than a failure.</u> At fourteen I was not having the particular crisis the narrator is having, but I understood the feeling of wanting to start again with smaller things, and the book was funny and sad and exact about it.

- title: "Fahrenheit 451"
  type: "book"
  creator: "Ray Bradbury"
  creator_role: "by"
  year: 1953
  eval: "liked"
  image: "/assets/images/thoughts/books/fahrenheit_451.jpg"
  posted: "2014-11-20"
  text: |
    The first dystopia I read, before *Nineteen Eighty-Four*, before *Brave New World*, and maybe the one that works best as a gut punch precisely because it is the simplest. Firemen burn books; one fireman starts reading them; the world outside his window is already on fire in a different sense. Bradbury's prose has a feverish quality that suited me at fourteen: the sentences run hot, full of images that land before you have time to think about them, and the burning of the old woman's library, her choice to stay and burn with her books, was the first scene in a novel that frightened me.

    <u>***Fahrenheit 451*** works not because of its ideas, which are broad and sometimes blunt, but because Bradbury writes fire the way other writers write water: as an element that reveals everything it destroys.</u> Montag's rebellion is clumsy and half-formed, and the ending, the book people walking along the railroad tracks, memorising entire novels to preserve them, is more hopeful than the novel has earned. But at fourteen I did not care about earned endings. I cared that someone had written a book about what happens when you stop reading, and that the book itself was the answer.

- title: "Oranges Are Not the Only Fruit"
  title_en: "橘子不是唯一的水果"
  type: "book"
  creator: "Jeanette Winterson (CH)"
  creator_role: "by"
  year: 1985
  eval: "liked"
  image: "/assets/images/thoughts/books/oranges_are_not_the_only_fruit.jpg"
  posted: "2014-11-10"
  text: |
    Jess is raised in a Pentecostal household by a mother who regards the world beyond the church as enemy territory and Jess as a vessel for divine purpose. ***Oranges Are Not the Only Fruit*** is the novel of her childhood and adolescence: the Bible readings, the evangelical campaigns, the careful cultivation of an exceptional child to produce exceptional faith. When Jess falls in love with a girl named Melanie, the church's response is exorcism, and the title's meaning sharpens: the oranges in her mother's bowl are the symbol of a world that tolerates only one fruit, one truth, one permissible form of love.

    Winterson writes Jess with a dry, sardonic clarity that keeps the novel from becoming either a victim narrative or a triumphalist one. The church is not simply monstrous; it is a community that gave Jess her inner life and her language, and which then turned that language against her. <u>What the novel captures, and what I found striking even at fourteen without the vocabulary to name it, is the way institutions produce the very selves they subsequently try to discipline.</u> The mother wanted an exceptional daughter; the daughter turned out to be exceptional in the wrong direction. The fairy-tale interludes embedded in the text give the novel a mythic resonance that occasionally outpaces its naturalistic grounding, but Jess's voice holds it together.

- title: "A Brief History of Time"
  title_en: "时间简史"
  type: "book"
  creator: "Stephen Hawking, trans. 许明贤, 吴忠超 (CH)"
  creator_role: "by"
  year: 1988
  eval: "liked"
  image: "/assets/images/thoughts/books/a_brief_history_of_time.jpg"
  posted: "2014-10-25"
  text: |
    The publisher warned Hawking that each equation in ***A Brief History of Time*** would halve sales, which is why the book contains only one. The resulting text is a sustained act of translation: black holes, the Big Bang, the uncertainty principle, the arrow of time, rendered in prose accessible to anyone prepared to slow down for a few dense pages. At fourteen, coming to this without any physics background, I found myself understanding perhaps sixty per cent with real confidence, which felt like success rather than failure.

    What the book does most effectively is convey the genuine strangeness of what physics has found: that at very small scales the universe becomes probabilistic rather than deterministic, that spacetime curves around mass, that black holes emit radiation and eventually evaporate, that asking what came before the Big Bang may be a category error similar to asking what is north of the North Pole. These are structural revisions to how one conceives of reality, not incremental surprises. <u>Hawking's achievement is making the strangeness legible without pretending it is comfortable.</u> Some of the cosmology has since been updated and the later chapters on quantum gravity are harder than the early ones, but the book still does what it set out to do: convince a fourteen-year-old that the universe is so much weirder than intuition allows, and that this is magnificent rather than frightening.

- title: "The Golden Age"
  title_en: "黄金时代"
  type: "book"
  creator: "Wang Xiaobo (王小波)"
  creator_role: "by"
  year: 1994
  eval: "liked"
  image: "/assets/images/thoughts/books/the_golden_age.jpg"
  posted: "2014-10-15"
  text: |
    I read 黄金时代 in late middle school and understood it the way a fourteen-year-old understands anything shocking: viscerally, without context. Wang Er and Chen Qingyang are 'sent down' to rural Yunnan during the Cultural Revolution, and what follows is a story about sex, boredom, punishment, and the human body's stubborn refusal to comply with political directives. The sexual frankness was what hit me first; Wang Xiaobo writes about the body with a bluntness that felt transgressive in a way I had not encountered in Chinese literature, and at fourteen, transgression was its own justification.

    What I missed, and what I can see now, is the satire. The 'struggle sessions,' the self-criticisms, the absurd bureaucratic machinery of political correction, are not backdrop but subject: Wang Xiaobo is writing about a system that attempts to regulate desire itself, and the comedy arises from the system's inevitable failure. <u>***The Golden Age*** is a novel about the body as the last site of resistance when every other form of dissent has been foreclosed.</u> I did not have the vocabulary for that at fourteen. I just thought it was funny and strange and unlike anything I had read before, and that was enough.

- title: "The Wisdom of Life"
  title_en: "人生的智慧"
  type: "book"
  creator: "Arthur Schopenhauer, trans. 韦启昌 (CH)"
  creator_role: "by"
  year: 1851
  eval: "liked"
  image: "/assets/images/thoughts/books/the_wisdom_of_life.jpg"
  posted: "2014-10-05"
  text: |
    Schopenhauer opens ***The Wisdom of Life*** with a confession: he is going to bracket his own metaphysical pessimism, the view that existence is essentially suffering, and ask a simpler question. Given that we exist, how do we make the most of it? The answer he constructs is organised around three categories: what one IS (temperament, health, intellectual capacity), what one HAS (wealth, possessions), and what one REPRESENTS (reputation, rank). Of these, what one IS matters most and what one REPRESENTS matters least. Wealth and status are the great distractions from the only thing that actually determines how one experiences life: the quality of the consciousness doing the experiencing.

    This is not a modest claim, and Schopenhauer makes it with characteristic contempt for those who would disagree. The elitism is undisguised: ordinary people, he insists, are condemned to seek satisfaction in external things because they lack the intellectual depth for the only pleasures that actually compensate for existence. The misogyny is equally undisguised. At fourteen these felt less troubling than they should have; what I responded to was the framework itself, the suggestion that solitude was undervalued and that inner life mattered more than social performance. <u>***The Wisdom of Life*** is a useful book for a young person with more interior life than social confidence, which is perhaps why it has found its readers so reliably among adolescents.</u> Whether the diagnosis applies to anyone not already disposed to find it flattering is another matter.

- title: "Sophie's World"
  title_en: "苏菲的世界"
  type: "book"
  creator: "Jostein Gaarder, trans. 萧宝森 (CH)"
  creator_role: "by"
  year: 1991
  eval: "meh..."
  image: "/assets/images/thoughts/books/sophies_world.jpg"
  posted: "2014-09-25"
  text: |
    ***Sophie's World*** is a textbook dressed as a novel. Sophie Amundsen receives letters from a mysterious philosopher who walks her through the history of Western thought from Thales to Sartre, and for the first half the pedagogical framing almost works: the philosophy is simplified but not falsified, and the progression from the pre-Socratics through Descartes and Hume has the pleasure of a well-drawn map. Then the metafictional reveal arrives: Sophie and Alberto are characters in a book written by a Norwegian army major for his daughter Hilde's birthday, and they gradually become aware of their own fictional status.

    The problem is that the novel can never decide whether it is a philosophy primer with fictional decoration or a story with philosophical interruptions, and it is not quite either. <u>The characters remain what they were from the beginning: vehicles for exposition, and the metafictional layer raises real questions about consciousness and free will without having the craft to pursue them.</u> I came away with the outline of Western philosophy's history and very little else. At fourteen I wanted more than an outline.

- title: "Snow Country"
  title_en: "雪国"
  type: "book"
  creator: "Yasunari Kawabata, trans. 叶渭渠, 唐月梅 (CH)"
  creator_role: "by"
  year: 1956
  eval: "meh..."
  image: "/assets/images/thoughts/books/snow_country.jpg"
  posted: "2014-09-15"
  text: |
    The famous opening places the reader immediately in the sensory register Kawabata will maintain throughout: cold, white, precise. A train emerges from a long mountain tunnel into the snow country, and through the dark glass Shimamura watches Yoko's face float against the passing twilight landscape outside. The image is extraordinary, and ***Snow Country*** never quite recovers from having placed it first.

    What follows is a series of returns to the same hot-spring resort: Shimamura, the idle Tokyo aesthete, visits Komako, a geisha who works to support a dying man she may or may not love, and the two perform a version of intimacy that Shimamura consistently aestheticises and Komako consistently means. The novel's architecture of pure sensation is what won it its reputation; it is also why Shimamura, who converts everyone around him into beautiful objects, can feel more like a curator than a person. <u>Beautiful writing about beautiful coldness: I admired it more than I felt it, and at fourteen mostly found it slow.</u>

- title: "Memories of Peking"
  title_en: "城南旧事"
  type: "book"
  creator: "Lin Hayin (林海音)"
  creator_role: "by"
  year: 1960
  eval: "meh..."
  image: "/assets/images/thoughts/books/memories_of_peking.jpg"
  posted: "2014-08-10"
  text: |
    The slow drift of Lin Hayin's stories through an old Peking courtyard district has a quality of deliberate preservation: these are scenes sealed in amber, the smells and sounds of a city that had already ceased to exist by the time the book was written. Young Yingzi watches from the margins of each story, too young to fully understand what she is seeing, which gives the narrative its characteristic gentle blur. The mentally ill woman searching for her missing daughter, the young thief whose stolen fruit she eats without realising, the nursing mother and her absent man: each episode has the texture of a half-recovered memory, soft at the edges.

    ***Memories of Peking*** is a book about loss, but it registers loss as atmosphere rather than event, and at fourteen I found this insufficient. The melancholy felt unearned because nothing was demanded of either the narrator or the reader. The final story, 'Daddy's Flowers Have Fallen,' comes closest to weight and is the only place where the book briefly coheres into something more than mood. <u>The rest are too delicate to resist the suspicion that nostalgia, rather than art, is doing most of the work.</u>

- title: "Offending the Audience"
  title_en: "骂观众"
  type: "book"
  creator: "Peter Handke (CH)"
  creator_role: "by"
  year: 1966
  eval: "loved"
  image: "/assets/images/thoughts/books/offending_the_audience.jpg"
  posted: "2014-06-08"
  text: |
    ***Offending the Audience*** contains no story, no characters, no scenery. Handke's actors come on stage and spend the first section telling the audience exactly what is not happening: there is no play here, no narrative, no pretence that this stage is somewhere else. The demolition of theatrical convention is conducted in near-monotone, and the effect on a fourteen-year-old encountering this for the first time was the feeling of a floor disappearing.

    The famous ending, a long escalating list of accusations hurled directly at the audience, you pigs, you lumps, you cowardly bourgeois, you armchair critics, was funny and shocking and slightly bewildering. The insults are the piece's logical conclusion: if you deny the audience the comfortable position of spectator from the beginning, if you make the event consist entirely of direct address, then the ending turns passive presence into complicity, and the insults are what that complicity has coming. At fourteen, what struck me was simpler: someone had written a play that ended by yelling at the people watching it, and this seemed an act of rare honesty.

    <u>***Offending the Audience*** is less a performance than a diagnosis of what performances usually do: manufacture a separation between stage and auditorium that allows everyone to pretend they are not implicated in what they are watching.</u> The insults, in removing that comfort, are paradoxically the most welcoming thing in the piece. I did not understand all of this at fourteen. The feeling of the floor disappearing was enough.

- title: "Childhood / In the World / My Universities"
  title_en: "童年 / 在人间 / 我的大学"
  type: "book"
  creator: "Maxim Gorky (CH)"
  creator_role: "by"
  year: 1923
  eval: "liked"
  image: "/assets/images/thoughts/books/childhood_in_the_world_my_universities.jpg"
  posted: "2014-03-10"
  text: |
    The three volumes read together form something different from any of their parts: a record of how a self gets made from scavenged materials, without institutions, without money, without much protection. ***Childhood*** opens in the household of Gorky's maternal grandfather Kashirin, a patriarch whose authority runs on fear; the grandmother Akulina Ivanovna moves through the same space as something entirely different, a teller of folk tales who absorbs blows and keeps a kind of warmth alive by sheer stubbornness. *In the World* puts the adolescent Gorky into successive employments, as dishwasher, icon-painter's assistant, sailor's cook, and the education he gets there is neither sentimental nor ennobling: it is a systematic acquaintance with how ordinary Russian life grinds through the bodies and spirits of those inside it. *My Universities* closes the trilogy in Kazan, where Gorky arrives hoping for formal education and finds instead revolutionary circles, starvation, and a crisis that brings him close to suicide.

    <u>What holds across all three volumes is the tension between the ugliness of the world Gorky was raised in and his insistence on finding, within it, whatever remained capable of growth.</u> The grandmother is the emblem of this: she does not beautify the violence around her, but she refuses to be defined by it. I read the trilogy at thirteen without fully understanding its historical context; what I understood was that survival requires a particular kind of stubbornness, and that the grandmother had it in greater quantity than anyone around her.

- title: "Mother"
  title_en: "母亲"
  type: "book"
  creator: "Maxim Gorky (CH)"
  creator_role: "by"
  year: 1906
  eval: "liked"
  image: "/assets/images/thoughts/books/mother.jpg"
  posted: "2014-02-15"
  text: |
    ***Mother*** was my introduction to Russian literature, long before Tolstoy or Dostoevsky, and I read it the way a thirteen-year-old reads anything labelled 'important': with respect rather than full understanding. Pelageya Nilovna begins the novel as a woman defined entirely by the men around her, her husband and then her son Pavel, absorbing the first's violence and the second's revolutionary fervour with the same patient, suffering religiosity. What the book does slowly, across Pavel's arrests and her own gradual awakening, is transform that submission into conviction: the mother who begins by following her son into danger ends by understanding, on her own terms, why the struggle matters.

    Gorky's socialist commitment gives the novel its structural backbone and its most obvious weakness. Pavel and his comrades are barely individuals, more platforms for revolutionary rhetoric than people with inner lives. <u>What survives is Nilovna herself, whose political education arrives not through argument but through accumulated grief and love, and who becomes the novel's only fully human character precisely because she comes to it without ideology.</u> At thirteen I did not have the vocabulary for what I was responding to. I knew it was not the speeches. It was the mother. The final scene, leaflets scattered from her bleeding hands, felt like something that had actually happened to someone.

- title: "A Thousand Splendid Suns"
  title_en: "灿烂千阳"
  type: "book"
  creator: "Khaled Hosseini, trans. 李继宏 (CH)"
  creator_role: "by"
  year: 2007
  eval: "liked"
  image: "/assets/images/thoughts/books/a_thousand_splendid_suns.jpg"
  posted: "2014-01-10"
  text: |
    Coming to ***A Thousand Splendid Suns*** immediately after *The Kite Runner* was probably a mistake, because nothing could hit the same way twice. The two women at the centre, Mariam, an illegitimate child married off at fifteen to the abusive Rasheed in Kabul, and Laila, a generation younger and better educated, who ends up in the same house through a particular sequence of catastrophes, carry a different weight than Amir's guilt. What Hosseini captures here is how Afghanistan's twentieth century fell most heavily on women: through the Soviet invasion, the mujahideen civil war, the Taliban years, it is Mariam and Laila who bear the accumulated violence of every regime change, not as history but as domestic fact, as the geometry of the room they share with a man who beats them.

    The novel works especially in its second half, when Mariam and Laila stop enduring separately and start understanding each other. <u>The friendship between them, built from shared suffering in close quarters, is the most emotionally convincing thing Hosseini wrote.</u> Rasheed is too cartoonishly villainous to carry the structural weight the plot places on him, and the coincidences strain credibility more than *The Kite Runner*'s did. But the ending, Mariam's final choice and the specific quality of her resignation and refusal, arrived with a force I did not expect at fourteen. I liked it; I did not love it. The distance between those two things felt instructive.

- title: "The Kite Runner"
  title_en: "追风筝的人"
  type: "book"
  creator: "Khaled Hosseini, trans. 李继宏 (CH)"
  creator_role: "by"
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/books/the_kite_runner.jpg"
  posted: "2013-12-15"
  text: |
    The first novel I read that made me understand what fiction could do with guilt. Amir watches Hassan get raped in an alley and does nothing; thirteen-year-old me read that scene and felt something I could not name, a physical revulsion not at the violence but at the cowardice, at how completely I understood Amir's paralysis. ***The Kite Runner*** works because Hosseini never lets Amir off the hook. The guilt does not fade; it metastasises. Amir frames Hassan for theft to push him out of sight, and the novel's most devastating detail is that Hassan knows and goes quietly, carrying the shame Amir put on him without a word of accusation.

    The move to America could have been an escape, but Hosseini uses it as a slow compression. Baba pumps petrol and Amir writes stories and the Afghan community in Fremont re-creates a country that no longer exists. When Rahim Khan's phone call pulls Amir back to Taliban-controlled Kabul, the return operates on two registers: a man going back to rescue his best friend's orphaned son, and a man going back because twenty years of running have not outpaced a single act of looking away. The revelation that Hassan was Baba's illegitimate son, that the Pashtun patriarch had crossed the ethnic line he publicly upheld, reframes the entire novel's architecture of shame.

    <u>What I understood at thirteen was the story; what I missed was the politics.</u> The Hazara-Pashtun hierarchy, the Soviet invasion, the Taliban's particular cruelty toward ethnic minorities: these were furniture to me then, context I did not know I needed. The novel's weakness is visible now: Hassan is too saintly, too passive, more instrument of Amir's redemption than a person with his own interiority. But at thirteen, none of that mattered. What mattered was that someone had written a book in which a boy's worst moment followed him for decades, and that the only possible response was to go back. 'For you, a thousand times over.' It was the first sentence in a novel that changed the way I understood what sentences could do.


# Film Reviews
# -------------------------------------------------------

- title: "In the Blink of an Eye"
  type: "film"
  creator: "Andrew Stanton"
  creator_role: "dir."
  year: 2026
  eval: "liked"
  image: "/assets/images/thoughts/films/in_the_blink_of_an_eye.jpg"
  posted: "2026-04-04"
  text: |
    Stanton's return to live action after the *John Carter* (2012) disaster is, at minimum, a more coherent object than its predecessor. The triptych structure, braiding a Neanderthal family's displacement with a present-day anthropologist's grief and a solo astronaut's interstellar mission, is admirably legible: most films attempting this kind of temporal weaving either condescend with heavy-handed signposting or lose themselves in their own architecture, and ***In the Blink of an Eye*** does neither. The prehistoric sequences are the film's strongest register by a considerable margin, shot with a physicality and emotional directness that recalls what Stanton does best in animation: stripped-down storytelling where the image does the argumentative work. Thomas Newman's score carries these scenes with the particular melancholic awe he has always done well.

    The problem is everything else. The present-day romance between Claire and Greg is inert in the specific way that prestige drama defaults to when it has nothing particular to say about its characters, and Kate McKinnon in the space timeline cannot shed the comedic mannerisms that served her elsewhere, producing a tonal dissonance the film never resolves. At eighty-nine minutes, the scope is too vast for the running time; one senses chapters missing, depth sacrificed to keep the braid moving. The comparisons to *Cloud Atlas* (2012) are inevitable and unflattering. <u>What saves it from dismissal is that prehistoric third, which operates by a different and older logic: bodies in landscapes, love expressed through proximity, death arriving without announcement.</u> One wishes Stanton had trusted that register enough to build the whole film inside it.

- title: "Project Hail Mary"
  type: "film"
  creator: "Phil Lord & Christopher Miller"
  creator_role: "dir."
  year: 2026
  eval: "liked"
  image: "/assets/images/thoughts/films/project_hail_mary.jpg"
  posted: "2026-03-28"
  text: |
    In the first half I was briefly returned to something I had thought lost: the feeling of watching *Interstellar* (2014) in a cinema for the first time, that specific species of awe that comes from naive eyes confronting the scale of the cosmos. The curiosity, the problem-solving, the slow revelation of an alien intelligence utterly unlike anything human: all of it lands. Rocky is one of the most strange and affecting screen presences in recent science fiction, and the film earns every moment of connection between him and Ryland Grace. This was the space film I had been wanting since *Interstellar* (2014) and *Arrival* (2016), the one that treats scientific ingenuity not as a plot device but as a mode of being.

    And then the second half arrives, and with it, the studio. The emotional machinery, which in the first hour runs quietly beneath the surface, is suddenly dragged into the open and operated at maximum volume. Subtlety is abandoned; several passages feel as though they are pointing at the audience and screaming. There is a particular kind of Hollywood emotional manipulation that works by removing all ambiguity from a scene, so the viewer has no choice but to feel the prescribed feeling at the prescribed moment, and this film, constrained by Amazon and the demands of the mainstream blockbuster, falls into that trap repeatedly in its second half. <u>The grief becomes performance; the wonder becomes instruction.</u>

    One leaves with a sense of waste that is, in its own way, as powerful as any feeling the film intended to produce. It is not often that a film's failure is itself interesting, but here the gap between what the first hour promises and what the second hour delivers is so wide that it becomes its own kind of argument about the structural conditions under which science fiction is allowed to exist in mainstream cinema. <u>Such a terrible waste.</u>

- title: "Hoppers"
  type: "film"
  creator: "Daniel Chong"
  creator_role: "dir."
  year: 2026
  eval: "hated"
  image: "/assets/images/thoughts/films/hoppers.jpg"
  posted: "2026-03-23"
  text: |
    ***Hoppers*** wears environmentalist clothing so conspicuously that one is invited to admire the tailoring rather than examine the politics underneath. Mabel, a nineteen-year-old student, discovers technology that lets her inhabit a robotic beaver to infiltrate the animal world and oppose a corrupt mayor's plan to pave over a wildlife glade. The premise promises systemic critique: capital and state power colluding to destroy the commons. But the film dissolves its own argument. The mayor is rehabilitated by the final act, the freeway rerouted, the glade preserved, and the resolution is personal reconciliation rather than structural change. The message, stripped bare: capitalism is fine as long as individual capitalists have a change of heart. <u>Pixar has produced its most politically instructive film, though not in the way it intended.</u>

    More damning is the hierarchy the film constructs and then refuses to examine. An Animal Council grants representation to mammals, birds, amphibians, reptiles, and fish; insects receive a seat but their queen is accidentally killed by Mabel without moral consequence, their prince becomes the genocidal villain, and an insect is dispatched by being eaten, played for laughs. The environmental ethic extends precisely as far as charismatic megafauna; beyond that threshold, <u>some animals, it seems, are more equal than others.</u> Mabel's recklessness, which triggers a political coup, an assassination, and a wildfire, is forgiven without a word of explanation, because the film has already decided that the impulsiveness of a passionate young woman is endearing rather than catastrophic. The beavers are cute. That is all this film has, and it is not enough.

- title: "Marty Supreme"
  type: "film"
  creator: "Josh Safdie"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/marty_supreme.jpg"
  posted: "2026-02-14"
  text: |
    The opening and closing passages suggest a Safdie working in a new key: restrained, almost elegiac, willing to let silence do something other than function as the gap before the next assault on the senses. Then the middle hour arrives, and it is as though Safdie panics. <u>Every conceivable dramatic beat is packed in, every register pushed, the anxiety that defines his filmmaking modulating from style into something closer to compulsion.</u> One's suspension of disbelief begins, in places, to strain under the weight of incident.

    And yet Chalamet. The performance is a surprise: not the mannered intensity one might have expected, but something more mercurial, more physically committed, more alive to the comedy latent in obsession. He carries the film's worst passages without making them feel unearned. <u>That Safdie trusted him, and that the trust was warranted, is the most interesting thing about ***Marty Supreme***.</u>

- title: "Hamnet"
  type: "film"
  creator: "Chloé Zhao"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/hamnet.jpg"
  posted: "2026-02-08"
  text: |
    I wept through the second half and needed a further half-hour to recover after the credits rolled. I have not cried like this at any film since *Aftersun* (2022). The title of finest Chinese woman director will not pass to anyone other than Chloé Zhao for some time yet. O'Farrell's novel is one of those rare acts of historical reimagination that completely recontextualises an existing work for those who know it, revealing *Hamlet* not as Shakespeare's supreme invention but as his grief made legible, the dead boy given back his name and therefore his reality. Zhao's adaptation is faithful to that project, and faithful too to the novel's central argument: that mourning is not singular, that two people loving the same child can lose entirely different things.

    Jessie Buckley and Paul Mescal deliver what are among the finest performances of their careers to date, and Zhao's casting is impeccable down to the child playing ***Hamnet*** himself. The dialectic the film inherits from O'Farrell, the father who attempts to metabolise grief through the act of creation, the mother who mourns through the most direct and animal means available, is never resolved, because it cannot be. <u>Art does not answer grief; it merely makes grief survivable long enough to become art.</u> Agnes's fury at Will's transformation of their son's death into aesthetic object is as morally correct as it is, structurally, beside the point: the play exists, and the play will outlast both of them.

    What Zhao adds to the novel is the landscape, the English countryside suffused with an almost mythic luminosity that makes the countryside feel less like backdrop than participant, a world that registers the death of a child as a kind of ontological wound. The non-linear structure, faithful to O'Farrell's, blurs past and present until the living and the dead seem to occupy the same temporal register. In the end, as in the novel, the film is about testing the threshold of death, measuring how much love can survive what it most fears.

    <u>This would have been my favourite film of 2025.</u>

- title: "Revolutionary Road"
  type: "film"
  creator: "Sam Mendes"
  creator_role: "dir."
  year: 2008
  eval: "loved"
  image: "/assets/images/thoughts/films/revolutionary_road.jpg"
  posted: "2026-02-02"
  text: |
    Even if one manages to escape Revolutionary Road, to escape the suburb and the job one tells oneself one does not care about, one cannot in the end escape an absurd and meaningless life built inside an absurd and meaningless marriage. What Yates understood, and what Mendes renders with an almost clinical precision, is that the dream of escape, Paris as a destination, the idea of a different life that is almost visible from where one stands, is not disrupted by external circumstance. It is disrupted by the self, by the accumulated sediment of self-deception that makes the dream necessary in the first place. <u>The 'revolution' is structurally futile; the target can be seen but never touched.</u>

    Michael Shannon's John Givings, the mathematician who has passed through breakdown and returned with the unwanted gift of transparency, is not the film's mad character so much as its only sane one. The madman in this structure is merely an outsider who lights the fuse of what has long been primed. The explosion was always coming. <u>What the film finally refuses to do is to assign guilt, because guilt would imply agency, and the horror it wants to convey is precisely that no one is free enough to be guilty.</u>

- title: "Tardes de soledad"
  title_en: "Afternoons of Solitude"
  type: "film"
  creator: "Albert Serra"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/tardes_de_soledad.jpg"
  posted: "2026-01-30"
  text: |
    Serra claims he takes no position, and the claim is both true and insufficient. The repetition, the same preparations, the same entry into the ring, the same choreography of suffering and struggle, builds into something so close to the zen of pure duration that one might mistake the film's neutrality for aestheticism. It is not. What the repetition does is amplify: cruelty, accumulated across a season, is not diluted by familiarity but intensified, so that the distance between the opening and closing of a bull's eye and the twitching of its face becomes a space in which moral feeling can no longer be deferred. The blow that nearly kills arrives with the force of something that was always going to arrive.

    <u>Spanish bullfighting has never had anything to do with fairness or courage</u>, and one cannot speak of 'verdad' in the sense Serra reaches for, because the thing in the ring is not truth but spectacle built upon death, performance that requires a corpse to complete itself. And yet, as Serra intuits, the repetition legitimises. 'Repetition legitimises' is not an apology for the institution; it is a diagnosis of why the institution persists, why even the viewer who grieves for the dying animal, who wishes the bull could turn the violence back on the matador, is still carried along by a thousand years of accumulated history. The film does not resolve the contradiction, because the contradiction is the point: <u>we are sucked down into the whirlpool of the absurd, and the film holds us there, and asks us to feel what it is like not to be able to look away.</u>

- title: "O Agente Secreto"
  title_en: "The Secret Agent"
  type: "film"
  creator: "Kleber Mendonça Filho"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/o_agente_secreto.jpg"
  posted: "2026-01-25"
  text: |
    The unfortunate limit here is my own unfamiliarity with Brazilian history, which means I could only proceed as the young woman does in the film's present-day framing: listening to recordings, piecing together fragments, stepping one piece at a time into the story of Brazil's north in the years of lead. There is something formally precise about this arrangement, the outsider's partial knowledge mirrored within the film's own structure, so that <u>the experience of not-quite-knowing, of reconstructing an atrocity from its residues, becomes the film's epistemological argument rather than a deficiency to be overcome.</u>

    Mendonça Filho has always been a director of place, Recife as a living entity with its own memory and its own grievances, and here the city's past is almost geological, layered beneath the present, accessible only through the kind of patient archaeology that the film itself enacts. Even with incomplete historical coordinates, the metaphor-laden cinematography manages to move profoundly: <u>this is what it looks like when a society tries to forget what its own institutions did to its own people, and what it costs to remember.</u>

- title: "صوت هند رجب"
  title_en: "The Voice of Hind Rajab"
  type: "film"
  creator: "Kaouther Ben Hania"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/the_voice_of_hind_rajab.jpg"
  posted: "2026-01-24"
  text: |
    Ben Hania builds the entire film inside a single room: the Palestine Red Crescent call centre in Ramallah, where dispatchers spend three and a half hours trying to coordinate safe passage for an ambulance to reach a six-year-old girl trapped in a car with the bodies of her family. Hind Rajab does not appear on screen. She is present only as a voice, her own recorded voice, and the film places that voice at its centre with a restraint that makes the surrounding silence unbearable. The dispatchers negotiate, plead, follow procedure; the procedure fails; the ambulance is dispatched after claimed approval; contact is lost. Twelve days later the car is found with 335 bullet holes. Everyone is dead: Hind, her six family members, both paramedics.

    The formal decision to keep all violence off-screen is not squeamishness; it is an argument about where the obscenity actually resides. What one watches is not killing but bureaucracy: the calls, the waiting, the careful language of coordination that masks the fact that no coordination is possible when one party has decided that a child's life is expendable. <u>The contemporary critical habit of separating aesthetic evaluation from moral weight is exactly what this film exposes as obscene.</u> Some critics, confronted with this material, reached for formal reservations about the ethics of embedding a real child's voice in a dramatic reconstruction. The only available response is that the child is dead, that the recording exists, and that the refusal to hear it is itself a political act. Ben Hania has been characteristically direct: 'When you amplify the voices of Palestinians, you are personally accused of being exploitative. It is another way to silence you.'

    What stays is the structural parallel that the film does not need to argue because the evidence argues it: the same bureaucratic dehumanisation, the same rhetorical apparatus deployed to make the killing of children administratively legible, the same international architecture of looking away. I sat in the dark for a long time afterward. <u>The film does not argue this; it shows it. That is what witness means.</u>

- title: "Blue Moon"
  type: "film"
  creator: "Richard Linklater"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/blue_moon.jpg"
  posted: "2026-01-20"
  text: |
    Ethan Hawke has once again delivered a career-highlight performance for Linklater, and if last year's finest actress was beyond doubt Rose Byrne in *If I Had Legs I'd Kick You* (2025), then last year's finest actor is equally beyond doubt Hawke. What the performance captures, and what makes it more than a portrait of wretchedness, is the 'pathetic' quality, in the original sense, the quality of pathos as structure rather than as sentiment: a man living inside an unrealistic fantasy of love, helplessly self-deluding, and doing so with total conviction. Hart's closeted homosexuality, the loneliness that could not be spoken in 1943 and perhaps barely in any decade since, is not named but is everywhere present, the engine behind the drinking, behind the infatuated longing, behind the lyricist who thinks highly of himself yet has long since burned through his best years and consoles himself with excuses as younger talent makes what he once made look effortless.

    Linklater shoots the film in a single night at Sardi's, which is exactly the right formal choice: this is a man at the end of a long performance, the curtain about to come down, and the evening's duration gives Hawke the space to let the performance breathe, to let the self-deception falter and reform. <u>The film understands that Rodgers and Hart's dissolution was not merely professional but constituted a kind of abandonment, and that Hart's final months were spent in the psychic posture of someone who knows they have been left but cannot entirely believe it.</u>

    It has been nearly half a month since I watched it, yet Hart's expressions refuse to leave: the moment he crouches to pick up playing cards from the floor, the look of infatuated longing he turns on the woman he cannot have. <u>Some performances settle into memory not as scenes but as gestures, a few square inches of screen that contain an entire life.</u> This is one of those.

- title: "28 Years Later"
  type: "film"
  creator: "Danny Boyle"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/28_years_later.jpg"
  posted: "2026-01-20"
  text: |
    The iPhone 15 Pro Max cinematography is the film's most discussed feature and its most revealing decision. Anthony Dod Mantle, who shot the original *28 Days Later* on Canon XL1 MiniDV cameras, here returns with a device that costs less than the original's catering budget, and the lo-fi texture, hallucinatory and raw, suits the material far better than conventional horror grammar would. ***28 Years Later*** opens on a fortified island commune off the Northumberland coast, a self-sustaining enclave where survivors have lived in carefully maintained safety for nearly three decades. The metaphor is legible immediately: a walled society that has preserved itself by excluding everything beyond its borders, a literalisation of fortress Britain that Boyle and Alex Garland, reunited after their reported falling-out, deploy with more political intent than the marketing suggests.

    When the journey to the mainland begins, the film finds its register. The Rage Virus has evolved; the Infected have changed over twenty-eight years in ways the film wisely declines to fully explain, and the mainland itself, overgrown and feral, becomes a character in the manner of the depopulated London that made the original so iconic. Aaron Taylor-Johnson carries the central arc with a physicality that reads as exhaustion rather than performed toughness, and Jodie Comer, in a role that could have been thankless, brings a precision to her scenes that suggests a larger presence in the planned sequels. <u>The political subtext is sharper than one expects from a franchise entry: who gets inside the walls, who is left outside, and what forms of violence the protected class will sanction to maintain the distinction.</u>

    Boyle's restless formal gestures remain, the rapid edits and disorienting angles that have followed him since *Trainspotting* and occasionally lapse into self-parody. But something has shifted. The psychedelia serves the horror rather than competing with it, and there are passages, particularly in the film's final movement, where the lo-fi texture and the hallucinatory pacing fuse into something unsettling in a way his recent work has not been. The ending functions partly as setup for *The Bone Temple*, the Nia DaCosta-directed sequel, which robs it of the self-contained force the original achieved. <u>More interesting than anything Boyle has made in years; the old energy is intermittently present, and this time, it amounts to a return.</u>

- title: "Lurker"
  type: "film"
  creator: "Alex Russell"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/lurker.jpg"
  posted: "2026-01-12"
  text: |
    What should, by genre convention, be an entirely mundane encounter between a fan and a celebrity becomes, in Alex Russell's debut, something closer to a slow-motion psychic collapse. The film's central achievement is precisely this: it refuses to locate the horror in any single event or revelation, but instead lets it seep upward from the textures of ordinary desire, ordinary longing, ordinary hunger for proximity to something that shines. Théodore Pellerin carries the film almost entirely on his own, and the performance is remarkable for what it withholds; one never quite catches him signalling 'this is where one should be afraid.' The camera, too, is restrained in the best possible sense, finding beauty in the peripheral and the incidental, as though the film itself were performing the act of obsessive attention it describes.

    What Russell is mapping, with impressive precision for a first feature, is a particular topology of desire: the way erotic fixation, the craving for love and recognition, and the sheer stupefying aura of stardom can fuse into something that no longer resembles any of its component parts. <u>The fan's gaze transforms its object; the object, merely by existing, becomes a kind of wound.</u> This is the phenomenology of parasocial attachment pushed to its logical, catastrophic limit. And when everything finally comes apart in the film's final movement, one finds that one has been entirely unprepared for it, despite having watched it arrive with slow, terrible inevitability.

    I keep returning, afterwards, to the song playing in the costume shop at the very beginning: 'My Love Song for You.' <u>It sits there at the opening like a small, clear bell, and the rest of the film is the echo.</u>

- title: "Eternity"
  type: "film"
  creator: "David Freyne"
  creator_role: "dir."
  year: 2025
  eval: "hated"
  image: "/assets/images/thoughts/films/eternity.jpg"
  posted: "2026-01-12"
  text: |
    ***Eternity*** asks what a woman would do with infinite time, and answers: choose between two men. Joan, married sixty-five years, dies and discovers her first husband Luke, killed in the Korean War, has been waiting sixty-seven years for her in the afterlife. The film frames this as a romantic dilemma; what it actually dramatises is the structural impossibility of female autonomy even in death. Joan samples two themed eternities, one with each suitor, and the resolution, predictably, privileges the domestic: the 'little moments' of a long marriage outweigh the idealised passion of early love. <u>A film that builds an entire metaphysical architecture only to arrive at the conclusion that a woman's highest aspiration is to select which man deserves her afterlife.</u>

    The conspicuously progressive surface, the pointed glance at the Korean War, the afterlife's diverse transit hub, cannot camouflage the conservatism underneath. Luke's sixty-seven-year vigil is framed as devotion; structurally, it functions as a claim, a dead soldier's sacrifice converted into romantic credit that Joan must honour or reject. The film never considers the possibility that Joan might want neither; that eternity, unburdened by mortality, could be the first context in which a woman's desires are not triangulated through men. <u>No amount of conceptual scaffolding rescues a director's unreconstructed gaze from itself.</u>

- title: "2000 метрів до Андріївки"
  title_en: "2000 Meters to Andriivka"
  type: "film"
  creator: "Mstyslav Chernov"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/2000_meters_to_andriivka.jpg"
  posted: "2026-01-11"
  text: |
    The moment that will not leave: Sheva says his wife told him on the phone to just come home, by any means possible. Sheva says, 'You know I can't come home.' His wife replies, 'Yes, but you know I had to ask.' In four lines, an entire grammar of love under the pressure of war: the impossible request, the refusal that is also a confession, and the acknowledgement that the asking itself was necessary, even knowing the answer. Chernov, following the Oscar-winning *20 Days in Mariupol* with a film of equal moral ferocity, understands that documentary at its most essential does not explain or contextualise; it bears witness to what language, at the limit, still manages to do.

    Fedya, who never imagined enlisting, never imagined standing in a trench in the Donetsk mud, offers a counterpoint that the film holds in careful, unresolved tension against Sheva's stoic determination. And then there is the Russian soldier they capture at Andriivka, who when asked 'Why did you come here?' answers: 'I don't know why we came here.' <u>Three men on opposite sides of the same failure of political imagination, each one conscripted by forces that bear no relation to anything one would call a choice.</u> Chernov frames this without editorialising, which is the only honest thing to do.

    The particular cruelty Chernov keeps returning to is spatial and epistemological at once: in modern industrial warfare, one can never see the enemy, never identify the direction from which the shells are falling. The front is a horizon that retreats as one approaches it. The village of Andriivka, two thousand metres away, might as well be on another planet. <u>What the film ultimately documents is not a military operation but the phenomenology of fighting for something one cannot see, cannot reach, and cannot quite believe in, while the phone keeps ringing and someone on the other end says, just come home.</u>

- title: "Ricky Gervais: Mortality"
  type: "film"
  creator: "Ricky Gervais"
  creator_role: "by"
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/ricky_gervais_mortality.jpg"
  posted: "2026-01-06"
  text: |
    Four specials in and one can now trace the shape of Gervais's late period with some confidence: <u>a performer who has run out of things to say, but who cannot stop saying them, and who has come to mistake the act of provocation for the provocation's substance.</u> <u>'Boldness' is not the word for what is left; boldness requires something to risk.</u> Among stand-ups still capable of securing a major-platform special, precious few dare anything at all, and Gervais is no longer among them. The one joke worth remembering involves a waiter clearing his throat. After watching, I went back to some Louis C.K. with a friend, and felt the distance between then and now like a missing tooth.

- title: "یک تصادف ساده"
  title_en: "It Was Just an Accident"
  type: "film"
  creator: "Jafar Panahi"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/it_was_just_an_accident.jpg"
  posted: "2025-11-30"
  text: |
    It is hard to imagine that this was made by a director willing to endure imprisonment for his political convictions. The setup is promising: a mechanic recognises in his garage the secret-police torturer who once broke him, and the film should radiate with the voltage of that encounter. Instead, every character is a cardboard ideological stereotype; the proclamations are tired and unoriginal; and the film ends, astonishingly, in forgiveness, as though the foot soldiers of the state apparatus were merely following orders and are therefore innocent, free to kill with impunity and deserving of absolution when all is said and done. <u>We have not heard quite enough of that argument since the Nuremberg trials?</u> <u>Iranian cinema needs new blood; there is no longer any reason to wait for Panahi.</u>

- title: "Bugonia"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/bugonia.jpg"
  posted: "2025-11-30"
  text: |
    This is Lanthimos's cleanest, most coherently told film, and sufficient proof, unlike *Poor Things* (2023), that he is capable of sustaining his own style while working across a broad, straightforwardly presented canvas. The remake's bones come from Jang Joon-hwan's *Save the Green Planet!* (2003), that cult monument to Korean absurdism, and Lanthimos has the good sense not to smother the source: the master-servant dynamic, racial hierarchy, and conspiracy-as-theology all survive the transplant intact. Jesse Plemons and Aidan Delbis make for a wonderfully mismatched pair of true believers, and Emma Stone's CEO, deadpan and impenetrable, is the film's still centre around which all the delusion orbits.

    The critique of capital is muted, present more as atmosphere than argument, but that restraint is itself a formal choice: the film is not interested in explaining the system so much as rendering viscerally how the system produces the men inside it. The title's entomological mythology, ***bugonia***, the ancient fantasy of bees spontaneously generated from a carcass, sits perfectly over the film's central horror: that <u>conspiracy thinking is not an aberration but a metabolic process, the mind's attempt to generate meaning from the rotting body of late capitalism.</u> <u>Anyone might end up as a human specimen in Teddy's laboratory; in 2025, that feels less like absurdism than like plain description.</u>

- title: "어쩔수가없다"
  title_en: "No Other Choice"
  type: "film"
  creator: "Park Chan-wook"
  creator_role: "dir."
  year: 2025
  eval: "liked"
  image: "/assets/images/thoughts/films/cant_help_it.jpg"
  posted: "2025-11-25"
  text: |
    The title is spoken first by the American executives who fire Yoo Man-su: the market leaves them no other choice. It recurs as Man-su himself adopts it, a phrase that migrates from the language of capital to the language of murder without changing its grammar. Park Chan-wook spent twenty years developing this adaptation of Donald Westlake's *The Ax*, and one senses the patience in every frame: the tonal architecture, shifting from slapstick to horror to something closer to economic theology, is controlled with a precision that makes *Parasite* (2019) look comparatively blunt in its class mechanics. What Park understands, and what Bong's film only gestured toward, is that the tragedy of late capitalism is not that it creates monsters but that it creates competitors. <u>Man-su does not target the executives who destroyed his livelihood; he targets his fellow laid-off workers, the people who should be his comrades, because the system has made solidarity unthinkable and competition the only available grammar of survival.</u>

    I recognised something in Man-su that I did not want to recognise. Lee Byung-hun builds the performance around a specific contradiction: a craftsman who loves papermaking, who valued his twenty-five years of labour, and who is blindsided by the discovery that capital does not care what one produces or who produces it. The worsening toothache is a precise metaphor, moral decay made somatic, and Park lets it do its work without commentary. The Žižekian disavowal is everywhere: 'I know this is wrong, but I have no other choice' is the formula that enables every killing, every lie, every domestic betrayal. And the ending is the bleakest joke of all: Man-su gets the job, walks into a paper mill run entirely by machines, and stands alone in a mausoleum of automation. <u>The competition is over. The competitors are dead. The job no longer requires a human being.</u> I left the cinema thinking about every application I have ever sent into a market that was not designed to answer. Park has said it is hard to be optimistic, and the film honours that difficulty without flinching.

- title: "If I Had Legs I'd Kick You"
  type: "film"
  creator: "Mary Bronstein"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/if_i_had_legs_id_kick_you.jpg"
  posted: "2025-11-23"
  text: |
    Several times nearly unable to breathe: hard to believe this runs to under two hours. Mary Bronstein has directed her own distinct brand of intensity and anxiety; taking the figure of 'the hole' as her departure point, she maps in close detail the resonance between existential emptiness, the hole in the bedroom ceiling that Linda cannot stop looking at, and the particular dread that a child's needs can activate in a parent who is already running on fumes. Rose Byrne's Linda is the script's primary driving force, an unstoppable kinetic energy hurling itself against imaginary and real enemies alike; which makes the moments when she stops, drinks, and goes helpless all the more terrifying, as though no force, however fierce and fearless, can survive the combined pressure of life and anxiety indefinitely.

    What Bronstein understands, and what the film's claustrophobic grammar enacts, is that <u>maternal overwhelm is not sentiment but phenomenology: a texture of experience that most cinema gestures toward and then domesticates into something manageable.</u> This film refuses management. The supporting cast, including a spectacularly unnerving turn from A$AP Rocky, function less as characters than as pressure systems, each one adding to the atmospheric load bearing down on Linda. <u>The hole does not get filled; the ceiling does not get fixed; and the film ends with the conviction, quiet and devastating, that some weights are simply carried.</u> One will be unable to forget this for many years, though one hopes not to encounter anything this unbearable again any time soon.

- title: "One Battle After Another"
  type: "film"
  creator: "Paul Thomas Anderson"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/one_battle_after_another.jpg"
  posted: "2025-11-16"
  text: |
    In Pynchon's drug-war California, the mood is gallows humour: surviving alongside half-dead Thanatoids under an absurdly oppressive regime, waiting for a justice that the novel's own logic implies will never fully arrive. PTA's contemporary California is, by comparison, more optimistic, more alive. The adaptation is faithful not in the sense of literal transcription but in the deeper sense of tonal fidelity: Leonardo DiCaprio carries Zoyd's particular combination of haplessness and stubborn decency with the same emotional intelligence he brought to *Once Upon a Time in Hollywood* (2019), and the film's rendering of Frenesi's trajectory, from radical filmmaker to informant to fugitive, never reduces her to a symbol of betrayal.

    PTA believes in la revolución, believes Frenesi can escape the grip of Brock Vond, believes that humanism will ultimately prevail, even if the justice at the end arrives through institutions that are themselves compromised. <u>Pynchon's California was sown with dread; PTA's is sown with seeds of hope</u>, and it is precisely this hope, rare and unguarded, that distinguishes ***One Battle After Another*** from *Vineland* (1990) itself. There is so much in the film that moves one to tears, yet PTA adopts a bystander's perspective, recounting the story with as much objectivity as possible: neither rendering the rebels saintly nor making Vond a simple fool. <u>Perhaps PTA did not foresee that even this humble optimism would, by 2025, feel like too much to dream.</u>

- title: "Κυνόδοντας"
  title_en: "Dogtooth"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2009
  eval: "liked"
  image: "/assets/images/thoughts/films/dogtooth.jpg"
  posted: "2025-11-02"
  text: |
    Somewhat rawer than Lanthimos's later work, and all the more viscerally disturbing for it: the clinical detachment that would become his signature style is still slightly porous here, letting more horror leak through than *The Lobster* (2015) or *The Favourite* (2018) ever permit. Clearly the kind of film Žižek would relish, and has: the children's self-oppression is its central analytical object, <u>the eldest daughter demonstrating, with devastating simplicity, how easy escape from this closed system actually is.</u> All three children seem to know clearly enough that the system is unjust and oppressive; none of them is willing to confront their own disavowal. <u>The film's real subject is not the monstrous parents but the consent they never had to manufacture, because ideology had already done it for them.</u>

- title: "A House of Dynamite"
  type: "film"
  creator: "Kathryn Bigelow"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/a_house_of_dynamite.jpg"
  posted: "2025-11-02"
  text: |
    The finest war film of the past five years, and the film that Garland's *Civil War* (2024, A24) wanted to be but failed to become. The distinction is worth insisting on. Garland's film was obsessed with the spectacle of collapse: cameras in helmets, bullets in walls, the aestheticised grammar of photojournalism applied to domestic catastrophe. Bigelow's is the opposite move entirely. There is no real gunfire in ***A House of Dynamite***, no bullets, no explosions; the entire confrontation is conducted in language, in rooms, across conference tables and encrypted terminals, and the words are sharper and more lethal than anything in the horror sequences of every war film made in the intervening years. This is Bigelow returning, at last, to the territory she has always been most serious about: not the phenomenology of combat but the institutional psychology that makes combat possible, the selfishness and fear and social instinct and greed that accumulate until someone primes the launch sequence.

    What makes the film remarkable is precisely its austerity, its refusal to compromise the register for the market. The nuclear strike is never shown. The film's final minutes do not deliver spectacle; they deliver the knowledge that it is already done, that those who caused it have retreated into a shelter, that the destruction of countless innocent lives is occurring off-screen as the credits approach. And yet one's chest tightens as though the blast were visible. <u>Bigelow understands something that the action cinema she helped define largely forgot: that the body responds to the implication of violence more deeply than to its depiction.</u> The retaliatory strike is primed, the misreading may or may not have been a misreading, and the curtain falls on an information-age war whose most devastating weapon was a memo.

    There is a tradition of chamber-drama nuclear films, from Lumet's *Fail Safe* (1964) onward, and A House of Dynamite sits squarely in that lineage while feeling wholly contemporary, wholly now. The characters are recognisable not as types but as specific specimens of institutional behaviour: the careerist who cannot admit error, the analyst who knows the truth but lacks the authority to make it matter, the administrator who confuses procedure with wisdom. One recognises them because they are everywhere, and the film's final horror is that recognition. <u>This is not a film about what could go wrong. It is a film about what already has.</u>

- title: "アット・ザ・ベンチ"
  title_en: "At the Bench"
  type: "film"
  creator: "Yoshiyuki Okuyama"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/at_the_bench.jpg"
  posted: "2025-10-21"
  text: |
    Sincerity is the key, and Yoshiyuki Okuyama knows it completely. What arrives here is a film of exceptional quietness, exceptional precision: the bench itself becomes a site of accumulated time, an object that holds the weight of everything the film does not say directly. Okuyama's cinema has always operated in this register of the withheld, the elliptical, the meaning that accumulates between cuts rather than within them. But what surprises in this theatrical version is how completely the sincerity displaces irony, how little the film needs the distancing mechanisms that contemporary art cinema often reaches for as a reflex. <u>It means exactly what it appears to mean, and that turns out to be more than enough.</u>

    <u>The film stays with one in the way that objects stay with one after someone is gone: not as image but as weight.</u> One finds oneself thinking about it at odd moments, in transit, at the edge of sleep, without being able to say quite what it is one is thinking about. That is, I suspect, the exact experience Okuyama intended.

- title: "Renoir"
  type: "film"
  creator: "Chie Hayakawa"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/renoir.jpg"
  posted: "2025-10-14"
  text: |
    Fuki is eleven and living in the interval between knowing and understanding: she knows her father is dying, but the knowledge has not yet collapsed into grief, and Hayakawa films this interval with extraordinary delicacy. The adult world circulates around her in conversations she half-overhears, in marriage stories that don't quite resolve into lessons, in the small rituals with which she shores herself against what she cannot yet fully imagine. She ties a red thread outside the window. She writes her dreams into a diary. These gestures are not symbols in the heavy-handed sense; they are simply what an eleven-year-old does when the world becomes too large and too quiet simultaneously.

    Hayakawa's achievement is to make everything feel appropriately weightless, the particular weightlessness of childhood perception, right up until it doesn't. The film's tonal economy is such that when death arrives it arrives without announcement, without swelling score, without the apparatus of cinematic grief; <u>it arrives the way death actually arrives for children, as an abrupt revision of everything that was assumed to be permanent.</u> One sits very still afterward. <u>The red thread stays in the mind long after the screen goes dark.</u>

- title: "阿修羅のごとく"
  title_en: "Asura"
  type: "film"
  creator: "Hirokazu Kore-eda"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/asura.jpg"
  posted: "2025-10-14"
  text: |
    Kore-eda's decision to remake Mukoda Kuniko's beloved 1979 NHK drama could easily have resolved into homage, a director genuflecting toward a national classic. What it becomes instead is something more interesting: <u>a mirror, an act of quiet provocation in which the audience is asked to find themselves distributed across four sisters, none of whom is the protagonist, all of whom are.</u> The Harada sisters' personalities emerge through simple dialogue and the texture of ordinary interaction, with a subtlety that does not preclude definiteness; by the midpoint one knows these women as precisely as one knows anyone in Kore-eda's best work, which is to say with the particular intimacy that comes from watching rather than being told.

    The commercial, soap-operatic visual grammar sits in productive tension with the director's characteristic handling of conversation, where the pauses and the near-misses and the things said slightly sideways carry the real weight of meaning. This is not, strictly speaking, the register of *Shoplifters* (2018) or *Still Walking* (2008); there is something more deliberate about the construction, a formal visibility that one suspects is part of the point, the remake announcing its own artifice. What survives all of this is the writing's essential humanity. <u>In almost every exchange one seems to find a little of oneself, which is, finally, the only criterion that matters.</u>

- title: "Drømmer"
  title_en: "Dreams"
  type: "film"
  creator: "Dag Johan Haugerud"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/dreams.jpg"
  posted: "2025-10-02"
  text: |
    Haugerud positions *Drømmer* in the long tradition of the 'talky film,' that genre whose entire grammar is conversation, but the comparison to Linklater's *Before* trilogy that naturally presents itself is only partially accurate. Linklater works in dyads, the private world of two people constructing itself against the noise of everywhere else; Haugerud opens the structure outward, brings in more characters, and allows the central themes to refract through multiple subjectivities simultaneously, so that the film's inquiry into unrequited love, into what it means to give and to receive, into the relation between dreaming and wanting, accumulates from many angles rather than deepening along a single axis. <u>The obliquity is crucial: most of the dialogue feels entirely casual, entirely incidental, precisely because it is never only incidental.</u>

    What lingers is not any particular scene but the film's texture as a whole, the sense of a sustained sincerity that is rare in contemporary cinema and somehow produces an experience that continues after the film ends. <u><em>Drømmer</em> is about a love that never found resolution, but the film itself achieves the opposite: it resolves into something complete and permanent in the mind.</u> It belongs in the top five of the year without any hesitation, and I find myself returning to it in the way one returns to a piece of music that named something previously unnameable.

- title: "Sex"
  type: "film"
  creator: "Dag Johan Haugerud"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/sex.jpg"
  posted: "2025-09-29"
  text: |
    Watched the day after *Drømmer* (2024), and together these two films have done something irreversible: Haugerud is now, simply, one's favourite Norwegian director, and the position is not provisional. Where *Drømmer* (2024) works through multiplication of perspective, ***Sex*** achieves its effect through a more concentrated provocation: 'sex' becomes an other, a third term in every conversation, something that defines and shapes intimate relationships from outside them, spoken of rather than enacted, discussed with the careful honesty of people who have decided, at some cost, to tell the truth. The two married men at the film's centre are not case studies; they are people, and the distinction matters enormously.

    What Haugerud's screenplays have, consistently and almost inexplicably, is a quality of disarming sincerity, the sense that these characters are actually saying what they mean, not performing saying what they mean. It manifests in the discussions of sex and marriage, in the self-examination of what feels 'natural' within a long relationship, in the way both families orient themselves toward their children with a tenderness that is neither idealised nor ironised. <u>There is no position from which the film condescends to its characters, and none from which it condescends to its audience.</u> ***Sex*** won the Europa Cinemas Label at Berlinale 2024, and the award matters less than what the film actually does: <u>it makes one feel, with renewed and slightly uncomfortable clarity, the full difficulty and the full necessity of being honest with the people one loves.</u>

- title: "Sirât"
  type: "film"
  creator: "Óliver Laxe"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/sirât.jpg"
  posted: "2025-09-23"
  text: |
    When everything disintegrates, scattered across the desert like bodies after an explosion; when the sole meaning of existence is stripped away so easily; when the car breaks down and people perish, and sky and earth merge in distant sand: we drive through the Moroccan wilderness, steering to the edge of meaning, watching stones vibrate under the most merciless sun, listening to electronic music thunder in the most primordial wasteland.

    Laxe, working out of a Galician sensibility that has always been drawn to marginal landscapes and the spiritual weight they bear, finds in the Sahara a landscape that does not so much represent existential collapse as enact it. <u>The space is too large for ideology, too indifferent for faith, and yet the film does not mistake emptiness for nihilism.</u> ***Sirât***, the straight path: the title carries the full weight of its irony without ever spelling it out. What remains when the path dissolves is not despair but something stranger, a kind of attention, stripped of every consolation.

    The electronic score is not incidental. It is the film's nervous system, the sound of human order persisting against geological time, insisting on itself in the one register where insistence still seems possible. <u>One left the film feeling scoured. That is not a complaint.</u>

- title: "On Becoming a Guinea Fowl"
  type: "film"
  creator: "Rungano Nyoni"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/on_becoming_a_guinea_fowl.jpg"
  posted: "2025-09-21"
  text: |
    Bitterly ironic, and it resonates in certain ways with a recent event in a certain country. The dead are done with it all; those of us left alive must face something far more terrible. When the uncle dies suddenly in the road, the women he abused, Shula among them, should have felt relief. But that is not how it is. <u>The abuser's death takes away the survivors' opportunity for revenge, reconciliation, and anger.</u> Now there is no enemy for vengeance, no one to reconcile with, no target for rage. How many lives has the dead perpetrator left with permanent, indelible wounds?

    Nyoni, who won Best Director at Cannes Un Certain Regard for this film, understands something that most social-issue cinema gets badly wrong: <u>the structure of patriarchy is not dismantled by the removal of any individual patriarch.</u> It self-perpetuates through ritual, through the choreography of grief, through the very etiquette of funerals that requires the abused to mourn their abuser with decorum and visible sorrow. The guinea fowl metaphor earns its place precisely because it refuses heroism: these birds do not fight, do not escape, do not organise. They become alert. They warn each other. It is the only agency the system permits.

    What Nyoni crystallises with uncomfortable precision is the pre-emptive suppression at the heart of feminist resistance within such a framework: the bars of the structure are not simply obstacles to action but conditions of thought, so that even the methods one might discuss are already accounted for, already neutralised. The film does not offer this as tragedy, exactly, or not only. It offers it as diagnosis. And diagnosis, as Fisher understood, is not ancillary to politics but prerequisite. <u>If the one remaining exit becomes all the more obvious once the structure is named, then the naming was the work.</u> Now one need only begin.

- title: "Eddington"
  type: "film"
  creator: "Ari Aster"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/eddington.jpg"
  posted: "2025-09-13"
  text: |
    Ari Aster has used the same toolkit from his early horror films to make a fable that is almost indistinguishable from reality: a fable containing cults, gun violence, and anti-vax sentiment, an almost perfect microcosm of American society in 2025. The horror grammar, the slow accumulation of dread through domestic spaces and community rituals gone wrong, turns out to be entirely adequate to a moment in which the distinction between the fable and the documentary has itself become difficult to locate.

    It is also the film in which Aster tells his story most clearly. First, because the parallel with reality gives the performances and screenplay an immediate point of reference, a shared coordinate system between film and audience that his more hermetically mythological work sometimes forecloses. Second, because the tightly wound plotting of the second half brings the escalation of conflict into a state of flow: one watches the machinery of a community destroying itself with the horrible fluency of something that was always going to happen this way. <u>The gun is on the mantelpiece in the first scene because the gun is always on the mantelpiece in America.</u>

    What Aster understands that most satirists of this moment do not is that <u>the pathology is not external to ordinary life but continuous with it: the cults grow out of the same soil as the barbecues, the anti-vax sentiment passes through the same social channels as the neighbourhood gossip, and the violence, when it comes, is not a rupture but a completion.</u> ***Eddington*** is the most honest American film about 2020 that 2025 could have produced, which is to say it is not a comfortable film to admire.

- title: "ファーストキス"
  title_en: "First Kiss"
  type: "film"
  creator: "Ayuko Tsukahara"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/first_kiss.jpg"
  posted: "2025-09-07"
  text: |
    <u>Fatalism is the laziest engine in romantic cinema, and <em>First Kiss</em> runs on nothing else.</u> Why fight to salvage a marriage that has become mere form? Why propose to someone one has never met? Why, having been told the precise mechanism of one's own death, still choose to engineer that death on schedule? Tsukahara frames these gestures as profundity, as a kind of philosophical surrender to en, the Japanese concept of predestined bonds. But capitulating to a concept is not the same as dramatising it. <u>The film mistakes passivity for fate, and resignation for feeling.</u>

- title: "Sorry Baby"
  type: "film"
  creator: "Eva Victor"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/sorry_baby.jpg"
  posted: "2025-08-10"
  text: |
    Sincere and sweet, despite the painful backdrop of a nightmarish experience. Victor writes, directs, and performs with the kind of formal intelligence that makes the film's tonal balancing act look effortless: the dark humour is not a defence against the trauma but a mode of inhabiting it, and the non-linear structure refuses the redemption arc that trauma narratives typically demand of their subjects without replacing it with unearned bleakness. <u>The film trusts the audience to hold contradictory registers simultaneously, which is a rarer form of respect than it sounds.</u>

    What one is left with is something close to gratitude: that a film this precise about a subject this difficult could also be this warm, this formally alive, this resistant to the conventions that usually flatten such material into either advocacy or misery. Sundance gave it the attention it deserved. <u>It has stayed with one in the way only a handful of films in any given year manage to: not as a statement or an argument but as a presence.</u> A probable top-ten film of any year.

- title: "Magnolia"
  type: "film"
  creator: "Paul Thomas Anderson"
  creator_role: "dir."
  year: 1999
  eval: "loved"
  image: "/assets/images/thoughts/films/magnolia.jpg"
  posted: "2025-07-21"
  text: |
    8:2, 8:2, 8:2. The number surfaces throughout ***Magnolia*** in the margins of the frame, almost subliminal, the way scripture might surface in a world that has forgotten it is still being read. Paul Thomas Anderson builds three hours of interlocking anguish, an Altmanesque lattice of broken fathers and damaged children and dying men who all need, urgently, to say something before time closes, and then sends frogs down from the sky. Straight out of *Exodus*. Divine intervention that does not redeem cleanly but cracks each character open just far enough for something resembling grace to enter: the dying father who confesses, the son who cannot yet forgive, the child genius drowning in what he was forced to become too young. The plague falls on sinners and innocents alike, because that is how plagues work, and that is what Anderson understands about the world.

    But the frogs are almost a distraction from what the film is actually about, which is the transmission of damage across generations. Everyone in *Magnolia* is living inside someone else's past, tormented by what was done to them by people who were themselves tormented by what was done to them. Cycle upon cycle, oppression upon oppression, a structure of inherited pain so dense and so recursive it starts to feel geological. <u>The film's emotional intelligence lies in refusing to let the rain of frogs be a solution, only an interruption, a gasp in which something true might briefly become sayable.</u>

    What stays is Donnie Smith, the former quiz-kid, screaming into the strange rain with total sincerity: 'I have love to give. I do! I just don't know where to put it.' That line, delivered at full volume into weather that makes no sense, contains the whole film. <u>The past is not through with one. It never is. But every now and then it rains frogs, and for a moment everyone stops performing.</u>

- title: "خرس نیست"
  title_en: "No Bears"
  type: "film"
  creator: "Jafar Panahi"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/films/no_bears.jpg"
  posted: "2025-07-06"
  text: |
    The point bears repeating: <u>a director's imprisonment does not retrospectively redeem the work.</u> ***No Bears*** arrived with Panahi already serving a six-year sentence, completed and smuggled out just before his arrest, and the international reception was coloured by an entirely human impulse to make the suffering matter by elevating the art. Understandable. Insufficient.

    The film's central device, Panahi playing himself directing remotely from a border village while his film-within-a-film spirals beyond his control, is a variation on self-reflexive fourth-wall dissolution that has been practised since at least Godard and has by now lost whatever defamiliarising charge it once carried. The parallel between Panahi's constrained position and the entrapment of his characters is legible enough, but legibility is not the same as power. <u>One must be able to distinguish courage from excellence; the failure to do so serves neither.</u>

- title: "Punch-Drunk Love"
  type: "film"
  creator: "Paul Thomas Anderson"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/punch_drunk_love.jpg"
  posted: "2025-06-29"
  text: |
    The first third of ***Punch-Drunk Love*** is a sustained panic attack, and it is not enjoyable in any conventional sense: Barry Egan's world is so compressed by his seven sisters' contempt, so coiled with misdirected rage, that the film's colour bursts feel like alarms going off inside the nervous system. Anderson calibrates the discomfort precisely, which is to say he makes it feel involuntary rather than designed. Then the middle third opens into something unexpected: a love story, tender, complicated by Barry's lies but never undermined by them, because Lena Leonard sees something in him that the film insists is really there. Adam Sandler, working in a register nobody had yet allowed him to find, makes Barry's yearning feel enormous and completely unperformed.

    The final third is where the film becomes quietly extraordinary. <u>Anderson gives Barry a redemptive arc that most films of this kind would not dare make coherent, and makes it coherent anyway, not through epiphany or therapy but through the physics of love:</u> Barry flies to Hawaii, confronts Dean Trumbell with a concentrated calmness that reads as the other side of his rage, and returns changed. <u>One leaves the film in awe of PTA's calibration: a little love, a little comedy, a little violence, a little greasiness, the proportions somehow always exactly right, the whole thing saturated with a singular strangeness that belongs to no other filmmaker working in English.</u>

    A note on Jon Brion, who scored *Eternal Sunshine of the Spotless Mind* (2004) and *Synecdoche, New York* (2008), and who here builds the film's entire atmosphere from the inside out. His score does not underline the emotion; it generates it, moving between organised chaos and something almost childlike in its delicacy, the harmonium bleeding between diegetic prop and non-diegetic sound until the distinction stops mattering. It is a score that participates in the story rather than describing it, and *Punch-Drunk Love* (2002) without it would be a different, lesser film.

- title: "Little Miss Sunshine"
  type: "film"
  creator: "Jonathan Dayton and Valerie Faris"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/little_miss_sunshine.jpg"
  posted: "2025-06-17"
  text: |
    One thinks back to a year ago, flying high with Shanji, lying on a mattress talking about the meaning of life. Shanji, laughing helplessly, said it is the suffering that defines our lives. One was unconvinced then, argued back, found the claim too neat, too consoling in its bleakness. <u>A year has passed and it has proved true, or true enough that the distinction no longer seems to matter.</u>

    Frank's Proust speech to Dwayne on the airport tarmac is the film's thesis, delivered flatly and without ceremony: Proust thought the suffering years were his best years, because they made him who he was, and one would not want to miss out on all that suffering. The film, directed with complete tonal control by Dayton and Faris, earns this moment because it does not treat the Hoover family's disasters as darkly comic backdrop but as costly. Grandpa's death costs something. Dwayne's shattered dream costs something. Richard's failure costs something. The humiliation of the pageant finale costs something, and then transforms into something else entirely.

    One must acknowledge: seeing Steve Carell's face, one can only think of Michael. This is not quite a criticism. It says something about the performance's generosity that the ghost of Dunder Mifflin does not capsize the scene; Frank's wisdom lands anyway. The road movie structure is a container for something older and stranger, a meditation on what it means to stay in the car, keep driving, and count the suffering as the substance of the thing rather than its obstacle. <u>Proust in a VW bus. One was unconvinced a year ago. One is not unconvinced now.</u>

- title: "L'Événement"
  title_en: "Happening"
  type: "film"
  creator: "Audrey Diwan"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/films/happening.jpg"
  posted: "2025-06-15"
  text: |
    Audrey Diwan adapts Annie Ernaux's memoir with a formal discipline that mirrors its subject: the frame is tight, the aspect ratio compressed, the camera pressed so close to Anne's body that the screen itself becomes a space of confinement. Anne is a brilliant literature student in 1963 France, working-class, the first in her family to reach university, and a positive pregnancy test threatens to collapse the entire trajectory. The word 'abortion' is almost never spoken aloud. This is not metaphor; it is the mechanism. <u>***L'Événement*** understands that criminalisation operates not through dramatic enforcement but through silence: doctors who diagnose but will not act, friends who retreat, a legal architecture that makes solidarity itself a crime.</u> The institutional cruelty is quiet, procedural, and total. Diwan refuses the cutaway during the medical sequences, and the refusal is the point: if the state forces this experience into illegality, the least cinema can do is look.

    The class dimension is what lifts the film above its period-piece frame. A bourgeois student might have networks, private clinics, discreet arrangements; Anne has none. Her academic future, the sole exit from her parents' world, is precisely what the pregnancy threatens to destroy, and the intersection of gender and class here is not incidental but structural. Ernaux herself came from exactly this background, and the autobiographical specificity gives the film a gravity that a fictional treatment could not replicate. One watches knowing that the Veil Law would not arrive until 1975, that twelve more years of this silence lay ahead, and that in post-*Dobbs* America the past depicted here is no longer safely historical. A pregnancy certificate shatters a dream. Two unspeakable syllables trap the person who least deserves to be trapped.

- title: "Taxi"
  type: "film"
  creator: "Jafar Panahi"
  creator_role: "dir."
  year: 2015
  eval: "meh..."
  image: "/assets/images/thoughts/films/taxi.jpg"
  posted: "2025-06-15"
  text: |
    Part of one wants to declare this film vitally important, to perform the appropriate solidarity: Panahi, banned from making films in Iran, unable to accept his Golden Bear at the Berlinale, has suffered imprisonment for his convictions in ways that ought to shame every government that speaks the language of artistic freedom. The impulse is understandable. It is also, as a basis for aesthetic judgement, completely useless.

    Because the film, evaluated on its own terms, reads like a directed writing exercise. The format, a series of conversations filmed inside a Tehran ***taxi*** Panahi drives himself, produces scattered vignettes and occasional flashes of wit; but scattered vignettes and occasional wit are not sufficient to constitute a film. <u>Courage is not a formal argument.</u> <u>Watching <em>Taxi</em>, one is moved by what it cost to make it, and left cold by what it is.</u>

- title: "The Summer Book"
  type: "film"
  creator: "Charlie McDowell"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/the_summer_book.jpg"
  posted: "2025-06-09"
  text: |
    High summer on the Finnish archipelago operates by a different clock. The light refuses to leave. A newly planted poplar, a newly arrived storm, a family appearing on the neighbouring island: events of a scale that would be invisible elsewhere arrive here with the full weight of the world. Tove Jansson's 1972 novel understands this tempo precisely, and Charlie McDowell's adaptation, shot on 16mm among islands that seem to exist slightly outside ordinary time, has absorbed that understanding into every frame. Sturla Brandth Grøvlen's cinematography captures particular, tactile details of light and texture rather than postcard panoramas; what emerges is a warmth that feels analogue in the oldest sense, as though the film stock itself remembers what digital cannot.

    The film's subject is, on its surface, the relationship between a grandmother and a nine-year-old girl navigating a summer of loss. But Jansson's structural insight, which McDowell preserves, is that grief and vitality occupy the same space in childhood, and that a child can hold both without needing to resolve the contradiction. <u>The island becomes a kind of ontological enclosure in which the end of life and its beginning coexist without embarrassment.</u> Glenn Close's grandmother is frank about her own approaching death in the way that only the very old and the very young can be: without performance, without the middle-aged machinery of denial. Emily Matthews, in her first role, matches her with an appealingly restless directness. The father, retreated into his illustrations and his numbness, is the grief the film does not narrate but lets one feel through absence.

    One thinks of *The Outrun* (2024): Saoirse on the Orkney grass, standing at the sea's edge, becoming wind, becoming a downpour, becoming part of the world's eternal turning. ***The Summer Book*** achieves something adjacent but quieter, less turbulent in its beauty and therefore more permanent-feeling. Hania Rani's score shimmers beneath the surface without ever competing with the ambient sound of waves and wind, and the closing archival footage of Jansson herself, hair decorated with Midsummer flowers on the island that inspired the novel, bridges fiction and autobiography with a grace the film has earned. <u>It asks very little of one's critical apparatus and takes everything else.</u> The most beautiful film I have seen in years.

- title: "The Phoenician Scheme"
  type: "film"
  creator: "Wes Anderson"
  creator_role: "dir."
  year: 2025
  eval: "loved"
  image: "/assets/images/thoughts/films/the_phoenician_scheme.jpg"
  posted: "2025-05-31"
  text: |
    *The French Dispatch* (2021) and *Asteroid City* (2023) had settled into a kind of aesthetic monasticism: the camera planted, the world observed through vitrines, the emotional temperature kept rigorously below freezing. Whatever one thought of that project, it had the courage of its convictions. ***The Phoenician Scheme*** breaks the seal. <u>Anderson introduces a fluidity, an almost conspiratorial warmth between the camera and its subjects, that his films haven't risked in years; the result is something that feels, improbably, like the director choosing to be present in his own work again.</u>

    This is not to say the film abandons any of Anderson's signature grammar. Benicio del Toro's Zsa-zsa Korda is as precisely composed as any Anderson protagonist, and the film's globetrotting architecture of schemes, inheritances, and barely-suppressed feeling runs exactly as one would expect from this director. But something in the interactivity, the willingness to let the camera lean in rather than withdraw, opens a sincerity that Anderson's recent pictures had kept under lock. <u>Fans who should have known better, who had perhaps made their peace with perpetual irony, found themselves unexpectedly moved. That is not nothing. After the long freeze, it is quite a lot.</u>

- title: "Dìdi"
  type: "film"
  creator: "Sean Wang"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/films/dìdi.jpg"
  posted: "2025-05-31"
  text: |
    Does the world truly love boys this much? Sean Wang's Sundance-decorated debut asks one to invest in a thirteen-year-old whose cruelty to everyone around him, his mother, his sister, his friends, constitutes the film's entire dramatic engine, and then offers unconditional absolution in the final minutes: because he is a mother's son, a friend's old companion, a sister's little brother. <u>The film never earns this, because it never once asks the protagonist to earn it either.</u> <u>Joan Chen does everything in her power with what she is given; what she is given is not enough to paper over the absence at the centre.</u>

- title: "Sinners"
  type: "film"
  creator: "Ryan Coogler"
  creator_role: "dir."
  year: 2025
  eval: "disliked"
  image: "/assets/images/thoughts/films/sinners.jpg"
  posted: "2025-05-25"
  text: |
    <u>'Near-' is the operative prefix here: a near-racial analysis film, a near-horror film, a near-musical, something that keeps arriving at its own threshold and declining to cross it.</u> The soundtrack is extraordinary, Ludwig Göransson and Coogler together conjuring a vision of the blues as a kind of temporal membrane through which African rhythms and twentieth-century Black American sound flow in both directions simultaneously. That sequence alone deserves the film it was clearly meant to anchor. The screenplay that surrounds it, its vampire mythology applied with the consistency of wet paper, its dialogue cycling through expository earnestness to witlessness, does not. <u>One leaves admiring a sequence and mourning the film that sequence deserved.</u>

- title: "Joyland"
  type: "film"
  creator: "Saim Sadiq"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/joyland.jpg"
  posted: "2025-05-03"
  text: |
    Glimpsed through the backs of Haider and Biba, Mumtaz's interiority arrives obliquely, accumulating in locked rooms and stolen minutes behind closed doors. She wants to work; she wants to be self-sufficient; she wants a life in which she can come and go without accounting for it to anyone. <u>These are not extravagant demands.</u> In a society that accommodates transgender women only through voyeuristic fascination, and looks with blithe indifference on male incompetence and appetite, her desires read as utopian.

    Saim Sadiq's debut, winner of the Cannes Un Certain Regard Jury Prize, is unusual in the patience with which it refuses to offer Mumtaz as simply a victim, or Biba as simply a symbol. Both characters are permitted the full weight of personhood: contradiction, will, desire, a complicated stake in the systems that constrain them. The film was banned by Pakistan's censor board before a partial reinstatement, a reception that demonstrates rather efficiently the point it is trying to make. Alina Khan's Biba, a real transgender actress in the role, brings a physicality that resists every available framework for reading her, which is precisely the film's argument.

    What lingers is the question Sadiq lodges in the final image: not who survived, but at what cost, and by what logic survival was allocated. <u>Mumtaz's freedom, when it comes, arrives in the form that the film's world makes available to her. It is the only form available. That is the most devastating sentence the film speaks, and it says it without a word.</u>

- title: "千禧曼波"
  title_en: "Millennium Mambo"
  type: "film"
  creator: "Hou Hsiao-hsien"
  creator_role: "dir."
  year: 2001
  eval: "disliked"
  image: "/assets/images/thoughts/films/milllennium_mambo.jpg"
  posted: "2025-04-21"
  text: |
    The turn of the millennium was, in retrospect, a boom market for cinematic loneliness: Wong Kar-wai, Sofia Coppola, and now Hou Hsiao-hsien, each selling alienation at different price points. Hou's contribution is ***千禧曼波***, in which Shu Qi drifts through Taipei's club scene, trapped between a possessive boyfriend and a gangster who offers escape without substance. The third-person voiceover narration, Vicky recounting her own past from ten years in the future, is a distancing device that here produces only distance: one watches at arm's length, never drawn in, never implicated. Shu Qi's performance is mannered in a way that sits uncomfortably with Hou's usually naturalistic register; the affectations feel imported from a different kind of cinema, one less interested in observation than in the performance of observation.

    The sex is meaningless, which is perhaps the point, but the film does not earn the meaninglessness: it does not build a world in which the hollow intimacy tells one anything beyond the fact that intimacy can be hollow. The connections between characters are performed without conviction, a catalogue of false tenderness between people who cannot reach each other, and two hours of this becomes not a portrait of alienation but an exercise in it. <u>Even Hou Hsiao-hsien, it seems, could mistake ornamental stillness for the earned silence of his best work.</u> One expects more from the director of *A City of Sadness* (1989) and *The Puppetmaster* (1993): films where stillness was earned, where duration did structural work rather than merely passing. Here the stillness is ornamental, the loneliness decorative, and the result is a long, elegant vacancy.

- title: "ナミビアの砂漠"
  title_en: "Desert of Namibia"
  type: "film"
  creator: "Yamanaka Yoko"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/desert_of_namibia.jpg"
  posted: "2025-04-21"
  text: |
    Kana is insufferable. She is manipulative, dishonest, casually cruel, serially unfaithful, and constitutionally incapable of sitting still in her own life. She cycles between a gentle boyfriend she finds boring and an abusive one she finds exciting, lies to both with a fluency that suggests she has lied to herself first, and drifts through Tokyo service-sector jobs with the specific restlessness of someone who suspects, correctly, that none of this is the life she was meant to live. Japanese cinema has a long tradition of aimless young women in the city, from Ozu's working girls to the disaffected heroines of Koreeda and Hamaguchi, but Yamanaka Yoko does something different with the type: she refuses to aestheticise the drift. ***ナミビアの砂漠*** does not frame Kana's contradictions as enigma or malaise; it inhabits them with a sincerity so total that judgement becomes irrelevant.

    Kawai Yumi's performance is the engine. She plays Kana with a physical restlessness that is never performed: the constant fidgeting, the way she occupies a room by destabilising it, the brief moments of stillness that arrive only in the company of her cat. The cat, adopted mid-film, is the only relationship in the story where Kana does not perform; it is also, quietly, the relationship that teaches her something about care. Yamanaka structures the film as a series of domestic scenes that accumulate into character rather than plot, and the FIPRESCI jury at Cannes was right to recognise what this achieves: <u>purity taken to its extreme condenses into the ordinary, and the ordinary, looked at with enough attention, becomes something close to profound.</u> All of Kana's contradictions, the cruelty and the tenderness, the compulsive dishonesty and the inarticulate longing for something true, dissolve not into resolution but into the simple fact of a person continuing to exist. It is a second feature, after *Amiko* (2017), of remarkable assurance.

- title: "Mickey 17"
  type: "film"
  creator: "Bong Joon-ho"
  creator_role: "dir."
  year: 2025
  eval: "hated"
  image: "/assets/images/thoughts/films/mickey_17.jpg"
  posted: "2025-04-14"
  text: |
    <u>One walked out in a state of bewilderment, the kind produced not by complexity but by its opposite: the sensation of watching a director who apparently did not know what film he was making.</u> ***Mickey 17*** claims to be a love story between Nasha and Mickey; Naomi Ackie's Nasha is characterised so flimsily that the woman present in the final act is functionally a different character from the one introduced in the first, the connective tissue between them simply absent. It claims to satirise Trump-inflected authoritarian populism; the grassroots movement that supposedly sustains Mark Ruffalo's demagogue receives no exposition adequate to the satirical weight the film tries to place on it, and the civilian resistance organisation materialises near the end as though someone remembered it was needed. The film gestures toward the social structure of Niflheim's native creatures, toward the ethics of colonial extermination, toward cross-species communication, toward the personhood of expendable clones, and toward the political economy of a disposable workforce; it develops none of these threads to any point of consequence, dropping each in turn as if attention itself were too costly to sustain. The result belongs to no recognisable genre and earns no description except juvenile. <u>The film's only irony is unintentional: a satire of a leader who does not know what he wants, made by a director who demonstrably did not know what he wanted to make.</u>

- title: "Иди и смотри"
  title_en: "Come and See"
  type: "film"
  creator: "Elem Klimov"
  creator_role: "dir."
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/films/come_and_see.jpg"
  posted: "2025-04-13"
  text: |
    Watch face after face pass from life to death. Watch the houses erased by fire and bullets. Watch Flyora age years in the span of days, his face transformed from a boy's earnest excitement into something that has no name in peacetime. Watch the cattle and the horses and the donkeys massed on the blood-soaked hillside in the rain, desperate and uncomprehending. <u>Klimov films atrocity without the editorial distance that usually makes atrocity bearable for an audience; there is no cut that offers relief, no compositional beauty that aestheticises the suffering into something one can appreciate from outside.</u>

    The closest comparison in recent cinema is Glazer's *The Zone of Interest* (2023), which approaches the same historical catastrophe through its photographic negative: the violence offscreen, the perpetrators shown in their domestic ordinariness. The two films arrive at the same place by opposite routes. ***Come and See*** puts one inside the horror until the horror becomes the only reality there is. <u>That Klimov never directed another film after completing it is not incidental; it is the only coherent response to having made it.</u>

- title: "Bacalaureat"
  title_en: "Graduation"
  type: "film"
  creator: "Cristian Mungiu"
  creator_role: "dir."
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/films/graduation.jpg"
  posted: "2025-03-27"
  text: |
    Mungiu frames the moral catastrophe of contemporary Romania through the most intimate possible unit: a father's love for his daughter, curdled by the system he has spent his life both resisting and depending on. Romeo is not a villain; that is the film's most precise move. <u>He is a man of genuine principle who has arrived, step by step, at a position of total compromise, and Mungiu's camera observes this without mercy and without accusation, which is a harder thing to sustain than either.</u> The absurdism is structural: in a country where every institution runs on favours and mutual obligation, the attempt to shield one's child from corruption becomes itself an act of corruption. The network of informal exchange that Romeo enters to secure Eliza's examination results is not an aberration from the system; it is the system, metabolised into social life so completely that no one involved experiences it as wrongdoing.

    Eliza herself is the still point around whom this rotates. She is simultaneously the reason for everything and the party with the least agency over any of it: the assault, the exams, the parental expectations, the future that has been decided in advance. What Mungiu understands, and what makes the film more than a corruption procedural, is that Eliza's resignation is not passivity but a lucid reading of her situation. <u>The moment she discovers her father's affair lands with a strange, vertiginous release: as if, in that instant, the architecture of obligation that has organised her entire life reveals itself as contingent, and she sees, for the first time, that she might live for herself.</u>

- title: "R.M.N."
  type: "film"
  creator: "Cristian Mungiu"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/rmn.jpg"
  posted: "2025-03-24"
  text: |
    All the more vital, in the current moment, for being set somewhere that refuses the easy geography of the European refugee debate. The Transylvanian village at the centre of ***R.M.N.*** is itself a minority within Europe: Romanian, Hungarian, and German communities coexisting in a region with its own long history of being the unwanted party, the inconvenient cultural remainder. When a local bakery hires two Sri Lankan workers because no local Romanian will accept the wage on offer, the resulting explosion of collective rage is not irrational; it is the entirely predictable output of a community whose culture and economic development have been left behind by the forces that now, in the form of foreign labour policy, arrive to administer its consequences. Mungiu has always been interested in the structural production of moral failure, and here he is at his most forensic.

    The film's centrepiece is a nearly seventeen-minute unbroken town hall meeting, a scene that functions as a clinical demonstration of how democratic process can become the formal vehicle for something much older and darker. Every perspective in the room has its internal coherence: the capitalist factory owner sees a labour problem; the male chauvinist sees a threat to an order that benefits him; the declining village sees itself being erased. <u>None of them are wrong about their own situation. They are simply wrong about its cause, and the Sri Lankan workers provide an outlet for resentments whose actual sources are diffuse, structural, and impossible to confront in a town meeting.</u> Tensions redirect; the most vulnerable absorb what the system produces; and in the end, as Mungiu's films reliably conclude, no one benefits. <u>The title, a Romanian abbreviation for MRI, is exact: this is imaging of a social body's interior dysfunction, conducted without anaesthetic.</u>

- title: "四月物語"
  title_en: "April Story"
  type: "film"
  creator: "Shunji Iwai"
  creator_role: "dir."
  year: 1998
  eval: "disliked"
  image: "/assets/images/thoughts/films/april_story.jpg"
  posted: "2025-03-23"
  text: |
    Contemporary Japanese cinema seems to contain two entirely separate worlds. In one: Hamaguchi, early Koreeda, directors for whom stillness is a method and observation a form of moral attention. In the other: Iwai Shunji, for whom youth is not a subject but a mood to be bottled and sold back to middle-aged audiences as nostalgia. ***四月物語*** belongs squarely to the second world. A shy girl moves from Hokkaido to Tokyo to attend the university where a boy she admired once studied; cherry blossoms fall; a light piano score insists on the wistfulness of it all. The film runs sixty-seven minutes and still feels padded.

    The problem is not the slightness of the premise; a great filmmaker can make a meal of less. The problem is that the slightness is the entire offering. Iwai is not interested in what Uzuki thinks, feels, or wants beyond the romantic fixation that serves as both her motivation and the film's. She is a vessel for a mood, and the mood is that of a man in his late thirties remembering what it felt like to be eighteen: soft-focus, consequence-free, and faintly self-congratulatory. There is no interiority to disrupt the surface, no friction, no surprise. One does not need to prefer Hamaguchi's rigour to recognise that a cinema this decorative has nothing to say about the youth it claims to celebrate. It is a greeting card with a runtime.

- title: "4 luni, 3 săptămâni și 2 zile"
  title_en: "4 Months, 3 Weeks and 2 Days"
  type: "film"
  creator: "Cristian Mungiu"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/4_months_3_weeks_and_2_days.jpg"
  posted: "2025-03-22"
  text: |
    The Palme d'Or was correct, and not merely as institutional recognition of a career: the film earns its laurels on strictly formal terms. Mungiu's camera follows Otilia through a single day in 1987 Communist Romania with the patience and moral seriousness of someone who understands that <u>the way a lens regards a woman's face as she navigates an illegal abortion is itself a political act.</u> The male gaze, so omnipresent in European art cinema, is simply absent here; what remains is an observational rigour that refuses to aestheticise suffering while also refusing the false neutrality of documentary distance. That combination is rarer than its apparent simplicity suggests.

    The film's genius is in its negative space: the horror of Ceaușescu's Decree 770 is never named, never explained, never contextualised for an imagined uninformed viewer. It is simply the atmosphere, the pressure that shapes every interaction, every calculation, every wall Otilia and Găbița run into. And those walls are built entirely from the actions of men: the abortionist's terms, the hotel clerk's assumptions, the boyfriend's obtuse dinner-party conversation while Otilia sits in silence, processing what she has just carried across the city. Mungiu's camera, which stays with her through that dinner scene in one of the most extraordinary unbroken takes in contemporary cinema, makes its argument without a word of thesis: this apartment building, this slush-covered street, this dinner table are not the most sordid places in the world. The corridor of a hotel room is. <u>What Otilia leaves there, wrapped and wordless, is not just a foetus; it is the entire weight of a system that called itself a state.</u>

- title: "秋刀魚の味"
  title_en: "An Autumn Afternoon"
  type: "film"
  creator: "Yasujirō Ozu"
  creator_role: "dir."
  year: 1962
  eval: "liked"
  image: "/assets/images/thoughts/films/an_autumn_afternoon.jpg"
  posted: "2025-03-17"
  text: |
    Ozu's final film is, as always with late Ozu, a study in the architecture of resignation. Shūhei, an ageing widower, observes a former teacher reduced to drunken dependency on his unmarried daughter and recognises the pattern: his own Michiko, who runs the household and cares for her brother, is being consumed by the same structural obligation. The decision to arrange her marriage is presented as an act of paternal generosity, a liberation. ***秋刀魚の味*** is too precise a film to accept this framing uncritically. What it shows, with the formal composure that makes Ozu's compassion feel almost unbearable, is a woman whose life trajectory was decided before she was consulted. <u>The 'escape' from being her father and brother's unpaid domestic labour is, in practice, entry into the cage of patriarchal marriage; one form of erasure replaces another, and the system calls it love.</u>

    Michiko's tears on the night before her wedding say everything the film's surface politeness cannot. She has seen her brother's marriage; she knows what awaits. The low camera, the symmetrical interiors, the unhurried cuts: Ozu's formal vocabulary is so controlled that the small disruptions, a lowered gaze, an unanswered question, a glass refilled one too many times, carry the weight of violence. The drinking scenes between Shūhei and his friends are warm and melancholic, men who fought in the Pacific War processing their obsolescence with saké and rueful humour, but the warmth does not disguise what the film quietly documents: a patriarchal order that reproduces itself through the bodies of its daughters while congratulating itself on its tenderness. The taste of saury, autumn, the season of things ending. One leaves the film admiring Ozu's formal perfection and resenting the world he so faithfully records.

- title: "The Brutalist"
  type: "film"
  creator: "Brady Corbet"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/brutalist.jpg"
  posted: "2025-03-02"
  text: |
    ***The Brutalist*** oscillates between the monumental and the minute with a confidence that its three-and-a-half-hour runtime earns. László Tóth, a Hungarian Jewish architect who survived the camps, arrives in postwar America with his Bauhaus training and his trauma and discovers that the New World's promise operates on the same transactional logic as the Old World's violence: patronage, dependency, the conversion of genius into an asset on someone else's balance sheet. Adrien Brody's performance is extraordinary in its refusal of the expected Holocaust-survivor register; Tóth is not noble or broken in the ways cinema has taught us to expect. He is proud, difficult, addicted, brilliant, and intermittently cruel, a man whose creative vision is indistinguishable from his damage. Guy Pearce's Harrison Lee Van Buren is the American capitalist as patron-predator: generous in the way that power is generous, which is to say conditionally, revocably, and with interest.

    The architecture is not metaphor; it is the literal medium through which the film's arguments about capital, ambition, and cowardice are conducted. Tóth's community centre, brutalist in form, uncompromising in its refusal of ornament, is both his masterwork and the instrument of his subjugation: it can only exist because Van Buren funds it, and Van Buren funds it because owning a genius is a form of collecting. <u>The film understands that the relationship between artist and patron under capitalism is not collaboration but a special kind of violence: the patron purchases not the work but the dependency, and the dependency is the point.</u> Felicity Jones as Erzsébet, arriving from Europe with her own damage and her own intelligence, completes the triangle; her presence does not soften the film's thesis but sharpens it, because she sees what László cannot afford to see. Corbet shoots on VistaVision, and the format's width and grain give every frame the quality of an archive photograph, something already historical, already a document of what ambition cost. An epic about three people, which is the only kind of epic that matters.

- title: "Black Box Diaries"
  type: "film"
  creator: "Shiori Itō"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/black_box_diaries.jpg"
  posted: "2025-03-02"
  text: |
    Shiori Itō films her own rape case from the inside: the police interviews, the civil suit, the press conferences, the surveillance footage of herself being surveilled. The documentary form here is not a choice but a necessity; when the institutional machinery refuses to produce an account of what happened, the survivor becomes the documentarian by default. ***Black Box Diaries*** is raw, structurally uneven, and occasionally repetitive in the way that activism in real time is repetitive: the same arguments made to different institutions, the same evidence weighed and found insufficient, the same story told again because nobody listened the first time. The formal roughness is not a weakness. It is the texture of a system that forces endurance as the price of acknowledgement.

    What is devastating, and what makes this more than a personal testimony, is how little changes. After years of litigation, media exposure, international attention, and a successful civil verdict, the concrete institutional reforms amount to almost nothing: the age of sexual consent was raised from thirteen to sixteen, which is progress of a kind that makes one want to scream. Yamaguchi still insists 'we both need to reflect'. The Japanese legal system, built on a framework where force and intimidation remain the primary criteria for sexual offence, has not meaningfully shifted. <u>Itō won her case, and what she won was consolation, not precedent: in a civil law system, her victory does not bind future courts, and the next woman will face the same black box.</u> If Japan, with its functioning judiciary and free press, cannot move further than this, then China, where the #MeToo movement was suppressed before it could establish legal footholds, is a silence one does not need to imagine.

- title: "National Theatre Live: Prima Facie"
  type: "film"
  creator: "Justin Martin"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/national_theatre_live_prima_facie.jpg"
  posted: "2025-02-24"
  text: |
    Two hours with Jodie Comer and no intermission, no relief. Suzie Miller's play moves the way trauma moves: fast, then suddenly airless. Comer's Tess arrives as a working-class barrister who has built her entire identity on the adversarial machine, on cross-examination, on the clean cold grammar of evidence. She is good at this. She is proud of being good at this. The law rewards the kind of mind that can separate feeling from fact, and Tess has spent years perfecting that separation. Then the separation is done to her.

    What the play understands, and what the legal system structurally refuses to understand, is that trauma rewrites memory from the inside. <u>The law demands consistency; trauma produces exactly the opposite.</u> Miller, who was a barrister herself, knows how the mechanism works, knows where the teeth are, and Comer makes one feel every tooth. The shift, when it comes, is not melodramatic. It is worse than that. It is procedural. <u>A woman is processed through a system that was designed, over generations, to protect the status quo of male prerogative, and the processing looks perfectly orderly from the outside. That is the horror of it.</u>

    One leaves the cinema shaken in a specific way, the way one is shaken when a system's cruelty is finally made visible rather than merely arguable. The law, Miller is saying, is not neutral. It is the shape society gives to its deepest commitments, and for centuries those commitments have included the tacit belief that women's bodies are not fully their own to govern. Tess was told, as a schoolgirl, that her generation would change the world. The play ends on that memory, and on the gap between what was promised and what was delivered. <u>Comer will close that gap. One believes this without reservation, watching her stand in the light alone, having carried everything.</u>

- title: "밤의 해변에서 혼자"
  title_en: "On the Beach at Night Alone"
  type: "film"
  creator: "Hong Sangsoo"
  creator_role: "dir."
  year: 2017
  eval: "meh..."
  image: "/assets/images/thoughts/films/on_the_beach_at_night_alone.jpg"
  posted: "2025-02-10"
  text: |
    This is a manifesto film, and the manifesto is stated plainly enough: if it was true love, why couldn't they be together? Hong seems to believe that he and Kim Minhee were wronged by the world, transformed into monsters by a society incapable of tolerating desire that breaks convention. One can grant the sincerity of that wound. What one cannot grant is the film built to house it. Hong's autobiographical confession, delivered through a director-surrogate who describes his method as 'shoot until you end up somewhere,' produces exactly the kind of stream-of-consciousness that phrase implies: unmoored, circular, committed to nothing except its own grievance. <u>Stream-of-consciousness is not the same as unfiltered thought.</u> Le Clézio and Woolf use it to pull the brain inside out and hold it to the light; here it functions as camouflage for a film that has decided in advance what it wants to say and never tests that decision against anything.

    The seams show in the details. Why would a sister not know that her sibling prefers to live alone? Why would a husband, after years of marriage, compliment his wife's cooking and follow it with 'thank you', as though receiving a service from a stranger? Hong's naturalism, usually so precise in its social embarrassments, here feels constructed by someone too absorbed in his own case to observe the people around him. Kim Minhee won the Silver Bear at Berlin for this performance, and her work has a raw exposure that the film does not deserve. <u>The manifesto collapses under the weight of its own falseness.</u>

- title: "Bastarden"
  title_en: "The Promised Land"
  type: "film"
  creator: "Nikolaj Arcel"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/the_bastard.jpg"
  posted: "2025-02-09"
  text: |
    The vast Jutland heath in the film speaks before any character does: a landscape so obdurate and wind-scoured that the mere fact of men and women trying to cultivate it reads as a kind of defiant absurdity. Watching Ludvig Kahlen persist against the clay and the cold and the sadism of the local nobleman, one feels the tenacity not as heroism in any classical sense but as something more creaturely, more desperate, a refusal of the conditions one has been assigned by birth. Ann Barbara is the film's moral centre, and her partnership with Kahlen carries the kind of weight that historical epics usually bury under production design. Mads Mikkelsen rarely speaks more than necessary, which is exactly right.

    I looked up the history afterward. Barbara does not exist; she is a composite or an invention. Kahlen, after eight years without result on the heath, abandoned the farming project and returned to military service as an officer. The film knows enough not to tell us this. It ends instead on the image of the heath beginning, just barely, to yield, and that image does what the historical record cannot: <u>it makes the attempt feel sufficient, the trying feel like a form of arriving.</u> The harshness of the land argues its own case. <u>One leaves the cinema with earth under one's fingernails.</u>

- title: "벌새"
  title_en: "House of Hummingbird"
  type: "film"
  creator: "Bora Kim"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/house_of_hummingbird.jpg"
  posted: "2025-02-04"
  text: |
    There is a scene early in the film: the parents had been fighting the night before, the mother stabbing the father's arm with a glass lamp in self-defence, and the next morning they are sitting in front of the television, chatting, laughing, as though the wound were in a different house altogether. Eunhee watches this and asks, in that oblique way the film has of sharpening a moment into an aphorism: 'Because they never look each other in the eye.' She does not yet understand that she is diagnosing herself. She has a boyfriend who distributes his affections indiscriminately, a manga habit that no one in her life bothers to understand, a tumour growing behind her ear that she initially treats as a minor inconvenience. She moves through her own life at an angle, deflecting rather than confronting, surviving by strategic non-engagement.

    Bora Kim shoots 1994 Seoul with the patience of someone who knows that the Seongsu Bridge collapse is coming but refuses to use it as punctuation. The disaster arrives; it is not an event so much as a weather system, the kind of rupture that does not produce epiphany but accumulates in the body alongside everything else. <u>What the film understands about adolescent interiority is that pain is not clarifying. It is disorganising.</u> One does not emerge from it wiser in any legible way; one simply finds, at some unmarked point, that one has stopped flinching from certain things.

    The final movement of Park Ji-hoo's performance carries all of this without explaining any of it. Eunhee before is the same Eunhee after, except that something behind the face has shifted its weight. The tumour gets cut out. The life, punctured and painful and entirely hers, gets picked up again. <u>It is one of the most accurate portraits of girlhood I have seen on screen.</u>

- title: "Sometimes I Think About Dying"
  type: "film"
  creator: "Rachel Lambert"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/sometimes_i_think_about_dying.jpg"
  posted: "2025-02-02"
  text: |
    The static office tableaux recall the visual grammar of Robert Zemeckis's *Here* (2024), though the emotional register could not be further away: where that film reaches for the cosmic, Lambert reaches for the granular, the almost invisible interior life of a woman who has learned to live very far inside herself. The closer comparison is *Fallen Leaves* (2023): the same deadpan warmth, the same faith that loneliness is not a permanent condition so much as a frequency one can shift from, given the right accident of proximity. <u>Fran does not want to die; she imagines it the way one might imagine emigrating, as an abstraction that allows her to live at a safe distance from her actual life.</u>

    What Lambert understands, and what Daisy Ridley renders with a stillness that feels hard-won, is that the inner world of a withdrawn person is not impoverished. <u>It is excessively full, and the problem is not emptiness but the absence of any circuit between that fullness and the world outside.</u> Robert's arrival does not resolve this. It simply produces one moment, in a restaurant, when the owner looks at them both and says 'you too should come', and something in Fran's face allows it in. I found it very difficult not to smile at that. <u>Clean and pure: a film that earns its tenderness by never once performing it.</u>

- title: "여행자의 필요"
  title_en: "A Traveler's Needs"
  type: "film"
  creator: "Hong Sang-soo"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/films/travelers_needs.jpg"
  posted: "2025-02-02"
  text: |
    ***여행자의 필요*** has, on paper, the sharpest premise Hong Sang-soo has produced in years: a penniless French woman adrift in Seoul, teaching a language she barely speaks to Korean adults who treat her vacancy as depth because it arrives in European packaging. The satirical architecture is legible. Contemporary Korean society's deference to whiteness, the way hollow expression gets mistaken for insight when it comes with a French accent and a linen cardigan, is a subject that deserves the kind of compression Hong's minimalism can provide. Huppert, in her third collaboration with Hong after *In Another Country* and *Claire's Camera*, plays Iris as deliberate cipher, all borrowed warmth and strategic opacity. The problem is that 'legible' is where the film stops.

    There is a difference between depicting boredom and being boring, between representing emptiness and producing it. In-guk and the other Korean characters are designed to be flat, their conversations circular, their social rituals performative; one understands this. But important subjects require depth of insight, not merely the demonstration that depth is absent. Hong identifies a phenomenon, names it by implication, then sits cross-legged before it for ninety minutes without once pressing further. The Berlin jury awarded a Silver Bear Grand Jury Prize; one suspects they were rewarding the premise rather than what Hong does with it. <u>Ninety minutes of a well-framed observation that never becomes an argument: a critique that refuses to do the work of critique.</u>

- title: "Interstellar"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 2014
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/films/interstellar.jpg"
  posted: "2025-01-28"
  text: |
    I have lost count of how many times I have watched ***Interstellar***, and each time the film reveals something the previous viewings had not prepared me for. Not in the sense of hidden detail, though the engineering of Kip Thorne's physics into the visual fabric of Gargantua is extraordinary; but in the sense that the emotional register keeps deepening, as though the film were accruing compound interest on every rewatch. The premise is ecological collapse: the blight, the dust, the quiet extinction of crop after crop, a world not ending in spectacle but in agricultural failure, which is to say in the failure of the systems that sustain ordinary life. NASA operates in secret because the political imagination has contracted to the point where collective ambition is no longer fundable, no longer even speakable. Mark Fisher, who in his *The Weird and the Eerie* (2017) wrote about ***Interstellar***, would recognise this instantly: <u>it is capitalist realism made literal, a civilisation that can no longer imagine its own future and so dismantles the institutions that once tried to build one.</u>

    What Fisher diagnosed in *The Weird and the Eerie* as the film's retreat from genuine eeriness into sentiment (i.e. love) is, I think, its most radical move. The gravitational anomalies, the messages from across spacetime, the agency operating behind Cooper's bookshelf: these are eerie in Fisher's precise sense, a presence where there should be absence, an intelligence acting through physics. The orthodox reading is that the reveal domesticates the mystery: future humanity is 'they', love is the variable that transcends dimension, the cosmic 'collapses' back into the familial. But to call this 'domestication' is to assume that the familial is small. Cooper watching his children age decades in minutes while he himself remains the same, tears streaming down his face as 23 years of messages play in sequence. <u>Love, instead of being the answer to the film's physics, actually becomes the thing that makes the physics unbearable.</u>

    Every Nolan film before this one keeps its emotional content behind glass. *Inception* (2010) is a locked room; *The Dark Knight* (2008) is a thought experiment; *The Prestige* (2006) is a mechanism. ***Interstellar*** is the film where Nolan finally breaks that glass. The docking sequence, Zimmer's organ shaking the theatre, the TARS countdown, Cooper's refusal to accept the odds. Especially the last one: a scene about stubbornness and physics and the specific kind of courage that looks, from the outside, indistinguishable from insanity. The tesseract sequence that follows is Nolan's most ambitious formal construction, a five-dimensional space made navigable by a father's memory of his daughter's bedroom, and the fact that it works, visually and emotionally and (potentially) scientifically, is an achievement I cannot quite account for. <u>Murph's equation solved on the watch-hand: a father's love encoded in gravity, arriving years too late yet exactly on time.</u>

- title: "The Substance"
  type: "film"
  creator: "Coralie Fargeat"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/the_substance.jpg"
  posted: "2025-01-27"
  text: |
    The prison is architectural. Once the system has been built around one, made of gazes and expectations and the market logic of female desirability, there is no door marked exit. Elisabeth Sparkle discovers this by degrees, then all at once: Sue is not a way out but a doubling of the trap, younger and more perfect and just as expendable, the same machine running faster. Fargeat's visual grammar, all hyper-saturated surfaces and grossly amplified bodily sounds, mimics the aesthetics of advertising in order to weaponise them; one is made to inhabit the male gaze before the film turns it inside out and makes it grotesque.

    The Cronenbergian escalation of the final act is not excess for its own sake. <u>It is the logical conclusion of a premise taken seriously: if the body is the site of a woman's social value, and if that value is subject to constant competitive depreciation, then the endpoint of fully internalising this system is self-destruction made literal.</u> Demi Moore carries the film's emotional mathematics in her face throughout; her casting is not irony but precision, a career of public scrutiny folded into the role. The New Year's broadcast sequence is apocalyptic in the correct sense, a revelation, not just a bloodbath.

    <u>The cycle of younger, more beautiful: like slamming one's own face against a mirror, again and again, until the mirror wins.</u>

- title: "C'è ancora domani"
  title_en: "There's Still Tomorrow"
  type: "film"
  creator: "Paola Cortellesi"
  creator_role: "dir."
  year: 2023
  eval: "disliked"
  image: "/assets/images/thoughts/films/theres_still_tomorrow.jpg"
  posted: "2025-01-25"
  text: |
    Is this what feminist filmmaking looks like now: a film steeped in domestic violence that pivots, in its final act, to women's suffrage as the answer? The 1946 ballot is framed as liberation. <u>But tomorrow Delia goes home. Tomorrow she is still married to the same man in the same apartment in the same structural dispensation that a single vote cannot touch.</u> Cortellesi's tonal dissonance, domestic violence staged with the choreography of a musical number, has been defended as Brechtian; one finds it more symptomatic, a film uncertain whether it wants to horrify or charm, choosing both and achieving neither fully. <u>Italy's enthusiasm for the film is legible: it is the kind of cultural object that allows a society to feel its conscience has been pricked without requiring it to sit with any actual discomfort.</u>

- title: "Bird"
  type: "film"
  creator: "Andrea Arnold"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/bird.jpg"
  posted: "2025-01-21"
  text: |
    Arnold's territory is the working-class British childhood; she has spent twenty years finding images for the specific texture of deprivation: not poverty as backdrop but poverty as medium, the element through which everything moves. ***Bird*** begins in a squat in Gravesend: Bailey, twelve, navigating an absent mother, a chaotic father, a brother already sliding toward criminality, an environment where stability is a concept from elsewhere. Nykiya Adams carries this without performance, reading the world around her with the flat alertness of someone who learned early that the world requires reading. Rogowski's Bird arrives, half-present, moving through Gravesend with a gentleness that refuses the logic of the place, and the film does not announce a shift; it simply allows one to happen.

    Arnold calls it poetic realism rather than magical realism, and the distinction matters: the feathers that eventually appear on Bird are not a symbol to be decoded but a language for what Bailey cannot otherwise say. The central relationship resists categorisation; whether it is love, or the rehearsal of love, or something adjacent that poverty makes available when the recognised forms are foreclosed, is a question the film declines to settle. <u>I do not think it is about love either. But it is about the hunger of a twelve-year-old girl for something that does not need to be named, only reached for; and Arnold, who has spent her career translating that hunger into images, has done it again here without flinching, without sentimentalising, without telling one how to feel.</u>

- title: "Ricky Gervais: Armageddon"
  type: "film"
  creator: "Ricky Gervais"
  creator_role: "by"
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/films/ricky_gervais_armageddon.jpg"
  posted: "2025-01-16"
  text: |
    Scattered and, finally, too safe. <u>The faux-woke provocation, especially after sitting with Jacqueline Novak's 2024 special, feels like a man doing laps in the shallow end and calling it a marathon.</u> The delivery remains excellent: Gervais's timing is a physical fact, and one does not take it for granted. But the reluctance to engage with anything consequential, preferring instead to hedge and perform transgression while carefully avoiding it, including that bit about how the meanings of words change, as though this were a discovery and not a basic datum of historical linguistics, is an affliction one used to consider specifically American. <u>Apparently it has crossed the Atlantic.</u>

- title: "Jacqueline Novak: Get On Your Knees"
  type: "film"
  creator: "Jacqueline Novak"
  creator_role: "by"
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/jacqueline_novak_get_on_your_knees.jpg"
  posted: "2025-01-13"
  text: |
    The only stand-up special in the past two years that I have loved, and one of the best-written comedies I know of, in any form. On its surface: a sustained meditation on a specific sex act. In its actual operation: a post-structuralist feminist manifesto about the violence encoded in language, about who gets to name acts and bodies and what those names do to the people named. Why is it called a 'boner' if bones are not involved? Why 'penetrate'? Why 'enter'? <u>These are not jokes building to punchlines; they are arguments, and they are argued with a rigour that most academic feminism cannot match because it cannot also be this funny.</u>

    Novak, directed by Natasha Lyonne in a staging that transforms Town Hall into something between a lecture hall and a confessional, deploys erudite language as a weapon: the elevated register is not affectation but strategy, a claim on the authority that male sexual narrative has always assumed for itself. The metaphorical and allegorical layering accumulates until the special achieves something I had not anticipated: <u>philosophical velocity, the feeling that language is being used to do something language does not usually agree to do.</u>

    <u>The energy in this room, this recording, this hour, is almost never seen in stand-up: a fierce declaration that still rings.</u>

- title: "I Saw the TV Glow"
  type: "film"
  creator: "Jane Schoenbrun"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/films/i_saw_the_tv_glow.jpg"
  posted: "2025-01-10"
  text: |
    ***I Saw the TV Glow*** is not a film without ideas. The trans allegory is legible and its emotional logic is real: Owen's dissociation is the experience of living in the wrong body, the Pink Opaque is the fantasy of a self that fits, Mr. Melancholy is the repression that would hollow one out rather than let one name what one is. Jane Schoenbrun has encoded this honestly; the film has reportedly served as an 'egg crack' for viewers who left the cinema and came out. That is not nothing. The problem is that the film has confused this allegorical sincerity with formal achievement. Its dreamlike aesthetic, the 1990s suburban decay, the VHS distortion, the colour pushed until saturation becomes symptom, accumulates atmosphere without constructing an argument. Lynch does something different: his surrealism has internal logic, symbols that evolve through recurrence and variation, a geometry that does formal work. For Schoenbrun, style is the subject; when style is all there is, one arrives back at the question of who can watch this.

    The answer is: primarily those who already recognise themselves in Owen. The film works as a mirror for dysphoric viewers, as a recognition of something they already carry; it does not have the formal resources to make an outside viewer feel that recognition from scratch. <u>This is the distinction that matters, and it is the distinction between advocacy and art.</u> A Bildungsroman this conventional, even in its inverted structure, its anti-development, its hollow adulthood, belongs to a long tradition of queer cinema without distinguishing itself within it. The near-universal acclaim it earned has more to do with A24's institutional cultivation of trans cinema as a prestige category, and with a critical culture investing in what the film represents rather than what it formally achieves. One understands the investment. The film itself is mediocre.

- title: "好东西"
  title_en: "Her Story"
  type: "film"
  creator: "邵艺辉"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/herstory.jpg"
  posted: "2024-12-31"
  text: |
    An urban companion piece to ***出走的决心*** (2024): where Yin Lichuan's film dramatises the decades of patriarchal accumulation that precede a woman's departure, Shao Yihui asks what happens after she has already left. Wang Tiemei, former investigative journalist turned struggling new-media editor, raises her daughter Moli alone in a Shanghai walk-up; the found family she builds with upstairs neighbour Xiao Ye, a band singer prone to emotional freefall, is the film's answer to the question that *出走的决心* deliberately leaves open. Both films are didactic. Both understand that the didacticism is the point: in a culture where feminist discourse is routinely dismissed as 女拳, the act of naming (menstruation, consent, performative allyship, the specific exhaustion of single motherhood) is itself a political intervention, not a failure of subtlety.

    What keeps ***好东西*** from settling into comfortable pedagogy is its target selection. The film's sharpest satire is reserved not for obvious misogynists but for the men who have learned to perform feminism without surrendering its structural dividends: the ex-husband who reads Chizuko Ueno and announces a vasectomy as a gesture of loyalty; the drummer who prides himself on knowing Tiemei's journalism while competing with another man over her attention. These are men whose language has changed faster than their behaviour, and the dinner scene in which they outbid each other in feminist credentials, while Moli asks 'what's this?' and is told '有毒的东西', is the film's most concentrated comic achievement. <u>The pulled punch lands harder than the thrown one: Shao understands that the men most worth satirising are the ones who believe themselves exempt from satire.</u>

    The limitation is structural and the film knows it. This is Shanghai, the Former French Concession, a metropolitan bubble where feminist solidarity can be practised because the cultural infrastructure permits it. The sound montage, Xiao Ye transforming the rhythms of Tiemei's domestic labour into something that sounds like music, is beautiful, but it is the beauty of a life already liberated enough to aestheticise its own struggle. The women in *出走的决心* do not have this luxury. <u>***好东西*** is the feminism that follows awakening; it is also, honestly, the feminism available to those who can afford to have already woken up.</u> That the film acknowledges this through its oblique references to 2015, the year Tiemei wrote her most hopeful article, the year investigative journalism in China began its terminal decline, suggests Shao is aware of the gap between what her film depicts and what the country outside the Concession endures.

- title: "کیک محبوب من"
  title_en: "My Favourite Cake"
  type: "film"
  creator: "Maryam Moghaddam & Behtash Sanaeeha"
  creator_role: "dir."
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/my_favourite_cake.jpg"
  posted: "2024-12-31"
  text: |
    ***کیک محبوب من*** condenses what might have been a lifetime's worth of tenderness into a single evening. Mahin, seventy and widowed for three decades, lives alone in Tehran; her children are abroad, her days are structural repetition, her solitude something she has learned to inhabit rather than resist. When she meets Faramarz, a retired taxi driver, and brings him home, Moghaddam and Sanaeeha unfold the encounter with an unhurried warmth that makes one forget, briefly, that every gesture on screen is a criminal offence under the Islamic Republic: the uncovered hair, the poured wine, the slow dance in the living room. The directors knew what they were filming. They were banned from travelling to Berlin for the premiere, their passports confiscated, later held in Evin prison. <u>That a seventy-year-old woman enjoying an evening of ordinary human connection constitutes, under this regime, an act of defiance is the film's quietest and most devastating argument.</u>

    The shift, when it comes, does not register as a twist; it registers as gravity. The film spends its first hour constructing a fragile architecture of mutual recognition, two people discovering they still possess the capacity to be tender with a stranger, and the joy is laced with something sharper because one can feel, even as it accumulates, that it will not hold. Lily Farhadpour carries this entire trajectory in her face, moving from guarded curiosity to open delight to something harder to name, the expression of someone who has been reminded of what she has been missing and must now reckon with the reminder's cost. One leaves with an evening compressed to a point of light: brief, impossibly warm, and already gone.

- title: "La Bête"
  title_en: "The Beast"
  type: "film"
  creator: "Bertrand Bonello"
  creator_role: "dir."
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/films/la_bete.jpg"
  posted: "2024-12-27"
  text: |
    ***La Bête*** arrives with formidable formal apparatus: three timelines, three genres, a Léa Seydoux who transforms across each while remaining recognisably the same consciousness, and a sci-fi frame in 2044 where the state offers to purify one's DNA of the catastrophic emotional residue the past has left. It is, on paper, a film about how the same desire repeats across historical time, condemned to identical catastrophe under different period costumes. The Henry James source, *The Beast in the Jungle*, is one of the great stories about deferred catastrophe, the life hollowed out not by disaster but by endless anticipation of it; Bonello finds in the premise a vehicle for thinking about compulsion and repetition. But the 2044 frame gestures toward real questions about consciousness and identity: what survives the purge, whether the self that emerges is still the same self; the film has no interest in pursuing them. The science fiction is atmosphere, not argument.

    The 2014 subplot, Louis in Los Angeles consuming redpill content, radicalised by heterosexual grievance into something approaching incel logic, is the film's most contemporaneously legible thread and its least developed. Bonello seems to find 1910 Belle Époque Paris aesthetically irresistible; the emotional centre of gravity stays stubbornly there, in long-lingering shots of period interior, while the LA material passes quickly, its political implications half-sketched. <u>The unearned devotion Seydoux's Gabrielle grants Louis across every timeline is either her character's existential self-dissolution or the romantic logic of the James source rotated forward intact and unreexamined; the film declines to say which.</u> Seydoux performs this ambiguity with complete conviction. The film does not deserve it.
- title: "Here"
  type: "film"
  creator: "Bas Devos"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/here.jpg"
  posted: "2024-12-23"
  text: |
    Bas Devos works in a register so quiet and so precise that it can take a full act before one realises the film has already done something rather extraordinary. There is no plot, not in any conventional sense: Stefan, a Romanian construction worker wrapping up a job before the city empties for winter, crosses paths with Shuxiu, a Chinese-Belgian researcher who studies moss, and something passes between them. A shared bowl of soup. A mutual willingness to stay still in each other's company. That is, essentially, everything. <u>And yet the film does not feel empty; it feels full in the way that presence, as opposed to event, can be full.</u> Devos's fixed camera and his sensitivity to the soft, lateral light at Brussels's edges give the film the texture of careful observation: one senses that each frame has been held long enough for something real to accumulate inside it. The moss is not incidental. Shuxiu's science becomes the film's quiet philosophy, these organisms that persist at the margins, photosynthesising in the cracks, making something from almost nothing. Stefan and Shuxiu are, in their different forms of displacement and solitude, a little like that. The film earns the analogy without pressing on it. What stays is harder to name. The encounter is neither consummated nor abandoned; it simply is, for as long as it lasts, and Devos treats that temporariness with neither melancholy nor forced significance. <u>Within these miracles, a person encounters nature, a person encounters another person, a person encounters themselves.</u> <u>I came out into the street feeling, for a few minutes, that the world was slightly more permeable than I had previously assumed.</u>

- title: "The Outrun"
  type: "film"
  creator: "Nora Fingscheidt"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/the_outrun.jpg"
  posted: "2025-01-26"
  text: |
    The structure is nonlinear in the way that recovery itself is nonlinear: not a dramatic choice but a phenomenological one, the film spiralling between Orkney's slow, immense present and London's jittery flashbacks as though Rona's memory cannot hold a sequence without the sequence cracking open. Fingscheidt withholds the landscape deliberately. In the first half, Orkney is muted, grey, a place Rona endures rather than inhabits; London, in contrast, blazes with colour and kinetic damage. As sobriety accumulates, the ratio inverts. The cliffs and the North Atlantic open up, frame by frame, as though the land were waiting for her to be capable of seeing it. <u>It is a precise visual argument: the world does not change; one's capacity to receive it does.</u>

    Saoirse Ronan's Rona is flinty and frail in equal measure. The performance operates through the body as much as the face: the physicality of being drunk, the sheer muscular effort of being sober, the moment on the clifftop when she conducts the waves with her arms outstretched as though she could command the storm. I watched that scene and felt something dislodge. I too want to stand like that, proud and certain as though one could truly govern the weather, composed amid nature's merciless absurdity. The 'nerd layer', Liptrot's voiceover passages about corncrakes and selkies and the geological tremors that run through Orkney like a nervous system, gives the film a texture most addiction narratives lack: the sense that the world is not a backdrop to recovery but its instrument. The corncrake, heard but never seen, migrating thousands of miles with a thirty-per-cent survival rate, is a metaphor the film is wise enough never to state aloud.

    <u>What stays is the outrun itself: the rough grazing beyond the cultivated field, where land meets sea, where nothing is domestic and nothing is entirely wild.</u> Rona's recovery happens in precisely that space. By the end I was not thinking about addiction at all; I was thinking about what it would mean to belong to a landscape so completely that the landscape begins to repair what the self could not.

- title: "Anora"
  type: "film"
  creator: "Sean Baker"
  creator_role: "dir."
  year: 2024
  eval: "disliked"
  image: "/assets/images/thoughts/films/anora.jpg"
  posted: "2024-12-22"
  text: |
    Baker shoots a tragedy with the pacing and tonal palette of a screwball comedy, and for a while the energy holds; Mikey Madison is raw and committed in a way that the film never fully deserves. The problem is structural: <u>the script consistently elects the least truthful version of every scene, reaching for farce at precisely the moments when Anora's situation demands something more honest.</u> The oligarch-family farce in the third act runs at such extended, exhausting length that one suspects Baker simply did not know how to end the film he had actually made. And the ending he does land on, with the quiet Russian henchman positioned as a kind of soulful rescuer of the battered female lead, is not subversive; it is merely the oldest available comfort narrative, dressed in indie-film clothes. The lives of sex workers carry social and moral weight that the film keeps promising to reckon with and never does. <u>Amusingly, this film, ostensibly with a female protagonist, can barely pass the sexy lamp test: swap Anora for an object of equivalent aesthetic appeal and the plot of the first act changes not at all.</u>

- title: "0.5ミリ"
  title_en: "0.5mm"
  type: "film"
  creator: "Momoko Ando"
  creator_role: "dir."
  year: 2014
  eval: "meh..."
  image: "/assets/images/thoughts/films/05mm.jpg"
  posted: "2024-12-16"
  text: |
    There is a ninety-minute film buried inside ***0.5ミリ***'s three-hour-and-sixteen-minute runtime, and it is a good one. The opening family tragedy and Sawa's subsequent drift into homelessness have the quiet, undecorated specificity of social realism at its best; Sakura Ando commits to every frame with a physical intelligence that consistently exceeds her material. Had the film followed Sawa and the child's experience to a clean resolution, it might have been something genuinely still and devastating. Instead, Ando structures the middle act as a picaresque through the lives of elderly men, each episode functioning as a semi-autonomous short film about Japan's ageing crisis, and the cumulative effect is not accumulation but dissipation. The thesis scatters. What is being said about elder care, about loneliness, about the gendered distribution of caregiving labour? The film declines to decide.

    What it does commit to, inadvertently, is a parade of men who moralise without self-awareness: men who pontificate about duty and tradition while being cared for, men whose grand pronouncements about life arrive in the mouths of characters the film never adequately interrogates. <u>For a film directed by a woman, adapted from her own novel, this is a striking amount of unexamined patriarchal ventriloquism.</u> The episodic structure, which could have been a formal strength, becomes an excuse for each segment to introduce its own tonal register, its own half-articulated concern, without any of them earning the runtime they consume. Ando clearly wanted to make a film about the distance between people, the 0.5 millimetres that separate intimacy from intrusion; what she made is a film that cannot decide whether it is social commentary, character study, or picaresque dark comedy, and so becomes none of them with conviction.
- title: "Janet Planet"
  type: "film"
  creator: "Annie Baker"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/janet_planet.jpg"
  posted: "2024-12-16"
  text: |
    Annie Baker's theatrical practice has always been interested in duration as meaning: her plays earn their length by insisting that the audience remain present alongside characters who do not resolve, who persist. That patience, translated to cinema, produces something I had not quite seen before: <u>a film that captures how a child lives inside a parent's life, not beside it, not safely downstream of it, but submerged.</u> Lacy does not observe her mother Janet from the protected distance that childhood mythology assigns to children. She participates, with a calm and an intensity that occasionally tip into something almost frightening in its maturity. The episodic structure, each chapter organised around an adult who drifts through Janet's orbit and then away, mirrors the way memory actually organises a summer: not as narrative arc but as a sequence of presences. The comparison to Bergman is not facile. There is something in the mother-daughter dynamic here that recalls *Autumn Sonata* (1978) without reproducing it: where Bergman's film is about the violence of retrospection, Baker's is about the subtler damage of living too close. Julianne Nicholson's Janet is warm, damaged, and intermittently oblivious to her daughter in the specific way that self-absorbed love can be oblivious, not cold but somehow not quite enough. <u>Zoe Ziegler as Lacy is an uncanny piece of casting: the watchfulness she brings is not performance but phenomenon.</u> The natural light and fixed camera recall last year's *Anatomy of a Fall* (2023) in their commitment to observational fidelity, but Baker's film is warmer, more interior, less prosecutorial. What it shares is the conviction that two women placed in the same landscape, under pressure, will reveal something irreducible about the nature of being a person among persons. <u>This is distinctive, serious women's cinema, and it moves me more than I can entirely account for.</u>

- title: "82년생 김지영"
  title_en: "Kim Ji-young, Born 1982"
  type: "film"
  creator: "Kim Do-young"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/kim_ji_young_born_1982.jpg"
  posted: "2024-12-15"
  text: |
    My wife observed that ***82년생 김지영*** tells the story of the daughter in *Like a Rolling Stone* (2024), and the lineage is exact: same generational transmission of suffering, same culture of endurance passed from mother to daughter like an heirloom nobody chose. The charge of didacticism is fair and beside the point. When a single woman's life becomes the vessel for three generations of accumulated accommodation, when simply boarding a bus is occasion for fear, when being harmed still invites condemnation, one does not need dialectical complexity. One needs testimony, and the more direct the better.

    Kim Do-young's restraint is the film's great intelligence. <u>There are no villains constructed for catharsis; there is only a system operating smoothly, its violence distributed so evenly across fathers, husbands, bosses, and well-meaning relatives that no single node is identifiable as the source.</u> Jung Yu-mi inhabits that distributed violence with a precision that avoids both martyrdom and melodrama. <u>The review-bombing campaign by male fans who could not countenance their favourite actress appearing in a feminist film is, of course, the film's argument made more forcefully than the film ever manages.</u> We need exactly this didacticism, and the more the better.

- title: "The Internet's Own Boy: The Story of Aaron Swartz"
  type: "film"
  creator: "Brian Knappenberger"
  creator_role: "dir."
  year: 2014
  eval: "liked"
  image: "/assets/images/thoughts/films/internets_own_boy.jpg"
  posted: "2024-12-09"
  text: |
    What ***The Internet's Own Boy*** documents is not, in the end, a story about one person. Aaron Swartz was fourteen when he co-authored RSS; he helped build Creative Commons, co-founded Reddit, led the campaign that killed SOPA. By twenty-six he was dead, driven there by a federal prosecution that sought thirty-five years in prison for downloading academic papers that JSTOR itself declined to pursue charges over. Knappenberger's film is straightforwardly hagiographic, and the usual criticism applies: it is advocacy, not balance. But the advocacy is correct. The Computer Fraud and Abuse Act is a law written to protect capital dressed as cybersecurity, and Carmen Ortiz's office wielded it with the particular cruelty of a state making an example. The film is at its sharpest when it lets the disproportion speak for itself: publicly funded research, locked behind publisher paywalls, and the person who tried to liberate it treated as a felon.

    Watching in 2024, what lingers is not the prosecution but the atmosphere of the early internet it briefly recovers: a period when the infrastructure was still young enough for individuals to shape it, when open access and decentralisation were not nostalgic positions but plausible futures. Tim Berners-Lee appears in the film to say, essentially, that Swartz's ideals were the internet's founding assumptions, not radical outliers. That this now sounds like elegy tells one everything about what has happened since. <u>The idealism has not merely been defeated; it has been privatised, metabolised into the language of corporate 'openness' while the actual structures of enclosure, Elsevier, Springer Nature, the platform monopolies, have only consolidated.</u> A handful of genuine revolutionaries still push open-source and open-access causes, but they operate in a landscape Aaron would barely recognise. The film is released under Creative Commons, which is the right gesture. It is also, by now, a historical document about a world that no longer exists.

- title: "دانه‌ی انجیر معابد"
  title_en: "The Seed of the Sacred Fig"
  type: "film"
  creator: "Mohammad Rasoulof"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/the_seed_of_the_sacred_fig.jpg"
  posted: "2024-12-09"
  text: |
    Rasoulof shot this film inside Iran while under sentence of imprisonment, then smuggled it out and fled the country before its Cannes premiere. That biographical fact is not separable from the film: one watches it knowing the footage of women burning their hijabs around roadside fires, the images of protesters beaten and killed on Tehran streets, the faces of young people looking directly into phone cameras as if addressing the future directly, is not reconstructed. The documentary material and the fiction share the same air. The domestic allegory is tight and efficient. Iman, the newly promoted investigating judge, becomes the regime in miniature: a man whose authority requires the submission of those closest to him, whose paranoia escalates in proportion to his family's awareness of what is happening outside their windows. The mother's acquiescence, still washing dishes and scrubbing the sink under pressure she has metabolised across a lifetime, is not weakness; it is a survival logic that the film understands even as the daughters cannot fully forgive it. The daughters grew up breathing different air, and they cannot pretend otherwise. 'The world may change, but God's law does not': the film knows that line is not a conviction but a shelter, and treats it accordingly. <u>What the protests represent in Rasoulof's framing is something close to a collective nervous system becoming conscious of itself, a dispersed grief and courage and terror moving through a population simultaneously, each individual act of defiance part of a signal that the whole network is transmitting.</u> That the embers are still there, three years on, is not a comfort exactly. It is something more durable: evidence that the signal cannot be fully suppressed. <u>I came away full of hope for humanity, which is not a sentence I write lightly.</u>

- title: "بچه‌های آسمان"
  title_en: "Children of Heaven"
  type: "film"
  creator: "Majid Majidi"
  creator_role: "dir."
  year: 1997
  eval: "liked"
  image: "/assets/images/thoughts/films/children_of_heaven.jpg"
  posted: "2024-12-01"
  text: |
    Majidi works squarely in the lineage of De Sica: a single lost object, a family too poor to replace it, and the entire weight of a social structure made visible through the gap. Ali loses his sister Zahra's shoes; the siblings share his sneakers between school shifts; Ali enters a footrace whose third prize is a new pair. The plot is so simple it sounds like a fable, and ***بچه‌های آسمان*** earns the comparison to *Bicycle Thieves* not through ambition but through the same commitment to observing poverty without diagnosing it. The family is dignified, resourceful, loving; their material constraint is a fact, never a moral occasion. Amir Farrokh Hashemian and Bahare Seddiqi, both children, perform with a naturalism that makes the word 'performance' feel wrong: what they communicate, guilt and solidarity and hope, arrives through glances and posture, not dialogue.

    The ending is the film's quiet coup. Ali, who needs third place, accidentally wins. The camera finds his blistered feet in a fishpond, goldfish circling his toes, and the image holds. <u>There is no resolution, only the persistence of two children who have not yet learned that the world is structured against them.</u> That this emerged from late-1990s Iranian cinema, alongside Kiarostami's *Taste of Cherry* and the early work of Panahi, is not incidental: a tradition of humanist realism that used its own formal restraint as a way to speak past censorship, making art that was simultaneously local and irreducibly universal. One sees, in these two children's eyes, a small, stubborn hope. It is enough.

- title: "出走的决心"
  title_en: "Like a Rolling Stone"
  type: "film"
  creator: "Yin Lichuan"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/like_a_rolling_stone.jpg"
  posted: "2024-12-01"
  text: |
    ***出走的决心*** is careful, in its first half, to show Li Hong's suffering not as spectacle but as atmosphere: the way a household can be organised entirely around one person's moods, the gravitational field of a controlling man bending every small domestic act slightly out of true. Yin Lichuan understands that the most insidious abuse is the kind that trains its victim to explain it away, to convert pain into patience, to inherit from her own mother the conviction that endurance is a form of dignity. 'I know how hard it is raising children, everyone says mothers are the greatest.' 'I raised children too, and I never complained once.' <u>These consolations are not kindness; they are the mechanism by which suffering is glorified into obligation and passed, intact, to the next generation.</u>

    Li Hong's eventual departure is not triumphant in the way that liberation narratives usually require it to be. It is frightened and uncertain and furiously necessary, and Yong Mei plays it with a restraint that refuses the audience the catharsis of uncomplicated vindication. The film trusts us to understand that the difficulty of leaving is itself part of the indictment. And Li Hong's words to Xiaoxue near the end: <u>'I hope you will not end up like your mother.' A sentence so simple and so loaded that it carries the weight of the entire film in eight syllables.</u> I hope future generations, when facing the same predicament, can say no without hesitation. And I hope future generations never have to face the same predicament. I hope every woman can live for herself. The film does not promise that this will happen. But it refuses to stop wanting it, and that refusal is its own form of political act.

- title: "Anthony Jeselnik: Bones and All"
  type: "film"
  creator: "Anthony Jeselnik"
  creator_role: "by"
  year: 2024
  eval: "liked"
  image: "/assets/images/thoughts/films/bones_and_all.jpg"
  posted: "2024-12-01"
  text: |
    That Jeselnik can still work this system in 2024 deserves recognition on its own terms. The political atmosphere around stand-up has calcified into two camps (comedians who perform transgression as a proxy for reactionary politics and comedians who have pre-emptively retreated into safety) and Jeselnik occupies neither. His one-liners remain structurally transgressive without being ideologically so: the darkness is formal, a matter of where the sentence turns, not a vehicle for anything as lazy as an opinion. The opening pregnancy joke sets the register immediately; the laxative bit is one of the tightest constructions in the set; <u>the trans joke lands precisely because the delivery goes somewhere the audience's pattern-recognition cannot anticipate, which is what Jeselnik does when the system is working.</u>

    The trouble is that the system is not always working. Twenty years in, the architecture of his one-liners (setup, misdirection, dark pivot) has become so legible that one can feel several of the twists arriving before they land, the forced quality of a mechanism whose precision has become its own kind of predictability. The Rogan material gestures toward something more personal and more interesting: Jeselnik's position within the stand-up community, the growing sense among peers that his arrogance has crossed from persona into character, the question of whether a comedian whose entire method depends on control can survive in a culture that increasingly demands vulnerability. There is something to it. <u>But the jokes themselves, especially in the current climate, remain genuinely singular, both pathetic and funny, which is harder to achieve than either quality alone, and which nobody else in American stand-up is attempting with this kind of structural commitment.</u>

- title: "The End of the Tour"
  type: "film"
  creator: "James Ponsoldt"
  creator_role: "dir."
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/films/end_of_the_tour.jpg"
  posted: "2024-11-25"
  text: |
    ***The End of the Tour*** is a film about a five-day conversation between two writers, and it is one of the best films about writing I have seen, precisely because it is not about writing at all. It is about loneliness. David Lipsky interviews David Foster Wallace during the final leg of the *Infinite Jest* book tour in 1996; they drive through the Midwest, eat junk food, visit a megachurch bookstore, and talk with the wary intimacy of two people who recognise each other's defences. Jason Segel's Wallace is a revelation: the bandana, the nervous chewing tobacco, the dogs pressed against his legs, the way intelligence and discomfort coexist in every sentence. The performance captures something I had not expected a Hollywood film to attempt, let alone achieve: the specific quality of a mind that understands its own traps and cannot stop falling into them. Wallace's anxiety about fame, about entertainment as a colonising force, about the recursive spiral of sincerity becoming performance becoming sincerity, is rendered not as intellectual posture but as lived condition. He is visibly afraid that *Infinite Jest*'s success will turn him into the thing he wrote against: a commodity of the attention economy.

    The DFW estate opposed the film, and their objection has force: to dramatise a writer who spent his career warning against the seductions of entertainment is to enact exactly the commodification he feared. The film knows this and cannot resolve it, which is, I think, part of why it works. It does not pretend to be Wallace; it offers instead the shape of two people circling each other's loneliness for five days, and the residue that remains when one of them is gone. Lipsky, played by Eisenberg with exactly the right mixture of admiration and competitive envy, is the lens through which Wallace's warmth and damage arrive, and the framing device, Lipsky learning of Wallace's suicide in 2008 and returning to the tapes, gives the conversation a weight it would not otherwise carry. <u>The title phrase, *of course you end up becoming yourself*, lands as both comfort and verdict: identity is not a performance you can sustain or a trap you can escape; it is a destination you reach involuntarily, and by then it is too late to be anyone else.</u>

- title: "Incendies"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2010
  eval: "liked"
  image: "/assets/images/thoughts/films/incendies.jpg"
  posted: "2024-11-11"
  text: |
    The first half of ***Incendies***, through to the NIHAD chapter, is the best thing Villeneuve has made. The chapter-based structure gives the parallel timelines a classical severity; Nawal's journey through sectarian violence, her imprisonment, her defiance under torture, is filmed with a realism that earns its brutality. Lubna Azabal's performance is extraordinary: she carries the full weight of a woman caught in the machinery of religious war, helpless but unbroken, and the film's depiction of that war, Christians and Muslims locked in cycles of reciprocal atrocity, is unflinching without being pornographic. There is a genuine political intelligence at work in these sequences, an understanding that sectarian violence is self-consuming, that the categories of perpetrator and victim dissolve under enough historical pressure.

    Then the second half arrives and the realism shatters. <u>The revelation that Nihad is simultaneously brother, torturer, rapist, and father is a piece of Oedipal machinery so engineered that it retroactively converts everything that preceded it from political testimony into plot device.</u> After one has seen the hypocrisy of religious war, the courage of one woman persisting through it, how does one accept the perfect coincidence of a reunion that belongs to a different, far less serious film? The theatrical source, Mouawad's play, may justify the classical-tragedy architecture, but classical tragedy earns its revelations through inevitability; Villeneuve earns his through contrivance. This is, I suspect, a pattern that predates *Dune*: the willingness to sacrifice emotional truth for narrative architecture, to plant foreshadowing so deliberate it announces itself as foreshadowing. *Polytechnique*, *Prisoners*, *Enemy*, all display some version of this tendency: a filmmaker who builds beautiful structures and then furnishes them with mechanisms rather than people. Incendies is the version where the mechanism is most visible, because the human material it displaces is so strong.

- title: "Arizona Dream"
  type: "film"
  creator: "Emir Kusturica"
  creator_role: "dir."
  year: 1993
  eval: "meh..."
  image: "/assets/images/thoughts/films/arizona_dream.jpg"
  posted: "2024-11-10"
  text: |
    The most charitable reading of ***Arizona Dream*** is that it was always meant to be a film about failure, about the American Dream as a particular variety of beautiful, inert paralysis. <u>If so, Kusturica has succeeded almost too completely: the film itself is paralysed.</u> Every character is left at precisely the point where their story might ignite, and the flying fish and Faye Dunaway's flying machine hover over the whole enterprise as symbols that never quite become meaning, markers of an absent thought rather than a present one. The performances have a uniformly somnambulist quality that *Underground* (1995) never had, not for a single frame; where Kusturica's Balkan films drew energy from collective derangement, from the carnivalesque excess of a people living through history at full volume, Arizona Dream can muster only a private, inward listlessness. <u>One keeps waiting for the film to commit to something, and the waiting is itself the film.</u> Kusturica's great subject has always been the dream, collective or personal, as a force that is simultaneously life-giving and catastrophic; transplanted to American soil, that force drains away to little more than an offhand voyeurism.

- title: "Straume"
  title_en: "Flow"
  type: "film"
  creator: "Gints Zilbalodis"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/straume.jpg"
  posted: "2024-11-08"
  text: |
    ***Straume*** is the animated film *The Wild Robot* (2024) should have been. Made on a tiny budget using open-source software, by a Latvian director and a small team, it achieves visual effects: water simulation, light refraction, the quality of late-afternoon gold through leaves, that rival anything a major studio has produced. But technique is the least of it. What Zilbalodis understands, and what distinguishes the film from almost all its contemporaries, is that the camera is an emotional instrument first. <u>The world is flooded; humans are gone; the animals that remain must navigate structures built for a species that no longer exists.</u> The allegory is legible without ever being laboured.

    The black cat at the centre is, categorically, a cat: solitary, suspicious, reluctant to accept help, constitutionally averse to trust. The film's entire arc is the slow, wordless erosion of that reluctance, and it earns every millimetre of it. The two herons' standoff held me completely still; the capybara's impassive serenity functioned as a kind of running philosophical counterpoint. Every animal moves with a specificity of weight and hesitation that communicates interiority without anthropomorphism, which is an extraordinary technical and imaginative feat.

    The score drifts and accumulates, textural rather than manipulative, and the film is all the more affecting for it. Flow won the Oscar for Best Animated Feature over The Wild Robot, and the outcome was correct: one is a film that knows exactly what it is and executes it with mastery, and the other is a film that gestures at depth without quite reaching it. Flow knows what it is. <u>It is a film about learning to let go, and the final image lands like waking from a dream.</u>

- title: "Ghost World"
  type: "film"
  creator: "Terry Zwigoff"
  creator_role: "dir."
  year: 2001
  eval: "meh..."
  image: "/assets/images/thoughts/films/ghost_world.jpg"
  posted: "2024-11-03"
  text: |
    The script is less clever than its reputation suggests, and the Seymour subplot, in which a prickly eighteen-year-old girl becomes the singular salvation of a middle-aged record obsessive, carries an uncomfortable freight that the film's ironic framing never fully neutralises. Zwigoff has spoken openly about identifying with Seymour; that identification shows, and it softens a gaze that the material arguably demands be kept cold. Scarlett Johansson's Rebecca is underwritten to the point of near-irrelevance, which would be bearable if the writing around her were sharper, but <u>the script mistakes Enid's contempt for the world as a sufficient dramatic engine and keeps mistaking attitude for interiority.</u> <u>Thora Birch does something real with the role; the film around her does rather less.</u>

- title: "หลานม่า"
  title_en: "How to Make Millions Before Grandma Dies"
  type: "film"
  creator: "Pat Boonnitipat"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/how_to_make_millions_before_grandma_dies.jpg"
  posted: "2024-10-28"
  text: |
    What Boonnitipat has achieved here is a precisely calibrated sentimentality: the film knows exactly how much emotion to release at any given moment and withholds the rest with impressive discipline. The non-linear structure does structural work rather than decorative work, each temporal shift landing just early enough to reframe what came before rather than merely to surprise. <u>M's arc, from a young man calculating an inheritance to a grandson who has, almost without noticing, become someone who actually shows up, is handled without a single line of explanatory dialogue; it accrues through gesture and proximity and the quiet arithmetic of small acts.</u>

    The film understands that in East Asian family structures, filial obligation and genuine love are not opposites, and that the machinery of inheritance can corrupt both without entirely destroying either. <u>The grandmother is a specific woman, not a symbol, which is the film's most important achievement: one leaves the cinema having spent time with a person.</u> This is the kind of family film all East Asian directors should be studying, not for the formula, but for the rigour with which it resists formula while appearing to follow it.

- title: "The Wild Robot"
  type: "film"
  creator: "Chris Sanders"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/films/the_wild_robot.jpg"
  posted: "2024-10-27"
  text: |
    ***The Wild Robot*** arrives trailing superlatives and a production design that draws, not insincerely, from the watercolour softness of classical illustration. The animation is beautiful; the intention is earnest; the emotional architecture is the problem. <u>Sanders has not yet worked out how to earn the feelings he wants the audience to have, so he deploys music, morale, and ideology at escalating volume and trusts that the accumulation will do the work.</u> Occasionally it does, after a fashion. <u>But one is always aware of the mechanism, always conscious of being worked on rather than moved.</u> As a children's film it is adequate; as a film that aspires to the condition of the best animation, which thinks and feels simultaneously, it is awkward.

- title: "Secrets & Lies"
  type: "film"
  creator: "Mike Leigh"
  creator_role: "dir."
  year: 1996
  eval: "loved"
  image: "/assets/images/thoughts/films/secrets_lies.jpg"
  posted: "2024-10-21"
  text: |
    Mike Leigh's improvisational method has always been a way of arriving at emotional truths that scripted cinema cannot reach, and ***Secrets & Lies*** is its supreme vindication. The café scene, an unbroken eight-minute two-shot of Cynthia meeting Hortense for the first time, contains more genuine human surprise than most films manage in their entirety. Cynthia does not know she is about to meet her biological daughter; Hortense does not know what her birth mother will be like; Leigh, characteristically, let Brenda Blethyn discover the reveal in real time during rehearsal, and the emotional archaeology of that discovery is preserved in every frame. The shock, the denial, the cascading recollection, the shame: Blethyn performs these not as sequential beats but as a single, sustained detonation. It is one of the great screen performances.

    But the film's scope extends far beyond the reunion. Leigh constructs an entire ecosystem of working-class and lower-middle-class London: Cynthia's caustic relationship with her other daughter Roxanne, Maurice's quiet suppression of his own family's grief, the barbecue sequence in which every accumulated lie in the family finally ruptures under the pressure of proximity. <u>Blethyn's breakdown at the barbecue, the hysterical confession that opens with laughter and ends somewhere beyond tears, deserves to be inscribed in the history of screen acting.</u> What Leigh understands, and what distinguishes his work from the merely naturalistic, is that families are not collections of individuals but systems, and the lies that hold a system together are structural, not incidental. Hortense's arrival does not create the dysfunction; it merely makes the existing architecture unsustainable. Marianne Jean-Baptiste's quiet dignity provides the counterweight the film needs: she watches, she listens, she does not judge, and her restraint makes Blethyn's disintegration all the more devastating by contrast. A film about the cost of silence and the terrifying relief of its end.

- title: "La Chimera"
  type: "film"
  creator: "Alice Rohrwacher"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/la_chimera.jpg"
  posted: "2024-10-21"
  text: |
    Alice Rohrwacher has been making the same film for a decade, and ***La Chimera*** is the version where every thread finally coheres. Arthur, Josh O'Connor in a crumpled linen suit and an expression of permanent, bewildered grief, is an English archaeologist turned *tombarolo* who can feel the dead beneath the soil. He dowses for Etruscan tombs in 1980s Tuscany, not for profit but because the underground is the only place that brings him close to Beniamina, the lover he has lost. The Orpheus parallel is explicit and entirely earned: Arthur descends, again and again, into the earth, and each time he surfaces with artefacts instead of the person he came for. Rohrwacher shoots on 16mm with a grain so tactile one can almost feel the emulsion; she mixes formats, shifts aspect ratios, breaks into direct address, and none of it feels like affectation. The handmade quality is the point. This is a film about what is lost when objects are extracted from context, and its own formal texture insists on context at every level.

    The political dimension is what lifts it above myth. The *tombaroli* are working-class men who dig with their hands and sell to middlemen who sell to dealers who sell to museums; the value accrues upward, the labour and the risk stay at the bottom, and the Etruscans who made the objects with devotional care are reduced to a supply chain. <u>Grave-robbing as capitalist extraction is not a metaphor Rohrwacher imposes; it is the literal mechanics of the antiquities trade, and the film's achievement is to make one feel the obscenity of it without ever moralising.</u> *Happy as Lazzaro* (2018) attempted something similar, the persistence of feudal class structures within modernity, but its fable logic occasionally floated free of material consequence. Here the myth is grounded in sweat and dialect and the specific weight of terracotta pulled from clay. O'Connor is magnificent: he plays Arthur as a man who has already crossed the threshold and is only pretending, badly, to still be among the living. The final descent, the choice not to return, feels less like tragedy than like the only honest act the film permits. Rohrwacher understands that the chimera of the title is not the treasure but the belief that what has been buried can be retrieved intact.

- title: "白日之下"
  title_en: "In Broad Daylight"
  type: "film"
  creator: "Lawrence Kan"
  creator_role: "dir."
  year: 2023
  eval: "disliked"
  image: "/assets/images/thoughts/films/in_broad_daylight.jpg"
  posted: "2024-10-15"
  text: |
    The subject matter is real and it is devastating: the Cambridge Nursing Home scandal, the sexual abuse of intellectually disabled residents in Hong Kong's private care system, the institutional failures that let it continue. ***白日之下*** has the raw material for a furious, rigorous film about investigative journalism under pressure. What Lawrence Kan makes instead is a film where the investigation happens almost entirely offscreen. The journalist goes undercover; an hour of narrative time passes; the editor declares there is no evidence. Then a single bathing scene, lingered over for what feels like five minutes, and suddenly the story is publishable. The entire procedural middle, the grind of evidence-gathering, the editorial negotiation, the legal exposure, is simply absent. One does not need to have watched *Spotlight* (2015) or *All the President's Men* (1976) to understand that the journalism film's fundamental obligation is to make the work visible. Kan skips the work and keeps the emotion.

    <u>And the emotion is unbearable, not because it is moving but because it is cheap.</u> The sentimental sequences are so overwrought they approach self-parody: swelling music, slow motion, the full arsenal of manipulative technique deployed without irony or restraint. The bathing scene itself raises an uncomfortable question: is filming elderly nudity at this length, for this purpose, exposure of institutional abuse or reproduction of it? The film has not considered the question. Jennifer Yu's performance is committed, and the Hong Kong Film Awards rewarded the subject rather than the craft, which is a familiar pattern. If this is what passes for serious investigative cinema in Hong Kong, the diagnosis is worse than the disease it claims to document.

- title: "Midnight Run"
  type: "film"
  creator: "Martin Brest"
  creator_role: "dir."
  year: 1988
  eval: "loved"
  image: "/assets/images/thoughts/films/midnight_run.jpg"
  posted: "2024-10-12"
  text: |
    George Gallo's screenplay for ***Midnight Run*** is the best action-comedy script I have encountered, and I say this as someone who generally finds the genre disposable. The premise is formula: bounty hunter Jack Walsh must transport bail-jumping accountant Jonathan Mardukas cross-country from New York to Los Angeles while the FBI, a rival bounty hunter, and the mob give chase. What is not formula is the dialogue. De Niro and Grodin talk at each other for two hours with the verbal precision of a chamber play, and the comedy emerges not from set-pieces but from the slow, needle-sharp erosion of Walsh's defences. Grodin's deadpan is devastating: he asks about the failed marriage, the ethics of the job, the cigarette habit, with the serene persistence of a therapist who happens to be handcuffed to his patient. De Niro, in what remains his finest comedic performance, lets the irritation build until it becomes indistinguishable from affection.

    <u>I laughed from beginning to end, which almost never happens.</u> The film's trick is that it earns its warmth through friction rather than sentiment: these two men do not bond over shared vulnerability or a contrived crisis of conscience; they bond because they are stuck together long enough for the performance of hostility to become unsustainable. Yaphet Kotto as the perpetually humiliated FBI agent and John Ashton as the hapless rival bounty hunter are pitch-perfect supporting turns in a script that gives every character a distinct comic voice. The final scene is one of the quietest, most perfectly judged endings in American commercial cinema: no speech, no embrace, just a gesture that says everything the preceding two hours refused to say aloud. Good actors, good script, from start to finish.

- title: "年少日記"
  title_en: "Time Still Turns the Pages"
  type: "film"
  creator: "Cheuk Yik-him"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/time_still_turns_the_pages.jpg"
  posted: "2024-10-07"
  text: |
    ***年少日記*** is a rare film in Chinese-language cinema: one that looks directly at the violence of East Asian academic pressure and refuses to blink. The dual-timeline structure, a secondary-school teacher discovering a student's suicide note, his own childhood flooding back, is handled with a formal restraint that belies how devastating the material is. The ten-year-old Yau-kit practises Schumann's 'Träumerei' while his father beats him for inadequate grades; the melody threads through the film as the last surviving connection between two brothers, one of whom did not make it out of childhood. The revelation of which brother the adult protagonist actually is lands with the force of something one already suspected but could not bear to confirm. The father is not a monster in the cinematic sense; he is a successful professional who believes he is building character, which is worse, because it is ordinary.

    <u>A child whose only modes of communication with the world are pain, despair, and false hope: how many East Asian families carry this story as quiet, corrosive fact?</u> The film knows the answer and does not pretend otherwise. The mother's silence is not passivity but architecture: the household is a structure, and her inaction is load-bearing. What Cheuk Yik-him achieves in a debut feature is something most established directors never attempt: the interior life of a child who has concluded, with the terrifying logic available to children, that he is the problem. 'Träumerei' recurs not as sentiment but as evidence, the trace of a boy who existed, who was capable of beauty, and who was told in every language except words that this was not enough. I was in tears by the end. Not because the film manipulates; it does not. Because it remembers.

- title: "Billy & Molly: An Otter Love Story"
  type: "film"
  creator: "Charlie Hamilton James"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/films/billy_molly.jpg"
  posted: "2024-10-05"
  text: |
    The comparison to *My Octopus Teacher* (2020) is not incidental; it is structural. Both films follow the same arc: a man discovers a wild animal, projects emotional significance onto the encounter, narrates the relationship as mutual transformation, and expects the audience to find this profound rather than presumptuous. ***Billy & Molly*** substitutes a Shetland otter for a South African octopus and swaps Craig Foster's midlife spiritual crisis for Billy Mail's quieter domestic one, but the underlying conceit is identical. The animal is adorable. The scenery is beautiful. The human protagonist is convinced of his own importance in another species' life, and the film never pauses to interrogate whether that conviction is earned or merely convenient.

    The otter is very cute; one concedes this freely. But the lengths Billy goes to in habituating Molly, the grooming of a wild animal into dependency framed as love, the attachment presented as reciprocal when it is almost certainly one-directional, produce a persistent unease the film has no interest in addressing. <u>The dialogue feels off, the attachment feels off, everything feels off in the specific way that self-congratulatory nature documentaries feel off: the animal is real, the emotion projected onto it is not, and the gap between the two is where the film's sentimentality lives.</u> Seventy-seven minutes, and one leaves having learned nothing about otters and rather too much about the human need to be loved back by things that cannot consent to the arrangement.

- title: "遥望南方的童年"
  title_en: "The Rising Star Kindergarten"
  type: "film"
  creator: "Yi Han"
  creator_role: "dir."
  year: 2007
  eval: "disliked"
  image: "/assets/images/thoughts/films/rising_star_kindergarten.jpg"
  posted: "2024-09-30"
  text: |
    Yi Han's film is about left-behind children in rural Jiangxi, a subject that deserves a filmmaker capable of interrogating the political-economic system that produces sixty million of them. What it gets instead is a self-congratulatory parable about one good man's doomed attempt to run a kindergarten, shot on consumer DV with non-professional actors, in which the suffering of children is aestheticised into moral atmosphere and the structural causes of their abandonment (the hukou system, rural disinvestment, the entire architecture of uneven development that funnels labour southward to the factories) are reduced to scenery. The authentic Gan dialect and the real village locations give the film a documentary texture that its narrative does not earn. Realism of surface is not the same as realism of analysis, and ***遥望南方的童年*** has the former in abundance and the latter not at all.

    The teacher-saviour framing is the central problem. Yi Mingtang pours his resources into his makeshift school; his wife sacrifices; the young teacher Li Xiang learns and grows; the state arrives only to shut the kindergarten down for regulatory non-compliance. <u>The structure invites the audience to admire the individual who tried rather than to indict the system that made his failure inevitable, which is precisely how poverty cinema neutralises its own subject.</u> The state appears as the force that closes the door but never as the entity that built the house with no exits. The parents who migrated south are absent presences, longed for but never examined; their desperation flattened into a sentimental absence rather than understood as a consequence of policy. The final image, the teacher leading the children up a hill to gaze southward toward their parents, is so nakedly manipulative that it crossed the threshold from pathos into comedy. <u>When a film about genuine suffering produces an involuntary laugh in its closing shot, something has gone fundamentally wrong with the distance between the filmmaker and his material.</u> That it is almost universally beloved tells one everything about the appetite for self-congratulatory compassion: a film that lets the audience feel virtuous for having watched it, without requiring them to think about why sixty million children were abandoned in the first place.

- title: "Alien: Romulus"
  type: "film"
  creator: "Fede Álvarez"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/alien_romulus.jpg"
  posted: "2024-08-26"
  text: |
    The franchise has always been Lovecraftian before it was anything else. Scott's 1979 film understood that the xenomorph is not an antagonist but a fact: a biological system operating with total indifference to human meaning, produced by a universe that did not consult us and does not care. What every sequel since has struggled with, and what most have failed at, is preserving that cosmic register while also delivering the genre satisfactions that justify a studio budget. Álvarez comes closer than anyone since Cameron, and he does it by returning to the franchise's other foundational insight: that the real horror is not the creature but the institution that keeps feeding people to it.

    Rain and her companions are indentured miners on a sunless colony world, working contracts that Weyland-Yutani extends unilaterally, with no legal recourse and no exit. Their entire plan, boarding a derelict space station swarming with organisms they cannot comprehend, is driven not by curiosity or military orders but by poverty. They need cryostasis equipment because they literally cannot afford freedom any other way. <u>The franchise began with blue-collar workers dying because a corporation valued a specimen over their lives; forty-five years later, Álvarez makes a film where blue-collar workers die because a corporation has made escape from labour so impossible that a derelict full of xenomorphs looks like the better option.</u> The structural critique has not changed. The conditions have worsened.

    The Z-01 compound, Weyland-Yutani's refined version of the Prometheus black goo, is the film's most potent thematic device. The corporation's ambition, genetically enhanced humans who can thrive in space, sounds almost benign in the abstract, the language of progress and adaptation. What it produces in practice is the Offspring: a human-xenomorph hybrid born of Kay's mutated pregnancy, an abomination that kills its own mother immediately after birth. Every attempt to harness cosmic forces for corporate profit ends in the same place: a body destroyed and a boardroom none the wiser. The reproductive horror here is not incidental to the Alien franchise; it is the franchise. Giger's original designs were explicitly about sexual violation, the facehugger as forced impregnation, the chestburster as fatal birth. What Álvarez adds is the layer of corporate mediation: Kay's body is violated not directly by the xenomorph but by a compound manufactured by the company, administered by an android whose loyalty has been reprogrammed from 'protect Rain' to 'serve Weyland-Yutani directives'. The violation is institutional before it is biological.

    The digital resurrection of Ian Holm as the android Rook is the film's most uncomfortable moment, and not in the way Álvarez intended. A dead actor's likeness, extracted and reanimated for corporate purposes, in a film whose explicit theme is the corporate extraction and reanimation of biological material for profit. <u>The studio became Weyland-Yutani without noticing, which is, if nothing else, a vindication of the franchise's thesis that the corporation is the organism that cannot recognise itself as monstrous.</u> The zero-gravity sequence, in which Rain disables the station's gravity to shoot the xenomorphs without their acid blood breaching the hull, is the best set piece the franchise has produced since the power-loader fight in *Aliens*, and it works because it is simultaneously a tactical solution and a visual metaphor: bodies suspended in darkness, weightless, stripped of every orientation except survival. The production design keeps faith with Giger's biomechanical aesthetic while the Romulus and Remus modules split the visual grammar neatly between *Alien*'s claustrophobic industrialism and *Aliens*' militarised functionality. For those of us for whom cosmic horror is not a genre preference but a disposition, the conviction that the universe is not hostile so much as comprehensively indifferent, the relief of watching a blockbuster that actually believes in it is considerable.

- title: "Inside Out 2"
  type: "film"
  creator: "Kelsey Mann"
  creator_role: "dir."
  year: 2024
  eval: "meh..."
  image: "/assets/images/thoughts/films/inside_out_2.jpg"
  posted: "2024-08-03"
  text: |
    The original *Inside Out* (2015) worked because its central metaphor, emotions as agents with competing interests inside a child's mind, was both conceptually precise and emotionally devastating. ***Inside Out 2*** extends the metaphor into puberty by adding Anxiety, Envy, Ennui, and Embarrassment to the console, and the expansion is more mechanical than inspired. Each new emotion arrives as a character type rather than a psychological insight: Anxiety is neurotic and fast-talking, Ennui reclines on a couch, Embarrassment hides in his hoodie. The allegorical machinery, which in the first film felt like discovery, here feels like product design. Riley's adolescent crisis follows a trajectory that is, by Pixar's own standards, formulaic: the old emotions are sidelined, the new ones overcorrect, equilibrium is restored through a lesson about complexity.

    And yet the formula is not dishonest. An adolescence that uses happiness as its default setting, punctuated by hiccups of anxiety and self-doubt, is clichéd precisely because it is accurate: most children do experience puberty as a series of interruptions to a baseline they assumed was permanent. <u>The panic attack sequence is the film's one moment of genuine formal ambition, and it lands hard: the screen narrows, the colour drains, the internal voices collapse into static, and for thirty seconds the film captures something that most adult dramas about mental health fail to convey.</u> That moment is relatable in a way that does not feel earned by the surrounding film so much as smuggled into it. One leaves with the sense of a studio that knows exactly what it is doing and no longer needs to risk anything to do it.

- title: "Kinds of Kindness"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/kinds_of_kindness.jpg"
  posted: "2024-08-03"
  text: |
    To understand what ***Kinds of Kindness*** is doing, one needs to recall that *Poor Things* (2023) was made with Tony McNamara, not Efthimis Filippou: the warmth, the narrative momentum, the accessibility, those were collaborative inflections. Lanthimos with Filippou is colder, stranger, and more interested in power as a structural feature of intimacy than as something to be escaped or redeemed. The three-part structure here is not an anthology in the conventional sense; it is a single argument made three times from different angles, each segment a variation on the theme of voluntary submission, the cult as the universal condition of belonging.

    What strikes one most is how plausible it all is. The cult in Ari Aster's *Midsommar* (2019) requires Sweden, rituals, a trip; <u>Lanthimos's cult is just the social fabric, slightly skewed, operating through the same mechanisms of approval and punishment that govern ordinary life.</u> <u>The film's deadpan register is not affectlessness: it is the affectlessness of people who have metabolised their subjugation so thoroughly they can no longer feel the edges of it.</u> Jesse Plemons across all three segments is extraordinary in precisely this way, each version of compliance subtly distinct.

    The critical consensus that Kinds of Kindness is Lanthimos on autopilot misreads what autopilot means here. His tics are not laziness; they are a consistent phenomenology of coercion, applied with greater clarity and precision than anything since *The Lobster* (2015). This is a film that trusts its audience to sit inside discomfort without being handed a way out, and the trust is earned. How could one not love it.

- title: "香火"
  title_en: "Incense"
  type: "film"
  creator: "Ning Hao"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/incense.jpg"
  posted: "2024-07-14"
  text: |
    Ning Hao's debut is a masterclass in small-scale absurdism. A monk's temple is crumbling, its Buddha statue damaged beyond repair; he travels to the city to raise money for restoration and is robbed, scammed, cheated, and deceived at every turn by people no less desperate than himself. ***香火*** runs ninety-seven minutes and wastes nothing. The camera follows the monk through a landscape of petty swindles with a documentary patience that owes more to Jia Zhangke's *Xiao Wu* (1997) than to any tradition of religious cinema, and the effect is not satirical distance but a grinding intimacy with a world where everyone steals from the person one rung below them.

    <u>Little people rob, steal, and swindle from each other; above them, the officials sit smoking, drinking, and playing cards.</u> This is not subtext; it is the film's structural principle. The monk's faith is sincere but immaterial: what matters is the money, and the money flows upward. The temple crumbles not because the state is hostile to religion but because nobody with power sees value in preserving it, and the distinction between active destruction and bureaucratic indifference is the space in which the film operates. Ning Hao would later become one of China's most commercially successful directors, but this first work has a rawness and a fury that his later comedies, however entertaining, never recovered. It is the film of a young man who has looked at the machinery of Chinese capitalism from the bottom and decided to describe exactly what he sees. The incense burns. The prayer goes unanswered. The bulldozer arrives on schedule.

- title: "偶然と想像"
  title_en: "Wheel of Fortune and Fantasy"
  type: "film"
  creator: "Ryūsuke Hamaguchi"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/films/wheel_of_fortune_and_fantasy.jpg"
  posted: "2024-07-11"
  text: |
    Hamaguchi's triptych works the same seam as *Drive My Car* (2021): the gap between what is rehearsed and what is felt, between the script people carry into a room and the thing that actually happens when they open their mouths. The first story, a love triangle conducted almost entirely in a taxi and a stairwell, is elegant and slightly airless. The second, a student's botched seduction of a professor via his own novel, is the most overtly literary and the most uneven; its interest in the erotic charge of language is real but its resolution feels contrived. ***偶然と想像*** builds, and the building is the structure.

    Because the third story is extraordinary. Two women meet at a school reunion, recognise each other as old friends, and slowly discover that neither is who the other thinks she is. The mistaken identity could be farce; Hamaguchi makes it the occasion for something closer to grace. <u>The conversation that follows, in which two strangers decide to inhabit the roles they have been assigned and speak truths they could not have spoken as themselves, is Hamaguchi's purest expression of what fiction can do: create a space where honesty becomes structurally possible.</u> The emotion arrives not despite the artifice but through it, which is a paradox the film does not resolve so much as simply demonstrate. One leaves the cinema carrying the third story like a small, warm object, turning it over.

- title: "Tschick"
  title_en: "Goodbye Berlin"
  type: "film"
  creator: "Fatih Akin"
  creator_role: "dir."
  year: 2016
  eval: "liked"
  image: "/assets/images/thoughts/films/tschick.jpg"
  posted: "2024-07-01"
  text: |
    ***Tschick*** performs a neat structural trick: it presents itself as a Bildungsroman, reveals itself to be a road movie, and then circles back to confirm that it was a Bildungsroman all along, the road being the mechanism through which the growing-up happens. Maik, neglected by alcoholic parents, friendless and fourteen, is recruited by Tschick, a Russian-German outsider with a stolen Lada and no particular destination, into a summer journey across the Brandenburg countryside. Wolfgang Herrndorf's source novel is beloved in Germany for good reason: it captures the specific texture of adolescent friendship, the way two lonely people can build, in the space of a few weeks, a private world with its own logic and vocabulary.

    Fatih Akin's adaptation is lighter than his usual register, and the lightness suits the material. The encounters along the way, a homeless girl scavenging at a rubbish dump, a family of Serbian immigrants, an eccentric old man, are sketched quickly and warmly without tipping into picaresque formula. What gives the film its emotional centre is the unspoken: Tschick's sexuality, which the film handles with a delicacy that avoids both the closet drama and the coming-out narrative; Maik's dawning recognition that his home life is not normal; the quiet understanding that this summer cannot last and that the Lada will eventually run out of road. It is not a film that reinvents its genre, but it inhabits the genre with enough warmth and specificity that the familiarity becomes a virtue. One leaves it fond of both boys and faintly envious of Maik's hair.

- title: "隐入尘烟"
  title_en: "Return to Dust"
  type: "film"
  creator: "Li Ruijun"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/return_to_dust.jpg"
  posted: "2024-06-30"
  text: |
    Li Ruijun shoots with the patience of someone who trusts that the world contains enough meaning if one waits long enough to see it. The cinematography of ***Return to Dust*** has the quality the original Chinese title gestures toward: things half-hidden, half-absorbed into their surroundings, a light that does not beautify so much as simply attend. Guiying and Youtie are filmed this way too, not as subjects to be pitied or celebrated but as people living inside the same indifferent landscape that will eventually take them back.

    The film's politics are inscribed in its form. China's rural dispossession is not declaimed; it is demonstrated through the texture of what Guiying and Youtie must do each day to remain in existence. Their lives contain a specific kind of dignity that is invisible to the city logic surrounding them, a dignity the film refuses to explain or defend, simply records. <u>The fact that the film was pulled from Chinese platforms makes this refusal feel even more pointed: the censors understood what a patient, humane gaze could do to their preferred narrative of rural modernisation.</u>

    What stays is the love between them, clumsy and tenacious and entirely real. <u>It is not the love of people who have chosen each other from a position of abundance; it is the love of people who have found each other at the edge of being discarded, and made something inside that edge.</u> Their lives are not necessarily less meaningful than city people's. But they are the ones who are sacrificed, and the film knows it, and does not look away.

- title: "우리들"
  title_en: "The World of Us"
  type: "film"
  creator: "Yoon Ga-eun"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/films/world_of_us.jpg"
  posted: "2024-06-16"
  text: |
    Yoon Ga-eun's debut films entirely at a child's eye level, and the precision of that commitment is what makes ***우리들*** devastating. Sun is quiet, introverted, routinely excluded by her classmates with the casual efficiency that children reserve for those who do not fit. During summer break she befriends Jia, a transfer student, and for a few weeks the world reconfigures: they share secrets, invent games, build the private architecture that intense childhood friendships produce. Then school resumes, and Jia is absorbed into the popular group, the same girls who bullied Sun, and drops her. The betrayal is not dramatised; it simply happens, with the observational restraint of Koreeda at his best. There are no villains. Jia's defection is driven by her own precarious social and economic position: she cannot afford solidarity with the outcast.

    <u>The question the film asks, with a quietness that makes the asking almost unbearable, is the one Sun asks herself: when do we play, then?</u> The 왕따 phenomenon, the systematic exclusion that structures Korean schoolyard hierarchies, is not presented as aberration but as social fact: cruelty here is not innate but systemic, reproduced through peer pressure, class stratification, and the absence of adult structures capable of seeing it. Yoon never condescends to her child actors or to her audience. The camera stays low, the compositions are patient, and the emotional register is that of a child processing a wound she does not yet have the vocabulary to name. One leaves the film remembering every friendship that ended this way, and knowing that the silence afterward was the worst part.

- title: "香蕉天堂"
  title_en: "Banana Paradise"
  type: "film"
  creator: "Wang Tung"
  creator_role: "dir."
  year: 1989
  eval: "disliked"
  image: "/assets/images/thoughts/films/banana_paradise.jpg"
  posted: "2024-06-10"
  text: |
    Does anyone truly believe that a man who has been selfish and petty and small his entire life would suddenly find himself, and find clarity, after encountering a single rape narrative? The film wants to use identity fragmentation and the Mainlander experience in Taiwan as its critical frame, and those are real subjects. <u>But underneath the framework sits a story about a backward individual, lazy and incapable and constitutionally unwilling to learn, who simply rots as the times move past him, and whose rot the film treats as tragedy rather than judgement.</u>

- title: "悪は存在しない"
  title_en: "Evil Does Not Exist"
  type: "film"
  creator: "Ryusuke Hamaguchi"
  creator_role: "dir."
  year: 2023
  eval: "meh..."
  image: "/assets/images/thoughts/films/evil_does_not_exist.jpg"
  posted: "2024-05-26"
  text: |
    The glamping meeting scene is the film's centre of gravity, and the conversations in the car are almost everything else worth holding onto. Hamaguchi stages the town hall with his characteristic patience, the back-and-forth between corporate representatives and village residents building something dialectical, neither side simply right, the 'evil' of the title already complicating itself before it has been named. Then the film moves toward its conclusion and one begins to sense that Hamaguchi is circling something he cannot quite reach.

    The ending arrives as violence and then as black screen, and <u>the interpretive latitude it offers feels less like deliberate ambiguity than unresolved intention.</u> If *Drive My Car* (2021) worked as fully as it did, one suspects now that this had something to do with Murakami's architecture holding the material in shape: the plot mechanics, the theatrical readings, the emotional throughline, all provided by source material that Hamaguchi was free to inhabit and extend. <u>Left to his own structural instincts, the pieces here do not assemble.</u> One finishes the film with the uncomfortable feeling that the director felt this too.

- title: "밀양"
  title_en: "Secret Sunshine"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/secret_sunshine.jpg"
  posted: "2024-05-06"
  text: |
    Shin-ae moves to Miryang, her dead husband's hometown, with her young son, seeking the kind of quiet restart that grief sometimes promises and never delivers. When the son is kidnapped and murdered, the film could have become a revenge narrative or a courtroom drama; Lee Chang-dong makes it neither. Shin-ae converts to Christianity. The church community absorbs her with the warm, suffocating efficiency of an institution that has a script for suffering. She finds consolation, briefly, in the structure of faith, and then visits her son's killer in prison to offer forgiveness, the act the church has been preparing her for, only to discover that the killer has already found God and forgiven himself. <u>The theft is total: he has taken her son, and now he has taken the one moral act she had left.</u> Jeon Do-yeon's Cannes-winning performance captures the unravelling that follows not as spectacle but as erosion, a woman losing purchase on the surface of her own life one handhold at a time.

    The comparison with Lee's later *Poetry* (2010) is instructive. Both films centre on women confronting moral weight that should be unbearable: Shin-ae as victim, Mija as the grandmother of a perpetrator. ***밀양*** asks whether faith can metabolise suffering; *Poetry* asks whether art can. Both arrive at the same scepticism, but the routes diverge: Secret Sunshine dramatises the failure of forgiveness as institutional claim, while Poetry dramatises the cost of empathy when complicity is structural. Song Kang-ho's Jong-chan, the mechanic who orbits Shin-ae with a quiet, secular tenderness the film never sentimentalises, provides the counterpoint the church cannot: care without theology, presence without programme. The title means 'secret sunshine', and Lee leaves it ambiguous whether the grace it names exists anywhere outside the word itself.

- title: "Ripley"
  type: "film"
  creator: "Steven Zaillian"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/ripley.jpg"
  posted: "2024-05-06"
  text: |
    Zaillian shoots Italy in black and white and the decision is not nostalgia but ontology: this is a world that exists outside time, sun-bleached and ancient and utterly indifferent to Tom ***Ripley***'s particular pathology. Robert Elswit's cinematography drains the dolce vita of its warmth and leaves something cooler and more dangerous, the Mediterranean reduced to a stage for slow, methodical crime. Every frame is composed with the kind of patience that prestige television usually only claims; Zaillian lets scenes breathe well past the point where another director would cut, and the stillness accumulates into something close to dread.

    <u>Andrew Scott makes Ripley a void rather than a chameleon.</u> Where previous portrayals, Alain Delon's devastating inscrutability, Matt Damon's studied charm, leaned into the seductive surface, Scott gives us a man for whom affect is a second language, laboriously conjugated. <u>The helplessness beneath the performance is the revelation: Ripley does not enjoy what he does; he does it because there is no other version of himself available to him.</u> The adaptation's fidelity to Highsmith's moral coldness is total, and that coldness, after eight episodes, settles into one like a change in body temperature. One of the finest things made for any screen in 2024.

- title: "The Queen's Gambit"
  type: "film"
  creator: "Scott Frank"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/the_queens_gambit.jpg"
  posted: "2024-04-18"
  text: |
    The chess procedural is the most improbable of television genres, and Scott Frank somehow makes it the most gripping thing on screen. What the series understands, working from Walter Tevis's novel, is that <u>chess is not interesting as a game but as a field in which a particular kind of mind can make itself visible: the board externalises Beth Harmon's interiority in a way that conventional psychological drama cannot, so that watching her play is watching her think, and watching her think is watching her survive.</u> The joint analysis after the adjournment against Borgov, late in the series, is astonishing television precisely because it is also emotionally coherent, the collective intelligence of an ad hoc community arrayed against the Soviet machine.

    Anya Taylor-Joy does something technically precise here that deserves naming. The emotions do not appear on her face so much as they organise it from within; one reads the glances and the small repositionings of expression the way one reads a position on a board, inferring the larger structure from local details. <u>That the adjournment as a practice has been rendered obsolete by engines is a loss the series makes one feel acutely, a whole ecological niche of chess time, the overnight analysis, the sealed move, the collective suspense, gone. Today's players are faster and braver and lonelier for it.</u>

- title: "초록물고기"
  title_en: "Green Fish"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 1997
  eval: "liked"
  image: "/assets/images/thoughts/films/green_fish.jpg"
  posted: "2024-04-10"
  text: |
    Lee Chang-dong's debut borrows from the gangster genre with the openness of a director who has not yet decided what his own cinema will sound like. Makdong, discharged from the army, returns to a Seoul that has swallowed his family's neighbourhood in concrete and expressways, and drifts into organised crime through the path of least resistance: a chance encounter with a woman, a debt of loyalty to her gangster boyfriend, the absence of any other structure to hold him. The plot is conventional enough that one can see the Kurosawa and Kitano shadows the early critics noted: the loyal foot-soldier, the doomed romance, the violence that arrives not as catharsis but as accounting. ***초록물고기*** does not transcend these conventions so much as inhabit them with an emotional seriousness that makes the formula feel temporarily inhabited.

    But the second half reveals something the genre framework cannot contain. The scenes between Makdong and his disintegrating family, the way Lee films economic displacement not as backdrop but as the engine of the narrative's tragedy, point directly toward the director who would make *Poetry* (2010) and *Oasis* (2002). The gangster plot is the surface; beneath it is a film about what happens to people when the city they grew up in is demolished and rebuilt without consulting them. <u>Even the most formulaic plot cannot bury Lee Chang-dong's voice: the insistence that structural violence, the kind that does not announce itself, is the real subject, and that individual choices are legible only against the systems that constrain them.</u> It is a first film in the best sense: one can see everything that will follow, and one can also see the director deciding, in real time, that he will need more than genre to say it.

- title: "Paris Texas"
  type: "film"
  creator: "Wim Wenders"
  creator_role: "dir."
  year: 1984
  eval: "meh..."
  image: "/assets/images/thoughts/films/paris_texas.jpg"
  posted: "2024-04-01"
  text: |
    Forty years ago the archetype was still legible as romance: the damaged, drifting man, the woman who loved him despite the cowbell he locked around her ankle, the paranoid possessiveness aestheticised as yearning. Sam Shepard's screenplay is beautiful in its construction of the American mythological landscape, the desert, the road, the gulf between interior life and language, and Robby Müller's cinematography earns every frame of its reputation. But the film's emotional architecture depends entirely on Travis's perspective, and <u>the more honestly one examines that perspective, the more the beauty curdles.</u> Jane exists almost entirely as the object of Travis's guilt and memory; her appearance behind the peep-show glass is theoretically a deconstruction of the male gaze, the glass as literalised barrier, the reversed roles in the confessional monologue, but the film remains too in love with its own longing to follow the deconstruction through.

    <u>Replace both women in the screenplay with their functions and the plot proceeds.</u> <u>Wenders remains a director one cannot quite fathom: a technical master in permanent service to a masculine interiority he never quite interrogates.</u>

- title: "熱帶魚"
  title_en: "Tropical Fish"
  type: "film"
  creator: "Chen Yu-Hsun"
  creator_role: "dir."
  year: 1995
  eval: "loved"
  image: "/assets/images/thoughts/films/tropical_fish.jpg"
  posted: "2024-03-19"
  text: |
    Chen Yu-Hsun's debut is one of the strangest and most tender films to emerge from 1990s Taiwan: a kidnapping comedy in which captivity is liberation, the criminals are warmer than the institutions, and the tropical fish of the title drift through the boy's dreams like emissaries from a world where pressure does not exist. Ah-Jiang, a junior high student drowning under Taiwan's joint entrance examination system, is taken hostage by a small-time crook and brought to rural Chiayi County, where the kidnapper's family, bumbling and generous and incapable of menace, proceed to treat him better than anyone in Taipei ever did. The premise sounds whimsical. It is not. <u>The satire cuts precisely where it needs to: the examination system that reduces children to test scores, the media circus that converts a child's terror into spectacle, the urban-rural divide that makes the countryside simultaneously backward and free.</u> Wen Ying's performance as the kidnapper's aunt earned a Golden Horse and deserved it; she carries the film's moral centre with a naturalism that makes every Taipei adult look like a caricature by comparison.

    What makes ***熱帶魚*** magical realism rather than mere absurdism is the sincerity of its fantasy. The dream sequences, in which tropical fish swim through the air and the boy's imagination breaks free of every wall his waking life has built around him, are not decorative; they are the film's argument, a claim that the interior life of a child under institutional pressure is richer and stranger and more valuable than anything the institution measures. Chen Yu-Hsun is working in a different register from the austere formalism of Hou Hsiao-Hsien or the architectural cool of Edward Yang: his Taiwan is loud, bilingual, chaotic, funny, and underneath the comedy there is a fury about what the system does to the young that never quite surfaces as polemic but never quite disappears either. <u>The tropical fish are the thing the examination cannot quantify and the kidnapper cannot cage: the stubborn, ungovernable fact of a child's imagination.</u> Wu Bai's soundtrack seals it. A film that should not work and works completely.

- title: "I Origins"
  type: "film"
  creator: "Mike Cahill"
  creator_role: "dir."
  year: 2014
  eval: "disliked"
  image: "/assets/images/thoughts/films/i_origins.jpg"
  posted: "2024-03-17"
  text: |
    The first ten minutes of ***I Origins*** set up a premise with some genuine intrigue: a molecular biologist studying the evolution of the eye encounters a woman whose iris pattern challenges his materialist assumptions. After that, the science vanishes entirely, replaced by the kind of spiritual mysticism that films about scientists invariably reach for when the screenwriter runs out of research. The eye-pattern database, the reincarnation hypothesis, the trip to India: none of it withstands even cursory scrutiny from the discipline the film claims to inhabit. This would matter less if the film were honest about being a romance with metaphysical trappings, but it insists on its scientific credentials with an earnestness that makes the scientific illiteracy worse, not better.

    Two things about the film are genuinely troubling rather than merely incompetent. First: the protagonist's entire career appears to have been built on the labour of his female first-year PhD student, whose work he presents on television without acknowledgement, a dynamic the film treats as romance rather than exploitation. <u>Second, and this is the one that ought to have sunk the film's reputation: a man brings an unrelated child back to his hotel room in a foreign country on the basis of an iris scan and a feeling, and the film frames this as spiritual revelation rather than the safeguarding crisis it plainly is.</u> That this passed without remark tells one something about how readily audiences will forgive narrative logic when the packaging is sufficiently pretty. The packaging here is very pretty. The film is nonsense.

- title: "Robot Dreams"
  type: "film"
  creator: "Pablo Berger"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/robot_dreams.jpg"
  posted: "2024-03-13"
  text: |
    ***Robot Dreams*** is a wordless film about a dog who builds a robot, and it destroyed me. Dog is lonely in 1980s New York; he orders a companion from a kit; they assemble each other's happiness over a single summer: rollerskating in Central Park, bowling, Coney Island. Earth, Wind & Fire's 'September' plays as they skate, and for a few minutes the film achieves a joy so unguarded it feels reckless. Then Dog and Robot fall asleep on the sand, and when Dog wakes the seawater has rusted Robot in place, immovable. He leaves to fetch tools; when he returns the beach is locked for the season, not reopening until June. The rest of the film is the aftermath: Dog trying to break back in, failing, the seasons turning, Robot dreaming of escape on the frozen sand. Pablo Berger, adapting Sara Varon's 2007 graphic novel, tells this story without a single word of dialogue, and the absence of language is not a constraint but the point. There is nothing to say. The loss is structural.

    What makes the film devastating rather than merely sad is its refusal of reunion. Dog and Robot do not find each other again. They move on, separately, into lives that are not unhappy but carry the shape of the absence. Dog buys a new robot, Tin, and this time coats him with oil before the beach. Robot, salvaged from a junkyard and rebuilt by a raccoon with a boombox for a body, finds a life of his own. In the final sequence Robot spots Dog on the street below his rooftop; he imagines running down, and the fantasy dissolves. He stays hidden. He plays 'September' instead, and Dog, hearing it, dances on the pavement without knowing who is playing it. <u>The film understands something about love that most films about love refuse to admit: that the end of a relationship is not a failure of feeling but a fact of time, and that the people we lose do not stop existing; they simply continue elsewhere, carrying the same music.</u> 'September' recurs in the final sequence, and I was in pieces. Not because the film is manipulative; it is the opposite of manipulative. Because it is true. Some friendships are perfect and finite, and the finitude is not a flaw but the condition of the perfection. I have not stopped thinking about it.

- title: "Dune: Part Two"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2024
  eval: "loved"
  image: "/assets/images/thoughts/films/dune_part_two.jpg"
  posted: "2024-03-03"
  text: |
    The first Dune established a grammar, grandiose and patient and utterly committed to scale, and Part Two spends three hours conjugating it into something devastating. Villeneuve's palette has never been more controlled: the gold-washed imperial interiors against the blue-black of Giedi Prime against the infinite buff of Arrakis, each world a fully realised phenomenology. The production design operates at the level where the film's ideas and its surfaces become indistinguishable. Hans Zimmer's score has learned to breathe more freely, less demonstrative than in the first film, more embedded in the images themselves.

    What the film understands, and what the critical discourse around its changes to Herbert's ending has not always foregrounded clearly enough, is that Paul's surrender is not triumph. <u>Muad'Dib's final acceptance of the messianic role is a moral catastrophe rendered as spectacle</u>, and Villeneuve is precise about the horror of it: the jihad is declared, the machinery of holy war begins to turn, and Chani's response is not argument but refusal. She takes up the maker hooks and mounts a sandworm and rides out into the open desert, and the film ends not on Paul's victory but on her departure.

    <u>I wept uncontrollably.</u> The tears were not for Paul, whose fate is exactly what he chose. They were for Chani, and for the particular clarity of her grief, and for <u>the recognition that the most heroic act in the film is simply to leave. A film this precise in its moral architecture is worth every one of its three hours.</u>

- title: "남산의 부장들"
  title_en: "The Man Standing Next"
  type: "film"
  creator: "Woo Min-ho"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/man_standing_next.jpg"
  posted: "2024-02-19"
  text: |
    The conventional narrative of the 10.26 Incident frames KCIA Director Kim Jae-gyu's assassination of Park Chung-hee as an act of political conscience: a man who could no longer serve a dictator and chose, at the decisive moment, democracy. ***남산의 부장들*** dismantles this mythology with surgical patience. Woo Min-ho's film, based on the nonfiction account, constructs the forty days before the assassination as a claustrophobic power struggle in which Kim Gyu-pyeong (Lee Byung-hun, superb) is not a revolutionary but a bureaucrat watching the floor disappear beneath him. His rival, security chief Gwak Sang-cheon, is consolidating influence; the president's inner circle is contracting; the Busan-Masan uprising has made martial law a live possibility. Kim shoots the president not because he has seen the light but because he has run out of room.

    <u>The film's great insight is that self-preservation and political courage can produce identical outcomes, and that history does not care which one was operating.</u> Lee Byung-hun plays the ambiguity without resolution: one watches his face in the final dinner scene and cannot determine whether what one sees is conviction, panic, or the point at which they become indistinguishable. The period detail is meticulous, the pacing is controlled, and the ensemble, particularly Lee Hee-joon as the swaggering Gwak, gives every scene the texture of men performing loyalty while calculating betrayal. What lingers is not the assassination itself but the mechanism that made it inevitable: a system that concentrates power so absolutely that the only exit is violence, and then calls the violence revolutionary after the fact. The tide of history pushes different cogs to the shore. Some of them happen to be holding a gun.

- title: "서울의 봄"
  title_en: "12.12: The Day"
  type: "film"
  creator: "Kim Sung-su"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/1212.jpg"
  posted: "2024-02-12"
  text: |
    Kim Sung-su compresses nine hours of the December 12, 1979 military coup into a thriller so taut it barely lets one breathe, and the formal achievement matters because the political stakes are real. Seven weeks after Park Chung-hee's assassination, Major General Chun Doo-gwang (Hwang Jung-min, terrifying in his banality) mobilises troops without authorisation, arrests the Army Chief of Staff, and overwhelms the Capital Security Command led by Lee Tae-shin (Jung Woo-sung). The names are fictionalised; the history is not. ***서울의 봄*** reconstructs the coup as what it was: not a revolution but a power grab by men who understood that the window between one dictatorship and the next was closing. Hwang Jung-min plays the coup leader with the specific charisma of a man who has confused ambition with destiny; Jung Woo-sung, as the loyalist commander who tries and fails to hold the constitutional line, provides the moral weight the film needs without ever becoming sentimental about it.

    Thirteen million admissions in South Korea is not a box-office figure; it is a referendum. The film arrived at a moment when Korean audiences were ready to look again at the machinery that produced Chun's dictatorship, the Gwangju Uprising, and the long road to 1987. <u>What ***서울의 봄*** understands, and what makes it more than a well-made political thriller, is that the mainline narrative, the one that tells a nation its own history critically rather than triumphantly, is the only mainline narrative worth having.</u> Reflexive patriotism tells citizens they were always brave; reflexive critique tells them the bravery was contested, contingent, and nearly lost. The film sides with the latter. It does not celebrate the loyalists who resisted so much as mourn the fact that resistance was not enough, and that the democratic spring the title names would take another eight years to arrive.

- title: "Louis CK: Back To The Garden"
  type: "film"
  creator: "Louis C.K."
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/louis_ck_back_to_the_garden.jpg"
  posted: "2024-02-05"
  text: |
    The delivery is as sharp as it has ever been, which is saying something considerable given the technical standard of the post-2017 specials. The bit about parents dying is extraordinary in the exact sense: <u>it does what only the best stand-up does, which is to locate a feeling so precisely that the audience recognises it before they have time to decide whether they should.</u> The architecture of the observation, the specific emotional logic of it, is the work of someone who has been thinking about mortality in an unusually careful and unusually honest way.

    The thematic coherence is looser than in his peak specials. Louis C.K. was never really a narrative comedian in the Seinfeld or Chappelle sense, never someone whose hour builds to a single unified statement, and so the scattered quality of Back to the Garden registers more as freedom than deficiency. The title suggests something pastoral and restorative, and there is something to that: <u>the material has the ease of someone who has made his peace with his situation and returned, without apology, to the work.</u>

- title: "Chłopi"
  title_en: "The Peasants"
  type: "film"
  creator: "DK & Hugh Welchman"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/chlopi.jpg"
  posted: "2024-02-04"
  text: |
    *Loving Vincent* (2017) announced a technique: every frame a painting, actors filmed then rendered in oil, the entire history of Post-Impressionism conscripted into cinema. *The Peasants* (2023) makes lacerating use of what *Loving Vincent* (2017) only demonstrated. Where that film used Van Gogh's aesthetic as a kind of commemorative transport, here the Welchmans have found a visual language, Polish folk art with its flat planes and chaotic, saturated colour and its roots in embroidery and woodcut, that is not decorative but argumentative. The Summer chapter's turbulence is rendered in strokes so agitated and so densely packed that the image itself becomes overwhelming: form enacts content, and the result is closer to Reymont's original than any realist adaptation could manage.

    The Welchmans are telling an 1897 story in 2023 and the discovery, which the film presses on with quiet insistence, is that nothing has changed. The misogyny persists: the mechanisms by which a community decides which women are permissible and which must be expelled are as operational now as they were then, requiring only the update of their vocabulary. <u>Jagna cannot win because the category of winning has been defined in advance to exclude her.</u> By the end she has accepted this: not resigned to it, not broken by it, but stripped of the illusion that any meaningful act is available to her, and the acceptance is more suffocating than any overtly violent scene the film contains.

    <u>I was close to tears at the end. Not from pity, which the film refuses to solicit, but from the recognition of a structure so durable it might as well be natural law.</u>

- title: "Hereditary"
  type: "film"
  creator: "Ari Aster"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/hereditary.jpg"
  posted: "2024-01-17"
  text: |
    Ari Aster's debut is most usefully understood as a film about conditioning. The horror does not arrive in discrete jolts; it is administered cumulatively, through sound design and framing and the patient repetition of images and gestures that will later be recontextualised with devastating precision. Colin Stetson's score trains the body to respond before the mind has processed the threat. <u>The tongue-click, first introduced as a minor character detail, becomes by the end a kind of involuntary dread response, which is Pavlovian in the most exact clinical sense: Aster has associated the stimulus with the reaction so thoroughly that the sound alone is enough.</u> Very few horror filmmakers have attempted this so consciously, and fewer still have pulled it off.

    The occult architecture is elaborate and well-researched, Paimon drawn from the Ars Goetia and woven into the family's history with a rigour that distinguishes it from the decorative Satanism of lesser films. What one sees in retrospect, knowing *Midsommar* (2019) and *Beau Is Afraid* (2023), is the DNA of an entire career: the closed system in which the protagonist has never had a choice, the horror as the revelation of a predetermined structure rather than a disruption of a safe one, the occult as a metaphor for the specific terror of inherited fate. ***Hereditary*** establishes all of this so completely and with such technical command that the subsequent films feel less like departures than elaborations.

    <u>The final sequence offers no catharsis and asks for none. The horror is that it is all perfectly logical.</u>

- title: "Nu aștepta prea mult de la sfârșitul lumii"
  title_en: "Do Not Expect Too Much from the End of the World"
  type: "film"
  creator: "Radu Jude"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/do_not_expect.jpg"
  posted: "2023-12-27"
  text: |
    I know nothing about Romanian history. I am not equipped to parse the quotations from Bashō, Baudelaire, Bernhard, DeLillo, and Žižek that stud the film like footnotes in a novel that does not believe in novels. None of this mattered. ***Nu aștepta prea mult de la sfârșitul lumii*** gave me, in one hundred and sixty-three minutes of a single day in Bucharest, the most fully realised, most alive character I encountered in cinema all year. Ilinca Manolache’s Angela is an overworked, underpaid production assistant driving across the city to interview workplace-accident victims for a corporate safety video. Between stops she produces TikTok rants as Bobiță, an Andrew Tate-esque filter-morphed grotesque who spews misogynistic filth with the practised cadence of someone metabolising an entire culture’s toxicity through satire. Jude shoots Angela’s odyssey in black and white, cramped aspect ratio, intercut with colour footage from Lucian Bratu’s 1981 film *Angela merge mai departe*, in which a different Angela, a female taxi driver, navigates the same streets under Ceaușescu. The two Angelas call and respond across forty years. What has changed is the economic system; what has not changed is the exploitation.

    The film’s second movement is the corporate video shoot itself, and this is where the formal discipline becomes devastating. Ovidiu Pîrșan, playing himself, a real worker maimed on the job, is coached by the multinational’s German marketing director (Nina Hoss, icily professional) to reshape his testimony: less blame, more personal responsibility, a version of events the corporation can distribute without liability. <u>The fixed camera holds. Pîrșan adjusts his account, take after take, and what one watches is the real-time manufacture of a lie that will be called a ‘safety awareness campaign’, and the lie is built from the body of the person it was designed to protect.</u> Jude has always understood that capitalism does not suppress the truth so much as commission a more profitable version of it; here the mechanism is laid bare with a patience that borders on cruelty. The roadside memorial crosses that flash past Angela’s car, one for every traffic death on the E85 corridor, are the film’s recurring image: the dead, acknowledged and uncounted. I came in knowing nothing about Romania. I left carrying the weight of one day in a city I have never visited, and the conviction that Radu Jude is making the most politically serious cinema in Europe.

- title: "Zielona granica"
  title_en: "Green Border"
  type: "film"
  creator: "Agnieszka Holland"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/films/zielona_granica.jpg"
  posted: "2023-12-26"
  text: |
    Agnieszka Holland shoots the 2021 Poland-Belarus border crisis in black and white with a severity that refuses aestheticisation: the forest is not beautiful; it is the space where people die of exposure while two states use them as instruments of geopolitical leverage. ***Zielona granica*** follows a Syrian family, a Polish border guard, and a group of humanitarian activists through the same crisis from different angles, and the multi-perspective structure is the film’s strength and its limitation. The refugee experience is rendered with an unflinching physicality, the cold, the hunger, the cyclical deportation across the border and back, that earns its comparisons to documentary. The guard’s gradual moral erosion is credibly performed. The activists provide the ethical framework the film needs without becoming mouthpieces.

    Where the film falters is precisely where its humanitarian convictions are strongest. <u>The visceral force of what Holland shows is undeniable; what she does not provide is a framework for understanding why it happens.</u> The geopolitical machinery, Lukashenko’s weaponisation of refugees, the EU’s complicity in externalising its borders, Poland’s domestic politics, is gestured at but never structurally examined. One feels the suffering with absolute clarity and leaves with almost no analytical purchase on the systems that produce it. The PiS government’s hysterical response, comparing Holland to Nazi propagandists, a particularly vile accusation given that her father survived the Holocaust, tells one more about the film’s political context than the film itself manages to articulate. It is a serious, committed work of border cinema that ultimately describes the symptoms of a crisis without diagnosing the disease. The Venice Special Jury Prize was deserved; so is the reservation.

- title: "The Zone of Interest"
  type: "film"
  creator: "Jonathan Glazer"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/the_zone_of_interest.jpg"
  posted: "2023-12-25"
  text: |
    Glazer's sound and image design make this one of the most formally unsettling Second World War films in a decade. Not a single moment is quiet. Children shriek with laughter in a garden thick with flowers while those beyond the wall are shrieking too; a gunshot cleaves the summer air; somewhere, machinery runs without ceasing. The camera does not flinch or recoil, because the camera does not know there is anything to flinch from. It sits in one indifferent corner after another, filming Rudolf Höss managing his logistics, his promotion, his swimming pool, as though camp administration and career advancement were problems of the same order, which, for him, they are.

    Arendt wrote that the Nazi bureaucratic apparatus constructed a linguistic and procedural system allowing its officers to kill without reflection: the gas chambers were efficiency problems, the crematoria were throughput questions, and the officer who solved them well was doing his job well. Glazer has built a cinema equivalent of this system. One watches a brother play at being an officer gassing his sibling; one hears a wife tell her mother that she has become the queen of Auschwitz, and the pride in her voice is a domestic pride, the pride of a woman whose household is well ordered. <u>No interiority is offered, because interiority is precisely what the perpetrators abolished in themselves.</u>

    The warmest possible mise-en-scène, the garden, the light, the children's laughter, functions as the film's central argument: that <u>normalcy is not the opposite of atrocity but one of its enabling conditions.</u> Johnnie Burn's sound design places the audience in the same structural position as the Höss family, hearing the camp without seeing it, pressing the horror back beyond the frame until imagination must do what the image refuses. Black and white and red. <u>The wall between the garden and Auschwitz, Glazer has said, is a wall anyone can build. The film makes one believe it.</u>

- title: "Perfect Days"
  type: "film"
  creator: "Wim Wenders"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/perfect_days.jpg"
  posted: "2023-12-20"
  text: |
    In the daily routine repeated without end, one does not see Mr. Hirayama's loneliness. One does not see the 'great beauty of East Asia' that short reviews reach for, nor any glorification of the working class, nor a manifesto about the dignity of simple labour. What one sees is simply one person's life: the cassette tapes chosen each morning with the seriousness of a liturgical selection, the photographs of light through leaves accumulated in boxes under the bed, the Faulkner novel read by torch in a narrow room, the moment of stillness before the cleaning begins.

    The readings that want to make this into a statement, about mindfulness, about late capitalism's discontents, about the vanishing art of attention, are not wrong exactly, but they are performing a kind of critical restlessness that the film itself declines. Hirayama does not live simply as a rebuke to anything. He lives as he lives. <u>Koji Yakusho's performance is the rarest thing in contemporary cinema: a portrayal of contentment that is not achieved at the cost of complexity, that carries the weight of everything renounced without dramatising the renunciation.</u> The short reviews hell-bent on reading the film as some kind of manifesto are, frankly, baffling; <u>they have mistaken a life for an argument.</u>

- title: "あの夏、いちばん静かな海。"
  title_en: "A Scene at the Sea"
  type: "film"
  creator: "Takeshi Kitano"
  creator_role: "dir."
  year: 1991
  eval: "liked"
  image: "/assets/images/thoughts/films/a_scene_at_the_sea.jpg"
  posted: "2023-12-14"
  text: |
    An anomaly in Kitano’s filmography and a reminder of the range he contains. Shigeru, a deaf-mute garbage collector played by Claude Maki, finds a broken surfboard and becomes consumed by the need to surf. His girlfriend Takako, equally deaf and mute, watches from the sand with a patience that is not passivity but devotion. ***あの夏、いちばん静かな海。*** has almost no dialogue, not because of formal experiment but because its protagonists live in silence, and Kitano respects the silence completely. Where *Violent Cop* (1989) and *Boiling Point* (1990) operated through eruption, this film operates through stillness; the violence is replaced by the sea, which is just as indifferent and just as final.

    Joe Hisaishi’s score is, without overstatement, one of his finest: a simple piano theme that recurs like a tide, never insisting, never resolving. It gives the film a warmth that Kitano’s camera, characteristically fixed and patient, does not provide on its own. <u>The ending is the sea taking what it wants, as the sea always does, and Takako waiting on an empty beach beside a surfboard and a pair of shoes that will not be collected.</u> Kitano’s peculiar tenderness, the warmth that coexists with brutality in everything he makes, is here distilled to its essence. One watches two people who cannot speak to the world find a way to speak to each other, and the world does not care, and the film does not pretend otherwise. Quiet, strange, and full of a gentleness that Kitano’s other films keep buried under their violence.

- title: "Fleishman Is in Trouble"
  type: "film"
  creator: "Taffy Brodesser-Akner"
  creator_role: "created by"
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/fleishman_is_in_trouble.jpg"
  posted: "2023-12-02"
  text: |
    One of the finest endings of any series in recent years. Under Libby's voiceover, every thread is pulled to its crisis through means that are deeply literary rather than merely dramatic: the accumulated weight of the preceding episodes is recontextualised, not resolved, and the distinction matters. The reframing is total. <u>Libby, who has spent eight episodes narrating Toby's story of midlife dissolution, is revealed to be narrating her own; the act of telling someone else's crisis is the form her own crisis takes.</u>

    The writing, Taffy Brodesser-Akner adapting her own novel, earns its observations rather than asserting them. In the midst of a midlife reckoning, one quite naturally displaces misery onto the nearest available cause. Toby believes his unhappiness originates in Rachel's indifference; Rachel believes hers originates in Toby's failure to see her; Libby believes hers originates in a marriage that has quietly enclosed her. Each, after excising that cause, finds the root still there. The comedy of misattribution is performed with great precision, and the pain underneath it is not softened.

    There is a strain of short review that says it cannot care about a middle-aged man's divorce, as though the show were making that case. <u>The show is not about Toby at all. It is about the stories people tell to avoid the story they are actually living, and about the woman, finally, who names it.</u>

- title: "怪物"
  title_en: "Monster"
  type: "film"
  creator: "Hirokazu Kore-eda"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/monster.jpg"
  posted: "2023-11-25"
  text: |
    The structure of ***Monster*** arrives like a kind of epistemological ambush. The first chapter presents itself as a thriller about institutional negligence: a mother, Saori, watching the school's carefully managed face and knowing something is being hidden behind it. The audience joins her certainty, builds alongside it, feels the outrage accumulate. Then the film pivots to the teacher's perspective, and every certainty dissolves; the monster has migrated, the villain has become a victim, the school's stonewalling reveals new shape. By the time the third chapter arrives, the one that belongs to the two boys at the centre of everything, one understands that Kore-eda was never interested in the thriller machinery at all. It was scaffolding.

    What Yuji Sakamoto's screenplay accomplishes, and what Kore-eda's direction metabolises into feeling, is the demonstration that the most suffocating structures of harm are not dramatic or even intentional: they are simply the aggregate weight of ordinary people failing to look directly at what is in front of them. The decoy themes, institutional cover-up, class resentment, even the surface reading of the film as a study in perspectival truth, peel away one by one. <u>What remains is a friendship between two boys who are discovering something about themselves that the world around them has no language for, only interdictions.</u> Ryuichi Sakamoto's final score holds the film together in its most fragile moments with the particular authority of someone who had already said goodbye.

    Kore-eda has never been a director who reached for formal experimentation without reason. <u>The radical structure here is not a display of craft; it is the argument.</u> The film won the Queer Palm and the Best Screenplay prize at Cannes, both of which it had earned, though neither quite names what makes it singular: the way it marshals structural sophistication entirely in the service of a very old, very simple subject. <u>Love. Sincerity. Purity. The things that survive after the decoys have dissolved.</u> I did not expect to name this my favourite film of 2023, but here we are.

- title: "Scavengers Reign"
  type: "film"
  creator: "Joseph Bennett"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/scavengers_reign.jpg"
  posted: "2023-11-16"
  text: |
    ***Scavengers Reign*** is, among other things, a sustained argument that animation is the only medium currently capable of depicting biological strangeness at the register the imagination requires. The planet Vesta Minor operates as a closed ecosystem before it operates as a setting: the organisms have food chains, life cycles, symbiotic relationships with one another that the narrative discovers rather than invents. Joseph Bennett and Charles Huettner, who expanded the series from their 2016 short, drew on Ernst Haeckel's biological illustrations, on Moebius, on the deep-sea phyla that look most unlike anything evolution arrived at on land. <u>The design philosophy was ecological plausibility first, visual impact second, and the combination produces creatures that feel discovered rather than designed.</u>

    And yet, a review I encountered while watching made the claim that the first episode demolishes the notion that humans cannot imagine what they have never seen, and I find I cannot let that stand without a murmur of dissent. Every significant organism on Vesta Minor still requires limbs, appendages, bilateral or radial symmetry, some version of a mouth. The cursed planet, for all its strangeness, operates well within the frame of reference that evolutionary history has handed us. That the design is intelligent, intricate, and productive of sustained wonder is not in doubt. That it constitutes a genuine shattering of imaginative limits is a different, harder claim. <u>The truth is closer to this: Scavengers Reign does with familiar biological building blocks what great music does with a limited number of notes. The constraint is real. The achievement within it is considerable.</u>

- title: "Asteroid City"
  type: "film"
  creator: "Wes Anderson"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/asteroid_city.jpg"
  posted: "2023-07-24"
  text: |
    After *The French Dispatch* (2021) I wrote a note to myself: Anderson has grown genuinely conscious of the detachment his long-cultivated style produces, and is now making that consciousness the subject. The French Dispatch remained in love with its own architecture, a film one admires the way one admires a beautifully printed magazine, at a slight and deliberate remove. ***Asteroid City*** goes further, makes the remove itself the wound. The quarantine at the film's centre, characters stranded in a desert town after an alien interruption that changes nothing and explains nothing, is Anderson's clearest allegory yet: for the pandemic's enforced stillness, for grief that cannot be processed because the ordinary machinery of life has stopped, for the way we reach for form and structure precisely when experience has become too raw to hold. The multi-layered metatheatrical frame, a television programme about a stage play about a fictional event, is not mere cleverness; it is the argument. <u>Art does not resolve grief. It houses it.</u>

    The window-ledge exchange between Augie and Midge in Act 3 is the only emotionally direct scene I have encountered in Anderson's recent work, two people speaking to each other across a threshold without the armour of irony or composition, using scripted dialogue to let the audience sense something real pressing through the performance. It lands partly because everything surrounding it is so thoroughly mediated. Beyond that scene, every surge of feeling is buried deep in detail and text, accessible only to those willing to slow down inside the film's deliberate rhythms. The storytelling is considerably more coherent than *The French Dispatch* (2021), the filmmaking is Anderson's mature post-*Bottle Rocket* (1996) voice at full command, and the allusions accumulate into something capacious: mid-century American utopianism, the Cold War's peculiar anxiety, astrophysics as both wonder and dread. <u>'You can't wake up if you don't fall asleep' is not a resolution; it is a direction of travel, which is all Anderson is willing to offer, and all he needs to.</u>

- title: "Oppenheimer"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 2023
  eval: "liked"
  image: "/assets/images/thoughts/films/oppenheimer.jpg"
  posted: "2023-07-23"
  text: |
    After *Tenet* (2020) one might have hoped the lesson was learned. It was not. For a sustained stretch somewhere in the film's middle hour, whole passages of dialogue are simply inaudible, swamped by Ludwig Göransson's score and Nolan's habitual conviction that the visceral and the legible need not coincide. Downey Jr.'s Strauss is not a naturally projecting presence, his performance carefully calibrated to a quieter register, and so the details of the Senate hearing sequences, which carry the film's political argument, dissolve into texture. One fills in the gaps from prior knowledge of the history and feels dimly cheated for having to. <u>This is not a stylistic choice that rewards; it is a recurring technical failure dressed as aesthetic philosophy.</u>

    And yet. ***Oppenheimer*** is quintessential Nolan in all the ways that matter: the dense interlocking timelines, the cross-cut chronologies that keep deferring their own resolution, the accumulating weight of a man who understood exactly what he had done and was made to understand it again, institutionally, in the security hearings that stripped him of everything. The final third pulls the cord tight with an elegance Nolan rarely achieves: 'Now you have to face the consequences of your own achievement.' The Trinity test sequence earns its silence. Murphy carries the film's moral gravity without strain. <u>The problems are real and the film survives them, which is itself a kind of verdict on Nolan's filmmaking, always more compelling than it has any right to be given how much it insists on working against you.</u>

- title: "Barbie"
  type: "film"
  creator: "Greta Gerwig"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/barbie.jpg"
  posted: "2023-07-23"
  text: |
    The premise is absurdist and the execution relentless: in just under two hours, Gerwig and Baumbach smuggle in a meditation on personhood, on the impossible double bind of femininity, on what it costs to acquire interiority in a world that preferred one decorative, and on the strange dignity of choosing mortality, imperfection, a body that changes and ends. America Ferrera's monologue names the double bind with the compressed force of a manifesto, and the audience in the theatre where I saw it applauded, loudly, repeatedly, not as a courtesy but as something closer to relief. <u>The film knows exactly what it is doing with its pinks and its plastics, using the visual grammar of commodity spectacle to say something that commodity spectacle normally works to suppress.</u>

    As a film it is not quite a masterpiece: the Mattel corporate satire is too easy, the third act softens at moments where harder edges might have served better, and crowd-pleasers by definition cannot afford the risks that produce genuine formal greatness. But there is a version of cinematic experience that has nothing to do with formal perfection, a version in which the right film meets the right audience at the right cultural moment and produces something that exceeds any individual work's merits. That is what happened here. <u>One left the theatre feeling that something had been said that needed saying, in the loudest possible room, with the lights on.</u> Please, no sequel.

- title: "Spider-Man: Across the Spider-Verse"
  type: "film"
  creator: "Joaquim Dos Santos, Kemp Powers & Justin K. Thompson"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/spider_man_across_the_spider_verse.jpg"
  posted: "2023-07-22"
  text: |
    The innovations accumulate so fast one barely registers any single one before the next arrives: variable frame rates that give each universe its own temporal texture, Gwen Stacy's world bleeding watercolour that shifts with her emotional state, the canon-event sequences rendered in stark Frank Miller black-and-white, and above all the comic-book annotations, Ben-Day dots and panel borders and thought bubbles that exist as genuine three-dimensional objects in the space of the animation, not decoration but grammar. Animated film has a territory that live-action cannot enter, and *Into the Spider-Verse* (2018) already mapped more of it than any film in years; Across the Spider-Verse extends that map in every direction simultaneously, inventing software and pipelines where existing tools ran out.

    What keeps the technical ambition from becoming its own kind of spectacle is that the story commands it. <u>Every formal choice carries narrative weight, which is the only test that matters.</u> The final twist arrives with the structural logic of something that was always there, latent in everything that preceded it, and detonates anyway. That combination, the sense of inevitability and the force of surprise, is the hardest thing to achieve in serialised storytelling, and Across the Spider-Verse achieves it without effort apparently, which of course means it was assembled with enormous effort, invisible. <u>The gap between what animation has been and what it might be suddenly looks very wide.</u>

- title: "Sicario"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/films/sicario.jpg"
  posted: "2023-06-27"
  text: |
    The official genre is crime thriller. <u>The actual subject is a person watching her own moral framework dissolve in real time, and finding there is nothing beneath it.</u> Kate Macer enters the film believing in systems, in law, in the idea that state power and ethical action can occupy the same space; the film spends its runtime methodically demonstrating that this belief is a luxury, maintained only by not looking too closely. Villeneuve and Roger Deakins shoot her diminishment with extraordinary precision: the plastic bag at her feet on the flight to Juárez, an object of mundane wrongness that she cannot name; the last wash of desert light before the interdiction corridor opens and the night-vision takes over, beauty folded into impending violence so seamlessly that the two become indistinguishable.

    What stays is not the violence but the helplessness, a physical sensation, something that rises from the gut rather than registering in the mind. <u>The trigger that cannot be pulled is not a moral victory; it is the last point at which she exists as a subject rather than an instrument.</u> Taylor Sheridan's script understands that the most honest thing a film about American drug policy can do is refuse its protagonist, and the audience, the resolution they came prepared to receive. <u>One leaves not disturbed exactly, but altered, carrying a weight that does not belong to fiction.</u>

- title: "Hannah Gadsby: Something Special"
  type: "film"
  creator: "Hannah Gadsby"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/hannah_gadsby_something_special.jpg"
  posted: "2023-05-19"
  text: |
    The final callback lands so cleanly, with such structural precision, that one wonders whether the whole hour was built backward from that single moment. The panic talk alone would justify the hour; the stretch in the middle where the rhythm briefly loosens is the only demurral.

    The comparison to *Nanette* (2018) is unavoidable, and *Something Special* invites it deliberately. In *Nanette* (2018), Gadsby anatomised the callback as a mechanism for artificially resolving tension, a comedic sleight-of-hand that papers over unhealed wounds. Here, the callback returns, deployed freely and warmly, and the argument implicit in that choice is more interesting than anything said aloud: that the same structural device can signify harm or health depending entirely on the psychic position from which it is deployed. <u>What was once a trap is now just a tool.</u> <u>Gadsby is happy, and the form reflects it, and it is a quietly radical thing to watch a comedian allow the shape of their work to change because their life has.</u> The special is built around a wedding, around queer joy, around the domestic, and it treats these subjects with the same intellectual seriousness it once directed at trauma. This is the rarer achievement.

- title: "Nope"
  type: "film"
  creator: "Jordan Peele"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/nope.jpg"
  posted: "2023-04-29"
  text: |
    A horror film in which visual control is taken to its absolute limit. Hoyte van Hoytema shoots the Californian high desert on large-format IMAX film, and every frame is strikingly beautiful in the way that vast, indifferent things are beautiful: not inviting, not safe, but impossible to look away from. This is formally appropriate, because ***Nope*** is a film about the compulsion to look, about the economy of spectacle and the violence that underwrites it, and Peele has structured it so that the terror never requires one to squint through the dread. <u>Every minute is frightening. The aesthetics and the argument are the same argument.</u>

    The Gordy subplot is the key that unlocks the rest of the film: a chimp on a sitcom set, trained and exhibited and finally ungovernable, mirrors the alien entity not as metaphor but as structural rhyme. <u>Both are wild things enlisted into the spectacle machine; both exact a cost when the contract breaks down.</u> The film's deepest subject is the history of that machine and who has paid to run it, from the uncredited Black jockey in Muybridge's motion studies onward, and Peele trusts the intelligence of his audience enough not to annotate it. I dismissed the film last year on the basis of its middling reputation. I now regret that deeply, and consider it an instructive lesson in the limits of aggregated taste.

- title: "The Hours"
  type: "film"
  creator: "Stephen Daldry"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/the_hours.jpg"
  posted: "2023-04-24"
  text: |
    ***The Hours*** holds three timelines in suspension, and David Hare's screenplay keeps them from collapsing into each other by finding the precise points of structural resonance: a woman reading, a woman choosing, a woman refusing to be managed, the same act refracted across 1923, 1951, and 2001, each instance informing the others without explaining them. The film is adapted from Michael Cunningham's novel, which is itself a meditation on *Mrs Dalloway* (1925), and the risk of that kind of nested literary homage is that the whole edifice becomes airless, a demonstration of influence rather than an experience of it. It does not.

    Nicole Kidman's monologue at the station, Julianne Moore's at the dining table: both scenes succeed because the performers locate something that exists prior to the literary scaffolding, a quality of desperation that Virginia Woolf would have recognised but that belongs equally to these specific women in these specific moments. <u>Philip Glass's score is the fourth structural element, its cycling piano phrases working not as emotional underlining but as something closer to a formal argument: the same interval returning and returning, never quite resolved, because resolution is not what the film is interested in.</u> These three things, those two monologues, that score, give The Hours its final touch atop an already extraordinary piece of storytelling. <u>By the end one has the sensation of having been inhabited by the film rather than merely having watched it.</u>

- title: "The Lost Daughter"
  type: "film"
  creator: "Maggie Gyllenhaal"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/the_lost_daughter.jpg"
  posted: "2023-04-23"
  text: |
    Jessie Buckley appearing was a surprise, and a welcome one. She plays the younger Leda in flashback, and the film's central gambit depends on the viewer accepting that Olivia Colman and Buckley are not merely the same character at different ages but the same interiority at different pressures, the same impulses made legible by the presence of the other. Gyllenhaal makes that gambit pay. <u>The adaptation from Ferrante's novella retains the source's central discomfort: its refusal to resolve the question of whether Leda's choices were the right ones, its insistence that ambivalence is not a failure of character but a condition of consciousness in a world that offers women incompatible lives.</u>

    The final scene hit with exactly the force of *Aftersun* (2022). That is high praise and also a precise description: the same quality of accumulated, quiet devastation, the same sense of something that was present throughout the film finally finding its name in the last possible moment. <u>That name is not stated. It does not need to be.</u>

- title: "The Whale"
  type: "film"
  creator: "Darren Aronofsky"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/the_whale.jpg"
  posted: "2023-04-09"
  text: |
    In the daughter's essay, she writes that *Moby Dick* (1851)'s boring chapters, all those exhaustive taxonomies of blubber and rigging, exist for one purpose: to spare the reader from the sad story of Ahab's life. It is the most precise description of this film one has yet encountered, and the original review found it before any critic did. The critical consensus reached for 'monument', for 'a chamber piece of grief and grace'. What it is, more honestly, is boring chapters. Charlie's 600-pound body, the compulsive eating, the claustrophobic aspect ratio boxing him into that apartment: these are the cetological digressions, the scaffolding of deflection. Aronofsky and Samuel D. Hunter's adaptation understands, perhaps more than it is given credit for, that <u>the body is not the subject. The body is the evasion.</u>

    What the body is evading is simpler and less cinematic: a man who loved someone, lost them, and decided the only appropriate response was to become unrecognisable. Alan's death is the wound the film circles without ever quite pressing. Fraser's performance works precisely because he never plays the fat suit; he plays the grief underneath it, the specific quality of a person who has decided, at some cellular level, to be done. Hong Chau's Liz is the film's most honest presence, too exhausted for pity, too loyal to leave. The daughter's fury is almost too clean, almost too legible as instrument of catharsis. But then the essay arrives.

    Does Charlie make peace with himself at the end? The film ends on an image, not an answer. He rises: literally, improbably, the body finally doing what it has refused for years. Whether this is redemption or simply the last convulsion of a system shutting down is left to the viewer's own need for resolution. One suspects Aronofsky wants it both ways, and one suspects that is the correct artistic instinct. <u>Some whales are too large to land cleanly. The boring chapters were always the point.</u>

- title: "오아시스"
  title_en: "Oasis"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/oasis.jpg"
  posted: "2023-03-24"
  text: |
    Jong-du walks out of prison in the opening minutes and within an hour of screen time has done something unforgivable. Lee Chang-dong does not soften it, does not cut away to the magical-realist interlude fast enough to mitigate what is happening, does not ask for the viewer's sympathy prematurely. The assault is there, on the screen, wrong. And what the film then proceeds to do with this wrongness is among the most morally serious things Korean cinema has attempted.

    Gong-ju lives in a dark apartment, warehoused by a family for whom her existence is a bureaucratic inconvenience; Jong-du is the kind of ex-convict who took the blame for his brother's crime and received neither gratitude nor recognition for it. <u>The social contract has failed both of them in entirely different ways, and the film refuses to pretend that this shared exclusion makes them equivalent, or makes what happened between them sanctioned.</u> What it insists on is something quieter and less comfortable: that a man who has governed his impulses this badly can still perform an act as precise and tender as cutting down the tree branch whose shadow terrified her, that desire and care are not allocated only to those who have already demonstrated themselves worthy of them.

    The magical-realist sequences, in which the palsy lifts and Gong-ju moves freely through her own apartment, are heartbreaking in inverse proportion to how briefly they last. Moon So-ri's performance is one of the most committed physical transformations in the cinema of this period, achieved without prosthetics, without softening. When the film ends one is not certain that anything has been resolved. When do the mad find each other. <u>The ***oasis*** is not an escape from the question; it is the question, briefly habitable.</u>

- title: "椒麻堂会"
  title_en: "A New Old Play"
  type: "film"
  creator: "Qiu Jiongjiong"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/a_new_old_play.jpg"
  posted: "2023-03-21"
  text: |
    Honesty first: by the end of nearly four hours, one could not claim everything had clicked into place. The architecture of Qiu Jiongjiong's Sichuan opera epic is too eccentric, too deliberately resistant to the satisfactions of conventional closure, for that kind of tidy accounting. Fake Monk moves through the entire span of twentieth-century Chinese history, from the Republican era through the Cultural Revolution and into Reform, and the film watches him go with the calm of something that has already accepted the futility of conclusions.

    What lodges in the memory are not the through-lines but the textures: the painted backdrops of hand-made sets that never pretend to be anything but sets; the Yin-Yang borderland tavern with its pandas, presiding over the transition between life and whatever follows; the wall-poster slogans layered over one another like geological strata of political instruction; the lice on the children's bodies; the maggots in the excrement. Qiu is a painter first and the film looks like one, non-naturalistic and precise in its artifice. <u>One can, inexplicably, imagine him having tremendous fun making it, the cast having tremendous fun performing it, everyone in on a private joke about the relationship between spectacle and suffering that Sichuan opera has known since long before any of them were born.</u>

    The comparisons that assembled themselves while watching, shadows of other directors moving at the edge of the frame, remained stubbornly unresolved by the credits. Not Hou, not Apichatpong, though the film shares genealogical material with both. Something more singular than either, and less finished. <u>A thoroughly singular film that does not know, or does not care, whether it has succeeded. That might be the most honest position available to a work of this ambition.</u>

- title: "The Florida Project"
  type: "film"
  creator: "Sean Baker"
  creator_role: "dir."
  year: 2017
  eval: "liked"
  image: "/assets/images/thoughts/films/the_florida_project.jpg"
  posted: "2023-03-20"
  text: |
    The children act with a skill so complete it stops being remarkable and becomes simply the world of the film: <u>Brooklynn Prince's Moonee is one of those performances that makes one distrust the very concept of performance, because there is no seam between the child and the character.</u> The emotional temperature climbs sharply through the final third, accumulating with the precision of someone who knows exactly how much a viewer can hold before something breaks. And then it breaks, correctly, devastatingly.

    The iPhone-shot epilogue is maddening. One understands the practical logic, the guerrilla filming inside Disney World, the aesthetic argument about childhood's different visual register. One understands it and remains unmoved by the argument: <u>a film that has operated at this level of formal control for ninety minutes cannot simply switch to a different camera and call the rupture intentional.</u> The ending as it stands before those final minutes is the ending the film deserves. Clean, specific, unsparing. It loses to *Gagarine* (2020) in the final reckoning, which says something about what a film can do with a similar repertoire of images, similarly marginalised children, and a camera that stays the course.

- title: "Drive My Car"
  type: "film"
  creator: "Ryusuke Hamaguchi"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/drive_my_car.jpg"
  posted: "2023-03-07"
  text: |
    Murakami's stories are probably like this too. Take '*Barn Burning*' (1983) as an example: suffused from start to finish with a kind of spirituality and inexplicable strangeness, a plotlessness that is not emptiness but something closer to negative space. ***Drive My Car*** is the same. At an unhurried pace it draws out the most important dialogues and performances, <u>trusting that the repetition of Chekhov's lines across the multilingual <em>Uncle Vanya</em> rehearsals will do, slowly, what grief does: return one again and again to the same words until one understands them differently.</u>

    What stays with one longest is not the three-hour runtime but the brevity of certain scenes: that brief exchange at the waste disposal site, which arrives quietly and passes quietly, and yet concentrates the film's entire emotional argument into two or three minutes of parking-lot light. The quietness of a road film, the patience of a theatrical rehearsal, and at its core an emotional depth not far from that of *Burning* (2018), which is to say: <u>something that does not resolve, but opens.</u>

- title: "Im Westen nichts Neues"
  title_en: "All Quiet on the Western Front"
  type: "film"
  creator: "Edward Berger"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/all_quiet_on_the_western_front.jpg"
  posted: "2023-02-12"
  text: |
    Every few years a film like this arrives. Five years before, it was *Dunkirk* (2017), which gave the chaos of retreat its own grammar of sound and image. Two years before, it was *1917*, which made the logic of the front visceral through the unbroken gaze of a single day. And then ***All Quiet on the Western Front***: Felix Kammerer's Paul Bäumer enlisting full of patriotic ardour, and the film's cold, steady insistence on showing exactly what that ardour buys. The addition of the Erzberger armistice subplot, absent from earlier adaptations, turns the film into something almost unbearably pointed: <u>men dying by the minute while diplomats negotiate over lunch, the clock running down to eleven o'clock on November eleventh, the war ending not because it needed to but because it was scheduled to.</u> <u>One of the great anti-war films.</u>

- title: "Aftersun"
  type: "film"
  creator: "Charlotte Wells"
  creator_role: "dir."
  year: 2022
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/films/aftersun.jpg"
  posted: "2023-02-11"
  text: |
    It has been nearly two months since watching it, and still, every few days, ***Aftersun*** comes to mind. Every few days one wants to rate it and write something, but every time one opens this page there is no knowing where to begin. Written and deleted, deleted and written again.

    What is it that the film does? It lets a child watch her father, and it lets an adult watch the child watching, and the gap between those two acts of watching is where the entire film lives. Paul Mescal's Calum is not withholding so much as he is out of reach: <u>he is present, he loves Sophie completely, and he is quietly disappearing into something she has no vocabulary for and will spend her adult life trying to name.</u> Charlotte Wells does not explain this. She holds the camera on a balcony at night, or on a strobe-lit rave sequence that feels like memory collapsing into static, and she lets the not-knowing accumulate until it becomes a kind of unbearable weight.

    <u>Better to just leave it at: one of the best films one has ever had the honour to watch.</u>

- title: "Make Happy"
  type: "film"
  creator: "Bo Burnham"
  creator_role: "dir."
  year: 2016
  eval: "loved"
  image: "/assets/images/thoughts/films/make_happy.jpg"
  posted: "2023-01-29"
  text: |
    The title is the trap. '***Make Happy***' names the transaction at the centre of every comedy special: the performer's obligation, the audience's expectation, the implicit contract that the evening will end with everyone feeling good. Burnham spends an hour honouring that contract with almost terrifying precision: the lighting rigs, the key changes, the callback structures, the songs that pivot from parody to sincerity mid-verse. The command of the stage is total; every visual cue and musical swerve has been calibrated to within an inch of its life. One watches not so much for the jokes, which are sharp, as for the spectacle of a twenty-five-year-old conducting an arena with the authority of a seasoned theatre director.

    What makes it a stunner rather than merely a bravura display is the rot eating through the centre. The performance is, explicitly, the problem: the better Burnham makes the audience feel, the more he implicates both parties in a transaction that leaves him hollow. The final sequence, after the lights go down and the crowd is dismissed, is among the most nakedly honest things one has seen in what is nominally a comedy context. Not honest in the confessional-podcast sense, but structurally honest: <u>the form itself cracks open, and what's inside is not pathos performed for effect but something that has been there the whole time, held at arm's length by the sheer proficiency of the show.</u> 'Are You Happy?' is the question addressed to himself, alone on the stage, and the silence that follows it has no punchline. <u>The predecessor to '<em>Inside</em>', but perhaps the sharper diagnosis: the illness was already fully legible in 2016.</u>

- title: "Taylor Tomlinson: Look at You"
  type: "film"
  creator: "Taylor Tomlinson"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/taylor_tomlinson_look_at_you.jpg"
  posted: "2023-01-27"
  text: |
    There is a received idea in stand-up that the best comedy requires a certain willingness to wound: to go for the throat, to risk offence as evidence of seriousness, to make the audience slightly uncomfortable with itself. The corollary is that clean comedy is soft comedy, that the refusal to be offensive is a failure of nerve. <u>Tomlinson makes the whole framework look provincial.</u> Her material on her bipolar disorder diagnosis, her upbringing in evangelical Christianity, the specific texture of her romantic self-sabotage, is as dark as anything the edgelord tradition produces; it simply doesn't require collateral damage to get there. The craft underneath is almost suspiciously tight: setups that seem digressive turn out to be load-bearing, callbacks arrive from unexpected angles, and the tonal management between confession and absurdism is handled with a lightness that conceals enormous structural work.

    What she has identified, whether consciously or not, is that the transgression the good male comedians traffic in is itself a kind of safety: shock as a substitute for actual exposure. <u>Tomlinson is more exposed, and more precise, and funnier.</u> <u>That one walks away from this special feeling neither implicated nor depleted is not a sign of its gentleness. It is a sign of its intelligence.</u>

- title: "Drew Michael: Red Blue Green"
  type: "film"
  creator: "Drew Michael"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/drew_michael_red_blue_green.jpg"
  posted: "2023-01-23"
  text: |
    One goes in expecting the bare-stage minimalism of his 2018 HBO debut, that experiment in performing anxiety at close range with no audience and near-darkness for cover, and finds instead something harder to categorise. Red, Blue, Green names the American political tripartism the special is orbiting: the two tribal colours locked in their defining relation with each other, and the green as the position that refuses both terms. The philosophical architecture is Žižekian in the best sense, not in the sense of name-dropping Lacan, but in the specific sense of using the joke as the shortest distance between an audience and an ideological contradiction it has been trained not to see. <u>Several sequences give one that particular vertigo of watching someone think faster than the room can follow.</u>

    The Žižek comparison has limits, which Michael himself half-acknowledges: where Žižek's digressions are the point, some of Michael's feel like a thinker who has not yet found the right vessel for every idea. The final five minutes are the clearest instance of this: what has accumulated as a sustained, flickering argument collapses into something closer to a summary, a tl;dr that underestimates what the preceding hour has already built. It is a genuine misstep, and a frustrating one, because the rest of the special earns the kind of attention one does not usually bring to stand-up. One of one's favourites regardless. <u>The ideas are worth the stumble.</u>

- title: "平原上的摩西"
  title_en: "Moses on the Plain"
  type: "film"
  creator: "Sicheng Zhao"
  creator_role: "dir."
  year: 2023
  eval: "loved"
  image: "/assets/images/thoughts/films/why_try_to_change_me_now.jpg"
  posted: "2023-01-20"
  text: |
    Shuang Xuetao's novella is one of the most formally audacious pieces of Northeast Chinese literature in recent memory: a murder mystery that is not really a mystery, a love story told in ellipses, a portrait of Shenyang's industrial decline across the 1980s, 1990s, and 2000s that refuses the consolations of either nostalgia or critique. The boldness of adapting it lies precisely in honouring that refusal. What would be fatal is to smooth the story into legibility, to give the audience the emotional handholds the source material deliberately withholds.

    The decision to hold shots of nearly thirty seconds, sometimes longer, with almost no plot advancement, a stairwell, a kitchen, the particular quality of afternoon light on a bloc of socialist housing, is not an affectation but a moral stance. These are the shots that conjure the atmospheres of three decades, that make one feel the weight of time passing in a specific place among specific people, rather than merely seeing it represented. <u>The long take forces the same dilation of attention that memory actually performs: things sit in the mind not in proportion to their narrative importance but in proportion to the feeling they carried.</u> That is precisely what the 1990s feel like, what the 2000s feel like, in this corner of China: heavy with weather that has no dramatic justification. <u>The most essential domestic drama of the past decade, and the most daring. Nothing else in recent Chinese cinema has trusted its audience so completely.</u>

- title: "The Batman"
  type: "film"
  creator: "Matt Reeves"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/the_batman.jpg"
  posted: "2023-01-08"
  text: |
    Among DC films it stands second only to Nolan's trilogy, which is already an unusual achievement for a franchise that has spent the better part of a decade mistaking scale for weight. What distinguishes Reeves's film is something more granular and harder to engineer: an understanding of rain not merely as atmosphere but as argument. <u>Greig Fraser's cinematography makes Gotham's perpetual wetness into a moral condition: corruption as weather, the city's rot expressed through the particular way neon reflects in standing water, the way every crime scene is also a study in fluid dynamics.</u> One has not seen rain used with this kind of intentionality in recent cinema; <u>it is the kind of formal decision that belongs to the film's ethics rather than its aesthetics.</u>

    The length, nearly three hours, generates the anxiety it is supposed to dispel in critics, but the film does not bloat because Reeves understands that pace is a function of attention, not of cutting rate. Batman here is a traumatised detective narrating a city he cannot save, and the film takes seriously the ethical asymmetry between his methods and his stated goals in a way no prior DC iteration has managed. The Riddler's terrorism-as-grievance arc is handled without the usual genre flinch: the film does not refuse to follow the logic of its villain's worldview to its uncomfortable conclusions, and the psychological collision between Batman and a figure who shares his class rage but not his self-restraint reaches heights DC has not touched in a long time.

- title: "Tár"
  type: "film"
  creator: "Todd Field"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/films/tár.jpg"
  posted: "2023-01-01"
  text: |
    The cancel arc that structures the final act is too familiar by now: the accumulated complaints, the viral clip, the institutional withdrawal of support. Field executes it with the same meticulous hand he brings to everything else, which only makes the conventionality more apparent. <u>What resists conventionality entirely is Blanchett's performance, which operates in a register so precise and so interior that one can watch the same scene twice and come away with a different account of what Lydia ***Tár*** is actually doing.</u> <u>The patterns she perceives, in the music, in her pursuers, in the acoustic bleed of the world: whether these are paranoia or perception, whether the film knows the difference, one suspects no one will ever settle the question.</u>

- title: "The Banshees of Inisherin"
  type: "film"
  creator: "Martin McDonagh"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/the_banshees_of_inisherin.jpg"
  posted: "2023-01-01"
  text: |
    Every line of dialogue is doing two jobs at once. On the surface: two men on a small island in 1923, one of whom has decided without explanation to end a long friendship, and the consequences of that decision spiralling outward into damage that cannot be undone. Underneath: the Irish *Civil War*, audible in the cannon-fire drifting from the mainland, refracted into this private conflict between two people who were once inseparable and are now enacting in miniature the same logic of principled, irrecoverable rupture. <u>McDonagh has always worked at the intersection of the absurd and the devastatingly specific, but here the surrealism is structural, built into the premise rather than applied from above: a man cutting off his own fingers as the terms of a peace that is not peace.</u>

    The emotional collisions are saturating because the framework holds them so precisely. <u>Grief, cruelty, bewilderment, the particular loneliness of the kind person in a world that has decided kindness is not enough: all of it lands.</u> <u>Farrell's performance is a beautiful thing, open-faced and undefended in a way that makes the accumulating damage almost unbearable to watch.</u>

- title: "The English Patient"
  type: "film"
  creator: "Anthony Minghella"
  creator_role: "dir."
  year: 1996
  eval: "loved"
  image: "/assets/images/thoughts/films/the_english_patient.jpg"
  posted: "2022-11-21"
  text: |
    Memory and landscape are the same thing in ***The English Patient***: the desert is not a setting but a psychic condition, indifferent to national borders and lethal to anyone who mistakes its beauty for permission. What stays, long after the plot has dissolved, is not the romance between Almásy and Katherine in any conventional sense but the images in which love becomes inseparable from loss: Count Almásy crossing the Saharan emptiness with Katherine dead in his arms, her weight against the heat, the sheer defiant absurdity of the gesture. <u>One carries that image the way one carries certain lines of poetry, not as information but as sensation.</u>

    Minghella compresses and reorders Ondaatje's novel, amplifying the central affair while quieting the postcolonial textures that surround it; critics who found the film a romanticisation of the colonial gaze are not wrong, exactly, but they are accounting for a different film than the one Minghella made. The Swimmers' Cave, with its prehistoric rock paintings of figures moving through a sea that no longer exists, gives the story its true register: not tragedy as plot mechanism but tragedy as geological fact, as the record of what was once possible in a world that has since dried out. Kip and Hana's promise to meet at the church stays because it is the kind of promise people make when they already know it will not be kept. <u>The film earns its devastation by refusing to explain it.</u>

- title: "A Confession"
  type: "film"
  creator: "Paul Andrew Williams"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/a_confession.jpg"
  posted: "2022-11-03"
  text: |
    What should have been a simple case, in the procedural sense, is drawn through PACE and one opportunist's complaint into an ever-widening vortex that swallows the victim's family, an entire investigation, and a superintendent's career. Paul Andrew Williams keeps the series scrupulously close to the documented record, and this fidelity becomes its own kind of horror: not the horror of invention but of recognition, the sickening realisation that the system which failed Sian O'Callaghan and Becky Godden-Edwards did not fail through malice but through the careful, self-protective application of rules designed for precisely such circumstances.

    <u>Martin Freeman's Steve Fulcher is constructed around a particular contradiction: the man who saves lives by breaking the law becomes the law's sacrifice, while those who hid behind procedure are protected by the very codes they invoked.</u> As Steve says in the final episode, life seems to count for nothing before rigid bureaucratic codes. The cowardly, sheltering behind the banner of 'justice,' use PACE as their shield and let the truly honourable become the sacrifice. Imelda Staunton as Karen Edwards carries the other weight entirely: what it means to need answers the system has decided are inadmissible. <u>The series is, at its core, a study in institutional cowardice dressed as institutional integrity, and it lands without a shred of comfort.</u>

- title: "Otac na službenom putu"
  title_en: "When Father Was Away on Business"
  type: "film"
  creator: "Emir Kusturica"
  creator_role: "dir."
  year: 1985
  eval: "liked"
  image: "/assets/images/thoughts/films/when_father_was_away_on_business.jpg"
  posted: "2022-10-17"
  text: |
    <u>The film is narrated by Malik, but it belongs to the women.</u> Through the Informbiro purges, through Meša's denunciation and his labour camp and his womanising and his return, two women move who were never truly loved their entire lives, and Kusturica and Abdulah Sidran refuse to sentimentalise either the politics or the marriage that frames them. The child's perspective, episodic and half-comprehending, creates the dramatic irony Kusturica needs: we see the full weight of what ideology has done to a family precisely because Malik cannot.

    The film's most quietly devastating question hangs over everything: who truly loves whom? Malik truly loves Sasha. <u>The answer is a child's, unqualified and complete, offered against a backdrop in which adults have almost entirely forgotten how.</u>

- title: "Unbelievable"
  type: "film"
  creator: "Lisa Cholodenko / Susannah Grant"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/unbelievable.jpg"
  posted: "2022-10-10"
  text: |
    The structural decision to tell this story in two temporal registers, Marie's disbelief in Washington and the Colorado detectives' methodical pursuit of a serial rapist, initially seems like a formal choice, a way of maintaining forward momentum against the weight of trauma. <u>By the end it reveals itself as something more deliberate: the two timelines are not parallel but indicting, their proximity an argument about the differential application of professional competence depending on who is doing the believing.</u>

    In the final episode, when Chris is being interviewed by the FBI, she mentions that the Washington case left behind a great deal of evidence. The implication hangs there: so what exactly was going through the minds of those detectives in the first two episodes, especially that self-righteous older man, when they blamed Marie? Cholodenko refuses to make this a simple failure-of-empathy story, though it is that too. <u>The more devastating charge is simpler and less forgivable: they were not even doing their jobs.</u> <u>Empathy is not a requirement of police procedure; accurate evidence collection is.</u> The cowardice of calling disbelief an inability to relate collapses entirely when one observes that relating was never the professional minimum in the first place. Kaitlyn Dever carries every consequence of this argument in her face, and the show is wise enough to let her.

- title: "Neal Brennan: 3 Mics"
  type: "film"
  creator: "Neal Brennan"
  creator_role: "dir."
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/films/neal_brennan_3_mics.jpg"
  posted: "2022-08-26"
  text: |
    Three microphones on a bare stage: one for one-liners, one for stand-up, one for what Brennan calls 'emotional stuff.' The conceit sounds like a therapy exercise dressed up as a format, and frankly it is, and the staging makes no pretence otherwise. Critics were quick to position it alongside the wave of confessional comedy that *Nanette* (2018) would later crystallise into a genre, but Brennan got there earlier and without the retrospective theorising. The one-liners are sharp enough that the pivots to the centre mic never feel like relief; they feel like a change in atmospheric pressure.

    The emotional centrepiece is the story about his father. Brennan's father had ten children with four women and, by all accounts, treated none of them well; Brennan tells the story with a compression that makes the pauses between sentences feel load-bearing. Obviously staged, those pauses, rehearsed into apparent spontaneity through months of Off-Broadway performance before Netflix ever touched it. It doesn't matter. <u>The story works precisely because it has been worn smooth, because Brennan has told it enough times to find its exact shape.</u> <u>Some emotions don't require rawness to transmit; they require precision.</u> Emotions transcend time and space, as the original note says, and this one crosses the footlights intact every time.

- title: "色，戒"
  title_en: "Lust, Caution"
  type: "film"
  creator: "Ang Lee"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/lust_caution.jpg"
  posted: "2022-08-14"
  text: |
    Eileen Chang's novella is a cold, compressed thing: a woman who mistakes embodied desire for political commitment and pays for the confusion with her life. Ang Lee's adaptation won the Golden Lion at Venice and generated a great deal of noise about its explicit sex scenes, which was in many ways the wrong argument to have. <u>The scenes matter not as provocation but as epistemology: they are how the film tracks the redistribution of power between Wang Jiazhi and Mr. Yee, the shift from her instrumentalising his desire to something more catastrophic and mutual.</u> The mahjong sequences perform the same function with their clothes on. Rodrigo Prieto's cinematography keeps everything lush and airless simultaneously, the occupied Shanghai interiors beautiful in the way that traps are beautiful.

    Tang Wei's performance is, without qualification, one of the great debut performances in cinema. She has to be at least four things at once: the student activist, the operative, the woman genuinely lost in what she thought she was only performing, and the person who in her final moments before execution chooses, again, to live for someone else. That last compound of self-erasure and genuine feeling is the film's impossible centre, and she holds it. The irony the original note identifies is real and worth sitting with: Tang Wei was effectively blacklisted from mainland Chinese media following the film's release, her advertisements pulled, her career in China dismantled, while Tony Leung, who shared every explicit scene, faced no consequences whatsoever. <u>The film is about a woman used by everyone around her and then discarded; its aftermath reproduced the structure precisely.</u>

- title: "かぐや姫の物語"
  title_en: "The Tale of Princess Kaguya"
  type: "film"
  creator: "Isao Takahata"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/the_tale_of_princess_kaguya.jpg"
  posted: "2022-07-29"
  text: |
    The theory formed during the film and hasn't dissolved since: Kaguya spends her entire life living for men and the social order men built. Her father is the engine of her conformity, projecting onto her a vision of noble femininity that has nothing to do with who she is; her mother is the opposite pole, representing the natural life and the individual she might have been, but entirely without the authority to protect her. <u>What the court offers is not elevation but a more elaborate form of captivity.</u> Takahata's source material, the ancient Taketori Monogatari, treats Kaguya as an object of male longing; he gives her interiority, grief, and a rage so intense that the flight sequence, when she tears through the village in desperation, becomes one of animation's most viscerally honest moments.

    <u>The ascension at the film's end is not rescue.</u> The moon-people arrive with their lotus procession and their forgetfulness, and there is something unmistakably funerary about it: the lunar robe carries an uncanny echo of the Meng Po soup, that Chinese mythology's instrument of oblivion, the draught that strips a soul of everything it knew before sending it onward. Kaguya weeps as the robe settles over her shoulders. She has finally found in the woodcutter's grandson, in the seasons, in the particular texture of the world she was exiled into, something worth living for; and the moon takes it all away. <u>One is not watching a return to celestial origin. One is watching a silent death, grief transmuted into visual poetry so fine it barely announces what it is.</u> 虫　鳥　獣　草　木　花

- title: "The Painted Veil"
  type: "film"
  creator: "John Curran"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/the_painted_veil.jpg"
  posted: "2022-07-05"
  text: |
    John Curran shot on location in Guangxi province, and the landscape does the kind of work that landscape can only do when it is real: the mist over the mountains, the cholera-stricken village, the particular quality of light in a place that has never accommodated the people passing through it, all of it pressing on the characters in ways that studio work cannot simulate. Alexandre Desplat's score keeps the emotional register from tipping into sentimentality, and Ron Nyswaner's screenplay is disciplined about what it takes from Somerset Maugham and what it quietly sets aside. Maugham's novel is a colder thing, more sardonic about Kitty, less interested in redemption as a category; the film softens this, which is a concession, and one that Maugham purists reasonably note. Set against the world of Westerners living in China during the colonial period, though, the film's emotional texture is flawless: the discomfort of privilege in a place it has damaged, the impossibility of genuine connection across the distance that colonialism manufactures even between two people who love each other, all of it present without being declaimed.

    Short in runtime and every character fully dimensional. <u>Edward Norton's Walter Fane, bacteriologist, is a man who chose medicine because it was the only arena in which his emotional rigidity could pass as virtue; Naomi Watts's Kitty moves from opacity to something genuine without the transformation being announced.</u> <u>The quietest film, the most fluid. It stays.</u>

- title: "Ricky Gervais: SuperNature"
  type: "film"
  creator: "Ricky Gervais"
  creator_role: "by"
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/ricky_gervais_supernature.jpg"
  posted: "2022-05-26"
  text: |
    Markedly different from *Humanity* (2018), *Politics* (2004), *Animals* (2003), and the earlier specials. The material is looser: the show calls itself SuperNature but relatively little of it is about the supernatural, and there is considerably more reliance on offence and irony, more of those so-called 'dark jokes', which is also why there is more self-clarification than before. The controversy was predictable and, in its broad outlines, not entirely without basis: the trans material walks a line that not everyone will find it walks successfully, and the irony defence, deployed mid-set, is a formal risk that the audience has to accept or reject in real time. One does not see this as a regression. The self-clarification is part of the argument, not a concession to it; <u>Gervais is interested in the mechanism of offence, in what the joke reveals about the listener as much as the told, and the self-aware structure is the means of that investigation rather than a retreat from it.</u>

    The comparison with Jimmy Carr is instructive. There is a kind of dark comedian who operates by accumulating transgression, by stockpiling the forbidden: the joke is simply that the thing has been said. Gervais has never been that comedian, and the distance between the two positions has widened into something more like a gulf. <u><em>SuperNature</em> is the stand-up set that has made one laugh the most in recent years, and it is not close.</u> The Jimmy Carrs of the world could perhaps have shared a stage with Ricky Gervais five or ten years ago. They cannot anymore.

- title: "Die Wannseekonferenz"
  title_en: "The Wannsee Conference"
  type: "film"
  creator: "Matti Geschonneck"
  creator_role: "dir."
  year: 2022
  eval: "meh..."
  image: "/assets/images/thoughts/films/die_wannseekonferenz.jpg"
  posted: "2022-05-18"
  text: |
    Quite disappointing, and the disappointment has a formal source: the film cannot decide what it is. As dramatic reconstruction it does a poor job of dissecting the historical record or metabolising information into something an audience can feel rather than merely register; as documentary it refuses the tools that might make the material illuminating. <u>The result is the sensation of reading conference minutes for ninety minutes, the horror present at the level of content but absent at the level of form.</u> The comparison with the 2001 HBO film *Conspiracy* (2001), with Kenneth Branagh as Heydrich, is not flattering to Geschonneck: that earlier version understood that bureaucratic evil requires a particular kind of dramatic architecture, one that makes the banality visible as banality rather than simply presenting it.

    The performances are the one unambiguous achievement. <u>The cast captures that nonchalant, administrative quality with precision: men who discuss genocide the way one discusses supply logistics, the indifference itself a form of violence.</u> There are a few moments that land with real unease. But the body of Holocaust cinema is already rich with works that make the horror legible in its full inhumanity: this one adds almost nothing to that inheritance.

- title: "This Is Going to Hurt"
  type: "film"
  creator: "Lucy Forbes"
  creator_role: "dir."
  year: 2022
  eval: "loved"
  image: "/assets/images/thoughts/films/this_is_going_to_hurt.jpg"
  posted: "2022-03-12"
  text: |
    Ben Whishaw is perfect casting not because he makes Adam Kay sympathetic but because he makes him credible. The veneer of sardonic indifference, the nonchalance deployed as clinical distance, sits entirely naturally on Whishaw, and for much of the series one is in danger of accepting it at face value. What Adam Kay's own script, adapted from his memoir, achieves with real intelligence is the gradual dismantling of the reader-identification that the book's first-person voice always risked flattering: the diary format invites complicity, but the television form allows other perspectives to accumulate around Adam's self-portrait until the gaps become impossible to ignore.

    Because Adam is not, at bottom, someone concealing a fragile heart beneath thorny wit. <u>He is a coward who mistakes competence for character, who is overconfident precisely where confidence is most dangerous, and who lacks the capacity for self-reflection that might, in time, correct either of these things.</u> The decision to leave the NHS for a comfortable private practice is not a breakdown or a trauma response; it is the logical expression of what he is. Whether he is a brilliant doctor is debatable and the show has the honesty to leave it so. As a human being, the evidence accumulates toward something less comfortable than the memoir's admiring readership generally acknowledges.

    Ambika Mod's Shruti is the counterweight the show needs and uses without sentimentality: her trajectory does not exist to redeem Adam or to punish him but to insist that the system's costs are not evenly distributed. Lucy Forbes directs with precision, holding the comedy and the institutional horror in equilibrium through episodes that lesser handling would allow to tip into either farce or melodrama. <u>Only Ben Whishaw could make that rottenness this watchable, which is itself a kind of moral provocation the show earns.</u>

- title: "The French Dispatch"
  type: "film"
  creator: "Wes Anderson"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/the_french_dispatch.jpg"
  posted: "2022-01-17"
  text: |
    'Try to make it sound like you wrote it that way on purpose.' That line, spoken by Arthur Howitzer Jr. to one of his writers, is both editorial advice and a compressed statement of Wes Anderson's entire method: the artefact so controlled that it no longer reads as control but as inevitability. ***The French Dispatch*** is, on its surface, a celebration of a certain kind of humanist magazine journalism, of the idiosyncratic mind let loose on a subject it loves. The technical and visual dimension goes without saying. What one does not quite anticipate is the emotional register underneath the symmetry.

    What moves one in The French Dispatch is not the stories' surfaces but their withholding: the painter behind glass, the journalist who keeps her professional distance even at the cost of connection, the student leader whose revolutionary moment is already receding by the time it arrives. Each figure seems to be enclosed within an invisible wall, surrounded by companions and yet fundamentally alone, sealed inside their own obsession. <u>This is precisely the kind of loneliness that Anderson's detached, mechanical filmmaking style is equipped to capture: isolation rendered as aesthetic system, grief held at arm's length and thereby made visible.</u>

    Long-time Anderson viewers will find the film both familiar and disorienting; the disorientation comes from 'moving' and 'delicate' being exactly the right words, which they rarely are for his work. Of all his films, The French Dispatch is the most tender. <u>One does not always notice tenderness when it is this well-armoured.</u>

- title: "Don't Look Up"
  type: "film"
  creator: "Adam McKay"
  creator_role: "dir."
  year: 2021
  eval: "liked"
  image: "/assets/images/thoughts/films/dont_look_up.jpg"
  posted: "2022-01-11"
  text: |
    The satirical premise is sound, and when the film lands it lands with real force: the transformation of a nervous academic into a media-managed celebrity scientist is DiCaprio's finest comic work, and the bureaucratic inertia of the Planetary Defence sequences has the bleak accuracy of genuine institutional satire. The problem is inconsistency of confidence. McKay seems uncertain whether he is making a film or delivering a brief, and that uncertainty produces sequences, particularly the two post-credits additions and the film's broader treatments of political media, that abandon the register entirely for something closer to sketch comedy. <u>'Dark comedy' names a tonal contract; one cannot honour it selectively.</u> <u>The satire is good when it trusts itself.</u> Everything else is carried by DiCaprio, which is a narrow base for a film of this ambition.

- title: "The Last Duel"
  type: "film"
  creator: "Ridley Scott"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/the_last_duel.jpg"
  posted: "2022-01-02"
  text: |
    To call it a medieval 'Me Too' film is accurate but insufficient, the label flattening what the film does with the *Rashomon* (1950) structure into something tidier than it deserves. Whatever the outcome, whatever the truth of the matter, everything remains about men: their reputations and their rights, their fiefs and their property. The film's most telling formal gesture is the one it makes with chapter titles. All three chapters are titled 'The truth according to' their respective subjects; but in chapter three, the words 'according to Lady Marguerite' fade from the screen, leaving only: 'the truth.' <u>The quiet certainty of that subtitle is more devastating than any argument the film could have made aloud.</u>

    Matt Damon's Carrouges is the film's structural centrepiece and its most deliberately uncomfortable achievement. He pursues the duel not for Marguerite but for his own punctured honour, and the screenplay written with Nicole Holofcener never lets one forget it. The stud horse scene, so briefly placed and so precisely chosen, is the most emblematic metaphor in the entire film: Carrouges inspecting the animal's breeding potential with the same proprietary satisfaction he brings to every claim he makes on Marguerite. Jodie Comer carries chapter three with a stillness that accumulates unbearable weight. Her victory at the end is not a triumph; it is survival, and the film does not pretend otherwise.

    The duel sequence itself is as physically and viscerally gripping as anything in *Game of Thrones* (2011), the mud and desperation stripping the ritual of any glamour. But what comes after matters more: a single shot of a woman watching, free for now but tethered to a world that will never actually change its mind about her. <u>Scott has made brutal, masculine spectacles for forty years. This one finally knows what it is looking at.</u>

- title: "Dopesick"
  type: "film"
  creator: "Barry Levinson"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/dopesick.jpg"
  posted: "2021-12-05"
  text: |
    The *Chernobyl* (2019) of the opioid world: multiple storylines interwoven across collapsing timelines, with recovery, moments of triumph, and then disappointment, compromise, and heartbreak, the pattern repeating the way addiction itself repeats, the remission always shadowed by what is still in the bloodstream. Danny Strong's scripts are ruthless in their structure, refusing the comfort of a clean villain. Purdue Pharma and the Sacklers are indicted, yes, but so is the FDA that approved the labelling, the doctors who signed the scripts, the entire healthcare apparatus that treated pain management as a market opportunity. <u>Michael Stuhlbarg's Richard Sackler is chilling because he never stops believing his own story: the drug works, the addicts are addicts by character rather than by design, and any other interpretation is a failure of will.</u>

    Michael Keaton gives the best performance of his second career as a small-town doctor who slowly realises what he has been made complicit in. The scene where he finally confronts a Purdue sales representative is not the catharsis one might expect; it is too late, too full of grief, and Keaton plays it as a man trying to find somewhere to put a remorse that has nowhere to go. Kaitlyn Dever's addict arc is the emotional spine of the series, and the show earns its devastation honestly, never aestheticising the suffering or offering easy redemption.

    What is most remarkable is that the final episode does not let Purdue off the hook even as it dispenses something like resolution. The brand continues to be indicted in the closing minutes, and the coda lands with the force of a public health report: OxyContin is still on sale across America. <u>One does not know whether to grieve or simply go numb, and the series knows this, which is why it closes there, in that exact paralysis, and does not blink.</u>

- title: "The Midnight Gospel"
  type: "film"
  creator: "Pendleton Ward & Duncan Trussell"
  creator_role: "created by"
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/the_midnight_gospel.jpg"
  posted: "2021-09-05"
  text: |
    The first episode drifts, and the drifting feels like the usual unreliable-narrator gambit, a pilot that withholds its organising logic as a hook. By the second episode something else becomes visible: the vignettes are not self-contained at all. Running beneath the kaleidoscopic imagery, beneath the interviews with meditation teachers and the surrealist carnage of dying simulated universes, is the quieter through-line of Clancy's own psychological transformation. <u>The two tracks, the formal novelty and the interior arc, hold each other in a tension that turns out to be the show's real subject.</u>

    Making peace with oneself, forgiving the aspects of oneself one refuses to acknowledge: the show roots this in Buddhist thought, specifically in the Tibetan traditions around impermanence and conscious dying, but grounds it with examples concrete enough that the abstraction never floats free. The final episode, in which the real Duncan Trussell interviews his late mother about her terminal cancer, is the most direct treatment of death-awareness in recent television, and it earns its devastation because the preceding episodes have done the slow work of making Clancy's interiority legible. Even amid the most chaotic imagery, one can relate to him and to his interlocutors. <u>The show makes spiritual intelligence feel like an ordinary human capacity. That is rarer than it sounds.</u>

- title: "Odd Taxi"
  type: "film"
  creator: "Baku Kinoshita"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/odd_taxi.jpg"
  posted: "2021-09-03"
  text: |
    The pacing and the art style take a few episodes to settle into, and the early stretches can feel like an ensemble slice-of-life with unusually precise dialogue. Then, somewhere around episode five or six, a *Paranoia Agent* (2004)-style deja vu sets in: the sense that every detail has been placed, that the show's universe is a closed system and one has been walking around inside it without noticing the walls. Right at that moment Shanji floated a hypothesis, one that later proved remarkably accurate, and carrying that hypothesis all the way to the end, one could only think: I must have been blind to not see this coming.

    What Kinoshita and writer Kazuya Konomoto achieve is the purest form of fair-play mystery: nothing is withheld, every line pays off, every background character is load-bearing. <u>The anthropomorphic aesthetic is not whimsy but method, a perceptual estrangement that lets the show's social commentary, on loneliness, on idol culture, on the small predations of modern life, land without the weight of realism pressing down on it.</u> <u>Satoshi Kon's ghost hovers over the whole enterprise, but ***Odd Taxi*** earns the comparison rather than merely invoking it.</u> Absolutely brilliant.

- title: "Blade Runner 2049"
  type: "film"
  creator: "Denis Villeneuve"
  creator_role: "dir."
  year: 2017
  eval: "loved"
  image: "/assets/images/thoughts/films/blade_runner_2049.jpg"
  posted: "2021-08-01"
  text: |
    The proposition is ancient: creator and created, much like giver and receiver, seeking to erect an order of domination built on the accident of origin, an order that declares itself permanent. The ending is therefore self-evident from early in the film's runtime; <u>the question it is actually asking is not what will happen but whether the structure can survive contact with the feeling it generates.</u> It cannot, and the film knows it cannot, and that foreknowledge gives every frame a quality of elegy.

    What Villeneuve and Roger Deakins achieve together is the full realisation of a particular science-fictional imagination, one whose closest literary antecedent is Tarkovsky's *Solaris* (1972): <u>the idea that outer space, or its equivalent, is finally a mirror for interior states, and that the most advanced imaging technology is most useful when it renders smallness rather than spectacle.</u> Everything that *Solaris* gestured toward but Soviet-era cinema could not render at full visual scale is here given that scale. Deakins' Oscar for this film was overdue by a decade; the protein farm alone, the holographic sea, the Las Vegas ruins in their orange haze, constitute a visual argument that commercial cinema can still aspire to the sacred.

- title: "Stalker"
  type: "film"
  creator: "Andrei Tarkovsky"
  creator_role: "dir."
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/films/stalker.jpg"
  posted: "2021-07-28"
  text: |
    Death is the dominant note, and all the science-fiction elements converge in that final shot. The preceding 150 minutes claim to adapt *Roadside Picnic* (1972), but it would be more accurate to say they inherit the Strugatsky Brothers' concept and then hollow it out: the multiple Zones, the named protagonist, the pulp-adventure energy all gone, replaced by a single unnamed Zone of ambiguous origin, three archetypes, and the long take deployed not as style but as phenomenology. Tarkovsky is not describing a journey; he is sculpting the duration of faith itself.

    On a first viewing, death feels central: the ***Stalker***'s image at the mouth of the tunnel, 'the more something grows, the stronger it becomes, the closer it draws to death; only what has just been born is closest to softness', lingers as a kind of thesis. The Professor and the Writer move toward the Room and grow bolder, more 'certain'; the dialogue at the Room's threshold then enacts a reversal from strength to softness, from suppression to eruption, from the certainty of death back toward the possibility of life. The film breathes differently after that threshold. Everything feels newly born.

    And then the final shot: Monkey, the Stalker's daughter, born already marked by the Zone, moving the glasses across the table while Beethoven plays and the train shakes the walls. Tarkovsky holds the shot long enough to make the question of mechanism irrelevant. The last glass moves after the vibration stops. <u>Whether that is miracle or coincidence is the least interesting thing about it: what matters is that the film has earned the moment, that 150 minutes of suppression and smallness have made the possibility of the transcendent feel like the only honest place to end.</u> <u>One does not walk away from ***Stalker***; one is slowly released by it.</u>

- title: "Django Unchained"
  type: "film"
  creator: "Quentin Tarantino"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/films/django_unchained.jpg"
  posted: "2021-07-26"
  text: |
    A story of the utmost simplicity, with only one dramatic reversal in the whole film, yet the screenplay and cinematography still manage to lead one by the hand. Robert Richardson's widescreen compositions, all amber plantation interiors pressing against sunblasted exteriors, do something more than establish period: <u>they externalise the film's central argument, which is that beauty and atrocity are not opposites but neighbours.</u> Having now seen several of Tarantino's pictures, I think I understand: his films are about the sheer visceral pleasure of watching.

    The usual objection is that pleasure is the wrong response to slavery. Fair enough, and the argument has been made with real force. But Tarantino's method is not exactly naivety, and it is not exactly exploitation either. By routing the liberation fantasy through genre, through the Spaghetti Western and blaxploitation traditions, through the Nibelung myth translated into Mississippi soil, he creates a frame inside which the audience's enjoyment becomes the subject. The sensation of vast historical weight and suffocating helplessness pressing against each other on screen is something precious few directors can produce. That Christoph Waltz's Dr Schultz must die precisely because his Enlightenment scruples cannot survive Candie's world is not sentimentality. It is the film's most honest admission: <u>some moral positions cost everything, and the screen does not protect one from the bill.</u>

- title: "Inglourious Basterds"
  type: "film"
  creator: "Quentin Tarantino"
  creator_role: "dir."
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/films/inglourious_basterds.jpg"
  posted: "2021-07-19"
  text: |
    A masterwork of Hitchcock-style tension: every chapter makes one's palms sweat, and the climax of the final chapter is, ironically, the least brilliant of the lot. What Tarantino understood from Hitchcock, and applied with rare thoroughness, is the distinction between surprise and suspense. <u>Surprise gives the audience one second of shock; suspense gives it twenty minutes of dread.</u> The bomb under the table, as Hitchcock famously put it. In ***Inglourious Basterds***, the audience carries the weight of dramatic irony through nearly every scene, watching conversations unfold with the knowledge that any word could detonate the situation.

    The tavern sequence in Chapter Four is the purest expression of this: a room full of people who know almost everything except the one thing that would save them. Tarantino's camera holds on a face, a hand, a glass of whisky, and the accumulated stillness becomes agonising. <u>Christoph Waltz's Hans Landa belongs in the company of Hitchcock's most charming antagonists: danger located entirely in pleasantness, in the virtuoso performance of social grace.</u> The film is also, at another level, a meditation on cinema itself as a weapon, a fantasy of history rewritten through the sheer force of the image. Effortlessly smooth. The kind of film that makes one aware of one's own breathing.

- title: "The Lobster"
  type: "film"
  creator: "Yorgos Lanthimos"
  creator_role: "dir."
  year: 2015
  eval: "liked"
  image: "/assets/images/thoughts/films/the_lobster.jpg"
  posted: "2021-07-11"
  text: |
    The metaphor is obvious; so obvious it sometimes feels less like a story than a pile of stacked metaphors, each one labelled. Two totalitarian regimes, the Hotel's enforced coupling and the Loners' enforced solitude, frame the space between them as the only territory where something like authentic desire might exist, except of course that territory is also a trap. Lanthimos works in the tradition of Brechtian alienation, flat delivery and ritualistic movement and classical music laid over mundane violence, and when the method is working it produces the cold clarity of thought made flesh.

    Certain passages feel closer to the kind of cinematic poetry one finds in *The Colour of Pomegranates* (1969), pure image and sensation unmoored from narrative obligation. But the plot keeps pulling one out of the imagery and the metaphorical register, back into the mechanics of allegory, and <u>here the allegory strains against the particularity it needs, the mechanics of the metaphor crowding out the texture of lived experience.</u> The score's use of the tritone is equally heavy-handed: the cello staccato motif is striking and apt at first, the diabolus in musica as social prescription, but deploying the same motif unchanged in the second half starts to feel like laziness rather than rigour. All that said, on balance the virtues outweigh the flaws. The film earns its Cannes Jury Prize. <u>It earns it, and it knows it, and that smugness is its most human quality.</u>

- title: "They Live"
  type: "film"
  creator: "John Carpenter"
  creator_role: "dir."
  year: 1988
  eval: "meh..."
  image: "/assets/images/thoughts/films/they_live.jpg"
  posted: "2021-07-11"
  text: |
    Came here via Žižek, which is both the most honest and the most damning thing one can say about a film. The sunglasses are a near-perfect materialisation of what Žižek calls 'going through the fantasy': the ideological curtain not hidden behind reality but constituting it, readable only once one learns to look. OBEY. CONSUME. MARRY AND REPRODUCE. <u>The subliminal grammar of late capitalism rendered in neon, legible at last.</u> Carpenter made the film as a direct assault on Reaganite consumerism, and that directness is both its strength and its limitation.

    The discomfort is not with the politics but with the method. Old cinema's reflex is to externalise everything: inner resistance becomes a six-minute alley brawl, ideology becomes a physical pair of glasses one can put on and take off. The metaphor does not breathe; it overflows the frame. Žižek reaches for this film precisely because the interpretation almost writes itself, which is to say the film does the critic's work for him. There is something faintly disappointing in that. <u>Carpenter's rage is genuine, the allegory is effective, and yet one leaves feeling the film has been more useful to theory than to cinema.</u>

- title: "Dallas Buyers Club"
  type: "film"
  creator: "Jean-Marc Vallée"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/dallas_buyers_club.jpg"
  posted: "2021-07-09"
  text: |
    Jean-Marc Vallée's film does something event-based drama rarely manages: it moves one not through accumulated sentiment but through a specific, located image. McConaughey surrounded by monarchs, the butterflies indifferent to his dying body, and the waterworks simply would not stop from that moment on. <u>The scene earns its beauty because nothing before it has been beautiful in that way; the film's visual grammar is otherwise raw, handheld, documentary-adjacent, and the sudden stillness lands like a blow.</u> McConaughey lost nearly fifty pounds for this role and the performance goes far beyond the physicality: Ron Woodroof begins as a homophobic rodeo cowboy and ends as an unlikely advocate, and the transformation never once feels schematic.

    The film has since accumulated a retrospective criticism worth absorbing: Rayon is a composite fictional character, and casting Jared Leto, however fully committed, in a transgender role raises questions the film itself cannot answer. The libertarian framing of the FDA as villain has been read as politically convenient, sidelining the collective activism of ACT UP in favour of a lone-wolf narrative. These are real tensions, and they sit inside the film whether one wants them to or not. And yet Leto's performance remains, whatever one thinks of the casting: there is a scene where Rayon, dying, visits her estranged father in a suit, and the controlled devastation Leto brings to it belongs to a different, better film straining to get out. Jared Leto was, for a period, made for roles that demand this kind of dissolution.

    Vallée holds the whole thing together through restraint: the camera never editorialises, the score never tells one what to feel, and the film's political anger stays in the body rather than the dialogue. <u>It is not a perfect film. It is a powerful one, and the butterflies refuse to leave.</u>

- title: "Mighty Aphrodite"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1995
  eval: "loved"
  image: "/assets/images/thoughts/films/mighty_aphrodite.jpg"
  posted: "2021-06-28"
  text: |
    Like more than half of Allen's films it centres on a couple in marital crisis, but here the arrival of a child is itself half the source of conflict: adoption as the event that crystallises, rather than resolves, every unspoken tension between Lenny and Amanda. The domestic comedy is familiar Allen territory; what is not familiar is the frame. The Greek chorus, shot at the ancient theatre of Taormina in Sicily and led by F. Murray Abraham with the weary authority of a man who has seen this particular tragedy too many times, functions simultaneously as parody and as genuine moral commentary. Cassandra prophesies and is ignored; Tiresias holds court; the chorus expresses exasperation in chorus, the classical machinery of fate grinding against the banality of *Manhattan* (1979) real estate and neurotic self-deception. <u>The anachronism is the joke, but the joke earns its keep.</u>

    Mira Sorvino's Linda Ash, the biological mother Lenny unearths, is the film's quiet centre of gravity, and the Academy Award was not wrong. She is written as lowbrow, naive, cheerfully indestructible, and Sorvino plays her without condescension, making Linda the only character in the film who seems entirely at peace with who she is. The comedy of Lenny's Aristophanic hubris, his need to locate and improve the source of his son's genetic inheritance, rebounds off her imperviousness to improvement. <u>Allen choreographs the collision between the elevated classical frame and Linda's cheerfully unreconstructed existence with the timing of someone who has spent fifty years listening to jazz: each cut lands where the beat falls.</u> Impulse drives everyone in this film slightly mad, and it is all the more pleasurable for that.

- title: "Radio Days"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1987
  eval: "loved"
  image: "/assets/images/thoughts/films/radio_days.jpg"
  posted: "2021-06-27"
  text: |
    Allen has always been a filmmaker of voices, but ***Radio Days*** is the film where the voice is the subject. The unnamed narrator, Allen himself, circles through a mosaic of 1940s Queens and *Manhattan* (1979) memories without ever quite landing in one: a story begins, glows briefly, and gives way to another, the whole structure mimicking the experience of tuning a dial through stations late at night. The comparison to Fellini's *Amarcord* (1973) is inevitable and not wrong, but where Fellini's nostalgia has a peasant's earthiness, Allen's is urban, bookish, shot through with the particular frequency of radio: <u>a medium that required the listener to build the world from sound alone, the way memory builds it from what survives.</u>

    The radio binds the film's scattered episodes together the way a melody binds variations: Rockaway and Manhattan, working-class family and glamorous studio, all tuned to the same signal. What the film understands, and what makes it quietly devastating rather than merely warm, is that radio voices are the voices of people one never sees, and memory works the same way. Allen's narrator confesses uncertainty, skips over gaps, romanticises without apology, because the point is not reconstruction but feeling: <u>the feeling of a world that existed in full and is now accessible only as signal, and a weakening one at that.</u> From one story to the next, from domestic comedy to radio studio to Rockaway beach, everything circles around voices that belong only to the past. These voices only get dimmer and dimmer.

- title: "Det sjunde inseglet"
  title_en: "The Seventh Seal"
  type: "film"
  creator: "Ingmar Bergman"
  creator_role: "dir."
  year: 1957
  eval: "loved"
  image: "/assets/images/thoughts/films/the_seventh_seal.jpg"
  posted: "2021-06-27"
  text: |
    Bergman said the human face was the great subject of cinema, and ***The Seventh Seal*** is the proof of concept. Shot by Gunnar Fischer in a black-and-white that owes its soul to German Expressionism, with skies so luminously white they seem to belong to another physics entirely, the film stages its 14th-century plague allegory as a sequence of close confrontations: knight and Death across a chessboard, the knight's weathered face on one side of the frame, Death's chalk-white mask on the other. The chess match is the film's central metaphor for exactly what it seems to be a metaphor for, a delay of the inevitable while one tries to find something worth the delay, and Bergman gives it the visual grammar of a duel between symmetrical forces.

    Max von Sydow was twenty-seven when he played the knight, Antonius Block, which is remarkable only because Block feels like a man who has been alive too long. <u>He carries the exhaustion of someone returned from the Crusades to find God silent and pestilence everywhere, a man who has asked the question and received nothing but the rustle of the cloak.</u> What stays with one most, on a first encounter especially, is not the iconography, which is impossible to see fresh after a century of parody and homage, but the way Bergman films the faces of the ordinary people: the juggler, his wife, the girl condemned for witchcraft. <u>Death permeates every corner of the frame, not as spectacle but as weather, the atmosphere in which every human expression is suspended.</u> The final silhouette on the hilltop is the image the film was always moving towards. It earns it.

- title: "Manhattan Murder Mystery"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1993
  eval: "loved"
  image: "/assets/images/thoughts/films/manhattan_murder_mystery.jpg"
  posted: "2021-06-25"
  text: |
    Allen made *Husbands and Wives* (1992) in 1992 with a handheld camera and the energy of a controlled demolition, every marriage in it cracking along pre-existing fault lines. ***Manhattan Murder Mystery***, made the following year with Marshall Brickman, his old *Annie Hall* (1977) collaborator, is the tonal antidote: lighter, swifter, warmer, and just as structurally precise. The mystery plot functions as couples therapy by other means, Carol's obsessive pursuit of the possible murder next door dragging Larry out of comfortable inertia, <u>their shared project of amateur detection doing what decades of marriage had not quite managed to do, making them interesting to each other again.</u> At one hundred tight minutes, every scene does double work: advancing the mystery while documenting the marriage.

    The casting of Diane Keaton and Alan Alda is part of the argument the film is making. Keaton brings the chemistry she and Allen built across *Annie Hall* (1977) and everything since, the bickering shorthand of two people who share a private language built from years of irony and proximity. Alda as Ted functions as the live threat to Larry's complacency, charming and attentive and just attentive enough to Carol to keep Larry honest. Anjelica Huston's Marcia, glamorous and theatrical, completes the quadrangle, a foil for everything Carol has sublimated into suburban routine. The screenplay is packed with reversals, each one landing with the click of a well-made mechanism. It is about murder, yes, and also about the clash of passion and interest between partners, about marital crisis, about real love: all of it compressed into a thriller that never forgets it is a comedy. <u>One of Allen's finest, and one that has never quite received its due.</u>

- title: "The Wind That Shakes the Barley"
  type: "film"
  creator: "Ken Loach"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/the_wind_that_shakes_the_barley.jpg"
  posted: "2021-06-21"
  text: |
    Loach won the Palme d'Or at Cannes with this, and the British press responded with the kind of outrage that confirms a film has found a nerve. The charges of anti-British propaganda are worth examining for a moment, because what is interesting about ***The Wind That Shakes the Barley*** is precisely that it refuses the comfort of a settled moral position. Loach and screenwriter Paul Laverty side with the IRA, yes, and the film does not pretend otherwise, but they construct the debate around the 1921 Anglo-Irish Treaty with enough rigour and enough specific detail that the Free State arguments are presented as genuinely made, not as straw targets. <u>Teddy's reasoning is comprehensible; Damien's counter-reasoning is comprehensible; the tragedy is that both are right about different things, and that the difference is eventually fatal.</u>

    The ambush sequences are shot with the credibility of someone who understands that violence is unglamorous and procedurally specific, not cinematic in the Hollywood sense. The torture scene in the farmhouse has the same quality: no score, no cutaways that aestheticise the suffering, just the room and the people in it and the thing that is happening. Cillian Murphy carries Damien from idealism to something harder and more costly with a quietness that the film's restraint demands and his performance supplies. <u>What emerges is the portrait of a man, and a movement, discovering that liberation, once achieved, immediately raises the question of what it was achieved for, and that the answer is not obvious.</u> Loach commands every type of shot with equal mastery: the intimate scene and the wide landscape, the debate and the ambush, all held at the same register of unsparing attention.

- title: "Love Letter"
  type: "film"
  creator: "Shunji Iwai"
  creator_role: "dir."
  year: 1995
  eval: "liked"
  image: "/assets/images/thoughts/films/love_letter.jpg"
  posted: "2021-05-31"
  text: |
    The opening stays with Hiroko, and for a while the film's melancholy is precise: grief metabolised as correspondence, memory reconstructed through the uncanny mirror of a stranger who shares a dead man's name. Iwai shoots Otaru in winter whites that feel less like a location than an emotional register, and Miho Nakayama's dual performance earns its reputation. The doppelgänger conceit, which draws inevitable comparisons to Kieślowski's *The Double Life of Véronique* (1991), works here because Iwai is rigorous about what it means: <u>the coincidence of names and faces doesn't resolve grief, it refracts it.</u>

    The second half is where one's patience gets tested. What had been restrained tips into melodrama for its own sake, the film visibly straining to achieve the cathartic release it has been deferring, and the result is sentiment without the structural justification for it. The male lead doesn't help: every scene in which he speaks actively undermines whatever emotional logic the film had been assembling. <u>It is the kind of performance that makes one aware of the effort in real time, which is precisely the thing a performance of this kind cannot afford.</u>

- title: "The Father"
  type: "film"
  creator: "Florian Zeller"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/the_father.jpg"
  posted: "2021-04-02"
  text: |
    Watching this, one involuntarily draws the comparison with *Amour* (2012): both films orbit the dissolution of an elderly person's grip on the world, both refuse the sentimental consolation that most films about ageing reach for, and both are, in their very different ways, formally uncompromising. The comparison is worth making only to note where Zeller departs from Haneke's rigorous external gaze. *Amour* (2012) watches from outside. ***The Father*** goes inside and stays there.

    The technique Zeller uses, adapted from his own stage play, is to install the audience within Anthony's deteriorating subjectivity without announcing it. The apartment reconfigures. Actors shift between scenes without explanation. Time folds back on itself. These are not surrealist devices, not Kaufman-style experiments in ontological instability for their own sake: they are clinical descriptions of what Alzheimer's feels like from within, and the accuracy is what makes the film's third act so distressing. <u>Hopkins does not perform confusion; he inhabits a state in which confusion is indistinguishable from reality, which is a different thing entirely.</u>

    What Zeller adds to the discourse around dementia on screen is the idea that technical accomplishment and moral seriousness are not separable. The formal choice to follow the patient's perspective is not a stylistic flourish; it is an ethical position. <u>One emerges not having watched a man lose his mind but having, briefly and at a remove, lost one's own.</u>

- title: "Hannah Gadsby: Nanette"
  type: "film"
  creator: "Hannah Gadsby"
  creator_role: "by"
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/hannah_gadsby_nanette.jpg"
  posted: "2021-03-31"
  text: |
    'Jokes need tension, and tension hurts. I need to tell my stories properly.'

    Gadsby's central argument, stated plainly midway through and then enacted across the special's remaining forty minutes, is that the conventional structure of stand-up comedy, the building and release of tension through the punchline mechanism, is not neutral: for the performer who has survived violence, who has spent years making herself the punchline of her own story, <u>it is a structure that demands the repetition of shame as the price of belonging.</u> She refuses it. The tension builds and is not released. The audience, conditioned to expect catharsis, is left sitting with discomfort that has nowhere to go.

    This is formally radical in a way that most discussions of Nanette understate, because it tends to get described as confessional or autobiographical rather than as what it structurally is: a sustained critique of the very form being performed, conducted from inside that form. The comedy genre becomes its own subject. And the closing testimonies, delivered without softening, without the redemptive arc that trauma narratives conventionally demand, carry a force that has nothing to do with spectacle and everything to do with precision. <u>Gadsby does not perform anguish; she describes it with the clarity of someone who has already finished processing it, which is a far more unsettling thing to witness.</u>

- title: "Children of Men"
  type: "film"
  creator: "Alfonso Cuarón"
  creator_role: "dir."
  year: 2006
  eval: "loved"
  image: "/assets/images/thoughts/films/children_of_men.jpg"
  posted: "2021-03-28"
  text: |
    The long takes in ***Children of Men*** are not the long takes in *1917* (2019). The distinction is worth naming precisely because *1917* became the reference point, and the reference is inexact: Mendes's film uses its continuous-seeming photography as spectacle, as proof-of-craft, as the formal equivalent of a held breath. Lubezki's work for Cuarón is doing something else entirely. The car ambush, the Bexhill battle sequence: the camera does not impose duration on these scenes, it is caught inside them, subject to the same chaos as the bodies it follows. <u>The blood on the lens stays. The shaking is not controlled. One is not watching an impressive technical achievement; one is inside a world that is ending.</u>

    Jim Clay's production design is the camera's essential collaborator. The world of 2027 is not science fiction; it is 2006 with the institutional infrastructure beginning to fail, the surfaces of public life showing their substrate of decay. <u>The Battersea Power Station converted to a private art museum while refugees are caged in the streets outside: that single image is a more compressed political argument than most films manage across two hours.</u> The CGI is, as described, seamless, but the more remarkable achievement is that seamlessness: not the invisibility of effect but the insistence that the world being shown, however impossible, is continuous with the one the viewer inhabits. Cuarón ends on a small boat in grey water, and the hope the film extends is precisely as fragile as that image suggests.

- title: "Allen v. Farrow"
  type: "film"
  creator: "Kirby Dick / Amy Ziering"
  creator_role: "dir."
  year: 2021
  eval: "loved"
  image: "/assets/images/thoughts/films/allen_v_farrow.jpg"
  posted: "2021-03-26"
  text: |
    The first objection one hears is that the film withholds Woody Allen's perspective. It does not: Dick and Ziering note from the outset that Allen declined all interview requests, include his recent audio recordings and public statements, and construct the documentary so that his evasions, his destruction of evidence, his decades of reputation management through legal and financial pressure, are all visible in their own words and on their own timeline. <u>To say the film is one-sided is to say that a prosecution brief is one-sided. The question is whether the evidence holds.</u>

    It holds. Setting aside the Yale-New Haven clinic, which the documentary examines with appropriate scepticism about its methodology and the conditions under which it was conducted, virtually every authority that investigated the allegation concluded there was evidence of misconduct. The custody court's recommendation was unambiguous. It was Frank Maco, the Connecticut state's attorney, who declined to prosecute, explicitly in order to spare Dylan Farrow the ordeal of a trial, a fact the film makes clear and which Allen's supporters have consistently inverted into exculpation. The timeline is not disputed. The pattern of behaviour is not disputed.

    The second objection is bias. Yes: documentary filmmaking is not neutral, and advocacy documentaries are a genre with its own conventions and pressures. But the bias charge, when applied to this film, functions as a deflection: it asks one to weigh the affective investment of Dylan Farrow's testimony against the structural investment Woody Allen has spent thirty years making in his own innocence, and to find them equivalent. They are not equivalent. <u>To look at all of it and see nothing is not scepticism; it is a choice.</u>

- title: "Avatar"
  type: "film"
  creator: "James Cameron"
  creator_role: "dir."
  year: 2009
  eval: "meh..."
  image: "/assets/images/thoughts/films/avatar.jpg"
  posted: "2021-03-21"
  text: |
    The one arresting thing is the motion capture, already mature enough in 2009 to carry an entire world into being: a technical achievement that deserved a better vehicle. Everything else is the furniture of a male-power fantasy from a decade that produced many. The first half establishes a functional enough main storyline between Jake and Neytiri, but the second half dismantles whatever credit the film had accumulated. Female characters become appendages to male agency; Grace Augustine exists to die and propel Jake's arc; Neytiri, for all her initial ferocity, ends the film needing rescue. <u>The Na'vi, assembled from composite colonial fantasies of noble savagery, are there to be saved by a man who absorbs their culture precisely as well as a coloniser imagines he could.</u> Cameron believes his own pro-indigenous framing. <u>That gap between intent and execution is not interesting; it is merely depressing.</u>

- title: "Возвращение"
  title_en: "The Return"
  type: "film"
  creator: "Andrei Zvyagintsev"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/the_return.jpg"
  posted: "2021-03-10"
  text: |
    Before reading any analysis, one could only vaguely sense that this was something more than a father-son film. Zvyagintsev opens with the father posed in sleep exactly as Mantegna posed the dead Christ: simultaneously present and already absent, divine and mortal, a body that carries its own allegorical freight before it speaks a single word. From there, the film systematically withholds: twelve years of absence unexplained, a destination on the island unnamed, an object in the buried box never revealed. The questions pile up and are never answered, because answering them would collapse the film's actual subject back into mere plot.

    What remains, stripped of backstory, is the bare structure of a test. The two brothers, Andrei who reaches toward the father's authority and Ivan whose resistance is the only honest response to a presence that demands submission without explanation, enact something that feels mythological in the oldest sense: not metaphor but archetype, a story about what it means to be subjected to a power that makes no account of itself. <u>Whether the father is God, the Soviet state's ghost returning under Putin, or simply the crushing logic of patriarchy given flesh, the film refuses to choose, and that refusal is the source of everything.</u> <u>Ivan's final scream at the drowned body echoes the cry of dereliction: not prayer but accusation, addressed to a god who came and went and explained nothing.</u> One cannot watch it without reaching for the allegory, and one reaches for it because the film has made that reaching feel necessary.

- title: "The Reader"
  type: "film"
  creator: "Stephen Daldry"
  creator_role: "dir."
  year: 2008
  eval: "meh..."
  image: "/assets/images/thoughts/films/the_reader.jpg"
  posted: "2021-03-09"
  text: |
    Schlink's novel sustains a cold, unsentimental first-person voice that holds the moral ambiguity in tension without resolving it; Daldry's adaptation warms everything up until the ethical questions float on the surface like decorative scum. The suicide scene is extended to an unbearable degree, the camera lingering as though emotional length were the same as emotional depth. <u>What was a rigorous, uncomfortable literary exercise in complicity becomes softcore erotica with Holocaust framing, the body prioritised over the moral problem the body is supposed to embody.</u> Every legal question raised in the courtroom sequences evaporates before it can become uncomfortable. The score dominates scenes where silence was the only honest choice. <u>Better to read the book; failing that, better almost anything else.</u>

- title: "Don't Hug Me I'm Scared"
  type: "film"
  creator: "Becky Sloan & Joseph Pelling"
  creator_role: "dir."
  year: 2011
  eval: "loved"
  image: "/assets/images/thoughts/films/dont_hug_me_im_scared.jpg"
  posted: "2021-03-02"
  text: |
    Haven't encountered animated shorts this concentrated in a long time. The Notepad's cheerful instruction in creativity is, of course, a taxonomy of how creativity gets murdered: bright, catchy, terminally prescriptive. Sloan and Pelling understand that the children's television format is not incidental to their argument but its whole substance, a medium that trains receptivity and compliance under the banner of imaginative freedom. The horror accretes gradually, the saturated colours curdling into something sickly, because <u>the critique is not that bad ideas are inserted into the form from outside but that the form itself is the bad idea.</u>

    The final gesture, cutting the power, is the film's most precise move and its most vertiginous: the act of switching off cannot switch off the fact of existence, cannot undo the conditioning, cannot restore some pre-contaminated state. There is no before. The puppets remain. <u>Pulling the plug cannot pull out the necessity of being there.</u>

- title: "Левиафан"
  title_en: "Leviathan"
  type: "film"
  creator: "Andrei Zvyagintsev"
  creator_role: "dir."
  year: 2014
  eval: "loved"
  image: "/assets/images/thoughts/films/leviathan_левиафан.jpg"
  posted: "2021-02-21"
  text: |
    ***Leviathan*** is a film of formidable formal discipline. Its scope is vast in the way that cold and silence are vast: the Kola Peninsula coastline, the Arctic light, Mikhail Krichman's cinematography making desolation feel like a philosophical argument. Zvyagintsev layers his Leviathans deliberately: Hobbes's sovereign state as sea monster, the biblical beast from the Book of Job, and the literal whale skeleton bleaching on the beach outside Kolya's house. What is most remarkable about that skeleton is what it does not do in the film: it is simply there, passed by, taken for granted, part of the landscape. Nobody in the film stops to contemplate it. Nobody needs to. <u>The deepest impressions are always the ones that the film refuses to underline.</u>

    On finishing it, there is a strange and indescribable alienation, the kind that takes hours to metabolise. The whale skeleton echoes in the mind long after the film has ended, insisting on a meaning that one cannot quite close. Close behind it: the barbecue scene, everyone drinking and eating in the ruins while portraits of the dispossessed, Lenin first among them, serve as shooting targets. History treated as target practice, ideology as something to pot at for sport. The Orthodox church built on the ruins of Kolya's home in the final sequence completes the film's argument about the unholy alliance between state power and religious authority in Putin-era Russia: <u>the individual is devoured, the institution consecrates the devouring, and life continues.</u>

- title: "Human Nature"
  type: "film"
  creator: "Michel Gondry"
  creator_role: "dir."
  year: 2001
  eval: "loved"
  image: "/assets/images/thoughts/films/human_nature.jpg"
  posted: "2021-02-19"
  text: |
    Kaufman's screenplay is a grand parable built from three broken people and a set of nested ironies: a woman rejected by 'civilization' on account of her body hair, who retreated to the woods and built a life there; a scientist trapped between the demands of social propriety and the animal urgency he has spent his career conditioning away; a feral man raised among apes, who through nurture was never contaminated by 'civilization' at all. The three-way structure is beautifully engineered, each narrator contradicting the others from the grave or the laboratory or the wilderness, the unreliability not a postmodern tic but the whole point: <u>everyone in this film is lying, including to themselves, about what they want and what they are.</u>

    <u>What Kaufman understands, and what the film keeps returning to, is that sexual desire is the one force that traverses all three states, the one constant that 'civilization' works hardest to manage and most consistently fails to contain.</u> The satire of behaviourism, of Skinnerian conditioning applied to table manners as though the fork were the border between the human and the animal, is at its funniest when it is also most exact. Gondry's handmade visual wit meshes here with Kaufman's cynicism better than critics at the time allowed. 'You fuck the mind,' one character observes; but a pretty mind is more fuckable.

- title: "Adaptation."
  type: "film"
  creator: "Spike Jonze"
  creator_role: "dir."
  year: 2002
  eval: "loved"
  image: "/assets/images/thoughts/films/adaptation.jpg"
  posted: "2021-02-17"
  text: |
    Four nested layers of narrative, each one eating the one below it: Kaufman's inability to adapt Susan Orlean's book, dramatised inside the film that pretends to be the adaptation; Orlean's book, dramatised inside that; Donald's commercial thriller, contaminating the whole structure from within; and the real Kaufman, somewhere outside all of it, watching. <u>The screenplay credits include the fictional twin brother as co-writer, a move so audacious that the Writers Guild had to convene about it.</u> Brian Cox's McKee cameo is both a savage joke at screenwriting-manual culture and a sincere capitulation to it: the third act that Charlie resists and Donald embodies arrives anyway, and the film is honest enough not to pretend otherwise.

    What makes it land, beyond the architecture, is Nicolas Cage: two performances so physically and emotionally distinct that one forgets they occupy the same body. Charlie and Donald are not simply id and superego; they are two theories of art, two theories of survival. And then, at a certain moment, something clicks, the recursive machinery locks, and one suddenly understands not just this film but what it feels like to watch a Kaufman-scripted film: <u>the sensation of a structure becoming conscious of itself in real time, and dragging one along into the recognition.</u>

- title: "I'm Thinking of Ending Things"
  type: "film"
  creator: "Charlie Kaufman"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/im_thinking_of_ending_things.jpg"
  posted: "2021-02-16"
  text: |
    The dying mind's shift from egocentric to allocentric orientation through time, and the fragmentary sorting of memory and experience, imagination and hope: this is the neuroscience underneath the film, and it maps onto the narrative with unnerving precision. The janitor is the film. The young woman, her shifting names and professions and even her appearance, is his construction, an imagined companion he never had, assembled from poems he memorised and films he loved and a life he could not bring himself to live. <u>Jake finishes her sentences because they are his sentences.</u> Kaufman is not hiding this: ten minutes in, the structure announces itself, and from that point the audience can actively map each shift: this is what he is doing, and this is what he is doing now.

    What makes it the most accessible Kaufman film since *Being John Malkovich* (1999) is this legibility, this willingness to hand the audience a key. Yet its depth exceeds *Being John Malkovich* (1999) by some considerable distance. Every frame is dense with the janitor's sordid and obsessive memories, his regrets, the gifts he buried. <u>The parents age and de-age because memory is not linear; the farmhouse accumulates rot because his body is decaying in the school basement; the <em>Oklahoma!</em> finale is the Nobel Prize speech of a man who received neither.</u> The picture assembled is more complete, and more damning, than *Synecdoche, New York* (2008). Simply the best Kaufman film so far. Still waiting for *Frank or Francis*.

- title: "Solaris"
  type: "film"
  creator: "Andrei Tarkovsky"
  creator_role: "dir."
  year: 1972
  eval: "loved"
  image: "/assets/images/thoughts/films/solaris.jpg"
  posted: "2021-02-14"
  text: |
    'We need mirrors.' 'Man needs man.' The urge to compare ***Solaris*** with *2001: A Space Odyssey* while watching it is not a critical reflex but an unavoidable structural one: the films are in dialogue, and Tarkovsky knew it. Where Kubrick's space is cold, geometric, pristine, a cathedral of human ambition stripped of human warmth, Tarkovsky's Solaris station is cluttered and decaying, a museum of human failure, and that failure is the point. Tarkovsky understood Kubrick's film as cosmological and evolutionary, asking what humanity might become; his own response was psychological and elegiac, asking what humanity has already lost. The labour invested in the visual language of *Solaris* is immense: every composition earns its slowness, every held shot accumulates meaning across the film's duration rather than spending it on arrival.

    The most arresting passage in *2001*, most would agree, is the Star Gate sequence, humanity dissolved into light. <u>The most arresting passage in *Solaris* is the weightless library: Kris and Hari floating together among books and candles in zero gravity, Earth's cultural inheritance unmoored from gravity, precious and fragile and irrecoverable.</u> Kubrick's floating pen is a moment of technological elegance; Tarkovsky's floating books are a moment of humanist elegy. The difference is not between optimism and pessimism but between two entirely different conceptions of what science fiction is for. What is entirely unlike *2001* is the humanistic angle of the second half, the insistence that the alien is merely the mirror in which humanity examines its own interiority. <u>The ocean of Solaris does not represent the unknown future; it represents the inaccessible past.</u> A story far larger than memory and the limits of human capacity, told through exactly those things.

- title: "Spartacus"
  type: "film"
  creator: "Stanley Kubrick"
  creator_role: "dir."
  year: 1960
  eval: "liked"
  image: "/assets/images/thoughts/films/spartacus.jpg"
  posted: "2021-02-10"
  text: |
    The most vivid impressions: the same commitment to practical scale as *2001*, Kirk Douglas's button-like chin anchoring every frame, and an ending that is spectacularly bad. Kubrick himself reportedly despised the film's sentimental climax, and he was right; <u>a single restrained shot of Varinia departing with the child would have done more than all that broad melodrama on the Appian Way, and would have been truer to what the historical record allows.</u> <u>The irony is that the film's political spine, Dalton Trumbo's name in the credits breaking the blacklist, is far more radical than anything in the denouement.</u>

- title: "Dr. Strangelove or: How I Learned to Stop Worrying and Love the Bomb"
  type: "film"
  creator: "Stanley Kubrick"
  creator_role: "dir."
  year: 1964
  eval: "loved"
  image: "/assets/images/thoughts/films/dr_strangelove_or_how_i_learned_to_stop_worrying_and_love_th.jpg"
  posted: "2021-02-02"
  text: |
    <u>Peter Sellers across three roles is not merely extraordinary as a performance; it is extraordinary as an argument.</u> Mandrake, Muffley, and Strangelove map onto three modes of institutional failure: bureaucratic impotence, liberal ineffectuality, and the amoral technocrat whose uncontrollable gloved hand keeps betraying the fascism beneath the procedural surface. The three settings, Burpelson, the War Room, the bomber cockpit, are all the geography a film about the end of the world requires. Kubrick achieves a tension and grandeur within these stripped constraints that most directors cannot reach with entire continents.

    Strangelove's final monologue, the mine-shaft proposal, the survival calculus, the barely suppressed glee, is nothing other than the logic of the figures who surrounded every major populist authoritarian movement of the following half-century: the technocrat who has made his peace with catastrophe and begun to find it useful. One watches it now and recognises the grammar immediately: the conspiratorial cartography, the eugenic undercurrent dressed as crisis management, the sense that the speaker has been waiting a long time for this moment. <u>Kubrick made a film about the early 1960s and accidentally made a repeating template.</u> <u>The laugh-track of history has not worn it out.</u>

- title: "背靠背，脸对脸"
  title_en: "Back to Back, Face to Face"
  type: "film"
  creator: "Huang Jianzhong"
  creator_role: "dir."
  year: 1994
  eval: "loved"
  image: "/assets/images/thoughts/films/back_to_back_face_to_face.jpg"
  posted: "2021-01-31"
  text: |
    Simply beautiful, and simply inexhaustible: two-plus hours with not a moment of drag, every character sharply drawn, every minor functionary essential to the machinery of the plot. Wang Shitong, acting director of a local cultural centre, perpetually passed over, perpetually manoeuvring, is one of Chinese cinema's great creations: not a tragic figure in the Western sense, not a comic one either, but a precise and devastating specimen of a particular mode of survival. <u>The title announces the method: 'back to back' in estrangement, 'face to face' in performed cordiality, and the gap between those two orientations is where the entire film lives.</u>

    The allegorical register is dense, line by line, and the visual allegory is equally unmissable: a film about institutional China that works as a portrait of institutional life everywhere that face (面子) and power decouple from merit. What is harder to explain is why the experience of watching is two solid hours of laughter, of marveling at how people can be so cunning and so vicious and so recognisable, and then, against all expectation, to end on a note that is (relatively) generous. One does not leave feeling consoled. <u>One leaves feeling that the system has been named, and that naming it, precisely and without sentimentality, is its own kind of grace.</u>

- title: "Persischstunden"
  title_en: "Persian Lessons"
  type: "film"
  creator: "Vadim Perelman"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/films/persian_lessons_persischstunden.jpg"
  posted: "2021-01-30"
  text: |
    The plot is solidly conventional: nothing arrives that one did not see forming. But the cinematography and direction accomplish the task of telling the story commendably, which is more than most Holocaust films manage to do with a comparable premise. The classroom scenes in the first half are occasionally overwrought; in a film where detail is everything, where Gilles must remember every invented word of a language he fabricated to survive, any lapse in precision costs the drama something real. <u>The final sequence, in which those invented words resolve into the names of the murdered, lands with the force of a moral argument, not a cinematic flourish.</u> <u>An anti-fascist film this accomplished is rare; one has waited years for one.</u>

- title: "The Abyss"
  type: "film"
  creator: "James Cameron"
  creator_role: "dir."
  year: 1989
  eval: "loved"
  image: "/assets/images/thoughts/films/the_abyss.jpg"
  posted: "2021-01-16"
  text: |
    Every emotion in the film is engineered, and the engineering is masterful: the claustrophobia of flooded corridors, the oxygen-deprivation delirium, the CPR sequence that Mastrantonio reportedly broke down filming and which breaks one watching it. Every character has a distinct personality, a fact that increases predictability somewhat, the audience knowing roughly who will survive and who will not, but the predictability does not blunt the impact because <u>Cameron's craft lies not in surprise but in inevitability, in making the audience feel that each event could not have been otherwise.</u>

    Who could remain unmoved at the sight of a vast non-human civilisation, benevolent and alien and utterly beyond the terms of any ideology that has governed human violence? Who could stay calm during the underwater 'car chase' sequence, the two figures in darkened water, air running out, the numbers on the gauge too small? Not a single decision in the film is free from the dual pull of emotion and reason; not a single decision feels arbitrary or jarring. <u>This is what Cameron does that almost no one else does at this scale: he makes the mechanics of feeling transparent without making them cheap.</u> A supreme demonstration of his craft as writer and director both.

- title: "Synecdoche, New York"
  type: "film"
  creator: "Charlie Kaufman"
  creator_role: "dir."
  year: 2008
  eval: "loved"
  image: "/assets/images/thoughts/films/synecdoche_new_york.jpg"
  posted: "2021-01-08"
  text: |
    Kaufman's directorial debut demands nothing from the intellect and everything from the nervous system; the experience is something like reading *One Hundred Years of Solitude* (1967), where the accumulation of time and loss becomes its own form of pressure. The film follows Caden Cotard, whose last name is borrowed from a psychiatric condition in which patients believe themselves already dead, into a warehouse in which he attempts to build a full-scale replica of New York, hiring actors to play himself and everyone he has ever known. The infinite regress is not a gimmick. It is the argument: <u>representation can never close the gap between the map and the territory, and the attempt to close it is both heroic and annihilating.</u>

    The deliberately blurred boundaries between characters illuminate the film's central apparent paradox: I am singular, yet anyone can play me. At some point Caden begins playing a cleaning woman, not as a breakdown but as a logical extension of the film's project, <u>the self as a role that can be reassigned.</u> What strikes most is that none of this feels schematic; it feels, in the Sontag sense, against interpretation, something to be absorbed rather than decoded. My vocabulary is too thin to describe where its force lies, so I can only say, vulgarly: just feel it.

- title: "L.A. Confidential"
  type: "film"
  creator: "Curtis Hanson"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/la_confidential.jpg"
  posted: "2021-01-03"
  text: |
    There is a version of film criticism in which *Infernal Affairs* (2002) stands as the definitive modern noir, and that version is wrong. ***L.A. Confidential*** does everything the genre asks of it and then does something rarer: it gives each of its three protagonists a distinct moral grammar, so that the Nite Owl conspiracy unfolds differently depending on which set of eyes is reading it. Russell Crowe's Bud White operates on fury and a private code about women; Guy Pearce's Ed Exley on ambition mistaken for principle; Kevin Spacey's Jack Vincennes on exhausted cynicism performing itself as charm. The performances are dazzling in the specific sense that they illuminate each other by contrast.

    The second half offers almost nothing one could not see coming, and yet the suspense never relents. That is a rarer technical achievement than most critics acknowledge: <u>to generate genuine tension not from uncertainty about plot but from the feeling of inevitability pressing down on people who are still trying to choose.</u> Brian Helgeland and Hanson's adaptation of Ellroy's sprawling novel strips the machinery to the load-bearing elements and not one joint shows. <u>By the end, partial justice is achieved and the institution survives intact, which is the most honest ending a film about the LAPD in the 1950s could possibly have.</u>

- title: "En man som heter Ove"
  title_en: "A Man Called Ove"
  type: "film"
  creator: "Hannes Holm"
  creator_role: "dir."
  year: 2015
  eval: "loved"
  image: "/assets/images/thoughts/films/en_man_som_heter_ove_a_man_called_ove.jpg"
  posted: "2021-01-02"
  text: |
    The previous two days I went from *Still Life* (2006) to *A Sun* (2019) to *Nomadland* (2020) without crying once, and had begun to wonder whether my tear ducts had broken, or whether my empathy had calcified into something merely observational. Then I finished Ove and understood the problem was never mine.

    The film is built around what might be called a fully dimensional suicide attempt: Ove does not want to die dramatically, he simply cannot locate a reason to persist now that the structuring love of his life is gone. Rolf Lassgård plays him as a monomaniac and a car fanatic and a man whose emotional vocabulary was formed entirely by his father's silent honesty, which means that grief has nowhere to go except outward as regulation. <u>Hannes Holm's great feat is showing how every rule Ove enforces, every parking violation he documents, every procedural absurdity he prosecutes, has its roots in love and its expression in the absence of love.</u> The flashbacks are not sentimental; they are architectural, each one explaining why the present-tense Ove is shaped the way he is.

    The plot is so simple. Neighbours arrive, life asserts itself, a man who was shutting down discovers he is still needed. <u>And yet I cried two or three times, back and forth, in a way that felt less like being moved and more like being correctly diagnosed.</u> This film is so good, so good, so good.

- title: "Nomadland"
  type: "film"
  creator: "Chloé Zhao"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/films/nomadland.jpg"
  posted: "2021-01-02"
  text: |
    The score is far too weak for the images it accompanies. Einaudi's piano pieces are lovely objects in their own right, but as deployed here they arrive slightly too readily, too smoothly, softening the film's documentary edges at precisely the moments when those edges should cut. What Zhao has assembled is an accumulation of stories: every person Fern encounters forms a closed loop, every departure is also a potential return, every ending another beginning on the same road. <u>It is a nomad's idealist dream of how transience works.</u> One suspects the real itineraries are less circular, the coincidences rarer. <u>That the film needs the dream to function is not a flaw; it is the confession.</u>

- title: "Gattaca"
  type: "film"
  creator: "Andrew Niccol"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/gattaca.jpg"
  posted: "2021-01-01"
  text: |
    Had no idea the ending could be that good. The film earns it by spending ninety minutes being scrupulously, almost defiantly understated: the production design mixes 1950s architecture with near-future technology not as nostalgia but as a warning that this future has in some sense already arrived, and the performances stay cold and precise in register with the world they inhabit. The central irony is structural: Jerome Morrow, the genetically optimal man, destroys himself in an incinerator wearing a silver medal, the emblem of his only failure, while Vincent Freeman, born without correction and given a 99% probability of cardiac failure, boards a spacecraft for Titan. <u>The eugenics project does not produce flourishing; it produces a caste system in which perfection is as fatal as imperfection, only differently.</u>

    What Niccol understands that most science fiction films of the era did not is that <u>the horror of a genetic hierarchy is not primarily spectacular; it lives in the skin-cell readers by the office door, the urine tests, the quiet administrative violence of being classified in-valid before one has done anything.</u> The film explores eugenics using 1% of luck as its moral lever, and the lever holds. There is no gene for the human spirit is a tagline that should be embarrassing but is not, because the film has actually argued it.

- title: "Soul"
  type: "film"
  creator: "Pete Docter"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/soul.jpg"
  posted: "2020-12-27"
  text: |
    There is a particular quality to the crying that 'in the zone' produces in this film: not the soft, welling kind but something tighter and more involuntary, as though the body recognises something the mind hasn't caught up with yet. Pete Docter and his co-writers are doing something paradoxical: they build the entire first act around jazz improvisation as the apotheosis of human existence, the flow state as spiritual destination, and then methodically dismantle it. Joe Gardner achieves the gig of his dreams and feels nothing. Csikszentmihalyi's flow, Docter has said in interviews, was something jazz musicians themselves pushed back against, insisting the music was never about solitary transcendence but about conversation, the room, the listening. The film absorbs this correction into its bones.

    What the 'You Seminar' setup gives the film isn't novelty (the metaphysics-of-meaning conceit has antecedents stretching back decades) but a structural elegance: the mentor dynamic runs in reverse, with 22 showing Joe rather than the other way around. The small things, the pizza and the maple seed and the late-afternoon light, are not consolation prizes for those who failed to achieve greatness. <u>They are the substance of a life, prior to any greatness.</u> <u>This is an unfashionable argument to make in a film aimed partly at children, and Docter makes it without flinching.</u> The ending is quiet in a way that Pixar rarely permits itself. One walks away from it still not entirely sure what comes next for Joe, and that uncertainty is precisely the point. I love it so much.

- title: "Perfect Blue"
  type: "film"
  creator: "Satoshi Kon"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/perfect_blue.jpg"
  posted: "2020-12-19"
  text: |
    Mental illness films have a structural advantage that is also a temptation: with an unreliable narrator, any ending can be retroactively justified, any incoherence absorbed into the premise. The film simply declares: the character was unwell; the ambiguity was intentional. Kon refuses this escape. ***Perfect Blue*** closes its ending hard. Every act of violence, every distortion of Mima's reality, is attributed with clinical precision to Rumi, whose psychotic merger with the idol she manages is rendered not as mystery but as diagnosis. The tightness of the resolution is what makes the final shock land so heavily: there is no interpretive slack to cushion it.

    This is also a film that understands exactly where to cut. Not in the editorial sense only, though the editing is surgical, but in the sense of knowing precisely which moment in a scene carries the most damage, and driving the camera into it. <u>Every transition lands in the most painful available place.</u> Kon Satoshi is often discussed alongside Aronofsky, who purchased the rights partly to recreate a single sequence, but the influence runs deeper than any individual image: it is an understanding of how identity fractures under the pressure of being watched, an understanding that Perfect Blue achieves in 81 minutes with no wasted frame. <u>Mima's final words to her reflection are not reassurance. They are a claim staked against the void, and one is not entirely sure it holds.</u>

- title: "Vertigo"
  type: "film"
  creator: "Alfred Hitchcock"
  creator_role: "dir."
  year: 1958
  eval: "liked"
  image: "/assets/images/thoughts/films/vertigo.jpg"
  posted: "2020-12-19"
  text: |
    The second half arrives as a genuine surprise: the film has taken such care to embed one in Scottie's limited perspective that the revelation of the plot, delivered in Judy's letter and then withheld from Scottie for another reel, produces a disorientation that the title has been promising all along. <u>It is not dizziness from heights; it is the dizziness of learning that the reality one has been inhabiting was a construction, and that the construction was designed specifically for one's own consumption.</u> This is Hitchcock at his most ruthlessly self-aware about what cinema does to audiences.

    What follows is harder to sit with. The sequence in which Scottie rebuilds Judy into Madeleine, choosing her clothes and hair and posture, is a textbook enactment of what Laura Mulvey would later theorise as the male gaze turned architectural: the woman as raw material, the man as sculptor. Kim Novak plays the humiliation with extraordinary restraint, which only sharpens it. The film is aware of what it is doing; whether that awareness is critique or complicity is the question it refuses to answer cleanly. What it is not aware of, or chooses not to address, is the romance: Scottie's love for Madeleine is never explained from Madeleine's side, and after the revelation Judy's love for Scottie is barely more legible. Hitchcock's plotting here is thin, and no amount of atmospherics fully papers over it. The murderous husband walks away entirely unremarked upon by the detective whose job was presumably to find him. <u>It is a film one admires more than one trusts.</u>

- title: "North by Northwest"
  type: "film"
  creator: "Alfred Hitchcock"
  creator_role: "dir."
  year: 1959
  eval: "liked"
  image: "/assets/images/thoughts/films/north_by_northwest.jpg"
  posted: "2020-12-18"
  text: |
    The crop-duster sequence has been studied so thoroughly, borrowed from so many times, reconstructed in so many analyses, that encountering the original carries a faint strangeness: the sensation of meeting a face one knows only from copies. Hitchcock and editor George Tomasini built the sequence on an inversion of every convention of cinematic threat: no shadows, no music, blinding midday light, flat open prairie, a camera that holds its wide shots long past the point of comfort. <u>The emptiness is the weapon.</u> By the time the plane appears, the editing has trained one to expect nothing, which means the attack arrives with the force of something that has no right to be there.

    The United Nations building, seen as it stood in 1959, prompts a different kind of reflection. Nearly seventy years on, the building is still there, largely unchanged, presiding over a world that has managed to accumulate almost no additional architecture of international cooperation in the intervening decades. The particular stagnation of the post-Cold War order, the inability to build new institutions at the scale the mid-century briefly imagined possible, makes the building look less like a monument to ambition than a relic of it. <u>Hitchcock meant it as backdrop. It has become a more complicated image than he intended.</u>

- title: "Rear Window"
  type: "film"
  creator: "Alfred Hitchcock"
  creator_role: "dir."
  year: 1954
  eval: "loved"
  image: "/assets/images/thoughts/films/rear_window.jpg"
  posted: "2020-12-14"
  text: |
    The courtyard set at Paramount was one of the largest indoor constructions in studio history: thirty-one apartments, working plumbing, a full day-to-night lighting cycle, real animals. Hitchcock built a world and then refused to let the camera leave the room from which it is observed. This is the formal constraint that generates everything. The audience's perspective becomes identical to Jeff's, not as a technique but as a condition: one cannot see around the corner, cannot enter the apartments, cannot escape the frame of the window. <u>Cinema's essential voyeurism, usually disavowed, is here both the subject and the mechanism.</u>

    What saves the film from being merely a formal exercise is the density of what the courtyard contains. Each apartment is a storyline; each storyline is a possible future for Jeff and Lisa; and the three sections of the narrative, the mystery, the near-resolution, the crisis, divide the film so cleanly that on paper it sounds schematic. Watching, one feels none of the seams. The world contained in that small rectangle of light and sound expands to fill the entire available attention, and by the time Thorwald turns and looks directly back, the rupture of the voyeuristic compact is as physically shocking as anything Hitchcock ever produced. The whole world in a small ***rear window***. <u>The camera never leaves the room, and neither does one.</u>

- title: "La planète sauvage"
  title_en: "Fantastic Planet"
  type: "film"
  creator: "René Laloux"
  creator_role: "dir."
  year: 1973
  eval: "loved"
  image: "/assets/images/thoughts/films/la_planete_sauvage_fantastic_planet.jpg"
  posted: "2020-12-10"
  text: |
    Alain Goraguer's score arrives before anything else has had time to settle: electric piano chords pooling under muted brass, a psychedelic architecture that feels neither quite human nor quite alien, which is precisely the point. Goraguer, long associated with Serge Gainsbourg, built something here that resists categorisation, and the resistance is productive. <u>One enters the film through the music and never fully surfaces from it.</u> The story, Roland Topor's cut-out illustrations moving in their eerily stiff way across a world of enormous blue Draags and their tiny Om pets, is a parable about dehumanisation so legible it barely needs decoding: colonialism metabolised into science fiction, co-produced between France and Czechoslovakia in 1973 with all the political charge that context implies. And yet calling it allegory somehow undersells it, because the film's real power is phenomenological. <u>The imagery does not illustrate ideas; it generates them.</u> Topor's tableau-like frames, closer to Bosch than to Disney, make the world feel alien on its own terms, threatening, and wholly indifferent.

    Laloux won the Grand Prix at Cannes, and the Criterion restoration has since enshrined the film in the kind of canonical reverence that can make it difficult to see clearly. The risk is that one approaches it as a monument rather than an experience. Approach it as an experience. The pacing is unhurried to the point of trance, and this is not a flaw; it is how the film earns its strangest effects, the ones that come not from any single image but from the accumulated pressure of sustained exposure to something that operates on different rules. The 1970s were, by any measure, the decade of art rock in its most ambitious, most exploratory form, and Goraguer's score belongs to that moment completely: it has the same commitment to texture over melody, the same willingness to let unresolved harmonics sit in the air. <u>Leaving the film, one does not think about the plot. One thinks about the sound.</u>

- title: "Prog Rock Britannia: An Observation in Three Movements"
  type: "film"
  creator: "Chris Rodley"
  creator_role: "dir."
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/films/prog_rock_britannia_an_observation_in_three_movements.jpg"
  posted: "2020-12-03"
  text: |
    Laughing too hard in the opening minute, then crying too hard when the segment on King Crimson arrived. The film structures itself in three movements as a deliberate formal echo of its subject, and the gesture earns its keep: <u>progressive rock was nothing if not the conviction that the correct form for an argument was the form the argument itself demanded.</u>

    First time learning here that 1970s prog's extraordinary visual culture, the gatefold sleeves, the Roger Dean landscapes, the Peter Gabriel costumes, developed partly because the PA systems of the era were so poor that audiences could not make out the lyrics, so meaning had to be externalised into image and spectacle. The information hit me as a kind of revelation, the way it sometimes does when a historical contingency suddenly explains something that looked like pure intention. 'It was a time of artistic expression, of the freedom of art.' Robert Fripp and his collaborators appear, and the film stops being a history and becomes something more like a testimony. Tears streaming. As someone who makes progressive art-rock and has spent years trying to articulate why the ambition of that era still feels necessary rather than nostalgic, <u>this documentary felt like evidence that the impulse was never merely fashion. It was, briefly, how people thought music could work.</u>

- title: "Ran"
  type: "film"
  creator: "Akira Kurosawa"
  creator_role: "dir."
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/films/ran.jpg"
  posted: "2020-12-01"
  text: |
    My first Kurosawa, which means I came to it unprepared and saw only part of what was there: the cloud-sea above the battlefield, shot in a scale that makes individual suffering look cosmically small; and the jester Kyoami's loyalty, which is the film's moral centre and the most moving thing in it, a devotion that has no strategic logic and therefore no end point. I regret not attending to the details more carefully, which is a different problem from the film's. The whole film truly feels like a Shakespeare play, and this is not a loose comparison.

    Kurosawa spent a decade developing ***Ran***, transposing *King Lear* onto the Sengoku period warlord Hidetora Ichimonji, who divides his domain among three sons and is destroyed by the calculation. Where Shakespeare works within a Christian moral framework, Kurosawa operates in Buddhist terms: <u>the chaos that follows, ran in Japanese, is not punishment so much as karma made visible, the sins of conquest propagating forward through time until nothing is left.</u> Tōru Takemitsu's score plays against the images rather than with them, which is the right instinct; some of the great battle sequences run almost in silence, the carnage aestheticised into something that looks like a Noh performance, beautiful and terrible in equal measure. <u>Lady Kaede, played by Mieko Harada, rivals Shakespeare's own villains in complexity.</u> I will watch it again and see everything I missed.

- title: "Подземље"
  title_en: "Underground"
  type: "film"
  creator: "Emir Kusturica"
  creator_role: "dir."
  year: 1995
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/films/underground_подземље.jpg"
  posted: "2020-11-28"
  text: |
    The charge against Kusturica has always been ready to hand: that the carnivalesque excess of ***Подземље*** aestheticises the very catastrophe it purports to mourn, that its grotesque festivity launders history into myth. The charge is Žižek's, and it is not wrong so much as it is beside the point. What Kusturica achieves here is something older and stranger than political allegory: he fuses narrative film with film-poem, so that the logic governing individual shots is not dramatic but lyric, not causal but incantatory. Every image carries the specific gravity of South American magical realism, but rooted in Balkan soil and oral tradition, in the brass bands and drunken weddings and exploding tanks that are not metaphors for Yugoslav chaos so much as they are its native idiom. Dušan Kovačević's three-part structure, spanning WWII through the cold war to the 1990s wars, enacts a cyclical theory of history in which violence and festivity are not opposed but identical: <u>the feast is the massacre, the dance is the dirge.</u>

    The underground world functions as an ideological bubble, Titoism in aspic, time preserved in amber while history burns above. That the people trapped below come to believe WWII is still running is less a plot device than a diagnosis: collective delusion sustained by those in power, a nation fed its own mythology until the mythology is all that remains. And when the characters finally surface, they surface into ruin. <u>The film earns its three-hour runtime because the epic length is itself the argument: history takes that long to devour a people.</u> The Goran Bregović soundtrack never stops; the music is not commentary but atmosphere, an assault that refuses to let one step back into critical distance.

    The final sequence, the floating island, the last dance above water, achingly beautiful and achingly final: it does not resolve the film so much as it releases it. <u>There is no homeland left to return to, so the film invents one, makes it float, and then lets it drift.</u> That image is mourning without consolation, and it has not left me.

- title: "The Rainmaker"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1997
  eval: "meh..."
  image: "/assets/images/thoughts/films/the_rainmaker.jpg"
  posted: "2020-11-24"
  text: |
    Went in on the strength of the name, and the name does not quite redeem it. Coppola's direction is assured and unshowy, which in 1997 already marked a change of register from his operatic phase, but assurance applied to John Grisham yields a film that is intelligent without being surprising. The idealist-versus-institution courtroom structure arrives fully assembled: the young lawyer with no resources, the corrupt corporation, the bought judge replaced by a better one at the opportune moment. <u>Matt Damon's Rudy Baylor is moral weight without interiority, a position in an argument rather than a person, which is arguably true of the Grisham template generally.</u> The final monologue, where Baylor dresses up his decision to quit law as principled disillusionment, is the film's least honest moment: <u>one is invited to read it as integrity, but skill level and temperament are equally plausible explanations, and the screenplay does not have the rigour to insist on the distinction.</u> Danny DeVito, at least, seems to be enjoying himself.


- title: "버닝"
  title_en: "Burning"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2018
  eval: "loved"
  image: "/assets/images/thoughts/films/burning.jpg"
  posted: "2020-11-15"
  text: |
    Lee Chang-dong takes Murakami's 'Barn Burning,' a story of ambiguity and absence, and transforms it into something the original never attempted: a sustained class indictment in which every gesture, every silence, every yawn, carries the weight of economic violence. ***Burning*** expands the short story's triangle, the narrator, the wealthy acquaintance, the disappeared woman, into a three-character study of South Korean inequality so precise that the film barely needs to raise its voice.

    Jong-su is a delivery driver and aspiring writer; Hae-mi is a part-time worker who mime-eats tangerines and dances at sunset; Ben, played by Steven Yeun with a chilling, calibrated blankness, is rich, beautiful, and confesses to burning greenhouses the way one might mention a hobby. Murakami's story leaves the confession unresolved; Lee resolves it, or appears to, and the resolution is worse than the ambiguity. <u>Hae-mi disappears, and the film asks whether her vanishing registers differently because she is poor, female, and socially invisible: whether some people can simply be erased because no structure exists to notice their absence.</u>

    The pacing is Lee's great formal achievement here. ***Burning*** moves at the speed of suspicion: slowly, then not at all, then all at once. The long takes and natural light create a surface of documentary realism that makes the eruption of violence, when it finally arrives, feel not like genre but like gravity. Yeun's performance is terrifying because it is so pleasant; Ben's smile is the smile of someone for whom other people are interesting the way barns are interesting, briefly, before they burn.

    <u>The final scene is one of the most devastating endings in twenty-first-century cinema, and it works because Lee has spent two and a half hours making the presence of violence legible all along, waiting in the gap between those who have everything and those who have nothing.</u>

- title: "The Trial of the Chicago 7"
  type: "film"
  creator: "Aaron Sorkin"
  creator_role: "dir."
  year: 2020
  eval: "loved"
  image: "/assets/images/thoughts/films/the_trial_of_the_chicago_7.jpg"
  posted: "2020-11-10"
  text: |
    Sorkin's gift, and his limitation, is that he knows precisely how to ignite ideological fury in an audience. Within the first ten minutes of '***The Trial of the Chicago 7***', one is squarely on the side of the Seven: the historical backdrop is laid in with the efficiency of a master playwright, the prosecution is established as a Nixon-era political instrument, and Judge Julius Hoffman's open bias has been made unmistakable. Sorkin understands that the courtroom is always a stage, that legal procedure is political theatre, and he choreographs accordingly, fast and righteous and crackling with walk-and-talk energy even when nobody is walking anywhere. The usual objection is that he simplifies: that the genuine ideological fractures between the defendants, Abbie Hoffman's anarchic carnival against Tom Hayden's institutional liberalism, are flattened into a clean dramatic arc. Fair enough. But the simplification is in service of something real, <u>a film that asks what the legitimate expression of political fury looks like when every institution has been corrupted against one.</u>

    Watching it is painful in a way that implicates the viewer rather than flattering them. This was a group of young people who believed in equality and peace, in civil rights, in every ideal that constitutes human decency at its minimum: and under a government rife with political manipulation, <u>their only means of expressing that belief in front of the court was to read aloud the names of the dead.</u> More than four thousand names. The scene in which Tom Hayden reads them out, the room filling with the sound of a war's accounting, is one of the few moments in the film where Sorkin's machinery stops and something else takes over: grief, stripped of rhetoric. Five years of imprisonment were waiting for these men, and that verdict fell in front of a full press gallery. That the 2020 release date, arriving in the middle of the George Floyd protests and a contested election, made the film feel not like history but like a live broadcast: that was not Sorkin's achievement, but it was the film's.

- title: "Mother"
  type: "film"
  creator: "Bong Joon-ho"
  creator_role: "dir."
  year: 2009
  eval: "loved"
  image: "/assets/images/thoughts/films/mother.jpg"
  posted: "2020-11-07"
  text: |
    '***Mother***' sits on the same elevation as '*Memories of Murder* (2003)', and the screenplay surpasses it. Where '*Memories of Murder* (2003)' follows detectives fumbling through a real unsolved case, confronting the limits of institutional justice from the outside, 'Mother' inverts the perspective entirely: a desperate woman investigates from within, and the investigation destroys her. Bong Joon-ho and Park Eun-kyo co-wrote the script with a structural ruthlessness that few crime films manage, building an unreliable protagonist whose distortions the audience shares right up until the moment the distortions become impossible to maintain. Kim Hye-ja, cast precisely because the audience knew her as warmth personified from decades of television, is used against that warmth with surgical precision: the film is a deliberate subversion of her public image, and she carries every gram of it.

    The screenplay's greatest achievement is the acupuncture motif, memory literally pressed out of the body, repressed and reinstated and finally performed as a dance in a field, the opening and closing image recontextualised into something between a ritual and a horror. <u>Bong does not write villains; he writes people trapped by love and circumstance who do monstrous things for reasons one can follow all the way down.</u> <u>The film withholds catharsis as a matter of principle: the truth is buried, the justice system is irrelevant, and the final image is not resolution but endurance.</u> Absolutely love it.

- title: "Life of Pi"
  type: "film"
  creator: "Ang Lee"
  creator_role: "dir."
  year: 2012
  eval: "loved"
  image: "/assets/images/thoughts/films/life_of_pi.jpg"
  posted: "2020-11-07"
  text: |
    The question '***Life of Pi***' poses, whether the beautiful story or the brutal one is true, is not meant to be answered: <u>the film's great argument is that the story one chooses to inhabit is not decoration but survival, that narrative is not an ornament on top of experience but the very structure that makes experience bearable.</u> Ang Lee and cinematographer Claudio Miranda shoot the Pacific as a liminal space, a boundary between life and death where bioluminescent water, breaching whales, and a floating carnivorous island exist in the same register as Pi's grief and faith. The CGI tiger Richard Parker, created at enormous technical cost, is somehow less remarkable than the ocean itself: a vast, beautiful, terrifying character that dwarfs every human claim on it.

    The structural irony that Rhythm and Hues Studios, responsible for the film's extraordinary visual effects, filed for bankruptcy two weeks before it won the Oscar for Best Visual Effects, is a parable the film would have approved of: the beautiful story and the brutal story coexisting, one visible, one not. But watching it, one does not think about any of that. Whether it is the metaphysics of the story itself or the oceanic vistas, every moment hits exactly where one cries. <u>Some films earn their tears; this one makes the tears feel like understanding.</u>

- title: "Stuart: A Life Backwards"
  type: "film"
  creator: "David Attwood"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/stuart_a_life_backwards.jpg"
  posted: "2020-11-07"
  text: |
    ***Stuart: A Life Backwards*** is the kind of story that strikes one clean through, the kind one does not recover from in the usual way. Based on Alexander Masters' memoir of the same name, it tells the life of Stuart Shorter, a charismatic, violent, and homeless man whom Masters befriended through Cambridge activist circles, in reverse chronological order: beginning with the end and working backwards toward the wound. The structural conceit is not a gimmick. It is the film's entire moral argument. <u>To understand how someone becomes who they are, one must resist the temptation of narrative momentum; one must slow down, turn around, look.</u>

    Benedict Cumberbatch plays Masters with exactly the right degree of restrained bewilderment, the man who is listening harder than he knows how to articulate, the audience's surrogate in every scene. But the film belongs, unmistakably, to Tom Hardy as Stuart. <u>Hardy does not perform vulnerability; he inhabits a kind of feral tenderness that makes every frame feel like it might crack.</u> The famous charge against biographical drama is that it flattens its subjects into legible arcs of suffering and redemption. ***Stuart*** refuses this. Stuart Shorter remains strange, difficult, and irreducible to the last, and Hardy never lets the camera steal his personhood in the name of sympathy. Both performances are extraordinary, but Hardy's is one of the finest pieces of British acting of the decade.

    The film is ruthless about what trauma actually does: not how it ennobles, but how it compounds, each wound making the next more likely and more severe. There is no catharsis on offer. What there is, instead, is something rarer: <u>the sense that this particular life, told backwards, has the structure of an elegy, and that the only honest response to it is to sit with that.</u>

- title: "Night on Earth"
  type: "film"
  creator: "Jim Jarmusch"
  creator_role: "dir."
  year: 1991
  eval: "liked"
  image: "/assets/images/thoughts/films/night_on_earth.jpg"
  posted: "2020-10-31"
  text: |
    Five cab rides, five cities, one November night: Jarmusch's ***Night on Earth*** is structured as a suite of small comedies and smaller elegies, each contained within the liminal capsule of a taxicab, each finding in that mobile confessional booth a different register of human loneliness. The Helsinki segment is the one that lingers, four men condensing an entire social geography of grief into fifteen minutes of darkness. But the surprise of the film, on first encounter, is Rome: Roberto Benigni, playing a driver who subjects his dying priest passenger to an escalating catalogue of sexual confession, carries twenty-odd minutes almost entirely alone, and <u>the fact that the priest dies mid-confession, leaving Gino still talking into the silence, tips the comedy into something stranger and more affecting than farce.</u>

    The Cantonese title translates the film as 'This Minute on Earth,' which captures something the English title misses: not the whole night spread across geography, but the density of a single present moment, wherever one happens to be. Jarmusch is not interested in plot; he is interested in the irreducible texture of an encounter, <u>the way two strangers in a confined space for twenty minutes can brush against each other's entire interior lives without ever quite touching.</u>

- title: "To Be or Not to Be"
  type: "film"
  creator: "Ernst Lubitsch"
  creator_role: "dir."
  year: 1942
  eval: "loved"
  image: "/assets/images/thoughts/films/to_be_or_not_to_be.jpg"
  posted: "2020-10-30"
  text: |
    What is extraordinary about ***To Be or Not to Be*** is not that it is funny, though it is, consistently and mercilessly. It is that Lubitsch makes the comedy do moral work that earnest drama could not. The film's Warsaw theatre company, performing Shakespeare under Nazi occupation and then performing as Nazis to survive it, literalises the claim that <u>fascism is itself a theatrical production: a set of costumes, rehearsed lines, and an audience kept too frightened to notice the stagecraft.</u> Every time Jack Benny, playing the vain ham actor Joseph Tura, deploys his thespian mediocrity as a weapon against actual evil, the joke is not at Tura's expense. It is at the Gestapo's.

    The play-within-a-film arrives and everything elevates a notch, the machinery of theatrical self-consciousness clicking into place with a precision that only Lubitsch seems to have fully understood. The mechanism is simple: the actors are playing Nazis who are playing authority, and the audience watches all three layers at once. What Bosley Crowther called 'callous and macabre' at the time of release was in fact the opposite: <u>Lubitsch's gamble was that laughter, precisely because it refuses to be solemn, could strip fascism of the prestige it required to function.</u> History proved him correct, and the film has only grown sharper with time.

    Carole Lombard, in her final role, handles the film's farce of marital jealousy and political resistance with a lightness that never feels frivolous: she is always, underneath the comic timing, a woman who knows exactly what she is doing. One had full attention for every frame of this, and left it feeling the rare thing a comedy can produce: something close to exhilaration at what human wit is capable of.

- title: "Sherlock Jr."
  type: "film"
  creator: "Buster Keaton"
  creator_role: "dir."
  year: 1924
  eval: "loved"
  image: "/assets/images/thoughts/films/sherlock_jr.jpg"
  posted: "2020-10-28"
  text: |
    Spectacular is the right word, but it barely touches it. ***Sherlock Jr.*** is a film that thinks about cinema as a problem, as a question about the relationship between the watcher and the watched, and then solves the problem through physical comedy of the most precise and dangerous kind. Keaton's projectionist steps into the film-within-a-film and is immediately, violently rejected by it, the landscape cutting around him with each edit so that he finds himself in a garden, then on a street, then at the edge of a cliff, then in a desert, his body the only constant in a world that refuses to cohere. <u>The sequence predates every theoretical account of unstable cinematic space by decades.</u> It was achieved without optical effects, through locked-off camera positions and meticulous in-camera editing, which makes it no less miraculous.

    The chase sequence is masterfully shot, one watches it with hands over one's head, not so much from suspense as from the sheer kinetic pressure of Keaton's invention. He performed everything himself, including the motorcycle ride in which he sits on the handlebars unaware the driver has fallen off, and the combination of technical precision and physical courage is so sustained that the film occasionally feels less like a comedy than like a demonstration of what a human body can survive for the sake of a joke. All of which makes the final image, Keaton peering through the projection booth window at the screen to learn how one is supposed to court a woman, so unexpectedly tender. He spent the whole film trying to enter the movie. At the end, he still needs it to tell him what to do. <u>There is more melancholy in that conceit than the slapstick earns any right to contain, and somehow it does.</u>

- title: "My Octopus Teacher"
  type: "film"
  creator: "Pippa Ehrlich and James Reed"
  creator_role: "dir."
  year: 2020
  eval: "liked"
  image: "/assets/images/thoughts/films/my_octopus_teacher.jpg"
  posted: "2020-10-26"
  text: |
    ***My Octopus Teacher*** is, by any measure, beautifully filmed: the South African kelp forest is rendered with a patience and chromatic richness that the subject deserves, and the octopus herself, in her camouflage and play and predation, is fascinating throughout. These are real achievements. But the framing is harder to accept than the film seems to realise. Craig Foster declines to intervene when a shark attacks the octopus on the grounds that doing so would be 'interfering with nature,' which raises an obvious question he never pauses to answer: is he not part of nature? The octopus may have sought his proximity precisely as a form of protection; the relationship was not symmetrical in the way the film prefers to present it.

    <u>What the film calls 'learning' is, more precisely, a man using a non-human creature as the occasion for his own emotional restoration.</u> The octopus is consistently framed as a teacher, a gift, a presence that exists in order to illuminate Foster's interiority. Not once does the film extend genuine imaginative humility toward what the octopus's experience of this year might have been. <u>The title announces the problem: <em>My</em> Octopus Teacher. The possessive, unremarked, says everything.</u>

- title: "Tokyo Godfathers"
  type: "film"
  creator: "Satoshi Kon"
  creator_role: "dir."
  year: 2003
  eval: "loved"
  image: "/assets/images/thoughts/films/tokyo_godfathers.jpg"
  posted: "2020-10-25"
  text: |
    What immediately strikes one about ***Tokyo Godfathers*** is how completely it sets aside the mode one associates with Satoshi Kon. There is almost none of that technique from *Paranoia Agent* (2004) or *Paprika* (2006) of exploiting animation to dissolve the boundary between the psychological and the real, of using the medium's plasticity as a tool for epistemological anxiety. Save for the recurring angel motif, delicately placed, this is a film that trusts its story to carry everything: three homeless people, a found baby, and a Tokyo on Christmas Eve dense with coincidence. <u>The coincidence is the point.</u> Kon constructs a secular miracle narrative in which the city itself seems to conspire toward reunion, each improbable accident nudging these three lives back toward the connections they have severed.

    Gin, Hana, and Miyuki are among the most fully realised characters in animated film: an alcoholic with a lost daughter, a transgender woman with an abandoned past, a teenage runaway who stabbed her father in a moment she has been living inside ever since. The film treats each of them with the same unadorned compassion, never pitying them, never requiring them to redeem themselves through suffering, simply accompanying them through a night that turns out to matter. The plotting risks melodrama at every turn and somehow holds its footing, because Kon understands that the genre conventions, the Christmas setting, the cascade of unlikely salvation, are not weaknesses to be concealed but honest acknowledgements that some stories require a little grace to resolve.

    And that final お父さん from Miyuki, three syllables addressed to the father she fled and feared was dead, delivered with a simplicity that makes everything preceding it suddenly cohere. <u>This is what animation can do that no other medium quite manages: render the emotional absolute in a register that bypasses irony entirely.</u> <u>One did not expect to be levelled by it. One was.</u>

- title: "Dark Waters"
  type: "film"
  creator: "Todd Haynes"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/dark_waters.jpg"
  posted: "2020-10-18"
  text: |
    ***Dark Waters*** arrived as one of the best new films of the preceding two years, and nothing about it suggested it would reduce one to tears. It is a legal procedural about PFOA contamination in West Virginia, based on Robert Bilott's two-decade campaign against DuPont: the kind of film that announces its importance upfront and often delivers only worthy competence. Haynes refuses the formula. <u>He shoots in desaturated greys and browns, in the visual grammar of 1970s paranoia cinema, as though the landscape itself has already metabolised the poison.</u> Mark Ruffalo's Bilott is not a crusader; he is an exhausted man who cannot stop, which is a more frightening and more accurate portrait of what moral commitment actually looks like under sustained institutional pressure.

    The film works on both registers: as awareness-raising and as storytelling, it is exemplary. The corporations are not populated by cartoon villains but by the logic of routine decision-making, the quiet consensus that profit and concealment are simply how things are done. This is the right way to film corporate horror: not as aberration but as system. PFOA does not break down in the environment or in the body, which is why they are called forever chemicals, and the film has the same quality of permanence, of something that will not leave. <u>One did not know, pressing play, that this film would exist in one's nervous system the way it now does.</u> One rarely does, with the films that matter most.

- title: "活着"
  title_en: "To Live"
  type: "film"
  creator: "Zhang Yimou"
  creator_role: "dir."
  year: 1994
  eval: "loved"
  image: "/assets/images/thoughts/films/to_live.jpg"
  posted: "2020-10-17"
  text: |
    There is nothing in Zhang Yimou's filmography quite like his early register: intimate, granular, unhurried in its grief. The grand sweeping sorrow of Jiang Wen's work operates at a different scale altogether, filling the frame with historical force. ***To Live*** accumulates its losses quietly, at the level of the individual breath. <u>The scene in the middle of the film, where Fengxia gives birth, is where Zhang's method becomes most devastating: Gong Li and Ge You exchange two lines establishing that the disability is not congenital, will not be inherited, the relief almost physical, and then Ge You tells Gong Li to stop saying such unlucky things.</u> The contradiction is not ironic; it is the atmosphere of the era, two incompatible truth-systems coexisting in a single sentence, neither able to displace the other.

    Fengxia bleeds to death because the trained doctors have been imprisoned as class enemies and the only available help is young Red Guards who have been taught ideology and nothing of medicine. The film was banned in China for saying this, and for saying it without polemic, which is the harder thing. Ge You's Fugui survives everything: the gambling debts, the labour camps, the Great Leap Forward, the Cultural Revolution; not through heroism but through a series of accidents, the passive voice of history. <u>People of that era watched everything happen with no grammar for agency, no framework in which their actions could alter what was coming, and the helplessness simply floated in the air.</u> Ge You's performance captures this not through breakdown but through endurance, which is its own form of horror.

- title: "让子弹飞"
  title_en: "Let the Bullets Fly"
  type: "film"
  creator: "Jiang Wen"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/films/let_the_bullets_fly.jpg"
  posted: "2020-10-11"
  text: |
    One can only say ***Let the Bullets Fly*** is among the best of its kind, which is high praise in a filmography that includes *In the Heat of the Sun* (1994) and *Devils on the Doorstep* (2000). It does not reach those films; it was never going to. But it is very good, and 'very good Jiang Wen' is a category that most directors never approach. <u>What the film gives one is the contour of Jiang Wen's brand of personal heroism: Zhang Maza as a man who can only be himself, whose authenticity is his weapon, who wins not by superior force but by refusing to perform.</u> Every other character in the film is wearing a costume, including Chow Yun-fat's magnificently theatrical warlord; Zhang is the one figure whose face matches his interior.

    The story is told with a fluency that slightly exceeded expectations: a notable achievement, given that the previous Jiang Wen film was *The Sun Also Rises* (2007), where fluency was not the project. The film broke box office records in China in 2010 and was read immediately as political allegory, the bandit-governor opposition mapped onto contemporary power structures, the townspeople's eventual uprising freighted with implications that the censors apparently decided to tolerate. <u>Whether the allegory was the point or the packaging, what remains is a film about the rare pleasure of watching someone refuse to be absorbed, refuse to be bought, refuse to become what the system needs him to be.</u> That refusal is Jiang Wen's consistent subject, and here it is delivered with wit and formal confidence. The ending does not stay; the shape of it does.

- title: "鬼子来了"
  title_en: "Devils on the Doorstep"
  type: "film"
  creator: "Jiang Wen"
  creator_role: "dir."
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/films/devils_on_the_doorstep.jpg"
  posted: "2020-10-11"
  text: |
    The interpreter Dong Hanchen stands as a partition of iron bars between two groups of people from different worlds, different eras, different formative environments: it is one of the most precise expressions of private human desire in ***Devils on the Doorstep***. He does not merely translate; he falsifies, and in that falsification the film locates the entire tragedy of the Sino-Japanese encounter. Language, ordinarily the medium of communion, becomes the instrument of a fatal misunderstanding that no amount of goodwill can survive. The ban the film earned in China makes a kind of perverse sense: a war film with no heroes, only people trying to live, is a rebuke to every nationalist mythology that insists otherwise.

    Power is the other core. Jiang Wen himself has said that people are overlapping, that circumstances merely reveal different facets of the same person, and the film dramatises this with merciless consistency. Hanaya Kosaburo before losing power, then after, then once power is restored: three different men inhabiting the same body. The villagers transform with equal completeness. <u>What remains constant is not character but the pressure applied to it, and what crumbles under pressure turns out to be everything one had assumed was bedrock.</u> Whether under warlord rule or Japanese occupation, the daily business of living and dying in the village remains the same, and that continuity is the film's most devastating observation: history does not interrupt life; life is what history devours.

- title: "太阳照常升起"
  title_en: "The Sun Also Rises"
  type: "film"
  creator: "Jiang Wen"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/the_sun_also_rises.jpg"
  posted: "2020-10-08"
  text: |
    Setting aside all subtext, ***The Sun Also Rises*** is already an extreme filmmaking achievement, a few slightly rough effects shots excepted. The scene of Zhou Yun standing on the train shouting, the sunrise sequence, Jiang Wen's distinctly corporeal camerawork, the sexual repression wound so tight it achieves its own gravity, the cold blue-grey sky pressing down on everything: any one of these would justify watching. Together they constitute a kind of sensory argument, a film that insists on being felt before it is understood. Jiang Wen himself has said he wanted his audience to feel rather than comprehend, and the four non-linear episodes, moving backward through decades of Chinese history, enforce that demand at the structural level.

    On the question of colour: one particularly loves the cold-to-warm alternation in the opening scene where Zhou Yun is knocked down by Fang Zushe, the palette shift mirroring the cold-to-warm alternation in the final scene with the newborn. <u>It is the kind of rhyme that does not announce itself, that one only notices after the fact, and that, once noticed, makes the film feel as though it had been dreaming of its own ending the whole time.</u> The cyclical structure underneath the surrealism is not obscure; it is patient. One spent the middle half-lost and half-bewildered, which is probably the correct state. By the end, one only wanted to cry.

- title: "Judgment at Nuremberg"
  type: "film"
  creator: "Stanley Kramer"
  creator_role: "dir."
  year: 1961
  eval: "meh..."
  image: "/assets/images/thoughts/films/judgment_at_nuremberg.jpg"
  posted: "2020-10-06"
  text: |
    ***Judgment at Nuremberg*** functions in practice as something like an extended, magnificently acted documentary. Abby Mann's screenplay, adapted from his own television play, is genuinely non-simplistic in its distribution of blame: the intranational pressures on ordinary Germans, the reluctance to testify against one's own people, appeasement, the complicity of the Soviet Union and Britain and the Vatican, patriotism deployed as legal defence, the concept of so-called Laws of Nature invoked as moral absolute. The film does not simplify any of this, and the defence attorney's arguments are presented with enough force that Maximilian Schell won the Oscar by playing the least comfortable person in the room. One personally disagrees with Judge Haywood's verdict, and that disagreement itself illustrates the problem with anchoring jurisprudence in natural law: the intuitions feel universal until they don't.

    <u>But the film keeps reaching for the human and forgetting that what belongs in a courtroom is jurisprudence.</u> The issues touched on here resist being deeply examined in any bounded time, and at nearly three hours the film still feels like it has only scratched the surface of what rigorous legal argument might demand. The emotional climax, when Burt Lancaster finally speaks, is undeniably powerful; one wishes the film had trusted the law as much as it trusts the feeling.

- title: "The Godfather: Part III"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1990
  eval: "meh..."
  image: "/assets/images/thoughts/films/the_godfather_part_iii.jpg"
  posted: "2020-10-04"
  text: |
    Unquestionably the weakest of the trilogy, and the weaknesses are structural rather than incidental. Beyond the insufficient budget and the evident pressure of a rushed production, ***The Godfather: Part III*** suffers from two compounding problems: the last-minute replacement of Winona Ryder with Sofia Coppola in the role of Mary, which places a performer of limited experience at the emotional centre of the film's climax; and the general quality of reluctance that haunts the project, the sense of a third act being performed out of obligation to the first two rather than generated from its own necessity. <u>Mike's ending is indefensible by any internal logic the trilogy has established, and the opera-house finale, which should devastate, is undermined before it can land.</u>

    The trilogy problem is a real one. A third chapter almost always disappoints, burdened by the obligation to resolve what the first two films were wise enough to leave in productive tension. *The Return of the King* (2003) remains the exception that tests the rule. <u>Once one accepts that this film was probably impossible to make well, it becomes bearable: a flawed conclusion to something that did not need a conclusion, carrying enough of the Corleone atmosphere to remind one, ruefully, of what was there before.</u>

- title: "The Godfather: Part II"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1974
  eval: "loved"
  image: "/assets/images/thoughts/films/the_godfather_part_ii.jpg"
  posted: "2020-10-04"
  text: |
    One witnesses Mike's transformation firsthand in ***The Godfather: Part II***, built with such care and precision across the Havana sequences, the Senate hearings, the confrontations with Kay, that when the final ten minutes arrive and the mask has entirely come off, every decision feels earned rather than declared. Coppola and Puzo construct a moral mirror between two Godfathers: Vito built his empire to protect his family; Michael destroys his family to protect his empire. <u>The parallel structure forces that comparison at every cut, the warmth of the immigrant origin story a constant ironic counterweight to the cold, bureaucratic lovelessness of Michael's present.</u> Robert De Niro speaks less than anyone in his storyline and communicates everything.

    The one regret is that the intercutting of flashbacks is something one cannot quite follow at the pace the film demands, the seams of the dual chronology occasionally more visible than they should be. But the final image, Michael alone and ageing and irretrievably isolated, is among the most quietly devastating conclusions in American cinema. Pacino internalises everything here, which makes the moments when the mask slips feel like ruptures in the earth.

- title: "The Godfather"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1972
  eval: "loved"
  image: "/assets/images/thoughts/films/the_godfather.jpg"
  posted: "2020-10-03"
  text: |
    Watching ***The Godfather*** produces a feeling very similar to watching *The Irishman* (2019), which is to say: one can see the conversation happening across decades, Scorsese in sustained dialogue with Coppola, demythologising what Coppola mythologised, stripping the gangster epic of its classical grandeur and leaving only regret. It would not be wrong to say Scorsese modelled himself on this film, and it would not be wrong to say the model is this formidable. The storytelling is masterful, the detail abundant, three hours that flow like water. Gordon Willis's chiaroscuro interiors, the deliberate pace that never feels slow, the way the film earns its operatic scale by grounding everything first in the textures of family and ritual: these are not techniques but a complete vision of what American cinema could do when it stopped being afraid of moral complexity.

    <u>One finished it already looking forward to watching Pacino's performance carry across the next two films</u>, which is perhaps the highest compliment one can pay a trilogy: that it ends with a hunger rather than a resolution. Thanks to 山鸡 for the commentary, which made the detail finally legible.

- title: "Stardust Memories"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1980
  eval: "loved"
  image: "/assets/images/thoughts/films/stardust_memories.jpg"
  posted: "2020-10-01"
  text: |
    ***Stardust Memories*** is Allen's most nakedly adversarial film, and the one that got him into the most trouble with audiences who couldn't tell whether they were the target. Sandy Bates, Allen's transparent surrogate, attends a retrospective of his own work while being besieged by fans, critics, and studio executives demanding he stay funny, stay accessible, stay theirs. The Fellinian debt is acknowledged rather than concealed: the black-and-white cinematography, the harem of idealised women, the director paralysed by memory and mortality all arrive stamped with *8½* (1963)'s return address. <u>What Allen adds, in his own characteristically sideways fashion, is the comedy of bad faith, the spectacle of an artist performing self-examination so ostentatiously that the performance becomes its own indictment.</u> The film's ending, in which the 'film' Sandy has been making is revealed to be the film one has been watching, is the oldest postmodern trick in the book; but Allen earns it, because the whole edifice has been building toward that recursive collapse.

    The critics who felt personally mocked were not wrong, exactly; but later reassessments have converged on a more uncomfortable reading: Allen is satirising Sandy's elitism as much as he is satirising the fans, staging a narcissist's fantasy of being misunderstood and then quietly letting the staging show. The women function as projections, as they so often do in this filmography, but here that very function is part of the pathology on display. One line cuts through all of it: 'Relationships depend on luck. But people just don't want to acknowledge that.' Delivered with the flat finality of someone who has thought about this for twenty years and arrived nowhere, it is Allen's credo and his alibi simultaneously. <u>The film that surrounds it is too smart to be comforting, and too funny to be forgiven.</u>

- title: "Following"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 1998
  eval: "meh..."
  image: "/assets/images/thoughts/films/following.jpg"
  posted: "2020-09-22"
  text: |
    ***Following*** is the film Nolan had to make before he could make anything else, and it shows. Shot over a year of weekends on a budget of roughly six thousand pounds, in black and white, with a cast of mostly non-professionals, it has the stripped-down intensity of a calling card and the structural ambitions of someone who has already decided that chronology is a problem to be solved rather than a given to be accepted. The three-strand timeline, distinguishable by Bill's bruising, does create genuine dramatic irony; the detective's final onion-peeling of evidence is a satisfying piece of construction. These are real virtues.

    <u>The trouble is that the non-linear editing serves no purpose beyond demonstrating that it can be done.</u> The structure exists to reveal a twist, not to deepen character or sharpen theme; once the trick is understood, the film becomes, retroactively, a fairly slight story about a man being manipulated. The lead performs shifty anxiety throughout, which is at least appropriate to the material, but the second lead's performance is something else entirely, the register of someone reading lines with conviction they have not yet earned. <u>One reaches for <em>Following</em> mainly when one needs a clear example of editing deployed as ostentation rather than argument: the formal ambition is real, but it is not yet in service of anything commensurate.</u>

- title: "Manhattan"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1979
  eval: "liked"
  image: "/assets/images/thoughts/films/manhattan.jpg"
  posted: "2020-09-21"
  text: |
    The opening of ***Manhattan*** is a sustained act of mythologisation: Isaac Davis narrating competing love letters to New York over Gershwin's *Rhapsody in Blue* (1924), Gordon Willis's black-and-white cinematography turning a city in fiscal crisis into pure romantic abstraction. Allen understood that Gershwin could do ideological work, that the music would seduce the audience into accepting Isaac's worldview before Isaac had demonstrated he deserved it. The plot is, as noted, fairly straightforward: a narcissist cycles through women, damages each of them in proportion to his self-regard, and ends by reaching for the one person in the film who behaves with genuine integrity, only to discover, via that final scene, that he has left it too late.

    <u>The whole film is a narcissist staging his own tragedy, which means one is never quite sure how much of the irony is intentional.</u> The critical reading that Tracy, far from being a passive figure, is the film's moral centre, has accrued weight over the decades, not least because it makes the ending devastating in a way that resolves otherwise nagging discomfort. <u>That final scene, its dialogue set against the Gershwin that has been selling Isaac's self-image all along, is utterly shameless in the best possible sense: the music turns ironic, the myth collapses, and what is left is a man who has talked himself out of the only uncomplicated thing he had.</u> Very typical Woody Allen.

- title: "Love and Death"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1975
  eval: "loved"
  image: "/assets/images/thoughts/films/love_and_death.jpg"
  posted: "2020-09-20"
  text: |
    ***Love and Death*** is Allen doing Shakespearean theatre in the manner of a stage comedy, which is a more precise description than it might sound. The film deploys its homages with the confidence of someone who has actually read the originals: Tolstoyan family trees and epic historical canvas, Dostoevskian interior monologue and existential guilt, Bergmanesque death imagery direct from *The Seventh Seal* (1957), dream sequences that borrow the austerity of *Wild Strawberries* (1957). <u>The parody is affectionate throughout, never cheap, the kind that can only be written by someone who admires what they are mocking.</u> Allen has described it as his personal favourite among his early comedies; one can see why, because it is the film where his absorption in Russian literature, genuine and deep, finds a form that matches it.

    Diane Keaton's Sonja is the film's philosophical engine: more articulate than Allen's Boris, less encumbered by cowardice, she combines Natasha's passion with Ivan Karamazov's relentless interrogation of God and mortality. The debates between the two characters carry the same central joke that Dostoevsky carried through five hundred pages, namely that profound philosophical questions yield no satisfying answers, delivered here in vaudeville packaging. The pile of sources, Tolstoyan, Dostoevskian, Shakespearean, Bergmanesque, flagged and catalogued and stitched together, is seamless precisely because Allen understands them well enough to let them contradict each other productively. <u>It arrives at the same place <em>Annie Hall</em> (1977) would, two years later, with the same fundamental conviction: that life is meaningless and also worth every argument about whether it is.</u>

- title: "妄想代理人"
  title_en: "Paranoia Agent"
  type: "film"
  creator: "Satoshi Kon"
  creator_role: "dir."
  year: 2004
  eval: "loved"
  image: "/assets/images/thoughts/films/paranoia_agent.jpg"
  posted: "2020-09-19"
  text: |
    ***Paranoia Agent*** is the series Kon used as a repository for ideas that couldn't be compressed into film-length form, which means it is also the work where his thematic obsessions are most fully mapped. Lil' Slugger, the boy on inline skates with his bent golden bat, is a manifestation of collective desire rather than individual malice: he appears to people under pressure who need an escape route, a scapegoat, an external cause for collapse. The series understands that mass hysteria is not a pathology imposed on individuals from outside but a social compact, something people consent to because the alternative is accountability. Maromi, the pink dog mascot whose merchandise saturates the show's Tokyo, is Lil' Slugger's other face: the comfort object and the threat are born from the same repressed trauma, Tsukiko's childhood lie that became a city's delusion.

    The storytelling is gripping in the way that only architecturally precise plotting can be. One returns after each episode to re-examine the previous episode's dream sequence with revised coordinates; the rewards are real and layered. It was only from episode ten onwards that the connection between Maromi and the bat became clear, which meant the final three episodes arrived with a slight sense of foregone conclusion, the revelation landing where one already, half-knowingly, expected it. <u>That mild foreordination is not a flaw so much as a structural honesty: Kon is showing us a cycle, and cycles, by definition, have to end where they began.</u> The final shots, a world rebuilt and already sliding back into the same patterns of denial, offer no comfort. They are not meant to.

- title: "The Purple Rose of Cairo"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1985
  eval: "loved"
  image: "/assets/images/thoughts/films/the_purple_rose_of_cairo.jpg"
  posted: "2020-09-15"
  text: |
    <u>***The Purple Rose of Cairo*** threads its meta conceit through every layer of the film rather than deploying it as a framing device and stepping back.</u> Tom Baxter walks out of the screen not as a one-off surrealist gag but as the engine of a sustained philosophical argument: what does a fictional character lack that a real person has, and is the answer, whatever it is, actually a desirable thing to possess? Jeff Daniels plays both Tom and the actor Gil Shepherd, the wide-eyed movie hero and the calculating Hollywood professional, and the contrast does the film's argumentative work quietly but precisely. Tom is loyal, romantic, brave, and incapable of real consequence; Gil is real, flawed, and gone the moment his career requires it. Cecilia, choosing Gil, chooses reality, and reality delivers what it always promises: betrayal dressed as pragmatism.

    The Depression-era setting is not incidental. The film understands why cinema existed in the 1930s as a social institution, why Cecilia goes back every day, why the same film plays to the same audience who mouth the dialogue along with the screen. Allen loves cinema enough to make a film about the cruelty of loving it too much. The ending, Cecilia watching Fred Astaire dance through her tears until the tears dry and something close to consolation settles over her face, is among the most precisely calibrated final images in his filmography. <u>One was still naively waiting for Gil Shepherd when the film ended; the film, having predicted this, had already moved on.</u> It ranks close to *Annie Hall* (1977) in one's estimation, and not by accident.

- title: "Du levande"
  title_en: "You, the Living"
  type: "film"
  creator: "Roy Andersson"
  creator_role: "dir."
  year: 2007
  eval: "loved"
  image: "/assets/images/thoughts/films/you_the_living.jpg"
  posted: "2020-09-09"
  text: |
    ***You the Living*** is the second panel of Andersson's informal Living Trilogy, and arguably the most purely comic of the three: fifty-odd vignettes, each a single static wide-angle take, each a sealed universe of minor humiliation and inarticulate longing. The title is lifted from Goethe's *Roman Elegies* (1795), an injunction to savour the warmth of one's bed, and the cruelty of the irony is characteristic: these people are alive in the technical sense only. A man is executed for botching a tablecloth trick before royalty; a psychiatrist confesses he can no longer help anyone; a brass band wanders perpetually through rain. <u>The Brechtian apparatus, the pallid faces and flat line readings, the artifice of the constructed sets, all conspire to produce not detachment but something stranger: an ironic compassion, a grief at arm's length.</u>

    That evening the occasion of watching was itself freighted: *Annie Hall* (1977) had just finished in the same sitting, and the combination was almost too much. <u>What Andersson shares with Allen, across their vast stylistic differences, is the conviction that comedy and sorrow are not opposites but the same substance in two phases.</u> One can only say that *You the Living* (2007) is an excellent film, and that it left one quite sorrowful, in a way that took some time to place.

- title: "Annie Hall"
  type: "film"
  creator: "Woody Allen"
  creator_role: "dir."
  year: 1977
  eval: "loved"
  image: "/assets/images/thoughts/films/annie_hall.jpg"
  posted: "2020-09-09"
  text: |
    The usual reading of ***Annie Hall*** is that it reinvented the American romantic comedy, which is true but undersells the violence of the operation. Allen and Marshall Brickman constructed the film as a neurotic's post-mortem: the relationship is already dead at the opening frame, and the non-linear structure, the fourth-wall addresses, the split-screen therapy scene, are all instruments of that autopsy. Alvy Singer's famous Groucho Marx joke, 'I wouldn't want to belong to any club that would have me as a member', functions less as a punchline than as the film's emotional thesis; a man unable to be happy with anything that would consent to make him happy. <u>The comedy is not relief from that condition but its most precise notation.</u>

    Having recently watched *Zelig* (1983), Allen's signature was already legible: the restless formal invention, the comedy that curls back on itself to reveal something bleak underneath. But *Annie Hall* (1977) runs deeper than formal cleverness. The final montage of memories, joyful scenes now coloured by knowledge of loss, achieves something very few films manage: it makes the sadness feel earned rather than manufactured. <u>One came away from it with the specific ache of mourning romantic idealism itself, the impossibility of sustaining the feeling that sustains everything else.</u> Loved it completely.

- title: "Sånger från andra våningen"
  title_en: "Songs from the Second Floor"
  type: "film"
  creator: "Roy Andersson"
  creator_role: "dir."
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/films/songs_from_the_second_floor.jpg"
  posted: "2020-08-29"
  text: |
    Coming to ***Songs from the Second Floor*** only after *A Pigeon Sat on a Branch Reflecting on Existence* (2014) produces an odd temporal vertigo, the sensation of reading the first chapter of a book after already knowing its final page. The opening work of the Living Trilogy is also its most formally austere: 46 static tableau shots, every one of them in wide-angle fixed frame, with the exception of a single reverse tracking shot that stands out precisely because of its singularity. The chalky makeup, the flat affect, the cramped institutional interiors built in Andersson's Stockholm studio, Studio 24: the sense of alienation crosses the screen without mediation. A girl does not know she is walking toward her death. A merchant does not know he is walking toward his ruin. The audience does not know the building outside the frame is swaying. Andersson names this condition 'unknowing', and makes it contagious.

    <u>The film's deepest and most unsettling project is the representation of <em>taming</em>: it is saturated with its images while deliberately evacuating any reflection on it.</u> People stand indifferent before a man weeping in the street. A teacher's cries for help register as ambient noise. A young girl is sacrificed at a cliff-side altar in a desperate bid to restart economic progress, and the bystanders shuffle away as though from a middling theatrical event. By draining the scenes of moral commentary, Andersson sharpens the satirical edge past the point of comfort. <u>The contrast between the depicted fact and the film's silence about it is where the critique lives.</u> Compared to *A Pigeon Sat on a Branch* (2014), there is here a slightly clearer through-line in Karl's story, but the film resists it, keeps pulling toward the collective rather than the individual. Civilisation gridlocked; everyone stranded; César Vallejo quoted somewhere in the middle: 'I am sorry, but I cannot do anything.' It is one of the most disquieting films one has seen.

- title: "Inception"
  type: "film"
  creator: "Christopher Nolan"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/films/inception.jpg"
  posted: "2020-08-29"
  text: |
    One was very young the first time through ***Inception***, and the scenes that lodged were precise and imagistic: Ariadne touching the mirror under the bridge and watching Paris double, DiCaprio spinning the top on the table. At the time the architecture seemed impossibly complex; watching again ten years on, what strikes is how legible it all is, how carefully Nolan has scaffolded the exposition through Ariadne's surrogate-audience function, how clean the dream-level geography really is once the anxiety of first encounter subsides. The film has been called, sometimes as criticism, a film of pure mechanics dressed as profundity. There is something to this. <u>The emotional content is real but it sits in a locked room at the centre of all the machinery, and the machinery is so spectacular that one sometimes forgets to feel it.</u>

    The visual effects, practical and digital both, remain extraordinary: the rotating hotel corridor built on a gimbal, the folding Paris streetscape, the sequences of genuine zero-gravity choreography. What strikes on re-watch is how much was actually built rather than rendered, how material the dream-world feels. Still, Nolan's *Interstellar* (2014) seems to reach somewhere *Inception* (2010) declines to go; there is a warmth the later film earns that this one keeps at arm's length. That distance is perhaps the point. But one notices it. <u>The top spins and the cut comes, and one is left, as always, not quite sure what one was meant to feel.</u>

- title: "La vita è bella"
  title_en: "Life Is Beautiful"
  type: "film"
  creator: "Roberto Benigni"
  creator_role: "dir."
  year: 1997
  eval: "loved"
  image: "/assets/images/thoughts/films/life_is_beautiful.jpg"
  posted: "2020-07-26"
  text: |
    ***Life Is Beautiful*** is a textbook demonstration of plant-and-payoff so precise it feels almost theoretical: every element introduced in the film's first half, the romantic comedy set in sun-soaked pre-war Tuscany, returns with doubled force in the concentration camp sequences of the second. The riddle-loving Aryan doctor, the hat trick, the 'Good morning, Princess!', 'Buongiorno, Principessa!', the wink shared between father and son: Benigni and co-writer Vincenzo Cerami laid these fuses with extraordinary care. <u>The formal conceit, comedy first so that one falls in love before one is asked to watch someone suffer, is borrowed from Chaplin's logic in <em>The Great Dictator</em> (1940), but the emotional arithmetic is Benigni's own.</u> Guido's game, the fiction he constructs around the camp's rules to protect his son Giosuè, is storytelling as an act of love so total it constitutes a moral philosophy.

    The critical controversy, whether a Holocaust comedy risks trivialising atrocity, feels beside the point in the watching of it. Benigni called the film a fable, and the word is precise: fables are not documentaries, they are machines for transmitting moral truth through the imagination. What makes this particular machine so extraordinary is that the setups are already delightful when they first appear, so that their later returns function as recognition and grief simultaneously. <u>One could barely believe Guido was dead even at the ending; when the boy runs out to see the American tank and the score swells, one was already in tears.</u> Not because the film has tricked one into feeling something false, but because it has constructed a space in which the feeling is the only true thing. Loved this film beyond almost anything.

- title: "The Irishman"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2019
  eval: "loved"
  image: "/assets/images/thoughts/films/the_irishman.jpg"
  posted: "2020-07-24"
  text: |
    The first feeling after finishing ***The Irishman***, as with several other Scorsese films in the same week, was a recognition of what extraordinary storytelling looks like when it does not call attention to itself. Three and a half hours, and the question of bloat never seriously arises: Frank Sheeran's emotional thread and Jimmy Hoffa's union history thread interweave from the beginning and then, at the exact moment the narrative demands it, separate. The film is structured as a triple-layered flashback, Sheeran narrating from a nursing home in old age, and that retrospective distance colours every act of violence with something it rarely has in Scorsese's earlier gangster films: not glamour but regret, time pressing down on every frame. Al Pacino's Hoffa is charismatic and stubborn and tragic; Joe Pesci's Russell Bufalino is chillingly understated. De Niro's Sheeran carries the weight of a life's worth of compartmentalisations.

    The scene near the end where Frank goes alone to select his coffin sits particularly vivid. The salesman, if that is the right word, asks: 'Are you picking it for a woman or a man?' Frank says: 'For me.' One did not quite know why that was the moment it became difficult not to cry, except that it was the purest possible image of what the film is about: a man who has outlived everything that gave his life its shape, choosing the box he will be placed in alone. <u>'Everybody's dead, Mr. Sheeran. It's gone.' An era passes, and what time leaves behind is not achievement or justice but only warmth and nostalgia, which is another way of saying nothing at all.</u> Scorsese has spent a career romanticising these men; here, finally, he reckons with the cost.

- title: "The Wolf of Wall Street"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/the_wolf_of_wall_street.jpg"
  posted: "2020-07-23"
  text: |
    It is hard to articulate exactly what one feels about ***The Wolf of Wall Street***, and that difficulty is, in a sense, the film's central achievement. DiCaprio's speeches, his set pieces of narco-euphoria, the physical comedy of the quaalude crawl: every small gesture is precisely calibrated to embody the nouveau riche desperate to turn money into spectacle. The performance finds the animal joy in Belfort's derangement without once asking for sympathy, and Scorsese, who has spent his career filming charismatic criminals, understands that the most damning portrait is the one that never lifts its finger to point. <u>The film's great trick is to make the audience complicit, to engineer three hours of uncomfortable pleasure, and then to leave the final image, Belfort's seminar audience mirroring us in our seats, as a quiet indictment of everyone in the room.</u>

    As a piece of storytelling craft, the film is close to flawless. Not a line of dialogue is redundant; not a single shot is wasted. The Swiftian reading, that this is savage satire rather than glamorisation, has been argued at length, and the debate will not be settled here: what can be said is that whether Belfort's story is taken as critique or as spectacle, the narrative architecture holds either reading without strain. Whether it captures the reality of Wall Street, only those who ran it can say. What is beyond dispute is the storytelling itself, which is among the tightest Scorsese has produced.

- title: "The Aviator"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2004
  eval: "loved"
  image: "/assets/images/thoughts/films/the_aviator.jpg"
  posted: "2020-07-23"
  text: |
    One first encountered Howard Hughes through the name on the letterhead of the Howard Hughes Medical Institute, and assumed, reasonably enough, that it honoured some eminent scientist. The reality is stranger and more telling: Wikipedia records that Hughes founded the HHMI with the ambition to 'understand the genesis of life itself,' which places him somewhere between a twentieth-century Elon Musk and Tony Stark, a wealthy tech obsessive whose reach exceeded every sensible boundary. Scorsese understands this type instinctively. ***The Aviator*** is not a conventional biopic in the mode of celebrating its subject from a respectful distance; it is a film about what ambition costs when the mind that houses it begins to crack.

    <u>DiCaprio renders Hughes's OCD not as quirk or colour but as genuine, debilitating terror, and the performance is all the more remarkable for never losing the character's imperial self-certainty even as the compulsions tighten around him.</u> Robert Richardson's cinematography deserves its own acknowledgement: the progression from warm two-strip Technicolor pastiche in the early sequences to a coldly clinical palette later is one of the more elegant uses of colour as psychological register in contemporary cinema. That 山鸡 suggests DiCaprio is best suited to playing the unhinged may be reductive, but it contains enough truth to sting. One adored this film.

- title: "Mulholland Dr."
  type: "film"
  creator: "David Lynch"
  creator_role: "dir."
  year: 2001
  eval: "liked"
  image: "/assets/images/thoughts/films/mulholland_dr.jpg"
  posted: "2020-07-22"
  text: |
    ***Mulholland Dr.*** is, with some effort, untangleable: the first two-thirds as Diane Selwyn's guilt-ridden wish-fulfilment fantasy, the final act as its brutal dissolution, the blue box as the threshold object that lets the real intrude upon the imagined. <u>The Silencio theatre sequence, in which Rebekah Del Rio's a cappella 'Llorando' continues after she collapses mid-performance, crystallises the film's governing logic: the illusion survives the body that produces it.</u> <u>As a piece of arthouse cinema, that scene earns its reputation; the film around it is a less settled proposition.</u>

    The critical consensus that the film is 'incomprehensible' is mostly the wrong objection, a failure of patience rather than a genuine narrative defect, but there are real structural problems here that the Lacanian scaffolding (desire structured around absence, fantasy collapsing when the Real intrudes) tends to paper over rather than resolve. Lynch's most significant miscalculation may have been underestimating how thoroughly the Freudian apparatus would be deployed: now every dream in a film automatically summons the couch, and the result is a critical discourse so thick with psychoanalytic attribution that the film's stranger, more irreducible textures get flattened. Taken as a semi-commercial semi-arthouse object, it is more than acceptable. <u>As the greatest film of the century, the designation a BBC poll awarded it, one remains sceptical.</u>

- title: "Frequency"
  type: "film"
  creator: "Gregory Hoblit"
  creator_role: "dir."
  year: 2000
  eval: "loved"
  image: "/assets/images/thoughts/films/frequency.jpg"
  posted: "2020-07-22"
  text: |
    The premise of ***Frequency***, a ham radio inexplicably bridging 1969 and 1999 via an aurora borealis anomaly, asks for a particular kind of good faith, and the film earns it. This is, at its core, nothing more than a family drama about a son who never got to know his father, wrapped in a science-fiction shell just substantial enough to carry the emotional weight without collapsing under its own logic. Dennis Quaid and Jim Caviezel, who never share the screen, generate genuine chemistry through the architecture of Toby Emmerich's screenplay and the formal conceit that forces them to act against a radio microphone rather than each other.

    <u>The thriller mechanics, the butterfly-effect ripples that saving a life in 1969 sends cascading through a 1999 murder investigation, are tighter than the genre usually demands, and the telegraphing of beats, the way certain shots hint clearly at what is coming, reads less as a flaw than as craft.</u> By the final act, one wanted to cry. It is a very fine story.

- title: "The Thirteenth Floor"
  type: "film"
  creator: "Josef Rusnak"
  creator_role: "dir."
  year: 1999
  eval: "loved"
  image: "/assets/images/thoughts/films/the_thirteenth_floor.jpg"
  posted: "2020-07-21"
  text: |
    ***The Thirteenth Floor*** arrived alongside *The Matrix* (1999) and *eXistenZ* (1999), forming an unofficial triptych of simulation-theory cinema at the end of the millennium. <u>It is the quietest of the three, a noir detective story at its surface, and it was commercially crushed by the cultural gravity of <em>The Matrix</em> (1999), which means its philosophical ambition has been consistently undervalued.</u> The adaptation of Daniel F. Galouye's novel *Simulacron-3* (1964) gives the film a literary pedigree that arguably makes it the oldest root of what later became the modern simulation-cinema family tree: nested realities, the question of whether simulated consciousness deserves moral consideration, and the vertigo of a 'base reality' that may itself be suspect.

    The effects date in the way that *Tron* (1982) dates: the 'edges of the world' imagery, where the simulation simply stops and gives way to wire-frame void, carries the same endearing period texture. Everything else holds up rather well. <u>As a precursor to <em>Inception</em> (2010), the structural kinship is clear: layered constructed realities, protagonists navigating downward through ontological floors, an ambiguous ending that refuses to confirm where bottom is.</u>

- title: "Coherence"
  type: "film"
  creator: "James Ward Byrkit"
  creator_role: "dir."
  year: 2013
  eval: "loved"
  image: "/assets/images/thoughts/films/coherence.jpg"
  posted: "2020-07-17"
  text: |
    ***Coherence*** is gripping in the most literal sense: one's attention does not slip for the full eighty-odd minutes, which is a significant achievement for a film shot over five nights without a script, on character notes alone. The many-worlds conceit, a passing comet functioning as a decoherence event that allows the boundaries between parallel versions of the same dinner party to dissolve, is handled with the confidence of a film that knows it is using science as structural logic rather than as decoration.

    The complaints one wants to register are less about the film itself than about its reception. Reviews from self-identified 'science students' insisting the quantum-mechanical background is 'hardcore' or 'rigorously accurate' deserve a precise objection: whether the Copenhagen interpretation or the Everettian many-worlds reading, quantum theory addresses phenomena at the subatomic scale, and neither framework has been extended to macroscopic objects in any empirical or theoretical context that would justify a comet producing visible parallel-timeline bleed at a dinner party in Los Angeles. <u>The question of why this particular setup is held to be more scientifically rigorous than <em>Your Name</em> (2016)'s comet-and-time-swap is one the film's more credulous admirers have not adequately addressed.</u> Suspension of disbelief is the correct register, and the film earns it honestly. One should not mistake that generosity for physics.

- title: "Les quatre cents coups"
  title_en: "The 400 Blows"
  type: "film"
  creator: "François Truffaut"
  creator_role: "dir."
  year: 1959
  eval: "meh..."
  image: "/assets/images/thoughts/films/the_400_blows.jpg"
  posted: "2020-07-17"
  text: |
    The first half of ***The 400 Blows*** holds the attention; the latter portion confirms what 山鸡 had suggested, that the French New Wave would not be immediately congenial. At twenty-one, one can relate to only a very small sliver of Antoine Doinel's world: the indifferent parents, the punishing school system, the particular Parisian grimness of the postwar bourgeois interior are all recognisable as types, but the texture of lived experience they form is distant in a way that proximity to one's own formation makes it difficult to bridge. The jump-cut editing, the deliberate refusal of classical continuity, sits against the grain of one's instincts in a way that feels honest to acknowledge rather than dress up as appreciation.

    And yet, with all of that, the film holds. The image quality is startlingly crisp for a film shot in 1959; it looks nothing like 1959. Truffaut won Best Director at Cannes and deserved it. Then Antoine runs, reaches the sea, and Truffaut freezes the frame on his face. <u>The ocean one had been anticipating since before the film began, the sea large enough to hold a brutal adolescence, arrived, and offered nothing, and that was everything.</u>

- title: "Shutter Island"
  type: "film"
  creator: "Martin Scorsese"
  creator_role: "dir."
  year: 2010
  eval: "loved"
  image: "/assets/images/thoughts/films/shutter_island.jpg"
  posted: "2020-07-15"
  text: |
    ***Shutter Island*** operates in the key of sustained dread, the kind that Scorsese engineers not through shock but through the slow, architectural accumulation of wrongness: an island that withholds its geometry, a face that won't quite match its name, a score that tilts the inner ear just enough to make solid ground feel provisional. The film borrows the grammar of noir and Gothic melodrama, storms, labyrinthine corridors, women who appear and dissolve, and turns them into a phenomenology of guilt. Dennis Lehane's source novel is a puzzle box; Scorsese's adaptation is something stranger, a meditation on what the mind will construct to protect itself from what it already knows.

    The ending at the lighthouse gathers everything the film has withheld and presses it into a single ethical question. Teddy Daniels asks whether it is worse to live as a monster or to die as a good man, and the line lands with the weight of a verdict passed from the inside. <u>The horror is not the revelation but the choice: that a mind, fully restored to itself, might deliberately reach back into the dark rather than bear what lucidity costs.</u> Scorsese holds on the lighthouse long enough for its symbolism to collapse into something rawer, not a beacon but a terminus, the place where self-knowledge and self-erasure become indistinguishable. Over three months of half-watched films passed before anything hit with comparable force.

- title: "시"
  title_en: "Poetry"
  type: "film"
  creator: "Lee Chang-dong"
  creator_role: "dir."
  year: 2010
  pin: true
  eval: "loved"
  image: "/assets/images/thoughts/films/poetry.jpg"
  posted: "2020-07-14"
  text: |
    <u>Lee Chang-dong is perhaps the most morally rigorous filmmaker working in world cinema, and ***Poetry*** is his most quietly devastating proof.</u> Mija, played by Yoon Jung-hee, returning from decades of retirement in what critics have rightly called a career-defining performance, is sixty-six years old, newly diagnosed with early Alzheimer's, enrolled in a community poetry class because she wants to learn how to see beauty, and in possession of a terrible secret about her teenage grandson. The film does not arrange these facts dramatically. It lets them coexist, as they do in actual lives, until their weight becomes unbearable.

    The handheld camera earns its place here, not through the aggressive kinetics that make the technique feel like a tic in lesser hands, but through a quality of patient, unobtrusive accompaniment: it follows Mija the way a careful friend would, close enough to witness, far enough to allow. The badminton scene before the ending, not a word spoken, the shuttlecock drifting back and forth in a courtyard drenched in ordinary afternoon light, holds inside it the whole moral architecture of the film. Joy and culpability are not opposites; they coexist in the same body, in the same afternoon, in the same ageing woman who is simultaneously complicit and innocent and trying, against all cognitive odds, to find the words for what a flower looks like. The poem that closes the film, Mija's only completed poem, arrives as both elegy and absolution, though the film is wise enough not to confirm which.

- title: "Apocalypse Now"
  type: "film"
  creator: "Francis Ford Coppola"
  creator_role: "dir."
  year: 1979
  eval: "loved"
  image: "/assets/images/thoughts/films/apocalypse_now.jpg"
  posted: "2020-07-08"
  text: |
    One had read *Heart of Darkness* (1899) and thought: this cannot be filmed. Not the prose, which is Conrad's instrument of entrapment, the way Marlow's retrospective narration folds hesitation and horror into every subordinate clause, and not the novella's central claim, that the darkness is not in Africa but in the men who arrive there with lanterns and ledgers and the vocabulary of civilisation. An adaptation surfaced, a few minutes were sampled, and it was dull in the way that literary adaptations are dull when they understand the plot but not the argument. Then ***Apocalypse Now*** appeared.

    The moment Willard's target turned out to be named Kurtz, something snapped into focus. As the river journey deepened into Vietnam and then into Cambodia, into jungle that the film renders as a kind of sentient suffocation, it became clear: this is the *Heart of Darkness* (1899) plot, and it is the faithful version precisely because it has changed the colonial theatre from Congo to Southeast Asia without changing a single thing about what colonialism does to the men it sends. <u>Coppola understood that Conrad's subject was not Africa but the structure of imperial self-mythology, which is why transposing it to the American war in Vietnam is not an adaptation so much as a translation into the idiom where the argument is still alive.</u> Brando's Kurtz delivers 'the horror, the horror' and the phrase lands exactly as it lands in Conrad: not as description but as the only honest account a mind can give of itself after it has seen what it has done. Every sense of shock from reading the novella applies here, because it is the same shock.

- title: "Baraka"
  type: "film"
  creator: "Ron Fricke"
  creator_role: "dir."
  year: 1992
  eval: "liked"
  image: "/assets/images/thoughts/films/baraka.jpg"
  posted: "2020-07-07"
  text: |
    ***Baraka*** is the cinema of the overwhelming image, and for much of its ninety-six minutes it justifies the ambition. Almost every frame is composed with a rigour that makes most narrative filmmaking look slovenly; Fricke's 70mm photography turns the human face, the ritual gesture, and the geological formation into objects of equivalent and mutual gravity. The film earns its reputation, and the sequence that earns it most completely is the cut between the chick-processing factory and the Tokyo morning commute: baby birds sorted along conveyor belts, then salarymen sorted through subway turnstiles, the visual rhyme so precise and so brutal that the argument, that industrial modernity processes human beings as it processes livestock, arrives without a single word, in the gap between two images. <u>It is Eisensteinian montage deployed with absolute economy, and it is one of the most damning political statements in documentary cinema, delivered in the form of a juxtaposition lasting perhaps ninety seconds.</u>

    The concession is that outside this sequence and a handful of others, the film struggles to transcend the aesthetic of the very wealthy graduation reel. Scenes from different continents accumulate rather than cohere; the transitions feel arbitrary where they should feel inevitable, as though Fricke trusted the beauty of each individual shot more than the argument they might collectively make. The result is a film that gestures at a unified vision of humanity without quite constructing one. What it does construct is enough to matter.

- title: "12 Angry Men"
  type: "film"
  creator: "Sidney Lumet"
  creator_role: "dir."
  year: 1957
  eval: "loved"
  image: "/assets/images/thoughts/films/12_angry_men.jpg"
  posted: "2020-07-06"
  text: |
    At the outset of ***12 Angry Men*** one assumes, reasonably, that twelve characters confined to a single room for ninety-five minutes will blur into an undifferentiated mass of grievance and opinion. By the halfway mark, each juror has become as distinct as a character in a nineteenth-century novel: their class anxieties, their projection mechanisms, their specific modes of intellectual dishonesty all legible in the way they hold their bodies, the syntax of their interruptions, the precise character of their stubbornness. Sidney Lumet's camera performs the psychological pressure invisibly, migrating from wide-angle shots above the sightline in the early deliberations, spacious, calibrated, almost bureaucratic, to telephoto lenses below eye level as the room contracts around the last holdout, the space itself becoming an instrument of the film's argument.

    <u>The film is not, finally, about whether the boy is guilty; it is about what it costs a man to confront the fact that his certainty was never about the boy at all.</u> Lee J. Cobb's Juror 3 carries a wound that the film discloses slowly and without sentimentality: the estranged son, the photograph, the accumulated damage of a man who loved harshly and cannot account for what was lost. His final breakdown, barely two words, barely a whisper, is not catharsis in the theatrical sense but something rawer: a man finally seeing himself clearly enough to surrender a verdict he has been carrying around in place of grief. The film ends and the boy walks out into sunlight the camera has never shown us, because the story was always about the room.

- title: "Portrait de la jeune fille en feu"
  title_en: "Portrait of a Lady on Fire"
  type: "film"
  creator: "Céline Sciamma"
  creator_role: "dir."
  year: 2019
  eval: "meh..."
  image: "/assets/images/thoughts/films/portrait_of_a_lady_on_fire.jpg"
  posted: "2020-07-06"
  text: |
    ***Portrait of a Lady on Fire*** has been received as a landmark of queer cinema, and the case is not baseless: Sciamma constructs a visual world from which the male gaze is architecturally excluded, where desire is rendered through the dynamics of mutual looking rather than the unidirectional economy of painter and subject, and where the 18th-century setting removes modern identity vocabulary entirely, universalising the love story by stripping it of its labels. The female gaze is not merely theorised here but practised, frame by frame. This is real, and it matters.

    The ending, however, sits in uncomfortable proximity to a failure that has become a pattern. <u>When queer films resolve into lingering shots of beautiful women weeping to Vivaldi, grief aestheticised until it becomes another form of gorgeous suffering, one wonders whether the refusal of resolution is actually a formal achievement or simply the substitution of mood for meaning.</u> *Call Me by Your Name* (2017) reached for the same register and found only a fireplace and an ache without origin. Sciamma's film is more disciplined, more intelligent, and at least free of that film's troubling age dynamics; but the final passage, with its emotional ellipses and its unmotivated transitions, suggests that 'queer' is still being conflated with 'atmospheric inconclusiveness.' <u>The earlier scenes, when the women are simply together and the film trusts that sufficiency, are worth the rest of it.</u>

