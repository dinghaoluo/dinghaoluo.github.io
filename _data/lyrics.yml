- track: "surrender"
  album: "pre-album"
  year: 2018
  language: "en"
  notes: "Written in London during Fisher group internship at UCL. Fiction about an Alzheimer's patient. Lyrics appear only in the second half."
  lyrics: |
    I missed the days of loneliness
    the sea and the forest and the smell of happiness
    rest on me, your head and your hand
    the smell of the sea and everything fades away

    the stars, your drumrolls
    I missed the days

    oh your hand and your head and everything
    and then there's the smell; your memory fades away

