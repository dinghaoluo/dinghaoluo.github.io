<html lang="{{ site.locale | slice: 0,2 | default: "en" }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body class="layout--{{ page.layout | default: layout.layout }}{% if page.classes or layout.classes %}{{ page.classes | default: layout.classes | join: ' ' | prepend: ' ' }}{% endif %}">
    <button id="theme-toggle" type="button" aria-label="Toggle dark/light mode" data-theme-label="dark / light"><span class="theme-toggle__d">d</span><span class="theme-toggle__sep">/</span><span class="theme-toggle__l">l</span></button>
    {% include_cached skip-links.html %}

    <div class="initial-content">
      {{ content }}
    </div>

    {% if site.search == true %}
      <div class="search-content">
        {% include_cached search/search_form.html %}
      </div>
    {% endif %}

    {% include scripts.html %}

  </body>
</html>
